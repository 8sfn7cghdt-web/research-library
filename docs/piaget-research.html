nion and secondary scholarship; not read in full original.\n\n15. Centre Jean Piaget / Centre Universitaire (UNIGE), biographical pages, \"Family life.\" **Tier 2** (university institutional source). Corroborates the three children and the home-observation basis of the infancy work. https://www.unige.ch/centre-piaget/en/jean-piaget/biography/family, accessed 2026-06-13.\n\n16. Sanchez Ortega, M. et al. / \"Piaget,\" *StatPearls* (NCBI Bookshelf, NIH), updated edition. **Tier 2** (peer-reviewed clinical reference). The semiotic/symbolic function and its five expressions (deferred imitation, symbolic play, drawing, mental imagery, language), the preoperational catalogue, and the concrete-operational competences (conservation, seriation, transitivity, class-inclusion). https://www.ncbi.nlm.nih.gov/books/NBK448206/, accessed 2026-06-13.\n\n17. Piaget, J. & Inhelder, B., *The Child's Conception of Space* (French *La Représentation de l'espace chez l'enfant*, 1948; English 1956) — source of the three-mountains task (1956). **Tier 1** (primary text). Referenced via secondary scholarship; the task design and the egocentrism interpretation read in summary, not full original.\n\n18. Borke, H. (1975), \"Piaget's mountains revisited: Changes in the egocentric landscape,\" *Developmental Psychology* 11(2): 240–243; and Hughes, M. (1975), policeman-doll study (reported in Donaldson, M., *Children's Minds*, 1978). **Tier 2** (peer-reviewed) for Borke; **Tier 2** (university-press trade-scholarly) for Hughes via Donaldson. The task-redesign critique of the three-mountains finding (Borke: 3-yr-olds ~42%, 4-yr-olds ~67%; Hughes: ~90% correct). Figures via secondary scholarly summaries; primary articles referenced, not read in full original. Accessed 2026-06-13.\n\n19. Piaget, J., *The Child's Conception of Number* (French *La Genèse du nombre chez l'enfant*, 1941; English trans. C. Gattegno & F. M. Hodgson, Humanities Press / Routledge, 1952). **Tier 1** (primary text). The conservation-of-number task (one-to-one correspondence; spreading one row), the requirement of justification, and the age of acquisition (~6–7). Digitized copy: https://archive.org/details/childsconception00jean_0, accessed 2026-06-13 (record verified; text read in part).\n\n20. \"The Child's Conception of Number\" bibliographic and content summaries (Internet Archive record; Google Books record; scholarly references). **Tier 2.** Corroborates publication dates (1941 French / 1952 English) and the experimental procedure. Accessed 2026-06-13.\n\n21. McGarrigle, J. & Donaldson, M. (1974), \"Conservation accidents,\" *Cognition* 3(4): 341–350. **Tier 2** (peer-reviewed). The \"naughty teddy\" conservation-of-number experiment (standard condition ~16% conserve; accidental condition ~63% conserve), supporting the task-demand/pragmatics critique of Piaget's conservation ages. Figures via peer-reviewed secondary summaries; primary article referenced, not read in full original. Accessed 2026-06-13.\n\n22. Gareth Matthews / \"The Philosophy of Childhood,\" *Stanford Encyclopedia of Philosophy*. **Tier 2** (authoritative reference work). Piaget's four-stage account of the concept of \"life,\" and philosophical critiques (Matthews 1994) of the conceptual clarity of \"spontaneous movement\" and animism, plus reference to Donaldson's (1978) psychological critique. https://plato.stanford.edu/entries/childhood/, accessed 2026-06-13.\n\n23. Bond, T. G. (2005), \"Piaget and the Pendulum,\" in *The Pendulum* (eds. Matthews et al., Springer). **Tier 2** (peer-reviewed/edited volume). Detailed treatment of the pendulum task as the canonical formal-operations probe and its replicability. https://link.springer.com/chapter/10.1007/1-4020-3526-8_20, accessed 2026-06-13.\n\n24. \"Piaget's Different Intelligence Test: From IQ Tests to Operatory Intelligence,\" *Human Development* 68(4): 188– (Karger). **Tier 2** (peer-reviewed). The origin of the clinical method in the Binet/Simon laboratory in Paris (1919–1921), Piaget's critique of standardized testing, the shift to the *clinical-critical* interview requiring justification, and the objectivity/replicability critique (plus Bond & Bunting's later operationalization). https://karger.com/hde/article/68/4/188/910424/, accessed 2026-06-13.\n\n25. Ducret, J.-J. (2004), \"Méthode clinique-critique piagétienne,\" Fondation Jean Piaget. **Tier 2** (authoritative institutional source). Definitive account of the clinical-critical method, counter-suggestion, and its diagnostic logic. https://www.fondationjeanpiaget.ch/fjp/site/textes/VE/JJD2004_methode_clinique-critique.pdf, accessed 2026-06-13.\n\n26. \"Stages in Theory and Experiment: Fuzzy-Structuralism and Piagetian Stages,\" *Integrative Psychological and Behavioral Science* (Springer, 2022); and \"La genèse de l'intelligence logico-mathématique\" (source 10). **Tier 2** (peer-reviewed). The *structures d'ensemble* synchrony assumption, the falsification test (synchrony + invariant order), the empirical failure of synchrony across logico-mathematical vs. spatio-temporal operations, and horizontal/vertical décalage as anomaly-turned-theory (the order of conservation acquisition: number → mass → weight → volume). https://link.springer.com/article/10.1007/s12124-022-09702-7 and https://pmc.ncbi.nlm.nih.gov/articles/PMC9832071/, accessed 2026-06-13."}, {"order": 5, "file": "05_Structuralism_Logic_Biology.md", "title": "Structuralism, the Logico-Mathematical Models, and the Biological Grounding", "summary": "", "body": "# Structuralism, the Logico-Mathematical Models, and the Biological Grounding\n\n## Bottom Line\n\nThis document opens the engine room of Piaget's genetic epistemology — the technical and\nphilosophical scaffolding the rest of the corpus leans on but seldom unpacks. Three\nload-bearing pillars sit here, and they have aged very differently. **First, his\n*structuralism***: in *Le Structuralisme* (1968; Eng. *Structuralism*, 1970) Piaget\ndefined a structure by three properties — **wholeness, transformation, and\nself-regulation** — and argued for a *genetic, constructivist* structuralism against the\nstatic, synchronic structuralism then dominant in France (Lévi-Strauss in anthropology,\nthe Saussurean tradition in linguistics). The core idea — that the real structures are\nnot fixed essences but systems of transformation the knowing subject builds — is the\ndurable kernel, and it still travels well. **Second, his logico-mathematical models**: the\nlogic of \"groupements,\" the sixteen binary propositional operations, and the **INRC\n(Identity-Negation-Reciprocal-Correlative) Klein four-group** he placed at the summit of\nformal-operational thought. This was always the weakest technical link. Logicians from\nCharles Parsons (1960) onward, and later Seltman & Seltman (1985) and Philip Johnson-Laird,\njudged it idiosyncratic, non-standard, and at points incoherent — the operations do not\npreserve validity, and Piaget himself effectively abandoned it for a \"logic of meanings\"\nin his very last work (Piaget & Garcia, 1991). Today it is largely a historical curiosity.\n**Third, the biological grounding**: in *Biologie et connaissance* (1967; Eng. *Biology and\nKnowledge*, 1971) Piaget cast intelligence as the prolongation of biological adaptation and\norganization, and in his late work flirted with a quasi-Lamarckian **\"phenocopy\"** theory of\nevolution that most biologists (Ernst Mayr above all) judged a category error — a \"middle\nground\" between Lamarckism and neo-Darwinism that does not exist. All three answer one\n**transformed-Kantian question**: for Piaget the categories of knowledge are *neither* read\noff the world (empiricism) *nor* preformed in the mind (nativism/apriorism) but **constructed**\nthrough the subject's action on objects. That constructivist *tertium quid* is what survives;\nthe formal logic and the evolutionary biology are widely judged overreach. This document\nsays so plainly, marking throughout where the verdict is scholarly consensus and where it is\ncontested judgment.\n\n---\n\n## 1. Orientation: why this is the corpus's \"engine room\"\n\nThe other documents in this corpus describe *what* Piaget claimed about children, knowledge,\nand the history of science. This one looks under the hood — at the formal machinery he used to\nmake those claims rigorous, and at the biological story he told to explain where the machinery\ncame from. Piaget was, by training and by temperament, not a psychologist but a *biologist who\nbecame an epistemologist by way of the child*. He studied molluscs as a teenager, took his\ndoctorate on the molluscs of Valais, and never stopped believing that the growth of knowledge\nwas a special case of biological adaptation. The apparatus in this document is his attempt to\nmake that conviction precise. Structuralism gave him a general theory of what an organized\nsystem *is*; the logico-mathematical models gave him a notation for the structures he claimed\nto find in children's thought; and *Biology and Knowledge* tried to ground the whole edifice\nin the continuity between organic and cognitive regulation.\n\nHold three verdicts apart from the start, because the scholarship treats them very\ndifferently:\n\n- The **structuralist framework** (wholeness/transformation/self-regulation; structures as\n  *constructed* rather than given) is broadly judged a genuine and durable contribution, even\n  by critics, though its application to specific domains is contested.\n- The **logical formalism** (groupements, the sixteen operations, the INRC group) is, by near-\n  consensus among logicians and among most developmental psychologists who looked closely, the\n  weakest part — non-standard, error-prone, empirically unsupported, and effectively abandoned.\n- The **evolutionary biology** of the late work (phenocopy, the search for a middle path between\n  Lamarck and Darwin) is, by mainstream-biology consensus, an overreach — though a minority of\n  recent \"agential\"/developmentalist biologists argue his organizational intuition is being\n  partially vindicated.\n\nThe constructivist thread ties them together and is the one piece nearly everyone keeps.\n\n---\n\n## 2. Structuralism: wholeness, transformation, self-regulation\n\n### 2.1 The three defining marks of a structure\n\nPiaget published *Le Structuralisme* in 1968 (Presses Universitaires de France), translated by\nChaninah Maschler as *Structuralism* (Basic Books, 1970) [1][2]. The book is short, dense, and\ndeliberately panoramic. Piaget surveys mathematics, logic, physics, biology, psychology,\nlinguistics, social anthropology, and psychoanalysis, asking of each whether a genuinely\n*structuralist* method is at work and what it commits one to. His answer turns on a famous,\ncompact definition. A structure, \"as a first approximation,\" is **a system of transformations**;\nbecause it is a system and not a heap, those transformations obey laws, and the system is\n\"preserved or enriched by the interplay of its transformation laws\" [1]. From this he extracts\nthree properties any genuine structure must have:\n\n- **Wholeness (*totalité*).** A structure is a whole, not an aggregate of independent elements.\n  Its elements are subordinated to laws of the system, and the whole has properties not reducible\n  to those of its parts taken in isolation. (Structuralism, on Piaget's reading, is the doctrine\n  that *relations* are prior to *objects*: an element is what it is by virtue of its place in the\n  web of relations, not its intrinsic qualities [1][3].)\n- **Transformation (*transformation*).** A structure is not static; it is a system of\n  transformations. The laws of the structure are laws of transformation, not merely of\n  arrangement. (This is exactly where Piaget's structuralism becomes *dynamic* and points toward\n  development.)\n- **Self-regulation (*autoréglage*).** The transformations of a structure do not lead outside its\n  borders, and they call on no elements external to it; the structure is self-maintaining and\n  self-closing. Its stability is owed to the laws governing it — a set of internal \"norms\" or\n  regulations that keep it in equilibrium [1][3].\n\nNo one of these marks is original to Piaget, but their combination into a single criterion —\nand his insistence that *self-regulation* is what makes a structure a living, constructive thing\nrather than a Platonic form — is characteristically his. Self-regulation is also the bridge to\nhis developmental psychology. *Equilibration*, the mechanism by which a child's cognitive\nstructures stabilize and reorganize, is just self-regulation seen in time.\n\n> **Claim 5.1** is anchored here: the three-property definition is a direct reading of the\n> primary text and is uncontested as a *report of what Piaget said*.\n\n### 2.2 Genetic (constructivist) vs. static (synchronic) structuralism\n\nPiaget wrote *Structuralism* into the middle of the French structuralist moment, and he used it\nto stake out a position *against* the prevailing version. By the late 1960s \"structuralism\" in\nFrance meant, above all, Claude Lévi-Strauss in anthropology, the Saussure-derived structural\nlinguistics Lévi-Strauss had imported, Roland Barthes in semiotics, the early Foucault, and\nthe Lacanian reading of Freud — a constellation interested in *synchronic* structure: timeless\nsystems of differences (Saussure's *langue*; Lévi-Strauss's kinship and myth structures) read off\nwithout much interest in how they came to be [4][5]. Piaget engages these figures by name —\nLévi-Strauss, Foucault, the linguists, Talcott Parsons in sociology, and (approvingly, as a\nfellow traveler) Noam Chomsky's generative grammar [5][6].\n\nHis central objection is *developmental*. For Piaget a structure described only synchronically is\nhalf-understood; you have not explained a structure until you have explained its **genesis** — how\nit is constructed, by what process of equilibration, out of prior and simpler structures. He coined\nthe slogan that there is \"no structure without genesis, and no genesis without structure\":\nstructures are always under construction, and construction always proceeds from structure to\nstructure. Where Lévi-Strauss treated structures as more or less given invariants of the human\nmind, Piaget held that structures are *built* by the subject's activity and are therefore always\nbecoming. He also pressed the *dialectical* character of structuration — the working-out of a\nstructure is inseparable from analytic reasoning and proceeds through the overcoming of\ncontradictions — a theme he developed in a short later essay, \"Structuralism and Dialectic\" [7].\nThis is why his position is usually labeled **genetic structuralism** or **constructivist\nstructuralism**, to set it apart from the static/synchronic structuralism of the Paris scene.\n\nOne contested point of *placement* is worth getting right. Piaget is sometimes filed as \"a French\nstructuralist,\" but he was a Swiss outsider to the Paris movement, older than its leading figures,\nand his book is as much a *critique* of their structuralism as a contribution to it. Terence\nTurner's 1973 review in *American Anthropologist* of both *Structuralism* and *Genetic\nEpistemology* read the book precisely as Piaget's attempt to discipline a fashionable term by\ngrounding it in a theory of construction [6]. The neutral description, then: Piaget offered a\n*rival* structuralism — dynamic, genetic, biological — not a variant of the dominant one.\n\n> The stakes for the corpus are real: several other documents lean on the line that Piaget's\n> constructivism is a \"third way.\" The structuralism book is where that third way gets its most\n> general philosophical statement, and the contrast with Lévi-Strauss is the cleanest way to see\n> what is distinctive in it.\n\n---\n\n## 3. The Bourbaki \"mother-structures\" affinity — and why it was strained\n\n### 3.1 What Piaget claimed\n\nThe most concrete — and most criticized — link between Piaget's psychology and pure mathematics is\nhis claimed **affinity between the elementary cognitive structures children build and the three\n\"mother-structures\" (*structures-mères*) of the Bourbaki group**. Nicolas Bourbaki, the collective\npseudonym of a circle of mostly French mathematicians active from the 1930s, had set out to rebuild\nmathematics on set theory and to show that the whole edifice could be generated from three\nfundamental structure-types: **algebraic structures** (prototype: the *group*), **order\nstructures** (prototype: the *lattice*, or more simply the ordering relation), and **topological\nstructures** (built on notions of neighborhood, boundary, and continuity) [8][9][10].\n\nPiaget claimed to find the same three families, in primitive form, in the operations children\nconstruct around ages 7–8 (the concrete-operational period). In the *Genetic Epistemology*\nlectures he sets out \"to examine the three mother structures of the Bourbaki mathematicians and to\nraise the question of whether these mother structures correspond to anything in [children's\nthinking]\" [11]. His answer is that they do:\n\n- **Algebraic / group structure** appears \"most readily in the logic of classes — in the logic of\n  classification\": when a child can sort objects and operate reversibly on classes (combine, then\n  un-combine). But Piaget is careful: the child's class-logic is *not* a full mathematical group,\n  because the inverse operation does not behave cleanly. As he puts it, \"(A + A) − A = 0, whereas\n  A + (A − A) = A. So it is not a complete group; it is what I call a *grouping* (*groupement*), and\n  it is an algebra-like structure\" [11].\n- **Order structure** appears in *seriation* — the child arranging sticks by length and grasping the\n  transitivity of \"longer than.\" \"According to logicians,\" Piaget notes, \"seriation is a collection\n  of asymmetrical, transitive relationships,\" and these \"develop hand in hand\" in children. Its\n  reversibility is *reciprocity*, not negation [11].\n- **Topological structure** appears in the striking claim that children's *first* spatial intuitions\n  are topological — proximity, separation, order, enclosure — and that Euclidean and projective\n  intuitions develop later. Piaget links this to the history of geometry: topology is theoretically\n  the most primitive (Euclidean and projective geometry can be derived from it), and he argued that\n  the child's development follows the *theoretical* order rather than the historical order in which\n  the geometries were discovered (Euclid first, topology in the 19th century) [11][12].\n\nThe discovery story is part of the appeal. Piaget liked to stress that he found the parallel\n*independently* of the mathematicians, so the convergence between the structure of mathematics\nand the structure of mind was, to him, evidence of something deep. The contact was real and\ndatable: at the 1952 founding meeting of the CIEAEM (the international commission on mathematics\nteaching), Piaget responded to a lecture by the Bourbakist Jean Dieudonné on the architecture of\nmathematics by drawing exactly this parallel between the mother-structures and the operational\nstructures of intelligence [9][10]. The theme recurs across his work, including the volume\nco-authored with the logician E. W. Beth, *Mathematical Epistemology and Psychology* (1961/1966) [13].\n\n### 3.2 Why the parallel is judged strained\n\nThe Bourbaki affinity is one of the places where contemporary scholarship is most united in\nskepticism. Four distinct problems pile up:\n\n1. **Piaget's own hedge.** Even Piaget conceded that no subject possesses the *concept* of a group,\n   lattice, or homeomorphism before being taught it, typically not before late secondary school or\n   university [3]. So the claim cannot be that children *have* the mother-structures as mathematical\n   objects; it must be the much weaker, vaguer claim that the *form* of their early operations is\n   *describable* using structure-types mathematics later isolated. That weaker claim is hard to\n   falsify and easy to over-read.\n\n2. **The base shifted under him.** In the *Genetic Epistemology* lectures Piaget himself\n   acknowledged that the Bourbaki program \"has now been undermined to some extent or at least changed\n   since [Mac Lane] and Eilenberg developed the notion of categories,\" so that \"part of the Bourbaki\n   group is no longer orthodox\" [11]. If the three mother-structures are not, after all, the bedrock\n   of mathematics — category theory reorganizes the landscape — then a psychological theory pinned to\n   them loses its mathematical warrant. That is a striking admission against interest in a primary\n   text, and it materially weakens the analogy.\n\n3. **The topology claim looks like an inverted recapitulation.** The historian Barbara Wittmann\n   (Max Planck Institute for the History of Science) names the oddity directly: topology \"in the\n   proper sense of the term\" is a *thoroughly modern* discipline with no ancient roots, yet Piaget\n   placed it at the *origin* of the ontogenesis of spatial thinking — \"a peculiarly inverted version\n   of Ernst Haeckel's biogenetic law\" [12]. Reading a 19th-century mathematical abstraction back into\n   a four-year-old's perception of space is exactly the move critics call *reverse psychologism*\n   (see §4.4): mistaking a formal redescription for a mental reality.\n\n4. **The \"isomorphism\" overstates the fit.** Bourbaki's mother-structures are precisely defined\n   axiomatic objects; the child's \"grouping\" is, by Piaget's own admission, *not* a group (it fails\n   associativity/closure in the way his A+A−A example shows). To call the relationship an isomorphism,\n   or even a tight correspondence, flatters a loose family resemblance. The most charitable scholarly\n   reading is that Piaget found a *suggestive heuristic* — that mathematics and mind both organize\n   around composition, ordering, and proximity — and then over-formalized it.\n\n**Verdict.** That the Bourbaki parallel is *strained* is close to scholarly consensus: it rests on a\nmathematical foundation Piaget himself watched erode, it requires reading sophisticated modern\nmathematics into pre-schoolers, and the claimed structures are admittedly not the mathematical\nobjects they are named for. What is *contested* is whether anything survives the deflation. A\nsympathetic minority (and Piaget's defenders generally — see §6) hold that the underlying intuition\nis sound even if the Bourbaki dress was wrong: cognition organizes itself around a small number of\ncompositional forms. The \"New Math\" reforms of the 1960s, which drew on this Piaget–Bourbaki\nconvergence to put set theory and structure at the base of school mathematics, are now widely\nregarded as having over-applied the idea [9][10].\n\n---\n\n## 4. The logico-mathematical models — the weakest technical link\n\n### 4.1 Why Piaget wanted a logic\n\nPiaget needed a notation. If cognitive development is the successive construction of *structures*,\nhe needed a formal language in which to write those structures down and prove things about them. His\nambition was to model the stages algebraically: the concrete-operational child's thought as a system\nof **groupings** (*groupements*), the formal-operational adolescent's thought as a richer system\ncombining a **lattice** of the sixteen binary propositional operations with the **INRC group** of\ntransformations. He developed this apparatus across several works — most accessibly *Logic and\nPsychology* (lectures of 1952, the *Traité de logique* / *Essai de logique opératoire* tradition) and\nthe *Treatise on Logic* — and applied it most influentially with Bärbel Inhelder in *The Growth of\nLogical Thinking from Childhood to Adolescence* (French 1955; Eng. trans. Parsons & Milgram, Basic\nBooks, 1958) [14][15].\n\nThe notation never settled. What follows traces why.\n\n### 4.2 Groupements: a logic \"related to but somewhat different from\" standard algebra\n\nA **grouping** is Piaget's signature half-structure for concrete operations. It is meant to capture\nreversible classification and seriation, but it deliberately *fails* to be a full mathematical group.\nPiaget characterized groupings as having properties \"related to but somewhat different\" from\nmathematical groups [16]. The clearest illustration is the **tautology / special-identities problem**.\nIn a group, combining an element with its inverse always yields the neutral element, regardless of\ngrouping; in Piaget's groupings, adding a class to itself yields the class (A + A = A, a *tautology*),\nso the placement of parentheses changes the result — \"(A + A) − A = 0, whereas A + (A − A) = A,\" in\nhis own example [11]. Piaget treated these as deliberate features modeling how children's class-logic\nactually works. Logicians treated them as evidence that the formalism was *sui generis* — not a\nclean algebraic structure at all.\n\n### 4.3 The sixteen binary operations and the INRC group\n\nFor *formal* operations (from roughly age 11–12), Inhelder and Piaget proposed two interlocking\nstructures [14][15]:\n\n- **The sixteen binary operations.** Given two propositions *p* and *q*, one can form four base\n  conjunctions (p·q, p·~q, ~p·q, ~p·~q); the disjunctive combinations of these yield **sixteen\n  distinct truth-functional binary connectives** (conjunction, disjunction, the conditional, the\n  biconditional, exclusive disjunction, incompatibility, plus the limiting \"complete affirmation\" and\n  \"complete negation,\" etc.). Piaget held that the formal-operational adolescent commands the *whole*\n  combinatorial system — the lattice of all sixteen — rather than isolated connectives [11][14][17].\n- **The INRC group.** Over the operations Piaget defined four transformations forming a **Klein\n  four-group** (the abelian group of order four in which every element is its own inverse): **I**\n  (Identity, leave unchanged), **N** (Negation/inversion), **R** (Reciprocal), and **C** (Correlative\n  or dual). The group law has the Klein structure — NR = C, NC = R, RC = N — and Piaget argued that\n  the adolescent's ability to coordinate inversion and reciprocity *in a single system* (e.g., on a\n  balance beam, compensating a weight either by removing it, N, or by adding a counter-weight at\n  reciprocal distance, R) is the hallmark of formal thought [14][17][18].\n\n### 4.4 The logicians' critique: idiosyncratic, non-standard, and at points confused\n\nThis is the part of Piaget's program that fares worst under expert scrutiny, and the criticism comes\nfrom logicians of standing, not hostile outsiders. The major threads:\n\n- **Charles Parsons (1960), a logician's review.** In the *British Journal of Psychology*, Parsons\n  published the second of a pair of reviews of *The Growth of Logical Thinking* — explicitly \"a\n  logician's viewpoint\" — and found the apparatus wanting: the logical vocabulary was loose, the\n  inference from \"the child solves the task\" to \"the child possesses the formal structure\" was\n  unwarranted, and the formalism did not do the explanatory work claimed for it [19]. The review is\n  repeatedly cited as the opening shot in the logicians' case against Piaget.\n\n- **The validity / truth-preservation problem.** The deepest technical objection is that Piaget's\n  operational \"transformations\" **do not preserve truth**, so they cannot be rules of inference in any\n  standard sense. Mark Winstanley, surveying the apparatus sympathetically, notes that on Piaget's\n  scheme the *inverse* of a direct operation can take you \"from true premises to a false conclusion\" —\n  which \"violates validity.\" He quotes Piaget's collaborator Jean-Blaise Grize conceding the point\n  bluntly: \"a calculus of propositions from the point of view of validity does not exist\" in Piaget's\n  system — it is \"one of the peculiarities of Piaget's theory\" [16][17]. A formal \"logic\" in which a\n  central operation can carry truth to falsehood is, by ordinary logical standards, defective *as\n  logic*, whatever its psychological merits.\n\n- **Philip Johnson-Laird's \"idiosyncratic.\"** The cognitive scientist and reasoning theorist Philip\n  Johnson-Laird flatly characterized Piaget's logical theory as **idiosyncratic** and conceded that\n  \"it is not always easy to understand Piaget's theory\" — a difficulty Piaget himself admitted [16].\n  Coming from the leading modern theorist of human deductive reasoning, the verdict carries weight:\n  Piaget's logic is not a notational variant of standard logic that psychologists simply find\n  unfamiliar; it is *non-standard* in ways that obscure rather than illuminate.\n\n- **Empirical failure of the sixteen operations.** Beyond the formal objections, the *empirical*\n  claim that adolescents deploy the full system of sixteen operations did not replicate. Replication\n  studies (e.g., Weitz, Bynum and colleagues, investigating Piaget's \"system of 16 binary operations\")\n  found that subjects used at most a handful of the operations and showed no clean developmental trend\n  toward the full set [20]. The lattice-of-sixteen, in short, is not what adolescents actually do.\n\n- **Seltman & Seltman (1985), a book-length critique.** Muriel and Peter Seltman's *Piaget's Logic: A\n  Critique of Genetic Epistemology* (Allen & Unwin, 1985) mounted a sustained argument that Piaget's\n  logical foundations were unsound and that the genetic-epistemological program could not be carried by\n  the logic it advertised [21].\n\n- **Campbell's \"reverse psychologism.\"** The philosopher Richard Campbell (borrowing a term from Terry\n  Dartnall) names the underlying methodological error: **reverse psychologism**, the assumption \"that\n  an adequate description of the accomplishments of which we are capable is also an adequate description\n  of the processes by which we produce those accomplishments.\" His analogy is the pitcher Greg Maddux:\n  a physicist can describe Maddux's sinkerball with equations, \"but we would not conclude … that Maddux\n  therefore *knows* these equations.\" Reading systems of formal logic \"into the minds of those who\n  reason,\" Campbell argues, is exactly the mistake Piaget made with his mathematical structures [22].\n\n### 4.5 Piaget's own retreat: the \"logic of meanings\"\n\nThe most telling evidence that the formalism failed is that **Piaget himself effectively abandoned\nit.** His very last book, *Vers une logique des significations* (with Rolando García; Eng. *Toward a\nLogic of Meanings*, 1991), proposes a *new* logic — an **intensional** \"logic of meanings\" built on\n\"implications between meanings\" rather than the **extensional**, truth-functional propositional logic\nof the 1950s apparatus [23]. The book is explicitly framed as overcoming \"many problems and criticisms\nof his earlier formulations\": Piaget complains that a truth-functional conditional can be true even\nwhen no meaningful link joins antecedent and consequent, and he rebuilds the account around\nmeaning-implication instead [23]. The historian Jeremy Trevelyan Burman has documented how the\n*formal meaning of equilibration itself shifted over Piaget's career* — tracing a \"neo-Gödelian turn\"\nin which Piaget responded to Kurt Gödel's incompleteness results and their reception by French\nlogicians — so that \"the entirety of the theory that relied upon it\" changed too [24]. The picture\nthat emerges is of a thinker who kept revising the logical core because it never stabilized.\n\n**Verdict.** That Piaget's idiosyncratic logic is *largely abandoned today* is scholarly consensus.\nThe groupements, the lattice of sixteen operations, and even the INRC group survive mostly as items in\nthe history of the field and in education-flavored expositions, not as live formal tools; mainstream\nreasoning research moved on to mental-models (Johnson-Laird), probabilistic, and dual-process accounts.\nWhat is *contested* is how to read the failure. Critics read it as a fatal flaw revealing the emptiness\nof the structural claims (Seltman & Seltman; the strong reading of Parsons); defenders read the logic\nas a flawed but separable *notation* — drop the bad algebra, keep the developmental and constructivist\ninsights (Lourenço & Machado; Winstanley; the partisans of the late \"logic of meanings\"). The INRC\n*idea* — that mature reasoning coordinates negation and reciprocity within one reversible system —\nretains some heuristic life even among those who reject the group-theoretic dress.\n\n---\n\n## 5. Biology and knowledge — adaptation, organization, and the phenocopy overreach\n\n### 5.1 Intelligence as the prolongation of biological adaptation\n\nThe unifying conviction beneath everything above is that **knowing is a biological activity**. Piaget\nmade this explicit in *Biologie et connaissance* (Gallimard, 1967; Eng. *Biology and Knowledge: An\nEssay on the Relations Between Organic Regulations and Cognitive Processes*, trans. Beatrix Walsh,\nUniversity of Chicago Press / Edinburgh University Press, 1971) [25][26]. The argument runs: the living\nworld is a nested hierarchy of self-regulating, self-organizing adaptive systems, and cognition is\nthe *highest* such system — intelligence extends, by other means, the same assimilation/accommodation\nand self-regulation that govern organic life. The two key functional invariants of his psychology —\n**organization** and **adaptation** (with its two poles, assimilation and accommodation) — are\nimported directly from biology; a cognitive *scheme* is the functional analogue of an organic\nregulation. As Piaget put it in the *Genetic Epistemology* lectures, \"to know is to assimilate reality\ninto systems of transformations … to know is to transform reality\" [11]. This is the deep continuity\nthe workstream brief flags: structuralism (the formal theory of organized wholes), the logic (the\nnotation for cognitive structures), and the biology (the account of where the capacity to build\nstructures comes from) are *one* program, with biology as the foundation.\n\nRichard Campbell's assessment is representative of the sympathetic-critical mainstream: Piaget\n\"believed that the development of knowledge was a biological process, a matter of adaptation by an\norganism to an environment,\" and this framing — which dissolves the nature/nurture dichotomy — is\ncounted among his *durable* contributions [22].\n\n### 5.2 The Limnaea molluscs and the road to phenocopy\n\nThe biological grounding has deep biographical roots. Piaget's earliest scientific work was on the\nfreshwater snail *Limnaea stagnalis*, which in his Swiss lakes showed two shell morphologies: an\nelongated form in still water, a globular, contracted form in wave-agitated water. The contracted\nform is plausibly *adaptive* — it resists displacement in turbulent water. Critically, Piaget reported\nthat when the wave-adapted globular snails were bred, lines eventually produced the globular morph\n\"no matter what environment they are raised in\" — that is, an environmentally induced trait appeared\nto have become *heritable* [27]. This one observation haunted Piaget for sixty years and drove his\nlate, controversial evolutionary writing.\n\n### 5.3 Phenocopy: the quasi-Lamarckian middle path\n\nIn *Adaptation vitale et psychologie de l'intelligence: sélection organique et phénocopie* (Hermann,\n1974; Eng. *Adaptation and Intelligence: Organic Selection and Phenocopy*, 1980) and *Le comportement,\nmoteur de l'évolution* (1976; Eng. *Behavior and Evolution*, 1978), Piaget advanced a theory of\n**phenocopy**. In ordinary biology a \"phenocopy\" is an environmentally induced phenotype that mimics a\ngenetically determined one. Piaget inverted and elaborated the term into an evolutionary *mechanism*:\nan organism first meets environmental pressure with a *phenotypic* adaptation (a regulation), and this\nis later \"copied\" at the genotypic level, so an initially acquired adaptation becomes hereditary\nthrough the organism's own regulatory activity — not by direct Lamarckian inheritance of the acquired\ncharacter, but by a cybernetic feedback in which behavior and regulation *drive* genetic reorganization\n[27][28]. He explicitly invoked C. H. Waddington's concept of **genetic assimilation** (in which\nselection on environmentally induced phenocopies can fix a trait even without the original stress) as\nthe closest available mechanism, and leaned on it heavily in *Behavior and Evolution* [27]. The motive\nwas philosophical as much as empirical: phenocopy let Piaget make *behavior* and the organism's\n*activity* a motor of evolution, mirroring at the biological level his anti-empiricist, anti-nativist\nconstructivism at the cognitive level.\n\n### 5.4 Why mainstream biology judges it an overreach\n\nBy the standards of evolutionary biology, phenocopy is the most serious overreach in Piaget's corpus,\nand the criticism is pointed:\n\n- **Mayr's verdict: the middle ground does not exist.** The architect of the Modern Synthesis, Ernst\n  Mayr, held that the space Piaget tried to occupy — between Lamarckism and neo-Darwinism — simply is\n  not there. As Denis Walsh summarizes Mayr's position, \"those novelties that are simply the\n  expression of a mutation or a latent genetic disposition should be treated in the same way as any\n  other genetic trait\"; a genuinely novel inherited trait lacking a genetic basis would be \"a\n  misguided lapse into Lamarckism\" [27]. Without a mechanism by which the organism's regulatory\n  activity *writes back* into the germ line, phenocopy collapses either into ordinary selection (if the\n  variation was already genetic) or into discredited Lamarckism (if it was not).\n\n- **Waddington's mechanism is not Piaget's.** Terrence Deacon, re-examining the Waddington experiments\n  Piaget relied on, argues that genetic assimilation is real but works by *selection on pre-existing\n  genetic variation in developmental thresholds*, \"quite different than [Piaget] had imagined\" — \"not a\n  kind of cybernetic feedback process,\" and not Lamarckism either [28]. The mechanism Piaget needed —\n  directed, regulation-driven genetic change — is precisely the part the biology does *not* supply.\n  Deacon titles his critique, pointedly, \"Beyond Piaget's phenocopy: the baby in the Lamarckian bath,\"\n  and concludes that Piaget's *constructivism* endures while his *cybernetic evolutionary mechanism*\n  must give way to a properly Darwinian, self-organizing-selection account [28].\n\n- **Formation before the Synthesis.** Campbell adds the historical diagnosis: Piaget was intellectually\n  formed *before there was* a neo-Darwinian synthesis, never fully accepted it, was skeptical even of\n  the gene, and \"never completely rejected the Lamarckian conception that acquired characteristics\n  could be inherited\" [22]. His evolutionary heterodoxy is thus partly a generational artifact.\n\n- **The contested rehabilitation.** Here the verdict is genuinely *contested*, and honesty requires\n  flagging it. A current strand of evolutionary thought — \"agential,\" organism-centered, and\n  developmentally oriented (the Extended Evolutionary Synthesis, niche construction, developmental\n  plasticity, the updated Baldwin effect) — argues that Piaget's *organizational* intuition was ahead\n  of its time. Denis Walsh (\"Piaget's Paradox,\" *Human Development*, 2023) contends that the emerging\n  agential perspective \"now supports Piaget's organisational evolution concept,\" turning his \"hazardous\n  conjecture\" from a conceptual impossibility into \"a live empirical issue\" [27]. This is a minority,\n  revisionist position, and it does *not* vindicate phenocopy as Piaget stated it; it claims only that\n  the *spirit* of his organism-as-active-agent view is being recovered by other means. The\n  mainstream-biology consensus that *phenocopy-as-Piaget-formulated-it* is untenable stands.\n\n**Verdict.** The flirtation with quasi-Lamarckian phenocopy is, by mainstream consensus, an overreach;\nthe specific mechanism is not supported and at points incoherent. The *general* thesis — intelligence\nas continuous with biological adaptation and organization — is treated more respectfully and is the\npart later developmental and biological theorists still engage. Whether his organizational evolutionism\nis being partially vindicated by 21st-century agential biology is contested and live.\n\n---\n\n## 6. The Kantian question: where do the categories come from?\n\nAll three threads converge on one philosophical question Piaget inherited from Kant and rebuilt:\n**where do the structures of knowledge come from?** Kant had argued that space, time, causality, and\nthe other categories are *a priori* — preconditions the mind brings to experience. Piaget accepted the\n*existence* of such structuring categories but rejected their *fixity and innateness*. His\nconstructivism is precisely a **transformed** or **genetic Kantianism**: the categories are real and\ndo organize experience, but they are not given in advance. They are **constructed** in development,\nthrough the subject's action on objects, and they *change* from stage to stage.\n\nPiaget states the trilemma with unusual clarity in the *Genetic Epistemology* lectures:\n\n> \"From the empiricist point of view, a 'discovery' is new for the person who makes it, but what is\n> discovered was already in existence in external reality and there is therefore no construction of\n> new realities. The nativist or apriorist maintains that the forms of knowledge are predetermined\n> inside the subject and thus again, strictly speaking, there can be no novelty. By contrast, for the\n> genetic epistemologist, knowledge results from continuous construction, since in each act of\n> understanding, some degree of invention is involved; in development, the passage from one stage to\n> the next is always characterized by the formation of new structures which did not exist before,\n> either in the external world or in the subject's mind.\" [11]\n\nThis is the **break with both empiricism and nativism** in Piaget's own words. The structures are\n*neither in the world* (so empiricism, with its copy-theory of knowledge, is wrong) *nor preformed in\nthe mind* (so nativism/apriorism is wrong) — they are **built** at the interface, by the subject acting\non objects and abstracting not from the objects but from *the coordination of its own actions*. This is\n**reflective (reflecting) abstraction**, which Piaget distinguishes sharply from *empirical*\nabstraction. Empirical abstraction reads a property off the object — its color, its weight; reflective\nabstraction draws structure from the *actions and operations* the subject performs and \"transposes\" it\nto a higher level [11]. His famous illustration is the child who learns commutativity by counting\npebbles in different orders and finding the sum invariant: \"the knowledge … was drawn … not from the\nphysical properties of the pebbles, but from the actions that he carried out on the pebbles\" [11].\n\nThis is where structuralism, the logic, and the biology lock together. **Structuralism** supplies the\ngeneral claim that knowledge is organized into transforming, self-regulating wholes. The **logico-\nmathematical models** were the failed attempt to write those wholes down precisely. The **biology**\nexplains how a living system could *build* such structures at all — by the same adaptive, self-\nregulating activity that runs all the way down to the mollusc. And the **transformed-Kantian** thesis\nis the payoff: the necessity and universality Kant located in fixed a priori forms, Piaget relocated to\nthe *endpoint of a construction* — structures become psychologically *necessary* not because they were\nalways there but because the equilibration process closes on them.\n\nCampbell's closing assessment captures the durable/discardable split exactly: what is worth keeping in\nPiaget — overcoming the nature/nurture dichotomy, knowledge from action, the problem of genuine\nnovelty, qualitative developmental difference, the role of necessity and possibility, reflective\nabstraction — can be \"successfully deKanted,\" i.e., separated from the Kantian apparatus (and, one\nshould add, from the failed logic and the failed evolutionary biology) and retained [22]. **The\nconstructed structure is the keeper.**\n\n---\n\n## 7. Scorecard: consensus vs. contested\n\nTo be honest about where the field stands, separating settled judgment from live dispute:\n\n**Scholarly consensus (or near-consensus):**\n\n- Piaget defined a structure by wholeness, transformation, and self-regulation, and distinguished his\n  genetic/constructivist structuralism from the static/synchronic structuralism of Lévi-Strauss and the\n  Saussurean tradition. *(Reporting of the texts; uncontested.)*\n- The idiosyncratic propositional logic — groupements, the lattice of sixteen operations, the INRC\n  group — is non-standard, has formal defects (notably the failure to preserve validity), did not\n  replicate empirically, and is largely abandoned as a live formal tool. *(Strong consensus among\n  logicians and reasoning researchers; Piaget himself replaced it.)*\n- The phenocopy theory, as Piaget formulated it, is not supported by mainstream evolutionary biology;\n  the \"middle ground\" between Lamarck and Darwin he sought is widely judged not to exist. *(Mainstream\n  consensus; Mayr.)*\n- The constructivist *tertium quid* — categories neither empiricist-given nor nativist-preformed but\n  constructed through action — is Piaget's durable core and is widely retained. *(Broad agreement,\n  including from critics.)*\n\n**Contested / live judgment:**\n\n- *How much survives the deflation of the logic.* Critics (Seltman & Seltman; strong Parsons) read the\n  logical failure as undermining the structural claims; defenders (Lourenço & Machado; Winstanley) read\n  the logic as a separable, flawed notation and keep the developmental substance.\n- *Whether the Bourbaki intuition retains value once stripped of Bourbaki.* Skeptics call the parallel a\n  category mistake (Wittmann's \"inverted Haeckel\"); sympathizers keep a weak \"cognition organizes around\n  composition/order/proximity\" reading.\n- *Whether Piaget's organizational evolutionism is being partially vindicated* by 21st-century agential /\n  developmental biology (Walsh, \"Piaget's Paradox\") — a minority, revisionist claim that does *not*\n  restore phenocopy-as-stated.\n\n**The corpus-level takeaway:** when other documents invoke \"Piaget's structuralism\" or \"his\nconstructivism,\" they stand on solid ground; when they invoke \"his logic\" or \"his theory of\nevolution,\" they stand on the parts the field has largely set aside, and should say so.\n\n---\n\n## Open Questions\n\n1. **Did Piaget's logic ever have a *defender* among professional logicians, or only among\n   psychologists and Piaget scholars?** Winstanley (2023/2024) and Grize attempt rehabilitation, but\n   the question of whether any working logician endorsed the groupements/INRC apparatus *as logic*\n   (rather than as psychology) remains open in the sources consulted.\n\n2. **How tight is the textual claim that Piaget asserted an *isomorphism* (vs. a loose analogy)\n   between the mother-structures and children's operations?** The secondary literature uses both\n   \"isomorphism\" and \"correspondence.\" A direct reading of *Le Structuralisme* and the relevant\n   *Études d'épistémologie génétique* volumes (esp. *Épistémologie et psychologie de la fonction*,\n   vol. XXIII, 1968) is needed to pin down the strength of the claim.\n\n3. **Is the late \"logic of meanings\" (Piaget & García, 1991) a genuine repair of the validity problem,\n   or a relabeling?** Whether the intensional, meaning-implication logic actually preserves inference\n   where the extensional one failed is not settled in the sources here.\n\n4. **How decisive is the agential-biology rehabilitation of Piaget's evolutionism?** Walsh (2023)\n   frames it as turning a \"hazardous conjecture\" into a \"live empirical issue,\" but whether any\n   *empirical* result has since moved the question is unclear.\n\n5. **What exactly did Bourbakists (Dieudonné) make of Piaget's appropriation?** The 1952 CIEAEM\n   exchange is documented in secondary mathematics-education history; the mathematicians' own\n   assessment of whether the psychological parallel was legitimate is under-sourced here.\n\n6. **How much of the \"abandonment\" verdict reflects the field moving on (fashion) vs. demonstrated\n   error?** The logic's eclipse coincides with the rise of mental-models and probabilistic accounts;\n   disentangling refutation from displacement would sharpen the consensus claim.\n\n---\n\n## Sources\n\n1. Piaget, Jean. *Structuralism*. Trans. Chaninah Maschler. New York: Basic Books, 1970 (orig. *Le\n   Structuralisme*, Paris: PUF, 1968). **Tier 1 (primary).** The defining text: wholeness,\n   transformation, self-regulation; structure as a system of transformations. Accessed via\n   structuralism.ca reading-text and SciRP reference 2026-06-13.\n   https://www.scirp.org/reference/referencespapers?referenceid=2277291\n\n2. Piaget, Jean. *Structuralism* (Psychology Revivals ed.). Taylor & Francis / Routledge reissue.\n   **Tier 1/2.** Confirms translator, original-publication year, and panoramic scope (Lévi-Strauss,\n   Foucault, Parsons, Chomsky). Accessed 2026-06-13.\n   https://www.taylorfrancis.com/books/mono/10.4324/9781315722368/structuralism-psychology-revivals-jean-piaget\n\n3. \"What Is Structuralism? Session I: Piaget\" and the hosted *Structuralism* reading text,\n   structuralism.ca. **Tier 5 (reading group, but quoting Tier 1 ps://escholarship.org/uc/item/2t4870n9 ;\n    https://www.tandfonline.com/doi/full/10.1080/01445340.2024.2426068\n\n18. \"Comments on the INRC group,\" *Journal of Research in Science Teaching* 2:233 (1964), and general\n    treatments of the INRC = Klein four-group (NR=C, etc.). **Tier 2.** Establishes the group-theoretic\n    structure. Accessed 2026-06-13. https://ui.adsabs.harvard.edu/abs/1964JRScT...2..233E/abstract\n\n19. Parsons, Charles. \"Inhelder and Piaget's *The Growth of Logical Thinking*: II. A Logician's\n    Viewpoint.\" *British Journal of Psychology* 51(1):75–84 (1960). **Tier 2 (peer-reviewed critique by\n    a logician).** The opening logician's critique: loose logical vocabulary, unwarranted inference from\n    task success to possession of formal structure. Abstract/citation only (paywall). Accessed\n    2026-06-13. https://bpspsychub.onlinelibrary.wiley.com/doi/abs/10.1111/j.2044-8295.1960.tb00727.x\n\n20. Weitz, Bynum, et al. \"Piaget's System of 16 Binary Operations: An Empirical Investigation.\"\n    *Journal of Genetic Psychology* (1973); ERIC EJ090022. **Tier 2.** Empirical failure: subjects used\n    at most ~5 of the 16 operations, no developmental trend. Accessed 2026-06-13.\n    https://eric.ed.gov/?id=EJ090022 ;\n    https://www.semanticscholar.org/paper/Piaget's-System-of-16-Binary-Operations:-An-Weitz-Bynum/f173a936f7d9b9608dc2ebae96ee87b75ac79aea\n\n21. Seltman, Muriel, and Peter Seltman. *Piaget's Logic: A Critique of Genetic Epistemology*. London:\n    George Allen & Unwin, 1985 (Routledge reissue). **Tier 2 (book-length scholarly critique).**\n    Sustained argument that Piaget's logical foundations are unsound. Citation via Routledge / AbeBooks.\n    Accessed 2026-06-13. https://www.routledge.com/Piagets-Logic/Seltman/p/book/9780203715789\n\n22. Campbell, Richard J. \"Jean Piaget's Genetic Epistemology: Appreciation and Critique.\" Clemson\n    University (R. Campbell). **Tier 2 (scholarly essay by a Piaget specialist).** Sour
