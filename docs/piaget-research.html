marriage 1923, three children, chairs, 1955 Centre, IBE/UNESCO, Einstein 1928, death \"in Geneva at 84.\" Accessed 2026-06-13. https://www.encyclopedia.com/people/medicine/psychology-and-psychiatry-biographies/jean-piaget\n9. **Fondation Jean Piaget — bibliographic presentation of *Introduction à la malacologie valaisanne*; and UNIGE \"Piaget, l'intégrale en ligne\" (unige.ch/piaget) record piaget1921a09** — Tier 1/2 (archival/primary bibliography). Doctoral thesis title, Neuchâtel September 1918 foreword, 1921 separate 101-page edition (F. Aymon, Sion), catalogue-plus-variation character. Accessed 2026-06-13. https://www.unige.ch/piaget/piaget1921a09 ; https://www.fondationjeanpiaget.ch\n10. **Marc Ratcliff & Ramiro Tau, \"La cité utopique : origine et genèse du Centre international d'épistémologie génétique,\" *Philosophia Scientiæ* (OpenEdition Journals), philosophiascientiae/2038** — Tier 2 peer-reviewed history of science. Founding October 1955; Rockefeller funding (CHF 7,500 exploratory 1953; US$69,000 / CHF 288,000 in May 1955); interdisciplinary committee composition and members (Beth, Apostel, Perelman, Mays); residency model; *Études d'épistémologie génétique*; 1963 shift to Swiss funding; functioned ~25 years \"until 1986.\" Accessed 2026-06-13. https://journals.openedition.org/philosophiascientiae/2038\n11. **Same as [10]** — the Ratcliff & Tau article is the source both for the founding/Rockefeller facts and for the \"until 1986 / six years after Piaget's death / less collaborative in the final decade\" characterization. (Cited as [11] where the closure-year and late-period claims are made.)\n12. **Fondation Jean Piaget, \"Le Centre international d'épistémologie génétique\" (IDPAGE=251) and \"Création de l'épistémologie génétique\"** — Tier 2 (institutional archive). Mission (\"organize, year by year, the collaboration of psychologists and representatives of another particular science\"), Rockefeller as enabling funder, Piaget's direction throughout, the less-collaborative final decade. Accessed 2026-06-13. https://www.fondationjeanpiaget.ch/fjp/site/ModuleFJP001/index_gen_page.php?IDPAGE=251&IDMODULE=42\n13. **French Wikipedia, \"Centre international d'épistémologie génétique\" — citing the Fondation Jean Piaget's \"Présentation de Gil Henriques.\"** Wikipedia is used here only as a navigation pointer; the *substantive* claim (Henriques directed 1981–1985; University of Geneva closed the Centre in 1985) is sourced to the **Fondation Jean Piaget**, which should be cited directly. Per project policy this fact rests on the Fondation, not on Wikipedia. Accessed 2026-06-13. (Fondation author page: https://www.fondationjeanpiaget.ch/fjp/site/presentation/index_auteur.php?auteurID=112)\n14. **Rita Hofstetter, \"Piaget, diplomat of educational internationalism. From the International Bureau of Education to UNESCO (1929–1968),\" *Paedagogica Historica* (Taylor & Francis, 2022), doi:10.1080/00309230.2022.2052732** — Tier 2 peer-reviewed history of education. IBE directorship from 1929 and the four-decade arc into UNESCO. (Abstract/title consulted; full text returned HTTP 403.) Accessed 2026-06-13.\n15. **Erasmus Prize Foundation (Praemium Erasmianum), official laureate page, erasmusprijs.org/en/laureates/jean-piaget/** — Tier 1 (awarding body, primary for the award). Erasmus Prize 1972; \"professor of psychology at the University of Geneva from 1929 to 1975\"; Centre founded 1955 and directed until death; donated half the prize money to the Centre. Accessed 2026-06-13.\n16. **New World Encyclopedia, \"Jean Piaget\"** — Tier 5 (tertiary; used only to triangulate the chair chronology and honors, never as sole source). Chair dates (1921–25 Rousseau; 1925–29 Neuchâtel; 1929–39 Geneva; 1938–51 Lausanne; 1952–64 Sorbonne; 1955–80 Centre); 1969 APA award; 1972 Erasmus; death 16 Sept 1980. Accessed 2026-06-13.\n17. **Supporting search-snippet corroboration** for: the infancy trilogy dates (*Naissance* 1936 / *Construction du réel* 1937 / *Formation du symbole* 1945) via UNIGE Piaget online and the Fondation; the early book titles/dates (*Langage et pensée* 1923, etc.) via SciRP/title records; the Bleuler/Burghölzli context; the Bergson-via-Cornut 1912 episode (treated in 02); the unmarked-grave burial. Each is a triangulation cluster of Tier 2–5 sources accessed 2026-06-13; specific contested points are flagged in Open Questions.\n\n*Tier note:* No Tier 6–7 source is used for any factual claim. Wikipedia appears only as a pointer to the Fondation Jean Piaget (its cited source) for the Henriques/closure fact, per the project's no-Wikipedia-for-substantive-claims rule."}, {"order": 2, "file": "02_Religion_And_The_Sacred.md", "title": "Religion and the Sacred in the Young Piaget", "summary": "", "body": "# Religion and the Sacred in the Young Piaget\n\n## Bottom Line\n\nJean Piaget remembered himself as a precocious naturalist who turned to epistemology as a young scientist. The documents say otherwise. Between roughly 1912 and 1918 he was a religiously preoccupied adolescent in a science-versus-faith crisis, an active and well-known member of the Swiss-Romand Christian Students' Association, a Christian-socialist sympathizer, and the author of a confessional philosophical novel whose preface opens \"Je suis né protestant.\"\n\nThe standard reconstruction of this period — anchored in Fernando Vidal's *Piaget Before Piaget* (Harvard, 1994) and corroborated by Jean-Jacques Ducret, Thomas Kesselring, and Michael Chapman — argues that the load-bearing constructs of Piaget's later genetic epistemology (equilibrium/disequilibrium, adaptation, the balance of parts and whole, even the word *assimilation*) are already present, and already doing the central work, in that 1918 novel and in the immanentist liberal-Protestant theology behind it. Reading the primary texts directly confirms the textual base of this thesis. *Recherche* uses *équilibre* 229 times and *déséquilibre* 36 times, names \"the conciliation of science and faith\" as \"the problem of the century,\" defines life as assimilation of the milieu, and casts the ideal as a mathematical limit-case of equilibrium — while grounding both an immanent and a transcendent God in \"value.\" The 1928 essay then ties the transcendent God to social *constraint* and unilateral respect, and the immanent God to *\"the norms of thought itself,\"* mutual respect, and intellectual autonomy.\n\nOne caveat the corpus must keep visible: the \"prefiguration\" reading is a consensus *interpretation* imposed retrospectively, not Piaget's own 1918 self-description, and its strongest single load-bearing pillar is Vidal's archival reconstruction. The mature Piaget grew reticent about — and at points actively recast — these religious roots.\n\n---\n\n## 1. The argument in one paragraph, and why it is contested\n\nThree things are not in dispute, because the primary documents settle them. First, Piaget wrote and published, at twenty, a long autobiographical-philosophical novel whose explicit subject is the reconciliation of science and religious faith. Second, that novel is saturated with a specific conceptual vocabulary — equilibrium, disequilibrium, adaptation, organization, the whole-and-its-parts — that would later become the architecture of his developmental theory. Third, in the same years he was a visible figure in organized Swiss Protestant student life, and a decade later he gave a formal lecture defending an immanentist theology.\n\nWhat *is* contested — and what this workstream is built to weigh honestly — is the inference drawn from those facts: that genetic epistemology *grew out of* the religious crisis, that the science of cognition was, at root, a transposed theodicy. That inference is the scholarly thesis of Vidal, Ducret, Kesselring, and (more guardedly) Chapman. It is plausible, textually well-supported, and widely accepted. It is also a *reading*, layered onto documents whose author never said \"my epistemology is my theology continued by other means,\" and whose later self-narrative pointed in almost the opposite direction. This document holds both halves at once: the strong primary-text base, and the interpretive distance between that base and the \"religion → epistemology\" conclusion.\n\n---\n\n## 2. Neuchâtel: a divided Protestant household\n\nPiaget was born in Neuchâtel on 9 August 1896, the first child of Arthur Piaget and Rebecca Susanne Jackson [1][2]. The household embodied, in miniature, the very tension his life's first book would try to resolve.\n\nHis mother, Rebecca Jackson, was a devout Protestant of pronounced piety. Piaget himself later described her temperament as neurotic and unstable, and credited it — somewhat coolly — with stirring his early interest in psychology and his preference for the orderly world of natural history over the emotional weather of the home [2][3]. In keeping with Neuchâtel Protestant custom, she required her son to undertake formal religious instruction before his sixteenth year, in 1911 [4]. His father, Arthur Piaget (1865–1952), was a professor of medieval and Romance philology at the Academy (from 1909, University) of Neuchâtel — a meticulous, skeptical, anti-dogmatic medievalist who demanded documentary proof and distrusted pious tradition [1][5]. Piaget recalled the friction directly: a believing, anxious mother, a rationalist, religiously detached father, and a boy caught between a faith presented as obligatory and the disciplined, evidence-bound inquiry he found in his father's study and his own malacology [2][5].\n\nThis is the seedbed. The \"conciliation of science and faith\" was not, for the young Piaget, an abstract topic of the age; it was the structure of his dinner table.\n\n### 2.1 Neuchâtel liberal Protestantism\n\nThe Protestantism of turn-of-the-century Neuchâtel was neither fundamentalist nor confessionally rigid. Vidal stresses its Kantian lineage and its anti-dogmatic, liberal character — a Protestantism comfortable interiorizing religion, suspicious of dogma and ritual, congenial to the idea that the divine is found in conscience and reason rather than in supernatural intervention [6][7]. This is the soil in which an *immanentist* theology — God identified with life, with value, with the norms of thought — could grow without scandal. It is also the explicit target of praise-and-blame in the opening lines of Piaget's 1928 lecture: \"On accuse ou on loue le protestantisme de tendre à bannir le surnaturel. Religion de la vie intérieure, religion morale, religion sans dogmes…\" (\"Protestantism is accused or praised for tending to banish the supernatural. A religion of the inner life, a moral religion, a religion without dogmas…\") [8].\n\n---\n\n## 3. The adolescent crisis of faith\n\nAround age fifteen, the required religious instruction of 1911 collided with the boy's already-formed scientific training, and a genuine crisis followed. Ducret, in the standard scholarly chapter on \"the young Piaget and the religious question,\" locates the rupture precisely in the conflict \"entre la connaissance scientifique et ce qui se donne comme connaissance dans les religions constituées\" (\"between scientific knowledge and what presents itself as knowledge in the established religions\") [9]. The proofs of God's existence offered in catechism struck the young naturalist as unpersuasive. The dogmatic content of Christianity could not survive the standard of evidence he applied to mollusks.\n\nTwo readings, in this order, mediated the crisis:\n\n- **Auguste Sabatier.** In his father's library Piaget found Sabatier's *Esquisse d'une philosophie de la religion d'après la psychologie et l'histoire* (1897), a landmark of liberal-Protestant theology that treated religion psychologically and historically rather than supernaturally. Ducret describes this as Piaget's first framework for his religious anxiety — but a *moderate*, metaphysical one, still short of a fully naturalistic resolution [9][10]. Sabatier and the liberal Protestant preacher-pedagogue Ferdinand Buisson are both named inside *Recherche* itself as the inherited liberal position Sébastien must move beyond [11].\n\n- **Henri Bergson.** The decisive break came in the summer of 1912.\n\n### 3.1 The 1915 crisis and the year in the mountains\n\nThe crisis was not merely intellectual. The Fondation Jean Piaget's own biographical account records that the religious-scientific conflict intensified through his philosophical reading of 1913–1915 and became severe enough that, in 1915, \"une crise sérieuse… l'a contraint à passer près d'une année à la montagne\" (\"a serious crisis… forced him to spend nearly a year in the mountains\") — a convalescence in the Alps that combined ill health with what Edward Dale, reading *Recherche* as spiritual autobiography, calls a \"spiritual emergency\" [4][12]. *Recherche*, written September 1916 to January 1917, is in part the literary working-through of that breakdown and recovery.\n\n---\n\n## 4. Bergson via Cornut at Lake Annecy, summer 1912\n\nThe single most cited episode in the young Piaget's religious development is his godfather's intervention. Samuel Cornut, a man of letters and Piaget's godfather, worried that his teenage godson's exclusive absorption in natural history was crowding out the life of the spirit and the mind. He invited the boy to spend the summer of 1912 with him at Lake Annecy, in Savoy, and on their walks pressed on him the philosophy of Henri Bergson — specifically *L'Évolution créatrice* (*Creative Evolution*, 1907) [4][13][14].\n\nThe effect, by Piaget's own retrospective account, was a conversion experience. The most quoted formulation comes through Richard Evans's interview-book *Jean Piaget: The Man and His Ideas* (1973): \"I recall one evening of profound revelation. The identification of God with life itself was an idea that stirred me almost to ecstasy because it now enabled me to see in biology the explanation of all things and of the mind itself\" [13]. Bergson offered what Sabatier had not: not a moderate reconciliation but a *radical* one — God identified with the *élan vital*, with Life as creative becoming, so that biology could explain everything, including mind, including value, including God [4][9].\n\nThis is the hinge. Bergson let the young Piaget keep both terms of the conflict by collapsing them. If God *is* Life, then the study of life is the study of God, and the contest between science and faith dissolves — science becomes the via regia to the sacred. Vidal and Ducret both treat the Bergson encounter as the moment that converted a *defensive* religious posture (protecting faith from science) into an *offensive* program (using a scientific attitude to resolve the religious question itself) — what Ducret calls adopting \"une attitude scientifique pour résoudre la question religieuse\" [9].\n\n### 4.1 A necessary qualification: the young Piaget was already half-critical of Bergson\n\nThe \"Bergson as revelation\" story is true, and Piaget told it himself. But reading *Recherche* directly complicates the simple version. By 1916–17, the protagonist Sébastien — and so the twenty-year-old author — already regards Bergson with admiration *and* serious reservation. The novel calls Bergson's intelligence \"admirable\" and his intuition disciplined, but faults *bergsonisme* for being \"essentiellement représenté par ses antithèses trop poussées\" — for \"violently disjoining\" frameworks of the modern mind and setting \"life and matter, quality and quantity\" into false antitheses [15]. By the time he wrote his confessional novel, in other words, Piaget had absorbed the Bergsonian gift (God = Life, biology as the master science) and was already reaching past Bergson's dualisms toward a more *integrative* metaphysics built on equilibrium and organization. The revelation was a gateway, not a terminus — a point the \"Bergson made Piaget\" shorthand tends to flatten.\n\n---\n\n## 5. Christian-socialism and the Association chrétienne d'étudiants\n\nThrough the First World War years Piaget was no solitary reader. He was an organized, public, religiously engaged young man — an active member of the Association chrétienne d'étudiants de Suisse romande (the French-speaking Swiss Christian Students' Association, the Romand wing of the Schweizerischer Christlicher Studentenverband). Within it he became known for his oratory, his erudition, his moral seriousness, and the vigor of his thinking in religious philosophy [4][16]. The 1928 lecture itself was delivered to this body — at its 31st conference, at La Sarraz, in March 1928 — and published by it that June [8].\n\nIn the same years he sympathized with Christian socialism. The HLS and the Fondation Jean Piaget both record his wartime Christian-social sympathies; his earliest published texts (the 1915 prose poem \"La mission de l'idée\") fuse a religious-redemptive register with a social-reformist one, and *Recherche* depicts its hero drawn to socialism as the one movement still carrying \"une vie et un idéalisme dont les Eglises et les politiques étaient depuis longtemps sevrées\" (\"a life and an idealism of which the Churches and the politicians had long been weaned\") [4][16][17]. Vidal frames the whole 1896–1918 period as best read not as the apprenticeship of a scientist but as the moral-religious *project* of a young man who dreamed of a *rebirth* — a *Neugeburt* — of Christianity that would regenerate society [6][16]. This \"life plan,\" in Vidal's reading, was \"essentially 'moral' rather than merely epistemological\" [6].\n\n---\n\n## 6. *Recherche* (1918): reading the primary text directly\n\n*Recherche* was written between September 1916 and January 1917 and published in Lausanne by Édition La Concorde (Imprimerie La Concorde) in 1918 [18]. It is a hybrid — part *Bildungsroman*, part philosophical treatise — organized into a \"Première Partie\" and \"Deuxième Partie\" that trace its protagonist's destruction of inherited certainties and his attempt at \"reconstruction\" [18]. The protagonist, Sébastien, is a transparent self-portrait: an adolescent in spiritual crisis, \"à la recherche d'une foi\" (\"in search of a faith\") after his old certainties collapse [18].\n\n### 6.1 The preface: \"Je suis né protestant\"\n\nThe avant-propos is dated December 1917 and signed Jean Piaget. It tells the reader plainly that these are the pages of a twenty-year-old, written 1916–17, lightly retouched. Its closing words are the most-quoted line of the young Piaget's corpus: \"Deux mots encore. Je suis né protestant, comme on s'en rendra suffisamment compte.\" (\"Two more words. I was born Protestant, as one will sufficiently realize.\") He adds that he is also neutral, but feels as French as Swiss [18]. The author *announces* the confessional and Protestant character of what follows. No later interpretive sleight-of-hand is required to call this a religious book — Piaget said so on the first page.\n\n### 6.2 \"The conciliation of science and faith… the problem of the century\"\n\nThe novel names its own master-problem explicitly. Through his first contact with believing youth, \"Sébastien comprenait… la signification sociale de ce problème: la conciliation de la science et de la foi, ce problème qui est à l'origine de tout le déséquilibre actuel. C'est le problème du siècle, comme celui de la foi et de la philosophie a été celui du XVIIIe siècle.\" (\"Sébastien understood… the social meaning of this problem: the conciliation of science and faith, the problem which is at the origin of all the present disequilibrium. It is the problem of the century, as that of faith and philosophy was the problem of the eighteenth century.\") [19] Note that even here, in stating the problem, the operative noun is *déséquilibre* — the crisis is already framed as a disequilibrium to be resolved into equilibrium.\n\n### 6.3 The equilibrium vocabulary, counted\n\nDirect text search of the 104-page facsimile confirms the brief's verified spine: *équilibre* (counting all occurrences of the string, which includes those inside *déséquilibre*) appears **229 times**, and *déséquilibre* itself **36 times** [18]. This is no occasional metaphor. Equilibrium is the novel's central organizing concept, applied across biology, morality, society, the churches, and the structure of value. Representative formulations:\n\n- The ideal as a mathematical limit-case: \"l'idéal est un cas limite… comme disent les mathématiciens, ou encore le plein équilibre auquel tendent les équilibres faux ou instables de la réalité.\" (\"the ideal is a limit-case… as the mathematicians say, or again the full equilibrium toward which the false or unstable equilibria of reality tend.\") [20]\n- \"Toute organisation réelle est en équilibre instable\" (\"Every real organization is in unstable equilibrium\") [18] — a formulation strikingly close to the later equilibration theory's picture of cognitive structures as moving equilibria.\n\nThat the *same word*, *équilibre*, and the *same picture* — stable vs. unstable equilibria, an ideal as the limit toward which unstable states tend — sit at the center of both the 1918 theodicy and the mature 1950s–70s equilibration theory is the textual heart of the prefiguration thesis [6][21][22].\n\n### 6.4 Life as assimilation of the milieu\n\nThe single most consequential conceptual find for the \"prefiguration\" thesis is the treatment of *assimilation*. The string *assimil-* appears 13 times, and the crucial passage defines life itself by it: \"Il ne reste plus pour définir la vie, que l'assimilation, source de toute organisation. L'être vivant assimile, c'est-à-dire reproduit, par le fait même qu'il vit, de la substance identique à lui-même… D'autre part, en assimilant, il subit l'influence des substances qu'il assimile, du milieu par conséquent.\" (\"Nothing remains to define life except assimilation, source of all organization. The living being assimilates — that is, reproduces, by the very fact that it lives, substance identical to itself… On the other hand, in assimilating, it undergoes the influence of the substances it assimilates, of the milieu in consequence.\") [23] He then ties it directly to knowledge: \"la seule cause de déséquilibre est toujours le défaut d'assimilation, c'est-à-dire d'abord de connaissance\" (\"the sole cause of disequilibrium is always the failure of assimilation — that is, first of all, of knowledge\") [24].\n\nThis is remarkable. In 1918, in a religious-philosophical novel, the twenty-year-old already has: assimilation as the defining act of life; assimilation as a two-way relation between organism and *milieu* (the seed of the later assimilation/accommodation pair); organization as the product of assimilation; disequilibrium as the result of failed assimilation; and assimilation explicitly equated with *knowledge*. The mature genetic-epistemological machinery — assimilation, adaptation, organization, equilibration, the organism-environment exchange — is present here as a metaphysics of life and value, three decades before it became a theory of the child's mind [6][21][23].\n\n### 6.5 Adaptation and the balance of parts and whole\n\nAdaptation (*adaptation*, 9 occurrences; *adapt-* 12) functions, as it would later, as the relation of an entity to its environment, and is held in tension with the whole: the individual is defined as \"un équilibre entre sa propre adaptation et la réalisation accomplie par lui de l'équilibre social\" (\"an equilibrium between its own adaptation and the realization it accomplishes of social equilibrium\") [25]. The recurring evil in the novel's social and religious analysis is the rupture of the balance of *le tout et les parties* — \"l'équilibre du tout et des parties,\" broken \"in favor of the whole by statism\" and \"in favor of the parts by the egoistic individualism of bourgeois politics,\" and broken in religion when Catholicism produces \"excès du tout aux dépens des parties\" while Protestantism falls into \"l'excès contraire\" [26][27]. The parts/whole equilibrium that organizes the later structuralism is, in 1918, an ethical-theological and political principle.\n\n### 6.6 God: immanent yet transcendent, grounded in value\n\nThe novel's theology is immanentist but carefully two-sided, and it grounds God in *valeur* (which appears 154 times). The pivotal passage: \"Dieu transcendant, certes, puisque la valeur absolue dépasse nécessairement l'existence réelle… Dieu immanent? Certes, puisqu'en étant la source de toutes les valeurs, la valeur absolue est partout et en tout…\" (\"A transcendent God, certainly, since absolute value necessarily exceeds real existence… An immanent God? Certainly, since by being the source of all values, absolute value is everywhere and in everything…\") [28][29]. And the ideal of being is described as \"celui d'un être parfait à la fois immanent et transcendant au monde\" (\"that of a perfect being at once immanent and transcendent to the world\") — explicitly cast as the *ideal equilibrium* [30]. God here is not a person who intervenes; God is absolute Value, immanent as the source of all values and transcendent as exceeding any actual existence — and the whole apparatus is, once again, an equilibrium concept.\n\nThe novel also makes science the foundation of religion rather than its rival: \"La science, qui fonde ainsi la religion comme elle fonde la morale… pourra nous donner les lois d'une religion naturelle dépouillée…\" (\"Science, which thus founds religion as it founds morality… will be able to give us the laws of a natural religion stripped bare…\") [31]. This is the Bergsonian resolution carried to its conclusion: science does not threaten faith; it grounds a purified, immanent faith.\n\n---\n\n## 7. Brunschvicg and \"universal reason\": the philosophical resolution\n\nIf Bergson opened the door, Léon Brunschvicg's idealist rationalism supplied the mature philosophical resolution of the crisis — encountered as Piaget read toward and during his Paris years (he was in Paris 1919–1921) [4][6]. Brunschvicg's notion of God as *universal reason*, and his historical-critical idealism (knowledge studied through the history of science and mathematics), let Piaget relocate the immanent divine from Bergson's *élan vital* to *reason itself* — to the impersonal norms of thought as they develop through history. Vidal makes this encounter the backbone of his claim that Piaget's project was a moral-religious one: the divine becomes the universal reason immanent in the development of knowledge, so the study of how knowledge grows becomes, in effect, the study of the immanent divine [6]. It is also the direct bridge to the 1928 essay's formula identifying God with \"the norms of thought itself.\"\n\n---\n\n## 8. *Deux types d'attitudes religieuses* (1928): reading the primary text directly\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 416\" role=\"img\" aria-label=\"Two parallel descending columns from Piaget's 1928 essay. The left column, transcendence: a supernatural God imposed from outside; then social constraint; then unilateral respect, based on authority and prestige; then heteronomy and obedience. The right column, immanence: God identified with the norms of thought itself; then social cooperation; then mutual respect; then autonomy and free inquiry. A central divider separates them. The bottom line states that Piaget psychologized theology, sorting the two God-concepts by the same heteronomy-to-autonomy axis that structures his moral psychology, and that he preferred immanence and autonomy as the more evolved attitude.\">\n<text x=\"350\" y=\"28\" text-anchor=\"middle\" font-size=\"13.5\" class=\"t-serif\" letter-spacing=\"1.5\">DEUX TYPES D&#8217;ATTITUDES RELIGIEUSES &#183; 1928<\/text>\n<text x=\"350\" y=\"46\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\" font-style=\"italic\">Piaget gives the two God-concepts a psychological-sociological genesis<\/text>\n<text x=\"185\" y=\"72\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"bold\" class=\"t-acc\" style=\"fill:var(--t5)\">TRANSCENDENCE<\/text>\n<text x=\"515\" y=\"72\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"bold\" class=\"t-acc\" style=\"fill:var(--t1)\">IMMANENCE<\/text>\n<line x1=\"350\" y1=\"84\" x2=\"350\" y2=\"356\" class=\"ln-soft\" stroke-width=\"1.2\" stroke-dasharray=\"3 4\"/>\n<rect x=\"56\" y=\"84\" width=\"258\" height=\"50\" rx=\"3\" class=\"f-t5\"/>\n<text x=\"185\" y=\"104\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" class=\"t-inv\">A supernatural God,<\/text>\n<text x=\"185\" y=\"120\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" class=\"t-inv\">imposed from outside<\/text>\n<rect x=\"386\" y=\"84\" width=\"258\" height=\"50\" rx=\"3\" class=\"f-t1\"/>\n<text x=\"515\" y=\"104\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" class=\"t-inv\">God = &#8220;les normes de la<\/text>\n<text x=\"515\" y=\"120\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" class=\"t-inv\">pens&#233;e elle-m&#234;me&#8221;<\/text>\n<rect x=\"56\" y=\"154\" width=\"258\" height=\"46\" rx=\"3\" class=\"f-panel\" stroke-width=\"1.2\" style=\"stroke:var(--border)\"/>\n<text x=\"185\" y=\"182\" text-anchor=\"middle\" font-size=\"11\">social <tspan font-weight=\"bold\" style=\"fill:var(--t5)\">CONSTRAINT<\/tspan> (externality)<\/text>\n<rect x=\"386\" y=\"154\" width=\"258\" height=\"46\" rx=\"3\" class=\"f-panel\" stroke-width=\"1.2\" style=\"stroke:var(--border)\"/>\n<text x=\"515\" y=\"182\" text-anchor=\"middle\" font-size=\"11\">social <tspan font-weight=\"bold\" style=\"fill:var(--t1)\">COOPERATION<\/tspan><\/text>\n<rect x=\"56\" y=\"220\" width=\"258\" height=\"46\" rx=\"3\" class=\"f-panel\" stroke-width=\"1.2\" style=\"stroke:var(--border)\"/>\n<text x=\"185\" y=\"248\" text-anchor=\"middle\" font-size=\"11\">unilateral respect <tspan class=\"t-muted\">(authority)<\/tspan><\/text>\n<rect x=\"386\" y=\"220\" width=\"258\" height=\"46\" rx=\"3\" class=\"f-panel\" stroke-width=\"1.2\" style=\"stroke:var(--border)\"/>\n<text x=\"515\" y=\"248\" text-anchor=\"middle\" font-size=\"11\">mutual respect<\/text>\n<rect x=\"56\" y=\"286\" width=\"258\" height=\"46\" rx=\"3\" class=\"f-panel\" stroke-width=\"1.2\" style=\"stroke:var(--border)\"/>\n<text x=\"185\" y=\"314\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" style=\"fill:var(--t5)\">heteronomy &#8212; obedience<\/text>\n<rect x=\"386\" y=\"286\" width=\"258\" height=\"46\" rx=\"3\" class=\"f-panel\" stroke-width=\"1.2\" style=\"stroke:var(--border)\"/>\n<text x=\"515\" y=\"314\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" style=\"fill:var(--t1)\">autonomy &#8212; free inquiry<\/text>\n<path d=\"M185,134 L185,152\" fill=\"none\" class=\"s-t5\" stroke-width=\"1.6\"/>\n<polygon points=\"180,148 185,156 190,148\" class=\"f-t5\"/>\n<path d=\"M185,200 L185,218\" fill=\"none\" class=\"s-t5\" stroke-width=\"1.6\"/>\n<polygon points=\"180,214 185,222 190,214\" class=\"f-t5\"/>\n<path d=\"M185,266 L185,284\" fill=\"none\" class=\"s-t5\" stroke-width=\"1.6\"/>\n<polygon points=\"180,280 185,288 190,280\" class=\"f-t5\"/>\n<path d=\"M515,134 L515,152\" fill=\"none\" class=\"s-t1\" stroke-width=\"1.6\"/>\n<polygon points=\"510,148 515,156 520,148\" class=\"f-t1\"/>\n<path d=\"M515,200 L515,218\" fill=\"none\" class=\"s-t1\" stroke-width=\"1.6\"/>\n<polygon points=\"510,214 515,222 520,214\" class=\"f-t1\"/>\n<path d=\"M515,266 L515,284\" fill=\"none\" class=\"s-t1\" stroke-width=\"1.6\"/>\n<polygon points=\"510,280 515,288 520,280\" class=\"f-t1\"/>\n<line x1=\"56\" y1=\"352\" x2=\"644\" y2=\"352\" class=\"ln-soft\" stroke-width=\"1\"/>\n<text x=\"350\" y=\"372\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\" font-style=\"italic\">the same heteronomy&#8594;autonomy axis structures his moral psychology &#8212;<\/text>\n<text x=\"350\" y=\"388\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\" font-style=\"italic\">God relocated from an external being to the immanent <tspan class=\"t-acc\">norms of reason<\/tspan> itself<\/text>\n<text x=\"350\" y=\"406\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-acc\" font-weight=\"bold\">&#8212; and Piaget openly preferred the immanent, autonomous pole as the more evolved<\/text>\n<\/svg>\n<figcaption><strong>Fig. 4.<\/strong> How the theology became the psychology: in his 1928 lecture to the Swiss Christian students, Piaget sorts the two God-concepts by the <em>same<\/em> constraint&#8211;cooperation axis that runs from heteronomy to autonomy in his moral development theory &#8212; identifying the immanent God not with the self but with &#8220;the norms of thought itself,&#8221; the bridge from his Protestant youth to genetic epistemology (Claims 2.7&#8211;2.8).<\/figcaption>\n<\/figure>\n\n\nA decade after *Recherche*, Piaget — by now a working psychologist — returned to the religious question in a formal lecture to the same Christian-student milieu. \"Deux types d'attitudes religieuses: immanence et transcendance\" was delivered at the 31st conference of the French-speaking Swiss Christian students at La Sarraz in March 1928, and published by the Association chrétienne d'étudiants de Suisse romande in June 1928, pp. 7–40 [8].\n\n### 8.1 The two attitudes\n\nPiaget distinguishes two religious attitudes and gives them a *psychological-sociological* genesis. **Transcendence** — belief in a supernatural God who imposes himself from outside — he ties to social *constraint*: \"l'idée du surnaturel ou de la transcendance est liée à l'extériorité de la contrainte par rapport à l'individu\" (\"the idea of the supernatural or of transcendence is bound to the externality of constraint with respect to the individual\"); \"toute contrainte sociale habitue l'individu à l'obéissance et surtout à la reconnaissance de réalités qui s'imposent à lui de l'extérieur\" (\"all social constraint accustoms the individual to obedience and above all to the recognition of realities that impose themselves on him from outside\") [8]. **Immanence** emerges with social differentiation, cooperation, and *mutual* respect: \"les individus chez lesquels le respect mutuel prédomine sont des 'prédisposés' à l'immanence et à la morale de l'autonomie\" (\"individuals in whom mutual respect predominates are 'predisposed' to immanence and to the morality of autonomy\"), developing through \"libre recherche intellectuelle, sincérité absolue\" (\"free intellectual inquiry, absolute sincerity\") [8].\n\n### 8.2 God as \"the norms of thought itself\"\n\nThe decisive move — and the clearest sign of how far Piaget has traveled from Bergson's *élan vital* toward Brunschvicg's universal reason — is his insistence that immanentism does **not** mean self-worship. He distinguishes three terms, not two: transcendence, the psychological self, and impersonal rational norms. \"L'immanentisme revient à identifier Dieu, non pas au moi psychologique, mais aux normes de la pensée elle-même.\" (\"Immanentism amounts to identifying God not with the psychological self, but with the norms of thought itself.\") [8] God is neither an external supernatural authority nor the individual ego; God is the immanent normativity of reason — the very norms toward which thought develops.\n\n### 8.3 The mapping onto his developmental sociology\n\nThis 1928 theological distinction maps exactly onto the moral-developmental framework Piaget was building in the same period, and would publish in *Le jugement moral chez l'enfant* (1932): unilateral respect / constraint / heteronomy on one side, mutual respect / cooperation / autonomy on the other. Transcendence is to immanence as the morality of constraint is to the morality of cooperation, and as the child's heteronomous obedience is to the adult's autonomous reason [8][32]. By 1928 the continuity between his theology and his developmental psychology is no matter of retrospective interpretation. Piaget is doing both at once, in the same conceptual vocabulary, and openly preferring immanence/autonomy/cooperation as the *more evolved* attitude [8][33].\n\n---\n\n## 9. The scholarly thesis: genetic epistemology as transposed theodicy\n\n### 9.1 Vidal (the standard biography, and the load-bearing source)\n\nFernando Vidal's *Piaget Before Piaget* (Harvard University Press, 1994) is the standard historical biography of the pre-1918 Piaget and the principal source of the religion-shaped-epistemology thesis [6]. Its core claims, in Vidal's own framing and that of its reviewers: Piaget's formation was shaped by philosophy, religion, politics, and social engagement, and attending to that formation \"alters our basic assumptions about the origins of Piaget's thinking and his later psychology\" [6][34]. The resulting profile is \"strikingly dissimilar to Piaget's own retrospective version.\" Where Piaget's autobiography presents a precocious scientist, Vidal finds a young man \"increasingly concerned with the foundations of religious faith and knowledge, immersed in social and political matters, and actively involved in Christian and socialist groups\" [6][34]. Piaget's lifelong master-idea — that everything (animal life, morality, science, mathematics, the child's mind, society) \"evolves according to universal laws of equilibrium\" — Vidal reads as continuous with the equilibrium metaphysics of the young Christian-socialist, and Piaget's life-project as \"essentially 'moral' rather than merely epistemological\" [6][34]. **Honesty flag:** the most distinctive part of the thesis — the *continuity* claim, the reconstruction of the \"moral enterprise,\" the weighting of religion over science in the formation — rests specifically on Vidal's archival work. Where this document leans on the *interpretation* rather than the primary-text facts, it leans largely on Vidal, and that single-source dependency should be tracked.\n\n### 9.2 Ducret, Kesselring, Chapman (corroboration, with differences of emphasis)\n\nThree further scholars corroborate the broad thesis from different angles:\n\n- **Jean-Jacques Ducret**, in *Jean Piaget, savant et philosophe* (Droz, Geneva, 1984), traces the young Piaget's movement \"de la transcendance à l'immanence,\" reading the Sabatier-then-Bergson sequence as the conversion of a defensive religious posture into a scientific attitude toward the religious question, and arguing that the early religious questioning shaped the later epistemological concern with distinguishing valid knowledge from belief [9].\n- **Thomas Kesselring**, in *Jean Piaget* (C.H. Beck, Munich, 1988; rev. 1999), treats the reading of Bergson as Piaget's \"philosophical foundational experience\" (*philosophisches Grunderlebnis*) and devotes sustained attention to his engagement with Christian religion alongside the logico-mathematical and developmental work — placing the religious formation inside the intellectual biography rather than treating it as a discarded phase [35].\n- **Michael Chapman**, in *Constructive Evolution: Origins and Development of Piaget's Thought* (Cambridge University Press, 1988), reconstructs the developmental and biological roots of the equilibrium/adaptation framework and connects the mature theory back to the early Bergsonian-evolutionary and organizational concerns — though Chapman's emphasis is more on the *biological-evolutionary* lineage than on the religious one [36].\n\nThe convergence of four independent scholars on the *continuity* of the equilibrium-and-adaptation vocabulary from 1918 to the mature theory is the strongest warrant for the thesis. They differ on the *weighting* — how *much* of genetic epistemology is \"really\" transposed theology versus transposed biology versus genuinely new science. There the corpus should preserve the disagreement, not flatten it.\n\n### 9.3 The strongest (and least critical) version: Dale\n\nEdward J. Dale's \"Spiritual Consciousness and the Age of Quantity: The Strange Case of Jean Piaget's Mysticism\" (*Journal of Consciousness Studies*, 2014, 21(5–6), 97–119) pushes the thesis furthest: Piaget's \"subjective experience of immanence can be considered the driving motivation for his life's work,\" and Piaget resolved his crisis by deciding that \"the will of God is to be carried out through scientific work,\" making epistemology a form of spiritual realization [12]. Dale reads *Recherche* as documenting a genuine mystical \"spiritual emergency.\" This is the maximal claim — and, as a critical reader must note, Dale \"presents Piaget's concealment of spirituality as historically contextual rather than indicative of changed belief, offering no skeptical alternative reading\" [12]. It shows how far the immanence-as-engine reading can be taken, and marks the boundary where interpretation outruns the documents.\n\n---\n\n## 10. The critical counter-current: Piaget's own reticence and recasting\n\nHere the document must be most careful, because the gap between what Piaget *wrote in 1918* and what he *said about himself later* is itself a central datum.\n\n1. **The primary texts are unambiguous about the religion; Piaget's later self-narrative is not.** *Recherche* opens \"Je suis né protestant\" and names the conciliation of science and faith as its subject. His 1952 autobiography (in Boring's *A History of Psychology in Autobiography*, vol. IV) and the Evans interviews (1973) present a markedly more *scientific* origin story — the mollusk prodigy, the early epistemological vocation — with the religious crisis and the Christian-socialist activism softened, abbreviated, or reframed [13][33]. Vidal's whole project turns on this divergence: the archival young Piaget and the autobiographical old Piaget are not the same man [6][34].\n\n2. **A plausible motive for the recasting.** It has been suggested — and the corpus should mark this as a reasonable inference, not an established fact — that Piaget downplayed his religious roots to secure a hearing among a scientific psychology committed to naturalistic, often implicitly atheistic, assumptions [33]. Whether the motive was strategic, or simply that his views genuinely evolved (the immanent God becoming so thoroughly identified with \"the norms of thought\" that the religious vocabulary dropped away as redundant), is not settled by the documents.\n\n3. **The \"prefiguration\" reading is an interpretation, not Piaget's claim.** Nowhere in *Recherche* does Piaget say \"these concepts will one day be my psychology\"; nowhere in the mature work does he say \"my equilibration theory is my 1918 theodicy continued.\" The continuity is real at the level of *vocabulary and structure*, and reading both texts verifies it. The continuity as *causal origin* (\"the epistemology grew out of the religious crisis\") is an inference that the scholars draw and that Piaget himself neither asserted nor, in his late self-presentation, encouraged. The honest formulation is: *the conceptual materials of genetic epistemology demonstrably first appear in the service of a religious-philosophical project; whether this makes the epistemology \"really\" religious in origin is a defensible scholarly reading rather than a documented fact.*\n\n4. **A deflationary alternative worth stating.** One could read the continuity the other way. The young Piaget may have reached for *équilibre*, *adaptation*, and *assimilation* in 1918 precisely because they were already *biological and physical* concepts — drawn from his malacology, from Le Dantec's biology, from the physics of equilibrium — and applied this fundamentally *scientific* toolkit to the religious problem, rather than deriving the science from the religion. On this reading, the direction of fit runs biology → theology → psychology, not theology → everything. The primary text supports this too: the assimilation passage is framed in explicitly *biological* terms (\"l'être vivant assimile… de la substance identique à lui-même\"), and the novel cites Le Dantec [23][37]. Chapman's \"constructive evolution\" framing leans this way. The corpus should not present the religious-origin thesis as the only available reading of the same evidence.\n\n---\n\n## 11. What this means for the epistemology workstreams\n\nFor the corpus's special-focus #2 (genetic epistemology), this workstream yields a set of grounded continuities to test, not assert:\n\n- **Equilibration** ↔ the 1918 equilibrium/disequilibrium metaphysics and \"the ideal as a mathematical limit of equilibrium.\"\n- **Assimilation/accommodation** ↔ the 1918 definition of life as assimilation of the milieu, with the two-way organism-environment exchange already present.\n- **Adaptation and organization** ↔ the 1918 organism-environment and parts/whole balances.\n- **The transformed-Kantian / Brunschvicgian move** (categories as developing, not fixed; God/reason as immanent norms of thought) ↔ the 1928 essay's \"les normes de la pensée elle-même.\"\n- **Autonomy/cooperation vs. constraint/heteronomy** (the moral psychology, and the bias toward the \"more evolved\" autonomous reason) ↔ the 1928 immanence/transcendence mapping.\n\nThe verifiable claim for the epistemology documents is the *vocabulary and structural* continuity. The interpretive claim — that the science is theology transposed — should travel through the corpus *flagged as Vidal-anchored interpretation*, never as settled biography. The vocabulary is documented. The origin story is a reading. Keep the seam between them visible.\n\n---\n\n## Open Questions\n\n1. **Direction of fit.** Did the religious crisis generate the equilibrium/adaptation/assimilation vocabulary, or did an already-scientific (biological/physical) vocabulary get applied to the religious problem and then carried into psychology? The same primary text supports both readings; the scholars lean toward the former, but the latter is not refuted.\n2. **How much rests on Vidal alone?** The primary-text facts (the quotes, the counts, the 1928 mapping) are independently verifiable. But the distinctive *continuity-as-origin* thesis is most fully developed by Vidal; Ducret, Kesselring, and Chapman corroborate parts of it with different emphases. A precise audit of which sub-claims are multiply attested vs. Vidal-only would sharpen the corpus.\n3. **Why the reticence?** Was Piaget's late de-emphasis of religion strategic (to gain a scientific hearing), developmental (his immanent God simply became \"the norms of thought\" and the religious label fell away), or temperamental? The documents underdetermine this.\n4. **The 1915 crisis.** The \"near year in the mountains\" and its relation to physical illness vs. spiritual/psychological breakdown deserves direct archival confirmation beyond the Fondation Jean Piaget's summary; Dale reads it maximally as a mystical \"spiritual emergency,\" which may overstate.\n5. **\"La mission de l'idée\" (1915) and other early texts** were referenced but not read in the original here; reading them directly would test whether the equilibrium vocabulary predates *Recherche*.\n6. **The relationship to the moral-psychology work.** The 1928 essay's constraint/cooperation mapping clearly anticipates *Le jugement moral chez l'enfant* (1932); the precise chronology of which framework fed which deserves its own treatment.\n\n---\n\n## Sources\n\n1. Historical Dictionary of Switzerland (HLS / DHS), \"Piaget, Jean,\" hls-dhs-dss.ch/fr/articles/009056/. Tier 2 (authoritative reference). Accessed 2026-06-13. [Entry returned HTTP 403 on direct fetch; details corroborated via HLS-sourced search results and the German/French entry content surfaced in search.] — Family, dates, Neuchâtel context, ACE membership, Christian-socialism, immanentist metaphysics.\n2. New World Encyclopedia, \"Jean Piaget,\" newworldencyclopedia.org/entry/Jean_Piaget. Tier 5 (tertiary reference; u
