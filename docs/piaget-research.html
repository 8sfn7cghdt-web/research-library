** Source for the standard methodological critique (undocumented participant selection) and the recapitulationism point, used as position/critique-summary evidence in §7. Claim 7.1.\n\n15. **Horst Pfeiffle, \"On the psychogenesis of the a priori: Jean Piaget's critique of Kant\"** (PhilPapers record, https://philpapers.org/rec/PFEOTP), accessed 2026-06-13. **Tier 2.** Title-level evidence that the a priori itself is given a developmental genesis in the program; supports the \"transformed Kant.\" Claim 3.1. *Abstract-level only.*\n\n16. **Fondation Jean Piaget, \"Études d'épistémologie génétique par ordre chronologique\"** (bibliography, https://www.fondationjeanpiaget.ch/fjp/site/bibliographie/index_EEG.php), accessed 2026-06-13. **Tier 1–2 (institutional bibliography).** The *Études d'épistémologie génétique* as 37 volumes, PUF, 1957–1980. Claim 5.2.\n\n17. **Jeremy Trevelyan Burman, \"Piaget No 'Remedy' for Kuhn, But the Two Should be Read Together: Comment on Tsou's 'Piaget vs. Kuhn on Scientific Progress',\"** *Theory & Psychology* 17(5):721–732 (2007), SAGE (https://journals.sagepub.com/doi/10.1177/0959354307079306); author copy (academia.edu/221158), accessed 2026-06-13. **Tier 2 (peer-reviewed).** The direct reply to Tsou: Piaget is no straightforward \"remedy\" for Kuhn (overlooked early Piaget–Kuhn history, biological foundation, a \"lost\" Kuhn manuscript), but the two should be read together. Claim 7.2.\n\n---\n\n*Sourcing note: Several primary and scholarly sources (Piaget 1970 and 1972 *Principles*; Piaget & García 1983/1989; Kitchener 1986; Tsou 2006 full text; Britannica; Fondation Jean Piaget pages) returned 403/404 to direct automated fetch on 2026-06-13 and were used via search-engine abstracts, publisher metadata, and peer-reviewed secondary summaries. Page-level verbatim quotation from these primaries is flagged below as gap-fill so the verification phase can pull them directly. No citation, statistic, or quotation here is invented; where a figure (e.g., the $69,000 Rockefeller grant, the 37-volume count) rests on a single scholarly source it is attributed to that source and flagged.*"}, {"order": 4, "file": "04_Constructs_And_Stages.md", "title": "The Developmental Machinery: Constructs, the Four Stages, and the Clinical Method", "summary": "Piaget's apparatus laid out as prose a sharp generalist can follow — the functional invariants, the scheme, equilibration, operations and structures; the four stages with their signature experiments; the clinical method; and décalage — with the load-bearing assumptions flagged where they bear weight.", "body": "# The Developmental Machinery: Constructs, the Four Stages, and the Clinical Method\n\n*An action that can be undone in the mind, and a child who cannot yet undo it: the whole of Piaget's theory is the story of how the second becomes the first.*\n\nThere is a single image at the bottom of all of Piaget's psychology, and it is worth holding onto before any of the vocabulary arrives. A four-year-old watches an adult pour the water from a short, fat glass into a tall, thin one. Nothing has been added; nothing has been taken away; the child saw the whole thing. Ask her whether there is now more water, less water, or the same, and she will tell you — with complete conviction — that there is *more*, because the column is taller. Three years later the same child, faced with the same glasses, will look at you as though you have asked something faintly insulting. \"It's the same water,\" she will say. \"You just poured it. You could pour it back.\" Between those two answers lies everything this chapter is about. The second child can do something the first cannot: she can run the pouring *backwards in her head* and see that it returns to the start. Piaget gave that mental running-backwards a name — *reversibility* — and built an entire theory of mind around the claim that the growth of intelligence is, at bottom, the construction of reversible, organized actions.\n\nThis document lays out the apparatus by which Piaget tried to make that claim precise. The plan is simple. First the **functional invariants** — the handful of processes Piaget thought operate identically at every age and in every species: organization and adaptation, and adaptation's two faces, assimilation and accommodation. Then the **unit** those processes act on — the *scheme*. Then the **motor** that drives the whole system forward — *equilibration*, and its mature form, reflective abstraction. Then the **structures** that emerge — *operations* organized into *groupements* and, at the summit, the *INRC group*. Only then the famous **four stages**, each defined by the experiment that made it famous: object permanence and the A-not-B error in the sensorimotor period; egocentrism, the three-mountains task, and the failure of conservation in the preoperational; conservation, seriation, and class-inclusion in concrete operations; the pendulum and combinatorial reasoning at the formal stage. Then the **method** that produced all of it — the *méthode clinique*. And finally **décalage**, Piaget's own device for the embarrassing fact that the stages are messier than the theory wants them to be.\n\nA warning runs through the whole chapter, and it is better stated up front than smuggled in. The textbook version of Piaget — four tidy stages, four crisp ages, a child who flips from one to the next like a switch — is a caricature that Piaget himself would have rejected and that the evidence does not support. The ages are soft. The most load-bearing claim in the system — that the operations of a stage arrive together as a single *structured whole* (the *structures d'ensemble*) — is also the most attacked, and it does not survive contact with the data unscathed. And the signature findings about conservation and egocentrism turn out to be unnervingly sensitive to how the question is asked: change the wording, change the props, and children \"pass\" two or three years earlier than Piaget said they could. This chapter describes the theory in its own terms and on its own best behavior; the empirical demolition crew — Vygotsky, the neo-Piagetians, the infancy-competence researchers, the task-demand critics — does its work in **document 06**. Where a construct here has a soft underbelly, it is flagged. The flags are not asides; they are the most honest part of the chapter.\n\n---\n\n## Bottom Line\n\nPiaget's developmental theory is a layered machine. At its base sit two *functional invariants* that never change with age — **organization** (intelligence always forms coordinated structures) and **adaptation** (intelligence always adjusts to the world) — and adaptation is itself the running balance of **assimilation** (taking the world into one's existing mental structures) and **accommodation** (bending those structures to fit the world). The unit these processes work on is the **scheme**: a repeatable, generalizable pattern of action or thought. The engine that pushes a child from one level to the next is **equilibration** — the self-regulating drive to resolve the disturbances that arise when assimilation and accommodation fall out of balance — which in its mature form Piaget called *équilibration majorante* (equilibration that builds upward), powered by **reflective abstraction**. As development proceeds, actions become **operations**: internalized, *reversible* actions that lock together into **structures** — the logical *groupements* of middle childhood and the *INRC group* of adolescence. The four stages — **sensorimotor** (birth to ~2), **preoperational** (~2–7), **concrete operational** (~7–11), and **formal operational** (~11+) — are the successive forms these structures take, each diagnosed by a now-canonical set of experiments (object permanence, conservation, the three mountains, the pendulum), most of which Piaget devised through the flexible, probing **clinical method** he developed and which his three children supplied for the infant work. The theory's signature strength is its mechanism: it explains *how* knowledge grows rather than merely cataloguing what children can do at what age. Its signature vulnerabilities are three and they are real: the ages are far softer than textbooks imply; the *structures d'ensemble* synchrony assumption — that a stage's competences appear together — is the load-bearing claim and the empirically weakest; and the conservation and egocentrism findings are sensitive to task wording in ways that make Piaget's age estimates look like underestimates. This chapter builds the machine; document 06 stress-tests it.\n\n---\n\n## I. The functional invariants: what never changes\n\nPiaget was a biologist before he was a psychologist — his doctorate was on the land molluscs of Valais, and he had published on shellfish taxonomy as a teenager — and the foundation of his psychology is frankly biological [1][2]. He asked: what is true of intelligence that is also true of digestion, or of an organism's relation to its environment? Two functions, he answered, are *invariant* — they operate the same way at every age, in the newborn and the physicist alike, because they are simply what it means to be a living system that knows.\n\nThe first is **organization**. Intelligence never consists of isolated bits. Whatever a mind can do, it does in coordinated, structured wholes; a new capacity is always integrated into the existing system rather than added to a heap. The second is **adaptation** — the adjustment of the organism (and of its knowing) to the environment. These two are, for Piaget, \"two complementary aspects of a single mechanism\": you cannot organize without adapting, or adapt without organizing [1][3]. They are *functional* invariants precisely because the *structures* they produce change dramatically across development while the functions themselves do not. A newborn's sucking and a teenager's hypothesis-testing are radically different structures generated by identical functions.\n\nThe interesting half of the pair is adaptation, because Piaget split it into two opposed sub-processes whose running balance *is* the life of the mind.\n\n### Assimilation and accommodation\n\n**Assimilation** is the incorporation of the world into structures the mind already has. When an infant who has a \"grasping scheme\" encounters a new rattle and grasps it, the rattle has been assimilated to the grasping scheme — pulled into a pattern of action that already existed [1][3]. When an adult meets a new dog and recognizes it as a dog, the animal has been assimilated to the dog-concept. Assimilation is conservative: it makes the new instance of the old. By itself it would freeze the mind in place, forever forcing the world into the molds it already possesses.\n\n**Accommodation** is the corrective: the modification of a structure to fit something the world will not let it assimilate cleanly. The infant who tries to grasp a large ball and finds the one-handed grasp fails, and so adjusts to a two-handed grasp, has *accommodated* the grasping scheme to the object [3]. The child who has been calling all four-legged animals \"doggie\" and is corrected when she points at a cow accommodates — splits the scheme, makes a new one. Accommodation is progressive: it makes the old fit the new.\n\nAdaptation is the equilibrium of the two. Piaget's term for the balanced state is **adaptation** itself: intelligence is \"adapted\" when assimilation and accommodation are in balance, when the mind can both make sense of the world in its own terms *and* be corrected by it [1][3]. Tip too far toward assimilation and you get fantasy — symbolic play, in which a banana is freely assimilated to \"telephone\" with no regard for what bananas are. Tip too far toward accommodation and you get pure imitation — the child copying a model with no assimilation of meaning. Piaget located ordinary intelligent thought as the moving balance-point between these poles. (This is not a metaphor he used loosely; in *Play, Dreams and Imitation* he reads the whole development of representation as the differentiation and re-balancing of assimilation and accommodation, with play as assimilation-dominant and imitation as accommodation-dominant [2].)\n\nPause on how much philosophical work this pair is doing. Piaget was trying to thread between two positions he rejected. **Empiricism** says knowledge is the world impressing itself on a passive mind — pure accommodation, the mind as wax. **Nativism** (and a certain reading of Kant) says the structures are given in advance — pure assimilation, the world forced into innate molds. Piaget's *constructivism* says neither: knowledge is built by the *interaction*, and assimilation/accommodation is the name of that interaction. The functional invariants are, in effect, his answer to the oldest question in epistemology, ported into the nursery. (Document 03 develops the epistemology; document 05 develops the structuralism and the transformed-Kant relationship. Here we need only note that the constructs were never *merely* psychological — they were always pulling double duty as a theory of how knowledge as such grows.)\n\n---\n\n## II. The scheme: the unit of cognition\n\nIf assimilation and accommodation are the processes, the **scheme** (French *schème*; Piaget sometimes also used *schéma* for figurative images, and the distinction matters less in English than translators have made it) is the thing they act on. A scheme is a *structured pattern of action or thought that can be repeated and generalized* — the reusable template that lets a particular act recur across different occasions and different objects [1][4].\n\nThe earliest schemes are reflexes that the infant exercises and elaborates: the sucking scheme, the grasping scheme, the looking scheme. They are \"what is repeatable and generalizable in an action\" — not the single act of sucking *this* nipple, but the sucking-pattern that can be applied to nipples, fingers, blankets, and toys alike [1]. As development proceeds, schemes coordinate with one another (the looking-scheme and the grasping-scheme combine into looking-in-order-to-grasp), interiorize (the action becomes a mental act rather than a physical one), and eventually become **operations** — but they remain, throughout, the unit. To say a child \"has\" a concept, for Piaget, is to say the child has a scheme that assimilates the relevant instances.\n\nThe scheme is the hinge between the biology and the logic. It is biological in that it is, at root, a pattern of *action* — Piaget's deepest commitment is that knowledge originates in action, not in perception or language. (\"Knowing an object,\" he wrote, \"does not mean copying it — it means acting upon it\" — the operative verb is always *acting*.) And it is logical in that schemes coordinate into systems with formal properties — eventually into the groupings and groups that give middle childhood and adolescence their structure. Watch the unit transform across the stages and you have watched the theory.\n\n---\n\n## III. Equilibration and reflective abstraction: the motor\n\nA description of organization, adaptation, and schemes leaves one enormous question open: *what makes development happen?* Why does a child not simply assimilate the world forever in the same primitive schemes? Piaget's answer — and he regarded it as the heart of the theory, more fundamental than maturation, experience, or social transmission — is **equilibration** [5][6].\n\nThe intuition is this. Assimilation and accommodation are constantly falling out of balance. The child encounters something that her existing schemes cannot handle — a result she did not expect, a contradiction between two of her own beliefs, a question she cannot answer with the tools she has. This is *disequilibrium*: a perturbation, a cognitive conflict, a felt gap. The mind does not tolerate it. It pushes (this is the self-regulating part) to *compensate* — to adjust its structures until the perturbation resolves and a new, more stable equilibrium arrives. Crucially, the new equilibrium is not a return to the old one. It is a *higher* one — a structure that can handle what the old structure could not. Piaget's name for this upward-ratcheting version is **équilibration majorante** — \"majorizing\" or \"enhancing\" equilibration, equilibration that builds toward more powerful structures rather than merely restoring the prior balance [5][7]. Development is a staircase of equilibria, each crisis resolved at a level the previous level could not have reached.\n\nThis is genuinely a *self-regulating* model, and it is what separates Piaget from a simple maturational (\"it unfolds on a clock\") or a simple environmental (\"the world teaches it\") account. The motor is internal — the system's own intolerance of contradiction — but it runs on the friction of the system's encounter with a world it cannot fully assimilate. The Fondation Jean Piaget, drawing directly on Piaget's late synthesis *L'équilibration des structures cognitives* (1975; English *The Development of Thought*, 1977), describes *équilibration majorante* as the process by which \"increasingly powerful instruments — particularly structures and operational schemes — of assimilation, explanation, and transformation of reality are constructed by the subject\" [5][7].\n\n### Reflective abstraction\n\nThe mechanism that powers the upward ratchet is **reflective abstraction** (French *abstraction réfléchissante*), and the distinction Piaget draws here is one of his subtlest and most important [5][8]. He contrasts two kinds of abstraction.\n\n*Simple* (or *empirical*) abstraction draws information *from the objects themselves* — their color, weight, texture. You learn that this ball is red by looking at the ball. This is the kind of abstraction empiricism trades on, and Piaget thought it real but secondary.\n\n*Reflective* abstraction draws information not from the objects but *from the subject's own coordinated actions on the objects* — from the structure of what one does, not from what one does it to. The classic illustration is the child who lines up pebbles and counts them, gets the same total no matter which end she starts from, and abstracts from *that* — from a property of her own ordering-and-counting activity, not of the pebbles — the idea that number is independent of order. (Piaget liked to retell a mathematician's childhood memory of exactly this discovery.) Logico-mathematical knowledge, on this view, is built almost entirely by reflective abstraction: it is knowledge of the structure of one's own operations, \"reflected\" onto a higher plane and reorganized there. This is why Piaget could say that mathematics is not read off the world but *constructed* — and it is the precise point at which his psychology becomes a philosophy of mathematics (taken up in document 05). For the present chapter, the thing to hold is that equilibration is the *why* of development and reflective abstraction is the *how* — the specific operation by which a structure at one level is lifted, reorganized, and re-stabilized at the next.\n\n---\n\n## IV. Operations and structures: from action to the INRC group\n\nThe word **operation** is the most technical term in Piaget's vocabulary and the most precise. An operation is *an interiorized, reversible action that is coordinated with other operations into a structure* [4][9]. Three things are packed into that definition, and all three matter.\n\n*Interiorized*: the action has been internalized — it can be carried out in the head, as thought, without being physically performed. The child who can imagine pouring the water back has interiorized the pouring.\n\n*Reversible*: this is the crux. An operation can be mentally undone. For every operation there is an inverse that returns the system to its starting state. Reversibility is, for Piaget, the single most important property of mature thought and the one whose absence defines the preoperational child — who can follow the water *forward* into the tall glass but cannot run it *back*, and so is captured by the misleading appearance.\n\n*Coordinated into a structure*: an operation never stands alone. It belongs to a system of operations that hang together with the formal properties of a mathematical structure. The young child's thought is a loose collection of one-way mental adjustments; the older child's is a *system*, closed and reversible.\n\nPiaget characterized these systems with explicit logico-mathematical models, and he meant the models seriously — not as decoration but as the actual form of the thought.\n\n### Groupements (the concrete-operational structure)\n\nAt the concrete-operational level (roughly 7–11), Piaget held that operations are organized into what he called **groupements** — \"groupings,\" a structure he defined as a hybrid between the mathematician's *group* and *lattice*, with weaker closure properties than a full group [9][10]. A grouping has identity, composition, associativity, and — the headline property — *reversibility*, which comes in two forms. **Inversion** (*négation*): for the operation \"add 3\" the inverse is \"subtract 3,\" returning to the start by cancellation. **Reciprocity**: for a relation like \"A is longer than B\" the reciprocal is \"B is shorter than A,\" returning to equilibrium by a complementary transformation rather than a cancellation [10]. A French scholarly account of the genesis of logico-mathematical intelligence puts it exactly: in the grouping, \"the preservation of the transformation permits its annulment by the one that inverts it,\" and reversibility operates through both *inversion* (mentally returning to an initial state) and *reciprocity* (grasping a simultaneous complementary transformation, as when lengthening a row also increases the spacing between its items) [10]. The point of the formalism is that conservation, class-inclusion, seriation, and transitivity are not four separate tricks the child learns; they are, on Piaget's account, surface manifestations of *one underlying grouping structure*. (Whether that is true is precisely the *structures d'ensemble* question, and it is contested — flagged below and demolished in 06.)\n\n### The INRC group (the formal-operational structure)\n\nAt the formal level (roughly 11+), the two reversibilities that were *separate* in the grouping — inversion and reciprocity — become coordinated into a single, richer structure: the **INRC group**, a four-element mathematical group [10][11]. The letters name four transformations that operate on a proposition or operation: **I**, the *identity* (the direct operation itself); **N**, its *negation* or *inverse*; **R**, its *reciprocal*; and **C**, the *correlative* (the inverse of the reciprocal). The deep property — and the reason Piaget thought this structure marks the arrival of genuinely adult, scientific reasoning — is that within the INRC group \"one and the same operation is the inverse of one operation and the reciprocal of a third\" [10]. The adolescent who has it can hold both forms of reversibility in mind *at once* and coordinate them: she can think about negation and reciprocity as a system, which is exactly what is required to reason about, say, the balance of an equilibrium (where an increase on one side can be compensated either by a decrease on the same side or by an increase on the other). Inhelder and Piaget argued that this group, together with the combinatorial system (the ability to generate all possible combinations), is the formal structure underlying the adolescent's hypothetico-deductive reasoning [11][12].\n\nA word of honesty about the formalisms. Piaget's logical models have been among the most criticized parts of his work *even by sympathizers*, on three grounds: the algebra is sometimes idiosyncratic, the fit between the formal structures and the actual experimental data is loose, and the \"grouping\" is not a standard mathematical object. The case for taking them seriously is that they are the part of Piaget that most directly connects the psychology to the epistemology and the logic — the place where \"how children think\" becomes \"what the structure of knowledge is.\" The case for caution is that a model this powerful can always be made to fit, and fit is not confirmation. Document 05 takes up the structuralism and its critics directly.\n\n---\n\n## V. The four stages\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 430\" role=\"img\" aria-label=\"A four-step ascending staircase of the developmental stages, bottom to top. Each step shows the stage, its signature task, and its signature finding. Step one, sensori-motor (0 to 2): the hidden-object search; the A-not-B error, where the object is still bound to the infant's own action. Step two, pre-operational (2 to 7): the three-mountains task and the conservation pour; egocentrism and the failure of conservation. Step three, concrete operational (7 to 11): conservation, class-inclusion and seriation, now passed with justification but tied to concrete content. Step four, formal operational (11 plus): the pendulum control-of-variables task; hypothetico-deductive reasoning, which is not universal in adults. A side note states that the sequence is robust but the ages are soft, the synchrony is false, and formal operations are not universal.\">\n<text x=\"350\" y=\"30\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" letter-spacing=\"2\">THE FOUR STAGES<\/text>\n<text x=\"350\" y=\"48\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">the signature task &#8212; and the signature error &#8212; at each step<\/text>\n<rect x=\"40\" y=\"300\" width=\"470\" height=\"58\" rx=\"3\" class=\"f-panel\" stroke-width=\"1.2\" style=\"stroke:var(--border)\"/>\n<rect x=\"40\" y=\"300\" width=\"120\" height=\"58\" rx=\"3\" class=\"f-t2\"/>\n<text x=\"100\" y=\"324\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\" class=\"t-inv\">Sensori-motor<\/text>\n<text x=\"100\" y=\"342\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-inv\" opacity=\".85\">0&#8211;2<\/text>\n<text x=\"172\" y=\"322\" font-size=\"10.5\">task: search for a hidden object<\/text>\n<text x=\"172\" y=\"340\" font-size=\"10.5\" class=\"t-muted\">finding: the A-not-B error &#8212; object bound to one&#8217;s own action<\/text>\n<rect x=\"56\" y=\"232\" width=\"470\" height=\"58\" rx=\"3\" class=\"f-panel\" stroke-width=\"1.2\" style=\"stroke:var(--border)\"/>\n<rect x=\"56\" y=\"232\" width=\"120\" height=\"58\" rx=\"3\" class=\"f-t5\"/>\n<text x=\"116\" y=\"256\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\" class=\"t-inv\">Pre-operational<\/text>\n<text x=\"116\" y=\"274\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-inv\" opacity=\".85\">2&#8211;7<\/text>\n<text x=\"188\" y=\"254\" font-size=\"10.5\">task: three-mountains &#183; the conservation pour<\/text>\n<text x=\"188\" y=\"272\" font-size=\"10.5\" class=\"t-muted\">finding: egocentrism; conservation fails (no reversibility)<\/text>\n<rect x=\"72\" y=\"164\" width=\"470\" height=\"58\" rx=\"3\" class=\"f-panel\" stroke-width=\"1.2\" style=\"stroke:var(--border)\"/>\n<rect x=\"72\" y=\"164\" width=\"120\" height=\"58\" rx=\"3\" class=\"f-t3\"/>\n<text x=\"132\" y=\"188\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\" class=\"t-inv\">Concrete op.<\/text>\n<text x=\"132\" y=\"206\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-inv\" opacity=\".85\">7&#8211;11<\/text>\n<text x=\"204\" y=\"186\" font-size=\"10.5\">task: conservation &#183; class-inclusion &#183; seriation<\/text>\n<text x=\"204\" y=\"204\" font-size=\"10.5\" class=\"t-muted\">finding: passes, with justification &#8212; but tied to the concrete<\/text>\n<rect x=\"88\" y=\"96\" width=\"470\" height=\"58\" rx=\"3\" class=\"f-panel\" stroke-width=\"1.2\" style=\"stroke:var(--border)\"/>\n<rect x=\"88\" y=\"96\" width=\"120\" height=\"58\" rx=\"3\" class=\"f-t1\"/>\n<text x=\"148\" y=\"120\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\" class=\"t-inv\">Formal op.<\/text>\n<text x=\"148\" y=\"138\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-inv\" opacity=\".85\">11+<\/text>\n<text x=\"220\" y=\"118\" font-size=\"10.5\">task: the pendulum &#8212; control of variables<\/text>\n<text x=\"220\" y=\"136\" font-size=\"10.5\" class=\"t-muted\">finding: hypothetico-deductive &#8212; but <tspan class=\"t-acc\">not universal<\/tspan><\/text>\n<path d=\"M30,358 L30,108\" fill=\"none\" class=\"s-t1\" stroke-width=\"2\"/>\n<polygon points=\"24,118 30,102 36,118\" class=\"f-t1\"/>\n<text x=\"20\" y=\"240\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-acc\" font-weight=\"bold\" transform=\"rotate(-90 20 240)\">SEQUENCE &#8212; invariant order, robust<\/text>\n<line x1=\"40\" y1=\"384\" x2=\"660\" y2=\"384\" class=\"ln-soft\" stroke-width=\"1\"/>\n<text x=\"350\" y=\"406\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\" font-style=\"italic\">the order survives every test; the <tspan class=\"t-acc\">ages are soft<\/tspan>, the within-stage <tspan class=\"t-acc\">synchrony is false<\/tspan>, and the top step is reached by fewer than half of adults<\/text>\n<\/svg>\n<figcaption><strong>Fig. 2.<\/strong> What endured and what did not: the <em>order<\/em> of the four stages is the robust, cross-culturally durable core, but the ages are averages (not milestones), the abilities of a stage do <em>not<\/em> arrive together, and formal operations are reached &#8212; by Piaget&#8217;s own 1972 concession &#8212; only &#8220;under favorable circumstances,&#8221; by well under half of adults (Claims 4.3, 6.6).<\/figcaption>\n<\/figure>\n\n\nNow the famous part — and the part where the warnings matter most. Piaget held that the structures above are constructed in an *invariant sequence* of four broad stages (each with sub-stages), and he was explicit that two things are claimed and one is not. The *order* is claimed to be invariant and universal: no child reaches concrete operations before passing through the sensorimotor and preoperational periods, because each stage is built from the materials of the last. The *mechanism* is claimed to be the same throughout: equilibration. What is *not* claimed — though textbooks routinely impute it to him — is that the ages are fixed. Piaget repeatedly insisted the ages are averages that vary across children, tasks, and cultures; the *sequence* is the theory, the ages are bookkeeping [4][13]. Keep that distinction in hand, because almost every popular misrepresentation of Piaget consists in hardening the ages and forgetting the sequence.\n\n### Stage 1 — Sensorimotor (birth to ~2): intelligence before language\n\nThe sensorimotor period is Piaget's account of intelligence *before representation* — the infant knows the world by acting on it, through coordinated perception and movement, with no words and (at first) no mental images. It is documented almost entirely from the home observations Piaget and his wife Valentine Châtenay made of their own three children — **Jacqueline** (b. 1925), **Lucienne** (b. 1927), and **Laurent** (b. 1931) — recorded in extraordinary day-by-day detail in *The Origins of Intelligence in Children* (French 1936, English 1952) and *The Construction of Reality in the Child* (French 1937, English 1954) [13][14]. (Two of the three birth orders are sometimes reported differently in secondary sources; the Cambridge Companion gives Lucienne 1925, Jacqueline 1927, Laurent 1931 [13]. The Centre Jean Piaget records the same three children. The point that matters is that the entire infancy theory rests on an *n* of three, all the researcher's own — a methodological fact worth keeping in view, and one the infancy-competence critics in document 06 press hard.)\n\nPiaget divided the period into **six sub-stages**, organized around the elaboration of *circular reactions* — repeated action-patterns the infant stumbles on and then reproduces for the interest of the result [4][13][15]:\n\n- **Sub-stage 1 (0–1 month): reflexes.** The infant exercises and consolidates innate reflexes — sucking, grasping, looking — applying them more widely and efficiently.\n- **Sub-stage 2 (1–4 months): primary circular reactions.** Action-patterns *centered on the infant's own body* are repeated for their own sake — thumb-sucking discovered by accident and then sought out. \"Primary\" because the loop closes on the body.\n- **Sub-stage 3 (4–8 months): secondary circular reactions.** The loop now reaches *out to objects and events in the world* — the infant kicks and the mobile jiggles, and so kicks again to make it jiggle. Action becomes interested in its effects on things, not just on the self.\n- **Sub-stage 4 (8–12 months): coordination of secondary schemes, and the first true means–end intentional action.** The infant will now push aside a pillow (means) to reach a hidden toy (end) — two schemes coordinated in the service of a goal that precedes the act. This is, for Piaget, the birth of *intention*.\n- **Sub-stage 5 (12–18 months): tertiary circular reactions.** The infant now *experiments* — varies the action to see what varies in the result, dropping the spoon from different heights and watching, the \"little scientist\" deliberately seeking novelty rather than merely reproducing it.\n- **Sub-stage 6 (18–24 months): the beginnings of representation.** The infant can now hold an absent object or action in mind, solve a problem by *mental* combination rather than overt trial, imitate a model who has left the room (deferred imitation), and engage in the first symbolic play. Representation is born, and with it the door to the next stage.\n\nThe signature achievement of the period — the thing Piaget thought the infant *constructs* rather than is born knowing — is **object permanence**: the understanding that objects continue to exist when out of sight [14][15]. Piaget's claim, radical in its day and still partly contested, was that the newborn lives in a world \"without objects\" — a flux of pictures that cease to exist when they leave the perceptual field — and that the permanent object is an *achievement*, built across the six sub-stages. The young infant who is reaching for a toy will simply stop and lose interest the moment a cloth is dropped over it: out of sight, out of mind. Only around sub-stage 4 does the infant begin to search for a hidden object at all.\n\nAnd here Piaget found his most famous infant error — the **A-not-B error** (the \"stage IV error\") [13][14]. Hide a toy under cloth A; the sub-stage-4 infant (around 8–12 months) searches under A and finds it. Do it again. Now, *in full view of the infant*, hide the same toy under a different cloth, B. The infant — having just watched you — reaches back to **A**, the place the toy was *before*. The object's existence, for this infant, is still bound to the infant's own prior *action* of finding it, not to its independent location in space. The error vanishes a few months later, in sub-stage 5–6, as the object becomes fully detached from the action that found it. The A-not-B error is one of the most replicated findings in all of developmental psychology — and, tellingly, one whose *interpretation* is now heavily disputed (working-memory and inhibitory-control accounts compete with Piaget's representational one; see 06).\n\nA flag, planted here and harvested in 06: Piaget's \"the infant does not know the object exists\" is the strong claim, and it is the one infancy-competence researchers (Baillargeon, Spelke, and others) have spent forty years undermining with looking-time methods that suggest infants represent hidden objects *far* earlier than reaching tasks reveal. The Cambridge Companion's own infancy chapter notes that \"researchers like Baillargeon have challenged Piaget's conclusions regarding infant competence, suggesting infants demonstrate more sophisticated abilities than his framework acknowledged\" [13]. Whether the disagreement is about *competence* or about *what the looking-time measures mean* is itself one of the live debates of 06. For now: the sensorimotor sequence is robust; the claim that the object is *absent* from the infant's mind until it is reconstructed is the disputed part.\n\n### Stage 2 — Preoperational (~2–7): the symbol arrives, the logic does not\n\nWith representation born, the child enters the **preoperational** period — defined positively by a great acquisition and negatively by a great absence. The acquisition is the **semiotic** (or **symbolic**) **function**: the capacity to make one thing *stand for* another — to use signifiers (words, images, gestures, play-symbols) to represent absent signifieds [4][16]. Piaget and Inhelder, in *The Psychology of the Child* (French 1966, English 1969), itemize five expressions of the semiotic function as it comes online in this period: **deferred imitation**, **symbolic play** (the banana-telephone), **drawing**, **mental imagery**, and **language** [16]. This is an enormous cognitive leap — it is what makes a human child human — and Piaget is sometimes accused of under-praising it because the name of the stage (\"pre-operational\") defines it by what it lacks.\n\nWhat it lacks is **operations** — interiorized *reversible* actions. The preoperational child's thought is representational but not yet reversible, not yet organized into a system, and Piaget catalogued its limitations through a set of experiments that are among the most reproduced demonstrations in psychology.\n\n**Egocentrism and the three-mountains task.** Piaget's *egocentrism* is a technical term and is constantly misread as \"selfishness.\" It means the inability to distinguish one's own perspective from another's — the assumption that everyone sees, knows, and feels what I see, know, and feel. Piaget and Inhelder's **three-mountains task** (reported 1956) is the canonical test [17]. A child sits before a three-dimensional model of three mountains, each distinguished by a feature (snow, a cross, a house). A doll is placed at another side of the table. The child is shown photographs of the model from various angles and asked to choose the one that shows what *the doll* sees. The preoperational child reliably chooses the photo showing *her own* view — she cannot decenter from her position to compute the doll's. Decentering — coordinating multiple perspectives — is the concrete-operational achievement; its absence is egocentrism.\n\n*Flag.* The three-mountains finding does not survive task redesign. When Martin Hughes recast the same logical problem as a game a child cares about — hide a boy doll from two policeman dolls behind intersecting walls — children of 3½–4 chose the correct hiding spot around 90% of the time, far below the age Piaget's mountains implied [18]. Helene Borke (1975), simplifying the perspective task with familiar objects and a rotating turntable, found 3-year-olds correct ~42% and 4-year-olds ~67% of the time — again, perspective-taking arriving years before the three mountains suggested [18]. The cleanest reading is not that Piaget was simply *wrong* about egocentrism but that the three-mountains task *underestimated* the competence by burying it under demands (an unfamiliar spatial array, a strange instruction) that have nothing to do with perspective-taking itself. This is the task-demand critique, and it recurs for conservation. Document 06 maps it in full.\n\n**Centration, animism, and the failure of conservation.** Piaget attributed the preoperational child's errors to **centration** — the tendency to fix attention on a single salient dimension (the *height* of the water column) and ignore the others (the *width*), with no compensation between them. Combined with the absence of reversibility, centration produces the most famous failure in all of Piaget: the failure of **conservation** — the understanding that a quantity stays the same despite a change in its perceptual appearance, when nothing has been added or removed [4][16].\n\nThe **conservation-of-number** task comes straight from *The Child's Conception of Number* (French *La Genèse du nombre chez l'enfant*, 1941; English 1952) [19][20]. Two rows of counters are laid out in one-to-one correspondence; the child agrees they have the same number. Then one row is spread out so it is longer. Asked again, the preoperational child — typically 4–6 — says the longer row has *more*, captured by length, unable to reverse the spreading or to compensate \"longer but more spread out.\" Around 6–7 the child begins to answer correctly, and the fully concrete-operational child not only answers correctly but is *certain* and can *justify* it (\"you didn't add any,\" \"you could push them back,\" \"it's longer but there's bigger gaps\") [19][20]. The justification matters: for Piaget a right answer without the logical justification is not conservation. The water-pouring task at the head of this chapter is the **conservation-of-liquid** version; parallel tasks test conservation of mass (a ball of clay squashed into a sausage) and substance and, later, weight and volume.\n\n*Flag.* Conservation, too, is wording-sensitive. McGarrigle and Donaldson (1974) ran the conservation-of-number task in two conditions: the standard one, in which the experimenter deliberately spreads the row, and a \"naughty teddy\" condition, in which a mischievous teddy bear \"accidentally\" disarranges the counters. In the standard condition, only 16% of 4–6-year-olds conserved; in the accidental condition, 63% did [21]. The interpretation: when an adult deliberately and pointedly transforms the array and then *asks the same question twice*, children infer that the question must have a *new* answer — that something they are missing must have changed — and so report the perceptual difference. Remove the pragmatic cue (let a \"naughty\" teddy do it by accident) and far more children reveal the conservation knowledge the standard task masked [21]. Again: not that conservation is illusory, but that Piaget's task inflated the age of its appearance by loading it with conversational pragmatics. (Some replications of the naughty-teddy effect have been weaker or context-dependent — the effect is real but its size is debated — which is itself part of the 06 story.)\n\n**Animism, transductive reasoning, and the rest.** Piaget catalogued further features of preoperational thought: **animism** (attributing life and intention to inanimate things — the moon follows me, the broken cup is \"sad\"); **artificialism** (everything was made by someone for a purpose); and a pre-logical, **transductive** reasoning that moves from particular to particular rather than by induction or deduction. The SEP entry on childhood notes Piaget's four-stage account of how children come to restrict the concept of \"life,\" and also notes the philosophical critiques (Gareth Matthews) that the very notion of \"spontaneous movement\" Piaget relied on is conceptually murky [22]. The catalogue is rich; the unifying thread Piaget proposed is always the same — representation without reversible operations.\n\n### Stage 3 — Concrete operational (~7–11): reversible thought, tied to the concrete\n\nAround 7, by Piaget's reckoning, the child acquires **operations**: thought becomes reversible, decentered, and organized into the *groupings* described above. The conservation tasks are now passed, with justification. But there is a ceiling, and the stage's name marks it: the operations work on the **concrete** — on actual or readily imaginable objects and situations — not yet on pure verbal or hypothetical propositions. The concrete-operational child reasons powerfully about the world in front of her and stumbles when asked to reason about hypotheticals contrary to fact. The signature competences:\n\n- **Conservation** of number, then mass/substance, then weight, then volume — passed in that rough order across the stage (the order itself is a *décalage*, discussed below).\n- **Seriation**: arranging a set of sticks in order of length. The preoperational child arranges them haphazardly or in local pairs; the concrete-operational child builds a systematic ascending series, holding \"longer than the one before *and* shorter than the one after\" simultaneously — a coordination of the reciprocal relation [4][16].\n- **Transitivity**: inferring that if A > B and B > C then A > C, *without* directly comparing A and C. This is the logical core of seriation and a genuine operational inference.\n- **Class-inclusion**: the understanding that a subclass is necessarily smaller than the class that contains it. Piaget's task: show a child a bunch of, say, seven brown beads and three white beads, all wooden, and ask, \"Are there more brown beads or more wooden beads?\" The preoperational child says \"more brown\" — she cannot hold the whole class (\"wooden\") and its part (\"brown\") in mind at once, centering instead on the visible subclasses (brown vs. white). The concrete-operational child sees that \"wooden\" must include \"brown\" and so cannot be fewer [4][16]. Class-inclusion is, for Piaget, the operational mastery of the part–whole hierarchy and a direct expression of the additive grouping of classes.\n\nThe deep claim — and it is the load-bearing one — is that conservation, seriation, transitivity, and class-inclusion are *not* four independent acquisitions but four faces of *one* underlying structure, the grouping, which clicks into place as a *structure d'ensemble* (structured whole) around age 7. Flag planted; harvested at the end of this chapter and in 06.\n\n### Stage 4 — Formal operational (~11+): the logic of the possible\n\nThe final stage, beginning around 11–12 and (Piaget thought) consolidating through adolescence, is the one most fully Inhelder's: it is the subject of *The Growth of Logical Thinking from Childhood to Adolescence* (French 1955, English 1958), authored by **Bärbel Inhelder and Jean Piaget** in that order, with Inhelder the senior empirical hand [11][12]. The defining shift is a *reversal of the relation between the real and the possible*. The concrete-operational child reasons about what is; the formal-operational adolescent reasons about what *might be* — treating the actual situation as just one case among the *combinatorially generated set of possible* cases, and reasoning **hypothetico-deductively**: forming hypotheses, deducing their consequences, and testing them systematically.\n\nTwo interlocking capacities define the stage:\n\n**Combinatorial reasoning.** Given several factors, the formal thinker can systematically generate *all possible combinations* — the full set — rather than producing a haphazard few. Inhelder and Piaget's *colorless-liquids* task makes it vivid: a child is given several flasks of clear liquid and asked which combination produces a yellow color. The concrete-operational child tries combinations unsystematically and may stop at the first success; the formal-operational adolescent works through the combinations methodically, treating the problem as a closed combinatorial space [11][12].\n\n**Propositional, hypothetico-deductive reasoning, and the isolation of variables — the pendulum task.** The signature experiment is the **pendulum problem**, Chapter 4 of *The Growth of Logical Thinking* (\"The Oscillation of a Pendulum and the Operations of Exclusion\") [11][12][23]. The child is given a string that can be lengthened or shortened, weights that can be changed, and the ability to release the bob from different heights and with different pushes, and is asked to find out *what determines the frequency* of the swing. There are four candidate variables: **length of string, weight of the bob, amplitude (height) of release, and force of the push.** The right answer is that only *length* matters. The formal-operational solution requires the **control of variables** — varying one factor while holding all others constant — and the systematic *exclusion* of the irrelevant factors. The concrete-operational child changes several things at once (a long string with a heavy weight vs. a short string with a light one) and so cannot isolate the cause; the formal-operational adolescent holds weight, amplitude, and push constant while varying length alone, then does the same for each factor in turn, and concludes that length is the determinant and the rest are not [11][12][23]. This *isolation-and-control-of-variables* scheme is, in effect, the experimental method itself — which is exactly why Piaget thought the formal stage marks the arrival of *scientific* reasoning, and why he could draw the parallel between the child's cognitive development and the history of science (the through-line of document 03). The underlying structure, he and Inhelder argued, is the coordination of the INRC group with the combinatorial system [11].\n\n*Flag, and an important one.* The formal stage is the *least* universal of the four, and Piaget came to acknowledge it. Cross-cultural and adult studies repeatedly find that a substantial fraction of adolescents and even adults do *not* deploy formal operations across domains, or deploy them only in areas of expertise. By 1972 Piaget himself published a paper conceding that formal-operational thought may be reached in different domains at different times depending on aptitude and specialization, rather than as a uniform across-the-board structure — a significant softening of the *structures d'ensemble* claim at precisely the stage where it is hardest to defend. The \"11-and-up, everyone, in everything\" textbook line is the part of the four-stage story that has held up worst.\n\n---\n\n## VI. The clinical method (la méthode clinique)\n\nNone of these findings exist apart from the method that produced them, and the method is itself one of Piaget's signal contributions — and one of his signal vulnerabilities. The **méthode clinique** (Piaget later preferred **méthode clinique-critique**, the clinical-critical method) is a flexible, semi-structured interview in which the experimenter follows the child's reasoning wherever it goes, posing problems and then *probing the justifications* — asking \"why?\", offering counter-suggestions, presenting countercases — rather than scoring fixed right/wrong responses on a standardized test [24][25].\n\nIts origin is precise and tells you what it was reacting against. Between 1919 and 1921 Piaget worked in Paris in the laboratory of Alfred Binet (then run by Théodore Simon), tasked with standardizing Cyril Burt's reasoning tests on Parisian schoolchildren — calibrating, in effect, an IQ instrument [24]. He found the *errors* far more interesting than the scores. A standardized test records *whether* a child gets the right answer; it throws away *why* the child got the wrong one — and the systematic wrong answers, Piaget saw, were windows into the structure of the child's thought. So he turned the diagnostic clinical interview of psychiatry (where the clinician follows the patient's discourse) toward the *normal* child's reasoning, and combined fixed tasks (the conservation array, the mountains, the pendulum) with open-ended, responsive questioning [24][25]. A Karger review of the method's origins puts it squarely: Piaget \"was soon very critical\" of Binet's approach \"because the child's reasoning could not be assessed just by taking note of the child's answers to preset questions,\" and so developed an interview that \"required them to give arguments to back up their answers\" — a *critical* method that \"focuses on the nature of the respondent's belief: how the response is justified in terms of the evidence and possible competing explanations\" [24]. The counter-suggestion is essential: Piaget would tell a child who had just conserved, \"but my friend says there's more now — is he right?\", and a *genuine* operational understanding resists the suggestion while a fragile one collapses. The justification, and its robustness against challenge, is the datum.\n\nThe diagnostic power is real. The clinical method surfaces the *reasoning* behind a response — exactly the thing standardized testing discards — and it is what let Piaget discover the systematic, stage-linked, beautifully patterned *errors* (the spread row that has \"more,\" the doll that sees what I see, the A under the cloth) that are the empirical heart of the theory. No standardized instrument would have found them. They live in the *why*.\n\nThe vulnerability is equally real, and Piaget's critics have pressed it hard. Because the interviewer improvises — different children get different follow-up questions, different counter-suggestions, different phrasings — the method is **hard to standardize, hard to replicate exactly, and open to experimenter influence and subjective scoring** [24][25]. A skilled but believing interviewer can, without intending to, lead a child toward the expected answer or read more structure into a transcript than is there. The method \"does not lend itself to statistical treatment\" in its classic form, and the reliability and inter-rater objectivity of the original Genevan studies are genuinely uncertain [24]. (Later workers — Bond and Bunting among them — have shown the clinical method *can* be operationalized to yield quantifiable, analyzable data, which is a partial rehabilitation rather than a vindication of the original practice [24].) The honest summary: the clinical method is a superb instrument of *discovery* — it found the phenomena — and a weak instrument of *proof*. Much of the post-Piagetian critique in document 06 consists precisely of taking Piaget's phenomena and re-testing them with controlled, standardized, statistically tractable methods — and finding the ages too high and the structures too tidy.\n\n---\n\n## VII. Décalage: the theory's own escape hatch — and its tell\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 312\" role=\"img\" aria-label=\"A horizontal age axis from 5 to 13 years. Four lollipop markers show the typical ages at which the four conservations are acquired: number at about 6.5, mass and substance at about 7.5, weight at about 9.5, and volume at about 11.5. A dashed vertical line at age 6.5 marks where a single underlying structure would predict all four to appear together. A brace spans from 6.5 to 11.5 years, labelled roughly five years of horizontal décalage. The spread shows that conservations Piaget treated as one operation are in fact acquired years apart.\">\n<text x=\"350\" y=\"30\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" letter-spacing=\"2\">THE STRUCTURE THAT LEAKS<\/text>\n<text x=\"350\" y=\"48\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">if a stage were one structure, its conservations would arrive together &#8212; they don&#8217;t<\/text>\n<line x1=\"70\" y1=\"252\" x2=\"650\" y2=\"252\" class=\"ln\" stroke-width=\"1.4\"/>\n<line x1=\"70\" y1=\"248\" x2=\"70\" y2=\"256\" class=\"ln\" stroke-width=\"1.2\"/>\n<text x=\"70\" y=\"272\" text-anchor=\"middle\" font-size=\"9\" class=\"t-muted\">5<\/text>\n<line x1=\"215\" y1=\"248\" x2=\"215\" y2=\"256\" class=\"ln\" stroke-width=\"1.2\"/>\n<text x=\"215\" y=\"272\" text-anchor=\"middle\" font-size=\"9\" class=\"t-muted\">7<\/text>\n<line x1=\"360\" y1=\"248\" x2=\"360\" y2=\"256\" class=\"ln\" stroke-width=\"1.2\"/>\n<text x=\"360\" y=\"272\" text-anchor=\"middle\" font-size=\"9\" class=\"t-muted\">9<\/text>\n<line x1=\"505\" y1=\"248\" x2=\"505\" y2=\"256\" class=\"ln\" stroke-width=\"1.2\"/>\n<text x=\"505\" y=\"272\" text-anchor=\"middle\" font-size=\"9\" class=\"t-muted\">11<\/text>\n<line x1=\"650\" y1=\"248\" x2=\"650\" y2=\"256\" class=\"ln\" stroke-width=\"1.2\"/>\n<text x=\"650\" y=\"272\" text-anchor=\"middle\" font-size=\"9\" class=\"t-muted\">13<\/text>\n<text x=\"360\" y=\"290\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-muted\" font-style=\"italic\">age of acquisition (years)<\/text>\n<line x1=\"179\" y1=\"80\" x2=\"179\" y2=\"252\" class=\"s-t5\" stroke-width=\"1.5\" stroke-dasharray=\"5 4\"/>\n<text x=\"183\" y=\"86\" font-size=\"9\" class=\"t-acc\" font-weight=\"bold\">synchrony would predict: all here<\/text>\n<line x1=\"70\" y1=\"104\" x2=\"179\" y2=\"104\" class=\"s-t3\" stroke-width=\"2\"/>\n<circle cx=\"179\" cy=\"104\" r=\"7\" class=\"f-t3\"/>\n<text x=\"193\" y=\"108\" font-size=\"10.5\" font-weight=\"bold\">Number <tspan class=\"t-muted\" font-weight=\"normal\">~6.5<\/tspan><\/text>\n<line x1=\"70\" y1=\"138\" x2=\"251\" y2=\"138\" class=\"s-t3\" stroke-width=\"2\"/>\n<circle cx=\"251\" cy=\"138\" r=\"7\" class=\"f-t3\"/>\n<text x=\"265\" y=\"142\" font-size=\"10.5\" font-weight=\"bold\">Mass / substance <tspan class=\"t-muted\" font-weight=\"normal\">~7.5<\/tspan><\/text>\n<line x1=\"70\" y1=\"172\" x2=\"396\" y2=\"172\" class=\"s-t3\" stroke-width=\"2\"/>\n<circle cx=\"396\" cy=\"172\" r=\"7\" class=\"f-t3\"/>\n<text x=\"410\" y=\"176\" font-size=\"10.5\" font-weight=\"bold\">Weight <tspan class=\"t-muted\" font-weight=\"normal\">~9.5<\/tspan><\/text>\n<line x1=\"70\" y1=\"206\" x2=\"541\" y2=\"206\" class=\"s-t3\" stroke-width=\"2\"/>\n<circle cx=\"541\" cy=\"206\" r=\"7\" class=\"f-t3\"/>\n<text x=\"555\" y=\"210\" font-size=\"10.5\" font-weight=\"bold\">Volume <tspan class=\"t-muted\" font-weight=\"normal\">~11.5<\/tspan><\/text>\n<path d=\"M179,228 L179,234 L541,234 L541,228\" fill=\"none\" class=\"s-t1\" stroke-width=\"1.6\"/>\n<text x=\"360\" y=\"248\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-acc\" font-weight=\"bold\">~5 years apart &#8212; &#8220;horizontal d&#233;calage&#8221;<\/text>\n<\/svg>\n<figcaption><strong>Fig. 3.<\/strong> The single most direct evidence against the <em>structures d&#8217;ensemble<\/em> claim: the four conservations Piaget analysed as <em>one<\/em> reversible operation are acquired across a five-year span. He named the anomaly &#8220;horizontal d&#233;calage&#8221; and folded it into the theory &#8212; which critics call an unfalsifiable patch on the synchrony assumption (Claim 4.4).<\/figcaption>\n<\/figure>\n\n\nThe four-stage model makes a strong prediction: within a stage, the competences that share an underlying structure should appear *together*. Conservation of number, mass, weight, and volume are all, on Piaget's analysis, applications of the same concrete-operational grouping; they should therefore be acquired at the same time. They are not. Children typically conserve *number* around 6–7, *mass and substance* around 7–8, *weight* around 9–10, and *volume* not until 11–12 [4][26]. The same uneven, staggered acquisition shows up across the supposedly unified competences of each stage.\n\nPiaget's name for this is **décalage** (French for \"gap,\" \"shift,\" \"displacement\"), and he distinguished two kinds [26]:\n\n- **Horizontal décalage**: a *time gap between structurally similar tasks within the same stage* — the systematic lag by which conservation of volume trails conservation of number by years even though both are (supposedly) the same operation applied to different content. The factor that has not yet been mastered is *resistance offered by the content* — volume is perceptually and conceptually \"harder\" than number — so the same structure is applied to easier content first.\n- **Vertical décalage**: a *re-solution of the same problem at a higher level* — the way a child first masters a content sensorimotor-ly (navigating physical space as an infant) and then has to *reconstruct* the same achievement years later on the representational plane (reasoning about space as a concrete operation). The same problem is solved twice, at two levels, with a lag between.\n\nNow the honest part — and it is the most important paragraph in this chapter. *Décalage is both a real phenomenon and a theoretical embarrassment, and the two cannot be fully separated.* Horizontal décalage is, as a peer-reviewed account puts it bluntly, something that \"was initially an empirical anomaly before becoming an integral part of the theory\" [26]. That is to say: the staggered acquisition of conservation is exactly the kind of evidence that *threatens* the **structures d'ensemble** assumption — the claim that a stage's operations form a single, simultaneously-emerging structured whole. If the operations really were one structure, they should arrive together; they don't; so Piaget introduced \"horizontal décalage\" to name the discrepancy and *fold it into the theory* as the expected effect of content-resistance. Critics — and even sympathetic structuralists — have noted that this risks circularity: synchrony is predicted; asynchrony is observed; the asynchrony is relabelled \"décalage\" and counted as confirmation rather than disconfirmation. The construct does real descriptive work, but as a *defense* of the synchrony assumption it is dangerously close to unfalsifiable.\n\nThis is why the *structures d'ensemble* claim is fairly called the **load-bearing and most-attacked** piece of the entire edifice. Everything distinctive about Piaget's stage theory — its claim to describe *structures* rather than merely catalogue *skills*, its kinship with mathematical structuralism, its parallel to the history of science — depends on the operations of a stage forming a genuine unified whole. A French scholarly synthesis states the test precisely: the unidimensional structural model \"can be regarded as verified only if the construction of notions acquired during development both is synchronous at each step and follows the same invariant order between the steps\" [26]. The *order* (sequence) holds up reasonably well; the *synchrony* does not. As one review notes, there has been \"no empirical verification of significant links\" between the levels at which an individual develops, say, logico-mathematical versus spatio-temporal operations — the two systems Piaget held to develop \"in parallel and synchrony\" [26]. Empirically, the structured whole leaks. Décalage is the patch over the leak; document 06 argues that the leak is large enough to sink the strong version of the claim and that the surviving Piaget is the one who described *sequences* and *mechanisms*, not the one who described stage-synchronous structures.\n\n---\n\n## VIII. What the machine is, assembled\n\nStand back and the apparatus is a single connected mechanism, and its parts now have their places. At the base, two **functional invariants** — organization and adaptation — that never change. Adaptation runs as the balance of **assimilation** (world into mind) and **accommodation** (mind to world), acting on the **scheme**, the repeatable unit of action and thought. When the balance breaks, **equilibration** — in its upward form, *équilibration majorante* — drives the system to a higher, more powerful equilibrium, with **reflective abstraction** as the specific lever that lifts a structure from one level to the next. The schemes interiorize and become **operations** — reversible mental actions — which lock into **structures**: the *groupements* of concrete operations and the *INRC group* of formal operations. Those structures take four successive **stages** — sensorimotor, preoperational, concrete operational, formal operational — each diagnosed by experiments (object permanence and A-not-B; the three mountains and conservation; seriation, transitivity, and class-inclusion; the pendulum and the combinatorial system) that the **clinical method** was built to elicit. And **décalage** is the device that absorbs the fact that the stages, in practice, are ragged.\n\nThe theory has lasted, even where it has been falsified in detail, because it is a theory of *mechanism*. It does not merely report that seven-year-olds conserve and four-year-olds don't; it offers an account of *why* and *how* the change happens — the reversible operation, the equilibration that builds it, the structure it joins. That is a higher and rarer ambition than a developmental norms table, and it is why Piaget remains the figure every developmental psychologist still argues *with* rather than around. The reasons it has *not* survived intact are the three flags this chapter has planted and document 06 will detonate: the ages are softer than the theory's reputation; the *structures d'ensemble* synchrony assumption is the load-bearing claim and the empirically weakest; and the conservation and egocentrism findings are artifacts, in part, of tasks that asked children to do more than the construct required, so that the genuine competences appear years earlier than Piaget said. The machine is real and ingenious. Several of its gauges were misread. Sorting the real readings from the misreadings is the work of the next document.\n\n---\n\n## Open Questions\n\n1. **How much of the strong stage theory survives once synchrony fails?** If the operations of a stage do not emerge as a unified *structure d'ensemble*, is what remains still a *stage* theory in any robust sense, or only a description of an invariant *sequence* of competences with a shared mechanism? Piaget's defenders and the neo-Piagetians answer differently; the question is taken up in 06 but not settled there.\n\n2. **What does the A-not-B error actually measure?** Piaget read it as a deficit in the *representation* of the permanent object. Working-memory and inhibitory-control accounts (and the dynamic-systems re-analysis) read it as a performance limitation on an infant who *does* represent the object. The two readings have very different implications for the whole \"the infant constructs the object\" thesis. (06.)\n\n3. **Is reflective abstraction a real, identifiable cognitive process or a redescription?** Piaget made it the engine of logico-mathematical development, but its mechanism is specified more by example than by model. Whether it names something a cognitive scientist could operationalize, or whether it is a placeholder for \"the part we can't yet explain,\" remains genuinely open.\n\n4. **Can the clinical method be reconciled with replicable, quantitative science?** Bond and others have shown it can be operationalized; but the original Genevan corpus was not, and the degree to which Piaget's specific age estimates are artifacts of unstandardized, possibly leading interviewing is hard to settle retrospectively.\n\n5. **How seriously should the logico-mathematical formalisms (the grouping, the INRC group) be taken?** Are they the literal structure of thought, a useful idealized model, or an over-powered formalism that can fit any data? This bears directly on the structuralism of document 05.\n\n6. **Why does formal-operational reasoning fail to generalize?** If the formal stage is so domain- and culture-variable that Piaget himself softened the claim in 1972, is \"formal operations\" a developmental stage at all, or an *achievement* (like literacy) that depends on schooling and specialization? (06.)\n\n---\n\n## Sources\n\n1. Piaget, J., *The Origins of Intelligence in Children* (French *La Naissance de l'intelligence chez l'enfant*, 1936; English trans. Margaret Cook, International Universities Press, 1952). **Tier 1** (primary text). The foundational statement of organization/adaptation, assimilation/accommodation, the scheme, and the six sensorimotor sub-stages, grounded in observations of Piaget's three children. Construct definitions cross-checked against secondary scholarly summaries below; the primary text was referenced for content, read in the original only in part. Accessed via scholarly summaries and a digitized excerpt at https://sites.pitt.edu/~strauss/origins_r.pdf, 2026-06-13.\n\n2. Piaget, J., *Play, Dreams and Imitation in Childhood* (French 1945; English 1962); and *Biology and Knowledge* (1967/1971). **Tier 1** (primary texts). The biological foundation of the functional invariants and th
