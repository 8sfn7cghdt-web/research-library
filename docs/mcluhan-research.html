d 2026-06-13. Contribution: McLuhan's pessimism (\"did not want to live in the global village,\" \"all-at-onceness,\" \"mass terror and sudden panic\"); slogans \"snappy but never understood\"; \"I have no theories whatever.\"\n13. Applications of \"the medium is the message\" to algorithmic/short-form feeds — e.g., commentary collected via search incl. the Wikipedia entry's sourced definition of the slogan (\"change of scale or pace or pattern\"), https://en.wikipedia.org/wiki/The_medium_is_the_message (used only to point to the primary *Understanding Media* phrasing — the substantive claim rests on the primary text), plus Tier 5–6 analytical pieces on TikTok's For-You-Page form-over-content. Accessed 2026-06-13. Contribution: the algorithmic-feed mechanism (D5). Tier note: feed-design facts are well attested; cognitive-effect claims are analytical/contested.\n14. Marshall McLuhan, *Understanding Media* (1964), ch. 4 \"The Gadget Lover: Narcissus as Narcosis\" — discussed via McLuhan Galaxy, \"Narcissus Narcosis & Autoamputation,\" https://mcluhangalaxy.wordpress.com/2019/06/13/narcissus-narcosis-autoamputation/ and \"Extension, amputation, alienation & Narcissus Narcosis,\" https://mcluhangalaxy.wordpress.com/2014/09/20/ . Tier 1 (primary text) via Tier 5 commentary. Accessed 2026-06-13. Contribution: extensions = amputation + numbing; the Narcissus reread; smartphone-as-extension application.\n15. Emmanuel Johnson, \"Extension and Amputation: The Internet, Social Media and Digital Media,\" https://johnsonee.com/2014/12/18/extension-and-amputation-the-internet-social-media-and-digital-media/ . Tier 6 (analytical blog). Accessed 2026-06-13. Contribution: the extension/amputation frame applied to internet/social media (D6) — used as evidence of the frame's application, not as empirical proof of atrophy.\n16. Sarah Krichel (quoting Jaqueline McLeod Rogers, U. of Winnipeg) / *The Tyee* — \"Reacting to AI: What Would Marshall McLuhan Say?\", 14 August 2024, https://www.thetyee.ca/Culture/2024/08/14/Reacting-AI-What-Would-Marshall-McLuhan-Say/ . Tier 4–5 (Canadian analytical outlet, expert-sourced). Accessed 2026-06-13. Contribution: the tetrad applied to generative AI (enhance speed; obsolesce voice; retrieve standardized orality/groupthink; reverse into analogue revival); medium-not-content emphasis; the \"loss of language\" warning paraphrase.\n17. \"The Medium Is the Mind: Applying McLuhan's Tetrad to LLMs,\" neofeudalreview Substack (pseud. \"Hermes of the Threshold\"), 28 November 2025, https://neofeudalreview.substack.com/p/the-medium-is-the-mind-applying-mcluhans . Tier 6 (named-pseudonym analytical Substack). Accessed 2026-06-13. Contribution: a fuller LLM tetrad (enhance linguistic productivity/externalize mind; obsolesce memorization/search/gatekeeping/silence; retrieve the oracle/sage/Socratic dialogue/scribe; reverse into epistemic confusion/dependency/semantic collapse). Used as evidence of how the frame is applied, not as fact.\n18. \"Artificial Intelligence Through McLuhan's Tetrad of Media Effects: Libraries Maintaining the Human in the AI Regime,\" *Theological Librarianship* (2024), https://serials.atla.com/theolib/article/view/3501/4762 . Tier 2 (peer-reviewed library-science journal). Accessed 2026-06-13 (via search abstract). Contribution: a peer-reviewed application of the tetrad to AI — evidence that the AI re-reading has reached scholarly venues, strengthening D7.\n19. Raymond Williams's determinism critique and the soft-determinism rebuttal, via \"Marshall McLuhan & Technological Determinism: A Reappraisal,\" McLuhan Galaxy, https://mcluhangalaxy.wordpress.com/2011/10/03/marshall-mcluhan-technological-determinism-a-reappraisal/ , and Heather Matley, \"The Strengths and Limitations of McLuhan's Technological Determinism,\" https://heathermatley.medium.com/ . Tier 5–6. Accessed 2026-06-13. Contribution: Williams's charge (medium-effect-regardless-of-control negates power critique; \"technological determinist\"); the soft-determinist defense; \"we shape our tools and thereafter our tools shape us.\"\n20. Robert K. Logan, \"McLuhan Misunderstood: Setting the Record Straight,\" OCAD University Open Research Repository, 2011, https://openresearch.ocadu.ca/id/eprint/870/1/Logan_McLuhanMisunderstood_2011.pdf . Tier 2 (media-ecology scholarship). Accessed 2026-06-13 — PDF could not be machine-read for this document; cited for the soft-determinism / interactive-media defense, corroborated via [19]. NOTE: flagged for direct reading in gap-fill.\n21. Andrew McLuhan (Marshall's grandson) — \"Marshall McLuhan Predicted the Internet in 1962. [Actually, no, he didn't],\" Medium, https://medium.com/@andrewmcluhan/marshall-mcluhan-predicted-the-internet-in-1962-actually-no-he-didnt-9c1f9c936fc5 . Tier 5–6 (named expert, family steward of the legacy). Accessed 2026-06-13. Contribution: the debunking of the spliced \"internet prediction\" (first half = 1967 *Perspecta* article; second half = 1989 *The Global Village* dialogue with Bruce Powers); the hindsight/misquotation cautionary tale (C3)."}, {"order": 9, "file": "Future_Trajectory.md", "title": "Future Trajectory: McLuhan's Reputation Through ~2040", "summary": "", "body": "# Future Trajectory: McLuhan's Reputation Through ~2040\n\n> **Bottom line.** McLuhan's standing has never drifted; it swings on a clock set by the arrival of new media, and a new medium has just arrived. The single most likely future (≈40–50%) is a **bifurcated consolidation**: the generative-AI moment hardens his revival into durable canon in the humanities, media-ecology, design, and tech-culture lineages — where \"media as environment,\" the extensions-and-amputation logic, the abrasive global village, and the tetrad become standard interpretive furniture — while he remains near-absent from empirical communication science, which still has no procedural use for an aphorist. A weaker but real scenario (≈20–30%) is that the AI moment **passes like the TV moment did**: as AI becomes ordinary, the McLuhan-on-AI essays thin out, and he settles back toward being a quotable historical figure rather than a live theorist. The least likely consequential outcome (≈10–18%) is a genuine **methodological rehabilitation**, in which attention research or a disciplined reconstruction of the tetrad earns him a foothold in the empirical mainstream he was exiled from. A live wildcard runs underneath all three: *which* McLuhan inherits the canon — the secular Wired \"patron saint,\" the rigorous-tetrad \"new science\" McLuhan, or the newly surfacing **Catholic-metaphysical** McLuhan (a real 2025 publishing signal). The dominant upward driver is the AI re-reading; the dominant ceiling is the unbridgeable gap to falsifiable social science and the legitimate hindsight-discount on his \"prophecy.\" This is a medium-confidence forecast: the *direction* (continued, even rising, relevance) is well supported; the *magnitude and which-McLuhan* questions carry wide ranges.\n\n---\n\n## Method\n\nThis forecast is the future pillar of an eight-document corpus and lifts its driver stack directly from `08_Drivers_And_Forces.md`, which catalogued seven upward drivers (D1–D7) and three persistent counter-forces (C1–C3). It is anchored on a base rate the corpus itself establishes and which is unusually clean for a reputational forecast: **McLuhan's own boom-bust-revival cycle**, traced across the TV moment (boom, 1964–68), the print-decline/professionalization crash (1970s–80s), the internet revival (1990s–2000s), and now the AI moment. That cycle is the floor under everything below. A secondary base rate comes from the reputational half-lives of comparable mid-century theorists (Innis, Ong, Postman, Baudrillard, Kittler), drawn from `07_Adjacent_And_Comparative.md`.\n\nThe horizon is fixed at **~2040 — roughly one academic generation**, long enough for the AI moment to either ordinary-ize (the D1→D2 pattern) or harden into canon, and for the cohort now in graduate school to become the cohort setting syllabi. At this horizon, structural drivers (which medium dominates, generational turnover in the academy, the institutional thinness the corpus documents) dominate over specific events. Probabilities are expressed as ranges, not points; the scenarios are mutually exclusive on their *distinguishing* feature (consolidate / fade / rehabilitate / fragment-by-which-McLuhan) and roughly collectively exhaustive, with a residual tail named explicitly.\n\nA note on what kind of forecast this is. This is **not a market**. There are no liquid prediction markets on a dead theorist's reputation, and — per the prediction discipline — I will not fabricate one (see the Prediction Market Snapshot below, which says so plainly). The honest analogues are citation trends, syllabus presence, the density and venue-tier of new applications, and publishing signals. I consulted recent (2024–2026) evidence of his AI-era uptake to calibrate the upside, and the corpus's own reception scholarship to calibrate the ceiling. As a single forecaster, I have red-teamed the modal scenario from the contrarian angle (the revival is hindsight pattern-matching that AI will expose, not vindicate) and the discontinuity angle (an AI winter, or a measurement breakthrough, that breaks the trend) before finalizing the weights.\n\n---\n\n## Scenarios\n\n### Scenario A: Bifurcated Consolidation — the AI moment cements him, but only on one side of the campus\n\n**Probability:** 40–50%\n\n**Description.** This is the modal future and the continuation of the pattern the corpus documents. Generative AI plays the role television played in 1964 and the internet played in 1993: a new medium generates fresh demand for a theorist of new media, and McLuhan is the default candidate. By 2040 \"the medium is the message,\" the extensions/amputation logic, the abrasive (not utopian) global village, and the tetrad are standard interpretive furniture across the humanities, media ecology, design and architecture schools, science-and-technology studies, and the technology commentariat. The orality/literacy thesis — already the most durable strand, kept alive in the academy through Walter Ong's checkable reconstruction — anchors the respectable end. But the bifurcation the corpus identifies as structurally permanent holds: empirical communication science, built on the Lazarsfeld–Katz \"media effects\" tradition, still finds no procedural slot for an unmeasured aphorist, and McLuhan stays largely absent from its journals, methods courses, and textbooks. His standing is durable and even rising — but split, exactly as it has been since the 1990s.\n\n**Drivers (from doc 08).**\n- **D7 — Generative AI as a medium whose form is the message; the tetrad grid (dominant leading driver).** The density and venue-tier of AI-era applications keep climbing — from *The Tyee* and Substack essays to peer-reviewed venues — reactivating the frame.\n- **D1 — New-medium-creates-demand-for-its-theorist (the engine, now firing a third time).** The pattern that built the TV and internet revivals is the same one building the AI one.\n- **D4 — Social media as abrasive retribalization** and **D5 — algorithmic feeds as medium-over-content**, which remain live and uncomfortable-fit (their pessimism strengthens the mapping against the hindsight charge).\n- **D6 — Smartphone as extension/amputation/narcosis**, now so culturally absorbed it reinforces rather than newly drives.\n- **D3 — the Wired/Silicon-Valley patronage**, lagging but still the connective tissue between McLuhan and tech culture.\n\n**Conditions.**\n- AI remains a culturally central, environment-reshaping technology through the 2030s (no deep, durable \"AI winter\").\n- The media-ecology institutional core (the Media Ecology Association, *Explorations in Media Ecology*, Fordham, the revived Toronto Coach House) survives generational turnover and keeps teaching him as a founding ancestor.\n- The humanities/empirical-science methodological divide persists — the most reliable condition, since it has held for sixty years.\n\n**Signals to watch.**\n- Continued growth in peer-reviewed (not just Substack/blog) applications of the tetrad and \"medium is the message\" to AI, across more than one discipline.\n- McLuhan reappearing as required reading in new AI-and-society / AI-ethics syllabi and trade books.\n- A sustained uptick in citations to *Understanding Media* and *Laws of Media* in the AI-adjacent literature (Web of Science / Scholar), distinguishable from baseline.\n- The estate (Andrew McLuhan, the McLuhan Institute) and Toronto Centre actively framing him as the AI-era theorist.\n\n**Time horizon.** Distinguishing features visible by ~2030 (whether the AI-era applications reach durable scholarly venues and syllabi), consolidated by ~2035–2040.\n\n---\n\n### Scenario B: A Third Fading Moment — AI ordinary-izes and takes a thinned McLuhan down with it\n\n**Probability:** 20–30%\n\n**Description.** The D1/D2 pattern is a warning, not only a promise: revivals tied to a medium's *novelty* recede when the medium becomes ordinary furniture. In this future the wave of \"What would McLuhan say about AI?\" essays crests around the late 2020s and then thins, as AI stops being new and becomes plumbing — the way television did by the mid-1970s. The counter-forces do the work: the empirical-science indifference (C1) caps the revival's reach, and the hindsight-pattern-matching charge (C3) — with its documented exhibit, the spliced \"McLuhan predicted the internet in 1962\" quote debunked by his own grandson — corrodes the \"he saw it coming\" story that the revival is built on. Critically, the most sophisticated new objection is *specific to AI*: that an autonomous, agentic medium which \"joins our thinking rather than shaping it from the outside\" simply breaks the classic extension-of-man frame, so AI ends up being the moment that *exposes* McLuhan's limits rather than vindicating him. By 2040 he is not forgotten — he is a permanently quotable historical figure, taught as a 1960s phenomenon and a cautionary tale about prophecy, the way he was in roughly 1985, before the internet rescued him.\n\n**Drivers.**\n- **C3 — hindsight pattern-matching** becomes the leading read: each new \"prediction\" is shown to be retro-fit, and honest advocates concede it.\n- **C1 — empirical communication science** continues to offer no foothold, so the revival has nowhere to harden.\n- **D2-pattern (the crash mechanism) recurs:** the fading of a medium's novelty, here AI's, removes the ground against which the McLuhan figure was legible — and the new agentic-AI critique supplies a genuinely novel objection, not just a recycled one.\n\n**Conditions.**\n- AI's cultural novelty fades meaningfully by the early-to-mid 2030s without a successor medium to which McLuhan maps as cleanly.\n- The agentic/active-medium critique gains traction faster than McLuhanites can absorb it into the tetrad.\n- No methodological bridge (Scenario D) materializes to give the revival academic ballast.\n\n**Signals to watch.**\n- AI-McLuhan applications peaking and then declining in frequency and venue-tier after the late 2020s.\n- The \"active medium / AI breaks the extension frame\" critique becoming the standard scholarly response rather than a niche one.\n- New high-profile debunkings of \"McLuhan predicted X\" claims gaining the traction the grandson's debunking did.\n- Media-ecology institutions (MEA, Toronto Centre) contracting or failing to renew across generational turnover.\n\n**Time horizon.** The crest-and-decline becomes legible ~2029–2033; the settled \"historical figure\" status by ~2038–2040.\n\n---\n\n### Scenario C: Methodological Rehabilitation — empirical science finally re-absorbs \"the medium matters\"\n\n**Probability:** 10–18%\n\n**Description.** The deepest constraint on McLuhan, per the corpus, is that the empirical mainstream has no use for him. This scenario is the one in which that constraint partially lifts. Attention research, cognitive science, and the measurable study of platform-form effects supply the empirics McLuhan never offered — operationalizing, in testable form, a version of \"the form of the medium reshapes cognition independent of content.\" Elihu Katz long ago gestured at recovering a measurable \"medium matters\" insight; here that recovery actually happens, and a disciplined reconstruction of the tetrad (or of hot/cool, given a real operational measure of \"definition\" and \"participation\") earns McLuhan a citation foothold in venues that had exiled him. The crucial ambiguity — flagged in the corpus's open questions — is whether this *vindicates* McLuhan or *replaces* him: empirical work may credit the insight while treating McLuhan himself as a pre-scientific gesturer toward it, the way psychology credits William James. Either way, his standing rises in the one place a humanities-only revival cannot reach, and the bifurcation of Scenario A narrows.\n\n**Drivers.**\n- **C1 inverted** — the empirical tradition, instead of capping the revival, supplies the missing empirics and re-admits a measurable form of the thesis.\n- **D5 — algorithmic feeds as medium-over-content** becomes the bridge: feed-form effects are exactly the kind of thing attention research can measure, turning a McLuhanian claim into a testable one.\n- **D7** in its more rigorous register — the tetrad applied to AI in peer-reviewed venues nudges toward operationalization rather than interpretive grids alone.\n\n**Conditions.**\n- A research program (likely in attention/cognition or computational social science) successfully operationalizes a \"medium-form-shapes-cognition\" claim and explicitly traces it to McLuhan rather than bypassing him.\n- That program reaches high-tier empirical journals, not just humanities venues.\n- McLuhanites accept the operationalization rather than resisting it as a betrayal of the \"probe.\"\n\n**Signals to watch.**\n- Empirical attention/cognition papers citing McLuhan substantively (not decoratively) and proposing testable medium-effect measures.\n- A serious, published attempt to make the tetrad or hot/cool falsifiable that survives peer review and gets applied.\n- Communication-studies textbooks moving McLuhan from \"historical/critiqued\" to \"foundational-and-operationalized.\"\n\n**Time horizon.** Earliest credible signals ~2028–2032; a settled rehabilitation, if it comes, by ~2040 — this is the slowest of the scenarios because disciplines re-admit exiles slowly.\n\n---\n\n### Scenario D: Which-McLuhan Realignment — the Catholic-metaphysical (or hard-tetrad) McLuhan displaces the Wired saint\n\n**Probability:** 12–20%\n\n**Description.** This scenario cuts *across* A and is partly compatible with it; it is broken out because the corpus identifies the \"which McLuhan wins\" question as a genuine live fork, and because there is a concrete 2025 publishing signal that the long-suppressed reading is surfacing. For thirty years the dominant public McLuhan has been the secular Wired \"patron saint\" — the sunny prophet of connectivity with the Catholic moral pessimism and the explicit warnings filtered out. In this future the *interpretive center of gravity shifts*. The newly surfacing **Catholic-metaphysical McLuhan** — the Thomist convert who privately feared electric media as a possible \"Anti-Christ,\" a counterfeit Mystical Body, a Pentecost in reverse — becomes a serious and growing reading, carried by religious-intellectual and humanities venues and by the estate's own framing, and amplified by AI-era anxiety that wants a theologically serious diagnostician rather than a cheerleader. A parallel, partly-overlapping realignment elevates the **rigorous-tetrad \"new science\" McLuhan** as the AI applications push toward system. In either case the Wired saint recedes as the *defining* image even as McLuhan's overall salience holds or rises. This is a forecast about *interpretive direction*, not raw quantity.\n\n**Drivers.**\n- **D7** pulling toward the tetrad-as-system reading (the AI applications are tetrad-shaped).\n- A **counter-Wired correction** already underway in the reception scholarship (the \"patron saint\" portrait is documented as doctored), now reinforced by religious-press and university-press work on the Catholic McLuhan.\n- AI-era cultural mood favoring a *dread-and-discernment* theorist over a *connectivity-utopia* one — McLuhan's own pessimism (D4's abrasive village) fits the mood better than the Wired gloss.\n\n**Conditions.**\n- The Catholic-McLuhan and/or hard-tetrad readings keep reaching beyond niche venues (religious-intellectual presses, specialist journals) into general humanities and tech-culture discourse.\n- The estate and Toronto continue to foreground the fuller, less-secularized McLuhan.\n- No event re-canonizes the sunny Wired reading (e.g., a new techno-optimist platform-era organ adopting him afresh).\n\n**Signals to watch.**\n- University-press and serious trade books on McLuhan's Catholicism and metaphysics multiplying (a 2025 Cornell UP title, *Swimming in the Waters of AI*, by Grant Havers, is an early marker).\n- AI-era essays explicitly invoking the *dark*/theological McLuhan rather than the connectivity slogan.\n- Tetrad-as-method (not metaphor) treatments gaining ground in AI analysis.\n- Declining frequency of the unqualified \"global village = harmonious connection\" reading.\n\n**Time horizon.** Already incipient (2025 signals); a recognizable realignment by ~2033–2040.\n\n---\n\n### Residual tail (~3–6%)\n\nA transformative shift not captured above: a deep, durable AI collapse that drags down *all* new-media theory together; a scholarly scandal or fabrication exposé that discredits the McLuhan-revival apparatus wholesale (the spliced-quote episode shows the surface exists for this); a wholesale paradigm in media study that renders the entire medium-theory tradition obsolete; or, conversely, a singular AI-era event that elevates McLuhan to genuinely canonical \"founder\" status across *both* sides of the campus at once. Acknowledged, not modeled.\n\n```viz\n{\n  \"type\": \"range\",\n  \"title\": \"McLuhan reputation scenarios through ~2040\",\n  \"caption\": \"Scenario probability ranges. A is modal; D cuts across A and is partly compatible with it, so the bars are not strictly additive.\",\n  \"credit\": \"This corpus, Future_Trajectory.md (driver stack from 08_Drivers_And_Forces.md), 2026-06-13\",\n  \"items\": [\n    {\"label\": \"A — Bifurcated Consolidation\", \"low\": 0.40, \"high\": 0.50},\n    {\"label\": \"B — Third Fading Moment\", \"low\": 0.20, \"high\": 0.30},\n    {\"label\": \"D — Which-McLuhan Realignment\", \"low\": 0.12, \"high\": 0.20},\n    {\"label\": \"C — Methodological Rehabilitation\", \"low\": 0.10, \"high\": 0.18},\n    {\"label\": \"Residual tail\", \"low\": 0.03, \"high\": 0.06}\n  ]\n}\n```\n\n> **A note on the arithmetic.** Scenarios A, B, and C are mutually exclusive on their defining feature (consolidate / fade / cross into empirical science) and sum to roughly 70–98% with the tail. Scenario D is deliberately *non-exclusive* — a realignment of which-McLuhan-wins can happen inside a consolidation (A) or even alongside a partial fade (B). It is weighted as the probability that the *interpretive center of gravity shifts away from the secular Wired saint* over the horizon, regardless of which quantity scenario obtains. Read the four as: \"how big does the revival get?\" (A vs. B vs. C) and, orthogonally, \"which McLuhan is it?\" (D).\n\n---\n\n## Base Rates\n\n**The key base rate is his own cycle.** McLuhan is the rare reputation with a *repeating measured pattern*, which makes the base rate unusually informative. The corpus traces four phases. The **TV boom (1964–68)** was a manufactured-celebrity ascension on the back of a new medium and a publicity apparatus — fast up. The **crash (1970s–80s)** was over-determined: professionalization of communication studies around empirical method, the \"unscholarly/charlatan\" verdict, the *fading of the TV moment's novelty*, and his 1980 death plus the winding-down of his Centre — fast down, with most of his books out of print and his name gone from media textbooks. The **internet revival (1990s–2000s)** was driven by the network making \"global village\" and \"medium is the message\" *look* prophetic, and consolidated by *Wired*'s extra-academic canonization — up again, but only outside the empirical mainstream. The **AI moment (2020s–)** is the fourth turn of the same wheel.\n\nWhat the base rate teaches, precisely: (1) the *direction* of each turn is set by whether a new environment-reshaping medium is arriving (it is — favoring A/C/D over B), but (2) each up-phase has *receded once its medium became ordinary* (the central warning behind B), and (3) every revival so far has been **ceiling-limited to the humanities/tech-culture side** — none has breached the empirical core (the structural reason C is the hardest scenario). The cycle's amplitude is large and its turns are fast; this is not a slowly-revised reputation but a swinging one. That argues against very high confidence in any single scenario.\n\n**The comparative base rate: mid-century media theorists' reputational half-lives.** The neighbors in `07_Adjacent_And_Comparative.md` calibrate what \"durable\" looks like. **Harold Innis** and **Walter Ong** show the half-life of the *checkable* version: Ong's orality/literacy thesis survived McLuhan's own collapse precisely because it was footnoted and testable — the part of McLuhan the academy kept came back *through* Ong. That is the template for Scenario C and a caution that McLuhan-the-aphorist may persist only where someone has done the Ong-style rebuilding. **Neil Postman** shows the moralist half-life: *Amusing Ourselves to Death* stays in print and on syllabi forty years on because it renders a clear, value-laden verdict — a durability mechanism McLuhan deliberately forewent. **Baudrillard, Kittler, Virilio** show the European pattern: high theory durable inside its own (continental, critical, anti-humanist) circuit but largely walled off from Anglophone empirical study. Across this reference class, the theorists who stayed *live* (not merely cited) either became checkable (Ong), rendered a verdict (Postman), or anchored a self-reproducing theoretical school (the Europeans). McLuhan, the corpus stresses, **founded no self-reproducing school** — his institutional base is thin (a society, a family, a revived heritage Coach House). That thinness is a structural drag that the AI driver must overcome, and is part of why B retains real weight.\n\n**One quantitative anchor.** A Web of Science study found ~6,591 documents citing McLuhan with ~8,989 citations across 1957–2017, concentrated on *Understanding Media* — evidence of a substantial, durable (if humanities-skewed) citation base that a fading-to-zero scenario would have to reverse. This supports treating total erasure as a tail outcome, not a scenario.\n\n---\n\n## Prediction Market Snapshot\n\n**There are no liquid prediction markets on this question, and none is fabricated here.** A dead theorist's reputation, interpretive direction, and scholarly uptake over a fifteen-year horizon is not the kind of question Polymarket, Kalshi, Manifold, or Metaculus carries — there is no settlement event, no resolution date, and no trading interest. I checked the question's shape against the standard venues' coverage (US political, macro, tech-milestone, and long-horizon community questions); McLuhan's posthumous standing falls outside all of them. Per the prediction discipline, where no relevant market exists, the honest move is to say so explicitly rather than extrapolate a price from an unrelated question.\n\nThe nearest *real* aggregate signals are not markets but observable proxies, and they are folded into the Signals-to-watch above: citation-trend data (Web of Science / Google Scholar), syllabus presence, the frequency and *venue tier* of new tetrad/medium-is-the-message applications to AI, and publishing signals (e.g., the 2025 Cornell University Press title on McLuhan and AI). These are the closest thing to a \"market\" on this question, and unlike a fabricated price they are auditable. A reader who wants to track this forecast should watch those proxies, not look for a market that does not exist.\n\n---\n\n## What Would Change My Forecast\n\nConcrete, near-term (next ~5 years) triggers that would meaningfully shift the weights:\n\n1. **AI-era McLuhan applications cross — or fail to cross — into high-tier scholarly venues.** If, by ~2029, peer-reviewed applications of the tetrad/medium-is-the-message to AI multiply across multiple disciplines (beyond the current 2024–2025 cluster of one library-science journal, a preprint, and trade/Substack essays), shift weight toward A and away from B. If the applications *stay* in blogs, Substacks, and the trade press and do not reach durable venues, shift toward B.\n\n2. **The \"agentic / active medium breaks the extension frame\" critique becomes standard — or is absorbed.** The strongest *new* objection, surfacing in 2025–2026, is that an AI that \"joins our thinking rather than shaping it from the outside\" is not a McLuhanian extension at all. If this becomes the default scholarly response, shift toward B. If McLuhanites successfully fold agentic AI into the tetrad (e.g., as a reversal/retrieval reading), shift toward A.\n\n3. **An operationalization of a McLuhanian claim survives peer review.** A published, falsifiable measure of \"medium-form shapes cognition independent of content\" (most likely from attention research or feed-effect studies) that *cites McLuhan substantively* would be the single strongest signal for Scenario C — the only path into the empirical core. Its absence by ~2031 makes C a tail.\n\n4. **The which-McLuhan signal strengthens or reverses.** More university-press / serious-trade work on the Catholic-metaphysical McLuhan (the 2025 Cornell title is the marker to watch) and AI-era essays invoking the *dark/theological* McLuhan push toward D. Conversely, a new techno-optimist organ re-canonizing the sunny \"global village\" saint would push against D.\n\n5. **The institutional core consolidates or contracts.** The Media Ecology Association, *Explorations in Media Ecology*, the revived Toronto Coach House, and the McLuhan Institute surviving generational turnover (and the estate actively framing him as the AI-era theorist) supports A; their contraction or failure to renew supports B. Watch whether the next decade's media-ecology cohort takes over leadership or the field thins.\n\n6. **A deep AI winter, or a McLuhan-revival fabrication exposé.** A durable collapse in AI's cultural centrality removes the leading driver and pushes hard toward B (or the tail). A high-profile exposé of fabricated/retro-fit \"McLuhan predicted X\" claims (the spliced-quote episode shows the surface exists) would accelerate the C3 discount and also push toward B.\n\n---\n\n## Open Questions\n\n1. **Does the AI revival have staying power, or is it a second TV-moment?** The whole A-vs-B fork turns on whether McLuhan's AI relevance outlasts AI's novelty. Resolved over time by the venue-tier and frequency trend in triggers (1) and (2).\n\n2. **Can the tetrad ever be made genuinely falsifiable?** Its applicability to *any* artifact is both its appeal and the heart of the unfalsifiability critique. A testable reconstruction would open Scenario C; its continued absence keeps C a tail. (Inherited from doc 08.)\n\n3. **Will empirical communication science re-absorb a measurable \"medium matters,\" and would that vindicate or replace him?** The corpus flags this as undecided. The vindicate/replace ambiguity is the difference between C as a *McLuhan* revival and C as a polite historical footnote.\n\n4. **Which McLuhan does the AI generation actually claim — secular, Catholic, or hard-tetrad?** The perceptual-vs-political and Catholic-vs-secular splits documented in doc 07 appear to be reopening around AI. Tracking which reading the AI discourse adopts is the live test of Scenario D.\n\n5. **Can a thin institutional base carry a revival?** McLuhan founded no self-reproducing school; the revival rests on a society, a family, and a heritage site. Whether that is enough to convert an AI-era boom into durable canon (A) rather than another fade (B) is genuinely uncertain.\n\n6. **Does generative AI's agency genuinely break the \"extensions of man\" frame?** If AI is the first medium that is a co-creator and autonomous participant rather than a prosthesis, the most humanist phrase in McLuhan's vocabulary may be the one AI retires — which would make AI the moment that *limits* rather than crowns him. (This is also Kittler's old rebuke, returning at the frontier.)\n\n---\n\n## Sources\n\nThe forecast rests primarily on the corpus's own Round-1 documents and the driver stack in `08_Drivers_And_Forces.md`; the citations there (notably the abrasive-global-village quotations, the Wired/Levinson revival record, the Williams determinism critique, the Katz empirical-tradition verdict, and the grandson's debunking of the spliced \"internet prediction\") are not duplicated in full here. The sources below are those consulted specifically to calibrate the AI-era (2024–2026) signals and the reputational base rates for this forecast.\n\n1. Sarah Krichel (quoting Jaqueline McLeod Rogers, University of Winnipeg), \"Reacting to AI: What Would Marshall McLuhan Say?\", *The Tyee*, 14 August 2024. https://www.thetyee.ca/Culture/2024/08/14/Reacting-AI-What-Would-Marshall-McLuhan-Say/ . Accessed 2026-06-13. **Tier 4–5** (Canadian analytical outlet, expert-sourced). The tetrad applied to generative AI; a marker of the AI re-reading reaching general-readership venues. (Carried over from doc 08.)\n\n2. \"Artificial Intelligence Through McLuhan's Tetrad of Media Effects: Libraries Maintaining the Human in the AI Regime,\" *Theological Librarianship* (2024). https://serials.atla.com/theolib/article/view/3501/4762 . Accessed 2026-06-13. **Tier 2** (peer-reviewed library-science journal). Evidence that the AI tetrad re-reading has reached a scholarly, peer-reviewed venue — the existence-proof behind Scenario A's \"crosses into durable venues\" condition. (Carried over from doc 08.)\n\n3. \"McLuhan Today: AI as Medium, Shaping the Global Village and Extending Human Intellect,\" preprint (Preprints.org, 2025), indexed via Sciety Labs. https://labs.sciety.org/articles/by?article_doi=10.20944/preprints202509.0543.v1 . Accessed 2026-06-13. **Tier 2 (preprint — not yet peer-reviewed; flagged).** A 2025 scholarly assessment applying medium-is-the-message, extensions-of-man, and global-village to AI-mediated communication; used as a recency signal of continued AI-era uptake.\n\n4. \"When the Medium Starts Thinking Back,\" *Psychology Today* (blog, \"The Digital Self\"), December 2025. https://www.psychologytoday.com/us/blog/the-digital-self/202512/when-the-medium-starts-thinking-back . Accessed 2026-06-13. **Tier 5–6** (named-author popular-psychology blog). Source of the \"AI is the first medium that joins our thinking rather than shaping it from the outside\" critique — used as evidence of the *agentic-medium-breaks-the-extension-frame* objection central to Scenario B and trigger (2). Used as evidence of an argument in circulation, not as established fact.\n\n5. Grant Havers, *Swimming in the Waters of AI: McLuhan's Warning for the Digital Age* (Cornell University Press, announced 27 August 2025). https://www.cornellpress.cornell.edu/swimming-in-the-waters-of-ai-grant-havers-08-27-2025/ . Accessed 2026-06-13. **Tier 2** (university-press monograph). The concrete 2025 publishing signal behind Scenario D (the surfacing of the warning/Catholic-inflected McLuhan rather than the sunny Wired saint); Havers is also the author of the peer-reviewed \"right-wing postmodernism\" thesis cited in doc 06.\n\n6. \"If the medium is the message, what is the message of AI?\", *Untangled* (Substack, named author), 2024–2025. https://untangled.substack.com/p/if-the-medium-is-the-message-what . Accessed 2026-06-13. **Tier 6** (analytical Substack). Used only as evidence of the *form* the AI-era McLuhan discourse is taking in the commentariat (the \"message of AI is personalization\" reading), not as a factual claim — a data point on uptake breadth and venue tier.\n\n7. Sebastián Valenzuela et al. / Caro & Travieso, \"Diffusion and impact of Marshall McLuhan's published work in the Web of Science,\" via ResearchGate (study of McLuhan citations 1957–2017). https://www.researchgate.net/publication/340610016_Diffusion_and_impact_of_Marshall_McLuhan's_published_work_in_the_Web_of_Science . Accessed 2026-06-13. **Tier 2** (bibliometric scholarship). Source of the ~6,591 documents / ~8,989 citations figure concentrated on *Understanding Media* — the quantitative base-rate anchor showing a substantial, durable (humanities-skewed) citation base, which makes total erasure a tail outcome.\n\n8. Corpus internal: `08_Drivers_And_Forces.md` (the driver stack D1–D7, C1–C3, and its sources), `02_Modern_Arc.md` (the boom-bust cycle and the institutional-thinness base rate), `06_The_Field_Today_And_Live_Debates.md` (the bifurcation, the determinism and prophet-vs-charlatan debates, the estate and media-ecology institutions), `07_Adjacent_And_Comparative.md` (the comparative reputational half-lives of Innis, Ong, Postman, and the Europeans; the Catholic-vs-secular and perceptual-vs-political splits), and `03_Core_Concepts.md` (the tetrad's falsifiability problem, the abrasive global village). **Tier 1–2 (this corpus's own verified Round-1 documents).** These are the primary evidentiary base for the forecast; their underlying citations are not re-listed here."}]}</script>

<script>
const corpus = JSON.parse(document.getElementById('corpus-data').textContent);
const docs = corpus.documents;
const toc = document.getElementById('toc');
const content = document.getElementById('content');
const searchBox = document.getElementById('search');
const results = document.getElementById('search-results');
const key = 'corpus:' + corpus.slug;
let current = 0;

// theme
const themePref = localStorage.getItem('corpus-theme');
if (themePref) document.documentElement.dataset.theme = themePref;
else if (matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.dataset.theme = 'dark';
document.getElementById('theme-btn').onclick = () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('corpus-theme', next);
};

// table of contents
docs.forEach((d, i) => {
  const a = document.createElement('a');
  a.href = '#ch-' + i;
  a.innerHTML = '<span class="num">' + String(i).padStart(2, '0') + '</span>' + d.title;
  a.title = d.summary || '';
  a.onclick = (e) => { e.preventDefault(); show(i); closeMenu(); };
  toc.appendChild(a);
});

let firstShow = true;
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
function show(i, anchorText) {
  if (listening && !autoNext) stopListen();  // manual nav stops narration; auto-advance keeps it
  const apply = () => {
  current = Math.max(0, Math.min(docs.length - 1, i));
  content.innerHTML = marked.parse(docs[current].body);
  // rewrite chapter-to-chapter .md links into in-app navigation
  content.querySelectorAll('a[href$=".md"]').forEach(a => {
    const target = docs.findIndex(d => a.getAttribute('href').endsWith(d.file));
    if (target >= 0) { a.href = '#ch-' + target; a.onclick = (e) => { e.preventDefault(); show(target); }; }
  });
  content.querySelectorAll('a[href^="http"]').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });
  toc.querySelectorAll('a').forEach((a, j) => a.classList.toggle('active', j === current));
  document.getElementById('prev').disabled = current === 0;
  document.getElementById('next').disabled = current === docs.length - 1;
  document.getElementById('pager-label').textContent = (current + 1) + ' / ' + docs.length + ' · ' + docs[current].title
    + ' · ' + Math.max(1, Math.round(docs[current].body.split(/\s+/).length / 220)) + ' min';
  history.replaceState(null, '', '#ch-' + current);
  localStorage.setItem(key, current);
  // feed the cross-page library shell: per-corpus read set + global recents
  try {
    const rk = 'read:' + corpus.slug;
    const readArr = JSON.parse(localStorage.getItem(rk) || '[]');
    if (readArr.indexOf(current) < 0) { readArr.push(current); localStorage.setItem(rk, JSON.stringify(readArr)); }
    const rec = (JSON.parse(localStorage.getItem('library-recents') || '[]') || []).filter(r => r.slug !== corpus.slug);
    rec.unshift({ slug: corpus.slug, title: corpus.title, ch: current, chTitle: docs[current].title, ts: Date.now() });
    localStorage.setItem('library-recents', JSON.stringify(rec.slice(0, 20)));

    const today = new Date().toISOString().slice(0, 10);

    if (st.last !== today) {
      const yest = new Date(Date.now() - 864e5).toISOString().slice(0, 10);
      st.count = (st.last === yest ? (st.count || 0) : 0) + 1;
      st.last = today;

  } catch (e) {}
  if (anchorText) {
    const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT);
    let node; while ((node = walker.nextNode())) {
      const idx = node.textContent.toLowerCase().indexOf(anchorText.toLowerCase());
      if (idx >= 0) {
        const host = node.parentElement;
        host.scrollIntoView({ block: 'center' });
        if (!reduceMotion) { host.classList.add('passage-flash'); setTimeout(() => host.classList.remove('passage-flash'), 2200); }
        return;

  };
  // cross-fade chapter swaps where supported (skips first paint + reduced motion)
  if (document.startViewTransition && !reduceMotion && !firstShow) document.startViewTransition(apply);
  else apply();
  firstShow = false;
}

document.getElementById('prev').onclick = () => show(current - 1);
document.getElementById('next').onclick = () => show(current + 1);

let chordKey = null, chordTimer;
document.addEventListener('keydown', (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const back = document.getElementById('cmdk-back');
  if (back && back.classList.contains('open')) return;  // palette owns the keys when open
  const help = document.getElementById('kbd-help');
  if (help && help.classList.contains('open')) { if (e.key === 'Escape' || e.key === '?') toggleHelp(); return; }
  if (chordKey === 'g') { clearTimeout(chordTimer); chordKey = null;
    if (e.key === 'g') { show(0); return; }
    if (e.key === 'e') { show(docs.length - 1); return; } }
  if (e.key === 'g') { chordKey = 'g'; chordTimer = setTimeout(() => { chordKey = null; }, 700); return; }
  if (e.key === 'ArrowLeft' || e.key === 'k') show(current - 1);
  else if (e.key === 'ArrowRight' || e.key === 'j') show(current + 1);
  else if (e.key === 'z' || e.key === 'Z') toggleFocus();
  else if (e.key === '?') toggleHelp();
});

function toggleFocus() {
  const on = document.body.classList.toggle('focus-mode');
  localStorage.setItem('reader-focus', on ? '1' : '0');
}

// search
let timer;
searchBox.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(runSearch, 150);
});
function runSearch() {
  const q = searchBox.value.trim().toLowerCase();
  results.innerHTML = '';
  toc.style.display = q ? 'none' : '';
  if (!q || q.length < 3) { toc.style.display = ''; return; }
  let hits = 0;
  docs.forEach((d, i) => {
    const text = d.body.toLowerCase();
    let pos = text.indexOf(q), shown = 0;
    while (pos >= 0 && shown < 3 && hits < 40) {
      const start = Math.max(0, pos - 60), end = Math.min(d.body.length, pos + q.length + 90);
      const raw = d.body.slice(start, end).replace(/[#*_>\[\]]/g, '');
      const safe = raw.replace(/&/g, '&amp;').replace(/</g, '&lt;');
      const snippet = safe.replace(new RegExp(q.replace(/[.*+?^${}()|\\]/g, '\\$&'), 'ig'), m => '<mark>' + m + '</mark>');
      const div = document.createElement('div');
      div.className = 'hit';
      div.innerHTML = '<b>' + d.title + '</b>…' + snippet + '…';
      const exact = d.body.slice(pos, pos + q.length);
      div.onclick = () => { show(i, exact); searchBox.value = ''; runSearch(); closeMenu(); };
      results.appendChild(div);
      hits++; shown++;
      pos = text.indexOf(q, pos + q.length);
    }
  });
  if (!hits) results.innerHTML = '<div class="none">No matches.</div>';
}

// mobile menu
const menuBtn = document.getElementById('menu-btn');
menuBtn.onclick = () => document.body.classList.toggle('menu-open');
function closeMenu() { document.body.classList.remove('menu-open'); }

// ---- Listen mode (browser Web Speech API) + share-this-chapter ----
const synth = window.speechSynthesis;
let listening = false, paused = false, autoNext = false, listenIdx = 0, listenRate = 1,
    listenAuto = true, sleepMode = 'none', sleepTimer = null, lchunks = [], lidx = 0, lbar = null;
function chapterText(i) {
  let t = docs[i] ? docs[i].body : '';
  return t.replace(/```[\s\S]*?```/g, ' ').replace(/<[^>]+>/g, ' ')
          .replace(/!\[[^\]]*\]\([^)]*\)/g, ' ').replace(/\[([^\]]+)\]\([^)]*\)/g, '$1')
          .replace(/[#>*_`~|]/g, ' ').replace(/\s+/g, ' ').trim();
}
function chunkText(t) {
  const raw = t.match(/[^.!?]+[.!?]+["')\]”’]*|\S[^.!?]*$/g) || [t];
  const out = []; let buf = '';
  raw.forEach(s => { s = s.trim(); if (!s) return;
    if ((buf + ' ' + s).length > 240 && buf) { out.push(buf); buf = s; } else buf = buf ? buf + ' ' + s : s; });
  if (buf) out.push(buf);
  return out;
}
function pickVoice() { const vs = synth.getVoices();
  return vs.find(v => /^en/i.test(v.lang) && v.localService) || vs.find(v => /^en/i.test(v.lang)) || vs[0]; }
function speakChunk() {
  if (!listening) return;
  if (lidx >= lchunks.length) {
    if (sleepMode === 'chapter') { stopListen(); return; }
    if (listenAuto && listenIdx < docs.length - 1) {
      listenIdx++; autoNext = true; show(listenIdx); autoNext = false;
      lchunks = chunkText(chapterText(listenIdx)); lidx = 0; updateBar(); speakChunk();
    } else stopListen();
    return;
  }
  const u = new SpeechSynthesisUtterance(lchunks[lidx]);
  u.rate = listenRate; const vo = pickVoice(); if (vo) u.voice = vo;
  u.onend = () => { if (listening && !paused) { lidx++; speakChunk(); } };
  u.onerror = () => { if (listening && !paused) { lidx++; speakChunk(); } };
  synth.speak(u);
}
function startListen() {
  if (!synth) return;
  synth.cancel(); listening = true; paused = false; listenIdx = current;
  lchunks = chunkText(chapterText(listenIdx)); lidx = 0; buildBar(); lbar.classList.add('show'); updateBar();
  const lb = document.getElementById('listen-btn'); if (lb) lb.classList.add('on');
  speakChunk();
}
function stopListen() {
  listening = false; paused = false; if (synth) synth.cancel();
  if (sleepTimer) { clearTimeout(sleepTimer); sleepTimer = null; }
  if (lbar) lbar.classList.remove('show');
  const lb = document.getElementById('listen-btn'); if (lb) lb.classList.remove('on');
}
function togglePause() { if (!listening) return;
  if (paused) { synth.resume(); paused = false; } else { synth.pause(); paused = true; } updateBar(); }
function setSleep(sec) {
  if (sleepTimer) { clearTimeout(sleepTimer); sleepTimer = null; }
  sleepMode = sec === 1 ? 'chapter' : 'none';
  if (sec > 1) sleepTimer = setTimeout(stopListen, sec * 1000);
}
function buildBar() {
  if (lbar) return;
  lbar = document.createElement('div'); lbar.id = 'listen-bar';
  lbar.innerHTML = '<button id="lb-toggle" title="Pause">⏸</button><button id="lb-stop" title="Stop">⏹</button>'
    + '<span id="lb-title"></span>'
    + '<label class="lb-ctl">Speed <select id="lb-rate"><option value="0.8">0.8×</option><option value="1" selected>1×</option><option value="1.2">1.2×</option><option value="1.5">1.5×</option></select></label>'
    + '<label class="lb-ctl">Sleep <select id="lb-sleep"><option value="0" selected>Off</option><option value="1">End of chapter</option><option value="900">15 min</option><option value="1800">30 min</option></select></label>';
  document.body.appendChild(lbar);
  lbar.querySelector('#lb-toggle').onclick = togglePause;
  lbar.querySelector('#lb-stop').onclick = stopListen;
  lbar.querySelector('#lb-rate').onchange = function () { listenRate = +this.value; };
  lbar.querySelector('#lb-sleep').onchange = function () { setSleep(+this.value); };
}
function updateBar() {
  if (!lbar) return;
  const t = lbar.querySelector('#lb-title'); if (t) t.textContent = docs[listenIdx] ? docs[listenIdx].title : '';
  const tg = lbar.querySelector('#lb-toggle'); if (tg) tg.textContent = paused ? '▶' : '⏸';
}
const listenBtn = document.getElementById('listen-btn');
if (listenBtn) {
  if (!synth) listenBtn.style.display = 'none';
  else listenBtn.onclick = () => { listening ? stopListen() : startListen(); };
}
const shareBtn = document.getElementById('share-btn');
if (shareBtn) shareBtn.onclick = () => {
  if (!window.CorpusShare) return;
  window.CorpusShare.open({ kicker: corpus.title, title: docs[current].title,
    source: corpus.subtitle || corpus.title,
    url: location.origin + location.pathname + '#ch-' + current, filename: 'chapter' });
};
window.addEventListener('pagehide', () => { if (synth) synth.cancel(); });

// initial chapter: hash > saved progress > 0; ?q= deep-links to a passage (Today's Passage, share cards)
const hash = location.hash.match(/^#ch-(\d+)$/);
const anchorQ = new URLSearchParams(location.search).get('q');
show(hash ? +hash[1] : +(localStorage.getItem(key) || 0), anchorQ || undefined);

// respond to in-page hash changes: browser back/forward, and cross-page command
// palette jumps that land on a chapter of the corpus already open (no reload).
window.addEventListener('hashchange', () => {
  const h = location.hash.match(/^#ch-(\d+)$/);
  if (h && +h[1] !== current) show(+h[1]);
});

// Related reading at the foot of the column — corpus-level, from the inlined
// library manifest's precomputed similarity graph (no fetch). Deferred to
// DOMContentLoaded because the shell (which carries #library-manifest) is
// injected into the page AFTER this script.
function renderRelated() {
  const relEl = document.getElementById('related');
  const mEl = document.getElementById('library-manifest');
  if (!relEl || !mEl) return;
  let LIB; try { LIB = JSON.parse(mEl.textContent); } catch (e) { return; }
  const me = LIB.find(x => x.slug === corpus.slug);
  const rel = (me && me.related) || [];
  if (!rel.length) return;
  const esc = s => { const d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; };
  relEl.innerHTML = '<h3 class="related-h">Related reading</h3><div class="related-grid">'
    + rel.map(r => '<a class="related-card" href="' + esc(r.slug) + '.html">'
        + '<span class="related-cat">' + esc(r.category || '') + '</span>'
        + '<span class="related-t">' + esc(r.title) + '</span></a>').join('')
    + '</div>';
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', renderRelated);
else renderRelated();

// top reading-progress bar
(function () {
  var bar = document.getElementById('reader-progress'); if (!bar) return;
  function onScroll() { var h = document.documentElement, max = h.scrollHeight - h.clientHeight;
    bar.style.width = (max > 0 ? (h.scrollTop / max) * 100 : 0) + '%'; }
  document.addEventListener('scroll', onScroll, { passive: true }); onScroll();
})();

// reader type controls — text size + measure, persisted across the whole library
(function () {
  var contentEl = document.getElementById('content'), btn = document.getElementById('type-btn');
  if (!contentEl || !btn) return;
  var SIZES = { s: '0.95rem', m: '1.04rem', l: '1.16rem', xl: '1.28rem' };
  var MEAS = { narrow: '640px', normal: '740px', wide: '880px' };
  var fs = SIZES[localStorage.getItem('reader-fs')] ? localStorage.getItem('reader-fs') : 'm';
  var meas = MEAS[localStorage.getItem('reader-measure')] ? localStorage.getItem('reader-measure') : 'normal';
  function applyType() {
    contentEl.style.setProperty('--reader-fs', SIZES[fs]);
    contentEl.style.setProperty('--reader-measure', MEAS[meas]);
    var pg = document.getElementById('pager'); if (pg) pg.style.maxWidth = MEAS[meas];
    var rl = document.getElementById('related'); if (rl) rl.style.maxWidth = MEAS[meas];
  }
  applyType();
  var panel;
  function mark() {
    if (!panel) return;
    [].forEach.call(panel.querySelectorAll('#tp-size button'), function (b) { b.classList.toggle('on', b.getAttribute('data-v') === fs); });
    [].forEach.call(panel.querySelectorAll('#tp-meas button'), function (b) { b.classList.toggle('on', b.getAttribute('data-v') === meas); });
  }
  function build() {
    panel = document.createElement('div'); panel.id = 'type-panel';
    panel.innerHTML = '<div class="tp-row"><span class="tp-lab">Text size</span><span class="tp-grp" id="tp-size">'
      + '<button data-v="s" aria-label="Smaller">A−</button><button data-v="m">A</button>'
      + '<button data-v="l">A+</button><button data-v="xl" aria-label="Largest">A++</button></span></div>'
      + '<div class="tp-row"><span class="tp-lab">Width</span><span class="tp-grp" id="tp-meas">'
      + '<button data-v="narrow">Narrow</button><button data-v="normal">Normal</button><button data-v="wide">Wide</button></span></div>';
    document.body.appendChild(panel);
    panel.addEventListener('click', function (e) {
      var b = e.target.closest('button'); if (!b) return;
      var v = b.getAttribute('data-v');
      if (b.parentNode.id === 'tp-size') { fs = v; localStorage.setItem('reader-fs', v); }
      else { meas = v; localStorage.setItem('reader-measure', v); }
      applyType(); mark();
    });
  }
  btn.onclick = function (e) {
    e.stopPropagation();
    if (!panel) build();
    if (panel.classList.toggle('open')) {
      mark();
      var r = btn.getBoundingClientRect();
      panel.style.left = Math.min(r.left, window.innerWidth - panel.offsetWidth - 8) + 'px';
      var top = r.top - panel.offsetHeight - 8;
      panel.style.top = (top < 8 ? r.bottom + 8 : top) + 'px';
    }
  };
  document.addEventListener('click', function (e) {
    if (panel && panel.classList.contains('open') && !panel.contains(e.target) && e.target !== btn) panel.classList.remove('open');
  });
})();

  }
  function zoomAt(px, py, f) {
    var ns = Math.max(0.22, Math.min(9, view.s * f)), k = ns / view.s;
    view.x = px - (px - view.x) * k; view.y = py - (py - view.y) * k; view.s = ns; apply(); save();
  }
  function fit() {
    if (!DATA || !DATA._b) return;
    var b = DATA._b, sw = stage.clientWidth, sh = stage.clientHeight, pad = 46;
    var s = Math.max(0.22, Math.min(9, Math.min((sw - pad * 2) / b.w, (sh - pad * 2) / b.h)));
    view.s = s; view.x = (sw - (2 * b.x + b.w) * s) / 2; view.y = (sh - (2 * b.y + b.h) * s) / 2; apply(); save();
  }

  function load() {
    if (loading) return; loading = true;
    fetch(base + 'atlas.json').then(function (r) { return r.ok ? r.json() : Promise.reject(); })
      .then(function (j) { DATA = j; render(j); loaded = true; if (msg) msg.remove(); })
      .catch(function () { if (msg) msg.textContent = 'The Atlas needs to load its map data — open it on the live site (research.calvincollins.xyz).'; });
  }

  function render(j) {
    var s = '<svg id="atlas-svg" viewBox="' + j.viewBox + '" width="' + j.w + '" height="' + j.h
      + '" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">';
    s += '<defs>';
    for (var rid in j.regions) s += '<clipPath id="ar-' + rid + '"><path d="' + j.regions[rid].d + '"/></clipPath>';
    j.places.forEach(function (p) {
      var c = p.cell;
      s += '<clipPath id="ac-' + p.slug + '"><rect x="' + c[0] + '" y="' + c[1] + '" width="' + c[2] + '" height="' + c[3] + '"/></clipPath>';
    });
    s += '</defs>';
    s += '<g id="atlas-grat">'; (j.graticule || []).forEach(function (d) { s += '<path d="' + d + '"/>'; }); s += '</g>';
    s += '<g id="atlas-bd">'; (j.backdrop || []).forEach(function (d) { s += '<path d="' + d + '"/>'; }); s += '</g>';
    s += '<g id="atlas-places">';
    j.places.forEach(function (p) {
      var c = p.cell;
      s += '<g class="atlas-place" data-slug="' + esc(p.slug) + '"><g clip-path="url(#ar-' + p.region + ')">';
      if (p.img) {
        var href = esc(base + p.img);
        s += '<image class="atlas-img" href="' + href + '" xlink:href="' + href + '" x="' + c[0] + '" y="' + c[1]
          + '" width="' + c[2] + '" height="' + c[3] + '" preserveAspectRatio="xMidYMid slice" clip-path="url(#ac-' + p.slug + ')"/>';
      }
      s += '<rect class="atlas-ring" x="' + c[0] + '" y="' + c[1] + '" width="' + c[2] + '" height="' + c[3]
        + '" clip-path="url(#ac-' + p.slug + ')" fill="none" stroke="' + esc(p.accent) + '" stroke-width="3"/>';
      s += '</g></g>';
    });
    s += '</g>';
    s += '<g id="atlas-lines">';
    for (var r2 in j.regions) {
      var R = j.regions[r2];
      s += '<path class="atlas-rgn" d="' + R.d + '"/>';
      (R.dividers || []).forEach(function (d) {
        s += '<line class="atlas-div" x1="' + d[0] + '" y1="' + d[1] + '" x2="' + d[2] + '" y2="' + d[3] + '" clip-path="url(#ar-' + r2 + ')"/>';
      });
    }
    s += '</g></svg>';
    world.innerHTML = s;

    var X0 = 1e9, Y0 = 1e9, X1 = -1e9, Y1 = -1e9;
    j.places.forEach(function (p) {
      bySlug[p.slug] = p; var c = p.cell;
      X0 = Math.min(X0, c[0]); Y0 = Math.min(Y0, c[1]); X1 = Math.max(X1, c[0] + c[2]); Y1 = Math.max(Y1, c[1] + c[3]);
    });
    DATA._b = { x: X0 - 40, y: Y0 - 40, w: (X1 - X0) + 80, h: (Y1 - Y0) + 80 };

    [].forEach.call(world.querySelectorAll('.atlas-place'), function (el) {
      var p = bySlug[el.getAttribute('data-slug')];
      el.addEventListener('pointerenter', function () { if (!dragging) activate(p, el); });
      el.addEventListener('pointermove', function () { if (!dragging && active !== p) activate(p, el); });
      el.addEventListener('pointerleave', schedHide);
      el.addEventListener('click', function (e) {
        if (moved || e.target.closest('#atlas-card')) return;
        window.location.href = base + p.href;
      });
    });
    if (restore()) { apply(); if (!enoughVisible()) fit(); }   // reopen where they left off — unless it's now off-screen
    else fit();
  }

  function activate(p, el) {
    if (active && active._el && active._el !== el) active._el.classList.remove('active');
    active = p; p._el = el; el.classList.add('active');
    var opts = '<option value="" disabled selected>Jump to a chapter…</option>';
    (p.chapters || []).forEach(function (ch) { opts += '<option value="' + esc(base + ch.href) + '">' + esc(ch.t) + '</option>'; });
    card.innerHTML = '<a class="ac-title" href="' + esc(base + p.href) + '" style="color:' + esc(p.accent) + '">' + esc(p.title) + '</a>'
      + '<div class="ac-place">' + esc(p.label) + '</div>'
      + (p.chapters && p.chapters.length ? '<select class="ac-sel" aria-label="Jump to a chapter">' + opts + '</select>' : '');
    var sel = card.querySelector('.ac-sel');
    if (sel) sel.onchange = function () { if (this.value) window.location.href = this.value; };
    card.classList.add('show');
    var r = el.getBoundingClientRect(), sr = stage.getBoundingClientRect();
    card.style.left = '0px'; card.style.top = '0px';
    var cw = card.offsetWidth, chh = card.offsetHeight;
    var cx = (r.left + r.right) / 2 - sr.left, cyTop = r.top - sr.top;
    var left = Math.max(8, Math.min(sr.width - cw - 8, cx - cw / 2));
    var top = cyTop - chh - 12; if (top < 8) top = (r.bottom - sr.top) + 12;
    top = Math.max(8, Math.min(sr.height - chh - 8, top));
    card.style.left = left + 'px'; card.style.top = top + 'px';
    if (hideT) { clearTimeout(hideT); hideT = null; }
  }
  function schedHide() { if (hideT) clearTimeout(hideT); hideT = setTimeout(hideCard, 240); }
  function hideCard() {
    if (card) card.classList.remove('show');
    if (active && active._el) active._el.classList.remove('active');
    active = null;
  }
})();
</script>
</body>
</html>
