on\" turning to McLuhan.\n20. ACM Digital Library review of *Digital McLuhan* (Levinson, Routledge 1999). https://dl.acm.org/doi/pdf/10.1145/504696.606136 — accessed 2026-06-13. **Tier 2 (peer venue review).** Independent characterization of Levinson's thesis.\n21. Philip Marchand, *Marshall McLuhan: The Medium and the Messenger* (1989); W. Terrence Gordon, *Marshall McLuhan: Escape into Understanding* (1997) — referenced as the standard biographies (per search-result attestations). **Tier 2 (biographies).** Standard narrative/scholarly biographies. (Gordon also editor of annotated critical editions.)\n22. Robert K. Logan, *The Sixth Language* (won MEA Suzanne K. Langer Award, 2000); Wikipedia-sourced biography pointing to underlying works. https://en.wikipedia.org/wiki/Robert_K._Logan (used for navigation only; underlying works cited) — accessed 2026-06-13. **Tier 2 (scholarly work).** Logan as McLuhan collaborator; extended-mind/origin-of-language line.\n23. Lance Strate et al., \"Media Ecology as a Scholarly Activity\" (Fordham faculty publications); Strate Wikipedia for navigation. https://research.library.fordham.edu/cgi/viewcontent.cgi?article=1007&context=comm_facultypubs — accessed 2026-06-13. **Tier 2.** Media-ecology pedagogy and the McLuhan/Ong/Postman lineage.\n24. Donald Theall, *The Virtual Marshall McLuhan* (McGill-Queen's UP, 2001) and *The Medium Is the Rear View Mirror* (1971). https://www.mqup.ca/Books/T/The-Virtual-Marshall-McLuhan ; Theall, \"Who/What is Marshall McLuhan?\" *Continuum* 14(1), 2000. https://journals.sagepub.com/doi/10.1177/1329878X0009400104 — accessed 2026-06-13. **Tier 2 (university-press monograph + peer-reviewed article).** Critical-insider reading; McLuhan's first doctoral student; the Joyce line; \"neither adulation nor demonization.\"\n25. Theall, *The Virtual Marshall McLuhan* publisher/Google Books description. https://books.google.com/books/about/Virtual_Marshall_McLuhan.html?id=MF0gMccuPEkC — accessed 2026-06-13. **Tier 2.** Confirms Theall as first doctoral student and the book's critical stance.\n26. Raymond Williams, *Television: Technology and Cultural Form* (1974; Routledge Classics 2003). Publisher/Routledge description and Google Books. https://www.routledge.com/Television-Technology-and-Cultural-Form/Williams/p/book/9780415314565 — accessed 2026-06-13. **Tier 1 (the primary critique) / Tier 2.** Williams's anti-determinism argument against McLuhan.\n27. Anthony Smith / scholarly analysis, \"The Technology Is Not the Cultural Form? Raymond Williams's Sociological Critique of Marshall McLuhan.\" https://www.academia.edu/40684314/ — accessed 2026-06-13. **Tier 2 (scholarly article).** Williams's \"if the medium is the cause… all that men ordinarily see as history… reduced to effects\" line, in context.\n28. McLuhan Galaxy, \"Marshall McLuhan & Technological Determinism: A Reappraisal\" (2011). https://mcluhangalaxy.wordpress.com/2011/10/03/marshall-mcluhan-technological-determinism-a-reappraisal/ — accessed 2026-06-13. **Tier 5/6 (specialist advocacy blog).** Evidence of the anti-determinist-reading *position*; used as position-evidence, not fact.\n29. Jonathan Miller, *McLuhan* (Fontana Modern Masters, 1972). Goodreads/Google Books descriptions and the Oxford account [1]. https://books.google.com/books/about/Marshall_McLuhan.html?id=kexoAAAAIAAJ — accessed 2026-06-13. **Tier 1 (the critique itself) / Tier 2.** Miller's charlatan conclusion (\"not a single observation… nor… a single theory which even begins to hold water\").\n30. Marshall McLuhan and Eric McLuhan, *Laws of Media: The New Science* (University of Toronto Press, 1988). Full text (Monoskop). https://monoskop.org/images/e/ec/McLuhan_Marshall_McLuhan_Eric_Laws_of_Media_The_New_Science.pdf — accessed 2026-06-13. **Tier 1 (primary text).** The tetrad and the \"testable and falsifiable form\" claim.\n31. Scholarly commentary on the tetrad's falsifiability: Sandstrom, \"Laws of Media — The Four Effects\" (Social Epistemology Review and Reply Collective, 2012); \"Tetrad of media effects\" overview; Mir, \"Understanding the Law of Reversal.\" https://social-epistemology.com/2012/11/11/ — accessed 2026-06-13. **Tier 2/Tier 5.** The Popper joke, the anti-Popperian application critique, the \"PR attempt to revitalize 1960s popularity\" reading.\n32. Athwart, \"Transcending Obsolescence: Marshall McLuhan, Catholic\"; McLuhan Galaxy, \"Why Did Marshall McLuhan Resist Moralizing About New Media?\"; Church Life Journal (Notre Dame), \"The Patron Saint of Media Studies.\" https://www.athwart.org/transcending-obsolescence-marshall-mcluhan-catholic/ ; https://churchlifejournal.nd.edu/articles/the-patron-saint-of-media-studies/ — accessed 2026-06-13. **Tier 5/6 (analytical and religious-press; note Catholic editorial lean).** McLuhan's conservatism, neo-Thomism, reactionary-modernist debts, pro-life activism, Vatican-II criticism; left/right reception split. Used for position and well-attested biography.\n33. Grant Havers, \"The Right-Wing Postmodernism of Marshall McLuhan,\" *Media, Culture & Society* 25(4), 2003, pp. 511–525. https://journals.sagepub.com/doi/10.1177/01634437030254005 — accessed 2026-06-13. **Tier 2 (peer-reviewed).** Havers (political philosophy, Trinity Western University) argues McLuhan critiques the liberal/capitalist print age \"from the right-wing side of the political spectrum,\" with retribalization as a hoped-for \"right-wing postmodern community.\" The \"right-wing postmodernist\" thesis and the left/right appropriation problem.\n34. LitHub, \"How Marshall McLuhan Was the Patron Saint of Wired Magazine.\" https://lithub.com/how-marshall-mcluhan-was-the-patron-saint-of-wired-magazine/ — accessed 2026-06-13. **Tier 5 (literary essay drawing on Wired's history).** Wired's 1993 founding (Rossetto/Kelly), \"patron saint\" masthead, Catholic techno-theology, \"St. Marshall\" article run.\n35. Gary Wolf, \"Channeling McLuhan,\" *Wired* (1996); Wolf's framing of McLuhan's prophecy. https://en.wikipedia.org/wiki/Gary_Wolf_(journalist) (navigation) + LitHub [34]. — accessed 2026-06-13. **Tier 4/5 (Wired feature; the underlying article is primary for Wolf's framing).** The \"Channeling McLuhan\" episode; the quasi-religious \"eschatological prophecies of the early church\" framing.\n\n---\n\n*Compiled 2026-06-13 for the Marshall McLuhan deep-research corpus, Workstream 6 (pillar: current). Institutional facts from estate/Toronto/MEA sources are treated as authoritative self-description; the live debates are steelmanned per camp and tagged factual-vs-interpretive throughout. Single-source and load-bearing claims flagged for adversarial verification.*"}, {"order": 7, "file": "07_Adjacent_And_Comparative.md", "title": "Adjacent & Comparative: McLuhan Among His Neighbors", "summary": "", "body": "# Adjacent & Comparative: McLuhan Among His Neighbors\n\n## Bottom Line\n\nMcLuhan is best understood not as a solitary oracle but as one node in a dense network of twentieth-century thinkers about media — and the comparisons reorganize the whole picture. Set against **Harold Innis**, his Toronto-School predecessor, McLuhan looks like a man who kept the medium-centric insight and the deep-historical sweep but dropped the political economy, the empire, and the dialectical caution that anchored it — trading Innis's *space/time bias* for a *sensory/perceptual* turn. Set against **Walter Ong** — literally his graduate student — McLuhan looks like the brilliant, unfalsifiable aphorist whose oral-literate thesis Ong made scholarly, footnoted, and respectable. Set against **Neil Postman**, McLuhan looks ostentatiously neutral: Postman took McLuhan's value-free \"probes\" and turned them into moral alarm (*Amusing Ourselves to Death*). Set against the European theorists — **Baudrillard** (simulation/implosion), **Kittler** (the anti-humanist German \"hardware\" school), **Flusser** (technical images), and **Virilio** (speed) — McLuhan looks at once like a founding stimulus and like the optimist they all corrected: Baudrillard made the medium devour the real, Kittler made *man* the extension of media rather than the reverse, Virilio made McLuhan's exhilarating \"electric speed\" into catastrophe. And set against the **Wired/Silicon Valley appropriation** of the 1990s, McLuhan looks misread on purpose: the digital utopians crowned him \"patron saint\" while quietly discarding his Catholic moral pessimism and his explicit warnings that the global village would breed terror, panic, and tribal violence. Two cross-cutting fault lines run through all of this and are invisible from inside any single comparison: a **Catholic-vs-secular split** among his heirs (McLuhan and Ong sacramental; Baudrillard, Kittler, Postman, and the Wired crowd secular), and a **perceptual-vs-political split** (McLuhan's senses vs. Innis's and Virilio's institutions and power).\n\n---\n\n## Why Comparison Changes the Picture\n\nFrom the inside, McLuhan is a galaxy of probes — \"the medium is the message,\" \"hot and cool,\" \"the global village,\" the tetrad — that resist system. He cultivated this. He called his sentences \"probes,\" not propositions; he said he did not explain, he explored. The risk of reading him only from the inside is that you either swallow the aphorisms whole or dismiss them as unfalsifiable showmanship. Comparison breaks that binary. Each neighbor holds one variable fixed and lets you see what McLuhan actually chose. Innis shows you the political economy McLuhan *declined* to do. Ong shows you the scholarship McLuhan *declined* to do. Postman shows you the moral judgment McLuhan *refused* to render. The Europeans show you the pessimism and the anti-humanism McLuhan's optimism *held off*. And Wired shows you which McLuhan a generation *chose to remember* — and which they chose to forget.\n\nThis document treats five comparisons (the European theorists are handled as a cluster of four), each with what it shares, what it differs on, and what it illuminates — then surfaces the two cross-cutting splits.\n\n---\n\n## 1. Harold Innis — The Predecessor McLuhan Half-Inherited\n\nHarold Adams Innis (1894–1952) was a University of Toronto political economist who, late in a career built on the staples theory of Canadian economic development (fur, fish, timber, wheat), turned to communication. His two communication books — *Empire and Communications* (1950) and *The Bias of Communication* (1951) — argue that every medium carries a **bias** toward either *time* or *space*. Time-biased media are heavy and durable — stone, clay, parchment — and favor tradition, hierarchy, religion, and continuity across generations. Space-biased media are light and portable — papyrus, paper, print — and favor administration over distance, empire, secular authority, and the present moment [1][2]. Civilizations rise and fall, in Innis's account, as the dominant medium tilts the balance between durability in time and extension in space; a stable society needs both biases in tension.\n\nMcLuhan named Innis his master. In the preface to *The Gutenberg Galaxy* (1962) he wrote: \"I am pleased to think of my own book … as a footnote to the observations of Innis on the subject of the psychic and social consequences, first of writing then of printing\" [3]. Together they are credited as the founders of what is variously called the **Toronto School**, **medium theory**, or **media ecology** — the position that communications media, not their content, are the key to understanding the co-development of mind, culture, and society [1][4].\n\n**What they share.** The foundational axiom: the medium, not the message it carries, is the historically decisive force. Both read all of human history as a sequence of dominant media (orality, manuscript, print, electricity). Both insist that a shift in the dominant medium reorganizes the whole society — its institutions, its psychology, its sense of time and space. Both are deep-historical, civilizational in scale, and both are anti-content-ist: what matters is the form of the channel [4][5].\n\n**What they differ on — and what McLuhan dropped.** This is the load-bearing comparison, and the cleanest statement of it comes from James W. Carey, the communication scholar who knew both bodies of work intimately. Carey's 1967 formulation: \"Both McLuhan and Innis assume the centrality of communication technology; where they differ is in the principal kinds of effects they see deriving from this technology. Whereas Innis sees communication technology principally affecting **social organization and culture**, McLuhan sees its principal effect on **sensory organization and thought**. McLuhan has much to say about perception and thought but little to say about institutions; Innis says much about institutions and little about perception and thought\" [5][6].\n\nThat is the perceptual turn in one sentence. Innis was a political economist to the end: his media analysis was about power, monopoly, empire, the clergy's control of time-biased knowledge, the bureaucrat's control of space-biased knowledge, the way each new medium creates a new \"monopoly of knowledge\" that a rival medium eventually breaks. His framework is dialectical, materialist, and political. McLuhan kept the medium-centrism and the sweep but **dropped the political economy** — the empire, the monopolies of knowledge, the class of scribes, the question of who owns the channel — and relocated the action inside the human sensorium. For McLuhan the question was never \"who controls papyrus?\" but \"what does the alphabet do to the eye, the ear, the ratio among the senses?\" He begins, as Carey notes, \"at a different point: the human body,\" from the premise that media are *extensions of human senses* [5][6].\n\nInnis was also, temperamentally and substantively, far gloomier and more guarded. His prose is famously difficult, allusive, fragmentary — a deliberate refusal of the smooth space-biased linearity he distrusted — but his judgments are sober and political: he worried about the mechanization of knowledge, the destruction of the oral tradition and the time-bias by a print-and-then-electronic culture obsessed with the present and with space. McLuhan took the same raw material and made it exhilarating, aphoristic, performative, and (at least on the surface) celebratory. He kept Innis's reach and discarded Innis's restraint.\n\n**What the comparison illuminates.** McLuhan is what you get when you take Innis's medium theory and **subtract the politics, add the senses, and turn up the rhetoric**. This is also the origin of the deepest standing critique of McLuhan — that by relocating media effects into perception he made power, ownership, and economics disappear. The entire tradition of \"political economy of communication\" (Dallas Smythe, Herbert Schiller, and later critics) can be read as an attempt to put back the Innis that McLuhan removed [7]. When later scholars complain that McLuhan is apolitical, that he cannot see capital or class or who profits from a medium, they are, knowingly or not, complaining that he is not Innis.\n\n---\n\n## 2. Walter J. Ong — The Student Who Made It Scholarship\n\nWalter J. Ong, S.J. (1912–2003) is the comparison that reorganizes the chronology, because the relationship is not parallel but filial: **Ong was McLuhan's student.** As a young Jesuit, Ong did his master's thesis at Saint Louis University under McLuhan's supervision in the late 1930s; it was Ong who, in zamizdat-style mimeographed pages, introduced McLuhan to the work of Pierre Teilhard de Chardin, whose \"noösphere\" became central to McLuhan's \"global village\" [8][9]. McLuhan, in turn, pointed Ong toward the subject — Renaissance logic, the printed page, the technologizing of the word — that would occupy Ong for sixty years.\n\nOng's major works — *Ramus, Method, and the Decay of Dialogue* (1958), *The Presence of the Word* (1967), and above all *Orality and Literacy: The Technologizing of the Word* (1982) — develop the same thesis as McLuhan's *Gutenberg Galaxy*: that the shift from oral to written to print culture restructures human consciousness itself, that literacy is a *technology* that rewires thought, and that primary oral cultures think and remember and organize knowledge in ways fundamentally alien to literate ones [10][11].\n\n**What they share.** The orality-literacy thesis is essentially common property. Both hold that writing is a technology, that it interiorizes and abstracts thought, that print intensifies the visual and linear bias of the alphabet, and that electronic media partly reverse the process — Ong's term is **\"secondary orality,\"** the deliberate, self-conscious, communal orality of radio and television that \"depends on writing and print for its existence\" yet revives the participatory, acoustic qualities of primary orality [10][12]. This maps closely onto McLuhan's \"retribalization\" and his acoustic-vs-visual space. Both were also devout Catholics for whom the theory was not incidental to the faith but structured by it (see the Catholic-secular split, below).\n\n**What they differ on.** Rigor, falsifiability, and honesty about evidence. Ong is the **scholarly cousin** — the one who footnotes. Where McLuhan asserts, dazzles, contradicts himself across pages, and refuses to define his terms (\"probes, not propositions\"), Ong builds. *Orality and Literacy* is a careful synthesis that draws on and credits the empirical and comparative work that McLuhan tended to assimilate without attribution — Milman Parry and Albert Lord on oral-formulaic composition in Homer and living Balkan singers, Eric Havelock on the Greek transition to literacy, Jack Goody and Ian Watt on the consequences of literacy, A.R. Luria's field psychology of non-literate subjects [10][13]. Ong's claims are stated so that a reader can test them against the Homeric texts or Goody's fieldwork. McLuhan's, by design, cannot be tested that way. The difference is temperamental as much as methodological: Ong wanted to be right and to be checkable; McLuhan wanted to be provocative and to be felt.\n\nOng is also far more careful about the dichotomy itself. He repeatedly warns against treating \"oral\" and \"literate\" as a clean binary or a value hierarchy, and the standard scholarly critique of Ong — that he is still too dichotomous, too close to technological determinism, that he flattens the variety within oral cultures — is itself a measure of how much more exposed-to-criticism his position is than McLuhan's, precisely because it is stated clearly enough to attack [11][14].\n\n**What the comparison illuminates.** Ong is the experiment that shows what McLuhan's best single idea looks like when a disciplined scholar does it properly. *Orality and Literacy* has had a long, respectable career inside the academy — in classics, anthropology, education, biblical studies, composition theory — while McLuhan's own books were largely exiled from it for two decades. The orality-literacy thesis survived McLuhan's reputational collapse precisely because Ong had rebuilt it on foundations the university would accept. In a real sense, the part of McLuhan that the academy kept is the part that came back to it through Ong.\n\n---\n\n## 3. Neil Postman — The Moralist Who Un-Neutralized the Probes\n\nNeil Postman (1931–2003) was a New York University professor who in 1971 founded the graduate program in **Media Ecology** — the discipline-name Postman did the most to institutionalize — explicitly in McLuhan's lineage [15]. He called McLuhan a friend and an intellectual master. And then he did the one thing McLuhan most conspicuously refused to do: he passed judgment.\n\nPostman's *Amusing Ourselves to Death: Public Discourse in the Age of Show Business* (1985) accepts the core McLuhan premise — Postman restyles \"the medium is the message\" as **\"the medium is the metaphor,\"** agreeing that the form of a medium silently shapes and finally degrades the content it carries — and turns it into a jeremiad against television [15][16]. His thesis: typographic culture made public discourse rational, sequential, and serious; television culture makes it fragmentary, image-driven, and entertaining; and a public addicted to amusement loses the capacity for the kind of coherent, argued public thought that self-government requires.\n\nPostman's famous framing is the **Huxley-vs-Orwell** inversion, drawn from a 1984 talk at the Frankfurt Book Fair: we feared Orwell's *1984* — oppression by a boot, by state censorship and pain — but the truth is Huxley's *Brave New World*, oppression by pleasure. \"What Orwell feared were those who would ban books. What Huxley feared was that there would be no reason to ban a book, for there would be no one who wanted to read one.\" People come to \"love their oppression, to adore the technologies that undo their capacities to think\" [16][17].\n\n**What they share.** The medium-shapes-the-message axiom; the conviction that television (and now, in his successors' hands, the smartphone and the feed) restructures cognition; membership in the same Toronto-Innis-McLuhan lineage; the media-ecology vocabulary.\n\n**What they differ on — the crucial one.** *Valence.* McLuhan was studiedly, provocatively **neutral** — or claimed to be. He insisted he was not approving or condemning the electronic age but diagnosing it; the probes were instruments, not verdicts; \"I don't necessarily agree with everything I say.\" Postman took that neutral toolkit and made it a **weapon of cultural criticism.** Where McLuhan said the medium is the message and left it as a koan, Postman said the medium is the message *and that is a catastrophe for democracy.* He is the moralist successor: he restored to the McLuhan apparatus exactly the normative, value-laden, this-is-bad dimension McLuhan had drained out of it [15][16].\n\n**What the comparison illuminates.** Postman reveals McLuhan's neutrality as a *choice* — and a slippery one. McLuhan's refusal to judge was part method, part temperament, part (his critics charge) evasion: it let him be claimed by optimists and pessimists alike, by the counterculture and by IBM, because he never said whether any of it was good. Postman closed that escape hatch. He also reveals the political range of the lineage: the same medium-theory premise can underwrite McLuhan's cool detachment, Postman's conservative-tinged cultural pessimism, and (next section) Baudrillard's radical nihilism. The premise is value-neutral; what each thinker does with it is not.\n\n---\n\n## 4. The European Theorists — Four Ways to Correct an Optimist\n\nMcLuhan landed in continental Europe as a provocation, and four major theorists — two French, two German/Czech-German — built post-McLuhan media theory partly by correcting him. They share a starting recognition that McLuhan saw something real about media as environments and forces; they differ in pushing his thought toward pessimism, anti-humanism, or catastrophe.\n\n### 4a. Jean Baudrillard — Implosion and the Death of the Medium\n\nJean Baudrillard (1929–2007) is the **critical heir.** His theory of *simulation*, *simulacra*, and *hyperreality* (*Simulacra and Simulation*, 1981) takes McLuhan's \"the medium is the message\" as a launching point and then, in his words, drives it past where McLuhan himself could see. Baudrillard accepts the formula but radicalizes it: the medium is the message signifies not only the end of the message but **the end of the medium** — and the implosion of the medium into the real [18][19].\n\nHis move: where McLuhan said the message implodes into the medium, Baudrillard adds a second, more violent implosion — \"the implosion of the medium itself in the real … the implosion of the medium and of the real in a sort of hyperreal nebula, in which even the definition and distinct action of the medium can no longer be determined\" [18]. The map precedes and replaces the territory; the simulation no longer needs a spectator or a stage; the real is generated by models of the real. Baudrillard fuses this with Guy Debord's *Society of the Spectacle* and then claims to go beyond it: the spectacle still needed an audience, but simulation needs nothing outside itself [19].\n\n**Shares with McLuhan:** the primacy of the medium over content; the sense that electronic media constitute a total environment; the willingness to write in flashing, aphoristic, unfalsifiable bursts. **Differs:** Baudrillard strips out every trace of McLuhan's optimism and his (residual, Catholic) faith that there is a real to extend into. \"Baudrillard draws on McLuhan's analysis of media without accepting McLuhan's technological optimism\" [19]. McLuhan's global village had bodies and senses in it; Baudrillard's hyperreal has neither. **Illuminates:** Baudrillard is McLuhan with the metaphysical floor removed — the proof that you can take the medium-is-the-message seriously all the way down into nihilism, with no sacrament and no body at the bottom.\n\n### 4b. Friedrich Kittler — The Anti-Humanist Rebuke\n\nFriedrich Kittler (1943–2011), the central figure of the German \"media science\" (*Medienwissenschaft*) school, both **extends and rebukes** McLuhan. His signature works — *Discourse Networks 1800/1900* (German 1985) and *Gramophone, Film, Typewriter* (German 1986) — open with the war-cry \"**Media determine our situation**\" [20][21]. Kittler agrees with McLuhan that media, not content, are decisive, and that the late-nineteenth-century burst of new media (phonograph, cinema, typewriter) reorganized the entire order of knowledge. He praised McLuhan as a pioneer.\n\nThen he turns on him. Kittler's central rebuke targets the most humanist phrase in McLuhan's vocabulary — *the extensions of man.* For Kittler, media are emphatically **not** prosthetic extensions of a pre-existing human body or human senses. The relation runs the other way: media are the technological *a priori* that produces \"man\" in the first place. \"Media are not pseudopods for extending the human body. They follow the logic of escalation that leaves us and written history behind it.\" And: \"What remains of people is what media can store and communicate\" [21][22]. This is a fully **anti-humanist, anti-hermeneutic** position — Kittler, writing against the interpretive humanism of Gadamer and drawing on Foucault, Lacan, and Derrida, wants to remove the human subject from the center of media analysis entirely and read media as hardware, as inscription systems (*Aufschreibesysteme*) that channel data flows independently of meaning [20][21]. He insists, too, on the **military** origin of media: the logic of escalation is best understood through war and weapons systems, a materialism McLuhan's sensory idealism elided [22][23].\n\n**Shares with McLuhan:** medium-determinism; the late-nineteenth-century media revolution as turning point; civilizational scale. **Differs:** the polarity of the human-media relation is reversed (man as extension of media, not media as extensions of man); meaning and interpretation are evacuated; the body's senses are replaced by circuits and storage; war and hardware replace perception. **Illuminates:** Kittler is McLuhan turned inside out and de-spiritualized — the German \"hardware\" answer to the Canadian \"sensorium.\" Where McLuhan's media reach outward from a human center, Kittler's media have no center and no human at the origin. If Baudrillard removed McLuhan's *real*, Kittler removed McLuhan's *man*.\n\n### 4c. Vilém Flusser — Technical Images, Different Foundations\n\nVilém Flusser (1920–1991), the Prague-born, Brazil-and-Germany philosopher of communication, is the bridge figure — \"between Benjamin and McLuhan,\" as one study puts it [24]. His theory of **technical images** (*Towards a Philosophy of Photography*, 1983; *Into the Universe of Technical Images*, 1985) holds that human history moved from a world of *traditional images* (pre-historical, magical) into a world of *linear writing* (historical, conceptual) and is now entering a world of **technical images** — photographs, films, television, and finally computer-generated, code-mediated images — that push linear, text-based culture into the background [24][25]. Technical images are produced by people (\"functionaries\") operating \"apparatuses\" (cameras, computers) through keys, and they are mediated by code; they \"rule over our daily routine\" [25].\n\n**Shares with McLuhan:** the grand periodization of human consciousness by dominant medium; the claim that the image-medium revolution displaces the print-medium order; the sense that media are environments that program us. Flusser explicitly upgrades the older Marxist German media tradition (Kracauer, Brecht, Benjamin) \"in the footsteps of Marshall McLuhan\" [24]. **Differs:** Flusser builds on a different philosophical foundation — phenomenology, existentialism, a deeply European pessimism shadowed by his own exile from the Holocaust — and his unit of analysis is the *image* and its *code*, not the *sense ratio*. He is more interested in the \"apparatus\" and the human reduced to its \"functionary\" than in McLuhan's extended senses. **Illuminates:** Flusser shows that McLuhan's periodization (orality → literacy → electronic) can be rebuilt on a Continental phenomenological base into a theory about images and apparatuses — and that doing so yields something darker and more structural, closer to a critique of the programmed society than to a celebration of the global village.\n\n### 4d. Paul Virilio — Speed as Catastrophe\n\nPaul Virilio (1932–2018), the French theorist of **dromology** — \"the science (or logic) of speed\" — is the European who took McLuhan's most exhilarating theme, *electric speed*, and made it terror. *Speed and Politics* (French 1977) argues that speed, not class or wealth, is the primary force shaping civilization, and that the acceleration of communication and transport (military first, always) is collapsing space and time toward a dangerous \"instantaneity\" [26][27]. Virilio was \"fond of quoting Marshall McLuhan,\" and acknowledged \"something of the ambiguity of McLuhan's 'the medium is the message'\" in the movement he describes [27].\n\nHis decisive addition is the **accident.** For Virilio, every technology invents its own catastrophe: \"to invent the ship is to invent the shipwreck.\" The question is not whether a technology fails but when and how. So where McLuhan saw electric speed as a transformative force carrying the potential for collective awareness and a unified, instantly-communicating community, Virilio saw the same speed as \"the engine of destruction\" — a \"fearful friction\" whose end-state is the integral accident, the global crash [26][27].\n\n**Shares with McLuhan:** the centrality of electric speed and instantaneity; the collapse of distance; the conviction that technology restructures perception and politics. **Differs:** valence and politics. Virilio is catastrophist where McLuhan is (at least rhetorically) hopeful; and Virilio re-politicizes and re-militarizes the analysis — like Kittler, he roots media in war — where McLuhan abstracts into the senses. **Illuminates:** Virilio is the dark mirror of the global village. The same instantaneous, distance-annihilating speed that McLuhan made sound like a planetary nervous system, Virilio makes sound like a planetary pile-up. Read together, they expose the central ambivalence McLuhan smuggled into a celebratory register and Virilio dragged into a tragic one.\n\n---\n\n## 5. The Wired / Silicon Valley Appropriation — The McLuhan They Chose to Remember\n\nWhen *Wired* launched in 1993, it printed Marshall McLuhan's name on the masthead as the magazine's \"**patron saint**\" [28][29]. The debut issue ran a Camille Paglia–Stewart Brand conversation anchored in McLuhan-as-\"lost prophet,\" and over its early years the magazine ran a liturgy of homages — \"Honoring Wired's Patron Saint,\" \"McLuhan Lives,\" \"Five Views of St. Marshall,\" \"The Wisdom of Saint Marshall, the Holy Fool\" [28][29]. The architects of this canonization were a recognizable cluster: founding editor **Louis Rossetto** (Catholic-raised, who insisted Wired was not about technology but about \"the most powerful people on the planet today — the Digital Generation\"); founding executive editor **Kevin Kelly** (who described a \"spiritual dimension to technology\" after a religious conversion experience); and behind them the *Whole Earth* lineage of **Stewart Brand** and the MIT Media Lab's **Nicholas Negroponte**, an early backer and the author of *Being Digital* (1995) [28][29][30]. This is the reading that later flowed into platform discourse — \"the medium is the message\" became a TED-circuit truism, McLuhan a mascot for every new device and network.\n\n**What the appropriation kept.** The exciting, technophilic, prophetic McLuhan: the **global village** (read as a coming planetary harmony), the **extensions of man** (read as empowerment and augmentation), the medium-is-the-message (read as \"form matters, content is overrated\"), and above all the figure of McLuhan as the seer who, in 1964, foretold the internet. This McLuhan was genuinely useful: he gave a young, swaggering, libertarian-utopian digital culture a credentialed twentieth-century intellectual ancestor and a slogan for why the new tools would change everything.\n\n**What it discarded.** Two things, and they are the heart of him.\n\nFirst, the **Catholic moral pessimism.** McLuhan was a devout Catholic convert (1937), and his Catholicism was, as scholars of the \"Catholic media trinity\" argue, \"not incidental to [his theory] … it was their structure, their spirit and their sustenance\" [31][8]. He wrote that he wanted to \"confront the secular in its own terms\" while operating \"as a Christian,\" and he privately feared that electric media might be \"a blatant manifestation of the Anti-Christ,\" a counterfeit of the Mystical Body, a Pentecost in reverse [31]. The Wired reading silently deleted this. As one history of the appropriation puts it, most Wired readers \"remained unaware that McLuhan's vision was fundamentally grounded in Catholic skepticism and theological concern — not techno-utopianism\" [30].\n\nSecond, the **explicit warnings.** McLuhan did not think the global village would be nice. He described it as \"a place of very arduous interfaces and very abrasive situations,\" and warned that \"instantaneous, universal communication is at least as likely to breed nationalism, xenophobia, and cultism as it is to breed harmony and fellow-feeling\" — that the global village carried risks of \"mass terror and sudden panic,\" that retribalization meant *more* war and conflict, not less [32][33]. Gary Wolfe, writing in Wired itself in the 1990s, noted that McLuhan saw the global village not as a harmonious utopia but as a condition of \"all-at-onceness\" carrying exactly these risks [32]. The selective reading kept the village and dropped the violence.\n\n**What the comparison illuminates.** The Wired McLuhan is a *commissioned portrait* — accurate in outline, doctored in detail. The appropriation reveals, by what it omits, the structure of the real McLuhan: a Catholic Thomist diagnostician who held exhilaration and dread in the same hand and refused to resolve them, recast as a sunny prophet of inevitable progress. It also reveals something about Silicon Valley: the digital culture needed an ancestor who would bless the tools without judging them, so it kept McLuhan's neutrality (which it could read as approval) and erased the theology and the warnings (which it could not). The platform-era afterlife — McLuhan invoked to explain why every new medium is destiny — is the long tail of this 1993 editorial decision. And the irony is sharp: the man who said the content of a medium distracts you from what the medium is doing *to* you was himself reduced to content, his most uncomfortable substance filtered out by the medium that adopted him.\n\n---\n\n## Cross-Cutting Patterns: Two Splits Invisible From Inside\n\nStep back from the individual comparisons and two fault lines run across the whole field — neither visible if you read McLuhan alone.\n\n### The Catholic-vs-Secular Split Among the Heirs\n\nMcLuhan's intellectual descendants divide along a line he himself drew but never advertised: the **sacramental/Catholic** wing versus the **secular** wing.\n\nOn the Catholic side: **McLuhan** (convert, Thomist, who saw electric media as making the Mystical Body \"technologically a fact\" and feared the Antichrist in the same breath) and **Walter Ong** (Jesuit priest, whose orality-literacy work is shot through with Teilhardian theology and an incarnational, \"Word\"-centered, sacramental view that material media carry spiritual significance) [8][9][31]. Scholars now speak explicitly of a \"Catholic media trinity\" or a shared \"sacramental view\" running McLuhan → Ong → (the lapsed-Catholic) James Carey [31][34]. For this wing, the medium is finally a question about presence, incarnation, communion, and the Word made flesh.\n\nOn the secular side: **Postman** (a moralist of cultural decline, sometimes styled a \"Jewish prophet,\" but not a metaphysician) [17]; **Baudrillard** (whose hyperreal has no God, no real, and no body); **Kittler** (militantly anti-humanist, anti-hermeneutic, for whom the \"human\" is an effect of hardware); and the **Wired** crowd (who substituted a vague \"spiritual dimension to technology\" for McLuhan's specific Catholicism, keeping the rapture and dropping the Cross) [21][19][30]. For this wing, the medium is a question about power, simulation, hardware, or amusement — never about salvation.\n\nThe split changes how you read McLuhan's central terms. The \"global village\" looks like sociology from the secular side and like the *communion of saints* from the Catholic side. \"The medium is the message\" looks like media determinism from Kittler's side and like a quasi-sacramental claim that the form *is* the content — that the channel carries grace or its counterfeit — from McLuhan's own. The thinkers who kept his Catholicism (Ong) kept his hope tempered by dread; the thinkers who dropped it kept either the dread alone (Baudrillard, Virilio, Kittler) or the hope alone (Wired). Almost no one but McLuhan held both, and the reason he could is the reason his heirs split: the theology was the hinge.\n\n### The Perceptual-vs-Political Split\n\nThe second fault line is **perception vs. power** — the senses vs. the institution.\n\nMcLuhan sits firmly on the perceptual side: media act on the *sensorium*, the ratio among the senses, the figure/ground of attention. So, broadly, does Ong (consciousness, the interior word) and so does the optimistic Wired reading (media as cognitive augmentation). On the political side sit **Innis** (empire, monopoly of knowledge, political economy), **Virilio** (speed as military and political force, the accident as the politics of technology), **Kittler** (war as the engine of media, hardware as power), and the whole **political-economy-of-communication** tradition that grew up specifically to indict McLuhan for making ownership and class invisible [5][6][7][26][22].\n\nThis split explains the most durable charge against McLuhan — that he is *apolitical*, even reactionary by omission, because by locating media effects in perception he made it impossible to ask who owns the medium, who profits, who is silenced. The charge is, almost word for word, the charge that *he is not Innis.* And it explains why McLuhan's revival has two non-overlapping fan bases: the perceptual/aesthetic readers (artists, designers, the \"media are environments\" tradition) and the political/critical readers — who mostly do not revive McLuhan at all, but Innis, Kittler, and Virilio, the ones who put the power back.\n\nLay the two splits over each other and the field organizes itself. McLuhan is the unstable center — Catholic *and* perceptual, holding hope and dread together — and each heir is a stabilization that drops one of his variables: Ong keeps the Catholicism and the perception but adds rigor; Postman keeps the perception but adds moral judgment and drops the faith; Innis is political and (in his own way) gloomy; Baudrillard, Kittler, and Virilio are secular and political/anti-humanist and dark; Wired is post-Catholic and perceptual and relentlessly bright. No single heir is the whole McLuhan, which is exactly why it took a network of them to metabolize him.\n\n---\n\n## Open Questions\n\n1. **How much did McLuhan actually read of Innis's economic history, versus the communication books?** The \"footnote to Innis\" line points at *The Bias of Communication*, but at least one document suggests McLuhan was struck first by Innis's *staples* economics — which would complicate the clean \"McLuhan dropped the political economy\" story. The exact reception path is contested in the Canadian Journal of Communication literature and was not resolved here from primary sources.\n\n2. **Is Ong genuinely more empirically grounded, or just more careful in citation?** Ong synthesizes Parry/Lord, Goody, Havelock, and Luria, but his own contribution is also largely interpretive. The line between \"scholarly\" and \"merely better-footnoted\" deserves a closer reading of *Orality and Literacy* against its sources.\n\n3. **Did Baudrillard and Kittler read McLuhan in the original or through French/German mediations?** The transmission of McLuhan into French (via the 1968 translations) and German (via the 1980s *Medienwissenschaft* boom) likely shaped which McLuhan each received. Non-Anglophone reception studies would sharpen this; this document leaned on English-language and translated sources.\n\n4. **Was the Wired appropriation a misreading or a knowing simplification?** Kevin Kelly's own quasi-religious framing suggests the editors knew about McLuhan's spiritual dimension and secularized it deliberately rather than missing it. The intent (ignorance vs. strategic editing) is an open biographical question.\n\n5. **Where do the platform-era and AI-era invocations of McLuhan fall on the two splits?** Recent (2025) pieces invoking McLuhan on AI and on figures like Peter Thiel suggest the perceptual-vs-political split is reopening around generative AI. Tracking which McLuhan the AI discourse claims is a live, forward-looking question.\n\n6. **Why did the orality-literacy thesis survive in the academy while the rest of McLuhan was exiled?** The Ong comparison suggests the answer is \"because Ong made it checkable,\" but the differential survival of McLuhan's ideas by sub-thesis (orality-literacy lived; hot/cool largely died) deserves its own mapping.\n\n---\n\n## Sources\n\n1. \"Harold Innis,\" reference overview summarizing *The Bias of Communication* (1951) and *Empire and Communications* (1950); time-bias vs. space-bias of media. Tier 2 (reference synthesis of primary works). Accessed 2026-06-13. https://en.wikipedia.org/wiki/Harold_Innis — *used only as navigation; substantive claims trace to Innis's own books, cited as primary.*\n2. Harold A. Innis, *The Bias of Communication* (University of Toronto Press, 1951) and *Empire and Communications* (Oxford, 1950) — primary works establishing the time/space-bias and monopoly-of-knowledge framework. Tier 1. (Referenced via secondary summaries; see Open Question 1.)\n3. Marshall McLuhan, *The Gutenberg Galaxy* (University of Toronto Press, 1962), preface — the \"footnote to … Innis\" passage, as quoted in Canadian Journal of Communication scholarship. Tier 1 (primary text, quoted via Tier 2). Accessed 2026-06-13. https://cjc.utppublishing.com/doi/10.22230/cjc.2020v45n2a3521\n4. \"Toronto School of communication theory,\" reference overview of Innis + McLuhan + Havelock as founders of medium theory / media eco the Patron Saint of Wired Magazine,\" *Literary Hub* (book excerpt) — Wired naming McLuhan patron saint at 1993 launch; Paglia–Brand conversation; the homage articles; Rossetto and Kelly; the secularization of McLuhan's Catholicism. Tier 5 (book excerpt / analytical). Accessed 2026-06-13. https://lithub.com/how-marshall-mcluhan-was-the-patron-saint-of-wired-magazine/\n29. \"How & Why Did Marshall McLuhan Become the 'Patron Saint' of WIRED Magazine,\" McLuhan Galaxy (specialist) — masthead detail; founders (Rossetto, Metcalfe, Stewart; backing from Jackson and Negroponte); Kelly's role; the \"St. Marshall\" article titles. Tier 5/6 (specialist blog; corroborates [28]). Accessed 2026-06-13. https://mcluhangalaxy.wordpress.com/2022/04/08/\n30. \"WIRED Magazine, Marshall McLuhan and Me,\" J. Moon (Medium/Substack) — readers unaware of McLuhan's Catholic skepticism; Kelly's \"spiritual dimension to technology\"; Rossetto's \"Digital Generation.\" Tier 6 (personal essay; used for the kept-vs-discarded framing, corroborated by [28][31]). Accessed 2026-06-13. https://moonshotj.substack.com/p/wired-magazine-marshall-mcluhan-and-me-48c8a16bb1e7\n31. C.W. Ripatrazone, *America Magazine* (as [8]) — McLuhan's 1937 conversion context, \"confront the secular … as a Christian,\" Mystical Body \"technologically a fact,\" Antichrist fear; \"their Catholicism was … structure, spirit and sustenance.\" Tier 5 (Catholic analytical press, lean disclosed). Accessed 2026-06-13.\n32. Gary Wolfe, \"The Wisdom of Saint Marshall, the Holy Fool,\" *Wired* (1996), as cited in Nicholas Carr, \"The global village of violence,\" Rough Type — McLuhan's global village as \"all-at-onceness,\" \"mass terror and sudden panic,\" not utopia. Tier 5 (Wired primary + Carr analytical). Accessed 2026-06-13. https://www.roughtype.com/?p=7096\n33. Marshall McLuhan, interview statements on the global village (\"very arduous interfaces … very abrasive situations\"; \"nationalism, xenophobia, and cultism\"), as compiled in McLuhan Galaxy, \"How technology spawned a global village — and created a world of dissension & strife.\" Tier 1 (McLuhan's own words, via Tier 5/6 compilation). Accessed 2026-06-13. https://mcluhangalaxy.wordpress.com/2017/04/23/\n34. \"The sacramental view of Marshall McLuhan, Walter Ong and James Carey\" (ResearchGate) — peer scholarship articulating the sacramental/incarnational reading shared across the Catholic-lineage trio. Tier 2. Accessed 2026-06-13. https://www.researchgate.net/publication/322361980_"}, {"order": 8, "file": "08_Drivers_And_Forces.md", "title": "Drivers & Forces: The Reputation Cycle and the Internet/Social/AI Re-reading", "summary": "", "body": "# Drivers & Forces: The Reputation Cycle and the Internet / Social / AI Re-reading\n\n## Bottom Line\n\nMarshall McLuhan's standing does not drift as the academy slowly revises it. It swings on a clock set by the arrival of new media — **a cyclical variable, not a verdict**. He soared in the 1960s because television had just arrived and the culture wanted a theorist of television; a celebrity-publicity apparatus, not a scholarly consensus, manufactured the boom. He crashed in the 1970s–80s for reasons largely independent of whether he was right: the professionalization of communication studies around an empirical, content-measuring social science that had no procedural use for an aphorist; the \"unfalsifiable / unscholarly\" verdict; the fading of the TV moment; and his death in 1980, after which the University of Toronto wound down his Centre. He revived in the 1990s–2000s because the internet made \"the global village\" and \"the medium is the message\" *look* prophetic, and because a tech-industry organ — *Wired*, which named him its \"patron saint\" at its 1993 launch — canonized him outside the academy that had rejected him. The contemporary digital and AI re-readings are real intellectual events with concrete mechanisms (the web as Wake-like non-linear \"acoustic space\"; social media as McLuhan's *abrasive*, conflict-prone retribalization; the smartphone as the literal extension-and-amputation of the nervous system; algorithmic feeds as form-over-content; generative AI as a new medium whose *form* is the message and as an extension/automation of language itself). But each is shadowed by a powerful counter-force: the empirical-social-science tradition that still has no use for him, the durable determinism critique, and the well-documented charge that the \"prescience\" is **hindsight pattern-matching** — most damningly evidenced by the spliced, misattributed \"McLuhan predicted the internet in 1962\" quotation, debunked by his own grandson. The leading driver of his future relevance is the AI re-reading; the leading counter-force is the gap between rhetorical resonance and falsifiable method.\n\n```viz\n{\n  \"type\": \"flow\",\n  \"title\": \"The reputation cycle, keyed to the arrival of each new medium\",\n  \"caption\": \"McLuhan's standing tracks the media environment more than any scholarly reassessment.\",\n  \"credit\": \"Corpus synthesis; Heer (LARB, 2016); Oxford CIH (2025)\",\n  \"steps\": [\n    \"Television arrives → 1960s boom (manufactured celebrity)\",\n    \"TV moment fades + professionalization → 1970s–80s crash\",\n    \"The internet arrives → 1990s revival; Wired 'patron saint'\",\n    \"Feeds + smartphones → 2010s platform re-reading\",\n    \"Generative AI arrives → 2020s re-reading; the open future\"\n  ]\n}\n```\n\n---\n\n## Reading Guide: Leading vs. Lagging Drivers\n\nTwo terms run throughout. A **leading driver** is one likely to dominate the *next* phase of McLuhan's reputation; a **lagging driver** is reactive — it amplifies a turn already underway but does not initiate it.\n\n- **Leading:** the AI re-reading (D7); the medium-is-the-message logic of algorithmic platforms (D5); the abrasive-global-village reading of social-media conflict (D4).\n- **Lagging:** the *Wired*/Silicon-Valley patronage (D3) — it consolidated a revival the internet's mere existence had already triggered; the smartphone extension/amputation reading (D6), which is now so culturally absorbed it reinforces rather than drives.\n- **Persistent counter-forces (neither leading nor lagging, structurally constant):** the empirical communication-science indifference (C1); the determinism critique (C2); the hindsight-bias charge (C3).\n\n---\n\n## Part I — The Boom-Bust-Revival Mechanism\n\nMcLuhan's reputation has a *shape* — up in the 1960s, down through the 1970s–80s, up again from the 1990s — and that shape tracks the **media environment** far more tightly than any scholarly reassessment of his arguments. The observation is itself McLuhanesque. The figure (McLuhan's ideas) is read against a ground (the dominant medium of the moment), and when the ground changes, the figure is reread.\n\n### Driver D1 — The Television Boom (1964–1968): \"a TV theorist when TV arrived\"\n\n**Mechanism.** McLuhan rose to fame in lockstep with television's saturation of North American life. *Understanding Media: The Extensions of Man* (1964) arrived just as a mass audience and an anxious commentariat hungered for someone to explain what the new screen in the living room was doing to them. A theorist who declared that the *medium* — not the program content — was reshaping the human sensorium was irresistible to a TV-anxious culture. Message met moment. That was the engine. [1][2]\n\n**The publicity apparatus (a crucial, under-appreciated mechanism).** McLuhan's boom was no slow scholarly diffusion. It was a *manufactured celebrity ascension*. When *Understanding Media* appeared in 1964 the Cambridge-trained literary scholar \"was not well known, even inside the academy.\" His break came in early 1965, when two San Franciscans — physician Gerald Feigen and ad-agency executive Howard Gossage — \"discovered\" McLuhan and arranged a promotional campaign, \"packaging and promoting him like a promising starlet.\" Over the next two years, extended profiles ran in *Fortune*, *Maclean's*, *Saturday Review*, *Esquire*, *Newsweek*, and *The New York Times Magazine*. By March 1967 he was on the covers of *Newsweek* and *Saturday Review* and the subject of an hour-long NBC documentary (*This Is Marshall McLuhan: The Medium Is the Message*) — all in the same month. [1][3]\n\n**Evidence it operated.** The compression is the evidence: \"over three manic years, McLuhan had shot from scholarly obscurity to klieg-lit fame.\" His ascension followed the structure of \"most celebrity ascensions\" — handlers, press agents, impresarios — not the structure of an academic reputation built on citation and peer endorsement. [1] This matters because **a reputation built by publicity is structurally fragile**. When the publicity stops and the media moment passes, no deep scholarly substrate holds it up.\n\n**Strength:** Strong as an explanation of the *boom*. Lagging as a driver of present relevance (the TV moment is gone), but the *mechanism* — new medium creates demand for a theorist of that medium — is the same engine that powers the internet and AI revivals, so the pattern is leading even though this instance is historical.\n\n### Driver D2 — The 1970s–80s Crash: professionalization, the \"unscholarly\" verdict, the fading moment, and death\n\nThe crash had at least four largely independent sub-mechanisms, which is why it was so complete. Most of McLuhan's books went out of print and his name \"disappeared from the majority of media textbooks.\" [2][4]\n\n**(a) Academic professionalization with no procedural slot for an aphorist.** Paul Lazarsfeld and the empirical \"media effects\" tradition had built American communication studies into a *methodological specialization* — *The People's Choice* (1944), *Personal Influence* (1955) — one that prized measurement, surveys, and controlled study of message content and its effects on attitudes. McLuhan's grandly historical, unmeasured, content-dismissing claims had no place in that machine. Elihu Katz later wrote that \"McLuhan's (1964) meteor has fallen by now,\" even as he tried to recover a sliver of the medium-matters insight for the empirical tradition. The discipline that was *naming itself* in exactly these years defined itself partly *against* what McLuhan represented. [5]\n\n**(b) The \"unfalsifiable / unscholarly / charlatan\" verdict.** McLuhan refused to respond to academic critics \"with systematic proof\"; his \"grandly historical scope,\" \"utopian tone,\" and the \"difficulty of translating his ideas into theory and research\" produced a decline of his influence in both academic and popular discussion. [4] The charlatan charge was made explicit: playwright and physician Jonathan Miller published a 1972 book portraying McLuhan as essentially a charlatan. [6] His \"kaleidoscopic, almost psychedelic style\" made him \"a darling of the counterculture\" but \"alienated him from his colleagues,\" who saw \"a celebrity-seeking charlatan.\" [1]\n\n**(c) The fading of the TV moment.** \"The McLuhan mania had somewhat died down by the 1970s\" as the novelty of television — the ground against which his figure had been so legible — receded into ordinary furniture. [6] When a medium stops being new, the theorist of its novelty stops being urgent.\n\n**(d) Death and institutional erasure.** McLuhan died on New Year's Eve, 1980. After his death the University of Toronto \"was quick to wind down his beloved Centre for Culture and Technology.\" [6] The death removed the charismatic performer who *was* much of the act, and the institutional wind-down removed the structure that might have carried the work forward.\n\n**Strength:** Strong and over-determined. Note the analytically important point: **(a), (c), and (d) are reasons for the crash that have nothing to do with whether McLuhan was right.** Only (b) touches the merits — and even (b) is as much about *method and manners* (refusing proof, courting celebrity) as about the truth of the claims. That is why the later revival could happen without any of the original objections being answered.\n\n### Driver D3 — The Internet Revival (1990s–2000s): the global village made flesh, and the *Wired* canonization\n\n**Mechanism — the internet made the slogans look prophetic.** When a globe-spanning, instantaneous, many-to-many electronic network arrived, two McLuhan phrases suddenly read as forecasts: **\"the global village\"** (a world re-tribalized into instantaneous electronic co-presence) and **\"the medium is the message\"** (the form of the network mattering more than any content it carried). Internet developers and theorists \"recognized in McLuhan's concepts a blueprint for understanding their emerging medium.\" [7] The revival turned McLuhan into \"the spin doctor for the digital revolution... the prophet and patron saint of business on the internet.\" [8]\n\n**Mechanism — extra-academic canonization by *Wired*.** Crucially, the rehabilitation did **not** come from the academy that had dropped him. It came from the tech industry's house organ. When *Wired* launched in 1993 it named McLuhan its \"patron saint\" and put his name on the masthead. [7][8] This bypassed the empirical-communications discipline entirely. Silicon Valley re-canonized him; communication scholars did not.\n\n**Evidence it operated.** Paul Levinson's *Digital McLuhan: A Guide to the Information Millennium* (Routledge, 1999) is the load-bearing scholarly artifact of the revival: Levinson, who had worked with McLuhan in the 1970s, argued chapter by chapter that \"McLuhan's theories about media are more important to us today than when they were first written,\" and that \"the *Wired* generation is now turning to McLuhan's work to understand the global village in the digital age.\" [9][10] Levinson noted the deep puzzle the internet poses for McLuhanites: McLuhan held that the content of any medium is an older medium — and the internet \"takes for its content every other existing medium,\" since once digitized, print, audio, and video all flow over the same network. [10]\n\n**Strength:** Strong as the explanation of the *revival*. But this is a **lagging driver** of present relevance: *Wired*'s patronage consolidated and publicized a revival the internet's mere existence had already triggered. The deep driver was the network; *Wired* was the amplifier. The revival also imported a distortion — Silicon Valley read the global village as a *utopian* connectivity story, which (see C3 and Part II) McLuhan himself explicitly rejected.\n\n---\n\n## Part II — The Mechanisms of Digital-Age Relevance\n\nThe revival is not only a sociological fact about *Wired* mastheads. A substantive case holds that specific McLuhan concepts map onto specific features of the digital environment. These are the live, *leading* drivers of his continued relevance. Each comes with its mechanism, its evidence, and one caveat: the mapping can be hindsight (developed fully in C3).\n\n### Driver D4 — Social media as retribalization and the *abrasive* global village\n\n**Mechanism.** This is the strongest and most under-appreciated of the digital mappings, because it inverts the utopian reading. McLuhan did **not** describe the global village as harmonious. He described a place \"of very arduous interfaces and very abrasive situations.\" Pressed on whether closeness breeds affinity, he said there was \"no evidence of that in any situation that we've ever heard of,\" and that \"when people get close together, they get more and more savage and impatient with each other.\" [11] His concept of *retribalization* predicted not unity but a return to tribal intensity — and, in *War and Peace in the Global Village* (1968), \"increasing war and other forms of conflict\" and \"cross-cultural misunderstanding.\" [11]\n\n**Why this maps onto social media.** Platform-mediated proximity does not produce the village green. It produces flame wars, dunking, pile-ons, and exclusive engagement with \"highly particularized tribes,\" where deep engagement gives way \"to memes and clips, slogans and knockdowns.\" [11] The pessimistic McLuhan — \"all-at-onceness\" carrying \"mass terror and sudden panic\" — describes Twitter/X better than the optimistic *Wired* McLuhan ever could. [11][12]\n\n**Evidence it operated.** The abrasive-village quotations are well attested across multiple independent secondary discussions, and *Wired*'s own Gary Wolf noted in 1996 that \"McLuhan did not want to live in the global village\" and saw it as a condition of all-at-onceness carrying risk of panic. [12] Here the *prophecy* and the *pessimism* both fit — a rare pairing that strengthens the mapping against the hindsight charge (C3), since a hindsight reading would more naturally cherry-pick the optimistic line.\n\n**Strength:** Strong and **leading**. The mechanism is specific, the prediction was on record before the phenomenon, and the fit is uncomfortable rather than flattering.\n\n### Driver D5 — Algorithmic feeds and \"the medium is the message\" over content\n\n**Mechanism.** McLuhan's central slogan holds that a medium's effect comes from \"the change of scale or pace or pattern\" it introduces into human affairs, not from its content. [13] The algorithmic feed is a near-laboratory case. TikTok's \"For You Page\" and its imitators decide what a user sees by predicted attention-capture \"regardless of whether they follow the source,\" replacing chronological, network-based feeds with an attention-maximizing form. The *form* — short, autoplaying, infinitely scrolling, algorithmically sorted — shapes cognition and behavior independent of any particular video. [13]\n\n**Evidence it operated.** Commentators applying McLuhan to short-form video argue the bite-sized, addictive *form* drives engagement and reshapes attention spans irrespective of content; the shift \"from network to algorithm\" is itself a change in the medium that changes the message. [13] Note tier: much of this specific commentary is Tier 5–6 analytical/opinion, used here as evidence of how the McLuhan frame is being *applied*, not as proof the cognitive effects are measured.\n\n**Strength:** Moderate-to-strong and **leading**. The mechanism is clean and the platform design is documented; the cognitive-effect claims are weaker (they edge into the empirical territory where C1 bites).\n\n### Driver D6 — The smartphone as the literal \"extension of man,\" its amputation, and the Narcissus numbing\n\n**Mechanism.** McLuhan held that \"all media are extensions of some human faculty — psychic or physical,\" and that every extension entails a corresponding **amputation** and a **numbing** (\"narcosis\"). In *Understanding Media*'s chapter \"The Gadget Lover: Narcissus as Narcosis,\" he reread the Narcissus myth: Narcissus was numbed not by self-love but by failing to recognize his own *extension* (his reflection) as himself. The extension \"produces a generalized numbness or shock that declines recognition.\" [14]\n\n**Why this maps onto the smartphone.** The smartphone is the most literal extension of the nervous system yet built — memory, navigation, social connection, and attention all externalized into the device — and it produces exactly the predicted numbing: users so fused with the device that they \"do not realize these smartphones are extensions of their own selves,\" such that to discard one \"would be a form of total suicide.\" The selfie is Narcissus narcosis made into a UI. [14] The *amputation* thesis goes further: as the phone extends memory and navigation, the corresponding faculties wither. [15]\n\n**Strength:** Strong as a *frame*, but **lagging** as a driver. The extension/amputation reading is now so culturally absorbed (it underwrites a whole genre of digital-wellbeing discourse) that it reinforces McLuhan's relevance rather than newly driving it. The atrophy/amputation claim is also where the determinism critique (C2) and the empirical-evidence gap (C1) press hardest — \"amputation\" is evocative but hard to operationalize and measure.\n\n---\n\n## Part III — The AI Re-reading (the Leading Driver of Future Relevance)\n\nA new medium has arrived, and on the D1 pattern it generates fresh demand for a theorist of new media. Generative AI is that medium, and McLuhan is the obvious candidate. This is the **single most important leading driver** of his trajectory to ~2040, because it is the live frontier where the frame is being applied right now.\n\n### Driver D7 — Generative AI as a medium whose *form* is the message; LLMs as the extension/automation of language itself\n\n**Mechanism (medium over message).** The McLuhan move is to ignore what any given AI output *says* and ask what the *medium of generative AI* does to human affairs. On this reading, the message of AI is not its essays or images but the **structural change** of outsourcing cognition and language production to a tireless externalized interface — the collapse of \"the gap between stimulus and response,\" the externalization of \"the thinking mind itself into an interface.\" [16][17]\n\n\n**Mechanism (extension/automation of language).** Where print extended the eye and the telegraph extended the nervous system, the LLM extends — and *automates* — language and thought themselves, the faculties McLuhan treated as most human. McLuhan reportedly warned that humans would suffer \"a loss of language\" by delegating cognitive capacities to tools, which reads as a forecast of exactly this delegation. [18] (Caveat: this specific attribution is single-sourced to a secondary article and should be treated as paraphrase, not verified quotation — see Open Questions.)\n\n**What the tetrad would \"predict\" for AI.** McLuhan's *Laws of Media* (the tetrad, formalized with Eric McLuhan in the posthumous 1988 book) ask of any artifact: what does it **enhance**, **obsolesce**, **retrieve**, and **reverse** into at the extreme? Applied to generative AI by several recent commentators, the tetrad yields a strikingly coherent map:\n\n| Law | AI tetrad reading | Source |\n| --- | --- | --- |\n| **Enhances** | Speed/efficiency of language and content generation; \"linguistic productivity, access to knowledge, simulation of human conversation\" | [16][17] |\n| **Obsolesces** | Individual writing style and distinctive voice; memorization and rote learning; traditional search; expert gatekeeping; \"genuine silence and mental stillness\" | [16][17] |\n| **Retrieves** | Pre-literate oral/dialogic forms — \"the sage, the oracle, the dialogue partner,\" the Socratic method; the scribe, now \"instant and tireless\"; standardized oral expression and groupthink | [16][17] |\n| **Reverses into** | At the extreme: \"epistemic confusion, dependency, and simulated reality\"; \"semantic collapse, where... meaning itself decays\"; and, dialectically, a renewed human demand for the analogue, for introspection, and for \"values, ethics, consciousness, and meaning\" | [16][17] |\n\n**Evidence it operated.** The applications are numerous, recent, and span outlets: Jaqueline McLeod Rogers (University of Winnipeg) applied the tetrad to generative AI in *The Tyee* (2024); peer-reviewed and library-science venues (e.g., a 2024 *Theological Librarianship* article on \"AI Through McLuhan's Tetrad of Media Effects\") have done the same; and a body of analytical/opinion writing (Tier 5–6) maps the tetrad onto LLMs. [16][17][18] The *density and recency* of these applications is itself the evidence that AI is reactivating the McLuhan frame.\n\n**Strength:** Strong and **leading** — this is the driver most likely to determine whether the revival hardens into canon by 2040. **Important honesty flag:** the tetrad's flexibility is also its vulnerability. Because any artifact can be slotted into enhance/obsolesce/retrieve/reverse, the framework's \"predictions\" for AI are better read as a *productive interpretive grid* than as falsifiable forecasts — which is exactly the determinism-adjacent and unfalsifiability critique (C2, C3) reasserting itself at the frontier.\n\n---\n\n## Part IV — Counter-Forces\n\nFor every driver pushing McLuhan's relevance up, a force pushes it down. These are largely **persistent** rather than leading/lagging — structural features of the intellectual landscape that constrain how far any revival can go.\n\n### Counter-force C1 — The empirical-social-science turn that has no use for him\n\n**Mechanism.** Mainstream communication research, built on the Lazarsfeld–Katz empirical \"media effects\" tradition, studies measurable effects of message content via surveys, experiments, and statistics. McLuhan's program — historical, sensory, content-dismissing, unmeasured — is *methodologically incompatible* with it. The discipline's professional reward structure (peer-reviewed quantitative work, replicable findings) gives no procedural credit for aphorisms, however suggestive. Katz's verdict that McLuhan's \"meteor has fallen\" is the tradition's epitaph for him; even attempts to recover the \"medium matters\" insight do so by *rewriting* it into empirical form. [5]\n\n**Why this caps the revival.** The *Wired* canonization (D3) re-installed McLuhan in tech culture and media-ecology circles, but **not** in the empirical mainstream of communication science. His standing is split: celebrated in cultural-studies, media-ecology, and humanities lineages; still largely absent from the social-science textbooks and methods courses. A revival that never touches the empirical core has a ceiling.\n\n**Strength:** Strong and structurally permanent. This is the deepest constraint on any \"McLuhan was right all along\" narrative.\n\n### Counter-force C2 — The determinism critique\n\n**Mechanism.** McLuhan is the textbook example of *technological determinism* — the charge that he treats media as autonomous forces that reshape society in a \"single-factor and unidirectional\" way, ignoring \"the content, purpose, and context of particular messages.\" [2][4] **Raymond Williams** made the politically pointed version: if the medium's effect is the same regardless of who controls it, then there is \"no point\" in critiquing the power structures and elites that own and shape media — a position Williams found both wrong and quietist, and for which he labeled McLuhan a \"technological determinist\" who disregarded the historical and economic development of technology. [19]\n\n**The defense (for balance).** Defenders (notably Robert K. Logan and other media ecologists) argue the charge is overstated, holding that McLuhan was at most a **soft determinist**: technology is \"one of many contributing factors,\" not the sole cause, and the formula most often quoted to make the point — \"we shape our tools and thereafter our tools shape us\" (in fact John Culkin's 1967 gloss on McLuhan, itself adapting a 1943 line of Churchill's, not McLuhan's own sentence) — describes an *interactive* loop, not one-way causation. On this reading the media are \"intersubjective,\" not mere machine-objects that dictate behavior. [19][20] (Note: the primary Logan defense, *McLuhan Misunderstood*, 2011, could not be machine-read from its PDF for this document; the soft-determinism framing is corroborated from multiple secondary discussions — see Open Questions.)\n\n**Strength:** Strong and persistent — but contested, with a live and reasonable defense. The determinism charge is the single most durable academic objection and will not dissolve, but it has been argued to a draw rather than a knockout.\n\n### Counter-force C3 — \"The prescience is hindsight pattern-matching\"\n\nThis is the most important counter-force for the forecast, because it attacks the very thing the revival is built on: the claim that McLuhan *saw it coming*.\n\n**Mechanism.** McLuhan's slogans are gnomic and abundant, and an abundant, ambiguous corpus can be retro-fitted to almost any later development — keep the lines that fit, ignore the rest. *Wired*'s own Gary Wolf observed that McLuhan's \"slogans circulate because they are snappy but also because they have never been understood,\" and that McLuhan himself disclaimed prediction: \"I have no theories whatever about anything. I make observations by way of discovering contours, lines of force, and pressures.\" [12] A man who insists he has no theories cannot easily be credited with verified forecasts.\n\n**The smoking gun — the spliced \"internet prediction.\"** The most-cited \"proof\" that McLuhan predicted the internet — a passage supposedly from *The Gutenberg Galaxy* (1962) — is a **fabricated composite**. Its first half comes from a 1967 article (\"The Invisible Environment: The Future of an Erosion,\" *Perspecta*); its second half from a 1989 posthumous dialogue (*The Global Village*, with Bruce Powers). Neither is from 1962, and they are from different decades stitched together. The debunking comes from inside the family: **Andrew McLuhan, Marshall's grandson**, who treats the spliced quote as a cautionary tale of \"intellectual carelessness\" that *undermines* his grandfather's genuine legacy by forcing correction rather than letting the real work stand. Andrew traced the spliced version back at least as far as a 2009 biography of his grandfather, while professing uncertainty about where the splice first originated. [21]\n\n**Why this is decisive evidence the counter-force is operating.** The single most viral artifact of McLuhan's \"prophecy\" is demonstrably manufactured by later hands. That does not make his ideas worthless — many of the mappings in Part II are genuine and were on record before the phenomena — but it proves the *prophecy industry* around him runs partly on hindsight, retro-fitting, and outright misquotation. Honest McLuhan advocacy must concede this. [21]\n\n**Strength:** Strong and persistent. The hindsight charge is the correct skeptical default for any \"X predicted Y\" claim, and in McLuhan's case it has a documented, family-sourced exhibit. **The discipline this imposes on the forecast:** distinguish the genuine *before-the-fact* mappings (the abrasive global village, D4, was on record; the extension/amputation logic, D6, was a stated general law) from the *after-the-fact* retro-fits (much of the \"he predicted the specific internet/AI\" rhetoric).\n\n---\n\n## Synthesis: The Driver Stack the Forecast Should Lift\n\n| ID | Driver / Counter-force | Direction | Mechanism (one line) | Strength | Leading/Lagging |\n| --- | --- | --- | --- | --- | --- |\n| D1 | New-medium-creates-demand-for-its-theorist | ↑ | Each new medium (TV, web, AI) generates appetite for a media theorist; McLuhan is the default | Strong | Pattern is leading; TV instance historical |\n| D2 | 1970s–80s crash | ↓ (historical) | Professionalization + unscholarly verdict + fading TV moment + death/erasure | Strong, over-determined | Historical |\n| D3 | Internet revival + *Wired* patronage | ↑ | Global village/medium-is-message looked prophetic; tech industry canonized him extra-academically | Strong | Lagging (amplifier) |\n| D4 | Social media = abrasive retribalization | ↑ | McLuhan's *pessimistic* village (savagery, conflict) fits platform dynamics; on-record before the fact | Strong | **Leading** |\n| D5 | Algorithmic feeds = medium over content | ↑ | Feed *form* (short, autoplay, algorithmic) shapes cognition independent of content | Moderate–strong | **Leading** |\n| D6 | Smartphone = extension/amputation/narcosis | ↑ | Literal nervous-system extension producing numbing and faculty atrophy | Strong frame | Lagging (absorbed) |\n| D7 | Generative AI = form-is-message + automation of language; tetrad grid | ↑ | New medium reactivates the frame; tetrad maps enhance/obsolesce/retrieve/reverse onto AI | Strong | **Leading (dominant)** |\n| C1 | Empirical communication science | ↓ | Methodologically incompatible; caps revival outside humanities/media-ecology | Strong | Persistent |\n| C2 | Determinism critique (Williams) | ↓ | Single-factor causation ignores power/content/context; defended as soft determinism | Strong, contested | Persistent |\n| C3 | Hindsight pattern-matching | ↓ | Abundant ambiguous corpus retro-fitted; spliced \"internet prediction\" debunked by grandson | Strong | Persistent |\n\n**The net read for the forecast:** McLuhan's relevance through 2040 is driven *up* primarily by the AI re-reading (D7) and the abrasive-village/feed-form readings (D4, D5), and held *down* primarily by the unbridgeable gap to empirical social science (C1) and the legitimate hindsight discount (C3). Expect a *bifurcated* future: durable, even rising, canonical status in humanities, media-ecology, and tech-culture lineages, alongside continued near-absence from empirical communication science. One question decides the rest. Either the AI moment hardens the revival into something the next academic generation treats as settled, or AI's novelty fades (à la D2) and takes a thinned McLuhan revival down with it. That is the forecast question this workstream hands forward.\n\n---\n\n## Open Questions\n\n1. **Does the AI revival have staying power, or is it a second TV-moment that will fade?** The D1/D2 pattern warns that revivals tied to a medium's *novelty* recede when the medium becomes ordinary. Will McLuhan's AI relevance outlast AI's novelty?\n2. **Can the tetrad ever be made falsifiable, or is its flexibility permanent?** Its applicability to *any* artifact is both its appeal and the core of the C2/C3 critique. Is there a version of the Laws of Media that makes testable predictions?\n3. **Is the soft-determinism defense (Logan) sufficient, or does it concede the critique's substance?** The primary Logan text (*McLuhan Misunderstood*, 2011) could not be directly machine-read here; a direct reading is needed to assess whether the defense rebuts Williams or merely softens the framing.\n4. **How load-bearing is the (single-sourced) \"loss of language\" AI attribution?** The claim that McLuhan warned of a \"loss of language\" from delegating cognition to tools needs verification against a primary text before it can anchor the AI re-reading.\n5. **Will empirical communication science ever re-absorb a measurable version of \"the medium matters\"?** Katz gestured at it; neuroscience/attention research could supply the missing empirics. If it does, does that vindicate McLuhan or replace him?\n6. **Who created the spliced \"internet prediction\" quote, and how did it propagate?** Andrew McLuhan himself professes uncertainty about its origin — a small but telling case study in how a reputation's \"evidence\" can be manufactured.\n\n---\n\n## Sources\n\n1. Jeet Heer / *Los Angeles Review of Books* (publisher) — \"How to Become a Famous Media Scholar: The Case of Marshall McLuhan,\" 2016. Tier 5 (analytical literary review). Direct fetch blocked (HTTP 403); content corroborated via LARB-mirroring summary and McLuhan Galaxy repost, https://mcluhangalaxy.wordpress.com/2016/12/20/how-to-become-a-famous-media-scholar-the-case-of-marshall-mcluhan/ . Accessed 2026-06-13. Contribution: the manufactured-celebrity boom mechanism, the Feigen/Gossage publicity campaign, the 1967 *Newsweek*/*Saturday Review*/NBC fame compression, the charlatan reception.\n2. Britannica, \"Global village | McLuhan Theory,\" https://www.britannica.com/topic/global-village . Tier 2 (expert-authored reference). Accessed 2026-06-13. Contribution: TV-moment framing; determinism critique summary.\n3. IMDb / general record, \"This Is Marshall McLuhan: The Medium Is the Massage\" (NBC Experiment in Television, 1967), https://www.imdb.com/title/tt1417150/ . Tier 5 (database, used only for the documentary's existence/date, cross-checked against [1]). Accessed 2026-06-13. Contribution: corroborates the 1967 NBC documentary.\n4. *Encyclopedia.com* (citing the *Encyclopedia of Education* / scholarly biographical entry), \"Marshall McLuhan,\" https://www.encyclopedia.com/people/social-sciences-and-law/education-b
