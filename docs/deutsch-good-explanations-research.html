cade. If I had to compress the whole forecast to one sentence: bet on the philosophy, watch the physics, and hold the AI question genuinely open.\n\nThere is an irony here that the corpus has earned the right to name, because it is not decoration — it is the thesis turning on itself. By Deutsch's own criterion, the parts of his legacy most likely to endure are the ones that are *hardest to vary*. The epistemology survives because its pieces lock together: you cannot pull out fallibilism, or error-correction, or the reach of good explanations, without the rest of the structure buckling. There is little slack in it to revise, and that rigidity is precisely its strength. The physics, by contrast, is still searching for the single observation that would make it hard to vary — the result that standard physics cannot accommodate and constructor theory predicts. Until that observation arrives, the program remains easy to revise, easy to reinterpret, easy to set gently aside. Deutsch told us how to tell a good explanation from a bad one. The most reliable prediction in this entire forecast is that his own legacy will obey the rule he discovered."}, {"order": 9, "file": "Key_Claims.md", "title": "Key Claims — Verification Ledger", "summary": "Every claim with its verification tier (adversarially verified / researched / synthesis) and challenges, plus the two refuted claims.", "body": "# Key Claims — Verification Ledger\n\nThis corpus was built in two passes, and its claims carry two different verification tiers. Read the tier before you lean on a claim.\n\n- **Tier A — Adversarially verified.** Extracted by a deep-research harness and put through 3-vote adversarial verification (a claim needed ≥2 of 3 skeptics to *refute* it to be killed). 25 claims verified; 23 confirmed, 2 killed. These are the philosophical spine.\n- **Tier B — Single-pass researched.** Gathered by targeted research agents to fill the applied workstreams (everyday, CTV, theology, institutions). Each is cited to a real source but was **not** put through adversarial voting. Treat as well-sourced, not bulletproof.\n- **Tier C — Corpus synthesis.** The corpus's own reasoning or framing (e.g., the Deutsch→CTV mapping, the classical-theism steelman). Flagged inline throughout; listed here for honesty.\n\nA universal caveat: claims of the form \"Deutsch argues X\" are **attributional** — faithfully reporting his position, which is *not* the same as his being right. Where his position is itself contested, that is noted.\n\n---\n\n## Tier A — Adversarially verified (the philosophy)\n\n**A1 · The central criterion.** A good explanation is *hard to vary* while still accounting for what it explains; every detail plays a functional role; easy variability is the mark of a bad explanation; \"the truth consists of hard-to-vary assertions about reality.\" Quality = surviving all current criticism (hence having no surviving rival), not proof or justification.\n*Type: attributional · Confidence: HIGH · Vote: 5 merged claims, all 3-0 · Sources: nav.al, tim.blog, blog.ted.com*\n\n**A2 · The worked examples.** BAD/easy-to-vary: the Greek-myth seasons (Demeter/Persephone — the myth \"could have easily varied\" to fit Australian seasons) and Kipling's elephant (\"substitute the whole basis of the story\"). GOOD/hard-to-vary: Earth's axial tilt, where any challenged detail \"would affect everything about the theory.\"\n*Type: attributional · Confidence: HIGH · Vote: 2 merged, both 3-0 · Sources: tim.blog, blog.ted.com · Note: the \"spring as revenge vs blessing\" gloss is a paraphrase, not Deutsch's verbatim example.*\n\n**A3 · Conjecture + criticism; fallibilism without relativism.** All new knowledge (human or otherwise) is created by creative conjecture interleaved with creative criticism (error-correction); there is no inductive derivation from evidence. Fallibilism does *not* abandon truth — through conjecture, reason, and criticism, successive theories become \"objectively truer.\" Even the goals of inquiry are conjectures.\n*Type: attributional · Confidence: HIGH · Vote: 5 merged, all 3-0 · Sources: Possible Minds essay (daviddeutsch.org.uk), takingchildrenseriously.com, blog.ted.com*\n\n**A4 · Anti-Bayesianism.** Deutsch classifies Bayesian epistemology as \"a species of inductivism… just the name of a mistake\"; invokes the Popper–Miller result that adding non-implied explanatory content *lowers* a theory's probability; and argues Bayesian updating \"cannot generate novel guesses… only fine-tune or choose among existing ones.\"\n*Type: attributional · Confidence: HIGH (that he argues this) · Vote: 3 merged, all 3-0 · Sources: josephnoelwalker.com, Possible Minds, Simple-refutation essay · **Contested:** the Popper–Miller theorem is heavily disputed in philosophy of science — see Tier B and Chapter 03.*\n\n**A5 · Popper lineage and divergence.** Critical rationalism was built to describe science *without* induction (treated as unnecessary by design); Popper held knowledge grows by refuting conjectures and replacing them; his demarcation rests on refutability — but falsifiability alone is insufficient, which is the gap \"hard to vary\" fills.\n*Type: attributional/historical · Confidence: HIGH · Vote: 3 merged, all 3-0 · Sources: IEP, SEP, arXiv 2012.09318 · Note: whether Popper *succeeded* in eliminating induction is itself disputed (Norton; Putnam).*\n\n**A6 · Naval Ravikant as principal popularizer.** Credits the hard-to-vary concept as \"upgraded my thinking more than almost anything else\"; demonstrates it (Persephone vs axial tilt); used the framework to redefine wealth.\n*Type: factual · Confidence: HIGH · Vote: 3-0 · Source: tim.blog (Ferriss #662) · Note: the only verified anchor for the entire everyday-toolkit workstream — broader Tier-B material expands it.*\n\n**A7 · AI/AGI and \"reach.\"** Current deep-learning systems struggle to extrapolate beyond training data; Deutsch attributes a theory's \"reach\" (extrapolation to never-observed cases) to its being hard-to-vary; building a system that *generates* hard-to-vary explanations is framed as a key unsolved prerequisite for AGI.\n*Type: attributional/empirical · Confidence: HIGH (sub-claim on \"reach\" passed 2-1) · Source: arXiv 2012.09318 (Elton, Cognitive Systems Research) · **Time-sensitive:** the 2020 \"AI can't extrapolate\" premise is more contested in 2026; Deutsch's thesis is directly challenged (Dwarkesh Patel).*\n\n**A8 · CTV measurement — experiments beat correlation.** Predicted Incrementality by Experimentation (PIE) achieves out-of-sample **R²=0.88** for incremental conversions per dollar vs **R²=0.19** for 7-day last-click, across **2,226** Meta experiments.\n*Type: empirical · Confidence: HIGH (figures exact) · Vote: 3-0 · Source: arXiv 2304.06828 (Gordon, Moakler, Zettelmeyer) · Caveats: Meta data/co-author; authors warn against generalizing to other platforms.*\n\n---\n\n## Killed claims (refuted 1-2 — kept for transparency)\n\n**K1 · \"Deutsch defines a good explanation *operationally via refutation* — the standard is met when rivals' underlying assumptions are argued away.\"** *Refuted (1-2).* Overreads the source; the criterion is about hard-to-vary content, not a refutation procedure. Source: josephnoelwalker.com.\n\n**K2 · \"PIE maps *directly* onto Deutsch's predictive-vs-explanatory distinction.\"** *Refuted (1-2).* PIE is an ML model trained on experimental ground truth — closer to a correlation-extender anchored to causal truth than a Deutschian explanatory theory. **This is why Chapter 05 uses PIE as illustration, not proof.** Source: arXiv 2304.06828.\n\n---\n\n## Tier B — Single-pass researched (the applications)\n\n**B1 · Classical/Thomistic theism as the real hard-to-vary steelman.** Feser's classical theism (divine simplicity, God as Pure Act) is structurally non-tweakable — deny simplicity and God becomes composite → caused → not God.\n*Confidence: MEDIUM · Sources: edwardfeser.blogspot.com, iep.utm.edu/divine-simplicity · Note: the application to Deutsch is **Tier C** (corpus reconstruction); no theologian makes it by name.*\n\n**B2 · Deutsch rejects BOTH fine-tuning AND the anthropic rebuttal.** In BoI's \"Creation\" chapter, anthropic reasoning \"cannot explain the fine-tuning\" and design is equally a bad (easy-to-vary) explanation. His Everett multiverse is *quantum*, not the cosmological string-landscape multiverse of fine-tuning debates.\n*Confidence: MEDIUM-HIGH · Source: publicism.info/science/infinity/5.html (BoI ch.5)*\n\n**B3 · The Swinburne–Deutsch clash.** Swinburne's natural theology is explicitly Bayesian (simplicity → high prior → Bayes favors God); Deutsch rejects the entire Bayesian machinery, so would dismiss it before reaching God.\n*Confidence: MEDIUM · Sources: en.wikipedia.org (Existence of God), arXiv 0811.0630*\n\n**B4 · Bartley's tu quoque and pancritical rationalism.** The apologist's \"you too\" — the rationalist also ends in an unjustified commitment to reason; Bartley's escape decouples criticism from justification. Critics say it smuggles justificationism back in.\n*Confidence: MEDIUM · Sources: Wikipedia (Pancritical rationalism, Bartley), cantab.net/Diller, FIU/Hauptli*\n\n**B5 · The reach/induction critique (Norton).** Trusting a hard-to-vary theory about unobserved cases is an inductive commitment relabeled; Norton's material theory of induction undercuts both universal induction and content-based \"reach.\"\n*Confidence: MEDIUM-HIGH (a strong, named objection) · Sources: memeinnovation, sites.pitt.edu/jdnorton*\n\n**B6 · The Bayesian rebuttal to Popper–Miller.** Bayesians (Eells, Howson) accept the algebra but reject the interpretation; the h←e decomposition \"has been almost uniformly rejected\"; explanatory virtues can be cashed out as priors/likelihoods (Dellsén, Sober).\n*Confidence: MEDIUM-HIGH · Sources: fitelson.org/Eells, philpapers.org, philsci-archive/Dellsén*\n\n**B7 · Constructor theory is under-adopted, not refuted.** Little independent uptake; literature proponent-dominated; honest verdict is \"not yet empirically distinguishable from standard physics.\" Live tests exist (Bose–Marletto–Vedral).\n*Confidence: MEDIUM-HIGH · Sources: Wikipedia, Quanta, Physics World*\n\n**B8 · The Everett Born-rule problem.** The deepest unresolved issue for many-worlds; the Deutsch–Wallace decision-theoretic derivation faces the circularity objection.\n*Confidence: MEDIUM-HIGH · Source: plato.stanford.edu/qm-manyworlds*\n\n**B9 · Politics as error-correction; the FPTP defense.** Popper's \"remove bad rulers without violence\" reframing; Deutsch calls plurality voting \"the most error-correcting\" system — **contested**; critics say institutional context, not ballot formula, dominates.\n*Confidence: MEDIUM (the reframing) / the FPTP conclusion is contested · Sources: SEP, IEP, Marginal Revolution, vmasrani, informationknoll*\n\n**B10 · The impossibility of prophecy.** Popper's Poverty of Historicism: you can't predict the growth of knowledge, so long-range social/economic prophecy is pseudo-scientific. Hayek resonance (dispersed knowledge), with Deutsch emphasizing knowledge *creation* over *transmission*.\n*Confidence: MEDIUM-HIGH · Sources: Wikipedia, SEP, Econlib, Quillette*\n\n**B11 · Contested climate optimism.** Deutsch ranks geoengineering > adaptation > emissions cuts and attacks \"sustainability\" as stagnation; critics flag moral hazard and irreversibility, and note \"wait for better knowledge\" can itself be unfalsifiable.\n*Confidence: MEDIUM (his position) / explicitly contested · Sources: Scientific American, Warp News, jrleahenry*\n\n---\n\n## Tier C — Corpus synthesis (flagged, not sourced findings)\n\n- The **Swap Test** name and the \"make being-wrong cheap\" decision rule (Chapter 04).\n- The **Deutsch → CTV measurement mapping** in its entirety (Chapter 05, Part 2) — a lens, not a literature result; see K2.\n- The **classical-theism-as-hard-to-vary** application to Deutsch (Chapter 06) — the corpus's reconstruction.\n- The reading of **viral misinformation as selected-for easy-to-vary virtue** (Chapter 07).\n- The closing **\"the durable parts of Deutsch are the hardest to vary\"** irony (Future Trajectory)."}, {"order": 10, "file": "Sources.md", "title": "Sources", "summary": "Annotated source list by tier and topic — primary Deutsch, scholarly, secondary, community, and vendor.", "body": "# Sources\n\nOrganized by tier and topic. Quality tags: **[primary]** = Deutsch's own words or texts; **[scholarly]** = peer-reviewed / authoritative reference; **[secondary]** = serious journalism or expert commentary; **[community]** = blog / podcast / forum; **[vendor]** = industry source with commercial interest (treat with care). Where a source is weak or a page failed on refetch, it is noted.\n\n## Primary — Deutsch's own words and texts\n\n- [TED, \"A new way to explain explanation\" — transcript](https://www.ted.com/talks/david_deutsch_a_new_way_to_explain_explanation/transcript) and [TED blog summary](https://blog.ted.com/david_deutsch_a/) — **[primary]** the canonical statement of hard-to-vary, the seasons example, \"truth consists of hard-to-vary assertions.\"\n- [Tim Ferriss Show #662 — Deutsch & Naval, transcript](https://tim.blog/2023/03/24/david-deutsch-naval-ravikant-transcript/) ([episode page](https://tim.blog/2023/03/23/david-deutsch-naval-ravikant/)) — **[primary]** \"can't be easily varied and still account for the same thing\"; the elephant; \"good explanations begin with bad explanations\"; wealth as transformations.\n- [Naval Ravikant interview with Deutsch (nav.al)](https://nav.al/david-deutsch) — **[primary]** \"hard to vary because it was hard to come by\"; meets-all-current-criticisms.\n- [Deutsch, \"Beyond Reward and Punishment\" (Possible Minds essay, PDF)](https://www.daviddeutsch.org.uk/wp-content/uploads/2019/07/PossibleMinds_Deutsch.pdf) — **[primary]** conjecture+criticism, fallibilism, \"no criterion of truth,\" anti-Bayesian \"creativity is needed.\"\n- [Deutsch, \"Simple refutation of the Bayesian philosophy of science\"](https://www.daviddeutsch.org.uk/wp-content/uploads/2019/07/Simple-refutation-of-the-Bayesian-philosophy-of-science.html) — **[primary]** his 2014 anti-Bayesian essay.\n- [Joe Walker (Jolly Swagman) #139 — \"Against Bayesianism,\" Deutsch interview](https://josephnoelwalker.com/139-david-deutsch/) — **[primary]** \"a species of inductivism… just the name of a mistake\"; the Popper–Miller lean.\n- [Taking Children Seriously and Fallibilism](https://takingchildrenseriously.com/taking-children-seriously-and-fallibilism/) — **[primary]** (Deutsch-co-authored project) truth approachable through conjecture/reason/criticism.\n- [The Beginning of Infinity, ch. 5 \"Creation\" (full text)](https://publicism.info/science/infinity/5.html) — **[primary]** rejects both the design argument and anthropic selection as bad explanations.\n- [Deutsch, TEDGlobal 2005 transcript](https://www.daviddeutsch.org.uk/videos/tedglobal-2005-transcript/) — **[primary]** \"problems are inevitable… problems are soluble.\"\n- [Conversations with Tyler — Deutsch (Marginal Revolution)](https://marginalrevolution.com/marginalrevolution/2021/06/my-conversation-with-the-very-very-smart-david-deutsch.html) — **[primary]** FPTP as \"most error-correcting\"; the Hayek-distancing remark.\n- [The Cite Site — Deutsch, *Beginning of Infinity* quotes](https://thecitesite.com/authors/david-deutsch/source/the-beginning-of-infinity/) — **[community]** reliable for verbatim BoI phrasing.\n\n## Scholarly — epistemology, physics, critiques\n\n- [Elton, \"Applying Deutsch's concept of good explanations to AI and neuroscience\" (arXiv 2012.09318)](https://arxiv.org/abs/2012.09318) — **[scholarly]** Cognitive Systems Research 2021; \"reach,\" AGI needs hard-to-vary explanations; also formalizes HTV vs Occam/bias–variance.\n- [Karl Popper — Internet Encyclopedia of Philosophy](https://iep.utm.edu/karl-popper-critical-ratiotionalism/) and [Popper — Stanford Encyclopedia](https://plato.stanford.edu/entries/popper/) — **[scholarly]** conjecture-and-refutation, demarcation, falsifiability-alone-insufficient.\n- [Norton, \"A Material Theory of Induction\" (PDF)](https://sites.pitt.edu/~jdnorton/papers/material.pdf) — **[scholarly]** the strongest \"reach smuggles induction back in\" line of attack.\n- [Eells, \"On the Alleged Impossibility of Inductive Probability\" (PDF)](http://fitelson.org/probability/eells_pm.pdf) — **[scholarly]** the Bayesian rebuttal to Popper–Miller.\n- [Popper philosophy of probability — PhilPapers bibliography](https://philpapers.org/browse/popper-philosophy-of-probability) — **[scholarly]** documents that the h←e decomposition is \"almost uniformly rejected.\"\n- [Intellectual Mathematics — the Popper–Miller argument](https://intellectualmathematics.com/blog/the-popper-miller-argument-against-probabilistic-induction/) and [Giordano — \"the Bayesian transitivity paradox\"](https://rgiordan.github.io/posts/2022-10-19-popper_miller.html) — **[community]** clear derivations and deflations.\n- [Dellsén, \"Can there be a Bayesian explanationism?\" (PhilSci)](https://philsci-archive.pitt.edu/13438/7/Can%20There%20Be%20A%20Bayesian%20Explanationism%20On%20the%20Prospects%20of%20a%20Productive%20Partnership.pdf) ([Synthese abstract](https://link.springer.com/article/10.1007/s11229-015-0990-z)) — **[scholarly]** explanatory virtues as priors/likelihoods; Sober's objective Bayesianism.\n- [Many-Worlds Interpretation — Stanford Encyclopedia](https://plato.stanford.edu/entries/qm-manyworlds/) — **[scholarly]** the Born-rule/circularity problem; interference-not-parallelism objection.\n- [Constructor theory — Wikipedia](https://en.wikipedia.org/wiki/Constructor_theory), [Quanta on Marletto](https://www.quantamagazine.org/with-constructor-theory-chiara-marletto-invokes-the-impossible-20210429/), [Physics World — \"Not everything that can happen does happen\"](https://physicsworld.com/a/not-everything-that-can-happen-does-happen-reformulating-physics-as-laws-about-the-impossible/), [Physics World — \"The flawed multiverse\"](https://physicsworld.com/a/the-flawed-multiverse/) — **[secondary]** constructor theory and the multiverse, with measured skepticism.\n- [memeinnovation — Deutsch's theory of explanation](https://memeinnovation.wordpress.com/2020/12/08/david-deutschs-theory-of-explanation/) and [TAG — book-review critique of Deutsch](https://www-users.york.ac.uk/~ss44/books/pages/d/DavidDeutsch.htm) — **[community]** the \"reach isn't extrapolation\" claim; the vagueness/Occam objection.\n- [Explanatory power — Wikipedia](https://en.wikipedia.org/wiki/Explanatory_power) — **[scholarly-adjacent]** the \"everyone is selfish\" easy-to-vary example; notes Deutsch rejects Occam's razor.\n- [LessWrong — BoI review](https://www.lesswrong.com/posts/FyRyECG7YxvAF2QTF/book-review-the-beginning-of-infinity), [Deutsch & Yudkowsky on scientific explanation](https://www.lesswrong.com/posts/mHZRauLwZWhR8KWbL/deutsch-and-yudkowsky-on-scientific-explanation), [Explanations as hard-to-vary assertions](https://www.lesswrong.com/posts/jcTsbaQ8hNc7qxwaQ/explanations-as-hard-to-vary-assertions) — **[community]** the Bayesian/algorithmic counter; the listener-understanding critique.\n- [Dwarkesh Patel — \"Contra David Deutsch on AI\"](https://www.dwarkesh.com/p/universal-explainers) — **[secondary]** the scaling-hypothesis challenge to \"universal explainer\" creativity.\n\n## Theology\n\n- [Edward Feser — \"Classical theism\"](http://edwardfeser.blogspot.com/2010/09/classical-theism.html) and [on Craig & divine simplicity](http://edwardfeser.blogspot.com/2016/04/craig-on-divine-simplicity-and-theistic.html) — **[scholarly-blog]** the non-tweakable God of classical theism.\n- [Divine Simplicity — IEP](https://iep.utm.edu/divine-simplicity/) and [The Problem of Evil — SEP](https://plato.stanford.edu/entries/evil/) — **[scholarly]** mutual-entailment of attributes; theodicy concedes mere compatibility.\n- [Swinburne, *The Existence of God* — Wikipedia](https://en.wikipedia.org/wiki/The_Existence_of_God_(book)) and [Internet Infidels critique](https://infidels.org/library/modern/gabe-czobel-swinburne/) — **[reference/scholarly]** Bayesian natural theology via simplicity.\n- [arXiv 0811.0630 — \"Religious and Scientific Faith in Simplicity\"](https://arxiv.org/pdf/0811.0630) — **[scholarly]** simplicity as constraint in science vs \"unfalsifiable by design\" in theology.\n- [Apophatic theology and its criticisms (James Bishop)](https://jamesbishopblog.com/2021/11/16/what-is-negative-apophatic-theology-and-its-criticisms/) and [Are Theodicies ad hoc? (Right Reason)](https://www.rightreason.org/2012/are-theodicies-ad-hoc/) — **[community]** apophatic emptiness; Popperian framing of theodicy.\n- [Pancritical rationalism — Wikipedia](https://en.wikipedia.org/wiki/Pancritical_rationalism), [W. W. Bartley III — Wikipedia](https://en.wikipedia.org/wiki/W._W._Bartley_III), [Diller on pancritical rationalism](https://www.cantab.net/users/antoni.diller/rationalism/pancritical.html), [Hauptli, \"A Dilemma for Bartley\" (PDF)](https://faculty.fiu.edu/~hauptli/ADilemmaforBartley.pdf) — **[scholarly/reference]** the tu quoque and faith-vs-criticism.\n- [Critical rationalism — Wikipedia](https://en.wikipedia.org/wiki/Critical_rationalism) and [O'Hear, *Popper, Philosophy and Faith* (Cambridge)](https://www.cambridge.org/core/elements/abs/popper-philosophy-and-faith/C4DE5EBDB5024BBB53B6658B6D41E659) — **[reference/scholarly]** Popper's \"irrational faith in reason.\"\n- [Millennial Star — \"David Deutsch on Explanations\"](https://www.millennialstar.org/david-deutsch-on-explanations/) and [Bruce Nielson — \"Disagreements with Deutsch: the Afterlife\"](https://brucenielson.medium.com/disagreements-with-deutsch-the-afterlife-62097fada896) — **[community]** the only direct \"can hard-to-vary apply to theology?\" engagement found (LDS).\n\n## Everyday toolkit & popularization\n\n- [Naval Ravikant — \"Good Products Are Hard to Vary\" (Founder's Tribune)](https://www.founderstribune.org/p/good-products-are-hard-to-vary-by-naval-ravikant) — **[community]** \"risky and narrow predictions… hard to vary before AND after the fact.\"\n- [Deconstructing the Conspiratorial Mind (NIH/PMC)](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9417594/) — **[scholarly]** conspiracist reasoning is unconstrained/easy-to-vary.\n- [Taking Children Seriously — Wikipedia](https://en.wikipedia.org/wiki/Taking_Children_Seriously), [TCS Journal archive (curi.us)](https://curi.us/tcs/Journal/index.html), [critique: \"Taking Children Seriously Is Bad\"](https://takingchildrenseriouslyisbad.wordpress.com/) — **[reference/community]** TCS principles and the strongest balancing critique.\n- [Nat Eliason — BoI notes](https://www.nateliason.com/notes/beginning-of-infinity-david-deutsch), [Sashin — \"A Good Explanation\"](https://sashinexists.com/letter/the-makings-of-a-good-explanation/), [Kieren Anderson — \"Hard-to-Vary and Induction\"](https://medium.com/@kjander0/hard-to-vary-and-induction-cee232434e12) — **[community]** clear reader-level glosses.\n- [ToKCast — Brett Hall](https://brettroberthall.podbean.com/) and [ToKCast notes](https://podcastnotes.org/tokcast/chapter-1-the-reach-of-explanations-tokcast-with-brett-hall/) — **[community]** the main Deutschian explainer/community.\n\n## CTV & advertising measurement\n\n- [PIE — Gordon, Moakler, Zettelmeyer (arXiv 2304.06828)](https://arxiv.org/pdf/2304.06828) ([NBER w35044](https://www.nber.org/papers/w35044)) — **[scholarly]** R²=0.88 vs 0.19 across 2,226 Meta experiments. **The strongest anchor.**\n- [Measured — Dangers of MTA](https://www.measured.com/blog/the-dangers-of-multi-touch-attribution/) — **[vendor]** clean \"MTA = correlation\" articulation.\n- [Provalytics — losing 3p cookies & MTA](https://provalytics.com/what-is-the-impact-of-losing-3rd-party-cookies-on-mta/), [Usercentrics — cookieless MTA](https://usercentrics.com/knowledge-hub/cookieless-multi-touch-attribution/) — **[vendor]** signal-loss mechanics.\n- [Conbersa — MTA tools 2025](https://www.conbersa.ai/blog/top-mta-tools-2025) — **[vendor]** carries the Gartner 71%/41% stat — *verify against primary Gartner before client use.*\n- [Recast — correlation vs causation in MMM](https://getrecast.com/correlation-causation-marketing-mix-modeling/) — **[vendor]** *page 404'd on refetch; captured via search excerpt — re-verify.*\n- [Haus — last-touch attribution: worth it?](https://www.haus.io/article/measuring-last-touch-attribution-is-it-worth-it) — **[vendor]** the YouTube→retargeting \"collapse the funnel\" example.\n- [DeepCausalMMM (arXiv 2510.13087)](https://arxiv.org/html/2510.13087v1), [SWI 2025 — multicollinearity in MMM (PDF)](http://www.swi-wiskunde.nl/swi2025/wp-content/uploads/sites/30/2025/07/SWI-2025-scientific-proceedings-Opella.pdf), [PyMC-Marketing — causal identification](https://www.pymc-marketing.io/en/latest/notebooks/mmm/mmm_causal_identification.html) — **[scholarly]** the MMM identification/collinearity problem.\n- [Right Side Up — incrementality testing](https://www.rightsideup.com/blog/guide-to-marketing-incrementality-testing), [Remerge — PSA/ghost ads/ghost bids](https://www.remerge.io/blog-post/incrementality-tests-101-intent-to-treat-psa-ghost-ads-and-ghost-bids), [Tinuiti — ghost ads](https://tinuiti.com/blog/measurement/ghost-ads/) — **[vendor]** RCT/holdout design taxonomy.\n- [Epom — programmatic trends](https://epom.com/blog/dsp/programmatic-advertising-trends), [TVision — CTV walled gardens](https://www.tvisioninsights.com/resources/measure-ctv-walled-gardens), [AI Digital — CTV measurement](https://www.aidigital.com/blog/ctv-measurement) (*19.6%/7.1x figures vendor-sourced — verify*), [Kochava + Samba TV](https://www.kochava.com/blog/beyond-fragmented-signals-unifying-linear-tv-and-ctv-measurement/) — **[vendor]** CTV walled-garden / convergent-TV context.\n\n## Politics, economics, climate, misinformation\n\n- [Popper's Political Philosophy — IEP](https://iep.utm.edu/popp-pol/) — **[scholarly]** the open society, \"remove bad rulers.\"\n- [vmasrani — argument against proportional representation](https://vmasrani.github.io/blog/2018/prop_rep/) and [Information Knoll — response to Deutsch on electoral systems](https://informationknoll.wordpress.com/2018/05/25/electoral-systems-and-human-progress-a-response-to-david-deutsch/) — **[community]** the FPTP case and its sharpest critique.\n- [The Poverty of Historicism — Wikipedia](https://en.wikipedia.org/wiki/The_Poverty_of_Historicism) — **[reference]** the impossibility-of-prophecy argument.\n- [Econlib — Hayek's \"Use of Knowledge in Society\"](https://www.econlib.org/notes-on-hayeks-the-use-of-knowledge-in-society/), [FEE — Hayek: the knowledge problem](https://fee.org/articles/hayek-the-knowledge-problem/), [Quillette — \"The Unconstrained Vision of David Deutsch\"](https://quillette.com/2019/01/26/the-unconstrained-vision-of-david-deutsch/) — **[secondary]** the Hayek resonance and divergence.\n- [Scientific American / Horgan — \"The Infinite Optimism of David Deutsch\"](https://www.scientificamerican.com/blog/cross-check/the-infinite-optimism-of-physicist-david-deutsch/), [Warp News — \"All problems are solvable\"](https://www.warpnews.org/david-deutsch/), [Jed Lea-Henry — \"Sustainability is Unsustainable\"](https://jrleahenry.medium.com/sustainability-is-unsustainable-f6dc1132584a) — **[secondary/community]** the climate/geoengineering ranking, with a skeptical foil.\n- [MDPI — \"Narrative Patterns in Disinformation and Trustworthy News\"](https://www.mdpi.com/2076-0760/15/4/255) — **[scholarly]** epistemic grounding / causal structure distinguishes reliable narratives.\n\n---\n\n*Methodology note: the Tier-A philosophical spine was verified by a deep-research harness with 3-vote adversarial fact-checking (25 claims, 23 confirmed). The applied workstreams (Tier B) were researched by five parallel agents and are cited but not adversarially voted. See `Key_Claims.md` for the per-claim ledger and `README.md` for the full method.*"}]}</script>

<script>
const corpus = JSON.parse(document.getElementById('corpus-data').textContent);
const docs = corpus.documents;
const toc = document.getElementById('toc');
const content = document.getElementById('content');
const searchBox = document.getElementById('search');
const results = document.getElementById('search-results');
const key = 'corpus:' + corpus.slug;
let current = 0;

// theme
const themePref = localStorage.getItem('corpus-theme');
if (themePref) document.documentElement.dataset.theme = themePref;
else if (matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.dataset.theme = 'dark';
document.getElementById('theme-btn').onclick = () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('corpus-theme', next);
};

// table of contents
docs.forEach((d, i) => {
  const a = document.createElement('a');
  a.href = '#ch-' + i;
  a.innerHTML = '<span class="num">' + String(i).padStart(2, '0') + '</span>' + d.title;
  a.title = d.summary || '';
  a.onclick = (e) => { e.preventDefault(); show(i); closeMenu(); };
  toc.appendChild(a);
});

function show(i, anchorText) {
  current = Math.max(0, Math.min(docs.length - 1, i));
  content.innerHTML = marked.parse(docs[current].body);
  // rewrite chapter-to-chapter .md links into in-app navigation
  content.querySelectorAll('a[href$=".md"]').forEach(a => {
    const target = docs.findIndex(d => a.getAttribute('href').endsWith(d.file));
    if (target >= 0) { a.href = '#ch-' + target; a.onclick = (e) => { e.preventDefault(); show(target); }; }
  });
  content.querySelectorAll('a[href^="http"]').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });
  toc.querySelectorAll('a').forEach((a, j) => a.classList.toggle('active', j === current));
  document.getElementById('prev').disabled = current === 0;
  document.getElementById('next').disabled = current === docs.length - 1;
  document.getElementById('pager-label').textContent = (current + 1) + ' / ' + docs.length + ' · ' + docs[current].title;
  history.replaceState(null, '', '#ch-' + current);
  localStorage.setItem(key, current);
  if (anchorText) {
    const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT);
    let node; while ((node = walker.nextNode())) {
      const idx = node.textContent.toLowerCase().indexOf(anchorText.toLowerCase());
      if (idx >= 0) { node.parentElement.scrollIntoView({ block: 'center' }); return; }
    }
  }
  document.getElementById('main').scrollIntoView();
  window.scrollTo(0, 0);
}

document.getElementById('prev').onclick = () => show(current - 1);
document.getElementById('next').onclick = () => show(current + 1);
document.addEventListener('keydown', (e) => {
  if (e.target === searchBox) return;
  if (e.key === 'ArrowLeft') show(current - 1);
  if (e.key === 'ArrowRight') show(current + 1);
});

// search
let timer;
searchBox.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(runSearch, 150);
});
function runSearch() {
  const q = searchBox.value.trim().toLowerCase();
  results.innerHTML = '';
  toc.style.display = q ? 'none' : '';
  if (!q || q.length < 3) { toc.style.display = ''; return; }
  let hits = 0;
  docs.forEach((d, i) => {
    const text = d.body.toLowerCase();
    let pos = text.indexOf(q), shown = 0;
    while (pos >= 0 && shown < 3 && hits < 40) {
      const start = Math.max(0, pos - 60), end = Math.min(d.body.length, pos + q.length + 90);
      const raw = d.body.slice(start, end).replace(/[#*_>\[\]]/g, '');
      const safe = raw.replace(/&/g, '&amp;').replace(/</g, '&lt;');
      const snippet = safe.replace(new RegExp(q.replace(/[.*+?^${}()|\\]/g, '\\$&'), 'ig'), m => '<mark>' + m + '</mark>');
      const div = document.createElement('div');
      div.className = 'hit';
      div.innerHTML = '<b>' + d.title + '</b>…' + snippet + '…';
      const exact = d.body.slice(pos, pos + q.length);
      div.onclick = () => { show(i, exact); searchBox.value = ''; runSearch(); closeMenu(); };
      results.appendChild(div);
      hits++; shown++;
      pos = text.indexOf(q, pos + q.length);
    }
  });
  if (!hits) results.innerHTML = '<div class="none">No matches.</div>';
}

// mobile menu
const menuBtn = document.getElementById('menu-btn');
menuBtn.onclick = () => document.body.classList.toggle('menu-open');
function closeMenu() { document.body.classList.remove('menu-open'); }

// initial chapter: hash > saved progress > 0
const hash = location.hash.match(/^#ch-(\d+)$/);
show(hash ? +hash[1] : +(localStorage.getItem(key) || 0));
</script>
</body>
</html>
