pens. Good explanations, he says, [\"begin with bad explanations. And you get there... by criticism, by conjecturing variance of the story, and then criticizing both them and the original story, and then choosing the one that survives\"](https://tim.blog/2023/03/24/david-deutsch-naval-ravikant-transcript/). You do not wait for the right idea to arrive clean. You start with a flawed guess and beat it into shape. A few concrete habits follow, each tied back to hard-to-vary:\n\n**Treat your beliefs as guesses to be criticized, not positions to be defended.** This is a posture change more than a technique. A belief you are defending, you protect; a belief you are testing, you attack — and the version that survives your own best attack is, by definition, harder to vary, and therefore more trustworthy. The operational move is to **steelman the strongest rival view first, and then aim your criticism at *that*.** Refuting the dumbest version of the opposing case leaves your own belief easy to vary, because a smarter objection is still out there waiting to dislodge it. Refuting the *best* version is what earns confidence.\n\n**Replace \"Who's right?\" and \"Whose fault is it?\" with \"How would we find and correct the error?\"** Blame ends inquiry — once a culprit is named, the search stops. Error-finding continues it. In a disagreement with a colleague or a partner, the question \"how would we *tell* which of us is wrong, and fix it?\" keeps the explanation alive and improvable, where \"who's to blame?\" freezes it. This reframing is one of the highest-leverage habits in the toolkit precisely because it is so unnatural; the instinct to assign fault is strong and almost always premature.\n\n**Prefer error-correcting setups over front-loaded certainty.** This is the corpus's own gloss on Deutsch's fallibilism, and it is worth stating as a rule: *make being-wrong cheap.* Since certainty is not available to fallible beings, the thing to optimize is not how sure you are going in but how fast and how cheaply you can recover when you turn out to be wrong. In practice that means favoring reversible decisions over irreversible ones, fast feedback over slow, and small criticizable bets over large unexaminable ones. You will be wrong often; the only question is whether your arrangements let you find out in time to fix it.\n\n## Seek good explanations, not predictions or authority\n\nA subtle corollary, and one that cuts against a lot of contemporary advice. \"Trust the data\" and \"an expert said so\" are surprisingly *weak* when they stand alone. A correct prediction without an explanation tells you only *that* something will happen, not *why* — and an overfit pattern (\"X happened last three times, so X recurs\") shatters the moment circumstances shift, because nobody understood the mechanism holding it up. A pure correlation is an explanation that hasn't been written yet.\n\nThis is not anti-expertise; it is a discipline *about* expertise. When you are handed a claim, the question to ask is: **\"What is the explanation, and what would it forbid?\"** An expert who can give you a hard-to-vary mechanism — and who can name what that mechanism *rules out* — has handed you something criticizable and reusable, something you can carry to a new situation and test. An expert who offers only authority or correlation has handed you a prediction to take on faith. The first is knowledge; the second is a tip. Deutsch puts the underlying point sharply: without [\"a functional reason to prefer one of countless variants, advocating one of them... is irrational\"](https://www.ted.com/talks/david_deutsch_a_new_way_to_explain_explanation/transcript). The functional reason is exactly what a good explanation supplies and a bare prediction withholds.\n\n## Parenting and learning: Taking Children Seriously\n\nDeutsch took these ideas into the most charged arena of all. With the educator Sarah Fitz-Claridge he co-founded **Taking Children Seriously (TCS)**, an educational philosophy that follows directly from his epistemology. If knowledge cannot be poured into a head but is *created* by the learner through conjecture and criticism, then a child's own ideas are not noise to be overridden but conjectures in a [\"free competition of the ideas irrespective of source\"](https://en.wikipedia.org/wiki/Taking_Children_Seriously). Authority is the wrong instrument because authority does not actually move knowledge from one mind to another; only the child's own conjecturing and error-correcting does.\n\nTwo ideas are genuinely usable here, and low-risk. First: **engage the child's reasoning as a conjecture worth taking seriously**, rather than reflexively overriding it — ask what they think and why, and criticize the idea rather than the child. Second: **seek \"common preferences\"** — a solution that *both* parent and child genuinely prefer, as opposed to either coercing the child or having the parent silently self-sacrifice ([curi.us archive](https://curi.us/tcs/Journal/index.html)). Applied to the dinner-table standoff, the move is to treat [\"problems are soluble\"](https://www.daviddeutsch.org.uk/videos/tedglobal-2005-transcript/) as a real working assumption — to look for the third option that dissolves the conflict — instead of falling back on \"because I said so,\" which ends the search and teaches nothing about how to resolve it next time.\n\nCalibrated honesty requires flagging that **the controversy around TCS is real, and the criticisms land.** A detailed critique from a former adherent argues that the philosophy underrates how hard problem-solving actually is: [\"problem solving is hard... Rationality is also a skill people have to develop\"](https://takingchildrenseriouslyisbad.wordpress.com/), and so expecting a child to co-solve genuinely complex problems can shade from respect into abdication. The same critique insists that [\"parents need to take primary responsibility for problem solving instead of delegating that job to their children,\"](https://takingchildrenseriouslyisbad.wordpress.com/) and flags hand-waving on real safety questions and a blindness to class and material constraints that not every family can wish away. Wikipedia separately notes that the movement leans heavily on its own primary sources and has thin independent notability. The honest takeaway is therefore a divided one: adopt the engage-the-reasoning and seek-common-preferences habits, which are high-value and low-risk, while keeping unambiguous adult responsibility for genuine safety — and do not let \"non-coercion\" become a license to offload hard problems onto a child who has not yet built the skills to carry them.\n\n## \"Problems are soluble\" as a working stance\n\nThe last tool is the one that keeps the whole enterprise from collapsing into despair, and it is more precise than the slogan suggests. In his 2005 TED talk Deutsch states it as a two-part principle: **problems are inevitable, *and* problems are soluble.** Together they call for [\"a stance of problem-fixing not just problem avoidance,\"](https://www.daviddeutsch.org.uk/videos/tedglobal-2005-transcript/) resting on the claim that [\"the limiting factor... is not resources but knowledge.\"](https://www.daviddeutsch.org.uk/videos/tedglobal-2005-transcript/) Read carefully, it cuts in two directions at once.\n\nAgainst **doom**, it says: the persistence of a problem is evidence of *missing knowledge*, not of sealed fate. If something can be done within the laws of physics and isn't being done, what stands in the way is that nobody yet knows how — which is a problem of the soluble kind, an invitation to go find the knowledge rather than a sentence to endure. Against **naive utopianism**, the word *inevitable* does equal work: there is no final problem-free end-state, because every solution breeds the next generation of problems. Progress is not arrival; it is the permanent activity of fixing what the last fix created. Ravikant ties the optimistic half to open-ended human possibility — wealth, he says, is [\"the set of all transformations that you are capable of bringing about... if optimism is true, then there's no limit to wealth\"](https://tim.blog/2023/03/24/david-deutsch-naval-ravikant-transcript/) — but the discipline is in holding both halves together, refusing both the comfort of despair and the comfort of a promised utopia.\n\nThe everyday practice — and here the corpus is again packaging Deutsch rather than quoting him — is a small linguistic discipline with outsized effect. **When you are stuck, restate the obstacle as: \"we don't yet *know how* to do X.\"** \"Our team can't fix this\" becomes \"we don't yet know how to fix this,\" which silently converts despair into a research question and points at the missing thing. The same restatement deflates smug finality — \"it's impossible\" almost always means \"I don't currently see how,\" which is a different and more hopeful claim. And then, because each solution will breed its own new problems, **keep the error-correction machinery running** so that the next batch gets caught early rather than late.\n\n## The toolkit, in one breath\n\nThe five tools are really one idea, viewed from five angles. The **Swap Test** is hard-to-vary turned into a filter against nonsense. **Conjecture and criticism** is hard-to-vary turned into a method for building something better, by making being-wrong cheap. **Seeking explanations over authority** is hard-to-vary applied to whom you believe and why. **Taking Children Seriously** is the same epistemology aimed — imperfectly, and with real caveats — at how knowledge actually grows in another person. And **\"problems are soluble\"** is the stance that keeps you searching for the hard-to-vary explanation instead of settling for the easy-to-vary one that ends the conversation. None of it requires special expertise. All of it requires the small, repeatable courage of asking, before you believe a thing, whether the story could just as easily have been told the other way."}, {"order": 5, "file": "05_CTV_Programmatic.md", "title": "Persephone in the Media Plan: Good Explanations and CTV Measurement", "summary": "Attribution as easy-to-vary storytelling, incrementality as Popperian error-correction, and a hard-to-vary test for the client room.", "body": "# Persephone in the Media Plan: Good Explanations and CTV Measurement\n\n*The Greeks explained winter with Persephone: the harvest goddess's daughter is dragged to the underworld for half the year, and her mother's grief freezes the world. It accounts for the seasons — and that is exactly the problem. Had summers come in the months we call winter, the myth would have survived untouched; you simply relocate the abduction. The story explains the cold because it can be bent to explain anything. David Deutsch calls this the mark of a bad explanation: it is easy to vary. Most of what passes for measurement in CTV and programmatic is Persephone wearing a number. This chapter is about telling the difference, and about why the difference is worth real budget.*\n\n## Part 1 — The Measurement Landscape, 2024–2026\n\n### Last-click and MTA: the correlational engines that signal loss broke\n\nFor two decades, digital advertising ran on attribution: trace the path of clicks and impressions before a conversion, then assign credit. The trouble was never subtle, only ignored. As the measurement firm Measured puts it, \"just because a user interacts with a series of ads and then makes a purchase doesn't mean those ads CAUSED the purchase\" — multi-touch attribution (MTA) \"is entirely reliant on correlation-based data,\" and the privacy shifts of recent years left it \"basically dead\" ([Measured](https://www.measured.com/blog/the-dangers-of-multi-touch-attribution/)).\n\nThe structural cause is signal loss. MTA needs a persistent, user-level identifier to stitch touchpoints into a path. Third-party-cookie restrictions, Apple's App Tracking Transparency, and the logged-out, device-graph reality of the living-room TV dissolve exactly that identifier ([Provalytics](https://provalytics.com/what-is-the-impact-of-losing-3rd-party-cookies-on-mta/); [Usercentrics](https://usercentrics.com/knowledge-hub/cookieless-multi-touch-attribution/)). A 2025 Gartner survey of 400 CMOs reportedly found 71% lacking confidence in MTA and 41% having abandoned it outright ([secondary cite](https://www.conbersa.ai/blog/top-mta-tools-2025)). **Flag for client use:** that 71%/41% pairing is a secondary reference to a Gartner figure — verify against the primary Gartner publication before it goes in a deck.\n\n### The MMM renaissance — and its identification problem\n\nAs the user-level signal eroded, the industry rediscovered an older instrument: marketing mix modeling. MMM is privacy-durable by construction — it works on aggregate, time-series spend and outcome data, no user IDs required — and it has returned through open-source frameworks like Meta's Robyn, Google's Meridian, and PyMC-Marketing, with \"causal MMM\" now the stated frontier ([arXiv](https://arxiv.org/html/2510.13087v1)).\n\nMMM's Achilles heel is identification. Marketing channels are spent together and move together — budgets rise in Q4 across the board — so multicollinearity makes isolating any single channel's true effect genuinely hard ([SWI 2025 proceedings](http://www.swi-wiskunde.nl/swi2025/wp-content/uploads/sites/30/2025/07/SWI-2025-scientific-proceedings-Opella.pdf); [PyMC-Marketing](https://www.pymc-marketing.io/en/latest/notebooks/mmm/mmm_causal_identification.html)). The vendor Recast makes the sharp version of the point: branded search and bottom-funnel retargeting \"show a massive correlation with revenue because they engage users who have already expressed high intent,\" so attribution systematically overstates their incremental value unless causal testing intervenes ([Recast](https://getrecast.com/correlation-causation-marketing-mix-modeling/) — note: this page 404'd on refetch; captured via search excerpt and should be re-verified before citing externally).\n\n### Incrementality: the acknowledged gold standard\n\nThe field's answer is to stop asking \"what got credited?\" and start asking \"what changed because we advertised?\" Randomized experiments are, in the plain words of the practitioners, \"the gold standard of incrementality testing\": geo holdouts and GeoLift designs, user-level RCTs, and PSA / ghost-ad methods in which control users are genuinely eligible and would have been served — but the ad is withheld or replaced ([Right Side Up](https://www.rightsideup.com/blog/guide-to-marketing-incrementality-testing); [Remerge](https://www.remerge.io/blog-post/incrementality-tests-101-intent-to-treat-psa-ghost-ads-and-ghost-bids); [Tinuiti](https://tinuiti.com/blog/measurement/ghost-ads/)).\n\nThe failure mode these designs expose is the canonical one: crediting retargeting or branded search for conversions that would have happened anyway. Haus offers the cautionary case — an outdoor brand whose last-touch model over-credits Facebook retargeting, while the upstream YouTube awareness that *makes* retargeting work looks weak by comparison. The blunt conclusion: \"Cutting YouTube spend could collapse the entire funnel\" ([Haus](https://www.haus.io/article/measuring-last-touch-attribution-is-it-worth-it)). Last-touch did not merely mismeasure; it pointed the knife at the wrong line item.\n\n### The strongest data point: Meta's PIE\n\nThe most striking single result in this literature comes from Predicted Incrementality by Experimentation (PIE), from Gordon, Moakler & Zettelmeyer (Northwestern / Meta / NBER, 2023). Across 2,226 Meta advertising experiments, PIE reports an out-of-sample R² of **0.88** for predicting incremental conversions per dollar, against **0.19** for the industry-standard 7-day last-click metric ([arXiv](https://arxiv.org/pdf/2304.06828); [NBER](https://www.nber.org/papers/w35044)). PIE works by learning a mapping from campaign features to *experimentally measured* causal effects, then predicting incrementality for campaigns that were never run as RCTs. It is a model trained on experimental ground truth, not a correlational scorer dressed up — and that distinction will matter in Part 2.\n\n### The CTV-specific wrinkles\n\nThe connected-TV environment adds its own pathologies. Walled gardens measure their own ecosystems cleanly but throttle cross-publisher log-level access, pushing measurement into clean rooms and modeled — rather than log-level — attribution ([Epom](https://epom.com/blog/dsp/programmatic-advertising-trends); [TVision](https://www.tvisioninsights.com/resources/measure-ctv-walled-gardens)). The unsolved core problem is person-level cross-platform deduplication. By one account, 2024 campaigns averaged roughly **19.6% household reach at about 7.1x frequency** — \"high frequency on a limited slice of households\" ([secondary cite](https://www.aidigital.com/blog/ctv-measurement); the 19.6%/7.1x figures are vendor-sourced and should be verified before client use). \"Convergent TV\" names the cross-screen question — total deduplicated linear + CTV + digital reach and frequency — and is driving identity-graph partnerships (for example, Samba TV + Kochava in July 2025) and the IAB Tech Lab's converged-TV roadmap ([Kochava](https://www.kochava.com/blog/beyond-fragmented-signals-unifying-linear-tv-and-ctv-measurement/)).\n\nSo much for the landscape: a dead correlational engine, a privacy-durable model with an identification problem, an experimental gold standard everyone nods at, and a living room nobody can fully deduplicate. The useful question is not which tool is fashionable. It is which measurement *claims* have actually earned trust — and for that, we need a test.\n\n## Part 2 — The Deutsch Mapping (Synthesis)\n\n*Everything that follows is my synthesis: I am mapping Deutsch's epistemology onto measurement practice, not reporting an established result in the literature. Treat it as a lens for the client room, not a citation.*\n\nDeutsch's argument in *The Beginning of Infinity* is compact. A good explanation is **hard to vary** while still accounting for what it explains; a bad explanation is easy to vary, because its details can be swapped to fit any outcome — Persephone could have been any god, abducted in any season. Knowledge grows by **error-correction**: we conjecture, then expose the conjecture to criticism that could refute it. And good explanations have **reach** — they extrapolate correctly to cases they were never invented for ([Deutsch, *BoI*](https://thecitesite.com/authors/david-deutsch/source/the-beginning-of-infinity/)). Hold those three — hard-to-vary, error-correction, reach — and the measurement landscape reorganizes itself.\n\n### 1. Post-hoc attribution narratives are easy-to-vary explanations\n\n\"The campaign worked because of CTV's premium environment and our audience targeting.\" That sentence is the Persephone of the media plan. It accounts for a win — and it would have accounted just as smoothly for a loss. Had the numbers come in flat, the same vocabulary would have explained the failure: the premium environment was wasted on the wrong audience, or frequency was mismanaged. A story that absorbs *any* result by reassigning credit has explained nothing. Its parts are interchangeable; nothing in it is load-bearing.\n\nThe MTA dashboard is this failure industrialized. Its credit allocation can be re-weighted at will — first-touch, last-touch, linear, time-decay, U-shaped — and each setting tells a different, internally coherent story about the same campaign. That is not a feature menu; it is a confession. A model whose conclusion you can dial is a model that has no conclusion. This is precisely why 400 CMOs stopped trusting it, and the deeper reason is the one Deutsch would give: easy-to-vary measurement is a non-explanation wearing a number.\n\n### 2. A hard-to-vary explanation forces the whole account to change — and survives an experiment\n\nNow the contrast. \"This CTV line item drives *incremental reach* into households our linear buy never touches, and removing it should drop conversions in exposed geos by roughly X%.\" This claim is rigid in the way good explanations are rigid. It commits to a specific mechanism — incremental reach, not duplicated frequency — to a magnitude, and to a failure condition. You cannot quietly swap \"premium environment\" in for \"incremental reach\" without breaking the whole sentence; the mechanism is doing real work, and changing it changes everything downstream.\n\nIncrementality is the epistemic content here, and the experiment is the error-correction. A geo holdout or a PSA / ghost-ad test is the *criticism* that can refute the *conjecture*. Run it, and one of two things happens. Lift shows up where the mechanism predicted it, and the explanation survives a test that could have killed it. Or no lift appears — and the account cannot be rescued by minor edits. You cannot save \"incremental reach into untouched households\" by re-weighting a credit slider, the way you can save an MTA story. It either happened or it didn't. That brittleness *is* the virtue.\n\n### 3. \"Reach\" maps onto generalization versus overfit\n\nDeutsch's third idea is the most useful and the least obvious. A measurement result has *reach* if it holds for the next flight, the next market, the next audience — not merely the one it was fit on. This is the line between an explanation and a curve traced through last quarter's points.\n\nPIE's value proposition is reach in exactly this sense. Out-of-sample R² = 0.88 means the learned relationship *travels* to campaigns the model never saw; last-click's 0.19 means it barely describes even the world it was measured in. The opposite of reach is everywhere in this business: the MMM coefficient that flips sign when you add a quarter of data, the retargeting ROAS that evaporates the moment you run a holdout. Those did not discover a mechanism; they memorized one spend pattern. For a CTV strategist the rule is bracing: a finding that does not survive a new market is closer to Persephone than to physics.\n\n### 4. The honesty note on PIE — hold both\n\nHere I have to be careful, because PIE is seductive and the temptation is to over-claim it. **PIE is a supportive illustration that experiment-grounded measurement beats correlation-grounded measurement. It is not proof of the philosophical mapping, and PIE is not itself a \"good explanation\" in Deutsch's strict sense.**\n\nThe reason is what PIE *is*. It is a machine-learning model trained on experimental ground truth: it extends correlations, but anchors them to causal measurements. That makes it something closer to a very-well-calibrated predictor than to a Deutschian explanatory theory. It tells you *how much* incrementality to expect; it does not necessarily hand you the hard-to-vary mechanistic *why*. A pure predictive model can have enormous reach — high out-of-sample R² is real, hard-won reach — without offering the kind of mechanistic account that, if challenged, would force the whole story to change. (A correlation anchored to causal truth is exactly the sort of thing whose parameters you *can* retune as new ground truth arrives, without the edifice collapsing — which is the tell that it is calibration, not explanation.)\n\nSo hold both at once. The 0.88-versus-0.19 contrast is powerful, genuine evidence for the value of grounding measurement in experiments — error-correction at industrial scale. It is *not* a demonstration that PIE itself is a good explanation in Deutsch's sense. Use PIE to argue that experiments beat correlations. Do not use it to argue that prediction equals understanding. Those are different claims, and conflating them is its own small act of easy-to-vary reasoning.\n\n### 5. Decision heuristics for MiQ\n\nThis is where the lens has to pay rent. When you are pitching or defending a measurement approach in a client or partner room, run these:\n\n- **Pressure-test for easy-to-vary tells.** Ask out loud: *what outcome would have refuted this story?* If every result — up, flat, down — would have been narrated with the same mechanism (\"premium inventory,\" \"smart targeting\"), the story explains nothing, and you should discount it no matter how good the deck looks. A claim that cannot fail has not succeeded.\n\n- **Rank claims correctly.** \"The model predicts X\" is weaker than \"we have a hard-to-vary explanation of the mechanism *and* it survived a geo or holdout test.\" A prediction without a mechanism, and a mechanism that never faced a holdout, are both easy to vary — for opposite reasons, but with the same consequence: neither has earned budget.\n\n- **Insist on the failure condition, in advance.** A trustworthy measurement story names the experiment that could have killed it *before* the result is in. \"Here is the holdout we ran, and here is the lift we'd have walked away from\" is the signature of error-correction. If no such test exists, you are being sold Persephone.\n\n- **Frame SPO the same way.** Supply-path optimization is, philosophically, a search for a hard-to-vary explanation of *where value actually comes from*. Does this path add incremental, deduplicated reach and real outcomes — or does it merely correlate with conversions because it skims high-intent users? (That is the retargeting trap, moved one hop upstream into the supply chain.) Consolidate paths whose value claim survives an incrementality test. Cut the ones whose only defense is an easy-to-vary story about \"quality\" and \"premium.\"\n\n### The one-line version for the client room\n\n> Prediction without a mechanism, and a mechanism that never faced a holdout, are both easy to vary — so neither has earned your budget. Pay for the explanation that would break if it were wrong, and that didn't.\n\nWinter is not Persephone's grief, and the campaign did not work because the inventory was premium. Both are stories you could tell about any outcome. The measurement worth paying for is the one rigid enough to have been wrong — and brave enough to have been tested."}, {"order": 6, "file": "06_Theology.md", "title": "The Hardest Case: Theology Under the Criterion", "summary": "Folk theism and theodicy as easy-to-vary; classical theism as a genuine hard-to-vary steelman; Swinburne, fine-tuning, and Bartley on faith.", "body": "# The Hardest Case: Theology Under the Criterion\n\n*Of all the places to point the hard-to-vary criterion, theology is the one where the instrument is most likely to be accused of bias before it is even switched on — and also the one where, if it has any reach at all, it ought to bite hardest. This chapter takes the accusation seriously. It argues that Deutsch's standard does demolish the popular, anthropomorphic theism most people picture; that there is nonetheless a real theological steelman, drawn from classical and Thomistic metaphysics, which is hard to vary in a precise and underappreciated sense; that Deutsch's own treatment of fine-tuning is far stranger than either his admirers or his critics assume; and that the deepest move in the whole exchange runs the other way — the question, pressed by Popperians themselves, of whether reason rests on a faith of its own. A warning is owed up front, and the chapter will repeat it: the direct literature connecting Deutsch's criterion to theology is thin and mostly non-academic, and the strongest pro-theology argument here is the corpus's own reconstruction, not a position any theologian has published against Deutsch. This is the most interpretive chapter in the book, and it will say so as it goes.*\n\n## Why the criterion was built to bite here\n\nIt is no accident that the founding example of a *bad* explanation in *The Beginning of Infinity* is a religious one. Deutsch opens with the ancient Greek account of winter: Persephone's annual return to the underworld plunges her mother Demeter into grief, and the goddess's sorrow drives warmth from the world. The story is not stupid. It accounts for the cold. What dooms it, on Deutsch's reading, is that \"hardly any of the myth has anything to do with the phenomenon of winter\" — one could just as easily say the seasons spring from Demeter's *happiness* at the reunion, with no loss of fit, because the emotional details and the meteorological facts are only stapled together, not entailed by one another ([Eliason summary](https://www.nateliason.com/notes/beginning-of-infinity-david-deutsch); [Sashin](https://sashinexists.com/letter/the-makings-of-a-good-explanation/)). Distil the myth to its working core and you are left with *the gods did it* — a formula that, as Deutsch notes, \"could apply to anything.\" The seasons, the harvest, a defeat in battle: swap in any phenomenon and the explanation absorbs it without strain.\n\nThis was not a casual jab at religion. The criterion was engineered, in part, to fill a hole in Popper's falsificationism. Popper had said science advances by bold conjectures exposed to refutation — but a god-myth can be dressed up to *make testable predictions* (a sufficiently elaborate Demeter cult could forecast the solstice). Why, then, reject it? Deutsch's answer is that testability is necessary but not sufficient; what matters is whether the explanation is *constrained*. \"The concept of a god is not constrained by any past observation,\" and so it can be reshaped to predict whatever you like ([Anderson](https://medium.com/@kjander0/hard-to-vary-and-induction-cee232434e12)). Maximal variability is the disease; hard-to-vary is the cure. So when the criterion meets theology, it is meeting the case it was partly designed to adjudicate.\n\n## Where folk theism fails the test\n\nRun the everyday machinery — the Swap Test of the previous chapter — over popular religious reasoning and the easy-to-vary structure surfaces immediately.\n\nConsider petitionary prayer and the providential reading of events. The believer prays for a sick relative. If the relative recovers, the prayer was answered; if the relative dies, it was God's plan, or a mercy we cannot yet see, or a greater good purchased by the loss. Every outcome is metabolized. No result is forbidden. The same elasticity governs the problem of evil. Theodicies — the free-will defense, the soul-making defense, the appeal to inscrutable goods — have long been charged, in Popperian terms, with being *ad hoc*: when a particular evil resists the standard account, the theory is rescued \"by defensive maneuvers, thereby rendering the theory unfalsifiable through an appeal to mystery\" ([Right Reason](https://www.rightreason.org/2012/are-theodicies-ad-hoc/)). The Stanford Encyclopedia is careful and revealing on this point: most theologians working on evil concede that they cannot *explain* particular evils at all, only show them *logically compatible* with the existence of God ([SEP, \"The Problem of Evil\"](https://plato.stanford.edu/entries/evil/)). In Deutsch's idiom that concession is decisive, because compatibility is cheap and accounting is expensive. To show that evil is *consistent* with God demands almost nothing — countless mutually contradictory stories are each consistent with the data. To give a hard-to-vary account of *why this evil, here, rather than its opposite* is the costly thing, and it is exactly the thing most theodicists decline to attempt. Low explanatory constraint, in Deutsch's sense, is not a slander; it is something the field has largely admitted about itself.\n\nA subtler case is apophatic, or negative, theology — the tradition that refuses all positive predicates of God, naming the divine only by what it is *not*, or as the \"ground of being.\" On the face of it this looks like the worst possible result under the criterion: an entity stripped of every functional detail constrains nothing, forbids nothing, and therefore predicts and explains nothing. Analytic critics press the point from the other side, arguing that strict apophaticism is either self-refuting — \"God is ineffable\" is itself a substantive positive claim — or cognitively empty ([James Bishop](https://jamesbishopblog.com/2021/11/16/what-is-negative-apophatic-theology-and-its-criticisms/)). But here the dialectic turns, and honesty requires naming the turn: this framing is partly the corpus's own reasoning, and the apophatic theologian has a real reply. The reply is that the criterion lacks *jurisdiction*. God, on this view, was never offered as a scientific explanation of phenomena — not a hypothesis competing with axis-tilt to account for the seasons — so faulting the concept for low predictive constraint is a category error, like faulting a symphony for failing to prove a theorem. The move is legitimate. But it is not free. It purchases immunity from the easy-to-vary charge precisely by conceding that God is not an *explanation* in Deutsch's sense at all. The criterion does not so much defeat apophatic theology as get politely shown the door — and the believer pays the entry fee of explanatory power. That is a trade some theologians will gladly make; the point is only that it *is* a trade.\n\n## The real steelman: classical theism as hard to vary\n\nThe mistake a careless Deutschian makes is to think popular theism is the strongest theism. It is not. The most interesting opponent the criterion faces is *classical*, broadly Thomistic theism — and here, the corpus wants to argue, something genuinely hard to vary appears. (Flag, immediately and without hedging: what follows is the corpus's own reconstruction. No theologian has published this as an argument *against Deutsch*. It is built by setting Edward Feser's and Brian Davies's defense of divine simplicity beside Deutsch's criterion and noticing that the two have the same shape.)\n\nFeser draws a sharp line between classical theism and what he calls \"theistic personalism.\" The personalist God — the God of much popular apologetics and, he argues, of philosophers like Plantinga and Swinburne — is essentially a very powerful *person*: a being among beings, \"one being among others,\" who happens to top the scale of knowledge and power. That God is eminently *tweakable*. You can dial omnipotence up or down, add an attribute or subtract one, imagine him slightly less knowing or slightly more merciful, and you still have a recognizable deity. Each property is independently postulated, so each can be independently varied. This is the architecture of an easy-to-vary explanation, and the criterion would shred it for the same reason it shreds Demeter: the parts are stapled together, not entailed.\n\nClassical theism denies the whole picture. On the doctrine of divine simplicity, God is not an instance of any kind — not \"a being\" but Being Itself, *ipsum esse subsistens*, pure actuality with no composition of any sort. Crucially, the divine attributes are therefore not a *list* of separately chosen properties but aspects of one indivisible reality; they \"follo[w] necessarily from an analysis of the claim that God is the uncaused cause\" ([Feser, \"Classical Theism\"](http://edwardfeser.blogspot.com/2010/09/classical-theism.html)). You cannot dial God's power down a notch, because a God with less than maximal actuality would be composite — would have unrealized potential — and whatever is composite is caused, and whatever is caused is not God. As Feser puts the slogan, \"the problem with 'God is a person' is not the word 'person,' but the word 'a'\" ([Feser on Craig](http://edwardfeser.blogspot.com/2016/04/craig-on-divine-simplicity-and-theistic.html); cf. [IEP, \"Divine Simplicity\"](https://iep.utm.edu/divine-simplicity/)). Deny simplicity and the entire edifice collapses into incoherence: a composite, caused, contingent thing is by definition not the God of classical theism.\n\nThat is *exactly* the structure of a hard-to-vary explanation. The parts are mutually entailing; you cannot alter one without destroying the whole. Where the personalist deity has slack everywhere, the classical God has, by design, none. This is the corpus's central and rarely-made-explicit claim about this chapter: classical theism is the one form of the doctrine that meets Deutsch's criterion on its own terms, because its internal rigidity is real and severe.\n\nAnd here the Deutschian must be allowed the rebuttal, because it is a good one. *Logical* rigidity is not the same as *empirical* hard-to-vary-ness. A system can be deductively airtight and still touch no observation — the way a perfectly self-consistent myth, or a tightly axiomatized piece of pure mathematics, achieves internal necessity while saying nothing that the world could confirm or deny. Deutsch's criterion is not merely \"hard to vary\"; it is hard to vary *while still accounting for the phenomena*. The classical theist has shown that you cannot vary the doctrine without wrecking it. What remains contested is whether the doctrine, so constrained, accounts for anything observable in the demanding way axis-tilt accounts for the seasons — or whether its necessity is the closed necessity of a definition, magnificent and self-supporting and empirically inert. The steelman is genuine. It relocates the argument from \"is theism easy to vary?\" (where folk theism loses) to \"is deductive constraint enough, absent empirical grip?\" — and that is a far better fight than the one the criterion usually picks.\n\n## Swinburne and the collision with Bayes\n\nIf classical theism is the metaphysical steelman, Richard Swinburne is the steelman built from probability — and his case collides with Deutsch in an instructive way. Swinburne's natural theology runs, explicitly, on *simplicity*. Theism, he argues, is the simplest possible hypothesis about ultimate reality — a single being, infinite in the relevant respects, infinity being simpler than any large finite number — and simplicity confers a high prior probability. Feed that prior through Bayes's theorem, weigh it against the evidence of a complex orderly universe, and Swinburne concludes that the existence of God is \"more probable than not\" ([*The Existence of God*](https://en.wikipedia.org/wiki/The_Existence_of_God_(book)); critical exposition at [Infidels](https://infidels.org/library/modern/gabe-czobel-swinburne/)).\n\nThe collision is foundational, and it happens *before* the argument ever reaches God. Swinburne is a self-described Bayesian; his entire apparatus is the assignment and updating of probabilities. Deutsch regards Bayesian epistemology as \"just the name of a mistake… a species of inductivism\" ([Walker podcast](https://josephnoelwalker.com/139-david-deutsch/)). On Deutsch's view, knowledge does not grow by assigning prior probabilities to theories and grinding the Bayesian crank; it grows by conjecturing explanations and killing the bad ones with criticism. So a Deutschian rejects Swinburne not at the conclusion but at the first step: assigning theism a \"prior probability\" read off its \"simplicity\" is, for Deutsch, a category error about how explanation works. And there is a deeper inversion. For Swinburne, simplicity is a *probability-booster* — simpler hypotheses are antecedently likelier. For Deutsch, simplicity is not a source of probability at all; it is, at best, a *by-product* of being hard to vary, a downstream symptom rather than an upstream virtue you can cash in for a high prior.\n\nA paper aimed squarely at this junction — \"Religious and Scientific Faith in Simplicity\" — sharpens the asymmetry. In empirical science, it argues, simplicity functions as a *constraint-generating* heuristic: a simpler theory commits to more, exposes more surface to refutation, forbids more. But applied to the divine nature, simplicity \"cannot be easily varied or tested,\" and a hypothesis selected for a simplicity that generates no constraints may be \"unfalsifiable by design\" ([arXiv 0811.0630](https://arxiv.org/pdf/0811.0630)). That is the Deutschian worry in other words: the same property (simplicity) that earns its keep in physics by tightening the screws can, transplanted into theology, do the opposite — loosening them while wearing the prestige of the scientific virtue it no longer performs.\n\n## The surprise: Deutsch rejects fine-tuning *and* its usual rebuttal\n\nHere the chapter delivers its least expected finding, and the one most likely to be gotten wrong by people who know only Deutsch's reputation. He is a celebrated champion of the multiverse. So surely, the reasoning goes, he defuses the fine-tuning argument — the observation that the physical constants sit in the narrow band permitting life, which design theorists offer as evidence of a tuner — by the familiar anthropic move: with countless universes sporting random constants, some will permit observers, and naturally we find ourselves in one of those. Surely Deutsch's multiverse simply *answers* fine-tuning.\n\nIt does not. Deutsch does the opposite, and rejects both sides of the standard debate.\n\nHe rejects the anthropic rebuttal. In the \"Creation\" chapter of *The Beginning of Infinity*, following an argument of Dennis Sciama's, he points out that anthropic reasoning, applied carefully across multiple constants, predicts \"that it is overwhelmingly likely that we are in a universe in which astrophysicists are only just possible and will cease to exist in an instant. So they are bad explanations\" ([Publicism text of ch. 5](https://publicism.info/science/infinity/5.html)). Anthropic arguments based on the space of \"all possible laws\" fare no better: they \"are ruled out for being bad explanations,\" because almost all logically possible life-permitting universes are governed by laws that are themselves bad explanations — ungainly, unexplanatory, fine-tuned in a different way. And he dismisses the supposed make-fine-tuning-vanish trick of relabeling, observing that the distinction between \"the same laws with different constants\" and \"different laws\" is \"parochial,\" with no deep difference between the two. Anthropic selection, in short, \"cannot make predictions and cannot explain the fine-tuning.\"\n\nHe equally rejects the design side. The flaw of creationism, for Deutsch, is the same flaw he finds in Lamarckism and in any appeal to a finished source of knowledge: the designer is posited \"just there, complete with all that knowledge,\" which explains nothing, because the very thing crying out for explanation — the origin of the adaptive complexity, the knowledge — is smuggled in fully formed at the start. A supernatural mind stipulated to already possess the design is not an account of how the design arose; it is the question restated as an answer.\n\nTwo corrections to the popular reading follow, and they matter. First, the multiverse Deutsch believes in is the *Everettian* one — the branching wavefunction of quantum mechanics — which is a *quantum-mechanical* commitment about measurement and superposition. It is **not** the *cosmological* multiverse of the fine-tuning debate, the string-theory landscape of regions with different low-energy constants. They are different ideas with the same nickname. To say \"Deutsch's multiverse answers fine-tuning\" conflates them, and it is simply a misreading. Second — and this is the philosophically arresting part — Deutsch's position leaves fine-tuning standing as a *genuine, unsolved problem for science*. He does not wave it away. He holds that it is real, that it is soluble, and that any solution worth having will be a *deeper hard-to-vary explanation* we do not yet possess. Both God and anthropics are disqualified, by the same criterion, for the same reason: each is easy to vary, each explains too much by explaining nothing in particular. Fine-tuning is not a victory for theism *or* for the casual atheist who thinks the multiverse has tidied it up. By Deutsch's lights, both have reached for a bad explanation, and the honest position is to admit the problem is open.\n\n## The deepest move: does reason rest on faith?\n\nThe richest material in this whole area does not flow from Deutsch toward religion. It flows the other way, from the Popperian tradition into the question of whether *rationalism itself* is a kind of faith — and it is here, not in any debate about God's attributes, that the serious scholarship lives.\n\nThe challenge is the *tu quoque*, the \"you too.\" Press a rationalist for the ultimate justification of his commitment to reason, and he hits the Münchhausen trilemma: he can regress infinitely, argue in a circle, or stop at a dogma he simply adopts. Whichever he chooses, the apologist pounces — the rationalist's allegiance to reason is *itself* an unjustified commitment, a leap. So the believer's leap of faith is \"no worse off.\" Both have planted a flag on ungrounded soil; the rationalist has merely planted his more smugly.\n\nW. W. Bartley III built his career on answering this, and his answer is subtle. In *The Retreat to Commitment*, Bartley grants the trilemma but escapes it by *decoupling criticism from justification*. The error, he argues, is the shared assumption — held by dogmatist and skeptic alike — that to hold a position rationally is to *justify* it. Drop that assumption. His \"pancritical\" (comprehensively critical) rationalism holds *every* position, including rationalism itself, permanently open to criticism, while abandoning the demand to justify anything at all ([pancritical rationalism](https://en.wikipedia.org/wiki/Pancritical_rationalism); [W. W. Bartley III](https://en.wikipedia.org/wiki/W._W._Bartley_III)). The rationalist no longer needs a foundational commitment, so there is no foundation for the *tu quoque* to attack: criticism, not justification, is the thing, and criticism needs no unjustifiable starting dogma. Tellingly, Bartley worked this out *through* a history of Protestant theology, where the same retreat — from argument to commitment — had played out in miniature ([Diller exposition](https://www.cantab.net/users/antoni.diller/rationalism/pancritical.html)).\n\nBut the standoff is not cleanly resolved in the rationalist's favor, and intellectual honesty demands recording that. Critics — Brendan Hauptli among them — argue that pancritical rationalism smuggles justificationism back in through the door it claimed to lock: to *prefer* a criticism-surviving theory to one that has failed criticism is, the objection runs, to treat survival as a reason, which is justification under another name ([Hauptli, \"A Dilemma for Bartley\"](https://faculty.fiu.edu/~hauptli/ADilemmaforBartley.pdf)). The escape from the trilemma may be less complete than advertised.\n\nAnd the tradition's own founder conceded the soft underbelly. Popper called his rationalism a \"faith in reason\" — explicitly \"an irrational faith,\" embraced as a *moral decision* rather than established by proof ([critical rationalism](https://en.wikipedia.org/wiki/Critical_rationalism)). Anthony O'Hear pushes harder still: he reads the late Popper's quasi-Platonic \"World 3\" of objective knowledge as tending \"in an unfulfilled Platonic direction\" that arguably \"need[s] a religious foundation\" to stand ([O'Hear, *Popper, Philosophy and Faith*](https://www.cambridge.org/core/elements/abs/popper-philosophy-and-faith/C4DE5EBDB5024BBB53B6658B6D41E659)). One can resist O'Hear's conclusion. But the existence of the argument, from a serious philosopher and squarely within the Popperian family, is the point: the faith-versus-criticism question is live, contested, and emphatically not a walkover for Deutsch's side. The criterion that dispatches Demeter so cleanly cannot, it turns out, dispatch the question of its own ultimate warrant — and the most rigorous voices in Deutsch's own lineage are the ones who say so.\n\n## A calibrated verdict — and the thin-literature caveat\n\nSet the criterion honestly against theology and the result is mixed, not triumphant for either party.\n\nIt bites, hard, where it should. Folk theism, providential readings of fortune, petitionary prayer, and most theodicy are easy-to-vary in exactly Deutsch's sense — they absorb every outcome, forbid none, and the evil-problem literature has largely conceded that it offers compatibility rather than explanation. Here the criterion earns its keep, and a believer who wants an intellectually serious faith has reason to *welcome* that, as a solvent for the lazy versions of his own tradition.\n\nIt meets a real obstacle in classical theism, whose divine-simplicity architecture is hard to vary in a precise structural sense the corpus has tried to make explicit: you cannot tweak one attribute without collapsing the whole. The unresolved question — and it is genuinely unresolved, not rhetorically open — is whether deductive rigidity without empirical grip satisfies a criterion that demands hard-to-vary accounting *of the phenomena*. The chapter has not pretended to settle it.\n\nAnd it is answered in kind on its own ground, where Bartley, Hauptli, Popper, and O'Hear keep the faith-versus-reason question genuinely open, with the Münchhausen trilemma unbanished and the rationalist's foundations admitted, by the tradition's own founder, to rest on an \"irrational faith.\"\n\nThe honest caveat — promised at the start and owed again at the end — is about the *state of the literature*, and it should temper how much weight any reader places on this chapter. Direct, sustained engagement between theologians and Deutsch on the hard-to-vary criterion barely exists, and what exists is almost entirely non-academic. The most concrete direct treatment found is, surprisingly, from Latter-day Saint philosophy: a *Millennial Star* post that explicitly asks \"Can the rule of 'easy to vary' being a 'bad explanation' apply to theology?\" and answers, carefully, not that theology simply *fails*, but that theology is \"either of a different kind than science, or it is 'vague science' at best,\" operating under \"huge latitude in how it's interpreted\" ([Millennial Star](https://www.millennialstar.org/david-deutsch-on-explanations/); related musings at [Nielson on the afterlife](https://brucenielson.medium.com/disagreements-with-deutsch-the-afterlife-62097fada896)). That is a thoughtful amateur grappling, not a scholarly exchange, and it is close to the high-water mark of direct engagement. The Deutsch and ToKCast community around Brett Hall is broadly secular and has produced no rigorous dedicated theology of the criterion.\n\nEverything substantial in this chapter, therefore, was *bridged* to Deutsch by inference: the meat is in adjacent debates — Bartley and Popper on faith, the simplicity-and-Bayes critique of Swinburne, the divine-simplicity literature — and the connections to the hard-to-vary criterion are the corpus's own. Most pointedly: **the classical-theism-as-hard-to-vary steelman, which is the chapter's best argument, is a reconstruction this corpus is making, not a position any theologian has published against Deutsch.** The preceding adversarial-verification pass confirmed as much — it found *no* theology-specific claim attributable to Deutsch beyond his own verdict on Persephone. So this chapter is, by a clear margin, the most interpretive in the book. The reader should weigh it as a careful *application* of a powerful idea to a domain its author left almost untouched — illuminating, the corpus hopes, but reconstructed rather than reported, and offered in that spirit."}, {"order": 7, "file": "07_Other_Domains.md", "title": "Error-Correcting Machinery: Politics, Economics, Climate, Knowledge", "summary": "From 'who should rule?' to removing bad rulers without violence; the impossibility of prophecy; contested climate optimism; the filter against misinformation.", "body": "# Error-Correcting Machinery: Politics, Economics, Climate, Knowledge\n\n*The hard-to-vary criterion was forged as a test for physical theories. But its deepest claim is that a theory is good when reality has nailed down its parts so tightly that you cannot wiggle them to fit a different world — and that claim travels. Carry it into politics and the question of legitimate rule dissolves into a question of maintenance. Carry it into economics and the prophet's chart collapses into pseudoscience. Carry it into climate and an entire moral vocabulary — \"sustainability,\" \"drastic cutbacks,\" \"limits\" — comes up for cross-examination. The wager of this chapter is that government, markets, and science are not three subjects but one: machinery for cheaply killing bad ideas before they kill us.*\n\n## How to Remove a Bad Ruler Without Violence\n\nFor most of political philosophy the master question has been *who should rule?* — the wise, the many, the propertied, the proletariat, the philosopher-king. Karl Popper's quiet revolution was to notice that the question is malformed. To ask who *should* rule is to assume we can reliably identify good rulers in advance and install them — which is a forecasting feat, a prophecy about how power will behave once granted. And prophecy, Popper held, is exactly what political knowledge cannot deliver. The better question, the one a fallibilist can actually act on, is procedural: *how do we build institutions that let us remove bad rulers and bad policies without violence, and correct our mistakes as we go?* ([Stanford Encyclopedia of Philosophy](https://plato.stanford.edu/entries/popper/); [Internet Encyclopedia of Philosophy](https://iep.utm.edu/popp-pol/)).\n\nDavid Deutsch sharpens the reframing into a single criterion. A rational political system, on his telling, is one that makes it *as easy as possible to detect that a leader or a policy is a mistake and to get rid of it peacefully.* Governments are to be judged not by their \"prophetic ability to choose good leaders\" but by their capacity to jettison bad ones cheaply ([Nat Eliason's notes on *The Beginning of Infinity*](https://www.nateliason.com/notes/beginning-of-infinity-david-deutsch)). The standard is not the quality of selection but the speed and bloodlessness of correction.\n\nStated that way, three institutions that are usually filed under different headings turn out to be the same kind of device. Science kills bad conjectures by *falsification* — an experiment defeats a theory. Democracy kills bad governments by *electoral defeat* — a vote ejects an administration. Markets kill bad firms and bad bets by *bankruptcy and exit* — customers withdraw, capital flees. In each case the move is identical: a cheap, non-violent mechanism for detecting error and reversing it before the cost compounds. This is the spine of the whole corpus carried into the social world. A good explanation is hard to vary; a good *institution* is one whose errors are easy to expel. The two are mirror images — rigidity in what we believe, fluidity in how we govern — and both serve the one project of error-correction.\n\n## The First-Past-the-Post Wager\n\nHere the framework grows teeth, because Deutsch uses it to defend a deeply unfashionable conclusion. He prefers first-past-the-post (plurality) voting to proportional representation, and not mildly. To Tyler Cowen he put it without hedging: \"I favor the first-past-the-post system in the purest possible form, as it is implemented in Britain. I think that is the most error-correcting possible electoral system\" ([Conversations with Tyler](https://marginalrevolution.com/marginalrevolution/2021/06/my-conversation-with-the-very-very-smart-david-deutsch.html)). The same argument runs through \"A Window on Infinity\" in *The Beginning of Infinity* and his writing in the *Guardian*.\n\nThe reasoning is wholly internal to error-correction. Plurality voting usually hands one party an outright parliamentary majority and therefore *sole* responsibility for governing. When a policy fails, voters know precisely whom to blame, and a modest swing at the next election can eject the entire government cleanly — one identifiable target, one decisive removal. Proportional representation, by contrast, \"causes coalitions all the time,\" and \"coalitions are bad\" ([Conversations with Tyler](https://marginalrevolution.com/marginalrevolution/2021/06/my-conversation-with-the-very-very-smart-david-deutsch.html)). The defect is subtle and specifically epistemic: when a coalition fails, the parties of the old coalition are typically *also* needed to assemble the new one, so the very party responsible for the failed policy survives into the next government. Voters can punish the policy and still be ruled by its authors. The error gets diagnosed but not expelled — the political equivalent of a theory that absorbs its own refutation ([Vaden Masrani, \"Proportional Representation\"](https://vmasrani.github.io/blog/2018/prop_rep/)).\n\nThis is the rare political claim that follows cleanly from a clear principle, which is what makes its critics interesting: they grant the *framework* and contest the *conclusion*. Their wedge is that error-correction is a property of the whole institutional context, not of the ballot formula taken in isolation. A parliamentary PR system can out-correct a presidential plurality one. Consider the American case the critics press: under divided government the executive and the legislature \"blame each other,\" accountability dissolves into a fog of mutual recrimination, and voters cannot locate the responsible party to throw out — whereas a parliamentary coalition at least presents one identifiable government to remove ([*Information Knoll*, \"Electoral Systems and Human Progress\"](https://informationknoll.wordpress.com/2018/05/25/electoral-systems-and-human-progress-a-response-to-david-deutsch/)). The ballot, on this view, is one component in a larger circuit; optimizing it alone can leave the circuit as a whole *less* correcting.\n\nA note on where the corpus stands, flagged as our own synthesis. The dispute looks under-determined by the evidence. Stable PR democracies — the Nordics — and majoritarian systems alike produce their share of good and bad outcomes, and no clean natural experiment isolates the ballot formula from everything else that varies between countries. Read honestly, then, Deutsch's preference is best understood not as an established result but as a *conjecture about institutional design* — a hard-to-vary-seeking proposal that his own fallibilism insists should remain open to refutation. Critics enjoy pressing exactly this tension, and they are right to: the man who taught us that good ideas invite their own testing cannot exempt his favorite electoral system from the same exposure. The framework would be poorer if he did.\n\n## Why You Cannot Predict the Future\n\nThe reframing of politics rests on a deeper prohibition, and it is Popper's *The Poverty of Historicism* that supplies it. The argument is almost embarrassingly simple once seen. You cannot scientifically predict the future *growth of knowledge*, because if you could predict the content of tomorrow's discovery, you would in effect already possess it today — and then it would not be tomorrow's discovery. Since the growth of knowledge is the principal driver of social and economic change, large-scale, long-range social and economic *prophecy* is not merely difficult but pseudo-scientific in principle ([Wikipedia, *The Poverty of Historicism*](https://en.wikipedia.org/wiki/The_Poverty_of_Historicism); [Stanford Encyclopedia of Philosophy](https://plato.stanford.edu/entries/popper/)).\n\nPopper diagnosed the historicist's underlying error as a category mistake about what science is. The astronomer's eclipse prediction — an \"unconditional prophecy,\" exact and decades out — is the rare exception that historicists mistook for the essence of science. It works only because the solar system is, for these purposes, isolated, stationary, and repetitive. Human society is none of these things. It is open, it is changed by the knowledge generated within it, and it does not cycle. To predict its trajectory on the eclipse model is to apply a method to a subject that structurally defeats it.\n\nThe corpus reads this — flagging the move as our own extension — as a direct indictment of two now-ubiquitous genres. The first is the confident decade-out macro forecast: the dated chart of where GDP, or inflation, or a particular industry \"will be\" in 2040, presented with a precision the subject matter cannot bear. The second, subtler and more corrosive, is the pundit's *post-hoc* narrative. A story that can be told with equal fluency to explain a recession *and* to explain its absence explains neither; it has been retrofitted to whatever happened, and a tale that fits every outcome forecloses none. This is the easy-to-vary pathology in its economic dress. A genuinely hard-to-vary account of the economy would have stuck its neck out beforehand — would have ruled out the worlds that did not come to pass — and could therefore have been wrong. The retrofit risks nothing and so teaches nothing.\n\n## The Hayek Resonance, and Its Limit\n\nThe anti-prophecy stance places Deutsch in evident sympathy with Friedrich Hayek, and the resonance is worth drawing precisely because it is incomplete. Hayek's \"knowledge problem\" holds that the knowledge relevant to economic coordination is irreducibly dispersed, tacit, and context-specific — the particular circumstances of time and place, known only to the man on the spot — so that no central planner can ever aggregate it as effectively as the price system, which compresses scattered local knowledge into a single actionable signal ([EconLib, \"The Use of Knowledge in Society\"](https://www.econlib.org/notes-on-hayeks-the-use-of-knowledge-in-society/); [FEE, \"Hayek & the Knowledge Problem\"](https://fee.org/articles/hayek-the-knowledge-problem/)). The shared enemy is plain: the planner's prophetic conceit, the belief that one mind or committee can hold and direct what is in fact distributed across millions.\n\nBut the divergence matters as much as the overlap. Hayek is principally concerned with *transmitting* existing dispersed knowledge — getting what is already known to where it is needed, via prices. Deutsch's emphasis falls on the *creation* of knowledge that does not yet exist anywhere: new explanations conjectured and criticized into being. Signaling versus generative novelty. The market, for Deutsch, is valuable not only because it routes information efficiently but because it is one more error-correcting arena in which new conjectures — products, firms, ways of organizing — get proposed and cheaply refuted. And he keeps his distance even so: he reportedly agrees with Hayek on economics \"but not necessarily in regard to society at large,\" declining to follow the broader libertarian program that Hayek's economics is often taken to entail ([Quillette, \"The Unconstrained Vision of David Deutsch\"](https://quillette.com/2019/01/26/the-unconstrained-vision-of-david-deutsch/)). Same diagnosis of the planner's hubris; different account of what the alternative is *for*.\n\n## Climate: Optimism and Its Critics\n\nNowhere is Deutsch's optimism more provocative — or more genuinely contested — than on climate, and the chapter owes it a fair hearing on both sides. He applies \"problems are soluble\" without flinching. The answer to climate change, on his account, is *more* knowledge, wealth, and technology and better error-correction, not \"drastic cutbacks.\" He ranks the responses in a deliberately heterodox order: geoengineering first, adaptation and the mitigation of effects on people second, emissions reduction third. And he turns the prevailing moral vocabulary inside out, attacking \"sustainability\" as a near-synonym for *stagnation* — a commitment to \"problem-avoidance\" where we should be committed to problem-*solving* ([Scientific American, \"The Infinite Optimism of Physicist David Deutsch\"](https://www.scientificamerican.com/blog/cross-check/the-infinite-optimism-of-physicist-david-deutsch/); [Warp News profile](https://www.warpnews.org/david-deutsch/)). The deeper move is to classify \"prophecies of doom\" as a structural form of pessimism: an attempt to declare progress impossible in advance, and therefore — by the corpus's central lights — an attack on the very possibility of knowledge growth ([J.R. Leahenry, \"Sustainability Is Unsustainable\"](https://jrleahenry.medium.com/sustainability-is-unsustainable-f6dc1132584a)).\n\nThe critics deserve their full weight, and the sharpest point in their favor is that *Deutsch's own framework cuts both ways.* First, moral hazard: betting on geoengineering technologies that do not yet exist, while emissions compound in the meantime, is itself an easy-to-vary faith. \"Technology will save us\" survives any particular setback unscathed — a failed prototype, a missed deadline, a side effect — by deferring the rescue one more increment into the future. It is precisely the kind of belief that no observation can dent, which by Deutsch's own criterion should make us suspicious of it. Second, irreversibility: some damages — mass extinction, the crossing of ice-sheet thresholds — may be effectively permanent on human timescales, and \"soluble in principle\" is cold comfort once a tipping point is behind you, when the option to correct has already been spent. Third, and most elegantly, \"sustainability\" can be defended *on Deutsch's own terms* — not as stagnation but as the purchase of option-value, keeping error-correction possible by refusing to foreclose futures we may later need.\n\nThe corpus's position, flagged as synthesis: the framework is genuinely useful here, and it is right that unfalsifiable doom-prophecy — catastrophe forever imminent, never arriving, the date quietly moved — fails the hard-to-vary test and deserves the skepticism Deutsch aims at it. But optimism earns no exemption from the same test. \"Wait for better knowledge\" can itself become the unfalsifiable story, the conjecture that absorbs every disappointment by promising the breakthrough is always one discovery away. The honest application of the criterion indicts the easy-to-vary move *wherever it appears* — and on climate it appears on both sides of the table. That symmetry is the whole point of having a criterion rather than a prior commitment.\n\n## A Note on Minds That Make Explanations\n\nOne domain deserves only a marker here, because it is the swing factor in Deutsch's reputation and is treated in full elsewhere. His signature claim about artificial general intelligence is that AGI would require the capacity to generate new *hard-to-vary explanations* — genuine creativity through conjecture and criticism — and not merely better prediction or pattern-matching. On his view \"AGI\" has therefore made essentially no progress, because prediction was the wrong target all along; the field has been climbing the wrong mountain. The live counter is the scaling hypothesis: that creativity is not binary but continuous, that intelligence is a gradient improved by scale, and that systems Deutsch would call \"uncreative\" already crack problems formerly thought impossible ([Dwarkesh Patel, \"Contra David Deutsch on AI\"](https://www.dwarkesh.com/p/universal-explainers)). The epistemology of explanatory creativity that grounds Deutsch's claim is the work of **Chapter 03**; the reason this single disagreement may decide how his whole legacy is read belongs to the **Future Trajectory** chapter. Here it is enough to note that the AGI question is the hard-to-vary criterion turned on the act of cognition itself.\n\n## The Portable Filter\n\nThe criterion that began as a test for physical theories ends as something a single person can carry into a single afternoon's reading. A good explanation has all its parts functionally locked: change one and it stops accounting for the phenomenon, which is why it cannot be twisted to fit just any new fact. A bad explanation is \"barely connected to the details of the phenomenon\" and can absorb any observation whatsoever ([Wikipedia, \"Explanatory power\"](https://en.wikipedia.org/wiki/Explanatory_power)). That single distinction is a usable instrument of epistemic hygiene — a way to interrogate a claim by asking not *is it emotionally compelling?* but *could any conceivable observation have refuted it, and would it survive being told to a different world?*\n\nThe instrument matters most against misinformation, and the corpus's synthesis is that viral falsehood is, in a precise Darwinian sense, *selected for easy-to-vary virtue.* A conspiracy narrative that survives every disconfirmation by adding one more epicycle — the absence of evidence is itself the proof of the cover-up — is for that very reason endlessly spreadable and entirely useless. Its adaptability, the feature that lets it absorb any rebuttal, is identical to its emptiness; the two cannot be separated. Encouragingly, independent empirical work converges on the same axis from the other direction. Disinformation and trustworthy reporting differ less in emotional intensity than in *epistemic grounding, causal structure, and source diversity* — measurable properties that are an empirical echo of Deutsch's reach-and-rigidity criterion, arrived at by researchers who were not setting out to vindicate a philosopher of physics ([*Social Sciences*, MDPI 15(4):255](https://www.mdpi.com/2076-0760/15/4/255)).\n\nThat convergence is the chapter's quiet payoff. The same test that distinguishes a deep physical theory from a shallow one, that reframes the legitimacy of governments as a maintenance problem, that exposes the pundit's retrofitted narrative and the prophet's chart, and that cuts equally against doom and against complacency on climate — that one test also separates news you can build on from noise engineered to spread. Hard to vary while still accounting for what it explains. It is the same move, all the way down: in the lab, in the legislature, in the market, and in the feed. Problems are inevitable; problems are soluble; and the machinery that solves them, wherever we find it, turns out to run on a single principle — the disciplined refusal to let a good idea mean whatever the moment requires."}, {"order": 8, "file": "Future_Trajectory.md", "title": "Future Trajectory: Where Deutsch's Influence Goes", "summary": "A calibrated forecast — the epistemology compounds, the physics program is most at risk of stalling, and the AGI debate is the high-variance swing factor.", "body": "# Future Trajectory: Where Deutsch's Influence Goes\n\n*This is the corpus's calibrated look forward, not a record of fact. It is a forecast, and a forecast judged by Deutsch's own criterion has an obligation: to be hard to vary. So rather than hedge in every direction, each call below commits to a specific direction, attaches a confidence level, and names the evidence that would confirm or refute it. Where the future is genuinely two-sided, the forecast says so and gives both branches real weight — but it does not pretend the whole future is two-sided to protect itself from being wrong.*\n\nThe single most useful move in forecasting Deutsch is to stop treating \"Deutsch's influence\" as one thing. His legacy is really three assets with three different risk profiles, and they will not move together. There is the **epistemology** — the Popperian revival, \"hard to vary,\" the picture of knowledge growing through conjecture, criticism, and institutional error-correction. There is the **physics program** — constructor theory, the attempt to recast fundamental law in terms of which transformations are possible and impossible. And there is the **AGI thesis** — the claim that general intelligence requires generating hard-to-vary *explanations*, not better prediction or pattern-matching. Holding these apart is the whole game. A reader who bundles them will either over-credit Deutsch when the epistemology spreads or over-punish him if constructor theory stays niche. The interesting forecast lives in the divergence.\n\n## The epistemology compounds (high confidence)\n\nThe call I hold most firmly: over the next three to ten years, Deutsch's cultural and intellectual footprint in the technology-and-venture sphere keeps growing, and the epistemology is the vehicle. This is the asset with the strongest transmission belt, and the belt is self-reinforcing.\n\nStart with the amplifiers. Naval Ravikant has said the hard-to-vary concept \"upgraded my thinking more than almost anything else,\" and Ravikant is not a passive endorser — he runs a megaphone with reach into exactly the founder-and-investor audience most disposed to adopt a worldview wholesale. Around him sits a dedicated explanatory layer: Brett Hall's [ToKCast](https://brettroberthall.podbean.com/) and the \"Deutsch Files\" collaboration with Ravikant function as a patient, episodic on-ramp that turns *The Beginning of Infinity* from a difficult book into a community. Above that, recurring high-reach appearances — Tyler Cowen's [Conversations with Tyler](https://marginalrevolution.com/marginalrevolution/2021/06/my-conversation-with-the-very-very-smart-david-deutsch.html), Sam Harris, Dwarkesh Patel — keep refreshing the top of the funnel. A worldview with a popularizer, a community, and a rotating cast of elite interviewers has the structure of something that diffuses rather than fades.\n\nThe deeper reason for confidence is fit. \"Problems are soluble,\" optimism as a moral stance, error-correction as the engine of progress — this is the native grammar of the progress-studies and techno-optimist moment in Silicon Valley. Deutsch did not chase that milieu; the milieu arrived at a place his ideas already furnished. Over the forecast window I expect \"optimism plus error-correction plus problems-are-soluble\" to keep settling in as a *default operating philosophy* in that world — the thing people reach for without attribution, which is the truest marker of an idea that has won. **Confidence: high (~80%).**\n\nWhat would refute this: the online Deutschian community stops growing or visibly contracts; Ravikant-tier amplifiers move on to other intellectual fixations; or the progress-studies optimism curdles into something darker and less hospitable. Any of those would be a real signal, and I would mark the call down. Absent them, the epistemology is the compounding asset.\n\n## AGI is the wildcard (genuinely two-sided)\n\nHere the forecast refuses to pretend it knows. The AGI debate is the swing factor that dominates Deutsch's *medium-term* reputation more than anything else he has done — more than the epistemology's slow diffusion, far more than constructor theory's fortunes among physicists. It is also the one place where I think the honest probability is close to a coin flip, and I will not manufacture false confidence to make the chapter cleaner.\n\nDeutsch's thesis is sharp. General intelligence is the capacity to create new explanatory knowledge — to generate hard-to-vary explanations through conjecture and criticism. On this view creativity is a qualitative threshold, not a dial, and more prediction or pattern-matching, however impressive, does not cross it. The live counter is the scaling hypothesis, and its most pointed statement against Deutsch is Dwarkesh Patel's [Contra David Deutsch on AI](https://www.dwarkesh.com/p/universal-explainers). Patel argues that creativity is not binary, that intelligence is a continuum improved by scale, that narrow and supposedly \"uncreative\" systems already crack problems that were recently considered impossible — protein folding, Go, drug discovery — and that computational universality, Deutsch's prized argument, is close to practically empty once you take finite compute seriously. It is the strongest in-milieu rebuttal precisely because it comes from inside the same intellectual community, not from a hostile outsider.\n\nSo the directional call splits cleanly, and both branches deserve weight:\n\n- **Branch up:** If LLM scaling visibly *stalls* short of open-ended creativity — and especially if a frontier model is seen to fail, publicly, at genuine open-ended scientific conjecture — then Deutsch's \"explanation, not prediction\" framework gets a major vindication and a second wind. The argument that the field was climbing the wrong hill would suddenly look prescient, and Deutsch's stock rises sharply.\n- **Branch down:** If scaling keeps yielding behavior that is, for all practical purposes, creative — novel proofs, designs, conjectures that survive scrutiny — then the framework gets quietly reframed as a philosophical footnote, a clever distinction that the empirics rolled over. Deutsch loses ground to the people who simply built the thing.\n\n**Confidence: deliberately near 50/50 on direction; very high that this debate, not the others, sets his medium-term reputation.** What confirms each branch is concrete: a scaling plateau plus a visible failure of frontier models at open-ended scientific conjecture (Deutsch up) versus frontier models producing genuinely novel, *hard-to-vary* scientific explanations that survive expert criticism (Deutsch down). The criterion that animates this whole corpus is, fittingly, also the test of his AGI thesis: the day a machine produces an explanation that is hard to vary, the argument is settled against him.\n\n## Constructor theory likely stalls (medium-high confidence)\n\nConstructor theory was meant to be the lasting *scientific* monument — the formal program that would outlive the popular books. My call is that, over the forecast window, it more likely stays niche than reshapes physics. This is the prediction I expect to be least popular with committed Deutschians, so it is worth stating its limits precisely.\n\nAfter more than a decade, the program still draws the same charge: few-to-no novel testable predictions that standard physics did not already make, with core claims disputed or simply under-adopted by working physicists, and a public literature that remains [proponent-dominated](https://en.wikipedia.org/wiki/Constructor_theory). That is not nothing. A research program's failure to recruit its own field after ten years is itself evidence about its near-term trajectory.\n\nBut \"stalled\" is not \"refuted,\" and intellectual honesty requires holding the distinction. The program is demonstrably *alive*: there are 2025–2026 efforts to operationalize it, and the Bose–Marletto–Vedral proposal — that two masses becoming entangled only through gravity would imply gravity is non-classical — supplies an in-principle test whose framing draws directly on the constructor theory of information. My honest verdict is therefore the narrow one: constructor theory is **under-tested and not yet empirically distinguishable from standard physics — not falsified, not vindicated.** Absent a clean empirical win, niche is the base case. **Confidence: medium-high (~70%) that it remains niche through the window.** And the most radical applied offshoot, Taking Children Seriously, I expect to stay marginal regardless — it is too far from any institution that could carry it.\n\nWhat would refute the stall call, and I want this to be a real, losable bet: a constructor-theoretic prediction *confirmed* that standard physics did not make — for instance, a decisive BMV-type result read through the constructor-theoretic lens. That would not just revive the program; it would invert this section, and I would owe the revision gladly.\n\n## The net thesis, and the closing irony\n\nPut the three together and the shape is clear. Deutsch's **epistemology** is the asset most likely to compound and outlive the rest. His **physics program** is the part most at risk of stalling. And **AGI** is the wildcard that could send his overall stock sharply up or quietly down inside this very de
