<script id="corpus-data" type="application/json">{"slug": "deutsch-good-explanations-research", "title": "David Deutsch & the Good Explanation", "subtitle": "The Hard-to-Vary Standard · A Deep-Research Corpus · June 2026", "author": "Calvin", "generated": "2026-06-12", "documents": [{"order": 0, "file": "00_Briefing.md", "title": "Briefing: The Hard-to-Vary Standard", "summary": "The one idea, the five applications, and an honest map of what the corpus proves versus what it argues.", "body": "# Briefing: The Hard-to-Vary Standard\n\n*David Deutsch's whole epistemology turns on a single test you can carry in your pocket. This is the briefing: the idea stated plainly, the five places this corpus takes it, and — because the corpus is built on Deutsch's own standard — a frank accounting of which parts are nailed down and which are argued.*\n\n## Bottom line\n\nA **good explanation is one that is hard to vary while still accounting for what it is supposed to explain.** Every detail does load-bearing work, so you cannot tweak it to fit a different outcome without wrecking it. A **bad explanation is easy to vary**: its parts are interchangeable, so it can be bent to accommodate any result after the fact, which is exactly why it explains nothing.\n\nThat is the entire idea, and it is more powerful than its size suggests. It is Deutsch's correction to Karl Popper: testability and falsifiability are not enough — \"even cranks can make theories that are testable\" — because what actually drives knowledge forward is *explanatory* content that is rigid under challenge. The Greek myth that winter comes from Demeter's grief is a perfectly serviceable, even testable, story; its fatal flaw is that the Greeks \"could have easily varied their myth\" to fit the seasons in Australia. The axial-tilt explanation cannot be rescued that way. That brittleness is the virtue. As Deutsch puts it: *the truth consists of hard-to-vary assertions about reality.*\n\nThe headline finding of this corpus is that the criterion **travels** — into how a layperson should judge a claim, into how a CTV strategist should pressure-test a measurement story, into theology, politics, economics, and the argument about artificial intelligence — and that it earns its keep in every one of those rooms, though not always as a proof. Sometimes it is the lens; the corpus is careful to tell you which.\n\n## The criterion, stated for use\n\nWhen you meet any explanation, ask one question: **could this same story be tweaked to explain the opposite outcome, just as comfortably?** If yes, it is easy to vary, and you have learned nothing from it. If no — if challenging any single detail would force the whole account to change — you are holding something worth taking seriously. This corpus calls that the *Swap Test*, and it is the through-line of all eight chapters that follow.\n\n## In brief: the five applications\n\n**1 · The philosophy (Chapters 01–03).** This is the strongly-evidenced spine. The criterion, its roots in Popper's conjecture-and-refutation, its fallibilism — *no certainty, but truth is real and approachable* — and its combative rejection of induction, empiricism, justification, and Bayesianism are all documented in Deutsch's own words, and they survived adversarial fact-checking at the highest confidence. Chapter 03 then turns the criterion on itself: the sharpest objections (that \"hard to vary\" is vague, that it smuggles induction back in under the word \"reach,\" that Deutsch misreads the Popper–Miller theorem), plus his two contested physics bets — constructor theory and the Everett multiverse.\n\n**2 · Everyday problem-solving (Chapter 04).** The criterion as a thinking tool: the Swap Test against conspiracy theories, astrology, \"the system is rigged,\" and hindsight punditry; conjecture-and-criticism as a way to argue and decide; *seek the explanation, not the authority*; the Taking Children Seriously approach to parenting (presented with its real critics); and \"problems are soluble\" as a working stance against both doom and naïveté. Naval Ravikant, who did more than anyone to popularize the idea, told Deutsch it \"upgraded my thinking more than almost anything else.\"\n\n**3 · CTV and programmatic advertising (Chapter 05).** The application built for the day job. Post-hoc attribution narratives — \"the campaign worked because of CTV's premium environment\" — are *Persephone wearing a number*: they would have explained a loss just as smoothly, so they explain nothing. A hard-to-vary explanation commits to a mechanism, a magnitude, and a failure condition, and survives a holdout. Incrementality testing is Popperian error-correction; \"reach\" is the difference between a result that generalizes and one that overfit a single spend pattern. The chapter closes with decision heuristics for pressure-testing any measurement story — and an honest note that the strongest empirical anchor (Meta's PIE, R²=0.88 vs 0.19) illustrates the *value of experiments*, not the philosophy itself.\n\n**4 · Theology (Chapter 06).** The hardest and most interpretive case, steelmanned in both directions. Folk theism and ever-mutable theodicy are the textbook easy-to-vary move — any outcome is \"God's plan.\" But the strongest reply is not popular theism, which the criterion demolishes; it is *classical/Thomistic theism*, whose divine-simplicity architecture is structurally hard to vary — you cannot tweak one attribute without the whole edifice collapsing. The chapter also surfaces a genuine surprise: Deutsch, a multiverse realist, rejects *both* the fine-tuning design argument *and* the anthropic rebuttal to it; and it brings in W. W. Bartley's question of whether reason itself rests on an act of faith.\n\n**5 · Other domains and the forecast (Chapters 07 and the Future Trajectory).** Politics reframed as error-correction — Popper's move from \"who should rule?\" to \"how do we remove bad rulers without violence,\" and Deutsch's controversial defense of first-past-the-post. The impossibility of prophecy (you can't predict the growth of knowledge), the Hayek resonance, his contested climate optimism, and the hard-to-vary test as a filter against misinformation. The forecast splits his legacy into three assets moving at different speeds: the epistemology compounds, the physics program is most at risk of stalling, and the AGI debate is the wildcard.\n\n## An honest confidence map\n\nThis corpus was assembled in two passes, and it would violate its own subject to hide the seam. A fact-checking harness first verified the philosophical spine against Deutsch's primary texts; then five targeted research passes filled the applied workstreams the harness left thin. The result is genuine asymmetry, and you should read accordingly:\n\n| Workstream | Evidential status |\n|---|---|\n| **The philosophy** (Ch. 01–02) | **Strong.** Nearly every claim is Deutsch's own words; carried the highest confidence in adversarial verification. |\n| **The critiques & physics** (Ch. 03) | **Strong on the critiques** (named philosophers, real papers); **honest that constructor theory is under-tested, not refuted** — its literature is proponent-dominated. |\n| **Everyday toolkit** (Ch. 04) | **Mixed.** The core is Deutsch/Naval; several practices (the \"Swap Test\" name, \"make being-wrong cheap\") are the corpus's own packaging, flagged inline. |\n| **CTV / programmatic** (Ch. 05) | **Landscape is sourced; the Deutsch mapping is explicitly synthesis.** A preceding fact-check *refuted* the claim that PIE maps directly onto Deutsch's distinction — so PIE is used as illustration, not proof. |\n| **Theology** (Ch. 06) | **Most interpretive.** The direct Deutsch-and-theology literature is thin and largely non-academic; the classical-theism steelman is the corpus's own reconstruction. |\n| **Other domains & forecast** (Ch. 07, Future) | **Sourced on the politics/economics history; contested on FPTP and climate** (critics included); the forecast is labeled reasoned forecast, not fact. |\n\nThe single most important caveat: **every claim about what Deutsch *argues* is faithfully reported — but that does not mean he is *right*.** Two of his load-bearing positions are live disputes: his anti-Bayesian use of the Popper–Miller theorem (widely rejected by Bayesians) and his thesis that AGI needs explanatory creativity rather than scale (directly challenged by the scaling camp). Chapter 03 gives both their due.\n\n## How to read this\n\n- **Five minutes:** this briefing.\n- **The one idea, properly:** Chapter 01, then the Swap Test section of Chapter 04.\n- **Your job:** Chapter 05, then the decision heuristics at its close.\n- **The intellectual stress test:** Chapter 03 — read it before you fall in love with the criterion.\n- **The whole argument:** 01 → 07 in order, with `Key_Claims.md` as the verified-facts floor and `Sources.md` as the reference shelf.\n\nThe corpus is deliberately built so that its most durable claims are the ones hardest to vary — and it tells you, chapter by chapter, where that bar is met and where it is merely reached for."}, {"order": 1, "file": "01_The_Criterion.md", "title": "What Makes an Explanation Good", "summary": "The hard-to-vary criterion itself — the seasons, the elephant's trunk, and why testability is not enough.", "body": "# What Makes an Explanation Good\n\n*Two accounts of why winter comes — one from ancient Greece, one from modern astronomy — agree perfectly on the facts and disagree completely on what a good explanation is; the difference between them is the whole subject of this corpus.*\n\n## Two stories about the seasons\n\nThe ancient Greeks knew, as we do, that the year turns through cold and warmth on a reliable cycle, and they had an explanation for it. Demeter, goddess of the harvest, has a daughter, Persephone, who is abducted into the underworld by Hades. In her grief Demeter makes the world barren; and, in the version David Deutsch fastens onto, she banishes warmth from her vicinity into the other hemisphere, where it makes summer there while it is winter here. When Persephone is allowed to return for part of each year, Demeter relents, the warmth comes back, and the earth grows again. It is a story with a beginning, a middle, and a cause. It accounts for the thing it sets out to account for. By the ordinary tests we are taught to apply, it looks like a respectable explanation.\n\nThe modern account is that the Earth's axis is tilted relative to the plane of its orbit. As the planet travels around the Sun, that fixed tilt means each hemisphere is angled toward the Sun for part of the year and away for the other part. When your hemisphere leans toward the Sun, its rays strike more directly and the days lengthen, and you get summer; half a year later the same hemisphere leans away, the light comes in at a shallow angle over shorter days, and you get winter. The two hemispheres are tilted in opposite senses at any given moment, which is why summer in Sydney is winter in Athens.\n\nHere is the puzzle that organizes everything that follows. Both stories save the phenomenon. Both were, in their own settings, sincerely believed. Yet we are right to regard the second as knowledge and the first as myth — and the reason is not that the Greeks lacked our instruments, nor even, in the first instance, that one story is true and the other false. The reason is structural. In Deutsch's words from his 2009 TED talk, a good explanation is one that is [\"hard to vary, because every detail plays a functional role\"](https://www.ted.com/talks/david_deutsch_a_new_way_to_explain_explanation/transcript). The myth fails that test, and the astronomy passes it, and once you see why, you can never quite unsee it.\n\n## The criterion, stated plainly\n\nThe whole of Deutsch's account of explanation can be compressed into a single sentence, which he gave to Tim Ferriss almost as an aside: [\"what makes a good explanation? It's that it can't be easily varied and still account for the same thing.\"](https://tim.blog/2023/03/24/david-deutsch-naval-ravikant-transcript/) That is the criterion. A good explanation is *hard to vary* while still doing the explanatory work it claims to do. Its parts are load-bearing. You cannot reach in, swap a detail for a different detail, and walk away with something that fits the facts equally well — because in a good explanation each component is doing a specific job, and pull any one of them and the structure that accounted for the phenomenon collapses. The contrapositive is the diagnostic you will reach for again and again: as Deutsch puts it in the same talk, [\"Easy variability is a sign of a bad explanation.\"](https://blog.ted.com/david_deutsch_a/)\n\nNotice what this criterion is *not*. It is not a claim about how simple the explanation is, or how elegant, or how intuitively satisfying, or whether it was arrived at by a credentialed authority. It is not even, in the first instance, a claim about whether the explanation is true — we will come to truth shortly, and the relationship turns out to be intimate, but the hard-to-vary test is something you can apply to a theory's *structure* before you know its fate. The test asks a question about counterfactuals: if you wanted this explanation to predict something different, how much would you have to change, and would the changes cost you anything? With a good explanation the answer is that you would have to tear it down and start again. With a bad one, you can dial the result to taste.\n\nThis is why Deutsch insists the criterion does real work that older slogans miss. We are accustomed to being told that science is about evidence, or prediction, or testability. Each of those is necessary; none is the heart of the matter. The heart of the matter is the *internal rigidity* of the account — the degree to which its details are forced rather than chosen.\n\n## Why the myth is easy to vary\n\nReturn to Demeter with the criterion in hand and the myth's weakness becomes glaring. Why is it *Persephone* whose absence makes the world cold? Deutsch's needling question is exactly this: why Persephone and not some other figure from the same crowded pantheon — [\"Why not Nike?\"](https://www.ted.com/talks/david_deutsch_a_new_way_to_explain_explanation/transcript) Nothing in the explanation forces the choice. Why does grief *cause* cold rather than, say, scorching heat, as grief might just as plausibly be imagined to do? Why does Demeter banish the warmth to the *opposite hemisphere* specifically? Each of these is a free parameter. You could rewrite the story with a different god, a different emotion, a different mechanism, and you would have a different myth that explained the seasons exactly as well — which is to say, exactly as poorly.\n\nDeutsch presses the point with a thought experiment that lands like a blow. Suppose the ancient Greeks had somehow learned that when it is winter in Greece it is summer in Australia. Would this fact have refuted their myth and sent them back to the drawing board? Not at all. They could have [\"easily varied their myth to predict that\"](https://www.ted.com/talks/david_deutsch_a_new_way_to_explain_explanation/transcript) — Demeter's grief chases the warmth around the globe, banishing it to wherever Persephone is not, so naturally the far side is warm when we are cold. The new fact would have been absorbed without strain, because the myth has no commitment that the new fact could violate. A theory that can comfortably digest any observation you might have feared would contradict it has, in that very comfort, confessed that it explains nothing. This is the deep reason the easy variability matters: an explanation you can adjust to fit any outcome is an explanation that the outcomes are not actually constraining.\n\nAnd here Deutsch reaches for the word that will recur through this corpus — *irrational*. Faced with countless equally good variants of the myth and no functional reason to prefer one over another, settling on any particular version is, in his phrase, advocating one variant [\"without a functional reason to prefer\"](https://www.ted.com/talks/david_deutsch_a_new_way_to_explain_explanation/transcript) it — an arbitrary commitment dressed as understanding.\n\nA note on honesty, since this corpus tries to keep its attributions clean. A popular gloss on the seasons example — that the myth might equally well cast the return of spring as a *blessing* or as a *revenge*, and nothing in it decides which — is a serviceable paraphrase of Deutsch's logic, but it is not the example he actually gives. His own case is the Demeter myth and the Australian-seasons counterfactual described above. The blessing-versus-revenge framing illustrates the same point about free parameters; it should just not be quoted as his.\n\n## Why the astronomy is hard to vary\n\nNow perform the same operation on the axial-tilt account, and watch it refuse to cooperate. Suppose the modern theory were somehow refuted — suppose we discovered that the seasons did *not* in fact run opposite in the two hemispheres, or that they did not track the planet's position in its orbit. Where could the theory's defenders go? Deutsch's answer is stark: they would have [\"nowhere to go. No easily implemented change could make that tilt cause the same seasons in both hemispheres.\"](https://www.ted.com/talks/david_deutsch_a_new_way_to_explain_explanation/transcript) The opposite-hemisphere prediction is not a decoration on the theory; it falls out of the geometry. A tilted axis pointing one way *necessarily* angles one hemisphere toward the Sun and the other away. You cannot keep the tilt and lose the antisymmetry between north and south, because the antisymmetry *is* the tilt, seen from two places at once.\n\nThat is what it means for every detail to play a functional role. The orbit, the fixed direction of the axis, the relationship between the angle of incoming light and the warmth it delivers — each is wired to all the others, so that, as Deutsch says, any given one of them [\"when challenged would affect everything about the theory.\"](https://www.ted.com/talks/david_deutsch_a_new_way_to_explain_explanation/transcript) Try to vary the predicted Australian seasons and you find you cannot do it locally; you would have to change the geometry of how light warms a sphere, and that would wreck the explanation of the Greek seasons you started from, and of the tropics, and of the length of the days, and of everything else the theory was holding together. The rigidity is the whole point. A good explanation is a structure so tightly interlocked that you cannot adjust its output without dismantling its account of the input. The myth had a thousand doors; the astronomy has none.\n\n## The elephant's trunk\n\nDeutsch keeps a second worked example close at hand, and it is worth having because it shows the criterion biting outside of physics. In Rudyard Kipling's *Just So Stories*, there is a charming tale of how the elephant got its trunk: the Elephant's Child, full of \"'satiable curiosity,\" is seized by the nose by a crocodile on the banks of the Limpopo, and in the ensuing tug-of-war his once-short nose is stretched into the long trunk elephants have worn ever after. It is a complete causal story. It even has a mechanism. Why, then, is it not an explanation of the trunk?\n\nBecause, as Deutsch told Ferriss, [\"I could easily substitute that for another animal… substitute the whole basis of the story.\"](https://tim.blog/2023/03/24/david-deutsch-naval-ravikant-transcript/) Make it a giraffe and a different predator and you have the giraffe's neck; make it some other creature and some other accident and you have whatever trait you please. The story imposes no constraint that the trait itself does not already supply after the fact. Every element — the crocodile, the river, the pull — is a free parameter chosen to land on the answer we already knew, the long trunk, and could be reselected to land on any other answer with no loss of plausibility. Set it beside the Darwinian account, in which trunks must arise through heritable variation under selection pressure, where the available raw material, the function served, and the lineage's ancestry all constrain what can evolve and how — and you feel the difference in rigidity in your hands. Kipling's tale is delightful precisely *because* it is easy to vary. That same easy variability is exactly what disqualifies it as an explanation.\n\n## The truth consists of hard-to-vary assertions about reality\n\nSo far the criterion has looked like a tool of criticism — a way of catching bad explanations in the act. But Deutsch makes a far more ambitious claim, and it is the one to carry forward: [\"The truth consists of hard-to-vary assertions about reality.\"](https://www.ted.com/talks/david_deutsch_a_new_way_to_explain_explanation/transcript) This is not the modest thesis that good explanations tend to be hard to vary. It is the stronger thesis that being hard to vary is *what it is* for an explanatory claim to latch onto the world at all.\n\nThe reasoning behind the slogan is, I think, this. Reality is a single definite way and not a thousand interchangeable ways. An explanation that could be smoothly reshaped to fit any of a thousand outcomes is, by its very pliability, failing to make contact with the one way things actually are — its flexibility is the symptom of its detachment. Only an account whose details are *forced* — forced by each other and by what they must collectively explain — is shaped tightly enough to be answerable to a world that does not bend to our convenience. Rigidity, on this view, is not a stylistic virtue we happen to prize. It is the fingerprint that reality leaves on a true account. The hardness-to-vary and the truth-aptness are the same property described from two sides.\n\nThis is the hinge on which the whole corpus turns, so it is worth stating its status carefully. That a good explanation is hard to vary is Deutsch's explicit, repeated claim. That hardness-to-vary therefore *is* the texture of truth — that the criterion is not merely a filter on our theories but a feature of how true assertions sit against the world — is the philosophically loaded reading of his TED slogan. It is his line; the gloss I have put on *why* it holds is this corpus's synthesis, offered to make the claim usable rather than to put words in his mouth.\n\n## The easy ones don't explain much\n\nIf hard-to-vary explanations are the good ones, an obvious question arises: why not simply manufacture them at will? The answer reveals what is hardest and most beautiful about the idea. Hard-to-vary explanations are *hard to come by* — and they are hard to come by for the same reason that makes them good. Deutsch lays out the chain of dependence with unusual economy in his conversation with Naval Ravikant: [\"the good explanation is hard to vary. It's hard to vary because it was hard to come by. It is hard to come by because the easy ones don't explain much.\"](https://nav.al/david-deutsch)\n\nRead that backwards and it becomes a method. The easy explanations — the ones you can reach for without effort, the ones that come pre-loaded with adjustable parts so they can be made to fit anything — explain very little, precisely because their adjustability means the world is not constraining them. To find an explanation that is genuinely rigid, every part forced, no slack to absorb an awkward fact, you have to do hard creative work: you have to invent a structure that *commits*, that sticks its neck out by ruling things out, and then survives. There is no shortcut, because any shortcut would by definition leave you holding one of the easy, slack, explain-nothing accounts. The difficulty of arriving at a good explanation is not an unfortunate friction on the path to knowledge. It is the same fact as the explanation's goodness, met from the far side. Knowledge is hard-won because only the hard-won kind is knowledge.\n\nThis also explains a fact about good explanations that we will develop later in the corpus: their *reach*. Because every part of a hard-to-vary explanation is forced by the structure rather than fitted to the case in front of us, the explanation tends to go on being correct in situations it was never designed for. The axial tilt was reasoned out to explain the seasons; it also tells you, without further tinkering, about the midnight sun at the poles and the precession of the equinoxes over millennia. That over-delivery — applying correctly far beyond its original target — is, in Deutsch's account, a *consequence* of being hard to vary, not a separate virtue. We will return to reach at length in the chapters ahead; for now it is enough to notice that rigidity and reach are two faces of the same coin.\n\n## Testability is necessary but not the mark\n\nThere is one more thing the criterion does, and it is the thing that sets up everything to come. The standard modern story about what makes science special is that science makes *testable predictions* — claims that stick their necks out and could be proven wrong. That story is not false. Testability is genuinely necessary; an explanation that forbids nothing, that is compatible with every possible observation, has cut itself loose from reality as surely as the seasons myth did. But Deutsch's sharpest move is to deny that testability is the *mark* of a good explanation. In the TED talk he asks directly whether testability is \"the key to advancement,\" and answers: [\"No. Even cranks can make theories that are testable.\"](https://blog.ted.com/david_deutsch_a/)\n\nThis is the crack through which the rest of the subject pours. A crank can predict that the world will end on a Tuesday — a bold, falsifiable, eminently testable claim. When Tuesday passes, the crank, like Demeter's worshippers, simply varies the theory: the calculation was off, the date has moved, the faithful were spared. The prediction was testable and the explanation behind it was worthless, because the explanation was easy to vary. So testability cannot be doing the deep work; it is a symptom that good explanations exhibit, not the disease itself. The thing that actually separates the astronomer from the crank is that the astronomer's account *could not have been bent* to accommodate failure, while the crank's bends at the first touch.\n\nEven the workhorse intuition that bad explanations are \"too flexible\" can be seen this way. The Wikipedia entry on explanatory power gives the homely case of the claim that everyone is secretly selfish: it is a bad explanation, it notes, [\"because it is too easy to vary\"](https://en.wikipedia.org/wiki/Explanatory_power) to accommodate the apparent altruist, who is simply redescribed as selfish in some hidden way. Confront it with a saint and it absorbs the saint; confront it with a martyr and it absorbs the martyr. It predicts everything and forbids nothing, and so, for all its testable-sounding confidence, it tells you nothing about the world.\n\nWhich raises the question that the next chapter must answer. If testability is necessary but not sufficient — if it is the price of admission and not the prize — then what is the relationship between Deutsch's hard-to-vary criterion and the older, more famous account of science as *conjecture and refutation*? Karl Popper taught that we never prove theories true, only expose them to the risk of being shown false, and keep the ones that survive. Deutsch is, by his own description, working in Popper's tradition — yet he is plainly claiming that surviving tests is not the whole story, that something about the *internal structure* of an explanation matters independently of any test it has yet faced. How the hard-to-vary standard completes and corrects the falsificationist picture — and what Deutsch means when he says the good explanation is the one that [\"meets all the criticisms that we have at the moment\"](https://nav.al/david-deutsch), and so [\"already doesn't have any rivals by then\"](https://nav.al/david-deutsch) — is the work of Chapter 02.\n\nFor now, the criterion is in your hands, and it is meant to be *used*. The next time someone offers you an account of anything — a market move, a historical turn, a friend's behavior, the origin of a trait — try the test. Ask: how much of this could be changed while still fitting the facts it claims to fit? If the answer is \"almost all of it,\" you are holding a myth, however confidently it is told. If the answer is \"none of it — every piece is forced, and to alter the conclusion I would have to wreck the whole\" — then, and only then, are you holding something that might be true."}, {"order": 2, "file": "02_The_Epistemology.md", "title": "The Engine: Conjecture, Criticism, and the Quarrel with Justification", "summary": "Popper's lineage, fallibilism without relativism, the rejection of induction and Bayesianism, and the principle of optimism.", "body": "# The Engine: Conjecture, Criticism, and the Quarrel with Justification\n\n*Before a theory can be judged hard to vary, there has to be a theory at all — and an account of where it came from, how it survives, and what, if anything, makes one survivor better than another. The \"hard-to-vary\" criterion is a quality filter. This chapter describes the machine the filter sits inside: a picture of knowledge as something that grows by guessing and the correction of error, never by proof, never by accumulation, and — most provocatively — never by justification. It is an old picture, inherited from Karl Popper, but Deutsch sharpens it to a point Popper never quite reached, and turns it against the dominant epistemology of our moment.*\n\n## The Popperian inheritance, and where it strains\n\nThe natural place to begin a theory of knowledge is with the question of how we come to be confident in what we believe. The intuitive answer — the answer of common sense, and of most of the history of philosophy — is that we observe the world, notice regularities, and generalize from them. We see many white swans and conclude that swans are white; we see the sun rise daily and infer that it will rise tomorrow. Knowledge, on this view, is distilled from experience by a process of inductive inference. The trouble, identified by Hume and never satisfactorily answered on its own terms, is that no number of observations logically entails a general law, and no past regularity guarantees its own continuation. Induction, taken as a method of justification, does not work; it cannot deliver what it promises.\n\nPopper's response was radical: stop trying. Critical rationalism, as the tradition is now called, \"grew out of Karl Popper's attempt to describe science without\" appeal to such inferences, which it \"views as unnecessary\" ([IEP](https://iep.utm.edu/karl-popper-critical-ratiotionalism/)). The reconstruction runs the engine of science in reverse. We do not begin with observations and grind out theories; we begin with problems, leap to conjectures — bold, often wildly speculative guesses — and then attack them. On Popper's account, \"scientists gain knowledge not by proofs but by refutations of good conjectures and by replacing them with new and better ones.\" This is the cycle of conjecture and refutation, and it carries a sharp demarcation: \"only refutable theories... are scientific\" ([IEP](https://iep.utm.edu/karl-popper-critical-ratiotionalism/)). A theory earns the title *scientific* not by being supported but by sticking its neck out — by forbidding something observable, so that the world can, in principle, prove it wrong.\n\nYet Popper himself saw that falsifiability could not be the whole story. The Marxist and psychoanalytic theories he distrusted were, in their actual use, endlessly elastic: confronted with a contrary fact, their defenders would add an auxiliary assumption and absorb the blow, so that no observation was ever allowed to count against them ([SEP](https://plato.stanford.edu/entries/popper/)). Such a theory is, in form, refutable; in practice it is rescued from refutation by *ad hoc* modification. This is the loose thread Deutsch pulls. If a theory can always be patched to survive, then refutability alone has not separated good explanation from bad — it has only set a minimum entry requirement that even the worst ideas can meet. Something more is needed, and the search for that something is what carries us out of Popper's framework and into Deutsch's.\n\nA word of intellectual honesty is owed here, and the corpus will pay it in full in the next chapter. The claim that Popper *eliminated* induction is one of the most disputed in twentieth-century philosophy of science. Hilary Putnam argued that scientists plainly do rely on past success to project theories into the future; the historian and philosopher of science John D. Norton, in \"The Rise and Fall of Popper's anti-inductivism,\" argues the programme failed on its own terms; and Popper himself, late in life, conceded what critics gleefully call a \"whiff of inductivism\" in his treatment of corroboration. The defensible claim — the one this chapter rests on — is narrower and uncontested: Popper's programme treated induction as *unnecessary by design*, building its account of knowledge so as not to require it. Whether that design wholly succeeds is a live quarrel, and we flag it now and develop it in **Chapter 03** rather than smuggle a verdict past the reader.\n\n## How knowledge is actually made\n\nStrip the epistemology to its working parts and you get a strikingly simple two-stroke engine: creative conjecture, and creative criticism. Deutsch's clearest statement of it comes not from his books but from an essay, \"Beyond Reward and Punishment,\" written for the collection *Possible Minds*. There he is reconstructing how our pre-sapiens ancestors learned to imitate complex behaviors — a capacity no living ape and, he insists, no present-day artificial intelligence possesses — and the argument generalizes into a full theory of mind. \"Any ability based on guessing,\" he writes, \"must include means of correcting one's guesses, since most guesses will be wrong at first,\" for the plain combinatorial reason that \"there are always many more ways of being wrong than right\" ([Deutsch, *Possible Minds*](https://www.daviddeutsch.org.uk/wp-content/uploads/2019/07/PossibleMinds_Deutsch.pdf)). Guessing without error-correction is not a method; it is noise. The correction is supplied by criticism, and the two must alternate. Quoting Popper, Deutsch holds that \"creative criticism, interleaved with creative conjecture, is how humans learn one another's behaviors, including language, and extract meaning from one another's utterances.\" And then the line that turns a story about hominids into a theory of everything that thinks: \"Those are also the processes by which all new knowledge is created\" ([Deutsch, *Possible Minds*](https://www.daviddeutsch.org.uk/wp-content/uploads/2019/07/PossibleMinds_Deutsch.pdf)).\n\nThe universality is the point. Deutsch draws from Popper's argument the conclusion that \"all thinking entities — human or not, biological or artificial — must create such knowledge in fundamentally the same way\" ([Deutsch, *Possible Minds*](https://www.daviddeutsch.org.uk/wp-content/uploads/2019/07/PossibleMinds_Deutsch.pdf)). There is no second method waiting to be discovered, no shortcut available to a sufficiently powerful computer that a child does not also, in principle, possess. Knowledge — explanatory knowledge, the kind that confers understanding — comes into being in exactly one way, by the conjecture of guesses and the criticism that weeds them. This is a claim with enormous downstream consequences for how Deutsch thinks about artificial intelligence, about children, about the growth of civilizations; the corpus returns to each. For now, hold onto the shape of the engine, because the \"hard-to-vary\" criterion is simply the most demanding setting of its critical stroke. Conjecture proposes; criticism disposes; and the explanations that survive the harshest criticism are the ones that cannot be casually adjusted to fit the facts, because they were built to fit those facts and few others.\n\n## Fallibilism without relativism\n\nIt is at this juncture that newcomers most often misread the position. If all our knowledge is conjecture, if nothing is ever proved and everything is permanently exposed to refutation, then surely we have surrendered the very idea of truth — surely one guess is as good as another, and we have arrived at relativism by the scenic route. Deutsch regards this inference as not merely wrong but as the precise opposite of his view. Fallibilism is the recognition that any of our theories may be mistaken and none can be established with certainty. It is emphatically *not* the claim that there is no truth, or that we cannot approach it.\n\nThe distinction is worth stating in his own register. Through Taking Children Seriously — the educational philosophy Deutsch helped found, and a fair index of how he applies his epistemology to ordinary life — the position is put plainly: fallibilism holds that it is \"possible for human beings, through conjecture, reason and criticism, to come to know and understand truths,\" and crucially that \"our successive theories can become objectively truer — with more true implications and fewer errors\" ([Taking Children Seriously](https://takingchildrenseriously.com/taking-children-seriously-and-fallibilism/)). Truth is real, and it is the target. What fallibilism denies is not the destination but the existence of a guarantee that we have arrived — a final, certifying stamp. We can know things, and know them better over time; we simply cannot know that we know them *incorrigibly*. The growth of knowledge is the steady replacement of error by less error, with no terminus and no certificate.\n\nThis is also why Deutsch refuses the picture of inquiry as optimization toward a fixed objective — a refusal that will matter when, in later chapters, he turns to artificial intelligence and to political institutions. \"There is, as Popper put it,\" he writes, \"no criterion of truth, nor of probable truth, especially in regard to explanatory knowledge. Objectives are ideas like any others — created as part of the search and continually modified and improved\" ([Deutsch, *Possible Minds*](https://www.daviddeutsch.org.uk/wp-content/uploads/2019/07/PossibleMinds_Deutsch.pdf)). Read that twice, because it is more radical than it first appears. Not only are our *answers* conjectural; so are the *questions*, and so are the very goals of the enterprise. There is no predetermined objective handed down at the start of the search to which everything must be optimized. The goals themselves are revised in the light of criticism, like any other idea. A mind, on this account, is not a function maximizing a pre-set reward; it is an open-ended generator and critic of guesses, including guesses about what it ought to be trying to do at all. This is the deep reason Deutsch is so allergic to models of thought that begin by fixing an objective and grinding toward it — a category in which, as we will now see, he places the reigning statistical orthodoxy.\n\n## The quarrel with Bayes\n\nHere the chapter must shift its footing, and shift it openly. Everything to follow is **what Deutsch argues**, and his argument is genuinely contested — by Bayesians who reject both his conclusion and his reading of the technical result he leans on. The full prosecution and defense are conducted in **Chapter 03**. The task here is only to lay out the position cleanly, in his own terms, and to mark it as disputed rather than decided.\n\nDeutsch's verdict on Bayesian epistemology is unsparing. It is, he says, \"just the name of a mistake... a species of inductivism\" in which \"you justify theories by finding confirming instances\" ([Walker interview](https://josephnoelwalker.com/139-david-deutsch/)). The complaint is that Bayesianism, for all its mathematical sophistication, is at bottom the old confirmationist picture in new clothing: credences in theories go up when you find a confirming instance and down when you find a disconfirming one, and \"that just is inductivism.\" If knowledge does not in fact grow by the accumulation of confirmations — if, as Popper held, instances never imply the theory — then a method that scores theories by their stock of confirmations is measuring the wrong thing, however precisely it measures it.\n\nThe objection comes in two prongs. The first is technical, and it is the controversial one. In a 1983 paper in *Nature*, Popper and David Miller argued that the part of a theory that goes *beyond* the evidence — the part not deductively entailed by what you have observed — has its probability *lowered*, not raised, by that evidence; the support that confirmation appears to give attaches only to the portion of the theory the evidence already logically contains ([Popper & Miller, *Nature* 302, 1983](https://www.nature.com/articles/302687a0)). Deutsch reads this as a formal demonstration that the explanatory, ampliative content of a theory — exactly the content one cares about — cannot be what confirmation confirms. Whether the Popper–Miller theorem in fact supports anything like this conclusion is heavily disputed in the philosophy of science; Bayesians have offered detailed rebuttals, and the corpus treats the exchange in **Chapter 03**. It is reported here as Deutsch's reading, not as a settled result.\n\nThe second prong is the one that connects back to the engine, and it stands somewhat apart from the technical quarrel. Even granting a Bayesian everything they want about updating, Deutsch argues, the framework describes only the *critical* stroke and is silent on the *creative* one. \"Bayesian updating is inadequate,\" he writes, \"because it cannot generate novel guesses... only fine-tune — or, at best, choose among — existing ones. Creativity is needed\" ([Deutsch, *Possible Minds*](https://www.daviddeutsch.org.uk/wp-content/uploads/2019/07/PossibleMinds_Deutsch.pdf)). Conditionalization redistributes probability across hypotheses already in hand; it has no operation for *minting a hypothesis nobody had thought of*. But the hard and interesting part of knowledge-creation is precisely the arrival of the new explanation — the conjecture that was not in the prior. A theory of how to weight existing options is not, on this view, a theory of knowledge at all, but at most an account of one sub-task within it. Deutsch presses the same case in his 2014 essay, the pugnaciously titled \"Simple refutation of the Bayesian philosophy of science\" ([Deutsch, 2014](https://www.daviddeutsch.org.uk/wp-content/uploads/2019/07/Simple-refutation-of-the-Bayesian-philosophy-of-science.html)). Whatever one makes of the technical claim, this second objection cuts cleanly: a calculus of belief-revision presupposes a supply of beliefs to revise, and says nothing about where the good ones come from.\n\n## Explanation over prediction, and the principle of optimism\n\nIf neither confirmation nor probability is the engine of progress, what is? Deutsch's answer is *explanation* — the reach and the hardness-to-vary of an account, not the bare fact that it can be tested. Testability is necessary but cheap. As he likes to put it, \"even cranks can make theories that are testable\" ([TED](https://blog.ted.com/david_deutsch_a/)); refutability sets the bar at the floor, and the worst ideas clear it. What separates a good explanation from a testable bad one is explanatory content — and the surplus virtue that content buys is *reach*. A hard-to-vary explanation, because its parts are so tightly constrained that they could not easily be otherwise, tends to extend correctly into territory it was never designed to cover. As the physicist Daniel Elton notes in his analysis of Deutsch's criterion, Deutsch attributes reach precisely to hard-to-vary-ness: the same rigidity that makes a good explanation difficult to adjust is what lets it travel ([Elton, arXiv:2012.09318](https://arxiv.org/abs/2012.09318)). Newton's gravitation, devised for falling apples and orbiting planets, turned out to govern tides and the wobble of distant stars — not because anyone tuned it to, but because its components were too rigid to permit a version that did otherwise. Reach is hardness-to-vary, viewed from the future. And because there is no limit to how far an explanation can be improved or how far its reach can extend, knowledge on this account is *infinitely* improvable; the corpus develops that claim, and Elton's framing of it, in the chapters on reach and on the criterion itself.\n\nFrom this picture follows the disposition Deutsch calls the *principle of optimism*. In its epistemic form — the practical and political versions are taken up in **Chapters 04 and 07** — the principle is captured in a pair of slogans he repeats like a refrain: \"Problems are inevitable... Problems are soluble\" ([Deutsch, TEDGlobal 2005](https://www.daviddeutsch.org.uk/videos/tedglobal-2005-transcript/)). Every state of knowledge generates new problems, so the work is never finished; but no problem is forbidden a solution by any law of nature, and so failure to solve one is, in the end, a failure to find the right knowledge. The binding constraint on what we can do is not resources, nor the limits of the cosmos, but our ignorance — and ignorance is precisely the thing that conjecture and criticism are built to reduce. Optimism, in Deutsch's sense, is not a temperament or a hope. It is the working corollary of an epistemology in which knowledge has no ceiling: if all evils are due to insufficient knowledge, and knowledge can always grow, then the only question worth asking about any problem is what we do not yet understand about it.\n\nThat is the engine. Knowledge begins in problems, advances by bold conjecture, and is disciplined by criticism — never proved, never justified, never inferred from instances, and never finished. Truth is real and reachable in the limit, but no theory carries a certificate, and even our objectives are guesses open to revision. Against this backdrop the corpus's load-bearing thesis falls into place as the natural sharpening of Popper's own unfinished business. Of the countless conjectures the engine throws up, and of the testable bad ideas even cranks can supply, the ones that constitute real progress are the ones that cannot be casually adjusted to save themselves — the explanations that are *hard to vary*. The next chapter turns to the prosecution: it is time to let the Bayesians, and the critics of Popper, make their case."}, {"order": 3, "file": "03_Critiques_And_Physics.md", "title": "The Criticisms, Constructor Theory, and the Multiverse", "summary": "Is 'hard to vary' itself too easy to vary? The vagueness and induction objections, the Bayesian rebuttal, and Deutsch's two contested physics programs.", "body": "# The Criticisms, Constructor Theory, and the Multiverse\n\n*A criterion that praises hard-to-vary explanations invites an obvious counterpunch: is the criterion itself hard to vary? This is the chapter where the corpus stops advocating and starts cross-examining. The most serious objections to Deutsch are not that he is obscure or grandiose — they are precise, and some of them land. The honest task is to sort the blows that connect from the ones that glance off, and then to ask what happens when Deutsch takes his own standard down to the foundations of physics, in constructor theory and in his insistence that quantum interference is the multiverse making itself felt. The verdict, stated up front, is mixed by design: the reach/induction worry and the Born-rule problem are genuinely strong; the charge that constructor theory has been \"refuted\" is the weakest objection of all, because it has barely been tested.*\n\n## The criterion turned on itself\n\nBegin with the objection that should worry a proponent most, because it uses Deutsch's own weapon. The claim that good explanations are *hard to vary* presupposes that we can tell how hard a given variation is. Deutsch never says how. He offers no metric for \"hardness,\" no operational test for when a detail is doing genuine functional work versus decorative work, and no threshold at which tinkering \"ruins\" an explanation rather than merely amending it. Critics have not been shy about pointing out that this is, in the end, a feeling of resistance dressed as a principle.\n\nThe most pointed version comes from a careful reader writing under the handle TAG, who argues that hardness-to-vary is \"a simplicity criterion, a form of Occam's razor,\" and that \"compared to the simplicity criterion favoured by Bayesians — programme length — is rather subjective\" — adding the deeper point that neither camp has explained *why* simplicity should imply truth at all ([York commentary](https://www-users.york.ac.uk/~ss44/books/pages/d/DavidDeutsch.htm)). That last clause is the real sting. Even if we granted that hard-to-vary explanations are simpler in some sense, we would still owe an account of why the universe should favor the explanations that are difficult for *us* to fiddle with. Deutsch treats the link between good explanation and truth as something close to self-evident; his critics treat it as the whole question.\n\nThe subjectivity worry sharpens into a self-undermining one. On LessWrong, Charlie Steiner argues that the criterion only does any work once you quietly import \"the listener's understanding\" — the social and psychological fact of which alternatives a particular mind finds available — which is exactly the observer-relative element Deutsch wants to keep out of epistemology ([Steiner](https://www.lesswrong.com/posts/jcTsbaQ8hNc7qxwaQ/explanations-as-hard-to-vary-assertions)). If \"hard to vary\" means \"hard for a competent reasoner to vary,\" then it is indexed to reasoners, and a sufficiently committed crank will find his preferred theory wonderfully rigid. Without an objective measure, the predicate can be asserted of nearly any favored view. This is a real deficit, and the chapter will not pretend otherwise.\n\nWhat can be said in Deutsch's defense is not that the worry is wrong but that it proves less than it seems. A critical rationalist does not think *any* of our methodological criteria come with formulas; they are themselves conjectures, open to criticism and improvement, not algorithms guaranteed in advance. Demanding a precise metric for \"hard to vary\" before the idea is allowed to function quietly assumes the justificationist picture Deutsch rejects — that a standard is worthless until it is grounded. So the vagueness objection is best rated *moderate*: it correctly identifies the absence of a metric, but it does not show the heuristic is empty, and the \"no algorithm\" reply is internally consistent even if it frustrates those who want one.\n\n## Refined Occam, or something new?\n\nA neighboring objection grants that the criterion is meaningful and asks whether it is *original*. Here the charge is collapse: hard-to-vary, the critics say, is consilience, or inference to the best explanation, or Occam's razor wearing Popperian clothes. A 2020 analysis by Hyung and Burns maps the criterion onto the bias–variance trade-off familiar from statistical learning and concludes it is \"very similar to Occam's razor,\" diverging only \"if one accepts that simple theories can be highly variable\" ([Hyung & Burns](https://arxiv.org/pdf/2012.09318)). The family resemblances are easy to multiply. Whewell's *consilience of inductions* — one hypothesis surprising us by explaining classes of fact it was not built for — is close kin. Peter Lipton's \"loveliness,\" the explanatory virtue at the heart of his *Inference to the Best Explanation*, is closer still.\n\nThe awkwardness is that Deutsch explicitly disowns the nearest relative. He treats Occam's razor as a \"misconception,\" not a guide to truth ([explanatory power](https://en.wikipedia.org/wiki/Explanatory_power)) — while advancing a criterion his critics read as a more careful Occamism. So which is it? The most defensible reading is that the difference is real but largely about *status* rather than content. Deutsch denies that explanatory virtue is ampliative inference — a logical step from evidence to conclusion that adds content with some warrant attached. For him it is selection among conjectures by criticism, with no inference and no warrant anywhere in the process. That anti-justificationist gloss is not nothing; it is a genuine philosophical commitment that distinguishes him from Lipton, who is happy to call IBE a mode of inference. But it means the novelty lies in the surrounding theory of knowledge, not in the criterion taken alone. Rate this one *moderate*: the collapse-into-IBE charge is fair as a description of the criterion's content, and Deutsch's reply is a non-trivial reframing rather than a refutation.\n\n## Does \"reach\" smuggle induction back in?\n\nNow the objection that, in my judgment, bites hardest among the conceptual ones. Deutsch's whole project is anti-inductive: there is no logic that takes you from observed cases to unobserved ones, and the appearance that science does this is an illusion. The work that induction was supposed to do is reassigned to *reach* — the tendency of a good explanation to solve problems beyond the ones it was invented for. Deutsch is emphatic that reach is not extrapolation: \"the explanation has reach precisely because it does not have to be extrapolated… we find out about reach only after we have the explanation\" ([Meme Innovation summary](https://memeinnovation.wordpress.com/2020/12/08/david-deutschs-theory-of-explanation/)).\n\nThe critic's reply is disarmingly simple. To *trust* a hard-to-vary theory about cases you have not checked — to bet that the explanation's reach is real — is to make an inductive commitment, whatever you call it. Relabeling the bet \"reach\" does not dissolve it. Either the theory licenses expectations about the unobserved, in which case it is doing inductive work, or it does not, in which case it is silent exactly where science needs to speak.\n\nThe most rigorous form of this challenge comes from John D. Norton's *material theory of induction*, and it cuts against both sides of the old debate at once. Norton's thesis is that there are no universal formal rules of induction; every inductive inference is licensed locally, by contingent facts about its specific domain ([Norton](https://sites.pitt.edu/~jdnorton/papers/material.pdf)). Deutsch is therefore *right* that there is no algorithmic, content-free logic of induction — Norton agrees, emphatically. But Deutsch is wrong to think a Popperian story thereby escapes the underlying problem. \"Reach,\" like induction, has to be cashed out case by case in domain-specific material facts about *why* this explanation should hold where we have not looked. There is no general guarantee that hard-to-vary explanations reach, any more than there is a general logic of induction; both need warrant supplied locally, by the subject matter. On this reading the Popperian has not abolished the problem of induction so much as renamed its residue. This objection is *strong*, and it is strong precisely because Norton concedes Deutsch's negative point and then shows it does not deliver the positive conclusion Deutsch wants.\n\n## The Bayesian war: what Popper–Miller actually proved\n\nDeutsch's confidence that induction is not merely unnecessary but *impossible* leans on a famous technical result, and this is where his case is most exposed. In 1983, Popper and Miller published a short argument in *Nature* claiming to prove that probabilistic support can never be inductive. The decomposition is exact: the support that evidence *e* gives a hypothesis *h* splits as s(h|e) = s(h∨e|e) + s(h←e|e), where the first term is non-negative and the second — the part Popper and Miller christened \"inductive\" — is provably non-positive, equal to −(1−p(e))(1−p(h|e)) ([Intellectual Mathematics](https://intellectualmathematics.com/blog/the-popper-miller-argument-against-probabilistic-induction/)). If the inductive component of support is always less than or equal to zero, induction looks not just unjustified but mathematically dead. For a Deutsch reader this is the dream result: Popper, vindicated by algebra.\n\nThe trouble is that almost no one who has examined the argument accepts the interpretation, and the dissenters are not cranks but the senior figures of Bayesian philosophy of science — Howson, Franklin, Eells, Good, Jeffrey, Gillies. Crucially, they do not dispute the algebra. They dispute that the term labeled \"inductive\" has anything to do with induction. Ellery Eells, in \"On the Alleged Impossibility of Inductive Probability,\" puts it cleanly: the decomposition is \"mathematically valid but conceptually misleading\"; the quantity s(h←e|e) simply fails to capture genuine inductive reasoning, so the theorem proves only that *this particular artificial partition* has a non-positive piece ([Eells](http://fitelson.org/probability/eells_pm.pdf)). The same point surfaces in the technical commentary above: most of the content of *h* lives in neither the deductive nor the \"inductive\" sub-proposition but only in their pooling, so the sign of one isolated fragment cannot settle whether evidence raises the probability of the hypothesis ([Intellectual Mathematics](https://intellectualmathematics.com/blog/the-popper-miller-argument-against-probabilistic-induction/)).\n\nThe settled reading, surveyed across the literature, is deflationary almost to vanishing: Popper–Miller establish that positive probabilistic dependence requires *some* deductive dependence — a near-trivial corollary — and the h←e construct on which the dramatic claim rests \"has been almost uniformly rejected\" ([PhilPapers survey](https://philpapers.org/browse/popper-philosophy-of-probability)). A modern restatement is blunter still, recasting the whole thing as nothing more exotic than the Bayesian transitivity paradox, a known wrinkle in how conditional dependence chains together ([Giordano](https://rgiordan.github.io/posts/2022-10-19-popper_miller.html)). The honest summary is uncomfortable for Deutsch: of all the things one might say with Popper–Miller, leaning on it as a *proof that induction is impossible* is close to the theorem's weakest possible use. This objection is *strong*.\n\nAnd the Bayesian counter-position is not merely negative. The deeper threat to Deutsch's framing is that the dichotomy he draws — explanation *versus* probability, as if a Bayesian could never honor explanatory power — may be false at the root. Finnur Dellsén argues for exactly this reconciliation: explanatory virtues such as simplicity, unification, and coherence can be cashed out as constraints on the *priors* and *likelihoods* of a Bayesian agent, so that IBE-style reasoning becomes consistent with ordinary conditionalization rather than its rival ([Dellsén PDF](https://philsci-archive.pitt.edu/13438/7/Can%20There%20Be%20A%20Bayesian%20Explanationism%20On%20the%20Prospects%20of%20a%20Productive%20Partnership.pdf); [abstract](https://link.springer.com/article/10.1007/s11229-015-0990-z)). Elliott Sober's objective Bayesianism is the canonical worked example — \"common ancestry explains the similarity\" is precisely the kind of explanatory consideration that *raises a prior*. If explanatory power is partly constitutive of good priors, then Deutsch's claim that Bayesianism cannot capture explanation is simply incorrect, and the mutually-exclusive framing of explanation against probability does not survive contact with the actual literature. The criterion can be true and useful; the war against Bayes that Deutsch sometimes wages around it is the part that fails.\n\n## Constructor theory: maximally hard-to-vary physics\n\nIf the criticisms above test the criterion in the seminar room, the next two sections test it in the laboratory — for Deutsch's two physics programs are best understood as his epistemology applied to fundamental science. The first is constructor theory, developed with Chiara Marletto at Oxford since 2012. It proposes to recast physics not as equations of motion plus initial conditions but as a catalogue of which *tasks* — physical transformations — are possible, which are impossible, and *why*. Counterfactuals are taken as fundamental rather than derived; quantum theory is demoted to a \"subsidiary theory,\" and quantum information becomes a special case of a more general \"superinformation\" ([constructor theory](https://en.wikipedia.org/wiki/Constructor_theory)).\n\nRead through the lens of this corpus, the ambition is transparent. A theory of the possible-and-impossible aspires to be *maximally* hard to vary: principles stated as flat prohibitions (\"no process can do X\") have almost no adjustable parameters to retreat into when challenged. Marletto frames it as a \"meta-theory more fundamental than even our most foundational physics\" ([Quanta](https://www.quantamagazine.org/with-constructor-theory-chiara-marletto-invokes-the-impossible-20210429/)). This is the hard-to-vary standard pushed as far as it can go: not a better model within physics but a constraint on what any future physics may say.\n\nThe honest soft spot is reception, and it must be stated carefully so as not to overclaim in either direction. There is little published refutation of constructor theory — and also little independent uptake. *Physics World*, surveying the program sympathetically, concludes that \"whether constructor theory can really deliver, and how much it truly differs from physics as usual, remains to be seen\" ([Physics World](https://physicsworld.com/a/not-everything-that-can-happen-does-happen-reformulating-physics-as-laws-about-the-impossible/)) — a line Marletto herself echoes in *Quanta*. The proponents do claim testability, and not vacuously: a constructor-theoretic principle is refuted, they argue, if a law violating it survives experiment while conforming rivals fail. Their flagship example is the Bose–Marletto–Vedral proposal, in which two masses interacting *only* through gravity are checked for entanglement; on a constructor-theoretic interoperability principle, if entanglement can be generated locally through a medium, that medium must itself be quantum — so the experiment becomes an in-principle test of whether gravity is non-classical ([Quanta](https://www.quantamagazine.org/with-constructor-theory-chiara-marletto-invokes-the-impossible-20210429/)).\n\nWhat follows is a calibration the prompt rightly insists on. Independent, peer-reviewed *criticism* of constructor theory is thin; the literature is dominated by its proponents. That fact cuts against confident dismissal. The strong objection is emphatically *not* \"constructor theory is false\" or \"refuted\" — that is the **weakest** charge in this chapter, unsupported by any body of falsifying work. The fair objection is the one that uses Deutsch's *own* demand against him: a good explanation must have *novel reach*, and constructor theory has not yet demonstrated that it is genuinely new — that it forbids something standard physics permits, or permits something standard physics forbids, in a way we can go and check. The verdict is therefore \"under-adopted and not yet empirically distinguishable,\" a deficit by Deutsch's own lights, not a defeat.\n\n## The multiverse: where was the number factorized?\n\nThe second physics bet is older and more combustible. Deutsch holds that the Everett or many-worlds interpretation is not one option among several but the *hard-to-vary* explanation of quantum phenomena — and his sharpest argument is computational. Shor's algorithm factors large numbers by deploying, on his accounting, more computational resources than there are atoms in the visible universe. So, Deutsch asks, *where was the number actually factorized?* The implied answer is: across the parallel universes of the multiverse, which the interference pattern of a quantum computer makes physically manifest ([Physics World, \"The flawed multiverse\"](https://physicsworld.com/a/the-flawed-multiverse/)). It is a vivid challenge, and it has the shape of a hard-to-vary explanation: take away the other worlds, Deutsch says, and the bookkeeping no longer closes.\n\nThe objections come in three tiers, and it is worth being precise about which threaten what. The first is the *single-world* reply. Critics from Alastair Rae onward note that the computational argument inherits the preferred-basis problem — \"there is no obvious reason why this basis should be preferred… or why this quantum process should not occur in a single universe\" ([Physics World](https://physicsworld.com/a/the-flawed-multiverse/)). Andrew Steane, Armond Duwell, and Michael Cuffaro press the technical point that the quantum speedup arises from *interference* among amplitudes, not from independent computations run in parallel and tallied — so \"parallel computation across worlds\" misdescribes what the algorithm does ([SEP, many-worlds](https://plato.stanford.edu/entries/qm-manyworlds/)). This does not refute many-worlds, but it does dull the specific intuition that a working quantum computer is a multiverse you can see.\n\nThe second tier is the deep one, and it is the strongest objection to Everett anywhere in the literature: the *probability problem*, the Born rule. In a deterministic theory where every outcome occurs in some branch, the very notion of probability is endangered — if everything happens, what does it mean to say one result is more likely than another? Deutsch's 1999 paper and David Wallace's subsequent decision-theoretic program attempt to *derive* the Born rule from axioms of rational preference, recovering the familiar probabilities from constraints on how an Everettian agent ought to bet. The derivations are ingenious and remain live. But they face a battery of objections that has not been dislodged: a circularity charge that the axioms quietly presuppose what they aim to prove (Barnum and colleagues, Baker, Hemmo and Pitowsky), and direct attacks on the axioms themselves (Albert, Kent, Price), with the more recent self-locating-uncertainty route of Sebens and Carroll itself contested by Kent and by McQueen and Vaidman ([SEP, many-worlds](https://plato.stanford.edu/entries/qm-manyworlds/)). The upshot is that Deutsch's \"interference needs other worlds\" intuition is suggestive but does not by itself defeat single-world readings, and Everett still owes a non-circular account of where probability comes from. This objection is *strong* — arguably the most consequential open problem in the entire Deutsch program.\n\n## Two challengers who meet Deutsch directly\n\nTwo recent exchanges sharpen the epistemology by aiming at Deutsch in person, and both deserve a fair hearing.\n\nThe first is the Deutsch–Yudkowsky debate, refereed by Richard Ngo. Eliezer Yudkowsky presses the Bayesian and algorithmic case along three lines. First, \"the gods did it\" *feels* simple but would have to encode all the data it purports to explain, making it enormously complex by Kolmogorov–Solomonoff standards — so simplicity, properly measured, already does the work Deutsch assigns to hard-to-vary. Second, hindsight bias inflates the felt explanatory power of any story unless it is forced to make *advance* predictions, which is where genuine content shows. Third, Newton's inverse-square law was first-rate science without explaining *why* gravity acts as it does — so demanding a mechanism is not, in general, a prerequisite for a good explanation. Ngo judges Yudkowsky the stronger party on all three, while crediting Deutsch's insight that human-comprehensible explanations are a distinctive and important thing ([Ngo](https://www.lesswrong.com/posts/mHZRauLwZWhR8KWbL/deutsch-and-yudkowsky-on-scientific-explanation)). The first point is the dangerous one for this corpus: the most natural Deutsch-friendly rejoinder — that \"hard to vary\" is *roughly* Kolmogorov simplicity — concedes the reductionist's framing and quietly hands the criterion back to the Bayesians. I rate the advance-prediction and mechanism points *strong*; the Kolmogorov point is strong but double-edged, since it can be read as vindicating a version of Deutsch rather than burying him.\n\nThe second challenger, Dwarkesh Patel, takes aim not at explanation in general but at Deutsch's account of *creativity* — the claim that human minds are \"universal explainers\" and that this universality is a sharp, binary line. Patel's objections are clean: a binary faculty cannot explain the large, continuous variation in cognitive power *among humans*; narrow AI systems already crack genuinely hard problems (protein folding, Go with its roughly 10^360 board states, drug discovery), so withholding the word \"creativity\" from them starts to look ad hoc; and computational universality is close to practically empty once finite time and compute are taken seriously. He proposes intelligence as a continuum rather than a switch ([Patel](https://www.dwarkesh.com/p/universal-explainers)). The Deutsch-side reply is that benchmark performance is not the same thing as *open-ended conjecture* — a narrow optimizer that triumphs within a fixed problem space has not thereby shown it can generate genuinely new explanatory problems — and Patel grants this is not yet decisively settled either way. (The corpus treats the AGI stakes of this argument in its \"Other Domains\" and \"Future Trajectory\" chapters; here the point is narrowly epistemological — whether explanatory creativity is binary or graded — and on that the honest score is unresolved, with Patel having the better of the *prima facie* case.)\n\n## A calibrated verdict\n\nWhat survives, and what does not? The objections that genuinely bite are four. The reach/induction problem, in Norton's material form, is the most serious conceptual one: it concedes Deutsch's denial of algorithmic induction and then shows that \"reach\" inherits the same need for local, case-by-case warrant. The Bayesian reading of Popper–Miller is decisive on its own terms — the algebra is sound, the interpretation is rejected almost universally, and Deutsch's reliance on it is the theorem's weakest use. The Born-rule problem leaves Everett, and so the multiverse argument Deutsch prizes, owing a non-circular account of probability that two decades of effort have not produced. And the simplest empirical retort to his philosophy of mind — that narrow AI already does hard things — has real force against any binary picture of creativity.\n\nA second group of objections is *moderate*: real but answerable. The vagueness-and-subjectivity worry correctly notes the absence of a metric, but the critical-rationalist reply — that all criteria are revisable conjectures rather than algorithms — is internally consistent. The collapse-into-IBE charge fairly describes the criterion's content, yet Deutsch's anti-justificationist gloss is a non-trivial reframing rather than mere relabeling.\n\nAnd one set of charges is *weak*, and should be named as such precisely so the corpus keeps its credibility. The claim that constructor theory has been \"refuted\" is unsupported: the program is under-tested, proponent-dominated, and not yet shown to be empirically distinguishable from standard physics — \"under-adopted,\" not falsified. The claim that \"hard to vary\" is simply *useless* is also weak: the criterion has genuine heuristic value, even granting that it lacks a formula.\n\nWhich points, finally, to where Deutsch answers best. The recurring demand across all these objections — give us a *metric*, a *formula*, a *non-circular derivation*, a logic of reach — quietly assumes the justificationist picture that fallibilism rejects. If our criteria for good explanation are themselves conjectures, open to criticism and improvement rather than grounded once and for all, then the absence of a formula is not a bug to be fixed but a feature of the view. That stance is internally coherent. It will not satisfy a Bayesian, who wants the warrant written down. But it means the strongest case against Deutsch is not that his criterion is false — it is that, on the two frontiers where he bet most boldly, the multiverse and constructor theory, the explanations are not yet hard enough to vary to force the rest of physics to adopt them. The standard is sound. The most exposed applications are still on probation — which is, by the standard's own lights, exactly the right place for them to be."}, {"order": 4, "file": "04_Everyday_Toolkit.md", "title": "The Toolkit: Thinking in Hard-to-Vary Explanations", "summary": "The Swap Test, conjecture-and-criticism as a daily habit, seeking explanations over authority, Taking Children Seriously, and 'problems are soluble.'", "body": "# The Toolkit: Thinking in Hard-to-Vary Explanations\n\n*The previous chapters argued that a good explanation is hard to vary while still accounting for what it explains. That is a beautiful idea about physics and the growth of knowledge. This chapter asks the cruder question: what do you actually do with it on a Tuesday — reading the news, arguing with a relative, deciding whether to trust an expert, settling a standoff at the dinner table? The claim here is that the hard-to-vary criterion is not only a theory of science but a portable instrument for everyday judgment, and that you can start using it tonight.*\n\nIt is worth saying up front why a layperson should bother. The person most responsible for carrying Deutsch's idea out of the philosophy of science and into general circulation is the investor and writer Naval Ravikant, who told Deutsch to his face that the hard-to-vary concept [\"upgraded my thinking more than almost anything else\"](https://tim.blog/2023/03/24/david-deutsch-naval-ravikant-transcript/). That is a strong claim from someone whose profession is being right about uncertain things. The reason a single criterion can do that much work is that it collapses a great many separate questions — Is this true? Is this person bullshitting me? Should I trust this expert? Is this conspiracy theory crazy? — into one question you can ask in a few seconds. That question is the subject of this chapter.\n\n## The Swap Test: the one heuristic to start with\n\nIf you take away only one tool, take this one. Before you accept any explanation — a news story's account of why something happened, a friend's theory about a mutual acquaintance, an expert's reading of the economy — ask:\n\n> **Could this same story be tweaked, with no strain, to explain the *opposite* outcome just as comfortably?**\n\nIf the answer is yes, the explanation is doing no work. Call this the **Swap Test**. The name is this corpus's own packaging; the idea underneath it is pure Deutsch. A good explanation is hard to vary precisely because *every detail plays a functional role*, so that swapping in a different outcome would break it. A bad explanation is easy to vary because its parts are interchangeable — you can re-cut it to fit whatever happened, after the fact, without ever having committed to anything.\n\nDeutsch's own anchor example shows the mechanism. The ancient Greeks explained winter by the grief of Demeter, who banishes warmth from her vicinity \"into the other hemisphere, where it makes summer.\" It accounts for the cold. But it is trivially easy to vary: as Deutsch points out in his 2009 TED talk, if the Greeks had learned that the seasons in Australia are *reversed* relative to theirs, they could have varied the myth to predict that too, with equal ease — perhaps the goddess sends the warmth there out of spite. The axis-tilt theory cannot be rescued that way; its account of the seasons *forces* the southern hemisphere to be opposite, and would be wrecked by any other arrangement. That, Deutsch says, is why [\"the truth consists of hard-to-vary assertions about reality\"](https://www.ted.com/talks/david_deutsch_a_new_way_to_explain_explanation/transcript). The myth fits reality the way a baggy coat fits; the astronomy fits it the way skin does.\n\nThe practical version is a reflex you can train. **When you hear an explanation, silently generate the opposite observation and check whether the explanation would still nod along.** If it would have smiled and absorbed the reverse just as happily, it has told you nothing about why *this* thing happened rather than its opposite.\n\n## Running the Swap Test in the wild\n\nOnce you have the reflex, easy-to-vary explanations start lighting up everywhere. A field guide:\n\n- **Astrology and horoscopes.** \"Mercury retrograde made your day chaotic.\" Had the day gone beautifully, the same system would have said the stars favored you. It predicts both outcomes, forbids neither, and so constrains nothing. Fails the Swap Test instantly.\n\n- **Conspiracy theories.** Their tell is that *disconfirming* evidence is converted into *more* proof — \"that's exactly what they'd want you to think.\" Researchers studying conspiracist cognition note that it need not [\"conform to expectations of coherence or consistency\"](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9417594/), which is the very property that gives it unlimited explanatory reach. A theory that can metabolize any fact — for it *or* against it — is maximally easy to vary, which is to say maximally empty.\n\n- **\"The system is rigged.\"** When your side wins, the system worked; when it loses, the system is rigged. Without a *specified* mechanism — one that also says where the rigging does *not* happen and what would show it failing — the narrative explains every outcome and therefore none. (That diagnosis is this corpus's synthesis, but it is the Swap Test applied verbatim.)\n\n- **Just-so stories about human nature.** \"Everyone is really selfish, deep down.\" Show this theory a plainly altruistic act and it shrugs: ah, but they did it to feel good, or for status. As the standard discussion of explanatory power puts it, the cynical theory is weak [\"because it is too easy to vary... to accommodate the case of someone who seems altruistic\"](https://en.wikipedia.org/wiki/Explanatory_power). Any theory that can re-describe its own counterexamples has stopped explaining and started rationalizing.\n\n- **Pseudo-scientific health claims.** \"If you felt better, the cleanse worked; if you felt worse, that's the detox.\" Both outcomes confirm it. There is no result the protocol forbids — so there is no result that could teach you anything.\n\n- **Hindsight market commentary.** The same pundit explains opposite moves on consecutive nights: stocks fell \"on profit-taking,\" then rose \"on bargain-hunting.\" Ravikant's useful inversion of Deutsch is that good science makes [\"risky and narrow predictions with details that are hard to vary both before AND after the fact\"](https://www.founderstribune.org/p/good-products-are-hard-to-vary-by-naval-ravikant). The *after the fact* clause is the trap most punditry falls into: an explanation that could have been narrated over any outcome was never an explanation, only a caption.\n\nThe common structure in all six is the same. Each story has slack in it — interchangeable parts, an escape hatch for every observation. The Swap Test is just the systematic way of feeling for that slack before you let the story into your head.\n\n## Conjecture and criticism as a daily habit\n\nSpotting bad explanations is the defensive game. The offensive game is generating good ones, and here Deutsch hands the layperson a method he borrows from Popper and shar
