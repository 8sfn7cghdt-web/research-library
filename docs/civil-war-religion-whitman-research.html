anism and the Crisis of the Union* (Columbus: Ohio State University Press, 1986). Whitman as shaman/healer enacting religious-cultural salvation in the Union crisis; explains the *performed* character of his religious poetry. Internet Archive; Project MUSE review. https://archive.org/details/ecstaticwhitmanl0000hutc (accessed 2026-05-30).\n9. David S. Reynolds, *Walt Whitman's America: A Cultural Biography* (New York: Alfred A. Knopf, 1995). Whitman absorbing and transposing the rhetoric of \"actors, orators, and divines\"; religion, the body, health reform, phrenology, Quaker/Hicksite influence. Internet Archive; Penguin Random House. (accessed 2026-05-30).\n10. Walt Whitman Archive, \"Religion\" encyclopedia entry (Quaker/Hicksite \"inner light\"; spiritualism; Eastern religion; the contested secular/religious Whitman). https://whitmanarchive.org/item/encyclopedia_entry628 (accessed 2026-05-30).\n11. Betsy Erkkila, *Whitman the Political Poet* (New York: Oxford University Press, 1989). \"Calamus\" + *Drum-Taps* as Whitman's \"most fervent claim for the centrality of manly affection to the American project\"; adhesiveness as democratic cement; the poems' \"constitutive role\" in the emergence of modern sexual identity; the materialist/secular reading of the poems as \"products and agents of the political culture of his time.\" https://global.oup.com/academic/product/whitman-the-political-poet-9780195113808 (accessed 2026-05-30).\n12. Walt Whitman Archive, \"'Calamus' [1860]\" encyclopedia entry; and scholarship on adhesiveness/phrenology, \"Live Oak, with Moss,\" the calamus emblem, the Symonds correspondence and Whitman's 1890 denial, and Robert K. Martin's *The Homosexual Tradition in American Poetry* (1979). https://whitmanarchive.org/criticism/current/encyclopedia/entry_14.html ; *American Studies Journal*, \"Homosexuality and the Calamus Poems,\" https://journals.ku.edu/amsj/article/download/2263/2222 (accessed 2026-05-30).\n15. On \"Live Oak, with Moss\" and the queer reception history (Rossetti's \"non-carnal\" framing; Symonds; later explicit readings): *Calamus (poems)* reception summaries and Boston Review, Jeremy Lybarger, \"Walt Whitman's Boys.\" https://www.bostonreview.net/articles/jeremy-lybarger-walt-whitmans-boys/ (accessed 2026-05-30). (Boston Review is a left-leaning literary/political magazine; used here for reception history, not contested fact.)\n21. William James, *The Varieties of Religious Experience* (1902), Lectures IV–V, \"The Religion of Healthy-Mindedness\": Whitman as the prime example of healthy-minded religion; healthy-mindedness as \"America's main contribution to religion\"; the reservation that Whitman's optimism is \"too voluntary and defiant.\" Christian Classics Ethereal Library (ccel.org/ccel/james/varieties); *Stanford Encyclopedia of Philosophy*, \"William James.\" https://plato.stanford.edu/entries/james/ (accessed 2026-05-30).\n22. *The Varieties of Religious Experience* — Wikipedia and Encyclopedia.com used only as navigation to James's primary text (the lecture text itself is the source). (accessed 2026-05-30).\n23. Steven C. Rockefeller, *John Dewey: Religious Faith and Democratic Humanism* (New York: Columbia University Press, 1991). Dewey's \"religious faith in democracy\"; Whitman among Dewey's \"apostles of democracy\"; the \"spiritual democracy\" kinship. eNotes/journal summaries. https://www.journals.uchicago.edu/doi/10.1086/293534 (accessed 2026-05-30).\n24. Jeffrey Stout, *Democracy and Tradition* (Princeton University Press, 2004). Whitman, Emerson, James, and Dewey in a tradition of \"democratic piety\"/\"democratic faith.\" Project MUSE. https://muse.jhu.edu/pub/267/monograph/book/61842 (accessed 2026-05-30).\n25. Robert N. Bellah, \"Civil Religion in America,\" *Daedalus* 96:1 (Winter 1967), 1–21. The foundational statement of American \"civil religion\" as a public faith differentiated from the churches; Lincoln and presidential rhetoric as central exhibits. JSTOR (jstor.org/stable/20027022); American Academy of Arts and Sciences. https://www.amacad.org/publication/daedalus/civil-religion-america-1967 (accessed 2026-05-30).\n26. \"American civil religion\" overview and Bellah's Rousseau/Tocqueville lineage — Wikipedia and Hartford Institute used as navigation to Bellah's primary essay [25]; the essay itself is the source for the concept. (accessed 2026-05-30).\n27. On Whitman's \"Religious Democracy\" as \"democracy as religion\" and the James/Croly/Dewey/Whitman \"civic religion\" lineage: *Libertarianism.org*, \"Walt Whitman's Democratic Vistas: The Purpose of Democracy\" (note: libertarian-leaning outlet; cited for its articulation of the democracy-as-religion reading, a Tier 5/6 framing source, not for contested fact). https://www.libertarianism.org/publications/essays/walt-whitmans-democratic-vistas-purpose-democracy (accessed 2026-05-30).\n28. Gay Wilson Allen and Ed Folsom, eds., *Walt Whitman and the World* (Iowa City: University of Iowa Press, \"Iowa Whitman Series,\" 1995). \"No American writer has been more influential in more nations than Whitman\"; translations and national appropriations (French, German, Spanish, Italian, Japanese, Chinese); Carpenter, Rhys, Martí, Neruda, and later poets. https://uipress.uiowa.edu/books/walt-whitman-and-world (accessed 2026-05-30).\n29. Kerry C. Larson, *Whitman's Drama of Consensus* (Chicago: University of Chicago Press, 1989). Whitman's 1855–60 poems as instruments of \"social integration\" amid the disunion crisis; the poet as \"the better President\"; consent as \"an active process... to be achieved rather than merely affirmed.\" Publisher page (press.uchicago.edu/ucp/books/book/chicago/W/bo3626873.html); *Walt Whitman Quarterly Review* review. (accessed 2026-05-30).\n30. M. Wynn Thomas, *The Lunar Light of Whitman's Poetry* (Cambridge, Mass.: Harvard University Press, 1987). Whitman's democratic ideals \"painfully eroded by rapidly expanding urban capitalism\" before the Civil War, his poetry as the medium of adjustment — supporting the reading of *Democratic Vistas* and the late work as a reckoning with materialism's threat to democratic personality. Harvard University Press catalog. (accessed 2026-05-30).\n\n*Tier 5/6 framing sources (used for interpretation/position, not contested fact, and flagged inline):* Religion Dispatches, \"Walt Whitman's Sacred Democracy\" (2011); Libertarianism.org [27]; Boston Review [15]. These are cited as evidence of how a reading is articulated, never as authority for facts.\n\n*Note on method and limits:* All Whitman quotations are drawn from the Walt Whitman Archive and authoritative public-domain editions of the texts named; where a web summarizer declined to reproduce extended poetic passages, the canonical public-domain lines (1855–1871, well out of copyright) are quoted from the standard editions and flagged for a final verification collation (see Open Question 7). No quotation is fabricated; any formulation not directly verifiable against the 1871/1881 editions is marked as paraphrase. This document is a religion-led, literary-interpretive synthesis: the texts and dates are established; the readings of Whitman *as* a civil-religious shaper are inference, marked as such, and several are explicitly contested and left unresolved."}, {"order": 5, "file": "05_Live_Debates_And_Historiography.md", "title": "Live Debates and Historiography: How the Field Argues About Civil War Religion and Whitman's Faith", "summary": "", "body": "# Live Debates and Historiography: How the Field Argues About Civil War Religion and Whitman's Faith\n\n## Bottom Line\n\nThe scholarship on Civil War religion and on Whitman's religion is not a settled consensus with a few footnoted dissents; it is a set of genuinely open arguments in which serious scholars, working from much of the same evidence, reach incompatible conclusions. The deepest disputes are not about *what the records say* — most of the facts (the schism dates, the proslavery exegesis, Lincoln's documented words, the Lost Cause's rituals, Whitman's notebooks) are agreed — but about *what the records mean*: whether religion **caused** the war or only **sanctified** a conflict whose engine was material and political; whether the antebellum Protestant mind suffered a genuine **hermeneutical collapse** (Noll) or instead **generated a new and durable liberal theology** (Oshatz); whether the war's terribleness is a fit subject for the historian's **moral judgment** (Stout) or whether such judgment is presentist trespass; whether Lincoln was a **providential theist** or a **secular fatalist** in religious costume; whether the Lost Cause is best described as a **religion** (Wilson) or as **political memory and racial ideology** (Blight, Foster); and whether Whitman founded a **new American religion** (Kuebrich, Hutchinson) or wrote a fundamentally **secular, erotic, and political** poetry that later readers spiritualized (Erkkila). Underneath several of these runs a single meta-debate: the field's post-2000 \"**religious turn**\" — was it a necessary correction of a secular-political historiography that had been deaf to the era's overwhelming religiosity, or has it now over-rotated, reading providence into what was finally a war over slavery, power, and economics? The honest position is that most of these will not be \"settled\"; they turn on interpretive and evaluative commitments that evidence constrains but does not decide.\n\n## The Argument\n\nThe first and most basic dispute — whether religion *caused* the war or only *legitimated* it — is mostly a disagreement about *causal weight*, not about facts. The schism-as-cause school (Goen, Snay) and its skeptics (e.g., April Holm) largely agree on the documentary record: the three great denominations split sectionally in 1837–1845, and prominent contemporaries read those splits as omens of disunion. They disagree about whether the church divisions were a cause that \"hastened disunion\" or a symptom of the same underlying slavery crisis that later split the nation — a disagreement about causal mechanism and weight, not about events. C.C. Goen's *Broken Churches, Broken Nation* (1985) and Mitchell Snay's *Gospel of Disunion* (1993) are cited by later scholars as the works that \"argued that the disintegration of the churches hastened disunion\" [1]. Both rely on the same widely accepted facts: the Methodist and Baptist sectional splits of 1844–45 and the contemporary alarm they provoked — e.g., the *Charleston Mercury* in 1844 asking \"how long will the political union of the North and South continue\" once \"religions [are] arrayed against and scowling at each other on opposite sides of the line\" [1]. The skeptical rejoinder, articulated by April Holm in the *Journal of the Civil War Era*, accepts that figures like John C. Calhoun and Daniel Webster invoked the schisms as warnings — Calhoun called the denominational ties \"a strong cord to hold the whole Union together\" — but reverses the causal arrow: \"Divided churches did not divide the nation in 1861 — both collapsed under the weight of the slavery controversy,\" and \"the conflict in the church is a symptom of changes in the nation (and the world), not a cause\" [1].\n\nMark Noll's \"theological crisis\" thesis is, in turn, factually robust but interpretively contested. His claim that proslavery exegetes held the better *plain-sense* biblical argument, and that the war therefore exposed a crisis in the reigning Protestant hermeneutic that \"only the sword\" could resolve, is strongly supported on the descriptive point — even Eugene Genovese, from a very different vantage, agrees the Southern theologians \"bested\" their opponents on the literal text. What is contested is Noll's further inference, that this amounts to Protestant *intellectual paralysis*, against which Molly Oshatz argues that antislavery Protestants forged a new, durable historicist theology. Noll's central finding is that \"those who argued most literally from certain passages of scripture were most likely to advocate for slavery,\" forcing abolitionists to argue from the Bible's \"overall message of love and equality\" rather than from proof-texts [2]. Eugene and Elizabeth Fox-Genovese reach a strikingly parallel conclusion in *The Mind of the Master Class* (2005): \"the proslavery protagonists proved so strong in their appeal to Scripture,\" and \"southern theologians consistently bested their northern opponents in biblical exegeses,\" such that \"the southern theologians' scriptural defense of slavery as a system of social relations… has gone unanswered\" [3]. The descriptive convergence of two ideologically distant scholars is itself evidence that the plain-sense asymmetry is a fact about the record; the interpretive fight is over Noll's verdict that it left Protestantism intellectually broken.\n\nThat verdict draws its leading counter from Oshatz's \"moral progress / historicism\" reply. Molly Oshatz (*Slavery and Sin*, 2012) argues that moderate antislavery Protestants, unable to win on proof-texts, developed a \"new liberal understanding of Christian truth\" — that revelation unfolds progressively through history and that moral truths must be read in historical context — and that this historicist move was not a collapse but the seedbed of late-nineteenth-century liberal Protestantism: where Noll sees a hermeneutic discredited by the sword, Oshatz sees a hermeneutic *born* from the same crisis. She holds that the slavery debates \"strengthened Protestant thought\" by equipping religious leaders for later challenges and by \"advancing American liberalism,\" and explicitly faults Noll for \"blaming the literal, flat-footed… hermeneutics\" of the antebellum era for a Northern Protestant \"failure,\" when in fact antislavery debate \"actually generated new theological frameworks that addressed future intellectual challenges\" [4]. Her positive claim is that for these thinkers \"God's revelation unfolded progressively through human history\" and \"moral action had to be considered in its historical and social context\" [4]. The disagreement with Noll is genuinely interpretive: both accept that abolitionists abandoned strict literalism; they part over whether that abandonment was a defeat (Noll) or a creative advance (Oshatz).\n\nHarry Stout's \"moral history\" of the war is contested on grounds of method and values, not facts. *Upon the Altar of the Nation* (2006) argues that the war's conduct violated just-war norms of discrimination and proportionality, that clergy on both sides abdicated moral critique for a messianic civil religion, and that the nation's sacralized self-image was purchased with \"blood sacrifice.\" Critics such as Alison Efford do not mainly dispute his battlefield facts; they challenge his method — applying a moral standard to the past — and his values — bracketing slavery and emancipation so that North and South appear near-equivalent, which they argue is both presentist and morally distorting. Stout frames the book through just-war theory and argues the war \"violated just-war principles by lacking discrimination and proportionality,\" with clergy championing a \"civil religion centered on America's messianic destiny\" rather than restraint [5]. Reviewer Alison Efford (*Origins*, OSU, 2012) credits the ambition but lodges three core objections: that Stout \"avoids addressing the causes of the war or the morality of slavery,\" creating a \"moral blind spot\"; that \"the four million people emancipated by the war are marginal to the book's moral calculus,\" undermining the moral analysis; and that, despite condemning romanticized war narratives, his own general's-eye battle descriptions \"mirror the romanticism he condemns,\" so the book \"re-consecrates America's national millennialism despite its obscenely high costs\" [5]. A separate strand of criticism notes Stout \"appeals to international law and custom as his rules, but uses those sources selectively\" — i.e., that the just-war yardstick is applied unevenly [6]. The dispute is thus about whether moral judgment is the historian's business and, if so, whether Stout applied it consistently — not about whether Sherman's marches happened.\n\n\"How religious was Lincoln?\" is a spectrum problem, and the evidence underdetermines the answer. The debate runs from a secular-fatalist Lincoln (David Donald and older twentieth-century historians) to a providential-theist Lincoln whose faith was central to his statecraft (Guelzo, Carwardine, Ronald White); the same handful of documents — the 1862 \"Meditation on the Divine Will,\" the Second Inaugural — are read by each camp to opposite effect, because Lincoln's own language is deliberately reticent about a personal, creedal God while saturated with providence. The consensus phrasing — Lincoln as a \"straddler, too religious for most secularists but too fatalistic for most religionists\" — captures that the evidence underdetermines the verdict. The skeptical reading (David Donald) treats the Second Inaugural as \"a translation by Lincoln of his persistent secular fatalism into religious terms familiar to his audience\" [7]. Allen Guelzo's *Abraham Lincoln: Redeemer President* (1999) \"challenged the reigning outlook among 20th-century historians,\" casting Lincoln's worldview as a \"Calvinized deism\" rooted in boyhood Calvinism [8]; Richard Carwardine emphasizes a retained \"sense of predestined purpose and providential mission\" rather than Baptist doctrine per se, and places \"Lincoln's religious quest at the center of his personal life and policymaking\" [8]; and Mark Noll splits the difference: \"Lincoln is clearly a believer in God and providence, yet it's a more mysterious God than his contemporaries worshiped\" [8]. The \"Meditation on the Divine Will\" (1862) is the shared crux: in it God \"plainly had his reasons for letting the butchery continue, but he kept those reasons hidden\" — language that fatalist and theist readers each claim [7]. The summary verdict that the \"real Lincoln remains a straddler\" is itself a recognition that the texts do not settle the spectrum [7].\n\nThe \"Lost Cause as religion\" debate is partly substantive and partly a dispute over the right *category*. Charles Reagan Wilson (*Baptized in Blood*, 1980) argues the Lost Cause was a genuine civil religion — with theology, ritual, mythology, sacred figures, and clergy as its priests — while David Blight (*Race and Reunion*, 2001) and Gaines Foster (*Ghosts of the Confederacy*, 1987) treat it primarily as political memory and white-supremacist racial ideology, for which \"religion\" is at best a metaphor and at worst an over-reach. The camps agree on the phenomena (monuments, rituals, ministers, mythology); they disagree on whether \"religion\" names the essence of the thing or merely one of its registers. Wilson \"unveil[s] the Lost Cause as an authentic expression of religion,\" with \"its own rituals, mythology, and theology,\" in which \"Southern ministers forged it into a religious movement closely related to their own churches,\" offering \"defeated Southerners a sense of meaning and purpose and special identity\" by \"blending Christian rhetoric and symbols with the rhetoric and imagery of Confederate tradition\" [9]. Blight, by contrast, names the Lost Cause \"white supremacist memory,\" a \"racial ideology fashioned by ex-Confederates as an explanation of their defeat,\" in which \"romance triumphed over reality\" and a \"narrative of reunion trumped the emancipationist legacy\" — a memory/politics frame, not a theological one [10]. Foster's *Ghosts of the Confederacy* frames it as the cultural work of white Southerners \"adjusting to defeat,\" embracing reunion and the New South — a social-cultural account that does not require the religion category [11]. The dispute is partly empirical (how central was the explicitly religious dimension?) and partly conceptual (is \"civil religion\" the right label or an inflation of the metaphor?).\n\nThe Whitman \"religion\" debate splits, symmetrically, between a religious-mystical Whitman and a secular-political one. One camp reads Whitman as the founder of a \"new American religion\" (David Kuebrich) or as an ecstatic/shamanic figure performing cultural healing in the Union's crisis (George Hutchinson); the opposing camp (Betsy Erkkila) reads Whitman as fundamentally a secular, erotic, and political poet whose work later critics over-spiritualized, and insists his \"adhesiveness\" is inseparably homoerotic *and* democratic rather than safely mystical — the same texts and the same key term anchoring both readings. David Kuebrich's *Minor Prophecy: Walt Whitman's New American Religion* (1989) returns \"religious vision and spirituality to the center of Whitman studies,\" crediting the early \"Whitmanites\" for perceiving the poet's purpose \"to begin a new religion\" [12]. George Hutchinson's *The Ecstatic Whitman: Literary Shamanism and the Crisis of the Union* (1986) argues Whitman \"enacts a role analogous to that held in primitive societies by the shaman,\" devoting himself \"to the religious and cultural salvation of his society in a time of crisis,\" entering \"an ecstatic trance\" and returning \"having helped to redeem his countrymen\" [13]. Against the spiritualizing tradition, Betsy Erkkila's *Whitman the Political Poet* (1989) explicitly targets the fact that \"recent critical studies had emphasized the formal, mystical, and psychological dimensions of Whitman's art,\" and instead \"repairs the split between the private and the public, the personal and the political,\" reading the poems \"as both products and agents of the political culture of his time,\" with \"(homo)sexual body and the body politic\" fused [14]. On \"adhesiveness\" specifically, critics range \"from Richard Maurice Bucke's defense of this feeling as strictly fraternal, to James Miller's insistence that it is a sublimated homoeroticism, to Betsy Erkkila's proposition that it involves a 'homosexual republic'\" [15] — three different frames (religious-fraternal, erotic, political) for one term.\n\nBeneath several of these runs a single meta-debate: the field's post-2000 \"religious turn\" is itself debated as correction versus over-correction. Since roughly 2000, Civil War history has undergone a \"religious turn\" — exemplified by Stout (2006) and George Rable's synthesis *God's Almost Chosen Peoples* (2010) — explicitly framed by its leading practitioners (Noll, Rable) as a *correction* of an older political-economic historiography that had ignored the era's pervasive religiosity. The live question is whether this turn has now *over-rotated*, reading providence and theology into a conflict whose ultimate drivers many political and economic historians still locate in slavery, power, and material interest. Practitioners describe the turn as overdue correction: the field \"came late to recognize the significance of religion,\" and Rable's *God's Almost Chosen Peoples* (2010) \"steered Civil War history down a new path,\" fulfilling James McPherson's 1998 call for a religious history of the war [16]. Noll, in the *Journal of the Civil War Era* forum \"Reconstructing Religion,\" argues the neglect was real and damning — citing a 1994 claim that there were \"no really significant developments in American religion\" during Reconstruction as \"woefully inadequate,\" and faulting both William Dunning (1907) and W.E.B. Du Bois (1935) for largely ignoring religion [17]. The over-correction worry is the structural counter-pressure: that foregrounding sermons, providence, and biblical hermeneutics risks displacing the material and political causation that an older generation (and McPherson himself, on the war's causes) treated as primary. (The explicit \"you've overcorrected\" rejoinders are easier to find in conference and review-forum settings than in single citable monographs; this point is flagged accordingly — see Open Questions.)\n\n---\n\n## How to Read These Debates\n\nEach debate below is laid out the same way: the question; each camp **steelmanned in its own strongest terms** with its leading scholars and works; the **key evidence** each side cites; an explicit split between **disagreements about facts** and **disagreements about interpretation/values**; and a closing assessment of **what (if anything) would settle it**. The recurring lesson is that the most stubborn disputes are not factual. On the records — the schism dates, the proslavery proof-texts, Lincoln's words, the Lost Cause's rituals, Whitman's notebooks — there is broad agreement. The fights are over *causal weight* (cause vs. symptom vs. intensifier), over *valence* (was the antebellum theological turn a collapse or a creative birth?), over the *historian's posture* (may we morally judge the past?), and over the *right analytic category* (is \"religion\" the essence of the Lost Cause, or of Whitman, or only one of their registers?). Where a claim rests on review-forum reception rather than a citable monograph, that is flagged; where a camp is under-represented in the published literature (notably the explicit anti-\"religious-turn\" position), that asymmetry is itself reported as a finding.\n\n---\n\n## Debate 1 — Cause or Legitimator? Religion and the Coming of the War\n\n### The question\n\nDid religion *cause* the Civil War, or did it *legitimate and intensify* a conflict whose real engine lay elsewhere — in slavery as a labor system, in sectional political economy, in the constitutional struggle over the territories? The sub-debate that has generated the most precise scholarship is narrower and more tractable: did the **denominational schisms** of the 1840s help *cause* secession, or merely *foreshadow* it?\n\n### Camp A — Religion (and schism) as cause: Goen and Snay\n\n**Steelman.** The strongest version of the schism-as-cause thesis runs like this. The United States in 1844 had few truly *national* institutions binding North and South across the slavery divide. The great evangelical denominations — Methodists and Baptists above all — were among the most important of those national bonds: vast, popular, intersectional organizations whose shared governance, conferences, and fellowship physically tied Northern and Southern Americans together. When the Methodists split in 1844 and the Baptists in 1845 over whether a slaveholder could be a bishop or a missionary, they did not merely *reflect* sectional tension — they **dissolved a load-bearing thread of the Union itself** and rehearsed, in ecclesiastical form, the arguments, the procedures, and the very psychology of separation that the political nation would enact in 1860–61. C.C. Goen's *Broken Churches, Broken Nation* (1985) made this case; Mitchell Snay's *Gospel of Disunion* (1993) deepened it by showing how Southern religion *manufactured* a distinct sectional moral identity, translating \"the secessionist movement into a struggle of the highest moral significance\" [1]. The contemporary evidence is the camp's strongest card: it was not later historians but **John C. Calhoun** who called the denominational ties \"a strong cord to hold the whole Union together,\" and the *Charleston Mercury* in 1844, and Daniel Webster in the 1850 Senate debates, who read the church splits as a leading indicator of national rupture [1]. If the people who lived through it saw the schisms as a step toward disunion, the burden is on us to explain why they were wrong.\n\n**Leading works/scholars:** C.C. Goen, *Broken Churches, Broken Nation* (1985); Mitchell Snay, *Gospel of Disunion* (1993).\n\n### Camp B — Religion as symptom/legitimator: the skeptics (Holm)\n\n**Steelman.** The skeptical reply concedes every fact above and reverses the inference. The churches and the nation split for the *same* reason — the unbearable pressure of the slavery controversy on every national institution — and the church splits came *first* only because churches, lacking armies and a Constitution to lose, could divide more cheaply. To say the schisms *caused* the war is to mistake an early symptom for the disease. April Holm puts it sharply: \"Divided churches did not divide the nation in 1861 — both collapsed under the weight of the slavery controversy,\" and \"the conflict in the church is a symptom of changes in the nation (and the world), not a cause\" [1]. The contemporaries who read schism as omen (Calhoun, Webster) were *also* the contemporaries who had every political incentive to dramatize church division as a warning — their testimony is evidence of a perceived linkage, not proof of causal priority. On this view religion is best understood as a **legitimator and intensifier**: it gave secession a \"religious rationale,\" sacralized Southern identity, and raised the emotional stakes — but the causal weight sits on slavery-as-interest and the sectional balance of power, with religion as the idiom in which those interests were expressed.\n\n**Leading works/scholars:** April Holm (*Journal of the Civil War Era*); broadly, the political-economic and \"slavery-as-cause\" tradition (e.g., the McPherson-line emphasis on slavery and Union).\n\n### A complicating third position — religion as the *idiom* that made compromise impossible\n\nA position that cuts across the cause/symptom binary holds that the decisive thing religion did was *moralize* the slavery dispute past the point of political compromise. On this reading — visible in Snay's own emphasis on religion \"translat[ing] the secessionist movement into a struggle of the highest moral significance\" [1] — the antebellum political system was built to broker *interests* (the Missouri Compromise, the Compromise of 1850 were interest-splitting deals), but it had no machinery to broker *sins*. Once slavery was framed by Northern and Southern pulpits alike as a matter of absolute right and wrong — God's sanction vs. God's condemnation — the ordinary lubricants of democratic bargaining seized up. This is neither \"religion caused the war\" (the cause is still slavery) nor \"religion was mere cover\" (the religious framing did real causal work): it is religion as the *transmission mechanism* that converted a divisible material conflict into an indivisible moral one. The strength of this position is that it specifies a mechanism both camps can recognize; its weakness is that it is hard to distinguish empirically from the claim that the moral stakes were simply *real* and religion only named them.\n\n### Facts vs. interpretation\n\n- **Agreed facts:** the schism dates (Methodists 1844, Baptists 1845; Old/New School Presbyterian fractures earlier); that prominent contemporaries linked church division to national danger; that Southern religion built a distinct sectional moral identity.\n- **Disputed interpretation:** whether the schisms were a *cause* with independent causal force or a *symptom* of a deeper slavery crisis; how much causal weight religion carries relative to material/political factors.\n\n### What would settle it?\n\nIn principle, a counterfactual: would secession have occurred on the same timeline had the churches *not* split? Because that is unrunnable, the debate is unlikely to be resolved by evidence. The most one can do is weigh mechanisms — and here the skeptics have the logically cleaner position (common cause explains the correlation without invoking the churches as a driver), while the schism-as-cause school has the stronger contemporary testimony. A genuinely decisive move would be evidence that specific 1860–61 secession decisions were materially shaped by the prior denominational precedents (procedural borrowing, personnel overlap, argumentative templates) in a way that would not have happened otherwise — partial, suggestive versions of which exist but fall short of proof.\n\n---\n\n## Debate 2 — Noll's \"Theological Crisis\": Real Collapse or Misread Creativity?\n\n### The question\n\nMark Noll's *The Civil War as a Theological Crisis* (2006) advances a bold claim: the war discredited the reigning American Protestant biblical hermeneutic. Because the dominant \"common-sense,\" plain-text way of reading Scripture gave the **proslavery** side the better proof-text argument, and because no interpretive authority existed to adjudicate between rival literal readings, the question of what the Bible taught about slavery could be resolved only \"by the sword.\" Did this constitute a real intellectual collapse — and did Noll *overstate* Protestant paralysis while *underrating* antislavery exegesis and Black/abolitionist theology?\n\n### Camp A — Noll: a genuine hermeneutical crisis\n\n**Steelman.** Noll's argument is deceptively precise. He is *not* claiming the proslavery reading was morally correct; he is claiming that *on the era's own shared rules of reading* — plain-sense literalism, accessible to ordinary believers without specialized mediation — the proslavery side held the easier hand, because \"those who argued most literally from certain passages of scripture were most likely to advocate for slavery\" [2]. Old Testament law regulated rather than abolished bondage; the patriarchs held slaves; Paul returned Onesimus and told slaves to obey. To beat this, abolitionists had to argue from the Bible's \"overall message of love and equality\" — which, *on literalist terms*, looked like abandoning the Bible as the standard of truth. The result was a crisis with no internal resolution: two communities of devout, literate Bible-readers reached opposite conclusions with no agreed authority to decide between them, so the matter was settled extra-theologically, by war. The independent corroboration is powerful: from an entirely different (Marxist-turned-traditionalist) standpoint, Eugene and Elizabeth Fox-Genovese concluded that \"southern theologians consistently bested their northern opponents in biblical exegeses\" and that their defense \"has gone unanswered\" [3]. When scholars who agree on almost nothing else agree on the plain-sense asymmetry, that asymmetry is about as close to a *fact* as interpretive history offers.\n\n**Leading works/scholars:** Mark Noll, *The Civil War as a Theological Crisis* (2006), *America's God* (2002); convergent: Eugene D. Genovese & Elizabeth Fox-Genovese, *The Mind of the Master Class* (2005).\n\n### Camp B — Oshatz: not paralysis but the birth of liberal theology\n\n**Steelman.** Molly Oshatz accepts Noll's descriptive point and rejects his diagnosis. Yes, antislavery moderates could not win on proof-texts — but their response was not collapse; it was **construction**. Forced off the literal ground, they developed a \"new liberal understanding of Christian truth\": that \"God's revelation unfolded progressively through human history\" and that \"moral action had to be considered in its historical and social context\" [4]. This historicist hermeneutic let them condemn slavery *as sin* without discarding scriptural authority, and it became the seedbed of late-nineteenth-century **liberal Protestantism**. Where Noll narrates a discredited hermeneutic and a Protestantism left \"unprepared,\" Oshatz narrates a hermeneutic being *born* — the slavery debates \"strengthened Protestant thought\" and advanced American liberalism. She faults Noll directly for \"blaming the literal, flat-footed… hermeneutics\" for a Northern \"failure,\" when the real story is the *generativity* of antislavery theology [4]. The deeper charge: Noll's frame measures the antebellum mind against the literalist standard it was *transcending*, and so scores a creative breakthrough as a defeat.\n\n**Leading works/scholars:** Molly Oshatz, *Slavery and Sin: The Fight Against Slavery and the Rise of Liberal Protestantism* (2012); related article, \"The Problem of Moral Progress\" (*Modern Intellectual History*).\n\n### Camp C — the \"underrated Black and abolitionist theology\" critique\n\n**Steelman.** A third line, sympathetic to Oshatz but distinct, holds that Noll's frame underweights the theological agency of African American and radical-abolitionist Christianity. Enslaved and free Black Christians, and Garrisonian and Douglassite abolitionists, did not experience the proslavery proof-texts as a checkmate; they read the same Bible through Exodus, prophecy, and the Jubilee — a hermeneutic of *deliverance* — and through a withering critique of \"slaveholding religion.\" Frederick Douglass's *Appendix* to the 1845 *Narrative* draws \"the widest possible difference\" between \"the Christianity of this land\" and \"the Christianity of Christ,\" so wide that \"to be the friend of the one is of necessity to be the enemy of the other\" — a confident, not paralyzed, repudiation of the proslavery church [22]. Albert Raboteau's *Slave Religion: The \"Invisible Institution\" in the Antebellum South* (1978) shows that the enslaved built \"an alternative script\" from \"the biblical narratives of Exodus, prophecy, and redemptive suffering,\" so that \"two Christianities were formed in this nation with different notions of the country's destiny — one from the slaves and another from the slaves' masters\" [23]. On this view, the \"crisis\" Noll describes is specifically a crisis of *white, learned, common-sense Protestantism*; to generalize it to American Christianity as such is to center the camp that *was* checkmated by its own literalism and marginalize the camp that read the same book toward freedom and never doubted the answer. The point is not that the Black/abolitionist reading \"won\" on proof-texts — it did not, by Noll's and Genovese's account — but that it never accepted the proof-text contest as the whole game, which is itself a different *hermeneutic*, available and confidently used, contemporaneous with the crisis Noll says had no internal resolution.\n\n**Leading works/scholars:** Frederick Douglass, *Narrative*, \"Appendix\" (1845, primary); Albert J. Raboteau, *Slave Religion* (1978); the broader African American religious-history tradition (e.g., Eddie Glaude, *Exodus!*; Edward Blum). Note: a single book-length *direct rejoinder to Noll* from this vantage remains a gap (see Open Questions).\n\n### Facts vs. interpretation\n\n- **Agreed facts:** the proslavery side held the stronger *plain-sense* proof-text case; abolitionists shifted to \"spirit\"/overall-message/historical arguments; no shared interpretive authority adjudicated.\n- **Disputed interpretation:** whether the shift off literalism was a *collapse* (Noll) or a *creative advance* (Oshatz); whether Black/abolitionist theology is adequately represented in the \"paralysis\" picture.\n\n### What would settle it?\n\nThis is a values-and-frame dispute that evidence constrains but cannot decide. Noll and Oshatz read the *same* turn-to-historicism and assign it opposite valences (defeat vs. birth of liberalism). The closest thing to an adjudication would be tracing the *downstream* intellectual history: if antebellum antislavery historicism demonstrably and continuously becomes Gilded-Age liberal Protestantism (Oshatz's empirical bet), her \"construction\" reading gains ground; if the dominant postbellum story is fragmentation and lost authority (Noll's bet), his \"crisis\" reading does. Both have real evidence; the genealogical continuity is itself contested.\n\n---\n\n## Debate 3 — Did Religion Make the War More Terrible? Stout's Moral History and Its Critics\n\n### The question\n\nHarry Stout's *Upon the Altar of the Nation* (2006) is self-described as a \"moral history\": it judges the war by just-war criteria (jus in bello: discrimination, proportionality) and finds it wanting, arguing that religion supplied not restraint but a sacralizing \"civil religion\" that licensed escalation toward total war and converted mass death into national consecration. The debate is less about what happened than about whether the historian *should* render this verdict — and whether Stout rendered it fairly.\n\n### Camp A — Stout: religion sacralized total war\n\n**Steelman.** Stout's wager is that historians have been morally evasive about the Civil War, hiding behind \"necessity\" and emancipation's righteousness to avoid asking whether the *way* the war was fought was just. Applying the just-war tradition's own categories, he argues the war's conduct breached **discrimination and proportionality**, and — crucially — that the churches and clergy who might have been the voices of restraint instead became chaplains of a messianic nationalism, sacralizing the carnage into the price of a redeemer-nation's destiny [5]. The \"altar\" is exact: a civil religion that demanded and then sanctified \"blood sacrifice.\" This is a serious moral-intellectual claim about religion's role: not that religion caused the war, but that it *removed the brakes* and *consecrated the result*, leaving Americans with a national self-image purchased at a cost no one was willing to name.\n\n**Leading works/scholars:** Harry S. Stout, *Upon the Altar of the Nation: A Moral History of the Civil War* (2006).\n\n**The intensifier mechanism (independent support).** Stout's claim that religion supplied license rather than restraint is independently buttressed by scholarship he does not depend on. Drew Gilpin Faust, in *This Republic of Suffering: Death and the American Civil War* (2008), shows that wartime sermons North and South \"invoked the 'just war' doctrine which argued that 'killing' was not merely tolerated but required in God's service,\" so that \"warfare was thus not at variance with the spirit and duties of Christianity\" [19]. James Moorhead, in *American Apocalypse: Yankee Protestants and the Civil War, 1860–1869* (1978), documents how Northern churches read the conflict through **millennialism**, so that \"the war between North and South became an apocalyptic struggle in which the federal armies battled for the Lord on the field of Armageddon\" [20]. If the pulpits framed killing as divine service and the war as Armageddon, then the claim that religion *removed brakes and consecrated carnage* is not idiosyncratic to Stout — it is the shared finding of the religious-history literature, however differently those scholars evaluate it.\n\n### Camp B — the critics: presentism, selective standards, and the bracketing of slavery\n\n**Steelman.** The critics mount three distinct objections. (1) **Method/presentism:** judging nineteenth-century combatants against a moral standard — and a selectively construed one — risks anachronism; one reviewer notes Stout \"appeals to international law and custom as his rules, but uses those sources selectively… to suit his own purposes\" [6]. (2) **The bracketing of slavery:** by his own admission Stout \"avoids addressing the causes of the war or the morality of slavery,\" which Alison Efford argues creates a \"moral blind spot\" — a moral history that holds the war's *one* unambiguous moral good (emancipation) outside its ledger, so that \"the four million people emancipated by the war are marginal to the book's moral calculus\" [5]. The effect is a troubling near-equivalence between Union and Confederate moral conduct. (3) **Self-undercutting form:** despite condemning romanticized war writing, Stout's own general's-eye battle narration \"mirror[s] the romanticism he condemns,\" so the book \"re-consecrates America's national millennialism despite its obscenely high costs\" [5]. The sharpest version of the critique: a moral history that cannot place slavery on its scales is not too moralizing but *not moral enough*.\n\n**Leading works/scholars:** Alison Efford (*Origins*, OSU); reviewers in the *Christian Century*, *AHR*, and *Civil War Times*.\n\n**The \"different mood, same evidence\" contrast — Faust.** A useful way to see that the Stout dispute is about *values and mood* rather than facts is to set him beside Faust, who works the same religious-cultural terrain (death, sermons, providence, the \"Good Death\") but renders no condemnatory verdict. Faust describes \"how a deeply religious culture struggled to reconcile the unprecedented carnage with its belief in a benevolent God,\" tracing the collapse of the *ars moriendi* \"Good Death\" as soldiers \"met inglorious ends at the hands of disease, accidents, suicide, executions, and the weapons of the Industrial Revolution\" [19]. Faust's tone is elegiac and analytic where Stout's is prosecutorial — yet the underlying documentary base (sermons sacralizing killing, providential framing of mass death) is nearly the same. That two major historians can build such different books on overlapping evidence is itself the clearest demonstration that the live disagreement is over the **historian's posture toward moral judgment**, not over what the sources say.\n\n### Facts vs. interpretation\n\n- **Agreed facts:** the war's escalating destructiveness; the prevalence of providential/messianic rhetoric in wartime preaching; the sacralization of killing in wartime sermons (Faust, Moorhead).\n- **Disputed values/method:** whether the historian should issue moral verdicts on the past; whether just-war criteria were applied consistently; whether bracketing slavery distorts the moral picture into false North-South equivalence.\n\n### What would settle it?\n\nAlmost nothing, because the core disagreement is **normative and methodological**, not empirical. Whether moral history is legitimate, and whether emancipation should dominate the moral ledger, are commitments rather than findings. The one partly-empirical sub-question — was Stout's use of the just-war tradition *internally consistent*? — is adjudicable in principle by close audit of his sources against the tradition, and the reviews suggest he applied them selectively. That is the narrow place where the critics have the firmest ground.\n\n---\n\n## Debate 4 — How Religious Was Lincoln?\n\n### The question\n\nWhere on the spectrum from skeptic to believer does Abraham Lincoln belong — and was the providential language of his late presidency (the \"Meditation on the Divine Will,\" the Second Inaugural) a genuine theology or a fatalist's borrowed idiom?\n\n**Why it matters.** This is not antiquarian. Lincoln is the central figure in the American **civil-religion** canon (Bellah; see Debate 6), and the meaning of his providentialism shapes how we read the war's *official* interpretation of itself. If the Second Inaugural is genuine theology, the Union's self-understanding had a real religious core — national sin, judgment, atonement — and the postwar \"redeemer nation\" myth has authentic roots in Lincoln himself. If it is fatalism in scriptural dress, then the war's most sacred text is a brilliant *rhetorical* construction, and the civil religion built on it rests on a poetic rather than a confessional foundation. The stakes of the Lincoln debate thus ramify directly into Debates 5 (Lost Cause) and 6 (Whitman/Bellah): how much of American civil religion is *belief* and how much is *language*.\n\n### Camp A — the secular-fatalist Lincoln\n\n**Steelman.** The older twentieth-century reading (David Donald and others) starts from the documented facts: Lincoln never joined a church, never made a public profession of orthodox faith, was reputed in his New Salem and Springfield years as a religious skeptic, and authored no creedal statement. On this reading, his deepening \"providence\" talk is the translation of a lifelong **fatalism** — a sense of being driven by impersonal necessity — into the scriptural idiom his audience spoke. Donald reads the Second Inaugural precisely as \"a translation by Lincoln of his persistent secular fatalism into religious terms familiar to his audience\" [7]. The \"Meditation on the Divine Will\" fits: a God who \"plainly had his reasons for letting the butchery continue, but… kept those reasons hidden\" is as much the God of a fatalist confronting an inscrutable universe as of a Calvinist confronting a sovereign deity [7].\n\n**Leading works/scholars:** David Herbert Donald, *Lincoln* (1995); the broader mid-century secularizing biography tradition.\n\n### Camp B — the providential-theist Lincoln\n\n**Steelman.** The revisionist reading (Guelzo, Carwardine, Ronald White, qualified by Noll) argues the secular picture cannot account for the *content* and *trajectory* of Lincoln's religious thought. Allen Guelzo's *Redeemer President* (1999) traces a \"Calvinized deism\" rooted in boyhood Calvinism — a worldview of providence, necessity, and moral seriousness that is religious in substance even where it is unorthodox in form [8]. Carwardine locates a retained \"sense of predestined purpose and providential mission\" and places Lincoln's \"religious quest at the center of his personal life and policymaking\" [8]. The Second Inaugural is the exhibit: its claim that God may will the war to continue \"until all the wealth piled by the bondsman's two hundred and fifty years of unrequited toil shall be sunk\" is a *theological* argument about national sin and divine judgment, not mere consolation-rhetoric. Noll's mediating verdict — \"Lincoln is clearly a believer in God and providence, yet it's a more mysterious God than his contemporaries worshiped\" — concedes the unorthodoxy while insisting on the reality of the belief [8].\n\n**Leading works/scholars:** Allen C. Guelzo, *Abraham Lincoln: Redeemer President* (1999); Richard Carwardine, *Lincoln* (2003/06); Ronald C. White, *Lincoln's Greatest Speech* (2002); Mark Noll.\n\n### Why the Second Inaugural is the crux — and why it doesn't settle the spectrum\n\nThe 1865 Second Inaugural is where the two camps grapple most directly, because the text is simultaneously the *most theological* thing Lincoln wrote and *resistant to either pure reading*. Its central passage imagines a God who may will the war to continue \"until all the wealth piled by the bondsman's two hundred and fifty years of unrequited toil shall be sunk, and until every drop of blood drawn with the lash shall be paid by another drawn with the sword.\" The theist camp reads this as a fully developed doctrine of **national sin and providential judgment** — Lincoln as lay theologian, charging *both* sections with the guilt of slavery and submitting to an inscrutable but just God (\"the judgments of the Lord are true and righteous altogether\"). The fatalist camp reads the *same* lines as the rhetorical sublimation of a man who had always believed events were driven by impersonal necessity, now reaching for the only public idiom — scriptural providence — adequate to mass death. The decisive interpretive fact is that the speech withholds the moves an orthodox believer would make: it offers no doctrine of salvation, no church, no Christ, only a sovereign, hidden Providence. Noll's verdict — a \"more mysterious God than his contemporaries worshiped\" [8] — is precisely an acknowledgment that the text is theological *and* heterodox, which is why it cannot adjudicate between the camps. What the Second Inaugural *does* settle is that by 1865 Lincoln's *public* language was providential to the core; what it cannot settle is whether that language reported a conviction or performed one.\n\n### Facts vs. interpretation\n\n- **Agreed facts:** Lincoln never joined a church or professed orthodox creed; his presidency saw a marked rise in providential language; the \"Meditation\" and Second Inaugural are authentic and central; the Second Inaugural articulates a doctrine of national sin and divine judgment.\n- **Disputed interpretation:** whether that providentialism is *theology* or *fatalism in religious dress*; how to weigh youthful skepticism against late providentialism; how much the deaths of Willie (1862) and the war's carnage transformed belief vs. merely its expression.\n\n### What would settle it?\n\nNothing decisively, because the dispute is about the *inner meaning* of a famously reticent man's public language, and Lincoln left no diary of belief. The shared evidence underdetermines the verdict — which is why the field has converged on the *meta*-description of Lincoln as a \"straddler, too religious for most secularists but too fatalistic for most religionists\" [7]. That phrase is less a resolution than an admission that the spectrum is the answer.\n\n---\n\n## Debate 5 — Is the Lost Cause a *Religion*?\n\n### The question\n\nCharles Reagan Wilson's *Baptized in Blood* (1980) calls the postwar Lost Cause a **civil religion**. David Blight and Gaines Foster treat it primarily as **memory** and **racial-political ideology**. Is \"religion\" the right analytic category, or an over-reading of what was finally a politics of memory and white supremacy?\n\n### Camp A — Wilson: the Lost Cause as authentic civil religion\n\n**Steelman.** Wilson's case is not metaphorical. He documents that the Lost Cause possessed the *formal features* of a religion: a **theology** (Confederate defeat as redemptive suffering, the South as a chosen-but-chastened people), **ritual** (Memorial Day observances, monument dedications, veterans' reunions as liturgy), **sacred figures** (Lee and Jackson as saints), **mythology**, and a **priesthood** — Southern ministers who \"forged it into a religious movement closely related to their own churches\" [9]. Crucially, it did the *work* religion does: it gave \"defeated Southerners a sense of meaning and purpose and special identity,\" by \"blending Christian rhetoric and symbols with the rhetoric and imagery of Confederate tradition\" [9]. Drawing on the sociology of civil religion, Wilson argues that to call this merely \"memory\" or \"ideology\" is to miss that for its adherents it was sacred — experienced as religion, conducted by clergy, housed in and alongside the churches.\n\n**Leading works/scholars:** Charles Reagan Wilson, *Baptized in Blood: The Religion of the Lost Cause, 1865–1920* (1980).\n\n### Camp B — Blight and Foster: memory and racial ideology, not religion\n\n**Steelman.** Blight and Foster argue the *essence* of the Lost Cause is political, and that \"religion\" names one of its rhetorical registers, not its core. For Blight, the Lost Cause is \"white supremacist memory,\" a \"racial ideology fashioned by ex-Confederates as an explanation of their defeat,\" whose central achievement was that \"romance triumphed over reality\" and a \"narrative of reunion trumped the emancipationist legacy\" — i.e., the Lost Cause is best explained by what it *did politically*: it underwrote sectional reconciliation among whites at the explicit cost of Black emancipationist memory [10]. Foster's *Ghosts of the Confederacy* frames it as the cultural process by which white Southerners *adjusted to defeat*, embraced the New South, and built reconciliation — a social-and-cultural mechanism that does not require, and is arguably obscured by, the \"religion\" label [11]. The methodological worry: \"civil religion\" is so capacious a category that almost any sustained collective devotion qualifies; calling the Lost Cause a religion may *describe* its intensity while *mis-locating* its causal core in racial politics.\n\n**Leading works/scholars:** David W. Blight, *Race and Reunion: The Civil War in American Memory* (2001); Gaines M. Foster, *Ghosts of the Confederacy* (1987).\n\n### Facts vs. interpretation\n\n- **Agreed facts:** the rituals, monuments, ministerial leadership, mythology, and reconciliationist politics of the Lost Cause; that it excluded and overwrote Black emancipationist memory.\n- **Disputed interpretation/category:** whether \"civil religion\" names the essence (Wilson) or one register of a fundamentally political/memorial phenomenon (Blight, Foster); whether the religion frame illuminates or inflates.\n\n### What would settle it?\n\nThis is substantially a **conceptual** dispute about the right unit of analysis, so it is not fully settleable by evidence — it depends on how one defines \"religion\" and \"civil religion.\" Where it *is* partly empirical is in the question of centrality: how load-bearing was the explicitly theological/ecclesiastical apparatus relative to the secular-political work of reconciliation and racial control? The two frames are also not strictly exclusive — much recent work treats the Lost Cause as *both* a memory-politics *and* a sacralized civil religion, suggesting the productive move is integration rather than victory for one camp.\n\n---\n\n## Debate 6 — Whitman: Secular Prophet or Religious Mystic?\n\n### The question\n\nWas Walt Whitman the founder of a \"new American religion\" and an ecstatic/shamanic healer of a fracturing Union — or a fundamentally **secular**, **erotic**, and **political** poet whom later critics over-spiritualized? And which frame — religious, queer-erotic, or democratic-political — best reads his key term \"adhesiveness\"? Does Whitman belong in the genealogy of American **civil religion**?\n\n### Camp A — the religious-mystical Whitman: Kuebrich and Hutchinson\n\n**Steelman.** David Kuebrich's *Minor Prophecy: Walt Whitman's New American Religion* (1989) argues that Whitman *meant* to found a religion — a post-Protestant, democratic, immanentist faith of the divine self, the sacred body, comradeship, and a redemptive vision of death — and that twentieth-century criticism, embarrassed by this ambition, secularized him against his own intent. Kuebrich credits the early \"Whitmanites\" with seeing clearly \"the poet's purpose… to begin a new religion,\" and seeks to return \"religious vision and spirituality to the center of Whitman studies\" [12]. George Hutchinson's *The Ecstatic Whitman: Literary Shamanism and the Crisis of the Union* (1986) supplies the mechanism: Whitman \"enacts a role analogous to that held in primitive societies by the shaman,\" devoting himself \"to the religious and cultural salvation of his society in a time of crisis,\" entering \"an ecstatic trance in which he faces ultimate reality,\" and returning \"having helped to redeem his countrymen\" [13]. On this reading the war-era poetry is *literally* religious work — cultural healing performed in a sacred-ecstatic register, with Whitman as prophet-shaman of a Union in mortal crisis.\n\n**Leading works/scholars:** David Kuebrich, *Minor Prophecy: Walt Whitman's New American Religion* (1989); George B. Hutchinson, *The Ecstatic Whitman* (1986).\n\n**Why the war is the test case.** Hutchinson's frame is strongest precisely where this corpus is focused — the war years. His thesis is that Whitman's wartime work (the hospital ministry, *Drum-Taps*, the \"Lilacs\" elegy) is the shaman's characteristic sequence of \"affliction, crisis, self-training, and mastery of the techniques of ecstasy\" turned to the \"salvation of his society in a time of crisis\" [13]. On this reading the dying-soldier elegies are not metaphorically but *functionally* religious: rites of consolation performed by a self-appointed prophet for a nation that had lost the orthodox consolations of the \"Good Death\" (the very loss Faust documents — see Debate 3). The reviewers' main reservation is itself revealing for the larger debate: that \"while his shamanistic paradigm helps to explain the ecstatic moments of individual poems, it does not adequately account for the aesthetic principles which govern the entire *Leaves of Grass*\" [13] — i.e., the religious frame may illuminate Whitman's *peaks* while under-explaining his *craft*, which is exactly the seam the political-poetics camp pries open.\n\n### Camp B — the secular-erotic-political Whitman: Erkkila\n\n**Steelman.** Betsy Erkkila's *Whitman the Political Poet* (1989) is the sharpest counter-frame. She explicitly targets the spiritualizing tradition — noting that \"recent critical studies had emphasized the formal, mystical, and psychological dimensions of Whitman's art, dwelling mainly upon his Emersonian and Transcendental sources\" — and insists instead on reading the poems \"as both products and agents of the political culture of his time,\" with the \"(homo)sexual body and the body politic\" inseparably fused [14]. On this view the mystical Whitman is a critical artifact: a way of sanitizing a poet whose real subjects are sex, the laboring and desiring body, race, class, capital, war, and democratic politics. The \"new religion\" framing risks converting concrete erotic-democratic radicalism into safe transcendence.\n\n**Leading works/scholars:** Betsy Erkkila, *Whitman the Political Poet* (1989), *The Whitman Revolution: Sex, Poetry, and Politics* (2020).\n\n### The \"adhesiveness\" sub-debate: three competing frames\n\nWhitman's borrowed phrenological term **\"adhesiveness\"** (intense male-male comradely love) is the single hinge on which the larger debate turns, because each camp reads it differently. The historiography of the term itself maps the three frames: \"from Richard Maurice Bucke's defense of this feeling as **strictly fraternal**, to James Miller's insistence that it is a **sublimated homoeroticism**, to Betsy Erkkila's proposition that it involves a **'homosexual republic'**\" [15]. That is: a *religious-fraternal/spiritual* reading (adhesiveness as the mystical bond of democratic brotherhood), a *queer-erotic* reading (adhesiveness as displaced/encoded same-sex desire), and a *democratic-political* reading (adhesiveness as the affective infrastructure of democracy itself). Erkkila's distinctive move is to **refuse to separate** the erotic from the political: \"his view of adhesiveness is an integral part of his conception of democracy,\" so that \"same-sex/same-gender love wasn't a deviation; it was a model for democracy,\" and \"Whitman's eroticism in that sense is political\" [15]. The religious frame, on this account, is the one most prone to *dissolving* the erotic and political specifics into a vaguer spirituality.\n\n### Whitman and civil religion (Bellah)\n\nA further question is genealogical: does Whitman belong in the lineage of American **civil religion**? Robert Bellah, in \"Civil Religion in America\" (1967) and *The Broken Covenant* (1975), explicitly drew on \"John Winthrop, Walt Whitman, Abraham Lincoln and Herman Melville\" as voices who \"call on [America] to renew the covenant and fulfill its conditions\" [18]. So at least one foundational theorist of American civil religion *placed Whitman inside the canon* — alongside Lincoln — of prophetic-democratic faith. This both supports the religious-Whitman camp (a major sociologist of religion treats him as a civil-religious prophet) and complicates it (Bellah's \"civil religion\" is precisely a *post-* or *trans-*ecclesial category, neither secular nor traditionally religious — which may be exactly Whitman's location). Bellah's civil religion is thus a *third term* that scrambles the religious-vs-secular binary the debate is organized around: it lets Whitman be \"religious\" in a sense that is neither churchly nor merely metaphorical, which is either a vindication or a dissolution of the question depending on one's taste.\n\nSacvan Bercovitch's *The American Jeremiad* (1978) offers the competing genealogy: Whitman's prophetic-national voice — the scolding-yet-hopeful summons to a chosen people to live up to its covenant, audible in *Democratic Vistas* — is read not as a *new* religion but as the **secularized inheritance of Puritan rhetoric**, the jeremiad form surviving the evaporation of its theology. On Bercovitch's account, what looks like Whitman founding a faith is Whitman *continuing* one — running the oldest American rhetorical machine (the chosen-people jeremiad) on democratic rather than Calvinist fuel. This is a subtle but consequential reframing: it makes Whitman's \"religion\" a matter of inherited *form* rather than new *content*, and so sits between Kuebrich's new-religion thesis and Erkkila's secular-political reading — the rhetoric is religious in lineage, the content is democratic-political in substance.\n\n### Facts vs. interpretation\n\n- **Agreed facts:** Whitman used overtly religious and prophetic language; he spoke of founding a \"new religion\"; \"adhesiveness\" is a real and central term; Bellah included him in the civil-religion canon.\n- **Disputed interpretation:** whether the religious language is the *substance* (Kuebrich, Hutchinson) or a *rhetorical register* over a secular-erotic-political core (Erkkila); which frame best reads \"adhesiveness\"; whether \"civil religion\" is the right category for Whitman or a both/neither hybrid.\n\n### What would settle it?\n\nLargely unsettleable, because it is an interpretive contest over a deliberately capacious, self-mythologizing body of work that *invites* multiple frames — Whitman wrote to contain multitudes, and the text rewards religious, erotic, and political readings simultaneously. The partly-tractable sub-question is historical-philological: *what did Whitman himself intend* by \"new religion\" and \"adhesiveness,\" recoverable from notebooks, the phrenological sources, and revisions across editions. But even authorial intent will not settle the larger frame, since the camps disagree about whether intent or effect, surface or substance, governs interpretation. The likeliest scholarly trajectory is integration — a Whitman whose \"religion\" *is* his erotic-democratic politics, collapsing the binary the debate assumes.\n\n---\n\n## Debate 7 — The \"Religious Turn\": Necessary Correction or Over-Rotation?\n\n### The question\n\nSince about 2000, Civil War history has taken a pronounced \"religious turn,\" foregrounding theology, providence, biblical hermeneutics, and church history where an older historiography emphasized politics, economics, and military events. Was this an overdue correction of a genuinely religion-deaf field — or has it now over-rotated, reading the war as more \"theological\" than it finally was?\n\n### Camp A — the turn as necessary correction (Noll, Rable, Stout)\n\n**Steelman.** The practitioners' case is that the prior neglect was real, large, and indefensible given the evidence. The Civil War generation was overwhelmingly, articulately religious — providence was the default grammar of meaning-making on both sides — yet the professional field \"came late to recognize the significance of religion\" [16]. George Rable's *God's Almost Chosen Peoples* (2010) is the landmark synthesis that \"steered Civil War history down a new path,\" fulfilling James McPherson's 1998 observation that no such religious history existed [16]; it documents \"the prevalence of providential interpretations of the war's every aspect.\" Noll, in the *Journal of the Civil War Era* \"Reconstructing Religion\" forum, indicts the older historiography by name: a 1994 claim that there were \"no really significant developments in American religion\" during Reconstruction is \"woefully inadequate,\" and both William Dunning (1907) and W.E.B. Du Bois (1935) — for all their differences — \"largely ignored religion's role,\" a gap only corrected when the civil-rights era pushed historians like Litwack and Foner to center the Black church [17]. On this account, the turn does not *inflate* religion; it *finally takes the sources at their word*.\n\n**Leading works/scholars:** George C. Rable, *God's Almost Chosen Peoples* (2010); Mark Noll; Harry Stout; James Moorhead, *American Apocalypse* (1978, an early forerunner of the turn); Edward Blum, *Reforging the White Republic* (2005); Drew Gilpin Faust, *This Republic of Suffering* (2008); the *Journal of the Civil War Era* and *Civil War History* as institutional venues.\n\n**The dividend argument.** The turn's defenders can point to specific explanatory payoffs the older historiography missed. Edward Blum's *Reforging the White Republic: Race, Religion, and American Nationalism, 1865–1898* (2005) argues that Northern Protestantism — \"once the catalyst for racial egalitarianism\" — became after the war the engine that \"promoted the image of a 'white republic' that conflated whiteness, godliness, and nationalism,\" and that religious spokesmen \"played a critical role in reuniting northern and southern whites… in justifying and nourishing the social and spiritual separation of whites and blacks\" [21]. This is the kind of claim the turn makes available: that sectional *reconciliation itself* — long told as a political/economic story — was substantially a *religious* achievement, and a racially exclusionary one. If religion explains not just the war's rhetoric but the shape of the peace and the construction of Jim Crow's moral cover, then the turn is recovering causation, not merely decoration.\n\n### Camp B — the over-rotation worry (the political/economic counter-pressure)\n\n**Steelman.** The skeptical pressure — easier to find in review forums, conference exchanges, and the work of political and economic historians than in a single anti-religious-turn manifesto — runs: religiosity was the *idiom* in which nineteenth-century Americans expressed conflicts whose *drivers* were material and political. Everyone in 1861 spoke Christian; that the *language* of the war was providential does not show that the *causes* or the *decisive dynamics* were theological. The risk of the turn is a kind of category error — mistaking the pervasive religious *vocabulary* for religious *causation* — and a displacement of the slavery-power-economy account (associated with McPherson on causation, and with the political and economic historiography generally) that remains, for many scholars, the bedrock explanation of why the war came and how it was won. The most disciplined version does not deny religion mattered; it insists religion be kept in proportion as one factor among the material and political, not promoted to prime mover.\n\n**Leading works/scholars:** the broad political/economic and \"slavery-as-cause\" tradition (McPherson-line); review-forum critics of the religious turn. (Note: this camp is under-represented in single citable monographs *against* the turn; it operates more as a standing methodological counter-pressure — flagged in Open Questions.)\n\n### Facts vs. interpretation\n\n- **Agreed facts:** the era was saturated with religious language and practice; the field underweighted religion before ~2000; a body of strong religious histories has since appeared.\n- **Disputed interpretation:** whether pervasive religious *language* implies religious *causation*; how to weight religion against material/political drivers; whether the turn has reached healthy balance or overshot.\n\n### What would settle it?\n\nThis is a disciplinary balance question rather than a single empirical one, so \"settling\" would look like a stable synthesis — work that integrates the religious turn's findings with material-political causation without subordinating either. The trajectory appears to favor integration: the strongest recent work treats religion as *both* a genuine motive force *and* a legitimating idiom, depending on the question (cause of the war: slavery/power primary, religion intensifying; meaning and conduct of the war: religion central). The over-rotation worry is best read not as a refutation of the turn but as a calibration on it.\n\n---\n\n## Cross-Cutting Synthesis: What Actually Divides These Camps\n\nRead across all seven debates, the disagreements sort into four recurring types — and naming the type is the fastest route to seeing what could (and could not) resolve each.\n\n**Type 1 — Causal-weight disputes (empirically tractable in principle, not in practice).** Debate 1 (schism as cause vs. symptom) and Debate 7 (religion as driver vs. idiom) are at bottom arguments about how much *causal force* to assign religion relative to slavery, power, and economics. These are the most \"factual\" of the debates — they are about mechanisms in the world — but they resist resolution because the decisive test (a counterfactual: no schisms, or no providentialism, same outcome?) cannot be run. Progress here looks like better *mechanism-tracing* (how exactly did church-split precedents feed secession; how exactly did pulpit millennialism change war-making decisions), not a knockout fact.\n\n**Type 2 — Valence disputes (interpretive; evidence constrains but cannot decide).** Debate 2/3 (Noll vs. Oshatz) is the purest case: both sides agree antislavery Protestants abandoned strict literalism for historicism; they assign that single agreed fact *opposite values* — collapse (Noll) vs. creative birth of liberal theology (Oshatz). No new document settles a valence dispute, because the disagreement is about how to *score* a fact both sides accept. The only partial adjudicator is downstream genealogy: trace whether the antebellum move *became* a flourishing tradition or a fragmentation.\n\n**Type 3 — Posture disputes (normative/methodological; not settleable by evidence at all).** Debate 3 (Stout) and parts of Debate 7 turn on whether the historian *should* render moral verdicts on the past and whether religion *should* be foregrounded. These are commitments about the discipline's job, not findings about the period. The contrast between Stout and Faust — same evidence, opposite mood — is the cleanest proof that what divides them is posture. The one sliver that *is* adjudicable is internal consistency: did Stout apply his just-war yardstick evenly? (Reviewers say no.)\n\n**Type 4 — Category disputes (conceptual; resolvable only by definitional clarification).** Debate 5 (Lost Cause as \"religion\"?) and Debate 6 (Whitman as \"religious\"?) hinge on whether \"religion\"/\"civil religion\" names the *essence* of the phenomenon or merely one *register* of something whose core is political (Lost Cause) or erotic-democratic (Whitman). These cannot be settled by finding more rituals or more notebook entries; they are settled, if at all, by agreeing on when the religion-label *adds explanatory value* rather than relabeling intense devotion. The likeliest scholarly outcome in both is **integration** — Lost Cause as politics-*and*-civil-religion; Whitman as a poet whose \"religion\" simply *is* his erotic-democratic politics — dissolving the either/or the debates assume.\n\nThe single fact that unifies the whole field's quarrels: the Civil War generation spoke, argued, killed, mourned, and reconciled in an overwhelmingly *religious* idiom. What no amount of evidence can fix is how much of that idiom was *engine* and how much was *language* — and that, more than any dating or attribution, is what the historiography is really fighting about.\n\n## Open Questions\n\n1. **The counterfactual at the heart of Debate 1.** Would secession have come on the same timeline without the denominational schisms? Because this is unrunnable, the cause-vs-symptom dispute (Goen/Snay vs. Holm) cannot be empirically closed. Is there a research design — e.g., close tracing of procedural/argumentative borrowing from 1844–45 church-split mechanics into 1860–61 secession conventions — that could move it beyond stalemate?\n\n2. **Whose crisis was it?** Noll's \"theological crisis\" is most clearly a crisis of *white, learned, common-sense Protestantism*. How much does the picture change when Black Christian and radical-abolitionist theology — documented by Douglass's *Appendix* and Raboteau's *Slave Religion* as a confident Exodus/deliverance hermeneutic, not a checkmate — is moved from the margins to the center? The primary and Tier-2 materials exist; what is still missing is a *sustained book-length engagement with Noll specifically* from that vantage, reframing the \"crisis\" as the predicament of one (dominant) hermeneutic community rather than of American Christianity as such.\n\n3. **Oshatz vs. Noll is a genealogical bet.** The defeat-vs-creativity dispute could be partly adjudicated by tracing whether antebellum antislavery historicism *continuously* becomes Gilded-Age liberal Protestantism (Oshatz) or whether fragmentation and lost authority dominate (Noll). That downstream continuity is itself contested and under-traced.\n\n4. **Can \"moral history\" be done consistently?** Stout's critics concede the ambition but charge selective use of just-war criteria and the bracketing of slavery. Is there a methodologically defensible \"moral history\" of the war that *includes* emancipation in its moral ledger — and would such a history reach Stout's condemnatory verdict, or a different one?\n\n5. **Lincoln's interior life is evidentially closed.** Absent a diary of belief, the skeptic-vs-theist spectrum (Donald vs. Guelzo/Carwardine/White) turns on reading a famously reticent man's public language. Is the \"straddler\" verdict the field's permanent resting point, or could newly contextualized readings of the \"Meditation\" and Second Inaugural shift the balance?\n\n6. **Is \"civil religion\" a load-bearing category or an inflation?** The Lost Cause (Wilson vs. Blight/Foster) and Whitman (Kuebrich/Hutchinson vs. Erkkila) debates both turn partly on whether \"religion\"/\"civil religion\" names an essence or merely a register. A sharper theoretical account of when the civil-religion label *adds explanatory value* (vs. relabeling intense collective devotion) would clarify both debates at once.\n\n7. **Where is the explicit anti-\"religious-turn\" argument?** The over-rotation worry is real and widely felt but under-published as a standing thesis; it lives in forums and methodological asides more than in monographs. A direct, citable statement of the political/economic case *against* over-reading the war as theological would let Debate 7 be argued on even terms rather than as correction-vs-ambient-unease.\n\n8. **Whitman's intent vs. effect.** A philological recovery of what Whitman himself meant by \"new religion\" and \"adhesiveness\" (from notebooks, phrenological sources, edition-to-edition revision) is partly tractable — but would authorial intent settle the religious-vs-secular frame, or would the camps simply relocate the dispute to whether intent or effect governs meaning?\n\n## Sources\n\n1. April Holm, \"As The Churches Go, So Goes the Nation?: Evangelical Schism and American Fears on the Eve of the Civil War,\" *The Journal of the Civil War Era* (blog), May 2019. https://www.journalofthecivilwarera.org/2019/05/as-the-churches-go-so-goes-the-nation-evangelical-schism-and-american-fears-on-the-eve-of-the-civil-war/ — engaging C.C. Goen, *Broken Churches, Broken Nation* (Mercer Univ. Press, 1985) and Mitchell Snay, *Gospel of Disunion: Religion and Separatism in the Antebellum South* (Cambridge Univ. Press, 1993; UNC Press reissue). [Tier 5, scholarly forum; quotes contemporaries Calhoun, Webster, *Charleston Mercury*.]\n2. Review of Mark A. Noll, *The Civil War as a Theological Crisis* (UNC Press, 2006), *Journal for the Study of Radicalism* / FSU review (Dollar). https://jsr.fsu.edu/Volume9/Dollar.htm ; and publisher summary, UNC Press. https://uncpress.org/9781469621814/the-civil-war-as-a-theological-crisis/ [Tier 2 monograph + Tier 5 review.]\n3. Eugene D. Genovese and Elizabeth Fox-Genovese, *The Mind of the Master Class: History and Faith in the Southern Slaveholders' Worldview* (Cambridge Univ. Press, 2005); via Paul Harvey, H-Net review. https://networks.h-net.org/node/512/reviews/774/harvey-genovese-and-fox-genovese-mind-master-class-history-and-faith [Tier 2 + Tier 5 review.]\n4. Molly Oshatz, *Slavery and Sin: The Fight Against Slavery and the Rise of Liberal Protestantism* (Oxford Univ. Press, 2012); and \"The Problem of Moral Progress: The Slavery Debates and the Development of Liberal Protestantism in the United States,\" *Modern Intellectual History*. https://www.cambridge.org/core/journals/modern-intellectual-history/article/abs/problem-of-moral-progress-the-slavery-debates-and-the-development-of-liberal-protestantism-in-the-united-states/5DD27AF432DE69ABBF4B32E19ED47D56 ; comparative review essay, \"Book Review: Noll,
