ar* (UNC Press, 2010); James McPherson's 1998 call. Reviews: *Christian Scholar's Review*, https://christianscholars.com/gods-almost-chosen-peoples-a-religious-history-of-the-american-civil-war/ ; \"The Rable Method—Time and Again,\" *Civil War Monitor*, https://www.civilwarmonitor.com/the-rable-method-time-and-again/ [Tier 2 + Tier 5.]\n17. Mark A. Noll, \"Reconstructing Religion,\" *The Journal of the Civil War Era* forum, \"The Future of Reconstruction Studies.\" https://www.journalofthecivilwarera.org/forum-the-future-of-reconstruction-studies/reconstructing-religion/ — on the field's prior neglect of religion (Dunning 1907, Du Bois 1935), the 1994 \"no significant developments\" claim, and Daniel Stowell's *Rebuilding Zion* (1998). [Tier 5 scholarly forum essay.]\n18. Robert N. Bellah, \"Civil Religion in America\" (*Daedalus*, 1967) and *The Broken Covenant: American Civil Religion in Time of Trial* (1975) — placing Whitman, with Winthrop, Lincoln, and Melville, in the American civil-religion canon. Author archive: http://www.robertbellah.com/articles_5.htm ; American Civil Religion overview (cites Bellah's primary sources). [Tier 2 foundational theory.] Sacvan Bercovitch, *The American Jeremiad* (1978), is the adjacent frame reading prophetic-national rhetoric (including Whitman's) as secularized Puritan inheritance.\n19. Drew Gilpin Faust, *This Republic of Suffering: Death and the American Civil War* (Knopf, 2008) — on the \"Good Death,\" the religious struggle to reconcile mass carnage with a benevolent God, and wartime sermons invoking just-war doctrine to sanctify killing. Publisher and reviews: https://www.penguinrandomhouse.com/books/48460/this-republic-of-suffering-by-drew-gilpin-faust/ ; *Christian Century* review, https://www.christiancentury.org/reviews/2008-07/republic-sufferingdeath-and-theamerican-civil-war ; *Journal of the Civil War Era* retrospective (2023), https://www.journalofthecivilwarera.org/2023/09/drew-gilpin-fausts-landmark-this-republic-of-suffering-death-and-the-american-civil-war-turns-15/ [Tier 2 + Tier 5.]\n20. James H. Moorhead, *American Apocalypse: Yankee Protestants and the Civil War, 1860–1869* (Yale Univ. Press, 1978) — on Northern Protestant millennialism casting the war as Armageddon; an early forerunner of the religious turn. Publisher: https://yalebooks.yale.edu/book/9780300021523/american-apocalypse/ ; Project MUSE review, https://muse.jhu.edu/article/419554/pdf [Tier 2 + Tier 5.]\n21. Edward J. Blum, *Reforging the White Republic: Race, Religion, and American Nationalism, 1865–1898* (LSU Press, 2005) — on postwar Northern Protestantism's role in white sectional reconciliation and the racialized \"white republic.\" Publisher: https://lsupress.org/9780807160411/reforging-the-white-republic/ ; H-Net review (Grant), https://networks.h-net.org/node/4113/reviews/4760/grant-blum-reforging-white-republic-race-religion-and-american [Tier 2 + Tier 5.]\n22. Frederick Douglass, \"Appendix\" to *Narrative of the Life of Frederick Douglass, an American Slave* (1845) — the distinction between \"the Christianity of this land\" and \"the Christianity of Christ.\" Primary text (Miami Univ. facsimile): https://sites.miamioh.edu/empire/files/2022/11/1845-Appendix-to-Narrative-of-the-Life-of-Frederick-Douglass.pdf [Tier 1 primary source.]\n23. Albert J. Raboteau, *Slave Religion: The \"Invisible Institution\" in the Antebellum South* (Oxford Univ. Press, 1978) — on the Exodus/deliverance counter-hermeneutic of enslaved Christianity. Publisher: https://global.oup.com/ushe/product/slave-religion-9780195174120 [Tier 2.]"}, {"order": 6, "file": "06_Adjacent_And_Comparative.md", "title": "Adjacent and Comparative Context: What the American Case Looks Like From Outside Itself", "summary": "", "body": "# Adjacent and Comparative Context: What the American Case Looks Like From Outside Itself\n\n## Bottom Line\n\nComparison is not decoration here; it is a diagnostic. Held against five neighbors and one outlier, the distinctively American thing about the Civil War's religion comes into focus as something the inside view keeps missing. Against **British abolition**, the American case reveals that the United States had no exit from the Scripture-arbitration deadlock because — unlike Britain, whose slaves were a thousand sea-miles away in colonies a metropolitan Parliament could overrule and *compensate* — American slavery was internal, constitutionally entrenched, and woven into the same evangelical Protestant culture on *both* sides of the line; where Britain could resolve a moral question through reformist legislation and a £20 million payout to slaveholders, the Americans shared a hermeneutic (the \"plain sense\" of Scripture) that the proslavery side could win, and so the question passed, in Lincoln's and later Noll's framing, from the pulpit to the sword. Against the **Concord Transcendentalists**, Whitman reveals himself as the man who carries Emerson's \"newborn bard of the Holy Ghost\" out of the lecture hall and the post-Unitarian study and into the body, the crowd, the ferry, the hospital cot — doing the one thing Emerson programmatically would *not*: sanctifying flesh, sex, and the democratic en-masse rather than the solitary self-reliant soul. Against **Emily Dickinson**, the era's other great religious poet, Whitman reveals himself as the *public* and *affirmative* pole of a single national crisis of belief whose other pole is her *private*, Calvinism-haunted skepticism — the two of them are the same theological earthquake recorded on two needles, and the contrast (her fly on the deathbed; his sacralized hospital deaths) is the cleanest \"I hadn't seen it that way\" the corpus offers. Against the **sentimental Protestant war culture** — Howe's apocalyptic *Battle Hymn*, Stowe's evangelical sentiment, Phelps's domestic heaven in *The Gates Ajar* — Whitman reveals himself as a heterodox consoler who refuses both the vengeance-providentialism of Howe and the cozy household-afterlife of Phelps, offering instead a consolation grounded in the democratic comradeship of the suffering body and a cosmos that absorbs death without a creed. Against the **English Civil War** and the \"wars of religion\" frame, the American case reveals that \"religious war\" is a *real but partial* category: as in 1640s England (Morrill's \"last of the wars of religion\"), religion in 1861 was the pole around which other discontents organized rather than the sole engine — which disciplines the corpus's central claim against overstatement. And against **Haiti**, the Anglo-American Protestant frame is decentered: emancipation could be driven by a Vodou ceremony and an enslaved people's own invoked spirits, not by white reformers' moral capital at all — a reminder that the religion that mattered most to the enslaved was frequently not the religion of the men who debated their fate in legislatures and seminaries.\n\n## The Argument\n\nThe first comparison is with **British abolition**, and it exposes why the American case became a war: Britain abolished through religious-moral reform and parliamentary compensation, and the United States could not. British antislavery and American antislavery shared an evangelical engine, a transatlantic Quaker spine, and much of the same scriptural-humanitarian vocabulary — but Britain abolished the slave trade (1807) and then colonial slavery (1833) through legislation, moral suasion, and a vast cash settlement to slaveholders, while the United States went to war. The decisive differences are structural, not merely a matter of which slaveholders were \"more belligerent.\" British slavery was colonial and distant, in the Caribbean, governable and overrulable by a metropolitan Parliament in which the enslaved had no constituency and slaveholders were a faction; American slavery was internal, constitutional, and sovereign-state-based — the slaveholders *were* the local government, held disproportionate federal power through the three-fifths clause, and could secede. So the American \"Scripture-arbitration deadlock\" had no off-ramp: where Britain's evangelicals could win a *political* victory by mobilizing a metropolitan public against a distant interest, American evangelicals on both sides shared one Bible and one \"plain-sense\" hermeneutic that the proslavery side could and did win exegetically, and the moral question could not be settled by argument and was instead settled by force.\n\nThe evidence runs both ways across the Atlantic. Christopher Leslie Brown's *Moral Capital: Foundations of British Abolitionism* (2006) argues that British abolitionism's force derived from a \"profound yearning for moral worth in the aftermath of defeat\" in the American Revolution and that \"the religious principles of the abolitionists need to be given much greater attention than they have been given by most antislavery historians\" — locating the movement's roots not in economic determinism but in a reconstruction of British imperial-moral identity and a revitalized evangelicalism [1]. William Wilberforce's abolitionism \"was derived in part from evangelical Christianity, to which he was converted in 1784–85,\" and he framed his political vocation in explicitly providential terms — \"I must mix in the assemblies of men, or quit the part which Providence seems to have assigned me\" [2]. The Clapham Sect was \"a network of friends and families… powerfully bound together by their shared moral and spiritual values, by their religious mission and social activism,\" and in 1787 Wilberforce helped found *both* the Society for Effecting the Abolition of the Slave Trade *and* a Society for the \"reformation of manners\" — abolition sat inside a broader evangelical project of national moral reform, alongside a Quaker witness that long predated it [2]. On the mechanism of British abolition, the Slavery Abolition Act of 1833 freed the enslaved gradually (children under six immediately; others reclassified as \"apprentices\") and *compensated slaveholders* — roughly £20 million (about $26.2 million at the time) paid to some 46,000 slaveowners, a sum so large the British government borrowed for it and only finished servicing the debt in 2015 [3]. The American contrast is documented in the *failure* of the analogous path: in the 1850s the abolitionist Elihu Burritt organized a National Compensated Emancipation Convention in Cleveland to advocate buying out slaveholders, \"but nothing came of\" it, because \"Southern states viewed slavery as essential to their economy and seceded rather than accept abolition\" — whereas in Britain \"slaveholders could be overruled\" [3]. The structural distinction (colonial-distant vs. internal-sovereign) is a standard frame in the comparative literature associated with David Brion Davis's emancipation trilogy, which analyzed \"emancipation in societies as dissimilar as Haiti, the British West Indies, and the United States\" and emphasized the distinct political economies of each [4]. The hermeneutic asymmetry on the American side — that proslavery exegetes held the better *plain-sense* biblical argument and abolitionists had to retreat to the Bible's \"overall message of love and equality\" — is established in the corpus's Doc 01/05 (Noll's *Civil War as a Theological Crisis*; the Genovese convergence) and is why the *argument* could not be won where Britain's *political* contest could be. The structural facts are firm; assigning the dominant causal weight to structure-plus-hermeneutics over temperament is the interpretive move. The inside-American story treats the war as the tragic but perhaps inevitable cost of ending a great evil; the British comparison reframes it, because abolition *as such* did not require a war — Britain ended a slave system of comparable cruelty without one. What the United States lacked was not moral seriousness (it had a *surplus* of religious moral seriousness, on both sides) but any institutional arbiter standing *above* the shared evangelical culture. Britain's Parliament was such an arbiter for the colonies; America's churches, having themselves schismed sectionally in 1837–45, were not. The war was less the price of conviction than the price of two equally scriptural convictions with no court of appeal.\n\nThe second comparison is with the **Concord Transcendentalists**, and it shows Whitman carrying Transcendentalism out of the study and into the body and the crowd — doing the one thing Emerson would not. Whitman is genuinely Emerson's heir: *Leaves of Grass* (1855) realizes Emerson's 1838 demand for a \"newborn bard of the Holy Ghost,\" a first-hand religion that refuses inherited forms, locates divinity *within* the self, and treats the soul's intuition as superior to doctrine. But the differences are as decisive as the debt. Where Emerson's post-Unitarian spirituality is solitary, abstract, and chaste — the \"self-reliant\" individual communing with the Over-Soul, the moral sentiment as an inward law — Whitman's is collective, embodied, erotic, and en-masse: he sanctifies the laboring and sexual body, the city crowd, the ferry, the soldier's corpse. Thoreau radicalizes Transcendentalism *politically* (canonizing John Brown as a Christ) but still within a frame of heroic individual conscience; Whitman radicalizes it *democratically and bodily*. The thing Emerson programmatically would *not* do — and explicitly asked Whitman to stop doing — was to make the flesh holy. Emerson's *Divinity School Address* (July 15, 1838) supplies the program Whitman fulfills: it decried the \"defects\" of historical Christianity — the mythologizing of Jesus (\"Christianity became a Mythus, as the poetic teaching of Greece and Egypt, before\") and the \"fetishistic worship\" of Scripture — and called the graduates \"to go alone; to refuse the good models, even those which are sacred,\" insisting that divinity is intrinsic, that Jesus himself merely recognized this and said \"I am divine. Through me, God acts; through me, speaks\" [5][6]. The address \"touched off a major controversy among American Unitarian theologians,\" with Andrews Norton labeling it \"the latest form of infidelity\" — establishing Emerson's religion as a *post-Protestant* one [6]. Whitman's debt is famously direct (Emerson's 1855 letter, \"I greet you at the beginning of a great career\"), but Reynolds's *Walt Whitman's America: A Cultural Biography* (1995) documents the divergence: where Emerson and the \"Boston writers\" centered a refined, Concord-based Transcendentalism, Whitman \"would seek to shift that center to New York,\" drawing inspiration \"from every stratum of nineteenth-century American life… the raffish dandyism of the Bowery 'b'hoys,'\" the popular oratory of \"actors, orators, and divines\" — a religion of the street and the mass, not the study [7]. The clinching anecdote is also in Reynolds: \"when Emerson advised the younger man to cut out the more overtly sexual poems, Whitman was adamant about keeping them\" — Emerson's own limit drawn precisely at the body [7]. Thoreau marks the *political* radicalization of the same tradition: in \"A Plea for Captain John Brown\" (delivered Concord, Oct. 30, 1859) he made Brown a Christ-figure — \"Some eighteen hundred years ago Christ was crucified; this morning, perchance, Captain Brown was hung. These are the two ends of a chain which is not without its links\" — and called Brown \"a transcendentalist above all, a man of ideas and principles\" [8]; but Brown is a heroic *individual* conscience, whereas Whitman's holiness is in the *aggregate* and the *physical*. It is conventional to file Whitman under \"Transcendentalism\"; the comparison reframes him as Transcendentalism's *self-overcoming*. Emerson freed the soul from the church and then left it alone in the woods; Thoreau armed the soul's conscience and left it on the scaffold; Whitman took the freed, sacralized soul and put it back into a sweating body in a crowd of bodies — and in the war hospitals, into dying bodies — completing the move from a religion of the *individual spirit* to a religion of the *democratic flesh*. The war is what forced the completion: Concord's chaste Over-Soul had nothing to say to a tent full of amputees, and Whitman's embodied creed did.\n\nThe third comparison sets Whitman beside **Emily Dickinson**, the era's other great religious poet, and the two turn out to be the same religious earthquake recorded on two instruments — private skeptical doubt and public cosmic affirmation. They are the two major American poets of the Civil War era and the two great poetic registers of mid-century American religious crisis, and they are almost perfect inversions. Both are post-orthodox: both refused conversion, both wrote *through* the war, both wrote obsessively about death, both abandoned the doctrinal machinery of New England Calvinism. But Dickinson's religious imagination is private, interior, formally compressed, Calvinism-haunted, and skeptical — she stages the Protestant deathbed and then withholds its promised consolation; Whitman's is public, expansive, catalogued, prophetic, and affirmative — he stages mass death and then dissolves it into a benevolent cosmos. She doubts in private hymn-meter; he affirms in public free verse. Reading them together reveals that \"the crisis of belief\" in Civil War America was not a single position but a *bandwidth*, and that Whitman's confident cosmic faith is most legible as the answer to a question — Dickinson's question — that he refused to let stand unanswered. Dickinson was \"brought up in a Calvinist household,\" attended Amherst's First Congregational Church, and lived her youth amid the revivals that \"swept\" her Congregationalist community; yet \"when pressed, at age seventeen, she refused to become a professing Christian and dismissed the doctrines of original sin, hell and damnation, and election\" [9]. Scholars frame her not as a flat unbeliever but as caught in \"the tension between [her] deep anchoring in New England Calvinism and her recognition of the inadequacy of the Calvinist heritage to contemporary spiritual experience,\" a tension that \"inspires some of her most intense, ferocious, and distressed verse\" [9]. Her most-anthologized death lyric, \"I heard a Fly buzz — when I died —,\" \"sets up the full apparatus of a nineteenth-century Protestant death-scene — the silent watchers, the willed keepsakes, the expectation of Christ's visible arrival — and then substitutes a fly,\" a substitution critics read as \"a formal act of theological refusal\": the deathbed ritual she knew from childhood, populated \"with a fly rather than a king\" [10]. This maps precisely onto the era's \"good death\" expectation that the corpus treats elsewhere (Faust, *This Republic of Suffering*) — the dying were supposed to demonstrate readiness for heaven before witnesses; Dickinson's fly is the good death's refusal. Whitman is the inverse on every axis: like Dickinson he is post-orthodox and death-obsessed, but where she contracts, he expands, his wartime *Drum-Taps* and the \"Lilacs\" elegy (treated at length in Docs 03–04) absorbing mass death into a cosmic affirmation — death as \"lovely and soothing,\" a \"dark mother always gliding near.\" She writes the deathbed from *inside* it and finds an unanswered silence; he writes the deathbed (the hospital cot, the soldier's last hours) from *beside* it and finds a sacralized comradeship and a benevolent cosmos. (The specific paired-reading of these two poems as inverse \"deathbed\" poems is an analytic synthesis here; the underlying facts — her refusal of conversion, the fly poem's anti-consolatory structure, Whitman's affirmative war elegies — are each independently sourced [9][10] and in Docs 03–04, so the inversion is a real and widely-noted contrast even where the *symmetry* is partly an interpretive construction.) The corpus's spine is Whitman's *affirmative* post-Protestant civil religion, and Dickinson is the control case that shows what that affirmation cost and what it was answering. Place \"I heard a Fly buzz\" beside the \"Lilacs\" elegy and you see that the same New England Calvinist death-culture, the same collapse of the literal \"good death,\" produced two opposite poetic theologies: Dickinson's *honest doubt* (the promised King does not come; only a fly) and Whitman's *willed faith* (death is a dark mother to be sung to). Whitman's cosmic optimism stops looking like naïveté and starts looking like a *decision* — the road taken at the same fork where Dickinson took the other. He is not a man who never doubted; he is a man who, standing in the same hospitals where men died without their Kings, chose to sing anyway.\n\nThe fourth comparison is with the **sentimental Protestant war culture**, against which Whitman's heterodox consolation is defined by its refusal of both poles — Howe's apocalyptic vengeance and Phelps's domestic heaven. The mainstream religious imagination of the Union war effort ran between two consoling poles: a militant-providential pole — Julia Ward Howe's *Battle Hymn of the Republic*, which reads the Union army as the literal instrument of an apocalyptic, vintage-trampling God of judgment, in the lineage of Stowe's evangelical sentiment — and a domestic-sentimental pole — the vast \"consolation literature\" and mourning culture epitomized by Elizabeth Stuart Phelps's *The Gates Ajar* (1868), which answered mass bereavement with a cozy, corporeal, household heaven where the dead keep their bodies, live in houses, and wait to be rejoined. Whitman's consolation is heterodox precisely because it refuses *both*: he will not make God a general (his cosmos does not take sides or trample vintages), and he will not domesticate the afterlife into a parlor reunion; his consolation is grounded instead in the sanctity of the suffering democratic body and a cosmos that absorbs death without doctrine or reward. Howe wrote the *Battle Hymn*'s verses at Washington's Willard Hotel on the night of November 18, 1861, adapting them to the tune of the soldiers' song \"John Brown's Body,\" and sold them to *The Atlantic Monthly* (published Feb. 1862) [11]; its imagery is explicitly apocalyptic and judicial — God \"trampling out the vintage where the grapes of wrath are stored,\" wielding \"His terrible swift sword\" — fusing the Union cause to divine judgment in the Revelation/Isaiah register (the militant-providential civil religion the corpus documents in Doc 02). Phelps's *The Gates Ajar* (1868) \"epitomized American 'consolation literature' of the mid-19th century,\" was \"the second best-selling religious novel of the 19th century\" (nearly 100,000 U.S. readers by 1900), and was written explicitly to \"console bereaved Civil War women through her message that their lost loved ones remained spiritually close and readers might expect to rejoin them in a domestic afterlife\" — a heaven that is \"corporeal\" where the dead have \"spiritual bodies,\" \"live in houses, raise families, and participate in various activities\" [12]; Phelps began it \"in the final year of the American Civil War,\" motivated in part by the death of her fiancé at Antietam [12]. Against both, Whitman's consolation (documented in Docs 03–04) neither enlists God for the slaughter nor furnishes a domestic heaven: in \"When Lilacs Last in the Dooryard Bloom'd\" death is sung as a \"dark mother\" and a release into a cosmos, and his hospital writing (*Memoranda During the War*, *Specimen Days*) locates the sacred in the tended, dying body and in comradeship — not in vengeance and not in a household reunion. The contrast is sharpest with Phelps: both respond to *mass bereavement*, but Phelps re-furnishes the lost home in the sky while Whitman dissolves the boundary between the living and dead into the democratic en-masse. Whitman is usually read against *orthodoxy* — the calvinist God he left behind — but the more revealing contrast is against the *consoling heterodoxies that actually sold*: Howe's apocalyptic anthem and Phelps's domestic heaven were the popular, mass-market answers to the same death-crisis Whitman faced. Set against them, his originality is not that he abandoned the old God but that he refused the *new* comforts — the vengeful God-of-battles and the bourgeois heaven-as-better-suburb — that the war's bereaved overwhelmingly chose. His consolation is the one that asks for no enemy and promises no parlor: only the dignity of the suffering body and a cosmos large enough to take the dead back without a receipt.\n\nThe fifth comparison is with the **English Civil War**, and it tells us that \"religious war\" is a real but partial category for 1861–65 — the comparison disciplines the corpus's thesis against overstatement. Used carefully, the comparison to Europe's confessional conflicts — above all the English Civil War of the 1640s — tests whether \"religious war\" is the right label for the American Civil War, and the verdict is calibrating: religion in 1861 functioned much as John Morrill argued it did in 1640s England — as *the pole around which other discontents organized* rather than as a sole or sufficient cause. Both conflicts featured saturating providentialism (each side reading battle as divine verdict), a clergy that sacralized the cause, and a shared scriptural culture turned into a weapon. But neither was a \"war of religion\" in the narrow confessional sense of Catholic-vs-Protestant: the American sections shared a Protestantism and split over slavery; the English sides shared a Protestantism and split over church government, royal authority, and liberty. The comparison thus licenses the claim that religion was *structurally central* and *causally load-bearing*, while warning against the stronger claim that the war was *about* religion in the way the Thirty Years' War was. John Morrill's influential essay \"The Religious Context of the English Civil War\" concluded that \"the English Civil War was not the first European revolution: it was the last of the Wars of Religion\" — a deliberate provocation that \"set much of the terms of debate\" over how seventeenth-century English people chose sides [13]; crucially, Morrill \"later expressed some regret about the essay,\" clarifying that he never meant the war was *only* about religion, but rather that, as in other early-modern religious wars, \"religious poles are the ones around which most other discontents formed\" [13]. That formulation is almost exactly transferable to the American case as the corpus frames it (Doc 05's cause-vs-legitimator debate): religion as the organizing pole, not the lone engine, and the shared-Protestantism point distinguishes both Anglo conflicts from continental confessional wars. Scholarship on Puritan \"military providentialism\" in the Atlantic world (e.g., Matthew Rowley's work on \"godly violence\" in the Puritan Atlantic, 1636–1676) documents the same reading-of-battle-as-divine-agency that the corpus finds in both Union and Confederate civil religion [14], and the American case's nearest structural analog to Morrill's thesis is the corpus's own Noll/Stout material: a war fought within a single Protestant culture, sacralized by clergy on both sides, in which the irreducibly religious element (the scriptural deadlock over slavery; rival providentialisms) was load-bearing but braided with the political and economic. The comparison is apt and the historiography solid; the application is a framing judgment, not a fact. A religion-led corpus is tempted to maximize — to call 1861–65 a religious war full stop — but the English comparison reframes the claim more durably. Morrill earned the phrase \"war of religion\" for 1640s England *and then walked back its absolutism*, and his mature position (religion as the pole around which other discontents crystallize) is a *stronger* and more defensible claim than the maximal one. Applied to America, it lets the corpus say something precise: the Civil War was not caused by religion *instead of* slavery, politics, and economics; it was a war in which an irreducibly religious culture — the shared Bible, the rival providences, the sacralizing clergy, the schismed churches — was the *medium* through which the slavery conflict became unresolvable by any means short of war. That is the right altitude for \"religious drivers\": drivers, organizing poles, the indispensable medium — not the whole engine.\n\nThe sixth comparison is the outlier, **Haiti**, which decenters the Anglo-American Protestant frame entirely: emancipation could be driven by the enslaved's own religion, not by white reformers' moral capital. The Anglo-American story of abolition is a story of *white reformers' religion* — Wilberforce's evangelical conscience, Garrison's perfectionism, the seminary debates over Scripture, even Whitman's and Howe's Union civil religions. The Haitian Revolution decenters that frame: the most successful emancipation in the Atlantic world — the only one achieved by the enslaved themselves, producing the first free Black republic — was inaugurated not by a metropolitan moral-reform movement but by an act of the *enslaved's own religion*, the Vodou ceremony at Bois Caïman (August 1791). The comparison reveals, by contrast, how thoroughly the American debate the corpus documents was a debate *among the enslavers and their critics* — conducted in the idiom of white Protestantism — and how marginal, in that debate, was the actual religious agency of the enslaved, whose own faith (the \"slave religion\" of the spirituals, the invisible church, and African retentions) is the corpus's most important blind spot when it stays inside the Scripture-arbitration story. On the night of August 14, 1791, a Vodou ceremony at Bois Caïman near Cap-Français — led by the houngan (priest) Dutty Boukman and the mambo (priestess) Cécile Fatiman — gathered enslaved Africans who \"vowed to overthrow their oppressors and fight for their freedom,\" invoking ancestral spirits (lwa) and a supreme or \"unknown god\" as witness; the ceremony is traditionally dated as the spark of the uprising that became the Haitian Revolution [15]. Its participants \"gathered to plan their emancipation… and united because they believed in a common cause: the abolition of slavery in the island,\" producing ultimately \"the first free Black republic and the abolition of slavery\" [15]. (Historians note the Bois Caïman tradition rests on limited contemporary documentation and has acquired layers of myth; it is cited here as a *religiously-framed founding event* whose broad outlines — a Vodou ceremony preceding the August 1791 revolt — are widely accepted, with the caveat that exact details are debated [15].) David Brion Davis's comparative emancipation work deliberately set Haiti alongside the British West Indies and the United States precisely to show how *dissimilar* the routes to emancipation were across the Atlantic world [4]. The contrast with the American corpus is the point: the religion that drove Haiti's emancipation was the *enslaved's own*, while the religion the corpus mostly documents in the American case is the enslavers' Protestantism and its white critics'. The whole Scripture-arbitration drama — proslavery vs. antislavery exegetes fighting over Philemon and the curse of Ham — is a contest *internal to the master class and its allies*, and Haiti reframes it by showing the alternative the American story almost entirely lacks: emancipation generated *from below*, by the religion of the enslaved themselves. Read back into the American case, this is a standing reminder (and a flagged gap for Docs to come) that alongside the white theological crisis there ran a Black religious world — the spirituals' coded Exodus, the \"invisible institution,\" the camp-meeting conversions — that was doing its own emancipatory work, and that Whitman, for all his democratic en-masse, barely saw. The Anglo-Protestant frame is not wrong; it is *partial*, and Haiti is the cleanest evidence of what it leaves out.\n\n## Open Questions\n\n1. **How much causal weight does \"structure\" versus \"hermeneutics\" actually bear in the Britain/US divergence?** Claim 6.1 attributes the American war to colonial-distance-plus-shared-hermeneutic, but disentangling these from the sheer scale and capital-value of American slavery (far larger and more economically central than the British West Indian system relative to its metropole) would require the quantitative comparative-economics literature (Davis; Eric Williams's discredited-but-influential thesis; the cliometric responses). The corpus has not adjudicated whether the *economic* magnitude of American slavery is the real prime mover with religion as medium.\n\n2. **Is the Dickinson–Whitman \"perfect inversion\" a discovered structure or an imposed one?** Claim 6.3's elegance is partly the analyst's. A fuller treatment would test the inversion against poems that *break* it — Whitman's own moments of doubt (the \"dark patches\" of \"Crossing Brooklyn Ferry,\" the despair in some 1860 cluster poems) and Dickinson's moments of affirmation (\"This World is not Conclusion\" — itself riven). The symmetry may be too clean.\n\n3. **Did Whitman read Phelps or Howe, and did he define himself *against* them consciously?** Claim 6.4 argues structural refusal, not documented polemic. Whether Whitman's heterodox consolation was a deliberate response to the consolation-literature market or simply a parallel, independent development is an open biographical question (Reynolds, Morris, and the *Memoranda* would be the places to look).\n\n4. **How far can the Morrill \"war of religion\" frame really be transported?** The English and American cases share intra-Protestant structure, but 1640s England had an established state church and a monarch claiming divine right — institutional facts with no clean American analog. The transfer in Claim 6.5 may smuggle in more equivalence than the cases support; a church historian of both periods should stress-test it.\n\n5. **What would a corpus organized around the *enslaved's* religion rather than the *enslavers'* look like?** Claim 6.6 names the blind spot but does not fill it. Albert Raboteau's *Slave Religion*, the spirituals scholarship, and the historiography of the \"invisible institution\" and Black churches (some of it surely in the corpus's planned gap-fill docs) would be needed to move Black religious agency from \"flagged gap\" to load-bearing thread — and to test whether the American case looks different when the religion that mattered to four million enslaved people is centered rather than appended.\n\n6. **Brazil, the unused comparison.** Brazil abolished slavery last in the hemisphere (1888) and largely peacefully, with Catholic and positivist rather than evangelical-Protestant moral framing. It was scoped as an optional decentering case and not researched here; it would test whether the *Protestant* character of Anglo-American antislavery is doing analytic work that a Catholic comparison would expose.\n\n## Sources\n\n1. Brown, Christopher Leslie. *Moral Capital: Foundations of British Abolitionism.* Chapel Hill: University of North Carolina Press / Omohundro Institute, 2006. Publisher and review summaries: https://uncpress.org/9780807856987/moral-capital/ and https://muse.jhu.edu/article/263045 (accessed 2026-05-30). [Tier 2 — university-press monograph; argument summarized from publisher and scholarly-review descriptions.]\n2. \"William Wilberforce,\" Encyclopædia Britannica, https://www.britannica.com/biography/William-Wilberforce; \"Clapham Sect,\" Britannica, https://www.britannica.com/topic/Clapham-Sect; and the Clapham Sect overview at https://churchandfamilylife.com/resources/201218/the-clapham-sect (accessed 2026-05-30). [Tier 2/5 — Britannica (expert-authored reference) for Wilberforce's conversion, providential self-description, and the 1787 founding of the abolition and reformation-of-manners societies; the network description from a denominational secondary source, used for non-contested biographical framing.]\n3. Tax Justice Network, \"Britain's Slave Owner Compensation Loan, reparations and tax havenry,\" 2020-06-09, https://taxjustice.net/2020/06/09/slavery-compensation-uk-questions/; Princeton Department of African American Studies, \"When Slaveowners Got Reparations,\" https://aas.princeton.edu/news/when-slaveowners-got-reparations (accessed 2026-05-30). [Tier 4/5 — for the £20m / ~$26.2m compensation, ~46,000 slaveowners, the 1833 gradual-abolition/apprenticeship mechanism, and the failed U.S. compensated-emancipation efforts (Burritt's Cleveland convention). Note advocacy lean of Tax Justice Network on reparations framing; the underlying compensation facts are well established and corroborated across sources.]\n4. David Brion Davis — emancipation trilogy, esp. *The Problem of Slavery in the Age of Emancipation* (New York: Knopf, 2014) and *The Problem of Slavery in the Age of Revolution* (1975); see \"David Brion Davis,\" and the AHA memorial, https://www.historians.org/perspectives-article/david-brion-davis-1927-2019-historian-of-slavery-september-2019/ (accessed 2026-05-30). [Tier 2 — for the comparative framing of Haiti, the British West Indies, and the U.S. as dissimilar emancipation paths. Cited at the level of the trilogy's established comparative argument.]\n5. Emerson, Ralph Waldo. \"Divinity School Address\" (delivered July 15, 1838). Full text via Emerson Central, https://emersoncentral.com/texts/nature-addresses-lectures/addresses/divinity-school-address/ (accessed 2026-05-30). Verbatim quotations: \"Christianity became a Mythus…\"; \"to go alone; to refuse the good models, even those which are sacred\"; \"I am divine. Through me, God acts; through me, speaks.\" [Tier 1 — primary text.]\n6. \"Divinity School Address,\" background and reception (Andrews Norton's \"latest form of infidelity\"; the Unitarian controversy), Harvard Square Library, https://www.harvardsquarelibrary.org/biographies/emersons-divinity-school-address/ (accessed 2026-05-30). [Tier 5 — institutional/reference, for reception facts; the address itself is sourced at [5].]\n7. Reynolds, David S. *Walt Whitman's America: A Cultural Biography.* New York: Knopf, 1995. Publisher/author summaries: https://www.penguinrandomhouse.com/books/140730/walt-whitmans-america-by-david-s-reynolds/ and https://davidsreynolds.com/?page_id=170 (accessed 2026-05-30). [Tier 2 — for Whitman's drawing on popular/street culture, the New-York vs. Concord shift, and the Emerson-asked-him-to-cut-the-sexual-poems episode. Specific claims drawn from publisher/author descriptions of the book's argument.]\n8. Thoreau, Henry David. \"A Plea for Captain John Brown\" (delivered Concord, Oct. 30, 1859). Full text via Project Gutenberg, https://www.gutenberg.org/ebooks/2567; context and the \"two ends of a chain\" / \"transcendentalist above all\" quotations via Britannica, https://www.britannica.com/topic/A-Plea-for-Captain-John-Brown, and Wikipedia's citations therein (accessed 2026-05-30). [Tier 1 — primary text for the quotations; Tier 5 for the delivery-date/context framing.]\n9. Emily Dickinson and religion: Emily Dickinson Museum, \"Emily Dickinson and the Church,\" https://www.emilydickinsonmuseum.org/emily-dickinson/biography/special-topics/emily-dickinson-and-the-church/; and scholarly framing of the Calvinist tension (e.g., \"Wrestling with silence: Emily Dickinson's Calvinist God,\" Gale Literature Resource Center, https://go.gale.com/ps/i.do?id=GALE%7CA145681460) (accessed 2026-05-30). [Tier 2/5 — museum biographical resource for the refusal-of-conversion-at-seventeen and the revival context; scholarly article for the Calvinist-tension reading.]\n10. Dickinson, Emily. \"I heard a Fly buzz — when I died —\" (Fr591/J465). Text via Poetry Foundation, https://www.poetryfoundation.org/poems/45703/i-heard-a-fly-buzz-when-i-died-591; the \"Protestant death-scene… substitutes a fly\" / \"theological refusal\" reading is a synthesis of standard critical analyses surveyed at LitCharts and Wikipedia's cited criticism, https://en.wikipedia.org/wiki/I_heard_a_Fly_buzz%E2%80%94when_I_died (accessed 2026-05-30). [Tier 1 — primary poem; Tier 5 — for the critical reading, which is widely held but here phrased as analytic synthesis, not single-sourced fact.]\n11. Howe, Julia Ward. \"The Battle Hymn of the Republic\" (*The Atlantic Monthly*, Feb. 1862; verses written Nov. 18, 1861). Composition facts via Library of Congress, https://www.loc.gov/collections/patriotic-melodies/articles-and-essays/battle-hymn-of-the-republic/; full text at https://americanliterature.com/author/julia-ward-howe/poem/the-battle-hymn-of-the-republic (accessed 2026-05-30). [Tier 1 — primary text; Tier 2 (LoC) for composition/publication facts and the adaptation from \"John Brown's Body.\"]\n12. Phelps, Elizabeth Stuart. *The Gates Ajar* (Boston: Fields, Osgood & Co., 1868). Reception and content: Encyclopedia.com, https://www.encyclopedia.com/arts/culture-magazines/gates-ajar, and the Penguin Classics edition description, https://www.penguinrandomhouse.com/books/599325/the-gates-ajar-by-elizabeth-stuart-phelps/ (accessed 2026-05-30). [Tier 5 — reference/publisher sources for bestseller status (~100,000 U.S. readers by 1900; second-best-selling religious novel of the century), the corporeal/domestic-heaven content, and Phelps's Antietam-fiancé motivation.]\n13. Morrill, John. \"The Religious Context of the English Civil War,\" *Transactions of the Royal Historical Society* (1984), and \"The English Revolution as a civil war,\" *Historical Research* (2017); the \"last of the Wars of Religion\" formulation and Morrill's later qualification (\"religious poles are the ones around which most other discontents formed\"). Via Cambridge Core, https://www.cambridge.org/core/journals/transactions-of-the-royal-historical-society/article/abs/religious-context-of-the-english-civil-war/D1A8B9E7C663783738461E447DF2CF31, and Wiley, https://onlinelibrary.wiley.com/doi/abs/10.1111/1468-2281.12200 (accessed 2026-05-30). [Tier 2 — peer-reviewed scholarship.]\n14. Rowley, Matthew. *Godly Violence in the Puritan Atlantic World, 1636–1676: A Study of Military Providentialism*; review in *The New England Quarterly* 98:2 (2025), MIT Press, https://direct.mit.edu/tneq/article/98/2/321/131230 (accessed 2026-05-30). [Tier 2 — for Puritan military providentialism / reading battle as divine agency, used as the seventeenth-century analog to American civil-religion providentialism.]\n15. Bois Caïman ceremony (Aug. 14, 1791) and its role in the Haitian Revolution: Bois Caïman bibliographic survey, Haiti Then and Now, https://haitithenandnow.wordpress.com/2021/08/14/a-bibliography-on-the-bois-caiman-ceremony-of-august-1791/; and \"Haitian Revolution\" / \"Bois Caïman\" reference entries with their cited sources (Boukman, Cécile Fatiman, the invoked spirits/\"unknown god\"), https://en.wikipedia.org/wiki/Haitian_Revolution (accessed 2026-05-30). [Tier 5 with caveat — the Bois Caïman tradition rests on limited contemporary documentation and is partly mythologized; cited for the broadly-accepted outline (a Vodou ceremony preceding the August 1791 revolt) and explicitly flagged as contested on details. For the comparative emancipation framing, see Davis at [4].]\n\n---\n\n*Sourcing note on tiers and leans:* Primary texts (Emerson's *Divinity School Address* [5], Thoreau's *Plea* [8], Howe's *Battle Hymn* [11], Dickinson's poem [10]) are Tier 1 and quoted verbatim where load-bearing. The comparative-scholarship spine (Brown [1], Davis [4], Morrill [13], Reynolds [7], Rowley [14]) is Tier 2; where I have relied on publisher/review/reference summaries rather than the monographs' own pages, claims are pitched at the level those summaries support and flagged. Tier 4–5 sources (Tax Justice Network [3], Britannica/Harvard Square Library [2][6], Encyclopedia.com [12]) carry the non-contested factual scaffolding (dates, sums, bestseller figures); the Tax Justice Network's reparations advocacy lean is noted and does not bear on the compensation *facts*, which are independently established. The Bois Caïman material [15] is the weakest evidentiary link and is explicitly caveated. No Wikipedia article is cited as a substantive source; where listed it is as a navigation layer to its own citations, per the source hierarchy."}, {"order": 7, "file": "Future_Trajectory.md", "title": "Future Trajectory: Where the Interpretation Is Heading", "summary": "", "body": "# Future Trajectory: Where the Interpretation Is Heading\n\n## Bottom Line\n\nThis is a historical topic, so \"the future\" is reframed as the **trajectory of interpretation**: where the scholarship on Civil War religion and on Whitman's religion is most likely to move over the next ten to fifteen years. The dominant signal is that the post-2000 \"religious turn\" in Civil War history has now matured from an insurgency into an establishment, and the next phase will be less about *whether* religion mattered and more about *whose* religion, read through *which* bodies and *which* archives. Four drivers point the same direction: (1) the decisive shift from the *enslavers'* theology to the *enslaved's* religion as the analytic center of gravity; (2) the transnational/Atlantic reframing that decenters the U.S. Protestant story; (3) the digital-archive and quantitative turn (the Walt Whitman Archive, mass-digitized sermons, soldier letters, and denominational records) enabling claims at a scale impossible for an earlier generation; and (4) the steady erosion of the line between \"religious\" and \"secular\" readings of Whitman, with the affective, embodied, and queer dimensions increasingly treated as *part of* his religion rather than as alternatives to it. The most probable future is not the overturning of Noll, Stout, Faust, or Wilson but their **provincialization** — their frameworks preserved as the account of *white Protestant* meaning-making, now set inside a larger, more plural, more global story. The least certain variable is institutional: whether the academic and public appetite for this scholarship survives the funding and culture-war pressures on humanities history.\n\n## Method\n\nThis forecast was built by reading the six Round 1 documents (especially `05_Live_Debates_And_Historiography.md` for the live faultlines and `06_Adjacent_And_Comparative.md` for the comparative frames), identifying the active drivers of *interpretive* change, and anchoring scenarios on base rates from how comparable historiographical waves have crested and receded (the \"new social history,\" the \"memory turn\" after David Blight, the \"history of capitalism,\" the \"religious turn\" itself). Because the object being forecast is scholarship rather than events, there are no liquid prediction markets; the \"signals to watch\" are publications, prize patterns, dissertation clusters, journal special issues, and conference programming rather than prices. Probabilities are expressed as ranges and describe *which interpretive emphasis becomes dominant*, not binary truths.\n\n## The Argument\n\nThe \"religious turn\" has, first, won the methodological argument and will now fragment into sub-specialisms. The question that animated the field c. 1990–2015 — *was the Civil War era genuinely religious, against a secular-political historiography that had underweighted faith?* — is effectively settled in the affirmative, and the next phase will not relitigate it but split into specialized programs: Black religion, the material/affect history of death, transnational religion, environmental/providential thought. The institutional infrastructure now exists (the *Journal of the Civil War Era*, founded 2011; recurring religion programming at the Society of Civil War Historians), and the foundational monographs (Noll 2006, Stout 2006, Rable 2010, Faust 2008) are now standard citations rather than contested interventions [see `05`, Claim 5.8]; historiographical waves typically move from polemical establishment to specialized fragmentation over roughly a generation. This is offered as an inference at medium confidence.\n\nWithin that fragmentation, the center of gravity shifts from the enslavers' theology to the enslaved's religion. The most consequential move of the next decade is the displacement of the white-Protestant \"theological crisis\" frame from the center of the field by scholarship that makes African American Christianity — slave religion, the spirituals, Black providentialism, the postwar independent Black church — the primary, not the comparative, subject. Every Round 1 document flags this as the corpus's own blind spot and the field's live frontier: `06` names it explicitly (\"a version organized around the *enslaved's* religion rather than the enslavers'\"), building on Raboteau's *Slave Religion* and the recovery of Black providentialism in `01` (Claim 1.6) and `02` (Claims 2.5, 2.8), and the broader field momentum — the \"long emancipation\" scholarship, the centrality of the Black church to studies of Reconstruction and its overthrow — points the same way. This is the strongest of the inferences here, held at medium-high confidence.\n\nOn the Whitman side, scholarship will continue dissolving the secular/religious binary rather than resolving it. The dispute over whether Whitman is a \"religious prophet\" (Kuebrich, Hutchinson) or a \"secular, erotic, political\" poet (Erkkila) will not be won by either side; it will be *dissolved* by readings that treat the embodied, affective, ecological, and queer dimensions as constitutive of his religion rather than as secular alternatives to it. `04` (Claims 4.5, 4.10) and `05` (Claim 5.7) show the binary already straining, and the trajectory of the last two decades of Whitman criticism — the normalization of queer readings, the rise of ecocriticism and affect theory — consistently re-describes what older critics split into \"spiritual\" vs. \"erotic\" as a single phenomenon, while the Walt Whitman Archive makes textual-genetic argument (how the religion changes edition to edition) newly tractable. This too is an inference at medium confidence.\n\nFinally, digital archives and computational methods will enable scale claims that re-open \"settled\" questions. Mass digitization (sermons, denominational minutes, soldier correspondence, the Whitman Archive's full variorum) plus text-analysis methods will let scholars test, at corpus scale, claims previously argued from emblematic examples — how symmetric Northern and Southern providentialism *actually* were, say, or how pervasive \"Good Death\" language was — sometimes confirming and sometimes complicating the canonical accounts. The methodological precedent exists in the digital humanities and in quantitative Civil War history (e.g., the statistical revision of the death toll noted in `02`, Open Question 3: Faust's 620,000 vs. Hacker's ~750,000), and the Whitman Archive is already the evidentiary backbone of `03`, `04`, and `07`-equivalent readings. This is an inference at medium confidence.\n\n## Scenarios\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 418\" role=\"img\" aria-label=\"A fan of four diverging futures for the scholarship, opening from a single point at 2026 toward 2040. The wedges are sized by probability. The widest, green, is Provincialization at 45 to 55 percent: the white-Protestant frame reset inside a larger, Blacker, more global story. Next, blue, Transnational reframing at 20 to 30 percent: the American case read inside Atlantic emancipation. Then oxblood, Public-memory capture at 15 to 25 percent: the Lost Cause and religious nationalism pulled toward the present. Thinnest, ink, Stagnation at 5 to 15 percent: humanities contraction starves the field. A note records that the ranges overlap and need not sum to 100.\">\n<text x=\"350\" y=\"30\" text-anchor=\"middle\" font-size=\"15\" class=\"t-serif\" letter-spacing=\"3\" font-family=\"var(--display)\">WHERE THE READING IS HEADING<\/text>\n<text x=\"350\" y=\"48\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">a forecast of the scholarship, not the war &#8212; c. 2026&#8211;2040<\/text>\n<path d=\"M100,222 L520,68 L520,153 Z\" class=\"f-t4\" opacity=\".26\"/>\n<path d=\"M100,222 L520,68 L520,153 Z\" fill=\"none\" class=\"s-t4\" stroke-width=\"1.2\"/>\n<path d=\"M100,222 L520,186 L520,228 Z\" class=\"f-t3\" opacity=\".26\"/>\n<path d=\"M100,222 L520,186 L520,228 Z\" fill=\"none\" class=\"s-t3\" stroke-width=\"1.2\"/>\n<path d=\"M100,222 L520,253 L520,287 Z\" class=\"f-t1\" opacity=\".26\"/>\n<path d=\"M100,222 L520,253 L520,287 Z\" fill=\"none\" class=\"s-t1\" stroke-width=\"1.2\"/>\n<path d=\"M100,222 L520,312 L520,329 Z\" class=\"f-t2\" opacity=\".26\"/>\n<path d=\"M100,222 L520,312 L520,329 Z\" fill=\"none\" class=\"s-t2\" stroke-width=\"1.2\"/>\n<circle cx=\"100\" cy=\"222\" r=\"4\" class=\"f-t2\"/>\n<text x=\"92\" y=\"210\" text-anchor=\"end\" font-size=\"9.5\" font-weight=\"bold\" font-family=\"var(--display)\">2026<\/text>\n<text x=\"92\" y=\"223\" text-anchor=\"end\" font-size=\"8\" class=\"t-muted\" font-style=\"italic\">the religious<\/text>\n<text x=\"92\" y=\"233\" text-anchor=\"end\" font-size=\"8\" class=\"t-muted\" font-style=\"italic\">turn has won<\/text>\n<g font-family=\"var(--body)\">\n<text x=\"528\" y=\"104\" font-size=\"9.5\" font-weight=\"bold\" style=\"fill:var(--t4)\">PROVINCIALIZATION<\/text>\n<text x=\"528\" y=\"117\" font-size=\"10\" font-weight=\"bold\" class=\"t-acc\">45&#8211;55%<\/text>\n<text x=\"528\" y=\"128\" font-size=\"8\" class=\"t-muted\">white-Protestant frame reset inside a<\/text>\n<text x=\"528\" y=\"138\" font-size=\"8\" class=\"t-muted\">larger, Blacker, more global story<\/text>\n<text x=\"528\" y=\"197\" font-size=\"9.5\" font-weight=\"bold\" style=\"fill:var(--t3)\">TRANSNATIONAL REFRAME<\/text>\n<text x=\"528\" y=\"210\" font-size=\"10\" font-weight=\"bold\" class=\"t-acc\">20&#8211;30%<\/text>\n<text x=\"528\" y=\"221\" font-size=\"8\" class=\"t-muted\">read inside Atlantic emancipation<\/text>\n<text x=\"528\" y=\"266\" font-size=\"9.5\" font-weight=\"bold\" style=\"fill:var(--t1)\">PUBLIC-MEMORY CAPTURE<\/text>\n<text x=\"528\" y=\"279\" font-size=\"10\" font-weight=\"bold\" class=\"t-acc\">15&#8211;25%<\/text>\n<text x=\"528\" y=\"290\" font-size=\"8\" class=\"t-muted\">Lost Cause &amp; religious nationalism<\/text>\n<text x=\"528\" y=\"322\" font-size=\"9.5\" font-weight=\"bold\" style=\"fill:var(--t2)\">STAGNATION<\/text>\n<text x=\"528\" y=\"334\" font-size=\"9\" font-weight=\"bold\" class=\"t-muted\">5&#8211;15%<\/text>\n<\/g>\n<line x1=\"100\" y1=\"364\" x2=\"520\" y2=\"364\" class=\"ln\" stroke-width=\"1\"/>\n<path d=\"M520,364 l-10,-4 l0,8 Z\" class=\"f-t2\"/>\n<g class=\"t-muted\" font-size=\"9\" text-anchor=\"middle\" font-family=\"var(--mono)\">\n<line x1=\"100\" y1=\"360\" x2=\"100\" y2=\"368\" class=\"ln-soft\" stroke-width=\".75\"/><text x=\"100\" y=\"380\">2026<\/text>\n<line x1=\"310\" y1=\"360\" x2=\"310\" y2=\"368\" class=\"ln-soft\" stroke-width=\".75\"/><text x=\"310\" y=\"380\">2033<\/text>\n<line x1=\"520\" y1=\"360\" x2=\"520\" y2=\"368\" class=\"ln-soft\" stroke-width=\".75\"/><text x=\"520\" y=\"380\">~2040<\/text>\n<\/g>\n<text x=\"350\" y=\"404\" text-anchor=\"middle\" font-size=\"9\" class=\"t-muted\" font-style=\"italic\">Ranges, not point odds &#8212; they overlap and need not sum to 100. The canon is provincialized, not overturned.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 7.<\/strong> The forecast is about scholarship, and it is drawn as a fan because it is uncertain. The most probable future does not overturn Noll, Faust, Stout, and Wilson but <em>provincializes<\/em> them &#8212; their account of white-Protestant meaning-making reset inside a larger story centered on the enslaved&#8217;s religion and the Atlantic world. The wedges&#8217; widths are likelihoods; their ranges are drawn, not hidden.<\/figcaption>\n<\/figure>\n\n\n### Scenario A: Provincialization (most likely)\n\nThe most likely future, at **45–55%**, is provincialization: the canonical frameworks survive but are demoted from \"the account of Civil War religion\" to \"the account of *white Protestant* Civil War religion,\" reset inside a larger story in which Black Christianity, Catholic and Jewish Americans, women's religious labor, and transnational currents are co-equal — Noll, Stout, Faust, and Wilson remaining assigned and cited but no longer the whole map. The drivers are the enslaved-religion shift (F.2), the maturation and fragmentation of the religious turn (F.1), and demographic change in the professoriate; the conditions are continued institutional support for African American religious history and Reconstruction studies and no catastrophic contraction of humanities funding. The signals to watch are a major university-press synthesis that subordinates the \"theological crisis\" to a plural framework, prize-winning monographs centered on Black or transnational religion, and survey-course syllabi reorganized around emancipation-as-religious-event. The outcome should be visible by the early-to-mid 2030s.\n\n### Scenario B: Transnational/Atlantic Reframing dominates\n\nA strong secondary path, at **20–30%**, is a transnational/Atlantic reframing in which the decisive move is comparative and global rather than domestic-plural: the American case is routinely read inside Atlantic emancipation (Britain, Haiti, Brazil, Cuba) and inside a global nineteenth-century history of religion and nationalism, so that \"American exceptionalism\" in providential thought is treated as one node in a network. The drivers are the comparative frame in `06` (Claims 6.1, 6.6), the broader \"Atlantic world\" and \"global history\" momentum, and the decentering of Anglo-Protestant narratives; the conditions are sustained cross-field collaboration, language-capable scholars, and journals rewarding comparative work. The signals to watch are special issues pairing U.S. emancipation with Caribbean/Latin American cases, Haiti and Vodou moving from \"outlier\" to standard comparison, and Whitman read beside non-Anglophone democratic-prophetic poets — most likely by the mid-2030s.\n\n### Scenario C: Public-memory capture / culture-war repolarization\n\nA culture-war repolarization, at **15–25%**, would let external politics — fights over Confederate monuments, the \"Lost Cause,\" religious nationalism, and how slavery is taught — pull the scholarship toward present-centered framing, so that the Lost Cause-as-religion thesis (Wilson) and the memory tradition (Blight) become the field's most-cited work because they speak directly to live public controversy, at some cost to the quieter theological-intellectual history. The drivers are the salience of monument and memory politics, the study of \"Christian nationalism\" reaching back for genealogy, and public funding following public controversy; the conditions are continued intensity of U.S. memory politics and media and public demand. The signals to watch are spikes in citation and trade-press output on the Lost Cause and religious nationalism, historians of Civil War religion recruited into present-day commentary, and Whitman enlisted (again) as a usable \"democratic faith\" for civic-renewal arguments. This path is already underway and intensifies through the late 2020s.\n\n### Scenario D: Stagnation / contraction\n\nThe least likely path, at **5–15%**, is stagnation or contraction: humanities funding cuts, history-department shrinkage, and declining enrollments starve the field, so that the major questions go quiet not because they are answered but because the scholars and positions to pursue them disappear, and existing frameworks ossify into textbook orthodoxy. The drivers are the structural decline of the academic humanities and the collapse of the tenure pipeline; the conditions are sustained austerity and a failure of digital and public history to compensate. The signals to watch are falling dissertation counts in nineteenth-century American religion, closures of relevant graduate programs, and journals thinning — a slow trend, legible across the whole horizon.\n\n## Base Rates\n\n- **The \"memory turn\" after Blight's *Race and Reunion* (2001)** crested as a dominant paradigm within ~10–15 years, then fed into rather than was replaced by adjacent fields — a model for Scenario A's \"provincialization-not-overthrow.\"\n- **The \"new social history\" (1960s–80s)** shows how a methodological insurgency becomes an establishment and then fragments into specialisms (F.1).\n- **The \"history of capitalism\" wave (2010s)** shows how external salience can rapidly elevate a sub-field (relevant to Scenario C) — and how quickly the cutting edge moves on.\n- **Whitman criticism's queer turn (1990s–2000s)** shows a binary (spiritual vs. erotic) being dissolved rather than decided (F.3).\n\n## What Would Change My Forecast\n\n1. A landmark, field-defining monograph that *re-centers* white-Protestant theological crisis (rather than provincializing it) would push weight back from A toward a \"canon-renewal\" outcome.\n2. A sharp, sustained collapse in humanities funding would move weight decisively toward Scenario D.\n3. A computational study overturning a canonical empirical claim (e.g., showing Northern and Southern providentialism were *asymmetric* in ways the symmetry thesis denies) would open a new factual front and could spawn a distinct scenario.\n4. A major public event (a national reckoning, a sesquicentennial-style commemoration, a Supreme Court case touching religious nationalism) would amplify Scenario C.\n5. Definitive new Whitman manuscript evidence on the \"new Bible\"/\"New Religion\" intention would harden the \"religious Whitman\" reading and partly resolve F.3.\n\n## Open Questions\n\n1. Will the enslaved-religion recentering (F.2) integrate with the white-Protestant intellectual history into a single synthesis, or will the two literatures run on parallel tracks that rarely cite each other? Resolution: watch whether the next major synthesis braids them.\n2. Does the digital/quantitative turn (F.4) actually produce paradigm-changing findings, or mostly confirm at scale what the qualitative scholarship already argued? Resolution: the first genuinely surprising corpus-scale result.\n3. Can \"civil religion\" (Bellah) survive as a load-bearing analytic category, or will it be retired as too elastic (the same doubt `05` raises about applying it to both the Lost Cause and Whitman)? Resolution: whether new work adopts or abandons the term.\n\n## Sources\n\nThis forecast is an interpretive synthesis of the corpus's own Round 1 findings rather than a report of new external facts; its evidentiary base is the sources compiled in documents `01`–`06` and listed in `Sources.md`. Base-rate reasoning draws on the documented arcs of named historiographical waves:\n\n1. David W. Blight, *Race and Reunion: The Civil War in American Memory* (Harvard University Press, 2001) — anchor for the \"memory turn\" base rate. Tier 2.\n2. Mark A. Noll, *The Civil War as a Theological Crisis* (University of North Carolina Press, 2006) — the framework most likely to be \"provincialized.\" Tier 2.\n3. Drew Gilpin Faust, *This Republic of Suffering: Death and the American Civil War* (Knopf, 2008); J. David Hacker's 2012 statistical revision of the death toll (*Civil War History*) — anchor for the digital/quantitative-revision driver. Tier 2.\n4. Albert J. Raboteau, *Slave Religion: The \"Invisible Institution\" in the Antebellum South* (Oxford University Press, 1978; updated ed. 2004) — the foundation under the enslaved-religion recentering. Tier 2.\n5. Robert N. Bellah, \"Civil Religion in America,\" *Daedalus* (1967) — the contested category whose survival is a live open question. Tier 2.\n\n(Full per-claim citations for all factual material underlying this forecast appear in `01`–`06` and are consolidated in `Sources.md`.)"}]}</script>

<script>
const corpus = JSON.parse(document.getElementById('corpus-data').textContent);
const docs = corpus.documents;
const toc = document.getElementById('toc');
const content = document.getElementById('content');
const searchBox = document.getElementById('search');
const results = document.getElementById('search-results');
const key = 'corpus:' + corpus.slug;
let current = 0;

// theme
const themePref = localStorage.getItem('corpus-theme');
if (themePref) document.documentElement.dataset.theme = themePref;
else if (matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.dataset.theme = 'dark';
document.getElementById('theme-btn').onclick = () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('corpus-theme', next);
};

// table of contents
docs.forEach((d, i) => {
  const a = document.createElement('a');
  a.href = '#ch-' + i;
  a.innerHTML = '<span class="num">' + String(i).padStart(2, '0') + '</span>' + d.title;
  a.title = d.summary || '';
  a.onclick = (e) => { e.preventDefault(); show(i); closeMenu(); };
  toc.appendChild(a);
});

let firstShow = true;
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
function show(i, anchorText) {
  if (listening && !autoNext) stopListen();  // manual nav stops narration; auto-advance keeps it
  const apply = () => {
  current = Math.max(0, Math.min(docs.length - 1, i));
  content.innerHTML = marked.parse(docs[current].body);
  // rewrite chapter-to-chapter .md links into in-app navigation
  content.querySelectorAll('a[href$=".md"]').forEach(a => {
    const target = docs.findIndex(d => a.getAttribute('href').endsWith(d.file));
    if (target >= 0) { a.href = '#ch-' + target; a.onclick = (e) => { e.preventDefault(); show(target); }; }
  });
  content.querySelectorAll('a[href^="http"]').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });
  toc.querySelectorAll('a').forEach((a, j) => a.classList.toggle('active', j === current));
  document.getElementById('prev').disabled = current === 0;
  document.getElementById('next').disabled = current === docs.length - 1;
  document.getElementById('pager-label').textContent = (current + 1) + ' / ' + docs.length + ' · ' + docs[current].title
    + ' · ' + Math.max(1, Math.round(docs[current].body.split(/\s+/).length / 220)) + ' min';
  history.replaceState(null, '', '#ch-' + current);
  localStorage.setItem(key, current);
  // feed the cross-page library shell: per-corpus read set + global recents
  try {
    const rk = 'read:' + corpus.slug;
    const readArr = JSON.parse(localStorage.getItem(rk) || '[]');
    if (readArr.indexOf(current) < 0) { readArr.push(current); localStorage.setItem(rk, JSON.stringify(readArr)); }
    const rec = (JSON.parse(localStorage.getItem('library-recents') || '[]') || []).filter(r => r.slug !== corpus.slug);
    rec.unshift({ slug: corpus.slug, title: corpus.title, ch: current, chTitle: docs[current].title, ts: Date.now() });
    localStorage.setItem('library-recents', JSON.stringify(rec.slice(0, 20)));
    // quiet reading streak: bump once per calendar day a chapter is opened
    const today = new Date().toISOString().slice(0, 10);
    const st = JSON.parse(localStorage.getItem('reading-streak') || '{}');
    if (st.last !== today) {
      const yest = new Date(Date.now() - 864e5).toISOString().slice(0, 10);
      st.count = (st.last === yest ? (st.count || 0) : 0) + 1;
      st.last = today;
      localStorage.setItem('reading-streak', JSON.stringify(st));
    }
  } catch (e) {}
  if (anchorText) {
    const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT);
    let node; while ((node = walker.nextNode())) {
      const idx = node.textContent.toLowerCase().indexOf(anchorText.toLowerCase());
      if (idx >= 0) {
        const host = node.parentElement;
        host.scrollIntoView({ block: 'center' });
        if (!reduceMotion) { host.classList.add('passage-flash'); setTimeout(() => host.classList.remove('passage-flash'), 2200); }
        return;
      }
    }
  }
  document.getElementById('main').scrollIntoView();
  window.scrollTo(0, 0);
  };
  // cross-fade chapter swaps where supported (skips first paint + reduced motion)
  if (document.startViewTransition && !reduceMotion && !firstShow) document.startViewTransition(apply);
  else apply();
  firstShow = false;
}

document.getElementById('prev').onclick = () => show(current - 1);
document.getElementById('next').onclick = () => show(current + 1);

let chordKey = null, chordTimer;
document.addEventListener('keydown', (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const back = document.getElementById('cmdk-back');
  if (back && back.classList.contains('open')) return;  // palette owns the keys when open
  const help = document.getElementById('kbd-help');
  if (help && help.classList.contains('open')) { if (e.key === 'Escape' || e.key === '?') toggleHelp(); return; }
  if (chordKey === 'g') { clearTimeout(chordTimer); chordKey = null;
    if (e.key === 'g') { show(0); return; }
    if (e.key === 'e') { show(docs.length - 1); return; } }
  if (e.key === 'g') { chordKey = 'g'; chordTimer = setTimeout(() => { chordKey = null; }, 700); return; }
  if (e.key === 'ArrowLeft' || e.key === 'k') show(current - 1);
  else if (e.key === 'ArrowRight' || e.key === 'j') show(current + 1);
  else if (e.key === 'z' || e.key === 'Z') toggleFocus();
  else if (e.key === '?') toggleHelp();
});

function toggleFocus() {
  const on = document.body.classList.toggle('focus-mode');
  localStorage.setItem('reader-focus', on ? '1' : '0');
}
if (localStorage.getItem('reader-focus') === '1') document.body.classList.add('focus-mode');

function toggleHelp() {
  let h = document.getElementById('kbd-help');
  if (!h) {
    h = document.createElement('div'); h.id = 'kbd-help';
    h.innerHTML = '<div class="kh"><h3>Keyboard</h3><dl>'
      + '<dt>⌘K</dt><dd>command palette</dd>'
      + '<dt>← / k</dt><dd>previous chapter</dd>'
      + '<dt>→ / j</dt><dd>next chapter</dd>'
      + '<dt>g g</dt><dd>first chapter</dd>'
      + '<dt>g e</dt><dd>last chapter</dd>'
      + '<dt>Z</dt><dd>focus mode</dd>'
      + '<dt>?</dt><dd>this help</dd></dl></div>';
    h.addEventListener('click', (ev) => { if (ev.target === h) toggleHelp(); });
    document.body.appendChild(h);
  }
  h.classList.toggle('open');
}

// search
let timer;
searchBox.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(runSearch, 150);
});
function runSearch() {
  const q = searchBox.value.trim().toLowerCase();
  results.innerHTML = '';
  toc.style.display = q ? 'none' : '';
  if (!q || q.length < 3) { toc.style.display = ''; return; }
  let hits = 0;
  docs.forEach((d, i) => {
    const text = d.body.toLowerCase();
    let pos = text.indexOf(q), shown = 0;
    while (pos >= 0 && shown < 3 && hits < 40) {
      const start = Math.max(0, pos - 60), end = Math.min(d.body.length, pos + q.length + 90);
      const raw = d.body.slice(start, end).replace(/[#*_>\[\]]/g, '');
      const safe = raw.replace(/&/g, '&amp;').replace(/</g, '&lt;');
      const snippet = safe.replace(new RegExp(q.replace(/[.*+?^${}()|\\]/g, '\\$&'), 'ig'), m => '<mark>' + m + '</mark>');
      const div = document.createElement('div');
      div.className = 'hit';
      div.innerHTML = '<b>' + d.title + '</b>…' + snippet + '…';
      const exact = d.body.slice(pos, pos + q.length);
      div.onclick = () => { show(i, exact); searchBox.value = ''; runSearch(); closeMenu(); };
      results.appendChild(div);
      hits++; shown++;
      pos = text.indexOf(q, pos + q.length);
    }
  });
  if (!hits) results.innerHTML = '<div class="none">No matches.</div>';
}

// mobile menu
const menuBtn = document.getElementById('menu-btn');
menuBtn.onclick = () => document.body.classList.toggle('menu-open');
function closeMenu() { document.body.classList.remove('menu-open'); }

// ---- Listen mode (browser Web Speech API) + share-this-chapter ----
const synth = window.speechSynthesis;
let listening = false, paused = false, autoNext = false, listenIdx = 0, listenRate = 1,
    listenAuto = true, sleepMode = 'none', sleepTimer = null, lchunks = [], lidx = 0, lbar = null;
function chapterText(i) {
  let t = docs[i] ? docs[i].body : '';
  return t.replace(/```[\s\S]*?```/g, ' ').replace(/<[^>]+>/g, ' ')
          .replace(/!\[[^\]]*\]\([^)]*\)/g, ' ').replace(/\[([^\]]+)\]\([^)]*\)/g, '$1')
          .replace(/[#>*_`~|]/g, ' ').replace(/\s+/g, ' ').trim();
}
function chunkText(t) {
  const raw = t.match(/[^.!?]+[.!?]+["')\]”’]*|\S[^.!?]*$/g) || [t];
  const out = []; let buf = '';
  raw.forEach(s => { s = s.trim(); if (!s) return;
    if ((buf + ' ' + s).length > 240 && buf) { out.push(buf); buf = s; } else buf = buf ? buf + ' ' + s : s; });
  if (buf) out.push(buf);
  return out;
}
function pickVoice() { const vs = synth.getVoices();
  return vs.find(v => /^en/i.test(v.lang) && v.localService) || vs.find(v => /^en/i.test(v.lang)) || vs[0]; }
function speakChunk() {
  if (!listening) return;
  if (lidx >= lchunks.length) {
    if (sleepMode === 'chapter') { stopListen(); return; }
    if (listenAuto && listenIdx < docs.length - 1) {
      listenIdx++; autoNext = true; show(listenIdx); autoNext = false;
      lchunks = chunkText(chapterText(listenIdx)); lidx = 0; updateBar(); speakChunk();
    } else stopListen();
    return;
  }
  const u = new SpeechSynthesisUtterance(lchunks[lidx]);
  u.rate = listenRate; const vo = pickVoice(); if (vo) u.voice = vo;
  u.onend = () => { if (listening && !paused) { lidx++; speakChunk(); } };
  u.onerror = () => { if (listening && !paused) { lidx++; speakChunk(); } };
  synth.speak(u);
}
function startListen() {
  if (!synth) return;
  synth.cancel(); listening = true; paused = false; listenIdx = current;
  lchunks = chunkText(chapterText(listenIdx)); lidx = 0; buildBar(); lbar.classList.add('show'); updateBar();
  const lb = document.getElementById('listen-btn'); if (lb) lb.classList.add('on');
  speakChunk();
}
function stopListen() {
  listening = false; paused = false; if (synth) synth.cancel();
  if (sleepTimer) { clearTimeout(sleepTimer); sleepTimer = null; }
  if (lbar) lbar.classList.remove('show');
  const lb = document.getElementById('listen-btn'); if (lb) lb.classList.remove('on');
}
function togglePause() { if (!listening) return;
  if (paused) { synth.resume(); paused = false; } else { synth.pause(); paused = true; } updateBar(); }
function setSleep(sec) {
  if (sleepTimer) { clearTimeout(sleepTimer); sleepTimer = null; }
  sleepMode = sec === 1 ? 'chapter' : 'none';
  if (sec > 1) sleepTimer = setTimeout(stopListen, sec * 1000);
}
function buildBar() {
  if (lbar) return;
  lbar = document.createElement('div'); lbar.id = 'listen-bar';
  lbar.innerHTML = '<button id="lb-toggle" title="Pause">⏸</button><button id="lb-stop" title="Stop">⏹</button>'
    + '<span id="lb-title"></span>'
    + '<label class="lb-ctl">Speed <select id="lb-rate"><option value="0.8">0.8×</option><option value="1" selected>1×</option><option value="1.2">1.2×</option><option value="1.5">1.5×</option></select></label>'
    + '<label class="lb-ctl">Sleep <select id="lb-sleep"><option value="0" selected>Off</option><option value="1">End of chapter</option><option value="900">15 min</option><option value="1800">30 min</option></select></label>';
  document.body.appendChild(lbar);
  lbar.querySelector('#lb-toggle').onclick = togglePause;
  lbar.querySelector('#lb-stop').onclick = stopListen;
  lbar.querySelector('#lb-rate').onchange = function () { listenRate = +this.value; };
  lbar.querySelector('#lb-sleep').onchange = function () { setSleep(+this.value); };
}
function updateBar() {
  if (!lbar) return;
  const t = lbar.querySelector('#lb-title'); if (t) t.textContent = docs[listenIdx] ? docs[listenIdx].title : '';
  const tg = lbar.querySelector('#lb-toggle'); if (tg) tg.textContent = paused ? '▶' : '⏸';
}
const listenBtn = document.getElementById('listen-btn');
if (listenBtn) {
  if (!synth) listenBtn.style.display = 'none';
  else listenBtn.onclick = () => { listening ? stopListen() : startListen(); };
}
const shareBtn = document.getElementById('share-btn');
if (shareBtn) shareBtn.onclick = () => {
  if (!window.CorpusShare) return;
  window.CorpusShare.open({ kicker: corpus.title, title: docs[current].title,
    source: corpus.subtitle || corpus.title,
    url: location.origin + location.pathname + '#ch-' + current, filename: 'chapter' });
};
window.addEventListener('pagehide', () => { if (synth) synth.cancel(); });

// initial chapter: hash > saved progress > 0; ?q= deep-links to a passage (Today's Passage, share cards)
const hash = location.hash.match(/^#ch-(\d+)$/);
const anchorQ = new URLSearchParams(location.search).get('q');
show(hash ? +hash[1] : +(localStorage.getItem(key) || 0), anchorQ || undefined);

// respond to in-page hash changes: browser back/forward, and cross-page command
// palette jumps that land on a chapter of the corpus already open (no reload).
window.addEventListener('hashchange', () => {
  const h = location.hash.match(/^#ch-(\d+)$/);
  if (h && +h[1] !== current) show(+h[1]);
});

// Related reading at the foot of the column — corpus-level, from the inlined
// library manifest's precomputed similarity graph (no fetch). Deferred to
// DOMContentLoaded because the shell (which carries #library-manifest) is
// injected into the page AFTER this script.
function renderRelated() {
  const relEl = document.getElementById('related');
  const mEl = document.getElementById('library-manifest');
  if (!relEl || !mEl) return;
  let LIB; try { LIB = JSON.parse(mEl.textContent); } catch (e) { return; }
  const me = LIB.find(x => x.slug === corpus.slug);
  const rel = (me && me.related) || [];
  if (!rel.length) return;
  const esc = s => { const d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; };
  relEl.innerHTML = '<h3 class="related-h">Related reading</h3><div class="related-grid">'
    + rel.map(r => '<a class="related-card" href="' + esc(r.slug) + '.html">'
        + '<span class="related-cat">' + esc(r.category || '') + '</span>'
        + '<span class="related-t">' + esc(r.title) + '</span></a>').join('')
    + '</div>';
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', renderRelated);
else renderRelated();

// top reading-progress bar
(function () {
  var bar = document.getElementById('reader-progress'); if (!bar) return;
  function onScroll() { var h = document.documentElement, max = h.scrollHeight - h.clientHeight;

(function () {

    back.querySelector('#atlas-x').onclick = close;
    back.querySelector('#atlas-zin').onclick = function () { zoomAt(stage.clientWidth / 2, stage.clientHeight / 2, 1.3); };
    back.querySelector('#atlas-zout').onclick = function () { zoomAt(stage.clientWidth / 2, stage.clientHeight / 2, 1 / 1.3); };

      }

    (p.chapters || []).forEach(function (ch) { opts += '<option value="' + esc(base + ch.href) + '">' + esc(ch.t) + '</option>'; });
    card.innerHTML = '<a class="ac-title" href="' + esc(base + p.href) + '" style="color:' + esc(p.accent) + '">' + esc(p.title) + '</a>'
      + '<div class="ac-place">' + esc(p.label) + '</div>'
      + (p.chapters && p.chapters.length ? '<select class="ac-sel" aria-label="Jump to a chapter">' + opts + '</select>' : '');
