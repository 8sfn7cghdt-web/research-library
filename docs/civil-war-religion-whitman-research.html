iverer to be sung in praise [18]. This is consciously offered as a consolation alternative to Christian resurrection: the soldiers and the President do not rise to heaven; they merge, soothed, into the dark mother and the leaves of grass. It is the deepest convergence-and-divergence point with the rest of the corpus. Faust (document `02`) shows the war shattering the Protestant \"Good Death\" and driving Americans toward spiritualism and a new federal cult of the dead; Whitman supplies, in effect, the *poetic theology* that crisis demanded — not the Christian resurrection the bereaved could no longer simply assume, but a naturalistic, maternal, reassuring death that asks for praise rather than fear. Where Lincoln's Second Inaugural reads the war's death as inscrutable providential judgment, Whitman reads it as merciful merging.\n\n*Democratic Vistas* (1871), his major prose statement, is best read as a postwar religious-political jeremiad — diagnosing democracy's spiritual crisis and calling for a \"Religious Democracy\" and a priestly class of \"literatuses.\" Responding to the moral squalor of Reconstruction-era America, it diagnoses a democracy spiritually hollow beneath its material success, names \"the depravity of the business classes\" and a society \"canker'd, crude, superstitious, and rotten,\" locates \"at the core of democracy, finally, the religious element,\" and calls for a future \"Religious Democracy\" to be midwifed by a new sacerdotal class of native authors — \"literatuses.\" The pamphlet was published in 1871, assembled from essays written 1867–68 partly in response to Thomas Carlyle's anti-democratic \"Shooting Niagara: and After?\" (1867). Against the postwar triumph of commerce, Whitman delivers an unsparing diagnosis: \"Society, in these States, is canker'd, crude, superstitious, and rotten... We live in an atmosphere of hypocrisy throughout. The men believe not in the women, nor the women in the men... Genuine belief seems to have left us. The underlying principles of the States are not honestly believed in... nor is humanity itself believed in\" [13][19]; of the commercial classes he is blunt: \"The depravity of the business classes of our country is not less than has been supposed, but infinitely greater\" [13]. The remedy he proposes is explicitly religious. \"I say at the core of democracy, finally, is the religious element. All the religions, old and new, are there\" — democracy is to *complete* and *fulfill* religion, not abolish it [13][20]. He calls the needed future a \"sublime and serious Religious Democracy\" and insists that beneath \"the political and productive and intellectual bases of the States\" there must be laid \"a religious and moral character\" [19], and the agents of this transformation are not clergy but writers: a future class \"of native authors, literatuses... far higher in grade than any yet known, sacerdotal, modern, fit to cope with our occasions... permeating the whole mass of American mentality, taste, belief\" [19]. The structure is the classic American jeremiad (Sacvan Bercovitch's term): denunciation of present declension measured against a promised covenantal future — except Whitman's covenant is democratic and his redeemers are poets, not preachers. He also coins \"personalism\" for the robust, spiritually developed individuality that a leveling democracy must cultivate as its necessary counterweight, and projects a future \"strong and sweet female race, a race of perfect mothers\" alongside the new democratic men [13][19]. This is the document the corpus most needs to read as a religious-political text: written in the disillusion of Reconstruction (document `02`), it is Whitman's confession that the immanent democratic faith of 1855–60 had not been realized — \"the fruition of democracy, on aught like a grand scale, resides altogether in the future\" — and his insistence that only a *religious* reconstruction of democratic culture, led by literature, could redeem it [13].\n\nThat binding project began before the war as a deliberate instrument of Union — what Kerry Larson calls a \"drama of consensus\" binding the many and the one as the disunion crisis loomed. From 1855 to 1860 Whitman's civil religion of democracy was not abstract but a direct response to the gathering threat of disunion: he conceived his poems as vehicles of social integration meant to dramatize and enact the joining of the many and the one — the poet as a unifying figure (\"the better President\") in whom contending factions would be reconciled — which reframes his religion of comradeship as a *cohesive* answer to the same sectional crisis that fractured the churches (document `01`) and broke the nation (document `02`). Kerry C. Larson's *Whitman's Drama of Consensus* (University of Chicago Press, 1989) argues that Whitman was \"vitally engaged in the problems of preserving social continuity at a time (1855–60) when the specter of disunion and fratricidal war grew increasingly ominous,\" and that he \"conceived his poems as vehicles for social integration whose entire aim was to dramatize the joining of the many and the one, speaker and listener, universal and particular, without subordinating either term\" [29]. The poet's office, in Larson's reading, was to be \"the better President\" — the figure in whose person all \"contending interests and competing factions would be resolved\" — and consent is rendered not as a static affirmation but as \"an active process, something to be achieved rather than merely affirmed\" [29]. This is the political-theological corollary of \"adhesiveness\": the binding of citizens that the schisming churches and the failing political compromises of the 1850s could no longer perform, Whitman attempts to perform poetically, by enacting union in the very structure of the poem (the catalogue that holds the many without dissolving the one; the \"I\" that contains multitudes). Read alongside Erkkila's more conflictual, ideologically charged Whitman and Hutchinson's crisis-shaman, Larson supplies the integrative pole: Whitman's religion of democracy is, among other things, a *liturgy of national cohesion* aimed squarely at the approaching war, and the wartime *Drum-Taps* and the Lincoln elegy then convert this anticipatory project of union into an elegiac one of reconciliation and mourning after the fact.\n\nDownstream, Whitman stands at the head of an American \"religion of democracy\" lineage that runs through William James and John Dewey. He is a recognized founding figure of a distinctively American tradition that treats democracy itself as a spiritual or religious faith: William James enlisted him as the prime exemplar of \"healthy-minded\" religion, John Dewey treated him as an \"apostle of democracy\" and bard of a \"spiritual democracy,\" and the lineage extends to later democratic theorists and pragmatist philosophers of religion. In *The Varieties of Religious Experience* (1902), James makes Walt Whitman his leading example of \"the religion of healthy-mindedness\" — the temperament that experiences \"the goodness of life\" directly and finds the divine in nature and ordinary existence; he considered healthy-mindedness \"America's main contribution to religion,\" running \"from the transcendentalists Emerson and Whitman to Mary Baker Eddy's Christian Science,\" though he qualified that Whitman's optimism was \"too voluntary and defiant,\" with \"a touch of bravado and an affected twist\" [21][22]. James thus canonized Whitman *as a religious type* within the founding text of the American academic study of religion. John Dewey, the philosopher of democracy as a way of life rather than a mere mechanism, counted Whitman among his heroes — \"the apostles of democracy\" alongside Jefferson — and explicitly called Whitman the prophet/seer of democracy; Steven Rockefeller's *John Dewey: Religious Faith and Democratic Humanism* (1991) documents Dewey's \"religious faith in democracy\" and its kinship with Whitman's \"spiritual democracy\" — democracy as the realization of shared spiritual meaning in common experience [23][24], and Jeffrey Stout's *Democracy and Tradition* (2004) places Whitman (with Emerson, Dewey, and James) in a tradition of \"democratic faith\" or piety that is religious in temper without being doctrinally Christian [24]. The lineage is genuine but should not be over-tidied: James, Dewey, and Whitman differ sharply (James the empiricist of varieties, Dewey the naturalist-educator, Whitman the bardic prophet), and the \"religion of democracy\" is more a recurring American family resemblance than a single doctrine handed down. What is established is that the two most important American philosophers of the generation after Whitman reached for *him* when they wanted to name democracy as a spiritual faith.\n\nHis project also names, and partly anticipates, the phenomenon Robert Bellah would later theorize as American \"civil religion.\" Bellah's influential 1967 concept — a body of shared beliefs, symbols, and rituals, differentiated from the churches, that sacralizes the national community — describes the very phenomenon Whitman set out to author, and Whitman is frequently invoked as a literary forefather of American civil religion, even though Bellah's own 1967 essay foregrounds Lincoln and the founders rather than Whitman. Bellah's \"Civil Religion in America\" (*Daedalus*, Winter 1967) argued that \"there actually exists alongside of and rather clearly differentiated from the churches an elaborate and well-institutionalized civil religion in America\" — a public faith, descended conceptually from Rousseau's *civil religion* in *The Social Contract* (with echoes in Tocqueville), that binds citizens through shared civic beliefs, symbols, and rituals independent of their particular churches [25][26]; Bellah's central exhibits are presidential rhetoric (notably Lincoln and Kennedy) and national rituals, not Whitman. But the *substance* Bellah describes — democracy and nation sacralized, the dead consecrated to the national covenant (Lincoln at Gettysburg), a public faith parallel to but distinct from the churches — is precisely what Whitman attempted to compose in verse a century earlier, and commentators routinely position him in this genealogy: when Whitman writes of a \"Religious Democracy\" he means, as one analysis puts it, \"not religion in government, but rather democracy as religion,\" a \"civic religion\" in the same family later articulated by \"William James, Herbert Croly, John Dewey, and, of course, Walt Whitman\" [27]. The convergence with the corpus is exact and instructive: Bellah's civil religion is built largely from the *providential* materials this corpus treats elsewhere (Lincoln's covenant theology, the consecration of the war dead), while Whitman represents the *post-Protestant, immanent, bodily* variant of the same impulse — the same drive to sacralize the democratic nation, but routed through the body, comradeship, and a naturalized death rather than through providence and biblical covenant. He is thus both inside Bellah's category and a distinctive, secularizing edge of it; the association is well attested, though a strict causal genealogy from Whitman to Bellah is inference, since Bellah did not centrally credit him.\n\nAll of this turns on a genuinely contested question — whether Whitman is finally a *religious* figure (a sincere prophet of a new faith) or a *secular* democrat who deployed religious language instrumentally — and the contest is itself important, so the corpus holds it open rather than resolving it, because Whitman's significance for the history of American civil religion lies precisely in his standing *between* the two. The *religious* reading is associated with Whitman's earliest disciples (the \"hot little prophets\" who treated *Leaves* as scripture) and, in modern scholarship, with Kuebrich's *Minor Prophecy*, which argues — against a twentieth-century secular consensus — that Whitman *intended* a literal new religion and that critics erred in dismissing the early Whitmanites as naïve [6]; Hutchinson's shamanism thesis and a body of work on Whitman's debts to Quakerism, spiritualism, and Eastern religion support a substantively religious Whitman [6][7][9]. The *secular* (or secularizing) reading treats the religious vocabulary as the available idiom for an essentially political and aesthetic democratic project: Erkkila's *Whitman the Political Poet* reads even the most ecstatic poems as \"products and agents of the political culture of his time,\" foregrounding class, sex, and nation over metaphysics [11], and much New Americanist and materialist criticism follows, so that on this view \"religion of democracy\" is a metaphor — democracy *like* a religion, demanding devotion — not a literal new cult. The honest synthesis, reflected in recent scholarship (e.g., work on Whitman's \"secular religion\" and on the \"pragmatic Whitman\"), is that the binary is partly anachronistic. Whitman wrote at a moment when the boundary between the religious and the secular was itself being renegotiated in America; his achievement was to occupy and blur that boundary — to make democracy carry the affective and consolatory weight that orthodox religion was losing, without committing to supernatural doctrine. He is neither cleanly secular nor cleanly religious; he is the *poet of the threshold*, which is exactly why he matters to a history of how a Protestant providential nation became a country with a \"civil religion.\"\n\nHis religion of democracy also became a global export, naturalized into many nations' traditions. His post-Protestant democratic faith proved unusually portable: more than perhaps any other American writer, he was taken up internationally — translated and adapted across Europe, Latin America, and Asia, frequently as a prophet of democracy, comradeship, socialism, and a this-worldly spirituality — so that his civil religion of democracy became a global, not merely American, phenomenon. Gay Wilson Allen and Ed Folsom's *Walt Whitman and the World* (University of Iowa Press, 1995) documents that \"no American writer has been more influential in more nations than Whitman,\" tracing how diverse cultures \"appropriated an American writer who ceases to sound narrowly American when read into other cultures' traditions\" [28]. *Leaves of Grass* was translated into French, German, Spanish, Italian, Japanese, and Chinese, among others; British socialists such as Edward Carpenter and Ernest Rhys embraced Whitman as a prophet of democratic comradeship and (in Carpenter's case) of homosexual love and a cosmic spirituality; Latin American modernistas (notably José Martí, whose 1887 essay introduced Whitman to the Spanish-speaking world, and later Pablo Neruda, who claimed Whitman as a master) read him as the bard of New World democracy; and figures from Fernando Pessoa to Rabindranath Tagore's milieu engaged him [28]. The international reception repeatedly fastened on exactly the religious-democratic core analyzed here — comradeship, the sacred body, this-worldly spirituality, democracy as faith — confirming that what Whitman built was received as a *transferable* spiritual-political vision, not a parochial Americana.\n\nThe synthesis point for the corpus is that Whitman's democratic civil religion converges with and diverges from the providential civil religions of the corpus along a single axis: immanence versus transcendence. He shares with the Northern, Southern, Lincolnian, and Black-church religious imaginations the impulse to sacralize the national-democratic project, but diverges sharply by *immanentizing* the sacred — locating salvation, consolation, and the holy in the body, comradeship, the nation, and a naturalized death rather than in transcendent providence, biblical covenant, or Christian resurrection. The convergences are four. Like the Northern millennial civil religion (Moorhead) and the Confederate covenant nationalism (document `02`), Whitman treats the democratic nation as sacred and providentially destined for a glorious future; like Lincoln, he seeks a public faith broader than any single church and reads the war as nationally meaningful suffering; like the Black church's Exodus/Jubilee imagination (document `02`), he reads the bondaged and laboring body as a site of the sacred and democracy as a redemptive promise; and like all of them, he uses biblical cadence and the jeremiad form (most explicitly in *Democratic Vistas*). The divergences are also four. Where the providential civil religions locate God's will *above* and *behind* events (Lincoln's \"the Almighty has His own purposes\"; the Confederate covenant; Black providentialism), Whitman locates the sacred *within* immanent democratic life — \"every man shall be his own priest\"; where Christian consolation rests on resurrection and judgment, Whitman offers merging into the \"dark mother\" and the grass; where orthodox Protestantism disciplines the body, Whitman sanctifies it and makes homoerotic comradeship the national bond — a sacralization the churches would have named sin; and where Lincoln's theology is one of inscrutable, chastening providence, Whitman's is one of cosmic affirmation, which is exactly why James found his optimism \"too voluntary and defiant.\" The single best summary: Lincoln and the churches asked what *God* willed for the nation; Whitman asked the *nation* — its bodies, its comrades, its dead — to become the locus of the divine. Both are American civil religion; Whitman is its post-Protestant, immanent wing.\n\n---\n\n## Whitman's Civil Religion of Democracy\n\nWhitman's central, founding conviction is announced in the opening sentences of the 1855 Preface: that America had outgrown the cultural forms of the Old World and required a new poetry adequate to a democracy, and that — most audaciously — the democratic nation was itself already a poem and a scripture: \"The United States themselves are essentially the greatest poem\" [5]. This is more than literary patriotism. It is the foundational gesture of a *religion of democracy*: the relocation of the sacred from the church and the Bible into the living democratic body politic. The corollary, stated in the same Preface, is the abolition of the clergy: \"There will soon be no more priests... A new order shall arise and they shall be the priests of man, and every man shall be his own priest\" [5]. The poet is the herald and the first of these new priests.\n\nThe clearest evidence that Whitman understood this as a genuinely *religious* enterprise, and not merely a poetic one, is private and programmatic. In 1857 he wrote to himself of \"the great construction of the new Bible,\" and planned the 1860 *Leaves of Grass* — the edition that first gathered the \"Calamus\" and \"Children of Adam\" clusters — as the \"Bible of the New Religion,\" even imitating scriptural form in its numbered clusters and verses [1][2]. The poems carry the claim into the open. \"Starting from Paumanok,\" placed near the front of the 1860 book as a kind of overture, has the poet declare: \"I too, following many and follow'd by many, inaugurate a religion, I descend into the arena,\" and insist that \"the whole earth and all the stars in the sky are for religion's sake\" [4]. Whitman is not describing existing religion; he is founding one.\n\nWhat kind of religion? Its theology is radically immanent. Where antebellum Protestantism (document `01`) located salvation in a transcendent God and a deferred heaven, and the war-era civil religions of North and South (document `02`) located meaning in providence reading the nation's history, Whitman brings the sacred *down* — into the body, the crowd, the street, the ferry, the dying soldier. The grass, in the sixth section of \"Song of Myself,\" is at once \"the handkerchief of the Lord\" and \"itself a child,\" the divine made visible in the most common thing underfoot [8]. The catalogue — Whitman's signature device — is a liturgical form: the naming, one by one, of workers and slaves and bodies and cities as equally holy. This is why scholars such as David Reynolds insist that Whitman did not reject his Protestant-revivalist culture so much as *transpose* it: he took the providential confidence, the millennial expectancy, the prophetic voice, and the evangelical fervor of the \"actors, orators, and divines\" he had heard, and rechanneled them from the church into democracy [9]. His Quaker inheritance — the Hicksite \"inner light,\" directly and equally available to all — supplied the anti-clerical, anti-creedal conviction that licensed \"every man shall be his own priest\" [9][10].\n\nThe religious form is enacted, not merely asserted. \"Song of Myself\" — the long untitled poem that opens the 1855 book — reads as a new scripture and a sermon delivered against sermons. Its speaker is divine and his flesh is holy: \"Divine am I inside and out, and I make holy whatever I touch or am touch'd from\"; \"This head more than churches, bibles, and all the creeds\" [8a]. Its God is everywhere and ordinary: \"In the faces of men and women I see God, and in my own face in the glass\" [8a]. And it dismisses doctrine in favor of direct, bodily revelation: \"Logic and sermons never convince, / The damp of the night drives deeper into my soul\" [8a]. The incantatory rhythm, the cataloguing, the exclamation — these are liturgical devices, drawn (as Reynolds shows) from the revival sermon, the operatic aria, and the prophetic books of the King James Bible. This is why his earliest disciples could receive *Leaves of Grass* as scripture: the book *behaves* like one.\n\nThe deepest continuity, and the deepest divergence, is with Northern millennialism. James Moorhead's *American Apocalypse* shows the Northern Protestant clergy reading the Civil War as an apocalyptic battle moving the redeemer nation toward the Kingdom of God. Whitman shares the structure — America destined, history sacred, a glorious future ahead — but he refuses the transcendence. His kingdom is not deferred to the end of time; it is the realized democracy of comrades, here, in the body and the land. This is the precise sense in which his is a *post*-Protestant religion: it cannot exist without the Protestant providential-millennial inheritance, and it systematically immanentizes every term of it.\n\nThe Quaker inheritance deserves emphasis, because it supplies the specific theological mechanism for Whitman's anti-clericalism. Whitman's family revered Elias Hicks, the radical Long Island Quaker preacher whose \"Hicksite\" wing held that the divine \"inner light\" was directly, immediately, and *equally* available within every person, requiring neither priest nor creed nor even Scripture as intermediary. Whitman wrote admiringly of Hicks late in life (in *November Boughs*, 1888) and the Whitman Archive's \"Religion\" entry traces to this source his lifelong hostility to institutional churches and his conviction that revelation is democratic — available to each person in their own body and experience [9][10]. Democratize and embody the inner light, and you arrive precisely at \"every man shall be his own priest\" and at a poem that locates God \"in my own face in the glass.\" Whitman's new religion is, in this genealogy, radical Quakerism stripped of its remaining Christian scaffolding and poured into the mold of American democracy.\n\n## The Religion of the Body and \"Adhesiveness\"\n\nIf the nation is the scripture and the poet the priest, the *sacraments* of Whitman's religion are the body and comradeship. His most consequential inversion of orthodoxy is the sanctification of the flesh. Where Protestantism inherited a long discipline of the body as the seat of sin, Whitman makes the body holy — co-equal with the soul, even the medium through which the soul is realized: \"The spirit receives from the body just as much as it gives to the body\" [5]. \"I Sing the Body Electric\" treats the catalogued human body, including the enslaved body on the auction block, as sacred and inviolable; \"Song of Myself\" makes worship itself corporeal: \"If I worship one thing more than another it shall be the spread of my own body, or any part of it\" [8]. This sacralized materialism is the ground of everything else: a religion that locates the holy in the body can locate national salvation in bodies bound together in love.\n\nThat binding is \"adhesiveness.\" Borrowed from the pseudoscience of phrenology — where it named the faculty of attachment and friendship, distinct from \"amativeness,\" male–female sexual love — the term became, in Whitman's hands, the keystone of his democratic theory [11][12]. The \"Calamus\" cluster of 1860 is its great enactment. In \"For You O Democracy\" the poet vows to \"make the continent indissoluble\" and to \"plant companionship thick as trees along all the rivers of America... By the love of comrades, by the manly love of comrades,\" proposing comrade-love, explicitly, as the cement of national union [14]. A decade later, in *Democratic Vistas*, he raised it to doctrine: beyond the political and material foundations of the States \"there is another half, which is adhesiveness or love, that fuses, ties and aggregates, making the races comrades, and fraternizing all\" [13]. The logic is pointed and timely. The antebellum churches had just demonstrated, in their North–South schisms (document `01`), that shared *creed* could not hold the Union; the war had drowned the nation in fraternal blood. Whitman's answer was to propose, in place of creed, the affective bond of love between equal men as the spiritual infrastructure of democracy.\n\nThis is where Kerry Larson's reading of the early Whitman is indispensable. The 1855–60 poems were composed in the very years the Union was visibly coming apart, and Larson argues that Whitman conceived them as instruments of \"consensus\" — vehicles \"for social integration whose entire aim was to dramatize the joining of the many and the one, speaker and listener, universal and particular, without subordinating either term,\" with the poet imagined as \"the better President\" in whom \"all contending interests and competing factions would be resolved\" [29]. Adhesiveness is the affective name for this integrative project; the catalogue, which holds a multitude of particulars within a single embracing \"I,\" is its formal technique. Whitman's religion of comradeship is thus, read with Larson, a deliberate *liturgy of national cohesion* aimed at the approaching disunion — the same crisis that, in document `01`, the schisming evangelical churches had already failed to contain. Where the churches split over slavery, Whitman tried to bind the nation with comrade-love.\n\nHis wartime years in the Washington hospitals — the intense, tender, physical intimacies of nursing dying soldiers, packing a bag of small gifts and sitting with the wounded for hours, sometimes all night — turned this from the abstraction of 1860 into the lived comradeship of *Drum-Taps* (1865). Poems such as \"The Wound-Dresser,\" \"Vigil Strange I Kept on the Field One Night,\" and \"As Toilsome I Wander'd Virginia's Woods\" fuse the erotic-tender comradeship of \"Calamus\" with grief: the speaker tends, kisses, buries, and mourns young men, and the love that was to bind the democracy is now poured out over its dead. The hospital, Whitman wrote, concentrated \"the marrow of the tragedy\"; the comradeship that had been a national program became a personal vigil over the bodies the program had failed to save.\n\nHere the corpus must engage, honestly and without false resolution, the erotic core of this comradeship. The \"Calamus\" poems grew out of \"Live Oak, with Moss,\" a private 1859 sequence narrating a love affair between men, which Whitman dispersed and partly disguised within the published cluster; the calamus plant he chose as its emblem is phallic and root-spreading [12][15]. The reception history is a long argument about how to read this. Victorian admirers such as William Michael Rossetti praised the \"adhesiveness of manly love\" as a \"robust, non-carnal bond\"; when John Addington Symonds pressed the aging Whitman directly on whether adhesiveness meant physical love between men, Whitman *denied* it, invoking six (fictitious) illegitimate children and calling the inference \"morbid\" — a denial that most scholars now read as defensive evasion [12][15]. Since Robert K. Martin's *The Homosexual Tradition in American Poetry* (1979) and the rise of queer scholarship, the dominant reading takes the erotic and the homoerotic as integral to \"Calamus,\" not separable from its democratic and spiritual claims. Betsy Erkkila goes further, arguing that these poems played a \"constitutive role\" in the very *emergence* of modern homosexual and heterosexual identity — which is why mapping our categories back onto Whitman is anachronistic [11].\n\nFor a history of civil religion, this is not a biographical footnote but the heart of the matter. Whitman sacralized precisely what orthodox Protestantism most disciplined — the desiring male body — and made it the holy bond of the democratic nation. Whether this is best read as a genuine spiritualization of eros or as religious and political language pressed into service to legitimate (and partly conceal) homosexual desire is the live interpretive question, and the honest answer is that it is plausibly *both at once*, written by a man before the modern hetero/homosexual binary had hardened into the alternatives we now assume. The fusion of the erotic and the sacred is exactly what makes Whitman's civil religion post-Protestant and not merely a secular political theory.\n\n## Death as the Deepest Theme\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 398\" role=\"img\" aria-label=\"A single horizontal axis running from TRANSCENDENT on the left, where the sacred is above and behind events, to IMMANENT on the right, where the sacred is within body, comrade, nation and death. A bracket above the whole axis reads: all sacralize the democratic nation; they divide on where the sacred lives. Clustered on the transcendent left are four cards: the Confederate covenant with the favor of Almighty God, Northern millennialism with Armageddon and the redeemer nation, the Black church with Exodus and Jubilee, and Lincoln with inscrutable providence. Alone on the immanent right, after a wide gap, sits Whitman: the body, the comrade, the dark mother, every man his own priest.\">\n<text x=\"350\" y=\"30\" text-anchor=\"middle\" font-size=\"15\" class=\"t-serif\" letter-spacing=\"3\" font-family=\"var(--display)\">WHERE THE SACRED LIVES<\/text>\n<text x=\"350\" y=\"48\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">Whitman&#8217;s religion of democracy beside the providential civil religions around it<\/text>\n<path d=\"M110,72 L110,64 L620,64 L620,72\" fill=\"none\" class=\"ln\" stroke-width=\"1\"/>\n<text x=\"365\" y=\"60\" text-anchor=\"middle\" font-size=\"9\" class=\"t-muted\" letter-spacing=\"1\" font-family=\"var(--display)\">ALL SACRALIZE THE DEMOCRATIC NATION &#8212; THEY DIVIDE ON WHERE THE SACRED LIVES<\/text>\n<g font-family=\"var(--body)\">\n<line x1=\"132\" y1=\"250\" x2=\"132\" y2=\"150\" class=\"ln-soft\" stroke-width=\".75\"/>\n<rect x=\"80\" y=\"100\" width=\"104\" height=\"50\" class=\"f-panel s-t1\" stroke-width=\"1.2\"/>\n<rect x=\"80\" y=\"100\" width=\"5\" height=\"50\" class=\"f-t1\"/>\n<text x=\"135\" y=\"120\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">Confederate<\/text>\n<text x=\"135\" y=\"132\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">covenant<\/text>\n<text x=\"135\" y=\"144\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\" font-style=\"italic\">&#8216;favor of Almighty God&#8217;<\/text>\n<line x1=\"236\" y1=\"250\" x2=\"236\" y2=\"220\" class=\"ln-soft\" stroke-width=\".75\"/>\n<rect x=\"184\" y=\"170\" width=\"104\" height=\"50\" class=\"f-panel s-t3\" stroke-width=\"1.2\"/>\n<rect x=\"184\" y=\"170\" width=\"5\" height=\"50\" class=\"f-t3\"/>\n<text x=\"239\" y=\"190\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">Northern<\/text>\n<text x=\"239\" y=\"202\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">millennialism<\/text>\n<text x=\"239\" y=\"214\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\" font-style=\"italic\">Armageddon &#183; redeemer nation<\/text>\n<line x1=\"340\" y1=\"250\" x2=\"340\" y2=\"150\" class=\"ln-soft\" stroke-width=\".75\"/>\n<rect x=\"288\" y=\"100\" width=\"104\" height=\"50\" class=\"f-panel s-t5\" stroke-width=\"1.2\"/>\n<rect x=\"288\" y=\"100\" width=\"5\" height=\"50\" class=\"f-t5\"/>\n<text x=\"343\" y=\"120\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">The Black<\/text>\n<text x=\"343\" y=\"132\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">church<\/text>\n<text x=\"343\" y=\"144\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\" font-style=\"italic\">Exodus &amp; Jubilee<\/text>\n<line x1=\"444\" y1=\"250\" x2=\"444\" y2=\"220\" class=\"ln-soft\" stroke-width=\".75\"/>\n<rect x=\"392\" y=\"170\" width=\"104\" height=\"50\" class=\"f-panel s-t2\" stroke-width=\"1.2\"/>\n<rect x=\"392\" y=\"170\" width=\"5\" height=\"50\" class=\"f-t2\"/>\n<text x=\"447\" y=\"190\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">Lincoln<\/text>\n<text x=\"447\" y=\"202\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">inscrutable<\/text>\n<text x=\"447\" y=\"213\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">providence<\/text>\n<line x1=\"598\" y1=\"250\" x2=\"598\" y2=\"202\" class=\"ln-soft\" stroke-width=\".75\"/>\n<rect x=\"522\" y=\"120\" width=\"152\" height=\"82\" class=\"f-t4\" opacity=\".2\"/>\n<rect x=\"522\" y=\"120\" width=\"152\" height=\"82\" fill=\"none\" class=\"s-t4\" stroke-width=\"1.6\"/>\n<text x=\"598\" y=\"142\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\" font-family=\"var(--display)\" style=\"fill:var(--t4)\">WHITMAN<\/text>\n<text x=\"598\" y=\"160\" text-anchor=\"middle\" font-size=\"9\" class=\"t-muted\" font-style=\"italic\">the body &#183; the comrade<\/text>\n<text x=\"598\" y=\"173\" text-anchor=\"middle\" font-size=\"9\" class=\"t-muted\" font-style=\"italic\">the dark mother &#183; the grass<\/text>\n<text x=\"598\" y=\"192\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">&#8216;every man his own priest&#8217;<\/text>\n<\/g>\n<line x1=\"88\" y1=\"250\" x2=\"648\" y2=\"250\" class=\"s-t2\" stroke-width=\"1.6\"/>\n<path d=\"M88,250 l12,-5 l0,10 Z\" class=\"f-t2\"/>\n<path d=\"M648,250 l-12,-5 l0,10 Z\" class=\"f-t4\"/>\n<line x1=\"503\" y1=\"244\" x2=\"503\" y2=\"256\" class=\"ln\" stroke-width=\"1\" stroke-dasharray=\"2 3\"/>\n<line x1=\"515\" y1=\"244\" x2=\"515\" y2=\"256\" class=\"ln\" stroke-width=\"1\" stroke-dasharray=\"2 3\"/>\n<text x=\"509\" y=\"270\" text-anchor=\"middle\" font-size=\"7.5\" class=\"t-muted\" font-style=\"italic\">the leap<\/text>\n<text x=\"92\" y=\"284\" font-size=\"10\" font-weight=\"bold\" style=\"fill:var(--t2)\">&#9664; TRANSCENDENT<\/text>\n<text x=\"92\" y=\"297\" font-size=\"8.5\" class=\"t-muted\">the sacred is above &amp; behind events<\/text>\n<text x=\"644\" y=\"284\" text-anchor=\"end\" font-size=\"10\" font-weight=\"bold\" style=\"fill:var(--t4)\">IMMANENT &#9654;<\/text>\n<text x=\"644\" y=\"297\" text-anchor=\"end\" font-size=\"8.5\" class=\"t-muted\">the sacred is within the body &amp; the world<\/text>\n<text x=\"350\" y=\"358\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">Lincoln and the churches asked what <tspan font-style=\"italic\" font-weight=\"bold\">God<\/tspan> willed for the nation;<\/text>\n<text x=\"350\" y=\"374\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">Whitman asked the <tspan font-weight=\"bold\">nation<\/tspan> &#8212; its bodies, its comrades, its dead &#8212; to become the locus of the divine.<\/text>\n<text x=\"350\" y=\"392\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">Claim 4.12 &#183; the corpus&#8217;s synthesis point<\/text>\n<\/svg>\n<figcaption><strong>Fig. 6.<\/strong> The whole corpus resolves onto one axis. Confederate covenant, Northern millennialism, the Black church&#8217;s Exodus, and Lincoln&#8217;s hidden God all sacralize the nation by locating the holy <em>above<\/em> it. Whitman performs the same sacralization but routes it through the body, comradeship, and a naturalized death &#8212; the post-Protestant, immanent wing of American civil religion, separated from the rest by a single decisive leap.<\/figcaption>\n<\/figure>\n\n\nBeneath the body and comradeship lies the deepest stratum of Whitman's religion: death. From the first edition, death in Whitman is not the Christian rupture between this life and a judged eternity but a benign continuity — a merging back into the material cosmos. \"Song of Myself\" closes with the poet dissolving into the vegetal cycle: \"I bequeath myself to the dirt to grow from the grass I love, / If you want me again look for me under your boot-soles\" [8]. There is no heaven here, and no need of one; the self returns to the grass and is therefore never lost. In \"Out of the Cradle Endlessly Rocking\" (1859), the sea — a \"savage old mother,\" \"some old crone rocking the cradle\" — whispers to the boy-poet \"the low and delicious word death... the word of the sweetest song,\" and it is from this maternal teaching of death that the poet's vocation is born [16]. Death is not the enemy of meaning; it is its source.\n\nThe Civil War subjected this serene cosmic optimism to the severest possible test and, remarkably, deepened rather than broke it. Whitman's years among the wounded and dying in the Washington hospitals — which he called \"the very centre, circumference, umbilicus, of my whole career,\" and recorded in *Specimen Days* with the famous conviction that \"the real war will never get in the books\" — gave his death-theology a weight of witnessed suffering it had not earned in 1855 [17]. The culmination is the \"carol of death\" embedded in the Lincoln elegy \"When Lilacs Last in the Dooryard Bloom'd\" (1865). There the poet does not promise the slain President or the war's dead a resurrection; he welcomes \"lovely and soothing death,\" praises \"the sure-enwinding arms of cool-enfolding death,\" and personifies death as \"the dark mother always gliding near with soft feet\" — a maternal deliverer to be sung in gratitude, not feared [18].\n\nThis is the most important convergence-and-divergence point in the entire corpus. Drew Gilpin Faust (document `02`) has shown how the war's mass, anonymous, industrial death shattered the antebellum Protestant \"Good Death\" and drove a grieving nation toward spiritualism, a new cult of the dead, and a crisis of consolation. Whitman supplies, in poetry, the *theology that crisis demanded*. He cannot offer the simple Christian resurrection that the scale of slaughter had made hard to assume; instead he offers a naturalistic, maternal, reassuring death — a merging into the dark mother and the leaves of grass that asks for praise rather than terror. Set beside Lincoln's Second Inaugural, the divergence is stark and clarifying: Lincoln reads the war's death as the inscrutable, chastening judgment of a hidden God; Whitman reads it as merciful merging into a benign cosmos. Both are responses to the same unbearable fact; they represent the transcendent and the immanent poles of how Civil War America tried to make its dead mean something.\n\n## *Democratic Vistas* (1871): The Postwar Jeremiad\n\nWhatever cosmic confidence Whitman carried through the war, the peace nearly broke it. *Democratic Vistas*, published as a pamphlet in 1871 from essays written in 1867–68 — partly as a riposte to Thomas Carlyle's anti-democratic screed \"Shooting Niagara: and After?\" — is Whitman's reckoning with the disillusion of Reconstruction-era America, and it is, read rightly, a *religious* text in the oldest American form: the jeremiad. Its diagnosis of the postwar republic is merciless. \"Society, in these States, is canker'd, crude, superstitious, and rotten,\" he writes; \"we live in an atmosphere of hypocrisy throughout... Genuine belief seems to have left us. The underlying principles of the States are not honestly believed in... nor is humanity itself believed in\" [13][19]. Of the triumphant commercial class he is blunter still: \"The depravity of the business classes of our country is not less than has been supposed, but infinitely greater\" [13]. This is the bard of 1855 confronting the Gilded Age and finding that material success had produced a spiritual void.\n\nThe remedy Whitman proposes is explicitly, insistently religious — and this is what makes *Democratic Vistas* indispensable to the corpus. \"I say at the core of democracy, finally, is the religious element. All the religions, old and new, are there\" [13][20]. Democracy, for the postwar Whitman, is not the *replacement* of religion but its *fulfillment*: he calls the needed future a \"sublime and serious Religious Democracy\" and insists that beneath \"the political and productive and intellectual bases of the States\" there must be laid \"a religious and moral character\" [19]. But — consistent with his founding anti-clericalism — the priests of this religious democracy are not to be clergy. They are to be writers: a future class \"of native authors, literatuses... far higher in grade than any yet known, sacerdotal, modern, fit to cope with our occasions... permeating the whole mass of American mentality, taste, belief\" [19]. The poet-priest of 1855 has become a whole projected priesthood of \"literatuses,\" charged with supplying the spiritual character that democracy's material success had failed to generate.\n\nM. Wynn Thomas's *The Lunar Light of Whitman's Poetry* (1987) supplies the material backstory to this disillusion: Whitman's democratic ideals had been \"painfully eroded by rapidly expanding urban capitalism\" that, even before the war, threatened the economic and political standing of the ordinary American whom his poetry had exalted; the postwar essay is the reckoning with that erosion [30]. *Democratic Vistas* is thus the point at which the bardic optimist confronts the political economy of the Gilded Age and concludes that material and even political democracy, achieved, are insufficient — that without a *religious and moral* reconstruction of character, the republic the war had preserved would rot from within.\n\nThe form is the classic American jeremiad that the corpus meets elsewhere in the Puritan-descended Protestant tradition: present declension denounced, measured against a covenantal promise, with a call to repentance and renewal. Whitman's variation is that his covenant is democratic and his redeemers are poets. He coins \"personalism\" for the strong, spiritually realized individuality that a leveling mass democracy must cultivate as its counterweight, and he projects a future \"strong and sweet female race, a race of perfect mothers\" alongside the new democratic men [13][19]. And running beneath the whole essay is a confession: the immanent democratic faith proclaimed so confidently in 1855–60 had *not* been realized. \"The fruition of democracy, on aught like a grand scale, resides altogether in the future\" [13]. *Democratic Vistas* is the document in which Whitman's civil religion turns from prophecy to penitence — and insists, against his own disillusion, that only a *religious* reconstruction of democratic culture, led by a sacerdotal literature, could redeem the republic the war had saved but the peace was corrupting.\n\n## Influence and Reception\n\nWhitman's wager — that democracy could be a religion and the poet its priest — outlived him and became a recognizable strand of American thought. The clearest institutional ratification came from William James. In *The Varieties of Religious Experience* (1902), the founding text of the American academic study of religion, James made Whitman his leading exhibit of \"the religion of healthy-mindedness\" — the temperament that finds the divine directly in nature and ordinary life and experiences \"the goodness of life\" as a kind of grace. James called healthy-mindedness \"America's main contribution to religion\" and traced it \"from the transcendentalists Emerson and Whitman to Mary Baker Eddy's Christian Science,\" even as he registered a critic's reservation: Whitman's optimism was \"too voluntary and defiant,\" carrying \"a touch of bravado and an affected twist\" [21][22]. James thus did precisely what Whitman's hostile critics resisted — he treated Whitman *as a religious type*, and placed him at the head of a distinctively American religious tradition.\n\nJohn Dewey carried the democratic-religious reading forward. The philosopher who insisted that democracy was \"a way of life\" rather than a mere mechanism of government counted Whitman among his \"apostles of democracy\" (with Jefferson) and as the prophet of a \"spiritual democracy\" — democracy understood as the shared realization of meaning in common experience. Steven Rockefeller's *John Dewey: Religious Faith and Democratic Humanism* (1991) documents Dewey's own \"religious faith in democracy\" and its deep kinship with Whitman's vision [23][24]. The line continues into contemporary political philosophy: Jeffrey Stout's *Democracy and Tradition* (2004) places Whitman, with Emerson, James, and Dewey, in a tradition of \"democratic piety\" or \"democratic faith\" that is religious in temper without being doctrinally Christian [24]. The lineage should not be over-systematized — these thinkers differ profoundly — but it is no accident that the major American philosophers of democracy after Whitman reached for *him* when they wanted to name democracy as a spiritual faith.\n\nThis is the genealogy that runs into Robert Bellah's \"Civil Religion in America\" (1967), the essay that gave the phenomenon its enduring name. Bellah described an \"elaborate and well-institutionalized civil religion\" existing alongside but distinct from the churches — a public faith, descended from Rousseau and Tocqueville, that sacralizes the national community through shared beliefs, symbols, and rituals [25][26]. Bellah's own exhibits were chiefly presidential (Lincoln above all) and ritual, not Whitman; but the *substance* he theorized — democracy and nation sacralized, the war dead consecrated to the national covenant, a public faith parallel to the churches — is what Whitman had tried to compose in verse a century earlier. Commentators routinely place Whitman in this family: his \"Religious Democracy\" means \"not religion in government, but rather democracy as religion,\" a civic faith in the lineage of \"William James, Herbert Croly, John Dewey, and, of course, Walt Whitman\" [27]. Within Bellah's category, Whitman marks the *post-Protestant, immanent* edge: where the mainstream of American civil religion is built from providential and covenantal materials (Lincoln's theology, Gettysburg's consecration), Whitman routes the same sacralizing impulse through the body, comradeship, and a naturalized death.\n\nHis reach was never only American. As Gay Wilson Allen and Ed Folsom document in *Walt Whitman and the World* (1995), \"no American writer has been more influential in more nations than Whitman\" — translated into French, German, Spanish, Italian, Japanese, and Chinese, and naturalized into each tradition until he \"ceases to sound narrowly American\" [28]. British socialists such as Edward Carpenter and Ernest Rhys received him as a prophet of democratic comradeship and (for Carpenter) of homosexual love and cosmic spirituality; in the Spanish-speaking world José Martí's 1887 essay and later Pablo Neruda made him the bard of New World democracy; later poets from Hart Crane and Allen Ginsberg (whose \"A Supermarket in California\" addresses Whitman directly as \"dear father, graybeard, lonely old courage-teacher\") to countless others claimed him as ancestor [28]. Crucially, the international reception fastened on the very religious-democratic core analyzed here — the sacred body, comradeship, this-worldly spirituality, democracy as faith — confirming that Whitman had built something received as a transferable spiritual-political vision rather than a parochial Americana.\n\nTwo large disputes remain, and the corpus keeps them open. The first is whether Whitman is finally a *religious* prophet or a *secular* democrat. The religious reading — from his \"hot little prophet\" disciples to Kuebrich's *Minor Prophecy* and Hutchinson's shamanism — takes the new religion as sincere and literal. The secular reading — Erkkila and much materialist criticism — takes the religious vocabulary as the available idiom for an essentially political and aesthetic democratic project. The most defensible position is that the binary is partly anachronistic: Whitman wrote at the very moment the line between the religious and the secular was being renegotiated in America, and his distinctive achievement was to occupy and blur that line — to make democracy carry the affective and consolatory weight that orthodox religion was shedding, without committing to supernatural doctrine. He is the poet of the threshold, which is exactly why he belongs at the center of a history of how a Protestant providential nation acquired a civil religion. The second open dispute — the precise nature of the erotic comradeship at the core of that civil religion — is treated at full strength in Claim 4.5 and the body section above, and is likewise left unresolved, because resolving it artificially would falsify both the texts and the man.\n\n## Open Questions\n\n1. **Sincere religion or strategic metaphor?** Did Whitman literally intend to found a new religion (Kuebrich, the early disciples), or is \"religion of democracy\" a powerful metaphor for democratic culture and devotion (Erkkila, materialist criticism)? The texts support both; the question turns on how much authorial weight to put on the 1857 \"new Bible\" notebook and the \"inaugurate a religion\" lines versus the demonstrably political and aesthetic functions of the same poems.\n\n2. **How far does the influence actually run?** The James–Dewey–Bellah \"religion of democracy\" lineage is real, but how much is genuine descent *from Whitman* and how much is a shared response to the same American conditions? Bellah did not centrally credit Whitman; the genealogy is partly retrospective construction. A rigorous reception study would distinguish direct influence from family resemblance.\n\n3. **The erotic and the sacred — one thing or two?** Is the homoerotic content of \"Calamus\" the *substance* of Whitman's spiritualized comradeship, a sublimated energy redirected into democratic feeling, or a desire concealed beneath religious-political language? The pre-modern-binary character of Whitman's sexuality makes any single answer suspect; the productive work is on how the fusion *functioned*, not on assigning him a modern category.\n\n4. **Race and the limits of \"adhesiveness.\"** Whitman's democratic civil religion coexisted with documented racial prejudice and ambivalence about Black citizenship (noted in recent scholarship on \"spiritual democracy and the contradiction in his attitudes toward race\"). How does the universalist rhetoric of comradeship square with these limits, and does it converge with or diverge from the Black church's redemptive providentialism (document `02`)? This is a major gap deserving its own treatment.\n\n5. **Whitman versus Lincoln as the era's civil-religious center.** Bellah and most civil-religion scholarship treat *Lincoln* as the central American civil-religious figure. Is Whitman a rival center, a complementary (immanent) wing, or a marginal literary tributary to a fundamentally Lincolnian/Protestant-providential mainstream? The corpus's synthesis (Claim 4.12) proposes \"immanent wing,\" but the relative weighting is genuinely arguable.\n\n6. **The war's exact causal role in Whitman's death-theology.** The death-as-merging theme predates the war (1855, 1859). Did the hospital years *transform* the theology or merely *confirm and deepen* an existing one? Close textual comparison of pre-war and *Drum-Taps*/\"Lilacs\" treatments of death (largely a document `03` question) would sharpen this.\n\n7. **\"Religious Democracy\" as a phrase versus a concept.** The exact two-word phrase \"Religious Democracy\" is sometimes attributed to *Democratic Vistas* in secondary sources, while the verbatim text more reliably yields \"at the core of democracy... is the religious element\" and cognate formulations. A definitive collation against the 1871 first edition (and the 1882 *Specimen Days & Collect* reprinting) would settle which formulations are Whitman's own words versus scholarly paraphrase. (Flagged as a verification item.)\n\n## Sources\n\n*Tier 1 — Whitman's texts (primary), via the Walt Whitman Archive (whitmanarchive.org) and authoritative public-domain editions. Quotations checked against these; the 1871 first edition of* Democratic Vistas *is the controlling text for that work.*\n\n1. Walt Whitman, notebook of 1857, \"The great construction of the New Bible,\" discussed in David S. Reynolds, *Walt Whitman's America: A Cultural Biography* (Knopf, 1995); and the Walt Whitman Archive, \"Bible, The\" and \"Leaves of Grass, 1860 edition\" encyclopedia entries. https://whitmanarchive.org/item/encyclopedia_entry374 ; https://whitmanarchive.org/item/encyclopedia_entry23 (accessed 2026-05-30).\n2. Walt Whitman Archive, \"Leaves of Grass, 1860 edition\" (on the Bible-imitating form: numbered clusters and verses; the \"Bible of the New Religion\"). https://whitmanarchive.org/item/encyclopedia_entry23 (accessed 2026-05-30).\n3. Herbert J. Levine, \"Union and Disunion in 'Song of Myself'\" and related work on Whitman's \"bible\" of democracy, as summarized in Whitman Archive criticism. (Secondary, Tier 2.)\n4. Walt Whitman, \"Starting from Paumanok\" (1860), *Leaves of Grass*: \"I too, following many and follow'd by many, inaugurate a religion, I descend into the arena\"; \"I say the whole earth and all the stars in the sky are for religion's sake.\" Walt Whitman Archive. https://whitmanarchive.org/item/ppp.00270_00280 (accessed 2026-05-30).\n5. Walt Whitman, Preface to *Leaves of Grass* (1855): \"The United States themselves are essentially the greatest poem\"; \"There will soon be no more priests... every man shall be his own priest\"; \"The American bards shall be marked for generosity and affection...\"; \"The spirit receives from the body just as much as it gives to the body.\" Walt Whitman Archive. https://whitmanarchive.org/item/ppp.00271_preface (accessed 2026-05-30).\n8. Walt Whitman, \"Song of Myself,\" *Leaves of Grass* (1855): the grass as \"the flag of my disposition\" / \"the handkerchief of the Lord\" / \"itself a child\"; \"If I worship one thing more than another it shall be the spread of my own body\"; \"I bequeath myself to the dirt to grow from the grass I love, / If you want me again look for me under your boot-soles.\" Walt Whitman Archive; Academy of American Poets (poets.org/poem/song-myself-6-child-said-what-grass). (accessed 2026-05-30).\n8a. Walt Whitman, \"Song of Myself,\" *Leaves of Grass* (1855; quoted from the standard text): \"Walt Whitman, a kosmos, of Manhattan the son...\"; \"Divine am I inside and out, and I make holy whatever I touch or am touch'd from... This head more than churches, bibles, and all the creeds\"; \"In the faces of men and women I see God, and in my own face in the glass\"; \"Logic and sermons never convince...\" Walt Whitman Archive (whitmanarchive.org/item/ppp.00707_00733); The Poetry Foundation (poetryfoundation.org/poems/45477/song-of-myself-1892-version); Encyclopaedia Britannica entry \"Song of Myself\" used as navigation/analysis only. (accessed 2026-05-30).\n13. Walt Whitman, *Democratic Vistas* (Washington, D.C., 1871): \"the depravity of the business classes of our country is not less than has been supposed, but infinitely greater\"; \"Society, in these States, is canker'd, crude, superstitious, and rotten\"; \"we live in an atmosphere of hypocrisy throughout\"; \"Genuine belief seems to have left us...\"; \"I say at the core of democracy, finally, is the religious element. All the religions, old and new, are there\"; \"another half, which is adhesiveness or love, that fuses, ties and aggregates, making the races comrades\"; \"the fruition of democracy, on aught like a grand scale, resides altogether in the future\"; \"personalism\"; \"a race of perfect mothers.\" Full text, Internet Archive (1871 ed.). https://archive.org/stream/aberpa.whitmanw.1871.vistas/aberpa.whitmanw.1871.vistas_djvu.txt ; reading text at monadnock.net/whitman/democratic-vistas.html (accessed 2026-05-30).\n14. Walt Whitman, \"For You O Democracy\" / \"Calamus\" cluster (1860), *Leaves of Grass*: \"I will make the continent indissoluble...\"; \"By the love of comrades, by the manly love of comrades.\" Walt Whitman Archive, \"'For You O Democracy' (1860).\" https://whitmanarchive.org/item/encyclopedia_entry457 (accessed 2026-05-30).\n16. Walt Whitman, \"Out of the Cradle Endlessly Rocking\" (1859/1860): the sea as \"savage old mother\" whispering \"the low and delicious word death... the word of the sweetest song and all songs.\" Walt Whitman Archive, encyclopedia entry 43; Wikipedia entry (used only as navigation to the primary text). https://whitmanarchive.org/item/encyclopedia_entry43 (accessed 202
