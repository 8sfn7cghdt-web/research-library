numbering. (Full text behind verification; summary consulted.)\n19. *The Poems of Emily Dickinson: Variorum Edition*, ed. R. W. Franklin (Belknap Press, 1998), publisher/bookseller descriptions. https://www.hup.harvard.edu/books/9780674676220 ; https://www.abebooks.com/9780674676220/ — Accessed 2026-06-13. **Tier 1/2.** 1,789 poems; ~2,500 source documents; three volumes; new dating and \"Fr\" numbering.\n20. *The Poems of Emily Dickinson: Reading Edition*, ed. R. W. Franklin (Belknap Press, 1999). https://www.hup.harvard.edu/books/9780674018242 — Accessed 2026-06-13. **Tier 1/2.** One-volume reading text carrying corrected texts and Fr numbering to general readers.\n21. Howe, Susan. *My Emily Dickinson* (North Atlantic Books, 1985; repr. New Directions). Publisher/record. https://www.ndbooks.com/book/my-emily-dickinson/ — Accessed 2026-06-13. **Tier 1/2** (primary critical text). Manuscripts as \"visual productions\"; the founding statement of the manuscript/visual reading.\n22. Poetry Foundation. \"Studies in Scale\" and \"The Emily Dickinsons\" (on *The Gorgeous Nothings* and manuscript editing). https://www.poetryfoundation.org/poetrymagazine/articles/70065/studies-in-scale ; https://www.poetryfoundation.org/poetrymagazine/articles/70105/the-emily-dickinsons — Accessed 2026-06-13. **Tier 2/5.** Werner/Bervin/Howe envelope-poems project; Howe's preface argument; the manuscript turn.\n23. New Directions. *The Gorgeous Nothings: Emily Dickinson's Envelope Poems* (2013), publisher description. https://www.ndbooks.com/book/the-gorgeous-nothings/ — Accessed 2026-06-13. **Tier 1/2** (primary edition + publisher apparatus). First full-color facsimile edition; 52 envelope writings, actual size, with transcriptions.\n24. Poetry Foundation. \"Announcing: The Emily Dickinson Archive.\" https://www.poetryfoundation.org/harriet-books/2013/10/announcing-the-emily-dickinson-archive — Accessed 2026-06-13. **Tier 2/5.** 2013 launch; multi-institution aggregation.\n25. US News & World Report. \"Emily Dickinson Online Archive Offers New Tools For Scholars\" (Oct. 23, 2013). https://www.usnews.com/news/articles/2013/10/23/emily-dickinson-online-archive-offers-new-tools-for-scholars — Accessed 2026-06-13. **Tier 4** (major outlet). Independent confirmation of the launch date and multi-library scope.\n\n*Note on Betsy Erkkila's* The Wicked Sisters: Women Poets, Literary History, and Discord *(Oxford UP, 1992): the brief named in this workstream lists Erkkila as a preferred source for the Todd/Bianchi feud. The book's chapter on Dickinson reads the editorial feud and the Susan/Mabel/Bianchi conflicts as a case study in \"discord\" among women in literary history. I located the book's bibliographic record and general thesis but was not able to consult its Dickinson chapter directly here; its specific arguments are flagged in `primary_texts_not_consulted` for gap-fill. The feud narrative above rests on the Museum, Longsworth, and the New England Historical Society / OUP accounts rather than on Erkkila.*"}, {"order": 7, "file": "07_Reception_and_Cultural_Afterlife.md", "title": "Reception, Scholarship, and Cultural Afterlife", "summary": "", "body": "# Reception, Scholarship, and the Cultural Afterlife of Emily Dickinson\n\n## Bottom Line\n\nEmily Dickinson published almost nothing in life, yet her entire reputation is a posthumous construction — assembled and reassembled by successive generations who each found the Dickinson they needed. The arc runs from a qualified, faddish popularity in the 1890s, when editors tidied her into a \"local-color\" minor poet, through a 1920s–30s modernist rediscovery, a 1930s–40s New Critical canonization (Allen Tate, R. P. Blackmur, Yvor Winters), the watershed of Thomas Johnson's 1955 scholarly edition, and a mid-century elevation to undisputed first rank. From the mid-1970s, feminist criticism (Adrienne Rich's \"Vesuvius at Home,\" Gilbert & Gubar's *The Madwoman in the Attic*) recast her as a woman writer wrestling a patriarchal tradition. From the 1980s, a manuscript/genetic-text school (Susan Howe, Martha Nell Smith, Marta Werner, Jerome McGann) argued the printed page had betrayed the handwritten one. From the 1990s, queer scholarship reopened the lifelong relationship with Susan Gilbert Dickinson. In the popular imagination she now stands beside Whitman as a twin founder of an American poetic voice, anchored by the Emily Dickinson Museum in Amherst and dramatized across a half-century of screen and stage — William Luce's *The Belle of Amherst* (1976), Terence Davies's *A Quiet Passion* (2016), and Apple TV+'s anachronistic, queer, Gen-Z *Dickinson* (2019–2021). Each reframing genuinely illuminated something. Each also served the interests of the reframers — editors, critics, a museum, a streaming platform.\n\n---\n\n## 1. The Reputation Arc\n\n### 1.1 The qualified 1890s popularity\n\nWhen Mabel Loomis Todd and Thomas Wentworth Higginson brought out the first *Poems* in 1890, the book sold by surprise — it ran through multiple printings and drew a second series (1891) and a third (1896). But the popularity was qualified in two senses. First, it rested on heavily edited texts: Todd and Higginson invented titles, regularized Dickinson's diction, grammar, meter and rhyme, and smoothed her dashes into conventional punctuation, so the poet the public met was substantially a nineteenth-century editorial artifact. Second, the contemporary critical frame filed her as an \"ephemeral curiosity\" — a charmingly eccentric New England spinster-poet, a regional or \"local-color\" figure whose oddities were either patronized or treated as faults to be corrected. The standard scholarly reading of the 1890s reception (Willis Buckingham's documentary history) holds that critics found her style simply too irregular to take wholly seriously, and read her in terms of \"lack.\" (See **Claim 1.1**.)\n\n### 1.2 The 1920s–30s revival\n\nDickinson's reputation faded after the 1890s vogue, then revived in the 1910s–20s as Imagism and modernism made her compression, her ellipses, and her refusal of ornament look prophetic rather than amateurish. Hart Crane and Allen Tate were among the first major writers to register her as a great poet rather than a curiosity. The 1924 *Complete Poems* (edited by her niece Martha Dickinson Bianchi) and the 1929 *Further Poems* kept new material in circulation, and by the early 1930s the rising generation claimed her as a precursor. (See **Claim 1.2**.)\n\n### 1.3 New Critical canonization: Tate, Blackmur, Winters\n\nThe decisive institutional capture came from the New Critics, whose close-reading method suited a poet of dense, self-contained, ambiguity-rich lyrics almost perfectly. Allen Tate's essay — first published in 1928 and reworked into the much-cited \"New England Culture and Emily Dickinson\" / \"Emily Dickinson\" essay collected in *Reactionary Essays on Poetry and Ideas* (1936) — read her great poems as the product of a unique historical moment, when Puritan theology was decaying into a usable tension. R. P. Blackmur's \"Emily Dickinson: Notes on Prejudice and Fact\" appeared in the *Southern Review* in 1937 (collected in *The Expense of Greatness*, 1940); Yvor Winters and Cleanth Brooks also weighed in. Their collective verdict — that her best work was first-rate but unevenly distributed across a body of writing containing much that was careless or private — both elevated her and set the terms of debate for decades. (See **Claim 1.3**.)\n\n### 1.4 The 1955 watershed and mid-century elevation\n\nThe single most consequential scholarly event was Thomas H. Johnson's three-volume variorum *The Poems of Emily Dickinson* (Harvard/Belknap, 1955) — the first edition to restore, as far as the editor could determine, Dickinson's own spelling, capitalization, dashes, and chronology, and to present 1,775 poems with their variants rather than a single smoothed text. Johnson's *Letters* followed in 1958. For the first time, scholars and general readers could reach something close to what Dickinson actually wrote, and the effect on her standing was immediate and permanent. The 1955 edition is routinely described as the foundation of modern Dickinson studies; R. W. Franklin, introducing his own 1998 variorum, called it \"a landmark in Dickinson studies… an outstanding achievement.\" From the late 1950s onward, Dickinson moved from \"important minor poet\" to one of the two or three indispensable nineteenth-century American poets — ubiquitous in anthologies, syllabi, and the critical literature. (See **Claim 1.4**.)\n\n---\n\n## 2. The Major Scholarly Turns\n\n### 2.1 Feminist criticism: Rich and Gilbert & Gubar\n\nThe most transformative reframing after the New Critics was feminist. Adrienne Rich's essay \"Vesuvius at Home: The Power of Emily Dickinson\" — first printed in *Parnassus: Poetry in Review* in 1976 and collected in *On Lies, Secrets, and Silence* (1979) — refused the prevailing image of Dickinson as a pathetic or eccentric recluse. It read her instead as a deliberate, powerful artist who chose seclusion to protect her work. Rich's governing claim was that poetry was the *primary* purpose of Dickinson's life — not a byproduct of thwarted romance or illness — and that a woman reader, attentive to the conditions of nineteenth-century female creativity, could see what male-centered criticism had missed. The title comes from Dickinson's own volcanic imagery (\"A still — Volcano — Life —\"). (See **Claim 2.1**.)\n\nThree years later, Sandra M. Gilbert and Susan Gubar's *The Madwoman in the Attic: The Woman Writer and the Nineteenth-Century Literary Imagination* (Yale University Press, 1979) made Dickinson the culminating figure in a sweeping argument about how nineteenth-century women writers — Austen, Mary Shelley, the Brontës, George Eliot, Barrett Browning, Rossetti — coped with a literary tradition that cast authorship as male. Gilbert drafted the Dickinson chapters and the \"Aesthetics of Renunciation\" chapter, reading Dickinson's renunciatory poses and her self-presentation as a theatrical \"madwoman\" performance that turned the constraints imposed on women into poetic power. The book became one of the founding texts of academic feminist literary criticism. (See **Claim 2.2**.)\n\nBoth works drew later critique. Betsy Erkkila's *The Wicked Sisters: Women Poets, Literary History, and Discord* (Oxford University Press, 1992) argued that the feminist account had romanticized and \"maternalized\" women writers into an idealized sisterhood, and reclaimed Dickinson's life and the female literary tradition as sites of class privilege, rivalry, and political conservatism — Dickinson was a Whig grandee's daughter, not a natural radical. Later critics (e.g., Lucia Aiello) faulted Gilbert & Gubar for conflating Dickinson with her poems' speakers, which obscured the poems' formal experiments with the lyric \"I.\" (See **Claim 2.3**.)\n\n### 2.2 The manuscript / genetic-text school\n\nA second, partly overlapping turn came from scholars who argued that the printed editions — Johnson's included — fundamentally misrepresented Dickinson by translating her handwritten pages into conventional typography. The poet Susan Howe's *My Emily Dickinson* (North Atlantic Books, 1985) — a hybrid of criticism, cultural history, and lyric manifesto — insisted that Dickinson's line breaks, spacing, and the visual disposition of words on the manuscript page were intentional and meaning-bearing, and that editors who \"regularized\" them (she had R. W. Franklin's editorial choices partly in view) destroyed the poems' radical form. The book reframed Dickinson as a precursor of avant-garde and Language poetry rather than a Victorian lyricist. (See **Claim 2.4**.)\n\nHowe's intervention helped catalyze a textual-scholarship movement. The textual scholar Martha Nell Smith and others formed an \"Emily Dickinson Editing Collective,\" and Smith co-founded the **Dickinson Electronic Archives** (launched in the mid-1990s) to present digital images of the manuscripts themselves alongside transcriptions. Marta Werner's *Emily Dickinson's Open Folios* (University of Michigan Press, 1995) and her digital edition *Radical Scatters: Emily Dickinson's Fragments and Related Texts, 1870–1886* (1999; relaunched) treated Dickinson's late fragments and envelope-writings as a visual, material practice. Jerome McGann supplied the school's theoretical scaffolding — his theory of the \"bibliographic code\" and his essay \"Dickinson's Visible Language\" / *Black Riders: The Visible Language of Modernism* (1993) — and argued that Dickinson's scripts \"cannot be read as if they were 'printer's copy.'\" At the institutional level, the manuscript turn culminated in the **Emily Dickinson Archive** (edpapers, edickinson.org), an open-access site launched by Harvard's Houghton Library in 2013 that aggregates high-resolution manuscript images from the divided collections. (See **Claim 2.5**.)\n\nThe genetic-text argument is not uncontested. Skeptics (notably Domhnall Mitchell and Marta Werner's critics, and editors aligned with Franklin) reply that some of the \"intentional\" line breaks and lineation are simply the contingencies of paper size and handwriting, and that reading every gap as a prosodic instruction over-reads the evidence. How much of Dickinson's manuscript appearance is *art* and how much is *accident* remains genuinely open. (See **Claim 2.6**.)\n\n### 2.3 Queer scholarship and the Susan relationship\n\nFrom around 1990, scholarship reopened the question of Dickinson's sexuality — and, in particular, her four-decade relationship with her sister-in-law and next-door neighbor, Susan Huntington Gilbert Dickinson. The early academic articles arguing for a homoerotic reading of the Emily–Susan correspondence date to roughly 1990, and two works consolidated the case: Martha Nell Smith's *Rowing in Eden: Rereading Emily Dickinson* (University of Texas Press, 1992), which read Susan as Dickinson's primary intellectual interlocutor, editor, and beloved; and *Open Me Carefully: Emily Dickinson's Intimate Letters to Susan Huntington Dickinson* (Paris Press, 1998), edited by Ellen Louise Hart and Martha Nell Smith, which gathered the surviving correspondence and read it as a sustained record of erotic and creative intimacy. The provocation was partly textual. The first editor, Mabel Loomis Todd, had been Austin Dickinson's mistress and Susan's enemy, and scholars argued that the early editorial history had actively *minimized* Susan's centrality and erased traces of the relationship's intensity. (See **Claim 2.7**.)\n\nThe queer reading is contested in the usual nineteenth-century way. One camp (drawing on Lillian Faderman's *Surpassing the Love of Men*) defines same-sex love broadly enough — \"amorous interest,\" not necessarily genital — that the ardent letters clearly qualify. Another cautions that effusive, physically affectionate language between women was a convention of nineteenth-century romantic friendship, and that reading it through a modern lesbian identity is anachronistic. The evidence is real and substantial — the surviving letters, and the poems Dickinson sent Susan, more than she sent anyone else — but its interpretation depends on contested assumptions about the period. (See **Claim 2.8**.)\n\n### 2.4 Dickinson opposite Whitman\n\nA durable framing — institutionalized in American education — pairs Dickinson with Walt Whitman (1819–1892) as the twin founders of a distinctively American poetic voice, defined by their opposition. Whitman is the poet of expansion: the public, the body, the cataloguing free-verse \"barbaric yawp,\" the open road and the democratic mass. Dickinson is the poet of compression: the private interior, the slant truth, the tight hymn-meter stanza broken from within, the closed room. The pairing is a teaching convenience and a genuine critical insight at once. Between them they map the two poles — centrifugal and centripetal — from which much of later American poetry descends. (Dickinson, notably, was dissuaded from reading Whitman by his scandalous reputation, and told Higginson she \"never read his Book — but was told that he was disgraceful.\") (See **Claim 2.9**.)\n\n---\n\n## 3. The Cultural Afterlife\n\n### 3.1 The Emily Dickinson Museum\n\nThe physical anchor of Dickinson's afterlife is the **Emily Dickinson Museum** in Amherst, Massachusetts, made up of two adjacent houses: **The Homestead** (280 Main Street), the brick house where Dickinson was born, lived, wrote, and died; and **The Evergreens**, next door, the home of her brother Austin, his wife Susan, and their children. The museum was created on July 1, 2003, when ownership of The Evergreens passed from the Martha Dickinson Bianchi Trust to Amherst College, uniting the two properties (the College already partly held the Homestead) under one administration. The merger reunited the three-acre property roughly as Dickinson had known it. The Homestead then underwent a multi-year, multi-million-dollar restoration, culminating in the mid-2020s, that returned rooms — including Dickinson's bedroom, where she did most of her writing — to their 1850s–1880s appearance. Both a scholarly site and a pilgrimage destination, the museum is central to how the general public physically encounters Dickinson. (See **Claim 3.1**.)\n\n### 3.2 *The Belle of Amherst* (1976)\n\nThe most influential twentieth-century stage portrait was William Luce's one-woman play *The Belle of Amherst*, which opened on Broadway at the Longacre Theatre on April 28, 1976, directed by Charles Nelson Reilly, with Julie Harris playing Dickinson and voicing all fifteen characters. Harris won the 1977 Tony Award for Best Actress in a Play and a 1978 Grammy for the recording; a televised version aired on PBS. The play assembled Dickinson's poems, letters, and diary fragments into a warm, witty, accessible monologue — and in doing so cemented the popular image of Dickinson as the charming, white-clad, slightly eccentric \"belle.\" That is the very image later scholars and filmmakers would push against. (See **Claim 3.2**.)\n\n### 3.3 *A Quiet Passion* (2016)\n\nTerence Davies's film *A Quiet Passion* (2016), starring Cynthia Nixon as the adult Dickinson (Emma Bell plays the young Emily), offered a darker, more austere portrait: Dickinson as a fiercely intelligent, religiously skeptical woman increasingly constrained by illness, family, and the gender politics of her time, ending in physical suffering. Critics largely praised it. *Time Out* gave it five stars; NPR called it a film in which Davies \"found his ideal subject\"; *Sight & Sound* admired its portrait of a Dickinson \"profoundly mindful of her time's politics of gender and religion.\" Davies explicitly rejected the reductive \"troubled recluse\" narrative in favor of a Dickinson of wit, anger, and spiritual struggle. The film is the prestige-cinema counterpart to *The Belle of Amherst*'s warmth — same subject, opposite temperature. (See **Claim 3.3**.)\n\n### 3.4 *Dickinson* (Apple TV+, 2019–2021)\n\nThe most radical popular reframing is Alena Smith's Apple TV+ series *Dickinson* (three seasons, 30 episodes, 2019–2021), starring Hailee Steinfeld. The show is deliberately, programmatically anachronistic: nineteenth-century costumes and settings collide with contemporary slang, modern pop and hip-hop on the soundtrack, twerking at a barn party, and a Dickinson reconceived as a rebellious, emotionally electric Gen-Z \"original sad girl\" trapped in 1850s Amherst. Crucially, the series places the romantic and erotic relationship between Emily and Sue (Ella Hunt) at its center, treating Dickinson's queerness not as a scholarly hypothesis to be debated but as a given of the show's world. *Dickinson* won a Peabody Award for its first season (2019). The finale (December 24, 2021) sends Emily out to sea in a rowboat in her white dress as she recites her own lines — a frankly mythic send-off. The series translates two decades of feminist and queer Dickinson scholarship into mass-market, youth-targeted television. (See **Claim 3.4** and **3.5**.)\n\n### 3.5 Ubiquity in education and popular memory\n\nBeyond any single adaptation, Dickinson's deepest afterlife is her saturation of American (and global) education and popular memory. She is a fixture of high-school and university survey courses and of every major American-poetry anthology; individual poems (\"Because I could not stop for Death,\" \"I'm Nobody! Who are you?\", \"Hope is the thing with feathers,\" \"Wild Nights – Wild Nights!\", \"I heard a Fly buzz – when I died –\", \"My Life had stood – a Loaded Gun –\") rank among the most taught and most quoted in the language. Her lines circulate as epigraphs, tattoos, greeting-card sentiment, band names, and internet memes. This pedagogical ubiquity — more than any museum or film — is what keeps her continuously available for reinvention. (See **Claim 3.6**.)\n\n---\n\n## 4. Who Benefits From Each Reframing\n\nOne throughline runs through Dickinson's whole reception: each successive reframing illuminated something real while also serving its makers' interests. The point is not cynicism — the readings are mostly *true* — but that \"the real Emily Dickinson\" has always depended partly on who needed her, and for what.\n\n- **Todd & Higginson (1890s)** made her publishable and saleable by smoothing her into a recognizable Victorian poet; the editors gained a literary property and a place in literary history, at the cost of the poet's actual texts.\n- **The New Critics (1930s–40s)** found in her dense, ambiguous lyrics the ideal demonstration object for close reading; canonizing Dickinson helped institutionalize their method and the academic discipline it built.\n- **The feminists (Rich, Gilbert & Gubar, 1970s)** recovered a powerful woman artist and, in doing so, supplied second-wave feminist literary criticism with a founding heroine and a syllabus.\n- **The manuscript school (Howe, Smith, Werner, McGann, 1980s–2010s)** claimed Dickinson for postmodern textual theory and avant-garde poetics — and built careers, archives, and digital editions on the claim that the printed Dickinson was a fraud.\n- **The queer scholars (1990s)** reopened a relationship the earliest (interested) editors had minimized, restoring Susan to the center — work that also served a broader project of recovering a queer literary past.\n- **The Emily Dickinson Museum and Amherst College** steward the houses and manuscripts as scholarly resources and as a tourism-and-prestige asset for the institution and the town.\n- **Apple TV+ and Alena Smith** monetized a public-domain icon for a streaming platform courting a young, progressive audience — a reframing that is both a sincere act of queer recovery and a content strategy. (See **Claim 4.1**.)\n\n---\n\n## Open Questions\n\n1. **How much of the manuscript page is intentional art?** The genetic-text school treats Dickinson's lineation, spacing, and variant-words as deliberate; skeptics read much of it as the accident of paper and pen. No consensus exists, and the question shapes every modern edition.\n2. **Was Dickinson \"queer,\" and in what nineteenth-century sense?** The documentary record (especially the Susan letters and poems) is rich, but its interpretation turns on contested assumptions about romantic friendship vs. lesbian identity. This is unlikely to be \"settled,\" only re-argued.\n3. **Has the popular image (Apple TV+, museum tourism) decoupled from the scholarly one?** The screen Dickinson is now arguably more famous than any reading of her poems; whether mass adaptation deepens or replaces engagement with the texts is an open cultural question.\n4. **Which edition \"wins\"?** Franklin's 1998 reading edition is now standard for scholars, but the manuscript-image archives (Emily Dickinson Archive, Dickinson Electronic Archives) increasingly function as the \"real\" text. The field has not resolved what counts as the authoritative Dickinson.\n5. **Does the Whitman/Dickinson binary still serve, or does it flatten both?** The teaching pairing is durable but may obscure as much as it reveals about each poet.\n\n---\n\n## Sources\n\n1. Willis J. Buckingham (ed.), *Emily Dickinson's Reception in the 1890s: A Documentary History* (University of Pittsburgh Press, 1989); and Domhnall Mitchell / scholarship summarized via JSTOR and the Whitman Archive encyclopedia entry. Tier 2. — The 1890s critical frame (\"local color,\" \"lack,\" editorial smoothing). https://www.jstor.org/stable/jj.5973219 ; https://whitmanarchive.org/criticism/current/encyclopedia/entry_305.html (accessed 2026-06-13).\n2. *Encyclopædia Britannica*, \"Emily Dickinson — Legacy\"; and the Whitman Archive encyclopedia entry on Dickinson. Tier 2 (expert-authored reference). — The 1920s revival; Hart Crane and Allen Tate as early champions; New Critics; mid-century elevation; Whitman pairing. https://www.britannica.com/biography/Emily-Dickinson/Legacy (accessed 2026-06-13).\n3. Dickinson Electronic Archives, \"Journal Articles\" / \"Anthologized Works\" bibliographies; Carlos Baker, \"R. P. Blackmur: A Checklist\" (JSTOR); ProQuest record for Blackmur, \"Emily Dickinson: Notes on Prejudice and Fact,\" *Southern Review* 3 (1937): 323–47. Tier 1–2. — New Critical canonization specifics (Tate, Blackmur 1937, Winters, Brooks). https://www.emilydickinson.org/node/1719 ; https://www.jstor.org/stable/pdf/26400658.pdf (accessed 2026-06-13).\n4. Thomas H. Johnson (ed.), *The Poems of Emily Dickinson*, 3 vols. (Harvard/Belknap, 1955); Emily Dickinson Museum, \"Major Editions of Dickinson's Writings\"; Project MUSE, \"Fading Ratios: Johnson's Variorum Edition.\" Tier 1–2. — The 1955 watershed and Franklin's assessment of it. https://www.emilydickinsonmuseum.org/emily-dickinson/poetry/tips-for-reading/major-editions-of-dickinsons-writings/ ; https:/ lectric.org/volume1/werner/syllabus.html (accessed 2026-06-13).\n10. Emily Dickinson Museum, \"History of the Museum\" and press releases via Amherst College; *Archpaper* on the Evergreens/Homestead restoration (2024). Tier 2–4. — Museum creation (July 1, 2003), the two houses, restoration. https://www.emilydickinsonmuseum.org/the-museum/history-of-the-museum/ ; https://www.archpaper.com/2024/01/emily-dickinsons-family-home-the-evergreens-is-reopening-after-a-preservation-effort-by-mcwb-architects-in-amherst/ (accessed 2026-06-13).\n11. Playbill obituary of William Luce; IBDB production record; *The Belle of Amherst* (Wikipedia citing Tony/Grammy records); IMDb. Tier 3–4 (theatre records / trade press). — Broadway opening (April 28, 1976), Julie Harris, Tony 1977, Grammy 1978. https://playbill.com/article/belle-of-amherst-and-barrymore-playwright-william-luce-dies-at-88 ; https://www.ibdb.com/broadway-production/the-belle-of-amherst-3834 (accessed 2026-06-13).\n12. *A Quiet Passion* reviews — *Time Out*, NPR, *Sight & Sound* (BFI), *Los Angeles Times*. Tier 4–6 (criticism = position-evidence on reception). — Cynthia Nixon, Davies's anti-recluse reading, critical praise. https://www.npr.org/2017/04/13/523323272/a-quiet-passion-dazzles-gradually ; https://www.bfi.org.uk/sight-and-sound/reviews/film-week-quiet-passion-terence-davies-cynthia-nixon-conjure-emily-dickinson-fetters (accessed 2026-06-13).\n13. Apple TV Press release (Nov. 2021); Deadline finale recap; *Variety* on Alena Smith and the show's legacy; *IndieWire*, *Collider*, *Billboard*, *Paste* reviews; Peabody Awards profile. Tier 3–6 (platform press = claim-evidence; reviews = position-evidence). — *Dickinson* run (2019–2021, 3 seasons/30 eps), Peabody 2019, anachronistic queer Gen-Z framing, Emily–Sue centering, finale. https://www.apple.com/tv-pr/news/2021/11/apple-tv-celebrates-third-and-final-season-of-peabody-award-winning-series-dickinson/ ; https://peabodyawards.com/award-profile/dickinson/ ; https://deadline.com/2021/12/dickinson-series-finale-recap-apple-tv-plus-1234900079/ (accessed 2026-06-13).\n14. Academy of American Poets, \"About Emily Dickinson\"; Whitman Archive encyclopedia entry. Tier 2. — The Dickinson/Whitman co-founder framing; \"never read his Book… disgraceful.\" https://poets.org/poet/emily-dickinson (accessed 2026-06-13)."}, {"order": 8, "file": "Future_Trajectory.md", "title": "Future Trajectory — Where Dickinson Scholarship and Her Cultural Standing Are Heading", "summary": "", "body": "# Future Trajectory — Where Dickinson Scholarship and Her Cultural Standing Are Heading\n\n## Bottom Line\n\n> Emily Dickinson's place in the canon is the one thing about her future that is not in doubt. The live questions are about *which* Dickinson prevails — the printed reading-text of the classroom, or the manuscript image of the archive — and about whether her soaring popular profile keeps deepening engagement with the poems or quietly replaces it. Through roughly 2035 the most probable path is consolidation, not revolution: the scholarly center of gravity continues its forty-year drift from the printed page toward the manuscript image and the digital archive; the feminist and queer readings, now fully institutionalized and dramatized for a mass audience, stay dominant while drawing sharper conservative pushback in a polarized curriculum politics; and computational tools begin, modestly at first, to do things to her 2,500 manuscript documents that no human editor could. The structurally unresolvable debates — was the Susan relationship erotic, is the angle of a dash meaning, did she order the fascicles as art — will not be *settled*. They will be re-argued with better images and new methods. The single largest uncertainty is exogenous: the slow contraction of the humanities, which could thin the scholarly throughput even as the popular Dickinson goes supernova.\n\nThis forecast rests on the verified history and current-state map in the preceding documents. Its drivers are traced back to that material; where it speculates, it says so. Forecasts are probability distributions over plausible futures, not predictions, and the probabilities below are calibrated judgments, not measurements.\n\n---\n\n## 1. The Drivers (Why the Future Is Shaped This Way)\n\nFive forces, each documented in the corpus, set the vectors for the next decade.\n\n**Driver 1 — The unfinished editorial question is structural, not temporary.** Dickinson left no authorized text; everything is a posthumous construction (Workstream 06). That means the \"finished text vs. open field\" argument (Workstream 04, §10) cannot be resolved by discovery — there is no lost authorial edition to find. A problem that cannot be solved can only be *re-platformed*, and each new platform (Johnson's variorum, Franklin's facsimile, the 2013 archive) has shifted the ground toward the manuscript. The vector points one way: toward the image.\n\n**Driver 2 — The manuscript/genetic turn now owns the institutional infrastructure.** The Emily Dickinson Archive (2013), the Dickinson Electronic Archives, *The Gorgeous Nothings* (2013), and Miller's fascicle-order edition (2016) mean the manuscript camp no longer merely argues — it controls the canonical access points. Scholars trained after about 2010 met Dickinson as images first. Infrastructure is destiny in textual studies: whatever is easiest to cite becomes the standard.\n\n**Driver 3 — The feminist/queer Dickinson has gone mass-market and irreversible.** What Rich and Gilbert & Gubar argued in the 1970s, and Smith and Hart consolidated in the 1990s, Apple TV+'s *Dickinson* (2019–2021) handed to a global youth audience as a *premise* rather than a thesis (Workstream 07). This reframing is now the default popular Dickinson. It is culturally entrenched — and, precisely because it is entrenched in a polarized moment, it is also a target.\n\n**Driver 4 — The adaptation/tourism economy runs on a public-domain icon.** Dickinson costs nothing to adapt and reliably signals literary prestige plus progressive recovery. The museum's multi-year, multi-million-dollar restoration (completed mid-2020s) is a bet on rising pilgrimage traffic. The economic incentive to keep reinventing her is permanent.\n\n**Driver 5 — The humanities are contracting.** English enrollments and literature-faculty lines have fallen across the Anglophone academy. This is the one driver pointing *against* scholarly vitality, and it is largely exogenous to Dickinson studies. It throttles throughput — fewer monographs, fewer dissertations — without touching her canonical security.\n\nA note on what these drivers *don't* threaten: none of them puts Dickinson's first-rank status at risk. She is locked into the canon beside Whitman by a century of anthologies, syllabi, and criticism (Workstream 07, §1.4, §2.4). The forecast is about the *form* and *vitality* of her future presence, not its existence.\n\n---\n\n## 2. The Scenarios (Through ~2035)\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 300\" role=\"img\" aria-label=\"A horizontal probability-band chart of four forecast scenarios through 2035. Scenario A, the manuscript becomes the text, spans about 40 to 60 percent with a midpoint near 50. Scenario B, computational Dickinson, spans 15 to 30 with a midpoint near 22. Scenario C, pop-culture supernova, spans 12 to 25 with a midpoint near 18. Scenario D, academic contraction, spans 5 to 18 with a midpoint near 10. The bands overlap because scenarios A and B most likely braid together.\">\n<text x=\"350\" y=\"28\" text-anchor=\"middle\" font-size=\"13.5\" class=\"t-serif\" letter-spacing=\"2\">DICKINSON'S TRAJECTORY THROUGH ~2035<\/text>\n<text x=\"350\" y=\"46\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">Calibrated probability bands — the range is the forecast, not a crisp number<\/text>\n<line x1=\"200\" y1=\"72\" x2=\"200\" y2=\"262\" class=\"ln-soft\" stroke-width=\"0.8\"/>\n<line x1=\"315\" y1=\"72\" x2=\"315\" y2=\"262\" class=\"ln-soft\" stroke-width=\"0.8\"/>\n<line x1=\"430\" y1=\"72\" x2=\"430\" y2=\"262\" class=\"ln-soft\" stroke-width=\"0.8\"/>\n<line x1=\"545\" y1=\"72\" x2=\"545\" y2=\"262\" class=\"ln-soft\" stroke-width=\"0.8\"/>\n<line x1=\"660\" y1=\"72\" x2=\"660\" y2=\"262\" class=\"ln-soft\" stroke-width=\"0.8\"/>\n<text x=\"200\" y=\"278\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">0%<\/text>\n<text x=\"315\" y=\"278\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">25%<\/text>\n<text x=\"430\" y=\"278\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">50%<\/text>\n<text x=\"545\" y=\"278\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">75%<\/text>\n<rect x=\"384\" y=\"86\" width=\"92\" height=\"26\" rx=\"2\" class=\"f-t1\" opacity=\".85\"/>\n<line x1=\"430\" y1=\"82\" x2=\"430\" y2=\"116\" class=\"s-t1\" stroke-width=\"2\"/>\n<text x=\"492\" y=\"103\" font-size=\"11\" font-weight=\"bold\" class=\"t-acc\">~50%<\/text>\n<text x=\"190\" y=\"103\" text-anchor=\"end\" font-size=\"10.5\" font-weight=\"bold\">A · Manuscript becomes the text<\/text>\n<rect x=\"269\" y=\"136\" width=\"69\" height=\"26\" rx=\"2\" class=\"f-t3\" opacity=\".85\"/>\n<line x1=\"301\" y1=\"132\" x2=\"301\" y2=\"166\" class=\"s-t3\" stroke-width=\"2\"/>\n<text x=\"352\" y=\"153\" font-size=\"11\" font-weight=\"bold\" class=\"t-acc\">~22%<\/text>\n<text x=\"190\" y=\"153\" text-anchor=\"end\" font-size=\"10.5\" font-weight=\"bold\">B · Computational Dickinson<\/text>\n<rect x=\"255\" y=\"186\" width=\"60\" height=\"26\" rx=\"2\" class=\"f-t4\" opacity=\".85\"/>\n<line x1=\"283\" y1=\"182\" x2=\"283\" y2=\"216\" class=\"s-t4\" stroke-width=\"2\"/>\n<text x=\"328\" y=\"203\" font-size=\"11\" font-weight=\"bold\" class=\"t-acc\">~18%<\/text>\n<text x=\"190\" y=\"203\" text-anchor=\"end\" font-size=\"10.5\" font-weight=\"bold\">C · Pop-culture supernova<\/text>\n<rect x=\"223\" y=\"236\" width=\"60\" height=\"26\" rx=\"2\" class=\"f-t2\" opacity=\".85\"/>\n<line x1=\"246\" y1=\"232\" x2=\"246\" y2=\"266\" class=\"s-t2\" stroke-width=\"2\"/>\n<text x=\"296\" y=\"253\" font-size=\"11\" font-weight=\"bold\" class=\"t-acc\">~10%<\/text>\n<text x=\"190\" y=\"253\" text-anchor=\"end\" font-size=\"10.5\" font-weight=\"bold\">D · Academic contraction<\/text>\n<text x=\"350\" y=\"296\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-muted\" font-style=\"italic\">A and B most likely braid together — the canon is secure; only the form of her presence is in play.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 6.<\/strong> No plausible ten-year scenario dislodges Dickinson from the canon; the uncertainty is about <em>which<\/em> Dickinson prevails. The most probable path (A, ~50%) is the manuscript image completing its drift to de facto authoritative status alongside Franklin's print text, most likely braided with a computational turn (B). The bands overlap on purpose — these are not mutually exclusive futures but blendable ones.<\/figcaption>\n<\/figure>\n\n\nThe four scenarios below are not mutually exclusive — the most likely real future braids the base case with the computational turn. Probabilities are calibrated judgments and sum to ~100% only as a discipline, not a measurement.\n\n### Scenario A — \"The Manuscript Becomes the Text\" (consolidation) · ~50%\n\n**The most probable path.** Franklin's 1998 variorum and 1999 reading edition remain the cited print standard, but the *de facto* authoritative Dickinson becomes the high-resolution manuscript image on edickinson.org, consulted alongside the transcription. New scholarship increasingly reads the page as a visual-material object by default; the genetic/manuscript framing, once radical, becomes the unmarked norm. The feminist and queer readings are simply assumed. Cultural standing holds high and stable; the restored museum draws steady traffic. Scholarly output is steady but not booming — the humanities contraction caps the volume. No single debate resolves; the field matures into pluralism, holding the \"reading-text Dickinson\" and the \"manuscript Dickinson\" side by side as a settled (if uneasy) division of labor between classroom and archive.\n\n- **Drivers:** 1, 2, 3, 5 all pushing the same direction; 4 supplying popular oxygen.\n- **Signals it's happening:** new monographs citing Fr-numbers *and* manuscript images as a matter of course; graduate syllabi built on the archive; Miller's fascicle-order edition gaining classroom adoption alongside Franklin.\n\n### Scenario B — \"Computational Dickinson\" (methodological opening) · ~22%\n\nMachine-learning transcription and computer-vision analysis are applied at scale to the ~2,500 manuscript documents. Tools that can read nineteenth-century hands, cluster stationery by embossment and paper batch, and align pinhole/sewing patterns automate and extend exactly the physical-evidence detective work Franklin did by eye over decades — potentially refining the chronology, the fascicle reconstruction, and even the dash-as-meaning question (by measuring dash length and angle quantitatively across the whole corpus instead of arguing about a handful). Computational stylometrics test attribution and variant-preference questions. This scenario *reframes* rather than resolves the open-field debate: it makes the manuscript field navigable and quantifiable, which is itself a position in the argument. It most likely arrives braided into Scenario A rather than alone.\n\n- **Drivers:** 2 (infrastructure) + the exogenous arrival of capable AI tooling.\n- **Signals:** published computational redatings or fascicle-order studies; a digital edition that lets users measure/compare manuscript features; AI-assisted transcription of the late fragments.\n- **Caveat:** over-claiming is the risk. \"The algorithm says the dash means X\" can launder a contestable interpretive choice as a measurement — the same over-reading the skeptics (Mitchell) already warn against, now at scale.\n\n### Scenario C — \"Pop-Culture Supernova\" (popular/scholarly decoupling) · ~18%\n\nA successor to *Dickinson* — another prestige adaptation, a viral revival, or AI-native engagement (chatbots, generative imagery, social media) — pushes the popular Dickinson to new heights while loosening its tether to the actual poems. The screen/meme Dickinson becomes, for most people, *the* Dickinson, more famous than any reading of any poem. Museum tourism climbs. This is mostly upside for visibility and downside for textual engagement: the icon eats the work. The queer-recovery framing deepens in popular culture even as a share of the audience never opens the *Poems*.\n\n- **Drivers:** 3 + 4, amplified by adaptation economics and AI-native media.\n- **Signals:** a new major adaptation greenlit; sustained viral/meme presence; museum attendance records; merchandise and \"Dickinsoncore\" aesthetics.\n\n### Scenario D — \"Academic Contraction Bites\" (thinning) · ~10%\n\nThe humanities decline accelerates: English departments shrink, literature lines vanish, and Dickinson studies consolidates to a smaller core of specialists. Monograph and dissertation output falls; the digital archives are maintained but not richly extended (digital projects are notoriously hard to fund past launch). Her canonical status is untouched and her pop-culture afterlife persists on its own momentum — but the scholarly engine slows. This is the genuine downside case, and it is driven almost entirely by forces outside Dickinson studies.\n\n- **Drivers:** 5, dominant.\n- **Signals:** archive maintenance lapses or funding gaps; declining conference/journal activity; senior Dickinson chairs left unfilled.\n\n---\n\n```viz\n{\n  \"type\": \"range\",\n  \"title\": \"Forecast scenarios for Dickinson's trajectory through ~2035\",\n  \"subtitle\": \"Calibrated probabilities; scenarios A and B most likely braid together\",\n  \"credit\": \"Deep-research forecast synthesis, 2026 (this document, §2)\",\n  \"items\": [\n    {\"label\": \"A — Manuscript becomes the text (consolidation)\", \"low\": 40, \"mid\": 50, \"high\": 60},\n    {\"label\": \"B — Computational Dickinson (new methods)\", \"low\": 15, \"mid\": 22, \"high\": 30},\n    {\"label\": \"C — Pop-culture supernova (decoupling)\", \"low\": 12, \"mid\": 18, \"high\": 25},\n    {\"label\": \"D — Academic contraction bites (thinning)\", \"low\": 5, \"mid\": 10, \"high\": 18}\n  ]\n}\n```\n\n---\n\n## 3. What Will *Not* Happen (Calibrating Against Hype)\n\nForecasting is as much about ruling out as ruling in.\n\n- **The intimacy question will not be \"answered.\"** Barring the improbable discovery of an unambiguous document, whether the Emily–Susan bond was erotic is permanently underdetermined by the evidence (Workstream 03, §1.3). It will be re-argued, not resolved. Anyone claiming to have settled it is selling a reading, not a finding.\n- **The \"real text\" will not be fixed.** There is no authorial edition to recover; the open-field/finished-text debate has no terminus (Workstream 04, §10). Pluralism, not victory, is the realistic end-state.\n- **Dickinson will not fall from the canon.** No plausible scenario in a ten-year window dislodges a poet this deeply embedded in education and popular memory.\n- **A flood of new poems will not appear.** The corpus has been stable at ~1,789 (Franklin) for a generation. Occasional single-manuscript discoveries are possible and high-impact, but a large new cache is very unlikely.\n\n---\n\n## 4. The Wildcards (Low Probability, High Impact)\n\n- **A manuscript or letter discovery** that bears directly on the Master letters or the Susan relationship. Low odds; would reorder the biography overnight.\n- **A curriculum-politics backlash.** In a polarized environment, the entrenched queer/feminist Dickinson could become a target of curriculum fights, affecting how (and whether) she is taught in some U.S. jurisdictions — and, in reaction, intensifying her as a progressive icon elsewhere. This is the most plausible disruptor of the otherwise-stable cultural picture, and it cuts both ways.\n- **An AI-generated \"Dickinson\"** — models trained to write or speak as her — raising fresh authenticity and authorship questions that rhyme uncannily with the original editorial wars: once again, someone deciding on her behalf what she \"would have\" written.\n- **A funding collapse** at one of the archive's host institutions, stranding the digital reunification that took a century to achieve.\n\n---\n\n## 5. Signals to Watch (The Forecast's Dashboard)\n\n| Signal | Points toward | Time sense |\n|---|---|---|\n| New monographs citing manuscript images as default text | Scenario A | ongoing |\n| Published computational redating / fascicle-order study | Scenario B | 2–5 yrs |\n| AI transcription of the late fragments released | Scenario B | 2–6 yrs |\n| A new major *Dickinson* adaptation greenlit | Scenario C | any time |\n| Museum attendance records post-restoration | Scenario C | near-term |\n| English-major enrollment / faculty-line trend | Scenario D (if down) | ongoing |\n| Archive funding lapse or maintenance gap | Scenario D | any time |\n| Curriculum challenge to \"queer Dickinson\" in a U.S. district | Wildcard backlash | any time |\n| Discovery of a new manuscript/letter | Wildcard | rare |\n\n---\n\n## 6. Synthesis: The Shape of the Next Decade\n\nThe drivers connect the history to the forecast cleanly. Because Dickinson never authorized a text (history), the editorial question is structural and can only be re-platformed (current state), which means the next decade's most probable story is the manuscript image completing its long victory over the printed page (forecast) — not by resolving the argument but by becoming the place the argument happens. Because the feminist and queer readings won the culture as well as the academy, they will stay dominant and, being dominant in a divided moment, will draw fire. Because she is a free, prestigious, endlessly reinterpretable icon, the popular Dickinson will keep outrunning the scholarly one, with the genuine risk that the image eats the work. And because the humanities are contracting, all of this happens with a thinner scholarly workforce than the boom years enjoyed — the one cloud over an otherwise secure future.\n\nThe deepest continuity is the oldest irony. Every generation since 1890 has built the Dickinson it needed and called it the real one — Todd's saleable spinster, the New Critics' close-reading exemplar, the feminists' heroine, the manuscript school's avant-gardist, Apple's queer Gen-Z rebel. The next decade's contribution — a computational, image-first, mass-cultural Dickinson — will be no different: genuinely illuminating, and shaped by the needs and tools of the people doing the illuminating. The poet who wrote \"Publication — is the Auction / Of the Mind of Man\" remains, fittingly, perpetually up for auction, and perpetually unsold in full. As the Harvard Review put it, \"no one, no editor or reader, can fully possess these poems.\" That will still be true in 2035.\n\n---\n\n## Open Questions\n\n1. **Will a computational method actually move a substantive question** (dating, fascicle order, dash-semantics), or only re-describe what is already known with a quantitative veneer?\n2. **Does mass adaptation deepen or replace engagement** with the poems? The decoupling hypothesis (Scenario C) is testable over the decade against teaching and readership data.\n3. **Can digital editions survive their own success** — i.e., be funded and maintained past launch — or does the 2013 reunification quietly decay?\n4. **How will curriculum politics treat the queer Dickinson** across different jurisdictions, and does backlash entrench or erode the reading?\n5. **Which edition will graduate students of 2035 cite by default** — Franklin's print variorum, Miller's fascicle order, or the archive image itself?\n\n---\n\n## Sources\n\nThis forecast synthesizes the verified findings and sources of Workstreams 01–07 (see each document's Sources section and `Sources.md`). It introduces no new factual claims of its own; its load-bearing evidence is:\n\n1. The editorial/textual history and the unresolved \"finished text vs. open field\" debate — Workstream 06 and Workstream 04 (§10). **Tier 1–2** (Franklin editions; Harvard Review; Emily Dickinson Archive). Accessed 2026-06-13.\n2. The current state of feminist, queer, and manuscript scholarship and the cultural afterlife (museum restoration, *Dickinson* 2019–2021) — Workstream 07. **Tier 1–4.** Accessed 2026-06-13.\n3. The 2013 Emily Dickinson Archive digital reunification as the infrastructural fact underpinning Drivers 1–2 — Workstream 06 (§9); Harvard Gazette, \"The digital Dickinson\" (2013). **Tier 2/4.** Accessed 2026-06-13.\n\nThe scenario probabilities, driver analysis, and signals are the author's calibrated inference from that verified base, explicitly marked as forecast rather than fact."}]}</script>

<script>
const corpus = JSON.parse(document.getElementById('corpus-data').textContent);
const docs = corpus.documents;
const toc = document.getElementById('toc');
const content = document.getElementById('content');
const searchBox = document.getElementById('search');
const results = document.getElementById('search-results');
const key = 'corpus:' + corpus.slug;
let current = 0;

// theme
const themePref = localStorage.getItem('corpus-theme');
if (themePref) document.documentElement.dataset.theme = themePref;
else if (matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.dataset.theme = 'dark';
document.getElementById('theme-btn').onclick = () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('corpus-theme', next);
};

// table of contents
docs.forEach((d, i) => {
  const a = document.createElement('a');
  a.href = '#ch-' + i;
  a.innerHTML = '<span class="num">' + String(i).padStart(2, '0') + '</span>' + d.title;
  a.title = d.summary || '';
  a.onclick = (e) => { e.preventDefault(); show(i); closeMenu(); };
  toc.appendChild(a);
});

let firstShow = true;
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
function show(i, anchorText) {
  const apply = () => {
  current = Math.max(0, Math.min(docs.length - 1, i));
  content.innerHTML = marked.parse(docs[current].body);
  // rewrite chapter-to-chapter .md links into in-app navigation
  content.querySelectorAll('a[href$=".md"]').forEach(a => {
    const target = docs.findIndex(d => a.getAttribute('href').endsWith(d.file));
    if (target >= 0) { a.href = '#ch-' + target; a.onclick = (e) => { e.preventDefault(); show(target); }; }
  });
  content.querySelectorAll('a[href^="http"]').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });
  toc.querySelectorAll('a').forEach((a, j) => a.classList.toggle('active', j === current));
  document.getElementById('prev').disabled = current === 0;
  document.getElementById('next').disabled = current === docs.length - 1;
  document.getElementById('pager-label').textContent = (current + 1) + ' / ' + docs.length + ' · ' + docs[current].title;
  history.replaceState(null, '', '#ch-' + current);
  localStorage.setItem(key, current);
  // feed the cross-page library shell: per-corpus read set + global recents
  try {
    const rk = 'read:' + corpus.slug;
    const readArr = JSON.parse(localStorage.getItem(rk) || '[]');
    if (readArr.indexOf(current) < 0) { readArr.push(current); localStorage.setItem(rk, JSON.stringify(readArr)); }
    const rec = (JSON.parse(localStorage.getItem('library-recents') || '[]') || []).filter(r => r.slug !== corpus.slug);
    rec.unshift({ slug: corpus.slug, title: corpus.title, ch: current, chTitle: docs[current].title, ts: Date.now() });
    localStorage.setItem('library-recents', JSON.stringify(rec.slice(0, 20)));
    // quiet reading streak: bump once per calendar day a chapter is opened
    const today = new Date().toISOString().slice(0, 10);
    const st = JSON.parse(localStorage.getItem('reading-streak') || '{}');
    if (st.last !== today) {
      const yest = new Date(Date.now() - 864e5).toISOString().slice(0, 10);
      st.count = (st.last === yest ? (st.count || 0) : 0) + 1;
      st.last = today;
      localStorage.setItem('reading-streak', JSON.stringify(st));
    }
  } catch (e) {}
  if (anchorText) {
    const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT);
    let node; while ((node = walker.nextNode())) {
      const idx = node.textContent.toLowerCase().indexOf(anchorText.toLowerCase());
      if (idx >= 0) {
        const host = node.parentElement;
        host.scrollIntoView({ block: 'center' });
        if (!reduceMotion) { host.classList.add('passage-flash'); setTimeout(() => host.classList.remove('passage-flash'), 2200); }
        return;
      }
    }
  }
  document.getElementById('main').scrollIntoView();
  window.scrollTo(0, 0);
  };
  // cross-fade chapter swaps where supported (skips first paint + reduced motion)
  if (document.startViewTransition && !reduceMotion && !firstShow) document.startViewTransition(apply);
  else apply();
  firstShow = false;
}

document.getElementById('prev').onclick = () => show(current - 1);
document.getElementById('next').onclick = () => show(current + 1);

let chordKey = null, chordTimer;
document.addEventListener('keydown', (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const back = document.getElementById('cmdk-back');
  if (back && back.classList.contains('open')) return;  // palette owns the keys when open
  const help = document.getElementById('kbd-help');
  if (help && help.classList.contains('open')) { if (e.key === 'Escape' || e.key === '?') toggleHelp(); return; }
  if (chordKey === 'g') { clearTimeout(chordTimer); chordKey = null;
    if (e.key === 'g') { show(0); return; }
    if (e.key === 'e') { show(docs.length - 1); return; } }
  if (e.key === 'g') { chordKey = 'g'; chordTimer = setTimeout(() => { chordKey = null; }, 700); return; }
  if (e.key === 'ArrowLeft' || e.key === 'k') show(current - 1);
  else if (e.key === 'ArrowRight' || e.key === 'j') show(current + 1);
  else if (e.key === 'z' || e.key === 'Z') toggleFocus();
  else if (e.key === '?') toggleHelp();
});

function toggleFocus() {
  const on = document.body.classList.toggle('focus-mode');
  localStorage.setItem('reader-focus', on ? '1' : '0');
}
if (localStorage.getItem('reader-focus') === '1') document.body.classList.add('focus-mode');

function toggleHelp() {
  let h = document.getElementById('kbd-help');
  if (!h) {
    h = document.createElement('div'); h.id = 'kbd-help';
    h.innerHTML = '<div class="kh"><h3>Keyboard</h3><dl>'
      + '<dt>⌘K</dt><dd>command palette</dd>'
      + '<dt>← / k</dt><dd>previous chapter</dd>'
      + '<dt>→ / j</dt><dd>next chapter</dd>'
      + '<dt>g g</dt><dd>first chapter</dd>'
      + '<dt>g e</dt><dd>last chapter</dd>'
      + '<dt>Z</dt><dd>focus mode</dd>'
      + '<dt>?</dt><dd>this help</dd></dl></div>';
    h.addEventListener('click', (ev) => { if (ev.target === h) toggleHelp(); });
    document.body.appendChild(h);
  }
  h.classList.toggle('open');
}

// search
let timer;
searchBox.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(runSearch, 150);
});
function runSearch() {
  const q = searchBox.value.trim().toLowerCase();
  results.innerHTML = '';
  toc.style.display = q ? 'none' : '';
  if (!q || q.length < 3) { toc.style.display = ''; return; }
  let hits = 0;
  docs.forEach((d, i) => {
    const text = d.body.toLowerCase();
    let pos = text.indexOf(q), shown = 0;
    while (pos >= 0 && shown < 3 && hits < 40) {
      const start = Math.max(0, pos - 60), end = Math.min(d.body.length, pos + q.length + 90);
      const raw = d.body.slice(start, end).replace(/[#*_>\[\]]/g, '');
      const safe = raw.replace(/&/g, '&amp;').replace(/</g, '&lt;');
      const snippet = safe.replace(new RegExp(q.replace(/[.*+?^${}()|\\]/g, '\\$&'), 'ig'), m => '<mark>' + m + '</mark>');
      const div = document.createElement('div');
      div.className = 'hit';
      div.innerHTML = '<b>' + d.title + '</b>…' + snippet + '…';
      const exact = d.body.slice(pos, pos + q.length);
      div.onclick = () => { show(i, exact); searchBox.value = ''; runSearch(); closeMenu(); };
      results.appendChild(div);
      hits++; shown++;
      pos = text.indexOf(q, pos + q.length);
    }
  });
  if (!hits) results.innerHTML = '<div class="none">No matches.</div>';
}

// mobile menu
const menuBtn = document.getElementById('menu-btn');
menuBtn.onclick = () => document.body.classList.toggle('menu-open');
function closeMenu() { document.body.classList.remove('menu-open'); }

// initial chapter: hash > saved progress > 0; ?q= deep-links to a passage (Today's Passage, share cards)
const hash = location.hash.match(/^#ch-(\d+)$/);
const anchorQ = new URLSearchParams(location.search).get('q');
show(hash ? +hash[1] : +(localStorage.getItem(key) || 0), anchorQ || undefined);

// respond to in-page hash changes: browser back/forward, and cross-page command
// palette jumps that land on a chapter of the corpus already open (no reload).
window.addEventListener('hashchange', () => {
  const h = location.hash.match(/^#ch-(\d+)$/);
  if (h && +h[1] !== current) show(+h[1]);
});

// Related reading at the foot of the column — corpus-level, from the inlined
// library manifest's precomputed similarity graph (no fetch). Deferred to
// DOMContentLoaded because the shell (which carries #library-manifest) is
// injected into the page AFTER this script.
function renderRelated() {
  const relEl = document.getElementById('related');
  const mEl = document.getElementById('library-manifest');
  if (!relEl || !mEl) return;
  let LIB; try { LIB = JSON.parse(mEl.textContent); } catch (e) { return; }
  const me = LIB.find(x => x.slug === corpus.slug);
  const rel = (me && me.related) || [];
  if (!rel.length) return;
  const esc = s => { const d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; };
  relEl.innerHTML = '<h3 class="related-h">Related reading</h3><div class="related-grid">'
    + rel.map(r => '<a class="related-card" href="' + esc(r.slug) + '.html">'
        + '<span class="related-cat">' + esc(r.category || '') + '</span>'
        + '<span class="related-t">' + esc(r.title) + '</span></a>').join('')
    + '</div>';
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', renderRelated);
else renderRelated();
</script>
<style>
@view-transition { navigation: auto; }
@media (prefers-reduced-motion: reduce) {
  ::view-transition-group(*), ::view-transition-old(*), ::view-transition-new(*) { animation: none !important; }
}
#cmdk-fab { position: fixed; left: .9rem; bottom: .9rem; z-index: 60; display: inline-flex; align-items: center; gap: .45rem;
  font-family: var(--sans); font-size: .72rem; letter-spacing: .03em; color: var(--muted);
  background: var(--panel); border: 1px solid var(--border); border-radius: 11px; padding: .4rem .7rem; cursor: pointer; }
#cmdk-fab:hover { color: var(--accent); border-color: var(--accent); }
#cmdk-fab kbd { font-family: var(--sans); font-size: .7rem; background: var(--bg); border: 1px solid var(--border);
  border-radius: 5px; padding: .02rem .32rem; color: inherit; }
#cmdk-back { position: fixed; inset: 0; z-index: 80; background: rgba(20,18,15,.42); -webkit-backdrop-filter: blur(3px);
  backdrop-filter: blur(3px); display: none; align-items: flex-start; justify-content: center; padding: 12vh 1rem 1rem; }
#cmdk-back.open { display: flex; }
#cmdk { width: 100%; max-width: 560px; background: var(--bg); border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,.34); }
#cmdk-in { display: flex; align-items: center; gap: .6rem; padding: .85rem 1rem; border-bottom: 1px solid var(--border); }
#cmdk-in svg { width: 18px; height: 18px; flex: none; color: var(--muted); }
#cmdk-in input { flex: 1; border: none; background: none; outline: none; color: var(--text); font-family: var(--serif); font-size: 1.05rem; }
#cmdk-in .hint { font-family: var(--sans); font-size: .6rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted);
  border: 1px solid var(--border); border-radius: 5px; padding: .12rem .4rem; }
#cmdk-res { max-height: 52vh; overflow-y: auto; padding: .4rem; }
.cmdk-grp { font-family: var(--sans); font-size: .6rem; text-transform: uppercase; letter-spacing: .16em; color: var(--muted); padding: .6rem .6rem .25rem; }
.cmdk-row { display: flex; align-items: center; gap: .7rem; padding: .5rem .6rem; border-radius: 9px; cursor: pointer;
  text-decoration: none; color: var(--text); }
.cmdk-row.sel { background: var(--panel); }
.cmdk-ic { width: 1.3rem; text-align: center; color: var(--accent); flex: none; font-family: var(--sans); font-size: .9rem; }
.cmdk-t { font-family: var(--display); font-size: .98rem; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cmdk-t mark { background: var(--mark, #f3dfa0); color: inherit; border-radius: 2px; padding: 0 1px; }
.cmdk-m { font-family: var(--sans); font-size: .68rem; color: var(--muted); white-space: nowrap; letter-spacing: .02em; }
.cmdk-none { font-family: var(--sans); font-size: .85rem; color: var(--muted); text-align: center; padding: 1.4rem .6rem; }
/* reading progress lives on the meta line (bottom-right of the card body), never over the cover image */
.meta.has-prog { display: flex; align-items: center; justify-content: space-between; gap: .6rem; }
.card-prog { display: inline-flex; align-items: center; gap: .34rem; font-family: var(--sans); font-size: .68rem;
  letter-spacing: .02em; text-transform: none; color: var(--muted); white-space: nowrap; }
.card-prog svg { width: 14px; height: 14px; flex: none; }
.card-prog .pbg { stroke: var(--border); }
.card-prog.done { color: var(--accent); }
#resume { display: none; }
#resume.on { display: block; max-width: 1080px; margin: 1.2rem auto 0; padding: 0 2rem; }
#resume a { display: flex; align-items: center; gap: 1rem; text-decoration: none; color: var(--text); background: var(--panel);
  border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 0 14px 14px 0; padding: 1rem 1.3rem; transition: border-color .15s ease; }
#resume a:hover { border-color: var(--accent); }
#resume .rcol { min-width: 0; }
#resume .rk { display: block; font-family: var(--sans); font-size: .62rem; text-transform: uppercase; letter-spacing: .16em; color: var(--accent); margin: 0 0 .25rem; }
#resume .rt { display: block; font-family: var(--display); font-size: 1.12rem; line-height: 1.2; }
#resume .rs { display: block; font-family: var(--sans); font-size: .76rem; color: var(--muted); margin: .2rem 0 0; }
#resume .rcta { margin-left: auto; font-family: var(--sans); font-size: .7rem; text-transform: uppercase; letter-spacing: .08em;

    GRP_ORDER.forEach(function (g) { list.forEach(function (e) { if (e.grp === g) ordered.push(e); }); });
    list.forEach(function (e) { if (GRP_ORDER.indexOf(e.grp) < 0) ordered.push(e); });
    rows = ordered; sel = 0;
    var html = '', lastG = null;
    ordered.forEach(function (e, i) {
      if (e.grp !== lastG) { html += '<div class="cmdk-grp">' + esc(e.grp) + '</div>'; lastG = e.grp; }
      html += '<a class="cmdk-row' + (i === 0 ? ' sel' : '') + '" data-i="' + i + '" href="' + esc(base + e.href) + '">'
        + '<span class="cmdk-ic">' + e.icon + '</span><span class="cmdk-t">' + hl(e.t, q) + '</span><span class="cmdk-m">' + esc(e.m) + '</span></a>';
    });
    resEl.innerHTML = html;
    [].forEach.call(resEl.querySelectorAll('.cmdk-row'), function (el) {
      el.addEventListener('mouseenter', function () { sel = +el.getAttribute('data-i'); paint(); });
      el.addEventListener('click', function (ev) { ev.preventDefault(); go(rows[+el.getAttribute('data-i')]); });
    });
  }
  function paint() {
    [].forEach.call(resEl.querySelectorAll('.cmdk-row'), function (el, i) {
      var on = i === sel; el.classList.toggle('sel', on); if (on) el.scrollIntoView({ block: 'nearest' });
    });
  }
  function go(e) { if (!e) return; close(); window.location.href = base + e.href; }
  function open() { build(); back.classList.add('open'); input.value = ''; render(); setTimeout(function () { input.focus(); }, 10); }
  function close() { if (back) back.classList.remove('open'); }
  function isOpen() { return back && back.classList.contains('open'); }

  document.addEventListener('keydown', function (e) {
    if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) { e.preventDefault(); isOpen() ? close() : open(); return; }
    if (!isOpen()) return;
    if (e.key === 'Escape') { e.preventDefault(); close(); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); sel = Math.min(rows.length - 1, sel + 1); paint(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); sel = Math.max(0, sel - 1); paint(); }
    else if (e.key === 'Enter') { e.preventDefault(); go(rows[sel]); }
  });

  var mac = /Mac|iPhone|iPad/.test(navigator.platform);
  var fab = document.createElement('button'); fab.id = 'cmdk-fab'; fab.type = 'button';
  fab.setAttribute('aria-label', 'Search the library');
  fab.innerHTML = '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg> <kbd>' + (mac ? '⌘' : 'Ctrl') + 'K</kbd>';
  fab.addEventListener('click', open);
  document.body.appendChild(fab);

  [].forEach.call(document.querySelectorAll('.card[data-slug], .coll-card[data-slug]'), function (card) {
    var slug = card.getAttribute('data-slug');
    var total = +card.getAttribute('data-total') || 0;
    var accent = card.getAttribute('data-accent') || '--accent';
    var meta = card.querySelector('.meta, .coll-meta');
    if (!meta || !total) return;
    var read = 0;
    try { read = (JSON.parse(localStorage.getItem('read:' + slug) || '[]') || []).filter(function (x) { return x < total; }).length; } catch (e) {}
    if (!read) return;  // keep the meta line clean until there's progress
    var done = read >= total;
    var prog = document.createElement('span');
    prog.className = 'card-prog' + (done ? ' done' : '');
    if (done) {
      card.classList.add('is-complete');
      prog.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="var(' + accent + ')" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="13 4 6.5 12 3 8.5"/></svg>Read';
    } else {
      var r = 6, cir = 2 * Math.PI * r, off = cir * (1 - read / total);
      prog.innerHTML = '<svg viewBox="0 0 16 16" aria-hidden="true"><circle class="pbg" cx="8" cy="8" r="' + r + '" fill="none" stroke-width="2.4"/>'
        + '<circle cx="8" cy="8" r="' + r + '" fill="none" stroke="var(' + accent + ')" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="' + cir.toFixed(1) + '" stroke-dashoffset="' + off.toFixed(1) + '" transform="rotate(-90 8 8)"/></svg>' + read + '/' + total;
    }
    meta.classList.add('has-prog');
    meta.appendChild(prog);
  });

  var resume = document.getElementById('resume');
  if (resume) {
    var rec = readRecents();
    if (rec.length) {
      var r0 = rec[0];
      resume.innerHTML = '<a href="' + esc(base + r0.slug + '.html#ch-' + r0.ch) + '">'
        + '<span class="rcol"><span class="rk">Resume reading</span>'
        + '<span class="rt">' + esc(r0.title) + '</span>'
        + '<span class="rs">Chapter ' + (r0.ch + 1) + (r0.chTitle ? ' — ' + esc(r0.chTitle) : '') + '</span></span>'
        + '<span class="rcta">Continue →</span></a>';
      resume.classList.add('on');
    }
  }

  // quiet reading streak — a small folio stat folded into the library stats line
  try {
    var st = JSON.parse(localStorage.getItem('reading-streak') || '{}');
    var stats = document.querySelector('.stats');
    if (stats && st && (st.count || 0) >= 2 && !/streak/.test(stats.textContent)) {
      stats.textContent = stats.textContent + ' · ' + st.count + '-day reading streak';
    }
  } catch (e) {}
})();
</script>
</body>
</html>
