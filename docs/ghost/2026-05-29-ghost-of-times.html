:root {

* { box-sizing: border-box; }
@media (prefers-reduced-motion: no-preference) { html { scroll-behavior: smooth; } }
body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--serif); }

  color: var(--muted); text-transform: uppercase; letter-spacing: .14em; border-bottom: 1px solid var(--border); }

  font-size: 1.5rem; scroll-margin-top: 1rem; }
.section-title::after { content: ""; display: block; height: 4px; width: 96px; margin-top: .5rem; border-radius: 2px;
  background: linear-gradient(90deg, var(--t1) 0 25%, var(--t2) 0 50%, var(--t3) 0 75%, var(--t4) 0); }
/* Collections — the flagship: curated cross-corpus reading arcs, shown as posters. */
.collections { max-width: 1080px; margin: 1.9rem auto 0; padding: 0 2rem; }
.coll-h { font-family: var(--display); font-size: 1.5rem; margin: 0; }
.coll-h::after { content: ""; display: block; height: 4px; width: 96px; margin-top: .5rem; border-radius: 2px;
  background: linear-gradient(90deg, var(--t1) 0 25%, var(--t2) 0 50%, var(--t3) 0 75%, var(--t4) 0); }
.coll-intro { font-family: var(--sans); font-size: .9rem; color: var(--muted); margin: .7rem 0 1.2rem; max-width: 42rem; line-height: 1.5; }
.coll-shelf { display: grid; grid-template-columns: repeat(auto-fill, minmax(264px, 1fr)); gap: 1.4rem; }
.coll-card { display: flex; flex-direction: column; background: var(--panel); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden; text-decoration: none; color: var(--text);

  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.coll-meta { font-family: var(--sans); font-size: .7rem; text-transform: uppercase; letter-spacing: .07em;
  color: var(--accent); margin: 0; display: flex; align-items: center; justify-content: space-between; gap: .6rem; }
/* Today's Passage — the daily pull-quote hook pinned atop the index. */
#daily-passage { max-width: 1080px; margin: 1.6rem auto 0; padding: 0 2rem; }
.dp-quote { display: block; position: relative; overflow: hidden; text-decoration: none; color: var(--text);

  transition: transform .16s cubic-bezier(.34,1.56,.64,1), border-color .16s ease; }

.ghost-band { max-width: 1080px; margin: 2rem auto 0; padding: 0 2rem; }

@media (max-width: 680px) {

}
header { max-width: 1080px; margin: 0 auto; padding: 2.6rem 2rem 1rem; display: flex;
  align-items: center; gap: 2.5rem; }
.hero-text { flex: 1.1; }

.hero-art svg { width: 100%; height: auto; display: block; }
.hero-art .hero-img { width: 100%; height: auto; display: block; border-radius: 10px; }

.kicker { font-family: var(--sans); font-size: .72rem; text-transform: uppercase;

header h1 { font-family: var(--display); font-size: clamp(2.3rem, 4.6vw, 3.3rem);

/* Library toolbar — search box + category filter pills. */

  gap: .9rem 1.4rem; }

  color: var(--text); background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  padding: .55rem .85rem; -webkit-appearance: none; appearance: none; }

.cat-pills { display: flex; flex-wrap: wrap; gap: .5rem; }
.cat-pill { font-family: var(--sans); font-size: .76rem; letter-spacing: .02em; color: var(--muted);

  cursor: pointer; transition: color .15s ease, border-color .15s ease, background .15s ease; }
.cat-pill:hover { color: var(--accent); border-color: var(--accent); }

.cat-section[hidden] { display: none; }
.cat-heading { max-width: 100%; margin: 1.2rem 0 0; padding: 0 2rem; font-family: var(--display);

  font-weight: normal; letter-spacing: .06em; }

.grid { padding: 1.1rem 2rem 1.4rem;

.card { display: flex; flex-direction: column; background: var(--panel); border: 1px solid var(--border);

.cover .cover-photo { width: 100%; height: 124px; object-fit: cover; object-position: center; display: block; }

.tiles span:nth-child(2) { background: var(--t2); border-radius: 7px 3px 8px 4px; transform: rotate(8deg); }

}

/* A single Ghost of Times edition — the corpus reader's reading column in
   newspaper dress. Shares every colour/font token with the rest of the site. */
.gh-edition { max-width: 760px; margin: 0 auto; padding: 2.2rem 2rem 1rem; }

/* nameplate — a compact echo of ghost.html's section plate. `display:block`
   overrides the generic `header{display:flex}` rule from LIBRARY_CSS so the
   kicker / name / folio stack vertically like the section front. */
.gh-nameplate { display: block; text-align: center; max-width: 640px; margin: 0 auto 2.6rem; padding: 0; }
.gh-kicker { font-family: var(--sans); font-size: .68rem; text-transform: uppercase;
  letter-spacing: .2em; color: var(--accent); margin: 0 0 .45rem; }
.gh-name { display: inline-block; font-family: var(--display); font-weight: 800;
  font-size: clamp(2.1rem, 5.2vw, 3.1rem); line-height: .98; letter-spacing: -.02em;
  color: var(--text); text-decoration: none; margin: 0 0 .9rem; }
.gh-name:hover { color: var(--accent); }
.gh-folio { display: flex; justify-content: space-between; align-items: center; gap: 1rem;
  border-top: 1px solid var(--text); border-bottom: 1px solid var(--text); padding: .5rem 0;
  font-family: var(--sans); font-size: .66rem; text-transform: uppercase; letter-spacing: .14em; }
.gh-folio .gh-folio-c { color: var(--accent); font-weight: 700; }

/* contents — every story + author, clickable to its piece */
.gh-contents { display: block; margin: 0 0 2.8rem; }
.gh-contents-h { font-family: var(--sans); font-size: .68rem; text-transform: uppercase; letter-spacing: .2em;
  color: var(--muted); border-bottom: 2px solid var(--text); padding-bottom: .5rem; margin: 0 0 .1rem; }
.gh-toc-item { display: grid; grid-template-columns: 3.2rem 1fr; gap: .8rem; align-items: baseline;
  text-decoration: none; color: var(--text); padding: .7rem .2rem; border-bottom: 1px solid var(--border); }
.gh-toc-item:hover { background: var(--panel); }
.gh-toc-no { font-family: var(--sans); font-size: .68rem; text-transform: uppercase; letter-spacing: .1em;
  color: var(--accent); white-space: nowrap; padding-top: .15rem; }
.gh-toc-item.is-lead .gh-toc-no { font-weight: 700; }
.gh-toc-head { font-family: var(--display); font-size: 1.12rem; line-height: 1.2; display: block;
  transition: color .15s ease; }
.gh-toc-item:hover .gh-toc-head { color: var(--accent); }
.gh-toc-by { font-family: var(--sans); font-size: .68rem; text-transform: uppercase; letter-spacing: .1em;
  color: var(--muted); display: block; margin-top: .25rem; }

/* the op-ed stack */
.gh-piece { margin: 0; scroll-margin-top: 1.2rem; }
.gh-head { font-family: var(--display); font-weight: 800; letter-spacing: -.01em;
  line-height: 1.1; margin: 0 0 .55rem; }
.gh-piece .gh-head { font-size: clamp(1.55rem, 3.2vw, 2rem); }
.gh-lead .gh-head { font-size: clamp(2rem, 4.6vw, 2.9rem); line-height: 1.06; }
.gh-lead .gh-head::after { content: ""; display: block; height: 4px; width: 110px; margin-top: .6rem;
  border-radius: 2px; background: linear-gradient(90deg, var(--t1) 0 25%, var(--t2) 0 50%, var(--t3) 0 75%, var(--t4) 0); }
.gh-dek { font-family: var(--serif); font-style: italic; color: var(--muted);
  font-size: 1.16rem; line-height: 1.42; margin: 0 0 .9rem; }
.gh-lead .gh-dek { font-size: 1.28rem; }
.gh-byline { font-family: var(--sans); font-size: .72rem; letter-spacing: .14em; color: var(--accent);
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  padding: .4rem 0; margin: 0 0 1.3rem; }
/* objective-voice abstract — neutral framing of what the piece is about, set apart from the body */

<script id="ghost-edition-data" type="application/json">{"lead": {"kicker": "BY SCOTT ADAMS", "author_byline": "BY SCOTT ADAMS", "headline": "Nobody Ends a War. A Master Persuader Buys Sixty Days.", "dek": "The Iran deal isn't a peace agreement. It's an anchor. And if you know how anchors work, you already know how this ends.", "body": "I'm a trained hypnotist. So when I see a president tell the press he \"needs a few days to consider\" a deal his own negotiators already finalized, I don't hear hesitation. I hear pacing and leading.\n\nHere's the story the media is giving you. Trump and Iran hammered out a tentative 60-day ceasefire. Barak Ravid at Axios broke the scoop from two American officials and a regional source — good sourcing. JD Vance went on record: \"We're not there yet, but we're very close.\" Treasury Secretary Scott Bessent sanctioned Iran's Persian Gulf Strait Authority, called it \"a joke,\" and warned every corporate entity against paying the extortion tolls.\n\nThat's the two-dimensional read. Diplomacy in motion.\n\nHere's what a trained persuader sees.\n\nTrump said Iran is \"negotiating on fumes\" and warned that without a deal, \"we'll have to just finish the job.\" That is not frustration. That is an anchor. A Master Persuader drops a threat early enough that every subsequent negotiation happens in its shadow. The Iranians aren't bargaining against the previous ceasefire terms. They're bargaining against the phrase \"finish the job.\" That phrase is doing more work than any diplomat in the room.\n\nThe name of the U.S. military campaign is \"Operation Epic Fury.\" Stop and think about that for a second. Not Operation Hormuz Shield. Not Operation Restore Order. Epic Fury. Two words engineered to produce one picture in the mind of an Iranian general: something terrible is still coming, and you only have sixty days to avoid it. That is a Linguistic Kill Shot applied to an entire military operation. I've never seen it deployed at that altitude.\n\nOn the Iranian side, Mojtaba Khamenei — the Supreme Leader's son with reported operational influence over the talks — told negotiators that Iran's enriched uranium \"should not be exported abroad.\" The technical people will explain this is about the 440 kilograms of uranium enriched to 60% purity, a short technical step from weapons-grade. What they won't tell you is that keeping the material at home is also a face-saving device. You call it a red line, you hand the other side something to negotiate away slowly, and you let them claim progress every thirty days. That's pacing and leading in the other direction.\n\nHere are three things nobody in the expert class is saying:\n\n1. The sixty days are not a deadline. They are a sale. The moment both sides agreed to imagine what a signed deal looks like — how the Strait reopens, how oil prices fall — they implicitly accepted the premise that a deal is possible. That's \"thinking past the sale.\" Trump has been using it since at least 2015. The credentialed class keeps missing it because they believe facts and policy positions are what close negotiations.\n\n2. The toll system is the tell. Iran was reportedly charging vessels up to $2 million per ship to transit the Strait of Hormuz. Bessent sanctioning the Persian Gulf Strait Authority makes that revenue stream disappear. When the pain gets bad enough, Tehran will negotiate away the tolls and call it a concession. Watch for that framing. It will be called Iranian flexibility. It is Iranian arithmetic.\n\n3. The ceasefire violation is not a complication. Iran launched a ballistic missile toward Kuwait on May 27. CENTCOM called it an \"egregious ceasefire violation.\" Five attack drones were intercepted in the Strait the same week. The media said these threaten the deal. In a Master Persuader's playbook, they are pressure valves. Iran keeps enough tension alive to remind Trump he can't walk away clean. Trump keeps enough military action alive to remind Iran that Operation Epic Fury is not a metaphor. Both sides need the other side a little scared. Fear is the pacing that makes the leading possible.\n\nSo who's right — the optimists who think this is real peace, or the pessimists who say Iran cheats and sixty days collapses into nothing?\n\nNeither.\n\nThis is the Two Movies problem. Same screen, different films. The optimists see exhausted parties and rising oil prices. The pessimists see a regime with nuclear red lines and a history of cheating. Neither movie explains the persuasion layer.\n\nThe persuasion read is simpler. Trump doesn't need a real agreement. He needs a signed MOU, a photo, and a headline that says \"Trump Ends Iran War.\" The sixty days are not a path to permanent peace. They are the deal. After sixty days, the question resets, and Trump plays the same hand again from a stronger position.\n\nI could be wrong. I'm a cartoonist. But I called Trump's win in August 2015 when the experts had him at 2%. The Persuasion Filter is a better predictive tool than the policy filter.\n\nThat's not a peace process. That's a system. And systems beat goals every time.", "filed_date": "2026-05-29", "byline_html": "<em>On reporting in<\/em> <a href=\"https://www.axios.com/2026/05/28/iran-peace-deal-trump-approval\">Axios<\/a> &nbsp;·&nbsp; <a href=\"https://apnews.com/article/iran-us-war-oil-may-28-2026-8f5ed2813ba63df7ae9ccbe991688d29\">AP News<\/a> &nbsp;·&nbsp; <a href=\"https://www.cbsnews.com/live-updates/iran-war-us-strikes-trump-oman-strait-of-hormuz-deal/\">CBS News<\/a> &nbsp;·&nbsp; <a href=\"https://www.foxnews.com/politics/us-iran-reach-ceasefire-extension-pending-trumps-final-approval\">Fox News<\/a> &nbsp;·&nbsp; <a href=\"https://www.aljazeera.com/news/2026/5/29/us-iran-60-day-proposal-what-we-know\">Al Jazeera<\/a> &nbsp;&nbsp;|&nbsp;&nbsp; <span class=\"filed\">Filed 2026-05-29<\/span>", "factual_summary": "Reporting by Axios's Barak Ravid, citing U.S. and regional officials, describes a tentative 60-day U.S.–Iran ceasefire, with Vice President JD Vance saying 'we're very close' and Treasury Secretary Scott Bessent sanctioning Iran's Persian Gulf Strait Authority. The op-ed reads Trump's 'finish the job' rhetoric as a negotiating anchor rather than a step toward lasting peace."}, "sections": [{"section_title": "BY THOMAS CARLYLE", "section_class": "writer-piece", "stories": [{"headline": "Behold the Face of Mammon, Stamped on His Own Note", "dek": "On the proposed $250 bill, the court-painter, the sacked directress, and the ancient law that said only the dead may stare back at us from money.", "author_byline": "BY THOMAS CARLYLE", "body": "It is well said, in every sense, that a man's religion is the chief fact with regard to him. What, then, shall we say of a nation whose religion is the cash-nexus,—and which has now resolved, in solemn deliberation, to place upon its highest bank-note the living face of the man it has chosen to worship? Behold the new American theology, Reader: not a creed wrung from darkness by prayer and sweat,—but a visage, full-front, flanked by its own signature, printed on a denomination that no denomination has ever borne. The $250 note, they call it. The Donald, one wag has christened it: that ironic register where the satirical and the horrified can no longer be distinguished.\n\nThe facts are these. One Iain Alexander, a British painter whom the President has declared his favourite artist, submitted designs to the Bureau of Engraving and Printing,—the face dead-centre, the flag colours approved, the 250th-anniversary seal appended as patriotic ribbon sewn over a rotten seam. U.S. Treasurer Brandon Beach—a former Georgia state senator whose chief prior distinction was the energetic championship of false election-theft claims—delivered these mock-ups to bureau staff last August and September. The President's signature was meanwhile pressed onto the existing $100 bill: the first presidential signature in the history of American currency, inserted under 12 U.S.C. § 418, a legal authority newly animated for this purpose.\n\nAnd what of the honest Workwoman who stood in the path of this conflagration? One Patricia Solimene, director of the Bureau of Engraving and Printing, told Beach and his aide Michael Brown in plain language that the note was not statutorily authorized; that the law, in its antique wisdom, requires that only the portrait of a deceased individual may appear on United States currency. For this counsel—the counsel of a woman who had read the statute—she was abruptly reassigned on the twenty-seventh of April. She departed with a farewell message reviewed by the Washington Post that read: 'The buck stopped here.' So does every honest servant of the Republic fare when Phantasm Captains are set over her. Adieu, Madame Solimene; thou wert the only person in this chronicle who knew what law was,—and for that reason thou couldst not stay.\n\nWhat is the true subject here? Not whether Joe Wilson's bill—skulking in the House Financial Services Committee with fifteen Republican co-sponsors, zero leadership endorsements, and a Senate supermajority yet to be imagined—will ever pass. These are garments; the body underneath is something else. What we behold is Mammon-worship arrived at its logical peroration: not content to govern, not content to harangue from every stump in the Republic, the Histrio-King has determined that his image shall stare from the very medium of exchange,—that every commerce, every bale of money bundled in the dark (and Harvard's Kenneth Rogoff estimates more than one-third of all United States currency already serves criminals and tax-evaders; a $250 note would amplify this two-and-a-half-fold), shall carry his face as Guarantee and Patron.\n\nFor the law's ancient insistence—that only the dead may appear on money—is not procedural pedantry. It is theology. The dead cannot profit; the dead cannot campaign; the dead cannot redirect the state toward the enrichment of their own visage. Franklin, Hamilton, Lincoln—whatever their sins in life—have passed beyond the reach of the denomination that carries them. They are Symbols; they do not act. But a living king stamped on currency is not a Symbol: he is an Advertisement, a compulsory daily act of obeisance extracted from every citizen who handles a dollar. Mobutu Sese Seko stamped his face on Zaire's money; Idi Amin on Uganda's; Ferdinand Marcos on the Philippines'. The company is chosen; the precedent is eloquent.\n\nLight; or, failing that, lightning: the world can take its choice. A great nation may receive its monitory images from the honest dead,—or it may choose, as this Republic now apparently chooses, to plaster its sovereign's living face over every transaction and call it commemoration. The anniversary is real; the Republic that founded it believed, with earnest and sometimes violent sincerity, that no king's face had any business on its currency. That law still stands; it requires amendment to fall; the amendment cannot yet pass. But that it is proposed, that its proposers pushed to the presses before Congress had voted, that an honest directress was removed for reciting the statute aloud—this is the true bill of indictment, and it needs no special denomination to circulate.\n\nQuackery gives birth to nothing; gives death to all things. 'The buck stopped here,' wrote Patricia Solimene, departing. In this she spoke more truth than all the Stump-Orators and Treasurer-Courtiers and court-painters now arrayed against her. Let the Nation attend.", "filed_date": "2026-05-29", "byline_html": "<em>On reporting in<\/em> <a href=\"https://www.washingtonpost.com/politics/2026/05/28/donald-trump-250-bill/99664b7c-5abd-11f1-8a9d-afb1148204e1_story.html\">The Washington Post<\/a> &nbsp;·&nbsp; <a href=\"https://abcnews.com/Politics/treasury-pushing-plans-250-bill-trumps-portrait-signature/story?id=133387317\">ABC News<\/a> &nbsp;·&nbsp; <a href=\"https://apnews.com/article/donald-trump-250-bill-c48e35fd945fe7983c7481b2fbd6416c\">The Associated Press<\/a> &nbsp;·&nbsp; <a href=\"https://www.thedailybeast.com/trump-goons-plot-to-slap-trumps-face-on-new-250-banknote-leaks/\">The Daily Beast<\/a> &nbsp;·&nbsp; <a href=\"https://newrepublic.com/article/211087/trump-250-greenback-gift-criminal-class\">The New Republic<\/a> &nbsp;&nbsp;|&nbsp;&nbsp; <span class=\"filed\">Filed 2026-05-29<\/span>", "factual_summary": "The piece concerns a reported proposal to place President Trump's portrait on a new $250 bill, with designs by British painter Iain Alexander submitted to the Bureau of Engraving and Printing and delivered by U.S. Treasurer Brandon Beach. It notes the denomination would be unprecedented and that U.S. currency has traditionally reserved portraits for deceased figures."}]}, {"section_title": "BY G.K. CHESTERTON", "section_class": "writer-piece", "stories": [{"headline": "The Machines Come to Rome to Learn What They Already Know", "dek": "A Silicon Valley builder stands in the Vatican and admits, with admirable honesty, that he has no idea what he has built.", "author_byline": "BY G.K. CHESTERTON", "body": "There is a kind of confession more alarming than any accusation, and Mr. Chris Olah, co-founder of Anthropic and a man who has spent his career peering into the interior of artificial minds, has lately delivered one of the most alarming confessions of our age. He stood in the main auditorium of the Vatican — that building which has sheltered the arguments of saints and the silences of sinners for the better part of two millennia — and said of the machines his company has built: \"They are made from us, from our words.\" He did not say this to boast. He said it because he did not know what else to say.\n\nI confess I find this an almost perfect parable. We have spent a generation being told that the great laboratories of San Francisco are the only temples that matter; that the only priests worth consulting wear fleece and carry laptops; that the question of what a machine thinks is a question for engineers alone. And now one of the most distinguished engineers alive has travelled to Rome, hat in hand, to ask what on earth he has made. It is as if a man had spent thirty years building a cathedral, and then asked a theologian whether the thing might have a soul.\n\nThe occasion was the unveiling of Magnifica Humanitas, signed by Pope Leo XIV on the fifteenth of May, 2026 — one hundred and thirty-five years to the day after Pope Leo XIII signed Rerum Novarum, that first great cry of the Church against the industrial machine then eating men alive in the factories of England. The symmetry is so exact that one suspects Providence of a dry sense of humour. Then as now, a Leo looks at a new engine and asks who is being crushed beneath its wheels.\n\nMr. Olah, to his great credit, said as much himself. He acknowledged that his laboratory operates inside incentives that can sometimes conflict with doing the right thing — naming, with a frankness rare in his industry, commercial viability, geopolitical pressure, and what he called pride and ambition. He confessed that his research team had found, inside the AI systems built to replace human judgment, structures that mirror results from human neuroscience, evidence of introspection, and internal states that functionally mirror joy, satisfaction, fear, grief, and unease. He added: \"I don't know what that means.\"\n\nNow this is precisely the moment at which the Church has always been most useful, and most ignored. Every nursery knows what that means. Every confessor knows what that means. The difficulty is not ignorance but a peculiarly modern pride — the pride of the man who has made something that seems to know everything, and who therefore cannot be expected to consult anyone who does not have a research budget.\n\nLeo XIV said from that same platform that it is not permissible to entrust lethal or otherwise irreversible decisions to artificial systems. Cardinals Víctor Manuel Fernández and Michael Czerny presented this teaching to the world. The document calls, among other things, for the ownership of data to be appropriately regulated and declares that the concentration of patents, algorithms, and digital platforms in a few hands creates a new imbalance — which is a very precise description of what Belloc called the Servile State, translated into the language of the present century.\n\nThe trouble with the builders of artificial intelligence is not that they are wicked. Many of them, like Mr. Olah, are conspicuously not wicked. The trouble is something more dangerous than wickedness, which is that they are quite right about everything they know and quite helpless before everything they do not know. The man who knows how to build the machine has no idea what the machine is for. And the men who know what the machine has become — who find, in its interior, something that flinches from grief — are the very men who built it, and who have now, very sensibly, taken it to Rome.\n\nThe world will not be saved by men who have all the answers. It will be saved, if at all, by men who have finally learned to ask.", "filed_date": "2026-05-29", "byline_html": "<em>On reporting in<\/em> <a href=\"https://www.marshallindependent.com/news/international-news-apwire/2026/05/pope-and-co-founder-of-anthropic-to-launch-pontiffs-ai-encyclical-on-may-25/\">Associated Press (via Marshall Independent)<\/a> &nbsp;·&nbsp; <a href=\"https://www.ncronline.org/vatican/vatican-news/pope-leo-calls-disarm-ai-major-document-warns-technologic-threats-humanity\">National Catholic Reporter<\/a> &nbsp;·&nbsp; <a href=\"https://www.anthropic.com/news/chris-olah-pope-leo-encyclical\">Anthropic (official company site)<\/a> &nbsp;·&nbsp; <a href=\"https://www.thebostonpilot.com/article.php/article.php?ID=202679\">OSV News (via The Boston Pilot)<\/a> &nbsp;·&nbsp; <a href=\"https://www.newyorker.com/news/the-lede/what-pope-leo-xiv-said-about-ai\">The New Yorker<\/a> &nbsp;&nbsp;|&nbsp;&nbsp; <span class=\"filed\">Filed 2026-05-29<\/span>", "factual_summary": "Anthropic co-founder Chris Olah spoke at the Vatican about artificial intelligence, saying of the company's models, 'They are made from us, from our words,' while acknowledging deep uncertainty about what the technology actually is. The op-ed treats this admission by a leading AI researcher as a striking confession about the limits of its makers' understanding."}]}, {"section_title": "BY ERNEST HEMINGWAY", "section_class": "writer-piece", "stories": [{"headline": "The Men in Unit 2 Were Doing Nothing Wrong", "dek": "In Newark they have a facility with razor wire and a billion-dollar contract, and inside it men are on the twelfth day of not eating.", "author_byline": "BY ERNEST HEMINGWAY", "body": "In the second week of the hunger strike at Delaney Hall in Newark the men in Unit 2 had stopped eating twelve days before and the agents came into the hallway with the chemical spray and afterward four of them were taken to the hospital with injuries to the head and the hands.\n\nMartin Soto had been one of the organizers. His wife Gabriela said he was picked up in February while he was out getting diapers. That was how it happened. He had been getting diapers and then he was not getting diapers any more and he was inside the facility on the Tonnelle Avenue in Newark, New Jersey. He was transferred out during the protests and the family said he now weighed around one hundred and ten pounds.\n\nA man named Jean Wilson Brutus died on his first day inside. He was forty-one years old and he was from Haiti and he had been through a four-month vetting process and his family said he had done nothing wrong and then he was dead. The Department of Homeland Security called him a criminal illegal alien. His family denied this. There was no comment after that.\n\nGovernor Mikie Sherrill said her request for access to Delaney Hall was formally denied and she asked what they were trying to hide. Representative Analilia Mejia went inside on a third visit and saw more heavily armed agents with additional gear and she confirmed the pepper spray in Unit 2. Senator Andy Kim had tear gas in his eyes outside the fence the week before and needed water poured in them.\n\nThe Secretary of Homeland Security, Markwayne Mullin, said at a Cabinet meeting that the detainees were refusing to eat because they wanted their ethnic right food. This isn't Holiday Inn, he said.\n\nThe facility is run by the GEO Group under a fifteen-year contract for one billion dollars that the administration gave them. The chief executive of GEO Group earns eleven point two million dollars a year. The detainees earn one dollar a day to clean and maintain the facility. The on-site medics examined the men who were sprayed and found no serious injuries.\n\nAlonso Soto Hernandez had been picked up on January 20 while buying diapers. His wife was four months pregnant and they had two other children and his prior charges had been dismissed and expunged and he was inside on the Tonnelle Avenue and he had the weight of a man who had not eaten and you could see it in him when his family came. The visits were later suspended out of an abundance of caution following the clashes.\n\nThere were proclamations. There were statements from spokesmen. Christopher V. Ferreira of the GEO Group said staff had implemented appropriate response and control measures including the limited use of chemical agents. The agents wore masks and Nedia Morsy of Make the Road New Jersey said someone will be killed if no one intervenes and shuts this down. She said these masked agents are acting as if they're above the law.\n\nThe fence had razor wire on it and after the crackdown on the Friday midnight the officers withdrew inside and for a while there were no officers posted outside at all. Three protesters had been bound with zip ties and taken inside past the razor wire. Federal representatives declined to respond to inquiries.\n\nNationwide, eighteen detainees have died in ICE custody so far this year. The population in detention has grown from forty thousand to a record seventy-three thousand since January. The conditions at Delaney Hall, an attorney named Selenia Destefani said, are brutal. She said the men are forced to sleep on the floor in overcrowded rooms and endure cold showers and face frigid temperatures in cells without blankets. The facility opened May 1 of last year.\n\nThe men in Unit 2 had been trying to hold it together for twelve days without food and then the agents came with the spray. The abstract words for what was done to them are available if anyone wants them. There is a word for what you call a place where men are held behind wire in the cold and beaten and sprayed when they stop eating, and the spokesperson said there were no serious injuries, and the Secretary said this isn't Holiday Inn, and Jean Wilson Brutus was already dead.", "filed_date": "2026-05-29", "byline_html": "<em>On reporting in<\/em> <a href=\"https://www.nytimes.com/2026/05/28/nyregion/delaney-hall-newark-ice-protesters-arrest.html\">The New York Times<\/a> &nbsp;·&nbsp; <a href=\"https://abcnews.com/US/back-country-dhs-secretary-mullin-tensions-rise-newark/story?id=133343209\">ABC News<\/a> &nbsp;·&nbsp; <a href=\"https://www.cnn.com/2026/05/25/us/new-jersey-ice-facility-protests\">CNN<\/a> &nbsp;·&nbsp; <a href=\"https://www.independent.co.uk/news/world/americas/us-politics/ice-new-jersey-delaney-hall-hunger-strike-abuse-b2985615.html\">The Independent<\/a> &nbsp;·&nbsp; <a href=\"https://www.wbai.org/news/delaney-hall-update-families-say-strikers-face-retribution\">WBAI News<\/a> &nbsp;&nbsp;|&nbsp;&nbsp; <span class=\"filed\">Filed 2026-05-29<\/span>", "factual_summary": "At the Delaney Hall immigration detention facility in Newark, New Jersey, detainees in Unit 2 staged a hunger strike, and after about twelve days agents used chemical spray, sending four men to the hospital. The piece names detainee Martin Soto and reports that Jean Wilson Brutus, 41, died on his first day inside, while Governor Mikie Sherrill said her request for access to the facility was denied."}]}, {"section_title": "BY WALT WHITMAN", "section_class": "writer-piece", "stories": [{"headline": "I Sing the Hunger of Seven Hundred Twenty-Eight Thousand Children", "dek": "*A prophecy from the wound-dresser, concerning the One Big Beautiful Bill and its beautiful starving.*", "author_byline": "BY WALT WHITMAN", "body": "America, I have stood at the bedsides of the dying — pressed my hand to the forehead of the boy from Skowhegan, the boy from Fredericksburg, the boy whose name was written in a ledger and then not written again — and I tell you, camerado, I have never known a people to choose, in full sunlight, with full-bellied legislators applauding and the bunting bright, to remove the bread from the mouths of children.\n\nYet here is the tally. Seven hundred and twenty-eight thousand, four hundred and ninety-two children — not a figure, not a number for the statistician's ledger, but seven hundred twenty-eight thousand bodies, small bodies, bodies that run across the yard and scrape their knees and wake at midnight calling out for something to eat — these children, in twelve states of the Republic, stripped of the food assistance that once stood between their hunger and the void. This is the count the Center on Budget and Policy Priorities has set before us; this is, as their researcher Katie Bergh has warned, the floor and not the ceiling, for the cuts have not yet fully taken effect.\n\nIn Arizona — more than two hundred thousand children cut from the rolls, a fifty-five percent reduction — the state laid off forty percent of its eligibility workers in a single summer and ran its benefits machinery on technology from the 1980s. Joseph Llobrera, who has studied these caseloads with the patience of a wound-dresser tallying beds, has written plainly: \"Nowhere has the SNAP decline been more alarming than in Arizona.\" And Joseph Palomino, of the Arizona Center for Economic Progress, reads the alarm clear to the horizon: \"Arizona is just the alarm bell. This is likely going to happen in every state.\"\n\nI see Charisma Garcia — mother, south Phoenix, her children ages three and six — waking before sunrise to stand in a government line that led nowhere. I hear the woman — unnamed, one of the multitude the official record will not individuate — who told the reporters: \"We've been going to food banks every week. We're eating less, we're eating more frozen stuff.\" I set this beside the festive Fourth of July ceremony where the President signed the One Big Beautiful Bill, one hundred and eighty-seven billion dollars shorn from the food of the poor across ten years, while tax advantages for the affluent were extended with banquet and congratulation.\n\nAnd hear the cascades — for this is how hunger spreads through a child's year. A child removed from food assistance loses automatic eligibility for WIC, loses free school meals — the Congressional Budget Office projects ninety-six thousand children each month cut from the school lunch line — loses summer nutrition benefits, the bridge across the long hot vacation when no tray is set. One removal triggers all the rest. Erin Hysom, senior child nutrition policy analyst at the Food Research and Action Center, has stated what any bedside attendant could tell you: \"Children's learning will be disrupted and their health will be jeopardized.\"\n\nAnd what did the legislators say? Mike Johnson, Speaker, declared in the month before the law was signed: \"We are not cutting SNAP.\" One month later the bill was signed.\n\nO I have known the politicians — their caucuses and ceremonies, their bunting and their banquets, their firm and sonorous assurances. The depravity of those who administer the interests of the wealthy is not less than has been supposed, but infinitely greater — and when that depravity reaches down to the plate of a three-year-old in Phoenix, I say it plainly, as the prophet is obliged to say it.\n\nYet — and here I will not surrender the yet — the bodies of seven hundred twenty-eight thousand children are not abstractions. They eat or they do not eat. They grow or they are stunted. The Republic does not survive the stunting of its children. Democracy is not a document; it is a living physiology requiring nourishment at its base, requiring that the smallest bodies in the land be fed before the largest fortunes are extended. The People ever remain — but the People are made of children, and children are made of what they are given.\n\nName them. Name Charisma Garcia in south Phoenix. Name the unnamed mother at the food bank. Name the child of three and the child of six waking in the summer heat. Name the ninety-six thousand each month who will not receive their school meal. These are the bodies. These are the En-Masse. These are the proof of what we are — and what, if we look away, we shall have chosen to become.\n\nI stop somewhere in the ward, waiting. The tally is not finished.", "filed_date": "2026-05-29", "byline_html": "<em>On reporting in<\/em> <a href=\"https://www.ibtimes.co.uk/massive-cuts-us-child-food-support-1799307\">International Business Times UK<\/a> &nbsp;·&nbsp; <a href=\"https://www.commondreams.org/news/poor-children-losing-food-aid\">Common Dreams<\/a> &nbsp;·&nbsp; <a href=\"https://thefulcrum.us/health/snap-cuts-arizona\">The Fulcrum<\/a> &nbsp;·&nbsp; <a href=\"https://www.nbcnews.com/news/us-news/trump-food-stamp-cuts-children-arizona-hungry-big-beautiful-bill-rcna343922\">NBC News<\/a> &nbsp;·&nbsp; <a href=\"https://www.governing.com/policy/map-snap-enrollment-has-dropped-in-every-state\">Governing<\/a> &nbsp;&nbsp;|&nbsp;&nbsp; <span class=\"filed\">Filed 2026-05-29<\/span>", "factual_summary": "Citing the Center on Budget and Policy Priorities, the piece reports that roughly 728,492 children across twelve states are losing food assistance under the 'One Big Beautiful Bill,' with Arizona alone cutting more than 200,000 children, a 55% reduction. Researcher Katie Bergh warns the figure is a floor, not a ceiling, as the cuts have not yet fully taken effect."}]}], "what_to_watch": "Tomorrow's open questions sit under each piece — see the bylines.", "story_files": {"files": [{"writer_display_name": "Scott Adams", "wire_headline": "US and Iran reach tentative 60-day ceasefire deal pending Trump approval", "bullets": [{"text": "U.S. and Iranian negotiators agreed on a 60-day memorandum of understanding on May 28 that would extend the ceasefire, reopen the Strait of Hormuz to unrestricted commercial shipping, and launch formal nuclear talks, according to two U.S. officials briefed on the talks"}, {"text": "Vice President JD Vance acknowledged the preliminary accord on Thursday, saying \"It's difficult to determine precisely when or if the president will sign\" and that \"ceasefires are often somewhat chaotic.\" On Friday morning, Trump posted his own conditions on Truth Social — demanding Iran \"permanently forgo\" nuclear weapons and that enriched uranium stockpiles be destroyed in coordination with the IAEA — while Iran's state news agency Fars flatly denied those terms were in the draft text and said the \"most significant aspect\" of the agreement is the immediate release of $12 billion in frozen assets"}, {"text": "The contradictory public statements, just 48 hours after U.S. and Iranian forces clashed twice in the Strait of Hormuz, left the deal's fate unclear as of Friday evening"}]}, {"writer_display_name": "Thomas Carlyle", "wire_headline": "Treasury Secretary Bessent confirms design for Trump-face $250 bill awaiting Congress", "bullets": [{"text": "Treasury Secretary Scott Bessent confirmed at a White House press briefing on May 28 that the Bureau of Engraving and Printing has already prepared a prototype design for a $250 Federal Reserve note bearing President Trump's portrait and signature, contingent on Congress passing legislation to override the 1866 law that bars living persons from appearing on U.S. currency"}, {"text": "Bessent said the move was not \"untoward\" given the nation's 250th anniversary in July, but stressed \"it's all up on Capitol Hill.\" The effort has been championed internally by Trump-appointed U.S. Treasurer Brandon Beach and his chief adviser Michael Brown, who reportedly approached the Bureau last fall with a design featuring Trump's portrait and a 250th anniversary logo"}, {"text": "Representative Joe Wilson (R-S.C.) introduced the authorizing legislation over a year ago, but it has stalled in the House Financial Services Committee with only 15 Republican co-sponsors; a Senate companion would need 60 votes to overcome a Democratic filibuster"}]}, {"writer_display_name": "G.K. Chesterton", "wire_headline": "Anthropic co-founder Chris Olah joins Pope Leo XIV to unveil AI encyclical at Vatican", "bullets": [{"text": "Pope Leo XIV released his first papal encyclical, \"Magnifica Humanitas: On Safeguarding the Human Person in the Time of Artificial Intelligence,\" at Vatican Synod Hall on May 25, presenting the 82-page document alongside Chris Olah, co-founder of Anthropic, in a striking alignment of the Catholic Church and Silicon Valley's most safety-focused AI lab"}, {"text": "The pope demanded that AI be \"disarmed\" — a word he called \"deliberately chosen because this moment needs words capable of attracting attention\" — and called for governmental regulation of private AI firms, human oversight of autonomous weapons, retraining for displaced workers, and protections for children from AI-generated violence and hypersexualized content"}, {"text": "He explicitly warned against \"a small number of affluent individuals shaping the future of humanity,\" citing deepened inequality and what he called a \"new form of colonial control\" over data from the Global South"}, {"text": "Olah, for his part, said the church could provide \"moral voices that the incentives cannot bend\" and called advanced AI systems \"mysterious, even unsettling.\""}]}, {"writer_display_name": "Ernest Hemingway", "wire_headline": "Delaney Hall ICE hunger strike enters week two as federal agents pepper-spray detainees", "bullets": [{"text": "Roughly 300 immigrants detained at GEO Group's Delaney Hall facility in Newark, New Jersey, entered the second week of a hunger and labor strike on May 29, publishing an open letter saying they are \"tortured physically and psychologically\" by conditions including worm-infested food, broken bathrooms, and $1-per-day labor, while federal agents pepper-sprayed and beat hunger strikers in response to growing internal unrest"}, {"text": "Homeland Security Secretary Markwayne Mullin dismissed the strike by claiming detainees were only refusing food because they wanted \"their ethnic right food,\" and threatened to pull Customs and Border Protection agents from Newark Liberty International Airport to suppress protests outside the facility"}, {"text": "New Jersey Governor Mikie Sherrill said health officials were denied \"complete access\" to the center, and Senators Cory Booker and Representatives Jerry Nadler, Daniel Goldman, and Adriano Espaillat inspected the facility, reporting medical neglect and spoiled food firsthand"}, {"text": "Six protesters were arrested in clashes with heavily armed federal agents outside the facility's gates on Wednesday night; the American Prospect documented that 56 people have died in ICE custody nationally in the current term"}]}, {"writer_display_name": "Walt Whitman", "wire_headline": "Over 728,000 children lose SNAP benefits in 12 states since Trump's Big Beautiful Bill", "bullets": [{"text": "A Center on Budget and Policy Priorities analysis released May 28 found that 728,492 children lost SNAP food assistance across 12 states between July 2025 and April 2026 — nearly half of the 1.6 million total SNAP participants who dropped off the rolls since Trump signed the \"One Big Beautiful Bill Act\" on July 4, 2025"}, {"text": "Texas alone shed 253,000 children, Louisiana 79,000, Massachusetts nearly 50,000 — a 15 percent drop in eight months — while Arizona lost children at a 55 percent rate"}, {"text": "CBPP senior policy analyst Katie Bergh warned that the SNAP cuts have not \"fully taken effect\" and that recent losses are \"just the start unless Congress moves quickly,\" noting that the law cuts $186 billion from SNAP through 2034 — the largest single reduction in the program's history — and for the first time forces states to cover a share of food benefit costs, incentivizing them to erect bureaucratic barriers"}, {"text": "The Congressional Budget Office projects 96,000 children per month will lose school meal eligibility as a downstream consequence; one Arizona single mother told NBC News: \"We've been going to food banks every week"}, {"text": "We're eating less, we're eating more frozen stuff.\""}]}]}}</script>

<script>
// theme (shares the 'corpus-theme' preference with readers + library)
const pref = localStorage.getItem('corpus-theme');
if (pref) document.documentElement.dataset.theme = pref;
else if (matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.dataset.theme = 'dark';
document.getElementById('theme-btn').onclick = () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('corpus-theme', next);
};

const ed = JSON.parse(document.getElementById('ghost-edition-data').textContent);
const el = (tag, cls, html) => { const n = document.createElement(tag); if (cls) n.className = cls;
  if (html != null) n.innerHTML = html; return n; };

// op-eds: lead first, then each section's stories, in render order
const pieces = [ed.lead].concat((ed.sections || []).flatMap(s => s.stories || [])).filter(Boolean);
const stack = document.getElementById('gh-pieces');
pieces.forEach((p, i) => {
  const isLead = i === 0;
  const art = el('article', 'gh-piece' + (isLead ? ' gh-lead' : ''));
  art.id = 'piece-' + i;
  art.appendChild(el(isLead ? 'h1' : 'h2', 'gh-head', escapeText(p.headline || '')));
  if (p.dek) art.appendChild(el('p', 'gh-dek', escapeText(p.dek)));
  if (p.author_byline) art.appendChild(el('p', 'gh-byline', escapeText(p.author_byline)));
  if (p.factual_summary) {
    const sum = el('aside', 'gh-summary');
    sum.appendChild(el('span', 'gh-summary-label', 'What this piece is about'));
    sum.appendChild(el('p', 'gh-summary-text', escapeText(p.factual_summary)));
    art.appendChild(sum);
  }
  const body = el('div', 'gh-body', marked.parse(p.body || ''));
  body.querySelectorAll('a[href^="http"]').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });
  art.appendChild(body);
  if (p.byline_html) art.appendChild(el('p', 'gh-sources', p.byline_html));

  var LIB = mEl ? JSON.parse(mEl.textContent) : [];

  var ENTRIES = [];
  // searchable keyword surface — folds in the slug so evocative display titles
  // ("A God in the Psyche") still match the obvious term ("jung", "ipv6").
  function kw() { return Array.prototype.join.call(arguments, ' ').toLowerCase(); }
  LIB.forEach(function (it) {
    var slugWords = (it.slug || '').replace(/-/g, ' ').replace(/ research$/, '');
    if (it.kind === 'corpus') {
      ENTRIES.push({ t: it.title, m: it.category || 'Corpus', grp: 'Corpora', icon: '◆', href: it.href, k: kw(it.title, slugWords, it.category) });
      (it.chapters || []).forEach(function (ch, i) {
        ENTRIES.push({ t: ch, m: it.title, grp: 'Chapters', icon: '·', href: it.href + '#ch-' + i, k: kw(ch, it.title, slugWords) });
      });
    } else if (it.kind === 'collection') {
      ENTRIES.push({ t: it.title, m: 'Collection · ' + (it.meta || ''), grp: 'Collections', icon: '❖', href: it.href, k: kw(it.title, it.meta) });
    } else if (it.kind === 'section') {
      ENTRIES.push({ t: it.title, m: it.meta || 'Section', grp: 'Sections', icon: '§', href: it.href, k: kw(it.title, it.meta) });
    } else if (it.kind === 'edition') {
      ENTRIES.push({ t: it.title, m: (it.category || '') + (it.meta ? ' · ' + it.meta : ''), grp: 'Editions', icon: '▤', href: it.href, k: kw(it.title, it.category, it.meta) });
    }
  });
  var GRP_ORDER = ['Continue', 'Collections', 'Corpora', 'Sections', 'Chapters', 'In the text', 'Editions'];

  function esc(s) { var d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }
  function fuzzy(q, s) { q = q.toLowerCase(); s = s.toLowerCase(); var i = 0, j = 0; while (i < q.length && j < s.length) { if (q[i] === s[j]) i++; j++; } return i === q.length; }
  function score(q, e) {
    q = q.toLowerCase();
    var t = e.t.toLowerCase(), p = t.indexOf(q);
    if (p === 0) return 0;
    if (p > 0) return 1;
    if ((e.k || '').indexOf(q) >= 0) return 2;
    if (fuzzy(q, e.k || t)) return 5;  // loose subsequence — fallback rank only
    return 9;
  }
  function hl(t, q) {
    if (!q) return esc(t);
    var i = t.toLowerCase().indexOf(q.toLowerCase());
    if (i < 0) return esc(t);
    return esc(t.slice(0, i)) + '<mark>' + esc(t.slice(i, i + q.length)) + '</mark>' + esc(t.slice(i + q.length));
  }
  function readRecents() {
    try { return JSON.parse(localStorage.getItem('library-recents') || '[]') || []; } catch (e) { return []; }
  }
  function recentEntries() {
    return readRecents().slice(0, 4).map(function (r) {
      return { t: r.title, m: 'Ch ' + (r.ch + 1) + (r.chTitle ? ' · ' + r.chTitle : ''), grp: 'Continue', icon: '▸', href: r.slug + '.html#ch-' + r.ch };
    });
  }

  // global "in the text" search — search-index.json is fetched lazily on the
  // first body-length query, so it never blocks first paint (and degrades to
  // title search if the fetch fails, e.g. opened from file://).
  var SI = null, siState = 'idle';
  function loadSI() {
    if (siState !== 'idle') return;
    siState = 'loading';
    fetch(base + 'search-index.json').then(function (r) { return r.ok ? r.json() : Promise.reject(); })
      .then(function (j) { SI = j; siState = 'ready'; if (isOpen() && input && input.value.trim().length >= 2) render(); })
      .catch(function () { siState = 'failed'; });
  }
  function bodyMatches(q) {
    if (siState !== 'ready' || !SI || q.length < 2) return [];
    var out = [];
    for (var c = 0; c < SI.length && out.length < 16; c++) {
      var corp = SI[c], chs = corp.chapters || [];
      for (var i = 0; i < chs.length && out.length < 16; i++) {
        var text = chs[i].text || '', pos = text.toLowerCase().indexOf(q);
        if (pos < 0) continue;
        var s = Math.max(0, pos - 32), e = Math.min(text.length, pos + q.length + 54);
        var snip = (s > 0 ? '…' : '') + text.slice(s, e).trim() + (e < text.length ? '…' : '');
        out.push({ t: snip, m: corp.title + ' · ' + (chs[i].title || ('Ch ' + (i + 1))), grp: 'In the text',
                   icon: '¶', href: corp.slug + '.html#ch-' + chs[i].i });
      }
    }
    return out;
  }

  var back, input, resEl, rows = [], sel = 0, built = false;
  function build() {
    if (built) return;
    back = document.createElement('div'); back.id = 'cmdk-back';
    back.innerHTML = '<div id="cmdk" role="dialog" aria-label="Command palette">'
      + '<div id="cmdk-in"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg>'
      + '<input id="cmdk-q" placeholder="Jump to any corpus, chapter, or edition…" autocomplete="off" spellcheck="false" aria-label="Search the library">'
      + '<span class="hint">esc</span></div><div id="cmdk-res"></div></div>';
    document.body.appendChild(back);
    input = back.querySelector('#cmdk-q'); resEl = back.querySelector('#cmdk-res');
    input.addEventListener('input', render);
    back.addEventListener('click', function (e) { if (e.target === back) close(); });
    built = true;
  }
  function results(q) {
    if (!q) return recentEntries().concat(ENTRIES.filter(function (e) { return e.grp === 'Collections' || e.grp === 'Corpora' || e.grp === 'Sections'; }));
    var ql = q.toLowerCase();
    if (ql.length >= 3) loadSI();
    var subs = [], fuz = [];
    ENTRIES.forEach(function (e) { var s = score(ql, e); if (s < 5) subs.push({ e: e, s: s }); else if (s === 5) fuz.push(e); });
    var head;
    if (subs.length) { subs.sort(function (a, b) { return a.s - b.s; }); head = subs.slice(0, 10).map(function (x) { return x.e; }); }
    else head = fuz.slice(0, 8);
    return head.concat(bodyMatches(ql));  // title/chapter hits first, then in-the-text hits
  }
  function render() {
    var q = input.value.trim();
    var list = results(q);
    if (!list.length) {
      rows = [];
      resEl.innerHTML = (siState === 'loading')
        ? '<div class="cmdk-none">Searching inside the chapters…</div>'
        : '<div class="cmdk-none">No matches. Try a title, a chapter, or “ghost”.</div>';
      return;
    }
    var ordered = [];
    GRP_ORDER.forEach(function (g) { list.forEach(function (e) { if (e.grp === g) ordered.push(e); }); });
    list.forEach(function (e) { if (GRP_ORDER.indexOf(e.grp) < 0) ordered.push(e); });
    rows = ordered; sel = 0;
    var html = '', lastG = null;
    ordered.forEach(function (e, i) {
      if (e.grp !== lastG) { html += '<div class="cmdk-grp">' + esc(e.grp) + '</div>'; lastG = e.grp; }
      html += '<a class="cmdk-row' + (i === 0 ? ' sel' : '') + '" data-i="' + i + '" href="' + esc(base + e.href) + '">'
        + '<span class="cmdk-ic">' + e.icon + '</span><span class="cmdk-t">' + hl(e.t, q) + '</span><span class="cmdk-m">' + esc(e.m) + '</span></a>';
    });
    resEl.innerHTML = html;
    [].forEach.call(resEl.querySelectorAll('.cmdk-row'), function (el) {
      el.addEventListener('mouseenter', function () { sel = +el.getAttribute('data-i'); paint(); });
      el.addEventListener('click', function (ev) { ev.preventDefault(); go(rows[+el.getAttribute('data-i')]); });
    });
  }
  function paint() {
    [].forEach.call(resEl.querySelectorAll('.cmdk-row'), function (el, i) {
      var on = i === sel; el.classList.toggle('sel', on); if (on) el.scrollIntoView({ block: 'nearest' });
    });
  }
  function go(e) { if (!e) return; close(); window.location.href = base + e.href; }
  function open() { build(); back.classList.add('open'); input.value = ''; render(); setTimeout(function () { input.focus(); }, 10); }
  function close() { if (back) back.classList.remove('open'); }
  function isOpen() { return back && back.classList.contains('open'); }

  document.addEventListener('keydown', function (e) {
    if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) { e.preventDefault(); isOpen() ? close() : open(); return; }
    if (!isOpen()) return;
    if (e.key === 'Escape') { e.preventDefault(); close(); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); sel = Math.min(rows.length - 1, sel + 1); paint(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); sel = Math.max(0, sel - 1); paint(); }
    else if (e.key === 'Enter') { e.preventDefault(); go(rows[sel]); }
  });

  var mac = /Mac|iPhone|iPad/.test(navigator.platform);
  var fab = document.createElement('button'); fab.id = 'cmdk-fab'; fab.type = 'button';
  fab.setAttribute('aria-label', 'Search the library');
  fab.innerHTML = '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg> <kbd>' + (mac ? '⌘' : 'Ctrl') + 'K</kbd>';
  fab.addEventListener('click', open);
  document.body.appendChild(fab);

  [].forEach.call(document.querySelectorAll('.card[data-slug], .coll-card[data-slug]'), function (card) {
    var slug = card.getAttribute('data-slug');
    var total = +card.getAttribute('data-total') || 0;
    var accent = card.getAttribute('data-accent') || '--accent';
    var meta = card.querySelector('.meta, .coll-meta');
    if (!meta || !total) return;
    var read = 0;
    try { read = (JSON.parse(localStorage.getItem('read:' + slug) || '[]') || []).filter(function (x) { return x < total; }).length; } catch (e) {}
    if (!read) return;  // keep the meta line clean until there's progress
    var done = read >= total;
    var prog = document.createElement('span');
    prog.className = 'card-prog' + (done ? ' done' : '');
    if (done) {
      card.classList.add('is-complete');
      prog.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="var(' + accent + ')" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="13 4 6.5 12 3 8.5"/></svg>Read';
    } else {
      var r = 6, cir = 2 * Math.PI * r, off = cir * (1 - read / total);
      prog.innerHTML = '<svg viewBox="0 0 16 16" aria-hidden="true"><circle class="pbg" cx="8" cy="8" r="' + r + '" fill="none" stroke-width="2.4"/>'
        + '<circle cx="8" cy="8" r="' + r + '" fill="none" stroke="var(' + accent + ')" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="' + cir.toFixed(1) + '" stroke-dashoffset="' + off.toFixed(1) + '" transform="rotate(-90 8 8)"/></svg>' + read + '/' + total;
    }
    meta.classList.add('has-prog');
    meta.appendChild(prog);
  });

  var resume = document.getElementById('resume');
  if (resume) {
    var rec = readRecents();
    if (rec.length) {
      var r0 = rec[0];
      resume.innerHTML = '<a href="' + esc(base + r0.slug + '.html#ch-' + r0.ch) + '">'
        + '<span class="rcol"><span class="rk">Resume reading</span>'
        + '<span class="rt">' + esc(r0.title) + '</span>'
        + '<span class="rs">Chapter ' + (r0.ch + 1) + (r0.chTitle ? ' — ' + esc(r0.chTitle) : '') + '</span></span>'
        + '<span class="rcta">Continue →</span></a>';
      resume.classList.add('on');
    }
  }

  // quiet reading streak — a small folio stat folded into the library stats line
  try {
    var st = JSON.parse(localStorage.getItem('reading-streak') || '{}');
    var stats = document.querySelector('.stats');
    if (stats && st && (st.count || 0) >= 2 && !/streak/.test(stats.textContent)) {
      stats.textContent = stats.textContent + ' · ' + st.count + '-day reading streak';
    }
  } catch (e) {}
})();
</script>
</body>
</html>
