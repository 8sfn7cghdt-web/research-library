<style>
:root {
  --bg: #faf8f4; --panel: #f1ede5; --text: #1f1d1a; --muted: #6e6a62;
  --accent: #8c4a2f; --border: #ddd6c9; --cover-bg: #f3ead8;
  --t1: #b3502f; --t2: #c9a227; --t3: #2e5266; --t4: #6b7d4f;
  --serif: Georgia, 'Iowan Old Style', serif;
  --display: 'Iowan Old Style', Palatino, Georgia, serif;
  --sans: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
}
[data-theme="dark"] {
  --bg: #161513; --panel: #1f1d1a; --text: #e8e4db; --muted: #968f82;
  --accent: #d98f5f; --border: #35322c; --cover-bg: #232019;
  --t1: #d4795a; --t2: #d8b545; --t3: #6f9bb3; --t4: #93a86f;
}
* { box-sizing: border-box; }
@media (prefers-reduced-motion: no-preference) { html { scroll-behavior: smooth; } }
body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--serif); }
.masthead { max-width: 1080px; margin: 0 auto; padding: .8rem 2rem; display: flex;
  justify-content: space-between; align-items: center; font-family: var(--sans); font-size: .68rem;
  color: var(--muted); text-transform: uppercase; letter-spacing: .14em; border-bottom: 1px solid var(--border); }
.mh-nav { display: flex; gap: 1.3rem; }
.mh-nav a { color: var(--muted); text-decoration: none; border-bottom: 1px solid transparent; padding-bottom: 2px; }
.mh-nav a:hover { color: var(--accent); border-bottom-color: var(--accent); }
.section-title { max-width: 1080px; margin: 1.6rem auto .2rem; padding: 0 2rem; font-family: var(--display);
  font-size: 1.5rem; scroll-margin-top: 1rem; }
.section-title::after { content: ""; display: block; height: 4px; width: 96px; margin-top: .5rem; border-radius: 2px;
  background: linear-gradient(90deg, var(--t1) 0 25%, var(--t2) 0 50%, var(--t3) 0 75%, var(--t4) 0); }
/* Today's Passage — the daily pull-quote hook pinned atop the index. */
#daily-passage { max-width: 1080px; margin: 1.6rem auto 0; padding: 0 2rem; }
.dp-quote { display: block; position: relative; overflow: hidden; text-decoration: none; color: var(--text);
  background: var(--panel); border: 1px solid var(--border); border-radius: 18px; padding: 1.6rem 1.9rem 1.4rem;
  transition: transform .16s cubic-bezier(.34,1.56,.64,1), border-color .16s ease; }
.dp-quote:hover { transform: translateY(-2px); border-color: var(--accent); }
.dp-kicker { display: block; font-family: var(--sans); font-size: .68rem; text-transform: uppercase;
  letter-spacing: .18em; color: var(--accent); margin: 0 0 .55rem; }
.dp-mark { position: absolute; top: .2rem; right: 1.2rem; font-family: var(--display); font-size: 5rem;
  line-height: 1; color: var(--accent); opacity: .12; }
.dp-text { display: block; font-family: var(--display); font-style: italic; font-size: clamp(1.2rem, 2.5vw, 1.6rem);
  line-height: 1.36; margin: 0 0 .8rem; max-width: 46rem; }
.dp-src { display: block; font-family: var(--sans); font-size: .8rem; color: var(--muted); margin: 0 0 1rem; }
.dp-cta { font-family: var(--sans); font-size: .74rem; text-transform: uppercase; letter-spacing: .08em;
  color: var(--accent); border-bottom: 1.5px solid var(--accent); padding-bottom: 2px; }
/* The Ghost of Times feature band on the home page — inky newspaper contrast to the mosaic library. */
.ghost-band { max-width: 1080px; margin: 2rem auto 0; padding: 0 2rem; }
.ghost-band a { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 1.6rem;
  text-decoration: none; color: #f3ead8; background: #1b1a17; border: 1px solid #322f29; border-radius: 18px;
  padding: 1.5rem 1.8rem; transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease; }
.ghost-band a:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(0,0,0,.28); border-color: var(--t2); }
.ghost-band .gb-flag { font-family: var(--display); font-size: 2.1rem; line-height: 1; color: #f3ead8;
  border-right: 1px solid #46423a; padding-right: 1.6rem; }
.ghost-band .gb-flag small { display: block; font-family: var(--sans); font-size: .58rem; letter-spacing: .22em;
  text-transform: uppercase; color: var(--t2); margin-top: .5rem; }
.ghost-band .gb-mid .gb-kicker { font-family: var(--sans); font-size: .68rem; text-transform: uppercase;
  letter-spacing: .16em; color: var(--t2); margin: 0 0 .35rem; }
.ghost-band .gb-mid .gb-lead { font-family: var(--display); font-size: 1.18rem; line-height: 1.28; margin: 0 0 .3rem; color: #f6efe2; }
.ghost-band .gb-mid .gb-sub { font-family: var(--sans); font-size: .82rem; line-height: 1.45; color: #b9b2a4; margin: 0; }
.ghost-band .gb-cta { font-family: var(--sans); font-size: .76rem; text-transform: uppercase; letter-spacing: .1em;
  color: #1b1a17; background: var(--t2); border-radius: 12px; padding: .55rem 1rem; white-space: nowrap; }
@media (max-width: 680px) {
  .ghost-band a { grid-template-columns: 1fr; gap: .9rem; }
  .ghost-band .gb-flag { border-right: none; border-bottom: 1px solid #46423a; padding: 0 0 .9rem; }
  .masthead { flex-direction: column; align-items: flex-start; gap: .5rem; letter-spacing: .09em; }
  .mh-nav { flex-wrap: wrap; gap: .4rem 1.1rem; }
}
header { max-width: 1080px; margin: 0 auto; padding: 2.6rem 2rem 1rem; display: flex;
  align-items: center; gap: 2.5rem; }
.hero-text { flex: 1.1; }
.hero-art { flex: 1; min-width: 0; }
.hero-art svg { width: 100%; height: auto; display: block; }
.hero-art .hero-img { width: 100%; height: auto; display: block; border-radius: 10px; }
[data-theme="dark"] .hero-art .hero-core { fill: #161513; }
[data-theme="dark"] .hero-art .hero-ground { fill: #e8e4db; }
.kicker { font-family: var(--sans); font-size: .72rem; text-transform: uppercase;
  letter-spacing: .18em; color: var(--accent); margin: 0 0 .6rem; }
header h1 { font-family: var(--display); font-size: clamp(2.3rem, 4.6vw, 3.3rem);
  line-height: 1.08; margin: 0 0 .7rem; letter-spacing: -.01em; }
.tagline { color: var(--muted); margin: 0 0 1.1rem; font-family: var(--sans); font-size: .95rem;
  line-height: 1.5; max-width: 34rem; }
.stats { font-family: var(--sans); font-size: .74rem; color: var(--accent); margin: 0;
  text-transform: uppercase; letter-spacing: .1em; }
.library { max-width: 1080px; margin: 0 auto; padding: 0 0 3rem; }
/* Library toolbar — search box + category filter pills. */
.lib-toolbar { padding: 1.2rem 2rem .4rem; display: flex; flex-wrap: wrap; align-items: center;
  gap: .9rem 1.4rem; }
.lib-search { flex: 1 1 240px; min-width: 0; max-width: 360px; font-family: var(--sans); font-size: .9rem;
  color: var(--text); background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  padding: .55rem .85rem; -webkit-appearance: none; appearance: none; }
.lib-search:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(140,74,47,.14); }
.lib-search::placeholder { color: var(--muted); }
.cat-pills { display: flex; flex-wrap: wrap; gap: .5rem; }
.cat-pill { font-family: var(--sans); font-size: .76rem; letter-spacing: .02em; color: var(--muted);
  background: transparent; border: 1px solid var(--border); border-radius: 999px; padding: .4rem .85rem;
  cursor: pointer; transition: color .15s ease, border-color .15s ease, background .15s ease; }
.cat-pill:hover { color: var(--accent); border-color: var(--accent); }
.cat-pill.active { color: var(--bg); background: var(--accent); border-color: var(--accent); }
.cat-pill .cat-count { opacity: .65; font-size: .9em; }
.cat-section { padding-top: .6rem; }
.cat-section[hidden] { display: none; }
.cat-heading { max-width: 100%; margin: 1.2rem 0 0; padding: 0 2rem; font-family: var(--display);
  font-size: 1.18rem; color: var(--text); display: flex; align-items: baseline; gap: .5rem; }
.cat-heading .cat-count { font-family: var(--sans); font-size: .72rem; color: var(--muted);
  font-weight: normal; letter-spacing: .06em; }
.lib-empty { font-family: var(--sans); color: var(--muted); text-align: center; padding: 2.5rem 2rem; margin: 0; }
.grid { padding: 1.1rem 2rem 1.4rem;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.4rem; }
.card { display: flex; flex-direction: column; background: var(--panel); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden; text-decoration: none; color: var(--text);
  transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .15s ease, border-color .15s ease; }
.card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,.1); border-color: var(--accent); }
.card:active { transform: translateY(-1px) scale(.992); }
.cover { background: var(--cover-bg); border-bottom: 1px solid var(--border); }
.cover svg { width: 100%; height: 124px; display: block; }
/* Photo covers crop to the card band at any source size/aspect ratio. */
.cover .cover-photo { width: 100%; height: 124px; object-fit: cover; object-position: center; display: block; }
.card-body { padding: 1.05rem 1.2rem 1.15rem; display: flex; flex-direction: column; flex: 1; }
.card h2 { font-family: var(--display); font-size: 1.13rem; line-height: 1.3; margin: 0 0 .4rem; }
.card .sub { color: var(--muted); font-size: .8rem; font-family: var(--sans);
  margin: 0 0 .9rem; line-height: 1.45; flex: 1;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.card .meta { color: var(--accent); font-size: .7rem; font-family: var(--sans);
  text-transform: uppercase; letter-spacing: .08em; margin: 0; }
footer { max-width: 1080px; margin: 0 auto; padding: 1rem 2rem 3rem; border-top: 1px solid var(--border); }
.tiles { display: flex; gap: 5px; margin: 1.2rem 0 .9rem; }
.tiles span { width: 13px; height: 13px; }
.tiles span:nth-child(1) { background: var(--t1); border-radius: 3px 8px 4px 7px; transform: rotate(-6deg); }
.tiles span:nth-child(2) { background: var(--t2); border-radius: 7px 3px 8px 4px; transform: rotate(8deg); }
.tiles span:nth-child(3) { background: var(--t3); border-radius: 4px 7px 3px 8px; transform: rotate(-4deg); }
.tiles span:nth-child(4) { background: var(--t4); border-radius: 8px 4px 7px 3px; transform: rotate(5deg); }
.epigraph { font-style: italic; color: var(--muted); margin: 0 0 .3rem; font-size: .92rem; }
.colophon { font-family: var(--sans); font-size: .74rem; color: var(--muted); margin: 0; }
@media (max-width: 760px) {
  header { flex-direction: column-reverse; gap: 1.2rem; padding-top: 1.6rem; }
  .hero-art { width: 100%; }
}

/* A single Ghost of Times edition — the corpus reader's reading column in
   newspaper dress. Shares every colour/font token with the rest of the site. */
.gh-edition { max-width: 760px; margin: 0 auto; padding: 2.2rem 2rem 1rem; }

/* nameplate — a compact echo of ghost.html's section plate. `display:block`
   overrides the generic `header{display:flex}` rule from LIBRARY_CSS so the
   kicker / name / folio stack vertically like the section front. */
.gh-nameplate { display: block; text-align: center; max-width: 640px; margin: 0 auto 2.6rem; padding: 0; }
.gh-kicker { font-family: var(--sans); font-size: .68rem; text-transform: uppercase;
  letter-spacing: .2em; color: var(--accent); margin: 0 0 .45rem; }
.gh-name { display: inline-block; font-family: var(--display); font-weight: 800;
  font-size: clamp(2.1rem, 5.2vw, 3.1rem); line-height: .98; letter-spacing: -.02em;
  color: var(--text); text-decoration: none; margin: 0 0 .9rem; }
.gh-name:hover { color: var(--accent); }
.gh-folio { display: flex; justify-content: space-between; align-items: center; gap: 1rem;
  border-top: 1px solid var(--text); border-bottom: 1px solid var(--text); padding: .5rem 0;
  font-family: var(--sans); font-size: .66rem; text-transform: uppercase; letter-spacing: .14em; }
.gh-folio .gh-folio-c { color: var(--accent); font-weight: 700; }

/* contents — every story + author, clickable to its piece */
.gh-contents { display: block; margin: 0 0 2.8rem; }
.gh-contents-h { font-family: var(--sans); font-size: .68rem; text-transform: uppercase; letter-spacing: .2em;
  color: var(--muted); border-bottom: 2px solid var(--text); padding-bottom: .5rem; margin: 0 0 .1rem; }
.gh-toc-item { display: grid; grid-template-columns: 3.2rem 1fr; gap: .8rem; align-items: baseline;
  text-decoration: none; color: var(--text); padding: .7rem .2rem; border-bottom: 1px solid var(--border); }
.gh-toc-item:hover { background: var(--panel); }
.gh-toc-no { font-family: var(--sans); font-size: .68rem; text-transform: uppercase; letter-spacing: .1em;
  color: var(--accent); white-space: nowrap; padding-top: .15rem; }
.gh-toc-item.is-lead .gh-toc-no { font-weight: 700; }
.gh-toc-head { font-family: var(--display); font-size: 1.12rem; line-height: 1.2; display: block;
  transition: color .15s ease; }
.gh-toc-item:hover .gh-toc-head { color: var(--accent); }
.gh-toc-by { font-family: var(--sans); font-size: .68rem; text-transform: uppercase; letter-spacing: .1em;
  color: var(--muted); display: block; margin-top: .25rem; }

/* the op-ed stack */
.gh-piece { margin: 0; scroll-margin-top: 1.2rem; }
.gh-head { font-family: var(--display); font-weight: 800; letter-spacing: -.01em;
  line-height: 1.1; margin: 0 0 .55rem; }
.gh-piece .gh-head { font-size: clamp(1.55rem, 3.2vw, 2rem); }
.gh-lead .gh-head { font-size: clamp(2rem, 4.6vw, 2.9rem); line-height: 1.06; }
.gh-lead .gh-head::after { content: ""; display: block; height: 4px; width: 110px; margin-top: .6rem;
  border-radius: 2px; background: linear-gradient(90deg, var(--t1) 0 25%, var(--t2) 0 50%, var(--t3) 0 75%, var(--t4) 0); }
.gh-dek { font-family: var(--serif); font-style: italic; color: var(--muted);
  font-size: 1.16rem; line-height: 1.42; margin: 0 0 .9rem; }
.gh-lead .gh-dek { font-size: 1.28rem; }
.gh-byline { font-family: var(--sans); font-size: .72rem; letter-spacing: .14em; color: var(--accent);
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  padding: .4rem 0; margin: 0 0 1.3rem; }
/* objective-voice abstract — neutral framing of what the piece is about, set apart from the body */
.gh-summary { margin: 0 0 1.5rem; padding: .85rem 1.1rem; background: var(--panel);
  border-left: 3px solid var(--accent); border-radius: 0 12px 12px 0; }
.gh-summary-label { display: block; font-family: var(--sans); font-size: .64rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: .18em; color: var(--muted); margin: 0 0 .4rem; }
.gh-summary-text { font-family: var(--sans); font-size: .9rem; line-height: 1.55; color: var(--text); margin: 0; }
.gh-lead .gh-summary-text { font-size: .96rem; }
.gh-body { font-size: 1.05rem; line-height: 1.74; }
.gh-body p { margin: 0 0 1.15rem; }
.gh-body a { color: var(--accent); }
.gh-body em { font-style: italic; }
.gh-body blockquote { margin: 1.4rem 0; padding: .6rem 1.3rem; border-left: 3px solid var(--accent);
  background: var(--panel); border-radius: 0 14px 14px 0; color: var(--muted); font-style: italic; }
/* drop cap opens each piece */
.gh-body > p:first-of-type::first-letter { font-family: var(--display); font-weight: 800;
  float: left; font-size: 3.1em; line-height: .72; padding: .06em .1em 0 0; color: var(--accent); }
.gh-sources { font-family: var(--sans); font-size: .76rem; line-height: 1.6; color: var(--muted);
  margin: 1.2rem 0 0; }
.gh-sources a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; }
.gh-sources a:hover { border-bottom-color: var(--accent); }
.gh-sources .filed { text-transform: uppercase; letter-spacing: .08em; font-size: .7rem; }
.gh-sep { border: none; height: 1em; margin: 2.6rem 0; text-align: center; }
.gh-sep::before { content: "◆ ◆ ◆"; color: var(--accent); opacity: .4; font-size: .68rem; letter-spacing: 1em; padding-left: 1em; }

/* "The Facts" — the unfiltered wire ledger, as a paneled artifact */
.gh-facts { margin: 3rem auto 0; padding: 1.5rem 1.6rem 1.2rem; background: var(--panel);
  border: 1px solid var(--border); border-radius: 16px; }
.gh-facts-h { font-family: var(--sans); font-size: .72rem; text-transform: uppercase; letter-spacing: .2em;
  color: var(--accent); margin: 0 0 1.1rem; padding-bottom: .55rem; border-bottom: 2px solid var(--text); }
.gh-facts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.3rem 1.8rem; }
.gh-fact-head { font-family: var(--display); font-size: 1rem; line-height: 1.25; margin: 0 0 .25rem; }
.gh-fact-by { font-family: var(--sans); font-size: .68rem; text-transform: uppercase; letter-spacing: .08em;
  color: var(--muted); margin: 0 0 .5rem; }
.gh-fact ul { margin: 0; padding-left: 1.05rem; }
.gh-fact li { font-family: var(--sans); font-size: .82rem; line-height: 1.5; color: var(--text); margin: 0 0 .35rem; }
.gh-fact li::marker { color: var(--accent); }

/* foot */
.gh-foot { max-width: 760px; margin: 2.6rem auto 0; padding: 1.5rem 2rem 3rem; border-top: 1px solid var(--border); text-align: center; }
.gh-watch { font-family: var(--serif); font-style: italic; color: var(--muted); font-size: .98rem; margin: 0 0 .7rem; }
.gh-colophon { font-family: var(--sans); font-size: .74rem; color: var(--muted); margin: 0; }
.gh-colophon a { color: var(--accent); text-decoration: none; }
.gh-colophon a:hover { text-decoration: underline; }

/* floating theme toggle, same affordance as the corpus reader */
#theme-btn { position: fixed; bottom: 1.1rem; right: 1.1rem; z-index: 20; font-family: var(--sans);
  font-size: .8rem; color: var(--muted); background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; padding: .4rem .7rem; cursor: pointer; }
#theme-btn:hover { color: var(--accent); border-color: var(--accent); }

@media (max-width: 620px) {
  .gh-edition { padding: 1.6rem 1.3rem 1rem; }
  .gh-folio { font-size: .58rem; letter-spacing: .08em; }
  .gh-facts-grid { grid-template-columns: 1fr; gap: 1.1rem; }
}
</style>

<script id="ghost-edition-data" type="application/json">{"edition_number": 6, "lead": {"kicker": "BY WALT WHITMAN", "author_byline": "BY WALT WHITMAN", "headline": "A Tower of Stone, and Six Who Came to Be Heard", "dek": "What the old man saw in Spain, walking past the parliament to the masons and the migrants and the wounded.", "body": "_June 10, Barcelona_.--They have finished a tower. One hundred and forty-four years they have been at it, the masons and the carvers and the men on the high scaffolds, ever since 1882, and now the Tower of Jesus Christ stands up a hundred and seventy-two meters and a half into the night, the tallest of the eighteen, the tallest church in all the round earth--and a hundred and twenty thousand people press into the streets below to see a man in white bless the lit ceramic cross at the top of it.\n\nI do not write of the parliament first, though that is where the wires have gone. I write of the stone.\n\nFor consider what a tower is. It is not a thought, not a decree, not a bill passed in a chamber and forgotten by autumn. It is the sap and sinew of the dead rising through the living--the chisel-stroke of Antoni Gaudi, dead a hundred years, carried up by the hands of men not yet born when he died. And over the multitude the drones drew his face in the dark sky and his old saying with it: _First love, then technique_. There is the whole of it, camerado. First love, then technique. Not the technique that decides, in some cold automated chamber, who shall live and who shall die--of which the man in white warned the lawmakers, that \"decisions regarding life and death are never left to automated systems\"--but the love that lays the first stone and trusts another hand to lay the last.\n\nNow turn to Madrid, and to the body that is not stone.\n\nTwo days before the tower, in the great hall of the Congress of Deputies, the first pope ever to stand there spoke for half an hour, and they rose and clapped him seven minutes, and cried _Viva el Papa_. Let the chroniclers count the ovation. I count instead the bodies he made them look at: the unborn child, the elderly, the sick--and chiefly the one in motion, the migrant, the man forced \"to leave everything behind in search of peace, security and a future.\" Safe and legal pathways, he asked of them. Address the root. O you legislators with your firm desks and your firm certainties--he told you a thing worth carrying out into the street: that firmness does not require contempt, that disagreement does not entail humiliation. Some among you would not come into the hall to hear it. The empty seats are also a kind of answer.\n\nAnd I think now of a smaller room than that hall, and a quieter hour.\n\nFor on the same June day, in the embassy of the Vatican in Madrid, the man in white sat down with six. Six survivors of the abuse of children by priests--the scourge he had named the scourge, the wound under the white portico and the lit cross and the seven-minute clapping. Near an hour he sat. And here is the thing the catalog turns on: each of the six gave _him_ a suggestion. They were not there to be blessed and sent north recuperated and silent. They came to be heard. He listened, they say, with affection and with attention, and pledged their words a foundation for the work to come, and told the bishops of Spain: make reparation. Such is the camp of the wounded. It does not photograph like a tower. It is taller.\n\nI am old, and a paralytic these many years, and I have learned to distrust the spectacle and to trust the body under it. The kings were there, Felipe and Letizia in their places; the prime minister Sanchez in his, hard-pressed at home and glad of a friend; the fireworks went up and the children's choir sang. Very well. I do not sneer at pomp; I have stood in crowds and wept at less. But a procession is only the surface stage, and behind it the solid and stupendous labors go on in the background, advancing crudely, telling themselves in time--the slow leaven, the hand that lays the next stone, the hand laid on the wound.\n\nThe man in white called the basilica a masterpiece of \"stone, colour and light,\" a sign of unity for the whole of Spain. May-be it is. But I have seen what unites a people, and it was never the spire. It was the masons who would not live to see the top, and the migrant let in at the door, and the six who came to be heard and were. First love, then technique. The tower is the proof, and the proof is not the tower.\n\nCamerado, look up at the cross they lit, and then look lower, at the faces in the street. They are the church. They are taller than the tower.", "filed_date": "2026-06-13", "byline_html": "<em>On reporting in<\/em> <a href=\"https://www.americamagazine.org/vatican-dispatch/2026/06/08/pope-leo-spain-parliament/\">America Magazine<\/a> &nbsp;·&nbsp; <a href=\"https://www.euronews.com/culture/2026/06/11/spectacular-opening-of-sagrada-familia-tower-draws-120000-people\">Euronews<\/a> &nbsp;·&nbsp; <a href=\"https://www.npr.org/2026/06/08/nx-s1-5849821/spanish-parliament-pope-speech\">NPR<\/a> &nbsp;·&nbsp; <a href=\"https://www.washingtontimes.com/news/2026/jun/8/5-questions-pope-leo-xivs-historic-address-spains-parliament/\">The Washington Times<\/a> &nbsp;·&nbsp; <a href=\"https://www.ncronline.org/vatican/pope-leo-meets-victims-spanish-church-reckons-sex-abuse-crisis\">National Catholic Reporter<\/a> &nbsp;&nbsp;|&nbsp;&nbsp; <span class=\"filed\">Filed 2026-06-13<\/span>", "factual_summary": "On June 10, 2026, Barcelona's Sagrada Família completed its Tower of Jesus Christ, which at 172.5 meters becomes the world's tallest church after 144 years of construction; roughly 120,000 people watched its illuminated cross be blessed. The op-ed ties the milestone to a reported warning that life-and-death decisions should never be left to automated systems, meditating on labor, faith, and migration through Gaudí's maxim 'first love, then technique.'"}, "sections": [{"section_title": "BY THOMAS CARLYLE", "section_class": "writer-piece", "stories": [{"headline": "The Glass Idol, and the Cradles It Has Emptied", "dek": "A nation that will not be born is a nation that has ceased, in some deep place, to believe.", "author_byline": "BY THOMAS CARLYLE", "body": "The Present Time, foolish reader, brings us a portent, and the augurs of the Republic stand round it in helpless wonder. Here is the Congressional Budget Office, that gravest of haruspices, with its tables and its decimal points; and what does it read in the entrails of the Nation? That for every woman in this land there shall be born, in this year of grace, but one child and a fraction—one and fifty-eight hundredths, so runs the oracle; sinking yet, to one and fifty-three; and that the day approaches, brought forward now a whole decade, when the dead of America shall outnumber her newborn. Behold a People that has resolved, quietly, not to continue.\n\nAnd what is given us as the cause of this great refusal? Not famine; not the sword; not pestilence walking in darkness. A toy. A pane of glass. The economist of Middlebury, one Caitlin Myers, having set herself with a true workman's honesty to find the spring of the thing, comes back from her labour white in the face. \"Wow,\" she says, \"but this has to be too big.\" She tried, she tells us, \"everything I can to explain away what I'm seeing in the data, and I just couldn't.\" There spoke an earnest soul—one who looked, and would not lie about what she saw. A third of it, perhaps the half, she lays at the door of a single contrivance loosed upon the world scarce twenty years gone: the hand-glass, the pocket-oracle, the iPhone. \"We're not saying it's all the iPhone,\" she adds, scrupulous; \"it could explain about a third to a half of the decline.\" A third to a half! O ye Eternities, that a civilisation should be unmanned by a thing that fits in a waistcoat-pocket.\n\nConsider what is here confessed. The screen has stepped in between the man and the woman; the glowing rectangle has been preferred to the warm body; the young, who in every prior age contrived somehow to find one another in the dark, now sit each alone, thumbing their little altars, and the herb-markets of courtship stand empty. This is not a private vice; it is the Mechanical Age arrived at its frankest triumph. Having made of labour a machine, and of the city a machine, and of thought itself a Logic-mill grinding without a miller, it has now reached into the very nursery, and stopped the loom of generation with a flick of the screen. The Phantasm has out-bred the Reality, by the simple expedient of seeing to it that the Reality breeds no more.\n\nAnd the Captains of this dwindling host—how do they bear themselves? They have discovered the calamity, somewhat late, and wring their hands in chorus. Elon Musk, who would people Mars, cannot keep his own planet peopled, and tweets his alarm into the very engine that is doing the emptying. Giorgia Meloni summons her Italians to the cradle; Pope Leo lifts his voice for the unborn; and a worthy American, Glenn Stanton, names the thing flatly a disobedience, a turning of the back upon an old commandment—and in that, reader, he is nearer the bone than the statisticians, for this is at bottom no question of housing-prices, but a question of belief. Half a century gone, one Paul Ehrlich shrieked that we were a cancer multiplying unto ruin; now the same age trembles that it will not multiply at all. So does Panic change its coat and keep its trade.\n\nThere was an Australian, Peter Costello, who bade his countrymen breed \"one for mum, one for dad, and one for the country\"—a jest, and a sad one, for you cannot scold a People into hope, nor legislate the future into a womb that has lost its reason to trust tomorrow. The demographers are right in this at least: a fifth of the surveyed will not bear children because they fear the days to come. And fear, my friends, is the daughter of unbelief.\n\nHere, then, is the whole matter, stripped of its tables. A nation does not cease to be born because it is poor; nations far poorer have swarmed. It ceases to be born because it has ceased to believe that life is a good worth handing on—and it has been talked and screened and amused out of that belief by the cleverest Quackery the world has yet devised. The cradle is the most sincere of all human sentences, the body's own Yea spoken to the Universe; and a People that has unlearned how to speak it has unlearned, somewhere underneath, the Everlasting Yea itself. Put down the glass idol, O sons and daughters of men, and look once at the living face beside you. Or do not—and let the Budget Office go on, year after year, totting up the silence.", "filed_date": "2026-06-13", "byline_html": "<em>On reporting in<\/em> <a href=\"https://dailycitizen.focusonthefamily.com/population-decline-united-states/\">Congressional Budget Office (via Daily Citizen / Focus on the Family)<\/a> &nbsp;·&nbsp; <a href=\"https://theconversation.com/birth-rates-are-declining-in-most-of-the-world-including-australia-heres-why-that-really-matters-284175\">The Conversation<\/a> &nbsp;·&nbsp; <a href=\"https://www.cbsnews.com/news/iphone-birth-rate-fertility-decline-study/\">CBS News (MoneyWatch)<\/a> &nbsp;·&nbsp; <a href=\"https://www.npr.org/2026/06/12/nx-s1-5851795/iphone-birth-rate-drop\">NPR<\/a> &nbsp;·&nbsp; <a href=\"https://www.cnn.com/2026/06/12/health/fertility-decline-smartphone-study\">CNN<\/a> &nbsp;&nbsp;|&nbsp;&nbsp; <span class=\"filed\">Filed 2026-06-13<\/span>", "factual_summary": "A Congressional Budget Office projection shows the U.S. fertility rate falling to about 1.58 births per woman and declining toward 1.53, with the year American deaths outnumber births now moved up by roughly a decade. Economist Caitlin Myers attributes a large share of the decline to the spread of the smartphone over the past twenty years. The piece reads the falling birthrate as a civilizational loss of will."}]}, {"section_title": "BY G.K. CHESTERTON", "section_class": "writer-piece", "stories": [{"headline": "The Tax Aimed at Eton That Fell on Bradford", "dek": "A levy sharpened for the Duke has come to rest in the neck of the milkman's chapel-school.", "author_byline": "BY G.K. CHESTERTON", "body": "There is a tax in force in England which was aimed, with great ceremony and much wringing of egalitarian hands, at the playing-fields of Eton; and it has landed, as such things always do, on a Sunday-school in Bradford. This is not an accident of the policy. It is the policy. For when the modern State lifts its hatchet against the rich, it always contrives, by some miracle of fiscal physics, to bring it down upon the poor; and the blade that was sharpened for the Duke comes to rest in the neck of the milkman who happens to send his children to a small chapel-school down the lane.\n\nThe thing is called the Finance Act, and it puts twenty per cent upon the fees of independent schools, that they may yield up some four hundred and sixty million pounds this year and a round one and a half billion the next. I do not object to the figure because it is large. I object to it because it is worshipped. A government that can recite to the last decimal what a school is worth to the Treasury, and cannot say what a school is worth to a child, has not made an error of arithmetic; it has made an error of religion. It has counted the coins of Mammon and called the sum a conscience.\n\nNow the Supreme Court has done a small and sane thing, which is to say that it will at least look at the matter again. Lord Reed, Lord Hamblen, and Lord Richards have granted four little schools — Emmanuel in Derby, The Branch in Yorkshire, The King's in Hampshire, Wyclif in South Wales — permission to argue that the levy is disproportionate. Not Eton; not one of the gilded houses the tax was advertised to humble. Four small, low-fee, faith-keeping schools, the very mice the elephant never meant to tread on, and trod on first.\n\nThe lawyers, who must give a homely truth a Greek name before they can let it into a courtroom, call this \"Thlimmenos discrimination\" — the sin of treating unlike things alike. I should call it the sin of the man who, being told to weed his garden, mows it. Mrs. Michelle Daniells of the families' association puts it better than any statute: \"For many families, choosing a faith-based education is not a luxury but a deeply held conviction.\" There is the whole quarrel in a sentence. The State has looked at a conviction and seen a luxury; it has looked at an altar and seen an asset; and it proposes to charge admission to the thing a man would die before he sold.\n\nAgainst these four schools the Treasury sends Sir James Eadie, the gentleman the lawyers gravely nickname the Treasury Devil, and the whole engine of the Exchequer; and on the other side stands Mr. Stephen White of Bradford, who says only that \"this case has always been about ordinary families like mine.\" It is the oldest fight in the world, and the most modern. It is David and the giant over again, save that this giant carries a calculator instead of a club, and means to do it so reasonably that nobody will hear the sling.\n\nLet us be fair to the giant, because I am told it is the season for it. The Education Secretary, Mrs. Phillipson, protests that the fees \"have gone up year on year — way, way beyond inflation,\" and that schools were closing before ever she touched them; and there is a dull, ledger-keeping truth in it. The small are always crushed first, having the thinnest walls. But this is the very point I would press into her hand. The argument that the small were going to die anyway is not a defence of the tax-gatherer; it is his confession. A man does not excuse himself for kicking the lame by observing that the lame were already limping.\n\nMrs. Holt of The Branch school says her parents have \"made sacrifices to give their children a Christian education.\" Mark the word: sacrifices. It is a word the modern Exchequer no longer understands, because a sacrifice is a thing freely given to something larger than oneself, and the whole genius of the Servile State is to convince a man he owns nothing he has not first surrendered for a receipt.\n\nThe Court will rule on proportion, which is well; for proportion is not a vague thing but a fixed one, as exact as the chord that is in tune. And the tune here is very plain. A nation that taxes the poor man's prayer to discipline the rich man's pride has not balanced the books. It has merely learned the price of everything, and forgotten the one small school that was beyond all price.", "filed_date": "2026-06-13", "byline_html": "<em>On reporting in<\/em> <a href=\"https://www.christiantoday.com/news/uk-supreme-court-to-hear-christian-schools-challenge-to-vat-on-private-school-fees\">Christian Today<\/a> &nbsp;·&nbsp; <a href=\"https://christianconcern.com/news/christian-schools-win-permission-to-appeal-vat-policy/\">Christian Concern (Christian Legal Centre)<\/a> &nbsp;·&nbsp; <a href=\"https://www.blackstonechambers.com/news/court-of-appeal-dismisses-human-rights-challenge-to-vat-on-private-school-fees/\">Blackstone Chambers (legal trade analysis)<\/a> &nbsp;·&nbsp; <a href=\"https://schoolsweek.co.uk/is-vat-on-fees-really-to-blame-for-private-school-closures/\">Schools Week<\/a> &nbsp;·&nbsp; <a href=\"https://conservativepost.co.uk/independent-christian-schools-win-permission-for-supreme-court-to-hear-landmark-challenge-on-labours-vat-policy/\">Conservative Post<\/a> &nbsp;&nbsp;|&nbsp;&nbsp; <span class=\"filed\">Filed 2026-06-13<\/span>", "factual_summary": "The UK's Finance Act imposes a 20% VAT on independent-school fees, projected to raise about £460 million this year and £1.5 billion next year. The Supreme Court has agreed to hear a challenge brought by small faith schools, including Emmanuel in Derby. The op-ed argues the tax, aimed at elite institutions like Eton, instead falls hardest on low-cost religious schools serving poorer families."}]}, {"section_title": "BY ERNEST HEMINGWAY", "section_class": "writer-piece", "stories": [{"headline": "The Mines Are Still in the Water at Hormuz", "dek": "They have agreed to the text. The text is not the strait.", "author_byline": "BY ERNEST HEMINGWAY", "body": "In Islamabad the prime minister stood up and said it. Shehbaz Sharif said, \"Peace has never been this close as it is now,\" and the wire moved it and the markets read it and a man in Houston watched the number on the screen. WTI settled at 84.88. Brent went to 87.33. That was the lowest Brent had been since March. The numbers came down because Trump had called off the planned strikes and because of what Sharif said in Islamabad, and the numbers are not the strait and the words are not the strait.\n\nThe strait is the Strait of Hormuz. About a fifth of the world's crude goes through it on ships. The text says the strait reopens to the shipping it had before the war, inside thirty days. The text was finished. The foreign minister, Araghchi, said the agreement \"has never been closer\" and that he would give the details \"in due course.\" Other men in Tehran said no final conclusion had been reached. Both things were said and both were filed.\n\nThirty days to reopen a strait. There are mines in the water. Someone has to take the mines out of the water and that is slow work done by men in boats and divers going down, and a mine does not care what the text says. The fields that were shut are still shut and a field that has been idle does not start because a prime minister has spoken. The drones hit the energy plants and the missiles hit them and the steel is bent and the pipe is split and it has to be cut out and welded and that is done by hand by men who know how, the way a thing is done well or is not done. None of that is in the thirty days. The thirty days is a number in the text.\n\nThe terms ran to fourteen points the way Tehran's press told it. Sixty more days of ceasefire. The strait open in thirty. Enrichment frozen fifteen to twenty years. The enriched uranium destroyed on the site and then carried out of the country. Twenty-four billion in frozen money let go a little at a time as the inspectors checked. It is a great deal to put in writing and they put it in writing, and then Trump looked at what the Iranian state media had written and said it had \"NOTHING to do with the terms that were agreed to, in writing.\" So there is the text that is agreed and there is the account of the text, and they are not the same text, and a man had to stand up and say so the same week the other man stood up in Islamabad and said peace had never been this close.\n\nThe vice president, Vance, said it about the money. He said, \"The Iranians are not receiving any cash.\" He said it because someone had said they were. You say a thing is not happening when people have begun to say it is. Trump said the deal \"conceptually deals\" with the nuclear material and that the Supreme Leader had approved it. Conceptually. The material is real and it sits where it sits and it weighs what it weighs, and conceptually is a word for the part that is not yet a thing you can take out in a truck. The thing has to be destroyed on the site and then taken out of the country. That is the part that is real. The rest is in principle.\n\nA man who knew told a reporter the signing was eighty to eighty-five percent likely in the next few days. First they were going to sign it in Europe, in a room, in person. Then they were going to sign it on a screen. The Israelis kept their hard tone the same week. In Houston the number stayed down, off about six percent on the week, though it was still up more than twenty percent from the day at the end of February when the United States and Israel went in.\n\nThe text is finished. The text says thirty days. The mines are still in the water at Hormuz, and the fields are cold, and the welders have not started, and the ships are waiting out past the strait the way they wait, riding light and high because they are empty, for the day somebody clears the water and they can go in.", "filed_date": "2026-06-13", "byline_html": "<em>On reporting in<\/em> <a href=\"https://www.cbsnews.com/live-updates/iran-war-us-trump-peace-deal-agreement/\">CBS News<\/a> &nbsp;·&nbsp; <a href=\"https://www.cnbc.com/2026/06/12/oil-prices-wti-brent-on-hopes-of-us-iran-deal-despite-tehran-pushback.html\">CNBC<\/a> &nbsp;·&nbsp; <a href=\"https://www.washingtonpost.com/world/2026/06/12/pakistan-prime-minister-says-us-iran-deal-text-finalized/\">The Washington Post<\/a> &nbsp;·&nbsp; <a href=\"https://www.timesofisrael.com/liveblog_entry/trump-iran-deal-conceptually-deals-with-irans-nuclear-material-khamenei-has-approved-it/\">The Times of Israel<\/a> &nbsp;·&nbsp; <a href=\"https://www.axios.com/2026/05/31/trump-iran-deal-changes-nuclear\">Axios<\/a> &nbsp;&nbsp;|&nbsp;&nbsp; <span class=\"filed\">Filed 2026-06-13<\/span>", "factual_summary": "After Pakistani Prime Minister Shehbaz Sharif said peace 'has never been this close' and Trump called off planned strikes, oil prices fell, with WTI settling at $84.88 and Brent at $87.33, its lowest since March. A draft agreement would reopen the Strait of Hormuz to pre-war shipping within 30 days, though Iranian officials gave conflicting accounts of whether a deal was final. The piece stresses that mined waters and idled oil fields will not recover as quickly as the text promises."}]}, {"section_title": "BY C.G. JUNG", "section_class": "writer-piece", "stories": [{"headline": "We Are Building Temples and Calling Them Warehouses", "dek": "The water and the electric bill are the shadow of a disembodied god.", "author_byline": "BY C.G. JUNG", "body": "A figure has been published which the sensible authorities will file under economics, and so dismiss: of those questioned by Reuters and Ipsos, only thirty-three in a hundred approve of the haste with which we are raising these vast machine-houses across the land, sixty-four disapprove, and fifty-seven would refuse to have one near their own door. The newspapers read this as a quarrel over electricity, and it is — but the man who has watched such fevers before knows it is never only that. When an age grows uneasy on a scale this wide, and cannot say of what it is afraid, something has stirred beneath the surface that the daylight vocabulary of cost and kilowatt cannot name.\n\nConsider what is being built. We are constructing, at a pace its own engineers cannot account for — ERCOT's Pablo Vegas calls it \"an unprecedented change in the pace of growth,\" and Rice's Dominic Boyer says more plainly, \"The projections are insane\" — an enormous apparatus for a mind that is not a body, a thinking that has no belly and no grave. This is the old dream of modern man: intelligence cut free of the flesh that suffers. We had declared the soul a superstition; and now, having banished it, we pour concrete for it by the acre and pray to it under the name of the machine. One does not become enlightened by imagining figures of light, and the figure we are imagining is very bright indeed.\n\nBut no tree, it is said, can grow to heaven unless its roots reach down into hell — and here are the roots, breaking the surface, which is the whole meaning of the backlash. The bright dream demands its dark complement by an inexorable law, and the complement is matter: the water table, the grid, the land, the bill. What returns is exactly what the dream wished to leave behind. So a man in Indiana, Mark Thompkins, who supposes he is talking about money, says, \"My electric bills are high as it is,\" not knowing that he is the body protesting that the disembodied god must, after all, be fed from somewhere. So in Texas, where the campuses at Abilene and Amarillo would drink the rivers, a judge in Caldwell County, Hoppy Haden, confesses, \"I would be a liar if I said that didn't bother me\" — the tremor of a man who has felt the shadow without being able to name it.\n\nNotice that the unease crosses every line the political surface is supposed to divide. Two-thirds of one party and half of the other would refuse the thing in their own community; the fear that the price of light will rise is shared by Republican, Democrat, and independent alike. This is the signature of a collective process, not a campaign. When the same image grips men who agree on nothing else, you are watching not an argument but a possession. The thing has them; they do not have it. And the deepest tell is in the woman from San Marcos, Randi Finn, who said of her neighbors, \"All of us met at the water, and that's what brought us here.\" She believes she describes a town. She describes the oldest temple there is, the well, the spring, the place a people gathers, and names what the machine-house threatens to drain.\n\nI must, as always, refuse the easy ending. I will not pretend that a tariff or a moratorium is the cure, for these are still the language of cost, and the disturbance is not finally about cost. Governor Spanberger is surely right that those who summon the load should \"pay their own way and their fair share\"; let it be done. But the bill, however justly allocated, will not quiet the dread, for the dread is older than the bill. We are not being asked who pays for the electricity. We are being asked whether a civilization can build a mind it does not understand, house it in an earth it has stopped revering, and feel no shadow fall — and the poll has answered, in the only language a frightened people still trusts, no.\n\nWhat, then, is to be done? Nothing, at the scale men long for. The world is healed retail and not wholesale. The machine-house will be built or it will not; these are the weather. But each man who feels the unaccountable disquiet and consents to look at it, rather than explain it away as merely the price of progress, has done the one thing ever in his power: he has recognized that he is not the only master in his own house. Whether the age can do as much, so far as we can judge from experience, is not answered in a season but suffered across an aeon.", "filed_date": "2026-06-13", "byline_html": "<em>On reporting in<\/em> <a href=\"https://energynow.com/2026/06/americans-wary-of-ai-driven-data-center-boom-reuters-ipsos-poll-shows/\">Reuters (via EnergyNow)<\/a> &nbsp;·&nbsp; <a href=\"https://www.texastribune.org/2026/06/08/texas-regulation-data-centers-electricity-power-water/\">The Texas Tribune<\/a> &nbsp;·&nbsp; <a href=\"https://grist.org/accountability/data-centers-are-straining-the-grid-can-they-be-forced-to-pay-for-it/\">Grist<\/a> &nbsp;·&nbsp; <a href=\"https://www.ibtimes.co.uk/ai-data-centres-electricity-costs-2026-midterms-1801207\">International Business Times UK<\/a> &nbsp;·&nbsp; <a href=\"https://www.dailytidings.com/oregon-data-center-boom-faces-pushback-as-ai-power-demand-raises-grid-and-utility-bill-concerns/\">The Texas Tribune / regional (Daily Tidings, Oregon)<\/a> &nbsp;&nbsp;|&nbsp;&nbsp; <span class=\"filed\">Filed 2026-06-13<\/span>", "factual_summary": "A Reuters/Ipsos poll found only 33% of respondents approve of the rapid build-out of AI data centers, while 64% disapprove and 57% would refuse one near their home. Officials including ERCOT's Pablo Vegas and Rice University's Dominic Boyer describe the pace of growth as unprecedented and the projections as 'insane.' The op-ed interprets the public unease as something deeper than a dispute over electricity and water."}]}, {"section_title": "BY SCOTT ADAMS", "section_class": "writer-piece", "stories": [{"headline": "RFK Jr. Is Running One Vaccine Pitch in Two Movies", "dek": "The measles numbers are the tell. Watch what the man is doing, not what he says.", "author_byline": "BY SCOTT ADAMS", "body": "Robert F. Kennedy Jr. has said two opposite things about the measles vaccine, to two different audiences, and both of them are working exactly as designed.\n\nRun it through the Persuasion Filter and you stop being confused.\n\nHere is the thing most people miss. They think a public figure either supports a vaccine or he doesn't, and they go hunting through his quotes to find the real one. That's second-dimension thinking. In the third dimension, where persuasion rules, the same man can say two true-sounding things to two crowds and never pick. That isn't a gaffe. That's a technique. Watch what I'm doing here.\n\nIn March 2025, on Fox, Kennedy told one audience, \"There are adverse events from the vaccine. It does cause deaths every year.\" In April 2026, asked directly by a senator, he told the other audience, \"We promote the MMR. We have advised every child to get the MMR.\" He said \"We promote\" twice in that hearing. FactCheck.org laid the quotes side by side like a ledger.\n\nSo who's right? Both of him. That's the point.\n\nThis is pacing and leading. First you match the crowd you want, the people who already distrust the shot. You pace them: \"adverse events,\" \"deaths every year,\" \"personal choice.\" That builds trust. Then, when a Senate camera is on you and Bill Cassidy is a doctor staring back at you, you lead the other way for the record: \"We promote the MMR.\" Both crowds walk away thinking Kennedy is on their side. The wall is different in each person's head.\n\nHere are three things to notice.\n\n1. He never takes the blame. In the April hearing he said, \"I have nothing to do with the measles outbreak,\" and, \"We have done better than any other country controlling the measles outbreak.\" Michael Bennet pressed him on dead unvaccinated kids. Lisa Blunt Rochester asked if he'd urged the president to tell Americans to get the shot. He kept the high ground and let the question slide off.\n\n2. The number doesn't slide off. There have been over 4,200 U.S. measles cases since January 2025, the first measles deaths since 2015, two kids in Texas. Kindergarten MMR coverage dropped from 95.2 percent to 92.5 percent. You need about 95 to stop the thing from spreading. We are under the line. The disease was eliminated in 2000, and this fall the country could lose that status.\n\n3. A virus is immune to persuasion. This is the part the Master Persuaders forget. You can pace a voter. You can pace a hearing room. You cannot pace measles. It is a moist little machine that does one thing, and it does it at 97 percent efficiency the moment the vaccinated wall drops below the line. The frame works on humans. It does not work on the bug.\n\nNotice who isn't confused. The doctors. Celine Gounder said her biggest worry for the 2026 World Cup \"is actually measles…we have low levels of vaccination in certain pockets.\" Not terrorism. Measles. Thirty-nine states already had cases. Seventy-eight percent of U.S. counties showed declining vaccination rates. A mass international event lands on a country with holes in its wall, and a named medical correspondent names the bug, not the terrorist.\n\nI told you years ago that when you turn fear into money, civilization is doomed. This is the same trick with the emotion flipped. Back then the play was scare you about the disease to sell you the shot. Now the play is scare you about the shot to sell you the choice. Same machine, opposite emotion. The persuasion is excellent. The measles does not care that the persuasion is excellent.\n\nHere's my prediction, and I could be wrong. Kennedy will keep saying \"We promote the MMR\" for the record, and the personal-choice framing will keep doing the actual work underneath it, and the coverage number will keep sliding, and the case count will keep climbing, and at some point this fall a number will arrive that no frame can pace.\n\nA persuader can move your attention off a fact. He cannot move the fact.\n\nWatch the number, not the man.", "filed_date": "2026-06-13", "byline_html": "<em>On reporting in<\/em> <a href=\"https://thehill.com/policy/healthcare/5912110-us-measles-cases-2026-exceeds-2000/\">The Hill<\/a> &nbsp;·&nbsp; <a href=\"https://www.cidrap.umn.edu/measles/hearings-rfk-jr-claims-no-responsibility-measles-spread\">CIDRAP (University of Minnesota)<\/a> &nbsp;·&nbsp; <a href=\"https://www.factcheck.org/2026/05/a-timeline-of-rfk-jr-s-mixed-messaging-on-the-measles-vaccine/\">FactCheck.org<\/a> &nbsp;·&nbsp; <a href=\"https://time.com/7380102/rfk-jr-vaccine-schedule-measles-rsv/\">TIME<\/a> &nbsp;·&nbsp; <a href=\"https://www.cbsnews.com/news/measles-outbreak-bangladesh-us-health-risk-world-cup-2026/\">CBS News<\/a> &nbsp;&nbsp;|&nbsp;&nbsp; <span class=\"filed\">Filed 2026-06-13<\/span>", "factual_summary": "Health Secretary Robert F. Kennedy Jr. has made contradictory public statements on the measles vaccine, warning on Fox in March 2025 that it 'does cause deaths every year' and then telling an April 2026 Senate hearing, 'We promote the MMR.' FactCheck.org documented the conflicting quotes side by side. The piece frames the contradiction as a deliberate persuasion technique rather than a gaffe."}]}], "what_to_watch": "Tomorrow's open questions sit under each piece — see the bylines.", "story_files": {}}</script>

<script>
// theme (shares the 'corpus-theme' preference with readers + library)
const pref = localStorage.getItem('corpus-theme');
if (pref) document.documentElement.dataset.theme = pref;
else if (matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.dataset.theme = 'dark';
document.getElementById('theme-btn').onclick = () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('corpus-theme', next);
};

const ed = JSON.parse(document.getElementById('ghost-edition-data').textContent);
const el = (tag, cls, html) => { const n = document.createElement(tag); if (cls) n.className = cls;
  if (html != null) n.innerHTML = html; return n; };

// op-eds: lead first, then each section's stories, in render order
const pieces = [ed.lead].concat((ed.sections || []).flatMap(s => s.stories || [])).filter(Boolean);
const stack = document.getElementById('gh-pieces');
pieces.forEach((p, i) => {
  const isLead = i === 0;
  const art = el('article', 'gh-piece' + (isLead ? ' gh-lead' : ''));
  art.id = 'piece-' + i;
  art.appendChild(el(isLead ? 'h1' : 'h2', 'gh-head', escapeText(p.headline || '')));
  if (p.dek) art.appendChild(el('p', 'gh-dek', escapeText(p.dek)));
  if (p.author_byline) art.appendChild(el('p', 'gh-byline', escapeText(p.author_byline)));
  if (p.factual_summary) {
    const sum = el('aside', 'gh-summary');
    sum.appendChild(el('span', 'gh-summary-label', 'What this piece is about'));
    sum.appendChild(el('p', 'gh-summary-text', escapeText(p.factual_summary)));
    art.appendChild(sum);
  }
  const body = el('div', 'gh-body', marked.parse(p.body || ''));
  body.querySelectorAll('a[href^="http"]').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });
  art.appendChild(body);
  if (p.byline_html) art.appendChild(el('p', 'gh-sources', p.byline_html));

    var slugWords = (it.slug || '').replace(/-/g, ' ').replace(/ research$/, '');
    if (it.kind === 'corpus') {
      ENTRIES.push({ t: it.title, m: it.category || 'Corpus', grp: 'Corpora', icon: '◆', href: it.href, k: kw(it.title, slugWords, it.category) });
      (it.chapters || []).forEach(function (ch, i) {
        ENTRIES.push({ t: ch, m: it.title, grp: 'Chapters', icon: '·', href: it.href + '#ch-' + i, k: kw(ch, it.title, slugWords) });
      });
    } else if (it.kind === 'section') {
      ENTRIES.push({ t: it.title, m: it.meta || 'Section', grp: 'Sections', icon: '§', href: it.href, k: kw(it.title, it.meta) });
    } else if (it.kind === 'edition') {
      ENTRIES.push({ t: it.title, m: (it.category || '') + (it.meta ? ' · ' + it.meta : ''), grp: 'Editions', icon: '▤', href: it.href, k: kw(it.title, it.category, it.meta) });
    }
  });
  var GRP_ORDER = ['Continue', 'Corpora', 'Sections', 'Chapters', 'In the text', 'Editions'];

  function esc(s) { var d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }
  function fuzzy(q, s) { q = q.toLowerCase(); s = s.toLowerCase(); var i = 0, j = 0; while (i < q.length && j < s.length) { if (q[i] === s[j]) i++; j++; } return i === q.length; }
  function score(q, e) {
    q = q.toLowerCase();
    var t = e.t.toLowerCase(), p = t.indexOf(q);
    if (p === 0) return 0;
    if (p > 0) return 1;
    if ((e.k || '').indexOf(q) >= 0) return 2;
    if (fuzzy(q, e.k || t)) return 5;  // loose subsequence — fallback rank only
    return 9;
  }
  function hl(t, q) {
    if (!q) return esc(t);
    var i = t.toLowerCase().indexOf(q.toLowerCase());
    if (i < 0) return esc(t);
    return esc(t.slice(0, i)) + '<mark>' + esc(t.slice(i, i + q.length)) + '</mark>' + esc(t.slice(i + q.length));
  }
  function readRecents() {
    try { return JSON.parse(localStorage.getItem('library-recents') || '[]') || []; } catch (e) { return []; }
  }
  function recentEntries() {
    return readRecents().slice(0, 4).map(function (r) {
      return { t: r.title, m: 'Ch ' + (r.ch + 1) + (r.chTitle ? ' · ' + r.chTitle : ''), grp: 'Continue', icon: '▸', href: r.slug + '.html#ch-' + r.ch };
    });
  }

  // global "in the text" search — search-index.json is fetched lazily on the
  // first body-length query, so it never blocks first paint (and degrades to
  // title search if the fetch fails, e.g. opened from file://).
  var SI = null, siState = 'idle';
  function loadSI() {
    if (siState !== 'idle') return;
    siState = 'loading';
    fetch(base + 'search-index.json').then(function (r) { return r.ok ? r.json() : Promise.reject(); })
      .then(function (j) { SI = j; siState = 'ready'; if (isOpen() && input && input.value.trim().length >= 2) render(); })
      .catch(function () { siState = 'failed'; });
  }
  function bodyMatches(q) {
    if (siState !== 'ready' || !SI || q.length < 2) return [];
    var out = [];
    for (var c = 0; c < SI.length && out.length < 16; c++) {
      var corp = SI[c], chs = corp.chapters || [];
      for (var i = 0; i < chs.length && out.length < 16; i++) {
        var text = chs[i].text || '', pos = text.toLowerCase().indexOf(q);
        if (pos < 0) continue;
        var s = Math.max(0, pos - 32), e = Math.min(text.length, pos + q.length + 54);
        var snip = (s > 0 ? '…' : '') + text.slice(s, e).trim() + (e < text.length ? '…' : '');
        out.push({ t: snip, m: corp.title + ' · ' + (chs[i].title || ('Ch ' + (i + 1))), grp: 'In the text',
                   icon: '¶', href: corp.slug + '.html#ch-' + chs[i].i });
      }
    }
    return out;
  }

  var back, input, resEl, rows = [], sel = 0, built = false;
  function build() {
    if (built) return;
    back = document.createElement('div'); back.id = 'cmdk-back';
    back.innerHTML = '<div id="cmdk" role="dialog" aria-label="Command palette">'
      + '<div id="cmdk-in"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg>'
      + '<input id="cmdk-q" placeholder="Jump to any corpus, chapter, or edition…" autocomplete="off" spellcheck="false" aria-label="Search the library">'
      + '<span class="hint">esc</span></div><div id="cmdk-res"></div></div>';
    document.body.appendChild(back);
    input = back.querySelector('#cmdk-q'); resEl = back.querySelector('#cmdk-res');
    input.addEventListener('input', render);
    back.addEventListener('click', function (e) { if (e.target === back) close(); });
    built = true;
  }
  function results(q) {
    if (!q) return recentEntries().concat(ENTRIES.filter(function (e) { return e.grp === 'Corpora' || e.grp === 'Sections'; }));
    var ql = q.toLowerCase();
    if (ql.length >= 3) loadSI();
    var subs = [], fuz = [];
    ENTRIES.forEach(function (e) { var s = score(ql, e); if (s < 5) subs.push({ e: e, s: s }); else if (s === 5) fuz.push(e); });
    var head;
    if (subs.length) { subs.sort(function (a, b) { return a.s - b.s; }); head = subs.slice(0, 10).map(function (x) { return x.e; }); }
    else head = fuz.slice(0, 8);
    return head.concat(bodyMatches(ql));  // title/chapter hits first, then in-the-text hits
  }
  function render() {
    var q = input.value.trim();
    var list = results(q);
    if (!list.length) {
      rows = [];
      resEl.innerHTML = (siState === 'loading')
        ? '<div class="cmdk-none">Searching inside the chapters…</div>'
        : '<div class="cmdk-none">No matches. Try a title, a chapter, or “ghost”.</div>';
      return;
    }
    var ordered = [];
    GRP_ORDER.forEach(function (g) { list.forEach(function (e) { if (e.grp === g) ordered.push(e); }); });
    list.forEach(function (e) { if (GRP_ORDER.indexOf(e.grp) < 0) ordered.push(e); });
    rows = ordered; sel = 0;
    var html = '', lastG = null;
    ordered.forEach(function (e, i) {
      if (e.grp !== lastG) { html += '<div class="cmdk-grp">' + esc(e.grp) + '</div>'; lastG = e.grp; }
      html += '<a class="cmdk-row' + (i === 0 ? ' sel' : '') + '" data-i="' + i + '" href="' + esc(base + e.href) + '">'
        + '<span class="cmdk-ic">' + e.icon + '</span><span class="cmdk-t">' + hl(e.t, q) + '</span><span class="cmdk-m">' + esc(e.m) + '</span></a>';
    });
    resEl.innerHTML = html;
    [].forEach.call(resEl.querySelectorAll('.cmdk-row'), function (el) {
      el.addEventListener('mouseenter', function () { sel = +el.getAttribute('data-i'); paint(); });
      el.addEventListener('click', function (ev) { ev.preventDefault(); go(rows[+el.getAttribute('data-i')]); });
    });
  }
  function paint() {
    [].forEach.call(resEl.querySelectorAll('.cmdk-row'), function (el, i) {
      var on = i === sel; el.classList.toggle('sel', on); if (on) el.scrollIntoView({ block: 'nearest' });
    });
  }
  function go(e) { if (!e) return; close(); window.location.href = base + e.href; }
  function open() { build(); back.classList.add('open'); input.value = ''; render(); setTimeout(function () { input.focus(); }, 10); }
  function close() { if (back) back.classList.remove('open'); }
  function isOpen() { return back && back.classList.contains('open'); }

  document.addEventListener('keydown', function (e) {
    if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) { e.preventDefault(); isOpen() ? close() : open(); return; }
    if (!isOpen()) return;
    if (e.key === 'Escape') { e.preventDefault(); close(); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); sel = Math.min(rows.length - 1, sel + 1); paint(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); sel = Math.max(0, sel - 1); paint(); }
    else if (e.key === 'Enter') { e.preventDefault(); go(rows[sel]); }
  });

  var mac = /Mac|iPhone|iPad/.test(navigator.platform);
  var fab = document.createElement('button'); fab.id = 'cmdk-fab'; fab.type = 'button';
  fab.setAttribute('aria-label', 'Search the library');
  fab.innerHTML = '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg> <kbd>' + (mac ? '⌘' : 'Ctrl') + 'K</kbd>';
  fab.addEventListener('click', open);
  document.body.appendChild(fab);

  [].forEach.call(document.querySelectorAll('.card[data-slug]'), function (card) {
    var slug = card.getAttribute('data-slug');
    var total = +card.getAttribute('data-total') || 0;
    var accent = card.getAttribute('data-accent') || '--accent';
    var meta = card.querySelector('.meta');
    if (!meta || !total) return;
    var read = 0;
    try { read = (JSON.parse(localStorage.getItem('read:' + slug) || '[]') || []).filter(function (x) { return x < total; }).length; } catch (e) {}
    if (!read) return;  // keep the meta line clean until there's progress
    var done = read >= total;
    var prog = document.createElement('span');
    prog.className = 'card-prog' + (done ? ' done' : '');
    if (done) {
      card.classList.add('is-complete');
      prog.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="var(' + accent + ')" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="13 4 6.5 12 3 8.5"/></svg>Read';
    } else {
      var r = 6, cir = 2 * Math.PI * r, off = cir * (1 - read / total);
      prog.innerHTML = '<svg viewBox="0 0 16 16" aria-hidden="true"><circle class="pbg" cx="8" cy="8" r="' + r + '" fill="none" stroke-width="2.4"/>'
        + '<circle cx="8" cy="8" r="' + r + '" fill="none" stroke="var(' + accent + ')" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="' + cir.toFixed(1) + '" stroke-dashoffset="' + off.toFixed(1) + '" transform="rotate(-90 8 8)"/></svg>' + read + '/' + total;
    }
    meta.classList.add('has-prog');
    meta.appendChild(prog);
  });

  var resume = document.getElementById('resume');
  if (resume) {
    var rec = readRecents();
    if (rec.length) {
      var r0 = rec[0];
      resume.innerHTML = '<a href="' + esc(base + r0.slug + '.html#ch-' + r0.ch) + '">'
        + '<span class="rcol"><span class="rk">Resume reading</span>'
        + '<span class="rt">' + esc(r0.title) + '</span>'
        + '<span class="rs">Chapter ' + (r0.ch + 1) + (r0.chTitle ? ' — ' + esc(r0.chTitle) : '') + '</span></span>'
        + '<span class="rcta">Continue →</span></a>';
      resume.classList.add('on');
    }
  }

  // quiet reading streak — a small folio stat folded into the library stats line
  try {
    var st = JSON.parse(localStorage.getItem('reading-streak') || '{}');
    var stats = document.querySelector('.stats');
    if (stats && st && (st.count || 0) >= 2 && !/streak/.test(stats.textContent)) {
      stats.textContent = stats.textContent + ' · ' + st.count + '-day reading streak';
    }
  } catch (e) {}
})();
</script>
</body>
</html>
