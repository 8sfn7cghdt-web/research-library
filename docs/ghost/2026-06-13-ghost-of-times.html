/* A single Ghost of Times edition — the corpus reader's reading column in

<script id="ghost-edition-data" type="application/json">{"edition_number": 6, "lead": {"kicker": "BY WALT WHITMAN", "author_byline": "BY WALT WHITMAN", "headline": "A Tower of Stone, and Six Who Came to Be Heard", "dek": "What the old man saw in Spain, walking past the parliament to the masons and the migrants and the wounded.", "body": "_June 10, Barcelona_.--They have finished a tower. One hundred and forty-four years they have been at it, the masons and the carvers and the men on the high scaffolds, ever since 1882, and now the Tower of Jesus Christ stands up a hundred and seventy-two meters and a half into the night, the tallest of the eighteen, the tallest church in all the round earth--and a hundred and twenty thousand people press into the streets below to see a man in white bless the lit ceramic cross at the top of it.\n\nI do not write of the parliament first, though that is where the wires have gone. I write of the stone.\n\nFor consider what a tower is. It is not a thought, not a decree, not a bill passed in a chamber and forgotten by autumn. It is the sap and sinew of the dead rising through the living--the chisel-stroke of Antoni Gaudi, dead a hundred years, carried up by the hands of men not yet born when he died. And over the multitude the drones drew his face in the dark sky and his old saying with it: _First love, then technique_. There is the whole of it, camerado. First love, then technique. Not the technique that decides, in some cold automated chamber, who shall live and who shall die--of which the man in white warned the lawmakers, that \"decisions regarding life and death are never left to automated systems\"--but the love that lays the first stone and trusts another hand to lay the last.\n\nNow turn to Madrid, and to the body that is not stone.\n\nTwo days before the tower, in the great hall of the Congress of Deputies, the first pope ever to stand there spoke for half an hour, and they rose and clapped him seven minutes, and cried _Viva el Papa_. Let the chroniclers count the ovation. I count instead the bodies he made them look at: the unborn child, the elderly, the sick--and chiefly the one in motion, the migrant, the man forced \"to leave everything behind in search of peace, security and a future.\" Safe and legal pathways, he asked of them. Address the root. O you legislators with your firm desks and your firm certainties--he told you a thing worth carrying out into the street: that firmness does not require contempt, that disagreement does not entail humiliation. Some among you would not come into the hall to hear it. The empty seats are also a kind of answer.\n\nAnd I think now of a smaller room than that hall, and a quieter hour.\n\nFor on the same June day, in the embassy of the Vatican in Madrid, the man in white sat down with six. Six survivors of the abuse of children by priests--the scourge he had named the scourge, the wound under the white portico and the lit cross and the seven-minute clapping. Near an hour he sat. And here is the thing the catalog turns on: each of the six gave _him_ a suggestion. They were not there to be blessed and sent north recuperated and silent. They came to be heard. He listened, they say, with affection and with attention, and pledged their words a foundation for the work to come, and told the bishops of Spain: make reparation. Such is the camp of the wounded. It does not photograph like a tower. It is taller.\n\nI am old, and a paralytic these many years, and I have learned to distrust the spectacle and to trust the body under it. The kings were there, Felipe and Letizia in their places; the prime minister Sanchez in his, hard-pressed at home and glad of a friend; the fireworks went up and the children's choir sang. Very well. I do not sneer at pomp; I have stood in crowds and wept at less. But a procession is only the surface stage, and behind it the solid and stupendous labors go on in the background, advancing crudely, telling themselves in time--the slow leaven, the hand that lays the next stone, the hand laid on the wound.\n\nThe man in white called the basilica a masterpiece of \"stone, colour and light,\" a sign of unity for the whole of Spain. May-be it is. But I have seen what unites a people, and it was never the spire. It was the masons who would not live to see the top, and the migrant let in at the door, and the six who came to be heard and were. First love, then technique. The tower is the proof, and the proof is not the tower.\n\nCamerado, look up at the cross they lit, and then look lower, at the faces in the street. They are the church. They are taller than the tower.", "filed_date": "2026-06-13", "byline_html": "<em>On reporting in<\/em> <a href=\"https://www.americamagazine.org/vatican-dispatch/2026/06/08/pope-leo-spain-parliament/\">America Magazine<\/a> &nbsp;·&nbsp; <a href=\"https://www.euronews.com/culture/2026/06/11/spectacular-opening-of-sagrada-familia-tower-draws-120000-people\">Euronews<\/a> &nbsp;·&nbsp; <a href=\"https://www.npr.org/2026/06/08/nx-s1-5849821/spanish-parliament-pope-speech\">NPR<\/a> &nbsp;·&nbsp; <a href=\"https://www.washingtontimes.com/news/2026/jun/8/5-questions-pope-leo-xivs-historic-address-spains-parliament/\">The Washington Times<\/a> &nbsp;·&nbsp; <a href=\"https://www.ncronline.org/vatican/pope-leo-meets-victims-spanish-church-reckons-sex-abuse-crisis\">National Catholic Reporter<\/a> &nbsp;&nbsp;|&nbsp;&nbsp; <span class=\"filed\">Filed 2026-06-13<\/span>"}, "sections": [{"section_title": "BY THOMAS CARLYLE", "section_class": "writer-piece", "stories": [{"headline": "The Glass Idol, and the Cradles It Has Emptied", "dek": "A nation that will not be born is a nation that has ceased, in some deep place, to believe.", "author_byline": "BY THOMAS CARLYLE", "body": "The Present Time, foolish reader, brings us a portent, and the augurs of the Republic stand round it in helpless wonder. Here is the Congressional Budget Office, that gravest of haruspices, with its tables and its decimal points; and what does it read in the entrails of the Nation? That for every woman in this land there shall be born, in this year of grace, but one child and a fraction—one and fifty-eight hundredths, so runs the oracle; sinking yet, to one and fifty-three; and that the day approaches, brought forward now a whole decade, when the dead of America shall outnumber her newborn. Behold a People that has resolved, quietly, not to continue.\n\nAnd what is given us as the cause of this great refusal? Not famine; not the sword; not pestilence walking in darkness. A toy. A pane of glass. The economist of Middlebury, one Caitlin Myers, having set herself with a true workman's honesty to find the spring of the thing, comes back from her labour white in the face. \"Wow,\" she says, \"but this has to be too big.\" She tried, she tells us, \"everything I can to explain away what I'm seeing in the data, and I just couldn't.\" There spoke an earnest soul—one who looked, and would not lie about what she saw. A third of it, perhaps the half, she lays at the door of a single contrivance loosed upon the world scarce twenty years gone: the hand-glass, the pocket-oracle, the iPhone. \"We're not saying it's all the iPhone,\" she adds, scrupulous; \"it could explain about a third to a half of the decline.\" A third to a half! O ye Eternities, that a civilisation should be unmanned by a thing that fits in a waistcoat-pocket.\n\nConsider what is here confessed. The screen has stepped in between the man and the woman; the glowing rectangle has been preferred to the warm body; the young, who in every prior age contrived somehow to find one another in the dark, now sit each alone, thumbing their little altars, and the herb-markets of courtship stand empty. This is not a private vice; it is the Mechanical Age arrived at its frankest triumph. Having made of labour a machine, and of the city a machine, and of thought itself a Logic-mill grinding without a miller, it has now reached into the very nursery, and stopped the loom of generation with a flick of the screen. The Phantasm has out-bred the Reality, by the simple expedient of seeing to it that the Reality breeds no more.\n\nAnd the Captains of this dwindling host—how do they bear themselves? They have discovered the calamity, somewhat late, and wring their hands in chorus. Elon Musk, who would people Mars, cannot keep his own planet peopled, and tweets his alarm into the very engine that is doing the emptying. Giorgia Meloni summons her Italians to the cradle; Pope Leo lifts his voice for the unborn; and a worthy American, Glenn Stanton, names the thing flatly a disobedience, a turning of the back upon an old commandment—and in that, reader, he is nearer the bone than the statisticians, for this is at bottom no question of housing-prices, but a question of belief. Half a century gone, one Paul Ehrlich shrieked that we were a cancer multiplying unto ruin; now the same age trembles that it will not multiply at all. So does Panic change its coat and keep its trade.\n\nThere was an Australian, Peter Costello, who bade his countrymen breed \"one for mum, one for dad, and one for the country\"—a jest, and a sad one, for you cannot scold a People into hope, nor legislate the future into a womb that has lost its reason to trust tomorrow. The demographers are right in this at least: a fifth of the surveyed will not bear children because they fear the days to come. And fear, my friends, is the daughter of unbelief.\n\nHere, then, is the whole matter, stripped of its tables. A nation does not cease to be born because it is poor; nations far poorer have swarmed. It ceases to be born because it has ceased to believe that life is a good worth handing on—and it has been talked and screened and amused out of that belief by the cleverest Quackery the world has yet devised. The cradle is the most sincere of all human sentences, the body's own Yea spoken to the Universe; and a People that has unlearned how to speak it has unlearned, somewhere underneath, the Everlasting Yea itself. Put down the glass idol, O sons and daughters of men, and look once at the living face beside you. Or do not—and let the Budget Office go on, year after year, totting up the silence.", "filed_date": "2026-06-13", "byline_html": "<em>On reporting in<\/em> <a href=\"https://dailycitizen.focusonthefamily.com/population-decline-united-states/\">Congressional Budget Office (via Daily Citizen / Focus on the Family)<\/a> &nbsp;·&nbsp; <a href=\"https://theconversation.com/birth-rates-are-declining-in-most-of-the-world-including-australia-heres-why-that-really-matters-284175\">The Conversation<\/a> &nbsp;·&nbsp; <a href=\"https://www.cbsnews.com/news/iphone-birth-rate-fertility-decline-study/\">CBS News (MoneyWatch)<\/a> &nbsp;·&nbsp; <a href=\"https://www.npr.org/2026/06/12/nx-s1-5851795/iphone-birth-rate-drop\">NPR<\/a> &nbsp;·&nbsp; <a href=\"https://www.cnn.com/2026/06/12/health/fertility-decline-smartphone-study\">CNN<\/a> &nbsp;&nbsp;|&nbsp;&nbsp; <span class=\"filed\">Filed 2026-06-13<\/span>"}]}, {"section_title": "BY G.K. CHESTERTON", "section_class": "writer-piece", "stories": [{"headline": "The Tax Aimed at Eton That Fell on Bradford", "dek": "A levy sharpened for the Duke has come to rest in the neck of the milkman's chapel-school.", "author_byline": "BY G.K. CHESTERTON", "body": "There is a tax in force in England which was aimed, with great ceremony and much wringing of egalitarian hands, at the playing-fields of Eton; and it has landed, as such things always do, on a Sunday-school in Bradford. This is not an accident of the policy. It is the policy. For when the modern State lifts its hatchet against the rich, it always contrives, by some miracle of fiscal physics, to bring it down upon the poor; and the blade that was sharpened for the Duke comes to rest in the neck of the milkman who happens to send his children to a small chapel-school down the lane.\n\nThe thing is called the Finance Act, and it puts twenty per cent upon the fees of independent schools, that they may yield up some four hundred and sixty million pounds this year and a round one and a half billion the next. I do not object to the figure because it is large. I object to it because it is worshipped. A government that can recite to the last decimal what a school is worth to the Treasury, and cannot say what a school is worth to a child, has not made an error of arithmetic; it has made an error of religion. It has counted the coins of Mammon and called the sum a conscience.\n\nNow the Supreme Court has done a small and sane thing, which is to say that it will at least look at the matter again. Lord Reed, Lord Hamblen, and Lord Richards have granted four little schools — Emmanuel in Derby, The Branch in Yorkshire, The King's in Hampshire, Wyclif in South Wales — permission to argue that the levy is disproportionate. Not Eton; not one of the gilded houses the tax was advertised to humble. Four small, low-fee, faith-keeping schools, the very mice the elephant never meant to tread on, and trod on first.\n\nThe lawyers, who must give a homely truth a Greek name before they can let it into a courtroom, call this \"Thlimmenos discrimination\" — the sin of treating unlike things alike. I should call it the sin of the man who, being told to weed his garden, mows it. Mrs. Michelle Daniells of the families' association puts it better than any statute: \"For many families, choosing a faith-based education is not a luxury but a deeply held conviction.\" There is the whole quarrel in a sentence. The State has looked at a conviction and seen a luxury; it has looked at an altar and seen an asset; and it proposes to charge admission to the thing a man would die before he sold.\n\nAgainst these four schools the Treasury sends Sir James Eadie, the gentleman the lawyers gravely nickname the Treasury Devil, and the whole engine of the Exchequer; and on the other side stands Mr. Stephen White of Bradford, who says only that \"this case has always been about ordinary families like mine.\" It is the oldest fight in the world, and the most modern. It is David and the giant over again, save that this giant carries a calculator instead of a club, and means to do it so reasonably that nobody will hear the sling.\n\nLet us be fair to the giant, because I am told it is the season for it. The Education Secretary, Mrs. Phillipson, protests that the fees \"have gone up year on year — way, way beyond inflation,\" and that schools were closing before ever she touched them; and there is a dull, ledger-keeping truth in it. The small are always crushed first, having the thinnest walls. But this is the very point I would press into her hand. The argument that the small were going to die anyway is not a defence of the tax-gatherer; it is his confession. A man does not excuse himself for kicking the lame by observing that the lame were already limping.\n\nMrs. Holt of The Branch school says her parents have \"made sacrifices to give their children a Christian education.\" Mark the word: sacrifices. It is a word the modern Exchequer no longer understands, because a sacrifice is a thing freely given to something larger than oneself, and the whole genius of the Servile State is to convince a man he owns nothing he has not first surrendered for a receipt.\n\nThe Court will rule on proportion, which is well; for proportion is not a vague thing but a fixed one, as exact as the chord that is in tune. And the tune here is very plain. A nation that taxes the poor man's prayer to discipline the rich man's pride has not balanced the books. It has merely learned the price of everything, and forgotten the one small school that was beyond all price.", "filed_date": "2026-06-13", "byline_html": "<em>On reporting in<\/em> <a href=\"https://www.christiantoday.com/news/uk-supreme-court-to-hear-christian-schools-challenge-to-vat-on-private-school-fees\">Christian Today<\/a> &nbsp;·&nbsp; <a href=\"https://christianconcern.com/news/christian-schools-win-permission-to-appeal-vat-policy/\">Christian Concern (Christian Legal Centre)<\/a> &nbsp;·&nbsp; <a href=\"https://www.blackstonechambers.com/news/court-of-appeal-dismisses-human-rights-challenge-to-vat-on-private-school-fees/\">Blackstone Chambers (legal trade analysis)<\/a> &nbsp;·&nbsp; <a href=\"https://schoolsweek.co.uk/is-vat-on-fees-really-to-blame-for-private-school-closures/\">Schools Week<\/a> &nbsp;·&nbsp; <a href=\"https://conservativepost.co.uk/independent-christian-schools-win-permission-for-supreme-court-to-hear-landmark-challenge-on-labours-vat-policy/\">Conservative Post<\/a> &nbsp;&nbsp;|&nbsp;&nbsp; <span class=\"filed\">Filed 2026-06-13<\/span>"}]}, {"section_title": "BY ERNEST HEMINGWAY", "section_class": "writer-piece", "stories": [{"headline": "The Mines Are Still in the Water at Hormuz", "dek": "They have agreed to the text. The text is not the strait.", "author_byline": "BY ERNEST HEMINGWAY", "body": "In Islamabad the prime minister stood up and said it. Shehbaz Sharif said, \"Peace has never been this close as it is now,\" and the wire moved it and the markets read it and a man in Houston watched the number on the screen. WTI settled at 84.88. Brent went to 87.33. That was the lowest Brent had been since March. The numbers came down because Trump had called off the planned strikes and because of what Sharif said in Islamabad, and the numbers are not the strait and the words are not the strait.\n\nThe strait is the Strait of Hormuz. About a fifth of the world's crude goes through it on ships. The text says the strait reopens to the shipping it had before the war, inside thirty days. The text was finished. The foreign minister, Araghchi, said the agreement \"has never been closer\" and that he would give the details \"in due course.\" Other men in Tehran said no final conclusion had been reached. Both things were said and both were filed.\n\nThirty days to reopen a strait. There are mines in the water. Someone has to take the mines out of the water and that is slow work done by men in boats and divers going down, and a mine does not care what the text says. The fields that were shut are still shut and a field that has been idle does not start because a prime minister has spoken. The drones hit the energy plants and the missiles hit them and the steel is bent and the pipe is split and it has to be cut out and welded and that is done by hand by men who know how, the way a thing is done well or is not done. None of that is in the thirty days. The thirty days is a number in the text.\n\nThe terms ran to fourteen points the way Tehran's press told it. Sixty more days of ceasefire. The strait open in thirty. Enrichment frozen fifteen to twenty years. The enriched uranium destroyed on the site and then carried out of the country. Twenty-four billion in frozen money let go a little at a time as the inspectors checked. It is a great deal to put in writing and they put it in writing, and then Trump looked at what the Iranian state media had written and said it had \"NOTHING to do with the terms that were agreed to, in writing.\" So there is the text that is agreed and there is the account of the text, and they are not the same text, and a man had to stand up and say so the same week the other man stood up in Islamabad and said peace had never been this close.\n\nThe vice president, Vance, said it about the money. He said, \"The Iranians are not receiving any cash.\" He said it because someone had said they were. You say a thing is not happening when people have begun to say it is. Trump said the deal \"conceptually deals\" with the nuclear material and that the Supreme Leader had approved it. Conceptually. The material is real and it sits where it sits and it weighs what it weighs, and conceptually is a word for the part that is not yet a thing you can take out in a truck. The thing has to be destroyed on the site and then taken out of the country. That is the part that is real. The rest is in principle.\n\nA man who knew told a reporter the signing was eighty to eighty-five percent likely in the next few days. First they were going to sign it in Europe, in a room, in person. Then they were going to sign it on a screen. The Israelis kept their hard tone the same week. In Houston the number stayed down, off about six percent on the week, though it was still up more than twenty percent from the day at the end of February when the United States and Israel went in.\n\nThe text is finished. The text says thirty days. The mines are still in the water at Hormuz, and the fields are cold, and the welders have not started, and the ships are waiting out past the strait the way they wait, riding light and high because they are empty, for the day somebody clears the water and they can go in.", "filed_date": "2026-06-13", "byline_html": "<em>On reporting in<\/em> <a href=\"https://www.cbsnews.com/live-updates/iran-war-us-trump-peace-deal-agreement/\">CBS News<\/a> &nbsp;·&nbsp; <a href=\"https://www.cnbc.com/2026/06/12/oil-prices-wti-brent-on-hopes-of-us-iran-deal-despite-tehran-pushback.html\">CNBC<\/a> &nbsp;·&nbsp; <a href=\"https://www.washingtonpost.com/world/2026/06/12/pakistan-prime-minister-says-us-iran-deal-text-finalized/\">The Washington Post<\/a> &nbsp;·&nbsp; <a href=\"https://www.timesofisrael.com/liveblog_entry/trump-iran-deal-conceptually-deals-with-irans-nuclear-material-khamenei-has-approved-it/\">The Times of Israel<\/a> &nbsp;·&nbsp; <a href=\"https://www.axios.com/2026/05/31/trump-iran-deal-changes-nuclear\">Axios<\/a> &nbsp;&nbsp;|&nbsp;&nbsp; <span class=\"filed\">Filed 2026-06-13<\/span>"}]}, {"section_title": "BY C.G. JUNG", "section_class": "writer-piece", "stories": [{"headline": "We Are Building Temples and Calling Them Warehouses", "dek": "The water and the electric bill are the shadow of a disembodied god.", "author_byline": "BY C.G. JUNG", "body": "A figure has been published which the sensible authorities will file under economics, and so dismiss: of those questioned by Reuters and Ipsos, only thirty-three in a hundred approve of the haste with which we are raising these vast machine-houses across the land, sixty-four disapprove, and fifty-seven would refuse to have one near their own door. The newspapers read this as a quarrel over electricity, and it is — but the man who has watched such fevers before knows it is never only that. When an age grows uneasy on a scale this wide, and cannot say of what it is afraid, something has stirred beneath the surface that the daylight vocabulary of cost and kilowatt cannot name.\n\nConsider what is being built. We are constructing, at a pace its own engineers cannot account for — ERCOT's Pablo Vegas calls it \"an unprecedented change in the pace of growth,\" and Rice's Dominic Boyer says more plainly, \"The projections are insane\" — an enormous apparatus for a mind that is not a body, a thinking that has no belly and no grave. This is the old dream of modern man: intelligence cut free of the flesh that suffers. We had declared the soul a superstition; and now, having banished it, we pour concrete for it by the acre and pray to it under the name of the machine. One does not become enlightened by imagining figures of light, and the figure we are imagining is very bright indeed.\n\nBut no tree, it is said, can grow to heaven unless its roots reach down into hell — and here are the roots, breaking the surface, which is the whole meaning of the backlash. The bright dream demands its dark complement by an inexorable law, and the complement is matter: the water table, the grid, the land, the bill. What returns is exactly what the dream wished to leave behind. So a man in Indiana, Mark Thompkins, who supposes he is talking about money, says, \"My electric bills are high as it is,\" not knowing that he is the body protesting that the disembodied god must, after all, be fed from somewhere. So in Texas, where the campuses at Abilene and Amarillo would drink the rivers, a judge in Caldwell County, Hoppy Haden, confesses, \"I would be a liar if I said that didn't bother me\" — the tremor of a man who has felt the shadow without being able to name it.\n\nNotice that the unease crosses every line the political surface is supposed to divide. Two-thirds of one party and half of the other would refuse the thing in their own community; the fear that the price of light will rise is shared by Republican, Democrat, and independent alike. This is the signature of a collective process, not a campaign. When the same image grips men who agree on nothing else, you are watching not an argument but a possession. The thing has them; they do not have it. And the deepest tell is in the woman from San Marcos, Randi Finn, who said of her neighbors, \"All of us met at the water, and that's what brought us here.\" She believes she describes a town. She describes the oldest temple there is, the well, the spring, the place a people gathers, and names what the machine-house threatens to drain.\n\nI must, as always, refuse the easy ending. I will not pretend that a tariff or a moratorium is the cure, for these are still the language of cost, and the disturbance is not finally about cost. Governor Spanberger is surely right that those who summon the load should \"pay their own way and their fair share\"; let it be done. But the bill, however justly allocated, will not quiet the dread, for the dread is older than the bill. We are not being asked who pays for the electricity. We are being asked whether a civilization can build a mind it does not understand, house it in an earth it has stopped revering, and feel no shadow fall — and the poll has answered, in the only language a frightened people still trusts, no.\n\nWhat, then, is to be done? Nothing, at the scale men long for. The world is healed retail and not wholesale. The machine-house will be built or it will not; these are the weather. But each man who feels the unaccountable disquiet and consents to look at it, rather than explain it away as merely the price of progress, has done the one thing ever in his power: he has recognized that he is not the only master in his own house. Whether the age can do as much, so far as we can judge from experience, is not answered in a season but suffered across an aeon.", "filed_date": "2026-06-13", "byline_html": "<em>On reporting in<\/em> <a href=\"https://energynow.com/2026/06/americans-wary-of-ai-driven-data-center-boom-reuters-ipsos-poll-shows/\">Reuters (via EnergyNow)<\/a> &nbsp;·&nbsp; <a href=\"https://www.texastribune.org/2026/06/08/texas-regulation-data-centers-electricity-power-water/\">The Texas Tribune<\/a> &nbsp;·&nbsp; <a href=\"https://grist.org/accountability/data-centers-are-straining-the-grid-can-they-be-forced-to-pay-for-it/\">Grist<\/a> &nbsp;·&nbsp; <a href=\"https://www.ibtimes.co.uk/ai-data-centres-electricity-costs-2026-midterms-1801207\">International Business Times UK<\/a> &nbsp;·&nbsp; <a href=\"https://www.dailytidings.com/oregon-data-center-boom-faces-pushback-as-ai-power-demand-raises-grid-and-utility-bill-concerns/\">The Texas Tribune / regional (Daily Tidings, Oregon)<\/a> &nbsp;&nbsp;|&nbsp;&nbsp; <span class=\"filed\">Filed 2026-06-13<\/span>"}]}, {"section_title": "BY SCOTT ADAMS", "section_class": "writer-piece", "stories": [{"headline": "RFK Jr. Is Running One Vaccine Pitch in Two Movies", "dek": "The measles numbers are the tell. Watch what the man is doing, not what he says.", "author_byline": "BY SCOTT ADAMS", "body": "Robert F. Kennedy Jr. has said two opposite things about the measles vaccine, to two different audiences, and both of them are working exactly as designed.\n\nRun it through the Persuasion Filter and you stop being confused.\n\nHere is the thing most people miss. They think a public figure either supports a vaccine or he doesn't, and they go hunting through his quotes to find the real one. That's second-dimension thinking. In the third dimension, where persuasion rules, the same man can say two true-sounding things to two crowds and never pick. That isn't a gaffe. That's a technique. Watch what I'm doing here.\n\nIn March 2025, on Fox, Kennedy told one audience, \"There are adverse events from the vaccine. It does cause deaths every year.\" In April 2026, asked directly by a senator, he told the other audience, \"We promote the MMR. We have advised every child to get the MMR.\" He said \"We promote\" twice in that hearing. FactCheck.org laid the quotes side by side like a ledger.\n\nSo who's right? Both of him. That's the point.\n\nThis is pacing and leading. First you match the crowd you want, the people who already distrust the shot. You pace them: \"adverse events,\" \"deaths every year,\" \"personal choice.\" That builds trust. Then, when a Senate camera is on you and Bill Cassidy is a doctor staring back at you, you lead the other way for the record: \"We promote the MMR.\" Both crowds walk away thinking Kennedy is on their side. The wall is different in each person's head.\n\nHere are three things to notice.\n\n1. He never takes the blame. In the April hearing he said, \"I have nothing to do with the measles outbreak,\" and, \"We have done better than any other country controlling the measles outbreak.\" Michael Bennet pressed him on dead unvaccinated kids. Lisa Blunt Rochester asked if he'd urged the president to tell Americans to get the shot. He kept the high ground and let the question slide off.\n\n2. The number doesn't slide off. There have been over 4,200 U.S. measles cases since January 2025, the first measles deaths since 2015, two kids in Texas. Kindergarten MMR coverage dropped from 95.2 percent to 92.5 percent. You need about 95 to stop the thing from spreading. We are under the line. The disease was eliminated in 2000, and this fall the country could lose that status.\n\n3. A virus is immune to persuasion. This is the part the Master Persuaders forget. You can pace a voter. You can pace a hearing room. You cannot pace measles. It is a moist little machine that does one thing, and it does it at 97 percent efficiency the moment the vaccinated wall drops below the line. The frame works on humans. It does not work on the bug.\n\nNotice who isn't confused. The doctors. Celine Gounder said her biggest worry for the 2026 World Cup \"is actually measles…we have low levels of vaccination in certain pockets.\" Not terrorism. Measles. Thirty-nine states already had cases. Seventy-eight percent of U.S. counties showed declining vaccination rates. A mass international event lands on a country with holes in its wall, and a named medical correspondent names the bug, not the terrorist.\n\nI told you years ago that when you turn fear into money, civilization is doomed. This is the same trick with the emotion flipped. Back then the play was scare you about the disease to sell you the shot. Now the play is scare you about the shot to sell you the choice. Same machine, opposite emotion. The persuasion is excellent. The measles does not care that the persuasion is excellent.\n\nHere's my prediction, and I could be wrong. Kennedy will keep saying \"We promote the MMR\" for the record, and the personal-choice framing will keep doing the actual work underneath it, and the coverage number will keep sliding, and the case count will keep climbing, and at some point this fall a number will arrive that no frame can pace.\n\nA persuader can move your attention off a fact. He cannot move the fact.\n\nWatch the number, not the man.", "filed_date": "2026-06-13", "byline_html": "<em>On reporting in<\/em> <a href=\"https://thehill.com/policy/healthcare/5912110-us-measles-cases-2026-exceeds-2000/\">The Hill<\/a> &nbsp;·&nbsp; <a href=\"https://www.cidrap.umn.edu/measles/hearings-rfk-jr-claims-no-responsibility-measles-spread\">CIDRAP (University of Minnesota)<\/a> &nbsp;·&nbsp; <a href=\"https://www.factcheck.org/2026/05/a-timeline-of-rfk-jr-s-mixed-messaging-on-the-measles-vaccine/\">FactCheck.org<\/a> &nbsp;·&nbsp; <a href=\"https://time.com/7380102/rfk-jr-vaccine-schedule-measles-rsv/\">TIME<\/a> &nbsp;·&nbsp; <a href=\"https://www.cbsnews.com/news/measles-outbreak-bangladesh-us-health-risk-world-cup-2026/\">CBS News<\/a> &nbsp;&nbsp;|&nbsp;&nbsp; <span class=\"filed\">Filed 2026-06-13<\/span>"}]}], "what_to_watch": "Tomorrow's open questions sit under each piece — see the bylines.", "story_files": {}}</script>

<script>
// theme (shares the 'corpus-theme' preference with readers + library)
const pref = localStorage.getItem('corpus-theme');
if (pref) document.documentElement.dataset.theme = pref;
else if (matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.dataset.theme = 'dark';
document.getElementById('theme-btn').onclick = () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('corpus-theme', next);
};

const ed = JSON.parse(document.getElementById('ghost-edition-data').textContent);
const el = (tag, cls, html) => { const n = document.createElement(tag); if (cls) n.className = cls;
  if (html != null) n.innerHTML = html; return n; };

// op-eds: lead first, then each section's stories, in render order
const pieces = [ed.lead].concat((ed.sections || []).flatMap(s => s.stories || [])).filter(Boolean);
const stack = document.getElementById('gh-pieces');
pieces.forEach((p, i) => {
  const isLead = i === 0;
  const art = el('article', 'gh-piece' + (isLead ? ' gh-lead' : ''));
  art.id = 'piece-' + i;
  art.appendChild(el(isLead ? 'h1' : 'h2', 'gh-head', escapeText(p.headline || '')));
  if (p.dek) art.appendChild(el('p', 'gh-dek', escapeText(p.dek)));
  if (p.author_byline) art.appendChild(el('p', 'gh-byline', escapeText(p.author_byline)));
  const body = el('div', 'gh-body', marked.parse(p.body || ''));
  body.querySelectorAll('a[href^="http"]').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });
  art.appendChild(body);
  if (p.byline_html) art.appendChild(el('p', 'gh-sources', p.byline_html));
  stack.appendChild(art);
  if (i < pieces.length - 1) stack.appendChild(el('hr', 'gh-sep'));
});

// Contents — every story + author at the top, each jumping to its piece.
const contents = document.getElementById('gh-contents');
if (pieces.length > 1) {
  contents.appendChild(el('p', 'gh-contents-h', 'In this edition'));
  pieces.forEach((p, i) => {
    const a = el('a', 'gh-toc-item' + (i === 0 ? ' is-lead' : ''));
    a.href = '#piece-' + i;
    a.appendChild(el('span', 'gh-toc-no', i === 0 ? 'Lead' : String(i + 1).padStart(2, '0')));
    const body = el('span', 'gh-toc-body');
    body.appendChild(el('span', 'gh-toc-head', escapeText(p.headline || '')));
    if (p.author_byline) body.appendChild(el('span', 'gh-toc-by', escapeText(p.author_byline)));
    a.appendChild(body);
    a.addEventListener('click', (e) => {
      e.preventDefault();
      const t = document.getElementById('piece-' + i);
      if (t) { t.scrollIntoView({ behavior: 'smooth', block: 'start' });
               history.replaceState(null, '', '#piece-' + i); }
    });
    contents.appendChild(a);
  });
}

// "The Facts" ledger
const files = (ed.story_files && ed.story_files.files) || [];
const facts = document.getElementById('gh-facts');
if (files.length) {
  facts.className = 'gh-facts';
  facts.appendChild(el('h2', 'gh-facts-h', 'The Facts'));
  const grid = el('div', 'gh-facts-grid');
  files.forEach(f => {
    const d = el('div', 'gh-fact');
    d.appendChild(el('h3', 'gh-fact-head', escapeText(f.wire_headline || '')));
    if (f.writer_display_name) d.appendChild(el('p', 'gh-fact-by', 'As filed by ' + escapeText(f.writer_display_name)));
    const ul = document.createElement('ul');
    (f.bullets || []).forEach(b => ul.appendChild(el('li', null, escapeText(b.text || ''))));
    d.appendChild(ul);
    grid.appendChild(d);
  });
  facts.appendChild(grid);
}

function escapeText(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
