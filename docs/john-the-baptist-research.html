for the Community Rule (1QS), Columns III.4–12 and V.1–7. Vermes translation accessed via the University of Pennsylvania text archive (ccat.sas.upenn.edu/rak/courses/225/texts/1QS), 2026-06-12.\n\n**Tier 2 — Scholarly commentary, cited alongside the primary readings:**\n\n2. John P. Meier, *A Marginal Jew: Rethinking the Historical Jesus*, Vol. 2: *Mentor, Message, and Miracles* (New York: Doubleday, 1994), esp. the treatment of John the Baptist and the authenticity of Josephus *Ant.* 18.116–119. The standard critical assessment; argues the Josephus passage is authentic and the Gospel and Josephan accounts diverge on the cause of death.\n\n3. Peter Kirby, \"The Authenticity of John the Baptist in Josephus,\" peterkirby.com/john-the-baptist-authentic.html, accessed 2026-06-12 — useful aggregation of the text-critical arguments (manuscript attestation in A, M, W; Origen and Eusebius citation; the *baptismos*/*baptisma* vocabulary point; Eusebius's omission of the final sentence). Tier 2/5; the underlying text-critical claims trace to Meier, Webb, and the manuscript record.\n\n4. Synthesizing critical scholarship on the historical John, drawn on throughout: Joan E. Taylor, *The Immerser: John the Baptist within Second Temple Judaism* (Eerdmans, 1997); Robert L. Webb, *John the Baptizer and Prophet* (Sheffield, 1991); Joel Marcus, *John the Baptist in History and Theology* (Univ. of South Carolina Press, 2018); James D.G. Dunn, *Jesus Remembered* (Eerdmans, 2003). These govern the readings on the embarrassment criterion (baptism of Jesus), the rival-Baptist-movement hypothesis (John 1; Acts 19), the Q reconstruction issues, the Qumran-comparison limits, and the legendary character of Mark 6 and Luke 1. [Cited as a scholarly cluster; individual claims should, in a fuller draft, be pinned to specific pages.]\n\n8. On the Q material and the John-passages: standard reconstructions (the International Q Project / Robinson–Hoffmann–Kloppenborg, *The Critical Edition of Q*, 2000) underlie the treatment of Matthew 3//Luke 3 and Matthew 11//Luke 7 as double-tradition. Referenced via D.A. Carson, \"Matthew 11:19b/Luke 7:35\" (media.thegospelcoalition.org), and standard commentary; accessed 2026-06-12.\n\n9. On the anti-Baptist polemic of the Fourth Gospel and its implication of a rival sect: the classic hypothesis (Rudolf Bultmann, *The Gospel of John*) as carried and qualified in Marcus (2018) and Taylor (1997). [Tier 2.]\n\n12. Mandaean *Book of John* structural and content details (chapter divisions, the \"Yahyā teaches in the nights\" formula, the birth portents, the Jesus-baptism episode) corroborated via HandWiki (handwiki.org/wiki/Religion:Mandaean_Book_of_John) and the truthinhistory.wordpress.com summary of the Sidra d-Yahya, both reflecting Häberl–McGrath and Gelbert–Lofts; accessed 2026-06-12. [Tier 5 web summaries used only to corroborate the Tier 1 critical edition's account, not as independent authority.]\n\n16. NASSCAL e-Clavis Christian Apocrypha, \"Protevangelium of James\" (nasscal.com), and Lily Vuong's preview of the Protevangelium (NASSCAL), for dating (mid-to-late 2nd c.), manuscript tradition (Papyrus Bodmer V), and the appended-ending question; accessed 2026-06-12. [Tier 2/5 reference scholarship.]\n\n---\n\n*Document note: All twelve primary texts were read in scholarly translation or critical edition as cited. Where the original-language reading is load-bearing (Josephus's baptismos/baptisma; Mark 1:2's Isaiah/prophets; the Quran's ḥaṣūr/ḥanān), the lexical/text-critical point is stated explicitly. The Gospel and Acts passages were read against the NA28 critical text; the precise versification and wording of well-known passages reflect the standard critical Greek and major English versions (NRSV/ESV) cross-checked, rather than a single proprietary translation. This document is the floor: where any other document in the corpus claims \"Source X says Y about John,\" the claim should be checked against the direct reading here.*"}, {"order": 8, "file": "Future_Trajectory.md", "title": "John the Baptist: Future Trajectory", "summary": "", "body": "# John the Baptist: Future Trajectory\n\n> **Bottom line.** The most consequential development in John the Baptist's story over the next fifteen years will not happen in libraries or churches — it will happen in diaspora communities across Australia, Sweden, Germany, and the United States, where the last heirs of his actual movement are struggling to survive. Mandaean community viability is the single highest-stakes \"future\" dimension of the John the Baptist story, and the news is mixed at best: the conditions for authentic masbuta practice (flowing river water, sufficient priesthood, community density for initiation) are under severe pressure. Simultaneously, the academic \"Quest for the Historical John\" — now a formal parallel enterprise to the century-old Quest for the Historical Jesus — is growing, and the 2020 critical English edition of the Mandaean Book of John is opening a new scholarly vein. John's trajectory through 2040 is pulled between the gradual mainstreaming of a more historically accurate, less Christianity-subordinated portrait, and the potential disappearance of the living community that is the closest human link to his Jordan movement.\n\n---\n\n## Method\n\nThis forecast draws on the seven verified corpus documents — particularly `01_Historical_Life_And_Milieu.md`, `02_John_Across_Traditions.md`, `03_Reception_History.md`, and the drivers identified across the corpus — combined with base rates from comparable cases: endangered minority religious communities in diaspora, the trajectory of specialized historical scholarship, and patterns of interfaith encounter around shared venerated figures. No liquid prediction markets exist on these specific questions; Metaculus and Manifold have no relevant markets. The forecast horizon is through 2040 (roughly fifteen years).\n\n---\n\n## Scenarios\n\n### Scenario A: Gradual Scholarly Mainstreaming\n\n**Probability:** 50–60%\n\n**Description:** The academic \"Quest for the Historical John,\" now gaining institutional momentum (a dedicated 2021 issue of the *Journal for the Study of the Historical Jesus*; the 2021 Enoch Seminar Nangeroni meeting on John), continues producing high-quality work. The Häberl-McGrath 2020 critical English edition of the Mandaean Book of John anchors a new generation of Mandaean-sourced scholarship, making the anti-Jesus Johannine tradition widely accessible in English for the first time. John is increasingly treated as a primary figure in Second Temple Jewish prophetism, not merely a footnote to the Jesus story. Seminary curricula, popular-academic publications (the \"who was John the Baptist\" genre), and interfaith dialogue increasingly feature the three-tradition comparison. The forerunner theology persists in liturgy and popular Christianity but scholars, educated laypeople, and interfaith practitioners increasingly distinguish the historical John from the theological construct.\n\n**Drivers:**\n- The Häberl-McGrath 2020 edition as an enabling resource for non-specialist Mandaean scholarship\n- Continued growth of historical Jesus studies creating demand for historical John studies as a necessary parallel\n- Growing awareness of Mandaeism in diaspora context (journalists, scholars, interfaith practitioners encounter Mandaeans in Western cities)\n- Post-colonial impulse within religious studies to surface minority/suppressed traditions\n\n**Conditions:**\n- No catastrophic collapse of Mandaean community that severs the living link\n- Continued academic publishing and university-press engagement with the topic\n- Interfaith dialogue institutions (e.g., Parliament of World's Religions, Elijah Interfaith Institute) include Mandaean voices\n\n**Signals to watch:**\n- New monographs on the historical John from major university presses (Harvard, Oxford, Cambridge, Yale)\n- Mandaean representatives appearing at major interfaith conferences\n- Media coverage of Mandaeans in diaspora framing them as John's community\n- New archaeological work at Al-Maghtas (the Jordan baptism site, UNESCO World Heritage since 2015)\n\n**Time horizon:** Visible trajectory by 2028; consolidated by 2035.\n\n---\n\n### Scenario B: Mandaean Community Crisis\n\n**Probability:** 25–35%\n\n**Description:** The Mandaean diaspora — reduced from ~60,000–70,000 pre-2003 in Iraq and Iran to perhaps 6,000–10,000 remaining in those countries, with the remainder scattered across Australia (~6,000–10,000), Sweden (~5,000–8,000), the United States (~5,000–7,000), and Germany (~2,000–4,000) — loses the critical conditions for religious continuity. Masbuta requires flowing \"living water\" (yardna), which in diaspora countries is not always accessible or legally permitted (river baptism in winter in Sweden, for example, is physically perilous). More critically, the Mandaean priesthood is depleted: the training of a tarmidi (priest) requires years of study under an established priest, and the priest population is small and aging. If the priesthood drops below a functional threshold, the ability to perform masbuta — the central living sacrament that is the core continuity with John — is interrupted. John remains a subject of historical study but his community disappears as a living religious practice.\n\n**Drivers:**\n- Catastrophic dispersion of Mandaeans after 2003 Iraq War targeting of non-Muslim minorities\n- Small, aging, and globally scattered priesthood\n- Physical requirement for flowing water making diaspora practice logistically difficult\n- Assimilation pressure in Western host societies, especially on younger generations\n- No territorial homeland; no political patron state\n\n**Conditions:**\n- Failure to establish sustainable priesthood-training programs in diaspora\n- Continued decline in Iraq and Iran without viable emigration pathways\n- Inability of dispersed communities to maintain the critical mass needed for initiation chains\n\n**Signals to watch:**\n- Reports from Mandaean organizations (the Mandaean Associations Union) about priesthood numbers\n- Generational attrition surveys from diaspora communities\n- Legal or logistical obstacles to masbuta practice in major host countries\n- Lack of centralized institutional support (no Mandaean equivalent of the Jewish Joint Distribution Committee or UNHCR's specialized support)\n\n**Time horizon:** The critical threshold may arrive 2030–2038 in terms of priesthood viability.\n\n---\n\n### Scenario C: Interfaith Convergence Catalyst\n\n**Probability:** 10–15%\n\n**Description:** John the Baptist's unique status as a figure venerated across the three Abrahamic traditions — and notably across the Christian-Muslim boundary (the Umayyad Mosque Damascus shrine is the clearest example, where Pope John Paul II prayed in 2001, the first pope to enter a mosque) — becomes a platform for sustained interfaith encounter. The Mandaean community's survival needs create pragmatic incentives for Christian and Islamic institutions to engage with Mandaeans as the inheritors of a shared prophetic figure. John becomes a modest but real meeting point, producing sustained dialogue programs, shared heritage initiatives around John's baptism site (Al-Maghtas, Jordan), and possibly official theological acknowledgments that three traditions share a figure whose historical significance is not exhausted by any one reading.\n\n**Drivers:**\n- Al-Maghtas UNESCO designation (2015) creating a shared international heritage frame\n- The Umayyad Mosque precedent as a template for shared veneration\n- Mandaean community advocacy seeking Christian and Islamic solidarity\n- Pope Francis's commitment to interfaith dialogue\n- Rising academic interest in Abrahamic commonalities after decades of clash-of-civilizations framing\n\n**Conditions:**\n- Continued Jordanian investment in Al-Maghtas as an interfaith pilgrimage site\n- A major interfaith institution (Vatican, al-Azhar, World Council of Churches) explicitly engaging Mandaeans\n- A high-profile event (papal visit to Al-Maghtas; Mandaean-Islamic dialogue summit) creating media momentum\n\n**Signals to watch:**\n- Official Vatican or al-Azhar statements on Mandaeans\n- Pilgrimage numbers at Al-Maghtas and interfaith composition\n- Mandaean community's own willingness to engage in interfaith rather than exclusively diaspora-survival mode\n\n**Time horizon:** Incremental, visible only at 2030+.\n\n---\n\n### Residual Tail (~5%)\n\n**Discontinuity scenarios:** A major new archaeological discovery at or near the Jordan baptism site (textual, ceramic, or architectural evidence bearing directly on John's movement); discovery of an early Mandaean text predating the Islamic era; or a significant political change in Iraq or Iran enabling large-scale Mandaean return and community reconstitution. These are individually low-probability but the class of discontinuities is not negligible over fifteen years.\n\n---\n\n## Base Rates\n\nTwo comparable cases anchor this forecast:\n\n**Endangered minority religious communities in diaspora.** The Yazidis (Yazidism in northern Iraq, displaced by ISIS from 2014) offer a partial parallel: a small, ethnically-concentrated religion with non-transmittable practices, scattered by conflict. The Yazidi case suggests diaspora communities can survive institutionally (community organizations, diaspora concentration in Germany and US) while losing the conditions for authentic practice over 20–30 years unless special institutional support emerges. The Mandaean case is arguably more severe because the priesthood requirement creates a bottleneck the Yazidi case lacks.\n\n**Specialized historical scholarship producing mainstream impact.** The Dead Sea Scrolls provide a base rate: discovered 1947, producing a 40-year lag before genuine popular understanding shifted, now integrated into the general educated understanding of Second Temple Judaism. The Mandaean Book of John's first full critical English edition (2020) is at the beginning of a comparable cycle. If the pattern holds, meaningful mainstreaming of the Mandaean-sourced John takes 20–30 years — i.e., 2040–2050, slightly beyond this forecast horizon.\n\n---\n\n## Prediction Market Snapshot\n\nNo liquid markets exist on Polymarket, Kalshi, Manifold, or Metaculus for the specific questions addressed here. The Mandaean survival question is not a market-traded risk. John the Baptist's scholarly standing is not tracked quantitatively. This forecast rests on base rates, driver analysis, and comparative cases — not market prices.\n\n---\n\n## What Would Change My Forecast\n\n1. **Toward Scenario B (crisis):** A credible report from the Mandaean Associations Union showing the active priesthood has fallen below ~50 functioning tarmidi globally would indicate the training-chain collapse is imminent.\n2. **Toward Scenario C (interfaith):** A formal Vatican-Mandaean dialogue initiative, or a Jordanian government announcement making Al-Maghtas a tri-faith pilgrimage center with Mandaean participation, would meaningfully shift probability toward convergence.\n3. **Toward faster mainstreaming:** A major Harvard/Oxford/Cambridge monograph explicitly framing John as a primary figure (not a Jesus-precursor) that crosses into popular reception (reviews in *The Atlantic*, *New Yorker*, *TLS*) would accelerate the scholarly timeline.\n4. **Toward residual tail:** Any archaeological announcement from Al-Maghtas or from the Iraqi/Iranian archaeological record bearing directly on John's movement or Mandaean origins.\n\n---\n\n## Open Questions\n\n1. What is the actual current size and age distribution of the functioning Mandaean priesthood globally? This is the most load-bearing unknown for the Mandaean survival question and the data is not publicly accessible.\n2. Will the Häberl-McGrath 2020 edition produce a second wave of English-language Mandaean scholarship comparable to what the Dead Sea Scrolls produced for Qumran studies?\n3. What is the official status of Mandaeans under Islamic law in Iraq and Iran, and have post-2003 legal reforms changed the conditions for their practice?\n4. Will the Jordanian government's investment in Al-Maghtas as a heritage site translate into actual interfaith pilgrimage or remain primarily a tourist/Christian-pilgrimage infrastructure?\n\n---\n\n## Sources\n\n1. Häberl, Charles G. and James F. McGrath, eds., *The Mandaean Book of John* (De Gruyter, 2020) — the enabling text for Scenario A; the 2020 publication date is the key horizon marker. Tier 1.\n2. UNESCO World Heritage documentation for *Baptism Site \"Bethany Beyond the Jordan\" (Al-Maghtas)* (inscribed 2015). https://whc.unesco.org/en/list/1446 — institutional framing for interfaith potential. Tier 1.\n3. Comparative reporting on the Mandaean diaspora crisis: Tier 4/5 journalism (various outlets 2003–2023) — population estimates derived from Mandaean Associations Union advocacy materials and UNHCR-adjacent reporting; note uncertainty on precise numbers.\n4. Joel Marcus, *John the Baptist in History and Theology* (University of South Carolina Press, 2018) — anchor for scholarly mainstreaming trajectory. Tier 2.\n5. Jorunn Jacobsen Buckley, *The Mandaeans: Ancient Texts and Modern People* (Oxford University Press, 2002) — baseline for Mandaean community description. Tier 2."}]}</script>

<script>
const corpus = JSON.parse(document.getElementById('corpus-data').textContent);
const docs = corpus.documents;
const toc = document.getElementById('toc');
const content = document.getElementById('content');
const searchBox = document.getElementById('search');
const results = document.getElementById('search-results');
const key = 'corpus:' + corpus.slug;
let current = 0;

// theme
const themePref = localStorage.getItem('corpus-theme');
if (themePref) document.documentElement.dataset.theme = themePref;
else if (matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.dataset.theme = 'dark';
document.getElementById('theme-btn').onclick = () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('corpus-theme', next);
};

// table of contents
docs.forEach((d, i) => {
  const a = document.createElement('a');
  a.href = '#ch-' + i;
  a.innerHTML = '<span class="num">' + String(i).padStart(2, '0') + '</span>' + d.title;
  a.title = d.summary || '';
  a.onclick = (e) => { e.preventDefault(); show(i); closeMenu(); };
  toc.appendChild(a);
});

let firstShow = true;
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
function show(i, anchorText) {
  if (listening && !autoNext) stopListen();  // manual nav stops narration; auto-advance keeps it
  const apply = () => {
  current = Math.max(0, Math.min(docs.length - 1, i));
  content.innerHTML = marked.parse(docs[current].body);
  // rewrite chapter-to-chapter .md links into in-app navigation
  content.querySelectorAll('a[href$=".md"]').forEach(a => {
    const target = docs.findIndex(d => a.getAttribute('href').endsWith(d.file));
    if (target >= 0) { a.href = '#ch-' + target; a.onclick = (e) => { e.preventDefault(); show(target); }; }
  });
  content.querySelectorAll('a[href^="http"]').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });
  toc.querySelectorAll('a').forEach((a, j) => a.classList.toggle('active', j === current));
  document.getElementById('prev').disabled = current === 0;
  document.getElementById('next').disabled = current === docs.length - 1;
  document.getElementById('pager-label').textContent = (current + 1) + ' / ' + docs.length + ' · ' + docs[current].title
    + ' · ' + Math.max(1, Math.round(docs[current].body.split(/\s+/).length / 220)) + ' min';
  history.replaceState(null, '', '#ch-' + current);
  localStorage.setItem(key, current);
  // feed the cross-page library shell: per-corpus read set + global recents
  try {
    const rk = 'read:' + corpus.slug;
    const readArr = JSON.parse(localStorage.getItem(rk) || '[]');
    if (readArr.indexOf(current) < 0) { readArr.push(current); localStorage.setItem(rk, JSON.stringify(readArr)); }
    const rec = (JSON.parse(localStorage.getItem('library-recents') || '[]') || []).filter(r => r.slug !== corpus.slug);
    rec.unshift({ slug: corpus.slug, title: corpus.title, ch: current, chTitle: docs[current].title, ts: Date.now() });
    localStorage.setItem('library-recents', JSON.stringify(rec.slice(0, 20)));
    // quiet reading streak: bump once per calendar day a chapter is opened
    const today = new Date().toISOString().slice(0, 10);
    const st = JSON.parse(localStorage.getItem('reading-streak') || '{}');
    if (st.last !== today) {
      const yest = new Date(Date.now() - 864e5).toISOString().slice(0, 10);
      st.count = (st.last === yest ? (st.count || 0) : 0) + 1;
      st.last = today;
      localStorage.setItem('reading-streak', JSON.stringify(st));
    }
  } catch (e) {}
  if (anchorText) {
    const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT);
    let node; while ((node = walker.nextNode())) {
      const idx = node.textContent.toLowerCase().indexOf(anchorText.toLowerCase());
      if (idx >= 0) {
        const host = node.parentElement;
        host.scrollIntoView({ block: 'center' });
        if (!reduceMotion) { host.classList.add('passage-flash'); setTimeout(() => host.classList.remove('passage-flash'), 2200); }
        return;
      }
    }
  }
  document.getElementById('main').scrollIntoView();
  window.scrollTo(0, 0);
  };
  // cross-fade chapter swaps where supported (skips first paint + reduced motion)
  if (document.startViewTransition && !reduceMotion && !firstShow) document.startViewTransition(apply);
  else apply();
  firstShow = false;
}

document.getElementById('prev').onclick = () => show(current - 1);
document.getElementById('next').onclick = () => show(current + 1);

let chordKey = null, chordTimer;
document.addEventListener('keydown', (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const back = document.getElementById('cmdk-back');
  if (back && back.classList.contains('open')) return;  // palette owns the keys when open
  const help = document.getElementById('kbd-help');
  if (help && help.classList.contains('open')) { if (e.key === 'Escape' || e.key === '?') toggleHelp(); return; }
  if (chordKey === 'g') { clearTimeout(chordTimer); chordKey = null;
    if (e.key === 'g') { show(0); return; }
    if (e.key === 'e') { show(docs.length - 1); return; } }
  if (e.key === 'g') { chordKey = 'g'; chordTimer = setTimeout(() => { chordKey = null; }, 700); return; }
  if (e.key === 'ArrowLeft' || e.key === 'k') show(current - 1);
  else if (e.key === 'ArrowRight' || e.key === 'j') show(current + 1);
  else if (e.key === 'z' || e.key === 'Z') toggleFocus();
  else if (e.key === '?') toggleHelp();
});

function toggleFocus() {
  const on = document.body.classList.toggle('focus-mode');
  localStorage.setItem('reader-focus', on ? '1' : '0');
}
if (localStorage.getItem('reader-focus') === '1') document.body.classList.add('focus-mode');

function toggleHelp() {
  let h = document.getElementById('kbd-help');
  if (!h) {
    h = document.createElement('div'); h.id = 'kbd-help';
    h.innerHTML = '<div class="kh"><h3>Keyboard</h3><dl>'
      + '<dt>⌘K</dt><dd>command palette</dd>'
      + '<dt>← / k</dt><dd>previous chapter</dd>'
      + '<dt>→ / j</dt><dd>next chapter</dd>'
      + '<dt>g g</dt><dd>first chapter</dd>'
      + '<dt>g e</dt><dd>last chapter</dd>'
      + '<dt>Z</dt><dd>focus mode</dd>'
      + '<dt>?</dt><dd>this help</dd></dl></div>';
    h.addEventListener('click', (ev) => { if (ev.target === h) toggleHelp(); });
    document.body.appendChild(h);
  }
  h.classList.toggle('open');
}

// search
let timer;
searchBox.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(runSearch, 150);
});
function runSearch() {
  const q = searchBox.value.trim().toLowerCase();
  results.innerHTML = '';
  toc.style.display = q ? 'none' : '';
  if (!q || q.length < 3) { toc.style.display = ''; return; }
  let hits = 0;
  docs.forEach((d, i) => {
    const text = d.body.toLowerCase();
    let pos = text.indexOf(q), shown = 0;
    while (pos >= 0 && shown < 3 && hits < 40) {
      const start = Math.max(0, pos - 60), end = Math.min(d.body.length, pos + q.length + 90);
      const raw = d.body.slice(start, end).replace(/[#*_>\[\]]/g, '');
      const safe = raw.replace(/&/g, '&amp;').replace(/</g, '&lt;');
      const snippet = safe.replace(new RegExp(q.replace(/[.*+?^${}()|\\]/g, '\\$&'), 'ig'), m => '<mark>' + m + '</mark>');
      const div = document.createElement('div');
      div.className = 'hit';
      div.innerHTML = '<b>' + d.title + '</b>…' + snippet + '…';
      const exact = d.body.slice(pos, pos + q.length);
      div.onclick = () => { show(i, exact); searchBox.value = ''; runSearch(); closeMenu(); };
      results.appendChild(div);
      hits++; shown++;
      pos = text.indexOf(q, pos + q.length);
    }
  });
  if (!hits) results.innerHTML = '<div class="none">No matches.</div>';
}

// mobile menu
const menuBtn = document.getElementById('menu-btn');
menuBtn.onclick = () => document.body.classList.toggle('menu-open');
function closeMenu() { document.body.classList.remove('menu-open'); }

// ---- Listen mode (browser Web Speech API) + share-this-chapter ----
const synth = window.speechSynthesis;
let listening = false, paused = false, autoNext = false, listenIdx = 0, listenRate = 1,
    listenAuto = true, sleepMode = 'none', sleepTimer = null, lchunks = [], lidx = 0, lbar = null;
function chapterText(i) {
  let t = docs[i] ? docs[i].body : '';
  return t.replace(/```[\s\S]*?```/g, ' ').replace(/<[^>]+>/g, ' ')
          .replace(/!\[[^\]]*\]\([^)]*\)/g, ' ').replace(/\[([^\]]+)\]\([^)]*\)/g, '$1')
          .replace(/[#>*_`~|]/g, ' ').replace(/\s+/g, ' ').trim();
}
function chunkText(t) {
  const raw = t.match(/[^.!?]+[.!?]+["')\]”’]*|\S[^.!?]*$/g) || [t];
  const out = []; let buf = '';
  raw.forEach(s => { s = s.trim(); if (!s) return;
    if ((buf + ' ' + s).length > 240 && buf) { out.push(buf); buf = s; } else buf = buf ? buf + ' ' + s : s; });
  if (buf) out.push(buf);
  return out;
}
function pickVoice() { const vs = synth.getVoices();
  return vs.find(v => /^en/i.test(v.lang) && v.localService) || vs.find(v => /^en/i.test(v.lang)) || vs[0]; }
function speakChunk() {
  if (!listening) return;
  if (lidx >= lchunks.length) {
    if (sleepMode === 'chapter') { stopListen(); return; }
    if (listenAuto && listenIdx < docs.length - 1) {
      listenIdx++; autoNext = true; show(listenIdx); autoNext = false;
      lchunks = chunkText(chapterText(listenIdx)); lidx = 0; updateBar(); speakChunk();
    } else stopListen();
    return;
  }
  const u = new SpeechSynthesisUtterance(lchunks[lidx]);

    var cx = (r.left + r.right) / 2 - sr.left, cyTop = r.top - sr.top;
    var left = Math.max(8, Math.min(sr.width - cw - 8, cx - cw / 2));
    var top = cyTop - chh - 12; if (top < 8) top = (r.bottom - sr.top) + 12;
    top = Math.max(8, Math.min(sr.height - chh - 8, top));
    card.style.left = left + 'px'; card.style.top = top + 'px';
    if (hideT) { clearTimeout(hideT); hideT = null; }
  }
  function schedHide() { if (hideT) clearTimeout(hideT); hideT = setTimeout(hideCard, 240); }
  function hideCard() {
    if (card) card.classList.remove('show');
    if (active && active._el) active._el.classList.remove('active');
    active = null;
  }
})();
</script>
