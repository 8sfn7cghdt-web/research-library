t there.\n\nThe honest synthesis: the proto-fascist reading is a *defensible interpretation of the doctrine's logical tendency and its later development*, but an *overreading of the 1837 text*, whose dominant energy is radical and whose violence is framed as judgment-on-imposture rather than glorification of the strong state. Tag: **contested** — name both sides, adopt neither's loaded vocabulary as neutral. The fairest description is that *The French Revolution* contains combustible materials that the later Carlyle, and later readers, ignited.\n\n---\n\n## Open Questions\n\n1. **How much of the \"Carlylese\" theory is an artifact of the rewrite?** Volume I was burned (Mill's servant, March 1835) and rewritten from memory. Some scholars (e.g., Rosemary Ashton) suggest the rewritten version is darker, more apocalyptic, more Hebraic than the lost original [11]. If so, the *intensity* of the providential/phoenix theory may be partly a product of compositional accident — unanswerable without the lost manuscript, but it bears on how \"intended\" the eschatological frame is.\n2. **Is Sansculottism a genuine theory of collective agency or a mystification of it?** Allison reads it as proto-Marxist collective force; a Marxist critic might read it as a *displacement* of real class analysis into spiritual abstraction. Which it is determines whether the book is a precursor to or an evasion of social history.\n3. **Does the determinism-vs-heroism tension resolve differently across the three volumes?** The hero-frame (Mirabeau, Napoleon) clusters at the elegiac and closing moments; the impersonal frame (Sansculottism) dominates the middle. Is there a discernible drift toward heroism as the narrative proceeds — a *structural* anticipation of *On Heroes*?\n4. **How much does the proto-fascism charge depend on conflating the 1837 book with the 1850s Carlyle?** The literature would benefit from a claim-by-claim test: which specific propositions in *The French Revolution* (as opposed to *Latter-Day Pamphlets*) actually license an authoritarian reading?\n5. **What is the precise debt of Engels (and through him the Marxist theory of revolutionary violence) to Carlyle's 1837 framework?** Stedman Jones asserts the influence [e]; the mechanism and extent deserve fuller tracing.\n\n---\n\n## Sources\n\n**Tier 1 — Primary texts**\n\n1. Thomas Carlyle, *The French Revolution: A History* (1837). Full text via History of Economic Thought archive, McMaster University. https://historyofeconomicthought.mcmaster.ca/carlyleT/French%20Revolution.pdf — accessed 2026-06-08. *The work itself; source for the argument's structure, the three-volume division, and chapter titles (\"The Whiff of Grapeshot,\" etc.).*\n2. Carlyle, *The French Revolution*, Vol. III (\"The Guillotine\"), via Wikisource, *The Works of Thomas Carlyle*. https://en.wikisource.org/wiki/The_Works_of_Thomas_Carlyle/Volume_4/The_French_Revolution,_Volume_3/Book_1 — accessed 2026-06-08. *\"Death-birth of a world ... rays as of heaven on one side; girt on the other as with hellfire\" — the Sansculottism-as-death-birth passage.*\n3. Carlyle, *The French Revolution* — \"Anarchy breaks prison; bursts up from the infinite Deep\" and Phoenix imagery, as quoted in primary-text and Wikisource extracts. https://en.wikisource.org/wiki/The_Works_of_Thomas_Carlyle/Volume_4/The_French_Revolution,_Volume_3/Book_5 — accessed 2026-06-08.\n10. Carlyle, *The French Revolution*, Bk. 2 Ch. III \"The Tuileries\" (Mirabeau's death). https://www.online-literature.com/thomas-carlyle/french-revolution/75/ — accessed 2026-06-08. *\"The chosen man of France is gone ... as if with his single hand, has held it toppling there, still unfallen.\"*\n13. Carlyle, *The French Revolution*, Bk. 3 Ch. VII \"Vendémiaire\" (\"A whiff of grapeshot\"). https://www.online-literature.com/thomas-carlyle/french-revolution/157/ — accessed 2026-06-08. *Napoleon's grapeshot closes the Revolution; the phrase is Carlyle's coinage.*\n\n**Tier 2 — Scholarly**\n\n1. Mark Allison, \"The French Revolution Now; or, Carlyle's Eternal Return,\" *Victorian Literature and Culture* (Cambridge Core), 16 March 2022. https://www.cambridge.org/core/journals/victorian-literature-and-culture/article/french-revolution-now-or-carlyles-eternal-return/67D7210ABFCEB99A421E068384CC7F42 — accessed 2026-06-08. *Reads the book as thoroughgoingly radical, centered on Sansculottism and inverted utopianism; \"warnings rather than blueprints for fascism\"; proto-Marxist insight into plutocracy.* [cited as 1]\n4. Chris R. Vanden Bossche, *Carlyle and the Search for Authority* (Ohio State Univ. Press, 1991), Ch. 3 \"The French Revolution as Symbolic History.\" https://victorianweb.org/authors/carlyle/vandenbossche/3e.html — accessed 2026-06-08. *Sham/Reality as crisis of authority; paper cannot sustain authority; symbolic method; mock-heroic deflation; Sansculottism \"still lives.\"* [cited as 4]\n5. Albert J. LaValley, *Carlyle and the Idea of the Modern* (Yale Univ. Press, 1968); discussion via Ralph Dumain / Autodidact Project. http://www.autodidactproject.org/other/lavalley/carlyle3b_frenchrevolution.html — accessed 2026-06-08. *Carlyle's eschatological (not mechanical) necessity; \"biblical desire to force the judgment day\"; rejection of Thiers's determinism; divine judgment on monarchy and nobility.* [cited as 5; also 9, 12]\n6. Hedva Ben-Israel, *English Historians on the French Revolution* (Cambridge Univ. Press, 1968). https://books.google.com/books/about/English_Historians_on_the_French_Revolut.html?id=nyiY-N3IsWQC — accessed 2026-06-08. *Places Carlyle in an English \"school\" with shared aims/methods/politics; devotes a major chapter to him; his distinctive moral-providential framing.* [cited as 8]\n7. Philip Rosenberg, *The Seventh Hero: Thomas Carlyle and the Theory of Radical Activism* (Harvard Univ. Press, 1974). https://www.commentary.org/articles/gertrude-himmelfarb/the-seventh-hero-thomas-carlyle-and-the-theory-of-radical-activism-by-philip-rosenberg/ — accessed 2026-06-08. *Recovers the radical-activist dimension of Carlyle; Himmelfarb's Commentary review notes the \"activist doctrine\" lacks specific content.* [cited as 14; d]\n8. Gareth Stedman Jones, \"The Redemptive Power of Violence? Carlyle, Marx and Dickens,\" *History Workshop Journal* 65, no. 1 (Spring 2008). https://academic.oup.com/hwj/article/65/1/1/640507 — accessed 2026-06-08. *Carlyle's \"irrationalist approach\" linking violence to loss of faith and Sansculottism; influence on Engels; contrast with Dickens.* [cited as e]\n9. John D. Rosenberg, *Carlyle and the Burden of History* (Harvard Univ. Press, 1985), incl. ch. \"'The Grand Poem of Our Time': The French Revolution.\" https://www.degruyterbrill.com/document/doi/10.4159/harvard.9780674422988/html — accessed 2026-06-08. *History as poetry/prophecy/biography/social-criticism; Sansculottism as a major theme. (Referenced; not read in full — see gap-fill.)*\n11. Existing corpus: *Thomas Carlyle Research Corpus*, `07_Primary_Sources.md` §2 \"*The French Revolution: A History* (1837)\" and §\"open questions,\" `/Users/calvinpokorny/code test/carlyle-research/`. *Internal synthesis: providential history in the Reformed mode; Sham/Reality; sermon-prose; the rewrite-darkening hypothesis (Ashton).* [cited as 11]\n\n**Tier 4–5 — Reference / analytical**\n\n- *The French Revolution (Carlyle)*, Encyclopaedia Britannica (expert-authored entry). https://www.britannica.com/topic/The-French-Revolution-by-Carlyle — accessed 2026-06-08. *Carlyle saw 1789–91 as the true revolution; despised Robespierre and the radical phase; divine-judgment framing.* [cited as a; corroborates 5/12]\n- \"Carlyle, Robespierre and the French Revolution,\" World Socialist Web Site, 2010 (Tier 6, partisan-left; used only for the Danton-as-\"Mirabeau of the Sansculottes\" tag, corroborated against the primary text). https://www.wsws.org/en/articles/2010/07/fren-j17.html — accessed 2026-06-08. [cited as b]\n- \"A whiff of grapeshot\" attribution and 13 Vendémiaire context, cross-checked against the primary text (source 13). [cited as c]\n- Review/commentary on Carlyle's contempt for the \"Evangel of Jean-Jacques\" / Rousseau as \"new Formula,\" toomuchberard.com review (Tier 6, individual reviewer; used only as a pointer, the claim is grounded in the primary text and LaValley). https://toomuchberard.com/2022/04/12/review-carlyle-the-french-revolution/ — accessed 2026-06-08. [cited as f]\n- On the \"theology-not-politics\" reading of the hero-doctrine and the contested proto-fascism status of *On Heroes*: existing corpus `07_Primary_Sources.md` §3 (Vanden Bossche, Sorensen, present scholarly consensus). [cited as g]"}, {"order": 2, "file": "collection-heroes-and-history-2.md", "title": "Themes and Ideology", "summary": "Carlyle's Everest", "body": "*From [Carlyle's Everest](carlyle-friedrich-research.html#ch-5) — chapter 6*\n\n# Themes and Ideology\n\n## Bottom Line\n\nCarlyle's *History of Friedrich II of Prussia* (1858-1865) is the late, hardened terminus of a single lifelong argument: that the universe is morally governed, that \"Lying is not permitted in this Universe\" [1], and that the only remedy for an age of shams is the rule of the genuine man. By the time Carlyle reached Friedrich, the hero he needed was no longer the literary prophet of his earlier essays but, in Timothy Hochstrasser's words, \"the political despot who compels rather than persuades\" [2] — Frederick posited against democracy, industrialisation, and liberal \"cant\" [2]. The book's deepest themes are continuous with *On Heroes, Hero-Worship, and the Heroic in History* (1841) and with *Past and Present* (1843): the conviction that \"Universal History... is at bottom the History of the Great Men who have worked here\" [7]; the gospel that \"there is a perennial nobleness, and even sacredness, in Work\" [8] and that \"Labour is Life\" [8]; contempt for the \"Bankrupt Century\" and its Dryasdust historians; the \"Eternal Veracities\" of a justice-bearing history; and the construction of Prussia as a Genesis-like world made by drill and war, with the Hohenzollerns named in Carlyle's own text as \"the Authors of Prussia, without whom Prussia had never been\" [5]. Read with Chris Vanden Bossche, the whole vast narrative is also a covert family romance, in which Frederick, Friedrich Wilhelm I, and Voltaire re-stage Carlyle, his father James, and Goethe [4]. The ideology is coherent, sincerely held, and — in its worship of compulsion over consent — genuinely disturbing.\n\n## The Governing Ideas\n\nThe hero-figure, first of all, has migrated across Carlyle's career from the literary prophet to the compelling despot, and Friedrich is its endpoint. Hochstrasser traces the arc precisely: in the 1820s \"Goethe then is interpreted as the embodiment of how this is to be done, and becomes Carlyle's own model\"; \"Here in Goethe is the origin of the 'hero' figure or prophet, originally restricted to literary or philosophical figures and only later turned to political ends (and losing its plasticity of embodiment along the way)\" [2]. The terminus is explicit: \"in later years the despotic monarch is alone considered sufficient to oppose democracy, industrialisation and liberal cant. In the unlikely but necessary figure of 'Frederick' the hero becomes a figure capable of resisting the contemporary forces that Carlyle laments. His concept of the hero-figure turns from the literary (Goethe) to the political despot who compels rather than persuades: for only such a person can command and re-direct the 'signs of the times'\" [2]. The doctrine the *Frederick* applies is the one Carlyle had stated twenty years earlier as a flat axiom: \"Universal History, the history of what man has accomplished in this world, is at bottom the History of the Great Men who have worked here\" [7]. What changed was not the axiom but the kind of \"Great Man\" — from the poet-prophet who works by example to the king who works by command. (This is Hochstrasser's reading; the migration itself is visible in the text.)\n\nFrederick earns hero status not as a paragon but as \"a Reality\" in an age of phantasms — defined not by virtue but by veracity. In the Proem, Carlyle concedes Friedrich \"is by no means one of the perfect demigods\" and that \"there are various things to be said against him with good ground,\" yet rests the case on one feature: \"That in his way he is a Reality; that he always means what he speaks; grounds his actions, too, on what he recognizes for the truth; and, in short, has nothing whatever of the Hypocrite or Phantasm. Which some readers will admit to be an extremely rare phenomenon\" [1]. He adds that \"this man was far indeed from trying to deal swindler-like with the facts around him; that he honestly recognized said facts wherever they disclosed themselves, and was very anxious also to ascertain their existence where still hidden\" [1]. The valuation is identical to the one Carlyle had made the cornerstone of the hero in 1841: \"Sincerity, a deep, great, genuine sincerity, is the first characteristic of all men in any way heroic\" [7]. Heroism is congruence between word, act, and fact — the antithesis of the \"Phantasm.\" (Primary text; the *On Heroes* parallel is verified.)\n\nThe Eighteenth Century is the Sham against which the hero is measured, so that Frederick's greatness is relative to the corruption of his age. Carlyle calls it \"A Century so opulent in accumulated falsities,—sad opulence descending on it by inheritance, always at compound interest\" [1], a \"Century spendthrift, fraudulent-bankrupt; gone at length utterly insolvent, without real MONEY of performance in its pocket.\" The verdict is total: \"To me the Eighteenth Century has nothing grand in it, except that grand universal Suicide, named French Revolution, by which it terminated its otherwise most worthless existence with at least one worthy act\" [1]. Against this backdrop the Revolution is paradoxically welcome, because it destroys \"Sham Kingship\": Carlyle says he believes \"both that Real Kingship is eternally indispensable, and also that the destruction of Sham Kingship (a frightful process) is occasionally so\" [1]. The corruption is figured not as wickedness but as forgery — money \"without real MONEY of performance\" — which makes the hero a kind of bullion against paper. (Primary text.)\n\nThe cosmos, in turn, is morally governed — \"Lying is not permitted in this Universe.\" The metaphysical floor of the whole book is a justice immanent in history, the \"Eternal Veracities.\" Carlyle states it as a quoted revelation: \"Lying is not permitted in this Universe. The wages of lying, you behold, are death. Lying means damnation in this Universe; and Beelzebub, never so elaborately decked in crowns and mitres, is NOT God!\" He glosses it: \"This was a revelation truly to be named of the Eternal, in our poor Eighteenth Century\" [1]. The companion image is permanence: \"Only what of the Past was TRUE will come back to us. That is the one ASBESTOS which survives all fire\" [1] — truth as the incombustible residue history cannot consume. Frederick's distinction is that he intuited this law: he \"knew well, to a quite uncommon degree... how entirely inexorable is the nature of facts\" [1]. The order of facts is the order of God. (Primary text.)\n\nFrom this follows the gospel of action over letters, in which the *Art of War* is the only writing Carlyle credits. Frederick was a prolific author — poems, histories, philosophy, the *Anti-Machiavel* — nearly all of which Carlyle dismisses. Vanden Bossche notes the exception pointedly: \"the only work of all Frederick's writings that Carlyle regards as having any merit is his *Art of War*\"; \"he emerges as a hero precisely because he is the one man of action in a 'Writing Era'\" [4]. The text confirms the valuation in its own idiom: there was \"an Art of War, grounded on veracity and human courage and insight, not upon Drawcansir rodomontade, grandiose Dick-Turpinism, revolutionary madness, and unlimited expenditure of men and gunpowder\" [1]. Carlyle sharpens the contrast against Napoleon: \"Napoleon did indeed, by immense expenditure of men, and gunpowder, overrun Europe for a time,\" but he never \"defended a little Prussia against all Europe, year after year for seven years\" [1], and \"the battle of Leuthen... may very well hold up its head beside any victory gained by Napoleon\" [1]. Doing, not writing, is the proof of the man; the *Art of War* qualifies because it is the codification of action, not a substitute for it. (Vanden Bossche's reading, plus primary text.)\n\nBound up with this is Carlyle's praise of silence, the \"Tobacco-Parliament,\" and his contempt for Dilettantism and speech: the hero is taciturn, and talk is suspect. Vanden Bossche observes that Friedrich Wilhelm, \"Disdaining talk... holds 'Tabagies'—'Tobacco-Parliaments,' not speech-making parliaments\" [4] — the anti-parliament of doers. Carlyle's own portrait of the father makes silence a form of genius: \"Strange as it sounds in the Republic of Letters, we are tempted to call Friedrich Wilhelm a man of genius;—genius fated and promoted to work in National Husbandry, not in writing Verses or three-volume Novels. A silent genius\" [3]. Carlyle's contempt for the merely literary and antiquarian-pedantic surfaces in the recurring figure of \"Dryasdust\": \"the Prussian Dryasdust, otherwise an honest fellow, and not afraid of labor, excels all other Dryasdusts yet known\" [1], producing \"Books born mostly of Chaos\" that \"are a painful object\" [1]. He ventriloquises the complaint through his persona Sauerteig: it is \"frightful to see the *Gelehrte Dummkopf* [DRYASDUST] doing the function of History, and the Shakspeare and the Goethe neglecting it\" [1]. (The \"silence vs. speech\" contrast is the structuring one Vanden Bossche draws, and the primary text supplies the \"silent genius\" valuation directly.)\n\nBeneath the politics runs a father-son dialectic — Frederick / Friedrich Wilhelm / Voltaire mapping onto Carlyle / James Carlyle / Goethe — which Vanden Bossche reads as a displaced autobiography of authority. The triad is explicit: \"So the triad of son, father, and godfather — Carlyle, James Carlyle, and Goethe — this time becomes Frederick, Friedrich Wilhelm, and Voltaire\" [4]. The plot is the son's painful passage from the seductive \"intellectual father\" (Voltaire / Goethe, French frivolity, letters) to identification with the harsh biological father (Friedrich Wilhelm / James Carlyle, German solidity, work): \"Like all sons, Carlyle and Frederick seek to become paternal authorities themselves,\" and before long Frederick \"is performing his duties like 'Papa's second self'\" [4]. The resolution is conservative: \"Frederick cannot obtain authority through rebellion but only through submitting to the law as laid down by his father,\" and \"Frederick, now truly become his father's 'second self,' banishes Voltaire's French frivolity from his court\" [4]. The narrative runs \"in terms of a dialectic between German culture, identified with Friedrich Wilhelm, and French culture, identified with Voltaire and the philosophes: between masculinity... and femininity... between Lutheran orthodoxy and freethinking heterodoxy, the Spartan and the Athenian\" [4]. (This is Vanden Bossche's interpretation, labelled as such.)\n\nThe largest theme is nation-building as Genesis-like world-making — the Hohenzollerns as \"the Authors of Prussia.\" Prussia is not found but made, and its makers are the dynasty. In the birth chapter Carlyle calls them \"the Hohenzollern lineage, which has flourished here with such beneficent effect for three centuries now, and been in truth the very making of the Prussian Nation\" [5]. He names them, elsewhere in the same History, in the exact phrase the corpus had earlier treated only as paraphrase: there is \"no part of the Prussian Dominion more loyal to the Hohenzollerns (who are the Authors of Prussia, without whom Prussia had never been)\" [5] — *Authors* in the strong sense, makers of a thing that would not otherwise exist. Vanden Bossche reads the same phrase as the moral hinge of the family romance: \"It is not by imitating Voltaire, the author of farces, that Frederick becomes 'Vater Fritz,' but by imitating Friedrich Wilhelm, one of 'the Authors of Prussia'\" [4], and he generalises the method: \"Battle, both literal and figurative, is Carlyle's principal metaphor for the work of creating the Prussian nation\" [4]. The making is depicted as a slow, near-divine reclamation out of chaos: of the early struggles Carlyle writes, \"So many years men fought and planned and struggled there, all forgotten now except by the gods; and silently gave away their life, before those countries could become fencible and habitable\" [5]. (The \"Authors of Prussia\" phrase is now verified verbatim in the primary text — see Open Questions, resolved.)\n\nThe book was written, finally, as a prophet's \"message of good\" against democracy. Stewart's Edinburgh thesis frames the work's purpose ideologically. *Frederick* \"was his last major work. Carlyle had a specific purpose in mind when he began writing Frederick. He believed that contemporary events had left Europe in disarray and the British nation fragmented. In his view, the nation needed to function as a family unit, with the older, more experienced members of the group instructing and educating the young\" [6]. The earlier *Latter-Day Pamphlets* had pressed the same lesson — that \"the few Wise will have, by one method or another, to take command of the innumerable Foolish\" during \"a period of rampant democracy\" [6] — but their aggression alienated readers, so Carlyle turned to history to teach the same doctrine by example. He \"felt himself to be a prophet, in the midst of an untoward generation,\" delivering \"a message of good to a world sorely in need of them\" [6, quoting Stanley's funeral eulogy]. (Stewart's framing.)\n\nJustice in history, lastly, is the realised form of the \"Reality we love\": not abstract law but a quality acted out in the world, which Carlyle defines most plainly through the father. Of Friedrich Wilhelm I he writes that \"the genus sham was never hatefuler to any man,\" that \"there is a divine idea of fact put into him,\" and then makes the equation the whole book turns on: \"A just man, too; would not wrong any man, nor play false in word or deed to any man. What is Justice but another form of the REALITY we love; a truth acted out?\" [3]. Justice, on this reading, is not mercy or fairness in the liberal sense but fidelity to fact — the refusal to \"play false.\" This is why Carlyle can call Frederick's intellect a \"very unusual VERACITY of intellect, as we define it,—which quality, indeed, is the summary and victorious outcome of all manner of good qualities, and faithful performances, in a man\" [5]. Veracity is the master-virtue from which all others descend; justice in history is veracity made visible over time. (Primary text.)\n\n## Hero-Worship and the Great-Man Theory\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 444\" role=\"img\" aria-label=\"A polarity diagram of Carlyle's moral cosmology. On the left, a dark panel headed SHAM, the swindler-century, lists the capitalized negative Powers: Sham, Hypocrisy, Cant, Phantasm, Chaos, Mendacity, Play-actorisms. On the right, a Prussian-blue panel headed REALITY, the Eternal Veracities, lists the positive Powers: Reality, Veracity, Fact, Eternal Destinies, Justice, the disciplined Fire-element, Work. Between them, straddling a vertical quarry-seam, a medallion holds FRIEDRICH, a single Reality quarried out of the century toward the side of the Veracities, marked by a lightning spark.\">\n<text x=\"350\" y=\"32\" text-anchor=\"middle\" font-size=\"15\" class=\"t-serif\" letter-spacing=\"3\">SHAM &#183; versus &#183; REALITY<\/text>\n<text x=\"350\" y=\"51\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">&#8220;How show the man, who is a Reality &#8230; yet keep his Century, as a Hypocrisy worthy of being hidden?&#8221;<\/text>\n<line x1=\"150\" y1=\"62\" x2=\"550\" y2=\"62\" class=\"ln\" stroke-width=\"1.5\"/>\n<line x1=\"150\" y1=\"65\" x2=\"550\" y2=\"65\" class=\"ln-soft\" stroke-width=\"0.8\"/>\n<rect x=\"55\" y=\"92\" width=\"243\" height=\"252\" rx=\"2\" class=\"f-panel\" stroke-width=\"1.2\" style=\"stroke:var(--border)\"/>\n<rect x=\"55\" y=\"92\" width=\"243\" height=\"30\" rx=\"2\" class=\"f-t1\"/>\n<text x=\"176\" y=\"112\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\" style=\"fill:var(--bg)\" letter-spacing=\"1\">SHAM<\/text>\n<text x=\"176\" y=\"138\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-muted\" font-style=\"italic\">the &#8220;swindler-century&#8221; &#183; the formless Horse-deluge<\/text>\n<text x=\"176\" y=\"168\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\">Hypocrisy<\/text>\n<text x=\"176\" y=\"196\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\">Cant<\/text>\n<text x=\"176\" y=\"224\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\">Phantasm<\/text>\n<text x=\"176\" y=\"252\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\">Chaos<\/text>\n<text x=\"176\" y=\"280\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\">Mendacity<\/text>\n<text x=\"176\" y=\"308\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" style=\"fill:var(--t3)\">Play-actorisms<\/text>\n<text x=\"176\" y=\"334\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-muted\" font-style=\"italic\">redeemed only by &#8220;that grand universal Suicide&#8221;<\/text>\n<rect x=\"402\" y=\"92\" width=\"243\" height=\"252\" rx=\"2\" class=\"f-panel\" stroke-width=\"1.2\" style=\"stroke:var(--border)\"/>\n<rect x=\"402\" y=\"92\" width=\"243\" height=\"30\" rx=\"2\" class=\"f-t2\"/>\n<text x=\"523\" y=\"112\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\" style=\"fill:var(--bg)\" letter-spacing=\"1\">REALITY<\/text>\n<text x=\"523\" y=\"138\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-muted\" font-style=\"italic\">the Eternal Veracities &#183; the disciplined Fire-element<\/text>\n<text x=\"523\" y=\"168\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" style=\"fill:var(--t2)\">Veracity<\/text>\n<text x=\"523\" y=\"196\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" style=\"fill:var(--t2)\">Fact<\/text>\n<text x=\"523\" y=\"224\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" style=\"fill:var(--t2)\">Eternal Destinies<\/text>\n<text x=\"523\" y=\"252\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" style=\"fill:var(--t2)\">Justice<\/text>\n<text x=\"523\" y=\"280\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" style=\"fill:var(--t2)\">Work<\/text>\n<text x=\"523\" y=\"308\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" style=\"fill:var(--t5)\">Fire-element<\/text>\n<text x=\"523\" y=\"334\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-muted\" font-style=\"italic\">&#8220;a Veracity in Things, a Mendacity in Sham-Things&#8221;<\/text>\n<line x1=\"350\" y1=\"92\" x2=\"350\" y2=\"344\" class=\"ln-soft\" stroke-width=\"1\" stroke-dasharray=\"2 4\"/>\n<circle cx=\"350\" cy=\"214\" r=\"56\" class=\"f-bg\"/>\n<circle cx=\"350\" cy=\"214\" r=\"56\" fill=\"none\" style=\"stroke:var(--accent)\" stroke-width=\"2.5\"/>\n<polyline points=\"354,182 343,210 352,210 346,238\" fill=\"none\" class=\"s-t5\" stroke-width=\"2.5\"/>\n<text x=\"350\" y=\"207\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\" letter-spacing=\"1\">FRIEDRICH<\/text>\n<text x=\"350\" y=\"224\" text-anchor=\"middle\" font-size=\"9\" class=\"t-muted\" font-style=\"italic\">a Reality<\/text>\n<path d=\"M330,290 C 338,304 362,304 370,290\" fill=\"none\" style=\"stroke:var(--accent)\" stroke-width=\"1.6\"/>\n<polygon points=\"366,286 374,292 366,297\" style=\"fill:var(--accent)\"/>\n<text x=\"350\" y=\"320\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-acc\" font-style=\"italic\">quarried out<\/text>\n<text x=\"350\" y=\"378\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-serif\">&#8220;managed not to be a Liar and Charlatan as his Century was&#8221;<\/text>\n<line x1=\"60\" y1=\"400\" x2=\"640\" y2=\"400\" class=\"ln-soft\" stroke-width=\"1\"/>\n<text x=\"350\" y=\"424\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\" font-style=\"italic\">The capitalized words are not ornament but a two-Power cosmos &#8212; and the whole book is one act of extraction.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 1.<\/strong> Carlyle&#8217;s capitalized abstractions are a working moral cosmology, not Victorian emphasis: every term sorts into one of two Powers, Sham or Reality, and the book&#8217;s animating labour is to <em>quarry a single Reality<\/em> &#8212; Friedrich, who &#8220;managed not to be a Liar and Charlatan as his Century was&#8221; &#8212; out of a &#8220;swindler-century&#8221; it otherwise consigns to the dark.<\/figcaption>\n<\/figure>\n\n\nThe *History of Friedrich II* is the practical application of the doctrine Carlyle had announced in *On Heroes, Hero-Worship, and the Heroic in History* (1841). The 1841 lectures supply the bald premise — \"Universal History, the history of what man has accomplished in this world, is at bottom the History of the Great Men who have worked here\" [7] — and the *Frederick* is a thousand pages of that premise worked out in a single life. The continuity is total at the level of theory; what changed across the twenty intervening years is the *kind* of hero the theory now demands.\n\nHochstrasser's LSE working paper supplies the cleanest statement of the trajectory. In the 1820s, Carlyle's hero was the man of letters as prophet: \"Fichte was invoked to provide an idea of the man of letters who could act as the prophet of a transcendental order. Goethe then is interpreted as the embodiment of how this is to be done, and becomes Carlyle's own model\" [2]. The hero in this phase is a teacher; he persuades. But Carlyle's reading of his own century convinced him that persuasion had failed, that \"the despotic monarch is alone considered sufficient to oppose democracy, industrialisation and liberal cant\" [2]. Hence the famous formulation: the hero \"turns from the literary (Goethe) to the political despot who compels rather than persuades\" [2]. The 1841 hero, the Poet and the Prophet, has by 1858 become the King — and not the constitutional king but the absolute one, the man who can \"command and re-direct the 'signs of the times'\" [2].\n\nThis is the ideological core of the book, and its consequence must be stated plainly. The earlier hero, Goethe, acts on the world through art and example, leaving the reader free; the later hero, Frederick, acts on the world through command, and the freedom of the governed is precisely what he overrides — for their good, in Carlyle's reckoning. The great-man theory in *Frederick* is therefore not merely a theory of historical causation (that great men make history) but a normative politics: that the great man *should* rule, and that being ruled by him is the natural and healthy condition of a people. *On Heroes* had already made hero-worship a duty rather than an option — \"Worship of a Hero is transcendent admiration of a Great Man\" [7] — and had grounded the hero's authority in the same virtue the *Frederick* will isolate: \"Sincerity, a deep, great, genuine sincerity, is the first characteristic of all men in any way heroic\" [7].\n\nThe text's own portrait of the hero is, characteristically, deflationary in its surface and exalted in its claim. The opening sentence of the narrative proper introduces not a demigod but a man \"sauntering on the terraces of Sans Souci... a highly interesting lean little old man, of alert though slightly stooping figure; whose name among strangers was King FRIEDRICH THE SECOND, or Frederick the Great of Prussia, and at home among the common people, who much loved and esteemed him, was VATER FRITZ,—Father Fred\" [1]. The diminutive is deliberate, and it carries the whole great-man theory in miniature. The hero is \"lean,\" \"little,\" \"old,\" \"stooping\" — no idol, no statue — and yet \"much loved and esteemed\" by the people who knew him, and so a King \"every inch of him, though without the trappings of a King\" [1]. The heroism is located not in grandeur but in *veracity*: the hero is the one who \"always means what he speaks\" [1]. In an age Carlyle regards as built of cant, the rare phenomenon of a man with \"nothing whatever of the Hypocrite or Phantasm\" [1] is itself the heroic thing. The reader should also notice the move the name \"VATER FRITZ\" performs: before any battle is fought, the hero is introduced as a *father*, which is exactly the figure the family-romance reading will find at the book's psychological centre.\n\n## The Despot Against the Age: Democracy, Industrialisation, and \"Cant\"\n\nCarlyle's hostility to his own century is the negative space that makes Frederick necessary. The Eighteenth Century is for him a moral bankruptcy, and the nineteenth, with its parliamentary \"talk,\" its Mammon-worship, and its \"rampant democracy\" [6], is its heir. The *Latter-Day Pamphlets* had said this directly and offensively; *Frederick* says it by displacement, holding up a working monarchy as the standing rebuke to the democratic faith. Carlyle frames the democratic creed sardonically — the notion that there are to be \"no Kings of any sort, no Government more,\" that the \"New Era\" has dawned — and then detonates it with a single clause: \"Which is a very wonderful notion; important if true; perhaps still more important, just at present, if untrue!\" [1]. The sarcasm carries the whole politics. Carlyle's wager is that the democratic notion is untrue, and that Frederick — offered, he says with deliberate gloom, as \"this Last of the Kings\" — is set before the reader as \"an exemplar to my contemporaries,\" though \"My hopes of presenting, in this Last of the Kings, an exemplar to my contemporaries, I confess, are not high\" [1]. The elegiac note is essential: Frederick is not a programme that can be enacted but a vanished standard against which the present is to feel its own smallness.\n\nThe contempt for \"cant\" — Carlyle's word for hollow profession, the speech that does not correspond to fact — is the connective tissue between the political and the metaphysical. Cant is the social form of the lie, and lying is what the universe forbids. Parliamentary debate, philosophical scepticism, and the polished correspondence of the philosophes are all, in this scheme, varieties of cant: speech proliferating where action and silence are wanted. This is why the silent man of work is the hero and the eloquent man of letters is the suspect. The \"Tobacco-Parliament\" of Friedrich Wilhelm — a smoking-room, not a debating chamber — is held up against the \"speech-making parliaments\" [4] as the better model of how serious men confer: men who smoke and decide rather than orate and adjourn.\n\nIt must be recorded as the cost of this ideology that Carlyle's revulsion at \"cant\" and his appetite for the strong commanding hand are continuous with the authoritarian and racial pronouncements of his late prose (the *Latter-Day Pamphlets* and the notorious \"Occasional Discourse on the Negro Question\"). The *Frederick* itself supplies the underlying contempt for political equality in unguarded asides — the complaint, in the volume on Friedrich Wilhelm I, that under the modern dispensation \"your lowest blockhead and scoundrel... shall have perfect freedom to spit in the face of your highest sage and hero\" [3]. The same machinery that makes Frederick admirable — the wise few taking \"command of the innumerable Foolish\" [6] — is the machinery that, elsewhere in Carlyle, licences contempt for the governed. The *Frederick* is the most disciplined and historically anchored statement of this politics, which is exactly what makes it the most seductive and the most worth reading critically.\n\n## Work, Action, and the Suspicion of Letters\n\nThe gospel of work is the bridge that carries Carlyle's argument from the metaphysics of 1843 into the biography of 1858. *Past and Present* had laid the theology of labour down in its baldest form. The chapter titled simply \"Labour\" opens: \"For there is a perennial nobleness, and even sacredness, in Work. Were he never so benighted, forgetful of his high calling, there is always hope in a man that actually and earnestly works: in Idleness alone is there perpetual despair\" [8]. A few lines on it states the equation outright — \"Labour is Life: from the inmost heart of the Worker rises his god-given Force, the sacred celestial Life-essence breathed into him by Almighty God\" [8] — and ties working to truth itself: \"Properly thou hast no other knowledge but what thou hast got by working\" [8]. This is the doctrine that governs the entire valuation of Frederick the writer versus Frederick the doer.\n\nFrederick wrote constantly and, by Carlyle's lights, mostly badly; the single exception is telling. Vanden Bossche: \"the only work of all Frederick's writings that Carlyle regards as having any merit is his *Art of War*\" [4], and he is a hero \"precisely because he is the one man of action in a 'Writing Era'\" [4]. The *Art of War* qualifies because it is not really \"letters\" at all but the codification of action — the residue of doing rather than a substitute for it. Carlyle's own praise of military art makes the same distinction: a true \"Art of War, grounded on veracity and human courage and insight\" [1] is opposed to the \"Drawcansir rodomontade\" and \"unlimited expenditure of men and gunpowder\" [1] of Napoleonic show. The comparison with Napoleon is the proof-text: Napoleon could \"overrun Europe for a time,\" but the harder, truer feat was to have \"defended a little Prussia against all Europe, year after year for seven years\" [1] — endurance under pressure, not spectacle, is what \"real work\" looks like in the field, and Leuthen \"may very well hold up its head beside any victory gained by Napoleon\" [1].\n\nThe same theology of labour produces the book's most surprising tribute, which is paid not to the warrior-son but to the drudging father. Carlyle is \"tempted to call Friedrich Wilhelm a man of genius;—genius fated and promoted to work in National Husbandry, not in writing Verses or three-volume Novels. A silent genius\" [3]. The phrase is precisely calibrated against the *Past and Present* gospel: genius here is not eloquence but husbandry, the unglamorous administrative labour of draining marshes, drilling regiments, and filling a treasury. Friedrich Wilhelm's \"melodious stanza, which he cannot bear to see halt in any syllable, is a rough fact reduced to order; fact made to stand firm on its feet, with the world-rocks under it\" [3]. The metaphor is exact and revealing: the king's *poem* is his kingdom; his *art* is the army; his stanza is a fact \"made to stand firm on its feet.\" Letters are redeemed only by being converted wholly into deeds.\n\nThis valuation explains Carlyle's withering treatment of the historians on whom he depended. The \"Prussian Dryasdust\" is the anti-hero of the research, the man who substitutes accumulation for insight, who produces \"Books born mostly of Chaos\" that \"are a painful object\" [1], where \"the noteworthy Dead is sure to be found lying under infinite dung, no end of calumnies and stupidities\" [1]. Carlyle's complaint is not against scholarship but against scholarship that does not *act* on its materials, that buries the living fact instead of disinterring it. The same contempt for \"Dilettantism\" — the amateur's dabbling, the connoisseur's talk — runs through the book as the cultural counterpart of political cant: in both, profession outruns performance. The historian, like the parliamentarian and the philosophe, sins by talking where he ought to do.\n\n## Divine Order, the Eternal Veracities, and Justice in History\n\nBeneath the politics lies a theology — heterodox, post-Christian, but unmistakably providential. Carlyle had abandoned his family's Calvinism but kept its moral architecture: a universe under law, in which the law eventually vindicates itself. In *Frederick* this becomes the doctrine of the \"Eternal Veracities.\" History is the slow operation of a justice that cannot be cheated: \"Lying is not permitted in this Universe. The wages of lying, you behold, are death\" [1]. The French Revolution itself, for all its horror, is read as this justice in action — \"that grand universal Suicide\" [1] by which a century of falsity executed itself. The hero's role is to align himself with this order: Frederick is great because he \"honestly recognized said facts wherever they disclosed themselves\" [1] and grounds his actions \"on what he recognizes for the truth\" [1]. The facts are God's facts; to obey them is righteousness; to defy them is the \"damnation\" the universe metes out automatically.\n\nWhat keeps this from being mere fatalism is Carlyle's insistence that the moral order is something *done* as well as something suffered. Justice is not a verdict pronounced from outside history but, as Carlyle defines it through the father, \"another form of the REALITY we love; a truth acted out\" [3]. The just man — and Friedrich Wilhelm is the book's purest specimen — is the one in whom \"there is a divine idea of fact put into him\" and to whom \"the genus sham was never hatefuler\" [3]. The hero does not merely perceive the Eternal Veracities; he embodies and enforces them, and his veracity is \"the summary and victorious outcome of all manner of good qualities, and faithful performances, in a man\" [5]. History's justice is therefore collaborative: the cosmos forbids the lie, and the hero is the instrument through which that prohibition is carried out in time. And what survives the carrying-out is only the true: \"Only what of the Past was TRUE will come back to us. That is the one ASBESTOS which survives all fire\" [1].\n\nThis is why Carlyle can be at once a worshipper of force and a moralist. Force, in his theology, is not arbitrary; it is the visible edge of the moral order. The strong man triumphs because — and only insofar as — he is on the side of the \"truth of things.\" The argument is circular, and at its worst it is a sanctification of whatever wins; but it is sincerely meant as the opposite of cynicism. Carlyle believed he was describing a cosmos in which might follows right, not one in which right is merely the name we give to might. The danger, which the twentieth century would expose more cruelly than Carlyle could foresee, is that the two propositions are indistinguishable from the inside: a doctrine that the victorious are vindicated by their victory cannot, in practice, tell the just conqueror from the merely successful one.\n\n## The Family Romance: Fathers, Sons, and Authority\n\nChris Vanden Bossche's *Carlyle and the Search for Authority* (1991) supplies the reading that ties the personal to the ideological. His thesis is that all Carlyle's work is a \"search for a new center of social and political authority,\" and that *Frederick* stages this search as a father-son drama. The mapping is explicit: \"the triad of son, father, and godfather — Carlyle, James Carlyle, and Goethe — this time becomes Frederick, Friedrich Wilhelm, and Voltaire\" [4]. The young Frederick, like the young Carlyle, is drawn to the brilliant \"intellectual father\" (Voltaire / Goethe), to French letters, scepticism, and the \"Athenian\" life of art; the painful maturation is the return to the harsh, \"Spartan,\" Lutheran, German father (Friedrich Wilhelm / James Carlyle), whose authority is grounded in work and command rather than talk [4].\n\nThe crucial point of Vanden Bossche's reading is that the resolution is conservative rather than rebellious. \"Frederick cannot obtain authority through rebellion but only through submitting to the law as laid down by his father\" [4]; the son becomes a true authority not by overthrowing the paternal principle but by internalising it, until he is \"performing his duties like 'Papa's second self'\" [4] and, \"now truly become his father's 'second self,' banishes Voltaire's French frivolity from his court\" [4]. The whole arc is a conversion narrative in the grammar of authority: the seductive father of *letters* is renounced for the stern father of *work*, and the son's freedom is found precisely in submission. Vanden Bossche names the lesson in Carlyle's own phrase: \"It is not by imitating Voltaire, the author of farces, that Frederick becomes 'Vater Fritz,' but by imitating Friedrich Wilhelm, one of 'the Authors of Prussia'\" [4]. The two senses of *author* — the writer of farces and the maker of a nation — divide the entire moral universe of the book between them.\n\nThis reading illuminates why the book is so preoccupied with Friedrich Wilhelm I, the brutal drill-sergeant king who occupies a vast portion of the narrative before Frederick even reigns. The father is not background; he is the thesis. He is the man of solid, silent, terrible work — \"A silent genius\" [3] — who is \"inflexibly, and with a fierce slow inexorable determination, set upon having realities round him\" [3], and who builds, against all odds, \"an army of from seventy to a hundred thousand before he dies... the best-drilled of fighting men; and what adds much to the wonder, a full Treasury withal. This is the Brandenburg Spartan King\" [3]. The drill and the treasury are the army and the capital the son will spend; the father authors the instrument, the son authors the deeds. Carlyle's evident fascination with Friedrich Wilhelm is the fascination of a son who has decided that the father was right all along. The \"search for authority\" ends, ideologically, in submission to a paternal-monarchical principle: the nation as a family, the king as father, obedience as the natural posture of the governed. Stewart independently confirms the family frame as Carlyle's conscious purpose: \"the nation needed to function as a family unit, with the older, more experienced members... instructing and educating the young\" [6].\n\n## Nation-Building as World-Making\n\nThe largest theme is creation itself. Carlyle presents Prussia as a thing *authored* — willed into existence out of marsh, forest, and disorder by the patient violence of a dynasty. The Hohenzollerns are \"in truth the very making of the Prussian Nation\" [5], and Carlyle names them outright, in the History's own words, \"the Authors of Prussia, without whom Prussia had never been\" [5]. The early chapters of Book II (\"Of Brandenburg and the Hohenzollerns\") render the medieval beginnings as a near-cosmogony: men \"silently gave away their life, before those countries could become fencible and habitable\" [5]. The vocabulary is Genesis-like — order drawn out of chaos by labour and command — and the moral is that nations, like the universe, are governed and made, not grown by accident or chosen by votes.\n\nVanden Bossche identifies the governing trope precisely: \"Battle, both literal and figurative, is Carlyle's principal metaphor for the work of creating the Prussian nation\" [4]. War, in this frame, is not aggression but world-making — the most strenuous form of the \"perennial nobleness... in Work\" [8] that *Past and Present* had sanctified. Friedrich Wilhelm's drill and Frederick's campaigns are continuous with the medieval reclamation of the marshes: each is a chapter in the long sentence the dynasty is writing, the slow composition of a country out of raw fact. The army is the pen and Silesia is the page. This is where Carlyle's gospel of work and his great-man theory and his providential theology fuse into a single image: the hero as author, the nation as text, history as the act of writing the true into permanence against the resistance of chaos.\n\nThe reader should mark that this aestheticisation of conquest as creation is precisely where Carlyle's ideology is most dangerous, and where modern scholarship — and the long shadow the book cast on German nationalist self-understanding — has been most critical. To call war \"the work of creating the Prussian nation\" [4] is to give annexation the moral dignity of labour and the metaphysical dignity of creation; it is to make the casualties of Silesia and the Seven Years' War the necessary cost of a cosmic authorship. John D. Rosenberg, in *Carlyle and the Burden of History* (1985), treats the *Frederick* under the chapter-title \"The Long Night of Frederick the Great,\" reading the book as the exhausted terminus of Carlyle's lifelong attempt to write history as prophecy — the point at which the burden of redeeming the past through heroic narration nearly broke its author [9]. The thirteen years of labour the book cost are themselves, in Rosenberg's frame, a demonstration of the very gospel of work the book preaches, and a warning about its limits.\n\nThe result is a book whose every theme converges on a single conviction: that the world is made and governed by genuine men acting under an inexorable moral law, and that the cure for a democratic, industrial, cant-ridden age is to recognise such men and obey them. It is the most fully realised — and most troubling — statement of Carlyle's lifelong creed, the doctrine of *On Heroes* and the gospel of *Past and Present* hardened into a six-volume defence of the absolute king.\n\n## Open Questions\n\n1. **The \"Authors of Prussia\" phrase — resolved.** Earlier in this corpus the phrase was treated as faithful paraphrase. It is in fact verbatim Carlyle: the History contains the parenthesis \"(who are the Authors of Prussia, without whom Prussia had never been)\" [5], and Vanden Bossche quotes the same phrase from the standard edition (4:366) [4]. The claim is now upgraded from paraphrase to verified quotation. (Resolved.)\n\n2. **Chronology of the ideological hardening.** Hochstrasser locates the turn from literary to despotic hero \"in later years\" [2] without dating it precisely. Whether the *Frederick* represents a hardening *during* its long composition (1851-1865) or merely the steady application of a position fixed by the *Latter-Day Pamphlets* (1850) is a question this document does not resolve.\n\n3. **The \"Art of War\" valuation.** Vanden Bossche's claim that it is \"the only work... Carlyle regards as having any merit\" [4] is a strong reading; Carlyle's scattered remarks on Frederick's histories and the *Anti-Machiavel* are more mixed than this summary suggests, and a fuller survey of the six volumes would refine it.\n\n4. **Continuity with the racial/authoritarian late prose.** The degree to which the *Frederick*'s political theology is implicated in, versus distinguishable from, the \"Negro Question\" and the harsher *Pamphlets* is contested in the scholarship and is flagged here rather than settled. The unguarded asides in the text (e.g., the \"blockhead and scoundrel\" passage [3]) suggest the continuity is real and not merely a matter of biography.\n\n5. **Rosenberg's reading.** This document cites Rosenberg's chapter-title and overall frame [9] but does not quote him verbatim, the full text being inaccessible at time of writing. A pass with the print edition would let the \"Long Night\" reading be quoted directly and weighed against Vanden Bossche's more structural account.\n\n## Sources\n\n[1] Thomas Carlyle, *History of Friedrich II of Prussia, Called Frederick the Great*, Volume 1 (Book I, the Proem \"Friedrich's History from the Distance We Are At,\" and Book II opening). Project Gutenberg ebook #2101. https://www.gutenberg.org/files/2101/2101-h/2101-h.htm — Tier 1 (primary text; quotations verified verbatim against the fetched/parsed HTML).\n\n[2] Timothy Hochstrasser, \"Carlyle and the French Enlightenment: transitional readings of Voltaire and Diderot,\" LSE Department of Economic History Working Paper (2007). https://www.lse.ac.uk/Economic-History/Assets/Documents/Research/FACTS/WorkingPapers/2007/2107Hochstrasser.pdf (also at http://eprints.lse.ac.uk/21432/) — Tier 2 (scholarly; quotations verified verbatim from the parsed PDF).\n\n[3] Thomas Carlyle, *History of Friedrich II of Prussia*, Volume 3 (Books covering Friedrich Wilhelm I — \"A just man... a truth acted out\"; \"the genus sham was never hatefuler\"; \"a man of genius... A silent genius\"; \"the best-drilled of fighting men... a full Treasury withal. This is the Brandenburg Spartan King\"). Project Gutenberg ebook #2104. https://www.gutenberg.org/cache/epub/2104/pg2104.txt — Tier 1 (primary text; quotations verified verbatim by direct text search of the parsed file).\n\n[4] Chris R. Vanden Bossche, *Carlyle and the Search for Authority* (Ohio State University Press, 1991), Chapter 5b, \"The Son as Father: Frederick's Art of War,\" hosted on The Victorian Web. https://victorianweb.org/authors/carlyle/vandenbossche/5b.html — Tier 2 (scholarly; quotations, including the \"Authors of Prussia\" passage cited to 4:366, verified verbatim from the fetched page).\n\n[5] Thomas Carlyle, *History of Friedrich II of Prussia*, Volumes 2 and 14 (Book II, \"Of Brandenburg and the Hohenzollerns\" — \"the very making of the Prussian Nation\"; \"silently gave away their life\"; and, in the later volume, \"the Hohenzollerns (who are the Authors of Prussia, without whom Prussia had never been)\" and \"very unusual VERACITY of intellect... faithful performances, in a man\"). Project Gutenberg ebooks #2102 and #2114. https://www.gutenberg.org/files/2102/2102-h/2102-h.htm ; https://www.gutenberg.org/cache/epub/2114/pg2114.txt — Tier 1 (primary text; quotations verified verbatim against the parsed HTML/text).\n\n[6] Linda C. Stewart, \"Thomas Carlyle and the making of Frederick the Great,\" Ph.D. thesis, University of Edinburgh, 2009/2010 (Abstract, Introduction; quoting A. P. Stanley's 1881 funeral eulogy). https://era.ed.ac.uk/bitstream/handle/1842/5526/Stewart2010.pdf — Tier 2 (scholarly; quotations verified verbatim from the parsed PDF).\n\n[7] Thomas Carlyle, *On Heroes, Hero-Worship, and the Heroic in History* (1841), Lecture I. Project Gutenberg ebook #1091. https://www.gutenberg.org/files/1091/1091-h/1091-h.htm — Tier 1 (primary text; \"Universal History... the History of the Great Men who have worked here\"; \"Worship of a Hero is transcendent admiration of a Great Man\"; \"Sincerity, a deep, great, genuine sincerity, is the first characteristic of all men in any way heroic\" — verified verbatim).\n\n[8] Thomas Carlyle, *Past and Present* (1843), Book III, Chapter XI (\"Labour\") and Book III, Chapter IX (\"Working Aristocracy\"). Project Gutenberg ebook #13534. https://www.gutenberg.org/cache/epub/13534/pg13534.txt — Tier 1 (primary text; \"there is a perennial nobleness, and even sacredness, in Work... in Idleness alone is there perpetual despair\"; \"Labour is Life...\"; \"Cash-payment is not the sole nexus of man with man\" — verified verbatim by direct text search).\n\n[9] John D. Rosenberg, *Carlyle and the Burden of History* (Harvard University Press, 1985), chapter \"The Long Night of Frederick the Great.\" https://www.degruyterbrill.com/document/doi/10.4159/harvard.9780674422988/html — Tier 2 (scholarly; cited for chapter-title and overall frame; not quoted verbatim — see Open Question 5)."}]}</script>

<script>
const corpus = JSON.parse(document.getElementById('corpus-data').textContent);
const docs = corpus.documents;
const toc = document.getElementById('toc');
const content = document.getElementById('content');
const searchBox = document.getElementById('search');
const results = document.getElementById('search-results');
const key = 'corpus:' + corpus.slug;
let current = 0;

// theme
const themePref = localStorage.getItem('corpus-theme');
if (themePref) document.documentElement.dataset.theme = themePref;
else if (matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.dataset.theme = 'dark';
document.getElementById('theme-btn').onclick = () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('corpus-theme', next);
};

// table of contents
docs.forEach((d, i) => {
  const a = document.createElement('a');
  a.href = '#ch-' + i;
  a.innerHTML = '<span class="num">' + String(i).padStart(2, '0') + '</span>' + d.title;
  a.title = d.summary || '';
  a.onclick = (e) => { e.preventDefault(); show(i); closeMenu(); };
  toc.appendChild(a);
});

let firstShow = true;
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
function show(i, anchorText) {
  if (listening && !autoNext) stopListen();  // manual nav stops narration; auto-advance keeps it
  const apply = () => {
  current = Math.max(0, Math.min(docs.length - 1, i));
  content.innerHTML = marked.parse(docs[current].body);
  // rewrite chapter-to-chapter .md links into in-app navigation
  content.querySelectorAll('a[href$=".md"]').forEach(a => {
    const target = docs.findIndex(d => a.getAttribute('href').endsWith(d.file));
    if (target >= 0) { a.href = '#ch-' + target; a.onclick = (e) => { e.preventDefault(); show(target); }; }
  });
  content.querySelectorAll('a[href^="http"]').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });
  toc.querySelectorAll('a').forEach((a, j) => a.classList.toggle('active', j === current));
  document.getElementById('prev').disabled = current === 0;
  document.getElementById('next').disabled = current === docs.length - 1;
  document.getElementById('pager-label').textContent = (current + 1) + ' / ' + docs.length + ' · ' + docs[current].title
    + ' · ' + Math.max(1, Math.round(docs[current].body.split(/\s+/).length / 220)) + ' min';
  history.replaceState(null, '', '#ch-' + current);
  localStorage.setItem(key, current);
  // feed the cross-page library shell: per-corpus read set + global recents
  try {
    const rk = 'read:' + corpus.slug;
    const readArr = JSON.parse(localStorage.getItem(rk) || '[]');
    if (readArr.indexOf(current) < 0) { readArr.push(current); localStorage.setItem(rk, JSON.stringify(readArr)); }
    const rec = (JSON.parse(localStorage.getItem('library-recents') || '[]') || []).filter(r => r.slug !== corpus.slug);
    rec.unshift({ slug: corpus.slug, title: corpus.title, ch: current, chTitle: docs[current].title, ts: Date.now() });
    localStorage.setItem('library-recents', JSON.stringify(rec.slice(0, 20)));
    // quiet reading streak: bump once per calendar day a chapter is opened
    const today = new Date().toISOString().slice(0, 10);
    const st = JSON.parse(localStorage.getItem('reading-streak') || '{}');
    if (st.last !== today) {
      const yest = new Date(Date.now() - 864e5).toISOString().slice(0, 10);
      st.count = (st.last === yest ? (st.count || 0) : 0) + 1;
      st.last = today;
      localStorage.setItem('reading-streak', JSON.stringify(st));
    }
  } catch (e) {}
  if (anchorText) {
    const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT);
    let node; while ((node = walker.nextNode())) {
      const idx = node.textContent.toLowerCase().indexOf(anchorText.toLowerCase());
      if (idx >= 0) {
        const host = node.parentElement;
        host.scrollIntoView({ block: 'center' });
        if (!reduceMotion) { host.classList.add('passage-flash'); setTimeout(() => host.classList.remove('passage-flash'), 2200); }
        return;
      }
    }
  }
  document.getElementById('main').scrollIntoView();
  window.scrollTo(0, 0);
  };
  // cross-fade chapter swaps where supported (skips first paint + reduced motion)
  if (document.startViewTransition && !reduceMotion && !firstShow) document.startViewTransition(apply);
  else apply();
  firstShow = false;
}

document.getElementById('prev').onclick = () => show(current - 1);
document.getElementById('next').onclick = () => show(current + 1);

let chordKey = null, chordTimer;
document.addEventListener('keydown', (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const back = document.getElementById('cmdk-back');

// search
let timer;

  clearTimeout(timer);

function runSearch() {
  const q = searchBox.value.trim().toLowerCase();
  results.innerHTML = '';
  toc.style.display = q ? 'none' : '';
  if (!q || q.length < 3) { toc.style.display = ''; return; }
  let hits = 0;
  docs.forEach((d, i) => {
    const text = d.body.toLowerCase();
    let pos = text.indexOf(q), shown = 0;
    while (pos >= 0 && shown < 3 && hits < 40) {
      const start = Math.max(0, pos - 60), end = Math.min(d.body.length, pos + q.length + 90);
      const raw = d.body.slice(start, end).replace(/[#*_>\[\]]/g, '');
      const safe = raw.replace(/&/g, '&amp;').replace(/</g, '&lt;');
      const snippet = safe.replace(new RegExp(q.replace(/[.*+?^${}()|\\]/g, '\\$&'), 'ig'), m => '<mark>' + m + '</mark>');
      const div = document.createElement('div');
      div.className = 'hit';
      div.innerHTML = '<b>' + d.title + '</b>…' + snippet + '…';
      const exact = d.body.slice(pos, pos + q.length);
      div.onclick = () => { show(i, exact); searchBox.value = ''; runSearch(); closeMenu(); };
      results.appendChild(div);
      hits++; shown++;
      pos = text.indexOf(q, pos + q.length);
    }
  });
  if (!hits) results.innerHTML = '<div class="none">No matches.</div>';
}

// ---- Listen mode (browser Web Speech API) + share-this-chapter ----
const synth = window.speechSynthesis;
let listening = false, paused = false, autoNext = false, listenIdx = 0, listenRate = 1,
    listenAuto = true, sleepMode = 'none', sleepTimer = null, lchunks = [], lidx = 0, lbar = null;
function chapterText(i) {
  let t = docs[i] ? docs[i].body : '';
  return t.replace(/```[\s\S]*?```/g, ' ').replace(/<[^>]+>/g, ' ')
          .replace(/!\[[^\]]*\]\([^)]*\)/g, ' ').replace(/\[([^\]]+)\]\([^)]*\)/g, '$1')
          .replace(/[#>*_`~|]/g, ' ').replace(/\s+/g, ' ').trim();

function chunkText(t) {
  const raw = t.match(/[^.!?]+[.!?]+["')\]”’]*|\S[^.!?]*$/g) || [t];
  const out = []; let buf = '';
  raw.forEach(s => { s = s.trim(); if (!s) return;
    if ((buf + ' ' + s).length > 240 && buf) { out.push(buf); buf = s; } else buf = buf ? buf + ' ' + s : s; });

      listenIdx++; autoNext = true; show(listenIdx); autoNext = false;
      lchunks = chunkText(chapterText(listenIdx)); lidx = 0; updateBar(); speakChunk();

function startListen() {

function stopListen() {

}
function buildBar() {

    + '<span id="lb-title"></span>'
    + '<label class="lb-ctl">Speed <select id="lb-rate"><option value="0.8">0.8×</option><option value="1" selected>1×</option><option value="1.2">1.2×</option><option value="1.5">1.5×</option></select></label>'

    source: corpus.subtitle || corpus.title,

const hash = location.hash.match(/^#ch-(\d+)$/);
const anchorQ = new URLSearchParams(location.search).get('q');
show(hash ? +hash[1] : +(localStorage.getItem(key) || 0), anchorQ || undefined);

// Related reading at the foot of the column — corpus-level, from the inlined
// library manifest's precomputed similarity graph (no fetch). Deferred to

function renderRelated() {

  const mEl = document.getElementById('library-manifest');
  if (!relEl || !mEl) return;
  let LIB; try { LIB = JSON.parse(mEl.textContent); } catch (e) { return; }
  const me = LIB.find(x => x.slug === corpus.slug);
  const rel = (me && me.related) || [];
  if (!rel.length) return;
  const esc = s => { const d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; };

  function fit() {
    if (!DATA || !DATA._b) return;
    var b = DATA._b, sw = stage.clientWidth, sh = stage.clientHeight, pad = 46;
    var s = Math.max(0.22, Math.min(9, Math.min((sw - pad * 2) / b.w, (sh - pad * 2) / b.h)));
    view.s = s; view.x = (sw - (2 * b.x + b.w) * s) / 2; view.y = (sh - (2 * b.y + b.h) * s) / 2; apply(); save();
  }

  function load() {
    if (loading) return; loading = true;
    fetch(base + 'atlas.json').then(function (r) { return r.ok ? r.json() : Promise.reject(); })
      .then(function (j) { DATA = j; render(j); loaded = true; if (msg) msg.remove(); })
      .catch(function () { if (msg) msg.textContent = 'The Atlas needs to load its map data — open it on the live site (research.calvincollins.xyz).'; });
  }

  function render(j) {
    var s = '<svg id="atlas-svg" viewBox="' + j.viewBox + '" width="' + j.w + '" height="' + j.h
      + '" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">';
    s += '<defs>';
    for (var rid in j.regions) s += '<clipPath id="ar-' + rid + '"><path d="' + j.regions[rid].d + '"/></clipPath>';
    j.places.forEach(function (p) {
      var c = p.cell;
      s += '<clipPath id="ac-' + p.slug + '"><rect x="' + c[0] + '" y="' + c[1] + '" width="' + c[2] + '" height="' + c[3] + '"/></clipPath>';
    });
    s += '</defs>';
    s += '<g id="atlas-grat">'; (j.graticule || []).forEach(function (d) { s += '<path d="' + d + '"/>'; }); s += '</g>';
    s += '<g id="atlas-bd">'; (j.backdrop || []).forEach(function (d) { s += '<path d="' + d + '"/>'; }); s += '</g>';
    s += '<g id="atlas-places">';
    j.places.forEach(function (p) {
      var c = p.cell;
      s += '<g class="atlas-place" data-slug="' + esc(p.slug) + '"><g clip-path="url(#ar-' + p.region + ')">';
      if (p.img) {
        var href = esc(base + p.img);
        s += '<image class="atlas-img" href="' + href + '" xlink:href="' + href + '" x="' + c[0] + '" y="' + c[1]
          + '" width="' + c[2] + '" height="' + c[3] + '" preserveAspectRatio="xMidYMid slice" clip-path="url(#ac-' + p.slug + ')"/>';
      }
      s += '<rect class="atlas-ring" x="' + c[0] + '" y="' + c[1] + '" width="' + c[2] + '" height="' + c[3]
        + '" clip-path="url(#ac-' + p.slug + ')" fill="none" stroke="' + esc(p.accent) + '" stroke-width="3"/>';
      s += '</g></g>';
    });
    s += '</g>';
    s += '<g id="atlas-lines">';
    for (var r2 in j.regions) {
      var R = j.regions[r2];
      s += '<path class="atlas-rgn" d="' + R.d + '"/>';
      (R.dividers || []).forEach(function (d) {
        s += '<line class="atlas-div" x1="' + d[0] + '" y1="' + d[1] + '" x2="' + d[2] + '" y2="' + d[3] + '" clip-path="url(#ar-' + r2 + ')"/>';
      });
    }
    s += '</g></svg>';
    world.innerHTML = s;

    var X0 = 1e9, Y0 = 1e9, X1 = -1e9, Y1 = -1e9;
    j.places.forEach(function (p) {
      bySlug[p.slug] = p; var c = p.cell;
      X0 = Math.min(X0, c[0]); Y0 = Math.min(Y0, c[1]); X1 = Math.max(X1, c[0] + c[2]); Y1 = Math.max(Y1, c[1] + c[3]);
    });
    DATA._b = { x: X0 - 40, y: Y0 - 40, w: (X1 - X0) + 80, h: (Y1 - Y0) + 80 };

    [].forEach.call(world.querySelectorAll('.atlas-place'), function (el) {
      var p = bySlug[el.getAttribute('data-slug')];
      el.addEventListener('pointerenter', function () { if (!dragging) activate(p, el); });
      el.addEventListener('pointermove', function () { if (!dragging && active !== p) activate(p, el); });
      el.addEventListener('pointerleave', schedHide);
      el.addEventListener('click', function (e) {
        if (moved || e.target.closest('#atlas-card')) return;
        window.location.href = base + p.href;
      });
    });
    if (restore()) { apply(); if (!enoughVisible()) fit(); }   // reopen where they left off — unless it's now off-screen
    else fit();
  }

  function activate(p, el) {
    if (active && active._el && active._el !== el) active._el.classList.remove('active');
    active = p; p._el = el; el.classList.add('active');
    var opts = '<option value="" disabled selected>Jump to a chapter…</option>';
    (p.chapters || []).forEach(function (ch) { opts += '<option value="' + esc(base + ch.href) + '">' + esc(ch.t) + '</option>'; });
    card.innerHTML = '<a class="ac-title" href="' + esc(base + p.href) + '" style="color:' + esc(p.accent) + '">' + esc(p.title) + '</a>'
      + '<div class="ac-place">' + esc(p.label) + '</div>'
      + (p.chapters && p.chapters.length ? '<select class="ac-sel" aria-label="Jump to a chapter">' + opts + '</select>' : '');
    var sel = card.querySelector('.ac-sel');
    if (sel) sel.onchange = function () { if (this.value) window.location.href = this.value; };
    card.classList.add('show');
    var r = el.getBoundingClientRect(), sr = stage.getBoundingClientRect();
    card.style.left = '0px'; card.style.top = '0px';
    var cw = card.offsetWidth, chh = card.offsetHeight;
    var cx = (r.left + r.right) / 2 - sr.left, cyTop = r.top - sr.top;
    var left = Math.max(8, Math.min(sr.width - cw - 8, cx - cw / 2));
    var top = cyTop - chh - 12; if (top < 8) top = (r.bottom - sr.top) + 12;
    top = Math.max(8, Math.min(sr.height - chh - 8, top));
    card.style.left = left + 'px'; card.style.top = top + 'px';
    if (hideT) { clearTimeout(hideT); hideT = null; }
  }
  function schedHide() { if (hideT) clearTimeout(hideT); hideT = setTimeout(hideCard, 240); }
  function hideCard() {
    if (card) card.classList.remove('show');
    if (active && active._el) active._el.classList.remove('active');
    active = null;
  }
})();
</script>
</body>
</html>
