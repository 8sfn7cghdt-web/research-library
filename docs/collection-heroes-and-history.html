<script id="corpus-data" type="application/json">{"slug": "collection-heroes-and-history", "title": "Heroes & History", "subtitle": "Carlyle's lifelong wager that history is the biography of great men — traced across his three monuments. The Calvinist formation of the prophet, his theory of r", "author": "", "generated": "", "documents": [{"order": 0, "file": "collection-heroes-and-history-0.md", "title": "Thomas Carlyle and His Scottish Calvinist Influences: A Briefing", "summary": "The Calvinist Without a Creed", "body": "*From [The Calvinist Without a Creed](carlyle-research.html#ch-0) — chapter 1*\n\n# Thomas Carlyle and His Scottish Calvinist Influences: A Briefing\n\n## Bottom Line\n\nThomas Carlyle (1795-1881) is best understood not as a Romantic individualist, a transplanted German idealist, or a Victorian crank, but as **a Scottish Calvinism that has lost its confession and kept its grammar.** Formed in the Burgher Seceder Presbyterianism of the Annandale village of Ecclefechan, in a stonemason's household ruled by the catechism and the family Bible, Carlyle lost the dogmatic content of that faith in his early twenties — and then spent fifty-five years writing books whose every structural element (the prophetic cadence, the providential reading of history, the polemic against Sham, the hero as locus of the divine, the Gospel of Work, the \"Everlasting No / Yea\" conversion arc, the doctrine of Natural Supernaturalism) is a recognizable transposition of a Reformed doctrine or posture into post-confessional idiom. The German turn (Goethe, Fichte, Novalis) did not replace the substrate; it gave Carlyle a non-creedal vocabulary in which to keep saying it.\n\nThis frame makes the whole arc legible. It explains why the early humane Carlyle of *Sartor Resartus* (1833-34), *The French Revolution* (1837), and *Past and Present* (1843) and the late vicious Carlyle of the *Occasional Discourse on the Negro Question* (1849) and *Latter-Day Pamphlets* (1850) are continuous rather than discontinuous: they are one machine, run on the same substrate, under different historical pressures. The same Reformed instinct that produces the moral seriousness of the Gospel of Work in *Past and Present* produces the racial authoritarianism of the *Negro Question* when its Christian-humane checks are dropped. Insulating the early from the late is not an act of charity to Carlyle; it is a refusal to read him.\n\nIn 2026 Carlyle is more contested than at any time since the 1930s — partly because he is again *useful*. A reactionary right anchored by Curtis Yarvin (writing as \"Mencius Moldbug\" from 2008) has named him a master, and the Yarvin reading has reached high enough into U.S. politics through J. D. Vance to make Carlyle's name newsworthy in a way it had not been for sixty years. A scholarly recovery, anchored in the Duke-Edinburgh *Collected Letters* (completed 2023) and the Strouse Edition of the *Writings* (completing September 2026), has built the substrate reading (Jessop, 1997; Vanden Bossche, 1991; Sorensen, Kinser, Morrow) into the most generative interpretive frame currently available. These two motions are happening at different latitudes — the scholarly motion is slow and internal, the political motion is fast and external — and they will probably continue to coexist through the forecast horizon. The modal forecast for Carlyle through 2035 is **Quiet Recovery under Politically Toxic Conditions** (~45%): editorial completion enables the next monograph wave, the substrate frame gains ground in *Carlyle Studies Annual* and at NAVSA, undergraduate teaching remains pinched by the *Occasional Discourse* problem, and the Yarvin-Vance overhang keeps the public reception charged.\n\n## In Brief\n\n- **Origins:** Carlyle was raised in the Burgher Seceder congregation of Ecclefechan under the stonemason patriarch James Carlyle and the pious Margaret Aitken. Educated at Annan Academy and the University of Edinburgh (matriculated November 1809, age 13), trained for the Burgher Seceder ministry, he lost the dogma sometime between 1817 and 1822 in a slow attritional crisis that *Sartor Resartus* would later compress into the famous \"Everlasting No / Centre of Indifference / Everlasting Yea\" conversion sequence. The actual psychological resolution happened gradually through the Hoddam Hill year (1825-26). The Calvinist substrate carried forward intact.\n\n- **Modern arc:** Marriage to Jane Welsh in October 1826. Productive isolation at Craigenputtock (1828-34), where the foundational essays (\"Signs of the Times,\" 1829; \"Characteristics,\" 1831) and *Sartor Resartus* (1833-34) were written. Move to London (5 Cheyne Row, Chelsea) in 1834. *The French Revolution* (1837) established the prose style; the lectures (1837-40) and *On Heroes* (1841) established the public sage. *Past and Present* (1843) launched the British anti-industrial tradition. The dark turn from *Negro Question* (1849) and *Latter-Day Pamphlets* (1850) broke many of his friendships (most importantly with Mill) and inaugurated the long late phase: *Cromwell* (1845), the thirteen-year *Frederick* labor (1858-65), Jane's death in 1866, the *Reminiscences*, *Shooting Niagara* (1867), the Eyre defense, the late honors. Death February 5, 1881.\n\n- **Today:** Carlyle Studies in 2026 is small, well-defined, and internationally distributed. Two completed editorial projects — the *Collected Letters* (50 vols., 1970-2023, with the open-access *Carlyle Letters Online* now hosted at Western Carolina University) and the Strouse Edition of the *Writings* (UC Press, completing September 2026 with *Latter-Day Pamphlets I-II*) — anchor the field. *Carlyle Studies Annual*, edited by David R. Sorensen and Brent E. Kinser, is the journal of record. The scholarly community is perhaps a dozen scholars whose primary research identity is Carlyle (Sorensen, Kinser, Jessop, Vanden Bossche, Morrow, Ulrich, others). Undergraduate teaching has shrunk to anthology fragments. The scholarly recovery is real but generationally fragile.\n\n- **Forecast:** Through 2035 the modal scenario is Quiet Recovery (~45%) — steady scholarly work, the Jessop substrate frame gaining ground, the Strouse completion enabling the next monograph wave, undergraduate teaching pinched but not absent. Politically Toxic / Scholarly Retreat (~20%) if the post-liberal political moment intensifies the Yarvin-Carlyle channel; Substrate Synthesis (~15%) if the Calvinist frame becomes dominant in both academic and lay reception; Surprise Mainstream Recovery (~15%) via the work-and-AI vector, the eco-critical vector, the religion-and-secularization conversation, or a major new biography; Residual tail (~5%).\n\n- **Open questions:** The relationship between the substrate's analytic power and its probability of broader uptake; the long-term shape of the Yarvin appropriation; whether any institutional sponsor (Reformed-Protestant or otherwise) can do for Carlyle what Catholicism did for Newman; the curricular consequence of the *Occasional Discourse* — kept-off-syllabus vs. taught-as-problem.\n\n## How to Read This Corpus\n\n- **5-minute version:** this Bottom Line and the In Brief.\n- **30-minute version:** this briefing in full, plus `Future_Trajectory.md`.\n- **60-minute version:** add `06_Drivers_And_Forces.md` (the substrate centerpiece) and `04_Live_Debates_And_Dynamics.md` (the contested questions).\n- **Full version:** read in numbered order, with `07_Primary_Sources.md` as the ground-truth reference layer and `Verification_Notes.md` for factual fact-checks against the Round 1 documents.\n\n---\n\n## Origins (Brief)\n\nThomas Carlyle was born on December 4, 1795, in the village of Ecclefechan in Annandale, southwest Scotland, the eldest son of the stonemason James Carlyle's second marriage. The Carlyles were members of the Burgher Seceder Presbyterian congregation of Ecclefechan, ministered by John Johnstone — one of the small dissenting Reformed congregations that had broken with the Established Church of Scotland over the 1733 Marrow Controversy and the eighteenth-century lay-patronage disputes. The Burgher Seceders held to the Westminster Standards in their strict form, took the catechism as the spine of household instruction, valued literacy as the means of access to Scripture, and treated the Hebrew prophetic literature as the working register of Christian discourse. The Carlyle household followed this discipline. James Carlyle is described in his son's late *Reminiscences* essay as a man whose Calvinism was the integrated grammar of his entire existence rather than a separate doctrinal compartment — \"religious with the consent of his whole faculties.\" Margaret Aitken, the mother, was equally pious in a gentler register. The household read Scripture, said the catechism, and worked at vocation.\n\nCarlyle was sent to Annan Academy at age ten and to the University of Edinburgh in November 1809, on the path to the Burgher Seceder ministry. At Edinburgh he excelled at mathematics under Sir John Leslie and absorbed Scottish Common Sense moral philosophy (Reid, Stewart, Brown), the long shadow of Adam Smith and David Hume, and — increasingly through the 1810s — the German literature he was teaching himself to read. His progress through the Divinity Hall (the part-time six-summer course required for Burgher Seceder ordination) slowed and then stopped; by 1818 he had effectively withdrawn from the path to ministry. The next four years were a slow, attritional loss of dogmatic faith, suffered in dyspeptic schoolmastering at Annan and Kirkcaldy and in lonely Edinburgh lodgings.\n\nThe famous \"Everlasting No\" of *Sartor Resartus* II.7 locates the spiritual resolution at a single moment on Leith Walk in summer 1822 (Froude dated it to June 1821; Alexander Carlyle and Carlisle Moore's 1955 *PMLA* article argue for late July or early August 1822). The actual psychological transformation is better dated to the Hoddam Hill year (1825-26), where Carlyle, having begun his German translation work (*Life of Schiller*, 1823-25; *Wilhelm Meister*, 1824), found a non-creedal vocabulary in which to keep the substance of his Calvinist inheritance without its dogma. The mature voice — the prose that would become \"Carlylese\" — is audible from that point forward. He married Jane Welsh in October 1826 and the Craigenputtock years produced the keynote essays and the first draft of *Sartor*. By 1834, when the Carlyles moved to Chelsea, the substrate had completed its transposition: a Calvinism that had lost its confession but kept its grammar. (See `01_Origins_And_Deep_History.md`, claims 1.1-1.14.)\n\n---\n\n## The Modern Arc (Brief)\n\nFrom 1834 to 1881 Carlyle lived at 5 Great Cheyne Row in Chelsea (the house preserved by the National Trust as Carlyle's House since 1895), and from there produced the books that made him the most listened-to moral voice of Victorian Britain through the 1840s and that made him, in the second half of his life, a figure much of liberal Britain found intolerable. The trajectory is one of *deepening* rather than mere change. The substrate is constant; what changes is the Sham it identifies as the age's chief object of judgment. In the 1830s the chief Sham is unbelief and Benthamism (*Sartor*; the early essays); in the 1840s industrial Mammonism and the misery of the poor (*Past and Present*; *Cromwell*); in the 1850s parliamentary cant and post-1848 European \"Anarchy\" (*Latter-Day Pamphlets*); in the 1860s and 1870s universal suffrage and the disintegration of authority (*Shooting Niagara*; the Eyre defense).\n\nThree texts dominate the public-sage decade. *Sartor Resartus* (1833-34) is the foundational autobiography-as-philosophy: the Editor-and-Teufelsdröckh frame, the \"Philosophy of Clothes,\" and — in Book II — the conversion arc that transposes the Reformed *ordo salutis* into German philosophical vocabulary. *The French Revolution* (1837) — composed and then *re*-composed after J. S. Mill's housekeeper at Harriet Taylor's house accidentally burned the manuscript of Volume I on the evening of March 6, 1835 — established the prose style: present-tense narration, apostrophe, capitalized abstractions, Hebraic cadence, the apocalyptic conditional. *On Heroes, Hero-Worship, and the Heroic in History* (1841), delivered as six lectures in May 1840, is best read as a post-confessional Christology — a doctrine of how the divine appears in history through chosen instruments — rather than as the \"theory of history\" that Spencer, Tolstoy, and Marx criticized.\n\n*Past and Present* (1843) is the political climax. Composed in the wake of the Manchester depression and the rise of Chartism, with the medieval *Chronicle* of Jocelin of Brakelond as foil, the book establishes the Gospel of Work (\"All true Work is sacred\"), the polemic against Cash-Nexus (\"'Cash-payment for the sole nexus'... will never be a practicable Law of Union for a Society of Men\"), and the diagnostic frame (\"Condition of England\") that would shape Ruskin, Morris, the Christian Socialists, Tawney, and the early Labour movement. *Past and Present* is the substrate at its best work: the Reformed doctrine of vocation deployed as a humane critique of industrial capitalism, with the Christian-humane checks (the equality of souls before God, the demand of mercy) still operative.\n\nThe dark turn dates from the late 1840s. The *Occasional Discourse on the Negro Question* (December 1849, reprinted 1853 with a more offensive title using a racial slur) applies the Gospel of Work to the post-emancipation Caribbean in defense of compelled labor along racial lines. Mill's reply in *Fraser's* (January 1850) is the document this corpus uses to make the historiographic point without reproducing Carlyle's slurs: \"a person of high authority appears to me to be making a most unwarrantable use of his pen, for the purpose of giving currency to opinions which I conceive to be both false and abominable.\" The *Latter-Day Pamphlets* (1850) extend the polemic across the institutions of mid-Victorian Britain — parliament, philanthropy, finance, prison reform — in the Reformed-iconoclastic register turned against the wrong objects. These are the texts in which the substrate's failure mode becomes textually undeniable: the same instinct for order under vocation that produced *Past and Present* now produces authoritarian denunciation when its humane checks are dropped.\n\nThe late phase is dominated by the thirteen-year labor on *Frederick the Great* (1858-1865), six volumes that broke Carlyle's health and Jane's spirit and that produced the German-nationalist reception (Bismarck's \"our great Prussian King in his full figure, like a living statue\"; *Pour le Mérite*, 1874) and the long shadow into the 1933-45 Nazi appropriation (Goebbels reading *Frederick* aloud to Hitler in the bunker in April 1945). Jane Welsh Carlyle's sudden death on April 21, 1866, produced the late *Reminiscences*, in which Carlyle — reading Jane's letters and journals — convinced himself he had failed her, and produced the Froude controversy that damaged his reputation for two generations after his death in 1881. (See `02_Modern_Arc.md`, claims 2.1-2.18.)\n\n---\n\n## The Calvinist Substrate (Brief)\n\nThe central analytical contribution of this corpus is in `06_Drivers_And_Forces.md`: a systematic mapping of how the Reformed-Calvinist doctrines and postures of the Burgher Seceder formation persist, in secularized form, as the load-bearing architecture of Carlyle's mature thought. Each mapping has the same shape: a Reformed doctrine in its dogmatic form, its secularized Carlylean form, the textual evidence (quoted), and the mechanism by which it operates in the prose. The mappings:\n\n1. **Predestination becomes providential history.** History as the unfolding of moral verdict; the *French Revolution* as judgment on the *ancien régime*; Cromwell as instrument; Frederick as scourge.\n\n2. **Calling becomes the Gospel of Work.** The Reformed doctrine of vocation translated into the post-confessional polemic of *Past and Present* — \"All true Work is sacred.\" Anticipates Weber's *Protestant Ethic* analytical move; *is* the Protestant ethic preached.\n\n3. **Total depravity becomes the polemic against Sham.** \"Sham,\" \"Cant,\" \"Quackery,\" \"Phantasm\" — Carlyle's keywords. Not Enlightenment fraud-and-error but Reformed iconoclasm: the world is full of idols and the prophet smashes them.\n\n4. **Westminster doctrine of Scripture becomes prophetic voice.** \"Carlylese\" — apostrophe, anaphora, capitalization, the Hebraic cadence — is sermon prose. Carlyle does not argue, he *declares*; he does not analyze, he *unmasks*. The reader is positioned as congregation, not interlocutor.\n\n5. **Reformed iconoclasm becomes anti-Dilettantism** — and the productive tension with Goethe. Carlyle reveres Goethe but Calvinizes him: Olympian serenity translated into thunder.\n\n6. **Hero-worship as Christology manqué.** The Hero is the locus of the divine in history — an incarnational figure for a post-Christian system. *On Heroes* is theology, not historiography (Vanden Bossche, Jessop, Sorensen). This also explains the late authoritarianism: when the Hero stops being received as a sign of providence and becomes valorized as power-in-itself, the substrate goes to seed.\n\n7. **Reformed order of salvation becomes the *Sartor* conversion narrative.** The Everlasting No / Centre of Indifference / Everlasting Yea sequence reproduces the Reformed conviction-of-sin / unselving / vocation arc. \"Predestined not to be Happy, but to be Unhappy\" — the doctrine of predestination explicitly deployed against utilitarianism. \"Love not Pleasure; love God.\"\n\n8. **The communion of saints becomes the communion of heroes across time** — history as a chain of recognitions: Cromwell hears Knox who hears Luther who hears the prophets.\n\n9. **The hidden God (*Deus absconditus*) becomes Natural Supernaturalism.** Nature as the \"Living Garment of God\"; the visible as sign of an invisible reality; custom as the veil. M. H. Abrams takes this chapter title as the name of the entire Romantic intellectual movement.\n\nThe German overlay (Goethe, Fichte, Novalis) is honestly real — it is what made the substrate sayable in a post-confessional age — but the underlying structure is Reformed-Scottish, not German. The Carlylean voice is intelligible only as Burgher Seceder Calvinism transposed into an idealist key.\n\nThe failure-mode point is the analytically uncomfortable one: the same substrate that produces the humane Carlyle of *Past and Present* produces the racist Carlyle of the *Occasional Discourse*. The Reformed instinct for *order under divinely-instituted hierarchy* is the same instinct in both books; in the first it serves justice (the dignity of the toilworn Craftsman, the indictment of Mammonism), in the second it serves white supremacy. The honest analytical task is to name this as the substrate's failure mode under the specific historical pressure of mid-Victorian imperial racial discourse, not to insulate the early from the late. They are one machine. (See `06_Drivers_And_Forces.md`, the centerpiece document, in full.)\n\n---\n\n## Current State (Brief)\n\nCarlyle Studies in 2026 is a small, well-defined, internationally distributed field. The institutional anchors:\n\n- **The Duke-Edinburgh *Collected Letters of Thomas and Jane Welsh Carlyle*** — fifty print volumes (1970-2023), with the open-access *Carlyle Letters Online* (https://carlyleletters.wcu.edu — relocated to Western Carolina University's Hunter Library in 2025, with Texas A&M Libraries as technical partner). The first major editorial project completed. Brent E. Kinser drove the WCU migration.\n\n- **The Strouse Edition of the Writings of Thomas Carlyle** (UC Press) — eight printed volumes across six titles; the German volumes appeared November 2024; *Latter-Day Pamphlets I-II* is announced for September 2026, which will complete the edition.\n\n- ***Carlyle Studies Annual*** (Saint Joseph's University Press) — the journal of record, edited by David R. Sorensen and Brent E. Kinser.\n\n- **The Carlyle Society** (Edinburgh), the Carlyle's House at 24 Cheyne Row (National Trust), and the Arched House at Ecclefechan (National Trust for Scotland) — the smaller institutional infrastructure.\n\n- **Major archives**: National Library of Scotland (Edinburgh — the main holding), Houghton Library at Harvard, Yale's Beinecke, the V&A's Forster collection, the British Library, the Strouse Collection at UC Santa Cruz.\n\nThe scholarly community is roughly a dozen scholars whose primary research identity is Carlyle (Sorensen, Kinser, Jessop at Glasgow, Vanden Bossche at Notre Dame, Morrow at Auckland, Ulrich at Mansfield, others), and several dozen for whom Carlyle is a recurring subject. The community is small and somewhat fragile: *Carlyle Studies Annual* is essentially Sorensen and Kinser; the Carlyle Society is essentially Ian Campbell; Aileen Christianson's death on June 12, 2020, was a real loss for Jane Welsh Carlyle scholarship, and post-Christianson succession in the gender / Jane-Welsh strand is unclear.\n\nThe general undergraduate teaching footprint has shrunk drastically since the mid-20th century: Carlyle now appears in the standard Victorian survey at most as an essay-anthology fragment (\"Signs of the Times,\" a few pages of *Sartor*, the \"Captains of Industry\" chapter of *Past and Present*). The *Occasional Discourse* problem is the operative reason — most departments do not see a path through the racism that allows Carlyle to be taught at undergraduate scale.\n\nYet two countervailing currents are visible. The first is **the scholarly recovery** organized around Carlyle's relevance to debates over liberalism, labor, religion, and post-liberalism (Wolfel, *Thomas Carlyle and the Political Universe*, Lexington/Rowman 2024, the first monograph in two decades to argue for a positive post-liberal reading of Carlyle from within the academy). The second is **an extramural recovery from the political right** (Curtis Yarvin, the Dark Enlightenment, Catholic-integralist circles, the broader \"post-liberal\" formation including figures around the Vance vice presidency), largely disconnected from the academic field but raising Carlyle's name-recognition. The two recoveries are not in communication with one another, and the academic side is wary of the extramural one. (See `03_Current_Structure_And_Actors.md`.)\n\n---\n\n## Live Debates (Brief)\n\nThe eight live debates in present-day Carlyle reception, each with a steelmannable case on every side:\n\n1. **\"Was Carlyle a proto-fascist?\"** Bentley's *A Century of Hero-Worship* (1944), Trevor-Roper's 1981 *Listener* essay, and Cassirer's *Myth of the State* (1946) anchor the proto-fascist reading; Philip Rosenberg's *The Seventh Hero* (1974), John Morrow, and Sorensen anchor the anti-anachronism revisionism (the label is a category error reading 20th-c. ideology backward; Carlyle's politics were Tory paternalism + Calvinist providence + Romantic anti-utilitarianism). Carlyle Studies presently leans revisionist on the strict question but acknowledges the genuine continuity into the German nationalist and (later) Nazi reception of *Frederick*.\n\n2. **The *Negro Question* and Carlyle's racism.** Modern consensus is that the text is genuinely racist (the older \"intemperate language\" defense is untenable). The contested question is centrality: Catherine Hall's *Civilising Subjects* (2002) and Vanessa Dickerson's *Dark Victorians* (2008) read the racism as central and predictive of the late authoritarian turn; some contextualists try to relegate it. The corpus's working position is the centrality reading.\n\n3. **Hero-worship and the \"great man theory.\"** The Spencer-Tolstoy-Marx critique of \"great man theory\" (Spencer coined the phrase in 1873 as a critique of Carlyle) versus the contemporary academic reading of *On Heroes* as theology rather than historiography (Vanden Bossche, Jessop, Sorensen). The popular-management revival is uncritical and separate.\n\n4. **Was Carlyle a Christian, post-Christian, non-Christian, or sui generis?** Four readings on offer: Jessop's \"still a Calvinist\" (substrate persistence), Basil Willey's \"religious unbeliever,\" Ashton's \"Goethean pantheist,\" and the \"prophet without portfolio\" reading. The substrate document argues the first reading subsumes the others.\n\n5. **The Yarvin appropriation.** Yarvin's 2009 \"Why Carlyle Matters\" and the \"Moldbug on Carlyle\" series at Unqualified Reservations explicitly named Carlyle as master, with a \"basic Carlylean syllabus\" of *Chartism*, *Latter-Day Pamphlets*, *Shooting Niagara*, and *Occasional Discourse*. The appropriation has reached high enough into U.S. politics through Vance and the broader \"Dark Enlightenment\" to make Carlyle's name newsworthy. Carlyle scholars regard the reading as substantively misleading (Yarvin's Carlyle is hollowed of the Reformed substrate, the religious moralism, and the constraints they impose) but the political-cultural reach is real.\n\n6. **The eco-critical / Condition-of-England recovery.** *Past and Present* as the founding text of the British anti-industrial tradition, with continuing influence on degrowth, post-work, and ecocritical strands. Constrained by William Morris's criticism in *News from Nowhere* (the Gospel of Work as \"hypocritical and false\") and by the Yarvin overhang.\n\n7. **The Jane Welsh Carlyle question and feminist scholarship.** The recovery of Jane as a literary figure in her own right (Christianson, Ashton, Eilenberg). The Froude controversy. The Lady Ashburton episode.\n\n8. **Was Carlyle a hypocrite about labor?** The Gospel of Work preached by a man who lived on Jane's modest inheritance and on book income. Recent critiques. (See `04_Live_Debates_And_Dynamics.md`, eight numbered claims.)\n\n---\n\n## Comparative Frame (Brief)\n\nCarlyle is most clearly seen in eight comparisons (`05_Adjacent_And_Comparative.md`). With **Emerson**, he is the dark fork of the same post-Calvinist road — Unitarian-liberalized New England Puritanism (Emerson) vs. unreformed Annandale Seceder Calvinism (Carlyle) producing two stable but opposite resolutions of the same religious problem. With **Ruskin**, he is the prophet who needed a more humane disciple to make his doctrine liveable; Ruskin extends Carlyle's economic-moral diagnosis into the British socialist tradition while softening the obedience-doctrine into a doctrine of service. With **Newman**, he is the road *not* taken back to Rome; the Victorian \"loss of faith\" had multiple destinations. With **Kierkegaard**, he is the same diagnosis (bourgeois Christendom as Sham) rendered *outward* rather than *inward*; the axial difference (political prophecy vs. interior writing) tracks back to Calvinist vs. Pietist substrates.\n\nWith **Goethe**, he is the Weimar serenity Calvinized into thunder. With **Nietzsche**, he is the embarrassed father from whom the heir cannot stop borrowing (Nietzsche's *Twilight of the Idols* §12: \"muddleheaded,\" \"noisy,\" \"an English atheist who makes it a point of honour not to be one\" — and yet the hero-frame, the contempt for shopkeeper modernity, the polemic against equality are all Carlylean). With the **Bismarckian / Wilhelmine German reception**, he is what Carlyle looks like once the Scottish-Calvinist substrate is invisible — pure authoritarianism without the moral checks. And alongside Hawthorne, Stowe, Melville, Marilynne Robinson, and Reinhold Niebuhr — read as instances of the broader phenomenon of **secularized Calvinism** — Carlyle stops looking like a historical curiosity and starts looking like the loudest case of something that runs all through nineteenth- and twentieth-century moral imagination: Calvinism's afterlife once its dogmatic creed has dissolved. The substrate is load-bearing. Everything else is scaffolding.\n\n---\n\n## Forecast (Brief)\n\nFor Carlyle's scholarly and cultural standing through 2035, five scenarios cover the realistic outcome space (`Future_Trajectory.md`).\n\n**Quiet Recovery (~45%)** is the modal scenario. The Strouse Edition completes in September 2026, the *Letters* finished in 2023, the Jessop substrate frame becomes the most-cited interpretive lens in *Carlyle Studies Annual* and at NAVSA, and the field produces 2-3 significant monographs through 2030. Undergraduate teaching remains pinched at anthology fragments because the *Occasional Discourse* problem is not solved. Public reception is shaped by the Yarvin-Vance political overhang. The two motions (slow scholarly recovery, fast political overhang) coexist at different latitudes.\n\n**Politically Toxic / Scholarly Retreat (~20%)** if the post-liberal political moment intensifies. The Yarvin-Carlyle channel becomes politically charged enough that the academic field contracts; *Carlyle Studies Annual* loses institutional support; Carlyle becomes a recognized proxy for \"the bad old reactionary tradition\" and is pushed further from curricula. Historical analog: Heidegger's reception through the *Black Notebooks* (2014) — field contraction, not collapse.\n\n**Substrate Synthesis (~15%)** if the Jessop-style Reformed-Calvinist reading becomes the dominant interpretive frame across both academic and lay reception. The political-appropriation question is settled by the recognition that Carlyle's substrate is irreducibly Reformed-Christian, not authoritarian; the right's reading is exposed as ahistorical; the secularization-of-Calvinism literature (Taylor's *Secular Age*, Robinson's essays, Walzer's *Revolution of the Saints*) provides the wider frame. Most likely vector for this scenario is a major Reformed-Protestant theological recovery or a popular essay that lands the substrate point in mainstream cultural conversation.\n\n**Surprise Mainstream Recovery (~15%)** via one of four sub-vectors: the work-and-AI vector (the Gospel of Work as a frame for the AI-displacement conversation); the eco-critical vector (the Condition-of-England diagnosis as ancestral to degrowth / post-work theory); a major new biography or biographical film; or a religion-and-secularization conversation in which Carlyle is one of the canonical cases.\n\n**Residual tail (~5%)** for events not anticipated above.\n\nThe substrate frame is forecast to win at the academic level (probability ~70% of being dominant in Carlyle Studies by 2035) but is unlikely to carry the public reception (~10%) — the asymmetry between analytic power and social uptake is intellectually important.\n\nThe largest exogenous variable is the 2028 U.S. political cycle and Vance's trajectory; this is the single source of greatest forecast uncertainty.\n\n**Key falsifiability triggers:**\n\n- The Strouse *Latter-Day Pamphlets I-II* publication in September 2026 (proceeds → Quiet Recovery on track; major delay → field-fragility signal).\n- A 2027-28 monograph wave (or its absence) from younger scholars.\n- The 2028 U.S. political cycle outcome.\n- *Carlyle Studies Annual* editorial succession in 2029-30.\n- A first substrate-frame popular essay landing in *The Atlantic* / *London Review of Books* / similar by 2030.\n- A trade biography in the 2032-33 window.\n\n(See `Future_Trajectory.md` in full for the structured scenario blocks, the reference-class analysis, the active drivers, and the fourteen named \"what would change my forecast\" triggers ranked by expected magnitude.)\n\n---\n\n## Where This Corpus Stops\n\nFour honest limits.\n\n**1. The *Frederick* labor is treated as biographical event rather than directly read.** The six-volume *History of Friedrich II of Prussia* is the longest work in Carlyle's corpus and the central document for the German-nationalist reception, but the present briefing engages it through `02_Modern_Arc.md` rather than through direct close reading. A reader who wants the *Frederick* substantively should go to Morrow's work and to the Strouse edition.\n\n**2. The translation question is not pursued.** Carlyle's German translations (Schiller, *Wilhelm Meister*, the *German Romance* anthology) were the laboratory in which the mature voice was forged. The corpus gestures at this in `01_Origins_And_Deep_History.md` and `02_Modern_Arc.md` but does not do a translation-studies analysis of how Carlyle's translation choices shaped his English prose.\n\n**3. The non-Anglophone reception is thinner than ideal.** German-language scholarship on Carlyle is patchy in 2026; French scholarship is thin; East Asian scholarship is largely invisible to English-language search. The corpus is aware of this limitation but has not closed it.\n\n**4. The forecast on the political appropriation depends on a small reference class.** The Heidegger / Schmitt analogs are the closest precedents for the Carlyle case but neither is identical. The probability allocation between Quiet Recovery and Politically Toxic depends on judgments about the 2026-2028 U.S. political cycle that no one can make with high confidence at this distance.\n\n---\n\n## Pointers\n\n- Scottish Calvinist origins (1795-1825): [01_Origins_And_Deep_History.md](carlyle-research.html#ch-1)\n- Mature arc (1825-1881): [02_Modern_Arc.md](carlyle-research.html#ch-2)\n- Current Carlyle Studies institutional landscape: [03_Current_Structure_And_Actors.md](carlyle-research.html#ch-3)\n- Live debates and contemporary contestation: [04_Live_Debates_And_Dynamics.md](carlyle-research.html#ch-4)\n- Comparative frame (Emerson, Ruskin, Newman, Kierkegaard, Nietzsche, secularized Calvinism): [05_Adjacent_And_Comparative.md](carlyle-research.html#ch-5)\n- **The Calvinist substrate centerpiece**: [06_Drivers_And_Forces.md](carlyle-research.html#ch-6)\n- Direct readings of the major works: [07_Primary_Sources.md](carlyle-research.html#ch-7)\n- Forecast through 2035: [Future_Trajectory.md](carlyle-research.html#ch-8)\n- Fact-check pass on the corpus: Verification_Notes.md\n- Annotated source list: Sources.md\n- Machine-readable digest: [manifest.json](manifest.json)"}, {"order": 1, "file": "collection-heroes-and-history-1.md", "title": "Carlyle's Argument and the Theory of Revolution", "summary": "The Book That Burned", "body": "*From [The Book That Burned](carlyle-french-revolution-research.html#ch-5) — chapter 6*\n\n# Carlyle's Argument and the Theory of Revolution\n\n## Bottom Line\n\n*The French Revolution: A History* (1837) is not, despite its title and its three-volume bulk, primarily a chronicle. It is a work of argument disguised as narration — a prophetic theory of what revolution *is*, dramatized through the events of 1774–1795. The argument has a single hinge: **revolution is the violent return of Reality after an age of Shams.** When belief, sincerity, and just authority have rotted out of a society — when its kings, priests, and constitutions have become hollow \"formulas\" and \"Paper\" with no living fact behind them — the suppressed truth erupts as elemental force. Carlyle calls this eruption **Sansculottism**, and reads it as the \"Death-Birth of a World\": simultaneously a judgment, a destruction, and a (terrible, unwilled) act of renewal. The Revolution is the working-out of \"the Eternal\" — an inevitable and, in Carlyle's eschatological grammar, even righteous verdict on aristocratic and clerical \"Imposture,\" however horrific its means. Around this core run six secondary arguments: a providential-necessitarian theology of history; the master-opposition of Sham vs. Reality; an embryonic \"great-man\" reading in which the Revolution is a *failed search for a true ruler* (Mirabeau the one possible pilot, Danton the natural force, Napoleon the \"whiff of grapeshot\" that ends it); an ambivalent, half-fascinated, half-appalled treatment of the crowd and the Terror that pointedly *refuses simply to condemn*; and a scorching anti-philosophe polemic against Voltaire, the \"Evangel of Jean-Jacques,\" and abstract \"Logic.\" What the book conspicuously does *not* offer is economic, social-structural, or ideological-causal analysis. Two tensions run through it and have driven the scholarship for 150 years: the unresolved quarrel between **determinism** (the Revolution as inevitable necessity) and **heroism** (the Revolution as remediable by a great man); and the dangerous proximity of Carlyle's doctrine of *righteous, regenerative violence* to later authoritarian and proto-fascist readings — a charge that is **genuinely contested**, with most current literary scholarship reading the 1837 book as radical-progressive rather than proto-fascist while conceding the later Carlyle supplies the darker material.\n\n---\n\n## 1. The Theory of Revolution: Reality Erupting Through Sham\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 472\" role=\"img\" aria-label=\"A vertical conflagration. At the base a dark band reads THE INFINITE DEEP, the suppressed Reality bursting up. A column of flame rises through the centre, consuming a ghosted hollow crown labelled SHAM. From the apex of the flame two rays split — a blue ray of heaven to the left, an ember ray of hellfire to the right — and a phoenix rises above, labelled PALINGENESIA, the New-Birth. Flanking labels read DEATH, the backward-looking judgment on an age of Shams, and BIRTH, the forward-looking renewal.\">\n<text x=\"350\" y=\"28\" text-anchor=\"middle\" font-size=\"15\" class=\"t-serif\" letter-spacing=\"3\">THE DEATH-BIRTH OF A WORLD<\/text>\n<text x=\"350\" y=\"46\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">Sansculottism as conflagration &#8212; Carlyle&#8217;s theory of revolution, 1837<\/text>\n<polygon points=\"352,150 210,256 244,262 352,168\" class=\"f-t4\" opacity=\".22\"/>\n<polygon points=\"352,150 494,256 460,262 352,168\" class=\"f-t1\" opacity=\".22\"/>\n<path d=\"M352,128 C 320,120 294,102 268,74 C 300,98 326,104 350,120 Z\" class=\"f-t3\"/>\n<path d=\"M352,128 C 384,120 410,102 436,74 C 404,98 378,104 354,120 Z\" class=\"f-t3\"/>\n<ellipse cx=\"352\" cy=\"132\" rx=\"9\" ry=\"17\" class=\"f-t2\"/>\n<circle cx=\"352\" cy=\"108\" r=\"6\" class=\"f-t2\"/>\n<polygon points=\"346,100 352,86 358,100\" class=\"f-t2\"/>\n<text x=\"352\" y=\"66\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" class=\"t-acc\">PALINGENESIA<\/text>\n<text x=\"352\" y=\"78\" text-anchor=\"middle\" font-size=\"8.8\" class=\"t-muted\">the New-Birth<\/text>\n<polygon points=\"252,400 282,330 262,298 304,246 286,220 332,196 318,166 352,150 386,166 372,220 414,246 396,298 422,330 452,400\" class=\"f-t1\"/>\n<polygon points=\"284,400 306,344 292,312 324,276 312,250 346,222 340,200 352,182 364,200 358,250 390,278 378,312 394,344 416,400\" class=\"f-t2\"/>\n<polygon points=\"316,400 332,350 322,318 348,272 352,236 360,274 380,320 368,352 384,400\" class=\"f-t3\"/>\n<path d=\"M320,338 L325,306 L337,323 L348,300 L352,318 L361,298 L371,321 L383,304 L386,338\" fill=\"none\" class=\"ln\" stroke-width=\"1.4\" opacity=\".6\" style=\"stroke:var(--bg)\"/>\n<line x1=\"320\" y1=\"338\" x2=\"386\" y2=\"338\" class=\"ln\" stroke-width=\"1.4\" opacity=\".6\" style=\"stroke:var(--bg)\"/>\n<text x=\"352\" y=\"362\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\" class=\"t-inv\" letter-spacing=\"1\">SHAM<\/text>\n<text x=\"352\" y=\"374\" text-anchor=\"middle\" font-size=\"8\" class=\"t-inv\" opacity=\".85\">crown &#183; Paper &#183; Formula<\/text>\n<text x=\"232\" y=\"234\" text-anchor=\"middle\" font-size=\"9\" class=\"t-muted\" font-style=\"italic\">heaven on one side&#8230;<\/text>\n<text x=\"470\" y=\"234\" text-anchor=\"middle\" font-size=\"9\" class=\"t-acc\" font-style=\"italic\">&#8230;hellfire on the other<\/text>\n<text x=\"86\" y=\"250\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"bold\" class=\"t-serif\">DEATH<\/text>\n<text x=\"86\" y=\"266\" text-anchor=\"middle\" font-size=\"8.6\" class=\"t-muted\">judgment on<\/text>\n<text x=\"86\" y=\"277\" text-anchor=\"middle\" font-size=\"8.6\" class=\"t-muted\">an age of Shams<\/text>\n<text x=\"86\" y=\"291\" text-anchor=\"middle\" font-size=\"9\" class=\"t-acc\">&#10229; backward<\/text>\n<text x=\"618\" y=\"250\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"bold\" class=\"t-serif\">BIRTH<\/text>\n<text x=\"618\" y=\"266\" text-anchor=\"middle\" font-size=\"8.6\" class=\"t-muted\">destruction clears<\/text>\n<text x=\"618\" y=\"277\" text-anchor=\"middle\" font-size=\"8.6\" class=\"t-muted\">the ground<\/text>\n<text x=\"618\" y=\"291\" text-anchor=\"middle\" font-size=\"9\" class=\"t-acc\">forward &#10230;<\/text>\n<rect x=\"150\" y=\"404\" width=\"400\" height=\"30\" rx=\"2\" style=\"fill:var(--t4)\" opacity=\".92\"/>\n<text x=\"350\" y=\"423\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" class=\"t-inv\" letter-spacing=\"1\">THE INFINITE DEEP &#8212; Reality bursts up, uncontrollable<\/text>\n<text x=\"350\" y=\"458\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\" font-style=\"italic\">One fire, two valences &#8212; judgment <tspan class=\"t-acc\">and<\/tspan> birth at once &#8212; which is why radicals, Engels, and later authoritarians could each claim it.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 3.<\/strong> Carlyle&#8217;s Revolution is not a chronicle but a conflagration: when a regime hollowed to <em>Sham<\/em> can no longer hold, the suppressed Reality bursts up from &#8220;the infinite Deep&#8221; and burns the old world to clear the new. The fire faces two ways at once &#8212; a backward judgment on imposture and a forward &#8220;Palingenesia&#8221; &#8212; and that doubled valence (&#8220;rays as of heaven on one side; girt&#8230;as with hellfire&#8221;) is exactly what makes the book ethically combustible.<\/figcaption>\n<\/figure>\n\n\nCarlyle's central theoretical claim — and this is the consensus reading of the book's thesis — is that revolution occurs when a society's governing forms (its monarchy, its church, its laws, its social authority) have ceased to correspond to any living reality, becoming mere \"Shams,\" and the suppressed Reality erupts as uncontrollable elemental force. The Revolution is therefore not an aberration imposed *on* a healthy society but the *consequence* of a society already inwardly dead.\n\nThe opposition of **Sham** and **Reality** is the organizing axis of everything Carlyle wrote, but in *The French Revolution* it becomes a theory of historical causation. The *ancien régime* is depicted as a structure of outlived forms: a monarchy that no longer commands real belief, a nobility that performs privilege without function, a Church gone formal. Carlyle's own briefing of the thesis (echoed across the existing Carlyle corpus and the primary text) is that \"an *ancien régime* hollowed out by Sham could not survive the moment of crisis, and that the violence of the Revolution was the externalized form of the inner rot the regime had failed to address\" [11]. The Revolution does not *create* the chaos; it *reveals* a chaos already latent. As Carlyle puts it, \"Anarchy breaks prison; bursts up from the infinite Deep, and rages uncontrollable, immeasurable, enveloping a world; in phasis after phasis of fever-frenzy\" [3]. The image is geological and oceanic: a suppressed force breaking through a crust.\n\nThe mature scholarly statement of this is Albert J. LaValley's *Carlyle and the Idea of the Modern* (1968), which reads Carlyle's sensibility as \"profoundly eschatological,\" informed by \"the biblical desire to force the judgment day\" and the urge to bring society into congruence with the \"eternal Laws\" of the universe [5]. Chris Vanden Bossche, in *Carlyle and the Search for Authority* (1991), frames the same thesis as a crisis of *authority*: the constitutional monarchy \"institutionalizes conflict without generating genuine belief,\" so that \"paper documents cannot sustain authority when power fragments\" [4]. The Revolution is what happens when the gap between form and fact becomes total.\n\nIf Sham-and-Reality is the axis, **Sansculottism** is the name Carlyle gives the force that erupts along it — read not as a political faction but as a cosmic, quasi-natural phenomenon, the simultaneous death of one world and birth of another, figured through fire, phoenix, and apocalypse. This is the book's most distinctive conceptual move and the one that most separates it from Whig and Thiers-style political history. Sansculottism is treated as an elemental power, \"the Death-Birth of a World\" — in Carlyle's own phrase a \"cloudy 'death-birth of a world': huge smoke-cloud, streaked with rays as of heaven on one side; girt on the other as with hellfire!\" [2][3]. The phrasing is deliberately double: heaven on one side, hellfire on the other; destruction and renewal as a single event. The governing metaphor is the **Phoenix** — Carlyle imaged \"the burning of a World-Phoenix\" to represent the cyclical death and \"Palingenesia, or New-birth\" of civilizations, a figure he had already developed in *Sartor Resartus* (1833–34) and now applies to 1789–95 [6][7]. Vanden Bossche notes that Sansculottism is presented as a *living, continuing* force — Carlyle writes that it \"still lives\" and \"still works far and wide,\" so that the Paris revolt of 1830 and the Reform agitation of 1832 are read as its ongoing rebirth [4]. The Revolution, on this view, is not an event safely sealed in the past but a permanent possibility — \"Carlyle's Eternal Return,\" in the phrase of Mark Allison's 2022 reframing [1].\n\nA crucial and counter-intuitive consequence, drawn out by Allison: for Carlyle revolution is not a unique aberration but the *intensification of a universal condition*. \"All things are in revolution; in change from moment to moment,\" Carlyle holds; revolutionary periods merely *accelerate* a process inherent to existence [1]. The Terror, in this reading, is the limit-case of a desperation that \"pushed far enough, completes the circle ... becomes a kind of genuine productive hope again\" — an *inverted utopianism* in which annihilation clears the ground for a future, perfected form [1].\n\n---\n\n## 2. Providence, Necessity, and Divine Justice\n\nCarlyle reads the Revolution as providential history: the inevitable working-out of \"the Eternal,\" a divine verdict on aristocratic and clerical \"Imposture,\" righteous in its cause however terrible in its means. The theological framing is established; the *normative* reading — that Carlyle himself endorses the verdict — is contested in its emphasis.\n\nCarlyle's history is providential in the Reformed (Scottish Calvinist) mode: events bear moral weight, \"nothing merely happens,\" and the visible chaos is \"the working-out of an invisible verdict\" [11]. He believed, in the standard summary, that \"the excesses of the French Revolution were a divine judgment upon a selfish monarchy and nobility\" [5][12]. The aristocracy and clergy are guilty of *Imposture* — of claiming an authority they no longer embody — and the Revolution is the cosmos collecting the debt. This is why Carlyle, despite his horror at the Terror, sided unambiguously with the early Revolution against the old order: he \"saw the events of 1789–91 as the true revolution, believing the monarchy and aristocracy were filled with incompetence and corruption and got what they deserved\" [a]. Hedva Ben-Israel's *English Historians on the French Revolution* (Cambridge, 1968) places Carlyle within an English \"school\" that shared aims, methods, and a political point of view, but identifies Carlyle's distinctive contribution as the *moral-providential* framing absent from the more juristic Croker or the Whiggish Smyth [8].\n\nThat providential frame carries a complication that is load-bearing for everything that follows: Carlyle treats the Revolution as inevitable (\"necessity\"), yet pointedly rejects the inexorable-forces determinism of Thiers in favor of a view that preserves individual moral responsibility and the possibility of heroic agency. This is the single most important conceptual tension in the book, and it is genuinely unresolved in the text. On one hand, the providential frame makes the Revolution *necessary* — a verdict that *had* to fall. On the other, Carlyle \"rejected Thiers' deterministic view of history which emphasised inexorable historical forces over individual moral responsibility\" [9][5]. LaValley's formulation is that Carlyle's necessity is *eschatological*, not mechanical: it is \"the biblical desire to force the judgment day,\" a moral inevitability rather than a physical one [5]. The difference matters enormously for the rest of the argument: if the Revolution is morally (not mechanically) necessary, then a sufficiently great man — a Mirabeau — might in principle have *guided* the verdict to a less catastrophic execution. The determinism opens the door; heroism is what might have walked through it. The two readings sit unreconciled in the book, and the scholarship has argued the balance ever since (see §4, §8).\n\n---\n\n## 3. Sham vs. Reality and the Critique of the Ancien Régime\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 520\" role=\"img\" aria-label=\"A two-column opposition arranged as a balance. The left column, headed SHAM, is the visible vesture or Paper: a hollow crown for a monarchy that no longer commands belief, nobility performing privilege without function, a Church gone formal, the philosophes&#8217; Logic, the assignat currency, the Drury-Lane Sham-King, and the heavy ornamented berline at Varennes that cannot move. The right column, headed REALITY, is living Fact and Force: Sansculottism, the suppressed Reality bursting from the infinite Deep, fact, force, belief, the Eternal. A central vertical axis is labelled Paper, right-arrow left-arrow, Fact. A small return-arrow at the foot carries the irony: the Revolution destroys the old Shams and at once manufactures new ones, so the narrative keeps deflating into the mock-heroic.\">\n<text x=\"350\" y=\"30\" text-anchor=\"middle\" font-size=\"15\" class=\"t-serif\" letter-spacing=\"3\">SHAM AND REALITY<\/text>\n<text x=\"350\" y=\"48\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">the axis on which the whole book is sorted<\/text>\n<line x1=\"350\" y1=\"70\" x2=\"350\" y2=\"446\" class=\"ln\" stroke-width=\"1.4\" opacity=\".55\"/>\n<polygon points=\"350,66 345,78 355,78\" class=\"f-t4\"/>\n<polygon points=\"350,450 345,438 355,438\" class=\"f-t1\"/>\n<rect x=\"318\" y=\"246\" width=\"64\" height=\"26\" rx=\"3\" class=\"f-panel\" style=\"stroke:var(--border)\" stroke-width=\"1\"/>\n<text x=\"350\" y=\"259\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\" class=\"t-mono\">Paper<\/text>\n<text x=\"350\" y=\"269\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-mono\">&#8594;&#8592; Fact<\/text>\n<text x=\"166\" y=\"92\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"bold\" class=\"t-serif\" letter-spacing=\"1\">SHAM<\/text>\n<text x=\"166\" y=\"106\" text-anchor=\"middle\" font-size=\"8.6\" class=\"t-muted\" font-style=\"italic\">the visible vesture &#8212; &#8220;Paper&#8221;<\/text>\n<text x=\"534\" y=\"92\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"bold\" class=\"t-serif\" letter-spacing=\"1\">REALITY<\/text>\n<text x=\"534\" y=\"106\" text-anchor=\"middle\" font-size=\"8.6\" class=\"t-muted\" font-style=\"italic\">living Fact &#183; Force<\/text>\n<rect x=\"34\" y=\"120\" width=\"264\" height=\"40\" rx=\"3\" class=\"f-t4\" opacity=\".16\"/>\n<rect x=\"34\" y=\"120\" width=\"4\" height=\"40\" class=\"f-t4\"/>\n<text x=\"50\" y=\"137\" font-size=\"10.5\" font-weight=\"bold\" class=\"t-acc\">Crown without belief<\/text>\n<text x=\"50\" y=\"151\" font-size=\"8.4\" class=\"t-muted\">a monarchy that no longer commands belief<\/text>\n<rect x=\"34\" y=\"166\" width=\"264\" height=\"40\" rx=\"3\" class=\"f-t4\" opacity=\".16\"/>\n<rect x=\"34\" y=\"166\" width=\"4\" height=\"40\" class=\"f-t4\"/>\n<text x=\"50\" y=\"183\" font-size=\"10.5\" font-weight=\"bold\" class=\"t-acc\">Privilege without function<\/text>\n<text x=\"50\" y=\"197\" font-size=\"8.4\" class=\"t-muted\">nobility performing the rank it no longer earns<\/text>\n<rect x=\"34\" y=\"212\" width=\"264\" height=\"40\" rx=\"3\" class=\"f-t4\" opacity=\".16\"/>\n<rect x=\"34\" y=\"212\" width=\"4\" height=\"40\" class=\"f-t4\"/>\n<text x=\"50\" y=\"229\" font-size=\"10.5\" font-weight=\"bold\" class=\"t-acc\">A Church gone formal<\/text>\n<text x=\"50\" y=\"243\" font-size=\"8.4\" class=\"t-muted\">creed emptied to ceremony<\/text>\n<rect x=\"34\" y=\"258\" width=\"264\" height=\"40\" rx=\"3\" class=\"f-t4\" opacity=\".16\"/>\n<rect x=\"34\" y=\"258\" width=\"4\" height=\"40\" class=\"f-t4\"/>\n<text x=\"50\" y=\"275\" font-size=\"10.5\" font-weight=\"bold\" class=\"t-acc\">&#8220;Paper&#8221; &#183; the philosophes&#8217; Logic<\/text>\n<text x=\"50\" y=\"289\" font-size=\"8.4\" class=\"t-muted\">constitutions, formulas, the assignat currency<\/text>\n<rect x=\"34\" y=\"304\" width=\"264\" height=\"40\" rx=\"3\" class=\"f-t4\" opacity=\".16\"/>\n<rect x=\"34\" y=\"304\" width=\"4\" height=\"40\" class=\"f-t4\"/>\n<text x=\"50\" y=\"321\" font-size=\"10.5\" font-weight=\"bold\" class=\"t-acc\">The Drury-Lane &#8220;Sham-King&#8221;<\/text>\n<text x=\"50\" y=\"335\" font-size=\"8.4\" class=\"t-muted\">majesty acted on a stage, not held by right<\/text>\n<rect x=\"34\" y=\"350\" width=\"264\" height=\"48\" rx=\"3\" class=\"f-t5\" opacity=\".22\"/>\n<rect x=\"34\" y=\"350\" width=\"4\" height=\"48\" class=\"f-t5\"/>\n<text x=\"50\" y=\"367\" font-size=\"10.5\" font-weight=\"bold\" class=\"t-acc\">The berline at Varennes<\/text>\n<text x=\"50\" y=\"381\" font-size=\"8.4\" class=\"t-muted\">encrusted privilege &#8212; a heavy ornamented<\/text>\n<text x=\"50\" y=\"392\" font-size=\"8.4\" class=\"t-muted\">real object that cannot move<\/text>\n<rect x=\"402\" y=\"120\" width=\"264\" height=\"62\" rx=\"3\" class=\"f-t1\" opacity=\".14\"/>\n<rect x=\"662\" y=\"120\" width=\"4\" height=\"62\" class=\"f-t1\"/>\n<text x=\"650\" y=\"137\" text-anchor=\"end\" font-size=\"10.5\" font-weight=\"bold\" style=\"fill:var(--t1)\">Sansculottism<\/text>\n<text x=\"650\" y=\"151\" text-anchor=\"end\" font-size=\"8.4\" class=\"t-muted\">the suppressed Reality bursting<\/text>\n<text x=\"650\" y=\"162\" text-anchor=\"end\" font-size=\"8.4\" class=\"t-muted\">from &#8220;the infinite Deep&#8221;<\/text>\n<text x=\"650\" y=\"175\" text-anchor=\"end\" font-size=\"8.4\" class=\"t-muted\">uncontainable, undeniable<\/text>\n<rect x=\"402\" y=\"190\" width=\"264\" height=\"40\" rx=\"3\" class=\"f-t2\" opacity=\".16\"/>\n<rect x=\"662\" y=\"190\" width=\"4\" height=\"40\" class=\"f-t2\"/>\n<text x=\"650\" y=\"207\" text-anchor=\"end\" font-size=\"10.5\" font-weight=\"bold\" class=\"t-acc\">Fact &#183; Force &#183; Belief<\/text>\n<text x=\"650\" y=\"221\" text-anchor=\"end\" font-size=\"8.4\" class=\"t-muted\">what is, what compels, what is held true<\/text>\n<rect x=\"402\" y=\"236\" width=\"264\" height=\"40\" rx=\"3\" class=\"f-t3\" opacity=\".24\"/>\n<rect x=\"662\" y=\"236\" width=\"4\" height=\"40\" class=\"f-t3\"/>\n<text x=\"650\" y=\"253\" text-anchor=\"end\" font-size=\"10.5\" font-weight=\"bold\" class=\"t-serif\">&#8220;The Eternal&#8221;<\/text>\n<text x=\"650\" y=\"267\" text-anchor=\"end\" font-size=\"8.4\" class=\"t-muted\">the ground that outlives every vesture<\/text>\n<ellipse cx=\"534\" cy=\"330\" rx=\"11\" ry=\"20\" class=\"f-t2\"/>\n<circle cx=\"534\" cy=\"304\" r=\"7\" class=\"f-t2\"/>\n<polygon points=\"527,296 534,282 541,296\" class=\"f-t2\"/>\n<path d=\"M534,318 C 520,310 514,296 516,282 C 524,296 532,302 534,312 Z\" class=\"f-t3\"/>\n<text x=\"534\" y=\"360\" text-anchor=\"middle\" font-size=\"9\" class=\"t-muted\" font-style=\"italic\">the living Fact does not<\/text>\n<text x=\"534\" y=\"371\" text-anchor=\"middle\" font-size=\"9\" class=\"t-muted\" font-style=\"italic\">need to be believed in<\/text>\n<rect x=\"34\" y=\"416\" width=\"632\" height=\"62\" rx=\"3\" class=\"f-panel\" style=\"stroke:var(--border)\" stroke-width=\"1\"/>\n<text x=\"48\" y=\"436\" font-size=\"9.5\" font-weight=\"bold\" class=\"t-acc\" letter-spacing=\"1\">THE IRONY &#8212; the return-arrow<\/text>\n<path d=\"M118,452 C 250,488 450,488 582,452\" fill=\"none\" class=\"s-t1\" stroke-width=\"1.6\"/>\n<polygon points=\"118,452 124,460 130,449\" class=\"f-t1\"/>\n<text x=\"350\" y=\"471\" text-anchor=\"middle\" font-size=\"8.8\" class=\"t-muted\">Revolution burns the old Shams, then at once manufactures new ones &#8212; new constitutions, new &#8220;Paper&#8221; &#8212; and the tale deflates into &#8220;mock-heroic.&#8221;<\/text>\n<text x=\"350\" y=\"500\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\" font-style=\"italic\">Every event is tried by one question &#8212; <tspan class=\"t-acc\">living Reality or outlived Sham?<\/tspan> &#8212; and revolution is the gap between form and fact gone total.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 4.<\/strong> The whole folio runs on a single sorting axis: on the left the visible vesture &#8212; a crown without belief, privilege without function, a Church gone formal, the philosophes&#8217; &#8220;Paper&#8221; and the assignat, the Drury-Lane &#8220;Sham-King,&#8221; and the encrusted berline at Varennes that cannot move; on the right the living Fact &#8212; Sansculottism bursting from &#8220;the infinite Deep,&#8221; force, belief, &#8220;the Eternal.&#8221; Carlyle judges every event by one question &#8212; Reality or Sham? &#8212; and revolution is what happens when the gap between form and fact becomes total. The return-arrow is the cruelty of the book: the Revolution unmasks the old &#8220;Paper&#8221; only to print new constitutions of its own, so each triumph deflates back into the mock-heroic.<\/figcaption>\n<\/figure>\n\n\nCarlyle organizes his critique of the old order — and of the Revolution's own failures — around the opposition of \"Paper\" (constitutions, formulas, assignats, the products of \"Logic\") to living fact, treating the proliferation of paper as the symptom of a society that has lost contact with reality. The Sham/Reality axis becomes concrete in Carlyle's recurrent contempt for \"Paper\" and \"Formula.\" Constitutions are paper; the assignat currency is paper; the philosophes' systems are formula. All share the vice of substituting a written abstraction for a lived reality. Vanden Bossche's reading is that the constitutional monarchy fails precisely because \"paper documents cannot sustain authority when power fragments\" — the *berline* in which the royal family flees to Varennes is read as a symbol of \"monarchy's encrusted privilege,\" a heavy, ornamented, real object that nonetheless cannot move [4]. Carlyle's symbolic method (the Bastille = breaking old structures; the berline = encrusted privilege) is itself an argument *against* paper: meaning lives in things and events, not in formulas about them [4]. The deep irony Carlyle presses is that the Revolution, having destroyed the old Shams, immediately manufactures new ones — new constitutions, new formulas, new paper — which is why the narrative cannot resolve into triumphant epic but keeps deflating into \"mock-heroic\" irony [4].\n\n---\n\n## 4. Heroes and Their Absence: The Embryonic \"Great-Man\" Reading\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 392\" role=\"img\" aria-label=\"A two-track timeline running left to right from 1791 to October 1795. An upper heroic thread carries three named nodes &#8212; Mirabeau (dies April 1791), Danton (mid, doomed), and Napoleon (13 Vend&#233;miaire, 5 October 1795) &#8212; each a great man thrown up and then lost, marked by a small ember flame at the moment of loss. Beneath the heroic thread, a continuous wave band labelled SANSCULOTTISM runs the whole width as the impersonal tide. A central note marks that Carlyle never resolves whether the men or the tide drive history.\">\n<text x=\"350\" y=\"30\" text-anchor=\"middle\" font-size=\"15\" class=\"t-serif\" letter-spacing=\"3\">THE SEARCH FOR A PILOT<\/text>\n<text x=\"350\" y=\"48\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">great men thrown up and lost, over the impersonal tide<\/text>\n<line x1=\"40\" y1=\"92\" x2=\"660\" y2=\"92\" class=\"ln\" stroke-width=\"1.4\"/>\n<text x=\"40\" y=\"80\" text-anchor=\"start\" font-size=\"8.5\" class=\"t-mono t-muted\">1791<\/text>\n<text x=\"350\" y=\"80\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-mono t-muted\">mid<\/text>\n<text x=\"660\" y=\"80\" text-anchor=\"end\" font-size=\"8.5\" class=\"t-mono t-muted\">OCT 1795<\/text>\n<text x=\"50\" y=\"115\" text-anchor=\"start\" font-size=\"8.5\" class=\"t-muted\" font-style=\"italic\" letter-spacing=\"1\">THE HEROIC THREAD &#8212; the would-be pilots<\/text>\n<g>\n<line x1=\"120\" y1=\"92\" x2=\"120\" y2=\"150\" class=\"ln-soft\" stroke-width=\"1\"/>\n<polygon points=\"120,80 115,90 125,90\" class=\"f-t2\"/>\n<circle cx=\"120\" cy=\"92\" r=\"6\" class=\"f-t1\"/>\n<circle cx=\"120\" cy=\"92\" r=\"2.4\" class=\"f-bg\"/>\n<text x=\"120\" y=\"166\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\" class=\"t-serif\">MIRABEAU<\/text>\n<text x=\"120\" y=\"180\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\">&#8220;the one possible pilot&#8221;<\/text>\n<text x=\"120\" y=\"191\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\">held France toppling,<\/text>\n<text x=\"120\" y=\"202\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\">&#8220;still unfallen&#8221;<\/text>\n<text x=\"120\" y=\"216\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-acc\">dies April 1791<\/text>\n<\/g>\n<g>\n<line x1=\"350\" y1=\"92\" x2=\"350\" y2=\"150\" class=\"ln-soft\" stroke-width=\"1\"/>\n<polygon points=\"350,80 345,90 355,90\" class=\"f-t2\"/>\n<circle cx=\"350\" cy=\"92\" r=\"6\" class=\"f-t1\"/>\n<circle cx=\"350\" cy=\"92\" r=\"2.4\" class=\"f-bg\"/>\n<text x=\"350\" y=\"166\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\" class=\"t-serif\">DANTON<\/text>\n<text x=\"350\" y=\"180\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\">the natural revolutionary<\/text>\n<text x=\"350\" y=\"191\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\">force &#8212; a Titan,<\/text>\n<text x=\"350\" y=\"202\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\">&#8220;Mirabeau of the Sansculottes&#8221;<\/text>\n<text x=\"350\" y=\"216\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-acc\">doomed<\/text>\n<\/g>\n<g>\n<line x1=\"600\" y1=\"92\" x2=\"600\" y2=\"150\" class=\"ln-soft\" stroke-width=\"1\"/>\n<polygon points=\"600,80 595,90 605,90\" class=\"f-t2\"/>\n<circle cx=\"600\" cy=\"92\" r=\"6\" class=\"f-t1\"/>\n<circle cx=\"600\" cy=\"92\" r=\"2.4\" class=\"f-bg\"/>\n<text x=\"600\" y=\"166\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\" class=\"t-serif\">NAPOLEON<\/text>\n<text x=\"600\" y=\"180\" text-anchor=\"middle\" font-size=\"8\" class=\"t-acc\">&#8220;a whiff of grapeshot&#8221;<\/text>\n<text x=\"600\" y=\"191\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\">13 Vend&#233;miaire &#183; 5 Oct 1795<\/text>\n<text x=\"600\" y=\"202\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\">the Revolution is<\/text>\n<text x=\"600\" y=\"213\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\">&#8220;blown into space&#8221;<\/text>\n<\/g>\n<path d=\"M40,272 Q70,256 100,272 T160,272 T220,272 T280,272 T340,272 T400,272 T460,272 T520,272 T580,272 T640,272 T700,272 L660,272 L660,316 L40,316 Z\" class=\"f-t4\" opacity=\".30\"/>\n<path d=\"M40,272 Q70,256 100,272 T160,272 T220,272 T280,272 T340,272 T400,272 T460,272 T520,272 T580,272 T640,272 T660,272\" fill=\"none\" class=\"s-t4\" stroke-width=\"1.6\"/>\n<path d=\"M40,288 Q70,274 100,288 T160,288 T220,288 T280,288 T340,288 T400,288 T460,288 T520,288 T580,288 T640,288 T660,288\" fill=\"none\" class=\"s-t4\" stroke-width=\"1\" opacity=\".55\"/>\n<rect x=\"40\" y=\"272\" width=\"620\" height=\"44\" fill=\"none\" style=\"stroke:var(--border)\" stroke-width=\"0.8\"/>\n<text x=\"350\" y=\"300\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\" class=\"t-inv\" letter-spacing=\"2\">SANSCULOTTISM<\/text>\n<text x=\"350\" y=\"311\" text-anchor=\"middle\" font-size=\"8\" class=\"t-inv\" opacity=\".88\">the plebeian impersonal tide &#8212; the true protagonist? (Allison 2022)<\/text>\n<line x1=\"350\" y1=\"216\" x2=\"350\" y2=\"272\" class=\"ln-soft\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/>\n<text x=\"350\" y=\"338\" text-anchor=\"middle\" font-size=\"9\" class=\"t-acc\" font-style=\"italic\">determinism vs. heroism &#8212; left unresolved<\/text>\n<text x=\"350\" y=\"368\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\" font-style=\"italic\">Three pilots rise and are lost; the tide beneath them never stops &#8212; and Carlyle never says which is steering.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 5.<\/strong> The book reads the Revolution as a failed search for a pilot: Mirabeau, &#8220;the one possible pilot,&#8221; holds France &#8220;still unfallen&#8221; with his single hand until April 1791; Danton, the Titan &#8220;Mirabeau of the Sansculottes,&#8221; is doomed in turn; and Napoleon&#8217;s &#8220;whiff of grapeshot&#8221; on 13 Vend&#233;miaire (5 Oct 1795) blows the thing into space. Yet beneath all three runs the unbroken wave of Sansculottism &#8212; the impersonal plebeian force many read as the real protagonist (Allison 2022) &#8212; and Carlyle never resolves whether the great men or the tide drive history.<\/figcaption>\n<\/figure>\n\n\n*The French Revolution* contains the seed of the \"great-man\" doctrine Carlyle would systematize in *On Heroes* (1841): the Revolution is read as in part a failed search for a genuine pilot, and that embryonic linkage to *On Heroes* is load-bearing for the corpus. Carlyle himself \"declared that Mirabeau, Danton and Napoleon were the three great men of the Revolution\" [9]. The structure is a search-and-failure: a great society in convulsion repeatedly throws up men who *might* have governed the storm, and repeatedly loses or corrupts them.\n\nMirabeau is the one possible pilot. Carlyle's elegy on Mirabeau's death (April 1791) is the clearest statement: \"The chosen Last of the Mirabeaus is gone; the chosen man of France is gone. It was he who shook old France from its basis; and, as if with his single hand, has held it toppling there, still unfallen\" [10]. The \"single hand\" holding France \"toppling there, still unfallen\" is the great-man thesis in miniature: one real man can, for a time, hold a collapsing order upright, and his death removes the one possible pilot. Danton inherits the role only partly — he is called \"our only Mirabeau now ... whom some call 'Mirabeau of the Sansculottes'\" [b] — and is treated less as a statesman than as a Titan, an elemental energy, the revolutionary equivalent of Sansculottism made flesh, magnificent and doomed. The search finally closes not with a pilot but with a soldier: the Revolution ends, in Carlyle's telling, when Bonaparte fires on the Vendémiaire insurrection (13 Vendémiaire / 5 October 1795) and \"the thing we specifically call French Revolution is blown into space by it\" [c][13]. The phrase \"a whiff of grapeshot\" is Carlyle's coinage, often misattributed to Napoleon himself [c][13]. The book ends not with the Terror but with this act of decisive force — a man imposing order on chaos, prefiguring *On Heroes*' \"Hero as King.\"\n\nYet the great-man material, genuinely present though it is, should not be read back as the full hero-worship doctrine of 1841 — and this is the crux of the determinism-vs-heroism dispute. In 1837 the hero-frame is embryonic, hedged with irony, and embedded in a narrative whose dominant force is the *impersonal* one of Sansculottism, not the heroic individual. Here the scholarship divides. The \"great-man\" reading that became canonical after *On Heroes* and Spencer's hostile coinage of \"great man theory\" (1873) tends to retroject onto the 1837 book a hero-centrism it only partly has. Mark Allison's 2022 reading pushes hard the other way: he argues *The French Revolution* is \"a thoroughgoingly radical work\" whose true subject is **Sansculottism** — the plebeian, collective, impersonal force — *not* great men, and that reading it as proto-*Heroes* misses its argument [1]. Philip Rosenberg's *The Seventh Hero: Thomas Carlyle and the Theory of Radical Activism* (Harvard, 1974) had earlier opened \"the radical dimension of Carlyle's works\" — recovering a Carlyle of *activism* and agency rather than passive hero-worship [d][14] — though reviewers (notably Gertrude Himmelfarb in *Commentary*) complained that Rosenberg could not give the \"activist doctrine\" specific content because Carlyle himself never did [14]. The honest position: the hero-frame is *present in seed* (the Mirabeau elegy, the grapeshot ending), but in 1837 it is checked by, and subordinate to, the impersonal theory of Sansculottism. The unresolved coexistence of the two is the book's central philosophical tension, not a settled doctrine.\n\n---\n\n## 5. The Crowd and Violence: The Refusal Simply to Condemn\n\nCarlyle treats the revolutionary crowd as a force of nature — terrifying, sublime, and in some sense *just* — and pointedly declines the standard conservative move of simple moral condemnation of the Terror, while still recoiling from its specific horrors (and from Robespierre). That he does so is established; the *interpretation* of what his ambivalence implies is contested. Carlyle's crowd is not the contemptible rabble of conservative historiography nor the rational citizenry of the radical tradition; it is an elemental power, sublime and dreadful. He \"despised the radical phase and particularly Robespierre, who presided over the Reign of Terror with ruthlessness\" [a] — yet he does *not* simply condemn the Terror as such, because within his providential frame the violence is the externalized verdict on prior Imposture. Gareth Stedman Jones, in \"The Redemptive Power of Violence? Carlyle, Marx and Dickens\" (*History Workshop Journal*, 2008), reads this as Carlyle's most consequential and most dangerous move: Carlyle \"treats violence not merely as regrettable but as somewhat inevitable and even energizing to historical change — an 'irrationalist approach' drawing partly from German proto-romanticism and French theocratic thought\" [e]. Stedman Jones argues this framework, *linking revolutionary violence to loss of faith and to Sansculottism*, directly influenced the young Engels (1844–45) [e]. The contrast case is Dickens, who — though he revered Carlyle and leaned on the *French Revolution* for *A Tale of Two Cities* — *rejected* the Carlylean frame, attributing the violence to \"the previous injustice done to the French people by the Ancien Regime\" rather than to civilizational/spiritual collapse [a][e].\n\nThat ambivalence shades into something more combustible. Because Carlyle reads revolutionary violence as part of a death-birth — destruction that clears the ground for renewal — his treatment edges toward a doctrine of *regenerative* or *redemptive* violence, and it is this, more than any explicit politics, that later authoritarian and revolutionary readers could appropriate. The reading is contested. The phoenix logic (§1.2) implies that the fire is not merely destructive but *purgative* — that the burning is the price and mechanism of new birth. Stedman Jones's framing question — \"the redemptive power of violence?\" — is posed precisely because Carlyle's text invites it without quite asserting it [e]. Allison concedes Carlyle's later \"descent into authoritarianism\" but insists the 1837 *French Revolution* \"remains genuinely progressive — offering warnings rather than blueprints for fascism\" [1]. The text supports both readings: the violence is judgment (backward-looking, moral) *and* birth-pang (forward-looking, generative), and which valence dominates is exactly what readers from Engels to twentieth-century authoritarians to present-day critics have contested.\n\n---\n\n## 6. Anti-Philosophe / Anti-Enlightenment\n\nCarlyle reads the intellectual cause of the Revolution as the corrosive skepticism of the Enlightenment philosophes — Voltaire above all, and the \"Evangel of Jean-Jacques\" (Rousseau) — and treats their abstract Reason and \"Logic\" not as liberation but as the dissolving acid that finished off belief, leaving only Formula where living faith had been. His anti-Enlightenment polemic is structural to the book's theory: the philosophes are the agents who completed the hollowing-out of belief that made the *ancien régime* a Sham. He \"blames the French Revolution and whatever came from it on the philosophes\" while also \"criticiz[ing] the sentimentality of the French philosophes\" [a]. He \"despises the political bases of pre-revolutionary radicalism, and often refers scathingly to the 'Evangel of Jean-Jacques [Rousseau]', which he sees merely as a new Formula\" — holding \"a low opinion of Rousseau's thought and amused condescension toward him\" [f]. The deep point is that Carlyle attacks the Enlightenment from a position *to the side of* both left and right: he agrees the old order deserved to fall (against the reactionaries) but holds that abstract Reason and \"Logic\" — paper, formula, system — are themselves a form of Sham incapable of building anything real (against the radicals). Voltaire's skepticism dissolves; Rousseau's sentiment substitutes one formula for another; neither touches the Reality that Carlyle thinks history actually runs on. This anti-rationalism is exactly what Stedman Jones labels Carlyle's \"irrationalist approach\" [e].\n\n---\n\n## 7. What Carlyle Does *Not* Do\n\nMeasured against later French Revolution historiography — especially the Marxist tradition and the *Annales* social history — Carlyle's *French Revolution* is conspicuously thin, as a comparative judgment, on economic causation, class structure as a causal mechanism, and ideology-as-cause; its explanatory weight rests almost entirely on the moral-spiritual axis of Sham vs. Reality. Carlyle famously insisted on \"facts, facts, no theory\" [9] — by which he meant *vivid particulars* rather than economic or sociological abstraction. He has almost nothing systematic to say about grain prices, fiscal crisis as a structural cause, the bourgeoisie as a rising class with material interests, or the Revolution as the product of contradictions in the mode of production — the questions that would define Jaurès, Mathiez, Lefebvre, and Soboul. Where Marx and the Marxist tradition would locate the engine in class and economics, Carlyle locates it in *belief* and its rot. This is not an oversight but a consequence of his theory: for Carlyle the *material* facts are surface; the real cause is the spiritual condition (Sham) of which material breakdown is merely a symptom. The cost is that the book cannot explain *why* the rot produced this revolution at this time — a gap modern social historians press hard (see workstream 07, historiographical place). The compensating insight, noted by Allison, is a *proto-Marxist* one Carlyle stumbles into: his contempt for the post-revolutionary \"Aristocracy of the Moneybag\" anticipates a critique of bourgeois plutocracy that Marx would systematize [1].\n\n---\n\n## 8. The Two Great Tensions: Determinism vs. Heroism, and the Proto-Fascism Charge\n\nThe first of the book's two great tensions is intrinsic and unresolved, and it is load-bearing for the corpus: the book holds two incompatible theses in suspension — the Revolution as inevitable necessity (providence/Sansculottism) and the Revolution as remediable by heroic agency (the Mirabeau counterfactual) — and never reconciles them. That the tension exists is established; it is a feature of Carlyle's thought, not merely a critic's construction. If the Revolution is the inevitable working-out of \"the Eternal,\" then no hero could have prevented it and the search for a pilot is futile. If a Mirabeau could have \"held it toppling there, still unfallen\" with \"his single hand,\" then the catastrophe was contingent on the absence of a great man, and necessity is not absolute. Carlyle wants both: the moral inevitability of judgment *and* the redemptive possibility of heroic guidance. LaValley locates the tension in Carlyle's *eschatological* (rather than mechanical) necessity, which leaves logical room for agency [5]; Allison resolves it the other way by making Sansculottism, not the hero, the true protagonist [1]. The unresolved tension is precisely what makes the book generative — and what makes it readable as either a tragedy of impersonal forces or a tragedy of missing leadership.\n\nThe second tension — and the key contested claim of the workstream — is the charge that Carlyle's doctrine of righteous, regenerative violence and heroic order prefigures fascism. It is a real and recurring reading, but a genuinely contested one: it rests more on the later Carlyle (*On Heroes*, *Latter-Day Pamphlets*, *Frederick*) than on the 1837 *French Revolution*, and most current literary scholarship reads the 1837 book as radical-progressive, treating the proto-fascist appropriation as a misreading or a retrojection. The proto-fascism debate is one of the oldest in Carlyle studies. Its classic statement runs through Eric Bentley's *A Century of Hero-Worship* (1944) and the post-1945 reaction against hero-worship, which read Carlyle's exaltation of the strong man, his contempt for parliaments, and his aestheticization of force as a direct lineage to twentieth-century authoritarianism. The danger is real *in the doctrine*: a theory in which violence is regenerative, in which one man's \"single hand\" can save a toppling order, and in which democratic deliberation is at best a Sham, supplies exactly the materials a fascist reading needs.\n\nBut the scholarly weight has shifted, and the case for contestation runs along three lines. The first is that the 1837 book's true subject is collective, not heroic: Allison (2022) argues *The French Revolution* is \"thoroughgoingly radical,\" organized around plebeian Sansculottism rather than great men, and \"remains genuinely progressive — offering warnings rather than blueprints for fascism\" [1]. The second is the recovery of an *activist* Carlyle: Philip Rosenberg's *The Seventh Hero* (1974) found a radical-activist figure whose doctrine points toward engaged historical agency, not passive submission to a Führer [d][14]. The third is a theology-not-politics reading: the broader Carlyle scholarship (Vanden Bossche, Sorensen) treats the hero-doctrine as a *post-confessional theology of how the divine appears in history* — incarnational, not political — and reads the social-Darwinist/proto-fascist construal of *On Heroes* as a misreading that ignores the explicit theological frame [g].\n\nThe case that keeps the charge alive rests on two points. The doctrine of redemptive violence is the first: Stedman Jones (2008) shows the *French Revolution* itself supplies the framework linking violence to historical regeneration, and traces its influence forward [e]. The later Carlyle is the second: *Latter-Day Pamphlets* (1850), the *Occasional Discourse on the Negro Question* (1849), and the Frederick-worship of the 1850s–60s do darken the substrate into explicit authoritarian polemic — so the lineage is not invented, even if the 1837 book is not ye
