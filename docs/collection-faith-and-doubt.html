<script id="corpus-data" type="application/json">{"slug": "collection-faith-and-doubt", "title": "Faith & Doubt", "subtitle": "Belief at the edge of reason. The historical Jesus and his forerunner; Jung's God-image transformed in Answer to Job; the Calvinist substrate that outlived its ", "author": "", "generated": "", "documents": [{"order": 0, "file": "collection-faith-and-doubt-0.md", "title": "The Message and Divinity of Jesus: A Briefing", "summary": "The Man and the Christ", "body": "*From [The Man and the Christ](jesus-research.html#ch-0) — chapter 1*\n\n# The Message and Divinity of Jesus: A Briefing\n\n## Bottom Line\n\nJesus of Nazareth was a Galilean Jewish prophet of the early first century who proclaimed the imminent in-breaking of God's reign and enacted, in his teaching of enemy-love and his death under Pilate, what later philosophical traditions would come to call the cosmic principle of agapastic love.\n\nWithin months of his crucifixion his followers were calling on him in Aramaic prayer as Lord, and within a generation the Pauline communities were singing of him in the *morphē theou* of the Philippians hymn — a high Christology that was not the slow erosion of monotheism by Hellenism but the earliest stratum the historian can reach.\n\nThe conciliar centuries (Nicaea 325, Chalcedon 451, Constantinople III 681) hammered out the technical Greek grammar — *homoousios*, two natures in one person, two wills — that has remained the load-bearing wall of historic Christology. The patristic and mystical traditions (Athanasius, Maximus, Eckhart, the inner-light Protestants) filled in the territory with theosis, *Gottesgeburt*, and the cosmic Logos.\n\nRead through Carlyle, Whitman, Jung, and Peirce — four post-Enlightenment thinkers who refused both the dogmatic Christ of ecclesiastical orthodoxy and the deflated moral Christ of liberal Protestantism — Jesus is the supreme symbol of Reality against Sham (Carlyle), the universal divine soul concentrated in a single particular life (Whitman), the archetype of the integrated Self the human psyche is becoming (Jung), and the personal embodiment of the cosmic principle of evolutionary love (Peirce).\n\nThe composite that emerges from the four is high in substance but high by routes other than Chalcedon's; it is the mystical tradition's content articulated in post-critical philosophical idiom, broadly compatible with the historical-critical \"almost certainly\" core, and continuous with the patristic-mystical lineage that runs from theosis through Eckhart to Teilhard.\n\nThe live tension the corpus opens — and does not close — is the relation between the singular Galilean and the cosmic principle: whether the divinity that supremely realized itself in him is exclusive or paradigmatic, whether his pre-eminence stands above the procession of every soul or as its supreme member.\n\n## In Brief\n\nThe **historical Jesus** was a Jewish Galilean baptized by John the Baptist around 28–29 CE, who proclaimed the imminent Kingdom of God, gathered an inner circle of disciples, taught in parables across the villages of lower Galilee, performed a symbolic disruption in the Jerusalem Temple, and was crucified under Pontius Pilate around 30 CE on a charge of seditious kingship. The Third Quest of the late twentieth century established the apocalyptic-prophet reading as the mainstream center of gravity (Schweitzer, Sanders, Allison, Ehrman, Fredriksen), with the non-eschatological wisdom-teacher (Crossan, Borg) and covenantal-restoration (Wright) readings as live alternatives. What remains contested is the *temporal index* of the Kingdom — consistent, realized, or inaugurated eschatology — and how soon the worship of Jesus as divine emerged (Hurtado–Bauckham early-high vs. Dunn–Casey developmental).\n\nHis **message** is built around a single load-bearing claim — that the *basileia tou theou* is breaking into the present and demanding immediate reorganization of human life — and everything else hangs from it. The ethic of enemy-love is the shape of behavior already conformed to that reign; the parable is the form the claim must take because the kingdom is not a proposition but a perceptual shift; the Beatitudes are the axiology of inverted value; the double love-command (Deut 6:5 + Lev 19:18) is the vertical-horizontal architecture. He is unlike Hillel, the Stoics, the Buddha, and Socrates in three structural respects: he yokes the love of God and neighbor into a single command, locates moral seriousness in the interior without retreating from public action, and frames the rule positively rather than negatively.\n\nThe case for his **divinity** reaches deep into the earliest stratum. The pre-Pauline creed of 1 Cor 15:3–7, within 2–5 years of the crucifixion, already presents Christ's death as soteriologically significant; the Aramaic *marana tha* preserved in 1 Cor 16:22 shows prayer to Jesus *in Aramaic* before any Hellenistic accretion; Philippians 2:6–11 ascribes to him the pre-existent *morphē theou*. The conciliar arc from Nicaea's *homoousios* through the Cappadocian three-*hypostases*-one-*ousia* to Chalcedon's two-natures-one-person and Constantinople III's two-wills draws the boundary lines, and the patristic-mystical tradition fills in the territory — Athanasius's \"God became human so that humans might become divine,\" Maximus's cosmic *logoi*, Eckhart's birth of the Word in the soul, Palamas's essence/energies, Teilhard's Christogenesis. What is at stake metaphysically is the wager that the inner life of ultimate reality is personal, kenotic, self-giving love — that *esse* is at root *donatio*.\n\nThe **four-thinkers composite** is the corpus's distinctive contribution. Read through Carlyle, Whitman, Jung, and Peirce, Jesus appears as four faces of one figure: the supreme Hero and \"divinest Symbol\" before whom Sham stands naked; the cosmic-democratic comrade who is \"one of an average unending procession\" yet supremely realizes what is universally available; the archetype of the Self around which two thousand years of European psychic individuation has been organized; and the personal embodiment of agapism, the deepest mode of cosmic evolution. They converge on six points — the refusal of institutional reductionism, the refusal of mere moralism, Christ as cosmic-metaphysical principle rather than just a Galilean figure, the universal claim, the priority of sincerity and inwardness, and the post-Enlightenment situation — and they diverge productively on the aristocratic-vs-democratic axis (Carlyle and Jung on one side, Whitman and Peirce on the other), on the role of suffering, on the dark side (Jung alone insists on its integration), and on metaphysical grammar (Peirce alone has a precise system). What survives the composite is a \"high\" Christology by routes other than Chalcedon — deeply continuous with the mystical tradition of theosis and *Gottesgeburt*, broadly compatible with the historical-critical core, vulnerable in real places (the cross-work in Peirce, dissolution into average humanity in Whitman, authoritarian readings of Carlyle, category-mistake in Jung), but a Christ each of the four found he could not finish his thinking without.\n\nThe **forecast through 2050** runs along four scenarios. *Mystical-Individualist Revival* (30–40%) sees the inner-Christ, depth-psychology, symbolic-reading line — Pageau, Peterson-adjacent, Jung-inflected, contemplative-revivalist — become culturally dominant in Western intellectual life even as it remains institutionally minor. *Post-Liberal Orthodox Resurgence* (20–30%) sees Catholic, Orthodox, and Reformed renewal anchor a robust Chalcedonian Christology against both liberal evaporation and fundamentalist defensiveness. *Secular-Philosophical Reappropriation* (15–25%) sees the continental philosophy of religion lineage (Caputo, Žižek, Girard) continue to do serious work inside the academy. *Continued Fragmentation* (15–25%) is the null hypothesis of no dominant reading. The four-thinker complex this corpus is built around is genealogically Scenario A's most direct ancestry.\n\nA handful of **open questions** remain unresolved: whether the shadow-integration Jung insists on is a real theological insight or a category mistake imported from psychology; whether the Whitmanian-democratic universalism is compatible with Christ's singular significance or dissolves him into average humanity; whether the composite has adequate cross-work and theology of atonement, given Peirce's thinness on the cross; whether the bodily resurrection (which none of the four engaged) is essential or peripheral; and whether the composite is *Christian* in any technical doctrinal sense or is a sophisticated post-Christian metaphysics that uses Christ as its centerpiece.\n\n## How to Read This Corpus\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 440\" role=\"img\" aria-label=\"Rose-window diagram: Jesus of Nazareth at the center, read through four lights — the historian's Jesus, the philosopher's teacher, the divine Christ, and the four thinkers\">\n<circle cx=\"350\" cy=\"220\" r=\"196\" fill=\"none\" class=\"ln-soft\" stroke-width=\"1.5\"/>\n<circle cx=\"350\" cy=\"220\" r=\"206\" fill=\"none\" class=\"ln-soft\" stroke-width=\".75\" stroke-dasharray=\"2 6\"/>\n<ellipse cx=\"350\" cy=\"104\" rx=\"56\" ry=\"90\" class=\"f-t1\" opacity=\".26\" transform=\"rotate(315 350 220)\"/>\n<ellipse cx=\"350\" cy=\"104\" rx=\"56\" ry=\"90\" fill=\"none\" class=\"s-t1\" stroke-width=\"2\" transform=\"rotate(315 350 220)\"/>\n<ellipse cx=\"350\" cy=\"104\" rx=\"56\" ry=\"90\" class=\"f-t2\" opacity=\".26\" transform=\"rotate(45 350 220)\"/>\n<ellipse cx=\"350\" cy=\"104\" rx=\"56\" ry=\"90\" fill=\"none\" class=\"s-t2\" stroke-width=\"2\" transform=\"rotate(45 350 220)\"/>\n<ellipse cx=\"350\" cy=\"104\" rx=\"56\" ry=\"90\" class=\"f-t3\" opacity=\".26\" transform=\"rotate(225 350 220)\"/>\n<ellipse cx=\"350\" cy=\"104\" rx=\"56\" ry=\"90\" fill=\"none\" class=\"s-t3\" stroke-width=\"2\" transform=\"rotate(225 350 220)\"/>\n<ellipse cx=\"350\" cy=\"104\" rx=\"56\" ry=\"90\" class=\"f-t4\" opacity=\".26\" transform=\"rotate(135 350 220)\"/>\n<ellipse cx=\"350\" cy=\"104\" rx=\"56\" ry=\"90\" fill=\"none\" class=\"s-t4\" stroke-width=\"2\" transform=\"rotate(135 350 220)\"/>\n<circle cx=\"350\" cy=\"64\" r=\"5\" class=\"f-t1\"/>\n<circle cx=\"506\" cy=\"220\" r=\"5\" class=\"f-t2\"/>\n<circle cx=\"350\" cy=\"376\" r=\"5\" class=\"f-t4\"/>\n<circle cx=\"194\" cy=\"220\" r=\"5\" class=\"f-t3\"/>\n<circle cx=\"350\" cy=\"220\" r=\"64\" class=\"f-bg\"/>\n<circle cx=\"350\" cy=\"220\" r=\"64\" fill=\"none\" class=\"s-t2\" stroke-width=\"2.5\"/>\n<circle cx=\"350\" cy=\"220\" r=\"71\" fill=\"none\" class=\"ln-soft\" stroke-width=\"1\"/>\n<text x=\"350\" y=\"215\" text-anchor=\"middle\" font-size=\"17\" class=\"t-serif\" font-weight=\"bold\">Jesus<\/text>\n<text x=\"350\" y=\"234\" text-anchor=\"middle\" font-size=\"11\" class=\"t-muted\">of Nazareth<\/text>\n<text x=\"148\" y=\"56\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"bold\">The Historian&#8217;s Jesus<\/text>\n<text x=\"148\" y=\"72\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\">ch. 01 &#183; the Galilean prophet<\/text>\n<text x=\"552\" y=\"56\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"bold\">The Philosopher&#8217;s Teacher<\/text>\n<text x=\"552\" y=\"72\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\">ch. 02 &#183; the Kingdom &amp; the parables<\/text>\n<text x=\"148\" y=\"380\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"bold\">The Divine Christ<\/text>\n<text x=\"148\" y=\"396\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\">chs. 03&#8211;05 &#183; Nicaea to Caputo<\/text>\n<text x=\"552\" y=\"380\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"bold\">The Four Thinkers<\/text>\n<text x=\"552\" y=\"396\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\">chs. 06&#8211;08 &#183; Carlyle &#183; Whitman &#183; Jung &#183; Peirce<\/text>\n<\/svg>\n<figcaption><strong>Fig. 1.<\/strong> One figure, four lights. The corpus reads Jesus through four windows of a single rose: history, message, divinity, and the four chosen thinkers — each chapter a pane, the figure at the center the same.<\/figcaption>\n<\/figure>\n\n\n- **5-minute version:** read this Bottom Line and the In Brief.\n- **30-minute version:** read this briefing in full, plus the synthesis document `08_Convergence_Divergence.md`.\n- **2-hour version:** read this briefing, then `06_Four_Thinkers.md` (the heart), then `08_Convergence_Divergence.md`, then `Future_Trajectory.md`.\n- **Full version:** read in numbered order, with `07_Primary_Sources.md` as the reference layer.\n\n---\n\n## The Historical Jesus\n\nThe mainstream historical-critical reconstruction of Jesus of Nazareth, as it stands in the academy in the mid-2020s, is more constrained than confessional readers sometimes assume and more substantive than skeptical readers sometimes concede.\n\nA near-bedrock core can be reached. Jesus of Nazareth existed (`01_Historical_Jesus.md` Claim 1.1) — even scholars hostile to traditional Christianity (Ehrman, Crossan, Vermes) agree the \"mythicist\" view is not a serious option in contemporary scholarship. He was baptized by John the Baptist around 28–29 CE (Claim 1.2), a fact passing the criterion of embarrassment since the early church found this story difficult: John baptized \"for the forgiveness of sins\" and was widely understood as superior to the one he baptized, which is why Matthew, Luke, and John progressively soften or relocate the scene.\n\nHe proclaimed the imminent Kingdom of God (Claim 1.3); \"kingdom of God\" occurs more than 100 times in the Synoptic tradition and is multiply attested in Mark, Q, M, L, John (transformed), and Thomas. He gathered an inner circle of twelve disciples, whose existence Paul presupposes in 1 Cor 15:5 within roughly twenty years of the crucifixion — and the number twelve is symbolically loaded (the twelve tribes of Israel), itself constituting evidence for a restoration-of-Israel program (Claim 1.4). He was perceived as and acted as a healer-exorcist (Claim 1.5); even his opponents in Mark 3:22 attribute his works to Beelzebul rather than denying them, an embarrassment-criterion datum no early church source would invent.\n\nHe performed a symbolic disruptive act in the Jerusalem Temple shortly before his arrest (Claim 1.6) — the cornerstone of Sanders's reconstruction and the most plausible immediate cause of his arrest. He was crucified under Pontius Pilate around 30 CE (Claim 1.7), attested by Paul (1 Cor 1:23; Gal 3:1; Phil 2:8), all four Gospels, Tacitus (*Annals* 15.44), and the partially reconstructed Josephus *Testimonium*. Pilate is independently attested as Roman prefect of Judea c. 26–36 CE by Josephus, Philo, and the 1961 Caesarea \"Pilate Stone\" inscription.\n\nThe Second Temple Jewish world that produced him was saturated with apocalyptic eschatology — the conviction that the present age, dominated by foreign powers and evil, would be brought to a sudden end by God's direct intervention. The Dead Sea Scrolls (especially 4Q521, \"the Messianic Apocalypse,\" whose list of eschatological signs is the closest known pre-Christian linguistic parallel to Q 7:22), 1 Enoch, 4 Ezra, and the *Psalms of Solomon* attest a varied messianic-apocalyptic imagination in which a royal Davidic warrior-king, a priestly anointed one, a prophetic Moses-or-Elijah figure, and a transcendent heavenly Son-of-Man-like deliverer were all available templates.\n\nWhat was *not* available was a crucified messiah. That would mean, on every available reading, that the candidate had been definitively shown by God *not* to be the messiah. The cross is what Paul calls *skandalon* (1 Cor 1:23): early Christianity had to invent a hermeneutic for a crucified Messiah essentially from scratch.\n\nWithin this near-bedrock core, three live reconstructions divide mainstream scholarship. The **apocalyptic prophet** reading — Schweitzer, Sanders, Allison, Ehrman, Fredriksen — currently dominates: Jesus expected an imminent in-breaking of God's reign in cosmic-cataclysmic form and was, on Schweitzer's account, mistaken about the timing. The **non-eschatological Jewish wisdom teacher** reading — Crossan, Borg, much of the Jesus Seminar — treats him as a social radical resembling a Cynic philosopher, with the apocalyptic material a post-Easter accretion. The **covenantal-restoration prophet** reading — N. T. Wright's *Jesus and the Victory of God* (1996) — reads him as a prophet of Israel's return-from-exile whose eschatology was political-symbolic rather than cosmic-literal. The apocalyptic reading currently has the mainstream consensus, but the dispute is alive and the texts probably hold more than one register at once.\n\nWhat follows the crucifixion is the most consequential datum for the divinity question. Within a short period after his death — months at most, on the standard reconstructions — Jesus's followers were proclaiming that he had been raised and exalted, and were directing devotional practices to him (Claim 1.8). The pre-Pauline creed quoted in 1 Cor 15:3–7 is dated by scholars across the spectrum (including the skeptical Lüdemann) to within months to a few years of the crucifixion. The Aramaic *marana tha* prayer-formula preserved untranslated in 1 Cor 16:22 indicates that calling on the risen Jesus in cultic prayer began in the Aramaic-speaking Palestinian community, not as a Hellenistic accretion.\n\n*That* the early community proclaimed him risen is historically very high confidence. *What underlies the proclamation* is beyond historical-critical adjudication. The discipline can establish that something happened in the disciples' experience that they interpreted as the risen Christ, and that this experience launched the historical movement that produced the New Testament. Whether what happened was the physical resurrection of a body is the question on which the four-thinker composite, like the historical discipline itself, has to remain open.\n\nThe historical Jesus reconstructed by the Third Quest is the *material* on which every later Christology has had to work. The composite picture this corpus articulates is broadly compatible with that material; it does not depend on revising it.\n\n---\n\n## The Message: Jesus as Philosopher\n\nRead as philosophy rather than as creed, Jesus's teaching is a tightly integrated vision built around a single load-bearing claim: that the *basileia tou theou* — God's reign, kingship, sovereignty — is breaking into the present and demanding immediate reorganization of human life (`02_The_Message.md` Claim 1, Bottom Line).\n\nThe Greek *basileia* renders Aramaic *malkutha*, which denotes *reign* (a verbal-event sense) more than *realm* (a spatial sense). When Jesus says the *basileia* has come near, he means God's *kinging* — God's active sovereignty — is breaking in. A kingdom-as-realm is a place you might enter, a polity you might join; a kingdom-as-reign is an event you might recognize and a power you might submit to. Everything else hangs from this claim.\n\nThe ethic of enemy-love and non-retaliation is the *shape* of behavior already conformed to that incoming reign. The antitheses of Matthew 5 (\"you have heard it said... but I say to you\") interiorize and intensify Torah commands: murder is extended to anger, adultery to lust, the *lex talionis* replaced by non-resistance, love of neighbor extended to love of enemy. The structure is internal to Torah, not against it — Jesus offers an authoritative reading.\n\nThe love commandment is doubled (Deut 6:5 + Lev 19:18) and presented as the summary of the whole Law in Mark 12:28–34. Where Hillel offered a structurally similar single-foot summary, Jesus differs in three ways (Claim 7): he yokes the two commandments explicitly, he frames the rule positively (\"do to others\") rather than negatively, and he extends neighbor to enemy.\n\nThe parable is the *form* the claim must take, because the kingdom is not a proposition but a perceptual shift; it cannot be transmitted by definition, only by ambush. The Synoptic corpus contains roughly 35–40 parables; Mark 4:34 reports \"without a parable he did not speak to them.\" Klyne Snodgrass's *Stories with Intent* (2008) treats the parable as a focused communicative act whose intent is not propositional in the way a doctrinal claim is. The hearer is invited to think *with* the parable, to identify, to recognize a pattern, and then to recognize themselves *in* the pattern. The parable is not allegory: Adolf Jülicher's argument against the patristic-medieval allegorical method (the inn, the oil, the two denarii each given a coded meaning), refined by Jeremias and Snodgrass, is the now-standard scholarly position.\n\nThe Beatitudes name the inversion of value explicitly: poor, meek, mourners, hungry, persecuted — *these* are blessed. Luke sharpens the social register (the poor, not poor-in-spirit; the hungry, not those who hunger for righteousness) and adds woes against the rich, the full, the laughing. The radical demands of discipleship — sell what you have (Mark 10:21); let the dead bury their dead (Matt 8:22); take up your cross (Mark 8:34); lose your life to find it (Mark 8:35) — supply the anthropology such a kingdom requires: a self oriented toward its own un-self-centering.\n\nWhat kind of philosopher is this? Not a system-builder, not a definer of terms, not a constructor of arguments in the Aristotelian sense. He is a teacher whose *form* — parable, beatitude, antithesis, aphorism — is part of the *content*.\n\nHis teaching is at home in a small comparative company: Hillel's Torah on one foot, the Buddha's middle way, Socrates's elenchus, Epictetus's interior sovereignty. It is structurally distinctive in three respects (Bottom Line of `02_The_Message.md`): it fuses a vertical claim (the Father) with a horizontal one (the neighbor) into a single commandment; it locates moral seriousness in the interior (lust as adultery, anger as murder) without retreating from public action; and it makes a positive rather than negative golden rule, demanding active rather than merely abstentive other-regard.\n\nThe Aramaic address *Abba* (Mark 14:36; Rom 8:15; Gal 4:6) is sometimes argued (Jeremias, *The Prayers of Jesus*) to be Jesus's distinctive and intimate term for God — \"Daddy\" in colloquial register — making it a marker of his unique sonship-consciousness. This stronger version has been substantially qualified: James Barr (\"Abba isn't Daddy,\" 1988) and Georg Schelbert show that *abba* was the ordinary adult Aramaic word for \"father\" and did not carry baby-talk intimacy. The weaker version — that the address-form was distinctive in its frequency and centrality, if not in its semantics — survives.\n\nThe deepest contested question is the *temporal index* of the Kingdom (Claim 2). Three live positions. **Consistent eschatology** (Weiss, Schweitzer): Jesus expected an imminent apocalyptic in-breaking and was disappointed; the radical Sermon ethic was an \"interim ethic\" for the brief crisis before the end. **Realized eschatology** (C. H. Dodd): the kingdom *is* present in Jesus's ministry with no future remainder; the apocalyptic material is symbolic-mythological language for present fact. **Inaugurated eschatology** (Cullmann, Ladd, Wright, Dunn): the kingdom has been launched in Jesus and awaits consummation, \"now and not yet.\"\n\nThe philosophical stakes are large. A Jesus mistaken about timing leaves a remarkable ethic that survives disconfirmation (Tolstoy, Bonhoeffer, Weil). A Jesus whose kingdom is already here makes a metaphysical claim about the structure of reality that the ethic merely instantiates. An inaugurated Jesus claims both at once and forces a long, strange historical patience on his followers.\n\nThe composite of the four thinkers (each closer to a *realized* reading, though none of them developed a worked-out position on the temporal index) leaves the question open. What is striking philosophically is that the ethic survives all three readings. Tolstoy, dispensing with the apocalyptic apparatus, found in the Sermon a coherent program of nonviolence. Bonhoeffer, holding a more orthodox eschatology, read it as a present possibility of discipleship. Weil made the ethic free-standing of any apocalyptic frame. That the core supports multiple structures is itself a philosophical datum about the teaching.\n\nThe \"I am\" sayings of John — the bread of life, the light of the world, the door, the good shepherd, the resurrection and the life, the way and the truth and the life, the true vine; plus the absolute *egō eimi* of John 8:58 — are Johannine theological development and are not securely *ipsissima verba* (`02_The_Message.md` Claim 11). They are part of \"the message\" as the canonical tradition received it, and they elevate Jesus from announcer to embodiment of the kingdom — a christological intensification rather than a contradiction of the Synoptic teaching. This is the hinge on which the historical-prophet of Galilee becomes the cosmic Christ of Johannine cosmology, and on which every subsequent philosophical Christology has had to work.\n\n---\n\n## The Divine Christ\n\nHow the church came to call Jesus God is the question `03_Christological_Development.md` answers, and the answer is faster, denser, and more controverted than confessional or skeptical caricature suggests.\n\nThe earliest stratum (Paul's undisputed letters, mid-40s to mid-50s CE) already incorporates older creedal material in which a crucified Jewish messiah is addressed in language reserved for the God of Israel. The pre-Pauline creed of 1 Cor 15:3–7 dates within 2–5 years of the crucifixion. The Aramaic *marana tha* of 1 Cor 16:22 attests prayer to Jesus *in Aramaic* before the Greek-speaking phase of the movement. The Philippians 2:6–11 hymn (in elevated rhythmic Greek, almost certainly pre-Pauline) ascribes to the pre-existent Christ the *morphē theou*, describes a voluntary self-emptying (*ekenōsen heauton*), and culminates with Isaiah 45:23's exclusively divine self-prediction — \"every knee shall bow\" — applied to Jesus. This is high Christology in the 40s or 50s.\n\nJohn's Prologue (c. 90s) intensifies the claim: the *Logos* who \"was with God\" (*pros ton theon*) and \"was God\" (*theos ēn ho logos*) became flesh. This fuses Jewish Wisdom/Word traditions with a term Hellenistic readers heard through Heraclitus, the Stoics, and Philo.\n\nThe single most contested historical question is *how soon* this high Christology emerged. The Hurtado–Bauckham \"early high Christology\" camp argues that worship of Jesus as divine is essentially first-decade, and that Jewish monotheism — far from inhibiting the development — made it more startling: Jesus is included within the divine identity from the earliest reachable layer. Dunn, Casey, and Vermes argue for a more gradual, partly Hellenistic ascent. The weight of evidence (Aramaic prayer formulae, pre-Pauline hymns, Pliny's c. 112 CE report of Christians singing \"to Christ as to a god\") favors the early-high camp, but the developmental case captures genuine differences between Mark and John (`03_Christological_Development.md` Claim 3).\n\nThe conciliar centuries (325–681) hammered out the technical Greek grammar. Arius (c. 318) taught that the Son was the highest of creatures, made before time but still made: \"there was when he was not.\" Athanasius's counter was not principally metaphysical but soteriological: only God can save, so only if the Son is fully God can the Son save us. Nicaea (325) chose the non-biblical term *homoousios* (\"of the same being\") precisely because every biblical phrase could be glossed in an Arian direction.\n\nThe Cappadocians (Basil, Gregory of Nazianzus, Gregory of Nyssa) supplied the Trinitarian grammar Nicaea had left underdeveloped: three *hypostases* (concrete subsistences) in one *ousia* (essential being). Ephesus (431) defended *Theotokos* against Nestorius. Chalcedon (451) — the load-bearing wall of historic Christology — stipulated that the two natures coexist in one person *asynkutōs, atreptōs, adiairetōs, achōristōs*: without confusion, change, division, separation. Constantinople III (680–681), drawing on Maximus the Confessor (who had been mutilated and exiled for it), adopted *dyothelitism* — two wills in Christ, divine and human — against monothelitism.\n\nGregory of Nazianzus's axiom from *Epistle 101* is the load-bearing principle behind the whole arc: \"what is not assumed is not healed.\" A partial incarnation makes a partial salvation; therefore full humanity in Christ is the very mechanism of redemption. Apollinaris had argued that in Christ the divine Logos took the place of a human rational soul (the *nous*) — preserving the unity of Christ at the cost of his full humanity. Gregory's reply makes a soteriological point with metaphysical force: if Christ did not assume a human mind, then human minds are not redeemed, for what saves us is precisely the assumption of our nature into divine union.\n\nThe mystical tradition (`04_Divine_Christ_and_Mystical_Tradition.md`) takes Chalcedon as starting-point and fills in the territory. *Theosis* is the patristic mainline, not a fringe Eastern doctrine. Irenaeus, Athanasius, the Cappadocians, Cyril, Maximus, Symeon, and Palamas all teach that the purpose of the incarnation is the divinization of the human. The \"exchange formula\" — *God became human so that humans might become divine* (*De Incarnatione* 54) — is the most quoted patristic line in the tradition.\n\nPalamas's essence/energies distinction protects two truths simultaneously: God's essence (*ousia*) is unknowable and unparticipable; God's energies (*energeiai*) are knowable and participable. Deification is real participation in God's energies, not in God's essence. Humans become divine without becoming God.\n\n*Kenosis* is read as a claim about the divine nature itself, not only Christ's psychology. The 19th- and 20th-century kenotic theologians (Thomasius, Forsyth, Mackintosh, Gore, Bulgakov) read Phil 2:6–11 as a metaphysical claim about the divine: God *is* the kind of being who can pour himself out without ceasing to be God. Bulgakov pushes furthest — kenosis is the inner life of the Trinity, where Father, Son, and Spirit eternally pour themselves out for each other. Balthasar's *Mysterium Paschale* runs the same line.\n\nEckhart's *Gottesgeburt* — the birth of the Word in the soul — is the German extension: what was singularly enacted in Jesus is universally available to every soul that opens to it. Eckhart preached within Dominican Trinitarianism but pushed apophatic mysticism to a place where the ground of the soul (*Grund*) and the ground of God are spoken of as one ground, which is what got him condemned in 1329 by *In agro dominico*. Maximus's *logoi* doctrine — that every created thing has its inner logos rooted in the divine Logos — is already a cosmic Christology; Teilhard's Omega Point is its modern, evolutionary translation. The inner-light Protestants (Boehme, Fox, the Quakers) carry the Pauline \"Christ in you\" (Col 1:27) to its democratic conclusion: every person has, in some real sense, Christ within.\n\nThe metaphysical claim under all of this is the same: what is most real is personal, self-giving, kenotic love. *Esse* is, at its root, *donatio*.\n\nThe modern philosophical Christologies (`05_Modern_Philosophical_Christologies.md`) work the same material after Lessing's \"ugly broad ditch\" (1777) — the claim that \"accidental truths of history can never become the proof of necessary truths of reason\" — and Kant's reduction of Christ to \"the personified idea of the good principle\" had emptied the old metaphysical scaffolding.\n\nHegel re-mounts the metaphysics speculatively. The Incarnation, Crucifixion (\"death of God\"), and Resurrection become the conceptual hinge on which Spirit comes to know itself in finitude — the \"speculative Good Friday\" (*spekulativer Karfreitag*). Whether this is orthodox Lutheran Christology in a new key (Robert R. Williams) or a Valentinian-Boehmean Gnostic counterfeit (Cyril O'Regan) is the most contested question in 19th-century philosophical theology.\n\nSchleiermacher transposes Christology into consciousness — Christ as the one in whom God-consciousness is perfectly realized. Kierkegaard insists on the Absolute Paradox: the eternal in time is *skandalon*; faith is a leap made in the moment of decision, \"contemporaneity\" with Christ. Bonhoeffer in prison: \"only the suffering God can help\"; \"Jesus is the man for others\"; \"God lets himself be pushed out of the world onto the cross.\" Tillich's \"New Being,\" Rahner's \"absolute self-communication\" and \"anonymous Christian,\" Balthasar's *Gestalt* of divine glory and the Holy Saturday descent. Moltmann's *Crucified God* (1972) makes suffering an event internal to the Trinity and bridges to liberation Christology.\n\nGirard's anti-sacrificial reading: mimetic desire founds rivalry, rivalry founds scapegoating, scapegoating founds culture; Christ voluntarily occupies the scapegoat position and exposes it, ending sacrificial logic from within. Caputo and Žižek converge from opposite ends on a \"weak\" Christology of event-without-sovereignty. N. T. Wright represents the live alternative: a robust historical Christology in which Jesus knew himself as the embodiment of YHWH's return to Zion and the resurrection is best explained as a bodily event.\n\nThe unifying question across all of them — even the atheists — is what *Christ* names once \"God\" has been put in question.\n\nWhat \"Jesus is God\" means across these registers is therefore not a single proposition but a layered claim. Doctrinally: one person in two natures, two wills, *homoousios* with the Father. Mystically: the kenotic descent that makes the upward path of theosis possible, the supreme instance of the inner light, the cosmic Logos through whom all things were made. Philosophically: the moment Spirit becomes conscious of itself in finitude (Hegel), the absolute paradox (Kierkegaard), the suffering solidarity that exposes sacrificial culture (Moltmann, Girard), the event that dispossesses divine sovereignty (Caputo). The wager under all of them is that what is most real is personal, kenotic, self-giving love — and that this is what shows up in a particular Galilean life.\n\n---\n\n## The Four-Thinkers Composite\n\nThis is the section the question most directly asks. The composite figure that emerges when Carlyle, Whitman, Jung, and Peirce are read together is the figure who imposed himself on four serious, independent, post-Enlightenment thinkers as a figure they could not finally do without.\n\nEach is a major thinker whose work could, in principle, have proceeded without serious engagement with the figure of Christ. Carlyle could have written about heroism without Christ as the unnamed center; Whitman could have written his democratic-cosmic poetry without addressing the Crucified as \"my comrade\"; Jung could have developed his depth psychology without making the Christ-image the central symbol of the Self for the Pisces aeon; Peirce could have articulated his agapistic cosmology without grounding it in the doctrine of John. Each could have done his work without Christ, and the work would still have been impressive.\n\nBut each chose, in his own way, to keep Christ at the center. Carlyle could not finish *Sartor* without finding the Christic He speaking through the silenced self. Whitman could not finish \"Song of Myself\" without including the iterable crucifixion and the procession of redeemers. Jung could not finish *Aion* and *Answer to Job* without making the Christ-image the central archetype of Western individuation. Peirce could not finish \"Evolutionary Love\" without grounding agapism in the gospel of John.\n\n### Carlyle's Christ: the supreme Symbol, the divinest Hero\n\nThomas Carlyle's Christ is the supreme Hero, the divinest Symbol, the metaphysical opposite of Cant. *On Heroes, Hero-Worship, and the Heroic in History* (1841) conspicuously does not include a lecture on Christ — \"the greatest of all Heroes is One — whom we do not name here!\" — because Christ stands above the schema as its unnamed center.\n\nThe crucial Romantic-Goethean grammar Carlyle inherited from Fichte and Novalis: a \"Symbol\" is not a sign pointing beyond itself but a particular reality through which the universal is actually *present*. To call Christ \"the divinest Symbol\" is therefore the strongest affirmation Carlyle's idiom can make.\n\nThe phenomenology of conversion in *Sartor Resartus* (1833–34) is structurally Christic: it passes from the \"Everlasting No\" through the \"Centre of Indifference\" to the \"Everlasting Yea\" by an act of self-annihilation (*Selbst-tödtung*) which Carlyle explicitly identifies with the \"Worship of Sorrow\" — the founding mystery of a Temple \"founded some eighteen centuries ago, [that] now lies in ruins, overgrown with jungle.\" In a low crypt the altar still burns: \"O Heavens, is it, in very deed, He, then, that ever speaks through thee; that lives and loves in thee, that lives and loves in me?\" The capitalized *He* is the Christic indwelling of Galatians 2:20 translated into Goethean prose.\n\nIn *Past and Present* (1843) the Christic standard becomes politically operative: the medieval-Christic vision of Abbot Samson is set against the Mammon-worship of modern industrial society. Carlyle's diagnostic of modernity is at root Christological — what modernity has lost is not \"religion\" but an operative relation to the Reality of which Christ is the supreme historical instance.\n\n### Whitman's Christ: the cosmic-democratic comrade\n\nWalt Whitman's Christ is the structural inverse of Carlyle's. Where Carlyle places Christ above the schema as its unnamed center, Whitman places Christ *within* the schema as one of \"an average unending procession\" of redeemers.\n\nIn §38 of \"Song of Myself,\" after a long stretch of identification with the suffering of slaves, soldiers, the venerealee, the hounded, the speaker recovers: \"Corpses rise, gashes heal, fastenings roll from me. / I troop forth replenish'd with supreme power, one of an average unending procession.\" The Christic shape — crucifixion, burial, resurrection, ascension — is *iterable*. The Galilean is not unique in kind; he is the supreme exemplar of a procession.\n\nIn §41, Christ (\"the crucifix engraved\") is one item in a portfolio also containing \"Kronos, Zeus his son, and Hercules his grandson, / Osiris, Isis, Belus, Brahma, Buddha, / Manito loose, Allah on a leaf\" — equalized not by contempt for the crucifix but by the assumption that the divine in each is the same divine.\n\nIn \"To Him That Was Crucified\" (1860), Christ is addressed directly as *comrade*: \"My spirit to yours, dear brother... I do not sound your name, but I understand you, (There are others also;) ... We few, equals, indifferent of lands, indifferent of times; / We, enclosers of all continents, all castes — allowers of all theologies.\"\n\n\"Chanting the Square Deific\" (1865–66) is Whitman's most formal theological statement: the deity speaks from four faces — Jehovah (eternal law), Christ (the Consolator), Satan (the defiant, the necessary other), and Santa Spirita (the indwelling breath). The presence of Satan as a legitimate face of the deific quadrinity is the most theologically scandalous feature; it anticipates by eighty-six years what Jung would argue in *Answer to Job*.\n\nThe Civil War hospital writings of *Specimen Days* (1882–83) are the most directly Christic passages in Whitman: the poet who declared \"I am the man, I suffer'd, I was there\" was actually bending over actual wounded soldiers — washing them, writing their letters, holding their hands while they died. The cosmic-Christological vision is practical-ascetical, not Romantic abstraction. Whitman's own health was permanently impaired by the years of hospital nursing.\n\n### Jung's Christ: the archetype of the Self\n\nC. G. Jung's Christ is the central image, for the Pisces aeon, of the archetype of psychic totality — what Jung calls the *Self*. *Aion* (1951, CW 9ii), chapter V, titled \"Christ, A Symbol of the Self\": \"Christ exemplifies the archetype of the Self. He represents a totality of a divine or heavenly kind, a glorified man, a son of God *sine macula peccati*, unspotted by sin.\" But \"looked at from the psychological angle he corresponds to only one half of the archetype. The other half appears as the Anti-Christ.\"\n\nThe orthodox Christ-image, by being doctrinally defined as without stain of sin, has externalized darkness into the dyadic figure of Antichrist. The two fish of Pisces are the two halves of a Self the conscious tradition has been structurally unable to integrate. *Aion* traces the gradual emergence of the Antichrist-image through medieval apocalyptic, the Reformation polemics (each side calling the other Antichrist), the secular evils of the twentieth century, and into the dreams of modern analysands.\n\n*Answer to Job* (1952) gives the mythic-emotional narrative. Yahweh, in the prologue of Job, accepts Satan's wager and inflicts on a righteous man a sequence of catastrophes for which no moral justification is offered. Job, by being morally conscious where Yahweh is morally unconscious, *defeats God morally*. The Incarnation is therefore Yahweh's attempt at his own moralization: God must become man not because man needs redemption (the classical Anselmian theory) but because *God needs to become conscious of what Job already knew*.\n\nThe 1950 dogma of the Bodily Assumption of Mary is for Jung the most theologically significant Christian event since the Reformation, because it readmits the feminine and the bodily into a previously masculine triadic godhead, advancing the integration of the missing fourth. The alchemical *lapis Christi* of *Mysterium Coniunctionis* (1955–56) is the parallel symbolic project in which the marginal tradition carried what the dogmatic tradition could not.\n\nThroughout, Jung maintains careful agnosticism on the historical claim. The famous \"I don't need to believe. I know\" of the 1959 BBC Freeman interview is a statement about psychic reality, not metaphysical assertion. The *Red Book* (composed 1914–1930, published 2009) shows that the theoretical Christology of *Aion* rests on a personal-mystical encounter with the Christ-figure as a psychic presence with which Jung wrestled across years of active imagination.\n\n### Peirce's Christ: the principle of agapism\n\nCharles Sanders Peirce's Christ is the historical incarnation of the cosmic principle of *agapasm* — evolution by creative love. In \"Evolutionary Love\" (*The Monist*, January 1893), the final paper of his great five-part metaphysical series, Peirce identifies three modes of cosmic evolution — *tychasm* (by fortuitous variation, the random-mutation Darwinism), *anancasm* (by mechanical necessity, the Spencerian determinism), and *agapasm* (by creative love) — and argues that agapasm is the deepest of the three, grounded in \"the doctrine of John\" that \"growth comes only from love.\"\n\nThe Johannine prologue is read as a metaphysical treatise. \"Everybody can see that the statement of St. John is the formula of an evolutionary philosophy, which teaches that growth comes only from love\" (CP 6.289). 1 John 4:8 — \"God is love\" — is for Peirce a *cosmological* proposition: the principle by which the universe grows is identical with the agape revealed in Christ.\n\nThe polemical edge is the contrast between the \"Gospel of Christ\" and the \"Gospel of Greed\" (CP 6.294): \"The gospel of Christ says that progress comes from every individual merging his individuality in sympathy with his neighbors. On the other side, the conviction of the nineteenth century is that progress takes place by virtue of every individual's striving for himself with all his might and trampling his neighbor under foot whenever he gets a chance to do so. This may accurately be called the Gospel of Greed.\" The target is the social-Darwinist ideology of Gilded Age capitalism.\n\nIn \"A Neglected Argument for the Reality of God\" (*Hibbert Journal*, 1908), Peirce gives the methodology: the reality of God is the hypothesis that grows on a free mind engaged in \"Pure Play\" or \"Musement.\" The argument is abductive rather than deductive. The pragmaticist account of truth — truth is the asymptote of unbounded inquiry — locates Christianity's truth in long-run cosmological convergence: an unbounded community of inquirers, pursuing inquiry indefinitely, would converge on the cosmology of evolutionary love. Peirce drifted into agnosticism in early adulthood, formally rejoined the Episcopal Church in his fifties, kept a daily devotional life, and died a believing Christian in his own sense.\n\n### The convergences\n\nSix points stand out where the four agree more strikingly than they differ.\n\nThe first is a shared **refusal of institutional reductionism**. None can be domesticated by any church's authority structure: Carlyle abandoned the Burgher Seceder ministry, Whitman refused denominational Christianity, Jung never returned to the Reformed Church of his father, and Peirce drifted into agnosticism before his late-life Episcopal return. Each treats Christ as a reality bigger than ecclesiastical custody. The second is a parallel **refusal of mere moralism**. None reduces Christ to a moral teacher; the dominant 19th-century liberal-Protestant Ritschl–Harnack \"ethical Jesus\" — the \"personified idea of the good principle\" descended from Kant — is too thin for all four, and each would have regarded the liberal-Protestant reduction as a *category error*. The four-thinker complex therefore has almost nothing to do with the Tolstoy-Gandhi ethical-reductive reception of Jesus.\n\nThird, each reads **Christ as a cosmic or metaphysical principle**, in a frame that is at minimum metaphysical and often cosmological — Carlyle's \"Divine Idea of the World,\" Whitman's four-sided deity, Jung's Pisces-aeon archetype, Peirce's cosmological agapism. None has a *small-scale* Christ. The closest pre-modern analogue is the cosmic Logos of John 1 and the cosmic Christ of Colossians 1:15–20 — \"in him all things were created... in him all things hold together\" — which `04_Divine_Christ_and_Mystical_Tradition.md` documents running through Athanasius, Maximus, Eriugena to Teilhard. Closely related is the fourth point, **the universal claim**: each sees Christ's significance as universal rather than tribal. Whitman's \"We few, equals, indifferent of lands, indifferent of times\"; Jung's Pisces aeon as a specifically European symbol with structural analogues in every culture; Peirce's agapastic principle as the cosmological convergence any free mind would reach by Musement; Carlyle's Christ as \"divinest Symbol\" not of Britain or Christendom but of the human encounter with the Eternal.\n\nFifth, all four prize **sincerity and inwardness**, treating Christ as the type of an inward truth that cannot be captured by external propositional theology — Carlyle's \"Sincerity,\" Whitman's \"we convince by our presence,\" Jung's individuation, Peirce's \"Musement\" and \"Sentimentalism.\" This is structurally continuous with the mystical tradition: the \"inner Christ\" of Eckhart's *Gottesgeburt*, the inner light of Boehme and Fox, the *imago Dei* in the soul. Sixth and last, all four stand in **the shadow of the Enlightenment** as post-critical thinkers who have absorbed the historical-critical move (Strauss, Renan, Schweitzer) and refused both the deflationary conclusion and a regressive return to pre-critical orthodoxy. They are doing for the Anglo-American and depth-psychological traditions what Hegel did for German speculative philosophy, what Kierkegaard did for existential decision, and what Bonhoeffer did for the suffering God — holding the figure of Christ in some serious post-Enlightenment frame.\n\n### The productive divergences\n\nThe disagreements are productive and have to be preserved as such; the composite that emerges from the encounter is a *holding-together*, not a flattening.\n\n**Aristocratic vs. democratic.** Carlyle's Hero is singular and above; Whitman's Christ is one of an average unending procession. The line runs between (Carlyle, Jung) and (Whitman, Peirce). The split is real, but the composite holds both: the singular exemplary Christ is the supreme historical instance of a universally distributed divine life. The Carlylean-Jungian intuition without the Whitmanian-Peircean would collapse into elitism the New Testament's \"kingdom of God is within you\" (Luke 17:21) does not support; the Whitmanian-Peircean without the Carlylean-Jungian would collapse into dissolution the Johannine \"no one comes to the Father but by me\" (John 14:6) does not support.\n\n**The role of suffering.** Carlyle's Worship of Sorrow as the supreme stoic-affirmative gesture, the hinge of conversion. Whitman's distribution of Christic suffering across the iterable procession of redeemers. Jung's insistence that the cross is symbolically deficient because the orthodox *sine macula peccati* Christ has externalized the shadow. Peirce's curiously thin cross — \"Evolutionary Love\" articulates agape as cosmic principle but does not develop the cruciform dimension. This is the principal weakness of Peirce's Christology by orthodox standards and the point where the composite has to import cross-work from elsewhere (the patristic *Christus Victor* tradition).\n\n**The dark side.** Jung alone *insists* on the integration of Christ's shadow — the Antichrist as the completion of the Self. Whitman's \"Chanting the Square Deific\" includes Satan as a legitimate face of the deific quadrinity (Jung cites Whitman approvingly in scattered places in the *Collected Works*). Carlyle places Christ *against* Sham — the dark side is what Christ stands against, not what Christ contains. Peirce treats the Gospel of Greed as cosmological *error*, not as a positive principle of evil. The composite accepts Jung's psychological insight (the doctrinal exclusion of the shadow has real psychic consequences) while qualifying his metaphysical extension (God does not need to become moral); it reads Christ as encompassing darkness by *passing through it on the cross* (the Holy Saturday descent), not by containing it.\n\n**The metaphysical grammar.** Peirce alone has a precise metaphysical system — synechism plus tychism plus agapism, articulated in the five-paper Monist series of 1891–93. Jung has a phenomenology of the psyche (empirical, not systematically metaphysical). Carlyle has a historical-Romantic vision (philosophically suggestive, never systematized). Whitman has a poetic-mystical claim (resistant to systematic formulation by design). They speak in different registers; what the composite must do is recognize that each register makes contact with the Christ-reality from a different angle, and that the failure of any one to deliver the others' kinds of insight is a methodological feature, not a failure of Christology.\n\n**The historical Jesus.** Each is broadly compatible with the Third Quest \"almost certainly\" core, but none of them depends on it — each is formulated at a level of generality that does not stand or fall by the next round of source-criticism. This is a feature (the composite is insulated from historical-critical churn) and a liability (the composite has to discipline itself by the Galilean particularity to avoid dissolution into cosmic-symbolic abstractions).\n\n### The composite, brought together\n\nFour faces of one figure, in something like *perichoretic* mutual indwelling: the Carlylean Symbol *is* the Whitmanian comrade *is* the Jungian archetype *is* the Peircean agapism. Each face implies the others.\n\nThe composite Jesus is a historical Galilean prophet whose teaching of the Kingdom and of love-of-enemies enacts in human-ethical terms the cosmic principle that growth comes only by love.\n\nHe is the supreme symbol (in the Romantic-Goethean sense where a symbol participates in what it symbolizes) of the divine breaking into history; the absolute Sincerity against all Sham.\n\nHe is the archetype of the Self that every human psyche is in process of becoming; the imago Dei manifest; the figure around which two thousand years of European individuation has been organized.\n\nHe is the cosmic Logos in democratic form — the divinity that is in every human, supremely realized in one; at once the Johannine Logos by whom all things were made and the comrade-Christ of \"We few, equals.\"\n\nHe is the figure whose suffering is real (Carlyle) but not the final word (Whitman, Jung, Peirce in different registers); whose death exposes what Girard would call the scapegoat mechanism; whose resurrection is at minimum the disciples' realization that the principle He embodied is stronger than death, and at maximum the bodily-resurrection claim that the four did not engage and that the composite cannot fully arbitrate.\n\nThis composite Christ is *high* in the technical sense: he is more than a moral teacher, more than a charismatic prophet, more than an admirable historical figure. He is, in some serious sense, divine — not by extrinsic award but by manifesting in a particular life the principle by which the cosmos grows, the symbol by which the divine becomes present in history, the archetype around which the psyche organizes itself toward wholeness, the supreme exemplar of the universal divine that is also somehow uniquely his.\n\n### A synoptic vignette: the four faces in dialogue\n\nImagine the four thinkers in a room together.\n\nCarlyle opens: the Galilean is the supreme Hero, the divinest Symbol, the one whose presence shamed Pharisaic Cant and Roman Sham alike. To know him is to be subjected to the Worship of Sorrow, the path of self-annihilation that runs from the Everlasting No to the Everlasting Yea.\n\nWhitman replies: yes, brother — and what you call the supreme Hero is the same divine soul that walks in every common life that opens to it. The Galilean is \"comrade\" to the soldier dying in the Civil War hospital, to the framer framing a house, to the slave hounded in the race. His pre-eminence is the pre-eminence of a particular life that supremely realized what is universally available. Your Hero is also my brother.\n\nJung intervenes: the supreme Hero, the comrade — yes, both. But notice what you have not yet said. The Christ-image *sine macula peccati*, beautiful as it is, has externalized the shadow, and the shadow has returned in the European psyche as Antichrist. The aeon of Pisces has been organized around this split. We are at the end of the aeon. The task of the coming age is the integration of what the doctrinal tradition has been unable to hold.\n\nPeirce concludes: all three of you are right at the level you each work at. What I add is the cosmological frame. The Galilean's teaching is the historical incarnation of a cosmic principle: that growth, in mind and in matter, comes only from love. The Gospel of John gives the metaphysical formula; the Gospel of Christ stands against the Gospel of Greed. What you call Hero, Symbol, Comrade, Archetype is in the deepest analysis the agapastic principle by which the universe evolves, become conscious of itself in a Galilean life.\n\nNone of the four wrote in this conversational mode. But the conceit is useful: it makes visible what is otherwise hard to see — the four are doing different work at different levels, and the composite emerges when each is heard at the level he is competent for. Carlyle owns the cultural-prophetic level; Whitman owns the democratic-poetic level; Jung owns the psychological-archetypal level; Peirce owns the cosmological-metaphysical level. The composite Christ is the figure who appears when each is heard at his level and the four are held together.\n\n### How the composite stands relative to the major frames\n\n**Relative to Chalcedon.** Broadly compatible in substance — each of the four is in some sense a \"high\" Christology that refuses to flatten Jesus into a mere man. None is Arian; none is adoptionist; none treats Christ as a divinely-endowed-but-finite human. But the composite *adds notes* Chalcedon does not require: the Whitmanian universal-divinity-in-every-human (compatible with Chalcedon under an Eastern theosis reading) and the Jungian shadow-demand (compatible with the *psychological* observation but not the metaphysical extension). The composite stands to Chalcedon roughly as Eckhart stands to Aquinas — articulating in a different idiom what the dogma articulated in its idiom, with mutual illumination and mutual irreducibility. The *hypostatic union* is held in substance: the personal, particular Galilean *is* the cosmic agapastic principle (Peirce), the universal divine soul concentrated in one (Whitman), the archetype of the integrated Self (Jung), the supreme Symbol of the Eternal in time (Carlyle). What the composite lacks is the technical Greek substance-language; what it contributes is fresh philosophical idiom in which the substance can be carried into post-Enlightenment minds for whom the Greek substance-language has ceased to function.\n\n**Relative to the mystical tradition.** Deeply continuous. The Eastern theosis trajectory (Athanasius, Cappadocians, Maximus, Symeon, Palamas) is structurally the same claim Whitman makes democratically and Peirce makes cosmologically. The German *Gottesgeburt* mysticism of Eckhart and the *Theologia Germanica* is structurally the same claim Carlyle makes (the Christic \"He\" who speaks through the self-annihilated soul) and Jung makes (the imago Dei in the psyche). The inner-light tradition of Boehme, Fox, and the Quakers — explicitly Whitman's inheritance through Hicks — is the inner-Christ of the radical Reformation taken seriously into the nineteenth century. The composite is, in a precise sense, *the mystical tradition's content articulated in post-Enlightenment philosophical idiom*. The reader who knows the mystical tradition will recognize the composite as a familiar friend in unfamiliar dress.\n\n**Relative to modern philosophical Christologies.** Surprising convergences. With Hegel's \"speculative Good Friday\" (Jung explicitly; Peirce's evolutionary cosmology read by Hartshorne and Corrington as process-theological Hegelianism). With Kierkegaard's absolute paradox (Carlyle's Sincerity that demands operative belief over external profession; the leap of self-annihilation). With Bonhoeffer's suffering God and \"man for others\" (Whitman's comrade-Christ; Carlyle's Worship of Sorrow). With Girard via Peirce: the Gospel of Greed critique is structurally an anti-sacrificial position. The composite is *positioned against* the radical-weak family (Caputo, Žižek): Christ is held as a *strong* claim — cosmologically, psychologically, prophetically, symbolically — not as the dispossession or evacuation of strong claims.\n\n**Relative to the historical Jesus.** The composite is the historical Jesus *plus* the metaphysical-cosmological-symbolic-archetypal extension that the four give him. The apocalyptic Jewish prophet of `01_Historical_Jesus.md` is the material the composite extends; the composite *adds* metaphysical commitments that historical-critical scholarship qua scholarship cannot make. None of these is a historical claim; all are philosophical-religious claims that take the historical claim as their material and extend it metaphysically.\n\n### The composite as practical figure\n\nThe composite Christ is not only a theoretical synthesis; he is a figure who can be prayed to, lived with, and acted on. Each of the four shows what this looks like in his own way.\n\nCarlyle's prayer life was the Calvinist-private prayer of a man who could no longer say the creeds but who continued to address the Eternal in the prayer-language of his upbringing. Whitman's prayer life was the universal compassion of the Civil War hospitals — the bedside ministry to the wounded and dying that *Specimen Days* records with such restraint. Jung's prayer life was the *Red Book* — the daily active-imagination practice that occupied him for over a decade between 1914 and 1930, in which he wrestled with Christ as a personal psychic presence rather than an abstract archetype. Peirce's prayer life was the late-life Episcopal observance — the Daily Offices when he could say them, the sacramental practice maintained against considerable personal difficulty.\n\nThe composite is therefore not a figure who lives only in books. He is a figure to whom each of the four addressed himself, in his own characteristic idiom, across a lifetime. The composite is offered to the reader as a figure of the same kind: not an abstract synthesis to be assented to but a presence to be engaged with in the same kind of sustained personal-religious practice the four themselves modeled.\n\nThe ecclesiological implication is light-touch: the composite is compatible with serious sacramental practice (Peirce's Episcopalianism) and with no institutional affiliation at all. A Catholic reader can be more deeply Catholic; an Orthodox reader more deeply Orthodox; a Protestant more deeply Protestant; a reader of no tradition can find a way in. The composite does not adjudicate ecclesial affiliation. What it does adjudicate is the *quality of participation* — the degree to which the soul walks the Christic shape regardless of where the walking is done.\n\n---\n\n## Forecast\n\nThe Western reading of Jesus through 2050 will most probably move *away* from the late-twentieth-century settlement (confessional Christology on one side, secular-academic indifference on the other, with mainline-liberal mediation in between) and *toward* a more fragmented landscape in which the mystical-individual, the post-liberal-confessional, and the radical-philosophical readings each claim a serious share of educated attention.\n\nThe single best forecast is fragmentation with a mystical-individualist tilt.\n\n**Scenario A — Mystical-Individualist Revival (30–40%).** The inner-Christ, depth-psychology, symbolic-reading line — Pageau, Peterson-adjacent, Jung-inflected, contemplative-revivalist — becomes the culturally dominant Western mode, even as it remains institutionally minor. Dominant drivers: the apparent leveling-off of religious disaffiliation in the United States (Pew 2023–24: 62% Christian, stable since 2019; 29% unaffiliated, also stable); the mystical / inner-religion turn (contemplative practice, mainstreaming of meditation, psychedelic-assisted therapy, \"spiritual but not religious\" permission); the Jordan-Peterson-adjacent rediscovery (the Biblical Lecture Series reaching tens of millions on YouTube; *We Who Wrestle with God* on the NYT bestseller list and the 51-city North American tour; Pageau's *Symbolic World*; Paul Kingsnorth's 2021–24 conversion to Romanian Orthodoxy and 2024 Erasmus Lecture \"Against Christian Civilization\"; Martin Shaw; Mary Harrington; Louise Perry; Ayaan Hirsi Ali's 2023 essay \"Why I Am Now a Christian\"; Douglas Murray); the sustained depth-psychology revival (Peterson's debt to Jung; the symbolic-archetypal mode migrating from analytic-psychology niches into adjacent intellectual milieus). The four-thinker complex this corpus is built around is genealogically Scenario A's most direct ancestry, and the user's interest in Carlyle/Whitman/Jung/Peirce is itself a small data point about which way the wind is blowing among reflective non-confessional readers.\n\n**Scenario B — Post-Liberal Orthodox Resurgence (20–30%).** Catholic, Orthodox, and Reformed renewal anchors a robust Chalcedonian Christology against both liberal evaporation and fundamentalist defensiveness. Dominant drivers: the post-liberal theology resurgence in the academy (Lindbeck's *The Nature of Doctrine* 1984 → Hauerwas's ecclesial ethics → Milbank's *Theology and Social Theory* 1990 → Radical Orthodoxy, maturing into the dominant constructive theological program of the 2010s and 2020s); the post-Francis Catholic transition under Leo XIV (elected May 8, 2025), with early indicators of centrist continuity from Francis plus somewhat more disciplined doctrinal articulation; the convert-Orthodox phenomenon in Anglophone countries (small in absolute numbers but disproportionately influential in the post-liberal-confessional and mystical-individualist segments); the Girard revival (Thiel-funded Imitatio Project; the Colloquium on Violence and Religion; structurally Catholic ecclesial friendliness of mimetic theory). A traditionalist or strongly conservative successor to Leo XIV in the 2030s or 2040s would shift the probability distribution noticeably toward B.\n\n**Scenario C — Secular-Philosophical Reappropriation (15–25%).** The continental philosophy of religion lineage (Heidegger's late religious thought → Derrida's \"religion-without-religion\" → Marion's saturated phenomenon → Caputo's weak theology → Žižek's materialist Christology) continues to do serious work inside the academy. Not a popular phenomenon but durable: SPEP, the AAR Religion and Continental Philosophy unit, the *Journal for Cultural and Religious Theory*. The Girard reception also shades into this scenario through its anthropological mode opening onto secular readings.\n\n**Scenario D — Continued Fragmentation (15–25%).** The null hypothesis: no dominant reading consolidates; the field remains a plural mosaic of mystical-individualist, post-liberal-confessional, continental-philosophical
