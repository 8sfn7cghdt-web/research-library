" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">Peirce&#8217;s maxim<\/text>\n<text x=\"95\" y=\"366\" text-anchor=\"middle\" font-size=\"8\" class=\"t-mono t-muted\">1878<\/text>\n<line x1=\"91\" y1=\"288\" x2=\"95\" y2=\"348\" class=\"ln-soft\" stroke-width=\"0.8\"/>\n<line x1=\"137\" y1=\"237\" x2=\"137\" y2=\"304\" class=\"s-t2\" stroke-width=\"1\" opacity=\"0.4\"/>\n<circle cx=\"137\" cy=\"304\" r=\"4.5\" class=\"f-t2\"/>\n<text x=\"146\" y=\"320\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">James, Principles<\/text>\n<text x=\"146\" y=\"330\" text-anchor=\"middle\" font-size=\"8\" class=\"t-mono t-muted\">1890<\/text>\n<line x1=\"160\" y1=\"237\" x2=\"160\" y2=\"284\" class=\"s-t2\" stroke-width=\"1\" opacity=\"0.4\"/>\n<circle cx=\"160\" cy=\"284\" r=\"4\" class=\"f-t2\"/>\n<text x=\"168\" y=\"356\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">Dewey, reflex arc<\/text>\n<text x=\"168\" y=\"366\" text-anchor=\"middle\" font-size=\"8\" class=\"t-mono t-muted\">1896<\/text>\n<line x1=\"160\" y1=\"288\" x2=\"168\" y2=\"348\" class=\"ln-soft\" stroke-width=\"0.8\"/>\n<line x1=\"226\" y1=\"237\" x2=\"226\" y2=\"304\" class=\"s-t2\" stroke-width=\"1\" opacity=\"0.4\"/>\n<circle cx=\"226\" cy=\"304\" r=\"4\" class=\"f-t2\"/>\n<text x=\"226\" y=\"320\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">Royce<\/text>\n<text x=\"226\" y=\"330\" text-anchor=\"middle\" font-size=\"8\" class=\"t-mono t-muted\">1913<\/text>\n<line x1=\"480\" y1=\"237\" x2=\"480\" y2=\"304\" class=\"s-t2\" stroke-width=\"1\" opacity=\"0.4\"/>\n<circle cx=\"480\" cy=\"304\" r=\"4\" class=\"f-t2\"/>\n<text x=\"480\" y=\"320\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">Rorty<\/text>\n<text x=\"480\" y=\"330\" text-anchor=\"middle\" font-size=\"8\" class=\"t-mono t-muted\">1979<\/text>\n<line x1=\"538\" y1=\"237\" x2=\"538\" y2=\"304\" class=\"s-t2\" stroke-width=\"1\" opacity=\"0.4\"/>\n<circle cx=\"538\" cy=\"304\" r=\"4\" class=\"f-t2\"/>\n<text x=\"538\" y=\"320\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">Brandom<\/text>\n<text x=\"538\" y=\"330\" text-anchor=\"middle\" font-size=\"8\" class=\"t-mono t-muted\">1994<\/text>\n<path d=\"M137,300 C 150,250 162,210 176,190\" fill=\"none\" class=\"s-t2\" stroke-width=\"1.5\" stroke-dasharray=\"3 3\"/>\n<rect x=\"196\" y=\"280\" width=\"210\" height=\"26\" class=\"f-bg\" stroke-width=\"1\" style=\"stroke:var(--border)\"/>\n<text x=\"301\" y=\"291\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\" style=\"fill:var(--t2)\">Husserl annotates James&#8217;s Principles<\/text>\n<text x=\"301\" y=\"301\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\">c. 1891&#8211;94 &#183; the Leuven copy, marked in shorthand<\/text>\n<rect x=\"548\" y=\"262\" width=\"26\" height=\"50\" class=\"f-t5\" opacity=\"0.18\"/>\n<line x1=\"561\" y1=\"186\" x2=\"561\" y2=\"304\" class=\"s-t5\" stroke-width=\"1.6\" stroke-dasharray=\"2 3\"/>\n<text x=\"610\" y=\"288\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\" style=\"fill:var(--t5)\">CONVERGENCE<\/text>\n<text x=\"610\" y=\"299\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\">Embodied Mind 1991;<\/text>\n<text x=\"610\" y=\"309\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\">McDowell&#8211;Dreyfus &#8217;07&#8211;&#8217;13<\/text>\n<text x=\"350\" y=\"420\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\" font-style=\"italic\">Both lanes published landmark works in the same year, 1913 &#8212; and the only early crossing runs one way: Husserl read James, not the reverse.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 2.<\/strong> The traditions are exact contemporaries, not a sequence: pragmatism opens in Cambridge (1872) as phenomenology gathers in Vienna and Freiburg. The single documented early contact is asymmetric &#8212; Husserl annotated James&#8217;s <em>Principles<\/em> around 1891&#8211;94; James never read Husserl &#8212; and the lanes do not truly rejoin until the 1991&#8211;2013 convergence.<\/figcaption>\n<\/figure>\n\n\nThe fact most often missed: phenomenology and pragmatism began at the same time, in different languages, in response to the same intellectual situation. Both were post-Hegelian (suspicious of speculative system), post-Darwinian (taking mind as continuous with biology), and post-positivist (suspicious of both reductive materialism and a priori metaphysics). Both took Brentano-style intentionality, Bain-style belief-as-habit-of-action, or some combination as their starting point. Both were trying to describe mental life rigorously without lapsing into either British associationism or German speculative idealism.\n\nThe traditions read one another. Husserl read selected chapters of James's *Principles* between roughly 1891 and 1894 (the precise chronology depends on Schuhmann's *Husserl-Chronik*; this is the verification refinement — Document 09, Verification 1). His personal copy, preserved at the Husserl Archives in Leuven, bears selective heavy marking in Chapters 9 (\"The Stream of Thought\") and 15 (\"The Perception of Time\"); the chapter on time-consciousness shows five diagonal strokes along Hodgson's extended footnote. The *Logical Investigations* cite James explicitly on the \"fringe\" (*Hof, Horizont*) — the penumbra of co-present non-thematic content surrounding the focal object — which becomes one of the load-bearing concepts of mature Husserlian phenomenology. Husserl indicated in a 1906 letter to William Ernest Hocking (in Schuhmann's *Briefwechsel*, Hua-Dok III, 1994) that James's *Principles* had been important to his break from psychologism (the corpus's earlier quotation of \"freed\" should be softened to indirect description, since the precise German could not be verified — Document 09, Verification 1). The load-bearing archival citation is Schuhmann's *Husserl-Chronik* (1977) and the *Briefwechsel* (1994); Wilshire (1968) and Edie (1987) are interpretive monographs that make the philosophical case rather than the archival evidence.\n\nThe reverse channel is weaker. James never read Husserl seriously, but his late \"radical empiricism\" essays (1904–07) — \"Does 'Consciousness' Exist?\", \"A World of Pure Experience\" — describe a neutral matrix of \"pure experience\" prior to the subject-object distinction that has been read (Wilshire, Edie, Steven Levine) as parallel to Husserl's bracketing of the natural attitude. Whether this constitutes convergent evolution or a hidden mediator (Bergson — see below) is an open historiographic question. The third corner of the early dialogue is **Henri Bergson** (1859–1941), born the same year as Husserl and Dewey; James championed Bergson in *A Pluralistic Universe* (1909); Bergson wrote a sixteen-page preface to the 1911 French translation of James's *Pragmatism*; Husserl read Bergson on internal time-consciousness; Merleau-Ponty engaged Bergson directly. Bergson is the missing French member of the early James-Husserl conversation, and his near-absence from Round 1's convergence document is the most significant single omission Document 09 identifies (Gap-Fill 3).\n\nThe **analytic-continental divide** that came to define mid-20th-century American philosophy is partly real and partly an artifact. It is partly real because phenomenology's Husserlian form does pursue *a priori* essences via the *epoché*; pragmatism's Deweyan form does treat philosophy as continuous with empirical inquiry; and analytic philosophy's mid-century form did emphasize logical analysis as the route to clarity. These are genuine commitments. But the divide became as rigid as it did because of institutional history (Document 07, §12): the emigré settlement (1933–45) deposited European phenomenologists at the New School and Catholic universities, not at the leading research departments; postwar analytic ascendancy squeezed out classical pragmatism (Dewey died in 1952; Peirce was barely read); the Cold War rewarded technical rigor and treated continental philosophy as suspect by association with Heidegger's politics; and the APA-SPEP-SAAP organizational structure entrenched the segregation in the job market itself. The infrastructure of segregation outlasted the philosophical commitments that justified it. The convergence of the last forty years (treated in Part II below) is the slow undoing of that institutional history.\n\n---\n\n## Part II: The Current State\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 432\" role=\"img\" aria-label=\"A two by two grid. Columns are Psychology (green) and Christianity (aubergine); rows are Phenomenology (indigo, top) and Pragmatism (oxblood, bottom). Top-left, Document 03: Jaspers 1913, phenomenological psychiatry, Heidelberg and Copenhagen EASE, Merleau-Ponty's lived body. Top-right, Document 05: the French theological turn, Marion, Henry, Lacoste, Edith Stein, Wojtyla, givenness. Bottom-left, Document 04: James's Principles 1890, Dewey's reflex arc 1896, Mead, Gibson's affordances, leading to 4E. Bottom-right, Document 06: James's Varieties 1902, Royce's Beloved Community, Dewey's A Common Faith 1934, West's prophetic pragmatism. A badge notes that 4E cognitive science is where both traditions meet.\">\n<text x=\"350\" y=\"28\" text-anchor=\"middle\" font-size=\"15\" class=\"t-serif\" letter-spacing=\"2\">THE CORPUS GRID<\/text>\n<text x=\"350\" y=\"46\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">two traditions &#215; two applied registers &#8212; the four current-state documents<\/text>\n<text x=\"303\" y=\"82\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" style=\"fill:var(--t3)\">PSYCHOLOGY<\/text>\n<text x=\"303\" y=\"95\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\">the empirical register<\/text>\n<text x=\"549\" y=\"82\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" style=\"fill:var(--t4)\">CHRISTIANITY<\/text>\n<text x=\"549\" y=\"95\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\">the theological register<\/text>\n<text x=\"30\" y=\"178\" font-size=\"11\" font-weight=\"bold\" class=\"t-acc\" style=\"fill:var(--t1)\" transform=\"rotate(-90 30 178)\" text-anchor=\"middle\">PHENOMENOLOGY<\/text>\n<text x=\"30\" y=\"316\" font-size=\"11\" font-weight=\"bold\" style=\"fill:var(--t2)\" transform=\"rotate(-90 30 316)\" text-anchor=\"middle\">PRAGMATISM<\/text>\n<rect x=\"48\" y=\"108\" width=\"510\" height=\"0.1\"/>\n<rect x=\"182\" y=\"108\" width=\"242\" height=\"134\" class=\"f-panel\" stroke-width=\"1.3\" style=\"stroke:var(--border)\"/>\n<rect x=\"182\" y=\"108\" width=\"242\" height=\"6\" class=\"f-t1\"/>\n<text x=\"190\" y=\"130\" font-size=\"8\" class=\"t-mono t-muted\">DOC 03<\/text>\n<text x=\"303\" y=\"130\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">Phenomenological psychiatry<\/text>\n<text x=\"303\" y=\"150\" text-anchor=\"middle\" font-size=\"8.7\" class=\"t-muted\">Jaspers 1913 &#183; Verstehen / Erkl&#228;ren<\/text>\n<text x=\"303\" y=\"166\" text-anchor=\"middle\" font-size=\"8.7\" class=\"t-muted\">Merleau-Ponty: the lived body<\/text>\n<text x=\"303\" y=\"182\" text-anchor=\"middle\" font-size=\"8.7\" class=\"t-muted\">Heidelberg &#183; Copenhagen (EASE)<\/text>\n<text x=\"303\" y=\"198\" text-anchor=\"middle\" font-size=\"8.7\" class=\"t-muted\">Fuchs &#183; Stanghellini &#183; Parnas<\/text>\n<text x=\"303\" y=\"222\" text-anchor=\"middle\" font-size=\"8.5\" font-style=\"italic\" style=\"fill:var(--t3)\">describing disordered experience from within<\/text>\n<rect x=\"428\" y=\"108\" width=\"242\" height=\"134\" class=\"f-panel\" stroke-width=\"1.3\" style=\"stroke:var(--border)\"/>\n<rect x=\"428\" y=\"108\" width=\"242\" height=\"6\" class=\"f-t1\"/>\n<text x=\"436\" y=\"130\" font-size=\"8\" class=\"t-mono t-muted\">DOC 05<\/text>\n<text x=\"549\" y=\"130\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">The French theological turn<\/text>\n<text x=\"549\" y=\"150\" text-anchor=\"middle\" font-size=\"8.7\" class=\"t-muted\">Marion &#183; Henry &#183; Lacoste &#183; Chr&#233;tien<\/text>\n<text x=\"549\" y=\"166\" text-anchor=\"middle\" font-size=\"8.7\" class=\"t-muted\">Edith Stein &#183; Wojty&#322;a (Lublin)<\/text>\n<text x=\"549\" y=\"182\" text-anchor=\"middle\" font-size=\"8.7\" class=\"t-muted\">givenness &#183; the saturated phenomenon<\/text>\n<text x=\"549\" y=\"198\" text-anchor=\"middle\" font-size=\"8.7\" class=\"t-muted\">Janicaud&#8217;s standing objection<\/text>\n<text x=\"549\" y=\"222\" text-anchor=\"middle\" font-size=\"8.5\" font-style=\"italic\" style=\"fill:var(--t4)\">the most theologically productive movement<\/text>\n<rect x=\"182\" y=\"246\" width=\"242\" height=\"134\" class=\"f-panel\" stroke-width=\"1.3\" style=\"stroke:var(--border)\"/>\n<rect x=\"182\" y=\"246\" width=\"242\" height=\"6\" class=\"f-t2\"/>\n<text x=\"190\" y=\"268\" font-size=\"8\" class=\"t-mono t-muted\">DOC 04<\/text>\n<text x=\"303\" y=\"268\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">Functionalism &amp; the social self<\/text>\n<text x=\"303\" y=\"288\" text-anchor=\"middle\" font-size=\"8.7\" class=\"t-muted\">James, Principles 1890<\/text>\n<text x=\"303\" y=\"304\" text-anchor=\"middle\" font-size=\"8.7\" class=\"t-muted\">Dewey, the reflex arc 1896<\/text>\n<text x=\"303\" y=\"320\" text-anchor=\"middle\" font-size=\"8.7\" class=\"t-muted\">Mead &#183; Gibson&#8217;s affordances<\/text>\n<text x=\"303\" y=\"336\" text-anchor=\"middle\" font-size=\"8.7\" class=\"t-muted\">the replication crisis as method-turn<\/text>\n<text x=\"303\" y=\"360\" text-anchor=\"middle\" font-size=\"8.5\" font-style=\"italic\" style=\"fill:var(--t3)\">founded American academic psychology<\/text>\n<rect x=\"428\" y=\"246\" width=\"242\" height=\"134\" class=\"f-panel\" stroke-width=\"1.3\" style=\"stroke:var(--border)\"/>\n<rect x=\"428\" y=\"246\" width=\"242\" height=\"6\" class=\"f-t2\"/>\n<text x=\"436\" y=\"268\" font-size=\"8\" class=\"t-mono t-muted\">DOC 06<\/text>\n<text x=\"549\" y=\"268\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">A naturalist &amp; prophetic faith<\/text>\n<text x=\"549\" y=\"288\" text-anchor=\"middle\" font-size=\"8.7\" class=\"t-muted\">James, Varieties 1902<\/text>\n<text x=\"549\" y=\"304\" text-anchor=\"middle\" font-size=\"8.7\" class=\"t-muted\">Royce&#8217;s Beloved Community 1913<\/text>\n<text x=\"549\" y=\"320\" text-anchor=\"middle\" font-size=\"8.7\" class=\"t-muted\">Dewey, A Common Faith 1934<\/text>\n<text x=\"549\" y=\"336\" text-anchor=\"middle\" font-size=\"8.7\" class=\"t-muted\">West&#8217;s prophetic pragmatism<\/text>\n<text x=\"549\" y=\"360\" text-anchor=\"middle\" font-size=\"8.5\" font-style=\"italic\" style=\"fill:var(--t4)\">the strongest American religious philosophy<\/text>\n<text x=\"350\" y=\"408\" text-anchor=\"middle\" font-size=\"9\" style=\"fill:var(--t5)\">&#9670; In the left column the two traditions already meet &#8212; 4E cognitive science draws on both &#9670;<\/text>\n<text x=\"350\" y=\"426\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-muted\" font-style=\"italic\">Each tradition was, against the textbook caricature, continuously serious about both science and God.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 4.<\/strong> The corpus&#8217;s skeleton in one grid: neither movement stayed &#8220;pure philosophy.&#8221; Both founded a psychology (phenomenological psychiatry; American functionalism) <em>and<\/em> generated a major Christian literature (the French theological turn; James&#8217;s <em>Varieties<\/em> through West) &#8212; and the empirical column is exactly where they have already fused, in 4E cognitive science.<\/figcaption>\n<\/figure>\n\n\n### 4. Phenomenology and Pragmatism in Psychology and Cognitive Science\n\nPhenomenology has never been anti-psychology. The standard textbook caricature — that Husserl's 1900 anti-psychologism cordoned philosophy off from empirical science — collapses on contact with the archive. Phenomenology was born inside a psychology textbook (Brentano 1874), was sharpened by *distinguishing itself from* a particular psychological reduction of logic (Husserl 1900), and almost immediately rejoined empirical work through psychiatry. Husserl himself, by 1925, was lecturing on a *phenomenological psychology* (Husserliana IX) explicitly conceived as a propaedeutic to transcendental phenomenology (Document 03, §2).\n\n**Phenomenological psychiatry** began with Karl Jaspers's *Allgemeine Psychopathologie* (1913) — commissioned when Jaspers was 28 — which installed the *Verstehen / Erklären* distinction (borrowed from Dilthey and the German hermeneutic tradition) as the methodological foundation of psychiatry. Some symptoms can be *explained* causally; others must be *understood* from within the patient's perspective; both are necessary, and the great error of biological psychiatry is to imagine that *Erklären* exhausts the field. Jaspers's principle that schizophrenia involves experiences not psychologically derivable from prior experiences remains a touchstone in continental phenomenological psychopathology. Ludwig Binswanger's *Daseinsanalyse*, Eugène Minkowski on lived time, Erwin Straus on the lived body, and Medard Boss in the *Zollikon Seminars* (held with Heidegger 1959–69) extended the program through mid-century (Document 03, §3). **Merleau-Ponty**'s *Phenomenology of Perception* (1945) — anchored in continuous engagement with Gestalt psychology, Goldstein's neurology, and the Schneider case (a brain-injured WWI veteran studied by Gelb and Goldstein) — installed the lived body as the central category. The post-war American transmission ran through Frankl's logotherapy, Rollo May, James Bugental, and Yalom; the methodological transmission ran through the **Duquesne school** (van Kaam, Giorgi) and into **empirical-phenomenological method** — Giorgi's descriptive phenomenological method (codified 2009), Interpretive Phenomenological Analysis (Smith, Flowers, Larkin), and van Manen's phenomenology of practice — now a standard pillar of qualitative research in clinical psychology, nursing, education, and health sciences (Document 03, §§4–6).\n\nOn the pragmatist side, the relationship is closer still. James's *Principles* (1890) is at once the founding text of American academic psychology and a key pragmatist text — \"psychology\" and \"philosophy\" are not separable layers but the same doctrines at different grain. Dewey's 1896 reflex arc paper is empirical psychology, philosophical methodology, and instrumentalist metaphysics in a single argument. The Chicago functionalists dominated American psychology from 1894 to 1913. Watson's 1913 behaviorist manifesto *claimed* lineage from functionalism while jettisoning the Jamesian inner life that functionalism had taken as data; whether behaviorism is the legitimate heir of functionalism is genuinely disputed (Dewey himself criticized behaviorism's reductionism throughout the 1920s–30s). Skinner's radical behaviorism, despite its anti-philosophical posture, has a recognizably pragmatist epistemology — operationalism in service of prediction and control — most explicit in *About Behaviorism* (1974). Chomsky's 1959 review of *Verbal Behavior* marked the start of the cognitive revolution, which was anti-behaviorist but inherited pragmatist DNA through Quine, Sellars, and Putnam's philosophy-of-mind functionalism (Document 04, §§1–5).\n\n**J. J. Gibson**'s ecological psychology — *The Ecological Approach to Visual Perception* (1979) — explicitly cited James on the experienced reality of relations, and developed a theory of perception in terms of **affordances** (the action-possibilities the environment offers a particular organism). Gibson was largely ignored by mainstream cognitive science in the 1980s and 1990s but has been recovered through 4E and is now a major resource in both robotics and philosophy of mind (Document 04, §6).\n\nThe convergence runs through **4E cognitive science** — *embodied, embedded, enacted, extended* — which is now the single most important venue where phenomenology and pragmatism meet empirical work. The founding text is Varela, Thompson, and Rosch's *The Embodied Mind* (1991, revised edition 2016 by Thompson and Rosch after Varela's 2001 death). On the verification's refinement (Document 09, Verification 8): *The Embodied Mind*'s explicit synthesis is of Merleau-Pontian phenomenology, Buddhist Madhyamaka meditation traditions, and autopoietic biology; the *pragmatist* lineage of enactivism (Dewey, Mead, Gibson) is implicit in the 1991 edition and was made more explicit only in subsequent literature (Thompson 2007; Crippen 2017; Madzia and Jung 2016). The 2016 revised edition expanded the Buddhist framing more than the pragmatist. Shaun Gallagher's *How the Body Shapes the Mind* (2005), Thompson's *Mind in Life* (2007), Alva Noë's *Action in Perception* (2004), and Thomas Fuchs's contributions are the principal monographs. The journal *Phenomenology and the Cognitive Sciences* (founded 2002, Gallagher and Zahavi) institutionalizes the alliance. The 4E vocabulary — affordance, absorbed coping, sense-making, background, intentional arc, motor intentionality — is now the lingua franca of the field (Document 03, §7; Document 04, §7; Document 07, §11).\n\nContemporary **phenomenological psychiatry** has consolidated around three centers: Heidelberg (Thomas Fuchs and his group on minimal self and lived time), Florence (Giovanni Stanghellini), and Copenhagen (Josef Parnas, Dan Zahavi; the EASE instrument — Examination of Anomalous Self-Experience — is in clinical use across multiple European centers). Louis Sass on schizophrenia and modernism (*Madness and Modernism*, 1992) and Matthew Ratcliffe on depression and existential feelings (*Feelings of Being*, 2008; *Experiences of Depression*, 2015) are the major Anglophone contributions. The *Oxford Handbook of Phenomenological Psychopathology* (Stanghellini et al. 2019) is now a standard reference (Document 03, §8).\n\nThree live debates in 2026: (i) Whether **predictive processing** (Friston, Clark, Hohwy) is the formal mechanism of an enactive mind or, on the radical-enactivist reading (Hutto-Myin, Chemero, Di Paolo), a representationalism in disguise fundamentally incompatible with enactivism — the field has not converged. (ii) Whether the **LLM revolution** vindicates, refutes, or transforms Dreyfus's Heideggerian critique of GOFAI: LLMs achieve general competence without classical symbolic representation (a partial vindication) but also without embodiment in the strong 4E sense (a partial refutation), and the field is just starting to work out what this means. (iii) Whether the gap between **empirical-phenomenological methods** (Giorgi, IPA, van Manen) and **philosophical phenomenology** is widening to formal separation or closing through neurophenomenology and similar bridges (Document 03, §9; Document 04, §7).\n\n### 5. Phenomenology and Christianity\n\nOf the major 20th-century philosophical movements, phenomenology has been by a clear margin the most religiously serious — and within \"religion,\" the most distinctively *Christianly* serious. This is not a sociological accident. The four founding-generation figures are biographically defined by the Christian question: Brentano (ex-priest, 1873); Husserl (Jewish-to-Lutheran convert, 1886); Heidegger (ex-seminarian, 1909–11; lifelong critical engagement with Paul, Augustine, Luther, and the \"last god\"); and Edith Stein (Jewish-to-Catholic convert 1922, Carmelite 1933, murdered at Auschwitz 1942, canonized 1998). The Aristotelian-scholastic vocabulary that Brentano transmitted — intentionality, the formal/objective being of the mental object, the analysis of judgment — gave the next generation of phenomenologists a technical apparatus natively continuous with Catholic philosophical theology, even when its users were religiously elsewhere. The Husserlian *epoché* and the analysis of consciousness as essentially open to its object turned out to be uncannily continuous with apophatic, iconic, and liturgical strands of the Christian tradition (Document 05, §0).\n\n**Edith Stein**'s dissertation *On the Problem of Empathy* (*Zum Problem der Einfühlung*, 1916; published 1917) was completed under Husserl at Freiburg; she served as his first paid assistant from October 1916 to February 1918, organizing the manuscripts that became *Ideas II*. She converted to Catholicism in 1922 after reading the *Life* of Teresa of Ávila, taught at the Dominican school in Speyer, entered the Discalced Carmelites in Cologne in 1933, and was murdered at Auschwitz-Birkenau on 9 August 1942 after the Dutch bishops' July 1942 protest against Jewish deportations triggered Nazi retaliation against baptized Jews. *Finite and Eternal Being* (completed 1937, published posthumously 1950) is the sustained Husserlian-Thomist synthesis. She was beatified by John Paul II in 1987, canonized in 1998, proclaimed co-patron of Europe in 1999. Pope Francis received a formal request from the Discalced Carmelites in April 2024 to declare her a Doctor of the Church (Document 05, §4). **Karol Wojtyła** / John Paul II built the **Lublin school** synthesis: his Habilitation (1953) was a critique of Scheler's value-ethics from a Thomist position; *The Acting Person* (Polish 1969; English 1979, the disputed Tymieniecka translation) draws on Scheler's *Formalism in Ethics* and Husserl's *Ideas II* but corrects them from a Thomist register; *Veritatis Splendor* (1993) and *Fides et Ratio* (1998) carry phenomenological argumentation, though they are not phenomenological treatises (Document 05, §5).\n\n**Heidegger**'s 1920–21 Freiburg lectures on Paul (1 and 2 Thessalonians) and his 1921 lectures on Augustine's *Confessions* Book X — published as *Phänomenologie des religiösen Lebens* (GA 60, 1995; English translation by Fritsch and Gosetti-Ferencei, Indiana UP 2004) — are not \"Heidegger on religion\" in the sense of an applied side project. They are the workshop in which key *Being and Time* concepts (kairological time, *faktisches Leben*, anticipation, *cura*) are first developed in religious form. Kisiel's *Genesis of Heidegger's \"Being and Time\"* (1993) is the canonical reconstruction, supplemented by van Buren's *The Young Heidegger* (1994) and Crowe's *Heidegger's Religious Origins* (Indiana 2006). The 2014 publication of the *Schwarze Hefte* has compelled Christian theologians reading Heidegger to take the antisemitism into account — Marion was direct in his 2015 Sorbonne seminar that late Heidegger's framework cannot be wholly received without contamination from the Notebooks, though the early Pauline-Augustinian phenomenology remains usable (Document 05, §§1.3, 3).\n\nThe **French theological turn** is the most consequential and most disputed development in late-20th-century philosophy of religion. **Jean-Luc Marion**, **Michel Henry**, **Jean-Yves Lacoste**, **Jean-Louis Chrétien**, and (later) **Emmanuel Falque** developed phenomenologies of givenness, of Life as auto-affection, of liturgical non-experience, of call and response, and of finitude that engage Christian theological sources with a depth no other 20th-century philosophical movement approached. **Levinas** sits inside this cohort biographically (Jewish, post-Heideggerian, working out a phenomenology of the Other) even though his theological resources are Hebraic; **Paul Ricoeur** is sometimes classed inside it and is the principal Reformed Protestant voice (Document 05, §6). In 1991 **Dominique Janicaud**'s report to the Institut International de Philosophie, published as *Le Tournant théologique de la phénoménologie française*, charged that this cohort had quietly smuggled theological content into phenomenology under cover of phenomenological method, abandoning the discipline's commitment to immanence and \"appearance as such.\" On Document 09's refinement (Verification 4): Janicaud's original target list included **Ricoeur** as well as Levinas, Marion, Henry, and Chrétien; the Round 1 corpus treats Ricoeur primarily as a responder, but Ricoeur was also among those originally targeted, which is why his contribution to the *Phenomenology and the \"Theological Turn\": The French Debate* volume (Fordham 2000) reads more as self-defense than as neutral commentary. The Fordham volume is an *anthology* — collecting Janicaud's 1991 essay, his 1998 *La phénoménologie éclatée*, and the responses by Courtine, Chrétien, Henry, Marion, and Ricoeur — not a coordinated reply. Marion's defense is that Husserl's *epoché* brackets the metaphysical God of philosophy, not the God of revelation, who can give Himself as a *saturated phenomenon* exceeding our intentional capacities (Document 05, §7).\n\nThe debate is genuinely unresolved. It is not a debate the secondary literature has \"moved past\"; it is still the live question. Three positions remain in active circulation: (a) Janicaud's charge is decisive and unanswered; (b) pure givenness is not yet theology, and Marion's program is a legitimate radicalization of phenomenology; (c) the charge has been productive in refining rather than refuting the theological turn, and Falque's \"crossing the Rubicon\" — which avows the two-way crossing between phenomenology and theology — is the natural maturation. Derrida's 1997 Villanova intervention with Marion (collected in *God, the Gift, and Postmodernism*, eds. Caputo and Scanlon, Indiana UP 1999) is the major Anglophone echo.\n\nBeyond the French center, **Orthodox phenomenology** runs through Christos Yannaras's *Person and Eros* (1970) and John Manoussakis's *God After Metaphysics* (2007), engaging Heidegger and Levinas through Cappadocian and Palamite sources; the **Russian religious-philosophical** tradition (Florensky's *The Pillar and Ground of the Truth*, 1914; Bulgakov's Sophiological trilogy, 1933–46) is a parallel Christian-phenomenological resource that contemporary Orthodox theology (David Bentley Hart, Aristotle Papanikolaou) is recovering (Document 09, Gap-Fill 9). **Hans Urs von Balthasar**'s theological aesthetics borrows Husserlian, Heideggerian, and Schelerian vocabulary; **Karl Rahner** studied directly under Heidegger and built a transcendental Thomism on that foundation; **Bultmann**'s entire program of demythologization is unintelligible without Heidegger. English-language Christian phenomenology divides into a Reformed/evangelical wing (Westphal, James K. A. Smith, Benson) leaning on Heidegger and Derrida for ontotheology critique, and a Catholic wing (Robyn Horner, Christina Gschwandtner, Brian Robinette, Anthony Steinbock, Brian Treanor) leaning on Marion, Henry, and Lacoste.\n\n### 6. Pragmatism and Christianity\n\nAmerican pragmatism was never an anti-religious tradition. Three of its four founders — Peirce, James, Royce — were religious thinkers in the strict sense, and the fourth, Dewey, was a religious sensibility forced out of institutional religion by his own naturalism. The classical pragmatist period (c. 1870–1940) was deeply entangled with American Protestant religious life. Peirce was Episcopalian and developed in \"A Neglected Argument for the Reality of God\" (*Hibbert Journal*, October 1908) a genuinely pragmatist defense of theism via \"Musement\" and abductive inference, recognizably mapped onto his agapism. James, son of the Swedenborgian Henry James Sr., was a serious religious thinker who never joined any church but produced in *The Varieties of Religious Experience* (1902) the most-read book in the psychology and philosophy of religion ever written in English. Royce — Peirce's student in logic at Johns Hopkins, James's Harvard colleague — produced in *The Problem of Christianity* (1913) the most theologically systematic work in the classical canon: Peirce's triadic semiotics taken into a theology of the *community of interpretation* and the *Beloved Community*, which feeds (directly and indirectly) into Martin Luther King Jr.'s usage. Dewey, raised Congregationalist in Burlington, quietly left the church around 1894 but did not lose a religious sensibility; *A Common Faith* (1934, the Terry Lectures at Yale) is the most influential naturalist account of religious life by an American philosopher (Document 06, §§1–4).\n\n*A Common Faith*'s key move is the distinction in Chapter 1, \"Religion versus the Religious\": *religion* names institutional, supernaturalist, doctrinal traditions; *the religious* names an attitude of devotion to ideals as ends in actual experience. Dewey's exact text on the religious: \"any activity pursued in behalf of an ideal end against obstacles and in spite of threats of personal loss because of conviction of its general and enduring value\" (*A Common Faith*, p. 27 in the 1934 Yale edition; *Later Works* vol. 9, p. 19). In Chapter 2, \"Faith and Its Object,\" Dewey uses \"God\" as a name for \"the active relation between the ideal and the actual.\" The book provoked a sharp split. Naturalists (Wieman, E. A. Burtt) read it as the philosophical charter of religious naturalism; Christian readers (Reinhold Niebuhr, H. Richard Niebuhr, Macintosh) read it as evasion (Document 06, §4).\n\nThe **Niebuhr-Dewey argument** has been one of the central American intellectual disputes of the 20th century. On Document 09's refinement (Verification 6b): Reinhold Niebuhr's actual published review of *A Common Faith* — in *The Nation*, 1934 — was, on the Cambridge volume's characterization, \"calm and respectful.\" The substantive critique came earlier, in *Moral Man and Immoral Society* (1932, two years *before* the Terry Lectures), and continued through essays of the late 1930s and 1940s. Niebuhr argued that liberal pragmatism, including Dewey's, had no adequate account of structural sin, collective egoism, or coercion in social change; it relied on a moral optimism about human collectives that history flatly refutes. Niebuhr's *Nature and Destiny of Man* (1939 Gifford Lectures; published 1941–43) provides the full Christian anthropology. Dewey's response was that he had never held the naïve optimism Niebuhr ascribed to him; readers continue to disagree. **H. Richard Niebuhr** — Reinhold's younger brother — was the more pragmatist Niebuhr; *The Meaning of Revelation* (1941) reads revelation as the formative pattern of communal interpretation, in a recognizably Roycean register (Document 06, §§5–6).\n\nLiberal Protestantism's pragmatist phase — running from Walter Rauschenbusch's Social Gospel (*Christianity and the Social Crisis*, 1907; *A Theology for the Social Gospel*, 1917) through the early Niebuhr to the chastened post-WWII mainline — declined for reasons internal (Niebuhrian critique, Barthian renewal) and external (the secularization of the mainline, the postliberal turn). The Rauschenbusch-Rorty genealogy is worth naming: Rorty's maternal grandfather was Walter Rauschenbusch, and Rorty's *Achieving Our Country* (1998) is the late, self-consciously post-religious restatement of the Whitman-Dewey-King-Rauschenbusch line of American religious-democratic hope (Document 09, Gap-Fill 6).\n\nThe Yale **postliberal** school — Hans Frei's *The Eclipse of Biblical Narrative* (1974), **George Lindbeck**'s *The Nature of Doctrine* (1984), and **Stanley Hauerwas**'s extended career — built a Wittgensteinian-pragmatist alternative to both cognitive-propositional and experiential-expressive models of religion. Lindbeck's \"cultural-linguistic\" theory treats doctrines as the grammar of a religious form of life rather than as referential propositions about supernatural reality; the meaning of religious assertions is given by their regulative role in the community's practice. This is structurally pragmatist (meaning by use) and structurally Wittgensteinian. Whether postliberalism is best classified as a species of pragmatism or as its principal Christian opponent is contested. Hauerwas — Duke Divinity for most of his career — has developed the most influential American theological ethics of the past forty years, with a sustained polemic against liberal democracy as a moral framework for Christian witness (Document 06, §7; Document 09, Gap-Fill 15).\n\n**Cornel West**'s *The American Evasion of Philosophy* (1989) reads the pragmatist tradition genealogically from Emerson through Dewey to West's own **prophetic pragmatism**: a synthesis of Deweyan democratic experimentalism, Marxist class analysis, and Black-church prophetic theology, treating the Black church as a living, unfinished resource for the pragmatist tradition rather than a footnote. On Document 09's refinement (Verification 7): West earned his Princeton PhD in 1980 with the dissertation later revised as *The Ethical Dimensions of Marxist Thought* (Monthly Review Press, 1991). Rorty was on the Princeton faculty during West's graduate years and is widely acknowledged as a major influence and committee member; whether Rorty was the formal sole dissertation supervisor cannot be confirmed from available sources, so the safer formulation is that Rorty was on the committee as Princeton's principal pragmatist. The substantive point — that West's prophetic pragmatism is a deliberate reconstruction of Rorty's neopragmatism with Marxism and Black religious resources restored — is firmly established. **Jeffrey Stout**'s *Democracy and Tradition* (2004) defends \"ordinary democracy\" as itself a tradition with virtues, history, and habits, against the postliberal claim (associated with MacIntyre and especially Hauerwas) that liberal democracy is morally bankrupt and alien to authentic Christian witness. The **Stout-Hauerwas debate** is the principal academic theology argument of the early 2000s. **Eddie Glaude**'s *In a Shade of Blue* (2007) and *An Uncommon Faith* (2018), along with Vincent Lloyd and Melvin Rogers, continue the Black-prophetic-pragmatist line (Document 06, §§8–9).\n\n**Richard Rorty**'s positions on religion shifted: \"Religion as Conversation-Stopper\" (1994) treated religious appeals in political discussion as un-discussable; his later \"Anti-clericalism and Atheism\" (2003) and the Vattimo exchange *The Future of Religion* (2005) softened the position toward a post-metaphysical Christianity in dialogue with Vattimo's kenotic reading. **Charles Taylor**'s *Sources of the Self* (1989), *A Secular Age* (2007), and *The Language Animal* (2016) constitute the most successful living philosophical bridge between phenomenology, pragmatism, and Christian (Catholic) tradition. *A Secular Age* draws heavily on James's *Varieties* and is the most influential contemporary book at the intersection of these three concerns. **Process theology** — Whitehead acknowledging James and Dewey by name in *Process and Reality* (1929), developed institutionally by Hartshorne and Cobb — remains the most institutionally established pragmatist-adjacent Christian theological school in North America. **Dorothy Day** and the **Catholic Worker** movement (founded 1933) provide an American Catholic religious-pragmatist tradition — doctrine *enacted* and only thus understood — that is the natural Catholic counterpart to the Addams-Dewey Hull House story (Document 06, §§10–12; Document 09, Gap-Fill 12).\n\n### 7. Convergence and Remaining Tensions\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 432\" role=\"img\" aria-label=\"Four horizontal beams, each split between an indigo phenomenology block on the left and an oxblood pragmatism block on the right, with a central gap whose width encodes how far the disagreement resists reconciliation. Truth: eidetic necessity versus warranted assertibility, a medium gap, partial bridge via Brandom and Misak. Method: epoche and reduction versus inquiry with no separate method, a small gap that softens late. Transcendental versus naturalist: the constituting ego versus naturalism, the widest gap, the strongest tension. Religion: givenness and gift versus inquiry and fruits, the blocks touch, no resolution needed. A fifth dashed row notes the political asymmetry: German ambivalence versus a democratic tradition.\">\n<text x=\"350\" y=\"28\" text-anchor=\"middle\" font-size=\"15\" class=\"t-serif\" letter-spacing=\"2\">FOUR TENSIONS THAT DON&#8217;T DISSOLVE<\/text>\n<text x=\"350\" y=\"46\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">the gap at each beam&#8217;s centre is what no synthesis has closed<\/text>\n<text x=\"262\" y=\"72\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\" class=\"t-acc\" style=\"fill:var(--t1)\">PHENOMENOLOGY HOLDS<\/text>\n<text x=\"450\" y=\"72\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\" style=\"fill:var(--t2)\">PRAGMATISM HOLDS<\/text>\n<text x=\"636\" y=\"72\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\" class=\"t-muted\">STATUS<\/text>\n<text x=\"40\" y=\"106\" font-size=\"10\" font-weight=\"bold\">TRUTH<\/text>\n<rect x=\"170\" y=\"92\" width=\"161\" height=\"28\" class=\"f-t1\" opacity=\"0.82\"/>\n<text x=\"250\" y=\"110\" text-anchor=\"middle\" font-size=\"9\" class=\"t-inv\">eidetic necessity<\/text>\n<rect x=\"379\" y=\"92\" width=\"161\" height=\"28\" class=\"f-t2\" opacity=\"0.82\"/>\n<text x=\"459\" y=\"110\" text-anchor=\"middle\" font-size=\"9\" class=\"t-inv\">warranted assertibility<\/text>\n<text x=\"636\" y=\"103\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\">partial bridge<\/text>\n<text x=\"636\" y=\"114\" text-anchor=\"middle\" font-size=\"7.5\" class=\"t-muted\">Brandom &#183; Misak<\/text>\n<text x=\"40\" y=\"160\" font-size=\"10\" font-weight=\"bold\">METHOD<\/text>\n<rect x=\"170\" y=\"146\" width=\"167\" height=\"28\" class=\"f-t1\" opacity=\"0.82\"/>\n<text x=\"253\" y=\"164\" text-anchor=\"middle\" font-size=\"9\" class=\"t-inv\">epoch&#233; &amp; reduction<\/text>\n<rect x=\"373\" y=\"146\" width=\"167\" height=\"28\" class=\"f-t2\" opacity=\"0.82\"/>\n<text x=\"456\" y=\"164\" text-anchor=\"middle\" font-size=\"9\" class=\"t-inv\">inquiry, no method<\/text>\n<text x=\"636\" y=\"157\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\">softens late &#8212;<\/text>\n<text x=\"636\" y=\"168\" text-anchor=\"middle\" font-size=\"7.5\" class=\"t-muted\">not at the root<\/text>\n<text x=\"40\" y=\"214\" font-size=\"10\" font-weight=\"bold\">THE<\/text>\n<text x=\"40\" y=\"226\" font-size=\"10\" font-weight=\"bold\">TRANSCENDENTAL<\/text>\n<rect x=\"170\" y=\"200\" width=\"141\" height=\"28\" class=\"f-t1\" opacity=\"0.82\"/>\n<text x=\"240\" y=\"218\" text-anchor=\"middle\" font-size=\"9\" class=\"t-inv\">the constituting ego<\/text>\n<rect x=\"399\" y=\"200\" width=\"141\" height=\"28\" class=\"f-t2\" opacity=\"0.82\"/>\n<text x=\"469\" y=\"218\" text-anchor=\"middle\" font-size=\"9\" class=\"t-inv\">naturalism<\/text>\n<text x=\"636\" y=\"211\" text-anchor=\"middle\" font-size=\"8\" font-weight=\"bold\" style=\"fill:var(--t5)\">STRONGEST<\/text>\n<text x=\"636\" y=\"222\" text-anchor=\"middle\" font-size=\"7.5\" class=\"t-muted\">residual tension<\/text>\n<line x1=\"355\" y1=\"196\" x2=\"349\" y2=\"206\" class=\"s-t5\" stroke-width=\"1.4\"/>\n<line x1=\"349\" y1=\"206\" x2=\"357\" y2=\"214\" class=\"s-t5\" stroke-width=\"1.4\"/>\n<line x1=\"357\" y1=\"214\" x2=\"350\" y2=\"222\" class=\"s-t5\" stroke-width=\"1.4\"/>\n<line x1=\"350\" y1=\"222\" x2=\"356\" y2=\"232\" class=\"s-t5\" stroke-width=\"1.4\"/>\n<text x=\"40\" y=\"268\" font-size=\"10\" font-weight=\"bold\">RELIGION<\/text>\n<rect x=\"170\" y=\"254\" width=\"183\" height=\"28\" class=\"f-t1\" opacity=\"0.82\"/>\n<text x=\"261\" y=\"272\" text-anchor=\"middle\" font-size=\"9\" class=\"t-inv\">givenness &#183; gift<\/text>\n<rect x=\"357\" y=\"254\" width=\"183\" height=\"28\" class=\"f-t2\" opacity=\"0.82\"/>\n<text x=\"448\" y=\"272\" text-anchor=\"middle\" font-size=\"9\" class=\"t-inv\">inquiry &#183; fruits<\/text>\n<text x=\"636\" y=\"265\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\">no resolution<\/text>\n<text x=\"636\" y=\"276\" text-anchor=\"middle\" font-size=\"7.5\" class=\"t-muted\">needed<\/text>\n<text x=\"40\" y=\"330\" font-size=\"9.5\" font-weight=\"bold\" class=\"t-muted\">POLITICS<\/text>\n<text x=\"40\" y=\"341\" font-size=\"7.5\" class=\"t-muted\" font-style=\"italic\">(asymmetry)<\/text>\n<rect x=\"170\" y=\"316\" width=\"170\" height=\"26\" fill=\"none\" class=\"s-t1\" stroke-width=\"1.3\" stroke-dasharray=\"4 3\"/>\n<text x=\"255\" y=\"333\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-acc\" style=\"fill:var(--t1)\">German ambivalence<\/text>\n<rect x=\"370\" y=\"316\" width=\"170\" height=\"26\" fill=\"none\" class=\"s-t2\" stroke-width=\"1.3\" stroke-dasharray=\"4 3\"/>\n<text x=\"455\" y=\"333\" text-anchor=\"middle\" font-size=\"8.5\" style=\"fill:var(--t2)\">a democratic tradition<\/text>\n<text x=\"636\" y=\"327\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\">a difference,<\/text>\n<text x=\"636\" y=\"338\" text-anchor=\"middle\" font-size=\"7.5\" class=\"t-muted\">not a clash<\/text>\n<text x=\"350\" y=\"372\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">&#8593; widest gap = the constituting ego, which pragmatist naturalism cannot grant &#183; touching blocks = complementary, not opposed<\/text>\n<text x=\"350\" y=\"406\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\" font-style=\"italic\">Convergence is real but partial: the toolkit is shared, yet eidetic necessity and the transcendental ego stay outside the pragmatist&#8217;s reach.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 6.<\/strong> Where the two traditions genuinely cannot merge. The gap at each beam&#8217;s centre measures irreducibility: truth and method have been partly bridged, religion is complementary rather than contested (&#8220;different gifts&#8221;), but the transcendental constituting ego is the widest gap of all &#8212; the one commitment a thoroughgoing pragmatist naturalism still cannot grant.<\/figcaption>\n<\/figure>\n\n\nThe conventional story — continental phenomenology on one side, American pragmatism on the other, with analytic philosophy as a third wall — is sociologically real and philosophically thin. The traditions have been entangled from the start (James and Husserl, treated above), and their reunion in the late 20th and early 21st centuries has been the work of specific figures and specific institutions.\n\n**Alfred Schutz** (1899–1959) is the canonical first-generation synthesizer. A Vienna banker and philosopher, his *Der sinnhafte Aufbau der sozialen Welt* (1932) put Weber's *verstehende Soziologie* on a Husserlian foundation; Husserl read it and corresponded with him. Schutz fled to New York in 1939, taught at the New School, and worked Mead and James into a fundamentally Husserlian architecture: Husserl's alter ego completed by Mead's role-taking self; Husserl's horizon reworked as Schutzian typification; James's \"subuniverses of reality\" integrated with Husserl's *Lebenswelt*. Schutz's influence runs through Berger and Luckmann's *Social Construction of Reality* (1966), Garfinkel's ethnomethodology, and Aron Gurwitsch's parallel synthesis with Gestalt psychology. The limit: Schutz's American influence was substantial in sociology but minimal in philosophy proper (Document 07, §2).\n\n**Hubert Dreyfus** (1929–2017) is the central 20th-century *institutional* bridge between Heideggerian phenomenology and analytic philosophy of mind. His 1965 RAND memorandum \"Alchemy and Artificial Intelligence\" and *What Computers Can't Do* (1972) argued that the symbolic / representational approach to AI then dominant at MIT could not in principle deliver general intelligence — a critique that was Heideggerian in source (the ready-to-hand, the equipmental whole) and pragmatist in effect (Deweyan habit, the priority of skilled coping over rule-following). His *Being-in-the-World* (1991) made Heidegger teachable in American analytic graduate seminars. **John Haugeland** (1945–2010), Dreyfus's Berkeley student, sat at the Pittsburgh-Chicago-Berkeley axis with Sellars, Brandom, and Dreyfus, and produced in *Having Thought* (1998) and the posthumous *Dasein Disclosed* (ed. Rouse, 2013) the most rigorous attempt to think Heidegger inside analytic philosophy as a fundamentally normative structure (Document 07, §§3–4).\n\n**Robert Brandom**'s *Making It Explicit* (1994) and *A Spirit of Trust* (2019) describe themselves as \"analytic pragmatism\" while drawing explicitly on Sellars, Hegel, and Heidegger via the Pittsburgh school. **John McDowell**'s *Mind and World* (1994) developed in parallel: the canonical 21st-century document of the productive seam is the **McDowell-Dreyfus exchange**, which ran from Dreyfus's 2005 APA Pacific Division Presidential Address \"Overcoming the Myth of the Mental\" (*Proceedings and Addresses of the APA* 79(2): 47–65) through *Inquiry* 50(4) in 2007 — McDowell's \"What Myth?\", Dreyfus's \"The Return of the Myth of the Mental,\" McDowell's \"Response to Dreyfus,\" Dreyfus's \"Response to McDowell\" — and was archived in the 2013 Schear-edited volume *Mind, Reason, and Being-in-the-World: The McDowell-Dreyfus Debate* (Routledge), with contributions from Charles Taylor, Mark Wrathall, Stephen Mulhall, Joseph Rouse, and Sean Kelly. On Document 09's verification refinement: the *Philosophical Explorations* 13 (2010) reference some earlier sources cite cannot be confirmed and should be dropped. The continuation since Dreyfus's 2017 death runs through Wrathall, Carman, Schear, and Kelly (Document 07, §§5–6).\n\n**Charles Taylor** (b. 1931) is the philosopher most consistently read across both phenomenological and pragmatist graduate curricula. *Sources of the Self* (1989), *A Secular Age* (2007), and *The Language Animal* (2016) integrate Heideggerian hermeneutic phenomenology, Hegelian-Aristotelian ethics, Wittgensteinian philosophy of language, and pragmatist concerns about embodiment, practice, and the social imaginary — and a practicing Catholic faith. Taylor's contribution to the Schear 2013 volume is one of the most consequential third-party interventions in the McDowell-Dreyfus debate (Document 07, §7; Document 09, Gap-Fill 16). **Francisco Varela** (1946–2001), through *The Embodied Mind* (1991) and the **neurophenomenology** program (structured first-person plus third-person co-determination, continued by Petitmengin, Lutz, and the Heidelberg group), was the principal architect of the cognitive-science wing of the convergence. **Wittgenstein** is the contested common ancestor: Misak's *Cambridge Pragmatism* (2016) argues that Frank Ramsey transmitted Peircean pragmatism to Wittgenstein after Ramsey's 1924 Vienna visit; Herbert Spiegelberg in *The Phenomenological Movement* (1960) included a chapter on the (disputed) early Wittgensteinian phenomenology of the 1929–30 manuscripts; Rorty's appropriation of late Wittgenstein in 1979 is one of neopragmatism's cornerstones (Document 07, §8; Document 09, Gap-Fill 10c).\n\nWhere do genuine tensions remain? Four, none of them pseudo-disagreements (Document 07, §10):\n\n**Truth.** Classical phenomenology aims at essences via Husserl's *Wesensschau*; truth is necessary and *a priori*. Heidegger's *aletheia* is unconcealment within a clearing. Pragmatism characteristically rejects this: James's \"the true is whatever proves itself good in the way of belief\"; Dewey's warranted assertibility; Peirce's end-of-inquiry account. Brandom-McDowell-style analytic pragmatism has produced partial reconciliations (truth as commitment-tracking normatively answerable to the world). Misak's Peircean fallibilist realism is closer to phenomenological realism than to Rortyan deflationism. But the residual phenomenological insistence on eidetic necessity is not something pragmatists can grant.\n\n**Method.** Phenomenology has a method — the *epoché*, the reduction, eidetic variation. Pragmatism characteristically rejects philosophical method as distinct from inquiry: Dewey's *Logic: The Theory of Inquiry* (1938); Rorty's anti-method polemic. The tension softens when Merleau-Ponty treats phenomenology as continuous with empirical psychology and when Brandom takes inferential-semantic analysis as descriptive work, but these are achievements, not starting points.\n\n**Transcendental vs. naturalist.** Husserl was a transcendental philosopher; the mature Husserl never abandoned the constituting ego. Pragmatism is characteristically naturalist — Dewey's *Experience and Nature* (1925), Quine's \"Epistemology Naturalized\" (1969). The figures who effected reconciliation — Schutz, Taylor, Varela — *demoted* transcendental claims to a structural-descriptive role compatible with naturalism, which is to give up transcendental phenomenology in Husserl's sense. Crowell and Carman have defended a \"minimal transcendentalism\" that argues even naturalized phenomenology must retain *some* structural-conditional work. This is the strongest residual tension.\n\n**Religion.** Phenomenology has been religiously serious in a specifically Christian (mostly Catholic) register; pragmatism has been religiously more diverse — Christian, Jewish, Buddhist, secular humanist, atheist. The traditions' *structural hospitality* to religious questions differs: phenomenology's interest in givenness, gift, manifestation, and revealed experience has natural theological cognates; pragmatism's interest in inquiry, fallibility, community, and practical fruits has cognates with religious practice but less natural cognates with classical metaphysical theism. This is a tension worth naming but not one needing resolution; the two traditions can offer religion different gifts.\n\nA fifth asymmetry — not a tension but a difference — is the **political**: pragmatism has been more consistently democratic (Dewey as canonical philosopher of democracy; West, Stout, Talisse as contemporary heirs), where phenomenology in its German lineage has had political ambivalences ranging from Heidegger's Nazism to Husserl's apolitical retreat to Levinas's post-Holocaust ethical politics. The asymmetry is one of the reasons Anglophone political philosophy has been more hospitable to pragmatism than to phenomenology.\n\nThe convergence has not produced a unified phenomenology-pragmatism research program. There is no monograph that does for the two traditions what Brandom did for analytic and Hegelian-pragmatist resources or what Varela-Thompson-Rosch did for cognitive science. The closest candidates — Taylor's *A Secular Age*, Brandom's *A Spirit of Trust*, Thompson's *Mind in Life* — are each only partial. The convergence has produced something more modest and probably more durable: a shared toolkit (affordance, absorbed coping, lifeworld, inferential role, sense-making, engaged agency) and a shared sense that the post-Cartesian picture of mind is to be rejected at the root.\n\n---\n\n## Part III: Trajectory through 2040\n\n### 8. The Three Sites: Philosophy, Cognitive Science, Theology\n\nDocument 08 builds calibrated scenarios at three sites. The central tendency at each is **partial absorption with surviving identifier**: the traditions continue to be taught and published in 2040, but the generative work happens at the interfaces with cognitive science, philosophy of religion, political philosophy, and philosophy of AI rather than in self-identified phenomenology or pragmatism research programs.\n\n**Site A — Academic Philosophy.** The central scenario (A.1, ~45–55%) is partial absorption: senior chairs are filled, journals continue, SPEP and SAAP hold annual meetings, but the generative center of philosophical work has migrated to the interfaces. The positive surprise (A.2, ~15–25%) is continued research-program vitality with theoretical convergence: a second-generation Brandom-Thompson-Taylor synthesis emerges from the under-55 cohort, and the analytic-continental divide essentially dies in practice. The negative drift (A.3, ~15–25%) is fragmentation: the journals continue but lose Q1 standing, conferences shrink, the 4E program continues but increasingly under \"embodied cognition\" rather than \"phenomenology.\" The tail (A.4, ~5–10%) is disruption — humanities collapse, AGI displacement, a Black-Notebooks-scale revelation about another canonical figure, or a major political event.\n\n**Site B — Psychology and Cognitive Science.** The central scenario (B.1, ~30–40%) is 4E mainstreaming with predictive-processing absorption: 4E is one of the standard frames in graduate cognitive science, phenomenological psychiatry consolidates around the Heidelberg-Copenhagen-Florence framework (EASE), and empirical-phenomenological methods (Giorgi, IPA, van Manen, micro-phenomenology) are standard qualitative-research tools. The minority-position scenario (B.2, ~25–35%) has 4E remaining a robust counter-program without displacing the computational-representational mainstream. The quiet-absorption scenario (B.3, ~15–25%) has the substantive work surviving but the phenomenology label dropping out of the technical vocabulary by 2040 — papers on body schema and sense-making without citing Husserl or Merleau-Ponty. The tail (B.4, ~10–15%) is a computational comeback driven by AI progress that vindicates broadly representational accounts.\n\n**Site C — Christian Theology.** The central scenario (C.1, ~30–40%) is Catholic phenomenological consolidation alongside pragmatist Christianity continuing through the Black prophetic tradition: Falque succeeds Marion as the public face of the French theological turn; the Institut Catholique de Paris, the Sorbonne, the Lateran, Notre Dame, Boston College, Catholic University of America, and Villanova continue to produce work in the tradition; the Black prophetic line (West, Glaude, Rogers, the post-West generation) continues; Catholic-pragmatism (the Eric Gregory / Charles Mathewes Augustinian axis) develops modestly. The theological-reabsorption scenario (C.2, ~20–30%) has the Marion-Henry-Lacoste-Falque tradition read mostly in divinity schools and Catholic seminaries by 2040, reclassified as Catholic philosophical theology. The post-secular expansion scenario (C.3, ~15–25%) has continental philosophy of religion extending into African, Asian, and Latin American Christian contexts. The tail (C.4, ~10–15%) is either post-Christian collapse or integralist consolidation — two opposite extremes.\n\nThe most consequential wild cards across all three sites are: **AI** (probability of meaningful impact through 2040, ~50%): AGI or near-AGI arrival would reshape philosophy of mind around questions for which the convergence is unusually well-positioned (Dreyfus, Brandom, Thompson, Clark) but which might also displace it; **generational succession** (~35–45%): Marion, Falque, Zahavi, Gallagher, Thompson, Brandom, McDowell, West, Stout, Taylor are mostly born 1929–1955 and now between 71 and 95, with several figures the institutional carrier of their sub-program; **humanities institutional collapse** (~25–35%); **a new pontificate** (essentially certain in the window) whose phenomenological inclination is unknown; **a generation-defining synthesis monograph** (~30%) whose appearance would push the convergence toward A.2/B.1/C.1; and **climate disruption** and **global-South Christian synthesis** as further wild cards.\n\n### 9. Signals to Watch by 2030\n\nThe forecast is a framework for updating, not a prediction. Specific signals through 2030 will substantially revise the probability distribution:\n\n**Institutional.** The Heidelberg group's leadership transition (Fuchs at ~72 by 2030); the Copenhagen Center for Subjectivity Research after Zahavi's eventual transition; the Marion succession at the Académie française and at Chicago Divinity; the Sorbonne phenomenology chair after Barbaras; the Institut Catholique de Paris under Falque; the Pittsburgh philosophy department after Brandom and McDowell retire; SPEP and SAAP membership and conference attendance; Q1/Q2 status of *Phenomenology and the Cognitive Sciences*, *European Journal of Pragmatism*, *Transactions of the C.S. Peirce Society*, *Modern Theology*, and *Continental Philosophy Review*.\n\n**Intellectual.** Major books by Falque, Gschwandtner, Zahavi, Gallagher, Thompson, Brandom, Taylor (if he writes another), Stout, West, Glaude, Rogers, Misak, Price, Talisse, or the under-55 cohort. The reception of Brandom's *A Spirit of Trust* (2019). A second edition of the *Oxford Handbook of 4E Cognition*. Citation rates of Husserl, Heidegger, Merleau-Ponty, James, Dewey, Peirce in mainstream cognitive science and philosophy of mind journals.\n\n**Empirical / clinical.** DSM-VI revision discussions and whether phenomenological psychiatry tools penetrate them. NIH and ERC funding distribution across computational vs. embodied/enactive cognitive science. Whether predictive-processing-as-enactive-mechanism papers continue to dominate the literature or whether the radical-enactivist counter-current strengthens. LLM and embodied-AI progress relative to the Dreyfus-4E predictions.\n\n**Religious / theological.** The next papal pontificate (likely between 2026 and 2035 given Francis's age). Whether the *First Things* / *Postliberal Order* / *Compact* axis displaces the *Commonweal* / *Church Life Journal* axis in Catholic intellectual prestige. Whether African and Asian Christian phenomenology produces a major Anglophone figure. Whether a successor to West in public Black prophetic-pragmatist work emerges (Rogers is the most likely candidate).\n\nThe single most important cross-site question is whether a generation-defining synthesis monograph appears in the 2026–2040 window. If yes, the positive joint scenario (A.2 + B.1 + C.1) becomes more likely; if no, the central scenario (A.1 + B.2/B.3 + C.1/C.2) becomes more likely. The forecast does not estimate this probability because the base rate is uninformative — a few per generation, closer to \"one chance per career\" than to a stable annual rate.\n\n---\n\n## Part IV: Interpretive Conclusions\n\n### 10. What These Traditions Together Show About 20th- and 21st-Century Philosophy\n\nA standard textbook treats 20th-century philosophy as the bifurcation of an analytic mainstream (Frege, Russell, Carnap, Quine, Davidson, Kripke) from a continental counter-tradition (Husserl, Heidegger, Sartre, Foucault, Derrida), with pragmatism as a 19th-century American curiosity displaced by the analytic ascendancy. The corpus argues this is wrong on every count.\n\nIt is wrong about the analytic-continental divide. The divide is partly real (different methodological commitments, different intellectual habits) but its rigidity was substantially the work of institutional history — the emigré settlement of the 1930s, the McCarthyist political climate, the APA's organizational structure, the segregated job market — that outlasted the philosophical commitments that originally justified it. Phenomenology and pragmatism started in the same conversation (Brentano, James, Husserl), were separated by history and academic politics, and have spent fifty years finding their way back. The convergence is real, if uneven.\n\nIt is wrong about pragmatism. Pragmatism never died; it went into an eclipse from which it emerged with Quine's \"Two Dogmas\" (1951), Sellars's \"Empiricism and the Philosophy of Mind\" (1956), Rorty (1979), and Brandom and McDowell (1994). The classical-pragmatist scholarly community (SAAP, *Transactions of the C.S. Peirce Society*) continued through the eclipse. By 2026 pragmatism is institutionally more secure than at any point since 1940.\n\nIt is wrong about cognitive science. The mind-as-symbol-manipulation picture that dominated cognitive science from 1956 to roughly 1985 is no longer the working consensus; what has replaced it is recognizably a phenomenology-pragmatism hybrid (embodied, embedded, enactive, extended). This is the largest concrete intellectual achievement of the late 20th century in philosophy of mind, and the phenomenology-pragmatism convergence is constitutive of it. Both traditions are absorbed into cognitive science at the moment they look like they are dying as departmental research programs — which is what the textbook story misreads as their death.\n\nIt is wrong about religion. The official analytic story treats philosophy as having secularized in the 20th century; the corpus shows that the philosophical engagement with Christianity, while marginalized in analytic departments, has been continuously productive in phenomenology and pragmatism. The French theological turn (Marion, Henry, Lacoste, Chrétien, Falque) and the Black prophetic pragmatism (West, Glaude, Rogers) are not residues of a pre-secular philosophical past; they are live, productive, expanding traditions. Continental philosophy of religion is in better institutional shape in 2026 than analytic philosophy of religion (Document 05, Claim 5.13).\n\nWhat these two traditions together show — and what is the deepest interpretive claim of the corpus — is that the most consequential 20th-century philosophical work outside the analytic mainstream was *anti-Cartesian, anti-foundationalist, attentive to embodiment, attentive to practice, attentive to social mind, and frequently religiously serious*. The post-Cartesian picture of mind has been built in both traditions: phenomenology installed the lived body (Merleau-Ponty) and being-in-the-world (Heidegger) and the lifeworld (Husserl); pragmatism installed habit (James), the reflex arc as continuous circuit (Dewey), the social self (Mead), and the rejection of the spectator theory of knowledge (Dewey). What looks from inside one tradition like a distinctive achievement looks from outside both traditions like the shared work of two related research programs answering to a common problem. The \"post-Cartesianism\" of 4E cognitive science is the empirical instantiation of what both traditions independently arrived at by different routes.\n\nThe corpus also shows that the religious dimension of philosophy has been more visible in these two traditions than in any other major 20th-century movement. The reasons are partly biographical (Brentano the ex-priest, Husserl the convert, Heidegger the ex-seminarian, Stein the convert-martyr, Peirce the late-life Episcopalian, James the Swedenborgian's son, Royce the Christian pragmatist, Dewey the ex-Congregationalist) and partly conceptual (phenomenology's affinities with Augustinian-Pauline interiority, with the *analogia entis*, with the icon-theology of Eastern Orthodoxy; pragmatism's affinities with practical reasoning, communal interpretation, and the testing of ideas by their fruits). The official secular self-image of 20th-century academic philosophy has obscured this, but the texts do not.\n\n### 11. Why This Matters for Psychology\n\nA serious psychologist who reads this corpus carries away three points. *First*, the psychology-philosophy entanglement is not merely historical decoration. James's *Principles* is at once the founding text of American psychology and a key pragmatist text; Brentano's *Psychology from an Empirical Standpoint* is at once the founding text of intentional psychology and the proximate source of phenomenology; Jaspers's *Allgemeine Psychopathologie* established the *Verstehen / Erklären* distinction as a permanent feature of psychiatric method. *Second*, the contemporary 4E / enactive / embodied cognitive-science program, phenomenological psychiatry's Heidelberg-Copenhagen-Florence axis, and the empirical-phenomenological qualitative-research traditions are live, well-funded, and producing results — and they have substantive philosophical commitments that a research psychologist needs to engage rather than assume. *Third*, the post-2011 replication crisis has generated a methodological literature whose epistemic commitments (fallibilism, multi-method triangulation, social-epistemic validation) track classical pragmatism closely, often without acknowledgment. The pragmatist tradition is one of the available conceptual resources for the methodological reform psychology is now doing.\n\n### 12. Why This Matters for Christian Thought\n\nA serious theologian who reads this corpus carries away three further points. *First*, the most theologically productive philosophical movement of the 20th century has been continental (the French theological turn) rather than analytic (Plantinga, Swinburne, the contemporary analytic philosophy of religion); the Catholic intellectual tradition has more developed phenomenological resources in 2026 than the Protestant and Reformed traditions. Whether this is good news depends on confessional location, but it is the fact. *Second*, the deepest American religious-philosophical tradition is pragmatist — James's *Varieties*, Royce's *Problem of Christianity*, Dewey's *A Common Faith*, Niebuhr's Christian realism, the Yale postliberals, West's prophetic pragmatism — and the Black church has now substantially replaced liberal Protestantism as the principal living institutional carrier of pragmatist-Christian thought. *Third*, the Janicaud question (is the theological turn legitimate phenomenology?) and the Niebuhr-Dewey-Stout-Hauerwas argument (can liberal pragmatism do justice to structural sin, communal witness, and political polarization?) are not settled academic debates from a previous generation; they are live disputes about what religious-philosophical work can do in a post-secular age with AI, biotech, climate, and political polarization on the table. A theologian who has not engaged Marion, Lacoste, Stein, Taylor, West, Stout, Hauerwas, and Lindbeck is missing the conversation.\n\n---\n\n## Where to Go Next in This Corpus\n\nDifferent readers should next read different documents. The **philosophy-of-mind reader** should read 03 (Phenomenology and Psychology) and 04 (Pragmatism and Psychology), with 07 (Convergence) immediately after. The **theologian** should read 05 (Phenomenology and Christianity) and 06 (Pragmatism and Christianity), with the Janicaud and Niebuhr-Dewey sections of those documents the highest-priority pages. The **historian of philosophy** should read 01 (Phenomenology Origins) and 02 (Pragmatism Origins), then 07 (Convergence) to see how the two stories meet. The **forecaster** should read 08 (Future Trajectory) and use the signals-to-watch and forecast-change-triggers sections as the working framework. The **verification-minded reader** should read 09 (Verification Notes) in full — it documents the corpus's known refinements and gap-fills, and Parts IV and VI of that document are the priority-ranked list of corrections this briefing has incorporated.\n\n---\n\n## Key Sources\n\nA concentrated annotated list of works a serious reader should be aware of beyond the corpus, sorted by tier.\n\n### Tier 1: Primary Texts (Phenomenology)\n- Franz Brentano, *Psychology from an Empirical Standpoint* (1874; trans. Rancurello, Terrell, McAlister, Routledge 1995). The intentionality thesis and descriptive psychology.\n- Edmund Husserl, *Logical Investigations* (1900–01; trans. Findlay, ed. Moran, Routledge 2001). Anti-psychologism plus the descriptive analyses, including the Sixth Investigation on categorial intuition.\n- Edmund Husserl, *Ideas Pertaining to a Pure Phenomenology and to a Phenomenological Philosophy, Book I* (1913; trans. Kersten, Kluwer 1982). The transcendental turn, the *epoché*, noesis/noema.\n- Edmund Husserl, *The Crisis of European Sciences and Transcendental Phenomenology* (1936; Husserliana VI; trans. Carr, Northwestern 1970). The lifeworld and the diagnosis of European modernity.\n- Martin Heidegger, *Being and Time* (1927; trans. Macquarrie and Robinson, Harper 1962; rev. Stambaugh, SUNY 1996). Being-in-the-world, the analytic of Dasein, being-toward-death.\n- Martin Heidegger, *The Phenomenology of Religious Life* (GA 60, German 1995; trans. Fritsch and Gosetti-Ferencei, Indiana UP 2004). The 1920–21 Pauline lectures and the 1921 Augustine lectures.\n- Maurice Merleau-Ponty, *Phenomenology of Perception* (1945; trans. Landes, Routledge 2012). The lived body and the Schneider case.\n- Emmanuel Levinas, *Totality and Infinity* (1961; trans. Lingis, Duquesne 1969). The face of the Other; ethics as first philosophy.\n- Edith Stein, *On the Problem of Empathy* (1917; trans. Stein, ICS Publications 1989). The Husserlian dissertation.\n- Edith Stein, *Finite and Eternal Being* (completed 1937, published 1950; trans. Reinhardt, ICS Publications 2002). The Husserlian-Thomist synthesis.\n- Jean-Luc Marion, *Being Given: Toward a Phenomenology of Givenness* (1997; trans. Kosky, Stanford 2002). The third reduction; the saturated phenomenon.\n- Michel Henry, *I Am the Truth: Toward a Philosophy of Christianity* (1996; trans. Emanuel, Stanford 2003). Life as auto-affection; the Johannine Christology.\n\n### Tier 1: Primary Texts (Pragmatism)\n- Charles Sanders Peirce, \"The Fixation of Belief\" (*Popular Science Monthly* 12, November 1877) and \"How to Make Our Ideas Clear\" (*Popular Science Monthly* 12, January 1878: 286–302). The pragmatic maxim.\n- Charles Sanders Peirce, \"A Neglected Argument for the Reality of God\" (*Hibbert Journal* 7, October 1908). The Musement argument.\n- William James, *The Principles of Psychology* (Henry Holt, 1890). The founding text of American psychology; the stream of consciousness, habit, the self.\n- William James, *Pragmatism* (Longmans, Green, 1907) and *Essays in Radical Empiricism* (posthumous 1912).\n- William James, *The Varieties of Religious Experience* (Longmans, Green, 1902). The Edinburgh Gifford Lectures.\n- John Dewey, \"The Reflex Arc Concept in Psychology\" (*Psychological Review* 3, 1896: 357–370). The founding paper of American functionalism.\n- John Dewey, *Experience and Nature* (Open Court, 1925) and *Logic: The Theory of Inquiry* (Holt, 1938).\n- John Dewey, *A Common Faith* (Yale, 1934; *Later Works* vol. 9). The religious/religion distinction.\n- Josiah Royce, *The Problem of Christianity* (Macmillan, 1913). The Beloved Community and the community of interpretation.\n- George Herbert Mead, *Mind, Self, and Society* (ed. Charles W. Morris, Chicago, 1934). Symbolic interactionism's source text.\n- W. V. O. Quine, \"Two Dogmas of Empiricism\" (*Philosophical Review* 60, 1951: 20–43). The closing call for \"a more thorough pragmatism.\"\n- Wilfrid Sellars, \"Empiricism and the Philosophy of Mind\" (1956; reissued Harvard 1997 with Brandom's *Study Guide*). The Myth of the Given.\n- Richard Rorty, *Philosophy and the Mirror of Nature* (Princeton, 1979). The public neopragmatist turn.\n\n### Tier 2: Essential Scholarly Works\n- Theodore Kisiel, *The Genesis of Heidegger's \"Being and Time\"* (California, 1993); with John van Buren, *Reading Heidegger from the Start* (SUNY, 1994); and Benjamin Crowe, *Heidegger's Religious Origins* (Indiana, 2006). The standard reconstruction of early Heidegger and religion.\n- Karl Schuhmann, *Husserl-Chronik* (Nijhoff, 1977) and *Briefwechsel* (Hua-Dok III, 1994). The archival load-bearing source on Husserl's chronology and correspondence, including the James-Husserl evidence.\n- Dominique Janicaud et al., *Phenomenology and the \"Theological Turn\": The French Debate* (Fordham, 2000). The anthology containing Janicaud's 1991 essay, his 1998 *La phénoménologie éclatée*, and the responses by Courtine, Chrétien, Henry, Marion, and Ricoeur.\n- John D. Caputo and Michael Scanlon, eds., *God, the Gift, and Postmodernism* (Indiana, 1999). The Marion-Derrida Villanova exchange.\n- Hubert Dreyfus, *Being-in-the-World: A Commentary on Heidegger's \"Being and Time,\" Division I* (MIT, 1991). The text that made Heidegger teachable in analytic departments.\n- Francisco Varela, Evan Thompson, and Eleanor Rosch, *The Embodied Mind* (MIT, 1991; revised 2016). The founding text of 4E cognitive science.\n- Evan Thompson, *Mind in Life: Biology, Phenomenology, and the Sciences of Mind* (Harvard, 2007). The systematic enactive program.\n- Shaun Gallagher, *How the Body Shapes the Mind* (Oxford, 2005); with Dan Zahavi, *The Phenomenological Mind* (2nd ed., Routledge 2012).\n- Dan Zahavi, *Husserl's Phenomenology* (Stanford, 2003). The major contemporary synthesis.\n- Joseph K. Schear, ed., *Mind, Reason, and Being-in-the-World: The McDowell-Dreyfus Debate* (Routledge, 2013). The canonical archive.\n- Robert Brandom, *Making It Explicit* (Harvard, 1994) and *A Spirit of Trust* (Harvard, 2019). The analytic-pragmatist-Hegelian synthesis.\n- Cheryl Misak, *The American Pragmatists* (Oxford, 2013) and *Cambridge Pragmatism* (Oxford, 2016). The Peircean realist reading of pragmatism and the Wittgenstein-Ramsey hypothesis.\n- Charles Taylor, *Sources of the Self* (Harvard, 1989) and *A Secular Age* (Harvard, 2007). The cross-tradition synthesis.\n- Cornel West, *The American Evasion of Philosophy: A Genealogy of Pragmatism* (Wisconsin, 1989). The prophetic-pragmatist genealogy.\n- Jeffrey Stout, *Democracy and Tradition* (Princeton, 2004). The Stout-Hauerwas debate.\n- George Lindbeck, *The Nature of Doctrine* (Westminster, 1984). The cultural-linguistic model of doctrine.\n- Stephen C. Rockefeller, *John Dewey: Religious Faith and Democratic Humanism* (Columbia, 1991). The standard religious reading of Dewey.\n- Louis Menand, *The Metaphysical Club* (Farrar Straus Giroux, 2001). The standard public narrative of pragmatism's origins.\n- Bruce Kuklick, *A History of Philosophy in America 1720–2000* (Oxford, 2001). The institutional history.\n- Steven C. Rockefeller, *Dewey: Religious Faith and Democratic Humanism* (Columbia, 1991), and Robert Westbrook, *John Dewey and American Democracy* (Cornell, 1991), for the Dewey reception.\n- Giovanni Stanghellini et al., eds., *The Oxford Handbook of Phenomenological Psychopathology* (Oxford, 2019). The contemporary phenomenological psychiatry reference.\n- Albert Newen, Leon De Bruin, and Shaun Gallagher, eds., *The Oxford Handbook of 4E Cognition* (Oxford, 2018). The 4E reference."}]}</script>
