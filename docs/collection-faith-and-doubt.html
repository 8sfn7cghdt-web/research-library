ces with cognitive science and theology, with the AI revolution, generational succession in a small senior cohort, and the post-secular shift as the largest contingencies.\n\n## What This Briefing Is and How to Use It\n\nThis is the master briefing for a nine-document research corpus (Documents 01–09, plus this synthesis). A reader who reads only this gets the full shape of the inquiry. A reader who wants depth should consult the numbered documents: 01 (Phenomenology origins) and 02 (Pragmatism origins) for the historical arc; 03 (Phenomenology and psychology) and 04 (Pragmatism and psychology) for the empirical-science engagement; 05 (Phenomenology and Christianity) and 06 (Pragmatism and Christianity) for the theological engagement; 07 (Convergence) for where the two traditions meet; 08 (Future trajectory) for the calibrated forecasts; and 09 (Verification notes) for cross-checks, gap-fills, and the corrections this briefing has incorporated. Where the briefing departs from particular Round 1 claims (the James-Husserl evidence framing, the Niebuhr-Dewey chronology, the West-Rorty supervisor claim, the *Embodied Mind* pragmatism claim, the Janicaud target list), it follows the Document 09 verification.\n\n---\n\n## Part I: Two Traditions in Parallel\n\n### 1. Phenomenology: From Brentano to the Theological Turn\n\nPhenomenology's pre-history is German, Austrian, and quietly Catholic. **Franz Brentano** (1838–1917) was ordained a Catholic priest in 1864, broke with the Church in 1873 over papal infallibility, and in 1874 published *Psychology from an Empirical Standpoint*, which rehabilitated the scholastic concept of *intentionality* — the directedness of mental acts toward objects — as the criterion that demarcates the mental from the physical. The terminology is unmistakably medieval (Brentano credits \"the Scholastics of the Middle Ages\"; the apparatus came in part from Aquinas and Suárez), and this Aristotelian-scholastic vocabulary remained native to phenomenology even when its practitioners were religiously elsewhere. Brentano's Vienna lecture room produced, in a single generation, the personnel of much of 20th-century philosophy: Carl Stumpf (Berlin Gestalt psychology), Alexius Meinong (object theory), Kazimierz Twardowski (Lwów-Warsaw analytic school), Anton Marty (philosophy of language), Christian von Ehrenfels (Gestalt qualities), and Edmund Husserl (Document 01, §1; Document 03, §1).\n\n**Edmund Husserl** (1859–1938) was born to a non-observant Jewish merchant family in Moravia, converted to Lutheran Christianity in 1886, and trained in mathematics under Weierstrass and Kronecker before attending Brentano's Vienna lectures (1884–86). His first book — *Philosophie der Arithmetik* (1891) — attempted to ground arithmetic psychologically; Frege's 1894 review demolished it. By 1900 Husserl had repudiated psychologism in the *Prolegomena* to the *Logical Investigations*: logical laws are not generalizations from psychology; the reduction is self-refuting; phenomenology now belongs to the descriptive analysis of *acts of meaning* whose ideal correlates are not themselves psychological. The *Investigations* (1900–01) are at once anti-psychologistic *and* descriptive-psychological in the Brentanian sense — the Sixth Investigation's categorial intuition was the text Heidegger later said had decided his philosophical vocation. The transcendental turn comes in 1913 with *Ideas I*: the *epoché* suspends the natural attitude's \"general thesis\" of an out-there world, and what remains is consciousness with its noetic-noematic structure. The Göttingen realists — Reinach, Conrad-Martius, the young Edith Stein — treated this as a betrayal. Late Husserl, in the *Crisis* (1936), reframes the whole project as a diagnosis of European modernity: Galilean science is \"at once a discovering and a concealing genius,\" and modern science fails philosophically when it mistakes its mathematized abstractions for the lifeworld in which they are rooted (Document 01, §2; Document 03, §2).\n\nThe decisive break is **Martin Heidegger** (1889–1976). A Catholic ex-seminarian (Freiburg, 1909–11) who had trained on Brentano's dissertation on Aristotle, Heidegger was Husserl's assistant from 1919 and his successor in the Freiburg chair in 1928. *Being and Time* (1927) — dedicated to Husserl \"in friendship and admiration\" — reframes phenomenology as fundamental ontology: the question is no longer how consciousness constitutes its objects but what the meaning of *being* is, accessed through the analytic of Dasein. Being-in-the-world dissolves the Cartesian subject/object split; equipment is encountered first as *zuhanden* (ready-to-hand) and only derivatively as *vorhanden*; mood (*Befindlichkeit*) discloses how things matter prior to cognition; authentic existence is owned being-toward-death. Husserl read the book carefully in 1929 and concluded — in marginalia and in the 1931 Frankfurt lecture \"Phänomenologie und Anthropologie\" — that Heidegger had transposed transcendental clarification into philosophical anthropology. The *Kehre* of the 1930s pivots from Dasein to a meditation on being as historical sending, technology as enframing (*Gestell*), and language as the house of being. Heidegger joined the NSDAP on 1 May 1933, served as Nazi-aligned rector of Freiburg for a year, and never publicly repudiated National Socialism; the 2014 publication of the *Schwarze Hefte* confirmed that the antisemitism was structurally integrated with his late \"history of being,\" and the field is now permanently divided between continuity-deniers, contamination-readers (Trawny, Di Cesare), and rejectionists (Faye). This is not a peripheral interpretive question; it shapes how every department now teaches *Being and Time* (Document 01, §3; Document 05, §1.3).\n\nThe French reception comes in two waves. The first (1930s) is through Sartre's Berlin year, the Aron \"apricot cocktail\" story, and Beauvoir; the second (1940s) is through Merleau-Ponty's work in the Husserl Archives at Louvain. **Sartre**'s *Being and Nothingness* (1943) externalizes the ego and makes consciousness a nothingness whose being is its freedom. **Merleau-Ponty**'s *Phenomenology of Perception* (1945) installs the *lived body* as the unit of perception, working in continuous dialogue with Gestalt psychology, Goldstein's neurology, and the Schneider case; the late *Visible and the Invisible* (posthumous 1964) develops the ontology of *chair* (flesh). **Levinas** — a Jewish Lithuanian who studied with Husserl and Heidegger in 1928–29, whose family was murdered in the Shoah — argues in *Totality and Infinity* (1961) that the *face* of the Other commands me before I can constitute it as object; ethics, not ontology, is first philosophy. **Ricoeur** translated *Ideas I* in a German POW camp, developed the hermeneutic-narrative turn (*The Symbolism of Evil* 1960, *Time and Narrative* 1983–85, *Oneself as Another* 1990), and became the principal bridge between phenomenology, hermeneutics, and Reformed Protestantism (Document 01, §4).\n\nThree further branches in the late 20th and early 21st centuries: (a) the **French theological turn** — Marion's *Réduction et donation* (1989) and *Étant donné* (1997) reduce phenomena to *givenness* and identify \"saturated phenomena\" (event, idol, flesh, icon, revelation) in which intuition overflows the concept; Michel Henry's *L'Essence de la manifestation* (1963) and the Christian trilogy (*I Am the Truth* 1996, *Incarnation* 2000) develop a phenomenology of non-intentional auto-affection of *Life*; Lacoste's *Experience and the Absolute* (1994) names liturgy as a phenomenology of *non-experience* before the absent Absolute; Chrétien on call and response; Falque's \"crossing the Rubicon\" (2013) (Document 01, §5; Document 05, §6); (b) the **analytic reception** of Husserl — Føllesdal (1969), Smith and McIntyre (1982), Dreyfus and Hall (1982), and Dan Zahavi's *Husserl's Phenomenology* (2003) — which makes Husserl readable inside analytic philosophy of mind; (c) the **4E alliance** with cognitive science (treated below). The Czech tradition (Patočka, dead after secret-police interrogation in March 1977) and the Polish tradition (Ingarden as the major realist Husserlian; the Lublin school's synthesis around Wojtyła) keep phenomenology alive under totalitarianism and inside Catholic intellectual life respectively.\n\nTwo figures the corpus initially under-engaged deserve naming here. **Maurice Blondel**'s 1893 *L'Action* anticipated both pragmatism and phenomenology in a French Catholic register; de Lubac later credited Blondel as the silent precondition of *ressourcement* theology, and his correspondence with James and influence on Marion make him the natural bridge between Documents 02 and 05 (Document 09, Gap-Fill 1). **Hans-Georg Gadamer**'s *Wahrheit und Methode* (1960) is the canonical statement of philosophical hermeneutics — the universalization of Heidegger's hermeneutic phenomenology into a theory of understanding as such, with prejudice rehabilitated as the condition of understanding and the *fusion of horizons* as the model of dialogue. Gadamer is the channel through which Heideggerian phenomenology entered theology (Pannenberg, Tracy) and Anglophone philosophy (McDowell, Taylor, Bernstein) (Document 09, Gap-Fill 8). **Max Scheler**'s Catholic value-ethics (1913–16) was Wojtyła's principal philosophical interlocutor; **Roman Ingarden**'s realist phenomenology and literary ontology (*The Literary Work of Art*, 1931) are the major non-Heideggerian post-Husserlian achievements (Document 09, Gap-Fills 4–5).\n\n### 2. Pragmatism: From the Metaphysical Club to Neopragmatism\n\nPragmatism is the only philosophical movement of major international standing to be native-born in the United States, and it emerged from a small Cambridge discussion society — the **Metaphysical Club**, active roughly 1872–74 — whose members included Charles Sanders Peirce, William James, Oliver Wendell Holmes Jr., Chauncey Wright, Nicholas St. John Green, John Fiske, and Joseph Bangs Warner. Louis Menand's 2001 Pulitzer-winning *The Metaphysical Club* reads pragmatism as a post-Civil War philosophy — a response to the catastrophe of certainty that drove the war — though Misak and Kuklick emphasize the continuity with prior philosophical concerns (Kant, Bain, Spencer, Darwin). The intellectual targets were Cartesian foundationalism (Peirce's 1868 \"Some Consequences of Four Incapacities\"), German idealism, the British empiricist-associationist tradition, and the residual New England Calvinism. Darwin was the unifying influence: mind is continuous with biology; concepts are tools for organisms coping with environments; inquiry is itself an evolutionary process (Document 02, §1).\n\n**Charles Sanders Peirce** (1839–1914) — by general agreement the most original philosophical mind the United States has produced, and the most institutionally disastrous — extracted from this conversation, in two *Popular Science Monthly* essays of 1877–78 (\"The Fixation of Belief,\" \"How to Make Our Ideas Clear\"), the **pragmatic maxim**: to clarify the meaning of a conception, specify what practical effects would follow from its truth. Truth is defined as \"the opinion which is fated to be ultimately agreed to by all who investigate.\" The full Peircean architecture is much larger: a triadic theory of signs (sign / object / interpretant); the categories (Firstness, Secondness, Thirdness); fallibilism (Peirce coined the term); synechism (continuity); tychism (objective chance); and agapism (creative love as a third evolutionary process, recognizably mapped onto a Trinitarian Christian frame in the late 1908 *Hibbert Journal* essay \"A Neglected Argument for the Reality of God\"). Peirce lived his last decades in poverty at Milford, Pennsylvania, supported partly by James (Document 02, §2; Document 06, §1).\n\n**William James** (1842–1910) — the son of Henry James Sr., a Swedenborgian mystic — was a professional psychologist before he was a philosopher. *The Principles of Psychology* (1890), twelve years in the writing and 1,400 pages long, founded American academic psychology: the stream of consciousness, habit as \"the enormous fly-wheel of society,\" the multilayered self (material, social, spiritual; *I* and *me*), the James-Lange theory of emotion, the ideo-motor theory of action. James's 1898 Berkeley address \"Philosophical Conceptions and Practical Results\" — which credited Peirce by name — inaugurated pragmatism as a public movement. *Pragmatism* (1907), *A Pluralistic Universe* (1909), and *Essays in Radical Empiricism* (posthumous 1912) develop the doctrine outward. James's *Varieties of Religious Experience* (1902), the Edinburgh Gifford Lectures, treats religious testimony as empirical data and remains, 124 years on, the most-read book in the psychology and philosophy of religion in English. Peirce was pained by what James had made of his maxim and renamed his own position \"pragmaticism\" in 1905, \"ugly enough to be safe from kidnappers\"; the Misak-Putnam dispute about whether James genuinely distorted Peirce's intent is the principal intra-pragmatist family argument (Document 02, §3).\n\n**John Dewey** (1859–1952) was raised Congregationalist in Burlington, Vermont, began as a Hegelian under G. S. Morris at Johns Hopkins, taught Sunday school in Ann Arbor in the 1880s, and quietly left the church on moving to Chicago in 1894. The 1896 paper \"The Reflex Arc Concept in Psychology\" rejected the stimulus-response model as Cartesian dualism imposed on a continuous sensorimotor circuit; the paper is widely regarded as the founding document of American functionalist psychology. The Chicago school (Dewey, Angell, Mead, Tufts, with Baldwin as East Coast cousin) dominated American psychology from 1894 to 1913. Dewey's mature work — *Democracy and Education* (1916), *Experience and Nature* (1925), *The Quest for Certainty* (1929), *Logic: The Theory of Inquiry* (1938), *Art as Experience* (1934), *A Common Faith* (1934) — became the closest thing the United States has had to a national philosophy. **Josiah Royce** (1855–1916) — Peirce's student at Johns Hopkins, James's Harvard colleague — produced in *The Problem of Christianity* (1913) the most theologically systematic work in the classical canon, taking Peirce's triadic semiotics into a theology of the *community of interpretation* and the *Beloved Community*. **George Herbert Mead** (1863–1931) — whose major work *Mind, Self, and Society* (1934, edited from student lecture notes by Charles W. Morris) is the source text for symbolic interactionism — developed the social self through \"taking the role of the other,\" the *I/me* distinction, and the generalized other (Document 02, §§3–6).\n\nPragmatism then suffered a **mid-century eclipse** (c. 1940–1970), squeezed out of elite American philosophy departments by the analytic ascendancy, by McCarthyist hostility to Dewey-style social democracy (McCumber's emphasis), and by the immigration of the Vienna Circle (Kuklick's emphasis). Sidney Hook, Ernest Nagel, C. I. Lewis, and Stephen Pepper kept various projects alive at Columbia and Berkeley, but the prestige had drained. The **neopragmatist** revival came in waves: Quine's \"Two Dogmas of Empiricism\" (1951) and the closing line about \"a more thorough pragmatism\"; Sellars's \"Empiricism and the Philosophy of Mind\" (1956); Putnam's serial recantations of his earlier metaphysical realism; Bernstein's *Praxis and Action* (1971); Rescher's *Methodological Pragmatism* (1977); and the public moment with Rorty's *Philosophy and the Mirror of Nature* (1979) and *Contingency, Irony, and Solidarity* (1989). The self-conscious labeling as \"neopragmatism\" emerged in the mid-to-late 1980s (this is the verification refinement; the Round 1 corpus over-precise dating has been softened — Document 09, Verification 5). The contemporary scene is fragmented: a Peircean wing (Misak, Hookway, Talisse) insisting on substantive truth and convergence; a Jamesian-Rortyan wing (Rorty, with Brandom and Price in different ways) reading pragmatism as deflationary and anti-representationalist; substantial feminist (Seigfried, Sullivan, McKenna), African-American (West, Glaude, Paul Taylor), and process-philosophical (Whitehead, Hartshorne, Cobb) strands. **Karl-Otto Apel**'s *Transformation der Philosophie* (1973) — the most ambitious German attempt to synthesize Peirce, Heidegger, and Wittgenstein into a \"transcendental pragmatics\" — and Habermas's communicative action and discourse ethics are the continental siblings of this revival (Document 02, §§7–8; Document 09, Gap-Fills 2, 13).\n\n### 3. The Strange Parallel: What Was Happening Simultaneously\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 444\" role=\"img\" aria-label=\"A double timeline from 1872 to 2026. The upper indigo lane (phenomenology) marks Brentano 1874, Husserl's Logical Investigations 1900, Ideas I 1913, Heidegger's Being and Time 1927, Merleau-Ponty 1945, and Marion's theological turn 1989. The lower oxblood lane (pragmatism) marks the Metaphysical Club 1872, Peirce's maxim 1878, James's Principles 1890, Dewey's reflex arc 1896, Royce 1913, Rorty 1979, and Brandom 1994. A dotted arc runs from James's Principles up to Husserl, labelled 'Husserl annotates James, circa 1891 to 1894.' A vertical bridge near 1991 joins both lanes at the convergence.\">\n<text x=\"350\" y=\"28\" text-anchor=\"middle\" font-size=\"15\" class=\"t-serif\" letter-spacing=\"3\">THE STRANGE PARALLEL<\/text>\n<text x=\"350\" y=\"46\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">two movements, two continents, one chronology &#183; 1872&#8211;2026<\/text>\n<circle cx=\"240\" cy=\"66\" r=\"4.5\" class=\"f-t1\"/>\n<text x=\"251\" y=\"70\" font-size=\"9\" font-weight=\"bold\" class=\"t-acc\" style=\"fill:var(--t1)\">PHENOMENOLOGY <tspan class=\"t-muted\" font-weight=\"normal\">(Europe)<\/tspan><\/text>\n<circle cx=\"430\" cy=\"66\" r=\"4.5\" class=\"f-t2\"/>\n<text x=\"441\" y=\"70\" font-size=\"9\" font-weight=\"bold\" style=\"fill:var(--t2)\">PRAGMATISM <tspan class=\"t-muted\" font-weight=\"normal\">(America)<\/tspan><\/text>\n<line x1=\"60\" y1=\"237\" x2=\"664\" y2=\"237\" class=\"ln\" stroke-width=\"1.4\"/>\n<polygon points=\"660,232 672,237 660,242\" style=\"fill:var(--muted)\"/>\n<g font-size=\"8\" class=\"t-mono t-muted\" text-anchor=\"middle\">\n<line x1=\"137\" y1=\"233\" x2=\"137\" y2=\"241\" class=\"ln-soft\" stroke-width=\"1\"/><text x=\"137\" y=\"252\">1890<\/text>\n<line x1=\"280\" y1=\"233\" x2=\"280\" y2=\"241\" class=\"ln-soft\" stroke-width=\"1\"/><text x=\"280\" y=\"252\">1927<\/text>\n<line x1=\"411\" y1=\"233\" x2=\"411\" y2=\"241\" class=\"ln-soft\" stroke-width=\"1\"/><text x=\"411\" y=\"252\">1961<\/text>\n<line x1=\"538\" y1=\"233\" x2=\"538\" y2=\"241\" class=\"ln-soft\" stroke-width=\"1\"/><text x=\"538\" y=\"252\">1994<\/text>\n<line x1=\"650\" y1=\"233\" x2=\"650\" y2=\"241\" class=\"ln-soft\" stroke-width=\"1\"/><text x=\"650\" y=\"252\">2026<\/text>\n<\/g>\n<line x1=\"75\" y1=\"170\" x2=\"75\" y2=\"237\" class=\"s-t1\" stroke-width=\"1\" opacity=\"0.4\"/>\n<circle cx=\"75\" cy=\"170\" r=\"4\" class=\"f-t1\"/>\n<text x=\"75\" y=\"150\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">Brentano<\/text>\n<text x=\"75\" y=\"140\" text-anchor=\"middle\" font-size=\"8\" class=\"t-mono t-muted\">1874<\/text>\n<line x1=\"176\" y1=\"186\" x2=\"176\" y2=\"237\" class=\"s-t1\" stroke-width=\"1\" opacity=\"0.4\"/>\n<circle cx=\"176\" cy=\"186\" r=\"4\" class=\"f-t1\"/>\n<text x=\"176\" y=\"168\" text-anchor=\"middle\" font-size=\"8.5\" font-weight=\"bold\">Husserl, Log. Inv.<\/text>\n<text x=\"176\" y=\"158\" text-anchor=\"middle\" font-size=\"8\" class=\"t-mono t-muted\">1900<\/text>\n<line x1=\"232\" y1=\"170\" x2=\"232\" y
