e *Reminiscences* / letters. Tier 1 underlying, Tier 5 access. Accessed 2026-06-08.\n\n17. \"The Sage of Chelsea,\" The London Magazine; and Cambridge \"1834–1842: Cheyne Row\" chapter. Corroborates the 1834 Chelsea move and the three years of writing *The French Revolution* at Cheyne Row. Tier 4–5. Accessed 2026-06-08. https://thelondonmagazine.org/article/the-sage-of-chelsea/\n\n18. *The French Revolution* — Britannica (britannica.com/topic/The-French-Revolution-by-Carlyle). Source for the three-volume structure (\"The Bastille / The Constitution / The Guillotine,\" 1774–1795), Carlyle's providential reading of the Revolution, the publication establishing his reputation, and Dickens's direct debt in *A Tale of Two Cities*. Tier 4 (authoritative reference). Accessed 2026-06-08. https://www.britannica.com/topic/The-French-Revolution-by-Carlyle"}, {"order": 2, "file": "02_Sources_And_Method.md", "title": "Carlyle's Sources and His Method of Writing History", "summary": "", "body": "# Carlyle's Sources and His Method of Writing History\n\n## Bottom Line\n\nThomas Carlyle built *The French Revolution: A History* (3 vols., 1837) on an unusually wide and largely documentary source base — above all the forty-volume *Histoire parlementaire de la Révolution française* of Buchez and Roux, then a deep stratum of Revolutionary memoir (Madame Roland, Bertrand de Moleville, Weber, Bailly, Dumont), the compilation *Histoire de deux amis de la liberté*, the earlier narrative historians (Thiers, Mignet, Montgaillard, Lacretelle), the official *Moniteur*, and a flood of pamphlets and eyewitness reportage, much of it lent or pointed out to him by John Stuart Mill. His method was not invented for the book but theorized in advance, in two programmatic essays — \"On History\" (1830) and \"On History Again\" (1833) — where he declared history \"the only true poetry,\" the \"essence of innumerable Biographies,\" and attacked cause-and-effect \"Philosophical\" history as a thin linear thread drawn through a solid, simultaneous reality (\"Narrative is *linear*, Action is *solid*\"). In practice this meant an almost obsessive demand for the concrete, dated, visual, eyewitness-attested detail, which he then welded — by selection, juxtaposition, and a present-tense narratorial \"we are there\" technique — into vivid scene; the imaginative work lay in arrangement and in filling small gaps, not in inventing the documentary spine. The long scholarly verdict (Rosenberg, Ben-Israel, Cumming, Gossman, and the modern editors) is that despite a method that looks the opposite of \"scientific\" history, the book is broadly faithful to the documented record: as Rosenberg puts it, \"its poetry consists in being everywhere scrupulously rooted in historical fact,\" and Mill's 1837 review already called it \"the truest of histories\" precisely *because* it is an epic poem. The known errors are mostly minor, inherited from his sources, or matters of emphasis and sympathy rather than fabrication.\n\n---\n\n## 1. The composition that conditioned the method\n\nThe conditions under which the book was written are inseparable from how Carlyle worked with sources. Across 1834 Carlyle labored over the first volume; when it was finished he lent the manuscript to John Stuart Mill. On the evening of 6 March 1835 Mill arrived at Carlyle's Cheyne Row house \"the very picture of desperation\": the manuscript of Volume I had been accidentally destroyed — by the most reliable accounts burned as waste paper by a servant at the house of Mill's friend Harriet Taylor, leaving only a few charred leaves. [1][2] Carlyle, with what observers found extraordinary composure, accepted compensation from Mill, bought fresh paper, wrote Volumes II and III first, and only then reconstructed the lost first volume from memory and from his notes and sources. [1][2] The whole was published in 1837.\n\nThis episode matters for the *sources-and-method* workstream in two ways. First, it establishes that Carlyle's vivid scenes are not the spontaneous overflow of a single sitting but the product of saturation: he had so thoroughly internalized his documentary base that he could rebuild a destroyed volume. Second, it puts Mill at the center of the source-supply chain. Mill — then a young utilitarian editor with his own French-Revolution learning and library — had lent Carlyle large quantities of books and pamphlets on the Revolution, and pressed him toward the subject in the first place. [2][3] The book's documentary depth is in part Mill's depth, redirected through Carlyle's imagination. (The fuller biographical-compositional account belongs to the composition workstream; here it is the precondition for understanding the *source base*.)\n\n**Claim 1.1 — analytical/factual.** The destruction and reconstruction of Volume I (March 1835) is the central compositional fact and explains the book's saturation in its sources: Carlyle could rewrite from memory because he had so deeply absorbed the documentary record. *(Established; the burning is well attested; the inference that it evidences source-saturation is analytical.)*\n\n---\n\n## 2. The source base\n\n### 2.1 The documentary spine: Buchez and Roux, *Histoire parlementaire*\n\nThe single most important source for *The French Revolution* was the *Histoire parlementaire de la Révolution française, ou Journal des assemblées nationales depuis 1789 jusqu'en 1815*, compiled by Philippe-Joseph-Benjamin Buchez and Pierre-Célestin Roux-Lavergne and published in Paris in forty volumes between 1834 and 1838. [4][5] This was less a \"history\" in the narrative sense than a vast documentary compilation — speeches, decrees, proceedings of the Assemblies, newspaper extracts, and contemporary documents — knit together with the editors' (Buchez's Christian-socialist) interpretive commentary. For Carlyle it functioned as a portable archive: it brought between covers the raw, dated, attributed material — the actual words spoken in the Convention, the texts of decrees, the chronology of sessions — out of which he built his scenes. Crucially, the early volumes were appearing in real time as Carlyle wrote (1834–37), so the *Histoire parlementaire* and *The French Revolution* are near-contemporaneous projects feeding on the same Revolutionary record. [4][5]\n\nCarlyle's reliance on Buchez and Roux is not merely inferred: he reviewed the work directly. His essay \"Parliamentary History of the French Revolution,\" published in the *London and Westminster Review* in April 1837 (the same year as his own history), is in part a review of the *Histoire parlementaire* and in part a statement of his own method — a useful primary document for this workstream because it shows him reflecting explicitly on the documentary-compilation genre he was mining. [5][6]\n\n**Claim 2.1 — factual.** Buchez and Roux's forty-volume *Histoire parlementaire* (Paris, 1834–38) was Carlyle's principal documentary source — a compilation of speeches, decrees, and contemporary documents that supplied the dated, attributed raw material of his scenes; Carlyle reviewed the work in the *London and Westminster Review*, April 1837. *(Established.)* **Load-bearing.**\n\n### 2.2 The memoir literature\n\nOnto this documentary spine Carlyle grafted a dense stratum of eyewitness memoir — the literature that gave him the human voice, the gesture, the physical detail, the first-person \"I saw.\" The principal memoirists behind the *History* include:\n\n- **Madame Roland** — her *Mémoires* (written in prison before her 1793 execution), a central source for the Girondin milieu and one of the book's emotional touchstones; Carlyle's portrait of her death is built on her own words.\n- **Antoine-François Bertrand de Moleville** — royalist minister, whose memoirs supply a court-side, counter-revolutionary angle.\n- **Joseph Weber** — foster-brother of Marie-Antoinette, whose memoirs feed the court and queen material.\n- **Jean-Sylvain Bailly** — astronomer, first mayor of Paris, president of the National Assembly at the Tennis Court Oath; his memoirs are a key source for 1789.\n- **Pierre-Étienne-Louis Dumont** — Genevan, associate of Mirabeau; his *Souvenirs sur Mirabeau* (posthumously published) inform Carlyle's celebrated Mirabeau portrait.\n\nThese memoirs gave Carlyle exactly what his theory demanded: not abstraction but the concrete, dated, sensory testimony of people who were present. [3][7]\n\n**Claim 2.2 — factual.** Carlyle's human detail and eyewitness texture derive heavily from Revolutionary memoir — Madame Roland, Bertrand de Moleville, Weber, Bailly, and Dumont among the principal voices. *(Established; the named list is standard in the scholarship.)*\n\n### 2.3 The *Histoire de deux amis de la liberté*\n\nA distinctive and somewhat problematic source is the *Histoire de la Révolution de France* known as the *Histoire de deux amis de la liberté* (\"History by Two Friends of Liberty\") — a multi-volume contemporary narrative compiled in the 1790s, traditionally attributed to two pseudonymous \"friends of liberty.\" Carlyle drew on it for color and incident, especially for popular scenes and journées. Modern scholarship treats it with caution: it is a compilation of uneven reliability, and where Carlyle's vivid crowd-scenes rest on it, his accuracy is hostage to the accuracy of the *deux amis*. This is one of the main channels by which inherited error (rather than invention) enters the *History*. [7]\n\n**Claim 2.3 — analytical/factual.** Carlyle used the contemporary compilation *Histoire de deux amis de la liberté* for popular and crowd scenes; because that source is of uneven reliability, it is a principal route by which inherited (not invented) error enters Carlyle's narrative. *(Contested in detail / analytical; the use is established, the error-channel claim is a scholarly judgment.)*\n\n### 2.4 The earlier narrative historians\n\nCarlyle wrote in the wake of a first generation of post-Restoration French narrative historians, whom he both used and disdained. The most important:\n\n- **Adolphe Thiers**, *Histoire de la Révolution française* (10 vols., 1823–27) — the best-known liberal narrative of the day; Carlyle mined it for chronology and connective tissue while scorning its tone.\n- **François Mignet**, *Histoire de la Révolution française* (1824) — the compact, deterministic, \"philosophical\" narrative that for Carlyle epitomized exactly the cause-and-effect history he rejected.\n- **Comte de Montgaillard**, *Histoire de France* — a source for political detail and intrigue.\n- **Charles Lacretelle**, *Précis historique de la Révolution française* and related works — another narrative quarry.\n\nCarlyle's attitude here is double-edged and central to the method: he leaned on Thiers and Mignet for the skeleton of events while treating their explanatory frameworks — the smooth, rationalizing, cause-and-effect machinery — as precisely the falsification he meant to correct by returning to the documents and the eyewitness fact. [3][7]\n\n**Claim 2.4 — factual/analytical.** Carlyle used the earlier narrative historians (Thiers, Mignet, Montgaillard, Lacretelle) for chronology and connective material while explicitly rejecting their \"philosophical,\" cause-and-effect explanatory frameworks — Mignet's deterministic narrative being his negative model. *(Established as to use; analytical as to the rejection-of-framework reading.)*\n\n### 2.5 The *Moniteur*, pamphlets, and miscellaneous eyewitness material\n\nBeneath the named books lay the periodical and pamphlet bedrock. The *Moniteur universel* — the quasi-official newspaper of record that printed Assembly debates and decrees — gave Carlyle dated, near-verbatim parliamentary material to set against memoir. To this he added an enormous, miscellaneous, hard-to-catalogue mass: revolutionary pamphlets, broadsides, letters, almanacs, journalism, and printed eyewitness accounts, many supplied or located through Mill. The book's footnotes are studded with citations to these scattered sources, and one feature of Carlyle's method is the way the apparatus itself becomes part of the texture — he names, dates, and points at his documents in the margins even as he transmutes them in the text. [3][6][7]\n\n**Claim 2.5 — factual.** Carlyle drew on the *Moniteur* for dated parliamentary material and on a large miscellany of pamphlets, broadsides, journalism, and printed eyewitness accounts (many supplied via Mill), citing them in his footnotes. *(Established.)*\n\n### 2.6 Mill as source-broker\n\nIt bears its own claim. Mill did not merely lose Volume I; he was the conduit for much of the source base. He lent Carlyle books and pamphlets, urged the subject, and — being himself learned in the Revolution — functioned as an informal research collaborator before the rupture of the burned manuscript. The \"books Mill lent\" are therefore not a footnote but a structural fact about how the *History* came to have the documentary range it does. [2][3]\n\n**Claim 2.6 — factual/analytical.** John Stuart Mill supplied or pointed Carlyle to a substantial part of his source base and pressed the subject on him, functioning as an informal research broker. *(Established as to lending and encouragement; the \"structural\" weighting is analytical.)*\n\n---\n\n## 3. The stated theory: \"On History\" (1830) and \"On History Again\" (1833)\n\nCarlyle did not improvise his method; he published it years before the *History* in two essays that are the Tier-1 keys to this workstream.\n\n### 3.1 History as poetry; the inadequacy of cause-and-effect\n\nIn \"On History\" (1830, *Fraser's Magazine*) Carlyle advances the propositions that organize the *History*. He calls history the supreme form of knowledge — and, in the formulation that runs through his whole career, treats *true* history as the only true poetry, the only possible Epic: he would write to Emerson that \"the only Poetry is History, could we tell it right.\" [8][9] The point is not decorative. For Carlyle the past is not a chain of discrete causes and effects but a living, simultaneous totality, and the historian's narrative is a thin line drawn through a solid body. His most quoted formulation:\n\n> \"Narrative is *linear*, Action is *solid*.\" [9][10]\n\n— and, in the surrounding passage, the image of the historian trying to represent the \"ever-living, ever-working Chaos of Being\" by \"threading it with single lines of a few ells in length.\" [9][10] Real events, he insists, are \"not a chain at all, ... but a Living planet-like flame of action\" — they happen *at once*, in depth and on every side, while the narrator can only tell one thing after another. From this follows his suspicion of \"Cause-and-effect\" history and of the \"Philosophical\" historian who claims to have traced the smooth chain of motives: such a history mistakes its own linear thread for the solid reality.\n\n### 3.2 The \"innumerable Biographies\" doctrine\n\nThe second organizing proposition, also from \"On History,\" is biographical:\n\n> \"History is the essence of innumerable Biographies.\" [9][10]\n\nThe general life of a nation, for Carlyle, is nothing but the sum and tissue of individual lives; therefore the historian's road to truth runs through persons, faces, and concrete acts, not through abstractions like \"the spirit of the age\" or \"economic forces.\" This is the theoretical license for the *History*'s method of crowding the page with named, particular human beings caught in the act.\n\n### 3.3 \"On History Again\" (1833)\n\nThe companion essay \"On History Again\" (1833, *Fraser's Magazine*) extends and complicates the argument: history as the conversation of the present with the past, the impossibility of any history being complete or final (every age must rewrite it — \"do not the records of a Tacitus acquire new meaning, after seventeen hundred years, in the hands of a Montesquieu?\"), and a satirical attack on the pedantic chronicler — the figure who would later become \"Dryasdust\" — who buries the living past under dead fact without vision. The two essays together stake out the position the *History* enacts: against both the cause-and-effect rationalizers (too much theory, no flesh) and the antiquarian fact-piles (too much dead fact, no vision), in favor of a poetic-prophetic history that is both saturated in document and shaped by imaginative insight. [3][8][11]\n\n**Claim 3.1 — factual (textual).** In \"On History\" (1830) Carlyle states the doctrines the *History* enacts: \"History is the essence of innumerable Biographies\"; \"Narrative is *linear*, Action is *solid*\"; and the figure of the historian \"threading\" the \"ever-living, ever-working Chaos of Being\" — entailing a rejection of cause-and-effect \"Philosophical\" history. *(Established; verbatim phrases corroborated across multiple full-text and scholarly sources.)* **Load-bearing.**\n\n**Claim 3.2 — factual (textual).** \"On History Again\" (1833) adds the doctrines that no history is final (each age rewrites it — the Tacitus/Montesquieu example) and that the pedantic fact-collector (the proto-\"Dryasdust\") fails for lack of vision; the two essays together define Carlyle's method as poetic-prophetic history saturated in document. *(Established as to the essay's content; the synthesis is analytical.)*\n\n---\n\n## 4. Method in practice: from document to scene\n\nHow did the theory become the page? Five practices recur.\n\n### 4.1 The demand for the concrete, visual, eyewitness \"fact\"\n\nCarlyle's working obsession was the authentic, dated, physical particular — what color the sky was, what a man wore, the exact hour, the precise words shouted. He hunted his memoirs and pamphlets for these and distrusted any statement he could not anchor in a witness. This is the \"innumerable Biographies\" doctrine as research practice: the fact must be *somebody's* seen-or-heard fact. The result is the famous concreteness of the book — Louis XVI's locksmithing, the green coat, the specific cannon at specific bridges — which gives the prose its hallucinatory immediacy.\n\n### 4.2 Welding documented detail into scene\n\nThe signature technique is the fusion of many small documented particulars into a single vivid tableau, often narrated in the present tense and in a first-person-plural \"we are present\" voice that collapses the distance between reader and event. The flight to Varennes, the storming of the Bastille, the September Massacres, the execution of the King, the fall of Robespierre — each is assembled mosaic-fashion from memoir, *Moniteur*, and pamphlet, then animated by Carlyle's narratorial presence. The artistry is in the selection and arrangement of real fragments, not in invented incident.\n\n### 4.3 Selective fidelity and the imaginative filling of gaps\n\nCarlyle is *selectively* faithful: faithful to the documentary record where it exists, imaginative in the small interstices the record leaves. Where a source gives a gesture, he may supply the surrounding atmosphere; where chronology is firm, he keeps it; where motive is dark, he conjectures aloud, often flagging the conjecture as his own (\"so we may fancy\"). The imaginative filling is real but disciplined and usually marked; it does not amount to fabricating the central documented facts. This is the crux modern critics return to: the gap-filling is rhetorical and atmospheric, not evidentiary invention.\n\n### 4.4 Hostility to abstraction\n\nMethod is also refusal. Carlyle systematically declines the explanatory vocabulary of the philosophical historians — \"the causes of the Revolution,\" the smooth march of progress, the balance of forces. He treats such abstractions as cant that hides the living reality. The book has a theory of revolution (the eruption of long-suppressed reality, \"Sansculottism,\" the bursting of shams), but it is delivered through symbol, person, and scene rather than through analytic exposition.\n\n### 4.5 The apparatus as texture\n\nFinally, the footnotes. Carlyle's citations — to Buchez and Roux, to Madame Roland, to the *Moniteur*, to the *deux amis* — are abundant and specific, and they do double duty: they document, and they perform the method, continually pointing the reader back to the witnessed fact behind the scene. The apparatus is part of the rhetoric of authenticity. [3][6][7]\n\n**Claim 4.1 — analytical.** Carlyle's practical method was to hunt concrete, dated, eyewitness particulars in his memoir/pamphlet/*Moniteur* sources and weld them, by selection and present-tense \"we are present\" narration, into vivid scene — with imaginative gap-filling confined largely to atmosphere and (usually flagged) conjecture rather than invented documentary fact. *(Analytical; this is the consensus reading of his technique.)* **Load-bearing.**\n\n---\n\n## 5. How accurate is the *History*? The long verdict\n\n### 5.1 The paradox the scholarship resolves\n\nThe standing puzzle is that a book written by the rules of poetry and prophecy — present-tense, splenetic, symbol-laden, openly partisan in sympathy — turns out, on inspection, to be broadly reliable as to its facts. The resolution offered repeatedly by serious critics is that Carlyle's poetic intensity was *in the service of* the documentary fact, not a substitute for it.\n\nJohn D. Rosenberg, in his introduction to the Modern Library edition and at greater length in *Carlyle and the Burden of History* (1985), gives the canonical formulation: the *French Revolution* is \"one of the grand poems of [Carlyle's] century, yet its poetry consists in being everywhere scrupulously rooted in historical fact.\" [12][13] Rosenberg's larger book reads the *History* as Carlyle's wrestling with the unbearable weight of the past, but it does not treat the work as fictionalized; it treats it as a documentary epic.\n\nThe earliest and still most quoted verdict is Mill's own. Reviewing the book in 1837 (the *London and Westminster Review*), Mill wrote that it \"is not so much a history, as an epic poem; and notwithstanding, or even in consequence of this, the truest of histories.\" [12] Mill — who had lent Carlyle the books and knew the sources — is asserting precisely the paradox: the epic form does not falsify, it clarifies.\n\n**Claim 5.1 — factual/analytical.** The scholarly and contemporary consensus is that despite its poetic-prophetic form the *History* is broadly faithful to the documented record; Rosenberg: its \"poetry consists in being everywhere scrupulously rooted in historical fact,\" and Mill (1837) called it \"the truest of histories\" *because* it is an epic poem. *(Established; Mill quotation and Rosenberg formulation both corroborated.)* **Load-bearing.**\n\n### 5.2 Where he is sound\n\nCritics broadly agree that on the large architecture of events — the chronology, the sequence of the journées, the parliamentary record, the major actors and their fates — Carlyle is reliable, because he is following the documentary record (Buchez/Roux, *Moniteur*, the memoirs) closely. His portraits of individuals (Mirabeau via Dumont, Madame Roland via her own *Mémoires*, Danton, Robespierre) are grounded in source testimony even where the coloring is his own. The set-piece scenes, for all their drama, generally correspond to events the documents attest.\n\n### 5.3 Where he errs\n\nThe errors are of recognizable, mostly minor, kinds:\n\n1. **Inherited error.** Where his sources were wrong — especially the *Histoire de deux amis de la liberté* and some partisan memoirs — Carlyle is wrong with them. His method (trust the eyewitness) made him vulnerable to credulous or self-serving witnesses.\n2. **Error of emphasis and sympathy.** Carlyle's reading is morally and prophetically loaded: his sympathies (with Mirabeau, with Danton's energy; his contempt for the Gironde's rhetoric, for \"philosophism,\" for the Jacobin abstractions) shape selection and tone. This is not factual error but it is interpretive slant, and later historians with different politics correct his weightings.\n3. **The limits of 1830s knowledge.** Carlyle wrote before the great archival editions and the professionalization of Revolutionary historiography (Aulard's source editions, the later schools). Much of the documentary apparatus that lets modern historians check the record did not yet exist; some of his factual gaps are simply the gaps of his moment.\n4. **Atmospheric over-reach.** In the imaginative interstices, the coloring can outrun the evidence — but, as noted, this is usually flagged and rarely amounts to inventing a documented event.\n\nThe net judgment, sustained from Mill through Ben-Israel (*English Historians on the French Revolution*, 1968), Rosenberg (1985), Cumming (*A Disimprisoned Epic*, 1988), and Gossman, is that the *History* is a literary masterpiece that is also a serviceable, broadly accurate account — superseded as analysis by later professional historiography, but not discredited as fact, and never displaced as the great imaginative rendering of the event. [12][13][14][15]\n\n**Claim 5.2 — analytical/factual.** Carlyle's errors are chiefly (a) inherited from unreliable sources such as the *deux amis*, (b) matters of sympathy/emphasis rather than fact, and (c) the inevitable gaps of pre-Aulard, pre-archival 1830s knowledge; the consensus is that the book is superseded as analysis but not discredited as fact. *(Analytical; rests on the cumulative scholarly judgment of Mill, Ben-Israel, Rosenberg, Cumming, Gossman.)* **Load-bearing.**\n\n### 5.4 The formal reading: Cumming and Gossman\n\nTwo scholars frame the method in formal-literary terms that bear on accuracy. Mark Cumming, in *A Disimprisoned Epic: Form and Vision in Carlyle's French Revolution* (Univ. of Pennsylvania Press, 1988/89), reads the *History* as a deliberate epic *experiment* that fuses \"the myths of epic with the facts of history,\" and argues the right critical posture is neither to affirm nor deny its epic status but to see how it forces a rethinking of genre — i.e., the documentary and the poetic are not at war in the book but constitutively fused. [14] Lionel Gossman, the great theorist of nineteenth-century historiography as a literary practice, situates Carlyle within the larger Romantic recovery of history-as-narrative-art, where the boundary between \"history\" and \"literature\" is porous and the documentary fidelity coexists with avowed rhetorical shaping. [15] Both readings support the central finding: in Carlyle, fidelity to the record and poetic form are integrated, not opposed.\n\n**Claim 5.3 — analytical.** Cumming (1988) reads the *History* as an epic experiment fusing \"the myths of epic with the facts of history,\" and Gossman situates it within the Romantic understanding of history as literary art — both supporting the view that documentary fidelity and poetic form are fused rather than opposed in Carlyle. *(Analytical; established as a characterization of these scholars' positions.)*\n\n---\n\n## 6. Carlyle in his own words (method statements)\n\nFor the corpus's use, the load-bearing primary method statements, with their status:\n\n- **\"History is the essence of innumerable Biographies.\"** — \"On History\" (1830). The biographical doctrine; license for the person-centered method. *(Verbatim, corroborated.)* [9][10]\n- **\"Narrative is *linear*, Action is *solid*.\"** — \"On History\" (1830). The anti-cause-and-effect doctrine; the historian's thin thread vs. the solid simultaneity of real events. *(Verbatim, corroborated.)* [9][10]\n- **The historian \"threading\" the \"ever-living, ever-working Chaos of Being\" with \"single lines of a few ells in length.\"** — \"On History\" (1830). The image of narrative's inadequacy to reality. *(Verbatim/near-verbatim, corroborated.)* [9][10]\n- **\"The only Poetry is History, could we tell it right.\"** — Carlyle to Emerson (correspondence); the compressed statement of history-as-poetry. *(Attributed to the Carlyle–Emerson correspondence; treat as well-attested but verify exact wording/date in the published letters.)* [8]\n- **\"True History the only possible Epic.\"** — from the Carlyle letters/notebooks as cited in the scholarship. *(Attributed; verify exact source citation — appears in scholarship as CL 7:24.)* [8]\n- **Mill on the book:** \"not so much a history, as an epic poem; and notwithstanding, or even in consequence of this, the truest of histories.\" — Mill's review, 1837. *(Verbatim, corroborated; this is reception, but it is the canonical statement of the method's paradox.)* [12]\n\n---\n\n## Open Questions\n\n1. **Exact source-by-source quantification.** No single modern study fully quantifies how much of each major scene rests on which source; a granular collation of the *History*'s footnotes against Buchez/Roux, the *deux amis*, and the memoirs would sharpen the \"where he errs by inheritance\" claim. The Oxford Scholarly Edition (Cumming, Sorensen, Engel, Kinser) apparatus is the place to resolve this — not consulted directly here.\n2. **The precise wording and provenance of the Emerson and notebook \"history is poetry\" statements.** Confirm against the published *Collected Letters of Thomas Carlyle* and the *Two Note Books*.\n3. **The status of the *Histoire de deux amis de la liberté* errors.** How many of Carlyle's documented factual slips trace specifically to this compilation versus the partisan memoirs? Needs the modern editorial apparatus.\n4. **Mill's lent library.** Is there a reconstructable list of the specific books and pamphlets Mill lent Carlyle? The Carlyle–Mill correspondence and Froude's biography are the likely sources.\n5. **Ben-Israel's specific verdict on Carlyle's reliability.** Her chapter on Carlyle should be read directly to extract her precise judgment, not paraphrased from secondary summary.\n6. **Carlyle's own review of Buchez/Roux.** The April 1837 *London and Westminster Review* essay should be read in full as a primary method statement; only its existence and general character are established here.\n\n---\n\n## Sources\n\n1. *Lost Manuscripts*, \"The French Revolution\" (account of the 6 March 1835 burning of Carlyle's Vol. I manuscript at Mill's hand; servant of Harriet Taylor). https://lostmanuscripts.com/2011/01/30/the-french-revolution/ — accessed 2026-06-08. **Tier 5** (specialist literary-history blog; corroborates a fact also in standard biographies). *Contribution: the burning-and-reconstruction narrative.*\n2. National Endowment for the Humanities, \"The Voracious Pen of Thomas Carlyle,\" *Humanities* (March/April 2009). https://www.neh.gov/humanities/2009/marchapril/feature/the-voracious-pen-thomas-carlyle — accessed 2026-06-08. **Tier 5** (reputable institutional magazine). *Contribution: Mill's role, the burning, Carlyle's working habits.*\n3. Chris R. Vanden Bossche, *Historical Essays* (ed.) and \"From Transcendental Novel to Epic History,\" VictorianWeb. https://victorianweb.org/authors/carlyle/vandenbossche/3d.html — accessed 2026-06-08. **Tier 2** (scholarly editor of the California edition of Carlyle's *Historical Essays*). *Contribution: the development of Carlyle's historical theory; \"true History the only possible Epic\" (CL 7:24); the essays' arguments.*\n4. *Histoire parlementaire de la Révolution française* (Buchez & Roux), bibliographic record. Gallica / fr.Wikisource (used only to confirm the 40-volume Paris 1834–38 publication). https://gallica.bnf.fr/ark:/12148/bpt6k288684.texteImage — accessed 2026-06-08. **Tier 1** (the source itself, for its own publication facts). *Contribution: confirms Carlyle's principal documentary source and its dates/scope.*\n5. \"Buchez et la Révolution française,\" *Annales historiques de la Révolution française* (Persée). https://www.persee.fr/doc/ahrf_0003-4436_1966_num_184_1_3839 — accessed 2026-06-08. **Tier 2** (scholarly journal). *Contribution: the nature, scope, and interpretive character of the *Histoire parlementaire*.*\n6. Reference (in the openedition and NEH sources) to Carlyle, \"Parliamentary History of the French Revolution,\" *London and Westminster Review*, April 1837. **Tier 1** (Carlyle's own review essay — referenced, not read in full here). *Contribution: Carlyle's explicit reflection on the Buchez/Roux compilation and his method.*\n7. \"Re-presenting the French Revolution: the impact of Carlyle's work on British society,\" *Revue française de civilisation britannique* (OpenEdition Journals). https://journals.openedition.org/rfcb/6118 — accessed 2026-06-08. **Tier 2** (peer-reviewed journal). *Contribution: Carlyle's sources, his use of Buchez/Roux and the memoir/compilation literature, his place in FR historiography.*\n8. Ralph Waldo Emerson / Thomas Carlyle correspondence, as cited in the scholarship (the \"only Poetry is History, could we tell it right\" formulation); and \"On History Again\" (1833), *Fraser's Magazine*. **Tier 1** (primary correspondence/essay — quotations cited via scholarship; exact wording to be confirmed in the *Collected Letters*). *Contribution: the compressed history-as-poetry statement; the 1833 essay's argument.*\n9. Thomas Carlyle, \"On History\" (1830), full text. https://www.blupete.com/Literature/Essays/Best/CarlyleHistory.htm — accessed 2026-06-08 (cited; the HTTPS fetch failed certificate validation, but the essay text and the verbatim phrases are corroborated by sources 10 and 3). **Tier 1** (the primary essay). *Contribution: the doctrines of the method, verbatim.*\n10. Cross-corroboration of the verbatim \"On History\" phrases (\"History is the essence of innumerable Biographies\"; \"Narrative is *linear*, Action is *solid*\"; \"ever-living, ever-working Chaos of Being\" / \"threading … single lines of a few ells in length\") via multiple full-text reproductions and scholarly citation (thefreshreads.com reproduction; thevictoriansage.wordpress.com discussion). **Tier 1/Tier 5** (primary text reproduced on secondary sites). *Contribution: confirms exact wording of the key method statements.*\n11. \"Carlyle's 'On History' (1830),\" The Victorian Sage. https://thevictoriansage.wordpress.com/2012/08/19/carlyles-on-history-1830/ — accessed 2026-06-08. **Tier 5** (scholarly-amateur literary blog). *Contribution: discussion of the essay's argument; the \"history as Chaos of Being\" passage.*\n12. John D. Rosenberg, Introduction to *The French Revolution: A History* (Modern Library Classics ed.), quoting J. S. Mill's 1837 review (\"not so much a history, as an epic poem … the truest of histories\") and stating the work's \"poetry consists in being everywhere scrupulously rooted in historical fact.\" https://www.amazon.com/French-Revolution-History-Library-Classics/dp/0375760229 — accessed 2026-06-08. **Tier 2** (scholar's introduction to a standard edition). *Contribution: the canonical accuracy verdict and the Mill quotation.*\n13. John D. Rosenberg, *Carlyle and the Burden of History* (Harvard Univ. Press, 1985). https://www.degruyterbrill.com/document/doi/10.4159/harvard.9780674422988/html — accessed 2026-06-08. **Tier 2** (university-press monograph). *Contribution: the fullest scholarly reading of Carlyle as historian; documentary-epic, not fictionalized.*\n14. Mark Cumming, *A Disimprisoned Epic: Form and Vision in Carlyle's French Revolution* (Univ. of Pennsylvania Press, 1988/89). https://www.pennpress.org/9780812281170/a-disimprisoned-epic/ — accessed 2026-06-08. **Tier 2** (university-press monograph). *Contribution: the formal reading — epic experiment fusing myth and historical fact; genre as the key to method.*\n15. Hedva Ben-Israel, *English Historians on the French Revolution* (Cambridge Univ. Press, 1968), and Lionel Gossman's work on history-as-literature. https://www.cambridge.org/ — accessed 2026-06-08. **Tier 2** (university-press monograph / leading historiographer). *Contribution: Carlyle within the British tradition of FR historiography; the literary-historiographical frame for assessing his reliability.*\n\n---\n\n*Tier discipline note:* The load-bearing method statements (Section 3, Section 6) rest on Tier-1 primary text (Carlyle's essays) corroborated across multiple reproductions; the source-base facts (Section 2) rest on Tier-1 bibliographic records and Tier-2 scholarship; the accuracy verdict (Section 5) rests on Tier-2 university-press scholarship plus Mill's contemporary Tier-1 review. The one HTTPS fetch that failed certificate validation (source 9) is not relied on alone — every verbatim phrase it would have supplied is independently corroborated. No Tier-7 sources used for any factual claim. No fabricated quotations: where exact wording or provenance of a quotation (Emerson letter; CL 7:24) is not independently confirmed here, it is flagged for verification in the Open Questions."}, {"order": 3, "file": "03_Style_And_Form.md", "title": "Style, Voice, and Narrative Form", "summary": "", "body": "# Style, Voice, and Narrative Form of *The French Revolution*\n\n## Bottom Line\n\nCarlyle's *The French Revolution* is the most stylistically extreme major history in English, and its style is not ornament but argument: the broken, exclamatory, inverted, German-inflected idiom that contemporaries christened \"Carlylese,\" the relentless historical-present tense, the prophetic-sermonic narrator who addresses the dead by name, and a tight system of recurring images (fire/phoenix, sea/tide, the spectral and phantasmagoric, masks and clothes, Sansculottism as an elemental force) together turn chronicle into a prose-epic that strains — and was designed to strain — the boundary between history and literature. John Stuart Mill caught the doubleness at once in 1837, calling it \"not so much a history as an epic poem; and notwithstanding this, or even in consequence of this, the truest of histories.\" That formula has organized two centuries of judgment: the present-tense \"camera-eye,\" with its cinematic cutting between wide shot and close-up that later critics compared explicitly to Eisenstein, is simultaneously the source of the book's unmatched immediacy and the ground of the standing charge that it is unreliable as science — Thackeray's backhanded \"prose run mad.\" This document anchors every claim about the style in short verbatim set-pieces (the storming of the Bastille, the flight to Varennes, the September Massacres, the execution of Louis XVI, the fall of Robespierre) quoted directly from the text, and reads the critical tradition — Holloway, Levine, Rosenberg, Landow, Vanden Bossche, Allison, G. B. Tennyson — as commentary on what those set-pieces are doing.\n\n---\n\n## 1. \"Carlylese\": The Grammar of Prophecy\n\n### What the style is, at the level of the sentence\n\nThe idiom of *The French Revolution* is instantly recognizable and was instantly controversial. Its marks, all visible in any page of the set-pieces below, are: (a) **broken, paratactic, exclamatory syntax** — short clauses flung down with semicolons and dashes, ending in apostrophe; (b) **inverted, German-influenced word order** — verb-first and predicate-first constructions (\"Bursts forth Insurrection…\"); (c) **coinages and choking compounds** — \"Fire-Mahlstrom,\" \"fire-chaos,\" \"World-Phoenix,\" \"fire-consummation,\" \"Spectral Realities\"; (d) **capitalized abstractions personified into agents** — Sansculottism, Necessity, Anarchy, Truth, Sham, Terror, the Guillotine; and (e) **direct second-person address**, often the archaic \"thou,\" to historical actors, to the reader, and to the dead.\n\nWilliam Makepeace Thackeray, reviewing the book in 1837, gave the hostile description that has never been bettered: the style \"is stiff, short, and rugged, it abounds with Germanisms and Latinisms, strange epithets, and choking double words, astonishing to the admirers of simple Addisonian English\" [9]. He called the book, with grudging admiration, \"prose run mad\" [4][9]. The label that stuck — \"Carlylese\" — names exactly this departure from the smooth Augustan period.\n\nThe lineage is German Romantic prose (Jean Paul Richter above all) filtered through Carlyle's own *Sartor Resartus* (1833–34), where the manner was first fully forged; G. B. Tennyson's study of *Sartor* (*\"Sartor\" Called \"Resartus\"*, 1965) is the standard account of how Carlyle built the idiom, and Tennyson's verdict on its inventiveness — that \"not until [James] Joyce is there a comparable inventiveness in English prose\" — places Carlylese in a modernist genealogy rather than a merely Victorian one [10][4]. The *French Revolution* is the idiom's first deployment at epic scale and on real historical matter.\n\n### Carlylese in action: the Bastille\n\nThe most-cited single set-piece shows every feature at once. As de Launay's garrison fires the first volley, Carlyle writes (verbatim):\n\n> \"soft speeches producing no clearance of these, de Launay gives fire; pulls up his Drawbridge. A slight sputter;—which has kindled the too combustible chaos; made it a roaring fire-chaos! Bursts forth insurrection, at sight of its own blood (for there were deaths by that sputter of fire), into endless rolling explosion of musketry, distraction, execration;—and overhead, from the Fortress, let one great gun, with its grape-shot, go booming, to shew what we could do. The Bastille is besieged!\" [1]\n\nNote the inversion (\"Bursts forth insurrection\"), the coinage (\"fire-chaos\"), the dash-and-semicolon stagger, the abrupt exclamatory clincher, and — crucially — the slide into the first-person plural \"we could do,\" which enlists the reader bodily into the assault. Then the apostrophe to a named individual combatant:\n\n> \"Smite, thou Louis Tournay, cartwright of the Marais, old-soldier of the Regiment Dauphine; smite at that Outer Drawbridge chain, though the fiery hail whistles round thee! Never, over nave or felloe, did thy axe strike such a stroke. Down with it, man; down with it to Orcus: let the whole accursed Edifice sink thither, and Tyranny be swallowed up for ever!\" [1]\n\nThis is Carlylese as a single instrument doing four things simultaneously: it reports a fact (Tournay cut the drawbridge chain), it commands a man dead fifty years as if the outcome were undecided, it elevates a cartwright to Homeric stature, and it pronounces the moral meaning (\"Tyranny be swallowed up for ever\"). Holloway's point in *The Victorian Sage* (1953) is exactly that this apparent chaos is controlled: \"Carlyle's wild imagery and distorted meanings are less irresponsible than they seem at first reading,\" and \"a wild passionate energy runs through it, disorderly and even chaotic but leaving an indelible impression of life, force, vitality\" [3].\n\n> **Claim 3.1 — load-bearing.** \"Carlylese\" is a deliberate, German-Romantic-derived idiom — exclamatory parataxis, inverted word order, compound coinages, capitalized personified abstractions, archaic second-person address — first forged in *Sartor Resartus* and deployed at scale in *The French Revolution*; it was recognized and named as a distinct style by contemporaries (Thackeray: \"Germanisms… choking double words\"; \"prose run mad\").\n\n---\n\n## 2. The Present Tense and the \"Camera-Eye\"\n\n### The historical present as method, not mannerism\n\nCarlyle's most consequential technical choice is the sustained **historical present**. He narrates events a half-century gone as though they are happening now, before our eyes, with the outcome unknown. This is not decorative: critics agree it is load-bearing for his theory of history. Ann Talbot's reading is representative — \"His use of the present tense is characteristic. He aims to make the reader experience what it was like to be there,\" conveying \"a sense of the rush of events and the uncertainties of the time,\" and keeping the Revolution a \"living struggle that would continue to influence the centuries to come\" [6]. Vanden Bossche makes the philosophical version of the point: in the present-tense narration \"past and present are not separate,\" so that the \"beliefs and actions\" of the Revolution \"constitute the lives of the narrator and his readers\" [8]. The tense is the grammar of Carlyle's conviction that the Revolution is not over.\n\nThe Bastille passage above is in the present throughout (\"de Launay gives fire,\" \"Bursts forth insurrection,\" \"The Bastille is besieged!\"). So is the wine-merchant-turned-gunner vignette:\n\n> \"Cholat the wine-merchant has become an impromptu cannoneer. See Georget, of the Marine Service, fresh from Brest, ply the King of Siam's cannon… Yet now, at the right instant, they have got together, and discourse eloquent music.\" [1]\n\nThe deictic imperative \"See Georget\" is the verbal equivalent of a director pointing the lens.\n\n### The cinematic cut: wide shot, close-up, montage\n\nThe most striking modern reading of Carlyle's method is frankly cinematic, and it predates film — which is why critics reach for Eisenstein as the nearest analogue. Talbot: \"There is a cinematic character in the way they both present history,\" with Carlyle cutting from a panoramic procession and \"just as rapidly focusing in on the individuals\" [6]. Mark Allison, in *Victorian Literature and Culture* (\"The French Revolution Now; or, Carlyle's Eternal Return,\" 2018), describes the technique as \"unattributed, 'polyphonic discourse'\" through which \"we seem to peer into an abyss of seething elemental forces,\" and the narrative perspective as fragmented across consciousnesses \"approximating modern cinematic montage\" [7]. The NEH essay summarizes Carlyle's \"remarkable talent for painting historical scenes through alternating wide shots and close-ups, motion and stillness, refrains, montage, and expressive angles\" [5][11].\n\nThe Bastille \"Fire-Mahlstrom\" passage is the textbook montage — a fast cut between the panoramic (\"At every street-barricade, there whirls simmering, a minor whirlpool\") and the elemental wide shot of the whole city as a single vortex:\n\n> \"all minor whirlpools play distractedly into that grand Fire-Mahlstrom which is lashing round the Bastille. And so it lashes and it roars.\" [1]\n\nThe execution of the King is built the same way — a slow tracking shot of the scaffold, then tight close-ups (the puce coat, the white flannel waistcoat, \"his face very red\"), then the cut to the severed head and the crowd:\n\n> \"He mounts the scaffold, not without delay; he is in puce coat, breeches of grey, white stockings. He strips off the coat; stands disclosed in a sleeve-waistcoat of white flannel… The Axe clanks down; a King's Life is shorn away. It is Monday the 21st of January 1793… Executioner Samson shews the Head: fierce shout of Vive la République rises, and swells; caps raised on bayonets, hats waving.\" [1]\n\nThe same montage governs the fall of Robespierre, where Carlyle explicitly flags his cutting technique as the only way to render chaos — \"Our fifth-act, of this natural Greek Drama, with its natural unities, can only be painted in gross; somewhat as that antique Painter, driven desperate, did the foam\" [1] — before cutting between the meeting of armed forces in the Place de Grève, the silvering dawn over the \"Ring-Dial of the Heaven,\" and the close-up of Robespierre on the deal table.\n\n> **Claim 3.2 — load-bearing.** Carlyle's sustained use of the historical present is a method, not a mannerism: it abolishes the temporal distance between reader and event to make the Revolution a still-living, still-undecided process, and it is paired with a montage technique — rapid cutting between panoramic \"wide shots\" and individual \"close-ups\" — that modern critics (Talbot, Allison, NEH) read as proto-cinematic and compare directly to Eisenstein.\n\n---\n\n## 3. The Prophetic / Sermonic Voice\n\n### The narrator as seer and preacher\n\nCarlyle's narrator is not a detached historian but a **prophet-preacher** who stands over the events pronouncing their meaning, rebuking the dead, blessing them, and turning to the reader with the second-person \"thou\" and the cadences of the King James Bible. Landow calls Carlyle a \"secular prophet\" who conveys both the \"meaning and experience\" of history at once [2]. Talbot notes \"an element of the prophet about Carlyle,\" for whom \"history was a truly human 'revelation'\" [6]. The voice is sermonic in its grammar: rhetorical questions, imperatives, benedictions, and the apostrophe.\n\nThe opening of the book sounds the note. On the death of Louis XV, the narrator turns from the courtiers' \"hollow phantasmagory\" to address mortality itself in pulpit cadence:\n\n> \"Frightful to all men is Death; from of old named King of Terrors. Our little compact home of an Existence, where we dwelt complaining, yet as in a home, is passing, in dark agonies, into an Unknown of Separation, Foreignness, unconditioned Possibility… it is a summing-up of Life; a final settling, and giving-in the 'account of the deeds done in the body.'\" [1]\n\n\"The deeds done in the body\" is a direct scriptural lift (2 Corinthians 5:10); \"King of Terrors\" is Job 18:14. The history opens, that is, in the register of a funeral sermon.\n\n### Address to the dead; benediction; the rhetorical question\n\nThe most distinctive move of the prophetic voice is **apostrophe to the dead**, warning men of fates already sealed. De Launay is addressed mid-siege as if he could still choose: \"Wo to thee, de Launay, in such an hour, if thou canst not, taking some one firm decision, rule circumstances!\" [1]. The voice can also turn to benediction. Over Robespierre's corpse — having just rendered the \"hideous\" final shriek — the narrator stops and pleads mercy in a closing benediction that is pure sermon:\n\n> \"O unhappiest Advocate of Arras, wert thou worse than other Advocates?… His poor landlord, the Cabinetmaker in the Rue Saint-Honoré, loved him; his Brother died for him. May God be merciful to him, and to us.\" [1]\n\nAnd the famous mid-narrative turn to the reader — \"Shut thy eyes, O Reader, see not this misery, peculiar to these later times\" [1] — uses the rhetorical imperative to implicate the living in the suffering of the dead. Mill recognized the originating warmth of this voice as the book's signature, praising that in it \"every idea and sentiment is given out exactly as it is thought and felt, fresh from the soul of the writer\" [5].\n\n> **Claim 3.3 — load-bearing.** The narrator of *The French Revolution* is constructed as a prophet-preacher rather than a detached historian — using King-James scriptural cadence and direct biblical quotation, the archaic second-person \"thou,\" rhetorical questions, imperatives, benedictions, and sustained apostrophe to the dead (de Launay, Robespierre, the reader) — a \"secular prophet\" voice that critics (Landow, Talbot, Mill) identify as central to the work's authority and effect.\n\n---\n\n## 4. Recurring Image-Systems\n\nCarlyle's prose is held together less by argument than by a small set of recurring **image-systems** that carry the meaning symbolically. Vanden Bossche's central thesis is that Carlyle writes \"symbolic history\" — the narrator \"seeks to interpret this world by discovering its symbols,\" and public events function as \"Symbolic Representation[s] of belief\" [8]. Holloway likewise stresses that the imagery — especially \"water, fire, and animal imagery\" — does the persuasive work, an \"elemental\" rhetoric [3]. Four systems dominate.\n\n### 4.1 Fire, conflagration, phoenix\n\nFire is the master-symbol: the Revolution is a burning, and the burning is at once destruction and rebirth. The Bastille becomes a \"fire-chaos,\" a \"Fire-Mahlstrom\"; the imperative \"Let conflagration rage; of whatsoever is combustible!\" [1] is both report and prophecy. The system culminates in the **World-Phoenix**, where destruction is recast as the necessary prelude to renewal:\n\n> \"Behold the World-Phoenix, in fire-consummation and fire-creation; wide are her fanning wings; loud is her death-melody, of battle-thunders and falling towns; skyward lashes the funeral flame, enveloping all things: it is the Death-Birth of a World!\" [1]\n\nThe phoenix makes Carlyle's providential theory of revolution into an image: what burns is the Sham; \"Sansculottism will burn much; but what is incombustible it will not burn\" [1].\n\n### 4.2 The sea and the tide\n\nThe crowd and the course of events are rendered as **sea, tide, current, and maelstrom**. The mob at the Bastille is a rising tide — \"Ever wilder swells the tide of men; their infinite hum waxing ever louder\" [1]. The King's death is a descent into \"the black Mahlstrom and descent of Death\" [1]. The dissident armed forces on the night of Thermidor make Paris \"a huge Mahlstrom, sounding there, under cloud of night,\" with the city \"rushing confused, as Ocean-currents do\" [1]. Landow's reading foregrounds a related \"shipwreck paradigm,\" with figures \"swimming passively\" (Louis XV) or sinking (Loménie-Brienne) — the sea as both moral chaos and impersonal historical force beyond any individual's control [2].\n\n### 4.3 The spectral and phantasmagoric\n\nCarlyle repeatedly dissolves the solid world into **spectres, phantasms, and phantasmagory** — the unreal made of the over-real. The court of the dying Louis XV is \"a hollow phantasmagory, where like mimes they mope and mowl, and utter false sounds for hire\" [1]. From the Bastille's heights Thuriot is made to behold \"what other Phantasmagories, and loud-gibbering Spectral Realities\" are to come [1]. The oxymoron \"Spectral Realities\" is the engine: the Revolution is a haunting that is nonetheless the only real thing, the truth breaking through the masks. (The 2023 Strachan-edited Oxford scholarly edition, reviewed by Mark Philp under the apt title \"Haunting the Revolution,\" confirms the centrality of this register to current readings, though Philp's own spectral language is applied to the editorial apparatus rather than the text [12].)\n\n### 4.4 Masks, clothes, and Sansculottism as a force of nature\n\nThe *Sartor Resartus* clothes-philosophy persists: society is a costume, and the Revolution is the tearing-off of masks to reveal the \"buckram\" beneath. At the eruption of Sansculottism the courtly \"buckram masks start together, terror-struck,\" and the narrator warns \"Let whosoever is but buckram and a phantasm look to it\" [1]. Above all, **Sansculottism is personified as an elemental force of nature** — many-headed, fire-breathing, rising from the earth like a Titan:\n\n> \"on a sudden, the Earth yawns asunder, and amid Tartarean smoke, and glare of fierce brightness, rises SANSCULOTTISM, many-headed, fire-breathing, and asks: What think ye of me?\" [1]\n\nThroughout the third volume Sansculottism acts, sprawls, dies, and is buried as a single mythic agent (\"Sansculottism, once more flung resupine, lies sprawling; sprawling its last\"; \"So dies Sansculottism, the body of Sansculottism, or is changed\") [1]. Vanden Bossche reads such personifications, alongside the mock-epic deflations (\"Mars de Broglie,\" \"Mercury… de Brézé\"), as the symbolic machinery by which Carlyle represents a nation's \"unbelief\" [8].\n\n> **Claim 3.4 — standard.** The work is organized by a small set of recurring image-systems that carry its meaning symbolically — fire/conflagration/phoenix (destruction-as-rebirth, the \"World-Phoenix\"), sea/tide/maelstrom (the crowd and historical force), the spectral/phantasmagoric (the \"Spectral Realities\" that unmask the Sham), and masks/clothes plus the personification of \"Sansculottism\" as a Titanic force of nature — a reading developed by Vanden Bossche (\"symbolic history\"), Holloway (\"elemental\" imagery), and Landow (the \"shipwreck paradigm\").\n\n---\n\n## 5. Prose-Epic / Prose-Poem: The Genre Boundary and the Double Verdict\n\n### Carlyle's own ambition\n\nCarlyle did not conceive himself as writing a conventional history in the line of Gibbon. He aimed, in his own phrase, at \"an Epic Poem of the Revolution,\" borrowing \"tone and grandeur from Homer, Virgil, and Milton\" and the novelist's tools of \"shifting point of view, imagery, and telling details\" [5][9]. He flags the epic register self-consciously and even self-deprecatingly — at the Bastille, \"To describe this Siege of the Bastille (thought to be one of the most important in history) perhaps transcends the talent of mortals,\" and the combatants are likened to \"the war of Pygmies and Cranes\" [1]; the fall of Robespierre is staged as \"our fifth-act, of this natural Greek Drama, with its natural unities\" [1]. Allison places this ambition in literary history: the book is \"perhaps the last significant attempt before the high modernists to develop a narrative alternative to the novel,\" conceived as \"an Epic Poem of the Revolution\" that rejects novelistic convention [7]. George Levine's *The Boundaries of Fiction* (1968) groups Carlyle with Macaulay and Newman precisely as a writer working the contested frontier between imaginative literature and factual prose — the book's whole frame is that Victorian historical and religious prose deliberately blurs the line fiction and history were supposed to keep [13].\n\n### The double verdict — then and now\n\nThe genre-straining is the book's power and the ground of the charge against it, and the two verdicts arrived together in 1837. Mill's review fused them in the formula that has organized all later judgment: the book is \"not so much a history as an epic poem; and notwithstanding this, or even in consequence of this, the truest of histories\" [4][5]. Mill's claim is radical: poetic form is not a *concession against* truth but, for this subject, the *condition of* truth — only the epic-present-tense rendering can convey what the Revolution actually was as lived experience. Thackeray's \"prose run mad,\" delivered in an otherwise favorable review, is the same observation read as a debit: the very intensity that makes it live makes it suspect as sober history [4][9].\n\nThat double verdict is permanent. The present-tense camera-eye and the prophetic voice are exactly what make the set-pieces unforgettable — and exactly what later positivist and professional historians distrust as the importation of the novelist's license into the historian's domain. Rosenberg's *Carlyle and the Burden of History* (1985) is the fullest modern defense of taking the literary form seriously as historiography: Rosenberg reads the book as understanding history at once \"as poetry, prophecy, biography, and social criticism,\" and devotes chapters to \"The Grand Poem of Our Time: The French Revolution\" and to Carlyle's \"Narrative Voices,\" treating the poetic technique as a mode of historical knowing rather than a decorative liability [2 (search-summary)]. The modern revival of literary narrative history — Simon Schama's *Citizens* (1989) is the obvious heir — is a vindication of Mill's side of the ledger; the persistence of the \"unreliable as science\" charge is the survival of Thackeray's.\n\n> **Claim 3.5 — load-bearing.** *The French Revolution* was deliberately conceived as a prose-epic (\"an Epic Poem of the Revolution\") that strains the boundary between history and literature, and the same features that make it literature (present-tense immediacy, montage, prophetic voice, symbolic imagery) are simultaneously its greatest power and the ground of the standing charge that it is unreliable as science — a double verdict fixed at first reception in Mill's \"epic poem… and… the truest of histories\" versus Thackeray's \"prose run mad,\" and still live in the modern contrast between literary-narrative history (Schama) and positivist historiography.\n\n---\n\n## Open Questions\n\n1. **How much is the \"cinematic\"/Eisenstein reading anachronistic projection vs. genuine structural homology?** The montage analogy is now near-ubiquitous in criticism (Talbot, Allison, NEH), but it is a 20th–21st-century optic applied to an 1837 text. A rigorous narratological account of Carlyle's actual cutting devices (deixis, tense-switching, focalization shifts) — independent of the film metaphor — would test whether the resemblance is structural or merely evocative.\n2. **What exactly does Rosenberg argue about narrative voice and the present tense?** *Carlyle and the Burden of History* is the key modern defense, but I worked from search-engine summaries and the table-of-contents (\"The Grand Poem of Our Time,\" \"Narrative Voices\"), not the chapters themselves; the precise argument and its supporting close readings remain to be consulted directly.\n3. **How does Levine's *Boundaries of Fiction* specifically characterize Carlyle's frontier-crossing** as against Macaulay's and Newman's? The framing is clear from secondary description, but Levine's particular claims about *The French Revolution*'s techniques were not read in the original.\n4. **Provenance of the Tennyson \"not until Joyce\" judgment** and the broader modernist-genealogy claim for Carlylese: the quotation is well-attested in summary but should be located in *\"Sartor\" Called \"Resartus\"* (1965) with page reference, and the *Sartor*→*French Revolution* stylistic continuity mapped passage-to-passage.\n5. **The reception history of the *style specifically*** (as distinct from the book's overall fame) — how the verdict on Carlylese moved from 1837 enthusiasm/alarm, through late-Victorian canonization, to 20th-century embarrassment, to the recent (2023 Oxford edition) scholarly recuperation — belongs to the reception workstream but intersects this one.\n\n---\n\n## Sources\n\n**Tier 1 — The text itself (quoted directly)**\n1. Thomas Carlyle, *The French Revolution: A History* (1837), Project Gutenberg ebook #1301, HTML edition, https://www.gutenberg.org/files/1301/1301-h/1301-h.htm (accessed 2026-06-08). All bracketed [1
