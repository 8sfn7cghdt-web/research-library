orth... from their subterranean imprisonment\"; \"dim Phantasmagory of the Pit\"; \"Lapland witch-midnight\"; precedents \"Bartholomew Butchery,\" \"Sicilian Vespers.\"\n\n10. Carlyle, *The French Revolution*, Vol. 3, Book 4 (\"Terror\" / Marie-Antoinette's trial), via Wikisource (Works, Vol. 4) and corroborating quotation. https://en.wikisource.org/wiki/The_Works_of_Thomas_Carlyle/Volume_4/The_French_Revolution,_Volume_3/Book_4 — accessed 2026-06-08. **Tier 1.** \"like the pale kingdoms of Dis! Plutonic Judges, Plutonic Tinville; encircled, nine times, with Styx and Lethe, with Fire-Phlegethon and Cocytus named of Lamentation!\"\n\n11. Charles Frederick Harrold, *Carlyle and German Thought, 1819–1834* (Yale UP / Oxford UP, 1934), via Google Books and PhilPapers records. https://books.google.com/books/about/Carlyle_and_German_Thought.html?id=gcUrAAAAYAAJ — accessed 2026-06-08. **Tier 2.** Standard study of Carlyle's German formation; Goethe translations (*Wilhelm Meister* 1824, *German Romance* 1827); absorption/distortion of German thought.\n\n12. \"Philosophy of Thomas Carlyle,\" and Vanden Bossche (VictorianWeb), on the \"burning of a World-Phoenix\" and *palingenesia*. https://victorianweb.org/authors/carlyle/vandenbossche/3e.html — accessed 2026-06-08. **Tier 2** for the scholarly framing; the Phoenix/*palingenesia* figure itself is **Tier 1** Carlyle (from *Sartor* carried into the *History*).\n\n13. G. B. Tennyson, *Sartor Called Resartus* (Princeton UP, 1965), via secondary citation; Tennyson's judgment that Carlyle's prose inventiveness is unequaled \"not until [James] Joyce.\" **Tier 2** (cited via search synthesis; not read in original — see gap-fill).\n\n14. \"The French Revolution Now; or, Carlyle's Eternal Return,\" *Victorian Literature and Culture* 50.1 (Spring 2022), Cambridge Core. https://www.cambridge.org/core/journals/victorian-literature-and-culture/article/french-revolution-now-or-carlyles-eternal-return/67D7210ABFCEB99A421E068384CC7F42 — accessed 2026-06-08. **Tier 2** (peer-reviewed). \"Synecdochal personification\"; collective forces (\"Royalism,\" \"Hunger,\" \"Rumour\") as narrative agents; \"inverted utopianism — an apocalyptic manifestation of a utopian longing for heaven on earth.\"\n\n> **Sourcing note.** Tier-1 primary passages are quoted from the public-domain text (Gutenberg / Wikisource editions of the standard Works). Where a quotation was retrieved through a reader-model fetch rather than my own line-by-line reading of the full chapter, I have flagged the affected claim (notably the Mirabeau passages in Open Question 1). No quotation here is invented; every quoted phrase is attributed to a specific volume/book of the text. Scholarly attributions (Cumming, Rosenberg, Harrold, Vanden Bossche, the 2022 Cambridge essay) are drawn from publisher/journal descriptions and review notices; several monographs were not read cover-to-cover and are listed as gap-fill seeds below."}, {"order": 5, "file": "05_Argument_And_Themes.md", "title": "Carlyle's Argument and the Theory of Revolution", "summary": "", "body": "# Carlyle's Argument and the Theory of Revolution\n\n## Bottom Line\n\n*The French Revolution: A History* (1837) is not, despite its title and its three-volume bulk, primarily a chronicle. It is a work of argument disguised as narration — a prophetic theory of what revolution *is*, dramatized through the events of 1774–1795. The argument has a single hinge: **revolution is the violent return of Reality after an age of Shams.** When belief, sincerity, and just authority have rotted out of a society — when its kings, priests, and constitutions have become hollow \"formulas\" and \"Paper\" with no living fact behind them — the suppressed truth erupts as elemental force. Carlyle calls this eruption **Sansculottism**, and reads it as the \"Death-Birth of a World\": simultaneously a judgment, a destruction, and a (terrible, unwilled) act of renewal. The Revolution is the working-out of \"the Eternal\" — an inevitable and, in Carlyle's eschatological grammar, even righteous verdict on aristocratic and clerical \"Imposture,\" however horrific its means. Around this core run six secondary arguments: a providential-necessitarian theology of history; the master-opposition of Sham vs. Reality; an embryonic \"great-man\" reading in which the Revolution is a *failed search for a true ruler* (Mirabeau the one possible pilot, Danton the natural force, Napoleon the \"whiff of grapeshot\" that ends it); an ambivalent, half-fascinated, half-appalled treatment of the crowd and the Terror that pointedly *refuses simply to condemn*; and a scorching anti-philosophe polemic against Voltaire, the \"Evangel of Jean-Jacques,\" and abstract \"Logic.\" What the book conspicuously does *not* offer is economic, social-structural, or ideological-causal analysis. Two tensions run through it and have driven the scholarship for 150 years: the unresolved quarrel between **determinism** (the Revolution as inevitable necessity) and **heroism** (the Revolution as remediable by a great man); and the dangerous proximity of Carlyle's doctrine of *righteous, regenerative violence* to later authoritarian and proto-fascist readings — a charge that is **genuinely contested**, with most current literary scholarship reading the 1837 book as radical-progressive rather than proto-fascist while conceding the later Carlyle supplies the darker material.\n\n---\n\n## 1. The Theory of Revolution: Reality Erupting Through Sham\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 472\" role=\"img\" aria-label=\"A vertical conflagration. At the base a dark band reads THE INFINITE DEEP, the suppressed Reality bursting up. A column of flame rises through the centre, consuming a ghosted hollow crown labelled SHAM. From the apex of the flame two rays split — a blue ray of heaven to the left, an ember ray of hellfire to the right — and a phoenix rises above, labelled PALINGENESIA, the New-Birth. Flanking labels read DEATH, the backward-looking judgment on an age of Shams, and BIRTH, the forward-looking renewal.\">\n<text x=\"350\" y=\"28\" text-anchor=\"middle\" font-size=\"15\" class=\"t-serif\" letter-spacing=\"3\">THE DEATH-BIRTH OF A WORLD<\/text>\n<text x=\"350\" y=\"46\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">Sansculottism as conflagration &#8212; Carlyle&#8217;s theory of revolution, 1837<\/text>\n<polygon points=\"352,150 210,256 244,262 352,168\" class=\"f-t4\" opacity=\".22\"/>\n<polygon points=\"352,150 494,256 460,262 352,168\" class=\"f-t1\" opacity=\".22\"/>\n<path d=\"M352,128 C 320,120 294,102 268,74 C 300,98 326,104 350,120 Z\" class=\"f-t3\"/>\n<path d=\"M352,128 C 384,120 410,102 436,74 C 404,98 378,104 354,120 Z\" class=\"f-t3\"/>\n<ellipse cx=\"352\" cy=\"132\" rx=\"9\" ry=\"17\" class=\"f-t2\"/>\n<circle cx=\"352\" cy=\"108\" r=\"6\" class=\"f-t2\"/>\n<polygon points=\"346,100 352,86 358,100\" class=\"f-t2\"/>\n<text x=\"352\" y=\"66\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\" class=\"t-acc\">PALINGENESIA<\/text>\n<text x=\"352\" y=\"78\" text-anchor=\"middle\" font-size=\"8.8\" class=\"t-muted\">the New-Birth<\/text>\n<polygon points=\"252,400 282,330 262,298 304,246 286,220 332,196 318,166 352,150 386,166 372,220 414,246 396,298 422,330 452,400\" class=\"f-t1\"/>\n<polygon points=\"284,400 306,344 292,312 324,276 312,250 346,222 340,200 352,182 364,200 358,250 390,278 378,312 394,344 416,400\" class=\"f-t2\"/>\n<polygon points=\"316,400 332,350 322,318 348,272 352,236 360,274 380,320 368,352 384,400\" class=\"f-t3\"/>\n<path d=\"M320,338 L325,306 L337,323 L348,300 L352,318 L361,298 L371,321 L383,304 L386,338\" fill=\"none\" class=\"ln\" stroke-width=\"1.4\" opacity=\".6\" style=\"stroke:var(--bg)\"/>\n<line x1=\"320\" y1=\"338\" x2=\"386\" y2=\"338\" class=\"ln\" stroke-width=\"1.4\" opacity=\".6\" style=\"stroke:var(--bg)\"/>\n<text x=\"352\" y=\"362\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\" class=\"t-inv\" letter-spacing=\"1\">SHAM<\/text>\n<text x=\"352\" y=\"374\" text-anchor=\"middle\" font-size=\"8\" class=\"t-inv\" opacity=\".85\">crown &#183; Paper &#183; Formula<\/text>\n<text x=\"232\" y=\"234\" text-anchor=\"middle\" font-size=\"9\" class=\"t-muted\" font-style=\"italic\">heaven on one side&#8230;<\/text>\n<text x=\"470\" y=\"234\" text-anchor=\"middle\" font-size=\"9\" class=\"t-acc\" font-style=\"italic\">&#8230;hellfire on the other<\/text>\n<text x=\"86\" y=\"250\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"bold\" class=\"t-serif\">DEATH<\/text>\n<text x=\"86\" y=\"266\" text-anchor=\"middle\" font-size=\"8.6\" class=\"t-muted\">judgment on<\/text>\n<text x=\"86\" y=\"277\" text-anchor=\"middle\" font-size=\"8.6\" class=\"t-muted\">an age of Shams<\/text>\n<text x=\"86\" y=\"291\" text-anchor=\"middle\" font-size=\"9\" class=\"t-acc\">&#10229; backward<\/text>\n<text x=\"618\" y=\"250\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"bold\" class=\"t-serif\">BIRTH<\/text>\n<text x=\"618\" y=\"266\" text-anchor=\"middle\" font-size=\"8.6\" class=\"t-muted\">destruction clears<\/text>\n<text x=\"618\" y=\"277\" text-anchor=\"middle\" font-size=\"8.6\" class=\"t-muted\">the ground<\/text>\n<text x=\"618\" y=\"291\" text-anchor=\"middle\" font-size=\"9\" class=\"t-acc\">forward &#10230;<\/text>\n<rect x=\"150\" y=\"404\" width=\"400\" height=\"30\" rx=\"2\" style=\"fill:var(--t4)\" opacity=\".92\"/>\n<text x=\"350\" y=\"423\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" class=\"t-inv\" letter-spacing=\"1\">THE INFINITE DEEP &#8212; Reality bursts up, uncontrollable<\/text>\n<text x=\"350\" y=\"458\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\" font-style=\"italic\">One fire, two valences &#8212; judgment <tspan class=\"t-acc\">and<\/tspan> birth at once &#8212; which is why radicals, Engels, and later authoritarians could each claim it.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 1.<\/strong> Carlyle&#8217;s Revolution is not a chronicle but a conflagration: when a regime hollowed to <em>Sham<\/em> can no longer hold, the suppressed Reality bursts up from &#8220;the infinite Deep&#8221; and burns the old world to clear the new. The fire faces two ways at once &#8212; a backward judgment on imposture and a forward &#8220;Palingenesia&#8221; &#8212; and that doubled valence (&#8220;rays as of heaven on one side; girt&#8230;as with hellfire&#8221;) is exactly what makes the book ethically combustible.<\/figcaption>\n<\/figure>\n\n\n### Claim 1.1 — Revolution is the violent return of Reality after an age of Shams\n\n**Statement.** Carlyle's central theoretical claim is that revolution occurs when a society's governing forms — its monarchy, its church, its laws, its social authority — have ceased to correspond to any living reality, becoming mere \"Shams,\" and the suppressed Reality erupts as uncontrollable elemental force. The Revolution is therefore not an aberration imposed *on* a healthy society but the *consequence* of a society already inwardly dead.\n\n**Type:** established (this is the consensus reading of the book's thesis).\n\nThe opposition of **Sham** and **Reality** is the organizing axis of everything Carlyle wrote, but in *The French Revolution* it becomes a theory of historical causation. The *ancien régime* is depicted as a structure of outlived forms: a monarchy that no longer commands real belief, a nobility that performs privilege without function, a Church gone formal. Carlyle's own briefing of the thesis (echoed across the existing Carlyle corpus and the primary text) is that \"an *ancien régime* hollowed out by Sham could not survive the moment of crisis, and that the violence of the Revolution was the externalized form of the inner rot the regime had failed to address\" [11]. The Revolution does not *create* the chaos; it *reveals* a chaos already latent. As Carlyle puts it, \"Anarchy breaks prison; bursts up from the infinite Deep, and rages uncontrollable, immeasurable, enveloping a world; in phasis after phasis of fever-frenzy\" [3]. The image is geological and oceanic: a suppressed force breaking through a crust.\n\nThe mature scholarly statement of this is Albert J. LaValley's *Carlyle and the Idea of the Modern* (1968), which reads Carlyle's sensibility as \"profoundly eschatological,\" informed by \"the biblical desire to force the judgment day\" and the urge to bring society into congruence with the \"eternal Laws\" of the universe [5]. Chris Vanden Bossche, in *Carlyle and the Search for Authority* (1991), frames the same thesis as a crisis of *authority*: the constitutional monarchy \"institutionalizes conflict without generating genuine belief,\" so that \"paper documents cannot sustain authority when power fragments\" [4]. The Revolution is what happens when the gap between form and fact becomes total.\n\n### Claim 1.2 — Sansculottism is the \"Death-Birth of a World\"\n\n**Statement.** Carlyle names the revolutionary force \"Sansculottism\" and reads it not as a political faction but as a cosmic, quasi-natural phenomenon — the simultaneous death of one world and birth of another, figured through fire, phoenix, and apocalypse.\n\n**Type:** established.\n\nThis is the book's most distinctive conceptual move and the one that most separates it from Whig and Thiers-style political history. Sansculottism is treated as an elemental power, \"the Death-Birth of a World\" — in Carlyle's own phrase a \"cloudy 'death-birth of a world': huge smoke-cloud, streaked with rays as of heaven on one side; girt on the other as with hellfire!\" [2][3]. The phrasing is deliberately double: heaven on one side, hellfire on the other; destruction and renewal as a single event. The governing metaphor is the **Phoenix** — Carlyle imaged \"the burning of a World-Phoenix\" to represent the cyclical death and \"Palingenesia, or New-birth\" of civilizations, a figure he had already developed in *Sartor Resartus* (1833–34) and now applies to 1789–95 [6][7]. Vanden Bossche notes that Sansculottism is presented as a *living, continuing* force — Carlyle writes that it \"still lives\" and \"still works far and wide,\" so that the Paris revolt of 1830 and the Reform agitation of 1832 are read as its ongoing rebirth [4]. The Revolution, on this view, is not an event safely sealed in the past but a permanent possibility — \"Carlyle's Eternal Return,\" in the phrase of Mark Allison's 2022 reframing [1].\n\nA crucial and counter-intuitive consequence, drawn out by Allison: for Carlyle revolution is not a unique aberration but the *intensification of a universal condition*. \"All things are in revolution; in change from moment to moment,\" Carlyle holds; revolutionary periods merely *accelerate* a process inherent to existence [1]. The Terror, in this reading, is the limit-case of a desperation that \"pushed far enough, completes the circle ... becomes a kind of genuine productive hope again\" — an *inverted utopianism* in which annihilation clears the ground for a future, perfected form [1].\n\n---\n\n## 2. Providence, Necessity, and Divine Justice\n\n### Claim 2.1 — The Revolution is the working-out of \"the Eternal\" — an inevitable and righteous judgment\n\n**Statement.** Carlyle reads the Revolution as providential history: the inevitable working-out of \"the Eternal,\" a divine verdict on aristocratic and clerical \"Imposture,\" righteous in its cause however terrible in its means.\n\n**Type:** established (the theological framing); the *normative* reading (that Carlyle endorses the verdict) is **contested** in its emphasis.\n\nCarlyle's history is providential in the Reformed (Scottish Calvinist) mode: events bear moral weight, \"nothing merely happens,\" and the visible chaos is \"the working-out of an invisible verdict\" [11]. He believed, in the standard summary, that \"the excesses of the French Revolution were a divine judgment upon a selfish monarchy and nobility\" [5][12]. The aristocracy and clergy are guilty of *Imposture* — of claiming an authority they no longer embody — and the Revolution is the cosmos collecting the debt. This is why Carlyle, despite his horror at the Terror, sided unambiguously with the early Revolution against the old order: he \"saw the events of 1789–91 as the true revolution, believing the monarchy and aristocracy were filled with incompetence and corruption and got what they deserved\" [a]. Hedva Ben-Israel's *English Historians on the French Revolution* (Cambridge, 1968) places Carlyle within an English \"school\" that shared aims, methods, and a political point of view, but identifies Carlyle's distinctive contribution as the *moral-providential* framing absent from the more juristic Croker or the Whiggish Smyth [8].\n\n### Claim 2.2 — Carlyle holds a necessitarian view of the Revolution but rejects mechanical determinism\n\n**Statement.** Carlyle treats the Revolution as inevitable (\"necessity\"), yet pointedly rejects the inexorable-forces determinism of Thiers in favor of a view that preserves individual moral responsibility and the possibility of heroic agency.\n\n**Type:** established; **load-bearing** for the determinism-vs-heroism tension.\n\nThis is the single most important conceptual tension in the book, and it is genuinely unresolved in the text. On one hand, the providential frame makes the Revolution *necessary* — a verdict that *had* to fall. On the other, Carlyle \"rejected Thiers' deterministic view of history which emphasised inexorable historical forces over individual moral responsibility\" [9][5]. LaValley's formulation is that Carlyle's necessity is *eschatological*, not mechanical: it is \"the biblical desire to force the judgment day,\" a moral inevitability rather than a physical one [5]. The difference matters enormously for the rest of the argument: if the Revolution is morally (not mechanically) necessary, then a sufficiently great man — a Mirabeau — might in principle have *guided* the verdict to a less catastrophic execution. The determinism opens the door; heroism is what might have walked through it. The two readings sit unreconciled in the book, and the scholarship has argued the balance ever since (see §4, §8).\n\n---\n\n## 3. Sham vs. Reality and the Critique of the Ancien Régime\n\n### Claim 3.1 — \"Paper\" (assignats, constitutions, formulas) is the central symbol of Sham against living fact\n\n**Statement.** Carlyle organizes his critique of the old order — and of the Revolution's own failures — around the opposition of \"Paper\" (constitutions, formulas, assignats, the products of \"Logic\") to living fact, treating the proliferation of paper as the symptom of a society that has lost contact with reality.\n\n**Type:** established.\n\nThe Sham/Reality axis becomes concrete in Carlyle's recurrent contempt for \"Paper\" and \"Formula.\" Constitutions are paper; the assignat currency is paper; the philosophes' systems are formula. All share the vice of substituting a written abstraction for a lived reality. Vanden Bossche's reading is that the constitutional monarchy fails precisely because \"paper documents cannot sustain authority when power fragments\" — the *berline* in which the royal family flees to Varennes is read as a symbol of \"monarchy's encrusted privilege,\" a heavy, ornamented, real object that nonetheless cannot move [4]. Carlyle's symbolic method (the Bastille = breaking old structures; the berline = encrusted privilege) is itself an argument *against* paper: meaning lives in things and events, not in formulas about them [4]. The deep irony Carlyle presses is that the Revolution, having destroyed the old Shams, immediately manufactures new ones — new constitutions, new formulas, new paper — which is why the narrative cannot resolve into triumphant epic but keeps deflating into \"mock-heroic\" irony [4].\n\n---\n\n## 4. Heroes and Their Absence: The Embryonic \"Great-Man\" Reading\n\n### Claim 4.1 — Carlyle reads the Revolution as in part a failed search for a true ruler\n\n**Statement.** *The French Revolution* contains the seed of the \"great-man\" doctrine Carlyle would systematize in *On Heroes* (1841): the Revolution is read as in part a failed search for a genuine pilot, with Mirabeau presented as the one man who might have steered it, Danton as the natural revolutionary force, and Napoleon as the figure who finally closes it.\n\n**Type:** established; the \"embryonic *On Heroes*\" linkage is **load-bearing** for the corpus.\n\nCarlyle himself \"declared that Mirabeau, Danton and Napoleon were the three great men of the Revolution\" [9]. The structure is a search-and-failure: a great society in convulsion repeatedly throws up men who *might* have governed the storm, and repeatedly loses or corrupts them.\n\n- **Mirabeau as the one possible pilot.** Carlyle's elegy on Mirabeau's death (April 1791) is the clearest statement: \"The chosen Last of the Mirabeaus is gone; the chosen man of France is gone. It was he who shook old France from its basis; and, as if with his single hand, has held it toppling there, still unfallen\" [10]. The \"single hand\" holding France \"toppling there, still unfallen\" is the great-man thesis in miniature: one real man can, for a time, hold a collapsing order upright; his death removes the one possible pilot. (Danton is in turn called \"our only Mirabeau now ... whom some call 'Mirabeau of the Sansculottes'\" [b].)\n- **Danton as natural force.** Danton is treated less as a statesman than as a Titan, an elemental energy — the revolutionary equivalent of Sansculottism made flesh, magnificent and doomed.\n- **Napoleon as the \"whiff of grapeshot\" closer.** The Revolution ends, in Carlyle's telling, when Bonaparte fires on the Vendémiaire insurrection (13 Vendémiaire / 5 October 1795) and \"the thing we specifically call French Revolution is blown into space by it\" [c][13]. The phrase \"a whiff of grapeshot\" is Carlyle's coinage, often misattributed to Napoleon himself [c][13]. The book ends not with the Terror but with this act of decisive force — a man imposing order on chaos, prefiguring *On Heroes*' \"Hero as King.\"\n\n### Claim 4.2 — The hero-reading in 1837 is embryonic and partly ironic, not yet the doctrine of *On Heroes*\n\n**Statement.** The great-man material in *The French Revolution* is genuinely present but should not be read back as the full hero-worship doctrine of 1841; in 1837 it is embryonic, hedged with irony, and embedded in a narrative whose dominant force is the *impersonal* one of Sansculottism, not the heroic individual.\n\n**Type:** contested (this is the crux of the determinism-vs-heroism dispute).\n\nHere the scholarship divides. The \"great-man\" reading that became canonical after *On Heroes* and Spencer's hostile coinage of \"great man theory\" (1873) tends to retroject onto the 1837 book a hero-centrism it only partly has. Mark Allison's 2022 reading pushes hard the other way: he argues *The French Revolution* is \"a thoroughgoingly radical work\" whose true subject is **Sansculottism** — the plebeian, collective, impersonal force — *not* great men, and that reading it as proto-*Heroes* misses its argument [1]. Philip Rosenberg's *The Seventh Hero: Thomas Carlyle and the Theory of Radical Activism* (Harvard, 1974) had earlier opened \"the radical dimension of Carlyle's works\" — recovering a Carlyle of *activism* and agency rather than passive hero-worship [d][14] — though reviewers (notably Gertrude Himmelfarb in *Commentary*) complained that Rosenberg could not give the \"activist doctrine\" specific content because Carlyle himself never did [14]. The honest position: the hero-frame is *present in seed* (the Mirabeau elegy, the grapeshot ending), but in 1837 it is checked by, and subordinate to, the impersonal theory of Sansculottism. The unresolved coexistence of the two is the book's central philosophical tension, not a settled doctrine.\n\n---\n\n## 5. The Crowd and Violence: The Refusal Simply to Condemn\n\n### Claim 5.1 — Carlyle is ambivalently fascinated by the mob as natural force and refuses simply to condemn the Terror\n\n**Statement.** Carlyle treats the revolutionary crowd as a force of nature — terrifying, sublime, and in some sense *just* — and pointedly declines the standard conservative move of simple moral condemnation of the Terror, while still recoiling from its specific horrors (and from Robespierre).\n\n**Type:** established; the *interpretation* of what his ambivalence implies is **contested**.\n\nCarlyle's crowd is not the contemptible rabble of conservative historiography nor the rational citizenry of the radical tradition; it is an elemental power, sublime and dreadful. He \"despised the radical phase and particularly Robespierre, who presided over the Reign of Terror with ruthlessness\" [a] — yet he does *not* simply condemn the Terror as such, because within his providential frame the violence is the externalized verdict on prior Imposture. Gareth Stedman Jones, in \"The Redemptive Power of Violence? Carlyle, Marx and Dickens\" (*History Workshop Journal*, 2008), reads this as Carlyle's most consequential and most dangerous move: Carlyle \"treats violence not merely as regrettable but as somewhat inevitable and even energizing to historical change — an 'irrationalist approach' drawing partly from German proto-romanticism and French theocratic thought\" [e]. Stedman Jones argues this framework, *linking revolutionary violence to loss of faith and to Sansculottism*, directly influenced the young Engels (1844–45) [e]. The contrast case is Dickens, who — though he revered Carlyle and leaned on the *French Revolution* for *A Tale of Two Cities* — *rejected* the Carlylean frame, attributing the violence to \"the previous injustice done to the French people by the Ancien Regime\" rather than to civilizational/spiritual collapse [a][e].\n\n### Claim 5.2 — Carlyle's violence is \"regenerative,\" which is what makes it ethically combustible\n\n**Statement.** Because Carlyle reads revolutionary violence as part of a death-birth — destruction that clears the ground for renewal — his treatment edges toward a doctrine of *regenerative* or *redemptive* violence, and it is this, more than any explicit politics, that later authoritarian and revolutionary readers could appropriate.\n\n**Type:** contested.\n\nThe phoenix logic (§1.2) implies that the fire is not merely destructive but *purgative* — that the burning is the price and mechanism of new birth. Stedman Jones's framing question — \"the redemptive power of violence?\" — is posed precisely because Carlyle's text invites it without quite asserting it [e]. Allison concedes Carlyle's later \"descent into authoritarianism\" but insists the 1837 *French Revolution* \"remains genuinely progressive — offering warnings rather than blueprints for fascism\" [1]. The text supports both readings: the violence is judgment (backward-looking, moral) *and* birth-pang (forward-looking, generative), and which valence dominates is exactly what readers from Engels to twentieth-century authoritarians to present-day critics have contested.\n\n---\n\n## 6. Anti-Philosophe / Anti-Enlightenment\n\n### Claim 6.1 — Carlyle blames the philosophes and scorns abstract \"Logic,\" treating Rousseau's \"Evangel\" as merely a new Formula\n\n**Statement.** Carlyle reads the intellectual cause of the Revolution as the corrosive skepticism of the Enlightenment philosophes — Voltaire above all, and the \"Evangel of Jean-Jacques\" (Rousseau) — and treats their abstract Reason and \"Logic\" not as liberation but as the dissolving acid that finished off belief, leaving only Formula where living faith had been.\n\n**Type:** established.\n\nCarlyle's anti-Enlightenment polemic is structural to the book's theory: the philosophes are the agents who completed the hollowing-out of belief that made the *ancien régime* a Sham. He \"blames the French Revolution and whatever came from it on the philosophes\" while also \"criticiz[ing] the sentimentality of the French philosophes\" [a]. He \"despises the political bases of pre-revolutionary radicalism, and often refers scathingly to the 'Evangel of Jean-Jacques [Rousseau]', which he sees merely as a new Formula\" — holding \"a low opinion of Rousseau's thought and amused condescension toward him\" [f]. The deep point is that Carlyle attacks the Enlightenment from a position *to the side of* both left and right: he agrees the old order deserved to fall (against the reactionaries) but holds that abstract Reason and \"Logic\" — paper, formula, system — are themselves a form of Sham incapable of building anything real (against the radicals). Voltaire's skepticism dissolves; Rousseau's sentiment substitutes one formula for another; neither touches the Reality that Carlyle thinks history actually runs on. This anti-rationalism is exactly what Stedman Jones labels Carlyle's \"irrationalist approach\" [e].\n\n---\n\n## 7. What Carlyle Does *Not* Do\n\n### Claim 7.1 — The book offers little economic, social-structural, or ideological-causal analysis\n\n**Statement.** Measured against later French Revolution historiography — especially the Marxist tradition and the *Annales* social history — Carlyle's *French Revolution* is conspicuously thin on economic causation, class structure as a causal mechanism, and ideology-as-cause; its explanatory weight rests almost entirely on the moral-spiritual axis of Sham vs. Reality.\n\n**Type:** established (as a comparative judgment).\n\nCarlyle famously insisted on \"facts, facts, no theory\" [9] — by which he meant *vivid particulars* rather than economic or sociological abstraction. He has almost nothing systematic to say about grain prices, fiscal crisis as a structural cause, the bourgeoisie as a rising class with material interests, or the Revolution as the product of contradictions in the mode of production — the questions that would define Jaurès, Mathiez, Lefebvre, and Soboul. Where Marx and the Marxist tradition would locate the engine in class and economics, Carlyle locates it in *belief* and its rot. This is not an oversight but a consequence of his theory: for Carlyle the *material* facts are surface; the real cause is the spiritual condition (Sham) of which material breakdown is merely a symptom. The cost is that the book cannot explain *why* the rot produced this revolution at this time — a gap modern social historians press hard (see workstream 07, historiographical place). The compensating insight, noted by Allison, is a *proto-Marxist* one Carlyle stumbles into: his contempt for the post-revolutionary \"Aristocracy of the Moneybag\" anticipates a critique of bourgeois plutocracy that Marx would systematize [1].\n\n---\n\n## 8. The Two Great Tensions: Determinism vs. Heroism, and the Proto-Fascism Charge\n\n### Claim 8.1 — The determinism-vs-heroism tension is intrinsic and unresolved\n\n**Statement.** The book holds two incompatible theses in suspension — the Revolution as inevitable necessity (providence/Sansculottism) and the Revolution as remediable by heroic agency (the Mirabeau counterfactual) — and never reconciles them; this is a feature of Carlyle's thought, not merely a critic's construction.\n\n**Type:** established (that the tension exists); **load-bearing**.\n\nIf the Revolution is the inevitable working-out of \"the Eternal,\" then no hero could have prevented it and the search for a pilot is futile. If a Mirabeau could have \"held it toppling there, still unfallen\" with \"his single hand,\" then the catastrophe was contingent on the absence of a great man, and necessity is not absolute. Carlyle wants both: the moral inevitability of judgment *and* the redemptive possibility of heroic guidance. LaValley locates the tension in Carlyle's *eschatological* (rather than mechanical) necessity, which leaves logical room for agency [5]; Allison resolves it the other way by making Sansculottism, not the hero, the true protagonist [1]. The unresolved tension is precisely what makes the book generative — and what makes it readable as either a tragedy of impersonal forces or a tragedy of missing leadership.\n\n### Claim 8.2 — The \"proto-fascist\" reading of Carlyle's revolution-doctrine is genuinely contested\n\n**Statement.** The charge that Carlyle's doctrine of righteous, regenerative violence and heroic order prefigures fascism is a real and recurring reading, but it is *contested*: it rests more on the later Carlyle (*On Heroes*, *Latter-Day Pamphlets*, *Frederick*) than on the 1837 *French Revolution*, and most current literary scholarship reads the 1837 book as radical-progressive, treating the proto-fascist appropriation as a misreading or a retrojection.\n\n**Type:** contested; **load-bearing**; flagged as the key contested claim of the workstream.\n\nThe proto-fascism debate is one of the oldest in Carlyle studies. Its classic statement runs through Eric Bentley's *A Century of Hero-Worship* (1944) and the post-1945 reaction against hero-worship, which read Carlyle's exaltation of the strong man, his contempt for parliaments, and his aestheticization of force as a direct lineage to twentieth-century authoritarianism. The danger is real *in the doctrine*: a theory in which violence is regenerative, in which one man's \"single hand\" can save a toppling order, and in which democratic deliberation is at best a Sham, supplies exactly the materials a fascist reading needs.\n\nBut the scholarly weight has shifted. The case *for* contestation:\n- **The 1837 book's true subject is collective, not heroic.** Allison (2022) argues *The French Revolution* is \"thoroughgoingly radical,\" organized around plebeian Sansculottism rather than great men, and \"remains genuinely progressive — offering warnings rather than blueprints for fascism\" [1].\n- **The activist Carlyle.** Philip Rosenberg's *The Seventh Hero* (1974) recovered a *radical-activist* Carlyle, suggesting the doctrine points toward engaged historical agency, not passive submission to a Führer [d][14].\n- **The theology-not-politics reading.** The broader Carlyle scholarship (Vanden Bossche, Sorensen) reads the hero-doctrine as a *post-confessional theology of how the divine appears in history* — incarnational, not political — and treats the social-Darwinist/proto-fascist reading of *On Heroes* as a misreading that ignores the explicit theological frame [g].\n\nThe case that keeps the charge alive:\n- **The doctrine of redemptive violence.** Stedman Jones (2008) shows the *French Revolution* itself supplies the framework linking violence to historical regeneration, and traces its influence forward [e].\n- **The later Carlyle.** *Latter-Day Pamphlets* (1850), the *Occasional Discourse on the Negro Question* (1849), and the Frederick-worship of the 1850s–60s do darken the substrate into explicit authoritarian polemic — so the lineage is not invented, even if the 1837 book is not yet there.\n\nThe honest synthesis: the proto-fascist reading is a *defensible interpretation of the doctrine's logical tendency and its later development*, but an *overreading of the 1837 text*, whose dominant energy is radical and whose violence is framed as judgment-on-imposture rather than glorification of the strong state. Tag: **contested** — name both sides, adopt neither's loaded vocabulary as neutral. The fairest description is that *The French Revolution* contains combustible materials that the later Carlyle, and later readers, ignited.\n\n---\n\n## Open Questions\n\n1. **How much of the \"Carlylese\" theory is an artifact of the rewrite?** Volume I was burned (Mill's servant, March 1835) and rewritten from memory. Some scholars (e.g., Rosemary Ashton) suggest the rewritten version is darker, more apocalyptic, more Hebraic than the lost original [11]. If so, the *intensity* of the providential/phoenix theory may be partly a product of compositional accident — unanswerable without the lost manuscript, but it bears on how \"intended\" the eschatological frame is.\n2. **Is Sansculottism a genuine theory of collective agency or a mystification of it?** Allison reads it as proto-Marxist collective force; a Marxist critic might read it as a *displacement* of real class analysis into spiritual abstraction. Which it is determines whether the book is a precursor to or an evasion of social history.\n3. **Does the determinism-vs-heroism tension resolve differently across the three volumes?** The hero-frame (Mirabeau, Napoleon) clusters at the elegiac and closing moments; the impersonal frame (Sansculottism) dominates the middle. Is there a discernible drift toward heroism as the narrative proceeds — a *structural* anticipation of *On Heroes*?\n4. **How much does the proto-fascism charge depend on conflating the 1837 book with the 1850s Carlyle?** The literature would benefit from a claim-by-claim test: which specific propositions in *The French Revolution* (as opposed to *Latter-Day Pamphlets*) actually license an authoritarian reading?\n5. **What is the precise debt of Engels (and through him the Marxist theory of revolutionary violence) to Carlyle's 1837 framework?** Stedman Jones asserts the influence [e]; the mechanism and extent deserve fuller tracing.\n\n---\n\n## Sources\n\n**Tier 1 — Primary texts**\n\n1. Thomas Carlyle, *The French Revolution: A History* (1837). Full text via History of Economic Thought archive, McMaster University. https://historyofeconomicthought.mcmaster.ca/carlyleT/French%20Revolution.pdf — accessed 2026-06-08. *The work itself; source for the argument's structure, the three-volume division, and chapter titles (\"The Whiff of Grapeshot,\" etc.).*\n2. Carlyle, *The French Revolution*, Vol. III (\"The Guillotine\"), via Wikisource, *The Works of Thomas Carlyle*. https://en.wikisource.org/wiki/The_Works_of_Thomas_Carlyle/Volume_4/The_French_Revolution,_Volume_3/Book_1 — accessed 2026-06-08. *\"Death-birth of a world ... rays as of heaven on one side; girt on the other as with hellfire\" — the Sansculottism-as-death-birth passage.*\n3. Carlyle, *The French Revolution* — \"Anarchy breaks prison; bursts up from the infinite Deep\" and Phoenix imagery, as quoted in primary-text and Wikisource extracts. https://en.wikisource.org/wiki/The_Works_of_Thomas_Carlyle/Volume_4/The_French_Revolution,_Volume_3/Book_5 — accessed 2026-06-08.\n10. Carlyle, *The French Revolution*, Bk. 2 Ch. III \"The Tuileries\" (Mirabeau's death). https://www.online-literature.com/thomas-carlyle/french-revolution/75/ — accessed 2026-06-08. *\"The chosen man of France is gone ... as if with his single hand, has held it toppling there, still unfallen.\"*\n13. Carlyle, *The French Revolution*, Bk. 3 Ch. VII \"Vendémiaire\" (\"A whiff of grapeshot\"). https://www.online-literature.com/thomas-carlyle/french-revolution/157/ — accessed 2026-06-08. *Napoleon's grapeshot closes the Revolution; the phrase is Carlyle's coinage.*\n\n**Tier 2 — Scholarly**\n\n1. Mark Allison, \"The French Revolution Now; or, Carlyle's Eternal Return,\" *Victorian Literature and Culture* (Cambridge Core), 16 March 2022. https://www.cambridge.org/core/journals/victorian-literature-and-culture/article/french-revolution-now-or-carlyles-eternal-return/67D7210ABFCEB99A421E068384CC7F42 — accessed 2026-06-08. *Reads the book as thoroughgoingly radical, centered on Sansculottism and inverted utopianism; \"warnings rather than blueprints for fascism\"; proto-Marxist insight into plutocracy.* [cited as 1]\n4. Chris R. Vanden Bossche, *Carlyle and the Search for Authority* (Ohio State Univ. Press, 1991), Ch. 3 \"The French Revolution as Symbolic History.\" https://victorianweb.org/authors/carlyle/vandenbossche/3e.html — accessed 2026-06-08. *Sham/Reality as crisis of authority; paper cannot sustain authority; symbolic method; mock-heroic deflation; Sansculottism \"still lives.\"* [cited as 4]\n5. Albert J. LaValley, *Carlyle and the Idea of the Modern* (Yale Univ. Press, 1968); discussion via Ralph Dumain / Autodidact Project. http://www.autodidactproject.org/other/lavalley/carlyle3b_frenchrevolution.html — accessed 2026-06-08. *Carlyle's eschatological (not mechanical) necessity; \"biblical desire to force the judgment day\"; rejection of Thiers's determinism; divine judgment on monarchy and nobility.* [cited as 5; also 9, 12]\n6. Hedva Ben-Israel, *English Historians on the French Revolution* (Cambridge Univ. Press, 1968). https://books.google.com/books/about/English_Historians_on_the_French_Revolut.html?id=nyiY-N3IsWQC — accessed 2026-06-08. *Places Carlyle in an English \"school\" with shared aims/methods/politics; devotes a major chapter to him; his distinctive moral-providential framing.* [cited as 8]\n7. Philip Rosenberg, *The Seventh Hero: Thomas Carlyle and the Theory of Radical Activism* (Harvard Univ. Press, 1974). https://www.commentary.org/articles/gertrude-himmelfarb/the-seventh-hero-thomas-carlyle-and-the-theory-of-radical-activism-by-philip-rosenberg/ — accessed 2026-06-08. *Recovers the radical-activist dimension of Carlyle; Himmelfarb's Commentary review notes the \"activist doctrine\" lacks specific content.* [cited as 14; d]\n8. Gareth Stedman Jones, \"The Redemptive Power of Violence? Carlyle, Marx and Dickens,\" *History Workshop Journal* 65, no. 1 (Spring 2008). https://academic.oup.com/hwj/article/65/1/1/640507 — accessed 2026-06-08. *Carlyle's \"irrationalist approach\" linking violence to loss of faith and Sansculottism; influence on Engels; contrast with Dickens.* [cited as e]\n9. John D. Rosenberg, *Carlyle and the Burden of History* (Harvard Univ. Press, 1985), incl. ch. \"'The Grand Poem of Our Time': The French Revolution.\" https://www.degruyterbrill.com/document/doi/10.4159/harvard.9780674422988/html — accessed 2026-06-08. *History as poetry/prophecy/biography/social-criticism; Sansculottism as a major theme. (Referenced; not read in full — see gap-fill.)*\n11. Existing corpus: *Thomas Carlyle Research Corpus*, `07_Primary_Sources.md` §2 \"*The French Revolution: A History* (1837)\" and §\"open questions,\" `/Users/calvinpokorny/code test/carlyle-research/`. *Internal synthesis: providential history in the Reformed mode; Sham/Reality; sermon-prose; the rewrite-darkening hypothesis (Ashton).* [cited as 11]\n\n**Tier 4–5 — Reference / analytical**\n\n- *The French Revolution (Carlyle)*, Encyclopaedia Britannica (expert-authored entry). https://www.britannica.com/topic/The-French-Revolution-by-Carlyle — accessed 2026-06-08. *Carlyle saw 1789–91 as the true revolution; despised Robespierre and the radical phase; divine-judgment framing.* [cited as a; corroborates 5/12]\n- \"Carlyle, Robespierre and the French Revolution,\" World Socialist Web Site, 2010 (Tier 6, partisan-left; used only for the Danton-as-\"Mirabeau of the Sansculottes\" tag, corroborated against the primary text). https://www.wsws.org/en/articles/2010/07/fren-j17.html — accessed 2026-06-08. [cited as b]\n- \"A whiff of grapeshot\" attribution and 13 Vendémiaire context, cross-checked against the primary text (source 13). [cited as c]\n- Review/commentary on Carlyle's contempt for the \"Evangel of Jean-Jacques\" / Rousseau as \"new Formula,\" toomuchberard.com review (Tier 6, individual reviewer; used only as a pointer, the claim is grounded in the primary text and LaValley). https://toomuchberard.com/2022/04/12/review-carlyle-the-french-revolution/ — accessed 2026-06-08. [cited as f]\n- On the \"theology-not-politics\" reading of the hero-doctrine and the contested proto-fascism status of *On Heroes*: existing corpus `07_Primary_Sources.md` §3 (Vanden Bossche, Sorensen, present scholarly consensus). [cited as g]"}, {"order": 6, "file": "06_Reception_And_Influence.md", "title": "Reception 1837–1900 and Influence, Especially on Dickens", "summary": "", "body": "# Reception 1837–1900 and Influence, Especially on Dickens\n\n## Bottom Line\n\nThe publication of *The French Revolution: A History* in January 1837 turned Thomas Carlyle, at forty-one, from an obscure and near-destitute man of letters into a public sage almost overnight — and the decisive instrument of that transformation was a single review. John Stuart Mill's anonymous notice in the *London and Westminster Review* (July 1837), which proclaimed the book \"not so much a history as an epic poem,\" \"made\" the work in the most literal sense, reframing its difficulty as genius and converting hostile bewilderment into reverence. Within months praise had arrived from Thackeray (who called it \"prose run mad\" *in admiration* in *The Times*), Southey (who reportedly read it six times), and an American following organized by Ralph Waldo Emerson, who arranged the US edition and secured Carlyle his first real income from the trade. By the 1840s Carlyle was \"the prophet,\" and his most consequential nineteenth-century debt is owed by Charles Dickens, whose *A Tale of Two Cities* (1859) is saturated with the *History* — its chronology, its providential vision of revolution as fire and flood, and its central images (the spilled wine read as blood, the ocean-mob, the knitting Fates). The famous claim that Dickens read the book \"500 times\" is a hyperbole Dickens himself coined and should be reported as such; what is solidly documented is that Carlyle had the London Library send Dickens \"cartloads of books\" in 1859, that Dickens named Carlyle's \"wonderful book\" in his Preface, and that Carlyle pronounced the novel \"wonderful.\" Crucially, Dickens *diverges* from Carlyle: he cannot bless revolutionary violence as a purgative providence the way Carlyle does, and recoils from the Terror into private redemption (Carton's sacrifice). The same book that built \"Carlyle the prophet\" — and shaped Ruskin and a wave of Victorian disciples — also seeded the later reaction, which crystallized only posthumously when Froude's biography (1882–84) exposed the private man.\n\n---\n\n## 1. The Immediate Reception (1837): How One Review \"Made\" the Book\n\n### 1.1 Carlyle's situation on the eve of publication\n\nBy the time *The French Revolution* appeared in three volumes in 1837 — the manuscript completed on 12 January 1837 and the book published in the spring (most accounts give May) — Carlyle had gambled and nearly lost. *Sartor Resartus* had been received with bafflement in *Fraser's Magazine*; he had moved from Craigenputtock to Chelsea and was living on dwindling capital; and the first volume of the *History* had been physically destroyed in the spring of 1835 when the manuscript Carlyle had lent to John Stuart Mill was accidentally burned by a servant in Mill's household — an episode the composition workstream covers in full. Mill, mortified, pressed £200 on Carlyle, who accepted roughly half (£100, by most accounts) and rewrote the volume from memory [1][2]. The book was therefore not merely Carlyle's bid for reputation but, in a real sense, his bid for solvency.\n\n### 1.2 Mill's review and the \"epic poem\" verdict\n\nThe decisive intervention came from the same man whose household had burned the manuscript. In an unsigned article in the *London and Westminster Review* in July 1837, Mill praised the book lavishly. The sentence that has echoed ever since — \"This is not so much a history, as an epic poem; and notwithstanding, or even in consequence of this, the truest of histories\" — recast the very qualities reviewers found alienating (the broken syntax, the prophetic apostrophe, the present-tense immediacy) as the marks of a new kind of truth. Mill went further, declaring that \"no work of greater genius, either historical or poetical, has been produced in this country for many years\" [1][3][4].\n\nThis is the load-bearing claim of the whole reception story: contemporaries and later scholars agree that Mill's review *made* the book. Carlyle himself recognized it. The openedition scholarship notes that Carlyle had described the Revolution to Mill as \"the grand poem of our times,\" and that Mill's framing of the *History* as epic both honored and amplified Carlyle's own conception [1]. The NEH feature records Carlyle's gratitude — that Mill had reviewed the work better than he had dared to hope [2].\n\nThere is a sharper political point underneath the praise, and it should not be flattened. Mill was a philosophical radical; Carlyle's book was, in important respects, *not* a radical's book — its sympathies with the Revolution were tragic and providential rather than programmatic, and its distrust of \"Formulas\" and parliamentary machinery cut against Benthamite radicalism. Recent scholarship (Global Intellectual History, 2018) frames the review as one move in a \"dialogue\" in which Mill simultaneously celebrated the book and registered that \"this is not right radicalism\" — i.e., not the kind of radicalism Mill wanted [5]. The review thus made Carlyle's name even as it marked the beginning of the political divergence that would later separate the two men. (I was unable to access the full text of the 2018 article directly; this characterization rests on the abstract and title and is flagged single-source.)\n\n### 1.3 Thackeray, Southey, and the chorus of weight\n\nMill's review did not stand alone. William Makepeace Thackeray — then a young, struggling journalist — reviewed the book favorably in *The Times*, and his much-quoted phrase \"prose run mad\" was an expression of *admiration* for its wild energy, not a dismissal; critics' objections to the German-inflected, anti-classical style were, Carlyle felt, backhanded compliments [2][4]. Robert Southey, the Poet Laureate, is repeatedly reported to have read the *History* six times (some sources say he \"read and reread it six different times\") [4]. Standard accounts add the praise of Henry Hallam and others \"of weight,\" and note that the book \"consolidated Carlyle's reputation as one of the foremost men of letters of the day\" [4]. Later admirers reaching back to the book in the same key include Henry David Thoreau, who called it \"a poem, at length got translated into prose; an *Iliad*\" — a near-echo of Mill that shows how durable the epic framing became [2].\n\n### 1.4 From poverty to the platform\n\nThe practical consequences were immediate. The *History* brought Carlyle \"not only acclaim but profits and lecture invitations\" [2]; the openedition essay puts it plainly — the book's \"resounding success\" gave Carlyle \"recognition and financial stability when he was 42\" [1]. Within a year he was lecturing in London to fashionable audiences, and the foundation was laid for the prophetic public role he would occupy for the next four decades. The rescue narrative — obscurity and near-poverty converted by one book (and one review) into sage-hood — is well attested and is the backbone of every standard biography.\n\n---\n\n## 2. The American Reception via Emerson\n\nThe book's success was transatlantic, and on the American side it was substantially organized by one man. Ralph Waldo Emerson had met Carlyle at Craigenputtock in 1833 and become his chief American advocate and, effectively, his American literary agent. Emerson \"personally arranged for the publication\" of *Sartor Resartus*, *The French Revolution: A History* (1837), and the *Critical and Miscellaneous Essays* (1838–39) in the United States [6][7].\n\nThis was not merely a matter of distribution. In the era before an Anglo-American copyright treaty, Emerson's arrangements were designed to get Carlyle actual money from American sales — the business Carlyle wryly called \"Bibliopoly\" — and the American editions gave Carlyle both a second readership and a second income stream at the moment he most needed both [6]. (The precise royalty figures Emerson secured are documented in the underlying scholarship — notably Joseph Slater's edition of the *Correspondence* — which I did not consult directly; the financial specifics are therefore flagged as not independently verified here [6].) Emerson is consistently named, alongside Ruskin, as one of Carlyle's \"two most important followers,\" and his role in seeding Carlyle's American reputation is a settled point in the literature [7][8].\n\n---\n\n## 3. Dickens and *A Tale of Two Cities* (1859): Documented Debt vs. Embroidered Legend\n\nNo nineteenth-century influence of the *History* is better known, or more encrusted with anecdote, than its shaping of Dickens's *A Tale of Two Cities*. The task here is to separate what is documented from what is repeated.\n\n### 3.1 What Dickens himself said: the Preface\n\nThe firmest evidence is Dickens's own. In the Preface to *A Tale of Two Cities* (November 1859) he wrote: \"It has been one of my hopes to add something to the popular and picturesque means of understanding that terrible time, though no one can hope to add anything to the philosophy of Mr. Carlyle's wonderful book\" [9][10]. This is Tier 1 — Dickens, in print, naming Carlyle's *History* as the indispensable authority on the Revolution and positioning his novel as a supplement to it, not a rival. The Preface also credits Wilkie Collins's drama *The Frozen Deep* as the germ of the plot; the two acknowledged influences sit side by side [10].\n\n### 3.2 The \"500 times\": legend to be reported as legend\n\nThe most-repeated single fact about the Dickens–Carlyle relationship — that Dickens read the *History* \"500 times\" — must be handled with care. It is **not** a scholarly finding about Dickens's actual habits; it is a hyperbole. The charlesdickenspage compilation states flatly that \"Dickens jokingly claimed to have read Carlyle's *The French Revolution* (1837) 500 times,\" and traces the surrounding material to Edgar Johnson's standard biography (*Charles Dickens: His Tragedy and Triumph*, 1952, p. 955) [11]. Other treatments add that Dickens \"would reportedly lug around the three-volume work with him wherever he went\" [11][12]. The \"500 times\" is therefore best reported as Dickens's own jocular exaggeration, evidence of intensity of engagement rather than a literal count — and any corpus that repeats \"500 times\" as a flat fact has lost the joke and the provenance. **Verdict: embroidered/legendary in its literal form; the underlying intensity it dramatizes is real.**\n\n### 3.3 The \"cartloads of books\": documented\n\nBy contrast, the story that Carlyle furnished Dickens with research materials is well documented. When Dickens, preparing the novel in early 1859, asked Carlyle to recommend reading on the Revolution, Carlyle arranged for the London Library to send Dickens \"two cart-loads of books\" (some sources, \"cartloads\") to Tavistock House in March 1859 [12][13]. The publisher James T. Fields recorded that Dickens found this a \"revelation,\" seeing \"how the facts had passed through the alembic of Carlyle's brain and had come out and fitted themselves, each as part of one great whole\" [13] — a remark that, whatever its exact accuracy, captures the way Dickens read the *History* as an organizing vision rather than a quarry of facts. The London Library connection is institutionally attested (Carlyle was a founder of the London Library, of which Dickens was also a member), and the \"cartloads\" anecdote is the title of Andrew Sanders's scholarly chapter \"'Cartloads of Books': Some Sources for *A Tale of Two Cities*\" [13][14]. Beyond Carlyle, Dickens's documented sources include Mercier's *Tableau de Paris*, Arthur Young's *Travels in France*, and material on the Terror and on spy-trials drawn from the *Annual Register* — so Carlyle was the master-source but not the only one [12].\n\n### 3.4 Carlyle's verdict on the novel\n\nThe relationship ran both ways. Writing to John Forster on 26 October 1859, Carlyle closed his letter, \"When you go to Dickens, our best regards. *Tale of Two Cities* is wonderful!\" Forster relayed the message, and Dickens wrote to Carlyle four days later to thank him and to send proofs [13]. The often-quoted complaint that Carlyle could only read the serialized novel \"by teaspoonfuls\" refers to the frustration of reading a story in weekly installments, not to any reluctance about Dickens's borrowing [12].\n\n### 3.5 Chronology and structure\n\nScholars agree that Dickens followed \"Carlyle closely, both in the chronology of the events of the Revolution and in his descriptions of the major historical events\" [14]. A telling shared detail of historical accuracy: both Carlyle and Dickens correctly report that only seven prisoners were found in the Bastille at its fall, against the popular myth of liberated multitudes — Dickens taking the fact, and the deflation, straight from Carlyle [14]. The novel's architecture tracks the *History*'s arc from the misery and injustice of the *ancien régime*, through the fall of the Bastille, into the descent of the Terror.\n\n### 3.6 Shared imagery: fire, flood, wine-blood, and the knitting Fates\n\nThe deepest debt is figural. Three image-systems pass from Carlyle into Dickens:\n\n- **Fire and flood / the inevitability of revolution.** Both writers render the Revolution as an elemental force. Carlyle's recurrent \"fire-deluge\" / conflagration imagery for *Sansculottism* is answered in Dickens by \"the living sea rose, wave on wave\" as the mob storms the Bastille; the Victorianweb scholarship explicitly pairs Carlyle's \"fire deluge\" with Dickens's \"living sea\" as the shared \"metaphor of fire and water\" used to suggest the Revolution's inevitability [14].\n\n- **Spilled wine read as blood.** The famous broken-wine-cask episode in Saint Antoine — peasants scrambling to drink the spilled wine, one acquiring \"a tigerish smear about the mouth,\" another scrawling \"BLOOD\" on a wall with a wine-dipped finger — is a prefiguration of the coming bloodshed in exactly Carlyle's prophetic-symbolic mode, where ordinary objects are charged with portent [15].\n\n- **Knitting and Fate.** Madame Defarge's register-knitting — the names of the condemned worked into her wool — fuses Carlyle's sense of an impersonal historical doom with the classical Moirai/Fates who spin and cut the thread of life. The \"tricoteuses,\" the women knitting impassively at the guillotine, belong to the historical iconography Carlyle had helped fix in the public imagination; Dickens turns them into a structural symbol of vengeance hardening into inevitability [15][16].\n\n### 3.7 The providential reading — and the decisive divergence on violence\n\nHere the influence becomes a quarrel. Carlyle reads the Revolution providentially: the Terror is terrible but it is also a divine fire that burns away a rotten *ancien régime* of Shams, a necessary cataclysm with a redemptive logic. Dickens absorbs the providential grammar — he too sees the Revolution as the inevitable harvest of aristocratic oppression, and warns (in Carlyle's own diagnostic spirit) that England risks the same — but he **cannot bless the violence as Carlyle does**. As one survey puts it, although Dickens \"supported people rising up against tyranny, the violence characterizing the French Revolution troubled him\" [15]; the novel \"refuses simple moral judgments,\" showing both the old order and the revolutionary Terror \"capable of great cruelty,\" and dramatizing \"how anger, once unleashed, can evolve into relentless violence\" [15].\n\nWhere Carlyle finds collective regeneration *through* the fire, Dickens displaces redemption onto the *private* and *Christian* plane: Sydney Carton's self-sacrifice, his repetition of \"I am the Resurrection and the life,\" and the novel's framing motto \"Recalled to Life,\" locate salvation in individual love and substitutionary death rather than in the political cataclysm [17]. This is the crucial interpretive point: Dickens uses Carlyle's chronology, imagery, and warning while *reversing his theodicy of violence*. The Terror, for Dickens, is not purgation but horror to be redeemed only by individual grace. Any account that calls the novel simply \"Carlylean\" without registering this reversal misreads both books.\n\n---\n\n## 4. Ruskin and the Wider Victorian Discipleship\n\nIf Emerson carried Carlyle to America, John Ruskin made himself Carlyle's English heir. Ruskin publicly acknowledged Carlyle as the author to whom he \"owed more than to any other living writer,\" habitually called him \"master,\" and after Carlyle's death described himself as \"throwing myself now into the mere fulfilment of Carlyle's work\" [8]. Standard accounts identify Emerson and Ruskin as \"Carlyle's two most important followers\" [8]. While Ruskin's debt is owed across Carlyle's whole *oeuvre* — *Past and Present* (1843) was at least as formative for Ruskin's social criticism as the *History* — scholarship holds that \"the writings of John Ruskin were saturated with imagery and ideas directly indebted to\" Carlyle, and the *History* is the foundational performance of the prophetic-symbolic method Ruskin took up [8].\n\nMore broadly, the *History* fed a generation. The book's stylistic innovations influenced Victorian novelists from the Brontës to George Eliot [2], and Carlyle's circle of admirers extended to Browning, Tennyson, and Forster [2]. Carlyle effectively founded what later critics (John Holloway, George Landow) named the genre of \"sage-writing\" or \"secular prophecy\" — the Victorian mode, drawing on Old Testament cadence, in which a writer assumes the authority of a Jeremiah or Isaiah to denounce the age — and the *History* was the early masterwork in that key. Ruskin, and after him a line running toward Matthew Arnold and beyond, worked the same vein [18].\n\n---\n\n## 5. Building \"Carlyle the Prophet\" — and the Seeds of Reaction\n\n### 5.1 The making of the sage\n\nThe *History* is the hinge on which Carlyle's public identity turned. Before it, he was the difficult author of *Sartor*; after it — and after Mill's review — he was a prophet. The prophetic prose that reviewers first resisted became, retrospectively, the credential: the very \"epic\" quality Mill had named was read as access to a higher historical truth. By the 1840s, with *Chartism* (1839), *On Heroes and Hero-Worship* (1841), and *Past and Present* (1843), the prophetic role was fully assumed; but it was the *French Revolution* that first authorized it. The standard verdict — that the book \"consolidated Carlyle's reputation as one of the foremost men of letters of the day\" and established him as an important Victorian intellectual — is uncontested [4].\n\n### 5.2 The beginnings of reaction\n\nThe reaction against Carlyle had two layers. The first was contemporary and stylistic-political: even admirers like Mill flagged that this was \"not right radicalism,\" and as Carlyle's politics hardened across the 1850s and 1860s (the *Latter-Day Pamphlets*, the Governor Eyre controversy), liberal opinion that had cheered the *History* grew alienated. The harsh, anti-democratic, hero-worshipping later Carlyle estranged readers who had loved the tragic sympathy of the 1837 book.\n\nThe second and more dramatic collapse was posthumous and personal. After Carlyle's death in 1881, his designated biographer and disciple James Anthony Froude published the *Reminiscences* (1881) and the *Life* (1882–84), with their candid treatment of Carlyle's difficult marriage to Jane Welsh Carlyle. The effect, in the words of the scholarship, was \"extraordinary\": \"almost overnight, Carlyle plunged from his position as Sage of Chelsea and Grand Old Victorian to the object of puzzled dislike, or even of revulsion\" [18][19]. Paradoxically, Froude's book also \"confirmed Carlyle's reputation as a prophet, demanding the moral regeneration of the people\" even as it humiliated the private man [18] — so the reaction was double-edged: it damaged the personal halo while preserving, even sharpening, the image of the prophet. The trajectory toward the twentieth-century discrediting of Carlyle (the association of \"hero-worship\" with later authoritarianism) begins here, in the gap Froude opened between the prophet and the man.\n\n---\n\n## Open Questions\n\n1. **The exact wording and full argument of Mill's 1837 review.** I worked from secondary quotation of the \"epic poem\" sentence and the \"no work of greater genius\" sentence; the full review in the *London and Westminster Review* (vol. 5, July 1837) should be read directly to confirm wording, to recover Mill's political reservations in his own words, and to date it precisely. Reprinted in Seigel's *Critical Heritage* and in collected editions of Mill.\n\n2. **Provenance and earliest printing of the \"500 times\" claim.** Does the \"500 times\" originate in a specific Dickens letter, in Forster's *Life of Dickens*, or only in later biography (Johnson 1952)? The Dickens *Letters* (Pilgrim edition) volumes for 1859 should be checked. Until then, \"500 times\" must be reported as Dickens's own hyperbole, not a measured fact.\n\n3. **The precise financial figures of the American editions.** What did Emerson actually remit to Carlyle for the US *French Revolution*? Slater's edition of the Carlyle–Emerson *Correspondence* has the numbers; not consulted here.\n\n4. **The full contemporary review spectrum.** Beyond Mill, Thackeray, and Southey, what did the *Quarterly*, the *Edinburgh*, and the religious/conservative press say in 1837? Seigel's *Critical Heritage* volume is the obvious one-stop source and was not read directly.\n\n5. **How much of the shared imagery is Carlyle-specific vs. common Revolution iconography.** The knitting *tricoteuses* and the storming-sea were part of a wider nineteenth-century image-bank; disentangling Dickens's direct debt to Carlyle from the general iconography requires Goldberg's *Carlyle and Dickens* (1972) and Sanders's chapter read in full.\n\n6. **Southey \"six times.\"** This is repeated across sources but I did not find the primary attestation (a Southey letter or contemporaneous record). Flagged single-source-grade until traced.\n\n---\n\n## Sources\n\n1. \"Re-presenting the French Revolution: the impact of Carlyle's work on British society and its self-representation,\" *Revue française de civilisation britannique* (openedition.org/rfcb/6118). Tier 2 (peer-reviewed). Accessed 2026-06-08. — Mill's \"epic poem\" verdict; the book's \"resounding success\" and Carlyle's financial stability at 42; Carlyle's \"grand poem of our times.\"\n2. \"The Voracious Pen of Thomas Carlyle,\" *National Endowment for the Humanities / Humanities* magazine, March/April 2009 (neh.gov). Tier 2/5 (authoritative public-humanities feature). Accessed 2026-06-08. — Mill's burned-manuscript episode and the £200/half compensation; the full \"no work of greater genius\" quotation; Thackeray's \"prose run mad\"; profits and lecture invitations; Thoreau's \"Iliad\" remark; influence on the Brontës and Eliot.\n3. *The French Revolution: A History* — Wikipedia entry (citing Mill's review and standard biography). Tier 7 as such, used only to navigate to the underlying quoted review text; the Mill quotations are corroborated by sources [1][2][4]. Accessed 2026-06-08.\n4. \"Thomas Carlyle: A Brief Biography\" and related Victorianweb/biographical material; plus standard biographical summary (re-written FR brought praise of Thackeray, Southey, Hallam; Southey read it six times; Thackeray's *Times* review; consolidation of reputation). Tier 5 (scholarly reference site). Accessed 2026-06-08.\n5. Tom Toremans / author, \"'This is not right radicalism': Thomas Carlyle's dialogue with John Stuart Mill in *The French Revolution*,\" *Global Intellectual History* 6:3 (2018/2021), Taylor & Francis. Tier 2 (peer-reviewed). Abstract/title only — full text not accessed (paywalled). Accessed 2026-06-08. — Mill's review as part of a Mill–Carlyle dialogue; \"not right radicalism.\" **Single-source for the political-reservation framing.**\n6. \"Carlyle–Emerson correspondence,\" Wikipedia, citing Joseph Slater, ed., *The Correspondence of Emerson and Carlyle* (1964). Tier 7 navigational; the underlying Slater edition is Tier 1. Accessed 2026-06-08. — Emerson \"personally arranged for the publication\" of *Sartor*, *The French Revolution* (1837), and the *Essays*; \"Bibliopoly.\" Financial specifics not independently verified.\n7. \"Thomas Carlyle\" biography (mural.uv.es/salomo and related). Tier 5. Accessed 2026-06-08. — Emerson as key American distributor; Emerson and Ruskin as Carlyle's two most important followers.\n8. Search-aggregated scholarly summary (EBSCO Research Starters; Victorianweb \"Genre of Sage-Writing\"; OUP *Past and Present*). Tier 5/2. Accessed 2026-06-08. — Ruskin \"owed more than to any other living writer\"; \"master\"; \"fulfilment of Carlyle's work\"; Ruskin's writings \"saturated with imagery and ideas directly indebted to\" Carlyle.\n9. Charles Dickens, Preface to *A Tale of Two Cities* (November 1859) — quoted verbatim via Encyclopedia.com / SparkNotes / Owl Eyes aggregation. Tier 1 (primary text, Dickens's own words). Accessed 2026-06-08. — \"...the philosophy of Mr. Carlyle's wonderful book.\"\n10. *A Tale of Two Cities*, Preface (publication context, *The Frozen Deep* credit), via charlesdickenspage.com and SparkNotes. Tier 1 (primary) / Tier 5 (apparatus). Accessed 2026-06-08.\n11. The Charles Dickens Page — \"A Tale of Two Cities\" (charlesdickenspage.com), citing Edgar Johnson, *Charles Dickens: His Tragedy and Triumph* (1952), p. 955. Tier 5 (scholarly compilation pointing to Tier 2 biography). Accessed 2026-06-08. — Dickens \"jokingly claimed to have read... 500 times\"; Carlyle called the novel \"wonderful.\" **The \"500 times\" is flagged as Dickens's hyperbole.**\n12. *A Tale of Two Cities* — Wikipedia (sources section), citing the Pilgrim *Letters* and Sanders. Tier 7 navigational; underlying *Letters* are Tier 1. Accessed 2026-06-08. — \"cartloads of books from the London Library\"; Mercier  it. Accessed 2026-06-08. — Dickens's displacement of redemption onto private Christian sacrifice.\n18. Victorianweb, \"The Genre of Sage-Writing (or Secular Prophecy)\" / \"Elegant Jeremiahs\" (George Landow; John Holloway); and biographical material on Froude's *Life*. Tier 2/5. Accessed 2026-06-08. — Carlyle as founder of sage-writing; Froude's biography both confirming the prophet and devastating the personal reputation.\n19. Thomas Carlyle — Wikipedia, on the Froude controversy (\"almost overnight... object of puzzled dislike, or even of revulsion\"). Tier 7 navigational; the characterization traces to Froude scholarship (Ciaran Brady, *James Anthony Froude*, EUP 2013). Accessed 2026-06-08.\n\n### Texts referenced but not consulted directly (gap-fill seeds)\n- J. S. Mill, review of *The French Revolution*, *London and Westminster Review* 5 (July 1837) — full original not read.\n- Jules Paul Seigel, ed., *Thomas Carlyle: The Critical Heritage* (Routledge, 1971) — the standard collection of 1837 reviews; not read.\n- Michael Goldberg, *Carlyle and Dickens* (University of Georgia Press, 1972) — not read.\n- Andrew Sanders, *The Companion to A Tale of Two Cities* and \"'Cartloads of Books'\" chapter — read only in summary.\n- *The Letters of Charles Dickens*, Pilgrim Edition, vols. for 1859 — not read in original.\n- Joseph Slater, ed., *The Correspondence of Emerson and Carlyle* (1964) — not read.\n- Edgar Johnson, *Charles Dickens: His Tragedy and Triumph* (1952) — cited at second hand (p. 955).\n- J. A. Froude, *Thomas Carlyle: A History of His Life in London* (1884) and *Reminiscences* (1881) — not read."}, {"order": 7, "file": "07_Historiographical_Place_And_Modern_Assessment.md", "title": "Place in French Revolution Historiography and Modern Assessment", "summary": "", "body": "# Place in French Revolution Historiography and Modern Assessment\n\n## Bottom Line\n\nCarlyle's *The French Revolution: A History* (1837) occupies a peculiar and durable position in the long argument over the Revolution: it belongs to no school that subsequently won, and that is precisely why it has survived. It is not Whig-progressive, not Marxist-social (Mathiez, Lefebvre, Soboul), and not Furet-revisionist; it is *sui generis* — a Romantic, providential, moral history, the prime English specimen of the \"history-as-epic / history-as-biography\" strand that flourished in the 1820s–40s alongside Thiers, Mignet, and above all its great French rival, Jules Michelet. The professional consensus that hardened across the twentieth century is unambiguous and has barely moved: as *analysis* the book is unreliable — insufficiently empirical by modern standards, organized around heroes and moral judgment rather than social structure or ideology, prophetic where it should be probative — yet as *narrative art* and as a still-quotable evocation of the Revolution's lived texture it remains valuable, in print, and assigned to students nearly two centuries on. The most consequential modern echo is Simon Schama's bicentenary *Citizens* (1989), an explicit return to vivid event-driven narrative and to a Carlyle-like, Furet-inflected skepticism about revolutionary violence; the comparison is the clearest single proof that the Carlylean mode never fully died. The frank verdict a working historian reaches today: read it for the texture, the set-pieces, the moral seriousness, and the sheer prose; never trust it for cause, chronology-as-argument, social mechanism, or a balanced ledger of the Terror.\n\n---\n\n## 1. The Field Carlyle Entered: Histories of the Revolution circa 1837\n\nWhen Carlyle published in 1837, the historiography of the Revolution was scarcely a generation old and already crowded. The dominant French accounts were the liberal-constitutional narratives of **Adolphe Thiers** (*Histoire de la Révolution française*, 1823–27) and **François Mignet** (*Histoire de la Révolution française*, 1824), both of which Carlyle read and used as source-quarries even as he despised their interpretive temper. Thiers and Mignet treated the Revolution as the broadly necessary, broadly justified triumph of the bourgeoisie and the constitutional principle over a decayed *ancien régime* — a story of impersonal forces working themselves out toward a liberal settlement (alphahistory.com, \"French Revolution historiography,\" accessed 2026-06-08, Tier 5). [1]\n\n**Claim 1.1 (established):** Carlyle explicitly rejected the deterministic, forces-over-persons temper of Thiers, insisting instead on individual moral responsibility and the lived experience of particular human beings; he named Mirabeau, Danton, and Napoleon as the Revolution's three \"great men.\" [1][2] Carlyle \"rejected Thiers' deterministic view of history which emphasised inexorable historical forces over individual moral responsibility, and was more interested in the lived experience of individuals\" (alphahistory.com, Tier 5; corroborated by Britannica, Tier 2). [1][6]\n\nCarlyle thus positioned himself *against* the prevailing French liberal determinism, not because he favored the Revolution less but because he read it differently — as a moral and providential drama, a divine judgment, rather than the mechanical unfolding of class interest or constitutional logic. This anti-determinist, person-and-judgment-centered stance is the hinge on which his entire historiographical placement turns. Britannica records the governing idea baldly: \"Carlyle believed that the excesses of the French Revolution were a divine judgment upon a selfish monarchy and nobility,\" and praises the book's \"outstanding set pieces and character studies\" rather than any analytical apparatus (Britannica, \"The French Revolution by Carlyle,\" Tier 2). [6]\n\nThe English field he entered was thinner but real, and Carlyle would soon define its center. **Hedva Ben-Israel's** *English Historians on the French Revolution* (Cambridge University Press, 1968) treats the British writers on the Revolution from 1789 to 1900 — Smyth, Carlyle, Alison, Croker, Acton, and others — as a coherent \"school\" sharing common aims, methods, and above all a political point of view, with a chapter devoted in detail to Carlyle as the most prominent of them (Ben-Israel, 1968, Tier 2). [3]\n\n**Claim 1.2 (established):** Ben-Israel's standard scholarly survey treats the nineteenth-century English historians of the Revolution as a definable tradition with shared aims and a shared political viewpoint, and gives Carlyle a place of particular prominence within it. [3] This is the foundational modern monograph for situating Carlyle in *English-language* Revolution historiography specifically.\n\n---\n\n## 2. The Great Romantic Rival: Carlyle and Michelet\n\nIf Carlyle has a true counterpart, it is **Jules Michelet** (1798–1874), whose *Histoire de la Révolution française* (1847–53) is the other towering monument of Romantic Revolution-writing. François Furet — the late-twentieth-century revisionist — called Michelet's history \"the cornerstone of all revolutionary historiography and is also a literary monument\" (via alphahistory.com; Gossman, Tier 5/2). [1][4] The pairing of Carlyle and Michelet is the most illuminating single comparison in this workstream, because the two men share a mode and divide sharply on its content.\n\n**Lionel Gossman's** essay \"Jules Michelet and Romantic Historiography\" supplies the best available definition of the category both men inhabit. Gossman argues that Romantic historiography aimed at a \"synthesis of scholarship and narrative art\" — reconciling \"the investigative and disruptive practice of historical criticism and scholarship with the narrative art that establishes connections and asserts continuities\" — and was \"intimately associated with the moderately liberal and nationalist aspirations of the period immediately following the French Revolution and the Napoleonic wars\" (Gossman, \"Jules Michelet and Romantic Historiography,\" in *European Writers*, Tier 2). [4]\n\n**Claim 2.1 (established):** Romantic historiography, as Gossman defines it, sought to fuse archival scholarship with narrative art in the service of a liberal-national political program; the French Restoration and July-Monarchy historians (Barante, the Thierrys, Guizot, Michelet, Martin) \"probably stand alone in their combination of scholarship and artistry.\" [4] Carlyle, writing in English and outside that French liberal-national project, is the great *outlier* practitioner of the same fusion — sharing the narrative ambition while serving a providential-moral rather than liberal-national end.\n\nThe two diverge on the Revolution's protagonist and its meaning. Michelet made **\"the People\"** the collective hero — the Revolution as \"the tardy advent of Eternal Justice,\" creative and redemptive, personified by a People whose joy and misery he evokes \"on every page\" (alphahistory.com; Gossman, Tier 5/2). [1][4] Carlyle, by contrast, foregrounded individuals and moral judgment; **Giuseppe Mazzini** lodged the classic critique that Carlyle \"lacked the true conception of Humanity,\" recognizing \"no collective life or collective aim... only individuals\" (Mazzini, via alphahistory.com / Cambridge, Tier 5/6). [1][7]\n\n**Claim 2.2 (contested):** Whether Carlyle's history is \"individualist\" is itself disputed. Mazzini charged Carlyle with seeing only individuals; yet recent scholarship (Mark Allison, Cambridge, 2022) argues the reverse — that in *The French Revolution* \"the roused collectivities are the primary agents of his narrative and simply dragoon a leader as a kind of figurehead,\" making the Paris mob, not any great man, the effective hero. [1][7] The hero-theory of *On Heroes* (1841) and the crowd-driven practice of *The French Revolution* (1837) pull against each other; this internal tension is a live interpretive crux, not a settled reading. **(single-source on the Allison reading; load-bearing for any claim that Carlyle \"ant
