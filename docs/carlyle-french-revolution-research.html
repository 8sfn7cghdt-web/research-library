icipates\" crowd history.)**\n\nThe rivalry was personal and explicit. Michelet, who saw the Revolution as creative where Carlyle saw it as destructive, dismissed Carlyle's book in **1868** as \"a wretched work,\" \"devoid of study\" and \"full of false flights\" (Michelet, 1868, via alphahistory.com, Tier 5 reporting a Tier 1 judgment). [1]\n\n**Claim 2.3 (established, single-source):** Michelet in 1868 publicly disparaged Carlyle's *French Revolution* as \"a wretched work,\" \"devoid of study,\" and \"full of false flights.\" [1] This is a striking datum — the era's other great Romantic historian rejecting Carlyle on grounds (insufficient study, rhetorical excess) that anticipate the modern professional verdict — but it rests here on a single Tier-5 relay of the quotation and should be corroborated against a scholarly edition of Michelet's correspondence before being treated as fully verified. **(single-source; flagged.)**\n\nThe Victorian English reception ran the other way: contemporaries often judged Michelet's *Histoire* \"less picturesquely accurate than Carlyle's work,\" while still crediting Michelet's \"idiosyncrasy and literary power\" (Victorian-era criticism, via alphahistory.com / victorianweb.org, Tier 5). [1][8] The phrase \"picturesquely accurate\" captures the whole problem: it concedes vividness and concedes that vividness is being asked to stand in for accuracy.\n\n---\n\n## 3. The Schools, and Why Carlyle Belongs to None of Them\n\nThe twentieth-century historiography of the Revolution organized itself into a sequence of warring schools, and Carlyle's defining feature is that he fits none.\n\n**The Marxist / social-interpretation school.** From the late 1920s to the 1960s, social and economic analysis — often explicitly Marxist — dominated, associated above all with **Albert Mathiez**, **Georges Lefebvre**, and **Albert Soboul**. Soboul used explicit Marxist categories (mode of production, relations of production) and located the revolutionary motor in \"the masses of peasants, petty producers, artisans, and other urban workers rather than the bourgeoisie\" (alphahistory.com / marxists.org, Tier 5/6). [1][9]\n\n**Claim 3.1 (established):** The dominant twentieth-century interpretation — the social/Marxist school of Mathiez, Lefebvre, and Soboul — read the Revolution as class struggle driven by objective social forces, an approach methodologically antithetical to Carlyle's hero-and-judgment narrative. [1][9] Carlyle's history has no concept of class as a structural motor, no economic substructure, no social mechanism; on the social interpretation's own terms it is not analysis at all.\n\n**The revisionist challenge.** From the 1960s, **Alfred Cobban** and then **François Furet** dismantled the Marxist social interpretation. Furet shifted the explanatory weight from objective class dynamics to \"the subjective ideological discourse of revolutionaries as the main factor conditioning the outcome of events,\" and argued that Terror was \"built in\" to revolutionary action from its early days (Furet, *Penser la Révolution française*, 1978, via alphahistory.com / muse.jhu.edu, Tier 5/2). [1][10]\n\n**Claim 3.2 (established):** Furet's revisionism relocated the Revolution's driving force from social class to political and ideological discourse, and held that the Terror was intrinsic to the revolutionary dynamic from the outset rather than a contingent emergency response. [1][10] This matters for Carlyle in two opposite ways: Furet's *method* (analytical, anti-narrative, theory-driven) is alien to Carlyle, but Furet's *conclusion* about the intrinsic violence of the Revolution rhymes with Carlyle's lurid moral reading of the Terror as judgment — a rhyme Schama would exploit (see §4).\n\n**Where Carlyle stands.** Carlyle is not Whig-progressive (he scorned the liberal-constitutional teleology of Thiers/Mignet and the complacent march-of-progress story). He is not Marxist (no class analysis, no materialism). He is not revisionist (no analytical method, no discourse-theory; his anti-narrative opposite). He is the prime English instance of the **Romantic / providential / moral** strand — \"history as epic / biography,\" the tradition Gossman anatomizes and Hayden White would later formalize.\n\n**Claim 3.3 (inference):** Carlyle is best classified not within any of the three twentieth-century schools (Whig-progressive, Marxist-social, Furet-revisionist) but as *sui generis* — the leading English exemplar of the Romantic, providential, narrative-epic mode of Revolution-writing, alongside Michelet on the French side. [1][3][4] This is an interpretive synthesis of the historiographical surveys rather than a single sourced statement; it is, however, the consensus framing implicit across Ben-Israel, Gossman, and the standard historiography overviews.\n\n**Hayden White's** *Metahistory* (1973) gives the theoretical underwriting for treating Carlyle this way. White argued that nineteenth-century historical writing was structured by literary tropes and emplotments — that the historian's choice of narrative form is itself an interpretive act — which licenses reading Carlyle's \"Romantic emplotment\" as a *kind* of historical argument rather than a failure to make one (White, *Metahistory*, 1973, Tier 2). [11] On White's account the old charge \"Carlyle wrote literature, not history\" mistakes the universal condition of history-writing for Carlyle's idiosyncratic vice.\n\n**John Clive**, the Harvard historian of historiography, made the complementary biographical-interpretive point: Carlyle \"did not see himself as a historian, rather as a prophet who wanted to share his beliefs,\" beliefs shaped by his own life, so that although he intended the book as a *warning* about how revolutions erupt, \"many people read it as a kind of epic poem\" (Clive, *Not by Fact Alone*, 1989, Tier 2). [12]\n\n**Claim 3.4 (established):** John Clive characterized Carlyle as a prophet rather than a historian, who intended *The French Revolution* as a political warning but whose readers received it as an epic poem; understanding the book requires reading Carlyle's biography alongside it. [12] Clive's framing is now the standard way historiography-of-history scholars place Carlyle: the gap between authorial intent (warning) and reception (poem) is itself the key fact.\n\n---\n\n## 4. The Narrative-History Revival: Schama's *Citizens* (1989)\n\nThe single clearest modern proof that the Carlylean mode survived is **Simon Schama's** *Citizens: A Chronicle of the French Revolution*, published in 1989 for the bicentenary. Schama deliberately returned to \"the epic narratives employed by historians like Carlyle, focusing on people and events\" — narrative history \"filled with colour, drama and suspense but light on theory and intensive analysis\" — in conscious reaction against the analytical, theory-heavy academic mainstream (Wikipedia citing reviews → underlying reviews; alphahistory.com, Tier 5). [13][14]\n\n**Claim 4.1 (established):** Schama's *Citizens* (1989) was an explicit return to nineteenth-century-style narrative history — event- and person-centered, vivid, \"light on theory\" — in the lineage of Carlyle and Michelet, and was widely received as such. [13][14] The subtitle \"A Chronicle\" itself signals the deliberate archaism: chronicle, the oldest form of history, against analytical history.\n\nSchama's relation to the schools is instructive and double. His *conclusions* sit broadly in the **Furet/Cobban revisionist** camp — he draws on both as \"the principal authors of the 'revisionist' attack on the Marxist interpretation\" — but his *method* is the oldest kind of history, narrative chronicle, not Furet's analytical discourse-history (alphahistory.com; Callinicos, marxists.org, Tier 5/6). [1][15]\n\n**Claim 4.2 (established):** *Citizens* fused a revisionist (Furet/Cobban) interpretive stance with an emphatically pre-academic narrative method, producing what critics called a Furet conclusion delivered by Carlylean means. [1][15] This is the precise structural parallel to Carlyle: a moral/providential reading of revolutionary violence carried by narrative rather than by analysis.\n\nThe deepest Carlyle echo is **on violence**. Schama argued, in a much-quoted formulation, that \"violence... was not just an unfortunate side effect... it was the Revolution's source of collective energy. It was what made the Revolution revolutionary\" — the Terror as \"merely 1789 with a higher body count\" (Schama, *Citizens*, 1989, Tier 1; via Wikipedia → underlying text, Tier 1). [13]\n\n**Claim 4.3 (established):** Schama's central thesis — that violence was constitutive of the Revolution rather than an aberration, the Terror latent in 1789 — revives a Carlyle-like horror at revolutionary bloodshed and a Furet-like claim that the violence was intrinsic, not contingent. [13] Where Carlyle read the carnage as divine judgment and Furet read it as built into revolutionary discourse, Schama read it as the Revolution's own metabolic energy — three different idioms for the same refusal to treat the Terror as a regrettable detour.\n\n*Citizens* drew the predictable fire, and the lines of attack are exactly those leveled at Carlyle. The Marxist historian **Morris Slavin** charged that Schama lacked sympathy \"for the revolutionaries in the real circumstances of a profound social and political crisis\" and judged events \"from the standpoint of royalist elites\" (Slavin, via Wikipedia → review, Tier 5/6). [13] **Alex Callinicos** (a Marxist) and others attacked the very form: that narrative focused on \"particular people and incidents sidesteps the problems of perspectives and generalization\" — that \"you can't have a narrative and make an argument\" (Callinicos, marxists.org, 1989, Tier 6; NYRB exchange, Tier 5). [15][16] That last objection is the perennial anti-Carlyle objection in modern dress.\n\n**Claim 4.4 (contested):** Critics of *Citizens* (Slavin, Callinicos, and the NYRB reviewer) argued that narrative history of the Schama/Carlyle type cannot sustain a real argument and smuggles in an elite/royalist sympathy under cover of vividness; defenders (e.g., Robert Forster) countered that Schama \"desacralized the Revolution... by his inimitable style and wit.\" [13][15][16] The debate over *Citizens* is, almost line for line, a re-run of the nineteenth-century debate over Carlyle — which is why the comparison is so revealing.\n\n---\n\n## 5. Modern Assessment: The Consensus and Its Dissents\n\n### 5a. The settled professional verdict\n\nThe mainstream modern assessment is stable and can be stated cleanly: **unreliable as analysis, valuable as art and as evocation.** Carlyle's work was \"written in a vivid and often stylised way that resembled poetic fiction rather than historical narrative,\" and \"many academics savaged Carlyle's writing style, claiming that he had blended history with romantic literature\" — yet the book \"is still in print nearly 200 years after it was first published\" and is still read by students (alphahistory.com / cambridge.org, Tier 5/2). [1][17]\n\n**Claim 5.1 (established):** The modern scholarly consensus holds Carlyle's *French Revolution* to be unreliable as historical analysis but valuable as narrative art and as an enduring evocation of the Revolution's texture; it remains continuously in print and assigned to students nearly two centuries after publication. [1][6][17] This is the load-bearing summary judgment of the entire workstream.\n\nThe standard methodological objections cluster into four:\n1. **Insufficiently empirical** — impressionistic, source-credulous, indifferent to the archival-critical standards professionalized after Ranke;\n2. **Hero-focused** — organized around individuals and moral agency rather than social structure;\n3. **Ignores structure and ideology** — no class analysis (the Marxist objection), no discourse analysis (the revisionist objection);\n4. **Prophetic, not probative** — built to deliver a moral warning and a providential reading rather than to test causal claims.\n\nA sympathetic but candid formulation, from the scholarship on his method, casts Carlyle \"as an artist dealing with reported fact, handling materials which 'however manifestly unreliable they themselves might be, always demanded some degree of accuracy and good faith'\" (PMLA, \"Carlyle's General Method in *The French Revolution*,\" Tier 2). [18]\n\n**Claim 5.2 (established):** Even sympathetic scholarship classifies Carlyle primarily as an artist working *upon* reported fact rather than as an empirical investigator, while granting that he held himself to a standard of \"accuracy and good faith\" in handling his (often poor) sources. [18] This is the charitable version of the consensus: not that Carlyle lied or invented, but that his fidelity was to the imaginative truth of the scene rather than to the analytical truth of the cause.\n\n### 5b. The recuperative dissent\n\nAgainst the \"great prose, bad history\" consensus runs a counter-current that takes the book's *thought* seriously. **Mark Allison's** \"The French Revolution Now; or, Carlyle's Eternal Return\" (*Victorian Literature and Culture*, 2022) argues for recuperating the work as \"a thoroughgoingly radical work\" whose insights into \"collective action, sympathy, and utopianism\" remain pertinent to contemporary crises of oligarchical capitalism (Allison, 2022, Tier 2). [7]\n\n**Claim 5.3 (contested):** A recent strand of scholarship (Allison, 2022) argues that *The French Revolution* is not merely an art-object but a formally innovative and theoretically serious work on sympathy, collectivity, and narrative whose political diagnosis — the betrayal of the \"liberatory promise of Sansculottism\" by an emergent oligarchy — speaks directly to twenty-first-century politics. [7] This revaluation is real but minority; it argues for the book's *ideas*, not its *accuracy*, and so does not overturn the empirical-unreliability consensus so much as relocate the conversation onto literary-theoretical and political-theory ground. **(single-source for the specific \"radical recuperation\" thesis.)**\n\nAllison also names the elephant: Carlyle's later racist and authoritarian writings put him \"at risk of cancellation,\" and Allison's pragmatic answer is to \"take, with thanks, from so irregular a genius, what seems to us good... and leave the rest alone\" (Allison, 2022, Tier 2). [7] This reputational drag — the later *Latter-Day Pamphlets*, the \"Occasional Discourse on the Negro Question,\" the proto-authoritarian hero-worship — is the single largest non-literary force bearing on the book's twenty-first-century standing, and it is treated at length in this corpus's trajectory workstream (08).\n\n### 5c. The frank working-historian verdict\n\nWhat does a working historian of the Revolution actually *get* from Carlyle now, and what would they never trust him for?\n\n**Gets from it:**\n- The *texture* and atmosphere of 1789–95 — the Bastille, the women's march on Versailles, the flight to Varennes, the September Massacres, the guillotine — rendered with a present-tense immediacy no analytical history matches; the famous set-pieces are still quoted as evocations.\n- A model of **narrative history as a serious form** — the lineage Schama revived and that the trade-history market still rewards.\n- A document of **how the Romantic age read the Revolution** — Carlyle is itself a primary source for nineteenth-century historical consciousness (Ben-Israel's whole premise). [3]\n- **Moral seriousness** about violence and the fragility of order that the revisionists (Furet) and Schama re-validated.\n\n**Would never trust it for:**\n- **Causation and chronology-as-argument** — the providential/Sham framework is theology, not explanation.\n- **Social and economic mechanism** — there is essentially none.\n- **A balanced ledger of the Terror** — the moral-judgment lens distorts proportion.\n- **Factual precision at the granular level** — built on inferior sources (Thiers, the *Deux Amis*, memoir literature, the *Moniteur*) handled imaginatively.\n- **Anything resembling the post-Ranke evidentiary standard** the discipline now requires.\n\n**Claim 5.4 (inference):** The defensible working-historian position is to cite Carlyle for atmosphere, set-piece, and as a primary document of nineteenth-century historical imagination, while excluding him entirely from the evidentiary base for causal, social, ideological, or quantitative claims about the Revolution. [1][6][18] This is a synthesis of the consensus sources rather than a single attributable verdict, offered as the practical upshot.\n\n---\n\n## 6. Competing Assessments at Full Strength\n\nPer the steelman discipline, the two strongest opposed positions, each in its own voice:\n\n**The dismissive case (the analytical-professional historian):** Carlyle is a magnificent writer and a negligible historian. His book has no theory of causation worth the name, no social analysis, no ideological analysis, no evidentiary rigor; it is built on second-rate sources handled like a novelist's raw material; its providential-moral frame is a category mistake imported from the pulpit; and its hero-worship is not merely wrong but pernicious, the seed of the authoritarian politics Carlyle later embraced. That it is still assigned says more about the seductiveness of prose than about its value as history. Michelet's own 1868 verdict — \"wretched... devoid of study\" — was right. [1]\n\n**The recuperative case (the literary-historiographical / political-theory reader):** The dismissal rests on an anachronism — judging an 1837 Romantic history by a post-Ranke empirical standard it never claimed. Hayden White showed that *all* history is emplotted; Carlyle simply did openly what others do covertly. [11] His narrative is not the absence of an argument but a different *kind* of argument — about sympathy, collectivity, and the moral meaning of violence — that Schama and Furet, in their different idioms, vindicated. [7][13] Read for what it is, *The French Revolution* is a radical and prescient diagnosis of how revolutionary promise curdles into oligarchy, and its prophetic horror at the Terror has aged better than the Marxist apologetics that long dominated the field. [7]\n\nBoth positions are strong; the corpus does not adjudicate between them. They disagree less about the facts (everyone agrees the book is empirically weak and rhetorically overwhelming) than about *what history is for* — and that is a values disagreement not resolvable by evidence.\n\n---\n\n## Open Questions\n\n1. **Did Michelet actually write \"a wretched work, devoid of study, full of false flights\" in 1868, and in what context?** The quotation circulates via Tier-5 relay; it should be traced to a scholarly edition of Michelet's correspondence or journal before being treated as verified. (Claim 2.3.)\n2. **How does Carlyle's standing in *French* (as opposed to Anglophone) historiography read today?** This workstream is heavily Anglophone; a direct reading of how Furet's *Dictionnaire critique de la Révolution française* or recent French scholarship treats Carlyle (if at all) would correct the bias.\n3. **Is the Allison \"radical recuperation\" thesis (2022) gaining traction or an outlier?** Single-source for the specific claim; tracking whether it is cited and built upon would calibrate the recuperative current's real weight.\n4. **What exactly did Schama say about Carlyle in his own prefatory/acknowledgment matter in *Citizens*?** Reviews assert the debt; the primary text of Schama's preface was not directly consulted here and would strengthen Claim 4.1.\n5. **Where does Carlyle sit relative to Tocqueville's *L'Ancien Régime et la Révolution* (1856)** in the analytical-vs-narrative axis? Tocqueville is the great analytical near-contemporary and a natural third point of triangulation not developed here.\n6. **How do recent (2010s–2020s) French Revolution survey textbooks and bibliographies actually cite Carlyle** — as living source, as historiographical artifact, or not at all? A citation-pattern check would empirically test the \"still cited\" claim (5.1).\n\n---\n\n## Sources\n\n1. Alpha History, \"French Revolution historiography\" and \"Historian: Thomas Carlyle,\" alphahistory.com, accessed 2026-06-08. **Tier 5** (educational/analytical site; relays scholarly judgments and quotations including Thiers/Mignet context, Mazzini's critique, Michelet's 1868 dismissal, and Furet on Michelet). Lean: pedagogical, broadly mainstream. Used for orientation and as a relay for quotations needing primary corroboration.\n2. Alpha History, \"Historian: Thomas Carlyle\" (page returned HTTP 403 on direct fetch; content accessed via search-result summary), accessed 2026-06-08. **Tier 5.** Carlyle's rejection of Thiers; great-men (Mirabeau/Danton/Napoleon) framing.\n3. Hedva Ben-Israel, *English Historians on the French Revolution* (Cambridge University Press, 1968), via publisher/Google Books descriptions and AHR notice, accessed 2026-06-08. **Tier 2** (university-press monograph). The standard scholarly survey treating nineteenth-century English Revolution-historians as a school, with a detailed chapter on Carlyle.\n4. Lionel Gossman, \"Jules Michelet and Romantic Historiography,\" in *European Writers* (Scribner), PDF via Open Book Publishers (openbookpublishers.com), accessed 2026-06-08. **Tier 2** (authoritative essay by a leading historian of historiography). Definition of Romantic historiography; the French Romantic historians' scholarship-plus-art synthesis; Michelet's centrality.\n5. *(reserved)* — Gossman PDF, second pass / same source as [4].\n6. Encyclopædia Britannica, \"The French Revolution by Carlyle,\" britannica.com, accessed 2026-06-08. **Tier 2** (expert-authored reference). Providential-judgment thesis; \"outstanding set pieces and character studies\"; Dickens influence; reputation.\n7. Mark Allison, \"The French Revolution Now; or, Carlyle's Eternal Return,\" *Victorian Literature and Culture* (Cambridge University Press), 2022, cambridge.org, accessed 2026-06-08. **Tier 2** (peer-reviewed journal). The recuperative thesis; crowd-as-hero reading; the \"at risk of cancellation\" reputational point; Sansculottism betrayed.\n8. The Victorian Web, victorianweb.org (Carlyle and Michelet pages), accessed 2026-06-08. **Tier 5** (scholarly-edited educational resource). Victorian comparative reception (\"picturesquely accurate\").\n9. marxists.org / Alpha History on the social-Marxist school (Mathiez, Lefebvre, Soboul), accessed 2026-06-08. **Tier 5/6.** Used to characterize the social interpretation's content (cited as position-evidence for the Marxist reading).\n10. François Furet, *Penser la Révolution française* (1978) / *Interpreting the French Revolution*, via Project MUSE review and alphahistory.com, accessed 2026-06-08. **Tier 2** (primary work, accessed via scholarly summary). Discourse-centered revisionism; Terror \"built in.\"\n11. Hayden White, *Metahistory: The Historical Imagination in Nineteenth-Century Europe* (Johns Hopkins University Press, 1973), via reference summaries, accessed 2026-06-08. **Tier 2** (foundational monograph). Tropological theory of historical narrative licensing the \"Romantic emplotment\" reading of Carlyle.\n12. John Clive, *Not by Fact Alone: Essays on the Writing and Reading of History* (1989), via reference summaries, accessed 2026-06-08. **Tier 2** (essays by a Harvard historiographer). Carlyle as prophet-not-historian; warning-vs-epic-poem reception gap.\n13. \"Citizens: A Chronicle of the French Revolution,\" reviews and reception (incl. Schama's violence thesis, Slavin and Forster reviews) via en.wikipedia.org → underlying reviews and the text of *Citizens* (Simon Schama, Knopf, 1989), accessed 2026-06-08. **Tier 1** (Schama's text) / **Tier 5** (reception relay). Narrative revival; Terror-as-energy thesis; critical reception.\n14. Alpha History, \"French Revolution historian: Simon Schama,\" accessed 2026-06-08. **Tier 5.** *Citizens* as return to Carlyle/Michelet-style narrative, \"light on theory.\"\n15. Alex Callinicos, \"Revising the revolution,\" *Socialist Worker Review* (1989), marxists.org, accessed 2026-06-08. **Tier 6** (Marxist polemic; cited as position-evidence). The \"you can't have a narrative and make an argument\" objection; Schama's revisionist debts.\n16. Simon Schama and Norman Hampson, \"'The Two French Revolutions': An Exchange,\" *The New York Review of Books*, 1989-05-18, nybooks.com, accessed 2026-06-08. **Tier 5** (analytical exchange). Narrative-vs-analysis debate around *Citizens*.\n17. \"Carlyle's General Method in *The French Revolution*,\" *PMLA* (Cambridge Core) and \"The French Revolution Now\" (Cambridge), via search summaries, accessed 2026-06-08. **Tier 2.** \"Still in print nearly 200 years\"; academics \"savaged\" the style; artist-on-reported-fact framing.\n18. PMLA, \"Carlyle's General Method in *The French Revolution*,\" cambridge.org, accessed 2026-06-08. **Tier 2** (peer-reviewed). Carlyle as artist demanding \"some degree of accuracy and good faith\" of unreliable materials.\n\n---\n\n*Compiled 2026-06-08 for the Carlyle/*French Revolution* deep-research corpus, workstream 07. Anglophone source-bias acknowledged (see Open Question 2); several quotations (Michelet 1868, Mazzini) reach this document via Tier-5 relay and are flagged for primary corroboration.*"}, {"order": 8, "file": "08_Trajectory_Of_Reputation.md", "title": "Trajectory of the Work's Reputation and Use", "summary": "", "body": "# Trajectory of the Work's Reputation and Use (Forecast Input)\n\n## Bottom Line\n\nCarlyle's *The French Revolution: A History* (1837) enters the late 2020s in a paradoxical position that the forecast panel must hold in tension. On one side, Carlyle the **man and prophet** has suffered one of the sharpest reputational collapses of any major Victorian: his later reactionary writings — the *Latter-Day Pamphlets* (1850), the \"Occasional Discourse on the Negro Question\" (1849/1853), and his leadership of the Governor Eyre Defence Fund (1865–66) — together with the twentieth-century \"proto-fascist\" charge (Ernst Cassirer's *The Myth of the State*, 1946, naming Carlyle \"the father of the modern myth of the hero\"), pushed him from the commanding height of Victorian sage to a figure \"little read today\" outside specialist circles. On the other side, *The French Revolution* itself has been **partly insulated** from that collapse: it is the early, radical, pre-reactionary masterpiece, it remains continuously in print across at least three trade editions (Oxford World's Classics, Modern Library, and others), it received its **first comprehensive scholarly edition only in 2019** (the Oxford four-editor critical text), and it is the object of an active, if small, twenty-first-century scholarly reassessment (e.g., Mark Allison's 2022 \"The French Revolution Now\" in *Victorian Literature and Culture*) that explicitly proposes \"selectively appropriating\" the early work while bracketing the late. The two strongest **tailwinds** are the durable popularity of vivid narrative history (the lineage running through Simon Schama's *Citizens*, 1989, which self-consciously revived \"the epic narratives employed by historians like Carlyle\") and the recent scholarly-edition infrastructure (Oxford 2019; the open-access *Carlyle Letters Online*; free Project Gutenberg text). The strongest **headwinds** are the secular decline of \"great man\" historiography and of biography-centered history in the academy, the reputational drag of Carlyle's racism and authoritarianism in a period acutely attentive to both, and the work's sheer stylistic difficulty (\"Carlylese\") for non-specialist readers. The realistic forecast space through 2040 is one of **stable niche survival** — a perennial in-print classic and a teachable specimen in Victorian-studies and history-of-historiography contexts — rather than either canonical revival or disappearance. This document supplies the factual base for those scenarios and is careful throughout to separate what is documented from what is forecast.\n\n---\n\n## 1. The Carlyle Reputational Problem and How It Bears on *The French Revolution*\n\n### 1.1 The shape of the collapse\n\nThe single most important driver of the work's future standing is not the work but its author. Carlyle's nineteenth-century reputation was immense — by mid-century he was, with Ruskin, one of the two reigning \"sages\" of Victorian Britain, and *The French Revolution* (1837) was the book that made him famous and financially solvent (see Workstream 1, composition/biography). That standing then underwent a long twentieth-century collapse driven overwhelmingly by his **later** writings and public positions, not by the History.\n\nThe proximate causes, in rough chronological order of the offense:\n\n- The **\"Occasional Discourse on the Negro Question\"** (Fraser's Magazine, December 1849; revised and reissued in 1853 as a pamphlet under a cruder racial slur in the title), which mocked the abolitionist movement and effectively argued for the coerced labor of formerly enslaved people in the West Indies. The piece \"met with widespread disapproval, and in the minds of many people, Carlyle's reputation was forever tarnished\" [1].\n- The ***Latter-Day Pamphlets*** (1850), a splenetic assault on democracy, philanthropy, and parliamentary government that alienated much of his liberal readership.\n- His leadership of the **Eyre Defence and Aid Fund** (1865–66), defending Governor Edward John Eyre's violent suppression of the Morant Bay rebellion in Jamaica. This split the Victorian intelligentsia: Carlyle, Tennyson, Dickens, and Ruskin defended Eyre; the Jamaica Committee — J. S. Mill, Darwin, Herbert Spencer, and others — sought his prosecution [2].\n\nThese positions, **and then a second wave of damage after the World Wars**, drove the collapse. As the standard summary puts it: \"Carlyle's reputation further declined in the aftermaths of the First World War and the Second World War, when his philosophy was seen as a precursor of both Prussianism and fascism\" [1]. The result by the later twentieth century: Carlyle is \"rarely read by nonspecialists and only occasionally appears on reading lists within the academy\" [3], though \"growing scholarship in the field of Carlyle studies since the 1950s has improved his standing\" [1].\n\n### 1.2 The \"proto-fascist\" charge — and its key qualification\n\nThe intellectual core of the twentieth-century indictment is the link from Carlyle's **hero-worship** (codified in *On Heroes, Hero-Worship, and the Heroic in History*, 1841 — a separate, later work from the History) to twentieth-century fascism. The locus classicus is **Ernst Cassirer's *The Myth of the State*** (Yale University Press, 1946, published posthumously) [4]. Cassirer traces the intellectual genealogy of the Nazi state not to \"the barracks and beer cellars of Munich and Vienna\" but to Machiavelli, Hegel, Carlyle, and Gobineau, and he names Carlyle as \"the father of the modern myth of the hero\" (with Gobineau \"the father of the modern myth of race\") [4][5].\n\n**The load-bearing qualification, frequently lost in the secondary repetition:** Cassirer explicitly declines to hold Carlyle responsible for the uses later made of hero-worship. In the primary text he writes that \"to charge Carlyle with all the consequences that have been drawn from his theory would be against all the rules of historical objectivity,\" and he stresses that the transformation of \"old ideas\" into \"strong political weapons\" came later, \"accommodated to the understanding of a different audience\" [5][6]. In other words, the single most-cited authority for the \"Carlyle → fascism\" line is himself **a qualified, not a wholesale, accuser**. This matters for the forecast: the strongest version of the indictment is more cautious than its popular echo.\n\nThe German fascist **appropriation** was nonetheless real and is documented: National Socialist academics did invoke *Heroes and Hero-Worship* to justify the *Führerprinzip*, with Theodor Jost writing in 1935 that \"Carlyle established, in fact, the mission of the Führer historically and philosophically\" [3]. Hitler is also reported to have taken solace in Carlyle's *Frederick the Great* in the bunker (a biographical anecdote that recurs in the literature; treat as a much-repeated claim rather than a primary-sourced fact here).\n\n### 1.3 The defenders: separating the early prophet from the late reactionary\n\nAgainst the indictment stands a defensive tradition that does one of two things — either (a) **separates** the early radical Carlyle from the late reactionary, or (b) **denies the split** and reads him as coherent but not fascist.\n\n- **The \"two Carlyles\" defense** is the one most directly relevant to *The French Revolution*, because it locates the masterpiece on the safe side of the line. Mark Allison's \"The French Revolution Now; or, Carlyle's Eternal Return\" (*Victorian Literature and Culture* 50.1, 2022) is the cleanest recent statement: he acknowledges \"Carlyle's damaged reputation due to his later racist and authoritarian writings\" but proposes \"selectively appropriating\" the early work, positioning *The French Revolution* as \"a thoroughgoingly radical work\" and \"the author's masterpiece — distinct from his problematic later output\" [7].\n- **The \"coherent but not fascist\" defense** rejects the biographical split. Noel Annan, reviewing Philip Rosenberg in *The New York Review of Books* (1974), rejects the \"schizophrenic reading\" by which Carlyle \"went wrong\" after 1848, insisting his \"late Caesarism grew inevitably from his earlier radical critique,\" rooted in a consistent Calvinist framework — troubling, but not reducible to proto-fascism [8]. G. B. Tennyson and others have argued that Carlyle's anti-modernism and anti-egoism actually \"disqualify him from association with twentieth-century totalitarianism\" [3].\n- Cassirer himself, as noted (§1.2), \"rejected the notion of Carlyle as proto-fascist… emphasizing the moral underpinning of his thought\" in the very text most cited against him [3].\n\n**Net assessment for the forecast (inference):** The two-Carlyles framing is the mechanism by which *The French Revolution* is partly insulated from its author's collapse. It is a live, respectable scholarly move, but it is contested (Annan's coherentist reading cuts against it), and it does not fully neutralize the drag: a reader or syllabus-setter who rejects Carlyle wholesale rejects the History too. The drag is real but **partial and decreasing among specialists, persistent among generalists.**\n\n---\n\n## 2. Status of the Book Itself: In Print, Editions, Digital Availability\n\nThe work's material availability is a concrete, documentable driver — books that fall out of print fall out of memory. On this axis *The French Revolution* is in strong shape.\n\n### 2.1 Trade editions in print\n\n- **Oxford World's Classics** — the long-standing accessible edition (originally ed. K. J. Fielding and David Sorensen, 1989), now superseded by a 2019 OWC edition (ISBN 9780198815594) edited by David R. Sorensen, Brent E. Kinser, and Mark Engel, also available as a Kindle e-book [9][10].\n- **Modern Library Classics** — *The French Revolution: A History* (ISBN 9780375760228), edited and introduced by John D. Rosenberg, published 2002, distributed by Penguin Random House; listed as in print at $18.95 as of early 2026, and available as an e-book [11][12].\n- Numerous **public-domain reprints** (the text entered the public domain long ago), of varying quality, keep cheap copies perpetually available.\n\n**A correction for the corpus:** the project brief and some secondary references assume a **Penguin Classics** edition of *The French Revolution*; I could not confirm a current Penguin **Classics**-imprint edition (the Modern Library edition is the Penguin Random House–distributed trade scholarly paperback). Flagging this so downstream documents do not assert a Penguin Classics edition that may not exist. The substantive point — multiple competing in-print trade editions — stands regardless.\n\n### 2.2 The scholarly edition: the 2019 Oxford critical text\n\nThe signal event of the last decade is the appearance of the **first comprehensive scholarly edition** of the work, **183 years after publication**:\n\n> *Thomas Carlyle: The French Revolution: A History*, edited by Mark Cumming, David R. Sorensen, Mark Engel, and Brent E. Kinser (Oxford University Press, hardcover, ISBN 9780198809159, published 2019).\n\nThe publisher states plainly: \"This is the first time that Thomas Carlyle's remarkable *The French Revolution: A History* has been published in a comprehensive scholarly form\" [13]. The edition presents a critical text close to the 1837 first edition with a full record of Carlyle's later emendations, plus \"literary, textual, historical, and photographic\" apparatus, with the introduction tracing Carlyle's allusions \"to Homer, Virgil, Shakespeare, Milton, and the Bible\" [13]. The OWC paperback (9780198815594, 2019) carries a reduced version of this apparatus to the general reader [9].\n\n**Why this matters for the forecast:** a first critical edition is a leading indicator of scholarly seriousness and a precondition for sustained teaching and citation. It arrives late but it arrives, and it gives the work a stable scholarly anchor for the 2020s–2040s.\n\n### 2.3 The California \"Strouse Edition\" — what it does and does not include\n\nThe **Norman and Charlotte Strouse Edition of the Writings of Thomas Carlyle** (University of California Press), the major ongoing scholarly edition of Carlyle's works, is a second piece of infrastructure — but with a **specific and forecast-relevant gap**. Its published and forthcoming volumes are:\n\n- *On Heroes, Hero-Worship, and the Heroic in History* (1993)\n- *Sartor Resartus* (2000)\n- *Historical Essays* (2002/2003)\n- *Past and Present* (2006)\n- *Essays on Literature* (2020)\n- *Essays on Politics and Society* (2022)\n- *Essays on German Literature and Culture*, Parts I & II (2024)\n- *Latter-Day Pamphlets*, Parts I & II (scheduled 2026) [14][15]\n\nThere is **no dedicated Strouse volume for *The French Revolution*** [14]. The standalone scholarly home of the History is therefore the Oxford 2019 edition (§2.2), not California. This is worth noting because it means the work's scholarly-edition base, while real, is **single-edition and recent** rather than redundantly supported. (Carlyle's *Historical Essays* in the Strouse edition does include his shorter essays touching the Revolution, but not the three-volume *History*.)\n\n### 2.4 Digital availability\n\n- **Project Gutenberg** carries the full three-volume text free (ebook #1301), maximizing casual access [16].\n- The ***Carlyle Letters Online*** (CLO), a Duke University Press / Western Carolina University project based on the Duke-Edinburgh *Collected Letters of Thomas and Jane Welsh Carlyle*, has been **open access since its 2006 debut**; the print edition reached its final volume, with a further CLO-only volume of undated/late-found letters planned for 2024. The CLO encodes the first 30-plus volumes of correspondence [17][18]. This is not the *History* itself, but it is the primary-source substrate (including the famous Mill-burning correspondence) that keeps Carlyle scholarship tractable and digitally native.\n\n**Net assessment (established):** On availability, the work is well-positioned for 2040 — continuously in print, freshly edited (2019), and fully digitized free, with a strong open-access correspondence apparatus. Availability is a tailwind, not a risk.\n\n---\n\n## 3. The Narrative-History Market: Tailwind and Headwind\n\n### 3.1 Tailwind — the durable appetite for vivid narrative history\n\n*The French Revolution* is the **ur-text of vivid, present-tense, scene-painting narrative history** (see Workstream 3 on style). The genre it founded never died and periodically surges. The clearest modern instance is **Simon Schama's *Citizens: A Chronicle of the French Revolution*** (Knopf, 1989, published for the bicentenary), which \"returns to the epic narratives employed by historians like Carlyle, focusing on people and events\" and is repeatedly described as emulating \"the great 19th-century narratives\" [19]. Schama's commercial and critical success — a 900-page narrative history that \"appeals both to the mass market and the specialist\" — demonstrates a standing market for exactly the mode Carlyle pioneered.\n\nThe broader publishing fact (inference from the trade record): popular narrative history (Antony Beevor, Simon Sebag Montefiore, Stacy Schiff, Hilary Mantel's adjacent historical fiction, the entire \"big narrative history\" category) remains commercially robust into the 2020s. To the extent readers keep wanting history that reads like literature, Carlyle remains the named ancestor and an object of periodic rediscovery. This is a genuine tailwind for the *book's cultural memory*, even if not for casual readership of the difficult original.\n\n### 3.2 Headwind — academic professionalization and the structural turn\n\nAgainst the popular tailwind runs the academic headwind. Professional historiography of the French Revolution moved decisively, across the twentieth century, **away from** the romantic-narrative, individual-centered mode Carlyle exemplifies and **toward** social-structural, quantitative, cultural, and \"history from below\" approaches (see Workstream 7 for the full historiographical map: Romantic → Whig → Marxist/social → Furet-led revisionist → cultural/linguistic → recent emotions/intellectual turns). Carlyle's *History* is, by professional standards, **not a source historians cite for facts** — it is studied as literature, as a document of nineteenth-century thought, or as a specimen in the history of history-writing, not as current scholarship.\n\nRecent major Revolution histories illustrate the displacement: Timothy Tackett's *The Coming of the Terror in the French Revolution* (Harvard, 2015) works through the \"new history of emotions\"; Jonathan Israel's *Revolutionary Ideas* (2014) through intellectual history; Haim Burstin's *Révolutionnaires* through micro-history of participation [20]. Carlyle is, at most, a venerable forebear acknowledged in a historiographical preface — not an interlocutor on the facts.\n\n**Net assessment (inference):** The narrative-history market is a **bifurcated** driver. It sustains the work's cultural prestige and trade viability (tailwind) while the academy continues to use it only as object-of-study, not as authority (headwind). The two are not in contradiction; they describe the work's settled dual identity — a **literary classic about history** rather than a history that practitioners trust. This dual identity is itself stable and is the most likely 2040 equilibrium.\n\n---\n\n## 4. The \"Great Man\" Theory Debate and Its Trajectory\n\nBecause Carlyle is, fairly or not, the **named popularizer of the \"great man\" theory of history** (via *Heroes*, 1841), the fortunes of that debate are a second-order driver of his — and thus partly the *History*'s — standing. The mechanism: when \"great man\" framing is fashionable, Carlyle is cited (often pejoratively, sometimes approvingly) and stays in circulation; when it is in disrepute, he is the convenient straw man.\n\nThe documented arc:\n\n- The great-man approach \"was most fashionable with professional historians in the 19th century\" and was popularized by Carlyle's 1840 lectures [21].\n- It \"faced significant criticism by the mid-20th century,\" from Herbert Spencer onward, who argued that societal factors, not innate traits, produce great individuals; the rise of social history and \"history from below\" displaced it [21].\n- David R. Sorensen (one of the Oxford editors) \"notes the modern decline in support for Carlyle's theory in particular but also for 'heroic distinction' in general\" [21].\n- **Contemporary status:** the debate is unresolved and shows some agency-centric revival. Recent commentary argues that \"individual agency\" has \"gained traction amid critiques of overreliance on structural explanations,\" with analysts crediting singular figures' interventions for recent political upheavals [21]. There is a small popular-intellectual \"in defence of the great man theory\" current (e.g., heterodox essays) running against the academic consensus.\n\n**Forecast-relevant read (inference):** The \"great man\" debate is unlikely to resolve by 2040; it oscillates. A period of personalized politics (charismatic strongmen, founder-worship in tech) tends to **revive interest in Carlyle as diagnostic ancestor** — but this cuts both ways for *The French Revolution* specifically, because the *History* is in fact the work where Carlyle most undercuts the great-man thesis (it is the **crowd**, sansculottism, and impersonal Necessity that drive his Revolution, not heroes — see Workstream 5). A sophisticated revival could thus rehabilitate the *History* as the \"good Carlyle\" who saw mass forces; a crude revival merely re-tars him. The direction depends on whether the revival is scholarly or polemical.\n\n---\n\n## 5. Signals to Watch (Leading Indicators for the Forecast Panel)\n\nThese are the concrete, trackable signals that should update the forecast between now and 2040.\n\n### 5.1 New critical editions and apparatus\n- **Achieved:** Oxford comprehensive scholarly edition (2019) [13]; OWC paperback refresh (2019) [9]; *Carlyle Letters Online* open access and effectively complete [17][18].\n- **Watch:** whether a Strouse (California) volume for *The French Revolution* is ever commissioned (none to date) [14]; whether the Oxford critical text is reprinted / goes to paperback scholarly format; emergence of a digital scholarly edition with full allusion-apparatus (the 2019 edition's strength).\n\n### 5.2 Citations in major new Revolution histories\n- **Watch:** whether the next generation of big Revolution narratives (successors to Schama, Tackett, Israel) engage Carlyle substantively in their historiographical framing, or merely name him. A serious chapter-length engagement in a widely read new history would be a strong positive signal; continued one-line acknowledgment is the neutral base case.\n\n### 5.3 Presence on syllabi\n- **Current (established, low-resolution):** the work \"only occasionally appears on reading lists within the academy\" [3] and is taught mainly in **Victorian literature / history-of-historiography** contexts rather than in French Revolution history courses. I did not find quantitative syllabus data; this is a known gap (see Open Questions).\n- **Watch:** whether the 2019 critical edition drives renewed teaching; whether Carlyle survives canon-revision pressures in English departments given his racism.\n\n### 5.4 The \"great man\" debate trajectory\n- **Watch:** scholarly vs. polemical character of any revival (§4); whether new work distinguishes the crowd-driven *History* from the hero-driven *Heroes*.\n\n### 5.5 New biographies and scholarly reassessments of Carlyle\n- **Existing base:** Fred Kaplan, *Thomas Carlyle: A Biography* (Cornell UP, 1983 — Pulitzer and NBCC finalist, long treated as definitive) [22]; Simon Heffer, *Moral Desperado: A Life of Thomas Carlyle* (Weidenfeld & Nicolson, 1995 — a rehabilitative-leaning popular biography that nonetheless leaves Carlyle \"as much of a moral desperado as he was in his Victorian context\") [23].\n- **Watch:** any major new biography (none signaled as imminent in 2026). A serious, widely reviewed new *Life* would be a strong reputational event either way; a generation has passed since Kaplan/Heffer, so one is plausible within the horizon.\n- **Scholarly-reassessment current:** Allison's 2022 essay [7], the Cambridge *Works of Thomas Carlyle* scholarly apparatus, the *Carlyle Studies Annual*, and the Strouse Edition program collectively keep a small but persistent academic engine running [7][14][24].\n\n---\n\n## 6. Synthesis: The Drivers Arrayed for the Forecast\n\n| Driver | Direction | Strength | Mechanism | Status |\n|---|---|---|---|---|\n| Carlyle's racism / authoritarianism | Headwind | Strong | Wholesale rejection drags the early work with the late | Documented, persistent [1][2] |\n| \"Proto-fascist\" charge | Headwind | Medium (qualified) | Hero-worship → fascism genealogy; but key authority (Cassirer) disclaims responsibility | Documented + qualified [4][5][6] |\n| \"Two Carlyles\" insulation | Tailwind | Medium | Locates the *History* as the pre-reactionary masterpiece | Live, contested [7][8] |\n| In-print / digital availability | Tailwind | Strong | Multiple trade editions + free Gutenberg keep access frictionless | Documented [9][11][16] |\n| 2019 scholarly edition | Tailwind | Medium-strong | First critical text anchors teaching/citation for the horizon | Documented [13] |\n| Narrative-history market | Tailwind (cultural) | Medium | Schama-lineage keeps Carlyle the named ancestor | Documented [19] |\n| Academic structural turn | Headwind | Strong | Profession uses the work as object-of-study, not authority | Documented [20] |\n| \"Great man\" debate oscillation | Ambiguous | Medium | Personalized-politics eras revive interest, polarity uncertain | Documented + inference [21] |\n| New biographies / reassessment | Ambiguous | Medium | Could re-litigate reputation either way; small engine already running | Base exists [7][22][23][24] |\n\n**The equilibrium these point to (inference, for the panel to build on):** *The French Revolution* is most likely to occupy, through 2040, the status of a **durable literary classic about history** — perennially in print, freshly edited, free online, taught in a niche, named as the ancestor of narrative history, and read whole by relatively few. It is neither a candidate for canonical revival to general readership (the style barrier and the author's reputation both cut against that) nor a candidate for disappearance (the availability and scholarly-edition infrastructure both cut against that). The single biggest swing factor is **how hard the academy and educated public press the racism/authoritarianism question** — i.e., whether the \"two Carlyles\" insulation holds or collapses — and the secondary swing factor is whether a **major new biography or a serious new narrative history** re-centers him within the horizon.\n\n---\n\n## Open Questions\n\n1. **Syllabus data.** I could not find quantitative or systematic evidence of *The French Revolution*'s actual presence on university syllabi (English, history, or historiography). The \"only occasionally on reading lists\" claim [3] is impressionistic. A real audit (Open Syllabus Project or equivalent) would sharpen the teaching-presence signal materially.\n2. **Penguin Classics edition.** Does a current **Penguin Classics**-imprint edition of *The French Revolution* actually exist, distinct from the Penguin Random House–distributed Modern Library edition? The brief assumes one; I could not confirm it. Needs a direct catalog check.\n3. **Sales / readership figures.** No data found on actual print runs, sales, or library-circulation figures for any edition. \"In print\" is documented; \"read\" is not quantified.\n4. **The Hitler/Frederick anecdote.** The claim that Hitler took comfort in Carlyle's *Frederick the Great* in the bunker is widely repeated but not primary-sourced here; it should be verified or flagged before use in the corpus, given its rhetorical weight in the proto-fascism narrative.\n5. **Whether a Strouse FR volume is planned.** California's edition conspicuously lacks a *French Revolution* volume [14]. Is one commissioned or deliberately ceded to Oxford? This affects the redundancy of the scholarly-edition base.\n6. **Generational reception.** Is there any evidence (reviews, reading-group data, BookTok/Goodreads activity) of how younger 2020s readers encounter the work, if at all? The narrative-history tailwind assumes a transmission mechanism that is unverified for this specific, difficult text.\n7. **Direction of a \"great man\" revival.** Whether the agency-centric revival in 2020s commentary [21] is scholarly (which could rehabilitate the crowd-driven *History*) or polemical (which merely re-tars Carlyle) is genuinely uncertain and forecast-consequential.\n\n---\n\n## Sources\n\n1. \"Thomas Carlyle,\" Wikipedia (used here only as a navigation pointer to its cited sources; substantive claims traced to the underlying record). Summarizes the post-WWI/WWII Prussianism/fascism reputational decline and the post-1950s recovery in Carlyle studies. Accessed 2026-06-08. *Tier 7 as cited; claims corroborated against Tiers 4–5 below.* https://en.wikipedia.org/wiki/Thomas_Carlyle\n2. \"When Intellectuals Split: The Eyre Case,\" JSTOR Daily; and Sarah Winter, \"On the Morant Bay Rebellion… the Governor Eyre–George William Gordon Controversy, 1865–70,\" BRANCH (Branch Collective). Documents the Eyre Defence Fund line-up (Carlyle/Tennyson/Dickens/Ruskin vs. the Mill-led Jamaica Committee). Accessed 2026-06-08. *Tier 5/2.* https://daily.jstor.org/when-intellectuals-split-the-eyre-case/ ; https://branchcollective.org/?ps_articles=sarah-winter-on-the-morant-bay-rebellion-in-jamaica-and-the-governor-eyre-george-william-gordon-controversy-1865-70\n3. \"Thomas Carlyle: extreme right ferment,\" *Études anglaises* 2013/1 (Cairn.info), and corroborating summaries. Source for \"rarely read by nonspecialists,\" the Theodor Jost 1935 *Führerprinzip* quotation, Cassirer's rejection of the proto-fascist label, and G. B. Tennyson's disqualifying argument. Accessed 2026-06-08. *Tier 2 (peer-reviewed journal).* https://www.cairn.info/revue-etudes-anglaises-2013-1-page-97.htm\n4. Ernst Cassirer, *The Myth of the State* (Yale University Press, 1946), as summarized by reference sources. The intellectual genealogy (Machiavelli/Hegel/Carlyle/Gobineau) and \"father of the modern myth of the hero.\" Accessed 2026-06-08. *Tier 1 (primary text, accessed via summary — see Open Question / primary-texts-not-consulted).* https://books.google.com/books/about/The_Myth_of_the_State.html?id=0QNxMcwNu7cC\n5. \"Ernst Cassirer on Fascism and National Socialism,\" Libertarianism.org; and Hans Kohn, \"The Myths of the State,\" *Commentary* (review of Cassirer). Source for the genealogy and for the qualification that Cassirer declines to charge Carlyle with the consequences. Accessed 2026-06-08. *Tier 5/6 (note libertarian and Commentary leans).* https://www.libertarianism.org/columns/ernst-cassirer-fascism-national-socialism ; https://www.commentary.org/articles/hans-kohn/the-study-of-man-the-myths-of-the-state/\n6. Direct paraphrase/quotation of Cassirer's qualifying sentence — \"to charge Carlyle with all the consequences that have been drawn from his theory would be against all the rules of historical objectivity\" — surfaced via secondary discussion of *The Myth of the State*. *Tier 1 quotation via Tier 5 conduit; verify against the print text before load-bearing use.*\n7. Mark Allison, \"The French Revolution Now; or, Carlyle's Eternal Return,\" *Victorian Literature and Culture* 50.1 (Spring 2022), Cambridge Core. The leading recent reassessment; \"selectively appropriating\" the early radical masterpiece, distinct from the late output; celebrates the 2020 [sic — 2019] scholarly edition. Accessed 2026-06-08. *Tier 2 (peer-reviewed).* https://www.cambridge.org/core/journals/victorian-literature-and-culture/article/french-revolution-now-or-carlyles-eternal-return/67D7210ABFCEB99A421E068384CC7F42\n8. Noel Annan, \"Carlyle, Our Hero?,\" *The New York Review of Books*, 27 June 1974. The coherentist defense rejecting the post-1848 \"schizophrenic\" split; Calvinist framework. Accessed 2026-06-08. *Tier 5/6 (review essay).* https://www.nybooks.com/articles/1974/06/27/carlyle-our-hero/\n9. *The French Revolution* (Oxford World's Classics), ed. David R. Sorensen, Brent E. Kinser, Mark Engel, ISBN 9780198815594 (2019); Kindle edition also listed. The accessible paperback derived from the critical edition. Accessed 2026-06-08. *Tier 1 (publisher/retail catalog).* https://www.amazon.com/French-Revolution-Oxford-Worlds-Classics/dp/019881559X\n10. Earlier OWC edition, ed. K. J. Fielding and David Sorensen (Oxford, 1989), reproducing the 1857 two-volume text with chronology and index — the predecessor accessible edition. Accessed 2026-06-08. *Tier 1 (catalog).* https://www.abebooks.com/9780192818430/French-Revolution-History-Worlds-Classics-0192818430/plp\n11. *The French Revolution: A History* (Modern Library Classics), ed./intro. John D. Rosenberg, ISBN 9780375760228 (2002), Penguin Random House; in print at $18.95 as of early 2026. Accessed 2026-06-08. *Tier 1 (publisher catalog).* https://www.penguinrandomhouse.com/books/24214/the-french-revolution-by-thomas-carlyle/\n12. Modern Library Classics e-book listing, confirming digital availability of the Rosenberg edition. Accessed 2026-06-08. *Tier 1 (retail catalog).* https://www.amazon.com/French-Revolution-History-Library-Classics-ebook/dp/B000XUBDVC\n13. *Thomas Carlyle: The French Revolution: A History*, ed. Mark Cumming, David R. Sorensen, Mark Engel, Brent E. Kinser (Oxford University Press, hardcover, ISBN 9780198809159, 2019). Publisher statement: \"the first time… published in a comprehensive scholarly form.\" Accessed 2026-06-08. *Tier 1 (publisher catalog).* https://global.oup.com/academic/product/thomas-carlyle-the-french-revolution-9780198809159 ; https://us.amazon.com/Thomas-Carlyle-French-Revolution-History/dp/0198809158\n14. The Norman and Charlotte Strouse Edition of the Writings of Thomas Carlyle, University of California Press series page — volume list (1993–2026), showing NO dedicated *French Revolution* volume; general editors include Chris R. Vanden Bossche and Paul E. Kerry. Accessed 2026-06-08. *Tier 1 (publisher catalog).* https://www.ucpress.edu/series/the-norman-and-charlotte-strouse-edition-of-the-writings-of-thomas-carlyle\n15. Strouse Edition *Latter-Day Pamphlets*, Parts I & II (eds. Vanden Bossche, Mark A. Allison), scheduled 2026 — illustrating the edition's ongoing late-Carlyle coverage. Accessed 2026-06-08. *Tier 1 (publisher catalog).* https://www.ucpress.edu/books/latter-day-pamphlets-part-i/pdf\n16. *The French Revolution: A History*, Project Gutenberg ebook #1301 — full free public-domain text. Accessed 2026-06-08. *Tier 1 (primary text host).* https://gutenberg.org/ebooks/1301\n17. *Carlyle Letters Online* (CLO), Duke University Press / Western Carolina University, based on the Duke-Edinburgh *Collected Letters of Thomas and Jane Welsh Carlyle*. Open access since 2006 debut; encoding of 30+ volumes; further CLO-only volume planned 2024. Accessed 2026-06-08. *Tier 1 (scholarly digital edition).* https://carlyleletters.dukeupress.edu/ ; https://carlyleletters.dukeupress.edu/about-project\n18. \"Open Access: The Carlyle Letters Online,\" Duke University Press News (2017). Confirms continued open-access status. Accessed 2026-06-08. *Tier 5 (publisher news / Tier 1 for the access fact).* https://dukeupress.wordpress.com/2017/03/07/open-access-the-carlyle-letters-online/\n19. Simon Schama, *Citizens: A Chronicle of the French Revolution* (Knopf, 1989), with reference summaries describing it as reviving \"the epic narratives employed by historians like Carlyle.\" Accessed 2026-06-08. *Tier 1 (the book) + Tier 5 (reviews/summaries).* https://en.wikipedia.org/wiki/Citizens:_A_Chronicle_of_the_French_Revolution ; https://alphahistory.com/frenchrevolution/historian-simon-schama/\n20. \"Never the Same Again: On Some Recent Interpretations of the French Revolution,\" *Annales: Histoire, Sciences Sociales* (English ed.), Cambridge Core — on Tackett (*The Coming of the Terror*, 2015), Israel (*Revolutionary Ideas*, 2014), and Burstin (*Révolutionnaires*); evidence of the structural/emotions/intellectual turns that displace Carlylean narrative as authority. Accessed 2026-06-08. *Tier 2 (peer-reviewed).* https://www.cambridge.org/core/journals/annales-histoire-sciences-sociales-english-edition/article/never-the-same-again-on-some-recent-interpretations-of-the-french-revolution/BD4ED305B36CB90A45D20BB95192A8B1\n21. \"Great man theory\" — overview sources including EBSCO Research Starters, ScienceDirect Topics, and a heterodox \"In defence of the Great Man Theory\" essay (The Common Reader); includes David R. Sorensen's note on the modern decline of Carlyle's theory and of \"heroic distinction.\" Accessed 2026-06-08. *Tiers 2–6 mixed; the Sorensen attribution and the agency-revival framing noted as such.* https://www.ebsco.com/research-starters/religion-and-philosophy/great-man-theory ; https://www.commonreader.co.uk/p/in-defence-of-the-great-man-theory\n22. Fred Kaplan, *Thomas Carlyle: A Biography* (Cornell University Press, 1983) — Pulitzer Prize and National Book Critics Circle Award finalist; long the standard scholarly biography. Accessed 2026-06-08. *Tier 2 (university-press biography).* https://www.fredkaplanbiographer.com/thomas-carlyle-a-biography.html\n23. Simon Heffer, *Moral Desperado: A Life of Thomas Carlyle* (Weidenfeld & Nicolson, 1995); title from Mill's \"moral desperado\" characterization; a rehabilitative-leaning popular biography. Accessed 2026-06-08. *Tier 4/5 (trade biography by a journalist; note Heffer's conservative lean).* https://www.publishersweekly.com/9780297815648\n24. \"The Voracious Pen of Thomas Carlyle,\" National Endowment for the Humanities (Humanities magazine, March/April 2009); and *The Works of Thomas Carlyle* (Cambridge UP) — evidence of the active scholarly apparatus (editions, *Carlyle Studies Annual*) and the \"innovator and survivor\" reassessment framing. Accessed 2026-06-08. *Tier 5 (NEH) / Tier 1–2 (Cambridge edition).* https://www.neh.gov/humanities/2009/marchapril/feature/the-voracious-pen-thomas-carlyle ; https://www.cambridge.org/core/books/works-of-thomas-carlyle/A8D1754BD2126B985D8F21F26FCCBB81"}, {"order": 9, "file": "Future_Trajectory.md", "title": "Future Trajectory: Reputation and Use through ~2040", "summary": "", "body": "# Future Trajectory: The Reputation and Use of Carlyle's *The French Revolution* through ~2040\n\n> **Bottom line.** The most probable future for *The French Revolution: A History* is not revival and not disappearance but **stable niche survival** — a perennially in-print literary classic *about* history, freshly anchored by its first comprehensive scholarly edition (Oxford, 2019), free online forever, named as the ancestor of vivid narrative history, taught in a small Victorian-studies / history-of-historiography niche, and read whole by relatively few. The single largest swing factor is whether the \"two Carlyles\" insulation — which quarantines the early radical masterpiece from the author's late racism and authoritarianism — holds or collapses under canon-revision pressure. The secondary swing factor is whether a major new biography or a serious new narrative history of the Revolution re-centers Carlyle within the horizon.\n\nThis document builds calibrated, scenario-based forecasts from the drivers established in [08_Trajectory_Of_Reputation.md](08_Trajectory_Of_Reputation.md). Per the discipline of forecasting (not predicting), the aim is a useful probability distribution over plausible futures with the conditions that would shift weight between them — not a single called outcome. Probabilities are ranges; they express calibrated uncertainty, not precision.\n\nA methodological caveat sits over everything below: the automated multi-forecaster panel that normally produces this layer failed mid-run (a tool-compliance error in the research workflow), so these scenarios were reconstructed by the orchestrator from the verified driver base rather than generated by independent forecaster agents. The driver evidence is solid; the scenario weighting is one disciplined reading of it, and a reader should treat the probability bands as indicative.\n\n---\n\n## The Drivers, Arrayed\n\nThe forecast rests on nine drivers, established and sourced in the trajectory workstream. In compressed form:\n\n| Driver | Direction | Strength |\n|---|---|---|\n| Carlyle's racism / authoritarianism (the late writings) | Headwind | Strong |\n| The \"proto-fascist\" charge (hero-worship → fascism) | Headwind | Medium, *qualified* |\n| The \"two Carlyles\" insulation (early radical vs. late reactionary) | Tailwind | Medium, *contested* |\n| In-print + free-digital availability | Tailwind | Strong |\n| The 2019 Oxford scholarly edition | Tailwind | Medium-strong |\n| The narrative-history market (the Schama lineage) | Tailwind (cultural) | Medium |\n| The academic structural turn (history from below, quantitative, cultural) | Headwind | Strong |\n| The \"great man\" debate's oscillation | Ambiguous | Medium |\n| Prospect of a major new biography / narrative history | Ambiguous | Medium |\n\nTwo features of this array matter for the forecast. First, the headwinds and tailwinds do not cancel — they **bifurcate the work's identity**. The tailwinds (availability, the new edition, the narrative-history market) sustain the book as a *cultural and literary* object; the headwinds (the structural turn, the reputational drag) remove it from use as a *historical authority*. The result is not a contested middle but a settled dual identity: a literary classic that historians study rather than trust. Second, the strongest single force is **exogenous to the book** — it is the trajectory of Carlyle's *personal* reputation, driven by his post-1840s writings, that most threatens or protects the 1837 work.\n\nA key, frequently-lost nuance firms up the base case: the most-cited authority for the \"Carlyle → fascism\" genealogy, Ernst Cassirer's *The Myth of the State* (1946), is himself a *qualified* accuser. Cassirer names Carlyle \"the father of the modern myth of the hero\" but writes that \"to charge Carlyle with all the consequences that have been drawn from his theory would be against all the rules of historical objectivity\" (verified against the primary text via secondary quotation, 2026-06-08). The strongest version of the indictment is more cautious than its popular echo — which is part of why total cancellation is a tail risk rather than the base case.\n\n---\n\n## Base Rates\n\nForecasting a 189-year-old book's next 14 years is mostly an exercise in base rates for cultural durability, because the dominant prior is inertia:\n\n- **Canonical-classic persistence.** Works that have stayed continuously in print for ~150+ years and have received a modern critical edition very rarely fall out of print within a subsequent two-decade window. The relevant base rate for \"in print in 2040 given continuously in print since the 19th century and a 2019 critical edition\" is high — well above 90%.\n- **Reputational volatility of the author vs. survival of the single masterwork.** Even authors who suffer severe reputational collapse (the relevant comparison class: Victorian sages whose politics aged badly) typically retain *one* insulated early masterwork in the teaching canon (the \"two X's\" move is common — e.g., the early vs. late split applied across many compromised figures). This supports the insulation tailwind as the modal path.\n- **Niche-text teaching persistence.** A text already taught \"only occasionally\" and mainly in adjacent fields (Victorian literature, history of historiography) rather than its nominal field (French Revolution history) has a *low-volatility* teaching footprint: there is not far to fall, and the niche audiences (sage-writing, narrative-history pedagogy, Carlyle studies) are self-sustaining.\n\nThe base rates push hard toward continuity. The scenarios below essentially distribute probability over *how* that continuity is inflected — recuperated, eroded, or merely sustained.\n\n---\n\n## Scenarios (through ~2040)\n\n### Scenario 1 — Stable Niche Survival *(base case)*\n\n**Probability: 55–65%.** **Time horizon: through 2040.**\n\nThe work persists exactly as it now stands: continuously in print (Oxford World's Classics, Modern Library, public-domain reprints), free on Project Gutenberg, anchored by the 2019 Oxford critical edition, taught in a small but durable niche, and invoked as the named ancestor whenever narrative history is discussed. Carlyle's personal reputation neither recovers nor fully collapses; the \"two Carlyles\" framing holds well enough among specialists to keep the 1837 book on the safe side of the line, while generalist wariness keeps it off broad survey syllabi. Historians continue to cite it for *texture, set-piece, and as a primary document of nineteenth-century historical imagination* — never for cause, social mechanism, or a balanced ledger of the Terror.\n\n- **Drivers:** availability (strong tailwind) + the 2019 edition (anchor) + the settled dual identity (literary classic, not authority) + the low-volatility niche footprint. The headwinds are already priced in; they have done their work and reached equilibrium.\n- **Signals consistent with this path:** the Oxford critical text stays in print; one-line historiographical acknowledgments continue in new Revolution histories; *Carlyle Studies Annual* and the Strouse edition keep a small engine running; no major reputational event.\n- **What would move probability:** a major new biography or narrative history (toward Scenario 2 or 3, depending on tenor); an intensification of canon-revision pressure (toward Scenario 3).\n\n### Scenario 2 — Scholarly Recuperation / Modest Revival\n\n**Probability: 15–22%.** **Time horizon: 2030–2040.**\n\nThe minority recuperative current (Mark Allison's 2022 \"The French Revolution Now,\" and like-minded work) gathers force. The 2019 Oxford edition drives renewed teaching; a serious new narrative history or a widely-reviewed new *Life* of Carlyle re-centers the early radical, crowd-driven Carlyle as distinct from the late reactionary; and a period of personalized, charismatic politics makes the *History* newly legible — but in the *sophisticated* form that recognizes it is the **crowd**, Sansculottism, and impersonal Necessity, not the hero, that drive Carlyle's Revolution. The book is rehabilitated less as accurate history than as a prescient diagnosis of how revolutionary promise curdles into oligarchy (\"the Aristocracy of the Moneybag\") and of the moral meaning of political violence — themes that the Furet/Schama vindication of \"violence as constitutive\" already made respectable.\n\n- **Drivers:** the 2019 edition (precondition) + the recuperative scholarship + a sophisticated \"great man / agency\" revival + the durable narrative-history market.\n- **Signals:** chapter-length engagements with Carlyle in major new histories (not one-liners); a new biography that is taken seriously; the Allison thesis getting cited and built upon; the *History* migrating onto more syllabi as \"the good Carlyle.\"\n- **Risk to the scenario:** a *crude* (polemical rather than scholarly) great-man revival, which would re-tar Carlyle rather than rehabilitate the book — collapsing this path back toward Scenario 1 or into Scenario 3.\n\n### Scenario 3 — Reputational Erosion / Cancellation Drag\n\n**Probability: 15–22%.** **Time horizon: 2028–2040.**\n\nThe \"two Carlyles\" insulation fails. Under sustained canon-revision pressure in English and history departments — acutely attentive to the \"Occasional Discourse on the Negro Question,\" the Eyre affair, and the proto-fascist genealogy — the wholesale rejection of Carlyle drags the early work down with the late. The *History* is quietly dropped from the syllabi where it still appears; new narrative historians cease even the one-line acknowledgment; the book survives essentially as a free public-domain text and as an object of specialist study (now often framed as a case study in a compromised author), not as a living model. Note the asymmetry that bounds this scenario: the *material* base (in print, the 2019 edition, Gutenberg) does not disappear — books do not get un-printed — so \"erosion\" means loss of *status and teaching presence*, not literal unavailability.\n\n- **Drivers:** the racism/authoritarianism headwind (strong) + the structural turn + a hardening of canon politics + the contested, possibly-failing insulation.\n- **Signals:** the Annan-style \"coherentist\" reading (late Caesarism grew from the early radicalism — so no clean split) gaining ground over the \"two Carlyles\" reading; Carlyle dropped from Victorian survey courses; the 2019 edition not reprinted; reviews and reading-group framing foregrounding the author's racism over the book's art.\n- **What would arrest it:** the Cassirer-style qualification reasserting itself (the indictment is more careful than its echo); a strong new defense of the early work's radicalism.\n\n### Scenario 4 — Popular Rediscovery (general-readership revival)\n\n**Probability: 3–6%.** **Time horizon: through 2040.**\n\nA genuine broad-readership revival — the difficult original (not just its reputation) read widely outside the academy. This is the low-probability tail. Two structural barriers make it unlikely: the sheer stylistic difficulty of \"Carlylese\" for non-specialist twenty-first-century readers, and the reputational drag that discourages mainstream promotion. A catalyzing event (a prestige screen adaptation of the Revolution citing Carlyle, a breakout popular-history bestseller built explicitly on him, a viral cultural moment) could trigger it, but the transmission mechanism for *this specific, hard text* is weak even when the narrative-history *genre* thrives. The genre's popularity tends to send new readers to Schama, not to Carlyle.\n\n---\n\n## Prediction-Market Snapshot\n\nNo liquid prediction markets exist for the reputation or readership of a nineteenth-century history book; Polymarket, Kalshi, Manifold, and Metaculus carry nothing relevant. This is expected for a cultural-durability question on a long horizon and is not a gap in the research — there is simply no market to price. The forecast therefore rests on base rates and driver analysis alone, which is the appropriate method for slow-moving cultural-status questions.\n\n---\n\n## Forecast-Change Triggers (what would make me revise)\n\n- **A major new biography of Carlyle** (none signaled as imminent in 2026; a generation has passed since Kaplan 1983 / Heffer 1995, so one is plausible within the horizon). Tenor decides direction: sympathetic → Scenario 2; prosecutorial → Scenario 3.\n- **A landmark new narrative history of the Revolution** that engages Carlyle substantively (chapter-length, not a one-liner) → Scenario 2; one that pointedly ignores or repudiates him → Scenario 3.\n- **A commissioned Strouse (California) edition of *The French Revolution*** — currently conspicuously absent — would signal redundant scholarly investment and firm up the tailwind.\n- **Quantitative syllabus data** (e.g., Open Syllabus Project) showing the work *rising* or *falling* on reading lists — currently the single biggest evidentiary gap (the \"only occasionally taught\" claim is impressionistic).\n- **The resolution (or sharpening) of the \"great man\" debate** toward a sophisticated, agency-with-structure synthesis (helps the crowd-driven *History*) versus a crude strongman-worship revival (hurts it).\n- **A shift in the insulation consensus** — the Annan coherentist reading displacing the \"two Carlyles\" reading among specialists would be a leading indicator for Scenario 3.\n\n---\n\n## Open Questions\n\n1. Does a current **Penguin Classics** edition exist distinct from the Penguin-distributed Modern Library edition? (Affects the strength of the availability tailwind.)\n2. Is there any **generational-reception** evidence (Goodreads/BookTok/reading-group activity) for how 2020s readers actually encounter this difficult text? The narrative-history tailwind assumes a transmission mechanism unverified for *this* work.\n3. Will the academy's canon politics around compromised authors **harden or soften** over the horizon — the master variable behind Scenarios 2 vs. 3?\n\n## Sources\n\nThe factual base for this forecast is the fully-sourced [08_Trajectory_Of_Reputation.md](08_Trajectory_Of_Reputation.md) (24 sources, tier-tagged), supplemented by the historiographical assessment in [07_Historiographical_Place_And_Modern_Assessment.md](07_Historiographical_Place_And_Modern_Assessment.md). Key load-bearing items — the 2019 Oxford critical edition (publisher catalog, Tier 1), the in-print trade editions (publisher/retail catalogs, Tier 1), Cassirer's qualified indictment (*The Myth of the State*, 1946, Tier 1 via verified secondary quotation), Schama's *Citizens* as the narrative-history revival (Tier 1 + reviews), and Allison's 2022 recuperative essay (*Victorian Literature and Culture*, Tier 2) — are annotated in [Sources.md](Sources.md). No prediction-market or quantitative-readership data was available; the forecast is base-rate-and-driver-based and the scenario weighting is explicitly the orchestrator's calibrated reading, not an independent panel output."}, {"order": 10, "file": "Key_Claims.md", "title": "Key Claims & Facts Repository", "summary": "", "body": "# Key Claims & Facts Repository\n\nThis is the single atomized repository for the corpus. Each claim carries an ID (`workstream.n`), a type (*established* / *contested* / *inference*), a source tier, a back-pointer to its narrative document, and a **verification status**. The narrative documents read as prose; the structured assertions live here.\n\n**On verification.** The research workflow's automated adversarial-verification panel failed mid-run (a tool-compliance error), so the corpus did not receive the full N-skeptic refutation pass. In its place: (a) every workstream agent self-flagged single-source and contested claims during Round 1, which is preserved below; (b) the orchestrator ran a **targeted manual verification** of the highest-stakes, legend-prone claims via independent web search. Status values:\n- **verified** — independently corroborated by the orchestrator's manual check (web search, 2026-06-08), in addition to the workstream's sourcing.\n- **corroborated** — multiple independent Tier 1–4 sources in the workstream; not separately re-checked but well-supported.\n- **contested** — sources genuinely disagree, or the claim is an interpretive crux; presented with both sides.\n- **single-source** — rests on one source or one relay; flagged for primary corroboration before load-bearing use.\n- **inference** — the corpus's own reasoning from the evidence, marked as such.\n\n---\n\n## A. Composition & Biography *(→ [01](01_Composition_And_Biography.md))*\n\n### Claim 1.1 — The commission via Mill\nJ. S. Mill, contracted to write a history of the Revolution and unable to deliver, handed the project to Carlyle in 1834 and lent him a working library of books and pamphlets on the Revolution. *Type: established. Tier 2–5. Status: corroborated.*\n\n### Claim 1.2 — The burned manuscript (the fact)\nA complete draft of Volume I (\"The Bastille\") was destroyed by fire while in Mill's keeping, ~6 March 1835; only a few charred leaves survived. *Type: established. Tier 2–5 (Reminiscences, Froude, letters). Status: corroborated (the fact is secure).*\n\n### Claim 1.3 — The burned manuscript (the agency)\nThe standard account — an illiterate maid at Harriet Taylor's house used the papers as a firelighter — derives almost entirely from Mill's confe
