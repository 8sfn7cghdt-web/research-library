<script id="corpus-data" type="application/json">{"slug": "carlyle-french-revolution-research", "title": "Carlyle French Revolution", "subtitle": "", "author": "", "generated": "", "documents": [{"order": 0, "file": "00_Briefing.md", "title": "Briefing", "summary": "", "body": "# Thomas Carlyle's *The French Revolution: A History* (1837)\n### A Deep-Research Briefing\n\n> **Bottom line.** Carlyle's *The French Revolution* is the most stylistically extreme major history in the English language, and it survives precisely because it was never really a conventional history at all. It is a **prose-epic** — a work of prophetic argument disguised as narration — built out of the King James Bible, Homer, Milton, Dante, and Shakespeare, narrated in a hallucinatory present tense, and organized around a single thesis: that **revolution is the violent return of Reality after an age of Shams**, the divine judgment that falls when a society's kings, priests, and forms have rotted into hollow \"Paper.\" Written under extraordinary duress — the first volume was accidentally burned and rewritten from memory — it made Carlyle's reputation overnight when John Stuart Mill, whose household had destroyed the manuscript, reviewed it as \"not so much a history, as an epic poem; and notwithstanding, or even in consequence of this, the truest of histories.\" That double verdict has organized two centuries of judgment. The modern professional consensus is stable and blunt: **unreliable as analysis, unmatched as narrative art** — read it for the texture and the moral seriousness, never for cause, social mechanism, or a balanced ledger of the Terror. Its deepest afterlife is Dickens's *A Tale of Two Cities*, which borrows its chronology and imagery while pointedly reversing its theodicy of violence.\n\n---\n\n## How to read this corpus\n\nThe eight pillar documents go deep on distinct facets; this briefing is the map. The fastest useful path is below in [Where to go next](#where-to-go-next). The corpus is built to be read as connected prose; the atomized, ID-addressable claims live in [Key_Claims.md](Key_Claims.md), and every source is tier-rated and annotated in [Sources.md](Sources.md).\n\n---\n\n## 1. Origins: a book written twice\n\nCarlyle did not seek the subject; it came to him through John Stuart Mill. Mill, contracted to write a history of the Revolution and unable to deliver, handed the project to Carlyle in 1834 along with a substantial loan of books — so the *History*'s documentary depth is in part Mill's learning, redirected through Carlyle's imagination. Carlyle began composing in September 1834 at 5 Cheyne Row, Chelsea, the house he had just gambled his slender means to move to from the isolation of Craigenputtock.\n\nThen the famous catastrophe. Carlyle finished a complete draft of Volume I (\"The Bastille\") in early 1835 and lent the only fair copy to Mill. On the evening of **6 March 1835** Mill arrived \"the very picture of desperation\" to confess that the manuscript had been burned — by the account that has come down to us, an illiterate servant at the house of Mill's intimate friend Harriet Taylor took the loose papers for waste and used them to light a fire, leaving \"some four tattered leaves.\" Carlyle's outward composure (\"Mill, poor fellow, is terribly cut up. We must endeavour to hide from him how very serious this business is for us\") became one of the most celebrated anecdotes in Victorian literary biography, even as his private letters register real anguish (\"the miserablest accident… of my whole life\"). He accepted only about £100 of the £200 Mill pressed on him, and rewrote the lost volume from memory, refusing to lean on his old abstracts so the new version would come — in the phrase he gave his wife Jane on finishing — \"direct and flamingly from the heart of a living man.\"\n\nA point of discipline the corpus insists on: the *fact* of the burning is secure, but the **agency** — which person, in whose house, through what carelessness — rests almost entirely on the testimony of the party at fault (Mill) and the injured party (Carlyle). The \"illiterate maid\" detail should be reported as the traditional account, not as independently verified fact. The whole work was completed on **12 January 1837** and published by James Fraser in the spring (most accounts say May) of 1837, in a first edition of about 1,000 copies. *[See [01_Composition_And_Biography.md](01_Composition_And_Biography.md).]*\n\n## 2. The method: poetry in the service of fact\n\nThe paradox the scholarship keeps resolving is that a book written by the rules of prophecy turns out, on inspection, to be broadly reliable as to its facts. Carlyle built the *History* on an unusually wide documentary base — above all the forty-volume *Histoire parlementaire* of Buchez and Roux (a portable archive of speeches, decrees, and proceedings appearing in real time as he wrote), a deep stratum of eyewitness memoir (Madame Roland, Bertrand de Moleville, Bailly, Dumont on Mirabeau), the *Moniteur*, and the earlier narrative historians (Thiers, Mignet) whom he mined for chronology while despising their cause-and-effect \"Philosophy.\" His method was theorized in advance, in the essays \"On History\" (1830) and \"On History Again\" (1833): history is \"the essence of innumerable Biographies\"; \"Narrative is *linear*, Action is *solid*\"; the historian can only thread \"single lines of a few ells in length\" through the \"ever-living, ever-working Chaos of Being.\" The practical upshot was an obsessive hunt for the concrete, dated, eyewitness particular, welded into vivid scene, with imaginative gap-filling confined largely to atmosphere and (usually flagged) conjecture. The consensus from Mill through Rosenberg, Ben-Israel, and Cumming is that the book is *superseded as analysis but not discredited as fact*; where it errs, the error is usually inherited from a credulous source (the *Histoire de deux amis de la liberté*) or a matter of sympathy and emphasis rather than invention. *[See [02_Sources_And_Method.md](02_Sources_And_Method.md).]*\n\n## 3. The style: \"Carlylese\" and the camera-eye\n\nThe style is not ornament; it is argument. The broken, exclamatory, inverted, German-inflected idiom contemporaries christened **\"Carlylese\"** — capitalized abstractions personified into agents (Sansculottism, Necessity, the Guillotine), choking compound coinages (\"Fire-Mahlstrom,\" \"World-Phoenix\"), the archaic second-person \"thou\" addressed to the dead — was first forged in *Sartor Resartus* and here deployed at epic scale. Two techniques carry the book. The sustained **historical present** abolishes the distance between reader and event, keeping the Revolution a still-undecided process (\"Bursts forth insurrection… The Bastille is besieged!\"). And a **montage** of rapid cuts between panoramic wide shot and individual close-up that modern critics compare directly to Eisenstein — proto-cinematic decades before film. Over it all stands a **prophet-preacher narrator** who rebukes, blesses, and apostrophizes the dead in King James cadence. Thackeray's hostile-admiring \"prose run mad\" and Mill's \"epic poem… the truest of histories\" are the same observation read as debit and credit — and the double verdict is permanent. *[See [03_Style_And_Form.md](03_Style_And_Form.md).]*\n\n## 4. The allusive engine: how the book is built out of older texts\n\n> *This was the dimension the corpus was commissioned to weight most heavily, and it is the richest document of the eight.*\n\nMost histories use allusion to decorate; Carlyle uses it to *constitute* his subject. The proof is compositional and unusually firm: before writing, in early 1834, he read the *Iliad* in Greek and told Mill the right history of the Revolution would be \"the grand Poem of our Time,\" asking whether \"true History\" might be \"the only possible Epic.\" On almost any page two or three older texts speak at once. The deepest layer is the **King James Bible**, the residue of his Calvinist Annandale upbringing: the Revolution is staged as the Last Judgment, the wrath-cup of Isaiah and Revelation poured out on a guilty order (\"a cup of trembling which all the nations shall drink\"), Sansculottism a scriptural fire and whirlwind. **Milton** supplies the architecture of hell — chaos, \"old Night,\" Pandemonium for the assemblies, Satanic-Titanic grandeur for Mirabeau and Danton. **Dante** surfaces as the most textually secure allusion after the Bible: Marie-Antoinette's trial becomes \"the pale kingdoms of Dis… encircled, nine times, with Styx and Lethe, with Fire-Phlegethon and Cocytus named of Lamentation.\" **Shakespeare** gives the tragic three-act architecture (*Bastille / Constitution / Guillotine*) and the *Macbeth* matrix of blood and regicide (\"the Crack of Doom\" — at once biblical and *Macbeth* IV.i). **Goethe** and German Romanticism give the symbol-and-clothes philosophy (institutions as worn-out garments) and the Phoenix/*palingenesia* death-rebirth myth; the **classics** give Homeric epic machinery and Greek-tragic Nemesis as the pagan twin of Calvinist Providence. The corpus leaves one question deliberately open and unsettled: whether this borrowed sacred-cosmic grandeur **illuminates** the Revolution (registering its felt enormity) or **distorts** it (translating contingent politics into Manichaean fire and fated doom). The honest answer is that it does both, and that the allusions are not a layer you can strip off to find the \"real\" history underneath — they *are* Carlyle's history. *[See [04_Allusion_And_Intertextuality.md](04_Allusion_And_Intertextuality.md).]*\n\n## 5. The argument: Sham, Reality, and the Death-Birth of a World\n\nBeneath the narrative is a theory. Revolution erupts when a society's governing forms have ceased to correspond to any living reality — when monarchy, church, and law have become mere **Shams**, \"Paper\" and \"Formula\" with no fact behind them — and the suppressed Reality bursts up as elemental force. Carlyle names that force **Sansculottism** and reads it not as a faction but as \"the Death-Birth of a World,\" figured through fire, phoenix, and apocalypse: simultaneously destruction, judgment, and (terrible, unwilled) renewal. The frame is providential in the Scottish-Calvinist mode — the Revolution as the working-out of \"the Eternal Justice,\" a divine verdict on aristocratic and clerical Imposture, which is why Carlyle sided unambiguously with 1789 against the old order even as he recoiled from Robespierre and the Terror. Two tensions run through the book and have driven the scholarship for 150 years. The first is **determinism vs. heroism**: the Revolution is both an inevitable necessity *and* something a great man — a Mirabeau, who held France \"toppling there, still unfallen\" with \"his single hand\" — might have steered; the embryonic \"great man\" reading of the later *On Heroes* (1841) is present in seed but checked by the impersonal force of the crowd. The second is the **proto-fascism charge**: the doctrine of righteous, regenerative violence supplies materials a fascist reading can use, but the charge rests far more on the *later* Carlyle than on the 1837 book, whose dominant energy most current scholarship reads as radical-progressive. What the book conspicuously lacks is economic, social-structural, or ideological-causal analysis — the very questions later historiography would be built on. *[See [05_Argument_And_Themes.md](05_Argument_And_Themes.md).]*\n\n## 6. Reception and influence: Mill, Dickens, and the making of a sage\n\nOne review made the book. Mill's anonymous notice in the *London and Westminster Review* (July 1837), two months after publication, recast the alienating qualities as genius and converted Carlyle, at forty-one, from near-destitute eccentric into public prophet; Carlyle wrote to him, \"You have said openly of my poor Book what I durst not myself dream of it.\" Thackeray (in *The Times*) and Southey (who reportedly read it six times) joined the chorus; Emerson organized the American edition and Carlyle's first real income. The most consequential nineteenth-century debt is **Dickens's *A Tale of Two Cities* (1859)**, which is saturated with the *History* — its chronology, its fire-and-flood imagery, the spilled-wine-read-as-blood, the knitting Fates. But the corpus is careful with the legend: the famous \"read it 500 times\" is **Dickens's own jocular hyperbole**, not a measured fact, while the \"cartloads of books\" Carlyle had the London Library send him in 1859 is well documented. And Dickens *diverges* decisively: he absorbs Carlyle's providential grammar but cannot bless revolutionary violence, displacing redemption onto the private, Christian plane of Carton's sacrifice. The same book that built \"Carlyle the prophet\" — and shaped Ruskin and a generation of \"sage-writing\" — also seeded the later reaction, which detonated posthumously when Froude's candid biography (1882–84) exposed the private man. *[See [06_Reception_And_Influence.md](06_Reception_And_Influence.md).]*\n\n## 7. Historiographical place: belonging to no school that won\n\nThe *History* occupies a durable position precisely because it belongs to no school that subsequently triumphed. It is not Whig-progressive (Carlyle scorned the liberal-constitutional teleology of Thiers and Mignet), not Marxist-social (Mathiez, Lefebvre, Soboul — there is no class analysis, no economic substructure), and not Furet-revisionist (no analytical, discourse-theory method). It is *sui generis* — the leading English instance of the **Romantic, providential, narrative-epic** mode, alongside its great French rival Jules Michelet, who made \"the People\" the collective hero and who dismissed Carlyle's book in 1868 as \"a wretched work… devoid of study… full of false flights\" (a striking datum, but one resting on a single Tier-5 relay and flagged for primary corroboration). The professional verdict has barely moved across the twentieth century: unreliable as analysis, valuable as art and as a still-quotable evocation of the Revolution's texture, and as a primary document of *how the Romantic age read the Revolution*. The clearest proof the mode never died is **Simon Schama's *Citizens* (1989)** — an explicit return to vivid, event-driven narrative and to a Carlyle-like horror at revolutionary violence, drawing the same \"you can't have a narrative and make an argument\" attacks that were leveled at Carlyle. Hayden White's *Metahistory* (1973) supplies the theoretical defense: *all* history is emplotted, so Carlyle merely did openly what others do covertly. *[See [07_Historiographical_Place_And_Modern_Assessment.md](07_Historiographical_Place_And_Modern_Assessment.md).]*\n\n---\n\n## The forecast: where the reputation goes (through ~2040)\n\nThe work enters the late 2020s in a paradox: Carlyle the **man** has suffered one of the sharpest reputational collapses of any major Victorian (the \"Occasional Discourse on the Negro Question,\" the Eyre affair, the proto-fascist genealogy), while *The French Revolution* — the early, radical, pre-reactionary masterpiece — is partly **insulated** from that collapse. The drivers do not cancel; they bifurcate the book's identity into a *literary classic that historians study rather than trust*. The most probable future is therefore continuity, distributed over how it is inflected:\n\n| Scenario | Probability | Shape |\n|---|---|---|\n| **Stable niche survival** *(base case)* | **55–65%** | In print, freshly edited (Oxford 2019), free online, taught in a Victorian-studies / historiography niche, named ancestor of narrative history — read whole by few. |\n| **Scholarly recuperation / modest revival** | **15–22%** | The \"two Carlyles\" reading + a new biography or major narrative history re-center the early radical, crowd-driven Carlyle as \"the good Carlyle.\" |\n| **Reputational erosion / cancellation drag** | **15–22%** | The insulation fails; wholesale rejection of the author drags the book off syllabi. Material availability persists; *status* erodes. |\n| **Popular rediscovery** | **3–6%** | The difficult original read widely outside the academy. Low: the style barrier and reputational drag send new readers to Schama, not Carlyle. |\n\nThe single biggest swing factor is whether the \"two Carlyles\" insulation holds; the secondary one is whether a major new biography or narrative history re-centers him. No liquid prediction markets exist for a question like this; the forecast is base-rate-and-driver-based. *[Full scenarios, triggers, and signals in [Future_Trajectory.md](Future_Trajectory.md) and the driver base in [08_Trajectory_Of_Reputation.md](08_Trajectory_Of_Reputation.md).]*\n\n---\n\n## The fault lines (what is genuinely contested)\n\nA briefing that smoothed these over would be lying. The live disagreements:\n\n- **Illuminate or distort?** Whether Carlyle's biblical-epic grandeur registers the Revolution's true enormity or systematically over-writes contingent politics with cosmic, Manichaean doom. *Unsettled, and the corpus does not adjudicate it.*\n- **Heroism or the crowd?** Whether the *History* is the seed of \"great man\" theory (Mirabeau, Napoleon) or, as recent scholarship argues, a fundamentally *collective* drama in which Sansculottism is the real protagonist and leaders are figureheads. The 1837 text genuinely pulls both ways.\n- **Proto-fascist or radical?** A defensible reading of the doctrine's logical tendency and its *later* development — but an overreading of the 1837 text. Even Cassirer, the locus classicus of the charge, declines to hold Carlyle responsible for \"all the consequences… drawn from his theory.\"\n- **What is history for?** The dismissive (\"magnificent writer, negligible historian\") and recuperative (\"a different *kind* of argument, vindicated by White, Furet, and Schama\") cases disagree less about the facts — everyone grants the book is empirically weak and rhetorically overwhelming — than about the purpose of history-writing itself. That is a values disagreement, not resolvable by evidence.\n\n---\n\n## Where to go next\n\n- **5 minutes:** this briefing.\n- **The one thing the user asked for:** [04_Allusion_And_Intertextuality.md](04_Allusion_And_Intertextuality.md) — the Bible/Milton/Shakespeare/Dante/Goethe/classics layer, with quoted set-pieces.\n- **30 minutes:** this briefing → [05_Argument_And_Themes.md](05_Argument_And_Themes.md) (what it argues) → [03_Style_And_Form.md](03_Style_And_Form.md) (how it sounds) → [Future_Trajectory.md](Future_Trajectory.md).\n- **The story of the book:** [01_Composition_And_Biography.md](01_Composition_And_Biography.md) (the burning) → [06_Reception_And_Influence.md](06_Reception_And_Influence.md) (Mill, Dickens).\n- **For historians:** [02_Sources_And_Method.md](02_Sources_And_Method.md) → [07_Historiographical_Place_And_Modern_Assessment.md](07_Historiographical_Place_And_Modern_Assessment.md).\n- **Every atomic claim, with verification status:** [Key_Claims.md](Key_Claims.md). **Every source, tier-rated:** [Sources.md](Sources.md)."}, {"order": 1, "file": "01_Composition_And_Biography.md", "title": "Composition History and Biographical Context", "summary": "", "body": "# Composition History and Biographical Context of *The French Revolution: A History* (1837)\n\n## Bottom Line\n\nThomas Carlyle's *The French Revolution: A History* was written between 1834 and 1837 at 5 Cheyne Row, Chelsea, the London house the Carlyles moved into on 10 June 1834 after giving up the isolation of Craigenputtock. The project came to Carlyle by way of John Stuart Mill, who had contracted to write such a history, could not deliver, and instead pressed it — together with a substantial loan of books and source material on the Revolution — onto Carlyle in 1834. Carlyle finished a complete draft of Volume I (\"The Bastille\") early in 1835 and lent the only fair copy to Mill. On the evening of 6 March 1835 Mill arrived \"the very picture of desperation\" to confess that the manuscript had been destroyed by fire — by the account that comes down to us, an illiterate servant at the house of Mill's intimate friend Harriet Taylor had taken the papers for waste and used them to light a fire, leaving only a few charred leaves. The episode's finer details (whether the maid, Mill's own carelessness, or the Taylor household was chiefly to blame) are genuinely uncertain, since nearly all our knowledge of the burning derives from Mill's confession and Carlyle's later recollections rather than independent witnesses. Carlyle's public composure — concealing his despair, comforting Mill, and accepting only £100 of the £200 Mill pressed on him — became one of the most celebrated anecdotes in Victorian literary biography, even as his private letters and journals register real anguish. He rewrote the lost volume from memory, refused to lean on his old abstracts, and produced a book he believed came \"direct and flamingly from the heart.\" It was published by James Fraser in three volumes in 1837 in a first edition of about 1,000 copies; the immediate critical reception (Mill, Thackeray, Southey, Emerson) made Carlyle's reputation, even as sales were initially slow. The standard sources are Carlyle's own *Reminiscences*, the *Collected Letters of Thomas and Jane Welsh Carlyle* (the Duke–Edinburgh edition, online at carlyleletters.org), Mill's *Autobiography*, J. A. Froude's authorized *Life*, and modern biographies by Fred Kaplan, Simon Heffer, Rosemary Ashton, and Ian Campbell.\n\n---\n\n## 1. The Commission: How the Project Reached Carlyle (1834)\n\n### 1.1 Mill's undelivered contract\n\nBy the early 1830s John Stuart Mill — philosopher, political economist, and editor — had himself become deeply absorbed in the history of the French Revolution, a subject he treated as a living political and moral problem rather than a closed historical episode. Mill had effectively committed to producing a general history of the Revolution but found himself unable to write it: he was overburdened with editorial work at the *London and Westminster Review*, with his India House duties, and with other commitments [1][2]. Rather than let the project die, Mill turned it over to his friend Carlyle, whom he had been encouraging and (in some accounts) offering to subsidize [2].\n\nThe transfer was not merely a casual suggestion. Mill, who had assembled a working library on the Revolution, lent Carlyle that collection of books and pamphlets — the raw documentary material the history would be built on. As one summary of Carlyle's working life puts it, \"Mill also handed over the library of books and pamphlets he had collected\" [3]. The Liberty Fund account of the Mill–Carlyle friendship states plainly that Mill \"support[ed] this endeavor by loaning Carlyle many of his books,\" both men sharing an interest in French history [2].\n\n### 1.2 Why the subject suited Carlyle\n\nThe Revolution was, for Carlyle, exactly the kind of subject his temperament demanded: a vast convulsion in which Providence, sham, and reality collided. He had already been moving toward history and toward the \"condition of England\" questions that the Revolution dramatized. By the autumn of 1834, after the move to Chelsea, Carlyle had arranged for the work's publication and was reading and writing furiously [4][5]. He began composition in September 1834 [3][6].\n\nIt is worth noting the ambiguity in the word \"commission.\" This was not a publisher's advance to Carlyle in the modern sense; it was an inherited project plus a lent library. The contractual chain ran through Mill's prior arrangement, and the financial reward to Carlyle would ultimately come from James Fraser's 1837 publication, not from any payment at the outset.\n\n---\n\n## 2. The Burned Manuscript (March 1835)\n\n### 2.1 What was destroyed\n\nCarlyle finished a complete draft of the first volume — the part that would be published as \"The Bastille\" — early in 1835, and lent the only complete fair copy to Mill for comment [1][6][7]. This was Carlyle's habitual and dangerous practice: he kept no backup, made no duplicate, and (crucially) did not retain a usable set of working drafts, having destroyed or burned material he found wanting as he went [3][8]. As one account of his method records, \"There were no drafts or backup copies from which to work. He didn't take notes\" — an overstatement (he had abstracts and reading notes) but accurate as to the fair-copy manuscript itself [3].\n\n### 2.2 The evening of 6 March 1835\n\nOn the evening of 6 March 1835, Mill appeared at Cheyne Row \"the very picture of desperation\" — Carlyle's own later phrase [6][7]. Mill confessed that the manuscript had been destroyed by fire. By the account that has come down through Carlyle and his circle, Mill had left or read the manuscript at the house of his friend Harriet Taylor (Mrs. Taylor), and a servant there, unable to read, had taken the loose papers for waste and used them to kindle a fire [6][7][9]. All that survived were a few charred leaves — \"some four tattered leaves,\" in the phrasing Mill used [1][3].\n\nCarlyle's first words to his wife Jane Welsh Carlyle, after Mill had left, are among the most quoted in Victorian literary anecdote: \"Mill, poor fellow, is terribly cut up. We must endeavour to hide from him how very serious this business is for us\" [6][7]. The remark captures the dominant feature of the story as it has been transmitted: Carlyle's outward magnanimity, his concern to spare Mill's feelings, set against the private catastrophe the loss represented for a writer with no income and a finished volume gone.\n\n### 2.3 The compensation\n\nMill, stricken with guilt, insisted on compensating Carlyle for the loss of time and labour. The figure that recurs across sources is that Mill offered £200, of which Carlyle — after \"fierce entreaties\" — would accept only about half, roughly £100 [2][9][10]. Carlyle is reported to have at first refused entirely, intending simply to begin again, but to have accepted the partial sum the following morning, using it to buy paper and restart [9][11]. (A related figure appears in the publishing record: Fraser ultimately paid Carlyle about £110 plus presentation copies on the first edition [12] — a sum in the same range, sometimes conflated in loose retellings with the Mill compensation; they are distinct.)\n\n### 2.4 Disputed details — who actually burned it, and how sure are we?\n\nThis is the point at which the workstream's mandate to \"distinguish established fact from oft-repeated legend\" matters most. The following are established with reasonable confidence:\n\n- A complete draft of Volume I was destroyed by fire while in Mill's keeping, in early March 1835 [1][6][7].\n- Mill came in person to confess, was distraught, and pressed compensation on Carlyle [2][6][9].\n- Carlyle responded with notable composure in front of Mill and rewrote the volume [1][6][9].\n\nThe following are **uncertain or contested**:\n\n- **The \"illiterate maid as firelighter\" story.** This is the standard account, but it is reported *by Mill and through Carlyle's circle* rather than by an independent witness; it became the canonical version and is repeated in Froude, in the *Harvard Classics* introductory note, and in nearly every retelling since [1][6][7]. The Wikipedia summary itself flags that the manuscript was destroyed \"according to Mill, by a careless household maid\" [1] — the qualification \"according to Mill\" is doing real work.\n- **The Harriet (Mrs.) Taylor dimension.** Several accounts place the manuscript at the house of Mrs. Taylor, Mill's married intimate friend, and note that Carlyle suspected her involvement, partly because Mill had been reading the manuscript to her [6][13]. Carlyle later declined Mill's suggestion that Taylor safekeep portions of the next volume — both because he distrusted the arrangement and because he disapproved of Mill's relationship with the married Taylor [13]. How much Taylor's household, as opposed to a single servant, bears on the accident is not independently establishable.\n- **Mill's own carelessness vs. the servant.** Whether the true cause was a servant's error or Mill's own negligence in handling and storing a unique manuscript is something the surviving evidence cannot finally settle. The \"maid\" explanation is the one Mill gave and the one that has stuck; it conveniently locates the fault below the level of either gentleman.\n\nThe honest scholarly position is that the *fact* of the burning is secure, the *agency* (which person, in whose house, through what specific carelessness) rests almost entirely on the testimony of the party at fault and the injured party, and the \"illiterate maid\" detail should be reported as the traditional account rather than as independently verified fact.\n\n### 2.5 Carlyle's private despair\n\nThe composure Carlyle showed Mill was a performance of generosity over real distress. His contemporaneous letter to his publisher James Fraser opens: \"The miserablest accident (as we name such things) of my whole life has just befallen me\" — Volume I destroyed save for a few leaves [14]. In later recollection Carlyle dwelt on the peculiar helplessness of the loss: \"I remember and can still remember less of it than of anything I ever wrote with such toil. It is gone\" [6]. He compared himself to a schoolboy whose master had torn up his copy-book: \"I was as a little Schoolboy, who had laboriously written out his Copy as he could, and was showing it not without satisfaction to the Master: but the Master had suddenly torn it, saying: 'No, boy! thou must go and write it better'\" [3].\n\nThe \"sick dog\" register — Carlyle's recurrent self-description in periods of misery, and a phrase associated with his bouts of despair and dyspepsia during the writing — belongs to this emotional landscape, though the workstream should flag that the precise \"sick dog\" phrasing is more securely attached to Carlyle's general manner of describing his sufferings than verifiably to a single journal entry about the burning specifically. (See Open Questions.) While struggling with the third book later, he wrote his brother John: \"The Revolution History goes on about as ill as anybody could wish. I sit down to write, there is not an idea discernible in the head of me; one dull cloud of pain and stupidity\" [3].\n\n---\n\n## 3. The Rewrite (1835–1837)\n\n### 3.1 Method of reconstruction\n\nCarlyle did not immediately rewrite Volume I. By several accounts he first turned to the later material — beginning or advancing Volumes II and III — before nerving himself to reconstruct the lost first volume [11][15]. He found the rewriting peculiarly agonizing precisely because he had written the original at white heat and could recall its specific phrasing least of all his work [6].\n\nA signature feature of the reconstruction, emphasized in the workstream brief, is Carlyle's refusal to lean on his old abstracts and reading notes. His stated reason was that re-reading his summaries would tempt him to reproduce a pale, secondhand version of what he had lost; instead he wanted the rewrite to come fresh and felt. His working method generally was immersion followed by furious composition, burning what fell short: \"His method was to read, then write like mad. Sections he found lacking were tossed in the fire\" [3]. The result, he believed, was something better than mere recovery — a book that came, as he told Jane on finishing, \"direct and flamingly from the heart of a living man,\" such as readers \"ha[d] not had for a hundred years\" [11][16].\n\n### 3.2 The rewrite timeline\n\nThe reconstruction and continuation can be dated with reasonable precision from the letters and from the standard accounts:\n\n- **September 1834:** composition begins at Cheyne Row [3][6].\n- **Early 1835:** complete draft of Volume I (\"The Bastille\") finished and lent to Mill [1][6].\n- **6 March 1835:** the manuscript destroyed by fire [6][7].\n- **By September 1835:** Volume I rewritten (\"Book one\" / the Bastille volume reconstructed) [3][15].\n- **End of April 1836:** Volume II (\"The Constitution\") finished [3][15].\n- **12 January 1837:** Volume III (\"The Guillotine\") completed — the whole work done, roughly two years after he had begun [3][16].\n\nOn finishing, Carlyle was, by his own account, \"ready both to weep and pray\" [3]. His remark to Jane that the book came \"flamingly from the heart\" carried a grim literal aptness given that an earlier draft had quite literally been used to make flame [11][16].\n\n---\n\n## 4. Carlyle's Circumstances, 1834–37\n\n### 4.1 From Craigenputtock to Chelsea\n\nThe Carlyles had spent the years 1828–1834 largely at Craigenputtock, the remote farmhouse in Dumfriesshire that Jane had inherited an interest in — a place of productive isolation (it was there that *Sartor Resartus* was written) but also of loneliness and limited literary opportunity. In the early months of 1834 Carlyle resolved to move to London, and on 10 June 1834 the couple took up residence at 5 Cheyne Row, Chelsea [4][17]. The house — now a National Trust property, \"Carlyle's House\" — would be their home for the rest of their lives and the workshop in which *The French Revolution* and the later major works were written [4][17].\n\n### 4.2 Financial precarity and the make-or-break stakes\n\nThe move to London was a gamble made on slender means. *Sartor Resartus* had been serialized in *Fraser's Magazine* in 1833–34 to bafflement and little money; Carlyle had not yet had a commercial success, and the family lived close to the edge. *The French Revolution* was, in a real sense, the make-or-break work: Carlyle had staked the move, the inherited project, and several years of labour on a single book, with a finished volume already destroyed once. Even after publication, the financial relief was not immediate — the book \"sold slowly,\" and Carlyle resorted to public lecturing (a series on German literature began in May 1837, lecture courses arranged in part with Harriet Martineau's help) to raise funds; lasting financial security arrived only later [5][15]. But the work's critical triumph converted Carlyle from a struggling, eccentric essayist into a recognized \"man of letters\" and made the subsequent lecturing and book contracts possible [15].\n\n### 4.3 Jane Welsh Carlyle\n\nJane Welsh Carlyle was central to the household economy of the project — managing the precarious finances, the move, and the domestic conditions that made Carlyle's monastic writing regime possible, and serving as his first reader and sounding board. Her own letters are among the richest sources for the texture of these years, and the *Collected Letters* preserve both partners' correspondence in parallel. It was to Jane that Carlyle delivered both of the most famous lines of the episode: the protective \"we must endeavour to hide from him how very serious this business is for us\" on the night of the burning [6][7], and the triumphant \"flamingly from the heart\" on completion [11][16].\n\n---\n\n## 5. Publication (1837) and the Immediate Sense of Success\n\n### 5.1 James Fraser and the first edition\n\n*The French Revolution: A History* was published in London in 1837 by James Fraser (of *Fraser's Magazine*), in three volumes — \"Vol. I.—The Bastille; Vol. II.—The Constitution; Vol. III.—The Guillotine,\" covering events from roughly 1774 to 1795 [1][12][18]. The first edition was a modest print run of about 1,000 copies [12][18]. Fraser paid Carlyle in the region of £110 plus presentation copies on the first edition; demand soon justified a second edition of 1,500 copies, with an additional 500 printed for the American market [12].\n\n### 5.2 The immediate sense that it had succeeded\n\nThe reception among the literary and intellectual elite was rapid and strong. Mill, despite — or in penance for — the burning, was among the first to praise the book, reviewing it favorably [2]. The publication \"brought the praise of Thackeray, Southey, Hallam, and others of weight, and consolidated Carlyle's reputation as one of the foremost men of letters\" [15]. William Makepeace Thackeray's review in *The Times* was influential. In America, Ralph Waldo Emerson promoted the book and helped arrange its publication there. The judgment crystallized that the book \"at once captured the English-speaking world\" and went on to mould the popular conception of the French Revolution in the Anglophone world \"down to the present day\" [12][18]. Commercial sales lagged the critical acclaim at first [15], but the sense among those who mattered to Carlyle's career was unmistakable: the gamble had paid off.\n\n### 5.3 The Dickens inheritance\n\nThe single most consequential strand of the book's downstream influence — treated more fully in the reception workstream — is Charles Dickens's reliance on Carlyle's *French Revolution* as the principal historical source and imaginative engine for *A Tale of Two Cities* (1859). Dickens \"relied heavily on the book while writing *A Tale of Two Cities*\" and is reported to have read and reread it; the novel's apocalyptic crowd-scenes and its vision of the Revolution as moral judgment are saturated with Carlyle's manner [1][3][18]. Britannica notes the work \"garnered admiration from notable contemporaries, particularly novelist Charles Dickens, whose *A Tale of Two Cities* drew direct inspiration from Carlyle's historical narrative\" [18].\n\n---\n\n## 6. The Standard Sources and Their Status\n\nReconstructing this history depends on a small set of primary and authoritative sources, each with characteristic biases:\n\n- **Carlyle's *Reminiscences*** (written largely in 1866–67, published 1881, ed. J. A. Froude; authoritative modern edition by K. J. Fielding and Ian Campbell, Oxford, 1997). Carlyle's own retrospective account — vivid but written decades later and colored by grief and self-dramatization. Source for much of the emotional register of the burning [6].\n- **The *Collected Letters of Thomas and Jane Welsh Carlyle*** (Duke–Edinburgh edition; online as the *Carlyle Letters Online* at carlyleletters.org). The contemporaneous record — the closest thing to primary evidence, including Carlyle's March 1835 letter to Fraser (\"the miserablest accident…\") and the Carlyle–Emerson correspondence in which the loss is reported [14]. Volume 8 covers the relevant period.\n- **John Stuart Mill's *Autobiography*** (1873) and the Mill–Carlyle correspondence — the other party's account, source for the compensation and Mill's anguish [2].\n- **J. A. Froude, *Thomas Carlyle: A History of the First Forty Years of His Life, 1795–1835*** (1882) and its sequel — the authorized, intimate, and controversial biography that fixed the canonical narrative (and provoked the long \"Froude controversy\" over candor). Indispensable but to be used critically [6].\n- **Modern scholarly biographies:** Fred Kaplan, *Thomas Carlyle: A Biography* (1983); Simon Heffer, *Moral Desperado: A Life of Thomas Carlyle* (1995); Rosemary Ashton, *Thomas and Jane Carlyle: Portrait of a Marriage* (2002); Ian Campbell, *Thomas Carlyle* (1974). These triangulate the primary record and adjudicate the legend [9].\n\nThe methodological caution running through all of this: the most dramatic details (the illiterate maid, the exact compensation, Carlyle's interior states) reach us through interested or retrospective testimony. The corpus should report the burning as fact, the canonical causal story as the traditional account, and the precise figures as well-attested but not first-hand-documented in every retelling.\n\n---\n\n## Open Questions\n\n1. **Who precisely burned the manuscript, and where?** The \"illiterate maid at Mrs. Taylor's house\" account is universal in the literature but traces to Mill's confession and Carlyle's circle, not to an independent witness. Can the *Collected Letters* (Mill's letters to Carlyle of March 1835) or the Mill–Taylor correspondence settle whether the servant, Mill, or the Taylor household was the proximate cause? Did Mill ever give a fuller written account than the verbal confession?\n\n2. **The exact compensation figures.** £200 offered / £100 accepted recurs across secondary sources; what is the primary documentary basis (Mill's letters? Carlyle's account book? Froude)? The £110 Fraser payment is sometimes conflated with it — worth disentangling from the publishing records directly.\n\n3. **The \"sick dog\" phrasing.** Is there a specific journal or letter entry in which Carlyle describes himself as a \"sick dog\" in direct connection with the burning, or is the phrase a general feature of his self-description being attached to this episode by later writers? Needs verification against the *Reminiscences* and journal.\n\n4. **The fate of the destroyed text's content.** How much of the published Volume I differs from the lost draft? Scholars have speculated the rewrite was rhetorically heightened; is there any surviving abstract or fragment (beyond the \"four tattered leaves\") permitting comparison?\n\n5. **Mill's review and the repair of the friendship.** The precise terms of Mill's 1837 review and the trajectory of the Mill–Carlyle relationship after the burning (it later cooled over politics, esp. the 1849–50 \"Negro Question\" exchange) — relevant to the reception workstream.\n\n6. **The charred leaves.** Carlyle is said to have kept the surviving charred leaves in his study for life; their present location and authenticity (National Library of Scotland? a private collection?) would be worth confirming.\n\n---\n\n## Sources\n\n1. *The French Revolution: A History* — Wikipedia article (used only to chase its cited sources, not as a substantive citation). Cites Eliot, Charles William (ed., 1909–14), \"Introductory Note,\" in *The Harvard Classics*, Vol. XXV, Part 3 (New York: P.F. Collier & Son), p. 318, for the burning (\"according to Mill, by a careless household maid\") and the \"direct and flamingly from the heart\" phrase. Tier 4 (the underlying Harvard Classics note is Tier 4 literary history). Accessed 2026-06-08. https://en.wikipedia.org/wiki/The_French_Revolution:_A_History\n\n2. \"John Stuart Mill and Thomas Carlyle: An Unlikely Bond,\" Online Library of Liberty (Liberty Fund), 2022-08-10. Source for Mill handing over the project, lending his books, the maid burning the manuscript, Mill's compensation, and Mill being among the first to praise the published book. Cites Mill's *Autobiography* and the Mill–Carlyle correspondence. Tier 5 (think-tank/educational; libertarian Liberty Fund — lean noted). Accessed 2026-06-08. https://oll.libertyfund.org/publications/reading-room/2022-08-10-john-stuart-mill-and-thomas-carlyle-an-unlikely-bond\n\n3. Danny Heitman, \"The Voracious Pen of Thomas Carlyle,\" *Humanities* (National Endowment for the Humanities), March/April 2009. Source for Mill handing over his library, Carlyle's no-backup working method, the rewrite timeline (Sept 1835 / April 1836 / 12 Jan 1837), the schoolboy/copy-book quote, the \"dull cloud of pain and stupidity\" letter to his brother, \"ready both to weep and pray,\" and the Dickens connection. Tier 4–5 (NEH long-form, quotes Carlyle directly). Accessed 2026-06-08. https://www.neh.gov/humanities/2009/marchapril/feature/the-voracious-pen-thomas-carlyle\n\n4. \"Carlyle's House\" / \"The Carlyles' House,\" National Trust and reference summaries. Source for the 10 June 1834 move to 5 Cheyne Row from Craigenputtock and composition there. Tier 4. Accessed 2026-06-08. https://www.nationaltrust.org.uk/visit/london/the-carlyles-house/the-history-of-carlyles-house\n\n5. Thomas Carlyle biographical overview (Wikipedia, used for navigation/dates only — facts corroborated elsewhere): autumn-1834 arrangement of the history, May 1837 German-literature lectures for income. Tier 4 navigation. Accessed 2026-06-08. https://en.wikipedia.org/wiki/Thomas_Carlyle\n\n6. \"The French Revolution,\" Lost Manuscripts (lostmanuscripts.com), 2011-01-30. Source for the 6 March 1835 date, Mill \"the very picture of desperation,\" the manuscript at Mrs. Taylor's house and the illiterate servant, Carlyle's words to Jane (\"hide from him how very serious this business is\"), and \"I remember and can still remember less of it than of anything I ever wrote.\" Draws on Froude and the letters. Tier 5 (literary blog, but quotes primary material; corroborated). Accessed 2026-06-08. https://lostmanuscripts.com/2011/01/30/the-french-revolution/\n\n7. \"Two men, a book, and a bonfire,\" Henry Bemis Books (bookseller blog), 2017-03. Corroborates the 6 March 1835 evening, Mrs. Taylor's house, the servant, Carlyle's words to Jane, and the £200-offered/£100-accepted figure (attributed to the NEH/Lost Manuscripts accounts). Tier 5 (secondary blog; used as corroboration only). Accessed 2026-06-08. http://henrybemisbookseller.blogspot.com/2017/03/two-men-book-and-bonfire.html\n\n8. Carlyle's working method (no fair-copy backup; burning of rejected sections) — corroborated across [3] and [6]. Tier 4–5.\n\n9. Spartacus Educational, \"Thomas Carlyle.\" Source corroborating Mill's 6 March 1835 arrival, the burning \"by mistake at the home of Harriet Taylor,\" the next-day decision to rewrite, the 12 January 1837 completion, and the £100 compensation; cites Fred Kaplan's biography. Tier 5 (educational reference). Accessed 2026-06-08. https://spartacus-educational.com/Jcarlyle.htm\n\n10. Thomas Carlyle — Wikipedia, citing the £200-offered / £100-accepted figure (with a ~£25,000 2024-equivalent gloss). Used to chase the underlying figure, which traces to Mill's *Autobiography* and the letters. Tier 4 navigation; underlying figure Tier 1/2. Accessed 2026-06-08. https://en.wikipedia.org/wiki/Thomas_Carlyle\n\n11. Aggregated account
