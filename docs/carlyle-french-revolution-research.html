ssion and Carlyle's circle, not an independent witness, and should be reported as the traditional account rather than verified fact. *Type: contested. Status: contested / single-source-lineage. (A genuine, important caveat the corpus insists on.)*\n\n### Claim 1.4 — The compensation\nMill pressed ~£200 on Carlyle, who accepted roughly half (~£100). *Type: established. Tier 4 + biographies. Status: corroborated (the precise primary basis — Mill's letters vs. Froude — is flagged as an open question).*\n\n### Claim 1.5 — The rewrite from memory\nCarlyle rewrote the lost volume from memory, declining to lean on his old abstracts so it would come \"direct and flamingly from the heart\"; the whole was completed 12 January 1837. *Type: established. Tier 1–2 (letters, Reminiscences). Status: corroborated.*\n\n### Claim 1.6 — Publication\nPublished by James Fraser in 1837 (completed 12 January; published in spring, most accounts May), first edition ~1,000 copies; three volumes — *The Bastille / The Constitution / The Guillotine*, covering 1774–1795. *Type: established. Tier 4. Status: **verified** (publication ~May 1837, two months before Mill's July review — confirmed by manual check; corrects an earlier \"January 1837 publication\" conflation with the completion date).*\n\n---\n\n## B. Sources & Method *(→ [02](02_Sources_And_Method.md))*\n\n### Claim 2.1 — The documentary spine\nThe forty-volume *Histoire parlementaire de la Révolution française* (Buchez & Roux, Paris 1834–38) was Carlyle's principal documentary source; he reviewed it in the *London and Westminster Review*, April 1837. *Type: established. Tier 1–2. Status: corroborated. Load-bearing.*\n\n### Claim 2.2 — The memoir and compilation strata\nHuman detail derives heavily from Revolutionary memoir (Roland, Bertrand de Moleville, Weber, Bailly, Dumont); the *Histoire de deux amis de la liberté* supplied crowd-scenes and is a principal channel of *inherited* (not invented) error. *Type: established (use) / analytical (error-channel). Tier 2. Status: corroborated.*\n\n### Claim 2.3 — The stated method\n\"On History\" (1830) and \"On History Again\" (1833) state the doctrines the *History* enacts: \"History is the essence of innumerable Biographies\"; \"Narrative is *linear*, Action is *solid*\"; the rejection of cause-and-effect \"Philosophical\" history. *Type: established (textual). Tier 1. Status: corroborated (verbatim across multiple reproductions). Load-bearing.*\n\n### Claim 2.4 — The accuracy verdict\nDespite its poetic-prophetic form the *History* is broadly faithful to the documented record; Rosenberg: its \"poetry consists in being everywhere scrupulously rooted in historical fact\"; Mill (1837): \"the truest of histories.\" Superseded as analysis, not discredited as fact. *Type: established/analytical. Tier 1–2. Status: corroborated. Load-bearing.*\n\n---\n\n## C. Style & Form *(→ [03](03_Style_And_Form.md))*\n\n### Claim 3.1 — \"Carlylese\" is a deliberate idiom\nExclamatory parataxis, inverted German-influenced word order, compound coinages, capitalized personified abstractions, archaic \"thou\" — forged in *Sartor Resartus*, deployed at scale here; named by contemporaries (Thackeray: \"Germanisms… choking double words,\" \"prose run mad\"). *Type: established. Tier 1–2. Status: corroborated. Load-bearing.*\n\n### Claim 3.2 — The present tense and proto-cinematic montage\nThe sustained historical present is method, not mannerism — it keeps the Revolution undecided — paired with rapid cutting between panoramic wide shot and close-up that critics (Talbot, Allison, NEH) compare to Eisenstein. *Type: established (technique) / analytical (the cinematic reading). Tier 1–2. Status: corroborated; the Eisenstein analogy flagged as a 20th-c optic (Open Question).*\n\n### Claim 3.3 — The prophet-preacher narrator\nThe narrator is a \"secular prophet\" using King James cadence and direct scriptural quotation (\"the deeds done in the body,\" 2 Cor 5:10; \"King of Terrors,\" Job 18:14), the \"thou,\" benediction, and apostrophe to the dead. *Type: established. Tier 1–2. Status: corroborated. Load-bearing.*\n\n### Claim 3.4 — The image-systems\nThe work is organized by recurring symbolic image-systems: fire/phoenix (the \"World-Phoenix,\" destruction-as-rebirth), sea/tide/maelstrom (the crowd as force), the spectral/phantasmagoric (\"Spectral Realities\"), and masks/clothes plus Sansculottism personified as a Titanic force of nature. *Type: established/standard. Tier 1–2. Status: corroborated.*\n\n### Claim 3.5 — Prose-epic and the double verdict\nConceived as \"an Epic Poem of the Revolution,\" straining the history/literature boundary; the same features that make it literature are its power *and* the ground of the \"unreliable as science\" charge — Mill's \"epic poem… truest of histories\" vs. Thackeray's \"prose run mad.\" *Type: established. Tier 1–2. Status: **verified** (Mill quotation, July 1837 *London and Westminster Review*, and Carlyle's reply confirmed by manual check). Load-bearing.*\n\n---\n\n## D. Allusion & Intertextuality *(→ [04](04_Allusion_And_Intertextuality.md))* — priority document\n\n### Claim 4.1 — Epic intent is documented, not inferred\nCarlyle read the *Iliad* in Greek in early 1834 and described the project to Mill as \"the grand Poem of our Time\" and possibly \"the only possible Epic\"; the allusive texture is a deliberate method. *Type: established. Tier 1–2 (letters via Vanden Bossche). Status: corroborated. Load-bearing.*\n\n### Claim 4.2 — The scholarly frame\nCumming (*A Disimprisoned Epic*, 1988) and Rosenberg (*Carlyle and the Burden of History*, 1985) both read the work as a prose-epic deriving authority from prior canonical texts (Bible, Homer, Milton, Dante). *Type: established. Tier 2. Status: corroborated.*\n\n### Claim 4.3 — The Calvinist/King James substrate\nThe prophetic-scriptural cadence derives from a Calvinist Annandale upbringing saturated in the Authorized Version; it persists structurally after Carlyle abandoned orthodox doctrine. *Type: established. Tier 2 (Britannica + biographies). Status: corroborated.*\n\n### Claim 4.4 — The apocalyptic frame (with verbatim echoes)\nThe Revolution is staged as Last Judgment through dense King James echoes — \"Smoke as of Tophet; confusion as of Babel; noise as of the Crack of Doom!\" (Bastille); \"the fountains of the great deep\"; \"a cup of trembling which all the nations shall drink\" (Isaiah 51 / Jeremiah 25 / Revelation 14). *Type: established. Tier 1 (the text). Status: corroborated (quotations from Wikisource/Gutenberg).*\n\n### Claim 4.5 — Sansculottism as scriptural fire / \"the Eternal Justice\"\nSansculottism functions as scriptural plague-and-whirlwind and agent of \"the Eternal Justice\"/\"Wrath\"; the Revolution as purifying apocalyptic fire (\"one red sea of Fire… enwraps the World\"). *Type: established (framing) / inference (the doubled Exodus–Revelation gloss of \"red sea of Fire\"). Tier 1–2. Status: corroborated framing; the specific double-allusion gloss is flagged inference.*\n\n### Claim 4.6 — Milton as architecture of hell\n*Paradise Lost* supplies chaos/\"old Night,\" Pandemonium-as-assembly, and Satanic-Titanic grandeur (Mirabeau, Danton). *Type: established that Milton is a named model (Rosenberg, Cumming); the granular passage-level Miltonic readings are inference. Status: contested-granularity / inference-flagged.* **(The agent could not re-confirm the exact Mirabeau-death passage verbatim — Open Question.)**\n\n### Claim 4.7 — Shakespeare: tragedy and history-play\nA three-act tragic architecture (Bastille/Constitution/Guillotine), dramaturgical staging, the \"Crack of Doom\" tag (biblical + *Macbeth* IV.i), and Cumming's \"nobility of tragedy with the grotesque absurdity of farce.\" *Type: established core / inference for the specific Macbeth mapping. Status: corroborated core; mapping flagged inference.*\n\n### Claim 4.8 — Dante: the *Inferno* at the Terror's climax\nMarie-Antoinette's trial as \"the pale kingdoms of Dis… encircled, nine times, with Styx and Lethe, with Fire-Phlegethon and Cocytus named of Lamentation\" — the Tribunal staged as a descent into Hell. *Type: established. Tier 1 (the text). Status: corroborated. (Among the most textually secure allusions in the work.)*\n\n### Claim 4.9 — Goethe & German Romanticism\nCarlyle, Britain's chief Goethe-translator (Harrold, *Carlyle and German Thought*), carries the symbol/clothes-philosophy (institutions as worn-out garments; the Bastille, the royal berline as symbols) and the Phoenix/*palingenesia* rebirth-myth into the *History*. *Type: established. Tier 2. Status: corroborated.*\n\n### Claim 4.10 — The classical layer\nThreefold and grounded in the documented 1834 *Iliad* study: Homeric epic machinery and \"synecdochal personification\" (Royalism, Hunger, Rumour as agents); the Titanomachy (\"Titans warring with Olympus\") and Greek-tragic Nemesis as the pagan twin of biblical \"Eternal Justice\"; Roman underworld (Orcus, Dis) and a Tacitean moral voice. *Type: established core / inference (Nemesis, Tacitus). Status: corroborated core; some readings flagged inference.*\n\n### Claim 4.11 — Illuminate or distort? (the open question)\nThe borrowed scriptural-epic authority is both the source of the work's prophetic power and its central critical liability (Manichaean Sham-vs-Wrath, determinism via Nemesis/Providence, the sublime displacing the analytic); whether it net-illuminates or net-distorts is a live, unsettled critical question. *Type: inference/interpretive. Status: contested — deliberately left open.*\n\n---\n\n## E. Argument & Themes *(→ [05](05_Argument_And_Themes.md))*\n\n### Claim 5.1 — Revolution as the return of Reality through Sham\nThe central thesis: revolution occurs when governing forms have become hollow Shams and the suppressed Reality erupts as elemental force; the Revolution reveals a chaos already latent, it does not create it. *Type: established. Tier 1–2 (LaValley, Vanden Bossche). Status: corroborated. Load-bearing.*\n\n### Claim 5.2 — Sansculottism as \"the Death-Birth of a World\"\nNamed not as a faction but as a cosmic, continuing force (it \"still lives… still works far and wide\"); the Phoenix figure of destruction-as-renewal carried from *Sartor Resartus*. *Type: established. Tier 1–2. Status: corroborated.*\n\n### Claim 5.3 — Providence / necessity, but not mechanical determinism\nThe Revolution is the working-out of \"the Eternal Justice,\" a divine verdict on Imposture — yet Carlyle rejects Thiers's inexorable-forces determinism in favor of *eschatological* (moral, not mechanical) necessity that preserves room for agency. *Type: established (theology) / contested (the normative endorsement). Tier 1–2. Status: corroborated; the determinism–heroism tension is load-bearing and unresolved in the text.*\n\n### Claim 5.4 — \"Paper\" as the symbol of Sham\nConstitutions, assignats, and philosophes' formulas are \"Paper\" — abstraction substituted for living fact; the Revolution destroys old Shams only to manufacture new ones, which is why the narrative keeps deflating into mock-heroic irony. *Type: established. Tier 1–2. Status: corroborated.*\n\n### Claim 5.5 — The embryonic \"great-man\" reading\nThe Revolution as a failed search for a true ruler: Mirabeau the one possible pilot (\"his single hand… held it toppling there, still unfallen\"), Danton the natural force, Napoleon the \"whiff of grapeshot\" (Carlyle's coinage) that closes it — anticipating *On Heroes* (1841). *Type: established (presence) / contested (weight). Tier 1–2. Status: corroborated presence; the \"how heroic vs. how collective\" balance is contested. Load-bearing.*\n\n### Claim 5.6 — Refusal to simply condemn the Terror\nCarlyle treats the crowd as a sublime natural force and declines simple condemnation of the Terror (it is judgment-on-Imposture) while recoiling from Robespierre; the violence is framed as *regenerative*, which is what makes it ethically combustible. Stedman Jones traces the framework's influence on the young Engels; Dickens absorbs the grammar but rejects the blessing of violence. *Type: established (the ambivalence) / contested (its implications). Tier 2. Status: corroborated; implications contested.*\n\n### Claim 5.7 — Anti-philosophe / anti-Enlightenment\nCarlyle blames the philosophes (Voltaire's dissolving skepticism, the \"Evangel of Jean-Jacques\" as merely a new Formula) for completing the hollowing-out of belief; his \"irrationalist\" stance attacks abstract Reason from a position to the side of both left and right. *Type: established. Tier 1–2. Status: corroborated.*\n\n### Claim 5.8 — What the book does *not* do\nLittle economic, social-structural, or ideological-causal analysis; explanatory weight rests on the moral-spiritual Sham/Reality axis. *Type: established (comparative). Tier 2. Status: corroborated.*\n\n### Claim 5.9 — The proto-fascism charge is contested\nThe charge (righteous regenerative violence + heroic order prefiguring fascism) is a defensible reading of the doctrine's tendency and its *later* development but an overreading of the 1837 text; most current literary scholarship reads the early book as radical-progressive. *Type: contested. Tier 2. Status: contested — both sides at strength; neither's loaded vocabulary adopted as neutral. Load-bearing.*\n\n---\n\n## F. Reception & Influence *(→ [06](06_Reception_And_Influence.md))*\n\n### Claim 6.1 — Mill's review \"made\" the book\nMill's anonymous notice (*London and Westminster Review*, July 1837) — \"not so much a history, as an epic poem… the truest of histories\" — turned Carlyle into a public sage; Carlyle replied, \"You have said openly of my poor Book what I durst not myself dream of it.\" *Type: established. Tier 1. Status: **verified** (date, wording, and Carlyle's reply confirmed by manual check, 2026-06-08). Load-bearing.*\n\n### Claim 6.2 — Emerson and the American reception\nEmerson arranged the U.S. edition and secured Carlyle a second readership and income. *Type: established. Tier 1 (Slater's Correspondence) via secondary. Status: corroborated; the financial specifics flagged not-independently-verified.*\n\n### Claim 6.3 — Dickens's documented debt\nDickens named \"Mr. Carlyle's wonderful book\" in his Preface to *A Tale of Two Cities* (1859); Carlyle had the London Library send him \"cartloads of books\" in 1859; the novel follows Carlyle's chronology and imagery (fire/flood, spilled-wine-as-blood, knitting Fates). *Type: established. Tier 1–2 (Preface, letters, Sanders). Status: corroborated.*\n\n### Claim 6.4 — The \"500 times\" is legend\nDickens's claim to have read the *History* \"500 times\" is his own jocular hyperbole (traced to Edgar Johnson's 1952 biography), not a measured fact; it dramatizes real intensity of engagement. *Type: contested/legend. Status: contested — reported as hyperbole, not fact. (A caveat the corpus insists on.)*\n\n### Claim 6.5 — Dickens's decisive divergence\nDickens absorbs Carlyle's providential grammar but cannot bless revolutionary violence, displacing redemption onto the private/Christian plane (Carton's sacrifice, \"Recalled to Life\"). Any account calling the novel simply \"Carlylean\" misreads both books. *Type: established/analytical. Tier 1–2. Status: corroborated.*\n\n### Claim 6.6 — Ruskin and the making of \"Carlyle the prophet\"\nRuskin called Carlyle \"master\"; the *History* founded the Victorian genre of \"sage-writing.\" The reaction began contemporaneously (Mill's \"not right radicalism\") and detonated posthumously with Froude's candid biography (1882–84). *Type: established. Tier 2–5. Status: corroborated.*\n\n---\n\n## G. Historiographical Place *(→ [07](07_Historiographical_Place_And_Modern_Assessment.md))*\n\n### Claim 7.1 — Against Thiers/Mignet determinism\nCarlyle used the earlier liberal narratives for chronology while rejecting their forces-over-persons temper, naming Mirabeau, Danton, and Napoleon the Revolution's three \"great men.\" *Type: established. Tier 2 + Britannica. Status: corroborated.*\n\n### Claim 7.2 — The Michelet rivalry\nMichelet (the great French Romantic rival) made \"the People\" the collective hero; he dismissed Carlyle's book in 1868 as \"a wretched work… devoid of study… full of false flights.\" *Type: established/striking. Status: single-source (Tier-5 relay of the 1868 quotation) — flagged for primary corroboration against Michelet's correspondence.*\n\n### Claim 7.3 — Belongs to no winning school\nNot Whig-progressive, not Marxist-social (Mathiez/Lefebvre/Soboul), not Furet-revisionist; *sui generis* — the leading English instance of the Romantic/providential/narrative-epic mode. *Type: inference (synthesis of the historiographical surveys). Status: inference — the consensus framing implicit across Ben-Israel, Gossman, and the overviews.*\n\n### Claim 7.4 — The settled modern verdict\nUnreliable as analysis (insufficiently empirical, hero-focused, no structure/ideology, prophetic-not-probative) but valuable as narrative art and as an evocation of the Revolution's texture; continuously in print and still taught. *Type: established. Tier 2–5. Status: corroborated. Load-bearing.*\n\n### Claim 7.5 — Schama's *Citizens* (1989) as the revival\nAn explicit return to vivid narrative and to a Carlyle-like horror at revolutionary violence (the Terror \"merely 1789 with a higher body count\"), drawing the same \"narrative can't make an argument\" attacks once leveled at Carlyle. *Type: established. Tier 1 (Schama) + reviews. Status: corroborated.*\n\n### Claim 7.6 — Hayden White's defense\n*Metahistory* (1973): all history is emplotted, so Carlyle's \"Romantic emplotment\" is a *kind* of argument, not the absence of one — licensing the recuperative reading. *Type: established (White's position). Tier 2. Status: corroborated.*\n\n---\n\n## H. Trajectory & Reputation *(→ [08](08_Trajectory_Of_Reputation.md), forecast in [Future_Trajectory.md](Future_Trajectory.md))*\n\n### Claim 8.1 — Carlyle's reputational collapse\nDriven by the *later* writings — *Latter-Day Pamphlets* (1850), the \"Occasional Discourse on the Negro Question\" (1849/1853), the Eyre Defence Fund (1865–66) — plus post-WWI/WWII association with \"Prussianism and fascism.\" *Type: established. Tier 2–5. Status: corroborated.*\n\n### Claim 8.2 — Cassirer's *qualified* indictment\n*The Myth of the State* (1946) names Carlyle \"the father of the modern myth of the hero\" — but explicitly declines to hold him responsible: \"to charge Carlyle with all the consequences that have been drawn from his theory would be against all the rules of historical objectivity.\" *Type: established with key qualification. Tier 1. Status: **verified** (the qualifying sentence confirmed against the primary text via manual check, 2026-06-08). Load-bearing for the forecast.*\n\n### Claim 8.3 — The \"two Carlyles\" insulation\nThe mechanism by which the 1837 *History* is partly protected from the author's collapse (the early radical masterpiece vs. the late reactionary); live and respectable but contested (Annan's coherentist reading cuts against the clean split). *Type: contested. Status: contested.*\n\n### Claim 8.4 — The 2019 Oxford scholarly edition\nThe *first comprehensive scholarly edition* of the work (eds. Cumming, Sorensen, Engel, Kinser; OUP 2019, ISBN 9780198809159), 182 years after publication, with full allusion-apparatus; an OWC paperback (2019) carries a reduced version. *Type: established. Tier 1 (publisher catalog). Status: corroborated.*\n\n### Claim 8.5 — Availability is a strong tailwind\nContinuously in print (Oxford World's Classics; Modern Library, ed. Rosenberg, 2002), free on Project Gutenberg (#1301); the *Carlyle Letters Online* open-access since 2006. No dedicated Strouse (California) volume exists for the *History*. *Type: established. Tier 1. Status: corroborated. (A current \"Penguin Classics\" edition could not be confirmed — flagged.)*\n\n---\n\n## Quick-Hit Tables\n\n### Key entities\n\n| Entity | Role |\n|---|---|\n| **Thomas Carlyle** (1795–1881) | Author; Scottish essayist/historian; the early radical \"prophet\" who became a late reactionary. |\n| **The French Revolution: A History** (1837) | The work; 3 vols. — *The Bastille / The Constitution / The Guillotine*; events 1774–1795. |\n| **John Stuart Mill** | Commissioner of the project, accidental destroyer of Vol. I, and author of the 1837 review that \"made\" the book. |\n| **Jane Welsh Carlyle** | Carlyle's wife; household manager, first reader, recipient of his two most famous lines on the project. |\n| **Harriet Taylor** | Mill's intimate friend, at whose house the manuscript was burned. |\n| **Buchez & Roux** | Compilers of the 40-vol. *Histoire parlementaire* (1834–38), Carlyle's documentary spine. |\n| **Charles Dickens** | Drew on the *History* for *A Tale of Two Cities* (1859); diverged on revolutionary violence. |\n| **R. W. Emerson** | Arranged the American edition. |\n| **John Ruskin** | Carlyle's English heir; called him \"master.\" |\n| **Jules Michelet** | The great French Romantic rival; made \"the People\" the hero; dismissed Carlyle in 1868. |\n| **Simon Schama** | *Citizens* (1989) revived the Carlylean narrative mode. |\n| **Ernst Cassirer** | *The Myth of the State* (1946); qualified locus classicus of the \"Carlyle → fascism\" charge. |\n\n### Key dates\n\n| Date | Event |\n|---|---|\n| 1830 / 1833 | \"On History\" / \"On History Again\" — Carlyle states his method. |\n| 10 June 1834 | Carlyles move to 5 Cheyne Row, Chelsea. |\n| Sept 1834 | Composition begins. |\n| early 1835 | Vol. I (\"The Bastille\") drafted; lent to Mill. |\n| 6 March 1835 | The manuscript burned. |\n| April 1836 | Vol. II (\"The Constitution\") finished. |\n| 12 Jan 1837 | Vol. III (\"The Guillotine\") completed — the whole work done. |\n| spring (~May) 1837 | Published by James Fraser, ~1,000 copies. |\n| July 1837 | Mill's review in the *London and Westminster Review*. |\n| 1859 | Dickens's *A Tale of Two Cities*. |\n| 1989 | Schama's *Citizens*. |\n| 2019 | First comprehensive scholarly edition (Oxford). |\n\n### Definitions (Carlyle's working vocabulary)\n\n| Term | Meaning in the *History* |\n|---|---|\n| **Sham** | A governing form (king, church, law, formula) that has lost its living reality. |\n| **Reality** | The living fact suppressed beneath the Sham, which erupts in revolution. |\n| **Sansculottism** | The revolutionary force personified as a cosmic, elemental power — \"the Death-Birth of a World.\" |\n| **Paper / Formula** | Abstraction (constitutions, assignats, philosophes' systems) substituted for fact. |\n| **Carlylese** | His broken, exclamatory, German-inflected, compound-coining idiom. |\n| **The Eternal Justice** | The providential/divine verdict the Revolution executes on Imposture. |\n| **\"A whiff of grapeshot\"** | Carlyle's coinage for Napoleon's 13 Vendémiaire (Oct 1795) close of the Revolution. |\n\n### Headline facts\n\n| Fact | Value |\n|---|---|\n| Volumes / structure | 3 — *The Bastille*, *The Constitution*, *The Guillotine* |\n| Period covered | 1774–1795 |\n| First edition | ~1,000 copies (James Fraser, 1837) |\n| Manuscript burned | Vol. I, ~6 March 1835; rewritten from memory |\n| Compensation | ~£100 accepted of ~£200 offered |\n| Principal source | *Histoire parlementaire* (Buchez & Roux), 40 vols. |\n| First scholarly edition | Oxford, 2019 (182 years after publication) |\n| Free full text | Project Gutenberg #1301 |"}, {"order": 11, "file": "Sources.md", "title": "Annotated Master Source List", "summary": "", "body": "# Sources\n\nAggregated and de-duplicated across the eight workstreams. Each entry carries its tier (per the seven-tier hierarchy: 1 = primary; 2 = scholarly/university-press; 3 = wire; 4 = major reference/outlet; 5 = analytical/specialist; 6 = opinion/partisan; 7 = social/AI/content-farm — never for facts) and a note on what it contributed. Per-document source lists with full URLs and access dates live in each workstream file; this is the consolidated map. **Wikipedia was used only to navigate to its cited sources, never as a substantive citation.**\n\n---\n\n## Tier 1 — Primary sources (the text itself, letters, contemporary documents)\n\n- **Carlyle, *The French Revolution: A History* (1837)** — the work itself. Read directly via **Project Gutenberg #1301** and **Wikisource** (*Works of Thomas Carlyle*, vols. 2–4). *Source of every quoted set-piece: the Bastille (\"fire-chaos,\" Louis Tournay, \"the Titans warring with Olympus\"), the death of Louis XV (\"King of Terrors,\" \"the deeds done in the body\"), the World-Phoenix, the execution of Louis XVI, the September Massacres (\"Night and Orcus\"), Marie-Antoinette's trial (\"the pale kingdoms of Dis… Styx and Lethe… Fire-Phlegethon and Cocytus\"), and the fall of Robespierre.*\n- **Carlyle, \"On History\" (1830) and \"On History Again\" (1833)**, *Fraser's Magazine*. *The stated method: \"History is the essence of innumerable Biographies\"; \"Narrative is linear, Action is solid.\"*\n- **Carlyle, \"Parliamentary History of the French Revolution,\" *London and Westminster Review*, April 1837.** *His own review of Buchez & Roux — a primary method statement.*\n- **The *Collected Letters of Thomas and Jane Welsh Carlyle*** (Duke-Edinburgh ed.) / **Carlyle Letters Online** (carlyleletters.org, open access). *The contemporaneous record: the March 1835 letter to Fraser (\"the miserablest accident… of my whole life\"); the burning correspondence; \"the grand Poem of our Time.\"*\n- **Carlyle, *Reminiscences*** (written 1866–67, pub. 1881). *The retrospective emotional register of the burning; vivid but late and self-dramatizing.*\n- **J. S. Mill, review of *The French Revolution*, *London and Westminster Review* (July 1837).** *\"Not so much a history, as an epic poem… the truest of histories.\" The review that made the book. Verified (date, wording, Carlyle's reply) by manual check, 2026-06-08.*\n- **Dickens, Preface to *A Tale of Two Cities* (1859)** and his letters. *\"Mr. Carlyle's wonderful book\"; the documented debt.*\n- **Ernst Cassirer, *The Myth of the State* (Yale UP, 1946).** *\"The father of the modern myth of the hero\" — with the load-bearing qualification declining to charge Carlyle with \"all the consequences.\" Verified via primary-text quotation, 2026-06-08.*\n- **Buchez & Roux, *Histoire parlementaire de la Révolution française* (40 vols., Paris 1834–38)** — Gallica. *Carlyle's documentary spine (confirmed for its own publication facts).*\n- **Simon Schama, *Citizens: A Chronicle of the French Revolution* (Knopf, 1989).** *The narrative-history revival; the Terror-as-constitutive-energy thesis.*\n- **Publisher/edition catalogs (Tier 1 for edition facts):** Oxford critical edition (2019, ISBN 9780198809159); Oxford World's Classics (2019); Modern Library (2002, ed. Rosenberg); UC Press Strouse Edition series page; Project Gutenberg; Carlyle Letters Online.\n\n## Tier 2 — Scholarly & authoritative (university-press monographs, peer-reviewed journals, expert reference)\n\n- **John D. Rosenberg, *Carlyle and the Burden of History* (Harvard UP, 1985).** *The fullest modern reading of Carlyle as historian — documentary epic, not fictionalized; \"poetry… scrupulously rooted in historical fact.\" (Several documents worked from the publisher description / search summaries, not the full chapters — flagged.)*\n- **Mark Cumming, *A Disimprisoned Epic: Form and Vision in Carlyle's French Revolution* (Penn Press, 1988).** *The epic-experiment thesis; \"myths of epic with the facts of history… nobility of tragedy with the grotesque absurdity of farce\"; the literary inheritance \"from the Bible to Gibbon.\"*\n- **Hedva Ben-Israel, *English Historians on the French Revolution* (Cambridge UP, 1968).** *Situates Carlyle within an English \"school\" with shared aims and politics; the foundational monograph for his Anglophone historiographical placement.*\n- **Chris R. Vanden Bossche, *Carlyle and the Search for Authority* (Ohio State UP, 1991)** and his \"From Transcendental Novel to Epic History.\" *The symbolic-history thesis; the 1834 Iliad preparation; \"true History the only possible Epic\" (CL 7:24); paper/authority crisis.*\n- **Albert J. LaValley, *Carlyle and the Idea of the Modern* (Yale UP, 1968).** *Carlyle's eschatological (not mechanical) necessity; \"the biblical desire to force the judgment day.\"*\n- **Philip Rosenberg, *The Seventh Hero: Thomas Carlyle and the Theory of Radical Activism* (Harvard UP, 1974).** *The radical-activist Carlyle; counter to passive hero-worship readings (with Himmelfarb's critique noted).*\n- **Gareth Stedman Jones, \"The Redemptive Power of Violence? Carlyle, Marx and Dickens,\" *History Workshop Journal* 65 (2008).** *Carlyle's \"irrationalist approach\"; regenerative violence; influence on the young Engels; the Dickens contrast.*\n- **Mark Allison, \"The French Revolution Now; or, Carlyle's Eternal Return,\" *Victorian Literature and Culture* (Cambridge, 2022).** *The leading recent recuperation: a \"thoroughgoingly radical work\" centered on Sansculottism; \"synecdochal personification\"; \"warnings rather than blueprints for fascism\"; the \"two Carlyles\" appropriation.*\n- **Hayden White, *Metahistory* (Johns Hopkins UP, 1973).** *All history is emplotted — the theoretical license for reading Carlyle's Romantic emplotment as argument.*\n- **John Clive, *Not by Fact Alone* (1989).** *Carlyle as prophet-not-historian; the warning-vs-epic-poem reception gap.*\n- **Lionel Gossman, \"Jules Michelet and Romantic Historiography.\"** *The definition of Romantic historiography as scholarship-plus-narrative-art; the category Carlyle and Michelet share.*\n- **George Levine, *The Boundaries of Fiction: Carlyle, Macaulay, Newman* (Princeton UP, 1968).** *Victorian prose deliberately blurring history and fiction.*\n- **John Holloway, *The Victorian Sage* (1953).** *Carlylese's apparent chaos as controlled; \"elemental\" imagery as rhetoric.*\n- **G. B. Tennyson, *\"Sartor\" Called \"Resartus\"* (Princeton UP, 1965).** *How Carlylese was forged in Sartor; the \"not until Joyce\" inventiveness judgment. (Cited via secondary quotation — flagged.)*\n- **Charles F. Harrold, *Carlyle and German Thought, 1819–1834* (Yale UP, 1934).** *The standard study of Carlyle's German formation (Goethe, the symbol-philosophy).*\n- **Fred Kaplan, *Thomas Carlyle: A Biography* (Cornell UP, 1983)** and **Simon Heffer, *Moral Desperado* (1995).** *The standard modern biographies; triangulate the primary record and the legend.*\n- **François Furet, *Penser la Révolution française* (1978).** *Revisionism: the Terror \"built in\"; the conclusion that rhymes with Carlyle even as the method is alien.*\n- **PMLA, \"Carlyle's General Method in *The French Revolution*.\"** *Carlyle as artist demanding \"some degree of accuracy and good faith\" of unreliable materials.*\n- **Mark Philp, \"Haunting the Revolution,\" *Essays in Criticism* 73.2 (2023).** *Review of the Oxford scholarly edition; the spectral critical register.*\n- **Tom Toremans, \"'This is not right radicalism': … Mill in *The French Revolution*,\" *Global Intellectual History* (2018).** *The Mill–Carlyle political divergence inside the praise. (Abstract/title only — paywalled; single-source for the framing.)*\n- **Andrew Sanders, \"'Cartloads of Books'\"** and **Michael Goldberg, *Carlyle and Dickens* (1972).** *The documented Dickens sources and debt (read in summary).*\n- **Britannica**, \"The French Revolution by Carlyle\" / \"Thomas Carlyle\" (expert-authored, Tier 2). *Structure, providential thesis, set-pieces, Dickens influence, Calvinist formation.*\n- **\"Re-presenting the French Revolution,\" *Revue française de civilisation britannique* (OpenEdition, peer-reviewed).** *Carlyle's sources, reception, and impact on British self-representation.*\n- **\"Thomas Carlyle: extreme right ferment,\" *Études anglaises* (2013).** *\"Rarely read by nonspecialists\"; the 1935 Jost Führerprinzip quotation; Cassirer's rejection of the proto-fascist label; Tennyson's disqualifying argument.*\n\n## Tier 4 — Major reference / public-humanities\n\n- **NEH, \"The Voracious Pen of Thomas Carlyle,\" *Humanities* (2009).** *Mill's role, the burning, the rewrite timeline, \"an Epic Poem of the Revolution,\" montage; quotes Carlyle directly.* (Treated Tier 4–5.)\n- **The Victorian Web (victorianweb.org)** — scholarly-edited essays by Landow, Vanden Bossche, et al. *Secular-prophet voice, the shipwreck paradigm, symbolic-history method, sage-writing genre.* (Tier 2 for the named scholars' work, Tier 5 as a site.)\n- **National Trust, \"Carlyle's House\"** and **VictorianResearch.org (\"James Fraser and Thomas Carlyle\").** *The Chelsea move; the first-edition print run and Fraser payment.*\n\n## Tier 5 — Analytical / specialist / educational (lean noted; used for orientation, corroboration, or as relays to be checked)\n\n- **Alpha History** (French Revolution historiography; Carlyle; Schama). *Pedagogical relay of scholarly judgments and quotations (Thiers/Mignet context, Mazzini, Michelet's 1868 dismissal) — used for orientation; quotations flagged for primary corroboration.*\n- **Lost Manuscripts; Henry Bemis Books; Spartacus Educational.** *Corroborating the burning narrative (6 March 1835, Mrs. Taylor's house, \"hide from him how serious this business is\").*\n- **The Charles Dickens Page; London Library \"Dickens and the London Library.\"** *The \"500 times\" provenance (→ Edgar Johnson 1952); the \"cartloads of books\"; Carlyle's \"wonderful\" verdict.*\n- **Liberty Fund / Online Library of Liberty** (Mill–Carlyle \"unlikely bond\"). *Libertarian lean noted; the commission and lending of books.*\n- **Ann Talbot, World Socialist Web Site (2010).** *Partisan-left outlet; used only for its close reading of the present-tense/cinematic technique, not its politics.*\n- **NYRB** (Schama–Hampson exchange 1989; Annan, \"Carlyle, Our Hero?\" 1974). *The narrative-vs-analysis debate; the coherentist defense against the \"two Carlyles\" split.*\n- **JSTOR Daily / BRANCH** (the Eyre case). *The 1865–66 Defence Fund line-up.*\n\n## Tier 6 — Opinion / partisan (cited only as evidence of a position)\n\n- **Alex Callinicos, \"Revising the revolution,\" *Socialist Worker Review* (1989); marxists.org (Soboul).** *Cited as position-evidence for the Marxist objection (\"you can't have a narrative and make an argument\") and the social interpretation's content — never as fact.*\n- **The American Conservative; The Common Reader (\"In defence of the Great Man Theory\").** *Position-evidence for the contemporary recuperative/agency-centric currents.*\n\n---\n\n### Sourcing notes & caveats\n\n- **Single-source / unverified items explicitly flagged in the corpus:** Michelet's 1868 \"wretched work\" quotation (Tier-5 relay); the Toremans \"not right radicalism\" framing (paywalled abstract); the Emerson royalty figures (Slater's *Correspondence* not consulted); the Hitler/*Frederick the Great* bunker anecdote (much-repeated, not primary-sourced); the existence of a current **Penguin Classics** edition (could not confirm).\n- **Manual verification performed (2026-06-08):** Mill's review date/wording and Carlyle's reply; Cassirer's qualifying sentence; the publication-month correction (completed Jan 1837, published ~May 1837).\n- **Texts referenced but not read in full** (gap-fill seeds across the workstreams): the full Mill 1837 review; Seigel, ed., *Thomas Carlyle: The Critical Heritage* (1971); the Oxford 2019 critical apparatus; Rosenberg (1985) and Cumming (1988) cover-to-cover; the Pilgrim *Letters of Charles Dickens* (1859); Slater's Emerson–Carlyle *Correspondence*.\n- **No Tier-7 source** was used for any factual claim. No AI-generated content was cited. No press release was treated as proof of its own claim."}]}</scrip <script>
const corpus = JSON.parse(document.getElementById('corpus-data').textContent);
const docs = corpus.documents;
const toc = document.getElementById('toc');
const content = document.getElementById('content');
const searchBox = document.getElementById('search');
const results = document.getElementById('search-results');
const key = 'corpus:' + corpus.slug;
let current = 0;

// theme
const themePref = localStorage.getItem('corpus-theme');
if (themePref) document.documentElement.dataset.theme = themePref;
else if (matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.dataset.theme = 'dark';
document.getElementById('theme-btn').onclick = () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('corpus-theme', next);
};

// table of contents
docs.forEach((d, i) => {
  const a = document.createElement('a');
  a.href = '#ch-' + i;
  a.innerHTML = '<span class="num">' + String(i).padStart(2, '0') + '</span>' + d.title;
  a.title = d.summary || '';
  a.onclick = (e) => { e.preventDefault(); show(i); closeMenu(); };
  toc.appendChild(a);
});

function show(i, anchorText) {
  current = Math.max(0, Math.min(docs.length - 1, i));
  content.innerHTML = marked.parse(docs[current].body);
  // rewrite chapter-to-chapter .md links into in-app navigation
  content.querySelectorAll('a[href$=".md"]').forEach(a => {
    const target = docs.findIndex(d => a.getAttribute('href').endsWith(d.file));
    if (target >= 0) { a.href = '#ch-' + target; a.onclick = (e) => { e.preventDefault(); show(target); }; }
  });
  content.querySelectorAll('a[href^="http"]').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });
  toc.querySelectorAll('a').forEach((a, j) => a.classList.toggle('active', j === current));
  document.getElementById('prev').disabled = current === 0;
  document.getElementById('next').disabled = current === docs.length - 1;
  document.getElementById('pager-label').textContent = (current + 1) + ' / ' + docs.length + ' · ' + docs[current].title;
  history.replaceState(null, '', '#ch-' + current);
  localStorage.setItem(key, current);
  if (anchorText) {
    const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT);
    let node; while ((node = walker.nextNode())) {
      const idx = node.textContent.toLowerCase().indexOf(anchorText.toLowerCase());
      if (idx >= 0) { node.parentElement.scrollIntoView({ block: 'center' }); return; }
    }
  }
  document.getElementById('main').scrollIntoView();
  window.scrollTo(0, 0);
}

document.getElementById('prev').onclick = () => show(current - 1);
document.getElementById('next').onclick = () => show(current + 1);
document.addEventListener('keydown', (e) => {
  if (e.target === searchBox) return;
  if (e.key === 'ArrowLeft') show(current - 1);
  if (e.key === 'ArrowRight') show(current + 1);
});

// search
let timer;
searchBox.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(runSearch, 150);
});
function runSearch() {
  const q = searchBox.value.trim().toLowerCase();
  results.innerHTML = '';
  toc.style.display = q ? 'none' : '';
  if (!q || q.length < 3) { toc.style.display = ''; return; }
  let hits = 0;
  docs.forEach((d, i) => {
    const text = d.body.toLowerCase();
    let pos = text.indexOf(q), shown = 0;
    while (pos >= 0 && shown < 3 && hits < 40) {
      const start = Math.max(0, pos - 60), end = Math.min(d.body.length, pos + q.length + 90);
      const raw = d.body.slice(start, end).replace(/[#*_>\[\]]/g, '');
      const safe = raw.replace(/&/g, '&amp;').replace(/</g, '&lt;');
      const snippet = safe.replace(new RegExp(q.replace(/[.*+?^${}()|\\]/g, '\\$&'), 'ig'), m => '<mark>' + m + '</mark>');
      const div = document.createElement('div');
      div.className = 'hit';
      div.innerHTML = '<b>' + d.title + '</b>…' + snippet + '…';
      const exact = d.body.slice(pos, pos + q.length);
      div.onclick = () => { show(i, exact); searchBox.value = ''; runSearch(); closeMenu(); };
      results.appendChild(div);
      hits++; shown++;
      pos = text.indexOf(q, pos + q.length);
    }
  });
  if (!hits) results.innerHTML = '<div class="none">No matches.</div>';
}

// mobile menu
const menuBtn = document.getElementById('menu-btn');
menuBtn.onclick = () => document.body.classList.toggle('menu-open');
function closeMenu() { document.body.classList.remove('menu-open'); }

// initial chapter: hash > saved progress > 0
const hash = location.hash.match(/^#ch-(\d+)$/);
show(hash ? +hash[1] : +(localStorage.getItem(key) || 0));
</script>
</body>
</html>
