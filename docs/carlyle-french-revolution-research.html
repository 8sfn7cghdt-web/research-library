French Revolution*, *London and Westminster Review* (1837), as quoted in standard reference and critical-heritage summaries; \"epic poem… the truest of histories\" verified across multiple sources. *Contribution: the founding double-verdict formula; \"fresh from the soul of the writer.\"* [Tier 1/2 — primary critical document, accessed here via secondary quotation; see Open Q.] \n5. Steve King / NEH, \"The Voracious Pen of Thomas Carlyle,\" *Humanities* (National Endowment for the Humanities), March/April 2009, https://www.neh.gov/humanities/2009/marchapril/feature/the-voracious-pen-thomas-carlyle (accessed 2026-06-08). *Contribution: \"an Epic Poem of the Revolution\"; Homer/Virgil/Milton tone; \"wide shots and close-ups, motion and stillness… montage\"; Mill, Thackeray, Dickens, Emerson reception.*\n6. Ann Talbot, \"Present historic: Carlyle, Robespierre and the French Revolution,\" World Socialist Web Site, 17 July 2010, https://www.wsws.org/en/articles/2010/07/fren-j17.html (accessed 2026-06-08). *Contribution: the present tense as \"experience what it was like to be there\"; the \"cinematic character\" and Estates-General cut from procession to individuals; \"an element of the prophet.\"* [Tier 5/6 — analytical essay on a partisan outlet; used for its close-reading of technique, not for political framing.]\n7. Mark Allison, \"The French Revolution Now; or, Carlyle's Eternal Return,\" *Victorian Literature and Culture* (Cambridge UP), 2018, https://www.cambridge.org/core/journals/victorian-literature-and-culture/article/french-revolution-now-or-carlyles-eternal-return/67D7210ABFCEB99A421E068384CC7F42 (accessed 2026-06-08). *Contribution: \"unattributed, 'polyphonic discourse'\"; \"abyss of seething elemental forces\"; cinematic montage; \"the last significant attempt before the high modernists to develop a narrative alternative to the novel.\"* [Peer-reviewed; analytical.]\n8. Chris R. Vanden Bossche, \"*The French Revolution* as Symbolic History\" (from *Carlyle and the Search for Authority*), *The Victorian Web*, https://victorianweb.org/authors/carlyle/vandenbossche/3e.html (accessed 2026-06-08). *Contribution: the \"symbolic history\" thesis — the narrator \"discovers its symbols\"; events as \"Symbolic Representation[s] of belief\"; mock-epic deflation; present-tense collapse of past and present.* [Analytical reading.]\n9. William Makepeace Thackeray, review of *The French Revolution* (1837), as quoted in standard reference summaries: \"stiff, short, and rugged… Germanisms… choking double words\"; \"prose run mad.\" *Contribution: the canonical hostile description of Carlylese; the debit side of the double verdict.* [Tier 1/2 primary critical document via secondary quotation.]\n10. G. B. Tennyson, *\"Sartor\" Called \"Resartus\"* (Princeton UP, 1965), as quoted: \"not until [James] Joyce is there a comparable inventiveness in English prose.\" *Contribution: the standard account of how Carlylese was forged in *Sartor*; the modernist genealogy.* [Cited via secondary quotation; see Open Q4.]\n11. Cinema & Media Studies course listing and Eisenstein scholarship (monoskop.org, UPenn cinemastudies), used only to corroborate that the Carlyle–Eisenstein montage comparison is an established critical commonplace, not original to this document. *Contribution: corroboration of the cinematic-comparison tradition.*\n12. Mark Philp, \"Haunting the Revolution\" (review of the Oxford scholarly edition of *The French Revolution*, ed. Mark Cumming / David Sorensen / Brent E. Kinser / et al.), *Essays in Criticism* 73.2 (2023): 255–, https://academic.oup.com/eic/article/73/2/255/7224726 (accessed 2026-06-08). *Contribution: evidence of a current authoritative scholarly edition and of the \"haunting/spectral\" critical register around the book (applied by Philp to the apparatus, not the text).* [Peer-reviewed review.]\n13. George Levine, *The Boundaries of Fiction: Carlyle, Macaulay, Newman* (Princeton UP, 1968), via Internet Archive listing, https://archive.org/details/boundariesoffict0000levi (accessed 2026-06-08). *Contribution: the frame of Victorian prose deliberately blurring history and fiction; Carlyle as a frontier-crosser between imaginative literature and factual prose.* [Cited from publisher/secondary description; see Open Q3.]"}, {"order": 4, "file": "04_Allusion_And_Intertextuality.md", "title": "Allusive Texture — Bible, Shakespeare, Milton, Dante, Goethe, Classics", "summary": "", "body": "# Carlyle's Allusive Texture: How *The French Revolution* Is Built Out of Older Texts\n\n## Bottom Line\n\nCarlyle's *The French Revolution: A History* (1837) is not a neutral chronicle dressed in figurative language; it is a **prose-epic deliberately constructed out of the King James Bible, Homer, Shakespeare, Milton, Dante, Goethe, and the Greek and Roman classics**, layered so densely that on almost any page two or three of these older texts are speaking at once. The deepest stratum is scriptural: Carlyle's Calvinist Annandale upbringing gave him a prose cadence drawn from the prophets (Isaiah, Jeremiah, Ezekiel) and an apocalyptic frame drawn from Revelation, so that the Bastille and the Terror are staged as a \"Crack of Doom,\" the Revolution as the \"Wrath\" and \"Eternal Justice\" of God poured out on a guilty old order, and Sansculottism as a scriptural fire and whirlwind. On top of this he lays a classical-and-Miltonic-and-Dantean machinery of hell: the storming of the Bastille is \"the Titans warring with Olympus,\" Marie-Antoinette's trial is \"the pale kingdoms of Dis... Styx and Lethe... Fire-Phlegethon and Cocytus,\" and the September Massacres are \"Night and Orcus... burst forth from their subterranean imprisonment.\" The compositional record is concrete and load-bearing: in early 1834, *before* writing, Carlyle read the *Iliad* in Greek and called the projected book \"the grand Poem of our Time\" and asked whether \"true History\" might be \"the only possible Epic\" — so the epic borrowing is a stated method, not a critic's retro-fit. The governing scholarly accounts — Mark Cumming's *A Disimprisoned Epic* (1988), John D. Rosenberg's *Carlyle and the Burden of History* (1985), and Chris Vanden Bossche's symbolic-history reading — agree that the work claims its authority by presenting itself as a successor to the Bible, Homer, and Dante. The critical question this document keeps open is whether that borrowed sacred-cosmic grandeur **illuminates** the Revolution (by registering its felt enormity) or **distorts** it (by translating contingent politics into divine drama and Manichaean fire) — a tension visible in the prose itself.\n\n---\n\n## 1. Why Allusion Is the Engine, Not the Ornament\n\nMost histories use literary allusion to decorate; Carlyle uses it to *constitute* his subject. The proof is biographical and compositional, and it is unusually firm. In the months before he began writing, Carlyle prepared himself the way an epic poet would: he \"read four books of the *Iliad*, perhaps more, in Greek,\" together with Voss's German translation and the Homeric commentaries of Heyne, Knight, and Blackwell, having (in Vanden Bossche's words) \"determined to write an epic history\" and sought \"to prepare himself by a close study of the *Iliad*\" [1]. He had already written to Mill in September 1833 that \"the right History... of the French Revolution\" was \"the grand Poem of our Time,\" and would soon ask whether \"true History\" might be \"the only possible Epic\" [1]. The trial run was \"The Diamond Necklace,\" his \"first experiment\" at seeing \"whether by sticking actually to the Realities of the thing... one could not make a kind of Poem of it\" [1].\n\nThis matters for tier discipline: the claim that Carlyle *intended* an epic woven from older texts is not an inference from the style — it is attested in his letters and the documented reading program. The figurative texture that follows is the execution of a plan.\n\n**Claim 4.1 (established):** Carlyle conceived and prepared *The French Revolution* as an epic poem in prose, reading the *Iliad* in Greek in early 1834 and describing the project to Mill as \"the grand Poem of our Time\" and possibly \"the only possible Epic.\" The allusive texture is therefore a deliberate method, not incidental decoration.\n\nThe two foundational monographs converge here. Rosenberg writes that Carlyle \"conceived of his histories as modern prose-epics — successors to the Bible, Homer, and Milton,\" and reads history for him as \"poetry, prophecy, biography, and social criticism combined\" [2]. Cumming, in *A Disimprisoned Epic*, \"reestablishes [the work] as an epic experiment in literary form,\" arguing that it \"combines the myths of epic with the facts of history; the nobility of tragedy with the grotesque absurdity of farce,\" and devotes a closing chapter to \"the literary inheritance that Carlyle in his history seeks to supersede, including everything from the Bible to Gibbon and Sir Walter Scott\" [3]. The publisher's and reviewers' synopses confirm that Cumming's organizing thesis is precisely that Carlyle builds the History out of, and against, prior epic and scriptural forms [3].\n\n**Claim 4.2 (established):** The two governing scholarly studies — Cumming's *A Disimprisoned Epic* (1988) and Rosenberg's *Carlyle and the Burden of History* (1985) — both read *The French Revolution* as a prose-epic that derives its authority from prior canonical texts (above all the Bible, Homer, Milton, Dante), with Carlyle simultaneously imitating and trying to supersede them.\n\nA note on Carlyle's *theory* of epic, which shapes which models he honors and which he holds at arm's length. In \"On History\" and \"On Biography\" he treated genuine epics as \"histories, and understood to be narratives of facts,\" and held that epic authority \"derived from collective cultural belief, not individual authorial imagination\" [1]. On those grounds he counted the Bible and Dante's *Commedia* as *authentic* epics (\"[the *Commedia*] belongs to ten Christian centuries, only the finishing of it is Dante's\") but excluded Milton's *Paradise Lost* as \"too self-consciously authored,\" lacking the \"unselfconscious song\" of true epic [1]. The paradox worth flagging: Carlyle's *practice* is saturated with Miltonic diction even though his *theory* demotes Milton — so the Miltonic layer is a matter of inherited idiom and imagery, not of avowed model. (Tag: the gap between Carlyle's stated epic theory and his Miltonic practice is an **inference** drawn from juxtaposing Vanden Bossche's account of the theory [1] with the Miltonic texture documented in §3 below; I have not found a single scholar stating it in exactly this form.)\n\n---\n\n## 2. The King James Bible — The Deepest Layer\n\n### 2.1 The Calvinist substrate\n\nCarlyle was born in 1795 in Ecclefechan, Dumfriesshire, into a strict Burgher (Calvinist) household; his father James Carlyle was \"a man of profound Calvinist convictions whose character and way of life had a profound and lasting influence on his son,\" and Thomas attended the village school and then Annan Academy before Edinburgh [4]. The standard biographical accounts agree that Carlyle \"fused elements of his Calvinist upbringing... with German romanticism,\" and that his temperament combined \"a serious Calvinistic desire to denounce evil\" with prophetic harangue [4]. This is the soil of the prose. Even after Carlyle lost orthodox belief, the *cadence* and *vocabulary* of the Authorized Version remained his native register — the parallelism, the apostrophe, the \"Behold,\" the second-person address, the prophetic denunciation.\n\n**Claim 4.3 (established):** Carlyle's prophetic-scriptural prose cadence derives from a Calvinist Annandale upbringing saturated in the King James Bible; biographers treat the \"Calvinistic desire to denounce evil\" and the prophetic-harangue register as a lasting structural feature of his writing even after he abandoned orthodox doctrine.\n\n### 2.2 The apocalyptic frame: Bastille and Terror as Last Judgment\n\nThe Bible enters the *History* most forcibly as the Book of Revelation. The Revolution is repeatedly staged as the Last Judgment — the seals broken, the wrath poured out, the old order weighed and found wanting. The clearest verified instance is in the Bastille chapter, where Carlyle compresses three sacred-and-mythic registers into a single drumbeat:\n\n> \"Smoke as of Tophet; confusion as of Babel; noise as of the Crack of Doom!\" [5]\n\nEvery term here is an allusion. **Tophet** is the valley of burning outside Jerusalem, the Old-Testament type of hell-fire (Isaiah 30:33, 2 Kings 23:10). **Babel** is Genesis 11, the archetype of confounded speech and collapsing human ambition. **The Crack of Doom** is the trump of the Last Judgment (and, doubly, Shakespeare's *Macbeth* IV.i, \"the crack of doom\" — see §4). In one clause Carlyle has fused scripture, Genesis, and Shakespeare; the Bastille assault is at once hell, the fall of human pride, and the end of the world.\n\nThe motif recurs as cosmic dissolution in Genesis-and-Flood diction:\n\n> \"The fountains of the great deep boil forth; fire-fountains, enveloping, engulfing. Your 'Earth-rind' is shattered, swallowed up; instead of a green flowery world, there is a waste wild-weltering chaos.\" [6]\n\n\"The fountains of the great deep\" is Genesis 7:11 (the Flood) verbatim; the \"waste... chaos\" reaches back to Genesis 1:2 (\"without form, and void\"). And the divine-judgment register is explicit in the address to the suffering masses:\n\n> \"Ye are heard in Heaven. And the answer too will come, — in a horror of great darkness, and shakings of the world, and a cup of trembling which all the nations shall drink.\" [6]\n\n\"A horror of great darkness\" is Genesis 15:12 (the covenant with Abram); \"a cup of trembling which all the nations shall drink\" fuses Isaiah 51:17 (\"the cup of trembling\") with the wrath-cup of Revelation 14:10 and Jeremiah 25:15 (\"this wine cup of fury\"). The Revolution is thus framed not as a political event but as the prophesied drinking of the wrath-cup by the nations.\n\n**Claim 4.4 (established):** Carlyle frames the Revolution as apocalyptic divine judgment through dense, verifiable King-James echoes — \"Smoke as of Tophet; confusion as of Babel; noise as of the Crack of Doom!\" (Bastille); \"the fountains of the great deep\" and \"a cup of trembling which all the nations shall drink\" (Isaiah 51 / Jeremiah 25 / Revelation 14). The Bastille and the Terror are staged as the Last Judgment.\n\n### 2.3 Sansculottism as scriptural fire and whirlwind; the \"Eternal Justice\"\n\nCarlyle's governing abstraction, **Sansculottism**, is treated not as a sociological category but as a quasi-scriptural force — a plague, a whirlwind, a fire of judgment that \"still lives... still works far and wide,\" perpetually reborn [7]. Vanden Bossche notes Carlyle's pointed contrast of the secular Feast of Pikes with \"the 'Hebrew Feast of Tabernacles'\" where \"A whole Nation gathered, in the name of the Highest,\" and reads \"the 'destructive wrath' of Sansculottism\" as the engine of the whole narrative [7]. The Revolution is, in Carlyle's own recurring phrase-family, the operation of **\"the Eternal Justice\"** and the **\"Wrath\"** upon a society of Shams — the guilty *ancien régime* judged and burned away.\n\nThe apocalyptic frame culminates, fittingly, in a vision of the world as one sea of fire. In the closing book Carlyle gives (through the mouth of \"Cagliostro\") the prophecy:\n\n> \"Imposture is in flames. Imposture is burnt up: one red sea of Fire, wild-billowing, enwraps the World.\" [8]\n\n\"One red sea of Fire\" is at once the Red Sea of Exodus and the lake of fire of Revelation 20 — the destroying and purifying flood become flame. Imposture (Carlyle's \"Sham\") is consumed exactly as the wicked are consumed in apocalyptic prophecy.\n\n**Claim 4.5 (established / part inference):** Sansculottism functions in the *History* as a scriptural plague-and-whirlwind and as the agent of \"the Eternal Justice\" / \"Wrath,\" with the Revolution figured as purifying apocalyptic fire (\"one red sea of Fire... enwraps the World\"). *Established* that the fire-and-wrath framing is pervasive and scholar-noted (Vanden Bossche on \"destructive wrath\"); the specific reading of \"red sea of Fire\" as a doubled Exodus/Revelation allusion is my **inference** from the text, not a scholar-attested gloss.\n\n---\n\n## 3. Milton — *Paradise Lost* as Template for Hell, Chaos, and Fallen Grandeur\n\nMilton supplies Carlyle with the architecture of hell and the grammar of fallen grandeur, even though (per §1) Carlyle's *theory* of epic demotes him. The revolutionary assemblies and mobs are repeatedly figured as **Pandemonium** — the council of fallen angels — and the revolutionary leaders as Satanic Titans whose ruin is magnificent. The diction of \"Chaos and old Night\" (*Paradise Lost* I–II) runs through the storm-and-sea imagery of the crowd scenes; the \"waste wild-weltering chaos\" quoted in §2.2 is as Miltonic as it is Genesis-derived (Milton's Chaos is \"a dark / Illimitable ocean without bound\").\n\nThe Bastille assault — \"It was the Titans warring with Olympus; and they, scarcely crediting it, have *conquered*\" [5] — is more classical than Miltonic in its proper names, but the *structure* of the image (rebel host storming the seat of established power, astonished at its own success) is the Miltonic-Satanic plot: the war in Heaven retold as the war on the Bastille. Carlyle's signature treatment of Mirabeau and Danton as figures of **Satanic grandeur** — Titans of fire and ruin, morally compromised yet sublime, \"earthquake\" natures — follows the long Romantic reading of Milton's Satan as the poem's tragic hero. (Carlyle calls Mirabeau a \"Titan,\" a \"world-compeller,\" a fire-natured ruin; the explicit verbatim Mirabeau-death passages I was not able to re-confirm in this pass — see Open Questions.)\n\nA caution on sourcing: my web searches did not surface a single scholar's essay isolating \"Carlyle's Miltonic borrowings in *The French Revolution*\" by name, the way Vanden Bossche isolates the symbolic method or Cumming the epic form. The Miltonic layer is real and visible in the diction (chaos / old night / Pandemonium / fallen-angel grandeur), and Cumming's \"literary inheritance\" chapter treats Milton among the predecessors [3], and Rosenberg names Milton explicitly as one of the models Carlyle's histories succeed [2] — but the fine-grained Milton attributions below the level of those general statements are my **inference** from the text, and I flag them as such.\n\n**Claim 4.6 (established that Milton is a named model; specific echoes are inference):** Milton's *Paradise Lost* supplies the *History*'s architecture of hell, chaos (\"old Night\"), Pandemonium-as-assembly, and Satanic-Titanic grandeur for figures like Mirabeau and Danton. Rosenberg and Cumming name Milton among Carlyle's epic predecessors; the granular passage-level Miltonic readings here are my inference, not scholar-attested glosses, and are tagged accordingly.\n\n---\n\n## 4. Shakespeare — The Revolution as Tragedy and History-Play\n\nCarlyle reads and stages the Revolution dramaturgically: scenes are blocked like theatre, the present-tense \"camera-eye\" narration works like stage directions, and individual actors are cast as tragic protagonists. The most precise verifiable Shakespearean tag is again the Bastille's **\"the Crack of Doom\"** — a phrase that is biblical (the Last Judgment) but whose currency in English is owed to *Macbeth* IV.i.117, where the line of kings stretches \"to th' crack of doom\" [5]. The *Macbeth* matrix — blood that will not wash out, regicide, the \"tomorrow and tomorrow\" futility, the witches' equivocation — is the natural Shakespearean substrate for a narrative of king-killing and its haunted aftermath, and Carlyle's recurring blood-and-doom diction draws on it.\n\nMore structurally, Carlyle treats the whole as a tragic **Drama** with named acts. He repeatedly invokes prior historical massacres as a tragic series — \"Bartholomew Butchery,\" the \"Armagnac Massacres,\" the \"Sicilian Vespers\" — placing the September Massacres in a line of staged historical tragedy [9]. The work's tripartite architecture (*The Bastille* / *The Constitution* / *The Guillotine*) is itself a three-act tragic structure moving from rising action through crisis to catastrophe. Cumming's thesis — that the *History* yokes \"the nobility of tragedy with the grotesque absurdity of farce\" [3] — is precisely the Shakespearean mixture of the tragic and the grotesque-comic (the gravediggers in *Hamlet*, the Porter in *Macbeth*) transposed onto history.\n\n**Claim 4.7 (established core; specific tags partly inference):** Carlyle structures the Revolution as Shakespearean tragedy-and-history-play: a three-act tragic architecture (Bastille/Constitution/Guillotine), dramaturgical scene-staging, the \"Crack of Doom\" tag (biblical and *Macbeth* IV.i), and Cumming's scholar-attested fusion of \"the nobility of tragedy with the grotesque absurdity of farce.\" *Established* that Cumming reads the work through tragedy-and-farce; the specific *Macbeth*/blood-and-regicide mapping is my **inference** from the text.\n\n---\n\n## 5. Dante — The *Inferno*, the Descent, the Damned\n\nDante is the one infernal model Carlyle's *theory* explicitly endorses (the *Commedia* as an authentic epic \"of ten Christian centuries\" [1]), and the *Inferno* surfaces in the *History* as explicit, named allusion — the most textually secure of all the borrowings after the Bible. The set-piece is Marie-Antoinette's trial in the Terror, where Carlyle pulls the entire underworld into one sentence:\n\n> \"Dim, dim, as if in disastrous eclipse; like the pale kingdoms of Dis! Plutonic Judges, Plutonic Tinville; encircled, nine times, with Styx and Lethe, with Fire-Phlegethon and Cocytus named of Lamentation!\" [10]\n\nThis is not vague hell-imagery: **Dis** is the lower city of Dante's *Inferno* (Cantos VIII–IX); the \"nine\" encirclements are the nine circles of Hell; **Styx, Lethe, Phlegethon (the river of fire), and Cocytus (the frozen lake of lamentation at Hell's bottom)** are precisely Dante's and Virgil's infernal rivers. Fouquier-Tinville, the public prosecutor, becomes a \"Plutonic Judge,\" a Minos or Rhadamanthus of the Pit. The Revolutionary Tribunal is staged as a literal descent into the *Inferno*, the trial as a damnation.\n\nThe September Massacres are figured the same way: \"Night and Orcus... have burst forth, here in this Paris, from their subterranean imprisonment,\" and the reader \"who looks earnestly through this dim Phantasmagory of the Pit\" sees a Lapland-witch darkness [9]. **Orcus** is the Roman underworld; \"the Pit\" is both classical Tartarus and the biblical pit of Sheol/Revelation. The descent-into-Hell of the *Inferno* gives Carlyle his model for the Terror as the soul's (and a nation's) journey through damnation.\n\n**Claim 4.8 (established):** Dante's *Inferno* is invoked explicitly and precisely at the climax of the Terror — Marie-Antoinette's trial as \"the pale kingdoms of Dis... encircled, nine times, with Styx and Lethe, with Fire-Phlegethon and Cocytus named of Lamentation\" — staging the Revolutionary Tribunal as a literal descent into Hell. This is among the most textually secure allusions in the work.\n\n---\n\n## 6. Goethe and German Romanticism — Symbol, Clothes, Earth-Spirit\n\nBefore he was a historian, Carlyle was Britain's foremost translator and apostle of Goethe: he translated *Wilhelm Meister's Apprenticeship* (1824), wrote a *Life of Schiller* (1825), and produced the four-volume *German Romance* (1827), steeping himself in Goethe, Schiller, Novalis, and Jean Paul Richter [11]. Charles Frederick Harrold's *Carlyle and German Thought, 1819–1834* (Yale, 1934) is the standard study of this formation, tracing how Carlyle absorbed, amplified, and sometimes distorted German thought \"in favour of his own belief\" [11]. The German inheritance enters the *History* in two main ways.\n\nFirst, **the philosophy of clothes and symbol** carried over from *Sartor Resartus* (written just before, published in book form 1838). Vanden Bossche's reading is that the *History* is a symbolic history in which \"public events function as 'Symbolic Representation[s] of belief'\" and the narrator \"discovers the symbolic import of events\" rather than merely recording facts [7]. The Bastille is the symbol of \"the old imprisoning order\" broken open; the royal family's \"cumbersome berline\" is the symbol of \"the accretions of privilege and meaningless tradition\" that made the monarch powerless [7]. This is the *Sartor* clothes-philosophy — institutions as worn-out garments to be cast off — applied to revolution. (Vanden Bossche carefully distinguishes the two works: in *Sartor* the Editor imposes pattern on chaos; in the *History* Carlyle claims to \"derive his interpretation... from the historical material itself\" [7].)\n\nSecond, **the fire/Phoenix-rebirth myth** — *palingenesia*. The Goethean-Romantic vision of cyclical death-and-rebirth gives Carlyle \"the burning of a World-Phoenix\" to represent civilization undergoing \"death and Palingenesia, or Newbirth,\" a figure carried from *Sartor* directly into the conflagration imagery of the *History* [12]. The Earth-Spirit of Goethe's *Faust* (\"'Tis thus at the roaring Loom of Time I ply\") stands behind Carlyle's recurring image of history as a living, weaving, fire-shot process. G. B. Tennyson, whose *Sartor Called Resartus* (1965) is the standard study of *Sartor*'s genesis and style, judged Carlyle's prose inventiveness unequaled \"not until [James] Joyce\" — a reminder that the German-derived symbol-method produced a genuinely new English prose [13].\n\n**Claim 4.9 (established):** Carlyle, Britain's chief Goethe-translator (Harrold, *Carlyle and German Thought*), carries the German-Romantic symbol-philosophy and the *Sartor Resartus* clothes-philosophy into the *History*: institutions as worn-out garments (the Bastille, the royal berline as symbols), and the Phoenix/*palingenesia* fire-rebirth myth as the master figure of revolution. Scholar-attested by Harrold (German formation) and Vanden Bossche (symbolic method).\n\n---\n\n## 7. Classical Antiquity — Nemesis, Titans, Tacitus, Epic Machinery\n\nThe classical layer is the one most directly continuous with Carlyle's documented preparation (the *Iliad* in Greek, §1) and it operates at three levels.\n\n**(a) Epic machinery and Homeric narration.** The present-tense, panoramic, catalogue-driven narration — the massing of crowds, the named heroes, the divine-eye sweep over the battlefield of Paris — is Homeric in technique, the fruit of Carlyle's 1834 *Iliad* study and his conviction that \"true History [is] the only possible Epic\" [1]. Synecdochal forces — \"Royalism,\" \"Patriotism,\" \"Rumour,\" \"Hunger\" — act as quasi-Homeric agents striding through the narrative, a device the Cambridge essay \"The French Revolution Now\" identifies as Carlyle's central innovation: \"synecdochal personification to depict ideological loyalties and instinctual drives, with collective forces... serving as principal narrative agents\" [14].\n\n**(b) Titans, Olympus, and Nemesis/Fate.** The Bastille assault as \"the Titans warring with Olympus\" [5] casts the Revolution as the Titanomachy — the older, chthonic powers rising against the established gods. Greek-tragic **Nemesis** and **Fate** govern the moral structure: the *ancien régime*'s guilt incurs an inexorable retribution, exactly as hubris incurs *nemesis* in Aeschylus and Sophocles. The Revolution as Nemesis-upon-Sham is the classical-tragic twin of the biblical \"Eternal Justice\" — the same idea in two inherited vocabularies, pagan Fate and Calvinist Providence fused.\n\n**(c) Roman underworld and Tacitean register.** The infernal scenes draw Roman as well as Dantean material — \"Orcus,\" \"Dis,\" \"Plutonic\" judges, the \"Pit\" [9][10]. And the moral-historical voice — terse, indignant, sententious, exposing the corruption beneath imperial spectacle — is recognizably **Tacitean**, the Roman historian of decadence and tyranny standing behind Carlyle's anatomies of the dying court.\n\n**Claim 4.10 (established core):** The classical layer is threefold and grounded in documented preparation: Homeric epic machinery and panoramic narration (from the 1834 *Iliad* study); the Titanomachy (\"Titans warring with Olympus\") and Greek-tragic Nemesis/Fate as the pagan twin of biblical \"Eternal Justice\"; and a Roman underworld (\"Orcus,\" \"Dis,\" \"Plutonic\") plus a Tacitean moral-historical voice. The Homeric method is scholar-attested (Vanden Bossche; \"French Revolution Now\"); the Nemesis and Tacitus readings are partly **inference** from the text.\n\n---\n\n## 8. Synthesis — Does the Borrowed Grandeur Illuminate or Distort?\n\nStack the layers and the method becomes clear. On any given page Carlyle may run scripture, Homer, Milton, Dante, Shakespeare, and the classics simultaneously: \"Smoke as of Tophet [Bible]; confusion as of Babel [Bible]; noise as of the Crack of Doom [Bible + *Macbeth*]\" while \"the Titans war with Olympus [Greek]\" — four traditions in two sentences. The effect is to lift contingent political events out of mere chronology and present them as **cosmic, sacred drama**: the Bastille as Doomsday, the Terror as a Dantean descent into Dis, Sansculottism as the wrath of the Eternal, the whole as a tragic three-act poem ending in purifying fire and the Phoenix's death-birth.\n\nThe borrowed authority does real work. It lets Carlyle claim for a recent, messy, partisan subject the gravity of scripture and epic — to insist, against the cool Enlightenment historians he despised, that the Revolution *meant* something, that it was Judgment and not mere chaos. Cumming's title — *A Disimprisoned Epic* — captures the ambition: Carlyle frees epic from the dead past and reattaches it to living history [3]. Rosenberg names the corresponding paradox: Carlyle is \"the poet of the insubstantiality of the 'real' and reality of the Phantasmagoric\" [2] — the allusive haze is how he makes events feel more real than realism could.\n\nBut the same machinery is also the central **critical liability**, and honest scholarship has long said so. Translating politics into apocalypse risks: (1) **Manichaeanism** — a world of pure Sham judged by pure Wrath, with the messy middle (the moderates, the institutional questions, the economic causes) burned away in the fire-imagery; (2) **determinism** — if the Revolution is Nemesis and Providence, then human agency and contingency shrink, and the guillotine becomes fated rather than chosen; (3) **the sublime overwhelming the analytic** — the reader feels the Terror as Hell but may understand it less, the Dantean splendor of \"Styx and Lethe... Fire-Phlegethon\" substituting for explanation of *why* the Tribunal killed. The Cambridge reading frames the whole as \"inverted utopianism — an apocalyptic manifestation of a utopian longing for heaven on earth\" [14], which is exactly the double edge: the apocalyptic frame is the source of both the work's prophetic power and its distortion.\n\nThe fairest verdict — and the one this document leaves as a genuinely open critical question rather than a settled judgment — is that Carlyle's allusive grandeur is **simultaneously illuminating and distorting**: it registers the felt enormity and moral weight of the Revolution as no Whig chronicle could, and it systematically over-writes the contingent with the cosmic. The allusions are not a layer you can strip off to find the \"real\" history underneath; they *are* Carlyle's history. To read the *Iliad*, the King James Bible, the *Inferno*, and *Paradise Lost* into the fall of the Bastille is, for Carlyle, to tell the truth about it.\n\n**Claim 4.11 (inference / interpretive):** The borrowed scriptural-and-epic authority is both the source of the *History*'s prophetic power (it dignifies contingent politics as cosmic moral drama) and its central critical liability (Manichaean Sham-vs-Wrath framing, determinism via Nemesis/Providence, the sublime displacing the analytic). Whether it net-illuminates or net-distorts is a live, unsettled critical question — flagged as interpretive synthesis, not an established finding.\n\n---\n\n## Open Questions\n\n1. **Mirabeau and Danton as Satanic-Miltonic figures — verbatim confirmation.** I characterized Carlyle's Mirabeau (\"Titan,\" fire-natured ruin) and Danton from the secondary record and general knowledge but did not re-confirm the exact Mirabeau-death passage (Vol. 2, Book 3) verbatim in this pass. The precise wording would harden Claim 4.6.\n\n2. **A dedicated study of Carlyle's *Miltonic* borrowing.** Searches surfaced Cumming (epic form), Rosenberg (burden of history), Vanden Bossche (symbolic method), Harrold (German thought) — but no essay isolating Milton-in-*The-French-Revolution* at passage level. Does such a study exist (e.g., in *Carlyle Studies Annual*)? If so it would convert several §3 inferences to established claims.\n\n3. **Carlyle and the Bible — a single authoritative study.** I grounded the scriptural layer in the text plus biographical accounts of his Calvinism, but did not locate a monograph titled specifically on \"Carlyle and the Bible.\" Identifying the standard study (and its specific catalogue of scriptural echoes) would strengthen §2.\n\n4. **The Shakespeare layer.** Beyond \"the Crack of Doom,\" which specific *Macbeth*/*Hamlet*/history-play tags do annotated critical editions (e.g., the Oxford Carlyle, ed. Cumming/Sorensen/Engel/Kinser, 2019) actually gloss? A pass through that edition's notes would replace my inferred *Macbeth* mapping with editorial attribution.\n\n5. **Net illumination vs. distortion.** Claim 4.11 is left deliberately open. Where does the weight of modern scholarly judgment fall — and has it shifted (e.g., post-Schama, post-2022 \"French Revolution Now\")?\n\n---\n\n## Sources\n\n1. Chris R. Vanden Bossche, \"From Transcendental Novel to Epic History,\" in *Carlyle and the Search for Authority* (Ohio State UP, 1991), reproduced on VictorianWeb. https://victorianweb.org/authors/carlyle/vandenbossche/3d.html — accessed 2026-06-08. **Tier 2** (university-press scholarship). Documents the 1834 *Iliad*-in-Greek preparation, the \"grand Poem of our Time\" / \"only possible Epic\" letters to Mill, Carlyle's epic theory, and his ranking of Bible/Dante as authentic epics vs. Milton excluded.\n\n2. John D. Rosenberg, *Carlyle and the Burden of History* (Harvard UP, 1985), via publisher/library catalog descriptions and quotation. https://www.degruyterbrill.com/document/doi/10.4159/harvard.9780674422988/html — accessed 2026-06-08. **Tier 2.** Establishes Carlyle's histories as \"modern prose-epics — successors to the Bible, Homer, and Milton\"; \"poet of the insubstantiality of the 'real.'\"\n\n3. Mark Cumming, *A Disimprisoned Epic: Form and Vision in Carlyle's French Revolution* (Penn Press, 1988), via publisher synopsis and *The Free Library* review notice. https://www.pennpress.org/9780812281170/a-disimprisoned-epic/ ; review at https://www.thefreelibrary.com/Mark+Cumming,+A+Disimprisoned+Epic... — accessed 2026-06-08. **Tier 2.** Reads the work as an epic experiment combining \"myths of epic with the facts of history; the nobility of tragedy with the grotesque absurdity of farce\"; closing chapter on the literary inheritance \"from the Bible to Gibbon and Sir Walter Scott.\"\n\n4. *Encyclopaedia Britannica*, \"Thomas Carlyle.\" https://www.britannica.com/biography/Thomas-Carlyle — accessed 2026-06-08. **Tier 2** (expert-authored reference). Ecclefechan bi
