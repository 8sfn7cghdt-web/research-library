vior; \"you're simply not an atheist in your actions.\"\n3. Jordan B. Peterson, \"Biblical Series\" and \"Maps of Meaning\" lecture courses (oral sources; cited for the chaos/order frame, the hero, \"maturity in the form of individuality,\" and the shadow material).\n4. On Peterson's refusal to answer the God question plainly: \"The Peculiar Opacity of Jordan Peterson's Religious Views,\" *Quillette*, 2018 — https://quillette.com/2018/07/23/the-peculiar-opacity-of-jordan-petersons-religious-views/\n5. Larry Arnhart, \"Jordan Peterson's Unscientific Faith in the Jungian Collective Unconscious,\" *Darwinian Conservatism*, 2018 — http://darwinianconservatism.blogspot.com/2018/04/jordan-petersons-unscientific-faith-in.html (with Paul Thagard's kindred \"evidence-free Jungian psychology\" line).\n6. C.G. Jung, *Aion: Researches into the Phenomenology of the Self*, CW 9ii — \"the God-image is not something invented, it is an experience that comes upon man spontaneously\" (¶303). Transcription: https://carljungdepthpsychologysite.blog/2020/10/14/carl-jung-cw-9ii-aion/\n7. C.G. Jung, *Psychology and Religion: West and East*, CW 11 — creeds as \"codified and dogmatized forms of original religious experience\"; the psychology of the *homo religiosus*. https://www.jungiananalysts.org.uk/wp-content/uploads/2018/07/C.-G.-Jung-Collected-Works-Volume-11_-Psychology-and-Religion_-West-and-East.pdf\n8. C.G. Jung, *Answer to Job* (1952) — Job more conscious than God; the Incarnation as God's self-repentance; the integration of evil into the God-image. https://en.wikipedia.org/wiki/Answer_to_Job\n9. C.G. Jung, BBC *Face to Face* interview with John Freeman (1959) — \"I don't believe — I know.\""}, {"order": 12, "file": "12_wotan-and-modern-soul.md", "title": "Wotan and the Modern Soul: Jung's Answer to the Vacuum", "summary": "Collective possession, the transformation of the God-image, and the synthesis.", "body": "# Wotan and the Modern Soul: Jung's Answer to the Post-Christian Vacuum\n\n*When a people's religious vessels crack, the numinous does not evaporate; it returns wearing the mask of politics — and the only defense is the conscious, individual work this whole corpus has been about.*\n\nIn March 1936, with the Nuremberg rallies already a fixed liturgy and the Wehrmacht three years from war, Carl Jung published a short, strange, and unnerving essay in the Swiss journal *Neue Schweizer Rundschau*. Its title was a single word: \"Wotan.\" Against the grain of every political, economic, and sociological reading then on offer, Jung proposed that the convulsion seizing Germany was not, at bottom, political at all. It was religious. What was happening to the German people, he argued, was a *possession* — the eruption of an old Germanic god, Wotan, the wanderer and storm-god of frenzy, wandering, and ecstatic fury, out of the collective unconscious of a nation whose Christian containers had quietly rotted from within. \"The god of the Germans is Wotan and not the Christian God,\" he wrote; the National Socialist movement was, in his diagnosis, a god \"asleep\" who had \"awakened\" — an *Ergriffenheit*, a state of being seized, gripped, taken hold of.\n\n*A necessary honesty up front: the \"Wotan\" essay is one of the points where this project's verified backbone runs thin. Unlike the claims about the self, the God-image, privatio boni, or synchronicity — all anchored in the* Collected Works *with paragraph numbers — the Wotan material here is drawn from general scholarship and the essay's own well-known text rather than from the adversarially fact-checked spine. I write it as accurately as I can, but the reader should weight it accordingly, and treat the specific phrasings as reconstructions rather than verified quotations.*\n\nIt is an essay that has embarrassed Jung's admirers and armed his prosecutors in roughly equal measure, and we will come to that quarrel. But first the idea itself, because it is the keystone that locks the whole arch of this corpus together.\n\n## The Wotan move\n\nThe logic of \"Wotan\" is not really about the Germans, or even about Wotan. It is a general theorem about what happens to psychic energy when its proper channels are blocked — and it follows with grim inevitability from premises laid down in the very first chapters of this study.\n\nRecall the foundation (see Chapter 01). For Jung, religion was never primarily a matter of creed or assent to propositions. He defined it, following Rudolf Otto, as \"a careful and scrupulous observation of what Rudolf Otto aptly termed the *numinosum*\" — an experiential category, the soul's encounter with an overwhelming, autonomous, more-than-personal power. Creeds, on this view, are merely \"codified and dogmatized forms of original religious experience\": the dried riverbeds left behind by a flood of living water. The psyche, Jung held, possesses a *religious function* as native and ineradicable as hunger or sex. It will produce numinous experience; it will project a God-image; it will organize itself around a supraordinate center. This is not optional equipment. It is structural.\n\nNow add the second premise, the one Nietzsche supplied (see Chapter 10). The conscious God-image *can* die. Indeed, in the modern West it largely *has* died — this is precisely what Nietzsche's madman meant by crying \"God is dead.\" Jung read that announcement not as a liberation but as a catastrophic psychological event. The God-image is \"a numinous symbol of the Self\" that regulates the warring opposites within a person and a culture; to abolish it consciously is not to be rid of it but to lose the vessel that contained and channeled its terrible energy. Nietzsche himself was Jung's grim case study: having declared God dead, he did not become a serene atheist but instead \"unconsciously identified with the very God-archetype\" and fell into *inflation* — the swelling of the ego with energies it cannot possibly hold — which Jung connected to his collapse into madness. \"As soon as he says God is dead,\" Jung told his seminar, \"he is God and then the inflation begins.\"\n\nPut the two premises together and the theorem writes itself. The religious function does not switch off when the conscious creed decays. The numinous energy is still generated; it still demands a vessel, a symbol, a legitimate outlet. When the old Christian container cracks and no new conscious symbol forms to receive that energy, the displaced numinosity does not politely disappear. It sinks back into the collective unconscious, gathers around an archetypal nucleus, and *returns from below* — no longer as conscious worship but as compulsion, as mass-mindedness, as ideological possession. What Nietzsche suffered as a private inflation, a whole people can suffer as a collective seizure. That is the Wotan move: **the diagnosis of a political or cultural mass-movement as a religious phenomenon in disguise — numinous energy that, denied a conscious symbolic home, erupts as collective possession.**\n\nThis is the writing context for one of Jung's most quoted and most compressed formulations, from his essay on alchemy: \"the gods have become diseases; Zeus no longer rules Olympus but rather the solar plexus, and produces curious specimens for the doctor's consulting room.\" The gods are the archetypes. They do not retire when we stop believing in them; they migrate. Repressed from the temple, they reappear in the clinic as neuroses — and, repressed from a culture's conscious life, they reappear in the streets as fanaticisms. A Wotan denied an altar gets a Nuremberg.\n\n## Why mass-mindedness is the modern disease\n\nThis connects directly to the predicament Jung diagnosed in *Modern Man in Search of a Soul* and throughout the work surveyed in Chapter 01: the modern loss of soul and the rise of *mass-mindedness*. The deracinated modern individual — cut loose from inherited symbol, ritual, and creed, and not yet possessed of any conscious replacement — is, in Jung's view, dangerously *open*. Having no living symbolic system to metabolize the numinous, and no developed inner relationship to the unconscious, such a person is uniquely susceptible to being swept up by whatever archetypal current rises in the collective. The individual who has not done the inner work becomes a cell in a mob.\n\nThe crucial and counterintuitive point is that for Jung the mass-man is not too *religious* but not religious enough — or rather, religious in the wrong direction. His religious function, finding no conscious object, attaches itself to the State, the Leader, the Race, the Revolution, the Movement. These become, functionally, gods: objects of total devotion, sources of meaning and belonging, tolerating no heresy, demanding sacrifice. Jung's word for what happens to the individual inside such a movement is *possession* — the ego is flooded and overridden by an autonomous archetypal content, exactly as in Nietzsche's inflation but multiplied across millions. The frenzy of the rally, the surrender of private judgment, the ecstatic merger with the collective: these are not metaphors for religion. In Jung's reading they *are* religion, displaced and gone feral.\n\nIt is worth pausing on how radical this reframing is. Where a Marxist saw class interest and a liberal saw the failure of institutions, Jung saw a *spiritual* event — a god-shaped hole in the modern psyche filling itself with whatever archetype was nearest to hand. The totalitarianisms of the twentieth century were, on this reading, not lapses *from* religion but substitute religions, ersatz cults erected over the grave of the dead God-image. This is Jung's wager, stated at civilizational scale: the modern crisis is *fundamentally spiritual*, and political or economic solutions that ignore that fact are treating symptoms while the disease deepens.\n\n## The prescription: individuation as inoculation\n\nIf the disease is collective possession by displaced numinous energy, what is the cure? Here Jung is emphatic about what it is *not*. It is not a return to literal creed. One cannot simply order a disenchanted modern to believe the old propositions again; the riverbed is dry and willing it wet does not make it so. A merely conscious, willed re-adoption of dogma would be a fragile thing, and in any case Jung thought it impossible to un-know what the death of God had taught the West.\n\nThe cure, rather, is the entire program this corpus has been tracing — turned now from a private therapeutic discipline into a civilizational necessity. It runs along three braided strands.\n\nFirst, *individuation* (see Chapter 02). The self, for Jung, is the archetype of wholeness, the regulating center of the psyche, and — crucially — empirically indistinguishable from the God-image. \"As one can never distinguish empirically between a symbol of the self and a God-image,\" he wrote, \"the two ideas... always appear blended together.\" To undertake individuation is therefore to establish a *conscious, individual relationship* to the very numinous center that, left unconscious and collective, becomes Wotan. The person who has done this work has, so to speak, an altar of their own; the displaced god has somewhere legitimate to live. Such a person is far harder to possess, because the energy that the mob would commandeer is already engaged, already in conscious dialogue, already *theirs*. Jung's striking claim is that \"self-realization — to put it in religious or metaphysical terms — amounts to God's incarnation\": the individuating person becomes a vessel in which the God-image incarnates consciously, one soul at a time, rather than erupting blindly through a crowd.\n\nSecond, *the integration of the shadow* (see Chapter 04). This is the most directly political of Jung's prescriptions, and the most uncomfortable. The shadow is the personal gateway to the problem of evil — the disowned, inferior, \"dark\" side of the personality that the ego refuses to recognize as its own. Jung's clinical observation was that what we will not own in ourselves we *project* outward: the evil we cannot bear to see in the mirror we discover, with relief and fury, in the enemy. Mass-movements run on exactly this fuel — the purifying hatred of an out-group onto whom the collective shadow is dumped wholesale. The Jew, the kulak, the class enemy, the infidel: the projection screen changes, the mechanism does not. To integrate one's shadow — to grant, as *Aion* insists, that \"good and bad are equivalent opposites which always predicate one another,\" and that the capacity for the very evil one condemns lives in oneself — is to withdraw the projection. And a person who has withdrawn the projection cannot be conscripted into a scapegoating mob, because the mob's essential gesture, the externalizing of evil onto a victim, has become impossible for them. Shadow-work is, in this sense, a political prophylaxis. The integration of evil, which Chapter 04 treated as a problem in moral theology, turns out also to be the practical inoculation against fanaticism.\n\nThird, *the ongoing transformation of the God-image* (see Chapters 05 and 03). This is the civilizational task proper. Jung did not think the answer was to resurrect the old God-image intact, because in his reading that image was itself incomplete and therefore part of the problem. The Christ-symbol, for all its power, \"is not a totality, for it lacks the nocturnal side of the psyche's nature\" and \"specifically excludes it in the form of a Luciferian opponent\" — it splits good from evil and exiles the dark half, leaving Western consciousness with a one-sided ideal it cannot live up to and a repressed shadow it cannot integrate. *Answer to Job* pushed this to its scandalous conclusion: the God-image must itself *develop*, must take its own dark side into consciousness, must move from Trinity to Quaternity, integrating \"the evil face of God\" (and, Jung sometimes added, the excluded feminine, signaled for him by the 1950 Assumption of Mary). The continuing incarnation — God becoming conscious in ordinary, individuating human beings — is the form this transformation takes. A culture that consciously labored at this, rather than either clinging to a dead literalism or abandoning the religious question altogether, would be metabolizing its numinous energy instead of leaving it to erupt as Wotan.\n\nThese three are not really separate prescriptions but one prescription seen from three angles. Their common form is *consciousness*: the patient, individual, lifelong work of making the unconscious conscious, so that the numinous energy of the psyche flows through a person who knows it rather than through a crowd that is merely possessed by it. The mob and the individuant draw on the *same* energy. The only question — and it is the whole question — is whether that energy is conscious or not.\n\n## Synthesis: the through-line of the corpus\n\nStanding now at the end, it is worth restating the single argument that runs beneath all twelve chapters, because the Wotan essay is its sharpest application and its most urgent stake.\n\nThe through-line begins with **religion as experience** (Chapter 01): not creed but the empirical observation of the numinous, the soul's structural religious function. From there it moves to **the self as God-image** (Chapter 02): the regulating center of the psyche, empirically indistinguishable from the image of God, whose conscious realization \"amounts to God's incarnation.\" It passes through **Christ as an incomplete symbol of the self** (Chapter 03): the most powerful Western God-image, and yet a partial one, missing its own dark and nocturnal half. It confronts **the integration of evil** (Chapters 04 and 05): the polemic against *privatio boni*, the refusal to treat evil as mere absence, the insistence that wholeness requires owning the shadow, and the staggering claim of *Answer to Job* that even the God-image must take its evil into consciousness. And it arrives at **the one reality of psyche and matter** (Chapters 06, 07, 08): the psychoid archetype that breaks the subject-object divide, synchronicity as an acausal connecting principle ordered by meaning, the *unus mundus* from which both mind and world derive, and the audacious quarter-century collaboration with Pauli that tried to glimpse a single psychophysical ground beneath the apparent dualism of spirit and matter.\n\nWhat unifies these is the conviction that the psyche is *real* — that \"the God-image is not something invented, it is an experience that comes upon man spontaneously,\" possessing empirical reality in its own right (*esse in anima*). And from that single conviction follows Jung's civilizational wager, which the Wotan essay states most starkly: **the modern crisis is fundamentally spiritual.** The disenchantment of the world did not abolish the soul's religious function; it merely deprived it of its object and its discipline. The energy is still there. It will incarnate, in individuals who do the work — or it will erupt, in crowds that do not. That is the whole of it.\n\n## The contested legacy\n\nHonesty requires that this synthesis not end in triumph. Jung's project is one of the great contested edifices of twentieth-century thought, and the objections are serious. Four are worth naming directly.\n\n**The charge of psychologizing religion away.** The most persistent theological objection is that Jung, for all his reverence toward religious experience, ultimately *dissolves* its object. If God is \"a symbol of the self,\" if the God-image is a psychic fact and Jung \"presumes no judgement\" on whether anything transcendent answers to it, then has he not quietly relocated God inside the human skull? Believers from Martin Buber onward accused him of a covert Gnostic reductionism dressed as empiricism — of saying \"I make no metaphysical claims\" while building a system that functions as a complete metaphysics, one in which the divine is, finally, a content of the human unconscious. Jung's defense was always the empiricist hedge: he spoke of the *image*, the *experience*, the psychic fact, and disclaimed any pronouncement on the transcendent reality behind it — \"The privatio boni may therefore be a metaphysical truth. I presume no judgement on this matter.\" But as scholars such as Capobianco have argued, Jung did not consistently hold that line; he repeatedly lapsed into the very metaphysics he disclaimed, asserting things about the *nature* of good and evil, of God, of the structure of reality, that no merely empirical psychology is entitled to assert. The hedge, in practice, leaks.\n\n**The unfalsifiability problem.** From the opposite flank comes the empiricist's complaint, and it cuts at the foundation. The collective unconscious, the archetypes, the psychoid level, synchronicity — what evidence could possibly *disconfirm* any of them? If meaningful coincidences confirm synchronicity and meaningless ones are simply not synchronistic, the theory is unfalsifiable and therefore, to a strict empiricism, not science at all but a hermeneutic — a method of *reading* the world that can absorb any datum. This is the burden of Larry Arnhart's critique (and Paul Thagard's blunter dismissal of \"evidence-free Jungian psychology\"), discussed in Chapter 11: that neither Jung nor his popularizers ever gave a properly *scientific* argument for the collective unconscious, so that reliance on it amounts to \"unscientific faith.\" There is a real irony here that Chapter 11 flagged: this empiricist critique (Jung is too mystical) is the *opposite* of the serious-Jungian critique (Jung is too rationalist — over-moralizing, neglecting the anima and the feminine, slighting active imagination and the visionary stratum). Jung is somehow accused, from one side, of smuggling religion into science, and from the other of flattening religion into a tidy moral psychology. That he draws fire from both directions may be a sign of where he actually stands — on a deliberately uncomfortable threshold — or it may simply mean the project is incoherent. The corpus does not pretend to have settled which.\n\n**The political ambivalence of the Wotan period.** The Wotan essay cannot be cleanly celebrated as prophecy, and intellectual honesty forbids pretending otherwise. The diagnosis was, in one sense, brilliant and early: while others spoke of treaties and unemployment, Jung named the *religious frenzy* at the core of Nazism and saw the danger of mass possession with disturbing clarity. But the period is shadowed. Jung's editorship of the *Zentralblatt für Psychotherapie* under Nazified conditions, certain remarks distinguishing \"Germanic\" and \"Jewish\" psychology, and the tone of parts of \"Wotan\" itself have left him open to the charge of, at best, a dangerous fascination with the very energies he was diagnosing, and at worst a period of compromise he never fully reckoned with. The defenders point out that the essay is plainly a *warning*, that Jung's overall stance was anti-totalitarian, and that he later named the German catastrophe a collective shadow-eruption with great moral force. The prosecutors point out that one can be both an acute diagnostician of a possession and partly susceptible to it — and that Jung's own theory of the shadow should have made him the last man to imagine himself immune. *This remains genuinely contested terrain, and the verified backbone of this project does not adjudicate it; I flag it as an open wound rather than a closed case.*\n\n**The open questions this project did not resolve.** Two in particular should be left honestly on the table rather than papered over. The first concerns Jordan Peterson, the lens through which most contemporary readers meet Jung (see Chapter 11): *does Peterson flinch from* Answer to Job? Peterson's Jung is the Jung of order against chaos, the hero against the dragon, meaning as an antidote to nihilism — a bracing, adaptive, broadly conservative Jung. But the Jung of *Answer to Job* is something else: a Jung who indicts the God of the Hebrew Bible as less moral than Job, who locates evil *inside* the God-image, who demands that the divine itself be transformed. It is not at all clear that Peterson's redemptive, order-seeking reading can metabolize that scandalous, theology-shaking book, and the sources this project assembled do not resolve whether he engages it squarely or quietly steps around it. It is an open question, and we leave it open. The second concerns Jung's own foundations: the **Red Book / Gnosticism stratum** (see Chapter 09) — the *confrontation with the unconscious*, active imagination, the *Septem Sermones ad Mortuos*, the alchemical and Gnostic substrata of the whole system — remains, in this project, *under-verified*, more model-knowledge than fact-checked backbone. That matters, because it is precisely this visionary material that the serious-Jungian critics say the rationalizing, Petersonian reception leaves out. A fully grounded account of Jung's answer to the post-Christian vacuum would need that stratum on firmer evidentiary footing than this corpus achieved.\n\n## The wager, restated\n\nWhat, then, did Jung finally offer the modern soul standing in the ruins of its dead creed? Not a return ticket to belief. Not a political program. Not a proof. He offered a diagnosis and a discipline.\n\nThe diagnosis: that the death of the conscious God-image did not end the soul's hunger for the numinous, but only cut it loose, and that a numinous energy cut loose does not disperse — it possesses. The gods become diseases; denied the temple, they take the clinic and the street. Wotan was the name Jung gave to one such returning god, but the theorem is general, and one need not look hard at the ideological frenzies of one's own century to feel its force.\n\nThe discipline: the patient, individual, lifelong labor of individuation — making the unconscious conscious, integrating the shadow, withdrawing the projection of evil onto the enemy, and entering into conscious relationship with the God-image rather than being unconsciously possessed by it. Against the mass, the individual. Against possession, consciousness. Against Wotan, the slow incarnation of the numinous in one awake soul at a time.\n\nIt is, in the end, a wager and not a proof — Jung's bet that the modern crisis is at root a spiritual one, and that the only durable inoculation against collective madness is the most unfashionable thing imaginable: a person doing the inner work. Whether that wager is true, this corpus cannot finally say. But it has tried to show, faithfully and without flinching from the objections, exactly what Jung was betting, and why a century that has not run out of Wotans might still find the bet worth weighing.\n\n## Sources\n\n1. C.G. Jung, *Psychology and Religion: West and East*, CW 11 (definition of religion as observation of the *numinosum*; self-realization as God's incarnation; the self blended with the God-image; Christ as an incomplete totality). https://www.jungiananalysts.org.uk/wp-content/uploads/2018/07/C.-G.-Jung-Collected-Works-Volume-11_-Psychology-and-Religion_-West-and-East.pdf\n2. C.G. Jung, *Aion: Researches into the Phenomenology of the Self*, CW 9ii (\"the God-image... is an experience that comes upon man spontaneously\"; good and bad as equivalent opposites; the empiricist hedge on privatio boni; the Christ-symbol's Luciferian exclusion). https://carljungdepthpsychologysite.blog/2020/10/14/carl-jung-cw-9ii-aion/\n3. C.G. Jung, *Answer to Job* (1952) (the dark side of the God-image; Trinity to Quaternity; the continuing incarnation). https://en.wikipedia.org/wiki/Answer_to_Job\n4. C.G. Jung, \"Wotan\" (1936), in CW 10, *Civilization in Transition* (the diagnosis of National Socialism as religious possession; \"the gods have become diseases\"). *[This essay and its phrasings are reconstructed from general scholarship, not from the project's verified spine.]*\n5. C.G. Jung, *Modern Man in Search of a Soul* (loss of soul; mass-mindedness; the modern predicament).\n6. C.G. Jung, *Nietzsche's Zarathustra: Notes of the Seminar 1934–1939*, ed. J. Jarrett (the death of God as psychological catastrophe; inflation; \"as soon as he says God is dead, he is God\"). https://archive.org/details/nietzscheszarath0000jung\n7. Larry Arnhart, \"Jordan Peterson's Unscientific Faith in Jungian Psychology\" (the unfalsifiability / \"unscientific faith\" critique). http://darwinianconservatism.blogspot.com/2018/04/jordan-petersons-unscientific-faith-in.html\n8. \"The Peculiar Opacity of Jordan Peterson's Religious Views,\" *Quillette* (Peterson's metaphysical reticence). https://quillette.com/2018/07/23/the-peculiar-opacity-of-jordan-petersons-religious-views/\n9. Privatio boni and Jung's metaphysical lapses (peer-reviewed, IJSJ). https://www.ijsj.ie/assets/uploads/2021%20edition%202/5.%20pdf%20Privatio%20boni%20Changes%20noted.pdf"}]}</script>

<script>
const corpus = JSON.parse(document.getElementById('corpus-data').textContent);
const docs = corpus.documents;
const toc = document.getElementById('toc');
const content = document.getElementById('content');
const searchBox = document.getElementById('search');
const results = document.getElementById('search-results');
const key = 'corpus:' + corpus.slug;
let current = 0;

// theme
const themePref = localStorage.getItem('corpus-theme');
if (themePref) document.documentElement.dataset.theme = themePref;
else if (matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.dataset.theme = 'dark';
document.getElementById('theme-btn').onclick = () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('corpus-theme', next);
};

// table of contents
docs.forEach((d, i) => {
  const a = document.createElement('a');
  a.href = '#ch-' + i;
  a.innerHTML = '<span class="num">' + String(i).padStart(2, '0') + '</span>' + d.title;
  a.title = d.summary || '';
  a.onclick = (e) => { e.preventDefault(); show(i); closeMenu(); };
  toc.appendChild(a);
});

function show(i, anchorText) {
  current = Math.max(0, Math.min(docs.length - 1, i));
  content.innerHTML = marked.parse(docs[current].body);
  // rewrite chapter-to-chapter .md links into in-app navigation
  content.querySelectorAll('a[href$=".md"]').forEach(a => {
    const target = docs.findIndex(d => a.getAttribute('href').endsWith(d.file));
    if (target >= 0) { a.href = '#ch-' + target; a.onclick = (e) => { e.preventDefault(); show(target); }; }
  });
  content.querySelectorAll('a[href^="http"]').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });
  toc.querySelectorAll('a').forEach((a, j) => a.classList.toggle('active', j === current));
  document.getElementById('prev').disabled = current === 0;
  document.getElementById('next').disabled = current === docs.length - 1;
  document.getElementById('pager-label').textContent = (current + 1) + ' / ' + docs.length + ' · ' + docs[current].title;
  history.replaceState(null, '', '#ch-' + current);
  localStorage.setItem(key, current);
  if (anchorText) {
    const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT);
    let node; while ((node = walker.nextNode())) {
      const idx = node.textContent.toLowerCase().indexOf(anchorText.toLowerCase());
      if (idx >= 0) { node.parentElement.scrollIntoView({ block: 'center' }); return; }
    }
  }
  document.getElementById('main').scrollIntoView();
  window.scrollTo(0, 0);
}

document.getElementById('prev').onclick = () => show(current - 1);
document.getElementById('next').onclick = () => show(current + 1);
document.addEventListener('keydown', (e) => {
  if (e.target === searchBox) return;
  if (e.key === 'ArrowLeft') show(current - 1);
  if (e.key === 'ArrowRight') show(current + 1);
});

// search
let timer;
searchBox.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(runSearch, 150);
});
function runSearch() {
  const q = searchBox.value.trim().toLowerCase();
  results.innerHTML = '';
  toc.style.display = q ? 'none' : '';
  if (!q || q.length < 3) { toc.style.display = ''; return; }
  let hits = 0;
  docs.forEach((d, i) => {
    const text = d.body.toLowerCase();
    let pos = text.indexOf(q), shown = 0;
    while (pos >= 0 && shown < 3 && hits < 40) {
      const start = Math.max(0, pos - 60), end = Math.min(d.body.length, pos + q.length + 90);
      const raw = d.body.slice(start, end).replace(/[#*_>\[\]]/g, '');
      const safe = raw.replace(/&/g, '&amp;').replace(/</g, '&lt;');
      const snippet = safe.replace(new RegExp(q.replace(/[.*+?^${}()|\\]/g, '\\$&'), 'ig'), m => '<mark>' + m + '</mark>');
      const div = document.createElement('div');
      div.className = 'hit';
      div.innerHTML = '<b>' + d.title + '</b>…' + snippet + '…';
      const exact = d.body.slice(pos, pos + q.length);
      div.onclick = () => { show(i, exact); searchBox.value = ''; runSearch(); closeMenu(); };
      results.appendChild(div);
      hits++; shown++;
      pos = text.indexOf(q, pos + q.length);
    }
  });
  if (!hits) results.innerHTML = '<div class="none">No matches.</div>';
}

// mobile menu
const menuBtn = document.getElementById('menu-btn');
menuBtn.onclick = () => document.body.classList.toggle('menu-open');
function closeMenu() { document.body.classList.remove('menu-open'); }

// initial chapter: hash > saved progress > 0
const hash = location.hash.match(/^#ch-(\d+)$/);
show(hash ? +hash[1] : +(localStorage.getItem(key) || 0));
</script>
</body>
</html>
