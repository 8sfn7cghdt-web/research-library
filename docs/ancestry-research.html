erence). Lean: neutral.\n18. Wikipedia (finding aid), \"Frankie Yankovic,\" and Case Western *Encyclopedia of Cleveland History*, \"Polkas,\" on Yankovic, Cleveland/Slovenian style, and the 1986 Grammy. https://en.wikipedia.org/wiki/Frankie_Yankovic and https://case.edu/ech/articles/p/polkas — accessed 2026-05-30. Tier 2/3 (academic encyclopedia + reference). Lean: neutral.\n19. Wikipedia (finding aid), \"Slovenian-style polka,\" on the Cleveland/Slovenian sub-genre. https://en.wikipedia.org/wiki/Slovenian-style_polka — accessed 2026-05-30. Tier 3 (reference). Lean: neutral.\n20. UNESCO Intangible Cultural Heritage, \"Baltic song and dance celebrations,\" and Wikipedia (finding aid) \"Baltic song festivals,\" on the ~40,000-singer festivals, 1869/1873 origins, Baltic-German choral transmission, and the Singing Revolution. https://ich.unesco.org/en/RL/baltic-song-and-dance-celebrations-00087 and https://en.wikipedia.org/wiki/Baltic_song_festivals — accessed 2026-05-30. Tier 1/2 (UNESCO primary + reference). Lean: neutral.\n21. Encyclopedia.com, \"Dainas,\" and popkult.org, \"The Latvian Daina,\" on the ~60,000 collected dainas, their form (short, unrhymed, trochaic), and their role in national awakening. https://www.encyclopedia.com/environment/encyclopedias-almanacs-transcripts-and-maps/dainas — accessed 2026-05-30. Tier 2/3 (reference). Lean: neutral.\n22. Herbert J. Gans, \"Symbolic Ethnicity: The Future of Ethnic Groups and Cultures in America,\" *Ethnic and Racial Studies* 2, no. 1 (1979) — primary-text PDF and Sage encyclopedia entry; with Richard Alba, *Ethnic Identity: The Transformation of White America* (Yale, 1990) and \"The Twilight of Ethnicity among American Catholics of European Ancestry\" (1981). http://npproseminar.pbworks.com/f/Gans,+Symbolic+Ethnicity.pdf and https://journals.sagepub.com/doi/10.1177/000271628145400108 — accessed 2026-05-30. Tier 2 (foundational peer-reviewed scholarship). Lean: scholarly.\n23. Mary C. Waters, *Ethnic Options: Choosing Identities in America* (University of California Press, 1990); publisher page and research summaries. https://www.ucpress.edu/books/ethnic-options/paper — accessed 2026-05-30. Tier 2 (standard scholarly monograph). Lean: scholarly.\n24. Mary C. Waters, \"Optional Ethnicities: For Whites Only?\" (1996), on the whiteness of costless symbolic ethnicity. https://granolagradschoolandgoffman.wordpress.com/2014/10/23/waters-m-c-1996-optional-ethnicities-for-whites-only/ — accessed 2026-05-30. Tier 2 (peer-reviewed chapter, via secondary summary). Lean: scholarly. *Underlying source is Waters 1996.*\n25. TIME, \"How America Invented St. Patrick's Day,\" and \"What It Means to Be American\" (Smithsonian/ASU), plus Encyclopedia of Greater Philadelphia, \"Saint Patrick's Day,\" on the parade as an American invention, its tie to Irish electoral power, and re-export to Ireland. https://time.com/3744055/america-invented-st-patricks-day/ and https://whatitmeanstobeamerican.org/identities/how-america-invented-st-patricks-day/ — accessed 2026-05-30. Tier 2 (reputable popular history grounded in scholarship). Lean: neutral.\n26. Wikipedia (finding aid), \"Pulaski Day Parade,\" on the NYC Pulaski parade as the city's second-oldest ethnic parade (since 1937), used as the comparative-weakness data point against St. Patrick's Day; DNA-revival of submerged strands is inference from the corpus's own AncestryDNA basis (see RESEARCH_PLAN.md). https://en.wikipedia.org/wiki/Pulaski_Day_Parade — accessed 2026-05-30. Tier 3 (reference). Lean: neutral. **The DNA-revival claim is partly interpretive and flagged as such in Claim 6.11.**"}, {"order": 7, "file": "Future_Trajectory.md", "title": "Future Trajectory: What Further Discovery Could Reveal, and Where the Heritage Is Heading", "summary": "", "body": "# Future Trajectory: What Further Discovery Could Reveal, and Where the Heritage Is Heading\n\n## Bottom Line\n\nThe current estimate is an *inference* — a Munster-weighted Irish signal plus a Southern-Poland-weighted Balto-Slavic signal, anchored by two surnames (Collins/Ó Coileáin, Pokorný) — and the single most consequential fact about its future is that almost all of the remaining uncertainty is *resolvable with ordinary, mostly-online records and a few inexpensive DNA tests*, not with better algorithms. The fastest, cheapest, highest-yield moves are documentary and human: test a parent or older relative to anchor SideView's \"by parent\" split to an actual mother/father; do a Y-DNA test on a male Pokorný to lock the patriline to a haplogroup and a surname project; and pull the two free, decisive paper trails — Irish civil registration + NLI Catholic parish registers + Griffith's Valuation for the Collins line, and US naturalization papers + ship manifests for the Pokorný line (because those American records, not the European ones, are what name the *village* behind the imperial \"Austria\"/\"Russia\" label) [Claim 7.1–7.5]. The DNA *percentages* will keep drifting with every reference-panel update — small components (the 1% tags, possibly the Baltic 9%) may shrink or vanish, and a future \"Galicia\" or finer-Baltic region could reshuffle Parent 1 without any change to the DNA — so the regional numbers are the *least* durable part of the picture and should never be the thing a family story rests on [Claim 7.6]. The genealogically *actionable* layer is the recent-ancestry communities and the shared-match clusters, and those only get sharper as the databases grow [Claim 7.7].\n\nOn identity (Thread B): the dominant gravitational pull is still the long assimilation arc that Gans, Waters, and Alba described — symbolic, optional, holiday-compressed white ethnicity, with the Irish strand reliably out-competing the submerged Czech/Polish/Baltic strands for attention. But that arc is now crossed by two genuinely new forces: cheap consumer DNA, which re-spotlights exactly the submerged strands; and a fast-growing, instrumentally-valuable *EU-citizenship-by-descent* market that has turned \"documented ancestry\" from a sentimental hobby into a passport. My central forecast over one generation is **continuity-with-a-twist**: heritage held lightly and symbolically as the baseline, with a rising minority converting interest into documented pedigrees and, for the Irish (and possibly Polish/Lithuanian) line, into actual EU citizenship — while the lived, parish-and-neighborhood ethnic world that sustained the immigrant generations continues to fade [Scenarios A–D].\n\n## Method (which Round 1 docs fed this)\n\n- **Doc 03 (Genetic/Anthropological Context)** is the spine of Thread A: it establishes what SideView, the reference panel, the HMM, \"Ancestral Regions vs. Ancestral Journeys,\" and the update mechanics actually do — so the roadmap and the \"what will sharpen / what will keep moving\" analysis build directly on its Claims 3.1–3.13.\n- **Docs 01, 05 (Irish Origins; Surnames)** feed the Collins record-set plan and the Ó Coileáin-vs-Ó Cuiléin / Gaelic-vs-English open questions.\n- **Docs 02, 04, 05 (East-Euro/Baltic Origins; Path to America; Surnames)** feed the Pokorný record-set plan, the imperial-label problem, and the Czech-vs-Galician-vs-Baltic branch questions.\n- **Doc 06 (Cultural Heritage and Identity)** is the spine of Thread B: its symbolic-ethnicity / ethnic-options material (Gans, Waters, Alba), the Irish-dominance prediction (Claim 6.11), and the DNA-revival meta-fact are the drivers behind the four scenarios.\n- New web research (May 2026) verified: current Irish Foreign Births Register rules and processing times; Polish \"1920-rule\" citizenship-confirmation requirements; Lithuanian pre-1940 restoration/dual-citizenship rules; Czech citizenship-by-declaration rules and the pending great-grandparent amendment; Czech Actapublica/matriky digitization; NLI/Irish record-set availability; and current SideView capabilities.\n\n---\n\n## Thread A — The Practical Roadmap\n\nThe highest-yield first move is not a new algorithm but testing a parent or older relative. Because SideView labels its two columns arbitrarily and cannot by itself say which side is the mother and which the father (Doc 03, Claims 3.3–3.4), the single most informative inexpensive step is to test the oldest available relatives — ideally one or both parents, otherwise aunts and uncles, then grandparents if living. Ancestry's own materials and independent experts agree SideView \"can't tell you which side is maternal and which is paternal,\" leaving the user to fix it via known relatives [V-DNA1, V-DNA2; Doc 03 Claim 3.4]; testing a parent directly phases the child's genome with certainty for that parent's contribution, while testing older relatives recovers DNA segments the tested person did not inherit, extending reach into ancestral lines. The natural hypothesis here — Collins/Irish on one parent, Pokorný/Central-European on the other (Doc 03 Open Q1) — is confirmable in days with a single parental kit, which also future-proofs against the irreversible loss of irreplaceable elder DNA. The action is straightforward: test the parent(s) first; if unavailable, the oldest living relative on each side.\n\nA Y-DNA test on a male Pokorný then resolves what autosomal percentages structurally cannot — the deep patriline behind the Czech surname and the Czech-versus-Galician-versus-Jewish branch question (Doc 02 Open Q1; Doc 05 Open Q5). Because Y-DNA \"is passed from a father to his sons only … with no mixing, dilution or contribution from non-paternal lines,\" it traces and time-depths the surname line and places it on the Y-haplotree, with Big Y-700 returning a SNP-confirmed (not predicted) haplogroup and the finest patrilineal resolution [V-DNA3]. A male-line Pokorný descendant should test (Big Y-700 at FamilyTreeDNA is the high-resolution option; Y-111 or Y-37 are cheaper entry points) and join a relevant surname or haplogroup project; separately, an mtDNA full-sequence test traces the direct maternal line (mother's mother's line), the only tool that interrogates that specific thread, useful for the un-surnamed maternal lines carrying much of the Baltic/Slavic signal (Doc 05 Claim 5.12). Y-DNA resolves the patriline with high confidence, though how precisely a Czech-versus-Polish-versus-Jewish call falls out depends on how many comparable testers and how dense the relevant project is, which improves over time; and if no living male Pokorný is available, the patriline can still be reached via a male-line cousin who carries the surname.\n\nThe workhorse that turns the estimate into named ancestors is autosomal match-clustering — shared matches, ThruLines, and the recent-ancestry communities — and it strengthens as databases grow. The genealogically decisive layer is not the percentages but the matches: shared-match clustering (the \"Leeds method\" and the major sites' clustering tools), Ancestry's ThruLines (which hypothesizes common ancestors by combining DNA matches with members' trees), and the recent-ancestry communities or journeys (the roughly 300-year IBD layer, Doc 03 Claim 3.12). Doc 03 establishes that these communities are \"the more genealogically actionable layer\" and that SideView phasing quality \"relies, in part, on that person sharing enough DNA with other people in our database,\" so database growth directly improves both phasing and community resolution (Claims 3.3, 3.12). The method is to build a tree, attach DNA matches, use shared-match clusters to separate the Collins matches from the Pokorný matches (far easier now that matches are split by parent side), and follow ThruLines hypotheses back to documented ancestors — always verifying the hint against primary records rather than trusting other users' trees.\n\nOn paper the Collins (Munster) line is the more tractable of the two, crackable mostly with free, now-online Irish record sets that interlock to place a specific family in a named Cork parish and townland — exactly the resolution Docs 01 and 05 flagged as missing (Doc 01 Open Q1–Q2; Doc 05 Open Q1–Q2). The concrete record stack, verified as available in May 2026:\n\n- **Irish civil registration** (statutory births/marriages/deaths; marriages from 1864, births/deaths fully from 1864) — searchable with images on the free government site irishgenealogy.ie; usually the *entry point* that ties a US-recorded name and age to an Irish event [V-IRL1, V-IRL3].\n- **NLI Catholic Parish Registers** — the National Library of Ireland's digitized microfilm of Catholic baptism/marriage registers (c.1740–1880), free at registers.nli.ie; RootsIreland.ie adds *transcribed, searchable* indexes (~23M+ records across county genealogy centres) for a fee [V-IRL1, V-IRL2]. For a pre-civil-registration West Cork Catholic family, the parish register is the spine.\n- **Griffith's Valuation (1847–1864)** — the comprehensive property-tax survey; free transcripts, images, and maps at AskAboutIreland; it places a *named householder* in a *named townland* and is the best census-substitute for the famine/post-famine decades [V-IRL1].\n- **Tithe Applotment Books (c.1823–1838)** — free with images at the National Archives of Ireland; the older land-occupier list that can push a line back a generation before Griffith's [V-IRL1].\n- **1901 and 1911 censuses** — free with images at the National Archives of Ireland; if any of the line was still in Ireland then, these give whole-household snapshots including the Irish-language column relevant to Doc 01's \"hinge generation\" question.\n\nThe US-side records below supply the bridge: a naturalization or manifest naming the Irish county or parish of origin is what makes the Irish records findable. The workflow runs US-record → Irish county/parish → civil registration → parish register → Griffith's/Tithe → 1901/1911, and success hinges on the commonness of \"Collins\" in Cork (Doc 05) and on recovering a specific parish from US records or family memory; the Ó Coileáin-versus-Ó Cuiléin sept question (Doc 05 Open Q2) may further yield to a Collins Y-DNA surname project.\n\nFor the Pokorný line the logic is reversed: the village-naming records are American — naturalization papers, post-1906 manifests, WWI/WWII draft cards — because the imperial \"Austria/Russia\" label hides the ethnicity (Doc 02 Claim 2.9-era recording; Doc 04 Claim 4.5), and only after the village is known do the European archives open. The European records are now largely digitized and free, but they are unusable until the town is known, and the records that most reliably name a specific town are the US ones generated after the immigrant arrived:\n\n- **US naturalization papers** (especially post-1906 Declarations of Intention and Petitions) frequently state the exact town or village of birth and the ship and date of arrival — the single most valuable Pokorný document.\n- **Passenger manifests post-1906/1907** are far richer than earlier ones (place of birth, last residence, relative left behind, relative joining) — but \"place of last residence ≠ birthplace,\" and pre-1920 Galicians read as \"Austria,\" Russian-partition subjects as \"Russia\" (Doc 04 Claim 4.5).\n- **WWI/WWII draft registration cards and US censuses (1900–1950)** triangulate arrival year, naturalization status, and stated birthplace.\n- **Once the village is known, the European side opens.** Czech parish registers (matriky) are almost all digitized and free online — the Moravian Land Archive in Brno (MZA) publishes them through Actapublica (mza.cz/actapublica), and the other regional archives (Třeboň, Plzeň, Litoměřice, Zámrsk, Opava) run comparable portals [V-CZ1]. For a Galician/Polish origin, the targets are Greek-Catholic (Uniate) and Roman-Catholic parish books and the Galician civil registers held in Polish and Ukrainian archives (increasingly online via AGAD, the regional state archives, and Geneteka/Genealogy Indexer). For a genuine Baltic strand, the Lutheran and Catholic church books of the Estonian, Latvian, and Lithuanian parishes apply (Estonia's Saaga portal is a model of full digitization).\n\nThe imperial-label workaround, in short, is to get the village from the American paper trail first, then go straight to that parish's digitized matrika. The method and Czech/Estonian digitization are solid; Galician/Ukrainian coverage is more uneven (some records lost or held in Ukraine's Lviv archives), and success depends on surviving US naturalization records and on which branch the patriline actually is — itself partly the Y-DNA question above.\n\nTwo cautions frame what the DNA itself can and cannot do over the next decade. First, the regional percentages will keep moving with every panel update — not because the DNA changes but because Ancestry and its competitors keep re-paneling and re-running the algorithm (Doc 03 Claim 3.11). Expect the 1% tags (Northwestern Balkans, \"Germans in Russia\") to flicker or vanish, the Baltic 9% and the 3–4% Germanic/British traces to wobble, and a plausible future \"Galicia\"-specific or finer-Baltic region to reshuffle Parent 1's internal split, while the robust layer (the ~50/50 parental split; Munster as the Irish center of gravity; Southern Poland as the Central-European center of gravity; the northeastern-European bloc as one signal) persists — the 2024–25 update having already split the old broad Eastern-European/Baltic labels into eight finer regions, and admixture data alone never being able to prove any single small percentage \"real\" or \"spurious\" (Doc 03 Claims 3.10, 3.11). The percentages should therefore be treated as a probabilistic, moving estimate of population similarity, not a ledger of ancestors, with narratives anchored to documented ancestors and the robust large signals rather than the 1–9% tags. Second, and more encouragingly, the genealogically *useful* layer will sharpen even as the headline percentages stay noisy: SideView now groups matches and divides ethnicity by parent, with parental assignment improving as shared-segment coverage rises, and database growth (22M+ and rising) mechanically improves phasing coverage and community granularity (Doc 03 Claims 3.3, 3.12) [V-DNA1, V-DNA2]. The caveat is commercial: vendor roadmaps are not guaranteed, and pricing, privacy regulation, and corporate ownership (Ancestry is privately held; 23andMe's 2025 financial distress is a cautionary signal for the sector) could change feature availability — so it is worth re-checking communities and SideView after each update and exporting raw DNA and match data now as a hedge against platform risk.\n\nFinally, documented ancestry now carries a concrete instrumental payoff — EU citizenship-by-descent — which raises the stakes of all the record work above and is a central driver of Thread B. The four relevant routes differ sharply in feasibility for this family (rules as of 2026). **Ireland's Foreign Births Register** grants citizenship by descent if a *grandparent* was born on the island of Ireland, and through a more distant ancestor only if each intervening generation was entered on the FBR before the next was born; Ireland does not grant citizenship through a great-grandparent automatically, so the route is straightforward if a grandparent was Irish-born and generally closed otherwise unless a parent registered in time [V-IRL-CIT1, V-IRL-CIT2]. Processing guidance was raised in March 2026 from 9 to 12 months, and US FBR applications jumped roughly 63% (11,601 in 2024 to 18,910 in 2025) — a live signal of the revival — making the FBR this family's strongest route, hinging on whether the Irish-born Collins ancestor is within the grandparent window [V-IRL-CIT1]. **Poland's confirmation of citizenship** (the \"1920 rule\") is not citizenship \"by descent\" but confirmation of an unbroken citizenship that was never lost: an ancestor must have been a Polish citizen under or after the 1920 Citizenship Act and must not have lost it before the next generation's birth (for instance by naturalizing elsewhere before 1951), with demanding documentary proof; the Galician complication is decisive, since an ancestor who emigrated from Austrian Galicia and naturalized in the US before 1920, or left before the Polish state existed, likely never held post-1920 Polish citizenship, closing the route, whereas a line still in Poland after 1920 keeps it open [V-PL-CIT1]. **Lithuania's restoration** route applies to those (or descendants of those) who held Lithuanian citizenship before the 15 June 1940 Soviet occupation and who left before 11 March 1990, permits dual citizenship on that basis, and was broadened by 2026 reforms — but is conditional on a documented pre-1940 Lithuanian citizen ancestor, which the small Lithuanian DNA signal does not establish [V-LT-CIT1, V-LT-CIT2]. **Czechia's citizenship by declaration** (dual citizenship allowed since 2013/2014) lets descendants of former Czech/Czechoslovak citizens claim, though under current law a great-grandparent line generally requires the parent to acquire or reclaim first, with a pending Parliament amendment that would let great-grandchildren apply directly — conditional on documenting a Czech/Czechoslovak-citizen ancestor, and bearing on whether this route or the Polish one is even applicable given the Pokorný patriline's Czech-versus-Galician ambiguity [V-CZ-CIT1]. The rules are well established; which (if any) this family can actually use turns on facts not yet documented — the generation of the Irish-born ancestor, whether the Polish line held post-1920 citizenship, and whether a real pre-1940 Lithuanian or Czechoslovak-citizen ancestor exists — and because citizenship law changes, current rules should be verified with official consular sources at the time of any application.\n\n---\n\n## Scenarios (Thread B — the trajectory of how this heritage is held, known, and used)\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 560\" role=\"img\" aria-label=\"A fanned probability forecast spreading rightward from a single &#8216;today&#8217; point into four ranged scenario bands over the next generation. Ordered baseline to conditional: Scenario A, symbolic Irish-dominant continuity, 45 to 60 percent, drawn in Gaelic green as the widest, highest band; Scenario B, DNA-driven documentary revival, 25 to 40 percent, half green and half crimson where the two lineages cross; Scenario C, instrumental heritage and EU citizenship by descent, 15 to 30 percent and marked conditional, in crimson; Scenario D, roots tourism and experiential reconnection, 10 to 20 percent, the narrowest band, in plum. Each band is a fanned wedge whose vertical thickness shows its probability range, edged with long-dashed rhumb lines, opening from a compass-rose origin to a percentage axis at right.\">\n<text x=\"350\" y=\"34\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" letter-spacing=\"3\">WHERE THE HERITAGE GOES<\/text>\n<text x=\"350\" y=\"52\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">four calibrated futures over the next generation &#183; continuity-with-a-twist<\/text>\n<line x1=\"40\" y1=\"66\" x2=\"660\" y2=\"66\" class=\"ln\" stroke-width=\"1.1\"/>\n<line x1=\"40\" y1=\"69\" x2=\"660\" y2=\"69\" class=\"ln-soft\" stroke-width=\".6\"/>\n<line x1=\"118\" y1=\"92\" x2=\"600\" y2=\"92\" class=\"ln-soft\" stroke-width=\".5\"/>\n<line x1=\"118\" y1=\"188\" x2=\"600\" y2=\"188\" class=\"ln-soft\" stroke-width=\".5\"/>\n<line x1=\"118\" y1=\"284\" x2=\"600\" y2=\"284\" class=\"ln-soft\" stroke-width=\".5\"/>\n<line x1=\"118\" y1=\"380\" x2=\"600\" y2=\"380\" class=\"ln-soft\" stroke-width=\".5\"/>\n<line x1=\"118\" y1=\"476\" x2=\"600\" y2=\"476\" class=\"ln-soft\" stroke-width=\".5\"/>\n<text x=\"46\" y=\"284\" font-size=\"9\" class=\"t-muted\" letter-spacing=\"1\">TODAY<\/text>\n<text x=\"46\" y=\"296\" font-size=\"9\" class=\"t-muted\" letter-spacing=\"1\">2026<\/text>\n<line x1=\"118\" y1=\"100\" x2=\"118\" y2=\"468\" class=\"ln\" stroke-width=\"1.3\"/>\n<g class=\"s-t3\" stroke-width=\"1.1\" fill=\"none\">\n<circle cx=\"118\" cy=\"284\" r=\"13\"/>\n<circle cx=\"118\" cy=\"284\" r=\"5.2\"/>\n<path d=\"M118,266 L121,279 L118,284 L115,279 Z\" class=\"f-t3\" stroke=\"none\"/>\n<path d=\"M118,302 L121,289 L118,284 L115,289 Z\" class=\"f-t3\" opacity=\".4\" stroke=\"none\"/>\n<line x1=\"100\" y1=\"284\" x2=\"136\" y2=\"284\"/>\n<line x1=\"105\" y1=\"271\" x2=\"131\" y2=\"297\"/>\n<line x1=\"105\" y1=\"297\" x2=\"131\" y2=\"271\"/>\n<\/g>\n<text x=\"118\" y=\"252\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\" style=\"fill:var(--t3)\">the single<\/text>\n<text x=\"118\" y=\"318\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-muted\">estimate<\/text>\n<path d=\"M131,284 Q300,150 596,118 L596,170 Q300,210 134,290 Z\" class=\"f-t1\" opacity=\".82\"/>\n<path d=\"M131,284 Q300,210 596,170 L596,206 Q300,250 135,292 Z\" class=\"f-t1\" opacity=\".34\"/>\n<path d=\"M131,284 Q300,150 596,118\" fill=\"none\" class=\"s-t1\" stroke-width=\"1.4\" stroke-dasharray=\"9 5\"/>\n<path d=\"M131,284 Q300,210 596,206\" fill=\"none\" class=\"s-t1\" stroke-width=\"1.4\" stroke-dasharray=\"9 5\"/>\n<path d=\"M131,284 Q300,212 596,228\" fill=\"none\" class=\"s-t2\" stroke-width=\"1.4\" stroke-dasharray=\"9 5\"/>\n<path d=\"M135,290 Q300,250 596,288\" fill=\"none\" class=\"s-t2\" stroke-width=\"1.4\" stroke-dasharray=\"9 5\"/>\n<path d=\"M131,284 Q300,212 596,228 L596,264 Q300,232 132,287 Z\" class=\"f-t1\" opacity=\".7\"/>\n<path d=\"M132,287 Q300,232 596,264 L596,288 Q300,250 135,290 Z\" class=\"f-t2\" opacity=\".7\"/>\n<path d=\"M135,290 Q300,278 596,322 L596,358 Q300,300 137,293 Z\" class=\"f-t2\" opacity=\".8\"/>\n<path d=\"M135,290 Q300,278 596,322\" fill=\"none\" class=\"s-t2\" stroke-width=\"1.4\" stroke-dasharray=\"9 5\"/>\n<path d=\"M137,293 Q300,300 596,358\" fill=\"none\" class=\"s-t2\" stroke-width=\"1.4\" stroke-dasharray=\"6 4\"/>\n<path d=\"M137,293 Q300,330 596,414 L596,438 Q300,344 138,295 Z\" class=\"f-t5\" opacity=\".72\"/>\n<path d=\"M137,293 Q300,330 596,414\" fill=\"none\" class=\"s-t5\" stroke-width=\"1.3\" stroke-dasharray=\"6 4\"/>\n<path d=\"M138,295 Q300,344 596,438\" fill=\"none\" class=\"s-t5\" stroke-width=\"1.3\" stroke-dasharray=\"6 4\"/>\n<line x1=\"596\" y1=\"100\" x2=\"596\" y2=\"468\" class=\"ln\" stroke-width=\"1.1\"/>\n<g font-size=\"8.5\" class=\"t-muted\" text-anchor=\"start\">\n<line x1=\"596\" y1=\"118\" x2=\"601\" y2=\"118\" class=\"ln\" stroke-width=\"1\"/><text x=\"605\" y=\"121\">60%<\/text>\n<line x1=\"596\" y1=\"170\" x2=\"601\" y2=\"170\" class=\"ln-soft\" stroke-width=\".7\"/><text x=\"605\" y=\"173\">45%<\/text>\n<line x1=\"596\" y1=\"228\" x2=\"601\" y2=\"228\" class=\"ln-soft\" stroke-width=\".7\"/><text x=\"605\" y=\"231\">40%<\/text>\n<line x1=\"596\" y1=\"288\" x2=\"601\" y2=\"288\" class=\"ln-soft\" stroke-width=\".7\"/><text x=\"605\" y=\"291\">25%<\/text>\n<line x1=\"596\" y1=\"322\" x2=\"601\" y2=\"322\" class=\"ln-soft\" stroke-width=\".7\"/><text x=\"605\" y=\"325\">30%<\/text>\n<line x1=\"596\" y1=\"358\" x2=\"601\" y2=\"358\" class=\"ln-soft\" stroke-width=\".7\"/><text x=\"605\" y=\"361\">15%<\/text>\n<line x1=\"596\" y1=\"414\" x2=\"601\" y2=\"414\" class=\"ln-soft\" stroke-width=\".7\"/><text x=\"605\" y=\"417\">20%<\/text>\n<line x1=\"596\" y1=\"438\" x2=\"601\" y2=\"438\" class=\"ln\" stroke-width=\"1\"/><text x=\"605\" y=\"441\">10%<\/text>\n<\/g>\n<text x=\"648\" y=\"92\" text-anchor=\"end\" font-size=\"8.5\" class=\"t-muted\" letter-spacing=\"1.5\">PROBABILITY &#8594;<\/text>\n<text x=\"404\" y=\"139\" font-size=\"13\" font-weight=\"bold\" class=\"t-inv t-serif\">A &#183; Symbolic continuity<\/text>\n<text x=\"404\" y=\"155\" font-size=\"9.5\" class=\"t-inv\">Irish-dominant &#183; St. Patrick&#8217;s Day the master ritual<\/text>\n<text x=\"404\" y=\"170\" font-size=\"11\" font-weight=\"bold\" class=\"t-inv\">45&#8211;60%<\/text>\n<text x=\"496\" y=\"170\" font-size=\"8.5\" class=\"t-inv\" font-style=\"italic\">the baseline attractor<\/text>\n<text x=\"392\" y=\"251\" font-size=\"12\" font-weight=\"bold\" class=\"t-inv t-serif\">B &#183; DNA-driven revival<\/text>\n<text x=\"392\" y=\"266\" font-size=\"9\" class=\"t-inv\">cheap testing resurfaces the submerged C-Euro / Baltic strands<\/text>\n<text x=\"392\" y=\"280\" font-size=\"10.5\" font-weight=\"bold\" class=\"t-inv\">25&#8211;40%<\/text>\n<text x=\"478\" y=\"280\" font-size=\"8.5\" class=\"t-inv\" font-style=\"italic\">where the two tinctures cross<\/text>\n<text x=\"392\" y=\"334\" font-size=\"12\" font-weight=\"bold\" class=\"t-inv t-serif\">C &#183; Instrumental heritage<\/text>\n<text x=\"392\" y=\"348\" font-size=\"9\" class=\"t-inv\">EU citizenship by descent &#183; Irish FBR &#183; US filings +63% &#8217;24&#8594;&#8217;25<\/text>\n<text x=\"392\" y=\"363\" font-size=\"10.5\" font-weight=\"bold\" class=\"t-inv\">15&#8211;30%<\/text>\n<text x=\"476\" y=\"363\" font-size=\"8.5\" class=\"t-inv\" font-style=\"italic\">conditional &#183; FBR ~12-mo wait<\/text>\n<text x=\"300\" y=\"386\" font-size=\"11.5\" font-weight=\"bold\" style=\"fill:var(--t5)\" class=\"t-serif\">D &#183; Roots tourism<\/text>\n<text x=\"300\" y=\"400\" font-size=\"9\" class=\"t-muted\">West Cork &#183; Bohemia / Moravia &#183; the Baltic<\/text>\n<text x=\"300\" y=\"414\" font-size=\"10\" font-weight=\"bold\" style=\"fill:var(--t5)\">10&#8211;20%<\/text>\n<line x1=\"356\" y1=\"397\" x2=\"430\" y2=\"408\" class=\"ln-soft\" stroke-width=\".6\"/>\n<g transform=\"translate(132,498)\">\n<rect x=\"0\" y=\"0\" width=\"11\" height=\"11\" class=\"f-t1\" opacity=\".82\"/>\n<text x=\"17\" y=\"9\" font-size=\"9\">Irish line (&#211; Coile&#225;in)<\/text>\n<rect x=\"150\" y=\"0\" width=\"11\" height=\"11\" class=\"f-t2\" opacity=\".8\"/>\n<text x=\"167\" y=\"9\" font-size=\"9\">Eastern line (Pokorn&#253;)<\/text>\n<rect x=\"312\" y=\"0\" width=\"11\" height=\"11\" class=\"f-t5\" opacity=\".72\"/>\n<text x=\"329\" y=\"9\" font-size=\"9\">experiential<\/text>\n<line x1=\"388\" y1=\"6\" x2=\"420\" y2=\"6\" class=\"s-t3\" stroke-width=\"1.3\" stroke-dasharray=\"9 5\"/>\n<text x=\"426\" y=\"9\" font-size=\"9\" class=\"t-muted\">range = band, not a line<\/text>\n<\/g>\n<text x=\"350\" y=\"540\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\" font-style=\"italic\">Probabilities are the dominant mode for the next generation &#8212; framed as a band, because a single forecast line would lie about the spread.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 7.<\/strong> The corpus&#8217;s bet, drawn as a sailing-chart. The widest, brightest wedge stays Irish-symbolic &#8212; but its top edge already overlaps the rising crimson of a DNA-and-documents revival, and a thin, gated citizenship lane runs beneath: heritage held lightly by default, yet increasingly convertible into a documented pedigree and even an EU passport.<\/figcaption>\n<\/figure>\n\n\n*These are calibrated reads of where diaspora identity is heading over ~one generation, applied to this family's profile. Probabilities are rough ranges and sum to ~100% across the four (they are framed as the dominant mode for this family/its next generation, not mutually exclusive in every individual). Forecast, not preference.*\n\n### Scenario A — \"Symbolic continuity\" (the baseline / most likely)\n- **Probability:** 45–60%\n- **Description:** The heritage continues to be held the way Doc 06 describes the present: lightly, optionally, and symbolically. The Irish strand stays dominant and ritually visible (St. Patrick's Day, a felt \"we're Irish\"), the Czech/Polish/Baltic strands remain submerged and surface mainly as the surname, occasional foods (kolache/pierogi at Christmas), and \"we're also part Polish/Czech\" — now quantified by the DNA test but not acted on. No documented pedigree, no citizenship, no roots trip. The lived parish-and-neighborhood ethnic world keeps fading.\n- **Drivers:** The Gans/Waters/Alba assimilation arc and the documented Irish-dominance effect (Doc 06 Claims 6.10–6.11); the death of the national-parish world (Doc 06 Claim 6.2, 6.4); generational distance (3rd–4th+ generation); the low cost and low commitment of symbolic ethnicity.\n- **Conditions:** Holds if no individual in the next generation has a strong personal trigger (a class, a partner, a trip, a retirement project) to go deeper.\n- **Signals to watch:** Heritage invoked only on calendar holidays; the DNA result shared as a curiosity then shelved; no tree-building beyond hints; children not taught any Old-World practice.\n- **Time horizon:** Steady across the full 10–20 years; this is the default attractor.\n\n### Scenario B — \"DNA-driven documentary revival\" (rising, plausible)\n- **Probability:** 25–40%\n- **Description:** The DNA test is the trigger, not the endpoint. Someone in the family runs the Thread-A roadmap: tests a parent, does the Pokorný Y-DNA, builds a tree, pulls Griffith's/parish registers and the US naturalization file, and recovers named ancestors and the West Cork parish and/or the Central-European village. The submerged Czech/Polish/Baltic strand is *re-spotlighted* and partly recovered as documented fact — the meta-irony Doc 06 names (Claim 6.11) becomes this family's actual path. Identity shifts from \"we're Irish (and a bit Polish)\" to a documented, more balanced, more specific story.\n- **Drivers:** Cheap, ubiquitous consumer DNA and the re-spotlighting effect (Doc 06 Claim 6.11); the maturation of SideView/communities and match-clustering (Claims 7.1, 7.3, 7.7); free/online record access on both sides (Claims 7.4–7.5); the broad cultural normalization of genealogy as a hobby.\n- **Conditions:** Requires one motivated family member with time; helped enormously by testing an elder before that DNA is lost.\n- **Signals to watch:** A parent/relative kit ordered; a Y-DNA/surname project joined; a subscription to irishgenealogy.ie/RootsIreland or Actapublica use; a documented tree appearing; the family narrative starting to name specific places and people.\n- **Time horizon:** Most likely to crystallize in a 2–7 year window once started; durable thereafter.\n\n### Scenario C — \"Instrumental heritage / EU citizenship\" (conditional, consequential)\n- **Probability:** 15–30% (and tightly *conditional* on the facts in Claim 7.8)\n- **Description:** The heritage is converted into a *passport*. The most probable path is the Irish FBR (if the Irish-born Collins ancestor falls within the grandparent window); a Polish, Lithuanian, or Czech route is possible but each is gated on a documented qualifying ancestor that does not yet exist on paper. Citizenship is pursued for mobility, EU residence/work/study rights, optionality for children, or hedging — and the genealogical work becomes means-to-an-end rather than sentiment.\n- **Drivers:** The real, growing instrumental value of EU citizenship by descent (Claim 7.8); the verified surge in US FBR applications (+63% 2024→2025) [V-IRL-CIT1]; geopolitical/mobility hedging; the fact that the same record work serves both Scenario B and this one.\n- **Conditions:** **Irish route** opens only if a grandparent (not great-grandparent) was Irish-born, or the FBR chain was maintained; **Polish** only if the ancestor held post-1920 citizenship and never lost it (the pre-1920 Galician-emigrant/US-naturalization pattern likely closes it); **Lithuanian** only with a documented pre-1940 citizen ancestor; **Czech** only with a documented Czech/Czechoslovak-citizen ancestor (and is easier if the pending great-grandparent amendment passes).\n- **Signals to watch:** FBR application filed; a Polish/Lithuanian/Czech consular consultation; document-gathering aimed at citizenship criteria specifically (passports, post-1920 IDs, pre-1940 records); the Czech great-grandparent amendment's progress through Parliament.\n- **Time horizon:** Irish FBR is the near-term feasible path (12-month processing); the continental routes are multi-year and document-gated.\n\n### Scenario D — \"Roots tourism / experiential reconnection\" (steady, complementary)\n- **Probability:** 10–20%\n- **Description:** Engagement is experiential rather than documentary or legal: a trip to West Cork (the Ó Coileáin homeland, Michael Collins country around Clonakilty/Rosscarbery — Doc 05 Claim 5.6) and/or to Moravia/Galicia/the Baltic; a heritage-center visit; ancestral-village tourism — possibly prompted by, but not requiring, deep record work. This often *co-occurs* with Scenario B (a documented village makes a trip meaningful) but can stand alone as the primary mode.\n- **Drivers:** The well-established roots-tourism economy (Ireland especially courts diaspora visitors); the emotional legibility of the Irish strand (Doc 06 Claims 6.9, 6.11); rising disposable time/income in later life; DNA results as a trip prompt.\n- **Conditions:** Discretionary income and time; strongest when a specific place has been identified (links to Scenario B).\n- **Signals to watch:** A heritage trip planned around an ancestral county/village; engagement with Irish/Czech heritage centres; genealogy-tourism services contacted.\n- **Time horizon:** Episodic across the horizon; spikes around milestones (retirement, anniversaries, a child's interest).\n\n---\n\n## Base Rates\n\n- **Generational assimilation.** The empirical default for 3rd–4th-generation white European ethnics is symbolic, optional ethnicity (Gans 1979; Waters 1990; Alba) — Doc 06 Claims 6.10–6.11. This is why Scenario A carries the most weight.\n- **Irish out-competes the continental strands.** Doc 06's structural argument (earlier arrival, English, Church/political embedding, St. Patrick's Day as a turnkey ritual, the \"exile\" narrative) predicts the Irish strand dominates attention — reflected in every scenario weighting the Irish line first.\n- **Citizenship-by-descent uptake is rising but remains a minority pursuit.** The verified US Irish-FBR surge (+63% in a year) shows real and accelerating uptake, but absolute numbers remain a small fraction of those *eligible*, and most eligible people never apply — hence Scenario C's conditional, sub-third probability.\n- **DNA testing is now mainstream but action on it is not.** Tens of millions have tested; only a minority build documented trees or test relatives strategically. So Scenario B (a real documentary project) is plausible-but-not-default.\n- **Record success is high for Ireland, mixed for the continent.** Irish civil/parish/land records are unusually complete and online and free; Czech matriky are nearly fully digitized; Galician/Ukrainian and some Baltic records are more uneven. Roadmap *success* probability tracks these base rates.\n\n## What Would Change This Outlook\n\n- **A motivated family genealogist** (or a child's school project, a partner's interest, a retirement) would shift weight from Scenario A toward B/C/D — the single biggest swing factor.\n- **The generation of the Irish-born Collins ancestor.** If a *grandparent* was Irish-born, Scenario C (Irish citizenship) jumps materially; if it's a great-grandparent, that route mostly closes and C's weight drops toward the continental (harder) routes.\n- **The Pokorný Y-DNA result.** A clear Czech, Polish/Galician, or Ashkenazi-Jewish patriline call would redirect both the record plan (Claim 7.5) and the applicable citizenship route (Czech vs. Polish — Claim 7.8) — and could re-open or close Scenario C's continental options.\n- **Platform/regulatory shocks.** Consumer-DNA consolidation, a privacy-law clampdown, or a vendor's financial failure (cf. 23andMe's 2025 distress) could degrade the feature roadmap (Claim 7.7) and push toward documentary/archival methods independent of any one company.\n- **Citizenship-law changes.** The pending Czech great-grandparent amendment, any tightening of the Irish FBR (already showing strain — processing time raised in 2026), or Polish/Lithuanian rule changes would move Scenario C up or down.\n- **A future \"Galicia\" or finer-Baltic DNA region** would sharpen Parent 1's internal story (and could confirm or dissolve the Baltic 9%), nudging Scenario B.\n\n## Open Questions\n\n1. **Is the Irish-born Collins ancestor a grandparent or a great-grandparent of the would-be applicant?** This single fact largely determines whether the strongest citizenship route (Irish FBR) is open (Claim 7.8). Resolvable from US records + the FBR chain history.\n2. **What is the Pokorný patriline's true branch — Czech, Galician-Polish, or Ashkenazi-Jewish?** Determines the European record plan and which (if any) continental citizenship route applies. A Y-DNA test (Claim 7.2) is the decisive tool.\n3. **Did the Polish/Galician line ever hold post-1920 Polish citizenship,** or did the ancestor emigrate from Austrian Galicia and naturalize in the US before 1920 (closing the Polish \"1920-rule\" route)? A naturalization-date question (Claim 7.5, 7.8).\n4. **Is there a real, documentable pre-1940 Lithuanian-citizen ancestor,** or is the Lithuanian DNA signal just the northeastern-European cluster overlap (Doc 03 Claim 3.9) with no named ancestor behind it? Citizenship requires the former; DNA cannot supply it.\n5. **Will testing an elder be done in time?** The highest-yield, most time-sensitive step (Claim 7.1) is irreversibly lost when older relatives die untested.\n6. **Which scenario will the next generation actually enact?** The forecast is calibrated to base rates, not to this family's individuals; a single motivated person can override the base rate entirely (the central uncertainty in Thread B).\n7. **How durable are the vendor features the roadmap leans on?** SideView, communities, and ThruLines are commercial products subject to pricing, privacy, and corporate risk (Claim 7.7) — the multi-year roadmap is the softest forecast here.\n\n---\n\n## Sources\n\n**DNA features & methodology (genealogical/genetic)**\n\n- **[V-DNA1]** Ancestry Corporate, \"SideView™ Now Groups Your AncestryDNA® Matches By Parent…,\" ancestry.com/corporate/blog, and Ancestry Support, \"SideView Technology,\" support.ancestry.com/s/article/SideView-Technology (accessed 2026-05-30). **Tier 1 (vendor primary).** Used for: SideView groups matches and divides ethnicity by parent; cannot identify which side is mother vs. father; parental assignment threshold (~90% of shared segments); 22M+ network. Lean: vendor-promotional — corroborated by independent experts below.\n- **[V-DNA2]** Larkin, Leah (\"The DNA Geek\"), \"AncestryDNA's SideView Assigns Matches to Parent Sides,\" thednageek.com; Southard, Diahan (\"Your DNA Guide\"), \"AncestryDNA SideView Assigns Matches to Mom or Dad,\" yourdnaguide.com (accessed 2026-05-30). **Tier 5 (named expert genetic-genealogy analysts).** Used for: SideView's arbitrary Parent 1/Parent 2 labeling; the maternal/paternal determination must be made by the user; endogamy limits. Corroborates Doc 03 Claims 3.3–3.4.\n- **[V-DNA3]** FamilyTreeDNA, \"Trace Your Paternal Ancestry With Y-DNA\" and \"Single DNA Tests\" (Y-37/Y-111/Big Y-700; SNP-confirmed haplogroup), familytreedna.com; Legacy Tree Genealogists, \"The Who, What, When… of Y-DNA Testing,\" legacytree.com (accessed 2026-05-30). **Tier 2–4 (vendor + reputable professional-genealogy firm).** Used for: Y-DNA traces the undiluted patriline/surname line; mtDNA traces the direct maternal line; Big Y-700 as the high-resolution option. Lean: vendor for product specifics, professional firm for method.\n\n**Irish record sets**\n\n- **[V-IRL1]** National Library of Ireland, \"Catholic Parish Registers\" (registers.nli.ie) and \"Further Research\" (nli.ie/family-history); Irish Genealogy (irishgenealogy.ie) \"Record Sources\"; National Archives of Ireland (Tithe Applotment Books, Griffith's-era and 1901/1911 censuses); AskAboutIreland (Griffith's Valuation transcripts/images/maps) (all accessed 2026-05-30). **Tier 1 (official/national institutions).** Used for: free online availability and date ranges of NLI Catholic parish registers (c.1740–1880), Tithe Applotment Books (c.1823–1838), Griffith's Valuation (1847–1864), and the 1901/1911 censuses.\n- **[V-IRL2]** RootsIreland (rootsireland.ie), via the search-result summary of its holdings (~23M+ transcribed records across 34 county genealogy centres; church baptisms/marriages/deaths, civil records, Griffith's, passenger lists, census substitutes) (accessed 2026-05-30). **Tier 3 (commercial transcription service).** Used for: the existence of searchable transcribed indexes complementing the NLI image set. Lean: commercial.\n- **[V-IRL3]** Citizens Information (citizensinformation.ie) and Irish Genealogy, on Irish civil registration coverage (statutory marriages from 1864; births/deaths) (accessed 2026-05-30). **Tier 1–2 (Irish public-information service).** Used for: civil registration as the documentary entry point.\n\n**Czech / Central-European & Baltic record sets**\n\n- **[V-CZ1]** Moravian Land Archive in Brno (MZA), Actapublica portal (mza.cz/actapublica); \"Digital archives\" and \"Regional archives,\" myczechroots.com; Czechoslovak Genealogical Society International, \"Using Archives,\" cgsi.org (accessed 2026-05-30). **Tier 1–4 (national archive portal + reputable genealogical society).** Used for: near-complete free online digitization of Czech parish registers (matriky) via Actapublica and sister regional-archive portals. (Galician/Ukrainian and Baltic portals — AGAD, Lviv archives, Estonia's Saaga, Latvian/Lithuanian church books — named from genealogical-practice knowledge; coverage there is more uneven and should be verified per-parish at research time. **Flagged as not individually re-verified in this pass.**)\n\n**Citizenship by descent**\n\n- **[V-IRL-CIT1]** Department of Foreign Affairs / Ireland.ie, \"Registering a Foreign Birth\" and \"Born Abroad,\" ireland.ie/en/dfa/citizenship; Citizens Information, \"The Foreign Births Register\" and \"Irish citizenship through birth or descent,\" citizensinformation.ie (accessed 2026-05-30). **Tier 1 (Irish government + public-information service).** Used for: grandparent eligibility; the FBR-chain rule for more distant ancestors; the 2026 processing-time revision (9→12 months); the +63% US-application surge (11,601→18,910, 2024→2025, per DFA figures relayed by The Irish News). Lean: official.\n- **[V-IRL-CIT2]** Fragomen, \"Foreign Birth Registration: How to Claim Irish Citizenship Through Ancestry in 2025,\" fragomen.com (accessed 2026-05-30). **Tier 3 (major immigration-law firm).** Corroborates the grandparent rule and document requirements. Lean: practitioner.\n- **[V-PL-CIT1]** Dudkowiak & Putyra, \"Polish Citizenship by Descent,\" dudkowiak.com; \"Confirmation of Polish Citizenship,\" Jewish Historical Institute (jhi.pl/en/genealogy); CGO Legal, cgolegal.com (accessed 2026-05-30). **Tier 2–3 (Polish law firms + institutional genealogy resource).** Used for: the 1920 Citizenship Act basis; \"confirmation of an unbroken citizenship never lost\"; loss-of-citizenship pitfalls (pre-1951 foreign naturalization, military/official service); documentary requirements. Lean: practitioner; multiple independent firms agree.\n- **[V-LT-CIT1]** Consulate General of the Republic of Lithuania (la.mfa.lt) \"Lithuanian citizenship\"; Migration Department (migration.lt), \"Lithuanian Citizenship by Descent\" (accessed 2026-05-30). **Tier 1 (Lithuanian government).** Used for: pre-15-June-1940 citizen-ancestor basis; left-before-11-March-1990 condition; dual citizenship permitted on restoration.\n- **[V-LT-CIT2]** \"Lithuania citizenship 2026 — naturalisation, descent & dual,\" veles-club.com; In Iure (iniure.com), \"Does Lithuania Allow Dual Citizenship in 2025?\" (accessed 2026-05-30). **Tier 3–4 (immigration advisories).** Used for: the 2026 dual-citizenship broadening. Lean: practitioner — verify against the Migration Department before relying.\n- **[V-CZ-CIT1]** Czech-Immigration.com, \"Czech Citizenship by Descent — Full Guide for 2026\"; Rutland & Partners, \"Expanding the range of eligible applicants for Czech citizenship through ancestry,\" rutlandandpartners.com (accessed 2026-05-30). **Tier 3 (Czech immigration-law practitioners).** Used for: citizenship-by-declaration for descendants of former Czech/Czechoslovak citizens; dual citizenship allowed since 2013/2014; current great-grandparent limitation (parent must reclaim first) and the pending Parliament amendment that would let great-grandchildren apply directly. Lean: practitioner — verify the amendment's status with official sources before relying.\n\n*Source-discipline note: No Wikipedia article is cited for any substantive claim. Citizenship rules were verified against official government sources (Ireland.ie, Lithuanian government, Citizens Information) where possible, with law-firm practitioner sources used corroboratively and flagged. The DNA-feature roadmap rests on vendor primary material corroborated by named expert analysts (Tier 5). Single-source-leaning items flagged: the Lithuanian 2026 dual-citizenship broadening (practitioner advisories — [V-LT-CIT2]), the Czech great-grandparent amendment status (practitioner sources — [V-CZ-CIT1]), and Galician/Baltic archive coverage (genealogical-practice knowledge, not individually re-verified per-parish — [V-CZ1]). All citizenship law is subject to change; confirm current rules with consular authorities at application time. The four identity scenarios are calibrated forecasts of social trends applied to this family's profile, explicitly distinguished from preference, and turn on facts (Open Questions 1–4) not yet documented.*"}]}</script>

<script>
const corpus = JSON.parse(document.getElementById('corpus-data').textContent);
const docs = corpus.documents;
const toc = document.getElementById('toc');
const content = document.getElementById('content');
const searchBox = document.getElementById('search');
const results = document.getElementById('search-results');
const key = 'corpus:' + corpus.slug;
let current = 0;

// theme
const themePref = localStorage.getItem('corpus-theme');
if (themePref) document.documentElement.dataset.theme = themePref;
else if (matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.dataset.theme = 'dark';
document.getElementById('theme-btn').onclick = () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('corpus-theme', next);
};

// table of contents
docs.forEach((d, i) => {
  const a = document.createElement('a');
  a.href = '#ch-' + i;
  a.innerHTML = '<span class="num">' + String(i).padStart(2, '0') + '</span>' + d.title;
  a.title = d.summary || '';
  a.onclick = (e) => { e.preventDefault(); show(i); closeMenu(); };
  toc.appendChild(a);
});

let firstShow = true;
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
function show(i, anchorText) {
  if (listening && !autoNext) stopListen();  // manual nav stops narration; auto-advance keeps it
  const apply = () => {
  current = Math.max(0, Math.min(docs.length - 1, i));
  content.innerHTML = marked.parse(docs[current].body);
  // rewrite chapter-to-chapter .md links into in-app navigation
  content.querySelectorAll('a[href$=".md"]').forEach(a => {
    const target = docs.findIndex(d => a.getAttribute('href').endsWith(d.file));
    if (target >= 0) { a.href = '#ch-' + target; a.onclick = (e) => { e.preventDefault(); show(target); }; }
  });
  content.querySelectorAll('a[href^="http"]').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });
  toc.querySelectorAll('a').forEach((a, j) => a.classList.toggle('active', j === current));
  document.getElementById('prev').disabled = current === 0;
  document.getElementById('next').disabled = current === docs.length - 1;
  document.getElementById('pager-label').textContent = (current + 1) + ' / ' + docs.length + ' · ' + docs[current].title
    + ' · ' + Math.max(1, Math.round(docs[current].body.split(/\s+/).length / 220)) + ' min';
  history.replaceState(null, '', '#ch-' + current);
  localStorage.setItem(key, current);
  // feed the cross-page library shell: per-corpus read set + global recents
  try {
    const rk = 'read:' + corpus.slug;
    const readArr = JSON.parse(localStorage.getItem(rk) || '[]');
    if (readArr.indexOf(current) < 0) { readArr.push(current); localStorage.setItem(rk, JSON.stringify(readArr)); }
    const rec = (JSON.parse(localStorage.getItem('library-recents') || '[]') || []).filter(r => r.slug !== corpus.slug);
    rec.unshift({ slug: corpus.slug, title: corpus.title, ch: current, chTitle: docs[current].title, ts: Date.now() });
    localStorage.setItem('library-recents', JSON.stringify(rec.slice(0, 20)));
    // quiet reading streak: bump once per calendar day a chapter is opened
    const today = new Date().toISOString().slice(0, 10);
    const st = JSON.parse(localStorage.getItem('reading-streak') || '{}');
    if (st.last !== today) {
      const yest = new Date(Date.now() - 864e5).toISOString().slice(0, 10);
      st.count = (st.last === yest ? (st.count || 0) : 0) + 1;
      st.last = today;
      localStorage.setItem('reading-streak', JSON.stringify(st));
    }
  } catch (e) {}
  if (anchorText) {
    const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT);
    let node; while ((node = walker.nextNode())) {
      const idx = node.textContent.toLowerCase().indexOf(anchorText.toLowerCase());
      if (idx >= 0) {
        const host = node.parentElement;
        host.scrollIntoView({ block: 'center' });
        if (!reduceMotion) { host.classList.add('passage-flash'); setTimeout(() => host.classList.remove('passage-flash'), 2200); }
        return;
      }
    }
  }
  document.getElementById('main').scrollIntoView();
  window.scrollTo(0, 0);
  };
  // cross-fade chapter swaps where supported (skips first paint + reduced motion)
  if (document.startViewTransition && !reduceMotion && !firstShow) document.startViewTransition(apply);
  else apply();
  firstShow = false;
}

document.getElementById('prev').onclick = () => show(current - 1);
document.getElementById('next').onclick = () => show(current + 1);

let chordKey = null, chordTimer;
document.addEventListener('keydown', (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const back = document.getElementById('cmdk-back');
  if (back && back.classList.contains('open')) return;  // palette owns the keys when open
  const help = document.getElementById('kbd-help');
  if (help && help.classList.contains('open')) { if (e.key === 'Escape' || e.key === '?') toggleHelp(); return; }
  if (chordKey === 'g') { clearTimeout(chordTimer); chordKey = null;
    if (e.key === 'g') { show(0); return; }
    if (e.key === 'e') { show(docs.length - 1); return; } }
  if (e.key === 'g') { chordKey = 'g'; chordTimer = setTimeout(() => { chordKey = null; }, 700); return; }
  if (e.key === 'ArrowLeft' || e.key === 'k') show(current - 1);
  else if (e.key === 'ArrowRight' || e.key === 'j') show(current + 1);
  else if (e.key === 'z' || e.key === 'Z') toggleFocus();
  else if (e.key === '?') toggleHelp();
});

function toggleFocus() {
  const on = document.body.classList.toggle('focus-mode');
  localStorage.setItem('reader-focus', on ? '1' : '0');
}
if (localStorage.getItem('reader-focus') === '1') document.body.classList.add('focus-mode');

function toggleHelp() {
  let h = document.getElementById('kbd-help');
  if (!h) {
    h = document.createElement('div'); h.id = 'kbd-help';
    h.innerHTML = '<div class="kh"><h3>Keyboard</h3><dl>'
      + '<dt>⌘K</dt><dd>command palette</dd>'
      + '<dt>← / k</dt><dd>previous chapter</dd>'
      + '<dt>→ / j</dt><dd>next chapter</dd>'
      + '<dt>g g</dt><dd>first chapter</dd>'
      + '<dt>g e</dt><dd>last chapter</dd>'
      + '<dt>Z</dt><dd>focus mode</dd>'
      + '<dt>?</dt><dd>this help</dd></dl></div>';
    h.addEventListener('click', (ev) => { if (ev.target === h) toggleHelp(); });
    document.body.appendChild(h);
  }
  h.classList.toggle('open');
}

// search
let timer;
searchBox.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(runSearch, 150);
});
function runSearch() {
  const q = searchBox.value.trim().toLowerCase();
  results.innerHTML = '';
  toc.style.display = q ? 'none' : '';
  if (!q || q.length < 3) { toc.style.display = ''; return; }
  let hits = 0;
  docs.forEach((d, i) => {
    const text = d.body.toLowerCase();
    let pos = text.indexOf(q), shown = 0;
    while (pos >= 0 && shown < 3 && hits < 40) {
      const start = Math.max(0, pos - 60), end = Math.min(d.body.length, pos + q.length + 90);
      const raw = d.body.slice(start, end).replace(/[#*_>\[\]]/g, '');
      const safe = raw.replace(/&/g, '&amp;').replace(/</g, '&lt;');
      const snippet = safe.replace(new RegExp(q.replace(/[.*+?^${}()|\\]/g, '\\$&'), 'ig'), m => '<mark>' + m + '</mark>');
      const div = document.createElement('div');
      div.className = 'hit';
      div.innerHTML = '<b>' + d.title + '</b>…' + snippet + '…';
      const exact = d.body.slice(pos, pos + q.length);
      div.onclick = () => { show(i, exact); searchBox.value = ''; runSearch(); closeMenu(); };
      results.appendChild(div);
      hits++; shown++;
      pos = text.indexOf(q, pos + q.length);
    }
  });
  if (!hits) results.innerHTML = '<div class="none">No matches.</div>';
}

// mobile menu
const menuBtn = document.getElementById('menu-btn');
menuBtn.onclick = () => document.body.classList.toggle('menu-open');
function closeMenu() { document.body.classList.remove('menu-open'); }

// ---- Listen mode (browser Web Speech API) + share-this-chapter ----
const synth = window.speechSynthesis;
let listening = false, paused = false, autoNext = false, listenIdx = 0, listenRate = 1,
    listenAuto = true, sleepMode = 'none', sleepTimer = null, lchunks = [], lidx = 0, lbar = null;
function chapterText(i) {
  let t = docs[i] ? docs[i].body : '';
  return t.replace(/```[\s\S]*?```/g, ' ').replace(/<[^>]+>/g, ' ')
          .replace(/!\[[^\]]*\]\([^)]*\)/g, ' ').replace(/\[([^\]]+)\]\([^)]*\)/g, '$1')
          .replace(/[#>*_`~|]/g, ' ').replace(/\s+/g, ' ').trim();
}
function chunkText(t) {
  const raw = t.match(/[^.!?]+[.!?]+["')\]”’]*|\S[^.!?]*$/g) || [t];
  const out = []; let buf = '';
  raw.forEach(s => { s = s.trim(); if (!s) return;
    if ((buf + ' ' + s).length > 240 && buf) { out.push(buf); buf = s; } else buf = buf ? buf + ' ' + s : s; });
  if (buf) out.push(buf);
  return out;
}
function pickVoice() { const vs = synth.getVoices();
  return vs.find(v => /^en/i.test(v.lang) && v.localService) || vs.find(v => /^en/i.test(v.lang)) || vs[0]; }
function speakChunk() {
  if (!listening) return;
  if (lidx >= lchunks.length) {
    if (sleepMode === 'chapter') { stopListen(); return; }
    if (listenAuto && listenIdx < docs.length - 1) {
      listenIdx++; autoNext = true; show(listenIdx); autoNext = false;
      lchunks = chunkText(chapterText(listenIdx)); lidx = 0; updateBar(); speakChunk();
    } else stopListen();
    return;
  }
  const u = new SpeechSynthesisUtterance(lchunks[lidx]);

    active = p; p._el = el; el.classList.add('active');
    var opts = '<option value="" disabled selected>Jump to a chapter…</option>';
    (p.chapters || []).forEach(function (ch) { opts += '<option value="' + esc(base + ch.href) + '">' + esc(ch.t) + '</option>'; });
    card.innerHTML = '<a class="ac-title" href="' + esc(base + p.href) + '" style="color:' + esc(p.accent) + '">' + esc(p.title) + '</a>'
      + '<div class="ac-place">' + esc(p.label) + '</div>'
      + (p.chapters && p.chapters.length ? '<select class="ac-sel" aria-label="Jump to a chapter">' + opts + '</select>' : '');
    var sel = card.querySelector('.ac-sel');
    if (sel) sel.onchange = function () { if (this.value) window.location.href = this.value; };
    card.classList.add('show');
    var r = el.getBoundingClientRect(), sr = stage.getBoundingClientRect();
    card.style.left = '0px'; card.style.top = '0px';
    var cw = card.offsetWidth, chh = card.offsetHeight;
    var cx = (r.left + r.right) / 2 - sr.left, cyTop = r.top - sr.top;
    var left = Math.max(8, Math.min(sr.width - cw - 8, cx - cw / 2));
    var top = cyTop - chh - 12; if (top < 8) top = (r.bottom - sr.top) + 12;
    top = Math.max(8, Math.min(sr.height - chh - 8, top));
    card.style.left = left + 'px'; card.style.top = top + 'px';
    if (hideT) { clearTimeout(hideT); hideT = null; }
  }
  function schedHide() { if (hideT) clearTimeout(hideT); hideT = setTimeout(hideCard, 240); }
  function hideCard() {
    if (card) card.classList.remove('show');
    if (active && active._el) active._el.classList.remove('active');
    active = null;
  }
})();
</script>
</body>
</html>
