n-archive linguistic study summaries on the Famine and Irish language, plus *byArcadia*, \"Ireland in the Long Nineteenth Century: Famine, Emigration and the New Irish,\" byarcadia.org, https://www.byarcadia.org/post/ireland-in-the-long-nineteenth-century-101-famine-emigration-and-the-new-irish (accessed 2026-05-30); and Hal-SHS, \"The Great Famine in Ireland: a Linguistic and Cultural Disruption,\" https://shs.hal.science/halshs-01147770/document (accessed 2026-05-30). **Tier 2/4 mix** (academic preprint + educational outlet). Used for Irish-language decline (four-in-five c.1800 → 19.2% in 1891; ~90% of speakers in Munster/Connacht) and the ~39%-of-Irish-born-abroad-by-1890 figure. *Verify the 39% figure against census-based scholarship in Round 2.*\n\n9. Timothy W. Guinnane (Yale University), \"The Vanishing Irish: Ireland's population from the Great Famine to the Great War,\" *History Ireland*, Vol. 5, No. 2 (Summer 1997), https://historyireland.com/the-vanishing-irish-irelands-population-from-the-great-famine-to-the-great-war/ (accessed 2026-05-30). **Tier 2** (peer-reviewed history magazine; author is a leading economic historian of Irish demography). Used for the >8m→~4m fall by 1911, the \"less than half attributable to the Famine itself\" claim, the ~25%-never-married figure, and the late-marriage/high-emigration regime.\n\n10. IrishCentral, \"What's your Irish County? County Cork,\" irishcentral.com, n.d., https://www.irishcentral.com/travel/county-cork (accessed 2026-05-30); and Wikipedia summary of County Cork (as pointer). **Tier 4** (heritage/travel outlet). Used for the MacCarthy Mór being pushed \"westward into West Cork and County Kerry\" after the Norman invasion and the list of Desmond princely septs. *Corroborate sept list against Tier 2 in Round 2.*\n\n11. LibraryIreland (reprints of Laurence Ginnell, *The Brehon Laws*, 1894) — \"Clan System in ancient Ireland\" and \"Irish Septs,\" libraryireland.com, https://www.libraryireland.com/Brehon-Laws/Clan-System.php and https://www.libraryireland.com/Brehon-Laws/Septs.php (accessed 2026-05-30). **Tier 2 (older standard work, c.1894 — sound on structure, dated in interpretation).** Used for the fine/sept/clan nesting, the ~150 túatha, over-kingship, and the derbfine succession.\n\n12. Britannica, \"Brehon laws | Ancient Irish Legal System & Customary Law,\" britannica.com, https://www.britannica.com/topic/Brehon-laws (accessed 2026-05-30). **Tier 2** (authoritative reference work). Used for the role of kinship in determining status and office and the nature of Brehon customary law.\n\n13. \"Brian Boru\" and \"Dál Cais / Eóganacht\" — University of Limerick *Viking Age* lecture PDFs by Catherine Swift et al. (vikingage.mic.ul.ie), e.g., https://vikingage.mic.ul.ie/pdfs/lecture_brian-boru_and-the-rise-to-provincial-kingship.pdf (accessed 2026-05-30); corroborated by Encyclopedia.com, \"Cais, Dál and Boru, Brian.\" **Tier 2** (university lecture material + scholarly encyclopedia). Used for the Eóganachta/Cashel overlordship, the Dál gCais rise, Belach Lechta (978), the 1002 high-kingship, and Clontarf (1014).\n\n14. IrishHistory.com, \"The Founding of Viking Cities: Dublin, Waterford, Limerick, and Cork,\" irishhistory.com, n.d., https://www.irishhistory.com/the-founding-of-viking-cities-dublin-waterford-limerick-and-cork/ (accessed 2026-05-30); and standard accounts of the Anglo-Norman invasion of 1169–1171 (Diarmait mac Murchada, Strongbow, Aoife, seizure of Dublin and Waterford). **Tier 3/4** (popular history). Used for Norse town foundation dates (914–922), the Hiberno-Norse population, and the 1169–1170 Norman landings. *Foundation dates are traditional/approximate; verify against Tier 2 archaeology in Round 2.*\n\n15. P.W. Joyce, *A Concise History of Ireland* (\"The Plantations\"), via LibraryIreland, https://www.libraryireland.com/JoyceHistory/Plantations.php (accessed 2026-05-30); corroborated by *The Irish Story*, \"The Munster Plantation and the MacCarthys, 1583–1597.\" **Tier 2 (older standard narrative) + Tier 2 (scholarly popular history).** Used for the ~1 million acres confiscated, the 1585 parliament, the 1586 undertaker proclamation and terms, and the Raleigh (42,000 acres) and Spenser (12,000 acres, Kilcolman) grants.\n\n16. Trinity College Dublin, \"The Down Survey of Ireland — The Cromwellian Conquest,\" downsurvey.tchpc.tcd.ie, https://downsurvey.tchpc.tcd.ie/history.html (accessed 2026-05-30); corroborated by standard reference summaries of the Act for the Settlement of Ireland 1652. **Tier 1/2** (TCD academic project built on primary survey records). Used for the fall in Catholic landownership from ~60% (pre-1641) to ~8–9% (Commonwealth) and the destruction of the Catholic landowning class.\n\n17. RTÉ / *The Great Irish Famine* project, \"Hidden Ireland: The world of the cottier on the eve of the Famine,\" rte.ie, 6 Aug 2020, https://www.rte.ie/history/the-great-irish-famine/2020/0806/1157723-hidden-ireland-the-world-of-the-cottier-on-the-eve-of-the-famine/ (accessed 2026-05-30); and \"Colonialism, Landlordism and the Rift of Ireland,\" rupture.ie (for the agroecology framing). **Tier 2 (public-service broadcaster history project) + Tier 4 (political magazine, used only for the metabolic-rift framing).** Used for the cottier system, ~200 days' labor, subdivision, and the fragile agroecology argument.\n\n18. Wikipedia, \"Conacre\" (as pointer to the underlying definition) and historyhome.co.uk, \"Land-holding in Ireland 1760–1880.\" **Tier 3 pointer + Tier 4 educational site.** Used for the eleven-month conacre letting, its lack of legal tenure, and the landlord–middleman–tenant–cottier hierarchy. *Corroborate against Tier 2 (e.g., Ó Gráda) in Round 2.*\n\n19. Irish Examiner, \"Brutality of Cork's Famine years,\" irishexaminer.com, n.d., https://www.irishexaminer.com/news/arid-20470367.html (accessed 2026-05-30); and University College Cork, \"The famine in Cork,\" ucc.ie, 2018, https://www.ucc.ie/en/news/2018/the-famine-in-cork.html (accessed 2026-05-30). **Tier 2 (UCC) + Tier 4 (Irish daily, centrist).** Used for the Skibbereen workhouse figures (built for 800; 1,169 by early Jan 1847; 1,450 by mid-March; 266 deaths Oct 1846–Jan 1847; 140 in one month; 8 in one day).\n\n20. James Mahony, sketches and reports for the *Illustrated London News*, February 1847, reproduced and discussed at \"Views of the Famine,\" viewsofthefamine.wordpress.com, https://viewsofthefamine.wordpress.com/illustrated-london-news/famine-and-starvation-in-the-county-of-cork/ (accessed 2026-05-30). **Tier 1 (contemporaneous primary reportage/imagery) via Tier 4 reproduction.** Used for Mahony's commission and his report of witnessing 150–180 funerals around Skibbereen.\n\n21. Encyclopedia.com, \"Land War of 1879 to 1882,\" and \"Land Purchase Acts of 1903 and 1909,\" encyclopedia.com (accessed 2026-05-30); Britannica, \"Land League\" and \"Wyndham Land Purchase Act,\" britannica.com (accessed 2026-05-30). **Tier 2** (scholarly encyclopedias / authoritative reference). Used for Davitt's 1879 Land League, the \"three Fs,\" Gladstone's 1881 Act, and the 1903 Wyndham Act (~11m acres / ~320,000 holdings / ~60% transferred).\n\n22. Wikipedia \"County Cork\" (as pointer) and IrishCentral, \"What's your Irish County? County Cork.\" **Tier 3 pointer + Tier 4.** Used for Cork as the largest/southernmost county, the Kingdom of Desmond, the MacCarthy Mór and princely septs, and the \"Rebel County\" nickname. *See source 23 for geography corroboration.*\n\n23. Britannica, \"Cork | Ireland, Map, Population, & Facts,\" britannica.com, https://www.britannica.com/place/Cork-county-Ireland (accessed 2026-05-30). **Tier 2** (authoritative reference). Used for Cork's physical geography (ridges, valleys of the Blackwater, Bride, Lee, Bandon; western mountains; ~24 baronies).\n\n24. Encyclopedia.com / standard accounts of the post-Desmond suppression of Gaelic custom (Brehon law, Irish dress, bardic poetry, private armies), as summarized in the Desmond Rebellions reference (source 3). **Tier 2.** Used for the post-rebellion outlawing of Gaelic customs. *single-source* (relies on the same Desmond reference cluster; corroborate in Round 2).\n\n25. AskAboutIreland (Department / library educational project), \"Flight of the Earls\" and \"The Ulster Plantation,\" askaboutireland.ie, https://www.askaboutireland.ie/learning-zone/primary-students/subjects/history/history-the-full-story/ulster-plantation/flight-of-the-earls/ (accessed 2026-05-30); corroborated by *History Ireland*, \"After the Flight: the Plantation of Ulster.\" **Tier 2** (state-supported educational resource + scholarly history magazine). Used for the Flight of the Earls (14 Sept 1607, Rathmullan, Donegal; ~99 people), the end-of-Gaelic-Ireland framing, and the 1609 Plantation of Ulster including Donegal.\n\n26. Britannica, \"Connaught | Ireland, Map, History, & Facts,\" britannica.com, https://www.britannica.com/place/Connaught (accessed 2026-05-30); and \"Changing fortunes on the Aran Islands in the 1890s,\" *Irish Historical Studies* (Cambridge), for nineteenth-century western distress. **Tier 2** (authoritative reference + peer-reviewed journal). Used for Connacht's counties, the O'Connor kings and the 1227 de Burgh grant, the western seaboard's nineteenth-century poverty and recurrent localized famine (from 1816–17), and Connacht as a Gaeltacht heartland."}, {"order": 2, "file": "02_EastEuro_Baltic_Origins_And_History.md", "title": "Central European & Baltic Origins and History", "summary": "", "body": "# Central European & Baltic Origins and History\n\n## Bottom Line\n\nThe \"Parent 1\" admixture — heaviest in Southern Poland, with secondary Estonian/Latvian, Western Ukrainian, Lithuanian, and Northeastern Polish components, plus a German-in-Russia trace — describes a coherent belt of territory that, for most of the period 1772–1918, lay under just two crowns: the Habsburg Monarchy (Galicia, Bohemia-Moravia) and the Romanov Empire (Congress Poland, the Baltic governorates, the Lithuanian/Vilna lands, and the Black Sea/Volga German colonies). The dominant peoples here are the **West Slavs** (Czechs, Poles, Slovaks), the **East Slavs** (Ukrainians/Ruthenians), the Baltic peoples (**Lithuanians, Latvians**), and the Finnic **Estonians** — distinct in language and religion but, in autosomal genetics, a closely clustered \"central-east European\" gradient that resists clean partition into the labeled regions [Claim 2.1, 2.2]. The surname **Pokorný** (\"the humble/meek one\") is overwhelmingly Czech/Moravian, the densest single anchor in the profile and the likeliest origin point of the patriline [Claim 2.3]. The departure of these ancestors to the United States, roughly 1880–1924, was driven by the most extreme rural poverty in Europe (Galicia), land hunger and partible inheritance, military conscription, Russification, and anti-Jewish pogroms — a flow the 1924 Johnson–Reed Act abruptly shut off [Claim 2.8, 2.9].\n\n## What the Evidence Establishes\n\nThe peoples of this belt fall into four distinct families. The Czechs, Poles, and Slovaks (West Slavs) and the Ukrainians (East Slavs) descend from a Slavic expansion across Europe around 500–1000 AD out of a homeland between the middle Vistula/Bug and the middle Dnieper, which made Slavic-speakers dominant between the Elbe and the Volga — an expansion that proceeded northward into Baltic and Finnic lands substantially by assimilation and language shift rather than wholesale replacement [S1, S2]. The Lithuanians and Latvians are Baltic-speaking, a separate Indo-European branch and the Slavs' closest linguistic cousins; the Estonians are Finnic (Uralic), not Indo-European at all. The linguistic taxonomy and rough chronology are firm, though the precise mechanism of assimilation versus migration remains debated. Crucially, genetics blurs what language separates: Kushniarevich et al. (2015), synthesizing 6,876 mtDNA, 6,079 Y-chromosome, and 296 autosomal profiles in *PLOS ONE*, found that \"Baltic populations are genetically the closest to East Slavs,\" with high shared identity-by-descent across the bloc and genetic diversity correlating with geography (0.80–0.95) far more than with language [S2]. The practical implication for this profile is that distinguishing \"Estonia & Latvia\" from \"Lithuania\" from \"Northeastern Poland\" from \"Western Ukraine\" is statistically noisy; the percentages should be read as one northeastern signal rather than as separate ancestral homelands — a reasonable interpretive bridge resting on this single study.\n\nThe surname anchors the patriline to the Czech lands. *Pokorný* — \"humble, meek,\" from the Slavic *pokora*, \"humility\" — originated as a medieval descriptive nickname in Bohemia and Moravia, attested from 1456, and is by far most numerous and concentrated in the Czech lands today: Forebears records about 11,039 bearers in Czechia (roughly 1 in 963), concentrated in Central Bohemia (19%), South Moravia (17%), and Prague (13%) [S3]. A Czech/Moravian patrilineal origin is therefore the strongest single hypothesis even though the heaviest DNA region is Southern Poland, because a surname tracks one patriline and need not match the dominant autosomal region; Polish (*Pokorny*), Galician, and Jewish offshoots exist along the Czech–Polish frontier, and a Czech-origin line that settled in or near Galicia would reconcile the surname with the \"Southern Poland 19%\" signal — though the surname alone cannot resolve whether this specific patriline is Czech or a Polish/Galician offshoot. The Czech lands themselves were a powerful medieval Kingdom of Bohemia, founded by the Přemyslids in the 12th century and an electorate of the Holy Roman Empire, which passed through the Luxembourgs and Jagiellonians to the Habsburgs in 1526, beginning some 400 years of Habsburg rule [S4]. The 13th-century Ostsiedlung brought German immigrants — encouraged by the Přemyslid kings — into towns and mining districts (Kutná Hora, Jihlava, Německý Brod/Havlíčkův Brod, Stříbro), carrying the *ius teutonicum* that underlay later Bohemian-Moravian commercial law, which helps explain why a Czech family carries a Slavic surname and why \"Southern Germanic Europe\" appears as a minor component [S4]. After the 1620 Battle of White Mountain, the Habsburg Counter-Reformation forcibly re-Catholicized the Czech lands, drove out roughly a fifth of nobles and burghers, and suppressed the Czech language until the late-18th-century National Revival [S5].\n\nThe political fate of the rest of the belt was sealed by the Partitions. Russia, Prussia, and Austria carved up Poland-Lithuania in 1772, 1793, and 1795 — the First Partition stripping roughly a third of the land and half the population, the Third extinguishing the state after the Kościuszko uprising and leaving Poland and Lithuania without sovereignty for 123 years [S6]. After the 1815 Congress of Vienna, Austria organized its share as the Kingdom of Galicia and Lodomeria while Russia formed autonomous \"Congress Poland\" around Warsaw, and the regime of each partition shaped the emigration drivers a century later: Southern Poland/Galicia fell to Austria, while Northeastern Poland and the Lithuanian/Vilna lands fell to Russia [S6, S7]. Galicia, centered on Kraków in the west and Lwów/Lviv in the east, became a byword for misery — characterized by Norman Davies as likely \"the poorest province in Europe,\" with 1890 per-capita product of about $1,947 against $3,005 in Austria proper and $2,513 in Bohemia, major landowners holding 43% of arable land (1848), a peasant population that doubled in the late 19th century against roughly a 7% increase in arable land, 80% of plots under five acres by 1899, near-constant famines causing some 50,000 deaths a year, and only about 15% of peasants attending school [S8, S9, S13]. Stanisław Szczepanowski's *Nędza Galicji w cyfrach* (The Misery of Galicia in Numbers, 1888) crystallized the crisis with the line that every resident \"does one-quarter of a man's work and eats one-half of a man's food,\" and Poles mocked the province as \"Golicja i Głodomeria,\" naked-and-hungry [S12]. Its tripartite society of Polish landowners and peasants, Ruthenian (Ukrainian) peasants, and a large Jewish population means that Southern Poland plus Western Ukraine in the profile correspond directly to West and East Galicia.\n\nThat eastern, Ruthenian half is the \"Western Ukraine 4%\" signal. The Union of Brest (1595/96) created the Ruthenian Uniate (Greek Catholic) Church, which switched allegiance from Constantinople to Rome while keeping the Byzantine rite; under Austria-Hungary it was organized as the Greek Catholic province of Galicia, the Archdiocese of Lemberg/Lwów with sees at Przemyśl and Stanislau/Stanyslaviv. The East Slavic peasantry self-identified as \"Rusyns\" until the late-19th/early-20th-century shift to \"Ukrainians,\" and they were overwhelmingly rural — about 6% in non-agricultural occupations against roughly 33% of Polish-speakers [S8, S14]. The northern signals belong to the Romanov Empire's Baltic governorates. Swedish Estonia and Livonia passed to Russia by the 1721 Treaty of Nystad, and Courland was annexed in 1795; a Baltic German landowning nobility ruled a Lutheran Estonian and Latvian peasantry under the corporate privileges of the \"Ostsee Right.\" Serfdom there was abolished remarkably early — Estland (1816), Kurland (1817), and Livland (1819) under Alexander I, the empire's earliest such reform — but emancipation granted personal freedom without land, leaving peasants as rent or labor tenants, while Lutheran insistence on Bible-reading produced unusually high literacy (about 45–50% of Estonians could read by the early 1800s) [S10, S15]. Russification intensified after 1881 [S10]. The Lithuanian/Vilna lands were by contrast Roman Catholic and bound to the Polish tradition, and after the failed 1863 January Uprising they endured Governor-General Muravyov's repression, persecution of the Catholic Church, and the 1865–1904 ban on printing Lithuanian in the Latin alphabet [S11]; the Estonia & Latvia 9% and Lithuania 3% signals map onto this Lutheran-versus-Catholic northern divide.\n\nA final trace, \"Germans in Russia 1%,\" reflects a genuine, well-documented diaspora — though at 1% it may also be low-level noise. Catherine II's manifesto of 22 July 1763 offered free land, a 30-year tax exemption, religious freedom, and exemption from military service; over 30,000 colonists migrated between 1763 and 1766, founding about 106 Volga colonies near Saratov, and Alexander I's 1804 invitation drew the Black Sea Germans to southern Ukraine. When the 1763 privileges were revoked in 1871–1874, ending the conscription exemption, many re-emigrated to the Americas [S16]. Whether this 1% reflects true colonist ancestry or spillover from the broader \"Southern Germanic Europe 4%\" / Ostsiedlung component cannot be resolved from admixture alone. All these pressures finally converged into a single migratory torrent. Galician emigration rose from a few thousand in the 1870s to about 80,000 in the 1880s, 340,000 in the 1890s, and at least two million from the mid-1890s to 1914 (400,000 in 1913 alone) [S8]; Russian-Jewish emigration after the 1881–82 pogroms and the May 1882 laws exceeded two million between 1881 and 1920, Jews making up at least 70% of total emigration in most years from 1882 to 1898 [S17]; and Lithuania's post-1863 conscription fears, Russification, and press ban added their own push [S11]. The Immigration Act of 1924 (Johnson–Reed) then pegged the national-origins quota to the 1890 census, allotting 85% to Northern and Western Europe and choking off Southern and Eastern European arrivals for decades [S18].\n\n---\n\n## Narrative: Peoples and Languages of the Belt\n\nThe DNA profile spans a band of Europe that, ethnographically, contains four distinct family groups. The **West Slavs** — Czechs, Poles, Slovaks — and the **East Slavs** — here represented by Ukrainians/Ruthenians — both descend from the great Slavic expansion of roughly 500–1000 AD, which radiated out of a homeland scholars place between the middle Vistula/Bug and the middle Dnieper and made Slavic speech dominant from the Elbe to the Volga [S1, S2]. The **Balts** (Lithuanians and Latvians) speak the surviving languages of the Baltic branch, the Slavs' nearest Indo-European relatives. The **Estonians** stand apart entirely: their language is Finnic, part of the Uralic family, with no genealogical kinship to any of the others.\n\nYet genetics blurs what language separates. Kushniarevich et al. (2015) found that the Balts cluster genetically closest to the East Slavs, while on the Y-chromosome they sit beside the Finnic Estonians — and that genetic variation in this whole northeastern bloc tracks geography far more than language [S2]. The practical reading for this profile: the Estonia & Latvia (9%), Lithuania (3%), Northeastern Poland (2%), and Western Ukraine (4%) signals are best understood as one northeastern Slavic/Baltic cluster sliced by an algorithm into adjacent reference panels, not four separate ancestral homelands.\n\n## Narrative: The Czech Lands and the Surname\n\nIf language and genetics frame the region, the **surname anchors the patriline**. *Pokorný* — \"the humble/meek one,\" from the Slavic *pokora*, \"humility\" — is attested in Bohemia and Moravia from 1456 and is today densest precisely there: South Moravia, Central Bohemia, and Prague hold roughly half of all Czech bearers [S3]. The Czech lands themselves were no backwater: the medieval Kingdom of Bohemia was a Holy Roman electorate that passed from the Přemyslids through the Luxembourgs to the Habsburgs in 1526 [S4]. Two layers of that history bear directly on the profile. First, the 13th-century **Ostsiedlung** seeded German towns, miners, and law (the *ius teutonicum*) across Bohemia and Moravia — a plausible source of the \"Southern Germanic Europe 4%\" alongside any Volga/Black Sea trace [S4]. Second, after the 1620 **Battle of White Mountain**, the Habsburg Counter-Reformation forcibly re-Catholicized the Czech lands and suppressed the Czech language for two centuries, until the late-18th-century National Revival [S5] — context for why a Czech-surnamed family might be Catholic and German-influenced. The tension to flag honestly: the surname points to Bohemia/Moravia, but the heaviest DNA region is Southern Poland. The cleanest reconciliation is a Czech-origin *Pokorný* line that, like many, had drifted into or near Galicia/southern Poland along the porous Habsburg internal frontier.\n\n## Narrative: Partitioned Poland and Galician Misery\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 560\" role=\"img\" aria-label=\"A schematic crownland map of the Central-European and Baltic belt after the Partitions of Poland. A single contiguous band of regions is tinted in just two tinctures: Habsburg gold on the south-west and Romanov crimson on the north-east. The Habsburg block holds Bohemia and Moravia (the Pokorný core), West Galicia or Southern Poland at 19 percent, and East Galicia or Western Ukraine at 4 percent. The Romanov block holds NE Poland or Congress Poland at 2 percent, Lithuania and Vilna at 3 percent, and the Baltic governorates Estland, Livland and Kurland — Estonia and Latvia — at 9 percent. A dashed confessional seam runs through the belt separating the Catholic and Greek-Catholic Uniate south from the Lutheran Baltic north. Three partition dates 1772, 1793 and 1795 are marked, totalling 123 years of statelessness.\">\n<rect x=\"14\" y=\"14\" width=\"672\" height=\"532\" fill=\"none\" class=\"s-t3\" stroke-width=\"1.4\" style=\"stroke:var(--muted)\"/>\n<rect x=\"20\" y=\"20\" width=\"660\" height=\"520\" fill=\"none\" class=\"ln\" stroke-width=\".6\"/>\n<text x=\"350\" y=\"46\" text-anchor=\"middle\" font-size=\"15\" class=\"t-serif\" letter-spacing=\"2.5\">TWO EMPIRES, ONE BELT<\/text>\n<text x=\"350\" y=\"65\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">the Eastern line under two crowns, 1772&#8211;1918 &#183; every DNA region in just two hands<\/text>\n<g class=\"s-t3\" stroke-width=\".4\" opacity=\".4\">\n<line x1=\"350\" y1=\"300\" x2=\"120\" y2=\"120\"/>\n<line x1=\"350\" y1=\"300\" x2=\"350\" y2=\"96\"/>\n<line x1=\"350\" y1=\"300\" x2=\"580\" y2=\"120\"/>\n<line x1=\"350\" y1=\"300\" x2=\"600\" y2=\"300\"/>\n<line x1=\"350\" y1=\"300\" x2=\"580\" y2=\"480\"/>\n<line x1=\"350\" y1=\"300\" x2=\"100\" y2=\"480\"/>\n<\/g>\n<g transform=\"translate(642,100)\">\n<circle r=\"13\" fill=\"none\" class=\"s-t3\" stroke-width=\".9\" style=\"stroke:var(--muted)\"/>\n<path d=\"M0,-13 L3,0 L0,13 L-3,0 Z\" class=\"f-t3\" opacity=\".55\"/>\n<path d=\"M-13,0 L0,3 L13,0 L0,-3 Z\" fill=\"none\" class=\"s-t3\" stroke-width=\".7\" style=\"stroke:var(--muted)\"/>\n<text x=\"0\" y=\"-17\" text-anchor=\"middle\" font-size=\"7.5\" class=\"t-muted\">N<\/text>\n<\/g>\n<g>\n<path d=\"M70,250 L210,210 L300,250 L320,330 L250,400 L130,420 L75,360 Z\" class=\"f-t4\" opacity=\".82\" stroke-width=\"1\" style=\"stroke:var(--muted)\"/>\n<path d=\"M300,250 L210,210 L240,150 L330,140 L360,210 L320,330 Z\" class=\"f-t4\" opacity=\".6\" stroke-width=\"1\" style=\"stroke:var(--muted)\"/>\n<path d=\"M320,330 L360,210 L450,250 L470,330 L400,400 L250,400 Z\" class=\"f-t4\" opacity=\".42\" stroke-width=\"1\" style=\"stroke:var(--muted)\"/>\n<path d=\"M360,210 L330,140 L430,110 L520,150 L500,230 L450,250 Z\" class=\"f-t2\" opacity=\".46\" stroke-width=\"1\" style=\"stroke:var(--muted)\"/>\n<path d=\"M500,230 L520,150 L600,130 L640,200 L590,290 L470,330 L450,250 Z\" class=\"f-t2\" opacity=\".62\" stroke-width=\"1\" style=\"stroke:var(--muted)\"/>\n<path d=\"M520,150 L540,80 L630,70 L640,200 L600,130 Z\" class=\"f-t2\" opacity=\".84\" stroke-width=\"1\" style=\"stroke:var(--muted)\"/>\n<\/g>\n<path d=\"M330,140 L360,210 L450,250 L500,230 L590,290\" fill=\"none\" class=\"s-t5\" stroke-width=\"2\" stroke-dasharray=\"6 4\" style=\"stroke:var(--t5)\"/>\n<text x=\"455\" y=\"200\" text-anchor=\"middle\" font-size=\"8\" class=\"t-acc\" style=\"fill:var(--t5)\" transform=\"rotate(-18 455 200)\">confessional seam &#183; Catholic / Uniate &#8212;&#8212; Lutheran<\/text>\n<g font-family=\"var(--display)\">\n<text x=\"190\" y=\"318\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" class=\"t-inv\">BOHEMIA &amp; MORAVIA<\/text>\n<text x=\"190\" y=\"334\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-inv\" font-style=\"italic\">the Pokorn&#253; core &#183; surname densest here<\/text>\n<text x=\"275\" y=\"248\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"bold\" class=\"t-inv\">19%<\/text>\n<text x=\"275\" y=\"263\" text-anchor=\"middle\" font-size=\"9\" class=\"t-inv\">W. Galicia &#183; &#8220;S. Poland&#8221;<\/text>\n<text x=\"370\" y=\"318\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"bold\" class=\"t-inv\">4%<\/text>\n<text x=\"370\" y=\"333\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-inv\">E. Galicia &#183; W. Ukraine<\/text>\n<text x=\"423\" y=\"186\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" style=\"fill:var(--bg)\">2%<\/text>\n<text x=\"423\" y=\"200\" text-anchor=\"middle\" font-size=\"8\" style=\"fill:var(--bg)\">NE Poland &#183; Congress<\/text>\n<text x=\"535\" y=\"232\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\" class=\"t-inv\">3%<\/text>\n<text x=\"535\" y=\"246\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-inv\">Lithuania &#183; Vilna<\/text>\n<text x=\"588\" y=\"122\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"bold\" class=\"t-inv\">9%<\/text>\n<text x=\"588\" y=\"137\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-inv\">Estonia &amp; Latvia<\/text>\n<text x=\"588\" y=\"149\" text-anchor=\"middle\" font-size=\"7.5\" class=\"t-inv\" font-style=\"italic\">Estland &#183; Livland &#183; Kurland<\/text>\n<\/g>\n<g class=\"s-t4\" stroke-width=\"2\">\n<rect x=\"74\" y=\"455\" width=\"22\" height=\"13\" class=\"f-t4\" opacity=\".82\" stroke=\"none\"/>\n<\/g>\n<text x=\"104\" y=\"465\" font-size=\"10.5\" font-weight=\"bold\" style=\"fill:var(--t4)\">HABSBURG MONARCHY<\/text>\n<text x=\"104\" y=\"479\" font-size=\"8.5\" class=\"t-muted\">Galicia &#8212; &#8220;the poorest province in Europe&#8221; &#183; Bohemia-Moravia &#183; gold<\/text>\n<rect x=\"74\" y=\"494\" width=\"22\" height=\"13\" class=\"f-t2\" opacity=\".72\" stroke=\"none\"/>\n<text x=\"104\" y=\"504\" font-size=\"10.5\" font-weight=\"bold\" style=\"fill:var(--t2)\">ROMANOV EMPIRE<\/text>\n<text x=\"104\" y=\"518\" font-size=\"8.5\" class=\"t-muted\">Congress Poland &#183; Baltic governorates &#183; Lithuania &#183; crimson<\/text>\n<g transform=\"translate(440,452)\">\n<line x1=\"0\" y1=\"0\" x2=\"0\" y2=\"66\" class=\"ln\" stroke-width=\"1\"/>\n<text x=\"14\" y=\"6\" font-size=\"9\" class=\"t-acc\" style=\"fill:var(--t5)\">THREE PARTITIONS<\/text>\n<text x=\"14\" y=\"22\" font-size=\"9.5\"><tspan font-weight=\"bold\">1772<\/tspan> &#183; First &#8212; &#8531; of the land, &#189; the people<\/text>\n<text x=\"14\" y=\"38\" font-size=\"9.5\"><tspan font-weight=\"bold\">1793<\/tspan> &#183; Second &#8212; Prussia &amp; Russia<\/text>\n<text x=\"14\" y=\"54\" font-size=\"9.5\"><tspan font-weight=\"bold\">1795<\/tspan> &#183; Third &#8212; the state extinguished<\/text>\n<text x=\"14\" y=\"68\" font-size=\"8.5\" class=\"t-muted\" font-style=\"italic\">&#8594; 123 years of statelessness, to 1918<\/text>\n<\/g>\n<line x1=\"20\" y1=\"438\" x2=\"680\" y2=\"438\" class=\"ln-soft\" stroke-width=\".75\"/>\n<line x1=\"20\" y1=\"442\" x2=\"680\" y2=\"442\" class=\"ln-soft\" stroke-width=\".5\"/>\n<text x=\"350\" y=\"534\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-muted\" font-style=\"italic\">Galicia, 1890: ~$1,947 per head &#183; 80% of plots under 5 acres by 1899 &#183; ~50,000 famine deaths a year &#183; the Lithuanian press ban, 1865&#8211;1904.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 3.<\/strong> The whole &#8220;Eastern line&#8221; is one Partition-made borderland counted twice. A Czech surname and a &#8220;Southern Poland&#8221; label are not two ancestries but the <em>same Habsburg Galicia<\/em> &#8212; gold here, crimson there &#8212; which is why six DNA regions resolve into just two crowns until 1918.<\/figcaption>\n<\/figure>\n\n\nFrom 1772 to 1795, Russia, Prussia, and Austria erased the Polish-Lithuanian state in three partitions, and for 123 years \"Poland\" was an administrative fiction split among three crowns [S6]. Austria's share became **Galicia**, and Galicia became a byword for misery. Per-capita output in 1890 (~$1,947) trailed Austria proper and Bohemia badly; great landlords held 43% of the arable; partible inheritance after the 1848 emancipation fragmented peasant plots until 80% were under five acres by 1899; famine killed perhaps 50,000 a year [S8, S9]. Szczepanowski's 1888 *Nędza Galicji w cyfrach* gave the crisis its enduring epigram — a quarter of a man's work on half a man's food [S12]. Western Galicia (around Kraków) was Polish and Catholic; **Eastern Galicia** (around Lwów/Lviv) was Polish-administered but Ruthenian-peasant, Greek Catholic (Uniate), and only beginning to call itself Ukrainian — the \"Western Ukraine 4%\" signal [S14]. The Russian partition, meanwhile, became autonomous Congress Poland, increasingly Russified after the failed uprisings [S7].\n\n## Narrative: The Baltic North and the Lithuanian Catholic Lands\n\nThe northern signals belong to the Romanov Empire's Baltic governorates. **Estland, Livland, and Kurland** (Estonia and Latvia) were governed by a thin German-speaking aristocracy — the Baltic Germans — over a Lutheran Estonian and Latvian peasantry, under the special \"Ostsee Right.\" Here serfdom ended remarkably early (1816–1819), though the peasants got freedom without land and remained tenants; Lutheran Bible-reading had already produced high literacy [S10, S15]. Russification bore down after 1881 [S10]. The **Lithuanian/Vilna lands** were a different world — Roman Catholic, bound to the old Polish-Lithuanian tradition — and after the 1863 January Uprising they endured Muravyov's repression, persecution of the Catholic Church, and the 1865–1904 ban on printing Lithuanian in the Latin alphabet [S11]. Estonia & Latvia (9%) and Lithuania (3%) map onto this Lutheran-vs-Catholic Baltic divide.\n\n## Narrative: Germans in Russia\n\nFinally, the \"Germans in Russia 1%\" trace points to a real and well-documented diaspora. Catherine II's 1763 manifesto lured tens of thousands of German farmers to the Volga with free land, tax holidays, religious freedom, and exemption from conscription; Alexander I's 1804 follow-on settled the **Black Sea Germans** in southern Ukraine [S16]. These colonies kept their German language and faith for a century — until the privileges were revoked in 1871–1874, after which many re-emigrated to the Americas [S16]. At 1% the signal is small enough that it may equally be spillover from the broader Germanic/Ostsiedlung component rather than true colonist ancestry; both readings are defensible.\n\n## Narrative: The Exodus, 1880–1924\n\nThe same pressures converged into a single migratory torrent. From Galicia, land hunger, famine, primitive agriculture, and conscription pushed at least two million people out between the mid-1890s and 1914 [S8]. From the Russian Pale, the 1881–82 pogroms and the 1882 May Laws drove over two million Jews abroad, the majority of all emigrants in those years [S17]. From Lithuania, Russification and the press ban added their own push [S11]. American industry pulled. Then, on 26 May 1924, the **Johnson–Reed Act** pegged immigration quotas to the 1890 census — before the Eastern European surge — and slammed the door, ending large-scale immigration from this entire belt for a generation [S18]. An ancestor arriving from this zone almost certainly came through that pre-1924 window.\n\n---\n\n## Open Questions\n\n1. **Patriline vs. autosomal mismatch.** Is the *Pokorný* line a genuine Czech/Moravian patriline that migrated into Galicia, or a long-established Polish/Galician *Pokorny* offshoot? Surname distribution favors a Czech origin, but only documentary genealogy (parish records, ship manifests) can resolve which.\n2. **Which Galicia?** Does the \"Southern Poland\" weight sit in West Galicia (Polish/Catholic, around Kraków) or shade into East Galicia (Ruthenian/Greek Catholic, around Lwów)? The Western Ukraine 4% hints at an eastern component; parish-record confessional data would clarify.\n3. **Is the \"Germans in Russia 1%\" real?** Genuine Volga/Black Sea colonist ancestry, or statistical bleed from the Ostsiedlung-derived \"Southern Germanic Europe 4%\"? Unresolvable from admixture alone.\n4. **The Baltic 9% origin point.** Does it represent recent Estonian/Latvian ancestry, or the broad northeastern cluster's overlap with the Polish/Lithuanian signal? (See Claim 2.2 on the clustering problem.)\n5. **Non-Anglophone scholarship gap.** This document leans on English-language scholarship plus Szczepanowski (1888, Polish) at second hand. Direct consultation of Polish (e.g., Szczepanowski's original), Czech, Estonian, and Ukrainian-language historiography — and of the LU/Riga conference paper on Baltic serfdom abolition [S15] — would strengthen the Tier-1/Tier-2 base. **I was able to confirm these works exist and are cited, but did not read the non-English originals in full.**\n\n## Sources\n\n1. **Slavs / Early Slavs / East Slavs** (overview of Slavic ethnogenesis and expansion, c. 500–1000 AD, homeland between Vistula/Bug and Dnieper). Reference encyclopedia entry consulted for orientation only — used to locate the underlying scholarly consensus, not cited for any contested claim. https://en.wikipedia.org/wiki/Early_Slavs ; https://en.wikipedia.org/wiki/East_Slavs (accessed 2026-05-30). **Tier 3 (tertiary), lean: orientation only — substantive claims rest on S2.**\n2. Kushniarevich, A., et al. (2015). \"Genetic Heritage of the Balto-Slavic Speaking Populations: A Synthesis of Autosomal, Mitochondrial and Y-Chromosomal Data.\" *PLOS ONE*. https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0135820 (accessed 2026-05-30). **Tier 2 (peer-reviewed), lean: strong — directly supports Claim 2.2.**\n3. Forebears, \"Pokorný Surname Origin, Meaning & Last Name History\" (distribution statistics: ~11,039 bearers in Czechia; regional concentration). https://forebears.io/surnames/pokorn%C3%BD (accessed 2026-05-30). Cross-checked against Behind the Name surname entry (etymology *pokorný* = \"humble\"). https://surnames.behindthename.com/name/pokorny10 (accessed 2026-05-30). **Tier 2–3 (reference/onomastic data), lean: solid for distribution and etymology.**\n4. Britannica, \"Bohemia,\" and \"Kingdom of Bohemia\" reference material (Přemyslid kingdom, 1526 Habsburg accession, 13th-century Ostsiedlung, *ius teutonicum*, German mining towns). https://www.britannica.com/place/Bohemia (accessed 2026-05-30). **Tier 2 (authoritative reference work), lean: solid.**\n5. Britannica / Radio Prague International, \"Battle of White Mountain\" (1620 defeat of the Bohemian estates; Counter-Reformation re-Catholicization; suppression and later revival of Czech). https://www.britannica.com/event/Battle-of-White-Mountain ; https://english.radio.cz/battle-white-mountain-arguably-most-decisive-battle-thirty-years-war-8699328 (accessed 2026-05-30). **Tier 2, lean: solid.**\n6. Britannica, \"Partitions of Poland | Summary, Causes, Map, & Facts\" (1772/1793/1795; loss of ~1/3 land and ~1/2 population in 1772; 123 years of statelessness; Kościuszko uprising). https://www.britannica.com/event/Partitions-of-Poland (accessed 2026-05-30). **Tier 2, lean: strong.**\n7. Britannica, \"Partitions of Poland summary\" + EBSCO Research Starters, \"Partitioning Poland\" (post-1815 settlement: Austrian Galicia, Russian Congress Poland). https://www.britannica.com/summary/Partitions-of-Poland ; https://www.ebsco.com/research-starters/history/partitioning-poland (accessed 2026-05-30). **Tier 2, lean: solid.**\n8. Wikipedia, \"Poverty in Austrian Galicia\" — used as an index to its underlying scholarly citations, NOT cited for its own text. Underlying Tier-2 sources confirmed therein: Norman Davies, *God's Playground: A History of Poland, Vol. II* and *Heart of Europe* (2001, 2005); Alison Fleig Frank, *Oil Empire* (Harvard UP, 2005); Keely Stauter-Halsted, *The Nation in the Village* (Cornell UP, 2005); Clive Trebilcock, *The Industrialisation of the Continental Powers 1780–1914* (Routledge); Ivan L. Rudnytsky, essays on Ukrainians under Austrian rule (1982, 1988); Richard Frucht, *Eastern Europe* (2005). Statistics drawn: 1890 per-capita figures; 43% landlord arable; 80% of plots <5 acres by 1899; ~50,000 famine deaths/yr; ~15% peasant schooling; 6% vs 33% non-agricultural occupation by language; emigration totals. https://en.wikipedia.org/wiki/Poverty_in_Austrian_Galicia (accessed 2026-05-30). **Index to Tier 2 monographs; the cited monographs are Tier 2, lean: strong. Wikipedia itself NOT cited for substantive claims per source discipline.**\n9. Wikipedia, \"Famines in Austrian Galicia\" — likewise used as an index to underlying citations (recurrent famine, ~50,000 deaths/yr, comparison to Ireland). https://en.wikipedia.org/wiki/Famines_in_Austrian_Galicia (accessed 2026-05-30). **Index to Tier 2; not cited for own text.**\n10. Britannica, \"Baltic states: The early modern age,\" and reference material on the Baltic Governorates (Treaty of Nystad 1721; Courland 1795; Baltic German nobility / Ostsee Right; serfdom abolition 1816–1819; post-1881 Russification). https://www.britannica.com/place/Baltic-states/The-early-modern-age (accessed 2026-05-30). **Tier 2, lean: solid.**\n11. Britannica, \"Lithuania – Russian Rule\"; Britannica, \"January Insurrection\"; and \"Lithuanian press ban\" reference material (1863 uprising; Muravyov; Catholic persecution; 1865–1904 Latin-alphabet press ban). https://www.britannica.com/place/Lithuania/Russian-rule ; https://www.britannica.com/event/January-Insurrection (accessed 2026-05-30). **Tier 2, lean: solid.**\n12. Szczepanowski, Stanisław (1888). *Nędza Galicji w cyfrach i program energicznego rozwoju gospodarstwa krajowego* (The Misery of Galicia in Numbers). Polish-language Tier-1 contemporaneous source; cited here at second hand via S8 and via Maner/researchers' commentary. The epigram (\"a quarter of a man's work … half a man's food\") and the ~50,000 annual famine-death estimate originate here. (Original not read in full — Polish.) Commentary: \"An 'India of Europe': Stanisław Szczepanowski (1846–1900) …,\" ResearchGate. https://www.researchgate.net/publication/374471953 (accessed 2026-05-30). **Tier 1 (contemporaneous), accessed at second hand; lean: strong for the figures, flagged as not consulted in original.**\n13. Davies, Norman. *Heart of Europe: The Past in Poland's Present* and *God's Playground: A History of Poland, Vol. II* (Oxford UP / Columbia UP). Source of the \"poorest province in Europe\" characterization (via S8). **Tier 2, lean: strong.**\n14. Britannica/reference + \"Ruthenian Uniate Church\" and \"Ruthenians\" reference material (Union of Brest 1595/96; Greek Catholic province of Galicia — Archdiocese of Lemberg, sees of Przemyśl and Stanislau; Rusyn→Ukrainian self-identification shift c. 1900). https://en.wikipedia.org/wiki/Ruthenian_Uniate_Church (used as index); Catholic Encyclopedia, \"Ruthenians,\" https://www.newadvent.org/cathen/13278a.htm (accessed 2026-05-30). **Catholic Encyclopedia Tier 2 (period reference); lean: solid. Wikipedia used as index only.**\n15. Zemītis, G., et al. \"Abolition of Serfdom in the Baltics – a Demand Dictated by the Modern World,\" Univ. of Latvia conference proceedings (ISCFLUL-7-2019), and \"Estonian national awakening\" reference material (1816 Estland / 1817 Kurland / 1819 Livland emancipation without land; Lutheran literacy ~45–50%; Garlieb Merkel; 1869 first song festival). https://www.apgads.lu.lv/fileadmin/user_upload/lu_portal/apgads/PDF/Juridiskas-konferences/ISCFLUL-7-2019/iscflul.7.2-13_Zemitis.pdf (accessed 2026-05-30). **Tier 2 (peer-reviewed proceedings, non-Anglophone author); lean: solid. Confirmed it exists; PDF not read in full.**\n16. The Volga German Website / Center for Volga German Studies (Concordia) — \"The Manifesto,\" \"Recruitment of the Colonists,\" \"Who are the Volga Germans?\" (Catherine II's 22 July 1763 manifesto; 30,000+ colonists, 106 colonies near Saratov; Alexander I 1804 Black Sea invitation; privileges revoked 1871–1874). https://www.volgagermans.org/history/manifesto ; https://cvgs.cu-portland.edu/who-are-volga-germans/history/manifesto (accessed 2026-05-30). Cross-checked: NDSU Germans from Russia Heritage Collection, https://library.ndsu.edu/grhc/research-history/history-germans-russia (accessed 2026-05-30). **Tier 1–2 (specialist heritage archives reproducing primary manifesto text + university library); lean: strong.**\n17. Britannica, \"Pale of Settlement\"; \"May Laws\" + \"Pogroms in the Russian Empire\" reference material (1881–82 pogroms, >200 events; May 1882 laws; >2 million Jewish emigrants 1881–1920; Jews ≥70% of emigration 1882–98). https://www.britannica.com/place/Pale-of-Settlement ; https://en.wikipedia.org/wiki/May_Laws (used as index to its statute text and Klier/Lambroza scholarship) (accessed 2026-05-30). **Britannica Tier 2; statute and emigration figures lean: strong. Wikipedia used as index only.**\n18. US Department of State, Office of the Historian, \"The Immigration Act of 1924 (The Johnson–Reed Act)\"; US House of Representatives History, Art & Archives, \"The Immigration Act of 1924\" (enacted 26 May 1924; national-origins quota pegged to 1890 census; 85% to Northern/Western Europe; collapse of Southern/Eastern European arrivals). https://history.state.gov/milestones/1921-1936/immigration-act ; https://history.house.gov/Historical-Highlights/1901-1950/The-Immigration-Act-of-1924/ (accessed 2026-05-30). **Tier 1–2 (US government primary/official historical sources); lean: strong.**"}, {"order": 3, "file": "03_Genetic_Anthropological_Context.md", "title": "Genetic and Anthropological Context: What This Estimate Means", "summary": "", "body": "# Genetic and Anthropological Context: What This Estimate Means\n\n## Bottom Line\n\nThis estimate is two different kinds of evidence stacked on one screen. The **percentages** (\"Munster 29%,\" \"Southern Poland 19%\") are an *ethnicity / ancestral-regions* estimate — a statistical comparison of ~300,000 of the test-taker's DNA markers against AncestryDNA's panel of 146 reference populations, read off a hidden Markov model that walks the genome in 1,001 windows and assigns each window to its single most likely population [Claim 3.1]. The **\"by parent\" split** is a separate technology, **SideView**, which uses the DNA the test-taker shares with distant cousins in Ancestry's 20-million-plus database to reconstruct (\"phase\") which copy of each chromosome came from which parent — without either parent testing — so the two ~50% columns are a genuine parental separation, not a guess, and they sharply reduce the cross-parent \"bleed\" that plagued older single-column estimates [Claim 3.2, 3.3]. On the deep history: the Irish side (Parent 2) is the ordinary signature of a long-resident Gaelic population whose genome was largely fixed by a Bronze-Age Steppe/Bell-Beaker turnover ~4,000 years ago and has shown striking continuity ever since, with only modest Norse/Norman additions — a broad all-Ireland, Munster-weighted reading is exactly what fine-scale Irish genetics predicts for a southwestern Gaelic family [Claim 3.4, 3.5, 3.6]. The Balto-Slavic side (Parent 1) lights up Southern Poland, the eastern Baltic, Lithuania, NE Poland, and Western Ukraine *together* because those populations form one of the tightest genetic clusters in Europe; the algorithm is spreading what is most plausibly **one ancestor's regional ancestry** across a set of near-indistinguishable adjacent labels, not finding seven separate homelands [Claim 3.7, 3.8]. The tiny percentages (Northwestern Balkans 1%, Russian/\"Germans in Russia\" 1%) are most likely shared-haplotype noise and should not be built into a family story [Claim 3.9]. And the surname puzzle has a clean, evidence-based resolution: a Czech-rooted *Pokorný* line reading \"Southern Poland\" rather than \"Eastern Czechia\" is fully consistent with the porous Habsburg borderland between Moravia/Silesia and Galicia, and with the way Ancestry's clusters carve a genetic gradient that does not respect modern national borders [Claim 3.10].\n\n---\n\n## What the Evidence Establishes\n\nBegin with how the percentages are produced, because the format invites over-reading. AncestryDNA's \"ancestral regions\" estimate divides the genome into about 1,001 windows, compares the customer's roughly 300,000 shared SNPs against a panel of 146 reference populations, and uses a hidden Markov model to infer the single most likely population for each window — the \"Viterbi path\" — so that the reported percentage for a region is simply the fraction of windows assigned to it. Ancestry's *Ancestral Regions 2025 White Paper* (Angara, Adrion, Curtis, Lang, Noto, Olpin, Sedghifar, Swinford Tibi, Wang, Wolf, Zhang) states the 2025 panel uses \"146 reference panels\" (grown \"from 107 regions to 146\"), analyzes \"approximately 300,000 SNPs,\" assigns \"exactly one population to each window\" along \"the most likely path (called the Viterbi path),\" and runs \"146 populations and 1,001 windows\"; the panel is built from public datasets — 1,000 HGDP samples from 49 worldwide populations, 2,500 from 19 populations of the 1000 Genomes Project, and 900 from 84 populations of the Human Origins dataset (Lazaridis et al., Nature 2014) — plus proprietary and consented customer samples, with groups defined by shared identity-by-descent and validated by PCA [S1]. The single point percentage hides real uncertainty: beyond the Viterbi path, the model takes \"path samples — alternative paths that are also likely\" and reports \"a set of ranges for each of these region results,\" and independent genetic genealogists stress that for adjacent European regions those ranges can be very wide (a reported 19% can span single digits to the thirties), so a percentage should never be read as a precise fraction of ancestry [S1, S2, S7].\n\nThe two ~50% columns are a separate technology, SideView, and a genuine result rather than a guess. SideView \"separates DNA inherited from each parent across the entire genome\" — without either parent testing — by leveraging the DNA segments the test-taker shares with distant cousins, after which the region-inference engine runs on each phased side separately, materially reducing the cross-parent \"bleed\" that made single-column estimates noisier [S1]. The underlying method is the bioRxiv preprint \"Accurate Genome-Wide Phasing from IBD Data\" (Keith Noto, 2022), which phases an entire genome using short shared segments and pieces together overlapping segments until the genome is phased; analyst Leah Larkin (\"The DNA Geek\") describes SideView as building on Ancestry's earlier \"Underdog\" algorithm and notes the 20-million-plus database is large enough that \"most of us will have enough matches to cover most of our genomes\" [S3, S4]. SideView is not magic at the parental boundary, however. Per Ancestry's science team as relayed by independent guides, it works for \"90% of its customers... greater than 95% of the time\" but fails for roughly 10% — \"those who have significant endogamy\" — and Larkin's own validation across 25 testers found very low mis-assignment for non-endogamous testers but a parental call \"less than 50% of the time\" for endogamous populations; both sources stress the system labels the sides \"Parent 1 / Parent 2\" arbitrarily, leaving the mother-versus-father determination to the user [S4, S5]. For this profile, the clean ~50/50 Irish-versus-Central-European split with no obvious endogamy is the easy case, so confidence that the two ancestries came from two different parents is high; which parent is which is not determined by the test and must be fixed by genealogy or a tested relative.\n\nOn the deep history, the Irish side is the genetically \"boring\" — in the best sense — part of the profile. Modern Irish ancestry is a three-layer stack of Mesolithic hunter-gatherers, Neolithic Anatolian-derived farmers (arriving ~4000–3000 BC), and a major Bronze-Age influx of Pontic-Steppe (Yamnaya-related) ancestry carried by Bell-Beaker peoples (~2500–2000 BC), the last being the dominant turnover that established the insular Atlantic genome. Cassidy et al. (2016), in *PNAS*, sequenced a Neolithic woman from Ballynahatty (3343–3020 cal BC) of \"predominantly Near Eastern origin\" with a ~42% hunter-gatherer component, and three Bronze-Age men from Rathlin Island (2026–1534 cal BC) carrying \"∼32% Yamnaya ancestry\" and the R1b Y-haplogroup (R1b1a2a1a2c, \"almost fixed (94%) in the West of Ireland\" today); Rathlin1 was heterozygous for the C282Y hemochromatosis variant — \"the first detection of a known Mendelian disease variant in prehistory,\" at its world peak in Ireland today — and the authors found continuity \"stretching over 4,000 [years] at the insular Celtic edge of Europe\" [S6]. Viking/Norse (9th–11th c.) and Anglo-Norman (post-1169) settlement added a detectable but modest overlay: the Irish DNA Atlas (Gilbert et al., 2017, *Scientific Reports*) dated Norse-Viking gene flow by GLOBETROTTER to roughly 788–1052 CE and northern British-Irish admixture to the 17th–18th centuries (the Ulster Plantations), and a Trinity College Dublin follow-up using 1,000+ genomes (2018) found the Norse/Norman legacy \"small but noticeable,\" peaking in Leinster and coastal cities and thinning west and in Ulster [S7, S8]. Ireland is moreover not genetically uniform: the Irish DNA Atlas resolves \"ten distinct geographically stratified genetic clusters; seven of 'Gaelic' Irish ancestry, and three of shared Irish-British ancestry,\" among them North and South Munster groups that \"together predict the boundaries of the province of Munster, and individually are associated with the boundaries of the kingdoms of Dál Cais and the Eóganacht,\" County Clare appearing as a Munster/Connacht admixture mirroring its documented history, and an Ulster cluster showing \"the greatest genetic distance from Britain... despite its geographic proximity\" [S7]. Because these clusters are real but adjacent and historically intermarried, province-level labels distribute one Munster-rooted person's ancestry across all of them, weighted to the true home — precisely the Munster-29% / Leinster-8% / Donegal-7% / Connacht-6% shape seen here, the textbook signature of a long-resident southwestern Gaelic line rather than evidence of four separate origins.\n\nThe Balto-Slavic side reflects one of Europe's tightest genetic neighborhoods, which is why a single ancestry shows up under many labels. The West-Slavic populations behind the Southern Poland / Eastern Czechia / Slovakia signals descend from a large-scale Slavic expansion of roughly the 5th–8th centuries CE that, in the north, drove a near-complete replacement of the earlier gene pool: a 2025 Max Planck multi-institution study of 555 individuals found that \"starting from the 6th century, large-scale migrations of people of Eastern European origin\" replaced \"over 80% of the local gene pool in Eastern Germany, Poland, and Croatia,\" with more admixture in the Balkans and source signatures \"stretching from southern Belarus to central Ukraine,\" while a companion 2025 Moravia study documented \"a strong genetic shift incompatible with local continuity between the fifth and seventh century\" from Eastern European precursors (modern Russia, Poland, Lithuania, Estonia), cautioning the exact source remains unidentified [S9, S10]. Onto that shared origin sits a cohesive modern bloc: Kushniarevich et al. (2015), in *PLOS ONE*, synthesizing 6,876 mtDNA, 6,079 Y-chromosome, and 296 autosomal profiles, found \"Baltic populations are genetically the closest to East Slavs,\" with high shared IBD and genetic diversity correlating with geography (0.80–0.95) far more than with language — the same finding relied on in companion document `02` (Claim 2.2) — and the eastern Baltic is a slightly distinct corner of that cluster, retaining unusually high hunter-gatherer ancestry and comparatively low Anatolian-farmer ancestry, with Steppe (Corded Ware) ancestry arriving via a sex-biased migration of steppe-derived males (R1a-Z645) mixing with local females (Saag et al.; Mittnik et al.) [S11, S12]. The labels are administratively distinct but genetically overlapping, so the Estonia & Latvia 9%, Lithuania 3%, NE Poland 2%, and Western Ukraine 4% percentages are best read as one northeastern-European signal, with Southern Poland 19% the real center of gravity, rather than four distinct ancestral homelands.\n\nThat leaves the small percentages, which deserve an honest signal-versus-noise verdict. Because the HMM assigns every window to some population and closely related panels share haplotypes, the 1% components — Northwestern Balkans (itself part of the South-Slavic continuum adjacent to the West Slavs) and \"Germans in Russia\"/Russian Germans (a colonist panel overlapping both Germanic and Eastern-European DNA) — are most plausibly shared-haplotype spillover and should not anchor any family narrative [S1, S9, S11]. The mid-size 4% Southern Germanic Europe, 4% Southeastern England & NW Europe, and 3% Central Scotland & Northern Ireland traces on the Parent-1 side are larger and more likely to reflect something real, but that something is ambiguous among several non-exclusive explanations: genuine Ostsiedlung German admixture layered into the Czech/Polish lands (companion doc `02`, Claim 2.4); Baltic-German elite ancestry from the German landowning class that dominated Estonia/Latvia (companion doc `02`, Claim 2.7); or ordinary cross-region bleed, since Ancestry itself states the Germanic Europe region historically extended into \"the Western Czech Republic,\" Poland, and Slovakia and that cross-border sharing is normal [S13]. Stated plainly: the ~50/50 parental split, the ~29% Munster anchor, the ~19% Southern Poland anchor, and the combined northeastern-European bloc are robust; the 1% tags are noise-dominated; and the 3–4% Germanic/British tags are real-but-unresolved and should not be over-interpreted — a judgment consistent with how the documented algorithm behaves, even though admixture data alone cannot prove any single small component real or spurious.\n\nTwo further points frame the whole estimate. First, results change between updates because the reference panel and algorithm change, not because the DNA changes: the 2025 white paper documents the panel growing \"from 107 regions to 146\" for \"even greater granularity,\" and the 2024–25 update specifically \"replaced the 2 broad regions Central & Eastern European and the Baltics with 8 new regions: Estonia & Latvia, Lithuania, Northeastern Poland, North Central Europe, Southern Poland, Slovakia, Western Ukraine, and Eastern Czechia,\" splitting Germanic Europe into finer regions including Southern Germanic Europe — Ancestry's own line being that \"your DNA hasn't changed — what's changed is the amount of data available to compare it to\" [S1, S14]. The current profile's fine-grained labels are a direct product of that re-paneling, which also makes the small numbers the least stable part of the estimate. Second, the percentages and the \"communities\" measure different time depths: \"Ancestral Regions\" (the percentages) compare DNA \"to people with long-standing, documented roots in specific areas to determine your possible ancestry hundreds to thousands of years ago,\" whereas \"Ancestral Journeys\" (formerly Genetic Communities) cluster the test-taker into \"networks of Ancestry members that are highly interconnected due to sharing DNA from a common set of ancestors\" within \"the past 300 years\"; the \"Ancestral regions by parent\" wording here refers to the deep-ancestry percentages split by SideView, and any recent-ancestry communities would be the more genealogically actionable layer [S1, S15, S16].\n\nFinally, the surname puzzle resolves cleanly rather than contradicting the DNA. A patriline named *Pokorný* — overwhelmingly Czech/Moravian in origin and meaning, densest in Czechia with about 11,000 bearers concentrated in Central Bohemia, South Moravia, and Prague (companion doc `02`, Claim 2.3) — that reads \"Southern Poland\" rather than \"Eastern Czechia\" is fully consistent once three facts are held together [S17]. First, Ancestry's current panel distinguishes Eastern Czechia from Southern Poland and assigns the western Czech lands (Bohemia) largely to \"Germanic Europe,\" stating that region \"includes... the Western Czech Republic,\" so a Bohemian *Pokorný* could read partly Germanic while a Moravian/Silesian or Galician-Czech *Pokorný* reads Southern Poland — the labels carve a gradient, not nations [S1, S13]. Second, the Moravian-Silesian-Galician frontier was a single porous Habsburg space (companion doc `02`, Claims 2.4–2.6), so a Czech-origin line that drifted toward Galicia generations before emigrating would carry southern-Polish autosomal DNA while keeping a Czech surname. Third, autosomal percentages average every ancestor, so even a genuinely Czech patriline can be outweighed by maternal Polish/Galician ancestry. The surname and the DNA are two complementary clues to a borderland family; what they cannot do alone is fix the exact patrilineal home (Bohemia versus Moravia/Silesia versus a Galician Czech offshoot), which needs parish records and ship manifests.\n\n---\n\n## Narrative: How To Read This Particular Estimate\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 612\" role=\"img\" aria-label=\"A confidence ledger sorting the DNA estimate into three ruled columns. Robust anchors (green): the 50/50 parental split, Munster 29 percent, Southern Poland 19 percent, and the northeastern-European bloc read as one signal. Real but unresolved (gold-ochre): Southern Germanic 4 percent, Southeastern England 4 percent, Central Scotland 3 percent, and the Baltic 9 percent as a discrete ancestor versus cluster overlap. Noise-dominated (faded crimson): Northwestern Balkans 1 percent and Germans in Russia 1 percent, likely haplotype spillover that may vanish next update. The engine below: a hidden Markov model over about 1,001 genome windows against 146 reference populations across roughly 300,000 SNPs.\">\n<rect x=\"14\" y=\"14\" width=\"672\" height=\"584\" fill=\"none\" class=\"s-t3\" stroke-width=\"1.2\"/>\n<rect x=\"18\" y=\"18\" width=\"664\" height=\"576\" fill=\"none\" class=\"ln-soft\" stroke-width=\".7\"/>\n<text x=\"350\" y=\"46\" text-anchor=\"middle\" font-size=\"15\" class=\"t-serif\" letter-spacing=\"2.5\">THE CONFIDENCE LEDGER<\/text>\n<text x=\"350\" y=\"66\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">what the estimate can bear &#8212; sorted by how much weight a family story may rest on it<\/text>\n<line x1=\"40\" y1=\"80\" x2=\"660\" y2=\"80\" class=\"ln\" stroke-width=\"1\"/>\n<g class=\"s-t3\" stroke-width=\"1\" fill=\"none\"><circle cx=\"350\" cy=\"80\" r=\"5\"/><path d=\"M350,73 l0,14 M343,80 l14,0 M345.5,75.5 l9,9 M354.5,75.5 l-9,9\"/><\/g>\n<g class=\"t-serif\">\n<text x=\"146\" y=\"112\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"bold\" style=\"fill:var(--t1)\">ROBUST ANCH 9%<\/text>\n<text x=\"96\" y=\"268\" font-size=\"10\" class=\"t-serif\">Southern Poland<\/text>\n<text x=\"96\" y=\"280\" font-size=\"8\" class=\"t-muted\">C-European centre of gravity<\/text>\n<line x1=\"50\" y1=\"292\" x2=\"242\" y2=\"292\" class=\"ln-soft\" stroke-width=\".7\"/>\n<text x=\"56\" y=\"316\" font-size=\"11\" font-weight=\"bold\" class=\"t-serif\" style=\"fill:var(--t1)\">&#931;<\/text>\n<text x=\"96\" y=\"312\" font-size=\"10\" class=\"t-serif\">NE-European bloc<\/text>\n<text x=\"96\" y=\"324\" font-size=\"8\" class=\"t-muted\">one signal, not many homelands<\/text>\n<text x=\"56\" y=\"346\" font-size=\"8\" class=\"t-muted\" font-style=\"italic\">Kushniarevich 2015 &#8212; geography<\/text>\n<text x=\"56\" y=\"357\" font-size=\"8\" class=\"t-muted\" font-style=\"italic\">predicts genetics far better than language.<\/text>\n<rect x=\"252\" y=\"138\" width=\"200\" height=\"22\" class=\"f-t4\" opacity=\".16\"/>\n<g class=\"s-t4\" stroke-width=\"1.6\" fill=\"none\"><circle cx=\"350\" cy=\"149\" r=\"7\"/><text x=\"350\" y=\"153\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"bold\" class=\"t-serif\" style=\"fill:var(--t4)\" stroke=\"none\">?<\/text><\/g>\n<text x=\"350\" y=\"180\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-muted\">Ostsiedlung &#183; Baltic-German elite &#183; bleed<\/text>\n<text x=\"350\" y=\"192\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\" font-style=\"italic\">large enough to be something &#8212; that something is ambiguous<\/text>\n<line x1=\"262\" y1=\"204\" x2=\"442\" y2=\"204\" class=\"ln-soft\" stroke-width=\".7\"/>\n<text x=\"270\" y=\"226\" font-size=\"12\" font-weight=\"bold\" class=\"t-serif\" style=\"fill:var(--t4)\">4%<\/text>\n<text x=\"306\" y=\"226\" font-size=\"9.5\" class=\"t-serif\">Southern Germanic<\/text>\n<line x1=\"262\" y1=\"240\" x2=\"442\" y2=\"240\" class=\"ln-soft\" stroke-width=\".7\"/>\n<text x=\"270\" y=\"262\" font-size=\"12\" font-weight=\"bold\" class=\"t-serif\" style=\"fill:var(--t4)\">4%<\/text>\n<text x=\"306\" y=\"262\" font-size=\"9.5\" class=\"t-serif\">SE England &amp; NW Eur.<\/text>\n<line x1=\"262\" y1=\"276\" x2=\"442\" y2=\"276\" class=\"ln-soft\" stroke-width=\".7\"/>\n<text x=\"270\" y=\"298\" font-size=\"12\" font-weight=\"bold\" class=\"t-serif\" style=\"fill:var(--t4)\">3%<\/text>\n<text x=\"306\" y=\"298\" font-size=\"9.5\" class=\"t-serif\">Central Scotland<\/text>\n<line x1=\"262\" y1=\"312\" x2=\"442\" y2=\"312\" class=\"ln-soft\" stroke-width=\".7\"/>\n<text x=\"270\" y=\"334\" font-size=\"12\" font-weight=\"bold\" class=\"t-serif\" style=\"fill:var(--t4)\">9%<\/text>\n<text x=\"306\" y=\"330\" font-size=\"9.5\" class=\"t-serif\">Estonia &amp; Latvia<\/text>\n<text x=\"306\" y=\"342\" font-size=\"8\" class=\"t-muted\">discrete ancestor vs. cluster-overlap<\/text>\n<text x=\"350\" y=\"362\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\" font-style=\"italic\">none confirmable from admixture alone<\/text>\n<rect x=\"456\" y=\"138\" width=\"196\" height=\"22\" class=\"f-t2\" opacity=\".1\"/>\n<g class=\"s-t2\" stroke-width=\"1.4\" fill=\"none\" opacity=\".55\"><path d=\"M554,142 l0,14 M547,149 l14,0\"/><circle cx=\"554\" cy=\"149\" r=\"7\" stroke-dasharray=\"2 2\"/><\/g>\n<text x=\"554\" y=\"180\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-muted\" style=\"fill:var(--t2)\" opacity=\".75\">likely haplotype spillover<\/text>\n<text x=\"554\" y=\"192\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\" font-style=\"italic\">at the 1% floor &#8212; may vanish next update<\/text>\n<line x1=\"466\" y1=\"204\" x2=\"642\" y2=\"204\" class=\"ln-soft\" stroke-width=\".7\"/>\n<g opacity=\".62\">\n<text x=\"474\" y=\"232\" font-size=\"12\" font-weight=\"bold\" class=\"t-serif\" style=\"fill:var(--t2)\">1%<\/text>\n<text x=\"510\" y=\"228\" font-size=\"9.5\" class=\"t-serif\">Northwestern Balkans<\/text>\n<text x=\"510\" y=\"240\" font-size=\"8\" class=\"t-muted\">South-Slavic continuum leak<\/text>\n<\/g>\n<line x1=\"466\" y1=\"252\" x2=\"642\" y2=\"252\" class=\"ln-soft\" stroke-width=\".7\"/>\n<g opacity=\".5\">\n<text x=\"474\" y=\"280\" font-size=\"12\" font-weight=\"bold\" class=\"t-serif\" style=\"fill:var(--t2)\">1%<\/text>\n<text x=\"510\" y=\"276\" font-size=\"9.5\" class=\"t-serif\">&#8220;Germans in Russia&#8221;<\/text>\n<text x=\"510\" y=\"288\" font-size=\"8\" class=\"t-muted\">colonist panel overlapping both<\/text>\n<\/g>\n<line x1=\"466\" y1=\"300\" x2=\"642\" y2=\"300\" class=\"ln-soft\" stroke-width=\"1\" stroke-dasharray=\"6 5\"/>\n<text x=\"554\" y=\"330\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\" font-style=\"italic\">because the HMM assigns every<\/text>\n<text x=\"554\" y=\"342\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\" font-style=\"italic\">window to some population, the floor<\/text>\n<text x=\"554\" y=\"354\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\" font-style=\"italic\">is where leakage accumulates.<\/text>\n<line x1=\"40\" y1=\"384\" x2=\"660\" y2=\"384\" class=\"ln\" stroke-width=\".8\"/>\n<text x=\"40\" y=\"404\" font-size=\"9\" class=\"t-muted\" letter-spacing=\"2\">THE ENGINE BENEATH ALL THREE COLUMNS<\/text>\n<g class=\"t-serif\">\n<text x=\"118\" y=\"438\" text-anchor=\"middle\" font-size=\"17\" font-weight=\"bold\" class=\"t-acc\">~1,001<\/text>\n<text x=\"118\" y=\"454\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">genome windows<\/text>\n<text x=\"290\" y=\"438\" text-anchor=\"middle\" font-size=\"17\" font-weight=\"bold\" class=\"t-acc\">146<\/text>\n<text x=\"290\" y=\"454\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">reference populations<\/text>\n<text x=\"462\" y=\"438\" text-anchor=\"middle\" font-size=\"17\" font-weight=\"bold\" class=\"t-acc\">~300,000<\/text>\n<text x=\"462\" y=\"454\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">SNPs compared<\/text>\n<text x=\"592\" y=\"438\" text-anchor=\"middle\" font-size=\"17\" font-weight=\"bold\" class=\"t-acc\">HMM<\/text>\n<text x=\"592\" y=\"454\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">Viterbi best-fit path<\/text>\n<\/g>\n<line x1=\"204\" y1=\"430\" x2=\"204\" y2=\"450\" class=\"ln-soft\" stroke-width=\".7\"/>\n<line x1=\"376\" y1=\"430\" x2=\"376\" y2=\"450\" class=\"ln-soft\" stroke-width=\".7\"/>\n<line x1=\"528\" y1=\"430\" x2=\"528\" y2=\"450\" class=\"ln-soft\" stroke-width=\".7\"/>\n<line x1=\"40\" y1=\"470\" x2=\"660\" y2=\"470\" class=\"ln-soft\" stroke-width=\".7\"/>\n<text x=\"350\" y=\"492\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-muted\" font-style=\"italic\">A single point percentage hides a wide range &#8212; the same DNA can be re-sorted left-to-right when the panel changes.<\/text>\n<g class=\"s-t3\" stroke-width=\".8\" fill=\"none\" opacity=\".5\" stroke-dasharray=\"2 7\"><line x1=\"40\" y1=\"512\" x2=\"660\" y2=\"512\"/><\/g>\n<text x=\"40\" y=\"534\" font-size=\"9.5\" class=\"t-serif\"><tspan font-weight=\"bold\" style=\"fill:var(--t1)\">Robust<\/tspan> &#8212; the spine; <tspan font-weight=\"bold\" style=\"fill:var(--t4)\">unresolved<\/tspan> &#8212; the borderland; <tspan font-weight=\"bold\" style=\"fill:var(--t2)\">noise<\/tspan> &#8212; the margin to be left blank.<\/text>\n<line x1=\"40\" y1=\"548\" x2=\"660\" y2=\"548\" class=\"ln\" stroke-width=\"1\"/>\n<g class=\"s-t2\" stroke-width=\"1.3\" fill=\"none\"><path d=\"M350,558 l-6,-7 m6,7 l6,-7 m-6,7 l0,11\"/><circle cx=\"344\" cy=\"551\" r=\"2\"/><circle cx=\"356\" cy=\"551\" r=\"2\"/><\/g>\n<text x=\"350\" y=\"584\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\" font-style=\"italic\">Intellectual honesty as cartography &#8212; the estimate is a coastline drawn with a confident centre and a fogged edge.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 4.<\/strong> Uncertainty is the subject, not the footnote. The estimate earns trust precisely by sorting itself &#8212; a green spine of anchors strong enough to carry a family story, a gold borderland of traces that are real but cannot be named, and a faded margin of 1% tags that the next panel update may erase &#8212; so the reader knows which numbers to build on and which to leave blank.<\/figcaption>\n<\/figure>\n\n\n### 1. What the machine actually did\nIt is worth being concrete about the pipeline that produced these numbers, because the format invites over-reading. AncestryDNA genotyped roughly 300,000 single-nucleotide markers on a microarray. SideView then **phased** the genome — sorted the two copies of each chromosome into a \"Parent 1\" pile and a \"Parent 2\" pile — by leaning on the DNA segments the test-taker shares with cousins across Ancestry's 20-million-plus database (the more matches, the cleaner the phasing) [S1, S3, S4]. With the genome split in two, the region-inference engine walked each parental copy in 1,001 windows, and for each window asked the hidden Markov model: *of my 146 reference populations, which single one best explains the DNA here?* The Viterbi path is the model's best single answer for the whole genome; the percentage for \"Munster\" or \"Southern Poland\" is simply the share of windows it handed to that population. The ranges underneath are the spread across thousands of alternative, nearly-as-good answers [S1]. Nothing here is a measurement of a fixed quantity of \"blood\"; it is a probabilistic best-fit of one person's markers to reference clusters built from other people.\n\n### 2. Why the two columns are trustworthy as a *split*\nThe single most reliable structural fact in this estimate is the clean ~50/50 separation of an Irish ancestry from a Central-European/Balto-Slavic ancestry onto two different parents. SideView is at its best precisely when the two parents come from genetically *distant* populations and there is no endogamy — and Irish vs. Polish/Baltic is about as distant as intra-European ancestry gets, with no sign of a population marrying tightly within itself [S4, S5]. So the inference \"one parent's people were Irish, the other parent's people were Central/Eastern European\" is on very solid ground. What SideView does *not* do is tell you which side is the mother and which is the father — that label is arbitrary until pinned down by a known relative or a paper trail [S4, S5].\n\n### 3. The Irish side: deep continuity, fine-scale structure, ordinary signature\nThe Irish column is the genetically \"boring\" — in the best sense — part of this profile. Ireland's gene pool was largely set by the Bronze-Age Steppe/Beaker turnover ~4,000 years ago and has been strikingly continuous since (Cassidy et al. found ~4,000 years of continuity and a Bronze-Age individual already carrying the hyper-Irish C282Y hemochromatosis variant) [S6]. Vikings and Normans added a real but modest overlay, concentrated in Leinster and the port towns, never displacing the Gaelic core [S7, S8]. And modern Ireland *does* have detectable internal structure — the Irish DNA Atlas resolves distinct Munster (North/South), Connacht, and Ulster clusters, with Munster's two groups tracking the medieval Dál Cais and Eóganacht kingdoms [S7]. A profile that reads Munster-heavy (29%) with thinner Leinster/Donegal/Connacht tails is the textbook signature of a long-settled southwestern Gaelic family whose ancestry, when forced onto province-level labels, spreads across neighboring (and historically intermarried) provinces. It is *not* evidence of four separate Irish origins. This dovetails with the Collins/Ó Coileáin Munster sept established in companion doc `01`.\n\n### 4. The Balto-Slavic side: one neighborhood, many labels\nThe Parent-1 column looks busy — seven or eight regions — but most of that is the algorithm's response to a genuinely hard problem: northeastern Europe is one of the tightest genetic clusters on the continent. Kushniarevich et al. showed Balts sit genetically closest to East Slavs, that the whole bloc shares deep IBD, and that **geography predicts the genetics better than language does** [S11]. The 2025 ancient-DNA work explains *why*: the Slavic expansion of the 5th–8th centuries swept a single eastern-European-derived ancestry across Poland and the Czech lands, replacing 80%+ of the prior gene pool in the north [S9, S10]. So a single ancestor from the southern-Polish/western-Galician zone will distribute DNA across Southern Poland, NE Poland, Lithuania, Estonia & Latvia, and Western Ukraine — not because there were ancestors in each of those places, but because those reference panels overlap heavily. The single largest anchor, **Southern Poland 19%**, is the real center of gravity; the Baltic and Ukrainian percentages are best read as the same regional ancestry caught by neighboring nets. (The eastern Baltic's own deep history — high hunter-gatherer retention, low Anatolian-farmer ancestry, steppe ancestry arriving via sex-biased male migration — is what makes Estonia/Latvia a *slightly* distinct corner of that cluster, which is why it draws a non-trivial 9% rather than vanishing entirely [S12].)\n\n### 5. Signal vs. noise, stated plainly\n- **Robust (build the story on these):** the ~50/50 parental split; Irish ancestry on one parent, Balto-Slavic/Central-European on the other; Munster as the Irish center of gravity; Southern Poland as the Central-European center of gravity; the northeastern-European bloc as a single regional signal.\n- **Real but unresolved (mention, don't over-read):** Southern Germanic Europe 4%, Southeastern England & NW Europe 4%, Central Scotland & N. Ireland 3% on Parent 1. Plausible sources include medieval Ostsiedlung German settlement in the Czech/Polish lands, Baltic-German elite ancestry, and ordinary cross-region bleed between the Germanic-Europe panel and its Central-European neighbors [S1, S13]. None is independently confirmable from admixture alone.\n- **Noise-dominated (do not build anything on these):** Northwestern Balkans 1% and \"Germans in Russia\"/Russian Germans 1%. At the 1% floor, these are most plausibly shared-haplotype spillover from the adjacent Slavic and Germanic panels [S1, S9, S11].\n\n### 6. The surname puzzle, resolved\nThe most interesting tension in the profile is that *Pokorný* is a Czech/Moravian surname, yet the DNA says \"Southern Poland,\" not \"Eastern Czechia\" — and Ancestry now *has* an Eastern Czechia region, so the absence is meaningful. The resolution is borderland geography plus the difference between a surname and an autosomal average. A surname follows one paternal line; the percentage averages every ancestor. Ancestry assigns Bohemia (western Czech lands) largely to *Germanic Europe*, and the Moravian-Silesian-Galician frontier sits genetically adjacent to *Southern Poland* [S1, S13]. A Czech-rooted line that drifted toward Galicia/southern Poland over generations — entirely normal in the single Habsburg space that joined Moravia, Silesia, and Galicia (companion doc `02`) — would carry a Czech surname and southern-Polish autosomal DNA at the same time. The surname and the DNA are two clues to the same borderland family, not a contradiction. What they cannot do alone is fix the exact patrilineal home (Bohemia vs. Moravia/Silesia vs. a Galician Czech offshoot); that needs parish records and ship manifests.\n\n---\n\n## Open Questions\n\n1. **Which parent is which?** SideView establishes that the Irish and Balto-Slavic ancestries sit on two *different* parents, but not which is maternal and which is paternal. Given the surnames, the natural hypothesis is Collins/Irish on one parent and Pokorný/Central-European on the other — but the test alone cannot confirm the maternal/paternal assignment; a tested close relative or documentary genealogy would.\n2. **Is the Estonia & Latvia 9% a real recent ancestor or cluster overlap?** It is large enough to be more than floor-noise, but the tightness of the northeastern-European cluster means it could be the broad Polish/Lithuanian signal overlapping the Baltic panel rather than a discrete Estonian/Latvian ancestor. Only an Ancestral-Journey (recent IBD community) or matches with documented Baltic ancestry could distinguish these.\n3. **Where exactly is the Pokorný patriline from?** Bohemia (would tend Germanic), Moravia/Silesia, or a Galician Czech offshoot (would tend Southern Poland)? A Y-DNA test plus parish records would resolve what autosomal percentages cannot.\n4. **Are the 3–4% Germanic/British traces Ostsiedlung, Baltic-German, or bleed?** Distinguishing genuine German-colonist admixture in the Czech/Polish lands, Baltic-German elite ancestry, and cross-panel leakage is not possible from admixture percentages alone; chromosome-painting tools or matches with documented German ancestry would help.\n5. **Do recent \"Ancestral Journeys\" (Genetic Communities) exist for this kit, and what do they say?** The deep-ancestry percentages are only half the picture; the recent (~300-year) IBD communities would be far more genealogically actionable (e.g., a specific Munster-emigrant or Galician-emigrant community) and were not part of the data supplied for this analysis.\n6. **Sensitivity to the next update.** Because percentages move when the panel changes (Claim 3.11), the specific small numbers here are the least stable part of the estimate; a future re-paneling (e.g., a finer split of the eastern Baltic or a Galicia-specific region) could reshuffle the 1–9% components without any change to the underlying DNA.\n\n---\n\n## Sources\n\n1. Angara, R., Adrion, J., Curtis, R., Lang, J., Noto, K., Olpin, R., Sedghifar, A., Swinford Tibi, N., Wang, Y., Wolf, A., Zhang, J. (2025). *Ancestral Regions 2025 White Paper* (last updated October 9, 2025). AncestryDNA. Source of: 146 reference populations/panels (grown from 107); ~300,000 shared SNPs; 1,001 genome windows; HMM + Viterbi path; path-sampling for reported ranges; SideView phasing integrated into region inference with explicit allowance for phase error; reference-panel composition (1,000 HGDP
