bold\">3%<\/tspan> Lithuania<\/text>\n<line x1=\"456\" y1=\"292\" x2=\"490\" y2=\"292\" class=\"ln-soft\" stroke-width=\".75\"/>\n<text x=\"494\" y=\"312\" font-size=\"10.5\"><tspan font-weight=\"bold\">2%<\/tspan> NE Poland<\/text>\n<text x=\"420\" y=\"350\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\">+ 13% traces<\/text>\n<text x=\"420\" y=\"364\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">Germanic · SE England · Scotland<\/text>\n<text x=\"350\" y=\"462\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\" font-style=\"italic\">SideView is real IBD phasing — it splits the genome cleanly in two, but cannot say which half is mother and which is father.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 1.<\/strong> The estimate as a blazon. A near-perfect 50/50 &#8220;by parent&#8221; split is, structurally, a <em>per-pale<\/em> shield — two internally-graded ancestral blocs, each anchored by a surname whose very meaning (a martial &#8220;whelp,&#8221; a virtue-name &#8220;the humble one&#8221;) reads like a heraldic byname.<\/figcaption>\n<\/figure>\n\n\n- **Origins:** A long-settled Gaelic-Catholic population of southwest Ireland (the *Ó Coileáin* of West Cork) on one side; on the other, the Czech/Moravian and Polish-Galician-Baltic borderlands that lay under just two empires — Habsburg Austria and Romanov Russia — from the 1772–1795 Partitions until 1918.\n- **Modern arc:** Both homelands were poor, dominated by outside elites, and emptied by emigration. Ireland was hollowed by the Great Famine (1845–52) and a century of follow-on departure; Galicia was \"the poorest province in Europe,\" and the Baltic/Polish lands were squeezed by land hunger, conscription, and Russification.\n- **Today:** Genetically you are a textbook **southwestern-Gaelic** signature fused with a tight **Balto-Slavic** cluster. The science is solid on the big anchors (the 50/50 split, Munster 29%, Southern Poland 19%) and appropriately uncertain on the 1% tails (Northwestern Balkans, \"Germans in Russia\").\n- **Forecast:** Over the next generation your heritage will most likely be held as **symbolic ethnicity with the Irish strand dominant** (45–60%), with a meaningful chance that cheap DNA testing and document research **revive the submerged Central-European/Baltic strands** (25–40%), and a real-but-conditional path to **instrumental use via EU citizenship-by-descent** (15–30%).\n- **Open questions:** Which parent is which; the true branch of the Pokorný patriline (Czech vs. Galician-Polish vs. Jewish); whether the Baltic 9% is a discrete ancestor or cluster-overlap; and the specific West Cork parish behind Collins. All are resolvable — see the roadmap.\n\n## How to Read This Corpus\n\n- **5-minute version:** this Bottom Line and the In Brief.\n- **30-minute version:** this briefing in full, plus `Future_Trajectory.md` (the practical \"what to do next\" roadmap).\n- **Full version:** read in numbered order — `01`/`02` (the two homelands' history), `03` (what the DNA means), `04` (the path to America), `05` (the surnames), `06` (cultural heritage), then `Future_Trajectory.md`. `Verification_Notes.md` is the fact-check layer; `Sources.md` is the annotated bibliography.\n\n## Origins (Brief)\n\n**The Irish side** is the more straightforward story, because the surname and the DNA point to the same place. *Collins* is the anglicization of **Ó Coileáin** (\"descendant of Coileán,\" from a word for a whelp or young warrior) — a sept that originated in north Munster (the Connello baronies of Co. Limerick) and was **driven south into West Cork by the Anglo-Norman Geraldines (FitzGeralds) in the thirteenth century** (Claim 1.1, 5.1). That displacement is *why* your Irish signal is Munster-weighted and southwest-leaning today. From there the Ó Coileáin shared the fate of all Gaelic-Catholic Ireland: the Tudor conquest and the Munster Plantation after the Desmond Rebellions, Cromwellian and Williamite confiscation that drove Catholic landownership from roughly 60% in 1641 to about 5% by the 1770s, the Penal Laws, and a land system that left millions dependent on the potato (Claims 1.5–1.8). The broad four-province spread of your Irish DNA is not four separate origins — it is **the ordinary genetic signature of a deeply-rooted Gaelic population** that endured the same catastrophes everywhere (Claim 3.5).\n\n**The Central-European/Baltic side** is one coherent belt that history split among empires. The surname **Pokorný is overwhelmingly Czech/Moravian** — around the 20th-commonest surname in Czechia, concentrated in Bohemia, Moravia, and Prague (Claim 5.6) — yet your heaviest regional signal is \"Southern Poland,\" not a Czech label. **This is consistent, not contradictory** (Claim 3.13): Ancestry historically had no standalone Czech/Bohemia region, the Moravian–Silesian–Galician frontier sits genetically adjacent to Southern Poland, and the whole zone was one porous Habsburg space. Your \"Southern Poland 19% + Western Ukraine 4%\" reads as **Galicia** — the Austro-Hungarian crownland that was, by the numbers, the poorest province in Europe (Claim 2.6). Your \"Estonia & Latvia 9% + Lithuania 3%\" reads as the **Russian Baltic governorates**, where a Baltic-German elite ruled a Lutheran peasantry to the north and Catholic Lithuania to the south (Claim 2.7). The Slavic expansion of the mid-first-millennium and deep Balto-Slavic continuity are why all these northeastern labels (Southern Poland, the Baltics, Lithuania, Western Ukraine) **light up together for what may be only one or two ancestors from that region** (Claims 2.1, 2.2, 3.6).\n\n## Current State (Brief)\n\nWhat the test actually measured, and how much to trust each piece, is the heart of `03_Genetic_Anthropological_Context.md`. Ancestry's estimate comes from a hidden-Markov model walking your genome in ~1,001 windows against 146 reference populations (~300,000 SNPs), and the **\"by parent\" split is real IBD-based phasing (Ancestry's \"SideView\")** — it separates your two parents' contributions without testing them, which genuinely *reduces cross-parent bleed and raises confidence* (Claims 3.1–3.4). It does **not** tell you which side is your mother and which your father (Open Question).\n\nThe honest signal-vs-noise ledger (Claim 3.10):\n\n- **Robust:** the clean 50/50 split; the Munster 29% and Southern Poland 19% anchors; the northeastern bloc read as essentially *one* genetic signal rather than five separate homelands.\n- **Real but unresolved:** the 3–4% Germanic and British traces on the Eastern-European side (Southern Germanic 4%, SE England 4%, Central Scotland 3%) — plausibly **Ostsiedlung** German settlement or **Baltic-German** elite ancestry baked into that population, or simple cross-region bleed.\n- **Noise-dominated — do not over-read:** **Northwestern Balkans 1%** and **\"Germans in Russia\" 1%**. These are most likely shared-haplotype spillover; they may shrink or vanish in the next panel update (Claims 3.9, 3.10).\n\nThe deep-ancestry picture is well-supported by ancient-DNA scholarship: Ireland's three-layer genetic stack (Mesolithic hunter-gatherers → Neolithic Anatolian farmers → a major Bronze-Age Steppe/Bell-Beaker turnover) with ~4,000 years of subsequent continuity and only a light Norse/Norman overlay (Cassidy et al. 2016; the Irish DNA Atlas, Gilbert et al. 2017 — Claims 3.5, verified); and the tight clustering of Poles, Balts, East Slavs, and Estonians in which **geography predicts genetics more than language does** (Kushniarevich et al. 2015 — Claims 2.2, 3.6, verified).\n\n## The Migration Story (Brief)\n\nTwo clocks, one destination (this is `04_Path_To_America.md`). The **Irish Collins line** rode the steady, self-financing, century-long post-Famine stream: single young men and women, \"America letters\" and prepaid tickets, out through Queenstown (Cobh) or Liverpool, processed at Castle Garden and then Ellis Island, settling into the Catholic parishes of the industrial Northeast and Midwest (Claims 4.1–4.2). The **Pokorný line** rode the concentrated **1880–1924 great wave**: overland by rail to the great German and Belgian ports — Bremen/Bremerhaven, Hamburg, Antwerp — then steerage to Ellis Island (Claims 4.3–4.5).\n\nA crucial genealogical wrinkle sits right on top of your surname puzzle: **Ellis Island recorded Eastern Europeans by *empire*, not ethnicity** — \"Austria\" or \"Russia,\" not \"Czech\" or \"Polish\" or \"Galician\" (Claim 4.6). That single fact is exactly why the Czech-surname / Southern-Poland-DNA tension is so common and so hard to resolve from the manifest alone. The **1924 Johnson–Reed Act** is the hard cutoff: it gutted the Polish, Baltic, and Czechoslovak quotas while leaving the Irish Free State quota generous (28,567 vs. Poland's 6,524 — verified), so **\"before WWII\" almost certainly means \"before 1924\" for your Eastern-European line** (Claim 4.10).\n\nHow the two lines met is, honestly, **inference** — but well-anchored inference (Claims 4.11–4.12, explicitly flagged): the national-parish system kept first-generation Irish and Slavic Catholics socially separate, but their **American-born children intermarried within the Catholic bloc** by mid-century, the \"triple melting pot\" and white-ethnic convergence documented by Kennedy, Herberg, Alba, and Waters. An Irish-Catholic Collins line and a Czech/Polish-Catholic Pokorný line converging in an American industrial city and marrying in the second or third generation is the paradigm case, not the exception.\n\n## Cultural Heritage (Brief)\n\nReligion is both the deep fault line and the likely bond (`06_Cultural_Heritage_And_Identity.md`). **Irish Catholicism** was forged into its modern parish-centered intensity *after* the Famine (Emmet Larkin's \"devotional revolution,\" 1850–75 — verified) and became the organizing institution of Irish-American life (Claims 6.1–6.2). The Central-European strands complicate the picture in interesting ways: **Czechs were the great secular outlier** among immigrants — many were anticlerical \"free-thinkers\" organized around the *Sokol* gymnastic movement rather than the Church (Claim 6.3); **Polish Catholicism** was intensely national (it even produced America's only enduring Catholic schism, the Polish National Catholic Church, Scranton 1897 — verified, Claim 6.4); and the **Baltic strand splits** — Lithuania Catholic, but Estonia and Latvia historically **Lutheran**, a Protestant seam in an otherwise Catholic heritage (Claim 6.5). A household blending all this would most likely have been Catholic-dominant (Irish + Polish), with the Czech and Baltic strands adding quieter complexity.\n\nThe rest follows the familiar pattern of American white ethnicity: **language dies in one to three generations** and the surname becomes the durable linguistic relic; **food survives longest**, compressed into holidays (Irish corned-beef-and-cabbage — itself an American invention; Czech kolaches and *knedlíky*; Polish pierogi, kielbasa, and the twelve-dish *Wigilia*); and **St. Patrick's Day** operates as a master ethnic ritual with no Czech or Polish equivalent of comparable power (Claims 6.7–6.9). The result is what scholars call **symbolic or optional ethnicity** (Gans, Waters, Alba) — and within it, **the Irish strand reliably dominates** while the Central-European/Baltic strands submerge (Claims 6.10–6.11). The quiet irony: it is precisely **DNA testing — the evidence behind this corpus — that is now reviving interest in those submerged strands**.\n\n## Forecast (Brief)\n\nThe forward-looking pillar (`Future_Trajectory.md`) has two parts. The **practical roadmap** is genuinely actionable: the remaining uncertainty is mostly resolvable with **cheap DNA tests and free online records, not better algorithms**. The two highest-yield moves are (1) **test a parent or elder** to anchor SideView's arbitrary split to a real mother/father (and before that generation's DNA is lost), and (2) **a Y-DNA test on a male Pokorný** to settle the Czech-vs-Galician-vs-Jewish patriline that autosomal percentages can never resolve. The Collins line cracks through a free, interlocking **Irish record stack** (civil registration → National Library of Ireland Catholic parish registers → Griffith's Valuation → Tithe Applotment Books → the 1901/1911 censuses); the Pokorný line's village is usually named first in **American** documents (naturalization papers, post-1906 manifests), after which the now-digitized Czech *matriky* (Actapublica), Galician, and Baltic church books open up (Claims 7.1–7.4).\n\nThe **identity trajectory**, held as calibrated scenarios over roughly the next generation:\n\n- **A — Symbolic continuity, Irish-dominant (45–60%):** the baseline assimilation arc continues; heritage is occasional, optional, food-and-holiday-shaped, with Irish on top.\n- **B — DNA-driven documentary revival (25–40%):** cheap testing plus digitized records pull the submerged Central-European/Baltic strands back into active family knowledge.\n- **C — Instrumental heritage / EU citizenship (15–30%, conditional):** the heritage becomes practically valuable through citizenship-by-descent — the **Irish foreign-birth-register route is the strongest**, gated on how recent the Irish-born ancestor is; Polish/Lithuanian/Czech routes exist but are gated on documented qualifying ancestors.\n- **D — Roots tourism / experiential reconnection (10–20%):** the heritage is held mainly through travel to West Cork, Bohemia/Moravia, or the Baltic.\n\nThe forecast's biggest honest caveat: **the regional percentages will keep drifting with each panel update** — the 1% tails may move or vanish, and even the Baltic 9% could shift — so **anchor your family story to documented ancestors, not the soft tags** (Claim 7.5).\n\n## Where This Corpus Stops\n\nThis corpus reconstructs your background from **two surnames + a regional DNA estimate**, not from a traced pedigree. Everything connecting *your specific line* to the Ó Coileáin sept or to a Czech-vs-Galician Pokorný origin is **surname-plus-DNA inference, flagged as such throughout** — not a documented genealogy. The corpus cannot tell you which parent is which, the names and villages behind the Baltic and Ukrainian signals, your immigrants' exact ports and years, or whether the Eastern-European line was Catholic or (on the Baltic side) Lutheran. All of these are **answerable** — they are the subject of the `Future_Trajectory.md` roadmap — but they require records and a DNA test or two that this research could not perform for you.\n\n## Pointers\n\n- Irish origins and history: `01_Irish_Origins_And_History.md`\n- Central-European & Baltic origins and history: `02_EastEuro_Baltic_Origins_And_History.md`\n- Genetic and anthropological context: `03_Genetic_Anthropological_Context.md`\n- The path to America: `04_Path_To_America.md`\n- The surnames (Collins & Pokorny): `05_Surnames_Collins_And_Pokorny.md`\n- Cultural heritage and identity: `06_Cultural_Heritage_And_Identity.md`\n- Future trajectory & practical roadmap: `Future_Trajectory.md`\n- Fact-check layer: `Verification_Notes.md`\n- Annotated source list: `Sources.md`\n- Machine-readable digest: `manifest.json`"}, {"order": 1, "file": "01_Irish_Origins_And_History.md", "title": "Irish Origins and History: The Ó Coileáin (Collins) Line and Its Four-Province World", "summary": "", "body": "# Irish Origins and History: The Ó Coileáin (Collins) Line and Its Four-Province World\n\n## Bottom Line\n\nThe \"Parent 2\" Irish signature — Munster 29%, Leinster 8%, Donegal 7%, Connacht 6%, with the family surname Collins (Ó Coileáin) — points to a line whose deepest roots lie in the southwest of Ireland, in the Munster sept of Ó Coileáin, a people displaced southward into West Cork by the Anglo-Norman Geraldines (FitzGeralds) in the thirteenth century [1][2]. That broad, all-Ireland spread weighted to the southwest is exactly what one expects of a long-settled Gaelic-Catholic population that endured the same sequence of catastrophes everywhere: Tudor conquest and the Munster Plantation after the Desmond Rebellions, Cromwellian and Williamite confiscation that drove Catholic landownership from roughly 60% in 1641 to about 5% by the 1770s, the Penal Laws, and a land system of landlords, middlemen, and cottiers that left millions dependent on a single crop [3][4][5][6]. The Great Famine of 1845–1852 fell hardest on the Irish-speaking southwest and west — Cork, Kerry, and Connacht — killing roughly a million and driving a million more abroad — cutting the population from ~8.2 million in 1841 to ~6.55 million by 1851 — and it inaugurated a self-sustaining culture of emigration, late marriage, and depopulation that more than halved Ireland's population between the 1840s and 1911 [7][8][9]. The reasons a Collins family of the southwest would have crossed the Atlantic are not mysterious or singular; they are the structural reasons that emptied Gaelic-Catholic rural Ireland for a century. This document establishes *why they left*; the Atlantic crossing and American arrival are handed to a separate \"Path to America\" document.\n\n## What the Evidence Establishes\n\nBefore the full narrative, it is worth setting out plainly what the historical record supports and how firmly. The Collins surname on this line is the anglicization of Ó Coileáin, a Gaelic Munster sept that originated in north Munster — the baronies of Connello, County Limerick — and was driven south into West Cork by the FitzGerald/Geraldine expansion in the thirteenth century, a displacement that matches the Munster-weighted, West-Cork-centered DNA signature. Genealogical and clan-reference sources consistently place the sept first in north Desmond and the Connello baronies, then \"driven gradually southwards into present day West Cork\" under pressure from the FitzGeralds, settling in the early thirteenth century near kindred septs already there [1][2]; the parallel southward push of the MacCarthy Mór dynasty \"into West Cork and County Kerry\" after the Norman invasion describes the same regional dynamic [10]. The sept history itself is on firm ground; the specific link to this individual's line rests on surname plus regional DNA correlation, not a documented pedigree.\n\nThat sept emerged within a distinctive Gaelic order. Pre-Norman Ireland was organized not as a unitary state but as a hierarchy of kin-based units — the *fine* (extended family), the sept, and the clan — distributed across roughly 150 small kingdoms (*túatha*), governed by Brehon law and grouped under provincial over-kingships (Munster, Leinster, Connacht, Ulster, and the symbolic Mide). Each *túath* had a petty king owing allegiance to an over-king of several *túatha*, in turn subordinate to a provincial king (typically Eóganacht in the south or Uí Néill in the north); kinship within the clan was the essential qualification for office and property, and leaders were selected from the *derbfine*, the senior kin-group [11][12]. Munster's own political order was dominated first by the Eóganachta dynasties ruling from the Rock of Cashel — \"king of Cashel\" being synonymous with king of Munster — and then overturned by the Dál gCais of Brian Boru. Brian's brother Mathgamain seized Cashel in 964; after Brian's victory at Belach Lechta in 978 the Eóganachta ceased to be viable for the provincial kingship; Brian was acknowledged high king in 1002 and was killed at the Battle of Clontarf on Good Friday 1014 [13]. Layered over this Gaelic world came the Norse, who founded Ireland's first true towns as coastal trading bases — Waterford (c.914), Cork (c.915), Dublin (917), Wexford (c.921), and Limerick (922) — producing a Hiberno-Norse population through intermarriage; these were the ports the Anglo-Normans under Diarmait mac Murchada and Richard \"Strongbow\" de Clare seized after landing from 1169, taking Dublin and Waterford in 1170 [14].\n\nFrom the sixteenth century onward the record is one of escalating Catholic dispossession. The Desmond Rebellions (1569–1573, 1579–1583) and the death of the rebel Earl of Desmond led to the confiscation of nearly a million acres in Munster and the Munster Plantation of the 1580s — \"the first mass plantation in Ireland\" [3] — settling English \"undertakers\" on Gaelic and Geraldine land after a 1585 Dublin parliament confiscated the estates of Desmond and some 140 adherents and a 1586 proclamation invited gentlemen to undertake it, with Sir Walter Raleigh granted 42,000 acres in Cork and Waterford and the poet Edmund Spenser 12,000 acres at Kilcolman Castle near Buttevant [15]. The Cromwellian conquest and the Act for the Settlement of Ireland (1652) then drove Catholic landownership from roughly 60% before 1641 to about 8–9% under the Commonwealth, by confiscation, transplantation \"to Hell or to Connaught,\" and resettlement of soldiers and creditors — the decisive dispossession of the Gaelic Catholic landed class [4][16]. The Penal Laws, beginning in 1695 (the Education Act 1695, the Banishment Act 1697, the Popery Acts of 1704 and 1709), systematically disabled Catholics — barring office, the professions, land purchase, and leases longer than 31 years, and forcing partible \"gavelkind\" inheritance that split a Catholic's estate equally among his sons while Protestants kept primogeniture — driving Catholic landholding from about 14% at the start of the eighteenth century to roughly 5% by 1778 [5][6].\n\nOn the eve of the Famine, rural Munster and the west rested on a hierarchy of landlord, middleman, tenant farmer, and cottier or conacre laborer, in which land was subdivided into ever-smaller plots, many of the poor held land only on insecure eleven-month conacre lettings (the cottier receiving a plot in exchange for some 200 days' labor a year), and roughly three million people depended on the potato as their staple food [17][18][7]. The Great Famine (1845–1852), caused by repeated failures of the potato crop to the blight *Phytophthora infestans* and aggravated by a laissez-faire relief policy, killed an estimated one to 1.5 million people and forced one to 1.5 million more to emigrate, cutting Ireland's population from about 8.2 million in 1841 to roughly 6.55 million by 1851; it fell hardest on the Irish-speaking southwest and west, including West Cork, where the Skibbereen workhouse, built for 800, held 1,169 by early January 1847 and 1,450 by mid-March (with 266 deaths between 10 October 1846 and 7 January 1847) and where the artist James Mahony, commissioned by the *Illustrated London News* in February 1847, reported witnessing 150–180 funerals [7][8][19][20]. The Famine then inaugurated a century of depopulation: as the Yale economic historian Timothy Guinnane documents, Ireland's population fell from over 8 million to just over 4 million by 1911, with less than half attributable to the Famine itself and about a quarter of adults in their forties never marrying — a regime of late marriage, sustained marital fertility, and exceptionally high emigration [9]; by 1890 roughly 39% of Irish-born people lived abroad, and Irish-speaking fell from about four in five at the century's start to 19.2% by 1891, some 90% of remaining speakers clustered in Munster and Connacht [8]. The Land War from 1879 and the resulting Land Acts — Michael Davitt's 1879 Land League and its \"three Fs,\" Gladstone's 1881 Act, and especially the 1903 Wyndham Act, under which about 11 million acres and 320,000 holdings (roughly 60% of holdings) were transferred from landlords to tenants [21] — gradually undid the old land order, but came after the decisive decades of post-Famine emigration that had already set the pattern of departure (the judgment that reform \"came too late\" for this specific family being inference, dependent on the as-yet-undetermined emigration date) [9].\n\n---\n\n## Gaelic Ireland: The World of the Sept and the Túath\n\nFor most of the first Christian millennium, Ireland had no towns, no coinage in general use, and no central state. It had instead a dense lattice of small kingdoms and an elaborate kin-based social order that would shape the identity of families like the Ó Coileáin for a thousand years.\n\nThe fundamental units were nested. At the base sat the *fine*, the agnatic extended family reckoned through the male line. A grouping of *fini* formed a sept; a grouping of septs formed a *clann* (\"children,\" i.e., descendants of a common ancestor) [11]. Above these social units lay the *túath* — a small kingdom, of which there may have been around 150 across the island at any time. Each *túath* had its own petty king (*rí túaithe*) who owed allegiance to a more powerful over-king ruling several *túatha*, who in turn was subordinate to a provincial king — in the south usually of the Eóganachta, in the north of the Uí Néill [11].\n\nKinship was not sentiment; it was the constitution. As reference works on the Brehon system put it, kinship with the clan was \"an essential qualification for holding any office or property,\" and \"the rules of kinship largely determined status with its correlative rights and obligations\" [12]. Land was held in significant part collectively by the kin-group, and a chief's successor was not simply his eldest son but a man chosen from the *derbfine* — the descendants of a common great-grandfather — by his kinsmen, who held the chief as \"custodian\" of the clan and its property [11]. This elective, kin-bounded succession (tanistry) is one of the deepest structural differences between Gaelic Ireland and the primogeniture-based feudalism of England and Norman Europe, and it is why the later English state regarded Gaelic custom as something to be abolished.\n\nGoverning all of this was Brehon law (from *breitheamh*, a judge), a sophisticated body of customary law preserved and administered by a learned hereditary class. Brehon law was compensatory rather than punitive in much of its operation — built around honor-price, restitution, and the fine — and it \"clearly defined the clan system in pre-Norman Ireland,\" including the electoral mechanism of the *derbfine* [11][12]. Alongside the jurists stood the other learned orders — the *filid* (poets), genealogists, and historians — whose preservation of pedigree was itself a political act, since legitimacy ran through descent.\n\nThe four provinces of the DNA estimate — Munster, Leinster, Connacht, and (through Donegal) Ulster — are themselves a Gaelic inheritance. The Irish word for a province, *cúige*, means \"a fifth,\" preserving the memory of an older fivefold division (the four provinces plus the central royal region of Mide/Meath). These were never tidy administrative units; they were shifting zones of over-kingship. But they were real enough that a family's province carried meaning, and the spread of this person's Irish DNA across all four is the ordinary signature of a long-resident island population rather than evidence of four distinct origins.\n\n## Munster and the Ó Coileáin: From North Munster to West Cork\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 560\" role=\"img\" aria-label=\"A stylised sea-chart of the Munster province of southwest Ireland, ruled like a steamship-manifest ledger, tracing the thirteenth-century southward displacement of the Ó Coileáin sept. In the north, County Limerick and the Connello baronies are marked in green as the origin. A bold green migration arrow sweeps south under crimson Geraldine FitzGerald pressure into West Cork, where the towns of Clonakilty, Rosscarbery, Sam&#8217;s Cross and Woodfield are marked near the destination, beside the indigenous Ó Cuiléin sept of the Corca Laoidhe. A crimson Famine marker sits at Skibbereen, whose workhouse, built for 800, held 1,169 by January 1847 and 1,450 by mid-March. A panel notes Munster as 29 percent of the DNA estimate and Michael Collins, born 1890 at Woodfield, as the canonical bearer.\">\n<d s=\"t-serif\" style=\"fill:var(--t1)\" transform=\"rotate(78 262 300)\">driven gradually southward<\/text>\n<g>\n<circle cx=\"356\" cy=\"392\" r=\"5\" class=\"f-t1\"/>\n<text x=\"356\" y=\"378\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\" class=\"t-serif\" style=\"fill:var(--t1)\">West Cork<\/text>\n<text x=\"356\" y=\"404\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">settled early 13th c. by the displaced Ó Coileáin<\/text>\n<\/g>\n<g class=\"ln-soft\" stroke-width=\".75\">\n<line x1=\"402\" y1=\"384\" x2=\"452\" y2=\"372\"/>\n<line x1=\"368\" y1=\"418\" x2=\"404\" y2=\"438\"/>\n<line x1=\"324\" y1=\"416\" x2=\"288\" y2=\"434\"/>\n<\/g>\n<circle cx=\"455\" cy=\"370\" r=\"2.6\" class=\"f-t2\"/>\n<text x=\"460\" y=\"368\" font-size=\"8.5\" class=\"t-serif\">O&#8217;Donovans<\/text>\n<text x=\"460\" y=\"379\" font-size=\"7.5\" font-style=\"italic\" class=\"t-muted\">kindred sept already present<\/text>\n<circle cx=\"284\" cy=\"436\" r=\"2.6\" class=\"f-t5\"/>\n<text x=\"280\" y=\"434\" text-anchor=\"end\" font-size=\"8.5\" class=\"t-serif\">indigenous Ó Cuiléin<\/text>\n<text x=\"280\" y=\"445\" text-anchor=\"end\" font-size=\"7.5\" font-style=\"italic\" class=\"t-muted\">of the Corca Laoidhe &#183; a 2nd, distinct Collins line<\/text>\n<g>\n<rect x=\"404\" y=\"430\" width=\"9\" height=\"9\" class=\"f-t2\"/>\n<rect x=\"404\" y=\"430\" width=\"9\" height=\"9\" fill=\"none\" class=\"s-t2\" stroke-width=\"1\"/>\n<text x=\"420\" y=\"433\" font-size=\"9.5\" font-weight=\"bold\" class=\"t-serif\" style=\"fill:var(--t2)\">Skibbereen<\/text>\n<text x=\"420\" y=\"444\" font-size=\"7.5\" class=\"t-muted\">Famine epicentre, 1846&#8211;47<\/text>\n<\/g>\n<circle cx=\"334\" cy=\"416\" r=\"2.4\" style=\"fill:var(--text)\"/>\n<text x=\"341\" y=\"418\" font-size=\"8\" class=\"t-serif\">Clonakilty<\/text>\n<circle cx=\"312\" cy=\"424\" r=\"2.4\" style=\"fill:var(--text)\"/>\n<text x=\"318\" y=\"429\" font-size=\"8\" class=\"t-serif\">Rosscarbery<\/text>\n<line x1=\"320\" y1=\"80\" x2=\"320\" y2=\"80\" class=\"ln-soft\"/>\n<line x1=\"40\" y1=\"486\" x2=\"660\" y2=\"486\" class=\"ln\" stroke-width=\"1\"/>\n<g>\n<rect x=\"44\" y=\"494\" width=\"194\" height=\"40\" fill=\"none\" class=\"s-t4\" stroke-width=\"1.2\"/>\n<rect x=\"48\" y=\"498\" width=\"186\" height=\"32\" fill=\"none\" class=\"ln-soft\" stroke-width=\".6\"/>\n<text x=\"56\" y=\"510\" font-size=\"9\" font-weight=\"bold\" class=\"t-serif\" style=\"fill:var(--t4)\">MUNSTER = 29%<\/text>\n<text x=\"56\" y=\"522\" font-size=\"8\" class=\"t-muted\">heaviest single share of the<\/text>\n<text x=\"56\" y=\"531\" font-size=\"8\" class=\"t-muted\">Irish DNA estimate &#183; southwest-leaning<\/text>\n<\/g>\n<g>\n<rect x=\"250\" y=\"494\" width=\"200\" height=\"40\" fill=\"none\" class=\"s-t2\" stroke-width=\"1.2\"/>\n<rect x=\"254\" y=\"498\" width=\"192\" height=\"32\" fill=\"none\" class=\"ln-soft\" stroke-width=\".6\"/>\n<text x=\"262\" y=\"510\" font-size=\"9\" font-weight=\"bold\" class=\"t-serif\" style=\"fill:var(--t2)\">SKIBBEREEN WORKHOUSE<\/text>\n<text x=\"262\" y=\"522\" font-size=\"8\" class=\"t-muted\">built for 800 &#183; 1,169 by Jan 1847 &#183; 1,450 by mid-Mar<\/text>\n<text x=\"262\" y=\"531\" font-size=\"8\" class=\"t-muted\">266 deaths, 10 Oct 1846 &#8211; 7 Jan 1847<\/text>\n<\/g>\n<g>\n<rect x=\"462\" y=\"494\" width=\"194\" height=\"40\" fill=\"none\" class=\"s-t1\" stroke-width=\"1.2\"/>\n<rect x=\"466\" y=\"498\" width=\"186\" height=\"32\" fill=\"none\" class=\"ln-soft\" stroke-width=\".6\"/>\n<text x=\"470\" y=\"510\" font-size=\"9\" font-weight=\"bold\" class=\"t-serif\" style=\"fill:var(--t1)\">MICHAEL COLLINS, b. 1890<\/text>\n<text x=\"470\" y=\"522\" font-size=\"8\" class=\"t-muted\">Woodfield, Sam&#8217;s Cross &#183; nr Clonakilty /<\/text>\n<text x=\"470\" y=\"531\" font-size=\"8\" class=\"t-muted\">Rosscarbery &#183; the canonical bearer of the line<\/text>\n<\/g>\n<\/svg>\n<figcaption><strong>Fig. 2.<\/strong> The surname carries its own map: a thirteenth-century eviction northward in Limerick is why the Irish DNA reads Munster-weighted and southwest-leaning &#8212; the Ó Coileáin were pushed by Geraldine steel into the very West Cork parishes that the Famine would later gut and that would, six centuries on, give the line its most famous son.<\/figcaption>\n<\/figure>\n\n\nMunster — *Cúige Mumhan*, the southwestern province and the heaviest single component of the estimate at 29% — was in the early medieval period the realm of the Eóganachta, a federation of dynasties claiming descent from the legendary Eógan Mór and ruling from the Rock of Cashel. \"King of Cashel\" simply meant king of Munster [13]. The Eóganacht ascendancy was broken in the late tenth century by an upstart dynasty from the lower Shannon, the Dál gCais. Mathgamain mac Cennétig seized Cashel in 964; his younger brother, Brian Bóruma (Brian Boru), defeated and killed the Eóganacht king Máel Muad at Belach Lechta in 978, ending the Eóganachta as a serious claimant to the provincial kingship [13]. Brian went on to break the long Uí Néill monopoly on the high kingship, was acknowledged high king around 1002, and died victorious but slain at the Battle of Clontarf on Good Friday, 1014, fighting a coalition of the Norse of Dublin and the king of Leinster [13]. Munster, in short, was the province that produced the most famous of all Gaelic high kings — and the memory of Cashel and Brian Boru is part of the deep cultural furniture of any Munster family.\n\nInto this world the Ó Coileáin sept emerges in the historical record in the north of Munster. The name derives from Gaelic *coileán* — a young hound or whelp, by extension a young warrior — and the sept's early territory lay in the baronies of Connello (Conallaigh) in County Limerick, in the part of Munster sometimes called north Desmond [1][2]. Their displacement is the hinge of this family's geography. With the Anglo-Norman invasion (below), the FitzGeralds — the \"Geraldines,\" who became the dominant Norman magnate house of Munster as Earls of Desmond — expanded aggressively across the southwest. Genealogical sources record that, faced with Geraldine military power, \"the Collins sept that had lived there from time immemorial was driven gradually southwards into present day West Cork,\" settling in the early thirteenth century near kindred septs already established there [1][2]. This is the same southward pressure that drove the great Gaelic dynasty of the region, the MacCarthy Mór, \"westward into West Cork and County Kerry\" after the Norman invasion [10]. The result is that by the later Middle Ages the Ó Coileáin / Collins name is firmly a West Cork name — which is exactly where a Munster-weighted, southwest-leaning DNA signature would point.\n\nCounty Cork itself is the largest county in Ireland and its southernmost, a vast and varied territory of long east–west ridges, broad eastern valleys, and, in the west, narrow valleys and coastal lowlands \"backed by high mountains\" [22][23]. It was the heart of the Kingdom of Desmond (*Deas Mumhan*, South Munster), ruled by the MacCarthy Mór and a constellation of princely septs — O'Sullivan, O'Donovan, O'Mahony, O'Driscoll, O'Leary, O'Crowley and others — among whom the Ó Coileáin of West Cork took their place [22]. Cork's later reputation as the \"Rebel County,\" though most strongly attached to its role in the twentieth-century War of Independence, has older roots and captures something real about the region's long resistance to outside authority [22][23]. For a Collins family, then, \"Munster\" and \"Cork\" are not abstractions: they are a homeland with a thousand-year political memory and a specific story of displacement built into the surname.\n\n## Layered Settlement: Norse Ports and the Anglo-Norman Conquest\n\nTwo waves of outside settlement reshaped the Gaelic order before the Tudors finished it.\n\nThe first was Norse. From the late eighth century Viking raids gave way, in the early tenth, to permanent fortified trading settlements — the *longphort* maturing into the town. Between 914 and 922 the Norse founded the first true towns in Ireland, and they remain Ireland's principal southern and eastern cities: Waterford (c.914), Cork (c.915), Dublin (917), Wexford (c.921), and Limerick (922) [14]. Over generations of coexistence and intermarriage a mixed Norse-Gaelic population — the Hiberno-Norse or Norse-Gaels — emerged, and these port towns developed their own rulers and a commercial, maritime, coin-using culture quite distinct from the rural Gaelic interior [14]. Cork and Limerick, the two great Munster ports, are part of this story; the urban, trading edge of Munster begins with the Norse.\n\nThe second wave was Anglo-Norman. In 1166 the deposed king of Leinster, Diarmait mac Murchada (Dermot MacMurrough), sought help from the Anglo-Norman lords of Wales and the marches. In May 1169 Norman mercenaries landed; in 1170 Richard de Clare, \"Strongbow,\" followed, married Diarmait's daughter Aoife, and seized the Norse-Irish towns of Dublin and Waterford [14]. King Henry II of England then came in person in 1171 to assert lordship over both the Normans and the Irish. The invasion did not conquer the whole island, but it planted a powerful Norman aristocracy whose Munster apex was the FitzGeralds/Geraldines, Earls of Desmond. As noted above, it was Geraldine expansion that pushed the Ó Coileáin south into West Cork [1][2]. Over the following centuries many of these Norman families became \"more Irish than the Irish themselves,\" adopting the Irish language, intermarrying, and patronizing Gaelic poets — a Hiberno-Norman fusion that the Tudor state would later set out to destroy.\n\n## The Tudor Conquest, the Desmond Rebellions, and the Munster Plantation\n\nThe sixteenth century brought the English crown's decisive turn from loose overlordship to systematic conquest, and Munster was its first great laboratory. The trigger in the south was the resistance of the Geraldine Earls of Desmond to English centralization and religious change. The Desmond Rebellions — a first phase in 1569–1573 and a more serious second phase in 1579–1583 — were driven, in the contemporary and modern reading, by the threatened destruction of Desmond's traditional military power, fear of land confiscation, and the defense of Catholicism against the Reformation [3]. The crown crushed them with extraordinary brutality, including a deliberate famine in the Munster countryside.\n\nThe aftermath was the Munster Plantation, \"the first mass plantation in Ireland\" [3]. With the last rebel earl dead, his estates and those of some 140 adherents — \"nearly a million acres, all in Munster\" — were confiscated by a Dublin parliament in 1585 [15]. In 1586 the crown proclaimed the lands open to English \"undertakers,\" offered at two or three pence an acre with no rent for the first five years; an undertaker of 12,000 acres was to settle eighty-six English families and \"no Irish\" [15]. Among the grantees were figures now famous in English letters and exploration: Sir Walter Raleigh received 42,000 acres in Cork and Waterford and lived at Youghal, and the poet Edmund Spenser received 12,000 acres in Cork, settling at Kilcolman Castle near Buttevant, where he wrote much of *The Faerie Queene* and his prose tract *A View of the Present State of Ireland* [15]. In the wake of the rising, Gaelic custom itself was again targeted: Brehon law, Irish dress, bardic poetry, and private armies — \"all of which were deeply valued in traditional Irish society\" — were outlawed and suppressed [24]. For the Ó Coileáin and their neighbors in West Cork, the Munster Plantation was the first systematic attempt to displace the Gaelic order with a settler one, and although the southwest's mountainous fastnesses left it less thoroughly planted than the lowlands, the direction of travel — Gaelic Catholic dispossession — was set.\n\n## Cromwell, the Williamite Settlement, and the Penal Laws\n\nThe seventeenth century completed the dispossession the Tudors had begun, and turned it into a near-total exclusion of Catholics from land and power.\n\nAfter the Irish Rebellion of 1641 and a decade of war, Oliver Cromwell's conquest (1649–1653) and the Act for the Settlement of Ireland (1652) confiscated land on a scale that dwarfed the Munster Plantation. The Act barred Catholics from most public office and seized vast tracts for Protestant settlers and for the soldiers and \"adventurers\" who had financed the war [4]. The cumulative effect across the century was staggering: Catholic ownership of Irish land fell from roughly 60% before 1641 to about 8–9% under the Commonwealth [16]. The policy of transplantation — driving Catholic landowners west of the River Shannon into Connacht and Clare — is preserved in the bitter slogan that the Catholic Irish must go \"to Hell or to Connaught\" [4][16]. The Cromwellian settlement, as historians of the Down Survey note, destroyed the native Catholic landowning class and replaced it with proprietors of a British, Protestant identity [16].\n\nWhat the Williamite War (1689–1691) and its aftermath did not already foreclose, the Penal Laws ground down. Beginning in 1695, a long series of statutes — the Education Act 1695, the Banishment Act 1697, the Popery Acts of 1704 and 1709 — disabled Catholics comprehensively: barred from political office, from the legal profession, from bearing arms, from running schools, and crucially from buying land or taking leases longer than 31 years [5][6]. The 1704 \"Gavelkind\" Act struck directly at Catholic landholding across generations by forcing a deceased Catholic's estate to be divided equally among all his sons (while Protestants kept primogeniture), guaranteeing the fragmentation of any surviving Catholic estate — unless the heir conformed to the established church [6]. The cumulative result is one of the most-cited figures in Irish history: Catholic landownership, already down to ~14% at the start of the eighteenth century, fell to roughly 5% by 1778 [5]. For a Catholic Gaelic family such as the Ó Coileáin, the eighteenth century was thus a world in which their religion was legally disfavored, their language was barred from the courts, and the land their ancestors had held was almost entirely in Protestant landlord hands. They survived, in the main, as tenants on the land their forebears had once ruled.\n\n## The Other Three Provinces: Leinster, Donegal/Ulster, Connacht\n\nBecause the DNA spans all four provinces, each deserves its own brief frame.\n\n**Leinster (8%)** — *Cúige Laighean*, the eastern province around Dublin — was the gateway of every conquest. It was the kingdom of Diarmait mac Murchada, whose appeal opened the door to the Normans in 1169; it contained the Norse city of Dublin and the \"Pale,\" the zone of densest English control in the late medieval period [14]. It saw the mass Cromwellian confiscations alongside Munster [4]. Of the four, Leinster was the most anglicized and the earliest to lose the Irish language, and a modest Leinster fraction in a Munster-led profile is consistent with movement along the populous south-eastern corridor.\n\n**Donegal / Ulster (7%)** — *Tír Chonaill*, the homeland of the O'Donnell (Ó Domhnaill) lords, in the northwest of Ulster — has a sharply different seventeenth-century history. Ulster was the most Gaelic and least anglicized province until the Nine Years' War (1594–1603) broke the power of its great lords, Hugh O'Neill of Tyrone and the O'Donnells of Tyrconnell (Donegal). On 14 September 1607 the earls sailed from Rathmullan in Donegal into permanent exile on the Continent — the \"Flight of the Earls,\" taking some ninety-nine of their kin and followers and symbolizing \"the end of Gaelic Ireland\" in the north [25]. Their departure opened the way for the Plantation of Ulster (1609), the most thorough of all the plantations, in which six counties — including Donegal — were confiscated and settled with English and, especially, Scottish Protestants [25]. Donegal, however, retained large Gaelic-speaking Catholic districts (it remains a major Gaeltacht today), and a Donegal component in this profile most likely reflects this enduring native Catholic population rather than the settler stratum.\n\n**Connacht (6%)** — *Cúige Chonnacht*, the western province (Galway, Mayo, Sligo, Leitrim, Roscommon) — was the realm of the O'Connor (Ó Conchobhair) kings; Rory O'Connor was the last high king before the Normans reduced him to vassalage, and in 1227 Henry III granted Connacht to the Norman de Burgh (Burke) family [26]. Connacht's most fateful role came under Cromwell, as the designated reservation for transplanted Catholics — the \"Connaught\" of the slogan [16]. By the nineteenth century the western seaboard had become \"a geographical expression synonymous with poverty and destitution,\" repeatedly struck by localized famines from 1816–17 onward, and the poorest part of Ireland [26]. Connacht and the West Cork/Kerry fringe of Munster were also the heartland of surviving Irish — the Gaeltacht — where, after 1891, about 90% of the country's remaining Irish-speakers were concentrated [8][26]. A Connacht fraction in a Munster-led, Irish-speaking-southwest profile fits a long-resident Gaelic-Catholic population.\n\nThe pattern across all four provinces is the same arc — Gaelic order, conquest, plantation, Catholic dispossession, poverty — simply timed and weighted differently. That is why the DNA reads as broadly Irish, southwest-heavy, rather than as four separate stories.\n\n## The Land System and the Dependence on the Potato\n\nBy the early nineteenth century, rural Ireland — and especially the Catholic southwest and west — rested on a land system almost designed to produce catastrophe.\n\nAt the top sat the landlord, very often Protestant and frequently absentee, owner of estates created by the seventeenth-century confiscations. Beneath him, the common practice was to let land to a *middleman* on a long lease at a fixed rent; the middleman then sublet to tenant farmers and pocketed the difference [17][18]. The tenant farmer in turn might sublet to the class at the bottom: the cottiers. The cottier (from \"cottage\") was a near-landless laborer who received a small plot — often on an eleven-month basis precisely so as to deny him legal tenant rights — in exchange for his labor, commonly around 200 days a year [17][18]. Closely related was *conacre*: the letting of a manured patch for a single season, usually on an eleven-month term \"considered to be of sufficient length to sow and harvest a crop but without creating a formal relationship between landlord and tenant,\" and conferring no legal right to the land [18]. Because middlemen and tenants alike could raise income by splitting holdings, land was *subdivided* into ever-smaller parcels through the early nineteenth century — exactly the wrong response to a growing population [17].\n\nWhat made this system viable, and then lethal, was the potato. A single acre of potato ground could feed a family where the same acre of grain could not, and the crop demanded little but a spade. By the 1840s roughly three million Irish people depended on the potato as their primary food [7]. The intensification of conacre and rack-renting created, in one modern formulation, \"a fragile agroecology... extremely vulnerable to the famine that followed\" [17]. A population near the limit of subsistence, holding tiny insecure plots, eating one crop — that was the structure on which the blight fell.\n\n## The Great Famine, 1845–1852\n\nThe proximate cause was a plant disease. *Phytophthora infestans*, the potato blight (probably arriving from the Americas around 1844), destroyed the crop catastrophically in 1845 and 1846 and recurred in following years [7]. The deeper causes were the land and policy structures just described, and the response of a British government that held, as the search record summarizes, that \"free markets should solve the crisis, and that direct food aid would interfere with private enterprise\" [7]. Relief was inadequate, often tied to public-works labor or harsh workhouses, and Ireland continued to export food even as its people starved — a fact central to the bitter memory of the Famine.\n\nThe demographic blow was immense. The Famine killed an estimated one to 1.5 million people and forced another one to 1.5 million to emigrate; Ireland's population fell from roughly 8.2 million in 1841 to about 6.55 million by 1851, a loss of around a fifth in a single decade [7]. Crucially for this family, \"the most severely affected areas were in the western and southern parts of Ireland — where the Irish language was dominant\" [7]. That is the Munster-and-Connacht southwest: Cork, Kerry, and the western seaboard.\n\nWest Cork — the Ó Coileáin homeland — became one of the world's most infamous Famine landscapes. The town of Skibbereen, in particular, stood for the whole catastrophe. Its workhouse, built for 800, held 1,169 inmates by the first week of January 1847 and 1,450 by mid-March; 266 people died there between 10 October 1846 and 7 January 1847, and at one point 140 died in a single month, eight in a single day [19]. In February 1847 the *Illustrated London News* commissioned the Cork artist James Mahony to travel to Skibbereen, Schull, and Ballydehob; his harrowing sketches and reports — he wrote of witnessing 150 to 180 funerals around Skibbereen — became some of the defining images of the Famine for the wider world [20]. Whatever the precise fate of any individual Collins family, this is the region and the catastrophe in which a mid-nineteenth-century West Cork Catholic family lived — and it is, more than any other single event, the reason such families began to leave.\n\n## Post-Famine Ireland: Depopulation, Emigration, and the Land War\n\nThe Famine did not merely cause a one-time loss; it reset Irish demography for a century. As the Yale economic historian Timothy Guinnane has argued, Ireland's population fell from over 8 million to just over 4 million by 1911 — and strikingly, \"less than half of the total depopulation can be attributed to the Famine itself\" [9]. The rest was the work of a new and self-reinforcing social regime: very high emigration, very late marriage, and high lifelong celibacy. By 1911 about a quarter of Irish adults in their forties had never married, and where English and German families were shrinking through declining fertility, the Irish kept emigration as the principal demographic safety valve [9].\n\nThe mechanism was rooted in the land. To avoid the fatal subdivision that had preceded the Famine, post-Famine farm families increasingly practiced *impartible inheritance*: one son inherited the holding intact, married, and stayed, while his siblings either remained unmarried on the farm or left the country [9]. Emigration thus became not an emergency but an expected stage of life for most rural children — the structural reason families \"kept leaving\" for generations. By 1890, roughly 39% of all people born in Ireland were living abroad [8].\n\nThis was also the era of the Irish language's collapse as a community vernacular. At the start of the nineteenth century perhaps four in five people in Ireland spoke Irish; the Famine killed and scattered the Irish-speaking poor disproportionately; and the survivors increasingly raised their children in English to give them prospects in an emigrant, English-speaking world. By 1891 only 19.2% of the population could speak Irish, and about 90% of those were clustered in the western and southern Gaeltacht districts of Munster and Connacht [8]. For a West Cork family, this means the generation that emigrated in the later nineteenth century was very likely the hinge generation between Irish and English — quite possibly raised by Irish-speaking or bilingual parents while themselves moving into English.\n\nPolitics eventually caught up with the land question, but largely after the great wave of departures. The Land War, launched by Michael Davitt's Land League in 1879 amid renewed agricultural distress, demanded the \"three Fs\" — fixity of tenure, fair rents, free sale [21]. Gladstone's 1881 Land Act conceded much of this, and a sequence of land-purchase acts culminating in the Wyndham Act of 1903 financed tenants to buy out their landlords, ultimately transferring about 11 million acres and 320,000 holdings — roughly 60% of all holdings — into the hands of the former tenants [21]. The peasant proprietor replaced the landlord. But this transformation came a half-century after the Famine and decades into mass emigration; for families who had already gone, or who left in the 1880s–1900s, the reform came too late to keep them, even if it stabilized those who stayed. (The judgment that it came \"too late for this family\" is inference, dependent on the as-yet-undetermined emigration date.)\n\n## How These Conditions Produced Emigration (Handoff)\n\nPulling the threads together, the *push* factors that would have moved a Catholic Collins family of southwest Ireland toward the Atlantic are structural and cumulative, not idiosyncratic. They were a Gaelic-Catholic people dispossessed of land over the sixteenth and seventeenth centuries and legally disabled under the Penal Laws, surviving as tenants on land their ancestors once held [3][4][5][6]; they lived within a land system of subdivision, insecure conacre, and near-total dependence on the potato that left the rural poor of the southwest at the edge of subsistence [17][18][7]; and onto that fragile world fell the Great Famine, which struck hardest precisely on the Irish-speaking southwest and west — including West Cork — killing and scattering its people and breaking the old demographic order [7][19][20]. What followed hardened departure into a habit: a post-Famine regime of impartible inheritance and chain emigration that made leaving the *normal* expectation for most rural children, sustained across generations [9][8], reinforced by an economic and linguistic shift — toward English, toward the cash economy, toward an Atlantic world where kin had already gone — that made America less a leap into the unknown than a continuation of an established family pathway [8][9]. *Why* such a family left is therefore well established by the historical record. *How* they left, when, by what route, through which ports, and into what American communities — the Atlantic crossing and the American arrival — is the subject of the separate \"Path to America\" document, to which this analysis hands off.\n\n---\n\n## Open Questions\n\n1. **Documented pedigree vs. regional inference.** The link between this individual's line and the Ó Coileáin sept rests on surname + Munster-weighted DNA, not a traced pedigree. Can parish records (Catholic baptismal/marriage registers, many of which survive for Cork from the early-to-mid nineteenth century), Griffith's Valuation (1847–1864), or Tithe Applotment Books (1820s–1830s) place a specific Collins family in a named West Cork parish or townland?\n\n2. **Exact place of origin within Cork/Munster.** West Cork is large. Which barony or parish (e.g., the Carbery baronies, around Skibbereen, Clonakilty, Bandon, Bantry) did this line come from? This determines how directly the Famine epicenter narrative applies.\n\n3. **Religion and the secondary provinces.** Is the Leinster/Donegal/Connacht admixture best explained simply as deep Irish background-noise, or do any of those fractions reflect a discrete, identifiable ancestral line (e.g., a Connacht or Donegal Gaeltacht family that married into the Cork Collins line)?\n\n4. **Emigration date and its relation to the Land Acts.** Did this family leave during/just after the Famine (1845–1855), in the steady post-Famine outflow (1860s–1880s), or in the later wave (1890s–1900s)? The answer determines whether the Land War/Wyndham reforms were even on the horizon when they left.\n\n5. **Language transition.** Was the emigrating generation Irish-speaking, bilingual, or English-speaking? Cork was a partly Irish-speaking county into the later nineteenth century; pinning this would sharpen the cultural portrait.\n\n6. **Confidence on mortality figures.** The \"1–1.5 million dead / 1–1.5 million emigrated\" range is standard but contested at the margins among historians (excess-mortality estimates vary by methodology). A Round 2 pass against Cormac Ó Gráda's and Joel Mokyr's quantitative work would tighten the numbers.\n\n---\n\n## Sources\n\n1. CLAN.com, \"Ó Coileáin Family | Tartans, Gifts & History,\" clan.com, n.d., https://clan.com/family/%C3%93-coile%C3%A1in (accessed 2026-05-30). **Tier 4** (commercial clan/genealogy reference; useful for sept tradition but not scholarly — corroborate where possible). Used for the etymology and the north-Munster origin / southward displacement of the Ó Coileáin.\n\n2. Irish America, \"The Collins Clan,\" irishamerica.com, May 2013, https://www.irishamerica.com/2013/05/the-collins-clan/ (accessed 2026-05-30). **Tier 4** (heritage magazine). Corroborates the thirteenth-century southward push of the Ó Coileáin into West Cork after conflict with the Geraldines. *single-source* for the precise \"after losing a war with the Geraldines in the 13th century\" framing, beyond the clan-reference site.\n\n3. Encyclopedia.com (citing scholarly reference works), \"Desmond Rebellions,\" encyclopedia.com, n.d., https://www.encyclopedia.com/international/encyclopedias-almanacs-transcripts-and-maps/desmond-rebellions (accessed 2026-05-30). **Tier 2** (encyclopedic compilation of scholarly sources). Used for the causes of the Desmond Rebellions and the Munster Plantation as the \"first mass plantation.\"\n\n4. \"Plantations of Ireland / Cromwellian Plantation,\" and \"Act for the Settlement of Ireland 1652\" — summarized via web search of standard reference works, n.d.
