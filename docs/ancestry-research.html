ed.**\n5. Southard, Diahan / Your DNA Guide, \"AncestryDNA SideView | Ancestral Regions by Parent\" (SideView reconstructs parental chromosomes from shared-match DNA without testing parents; Ancestry science team: works for ~90% of customers >95% of the time; fails for ~10% with significant endogamy; reduces cross-parent confusion; user must determine which parent is which). https://www.yourdnaguide.com/ydgblog/ancestrydna-sideview (accessed 2026-05-30). **Tier 5 (expert genetic-genealogy educator), lean: solid; vendor accuracy figure relayed — flagged in Claim 3.4.**\n6. Cassidy, L.M., Martiniano, R., Murphy, E.M., Teasdale, M.D., Mallory, J., Hartwell, B., Bradley, D.G. (2016). \"Neolithic and Bronze Age migration to Ireland and establishment of the insular Atlantic genome.\" *PNAS* 113(2):368–373. (Ballynahatty Neolithic woman 3343–3020 cal BC, predominantly Near-Eastern/Anatolian with ~42% HG; three Rathlin Bronze-Age males 2026–1534 cal BC; ~32% Yamnaya/Steppe ancestry; R1b; C282Y hemochromatosis; ~4,000-year continuity to modern Irish/Scottish/Welsh.) https://www.pnas.org/doi/10.1073/pnas.1518445113 ; full text https://pmc.ncbi.nlm.nih.gov/articles/PMC4720318/ (accessed 2026-05-30). **Tier 2 (peer-reviewed, PNAS), lean: strong — primary for Irish deep ancestry.**\n7. Gilbert, E., et al. (2017). \"The Irish DNA Atlas: Revealing Fine-Scale Population Structure and History within Ireland.\" *Scientific Reports* 7:17199. (10 clusters — 7 Gaelic [incl. N Munster, S Munster, Connacht, Ulster, Leinster, Dublin, C Ireland], 3 Irish-British; N/S Munster track Dál Cais & Eóganacht; County Clare = Munster/Connacht admixture; strongest internal barrier at Ulster; Norse-Viking gene flow ~788–1052 CE; Ulster Plantation admixture 17th–18th c.) https://www.nature.com/articles/s41598-017-17124-4 ; full text https://pmc.ncbi.nlm.nih.gov/articles/PMC5722868/ (accessed 2026-05-30). **Tier 2 (peer-reviewed), lean: strong — primary for fine-scale Irish structure.**\n8. Byrne, R.P., the Moravian turnover.**\n11. Kushniarevich, A., et al. (2015). \"Genetic Heritage of the Balto-Slavic Speaking Populations: A Synthesis of Autosomal, Mitochondrial and Y-Chromosomal Data.\" *PLOS ONE* 10(9):e0135820. (6,876 mtDNA / 6,079 Y / 296 autosomal; \"Baltic populations are genetically the closest to East Slavs\"; high shared IBD; genetic diversity correlates with geography 0.80–0.95 > language.) https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0135820 (accessed 2026-05-30). **Tier 2 (peer-reviewed synthesis), lean: strong — primary for the Balto-Slavic cluster. Single large synthesis — flagged in Claim 3.9, corroborated by S9/S10.**\n12. Saag, L., et al., \"Extensive Farming in Estonia Started through a Sex-Biased Migration from the Steppe\" (*Current Biology*, 2017), and Baltic Sea region prehistory work (Mittnik et al.): steppe/Corded Ware ancestry arriving in the eastern Baltic via sex-biased male migration (R1a-Z645), high local hunter-gatherer retention and comparatively low Anatolian-farmer ancestry. Accessed via Cell/Current Biology listing and Estonian Biocentre-associated reporting. https://www.cell.com/current-biology/comments/S0960-9822(17)30724-8 ; context https://www.nature.com/articles/s41467-018-02825-9 (Nature access restricted; abstract/coverage used) (accessed 2026-05-30). **Tier 2 (peer-reviewed), lean: solid for the eastern-Baltic deep-history characterization; primary PDFs not fully read — flagged.**\n13. AncestryDNA / \"What is the Germanic Europe DNA Ethnicity on Ancestry?\" and Ancestry blog on German ancestry (Germanic Europe region historically spans the Netherlands, Poland, Belgium, Switzerland, Austria, the *Western Czech Republic*, Denmark, Slovakia, Hungary, Slovenia, France; cross-border DNA sharing normal). https://www.ancestry.com/c/ancestry-blog/what-ancestry-dna-can-tell-you-about-your-german-ancestors ; https://whoareyoumadeof.com/blog/what-is-the-germanic-europe-dna-ethnicity-on-ancestry/ (accessed 2026-05-30). **Tier 1 (vendor) + Tier 5 (expert blog), lean: solid for region coverage; corroborated by S1's region list.**\n14. AncestryDNA, \"Why ethnicity estimates change\" / 2024–25 update materials (DNA unchanged; reference panel expanded; 146 world populations; broad \"Central & Eastern European\" + \"Baltics\" split into Estonia & Latvia, Lithuania, Northeastern Poland, North Central Europe, Southern Poland, Slovakia, Western Ukraine, Eastern Czechia; Germanic Europe split). https://www.ancestry.com/corporate/blog/ancestrydna-update-transforms-results-with-new-regions-and-macro ; https://www.ancestry.com/c/dna/ancestry-dna-ethnicity-estimate-update (accessed 2026-05-30). **Tier 1 (vendor), lean: strong; corroborated by S1.**\n15. AncestryDNA, \"What types of regions are in my ethnicity estimate?\" — Ancestral Regions (deep ancestry, \"hundreds to thousands of years ago,\" reference-panel based) vs. Ancestral Journeys / Genetic Communities (recent ancestry, \"within the past 300 years,\" IBD/network based). https://www.ancestry.com/cs/dna-help/communities/ethnicity-v-community (accessed 2026-05-30). **Tier 1 (vendor), lean: strong for the regions-vs-communities distinction.**\n16. AncestryDNA, *Genetic Communities White Paper* (\"Predicting fine-scale ancestral origins from the genetic sharing patterns among millions of individuals\"; IBD network/graph clustering; recent-ancestry communities). https://www.ancestry.com/cs/dna-help/communities/whitepaper ; PDF mirror https://www.ancestrycdn.com/support/us/2024/02/communitieswhitepaper2024.pdf (accessed 2026-05-30; HTML access intermittently restricted). **Tier 1 (vendor primary white paper), lean: solid for the Genetic Communities method.**\n17. Forebears, \"Pokorný Surname Origin, Meaning & Last Name History\" (~11,039 bearers in Czechia; concentration in Central Bohemia, South Moravia, Prague) and Behind the Name (etymology *pokorný* = \"humble\"). As cited in companion document `02` (Claim 2.3, source S3). https://forebears.io/surnames/pokorn%C3%BD ; https://surnames.behindthename.com/name/pokorny10 (accessed 2026-05-30). **Tier 2–3 (onomastic/distribution reference), lean: solid for distribution and etymology. Cross-referenced from doc `02`.**\n\n---\n\n*Cross-references: companion document `01_Irish_Origins_And_History.md` (Collins/Ó Coileáin Munster sept; Famine-era emigration drivers) and `02_EastEuro_Baltic_Origins_And_History.md` (Slavic/Balto-Slavic history; Pokorný surname; Habsburg Galicia/Moravia borderland; Baltic governorates) develop the historical and onomastic evidence this genetic document relies on. Where this document maps a percentage to a population, the mapping is statistical, not genealogical — admixture estimates describe genetic similarity to reference clusters, not a ledger of ancestors.*"}, {"order": 4, "file": "04_Path_To_America.md", "title": "The Path to America: Two Lines Across the Atlantic", "summary": "", "body": "# The Path to America: Two Lines Across the Atlantic\n\n## Bottom Line\n\nThe two ancestral lines crossed the Atlantic on two different historical clocks, by two different logics, but they ended in the same place — the Catholic, white-ethnic, industrial-city America of the twentieth century. The **Irish Collins line** belonged to a *steady, century-long, self-feeding stream*: post-Famine emigration was overwhelmingly a movement of single young men and women, financed from the American side by \"America letters,\" remittances, and prepaid tickets in a classic chain-migration pattern, sailing out of Cork Harbour (Queenstown, today Cobh) or via Liverpool, processed through Castle Garden before 1892 and Ellis Island after, and settling thickly in the cities of the Northeast and Midwest — Boston, New York, Philadelphia, Chicago, Pittsburgh — as laborers, domestic servants, and, by the early twentieth century, police, firemen, teachers, clergy, and ward politicians, organized around the Catholic parish [Claim 4.1, 4.2, 4.3, 4.6, 4.7]. The **Central-European / Galician / Baltic Pokorný line** belonged instead to the *concentrated 1880–1924 \"great wave\"* out of Austria-Hungary (Galicia), the Russian partition, the Baltic governorates, and the Czech lands: overland by rail to the great German and Low-Country ports — Bremen/Bremerhaven, Hamburg, Antwerp, Rotterdam — through the shipping lines' control stations and into steerage, then through Ellis Island, where they were recorded by *empire* (\"Austria,\" \"Russia\") rather than ethnicity, a fact that scrambles the genealogical trail [Claim 4.4, 4.5, 4.8]. Within that wave the Czechs (Bohemians/Moravians) tended to come as *families intending to stay* and clustered in the Midwest and Texas, while Poles and other Galician Slavs came disproportionately as *young men \"for bread\" (za chlebem)*, many meaning to return, into the heavy industry, meatpacking, mining, and mills of the industrial belt [Claim 4.8, 4.9]. The **1924 Johnson–Reed Act** then slammed the door on the Eastern/Southern European wave with a 2%-of-the-1890-census quota that gutted the Polish, Russian, Czechoslovak, and Baltic quotas while leaving the Irish (and German/British) quotas generous — which is why \"arrived before WWII\" almost certainly means \"arrived before 1924\" for the Pokorný line, but implies no such hard wall for the Collins line [Claim 4.10]. The two lines most plausibly **met and married in an American industrial city of the Northeast or Midwest**, through the shared institutions of working-class Catholic life — parish, parochial school, neighborhood, and workplace — as the rigid first-generation endogamy of \"Irish marries Irish, Pole marries Pole\" gave way, by the second and third generations (mid-twentieth century), to broad intermarriage *within* the Catholic religious bloc: the \"triple melting pot\" of Ruby Jo Kennedy and Will Herberg, and the white-ethnic convergence later anatomized by Richard Alba and Mary Waters [Claim 4.11, 4.12]. **That convergence is the strongest single inference in this corpus and is marked as such throughout.**\n\n---\n\n## What the Evidence Establishes\n\nThe Irish side of the story belongs to a steady, decades-long, self-sustaining stream rather than the panicked famine flight of 1846–1852. The emigration a Collins family arriving \"before WWII\" most likely joined was the steady post-Famine outflow of roughly 1855–1921, an almost routinized movement in which the typical emigrant was a single young man or woman in their late teens or twenties, leaving a countryside whose late-marriage, impartible-inheritance, depopulating regime structurally produced surplus young people with no land or prospects. Kerby Miller's *Emigrants and Exiles*, built on some 5,000 emigrant letters and memoirs, frames Irish emigration as a long structural exodus with distinct pre-Famine, Famine, and post-Famine phases [S1], and the Irish stream is distinguished from nearly every other European one by the near-parity (and in many post-Famine decades the majority) of women: \"more women than men emigrated as single women who stayed in North America and sponsored other family members to join them\" [S6]. The engine that sustained it was a transatlantic feedback loop — the \"America letter\" carrying cash remittances and, decisively, prepaid passage tickets that let the next sibling follow, so that emigration propagated along family and parish lines. By 1854 the U.S. Postmaster General estimated more than 2 million letters had been sent to Ireland; by 1874 the figure exceeded 6 million a year; more than 40% of all remittances came as prepaid tickets, \"American money\" paid for roughly three-quarters of all Irish emigration, and historian Arnold Schrier calculated over $260 million sent home in the latter nineteenth century [S6][S7].\n\nThe route and gateway follow from West Cork geography and the calendar. The natural port of departure was Cork Harbour — the town of Queenstown (renamed for Queen Victoria's 1849 visit; today Cobh) on Great Island — though the dominant transatlantic trade ran out of Liverpool, with ships calling at Queenstown and Londonderry to take on Irish passengers; Queenstown sent roughly 2.5 million of the some 6 million North-America-bound Irish out between 1848 and 1950, while the voyage compressed from up to about 12 weeks under sail to roughly 7–10 days by steamship at century's end and as little as 5 days by 1911 [S8]. Processing changed mid-stream: before 1892, New York arrivals passed through Castle Garden, the state depot at the Battery (opened 1855), whose surviving records are thin customs lists (ship, master, port, date, name, gender, age, occupation, nationality); from 1 January 1892 the federal Ellis Island station took over, its first immigrant the Irish teenager Annie Moore from Cork, processing more than 12 million immigrants over 62 years, of whom more than 3.5 million were Irish [S2][S8]. That 1892 boundary is the key research fork for the Collins line. Where they landed and what they did is equally patterned: the Irish concentrated in the cities of the Northeast and Midwest — Boston, New York, Philadelphia, and inland Chicago and Pittsburgh — beginning as unskilled laborers (men) and domestic servants (women), Irish-born servants being \"more than 40% of all servants in New York and Boston\" by 1880, then climbing through politically connected municipal employment so that \"through the 20th century, Irish-Americans dominated many urban police departments\" and many \"climbed occupational and social ladders through positions such as policeman, fireman, and teacher,\" all organized around the Catholic parish as the cell of community life [S6][S9].\n\nThe Central-European/Baltic line crossed later, faster in calendar terms, and under a wholly different logic — the concentrated \"great wave\" of roughly 1880–1924, recorded at Ellis Island by empire rather than ethnicity. Lacking Atlantic ports of their own, emigrants from Galicia, the Russian partition, the Baltic governorates, and the Czech lands traveled overland by rail to Bremen/Bremerhaven (Norddeutscher Lloyd) and Hamburg (Hamburg-Amerika / HAPAG), with Antwerp and Rotterdam as alternates, booking through shipping-line agents who recruited hardest in the poorest villages at the late-winter \"hungry gap,\" passing through railway control stations where they were inspected and deloused, and crossing in steerage; the Hamburg passenger lists alone capture nearly 90% of all Eastern-European emigrants departing 1850–1934 [S11][S12]. On the manifests, these arrivals were classified by the empire that ruled them — \"Austria\" for Galicia, Bohemia, and Moravia under the Habsburgs (an emigrant before about 1920 giving his country as \"Austria or even just Galicia,\" the same place becoming \"Poland\" afterward), and \"Russia\" for Congress Poland, the Baltic, and the Lithuanian/Vilna lands. In 1907, \"Russia\" supplied 19% of all U.S. immigrants (the single largest source) and \"Austria\" 15%, two labels concealing Poles, Jews, Ukrainians, Lithuanians, Latvians, Czechs, and Slovaks alike, while \"place of last residence\" was merely the last address given, not the birthplace [S15]. This is precisely the knot in the corpus: a Czech surname against a Southern-Poland/Galician DNA cluster is exactly the profile a single \"Austria\" manifest entry would flatten into one imperial word.\n\nThe Slavic wave was not monolithic, and its internal split matters for a Czech-surnamed, Galician/Polish/Baltic-tied line. The Czech (Bohemian/Moravian) pattern was family migration intending permanent settlement, clustering not in the industrial Northeast but in the Midwest and Texas: \"at the turn of the century, Czech immigrants were more likely to make the journey to the United States with their families,\" unlike Poles and Slovaks who came individually, with Chicago becoming the most populous Bohemian settlement (alongside Cleveland, Milwaukee, St. Louis, and farm colonies in Nebraska, Iowa, Kansas, and Wisconsin), Moravians often entering through Galveston, Texas (first Bohemian settlement at Cat Spring, 1847), and as late as 1990 some 52% of Czech-ancestry Americans living in the Midwest against only 10% in the Northeast [S10]. The Polish/Galician pattern was disproportionately young men coming \"for bread\" (za chlebem) into the heaviest industrial work — meatpacking, steel, mining, mills, construction — concentrated in Chicago, Pittsburgh, and the anthracite fields, with over 90% settling in clustered \"Polonia\" communities; from 1870 to 1914 some 3.6 million Poles left the partitioning empires (Galicians about 43% of the 1895–1911 flow), and of perhaps 2–2.5 million ethnic Poles before the 1920s clampdown roughly one-third returned home, many being avowed \"birds of passage,\" in contrast to the family-settling Czechs — a world anatomized in Ewa Morawska's *For Bread with Butter* (Johnstown, PA, 1890–1940) and John Bodnar's *The Transplanted* [S11][S13][S16][S17].\n\nThe decisive structural fact distinguishing the two timelines is the Immigration Act of 1924 (Johnson–Reed / National Origins Act), the hard cutoff for the Eastern-European wave. Succeeding the 1921 Emergency Quota Act's 3%-of-1910 formula, it set each nationality's annual quota at 2% of its population recorded in the 1890 census (minimum 100) — deliberately choosing 1890, before the great Eastern/Southern European wave, to throttle that wave while protecting Northwest European inflow, with the national-origins refinement effective 1 July 1927/1929 and a \"remote control\" consular-visa system enforcing it abroad [S18][S19]. The State Department's own history records that \"Eastern and southern Europeans were most severely affected,\" and the first-year (1924–25) quotas make the asymmetry concrete: Germany 51,227; Great Britain & Northern Ireland 34,007; Irish Free State 28,567; Italy 3,845; Poland 6,524 — the Irish Free State alone receiving roughly four to seven times the Polish quota, with the Baltic states' quotas token [S18][S20]. This is why \"before WWII\" almost certainly means \"before 1924\" for the Pokorný line, while imposing no comparable wall on the Collins line.\n\nHow the two lines met is the strongest single inference in this corpus, and it is marked as such. They most plausibly converged in an American industrial or commercial city of the Northeast or Midwest — a Chicago, Pittsburgh, Cleveland, or Detroit where both Irish and Central-European Catholic populations were large — through the shared institutions of working-class Catholic life, the Irish dominating the older Catholic cities and the Church hierarchy while Poles and Czechs poured into the same industrial centers [S9][S10][S13]. Because early-twentieth-century American Catholicism was organized into national parishes — Irish territorial parishes alongside Polish, Czech, and Lithuanian national ones, each with its own priest, school, and societies — the first generation of each line worshipped separately even while living near one another, so a meeting across the lines is most natural in the second or third generation, once the children of immigrants attended common Catholic high schools, joined the same workplaces and unions, and moved into shared parishes [S10][S13]. The scholarship makes the application strong rather than speculative: Ruby Jo Reeves Kennedy's study of 9,044 New Haven marriages (1870–1940) found endogamy by nationality declining while endogamy by religion rose, with Catholics marrying Catholics about 85% of the time by 1940 (Protestants ~80%, Jews ~94%) — the \"triple melting pot\" generalized by Will Herberg's *Protestant, Catholic, Jew* (1955), in which religious boundaries replaced ethnic ones — and Richard Alba's work on the twilight of white ethnicity and Mary C. Waters's *Ethnic Options* document the later stage, in which third-plus-generation European ethnicity becomes a symbolic, chosen, thoroughly intermarried identity [S21][S22]. An Irish + Czech/Polish Catholic marriage is the paradigm case of that convergence; the specific city and moment remain unknown.\n\n---\n\n## Narrative I — The Irish Crossing: A Steady Stream, Paid for from America\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 560\" role=\"img\" aria-label=\"A two-lane engraved sea chart. A green Irish sea-lane runs as a steady self-feeding loop from Queenstown and Liverpool, financed by American remittance tickets, carrying 2.5 million of about 6 million emigrants. A crimson Eastern lane runs overland by rail to Bremen, Hamburg, Antwerp and Rotterdam, then floods across in a compressed 1880 to 1924 steerage wave, 90 percent recorded on Hamburg lists. Both rhumb-line lanes converge on a single New York harbour star at the gate, Castle Garden to Ellis Island, where the imperial-label trap records arrivals by empire, Austria or Russia, not ethnicity.\">\n<rect x=\"14\" y=\"14\" width=\"672\" height=\"532\" fill=\"none\" class=\"ln\" stroke-width=\"1.4\" style=\"stroke:var(--muted)\"/>\n<rect x=\"20\" y=\"20\" width=\"660\" height=\"520\" fill=\"none\" class=\"ln-soft\" stroke-width=\".75\"/>\n<text x=\"350\" y=\"44\" text-anchor=\"middle\" font-size=\"14.5\" class=\"t-serif\" letter-spacing=\"2.5\">TWO CLOCKS, ONE HARBOR<\/text>\n<text x=\"350\" y=\"62\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">the dual Atlantic crossing &#8212; two sea-lanes, two logics, one gate<\/text>\n<line x1=\"120\" y1=\"74\" x2=\"580\" y2=\"74\" class=\"ln-soft\" stroke-width=\".75\"/>\n<g class=\"s-t3\" stroke-width=\"1.2\" fill=\"none\" opacity=\".55\"><circle cx=\"350\" cy=\"350\" r=\"2.5\"/><path d=\"M350,350 L96,150 M350,350 L604,150 M350,350 L120,470 M350,350 L580,470 M350,350 L350,108 M350,350 L350,512 M350,350 L72,350 M350,350 L628,350\"/><\/g>\n<g class=\"s-t3\" stroke-width=\".6\" fill=\"none\" opacity=\".3\"><path d=\"M350,350 L188,118 M350,350 L512,118 M350,350 L150,300 M350,350  x=\"118\" y=\"350\" text-anchor=\"middle\" font-size=\"7.5\" class=\"t-muted\" font-style=\"italic\">(was ~12 wks under sail)<\/text>\n<rect x=\"44\" y=\"392\" width=\"170\" height=\"58\" rx=\"2\" fill=\"none\" class=\"s-t1\" stroke-width=\"1.1\"/>\n<rect x=\"48\" y=\"396\" width=\"162\" height=\"50\" rx=\"1\" fill=\"none\" class=\"ln-soft\" stroke-width=\".6\"/>\n<text x=\"129\" y=\"409\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"bold\" class=\"t-serif\" style=\"fill:var(--t1)\">FINANCED FROM AMERICA<\/text>\n<text x=\"129\" y=\"423\" text-anchor=\"middle\" font-size=\"8.5\">&#62;6M letters/yr by 1874 &#183; ~$260M home<\/text>\n<text x=\"129\" y=\"436\" text-anchor=\"middle\" font-size=\"8.5\">&#62;40% of remittances = prepaid tickets<\/text>\n<text x=\"116\" y=\"477\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\" font-style=\"italic\">the dashed loop = the stream feeding itself<\/text>\n<g class=\"f-t2\"><circle cx=\"612\" cy=\"146\" r=\"4.5\"/><circle cx=\"612\" cy=\"196\" r=\"4.5\"/><circle cx=\"612\" cy=\"246\" r=\"4.5\"/><circle cx=\"612\" cy=\"296\" r=\"4.5\"/><\/g>\n<text x=\"612\" y=\"139\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\" class=\"t-serif\">Bremen / Bremerhaven<\/text>\n<text x=\"612\" y=\"208\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\" class=\"t-serif\">Hamburg<\/text>\n<text x=\"612\" y=\"259\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\" class=\"t-serif\">Antwerp<\/text>\n<text x=\"612\" y=\"309\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\" class=\"t-serif\">Rotterdam<\/text>\n<text x=\"585\" y=\"219\" text-anchor=\"middle\" font-size=\"7.5\" class=\"t-muted\" font-style=\"italic\">Hamburg lists = ~90% of E-Euro departures 1850&#8211;1934<\/text>\n<path d=\"M530,520 C 480,480 470,440 540,300 C 562,256 588,210 607,150\" fill=\"none\" class=\"s-t2\" stroke-width=\"1.3\" stroke-dasharray=\"6 4\"/>\n<text x=\"556\" y=\"486\" font-size=\"8.5\" class=\"t-acc\" style=\"fill:var(--t2)\" font-style=\"italic\" transform=\"rotate(-52 556 486)\">overland by rail<\/text>\n<text x=\"612\" y=\"338\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\" font-style=\"italic\">&#8595; steerage, concentrated 1880&#8211;1924<\/text>\n<path d=\"M607,150 C 530,210 460,275 380,332\" fill=\"none\" class=\"s-t2\" stroke-width=\"2\"/>\n<path d=\"M607,196 C 530,240 455,285 380,336\" fill=\"none\" class=\"s-t2\" stroke-width=\"3.6\"/>\n<path d=\"M607,246 C 535,275 460,305 380,340\" fill=\"none\" class=\"s-t2\" stroke-width=\"2.6\"/>\n<path d=\"M607,296 C 540,312 460,328 380,344\" fill=\"none\" class=\"s-t2\" stroke-width=\"1.8\"/>\n<polygon points=\"380,332 391,330 386,341\" class=\"f-t2\"/>\n<polygon points=\"380,344 391,342 386,353\" class=\"f-t2\"/>\n<text x=\"500\" y=\"370\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\" font-style=\"italic\">four ports funnel into one compressed flood<\/text>\n<g class=\"f-bg\"><circle cx=\"350\" cy=\"350\" r=\"46\" stroke-width=\"2\" style=\"stroke:var(--accent)\"/><\/g>\n<polygon points=\"350,310 357,343 350,350 343,343\" class=\"f-t4\"/>\n<polygon points=\"390,350 357,357 350,350 357,343\" class=\"f-t4\"/>\n<polygon points=\"350,390 343,357 350,350 357,357\" class=\"f-t4\"/>\n<polygon points=\"310,350 343,343 350,350 343,357\" class=\"f-t4\"/>\n<polygon points=\"350,310 350,350 343,343\" style=\"fill:var(--accent)\"/>\n<polygon points=\"390,350 350,350 357,357\" style=\"fill:var(--accent)\"/>\n<polygon points=\"350,390 350,350 357,343\" style=\"fill:var(--accent)\"/>\n<polygon points=\"310,350 350,350 343,357\" style=\"fill:var(--accent)\"/>\n<circle cx=\"350\" cy=\"350\" r=\"4\" class=\"f-t3\"/>\n<text x=\"350\" y=\"416\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\" class=\"t-serif\" style=\"fill:var(--accent)\">THE NEW YORK GATE<\/text>\n<text x=\"350\" y=\"430\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">Castle Garden 1855&#8211;1890 &#8594; Ellis Island, 1 Jan 1892<\/text>\n<text x=\"350\" y=\"442\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">first through: Annie Moore of Cork &#183; &#62;3.5M Irish processed<\/text>\n<rect x=\"232\" y=\"464\" width=\"236\" height=\"56\" rx=\"2\" class=\"f-t2\" opacity=\".12\" stroke-width=\"1.2\" style=\"stroke:var(--t2)\"/>\n<text x=\"350\" y=\"481\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\" class=\"t-serif\" style=\"fill:var(--t2)\">&#9888; THE IMPERIAL-LABEL TRAP<\/text>\n<text x=\"350\" y=\"496\" text-anchor=\"middle\" font-size=\"8.5\">recorded by EMPIRE &#8212; &#8220;Austria,&#8221; &#8220;Russia&#8221;<\/text>\n<text x=\"350\" y=\"508\" text-anchor=\"middle\" font-size=\"8.5\">&#8212; not by ethnicity; the trail scrambled at the gate<\/text>\n<line x1=\"350\" y1=\"396\" x2=\"350\" y2=\"406\" class=\"ln-soft\" stroke-width=\".75\"/>\n<text x=\"350\" y=\"538\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\" font-style=\"italic\">&#8594; into industrial-Catholic America: the parish, the mill, the ward, the national parish<\/text>\n<\/svg>\n<figcaption><strong>Fig. 5.<\/strong> The two lines ran on different clocks &#8212; a steady seventy-year Irish drip paid for from the far shore, and a four-decade Eastern flood slammed shut in 1924 &#8212; yet both poured through the same New York gate, where the same imperial labels that scrambled the Eastern trail proved that the harbor recorded an empire, never an ethnicity.<\/figcaption>\n<\/figure>\n\n\nThe companion document `01_Irish_Origins_And_History.md` establishes *why* a Munster/West Cork Collins family left: the structural emptying of Gaelic-Catholic rural Ireland after the Famine — a land system that left the young landless, an inheritance regime (impartible holdings passing to one son) that produced surplus children, late marriage, and a population that *halved* between 1841 and 1911. This document picks up at the water's edge.\n\nThe crucial thing to understand about the post-Famine Irish stream is that it was **not** a single catastrophe but a *self-sustaining institution*. The famine flight of 1846–1852 was desperate and chaotic; what followed for the next seventy years was something steadier and stranger — a society that came to *expect* its young people to leave, in which emigration was a normal life-stage, financed and organized from the other side of the ocean [S1].\n\n**Who went.** The post-Famine emigrant was characteristically *young, single, and as likely to be a woman as a man* — a profile almost unique among European emigrations. Irish daughters left in numbers matching or exceeding Irish sons, sailing alone to take service positions, and then *sponsoring the next sibling* [S6]. For a Collins line, this means the founding immigrant could as easily have been a young woman going into domestic service as a young man going onto a labor gang.\n\n**How it was paid for.** The engine was the **\"America letter.\"** Emigrants wrote home, and into those letters went cash and — decisively — **prepaid tickets**: a sister already in Boston would buy a ticket and mail it home so the next sister could come. By 1854 over 2 million letters a year were reaching Ireland; by 1874, over 6 million [S6]. More than 40% of remittances took the form of prepaid tickets, and \"American money\" paid for roughly *three-quarters* of all Irish emigration; Schrier's estimate is over **$260 million** sent home in the later nineteenth century [S6][S7]. This is **chain migration** in its purest form — the emigration reproduced itself along family and parish lines, which is exactly why Irish from one West Cork parish so often ended up on the same few American streets.\n\n**The route.** From West Cork the natural embarkation point was **Cork Harbour** — the town of **Queenstown** (renamed for Queen Victoria's 1849 visit; reverted to the Irish **Cobh** after independence), on Great Island in the world's second-largest natural harbour. Queenstown was the single largest Irish emigration port, sending roughly **2.5 million** of the ~6 million North-America-bound Irish out between 1848 and 1950 [S8]. Many Irish, however, first crossed to **Liverpool** — the hub of the transatlantic trade — and sailed from there, often on ships that *called at Queenstown* to top up with Irish passengers [S8]. The **crossing** itself was transformed by steam: up to ~12 weeks under sail at mid-century, down to ~7–10 days by steamship at century's end, and as little as ~5 days by 1911 [S8]. A Collins crossing in, say, the 1890s–1910s would have been a roughly week-long steerage passage, not the months-long ordeal of Famine memory.\n\n**The gate.** Where they were processed depends entirely on *when* they came. Before 1892, New York arrivals passed through **Castle Garden**, the state depot at the Battery (opened 1855); the surviving records are thin \"customs lists\" (ship, master, port, name, age, sex, occupation, nationality) [S2]. From **1 January 1892**, the federal **Ellis Island** station took over — its very first immigrant was **Annie Moore**, a teenager from Cork [S2]. Over its 62 years Ellis Island processed >12 million immigrants, **more than 3.5 million of them Irish** [S2][S8]. For the Collins line this 1892 boundary is the key research fork: a pre-1892 arrival lives in Castle Garden customs lists, a post-1892 arrival in the far richer Ellis Island manifests.\n\n**Where they landed, and what they did.** The Irish concentrated in the **cities of the Northeast and Midwest** — Boston, New York, Philadelphia, and inland to Chicago and Pittsburgh [S9]. The men began as **unskilled laborers** (canals, railroads, construction, docks); the women as **domestic servants** — \"Bridget\" was so ubiquitous a figure that by 1880 the Irish-born were *more than 40% of all servants in New York and Boston* [S6][S9]. Then came the slow climb: through **politically connected municipal jobs** (police, fire, public works) and **teaching**, the Irish moved into the lower-middle class, and by the early twentieth century \"Irish-Americans dominated many urban police departments\" [S9]. The organizing cell of all of it was the **Catholic parish** — church, school, sodality, and social hall — which doubled as the engine of an upwardly mobile, English-speaking, increasingly respectable Irish-American Catholicism [S9]. An English-speaking, already-Catholic, institutionally entrenched community: that is the world the Collins line had built by the time the Pokorný line was still in steerage.\n\n---\n\n## Narrative II — The Central-European/Baltic Crossing: The Great Wave, 1880–1924\n\nThe Pokorný line crossed later, faster in calendar terms, and under a wholly different logic. Where the Irish stream was a slow seventy-year drip, the Eastern-European movement was a *concentrated flood* compressed into roughly four decades (c. 1880–1924) and then abruptly cut off.\n\n**The overland leg.** None of these peoples had an Atlantic port of their own. From Galicia, the Russian partition, the Lithuanian/Vilna lands, and the Baltic governorates, the emigrant first traveled *overland by rail* across the German Empire (or to the Low Countries) to one of the great embarkation ports: **Bremen/Bremerhaven** (home of **Norddeutscher Lloyd**), **Hamburg** (home of **Hamburg-Amerika / HAPAG**), or **Antwerp** and **Rotterdam** [S11][S12]. The shipping lines ran a dense network of *agents* into the poorest villages — recruiting hardest at the late-winter \"hungry gap\" when peasant families were most desperate [S11] — and a system of railway **control stations** at the German frontier where emigrants were inspected, bathed, deloused, and screened, partly so the lines would not have to ship passengers home at their own expense if rejected at Ellis Island. The **Hamburg passenger lists** alone capture *nearly 90%* of all Eastern-European emigrants departing 1850–1934 — a measure of how funneled the routes were [S12]. The crossing was in **steerage**, the cheapest and most crowded class.\n\n**The imperial-label problem.** Here is the genealogical crux for the Pokorný line. At Ellis Island these emigrants were classified **by the empire that ruled them, not by their ethnicity.** A Galician — whether ethnic Pole, Ruthenian/Ukrainian, Jew, or Czech-surnamed Habsburg subject — was recorded as **\"Austria\"** (or sometimes just \"Galicia\") before c. 1920, and only as \"Poland\" afterward; subjects of the Tsar (Congress Poland, the Baltic, Lithuania) were recorded as **\"Russia\"** [S15]. In 1907 alone, \"Russia\" supplied **19%** of all U.S. immigrants (the single largest source) and \"Austria\" **15%** — two labels concealing Poles, Jews, Ukrainians, Lithuanians, Latvians, Czechs, and Slovaks alike [S15]. And \"place of last residence\" on a manifest is merely the last address given, not the birthplace [S15]. **This is precisely the knot in the corpus:** a *Czech surname* (Pokorný) against a DNA cluster weighted to *Southern Poland / Galicia* and the *Baltic* is exactly the kind of profile that a single \"Austria\" or \"Russia\" manifest entry would flatten into one meaningless imperial word — see Open Question 1.\n\n**Two patterns within the wave.** The Slavic wave was not monolithic, and the split matters for a Czech-surnamed, Galician/Polish/Baltic-tied line:\n\n- **The Czech (Bohemian/Moravian) pattern** was *family migration intending permanent settlement*, clustering in the **Midwest and Texas** rather than the industrial Northeast. \"At the turn of the century, Czech immigrants were more likely to make the journey… with their families,\" unlike Poles and Slovaks who came individually [S10]. Bohemians filled **Chicago** (the most populous Bohemian settlement), Cleveland, Milwaukee, St. Louis, and the farm colonies of **Nebraska, Iowa, Kansas, Wisconsin**; **Moravians** disproportionately entered through **Galveston, Texas**, and settled there [S10]. As late as 1990, 52% of Czech-ancestry Americans were in the Midwest and only 10% in the Northeast [S10].\n\n- **The Polish/Galician pattern** was disproportionately *young men coming \"for bread\" (za chlebem)* into the heaviest industrial labor — **meatpacking, steel, coal mining, mills, construction** — concentrated in **Chicago, Pittsburgh, the anthracite fields**, and the industrial belt generally [S13]. From 1870–1914, **3.6 million Poles** left the partitioning empires, Galicians ~43% of the 1895–1911 Polish flow [S11]; of ~2–2.5 million ethnic Poles before the 1920s clampdown, *about one-third returned* [S16]. Many were avowed **\"birds of passage\" / sojourners**, meaning to earn and go home [S16]. The standard scholarly anatomies of this world are **John Bodnar's *The Transplanted*** (1985) and **Ewa Morawska's *For Bread with Butter*** (Johnstown, PA, 1890–1940) [S17].\n\nThe Baltic and Lithuanian sub-streams round out the line's DNA signature. **Lithuanians** — fleeing Russification, the long Tsarist conscription, and rural poverty — poured into the **Pennsylvania anthracite fields** (c. **90,000** in the coal mines by 1915) and into Chicago, Cleveland, and the industrial Northeast, building **Lithuanian national (Catholic) parishes** as the cell of community life [S14]. The **Latvians** and **Estonians** came in smaller numbers, again as young single men dodging the Tsar's draft, and — being largely **Lutheran**, not Catholic — built **Baltic Lutheran congregations** (the first U.S. Latvian Lutheran service was organized in Boston in 1891; St. John's Latvian Evangelical Lutheran Church formed in Philadelphia in 1893) [S14]. This Lutheran-Baltic thread is the one religious tributary in the Pokorný profile that does *not* feed the Catholic mainstream — a detail worth holding for the \"how they met\" question, since it sits slightly apart from the Catholic convergence story.\n\n**The national parish.** For the Catholic Slavs (Poles, Czechs, Lithuanians), the institution that mattered was the **national parish** — a church organized by *language and ethnicity* rather than territory, with its own priest, its own school, its own newspaper and fraternal societies. St. Stanislaus Kostka (Chicago, 1867) was the formative Polish parish; Czechs and Lithuanians built their own [S13][S10]. The crucial point for the meeting of the two lines is that **the national parish kept the first generation *separate*** — an Irish Catholic and a Polish or Czech Catholic in the same city in 1905 worshipped in *different churches in different languages*. The walls between them were real, and they came down generationally.\n\n---\n\n## Narrative III — 1924: The Door Closes on One Line and Not the Other\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 520\" role=\"img\" aria-label=\"A ranked horizontal bar chart of the first-year 1924&#8211;25 Johnson&#8211;Reed national-origins quotas, descending: Germany 51,227; Great Britain and Northern Ireland 34,007; Irish Free State 28,567 &#8212; the three Northwest-European bars drawn in Gaelic green as the favoured lines &#8212; then a sharp drop to Poland 6,524; Italy 3,845; and the Baltic states at a token few hundred each, drawn in crimson as the gutted Eastern lines. A ruled note marks that quotas were pegged to 2 percent of the 1890 census, chosen to predate the Eastern surge.\">\n<text x=\"350\" y=\"34\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" letter-spacing=\"2.5\">THE 1924 DOOR<\/text>\n<text x=\"350\" y=\"52\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">Johnson&#8211;Reed first-year quotas &#183; enacted 26 May 1924 &#183; visas / yr<\/text>\n<g class=\"s-t3\" stroke-width=\"1.2\" fill=\"none\"><circle cx=\"60\" cy=\"34\" r=\"9\"/><path d=\"M60,25 L60,43 M51,34 L69,34 M60,25 L63,31 L60,29 L57,31 Z\"/><\/g>\n<line x1=\"40\" y1=\"68\" x2=\"660\" y2=\"68\" class=\"ln\" stroke-width=\"1\" style=\"stroke:var(--border)\"/>\n<line x1=\"40\" y1=\"71\" x2=\"660\" y2=\" 186\" y=\"100\" text-anchor=\"end\" font-size=\"11.5\" font-weight=\"bold\" class=\"t-serif\">Germany<\/text>\n<text x=\"186\" y=\"113\" text-anchor=\"end\" font-size=\"8.5\" class=\"t-muted\">German Reich<\/text>\n<text x=\"660\" y=\"110\" text-anchor=\"end\" font-size=\"13\" font-weight=\"bold\" class=\"t-inv\">51,227<\/text>\n<rect x=\"190\" y=\"148\" width=\"316.1\" height=\"34\" class=\"f-t1\" opacity=\".68\"/>\n<rect x=\"190\" y=\"148\" width=\"316.1\" height=\"34\" fill=\"none\" class=\"s-t1\" stroke-width=\"1\"/>\n<text x=\"186\" y=\"160\" text-anchor=\"end\" font-size=\"11.5\" font-weight=\"bold\" class=\"t-serif\">Great Britain &amp; N. Ireland<\/text>\n<text x=\"186\" y=\"173\" text-anchor=\"end\" font-size=\"8.5\" class=\"t-muted\">the United Kingdom<\/text>\n<text x=\"500\" y=\"170\" text-anchor=\"end\" font-size=\"13\" font-weight=\"bold\" class=\"t-inv\">34,007<\/text>\n<rect x=\"190\" y=\"208\" width=\"265.5\" height=\"34\" class=\"f-t1\" opacity=\".58\"/>\n<rect x=\"190\" y=\"208\" width=\"265.5\" height=\"34\" fill=\"none\" class=\"s-t1\" stroke-width=\"1.6\"/>\n<text x=\"186\" y=\"220\" text-anchor=\"end\" font-size=\"11.5\" font-weight=\"bold\" class=\"t-serif\" style=\"fill:var(--t1)\">Irish Free State<\/text>\n<text x=\"186\" y=\"233\" text-anchor=\"end\" font-size=\"8.5\" class=\"t-acc\" style=\"fill:var(--t1)\">&#8212; the Collins / &#211; Coile&#225;in line<\/text>\n<text x=\"449\" y=\"230\" text-anchor=\"end\" font-size=\"13\" font-weight=\"bold\" class=\"t-inv\">28,567<\/text>\n<line x1=\"190\" y1=\"270\" x2=\"660\" y2=\"270\" class=\"ln\" stroke-width=\"1.4\" style=\"stroke:var(--border)\"/>\n<text x=\"350\" y=\"284\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-muted\" font-style=\"italic\">&#8212; the threshold the 1890 peg engineered &#8212;<\/text>\n<rect x=\"190\" y=\"342\" width=\"60.6\" height=\"28\" class=\"f-t2\" opacity=\".82\"/>\n<rect x=\"190\" y=\"342\" width=\"60.6\" height=\"28\" fill=\"none\" class=\"s-t2\" stroke-width=\"1.6\"/>\n<text x=\"186\" y=\"352\" text-anchor=\"end\" font-size=\"11.5\" font-weight=\"bold\" class=\"t-serif\" style=\"fill:var(--t2)\">Poland<\/text>\n<text x=\"186\" y=\"364\" text-anchor=\"end\" font-size=\"8.5\" class=\"t-acc\" style=\"fill:var(--t2)\">&#8212; nearest the Pokorn&#253; line<\/text>\n<text x=\"258\" y=\"361\" font-size=\"12\" font-weight=\"bold\" style=\"fill:var(--t2)\">6,524<\/text>\n<rect x=\"190\" y=\"388\" width=\"35.7\" height=\"28\" class=\"f-t2\" opacity=\".64\"/>\n<rect x=\"190\" y=\"388\" width=\"35.7\" height=\"28\" fill=\"none\" class=\"s-t2\" stroke-width=\"1\"/>\n<text x=\"186\" y=\"398\" text-anchor=\"end\" font-size=\"11.5\" font-weight=\"bold\" class=\"t-serif\">Italy<\/text>\n<text x=\"186\" y=\"410\" text-anchor=\"end\" font-size=\"8.5\" class=\"t-muted\">Kingdom of Italy<\/text>\n<text x=\"233\" y=\"407\" font-size=\"12\" font-weight=\"bold\" style=\"fill:var(--t2)\">3,845<\/text>\n<rect x=\"190\" y=\"428\" width=\"9.3\" height=\"28\" class=\"f-t2\" opacity=\".5\"/>\n<rect x=\"190\" y=\"428\" width=\"9.3\" height=\"28\" fill=\"none\" class=\"s-t2\" stroke-width=\"1\"/>\n<text x=\"186\" y=\"438\" text-anchor=\"end\" font-size=\"11.5\" font-weight=\"bold\" class=\"t-serif\">Baltic states<\/text>\n<text x=\"186\" y=\"450\" text-anchor=\"end\" font-size=\"8.5\" class=\"t-muted\">Estonia &#183; Latvia &#183; Lithuania<\/text>\n<text x=\"207\" y=\"447\" font-size=\"11\" font-weight=\"bold\" style=\"fill:var(--t2)\">~100&#8211;300 ea.<\/text>\n<line x1=\"298\" y1=\"356\" x2=\"338\" y2=\"356\" class=\"ln-soft\" stroke-width=\".75\"/>\n<text x=\"342\" y=\"354\" font-size=\"9\" class=\"t-muted\" font-style=\"italic\">Irish Free State<\/text>\n<text x=\"342\" y=\"365\" font-size=\"9\" class=\"t-acc\" style=\"fill:var(--t1)\">&#8776; 4&#8211;7&#215; the Polish quota<\/text>\n<g class=\"s-t4\" fill=\"none\" stroke-width=\"1.2\"><path d=\"M474,300 q14,-10 28,0 q14,10 28,0\"/><path d=\"M474,306 q14,-10 28,0 q14,10 28,0\"/><\/g>\n<rect x=\"466\" y=\"312\" width=\"190\" height=\"52\" fill=\"none\" class=\"s-t4\" stroke-width=\"1.2\"/>\n<rect x=\"466\" y=\"312\" width=\"190\" height=\"52\" class=\"f-t4\" opacity=\".1\"/>\n<text x=\"474\" y=\"328\" font-size=\"9\" font-weight=\"bold\" class=\"t-serif\" style=\"fill:var(--t4)\">THE MECHANISM<\/text>\n<text x=\"474\" y=\"341\" font-size=\"8.5\" class=\"t-muted\">Quota = 2% of each nationality in the<\/text>\n<text x=\"474\" y=\"352\" font-size=\"8.5\" class=\"t-muted\"><tspan font-weight=\"bold\" style=\"fill:var(--text)\">1890 census<\/tspan> &#8212; pushed back from 1910,<\/text>\n<text x=\"474\" y=\"362\" font-size=\"8.5\" class=\"t-muted\">chosen to predate the Eastern surge.<\/text>\n<text x=\"350\" y=\"500\" text-anchor=\"middle\" font-size=\"9\" class=\"t-muted\" font-style=\"italic\">State Dept.: &#8220;Eastern and southern Europeans were most severely affected by reductions in legal immigration.&#8221;<\/text>\n<\/svg>\n<figcaption><strong>Fig. 6.<\/strong> The same statute that left the Irish Free State a quota of 28,567 throttled Poland to 6,524 and the Baltic states to a few hundred &#8212; so &#8220;before WWII&#8221; means &#8220;before 1924&#8221; only for the Pokorn&#253; line; the Collins door was never bolted at all.<\/figcaption>\n<\/figure>\n\n\nThe decisive structural fact distinguishing the two lines' timelines is the **Immigration Act of 1924 (Johnson–Reed / National Origins Act).** Building on the 1921 Emergency Quota Act (which had already capped quotas at *3% of each nationality's 1910-census population*), the 1924 Act lowered the figure to **2%** and — critically — pushed the base year all the way back to the **1890 census**, *before* the great Eastern/Southern European wave had arrived [S18][S19]. The intent was explicit and eugenic: by anchoring quotas to 1890, when the foreign-born were still overwhelmingly Northwest European, Congress engineered a system that, in the State Department's own words, left \"Eastern and southern Europeans… most severely affected by reductions in legal immigration\" [S18][S19].\n\nThe first-year (1924–25) quotas show the asymmetry in hard numbers: **Germany 51,227; Great Britain & Northern Ireland 34,007; Irish Free State 28,567** — against **Poland 6,524; Italy 3,845**, and *token* allotments (low hundreds) for the Baltic states and other small Eastern nations [S20]. The **Irish Free State quota alone was roughly four to seven times the Polish quota** [S20]. A \"remote control\" consular-visa system then enforced the limits *abroad*, before embarkation [S19].\n\nThe implication for this corpus is direct and was given in the brief: **\"arrived before WWII\" almost certainly means \"arrived before 1924\" for the Pokorný/Eastern-European line** — after 1924 the gate was effectively shut, the za-chlebem flood reduced to a trickle, and the great wave over. For the **Collins/Irish line**, by contrast, the generous Irish Free State quota imposed *no comparable wall*; an Irish arrival in the 1920s or 1930s remained entirely feasible. The two lines therefore very likely reached America on different sides of the 1924 line: the Pokorný line *had to* be substantially in place by 1924, while the Collins line could have continued arriving (or been long since arrived) without constraint. (See `02_EastEuro_Baltic_Origins_And_History.md` for the European-side pressures — Galician poverty, conscription, Russification, partible inheritance — that filled the wave the 1924 Act then cut off.)\n\n---\n\n## Narrative IV — How the Two Lines Met *(Explicit Inference)*\n\n> **This section is reconstruction, not record.** No family document recovered in this corpus establishes where, when, or how a Collins and a Pokorný first met. What follows is the *most plausible* convergence, built on the documented settlement geography and the established scholarship on white-ethnic Catholic assimilation, and is flagged as inference throughout.\n\n**The convergence point: an industrial Catholic city.** Both lines pooled in the same kind of place — the Catholic, working-class, industrial city of the Northeast and Midwest. The Irish dominated the older Catholic cities (Boston, New York, Philadelphia) and the Church hierarchy itself; the Poles, Czechs, and Lithuanians flooded the industrial centers, above all **Chicago**, but also **Pittsburgh, Cleveland, Detroit, Milwaukee**, and the mill and mining towns of the belt [S9][S10][S13][S14]. The single likeliest meeting-ground city is one where *both* populations were large and Catholic — Chicago being the paradigm (enormous Irish *and* enormous Polish/Czech populations), with Pittsburgh, Cleveland, and Detroit close behind. **The specific city is unknown and should be treated as such.**\n\n**Why the first generation did *not* mix — and the second and third did.** Early-twentieth-century American Catholicism was organized into **national parishes**: the Irish in territorial/English-language parishes, the Poles in Polish parishes, the Czechs in Czech parishes, the Lithuanians in Lithuanian parishes — each with its own priest, school, newspaper, and societies [S10][S13]. So the *first* generation of each line worshipped, schooled, and married largely *within* its own ethnic enclave: Irish married Irish, Poles married Poles. The meeting of the two lines therefore most plausibly happened in the **second or third generation** — among the American-born children and grandchildren who attended *common* Catholic high schools, served in the same units in the World Wars, worked the same shopfloors and joined the same unions, moved out of the ethnic enclave into *shared* (often suburban) parishes, and increasingly saw one another simply as *Catholics* rather than as Irish or Pole or Czech.\n\n**Why an Irish–Czech/Polish marriage was, by mid-century, *typical*.** This is where the scholarship makes the inference strong rather than speculative. **Ruby Jo Reeves Kennedy's** landmark study of 9,044 marriages in New Haven (1870–1940) found that endogamy by *nationality* (Irish-with-Irish, Polish-with-Polish, Italian-with-Italian) *declined* across the generations while endogamy by *religion* held and *rose*: by 1940, Catholics married Catholics about **85%** of the time, Protestants ~80%, Jews ~94% [S21]. Her conclusion — that America was assimilating not into one melting pot but into **three** (Protestant, Catholic, Jewish) — is the **\"triple melting pot,\"** generalized by **Will Herberg** in *Protestant, Catholic, Jew* (1955): as immigrants assimilated, *religious* boundaries replaced *ethnic* ones as the chief line of differentiation among European-descended Americans [S21]. In that framework, an Irish-American marrying a Czech- or Polish-American is not a crossing of a meaningful boundary at all — it is a marriage *within* the Catholic bloc, the very kind the data say became normal by the 1940s–60s. **Richard Alba** (on the \"twilight of ethnicity\" and the convergence of European-origin whites) and **Mary C. Waters** (*Ethnic Options*, on how third-plus-generation European ethnicity becomes a *symbolic*, chosen, thoroughly intermarried identity) document the later stage of exactly this process [S22].\n\n**The most plausible reconstruction, then:** the Irish Collins line, English-speaking and Catholic and institutionally established earlier, and the Czech/Polish Pokorný line, arriving in the great wave and substantially in place by the 1924 cutoff, both settled in an industrial Catholic city of the Northeast or Midwest. The first generations lived parallel lives in adjacent but separate ethnic-Catholic worlds. Their **American-born descendants** — meeting through the *shared* institutions that the national-parish system had at first kept apart: the common Catholic school, the parish that had ceased to be ethnically exclusive, the workplace, the union, the neighborhood, the war-time service — married across the old national line in the ordinary mid-twentieth-century way of white-ethnic Catholic America. The Collins–Pokorný union is, on this reading, **not an anomaly but a textbook instance of the triple-melting-pot convergence** [S21][S22]. *(One caveat worth holding: the Baltic-Lutheran tributary in the Pokorný DNA signature sits slightly outside this Catholic story; if any part of that line was Lutheran rather than Catholic, the convergence would have run through workplace/neighborhood/civic life rather than the parish — see Open Question 3.)*\n\n---\n\n## Open Questions\n\n1. **Czech surname vs. Galician/Polish DNA — one manifest entry or two origins?** Does the Pokorný line's Czech surname against a Southern-Poland/Galician-weighted DNA cluster reflect (a) a single Habsburg-subject family recorded as \"Austria\" whose Czech patriline had long lived in or near Galicia, or (b) two distinct origin points blended in later generations? Resolving this requires the *actual ship manifest and naturalization papers* (which would give town of last residence and birth), not DNA — and the imperial-label problem [S15] means the manifest may itself say only \"Austria.\"\n\n2. **Which port, which line, which year for each immigrant?** The specific embarkation ports (Queenstown vs. Liverpool for the Collins line; Bremen vs. Hamburg vs. Antwerp for the Pokorný line), the exact arrival years, and whether each came pre- or post-1892 (Castle Garden vs. Ellis Island) are all recoverable *only* from passenger manifests and naturalization records not consulted here. The narrative gives the modal/likeliest answers, not documented ones.\n\n3. **Catholic or Lutheran on the Baltic side?** The Estonian/Latvian (Lutheran) component of the Pokorný profile sits outside the Catholic convergence story. Was any settling ancestor on that line actually Lutheran (which would route the \"how they met\" story through workplace/neighborhood rather than parish), or is the Baltic DNA an older substratum carried by an otherwise Catholic, Czech/Polish family? Church and congregation records would decide this.\n\n4. **Which industrial city — and did the Czech line follow the Czech (Midwest/Texas) or the Polish (industrial-belt) pattern?** A \"classic Czech\" line would point to Chicago/Nebraska/Texas family farming or Midwest urban settlement [S10]; a Galician-Slav pattern would point to the Pittsburgh/anthracite/meatpacking industrial belt [S13]. The line's mixed signature could fit either. The actual settlement city is the linchpin of the \"how they met\" reconstruction and is presently unknown.\n\n5. **Exact 1924 quota figures for the minor Eastern nations.** The Germany/Britain/Irish-Free-State/Italy/Poland first-year quotas are verified here [S20]; the precise allotments for **Czechoslovakia, Lithuania, Latvia, Estonia, and Russia** were not all individually confirmed and should be checked against the 1924 presidential proclamation / *Statistical Abstract of the United States* primary tables in a verification pass.\n\n6. **Return migration on the Pokorný line.** Given that ~one-third of Poles returned and \"birds of passage\" were common [S16], was the founding Pokorný immigrant a first-try permanent settler or a returner-then-stayer? Multiple manifest entries for the same individual (a known pattern) would reveal this.\n\n---\n\n## Sources\n\n1. Kerby A. Miller, *Emigrants and Exiles: Ireland and the Irish Exodus to North America* (Oxford University Press, 1985), publisher and archival listings, https://global.oup.com/academic/product/emigrants-and-exiles-9780195051872 and https://archive.org/details/emigrantsexiles00kerb_0 (accessed 2026-05-30). **Tier 2** (the foundational scholarly monograph on Irish emigration; built on c. 5,000 emigrant letters/memoirs). Used for the long-structural-exodus framing, the pre-Famine/Famine/post-Famine phasing, and the \"exile\" mentality. Lean: empathetic to the emigrant interior; not a quantitative source.\n\n2. Irish Genealogy Toolkit, \"The journey to Ellis Island,\" irish-genealogy-toolkit.com, https://www.irish-genealogy-toolkit.com/journey-to-Ellis-Island.html; GenGuide, \"Emigration Records – Those who Emigrated from Ireland,\" https://www.genguide.co.uk/source/emigration-records-ireland/; IrishCentral, \"Annie Moore, first immigrant through Ellis Island,\" https://www.irishcentral.com/roots/history/annie-moore-first-immigrant-ellis-island (all accessed 2026-05-30). **Tier 3/4** (genealogy/heritage outlets describing record systems). Used for the Castle Garden→Ellis Island transition, the 1892 boundary, \"Castle Garden lists\" fields, Annie Moore, and the >3.5 million Irish / >12 million total Ellis Island figures. *Corroborate the 3.5m Irish figure against NPS/primary statistics in a verification pass.*\n\n3. *(reserved — see S7)*\n\n4. *(reserved — see S8)*\n\n5. *(reserved)*\n\n6. The Irish Story, \"The Irish Girl and the American Letter,\" 17 Nov 2018, https://www.theirishstory.com/2018/11/17/the-irish-girl-and-the-american-letter-irish-immigrants-in-19th-century-america/; History Workshop, \"Radical Objects: Irish Women Emigrants' Letters,\" https://www.historyworkshop.org.uk/migration/irish-women-emigrants-letters/; \"The American Letter Home,\" natureattheconfluence.com (accessed 2026-05-30). **Tier 2/3** (scholarly-popular history + public-history outlets). Used for the female-dominated/single-young profile, the America/Yankee letters (2m letters/yr by 1854; 6m/yr by 1874), prepaid tickets (>40% of remittances; \"American money\" funding ~75% of emigration), and the >40%-of-NY/Boston-servants-Irish-born figure.\n\n7. Arnold Schrier, *Ireland and the American Emigration, 1850–1900* (University of Minnesota Press, 1958), as cited in S6 and standard reviews. **Tier 2** (classic scholarly monograph on remittances and the America letter). Used for the >$260 million in remittances and the centrality of prepaid tickets. *single-source for the exact dollar figure as relayed via S6; verify against the original in a verification pass.*\n\n8. IrishCentral, \"The fascinating history of Cobh,\" https://www.irishcentral.com/travel/best-of-ireland/cobh-cork-history; Emerald Heritage, \"Irish Ports of Emigration,\" https://emerald-heritage.com/blog/2017/irish-ports-of-emigration; Irish Genealogy Toolkit (as S2) (accessed 2026-05-30). **Tier 3/4** (heritage/travel + genealogy outlets). Used for Queenstown/Cobh (renamed 1849; ~2.5m of ~6m emigrants 1848–1950), the Liverpool hub with Queenstown/Londonderry calls, and crossing times (~12 weeks under sail → ~7–10 days by steam → ~5 days by 1911).\n\n9. Library of Congress, \"Joining the Workforce | Irish,\" loc.gov, https://www.loc.gov/classroom-materials/immigration/irish/joining-the-workforce/; HISTORY, \"How Stereotypes of the Irish Evolved From 'Criminals' to Cops,\" https://www.history.com/articles/how-stereotypes-of-the-irish-evolved-from-criminals-to-cops; Yale-New Haven Teachers Institute, \"Irish Immigrant Families in Mid-Late 19th Century America\" (90.05.07), https://teachersinstitute.yale.edu/curriculum/units/1990/5/90.05.07.x.html (accessed 2026-05-30). **Tier 2/3** (Library of Congress educational materials + popular history + teachers'-institute curriculum). Used for Northeast/Midwest settlement (Boston/NYC/Philadelphia/Chicago/Pittsburgh), laborer/domestic-servant entry, Irish dominance of urban police, mobility via police/fire/teaching, and the parish as community engine.\n\n10. Library of Congress Research Guides, \"Czechs in America: A Chronology,\" https://guides.loc.gov/czechs-in-america/chronology; *Encyclopedia of Cleveland History* (Case Western), \"Czechs,\" https://case.edu/ech/articles/c/czechs; Everyculture, \"Czech Americans,\" https://www.everyculture.com/multi/Bu-Dr/Czech-Americans.html; \"The Bohemian and Czech Immigration to America,\" gustavfristensky.com/immigration.html (accessed 2026-05-30). **Tier 2/3** (LoC + university encyclopedia + ethnic-encyclopedia + heritage site). Used for the Czech family-migration-intending-to-stay pattern, Midwest clustering (Chicago most populous; Cleveland/Milwaukee/St. Louis), the Moravian-via-Galveston/Texas route (Cat Spring 1847), Wisconsin/Iowa/Kansas/Nebraska colonies, and the 1990 census 52%-Midwest/10%-Northeast split.\n\n11. PolishOrigins, \"Beyond the Big Water, Part 3: The Emigration Hyenas,\" https://polishorigins.com/blog/beyond-the-big-water-part-3-the-dark-side-of-the-emigration-the-emigration-hyenas/; FamilySearch Wiki, \"Poland Emigration and Immigration,\" https://www.familysearch.org/en/wiki/Poland_Emigration_and_Immigration; \"Kingdom of Galicia and Lodomeria,\" kids.kiddle.co (accessed 2026-05-30). **Tier 3** (genealogy/heritage + encyclopedic-for-kids pointer). Used for Galician peasant emigration from the 1880s (seasonal Germany then transatlantic), shipping-agent recruitment from Bremen/Antwerp/Hamburg, the late-winter \"hungry gap\" recruiting, the 3.6m Poles 1870–1914, and Galicians ~43% of 1895–1911 Polish immigration. *Verify the 3.6m and 43% figures against scholarly demography (e.g., Morawska, Bodnar) in a verification pass.*\n\n12. FamilySearch Wiki, \"Hamburg Passenger Lists,\" https://www.familysearch.org/en/wiki/Hamburg_Passenger_Lists (accessed 2026-05-30). **Tier 2/3** (major genealogical reference on a primary record set). Used for the Hamburg lists capturing ~90% of Eastern-European emigrants 1850–1934 and for the centrality of Hamburg/Bremen as embarkation ports.\n\n13. WTTW, \"The Story of Chicago's Rise as a Distinctly Polish American City,\" https://news.wttw.com/2019/11/18/story-chicago-s-rise-distinctly-polish-american-city; Encyclopedia of Chicago, \"Poles,\" http://www.encyclopedia.chicagohistory.org/pages/982.html; \"From Poland to America,\" twoflags.com/blogs/news/from-poland-to-america-exploring-the-polish-american-experience (accessed 2026-05-30). **Tier 2/3** (public broadcaster + scholarly local encyclopedia + heritage outlet). Used for the za chlebem (\"for bread\") migration, Polish concentration in mining/meatpacking/steel/construction/heavy industry, \"Polonia\" clustering (>90%), Chicago as the largest Polonia, and St. Stanislaus Kostka (1867) as the formative national parish.\n\n14. VilNews, \"Hordes of Lithuanians came to Pennsylvania to work in coal,\" https://vilnews.com/2012-04-12858, and \"Lithuanian emigration to USA,\" https://vilnews.com/2010-08-lithuanian-emigration-to-the-united-states; True Lithuania, \"First wave of Lithuanian emigration (1865–1915),\" https://www.truelithuania.com/first-wave-of-lithuanian-emigration-1865-1915-10260; Everyculture, \"Latvian Americans,\" https://www.everyculture.com/multi/Ha-La/Latvian-Americans.html; Wikipedia-cited summaries for Estonian-American Lutheran congregations (accessed 2026-05-30). **Tier 3/4** (diaspora-heritage outlets). Used for Lithuanian emigration drivers (Russification, conscription, poverty), ~90,000 Lithuanians in PA coal by 1915, Lithuanian Catholic national parishes, and the Latvian/Estonian young-single-men-dodging-the-draft profile with Baltic *Lutheran* congregations (Boston 1891; Philadelphia St. John's 1893). *Heritage-outlet sourcing; corroborate figures against scholarly Baltic-American studies in a verification pass.*\n\n15. RoamYourRoots, \"Researching your Polish Ancestors at Ellis Island,\" https://www.roamyourroots.com/blog/researching-your-polish-ancestors-at-ellis-island; HISTORY, \"How the Immigrants Who Came to Ellis Island in 1907 Compare to Arrivals Today,\" https://www.history.com/articles/ellis-island-immigrants-compare-today-study (accessed 2026-05-30). **Tier 2/3** (genealogy practitioner + popular history reporting on a scholarly study). Used for the imperial-label recording problem (Galicia→\"Austria\"/\"Galicia\" pre-1920, \"Poland\" after; Russian-partition→\"Russia\"), the 1907 shares (Russia 19%, Austria 15%), and the \"last residence ≠ birthplace\" caveat. **Directly underpins the Czech-surname-vs-Galician-DNA knot.**\n\n16. PressBooks (Utah Ed. Network), \"Poles – Who Are We?,\" https://uen.pressbooks.pub/exploringamericanidentities/chapter/poles/; Family Tree Magazine, \"Czech and Slovak Immigration Patterns,\" https://familytreemagazine.com/premium/heritage/czech/czech-and-slovak-immigration-patterns/ (accessed 2026-05-30). **Tier 2/3** (educational pressbook + genealogy magazine). Used for ~one-third Polish return migration, the German-Pole-as-family-settler vs. later Austrian/Russian-Pole-as-sojourner contrast, and the \"birds of passage\" (returning several times before settling) pattern.\n\n17. John Bodnar, *The Transplanted: A History of Immigrants in Urban America* (Indiana University Press, 1985), https://books.google.com/books/about/The_Transplanted.html?id=gsftAAAAMAAJ and AHR review, https://academic.oup.com/ahr/article-abstract/92/1/220/79710; Ewa Morawska, *For Bread with Butter: The Life-Worlds of East Central Europeans in Johnstown, Pennsylvania, 1890–1940* (Cambridge University Press, 1985). **Tier 2** (the two standard scholarly monographs on East-Central-European industrial immigration). Used for the capitalism-response framing of \"transplantation,\" the immigrant family/parish/fraternal-order/labor world, and the mill-town life-world of the Slavic industrial wave. Cited as authority; not directly quoted for figures here. *Consult directly in a verification pass for hard numbers.*\n\n18. U.S. Department of State, Office of the Historian, \"The Immigration Act of 1924 (The Johnson–Reed Act),\" history.state.gov, https://history.state.gov/milestones/1921-1936/immigration-act (accessed 2026-05-30). **Tier 1/2** (official U.S. government history). Used for the 2%-of-1890-census formula, the 1921 Emergency Quota Act predecessor (3% of 1910 census; ~350,000 visas), the base-year shift 1910→1890, the Asian-exclusion provision, and the statement that \"Eastern and southern Europeans were most severely affected.\"\n\n19. ImmigrationHistory.org (Immigration and Ethnic History Society), \"Immigration Act of 1924 (Johnson–Reed Act),\" https://immigrationhistory.org/item/1924-immigration-act-johnson-reed-act/; History.house.gov, \"The Immigration Act of 1924,\" https://history.house.gov/Historical-Highlights/1901-1950/The-Immigration-Act-of-1924/ (accessed 2026-05-30). **Tier 1/2** (scholarly society + official House history). Used for the 150,000 annual ceiling, the 1890-census legislative text (2%, min. 100), the 1927/1929 national-origins effective date, the \"remote control\" consular-visa enforcement, and the eugenic intent to favor \"the stock which originally settled this country.\"\n\n20. Calvin Coolidge Foundation, \"Proclamation, June 30, 1924,\" https://coolidgefoundation.org/resources/proclamation-june-30-1924/ (the presidential proclamation of the first-year quotas); first-year quota figures as relayed in standard summaries (Germany 51,227; Great Britain & Northern Ireland 34,007; Irish Free State 28,567; Italy 3,845; Poland 6,524). **Tier 1** (primary proclamation) **+ Tier 3** (relayed numeric summaries). Used for the Northwest-vs-Southeast-European quota asymmetry and the Irish-Free-State-≈-4-to-7×-Polish-quota contrast. *The minor-nation figures (Czechoslovakia, Lithuania, Latvia, Estonia, Russia) were not all individually confirmed; verify against the proclamation PDF / Statistical Abstract — see Open Question 5.*\n\n21. Ruby Jo Reeves Kennedy, \"Single or Triple Melting-Pot? Intermarriage Trends in New Haven, 1870–1940,\" *American Journal of Sociology* (1944), as discussed in *Triple Melting Pot* (ResearchGate/Wiley reference works), https://onlinelibrary.wiley.com/doi/abs/10.1002/9781118663202.wberen693; Will Herberg, *Protestant–Catholic–Jew: An Essay in American Religious Sociology* (1955), discussed at Commentary, https://www.commentary.org/articles/will-herberg/the-triple-melting-pot/ and First Things, https://www.firstthings.com/article/2006/01/protestant-catholic-jewthen-and-now (accessed 2026-05-30). **Tier 2** (foundational sociology + reference-work and journal-of-record discussion). Used for the triple-melting-pot finding (9,044 New Haven marriages 1870–1940; by 1940 Catholics married Catholics ~85%, Protestants ~80%, Jews ~94%) and Herberg's religion-replaces-ethnicity thesis. **Core support for the \"how they met\" inference.**\n\n22. Richard Alba, *Ethnic Identity: The Transformation of White America* (and \"The Twilight of Ethnicity among Americans of European Ancestry\"), and \"Beyond the Melting Pot,\" *City & Community* (2019), https://journals.sagepub.com/doi/abs/10.1111/cico.12404; Mary C. Waters, *Ethnic Options: Choosing Identities in America* (University of California Press, 1990). **Tier 2** (leading scholarship on white-ethnic assimilation and symbolic ethnicity). Used for the later-stage convergence of European-origin whites and the \"symbolic/optional\" character of third-plus-generation European ethnicity. **Supports the \"how they met\" inference as the documented endpoint of white-ethnic Catholic intermarriage.**"}, {"order": 5, "file": "05_Surnames_Collins_And_Pokorny.md", "title": "The Surnames: Collins and Pokorný", "summary": "", "body": "# The Surnames: Collins and Pokorný\n\n## Bottom Line\n\nThe two family surnames are the firmest documentary anchors in this corpus, because a surname is a written record — it can be traced in dictionaries, valuation rolls, and birth registers in a way that a DNA percentage cannot. Both names tell a clean, congruent story when read against the autosomal admixture.\n\n**Collins** is, on this line, the anglicization of the Gaelic **Ó Coileáin** (\"descendant of Coileán,\" *coileán* = a whelp, young dog, or by extension a young warrior), a Munster sept that originated in north Munster — the baronies of Connello in modern County Limerick — and was driven south into West Cork by the Anglo-Norman Geraldines (FitzGeralds) in the thirteenth century, where it merged in territory and in spelling with the distinct **Ó Cuiléin** sept of the Corca Laoidhe already settled there [1][2][8]. The crucial caveat is that \"Collins\" is *also* a very common **English** surname — a patronymic from *Colin*, a medieval diminutive of *Nicholas* — so the name alone proves nothing [3][7]. What disambiguates it here is the distribution evidence: Collins is concentrated in Cork and Munster in every Irish source (Matheson's 1890 register, Forebears density, MacLysaght), and the subject's Irish DNA is itself Munster-weighted (Munster 29%) [4][5][6]. Surname and genome point to the same corner of Ireland — the Gaelic Ó Coileáin reading is the strongly favored one.\n\n**Pokorný** is a Czech/West-Slavic descriptive (nickname) surname from the adjective *pokorný* \"humble, meek, submissive,\" from the noun *pokora* \"humility\" — a name given to a person of modest or deferential bearing, with the pious overtone the word carried in medieval Christian society [9][10][11]. It is overwhelmingly **Czech**: roughly the 20th–24th most common surname in Czechia (~11,000 bearers, ~96% of all accented-spelling bearers worldwide), concentrated in Central Bohemia, South Moravia, and Prague, with secondary Slovak, Polish (*Pokorny*), Germanized (*Pokorny/Pokornig*), Hungarian (*Pokorni*), and Ashkenazi-Jewish branches out of Bohemia and Poland [12][13][14]. Reconciling a *Czech* surname with a *\"Southern Poland\"* DNA label is not a contradiction: Ancestry's \"Southern Poland\" region is a broad Habsburg-borderland cluster that bleeds across Moravia, Silesia, and Galicia, and a Pokorný line from the Moravian–Silesian–Polish marches would plausibly read as \"Southern Poland\" in the admixture model [12].\n\nThe governing methodological point, made explicit throughout: **a surname is a single patrilineal thread.** Collins traces *one* of the subject's many ancestral lines (the father's father's … father); Pokorný traces another. The DNA estimate, by contrast, is the *blend* of all lines — hundreds of ancestors per generation back. The two surnames anchor two branches; they do not, and cannot, account for the Estonia/Latvia, Lithuania, Donegal, or Connacht signatures, which descend through *un-surnamed* maternal and collateral lines. This document treats the names as evidence for their own branches, not as proxies for the whole pedigree.\n\n---\n\n## What the Evidence Establishes\n\nOn a Munster-weighted Irish line, Collins is best read as the anglicization of the Gaelic Ó Coileáin (\"descendant of Coileán,\" *coileán* meaning a whelp, young dog, or by extension a young warrior), a sept that originated in north Munster — the Connello baronies of Co. Limerick, where they were \"lords of the baronies of Connello\" — and was driven south into West Cork by the Anglo-Norman Geraldines (FitzGeralds) in the thirteenth century, settling near their kinsmen the O'Donovans; MacLysaght's *The Surnames of Ireland* and *Irish Families* treat Ó Coileáin as the principal Gaelic source of Collins and fix its later homeland in West Cork, and the displacement matches the broader Geraldine/MacCarthy push into West Cork and Kerry after the Norman invasion (corpus doc 01, Claim 1.1) [1][2][6][8]. The sept etymology and migration are firmly established; the connection to this individual's line rests on surname plus Munster-weighted DNA correlation rather than a documented pedigree. A second, distinct Gaelic sept — Ó Cuiléin (also Ó Cuilleáin), anglicized Collins, of the Corca Laoidhe, the pre-Eóganacht population group of southwest Cork — was already settled in West Cork when the Ó Coileáin arrived, so the modern West Cork \"Collins\" population descends from at least two originally separate Gaelic lines that converged on one anglicized spelling [1][8]. Collins is, moreover, also a common English surname of entirely separate origin — a patronymic from *Colin*, a medieval diminutive of *Nicholas* (Greek *Nikolaos*, \"victory of the people\") — so the name alone does not establish Irish ancestry; Forebears records Collins as the 57th-commonest surname in England (82,788 bearers), reflecting that large native-English stock [3][4][7].\n\nWhat disambiguates the name here is distribution, and it points consistently southwest to Cork and Munster. Matheson's *Special Report on Surnames in Ireland*, compiled from the 1890 birth registers, lists Collins as the 30th principal surname in Ireland, with an estimated 15,700 persons in 1890, its registrations principally in Munster with Cork the leading county; Forebears records 17,231 Collins in Ireland at a density of 1 in 273 — the 26th-commonest surname in the country and the highest density of any country, despite the United States holding far higher absolute numbers (419,079) [4][5]. (A precise county-level Forebears breakdown was not separately retrieved, so the Munster/Cork concentration rests on Matheson and MacLysaght.) Read against the genome, this congruence strengthens the Gaelic reading: the subject's Irish admixture is Munster 29%, Leinster 8%, Donegal 7%, Connacht 6%, its single largest component Munster, the province containing Cork — exactly where both Gaelic Collins septs consolidated — making the Ó Coileáin reading the strongly favored one over the English patronymic, though this is correlation rather than a parish-register pedigree. The West Cork concentration is illustrated above all by Michael Collins (1890–1922), the revolutionary leader born 16 October 1890 at Woodfield, Sam's Cross, near Rosscarbery and Clonakilty in West Cork — the youngest of eight, later IRA Director of Intelligence, Minister for Finance, Chairman of the Provisional Government, and Commander-in-Chief of the National Army, killed in an ambush on 22 August 1922 — whose birthplace sits squarely in the sept heartland [15]. (By contrast, the Apollo 11 Command Module pilot Michael Collins, 1930–2021, was born in Rome to a U.S. Army family; the sources confirm his biography but did not substantiate a Cork-ancestry claim, which is therefore not asserted here [16].)\n\nThe Central-European surname tells an equally clean story. Pokorný is a Czech/West-Slavic descriptive (nickname) surname from the adjective *pokorný* \"humble, meek, submissive,\" derived from the noun *pokora* \"humility\" (Behind the Name traces the deeper Slavic root to *pokorĭnŭ*) — applied to a person of modest or deferential bearing, with the positive, pious medieval-Christian connotation the word carried, and arising in medieval Bohemia and Moravia with attestation reported as early as the fifteenth century [9][10][11]. It is overwhelmingly Czech: Forebears records 11,039 Pokorný in Czechia (1 in 963), ranked 24th in the country, out of about 11,428 worldwide for the accented spelling — roughly 96.6% of all bearers — concentrated in the Central Bohemian Region (~19%), South Moravian Region (~17%), and Prague (~13%), with Czech surname-statistics summaries placing it around 20th nationally (~11,150 bearers) and Slovakia a distant second (385; 1 in 13,861) [12][13]. Beyond the Czech core, the unaccented spelling Pokorny is the Germanized/diaspora form, concentrated in the former Habsburg lands and the emigrant world: of about 9,663 worldwide, Forebears records the United States (4,001), Austria (2,389; 1 in 3,564, the highest density), Germany (1,649), Poland (383), Hungary (232), Canada (168), and Czechia (147), with Polish *Pokorny*, Hungarian *Pokorni*, and Ashkenazi-Jewish bearers out of Bohemia and Poland as documented variant branches [9][14].\n\nA Czech surname is fully reconcilable with the subject's \"Southern Poland\" DNA region, because autosomal regions are statistical clusters of reference panels rather than modern political borders: the historic Moravia–Silesia–Galicia borderland is genetically continuous, the algorithm routinely splits or relabels that continuum, and under the porous Habsburg administration Czech, Silesian, Polish, and Galician populations intermixed, so a Pokorný line from the Moravian–Silesian–Polish marches would plausibly resolve to \"Southern Poland\" while the surname tags the line's language and culture as Czech — the same borderland seen from two angles [12]. The mechanism is well established; the specific routing of this line through that borderland is inferential. Pokorny families reached the United States within the broader Czech (and Polish) emigration of roughly 1848–1914, settling especially in the rural Midwest and Plains and in industrial cities: pre–Civil War Czech immigrants were farmers who settled in Iowa, Illinois, Texas, Wisconsin, Nebraska, and the Dakotas, with major urban communities in Cleveland; Nebraska drew about 50,000 Czech immigrants between 1856 and WWI (the highest per-capita Czech population of any state), and by 1900 there were about 199,939 American-born Czechs against about 156,640 European-born [17][18]. The surname Pokorny appears in databases of Czech immigrants to the US, but a specific family's route is not established by the sources consulted here.\n\nThe governing methodological point holds throughout: a surname is a single patrilineal thread, while the DNA estimate is the blend of all threads. A hereditary surname follows one unbroken male line — going back *n* generations a person has up to 2ⁿ ancestors but typically only one surname carried straight down each patriline — whereas autosomal DNA is inherited (roughly 50% recombined) from both parents each generation, so an admixture estimate is a weighted average of every ancestral line. Collins therefore anchors one branch (the father's-father's line) and Pokorný another; neither accounts for the Estonia & Latvia 9%, Lithuania 3%, Western Ukraine 4%, NE Poland 2%, Donegal, or Connacht signatures, which descend through un-surnamed maternal and collateral lines. Surname congruence supports, but never exhausts, the admixture.\n\n---\n\n## COLLINS — The Irish Line (Ó Coileáin / Ó Cuiléin)\n\n### Etymology and the two-origin problem\n\nThe surname Collins sits on a fault line that every honest onomastic treatment has to name at the
