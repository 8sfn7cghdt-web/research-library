 that \"the few Wise will have, by one method or another, to take command of the innumerable Foolish\" during \"a period of rampant democracy\" [6] — but their aggression alienated readers, so Carlyle turned to history to teach the same doctrine by example. He \"felt himself to be a prophet, in the midst of an untoward generation,\" delivering \"a message of good to a world sorely in need of them\" [6, quoting Stanley's funeral eulogy]. (Stewart's framing.)\n\nJustice in history, lastly, is the realised form of the \"Reality we love\": not abstract law but a quality acted out in the world, which Carlyle defines most plainly through the father. Of Friedrich Wilhelm I he writes that \"the genus sham was never hatefuler to any man,\" that \"there is a divine idea of fact put into him,\" and then makes the equation the whole book turns on: \"A just man, too; would not wrong any man, nor play false in word or deed to any man. What is Justice but another form of the REALITY we love; a truth acted out?\" [3]. Justice, on this reading, is not mercy or fairness in the liberal sense but fidelity to fact — the refusal to \"play false.\" This is why Carlyle can call Frederick's intellect a \"very unusual VERACITY of intellect, as we define it,—which quality, indeed, is the summary and victorious outcome of all manner of good qualities, and faithful performances, in a man\" [5]. Veracity is the master-virtue from which all others descend; justice in history is veracity made visible over time. (Primary text.)\n\n## Hero-Worship and the Great-Man Theory\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 444\" role=\"img\" aria-label=\"A polarity diagram of Carlyle's moral cosmology. On the left, a dark panel headed SHAM, the swindler-century, lists the capitalized negative Powers: Sham, Hypocrisy, Cant, Phantasm, Chaos, Mendacity, Play-actorisms. On the right, a Prussian-blue panel headed REALITY, the Eternal Veracities, lists the positive Powers: Reality, Veracity, Fact, Eternal Destinies, Justice, the disciplined Fire-element, Work. Between them, straddling a vertical quarry-seam, a medallion holds FRIEDRICH, a single Reality quarried out of the century toward the side of the Veracities, marked by a lightning spark.\">\n<text x=\"350\" y=\"32\" text-anchor=\"middle\" font-size=\"15\" class=\"t-serif\" letter-spacing=\"3\">SHAM &#183; versus &#183; REALITY<\/text>\n<text x=\"350\" y=\"51\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">&#8220;How show the man, who is a Reality &#8230; yet keep his Century, as a Hypocrisy worthy of being hidden?&#8221;<\/text>\n<line x1=\"150\" y1=\"62\" x2=\"550\" y2=\"62\" class=\"ln\" stroke-width=\"1.5\"/>\n<line x1=\"150\" y1=\"65\" x2=\"550\" y2=\"65\" class=\"ln-soft\" stroke-width=\"0.8\"/>\n<rect x=\"55\" y=\"92\" width=\"243\" height=\"252\" rx=\"2\" class=\"f-panel\" stroke-width=\"1.2\" style=\"stroke:var(--border)\"/>\n<rect x=\"55\" y=\"92\" width=\"243\" height=\"30\" rx=\"2\" class=\"f-t1\"/>\n<text x=\"176\" y=\"112\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\" style=\"fill:var(--bg)\" letter-spacing=\"1\">SHAM<\/text>\n<text x=\"176\" y=\"138\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-muted\" font-style=\"italic\">the &#8220;swindler-century&#8221; &#183; the formless Horse-deluge<\/text>\n<text x=\"176\" y=\"168\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\">Hypocrisy<\/text>\n<text x=\"176\" y=\"196\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\">Cant<\/text>\n<text x=\"176\" y=\"224\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\">Phantasm<\/text>\n<text x=\"176\" y=\"252\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\">Chaos<\/text>\n<text x=\"176\" y=\"280\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\">Mendacity<\/text>\n<text x=\"176\" y=\"308\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" style=\"fill:var(--t3)\">Play-actorisms<\/text>\n<text x=\"176\" y=\"334\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-muted\" font-style=\"italic\">redeemed only by &#8220;that grand universal Suicide&#8221;<\/text>\n<rect x=\"402\" y=\"92\" width=\"243\" height=\"252\" rx=\"2\" class=\"f-panel\" stroke-width=\"1.2\" style=\"stroke:var(--border)\"/>\n<rect x=\"402\" y=\"92\" width=\"243\" height=\"30\" rx=\"2\" class=\"f-t2\"/>\n<text x=\"523\" y=\"112\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"bold\" style=\"fill:var(--bg)\" letter-spacing=\"1\">REALITY<\/text>\n<text x=\"523\" y=\"138\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-muted\" font-style=\"italic\">the Eternal Veracities &#183; the disciplined Fire-element<\/text>\n<text x=\"523\" y=\"168\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" style=\"fill:var(--t2)\">Veracity<\/text>\n<text x=\"523\" y=\"196\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" style=\"fill:var(--t2)\">Fact<\/text>\n<text x=\"523\" y=\"224\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" style=\"fill:var(--t2)\">Eternal Destinies<\/text>\n<text x=\"523\" y=\"252\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" style=\"fill:var(--t2)\">Justice<\/text>\n<text x=\"523\" y=\"280\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" style=\"fill:var(--t2)\">Work<\/text>\n<text x=\"523\" y=\"308\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" style=\"fill:var(--t5)\">Fire-element<\/text>\n<text x=\"523\" y=\"334\" text-anchor=\"middle\" font-size=\"9.5\" class=\"t-muted\" font-style=\"italic\">&#8220;a Veracity in Things, a Mendacity in Sham-Things&#8221;<\/text>\n<line x1=\"350\" y1=\"92\" x2=\"350\" y2=\"344\" class=\"ln-soft\" stroke-width=\"1\" stroke-dasharray=\"2 4\"/>\n<circle cx=\"350\" cy=\"214\" r=\"56\" class=\"f-bg\"/>\n<circle cx=\"350\" cy=\"214\" r=\"56\" fill=\"none\" style=\"stroke:var(--accent)\" stroke-width=\"2.5\"/>\n<polyline points=\"354,182 343,210 352,210 346,238\" fill=\"none\" class=\"s-t5\" stroke-width=\"2.5\"/>\n<text x=\"350\" y=\"207\" text-anchor=\"middle\" font-size=\"11.5\" font-weight=\"bold\" letter-spacing=\"1\">FRIEDRICH<\/text>\n<text x=\"350\" y=\"224\" text-anchor=\"middle\" font-size=\"9\" class=\"t-muted\" font-style=\"italic\">a Reality<\/text>\n<path d=\"M330,290 C 338,304 362,304 370,290\" fill=\"none\" style=\"stroke:var(--accent)\" stroke-width=\"1.6\"/>\n<polygon points=\"366,286 374,292 366,297\" style=\"fill:var(--accent)\"/>\n<text x=\"350\" y=\"320\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-acc\" font-style=\"italic\">quarried out<\/text>\n<text x=\"350\" y=\"378\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-serif\">&#8220;managed not to be a Liar and Charlatan as his Century was&#8221;<\/text>\n<line x1=\"60\" y1=\"400\" x2=\"640\" y2=\"400\" class=\"ln-soft\" stroke-width=\"1\"/>\n<text x=\"350\" y=\"424\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\" font-style=\"italic\">The capitalized words are not ornament but a two-Power cosmos &#8212; and the whole book is one act of extraction.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 1.<\/strong> Carlyle&#8217;s capitalized abstractions are a working moral cosmology, not Victorian emphasis: every term sorts into one of two Powers, Sham or Reality, and the book&#8217;s animating labour is to <em>quarry a single Reality<\/em> &#8212; Friedrich, who &#8220;managed not to be a Liar and Charlatan as his Century was&#8221; &#8212; out of a &#8220;swindler-century&#8221; it otherwise consigns to the dark.<\/figcaption>\n<\/figure>\n\n\nThe *History of Friedrich II* is the practical application of the doctrine Carlyle had announced in *On Heroes, Hero-Worship, and the Heroic in History* (1841). The 1841 lectures supply the bald premise — \"Universal History, the history of what man has accomplished in this world, is at bottom the History of the Great Men who have worked here\" [7] — and the *Frederick* is a thousand pages of that premise worked out in a single life. The continuity is total at the level of theory; what changed across the twenty intervening years is the *kind* of hero the theory now demands.\n\nHochstrasser's LSE working paper supplies the cleanest statement of the trajectory. In the 1820s, Carlyle's hero was the man of letters as prophet: \"Fichte was invoked to provide an idea of the man of letters who could act as the prophet of a transcendental order. Goethe then is interpreted as the embodiment of how this is to be done, and becomes Carlyle's own model\" [2]. The hero in this phase is a teacher; he persuades. But Carlyle's reading of his own century convinced him that persuasion had failed, that \"the despotic monarch is alone considered sufficient to oppose democracy, industrialisation and liberal cant\" [2]. Hence the famous formulation: the hero \"turns from the literary (Goethe) to the political despot who compels rather than persuades\" [2]. The 1841 hero, the Poet and the Prophet, has by 1858 become the King — and not the constitutional king but the absolute one, the man who can \"command and re-direct the 'signs of the times'\" [2].\n\nThis is the ideological core of the book, and its consequence must be stated plainly. The earlier hero, Goethe, acts on the world through art and example, leaving the reader free; the later hero, Frederick, acts on the world through command, and the freedom of the governed is precisely what he overrides — for their good, in Carlyle's reckoning. The great-man theory in *Frederick* is therefore not merely a theory of historical causation (that great men make history) but a normative politics: that the great man *should* rule, and that being ruled by him is the natural and healthy condition of a people. *On Heroes* had already made hero-worship a duty rather than an option — \"Worship of a Hero is transcendent admiration of a Great Man\" [7] — and had grounded the hero's authority in the same virtue the *Frederick* will isolate: \"Sincerity, a deep, great, genuine sincerity, is the first characteristic of all men in any way heroic\" [7].\n\nThe text's own portrait of the hero is, characteristically, deflationary in its surface and exalted in its claim. The opening sentence of the narrative proper introduces not a demigod but a man \"sauntering on the terraces of Sans Souci... a highly interesting lean little old man, of alert though slightly stooping figure; whose name among strangers was King FRIEDRICH THE SECOND, or Frederick the Great of Prussia, and at home among the common people, who much loved and esteemed him, was VATER FRITZ,—Father Fred\" [1]. The diminutive is deliberate, and it carries the whole great-man theory in miniature. The hero is \"lean,\" \"little,\" \"old,\" \"stooping\" — no idol, no statue — and yet \"much loved and esteemed\" by the people who knew him, and so a King \"every inch of him, though without the trappings of a King\" [1]. The heroism is located not in grandeur but in *veracity*: the hero is the one who \"always means what he speaks\" [1]. In an age Carlyle regards as built of cant, the rare phenomenon of a man with \"nothing whatever of the Hypocrite or Phantasm\" [1] is itself the heroic thing. The reader should also notice the move the name \"VATER FRITZ\" performs: before any battle is fought, the hero is introduced as a *father*, which is exactly the figure the family-romance reading will find at the book's psychological centre.\n\n## The Despot Against the Age: Democracy, Industrialisation, and \"Cant\"\n\nCarlyle's hostility to his own century is the negative space that makes Frederick necessary. The Eighteenth Century is for him a moral bankruptcy, and the nineteenth, with its parliamentary \"talk,\" its Mammon-worship, and its \"rampant democracy\" [6], is its heir. The *Latter-Day Pamphlets* had said this directly and offensively; *Frederick* says it by displacement, holding up a working monarchy as the standing rebuke to the democratic faith. Carlyle frames the democratic creed sardonically — the notion that there are to be \"no Kings of any sort, no Government more,\" that the \"New Era\" has dawned — and then detonates it with a single clause: \"Which is a very wonderful notion; important if true; perhaps still more important, just at present, if untrue!\" [1]. The sarcasm carries the whole politics. Carlyle's wager is that the democratic notion is untrue, and that Frederick — offered, he says with deliberate gloom, as \"this Last of the Kings\" — is set before the reader as \"an exemplar to my contemporaries,\" though \"My hopes of presenting, in this Last of the Kings, an exemplar to my contemporaries, I confess, are not high\" [1]. The elegiac note is essential: Frederick is not a programme that can be enacted but a vanished standard against which the present is to feel its own smallness.\n\nThe contempt for \"cant\" — Carlyle's word for hollow profession, the speech that does not correspond to fact — is the connective tissue between the political and the metaphysical. Cant is the social form of the lie, and lying is what the universe forbids. Parliamentary debate, philosophical scepticism, and the polished correspondence of the philosophes are all, in this scheme, varieties of cant: speech proliferating where action and silence are wanted. This is why the silent man of work is the hero and the eloquent man of letters is the suspect. The \"Tobacco-Parliament\" of Friedrich Wilhelm — a smoking-room, not a debating chamber — is held up against the \"speech-making parliaments\" [4] as the better model of how serious men confer: men who smoke and decide rather than orate and adjourn.\n\nIt must be recorded as the cost of this ideology that Carlyle's revulsion at \"cant\" and his appetite for the strong commanding hand are continuous with the authoritarian and racial pronouncements of his late prose (the *Latter-Day Pamphlets* and the notorious \"Occasional Discourse on the Negro Question\"). The *Frederick* itself supplies the underlying contempt for political equality in unguarded asides — the complaint, in the volume on Friedrich Wilhelm I, that under the modern dispensation \"your lowest blockhead and scoundrel... shall have perfect freedom to spit in the face of your highest sage and hero\" [3]. The same machinery that makes Frederick admirable — the wise few taking \"command of the innumerable Foolish\" [6] — is the machinery that, elsewhere in Carlyle, licences contempt for the governed. The *Frederick* is the most disciplined and historically anchored statement of this politics, which is exactly what makes it the most seductive and the most worth reading critically.\n\n## Work, Action, and the Suspicion of Letters\n\nThe gospel of work is the bridge that carries Carlyle's argument from the metaphysics of 1843 into the biography of 1858. *Past and Present* had laid the theology of labour down in its baldest form. The chapter titled simply \"Labour\" opens: \"For there is a perennial nobleness, and even sacredness, in Work. Were he never so benighted, forgetful of his high calling, there is always hope in a man that actually and earnestly works: in Idleness alone is there perpetual despair\" [8]. A few lines on it states the equation outright — \"Labour is Life: from the inmost heart of the Worker rises his god-given Force, the sacred celestial Life-essence breathed into him by Almighty God\" [8] — and ties working to truth itself: \"Properly thou hast no other knowledge but what thou hast got by working\" [8]. This is the doctrine that governs the entire valuation of Frederick the writer versus Frederick the doer.\n\nFrederick wrote constantly and, by Carlyle's lights, mostly badly; the single exception is telling. Vanden Bossche: \"the only work of all Frederick's writings that Carlyle regards as having any merit is his *Art of War*\" [4], and he is a hero \"precisely because he is the one man of action in a 'Writing Era'\" [4]. The *Art of War* qualifies because it is not really \"letters\" at all but the codification of action — the residue of doing rather than a substitute for it. Carlyle's own praise of military art makes the same distinction: a true \"Art of War, grounded on veracity and human courage and insight\" [1] is opposed to the \"Drawcansir rodomontade\" and \"unlimited expenditure of men and gunpowder\" [1] of Napoleonic show. The comparison with Napoleon is the proof-text: Napoleon could \"overrun Europe for a time,\" but the harder, truer feat was to have \"defended a little Prussia against all Europe, year after year for seven years\" [1] — endurance under pressure, not spectacle, is what \"real work\" looks like in the field, and Leuthen \"may very well hold up its head beside any victory gained by Napoleon\" [1].\n\nThe same theology of labour produces the book's most surprising tribute, which is paid not to the warrior-son but to the drudging father. Carlyle is \"tempted to call Friedrich Wilhelm a man of genius;—genius fated and promoted to work in National Husbandry, not in writing Verses or three-volume Novels. A silent genius\" [3]. The phrase is precisely calibrated against the *Past and Present* gospel: genius here is not eloquence but husbandry, the unglamorous administrative labour of draining marshes, drilling regiments, and filling a treasury. Friedrich Wilhelm's \"melodious stanza, which he cannot bear to see halt in any syllable, is a rough fact reduced to order; fact made to stand firm on its feet, with the world-rocks under it\" [3]. The metaphor is exact and revealing: the king's *poem* is his kingdom; his *art* is the army; his stanza is a fact \"made to stand firm on its feet.\" Letters are redeemed only by being converted wholly into deeds.\n\nThis valuation explains Carlyle's withering treatment of the historians on whom he depended. The \"Prussian Dryasdust\" is the anti-hero of the research, the man who substitutes accumulation for insight, who produces \"Books born mostly of Chaos\" that \"are a painful object\" [1], where \"the noteworthy Dead is sure to be found lying under infinite dung, no end of calumnies and stupidities\" [1]. Carlyle's complaint is not against scholarship but against scholarship that does not *act* on its materials, that buries the living fact instead of disinterring it. The same contempt for \"Dilettantism\" — the amateur's dabbling, the connoisseur's talk — runs through the book as the cultural counterpart of political cant: in both, profession outruns performance. The historian, like the parliamentarian and the philosophe, sins by talking where he ought to do.\n\n## Divine Order, the Eternal Veracities, and Justice in History\n\nBeneath the politics lies a theology — heterodox, post-Christian, but unmistakably providential. Carlyle had abandoned his family's Calvinism but kept its moral architecture: a universe under law, in which the law eventually vindicates itself. In *Frederick* this becomes the doctrine of the \"Eternal Veracities.\" History is the slow operation of a justice that cannot be cheated: \"Lying is not permitted in this Universe. The wages of lying, you behold, are death\" [1]. The French Revolution itself, for all its horror, is read as this justice in action — \"that grand universal Suicide\" [1] by which a century of falsity executed itself. The hero's role is to align himself with this order: Frederick is great because he \"honestly recognized said facts wherever they disclosed themselves\" [1] and grounds his actions \"on what he recognizes for the truth\" [1]. The facts are God's facts; to obey them is righteousness; to defy them is the \"damnation\" the universe metes out automatically.\n\nWhat keeps this from being mere fatalism is Carlyle's insistence that the moral order is something *done* as well as something suffered. Justice is not a verdict pronounced from outside history but, as Carlyle defines it through the father, \"another form of the REALITY we love; a truth acted out\" [3]. The just man — and Friedrich Wilhelm is the book's purest specimen — is the one in whom \"there is a divine idea of fact put into him\" and to whom \"the genus sham was never hatefuler\" [3]. The hero does not merely perceive the Eternal Veracities; he embodies and enforces them, and his veracity is \"the summary and victorious outcome of all manner of good qualities, and faithful performances, in a man\" [5]. History's justice is therefore collaborative: the cosmos forbids the lie, and the hero is the instrument through which that prohibition is carried out in time. And what survives the carrying-out is only the true: \"Only what of the Past was TRUE will come back to us. That is the one ASBESTOS which survives all fire\" [1].\n\nThis is why Carlyle can be at once a worshipper of force and a moralist. Force, in his theology, is not arbitrary; it is the visible edge of the moral order. The strong man triumphs because — and only insofar as — he is on the side of the \"truth of things.\" The argument is circular, and at its worst it is a sanctification of whatever wins; but it is sincerely meant as the opposite of cynicism. Carlyle believed he was describing a cosmos in which might follows right, not one in which right is merely the name we give to might. The danger, which the twentieth century would expose more cruelly than Carlyle could foresee, is that the two propositions are indistinguishable from the inside: a doctrine that the victorious are vindicated by their victory cannot, in practice, tell the just conqueror from the merely successful one.\n\n## The Family Romance: Fathers, Sons, and Authority\n\nChris Vanden Bossche's *Carlyle and the Search for Authority* (1991) supplies the reading that ties the personal to the ideological. His thesis is that all Carlyle's work is a \"search for a new center of social and political authority,\" and that *Frederick* stages this search as a father-son drama. The mapping is explicit: \"the triad of son, father, and godfather — Carlyle, James Carlyle, and Goethe — this time becomes Frederick, Friedrich Wilhelm, and Voltaire\" [4]. The young Frederick, like the young Carlyle, is drawn to the brilliant \"intellectual father\" (Voltaire / Goethe), to French letters, scepticism, and the \"Athenian\" life of art; the painful maturation is the return to the harsh, \"Spartan,\" Lutheran, German father (Friedrich Wilhelm / James Carlyle), whose authority is grounded in work and command rather than talk [4].\n\nThe crucial point of Vanden Bossche's reading is that the resolution is conservative rather than rebellious. \"Frederick cannot obtain authority through rebellion but only through submitting to the law as laid down by his father\" [4]; the son becomes a true authority not by overthrowing the paternal principle but by internalising it, until he is \"performing his duties like 'Papa's second self'\" [4] and, \"now truly become his father's 'second self,' banishes Voltaire's French frivolity from his court\" [4]. The whole arc is a conversion narrative in the grammar of authority: the seductive father of *letters* is renounced for the stern father of *work*, and the son's freedom is found precisely in submission. Vanden Bossche names the lesson in Carlyle's own phrase: \"It is not by imitating Voltaire, the author of farces, that Frederick becomes 'Vater Fritz,' but by imitating Friedrich Wilhelm, one of 'the Authors of Prussia'\" [4]. The two senses of *author* — the writer of farces and the maker of a nation — divide the entire moral universe of the book between them.\n\nThis reading illuminates why the book is so preoccupied with Friedrich Wilhelm I, the brutal drill-sergeant king who occupies a vast portion of the narrative before Frederick even reigns. The father is not background; he is the thesis. He is the man of solid, silent, terrible work — \"A silent genius\" [3] — who is \"inflexibly, and with a fierce slow inexorable determination, set upon having realities round him\" [3], and who builds, against all odds, \"an army of from seventy to a hundred thousand before he dies... the best-drilled of fighting men; and what adds much to the wonder, a full Treasury withal. This is the Brandenburg Spartan King\" [3]. The drill and the treasury are the army and the capital the son will spend; the father authors the instrument, the son authors the deeds. Carlyle's evident fascination with Friedrich Wilhelm is the fascination of a son who has decided that the father was right all along. The \"search for authority\" ends, ideologically, in submission to a paternal-monarchical principle: the nation as a family, the king as father, obedience as the natural posture of the governed. Stewart independently confirms the family frame as Carlyle's conscious purpose: \"the nation needed to function as a family unit, with the older, more experienced members... instructing and educating the young\" [6].\n\n## Nation-Building as World-Making\n\nThe largest theme is creation itself. Carlyle presents Prussia as a thing *authored* — willed into existence out of marsh, forest, and disorder by the patient violence of a dynasty. The Hohenzollerns are \"in truth the very making of the Prussian Nation\" [5], and Carlyle names them outright, in the History's own words, \"the Authors of Prussia, without whom Prussia had never been\" [5]. The early chapters of Book II (\"Of Brandenburg and the Hohenzollerns\") render the medieval beginnings as a near-cosmogony: men \"silently gave away their life, before those countries could become fencible and habitable\" [5]. The vocabulary is Genesis-like — order drawn out of chaos by labour and command — and the moral is that nations, like the universe, are governed and made, not grown by accident or chosen by votes.\n\nVanden Bossche identifies the governing trope precisely: \"Battle, both literal and figurative, is Carlyle's principal metaphor for the work of creating the Prussian nation\" [4]. War, in this frame, is not aggression but world-making — the most strenuous form of the \"perennial nobleness... in Work\" [8] that *Past and Present* had sanctified. Friedrich Wilhelm's drill and Frederick's campaigns are continuous with the medieval reclamation of the marshes: each is a chapter in the long sentence the dynasty is writing, the slow composition of a country out of raw fact. The army is the pen and Silesia is the page. This is where Carlyle's gospel of work and his great-man theory and his providential theology fuse into a single image: the hero as author, the nation as text, history as the act of writing the true into permanence against the resistance of chaos.\n\nThe reader should mark that this aestheticisation of conquest as creation is precisely where Carlyle's ideology is most dangerous, and where modern scholarship — and the long shadow the book cast on German nationalist self-understanding — has been most critical. To call war \"the work of creating the Prussian nation\" [4] is to give annexation the moral dignity of labour and the metaphysical dignity of creation; it is to make the casualties of Silesia and the Seven Years' War the necessary cost of a cosmic authorship. John D. Rosenberg, in *Carlyle and the Burden of History* (1985), treats the *Frederick* under the chapter-title \"The Long Night of Frederick the Great,\" reading the book as the exhausted terminus of Carlyle's lifelong attempt to write history as prophecy — the point at which the burden of redeeming the past through heroic narration nearly broke its author [9]. The thirteen years of labour the book cost are themselves, in Rosenberg's frame, a demonstration of the very gospel of work the book preaches, and a warning about its limits.\n\nThe result is a book whose every theme converges on a single conviction: that the world is made and governed by genuine men acting under an inexorable moral law, and that the cure for a democratic, industrial, cant-ridden age is to recognise such men and obey them. It is the most fully realised — and most troubling — statement of Carlyle's lifelong creed, the doctrine of *On Heroes* and the gospel of *Past and Present* hardened into a six-volume defence of the absolute king.\n\n## Open Questions\n\n1. **The \"Authors of Prussia\" phrase — resolved.** Earlier in this corpus the phrase was treated as faithful paraphrase. It is in fact verbatim Carlyle: the History contains the parenthesis \"(who are the Authors of Prussia, without whom Prussia had never been)\" [5], and Vanden Bossche quotes the same phrase from the standard edition (4:366) [4]. The claim is now upgraded from paraphrase to verified quotation. (Resolved.)\n\n2. **Chronology of the ideological hardening.** Hochstrasser locates the turn from literary to despotic hero \"in later years\" [2] without dating it precisely. Whether the *Frederick* represents a hardening *during* its long composition (1851-1865) or merely the steady application of a position fixed by the *Latter-Day Pamphlets* (1850) is a question this document does not resolve.\n\n3. **The \"Art of War\" valuation.** Vanden Bossche's claim that it is \"the only work... Carlyle regards as having any merit\" [4] is a strong reading; Carlyle's scattered remarks on Frederick's histories and the *Anti-Machiavel* are more mixed than this summary suggests, and a fuller survey of the six volumes would refine it.\n\n4. **Continuity with the racial/authoritarian late prose.** The degree to which the *Frederick*'s political theology is implicated in, versus distinguishable from, the \"Negro Question\" and the harsher *Pamphlets* is contested in the scholarship and is flagged here rather than settled. The unguarded asides in the text (e.g., the \"blockhead and scoundrel\" passage [3]) suggest the continuity is real and not merely a matter of biography.\n\n5. **Rosenberg's reading.** This document cites Rosenberg's chapter-title and overall frame [9] but does not quote him verbatim, the full text being inaccessible at time of writing. A pass with the print edition would let the \"Long Night\" reading be quoted directly and weighed against Vanden Bossche's more structural account.\n\n## Sources\n\n[1] Thomas Carlyle, *History of Friedrich II of Prussia, Called Frederick the Great*, Volume 1 (Book I, the Proem \"Friedrich's History from the Distance We Are At,\" and Book II opening). Project Gutenberg ebook #2101. https://www.gutenberg.org/files/2101/2101-h/2101-h.htm — Tier 1 (primary text; quotations verified verbatim against the fetched/parsed HTML).\n\n[2] Timothy Hochstrasser, \"Carlyle and the French Enlightenment: transitional readings of Voltaire and Diderot,\" LSE Department of Economic History Working Paper (2007). https://www.lse.ac.uk/Economic-History/Assets/Documents/Research/FACTS/WorkingPapers/2007/2107Hochstrasser.pdf (also at http://eprints.lse.ac.uk/21432/) — Tier 2 (scholarly; quotations verified verbatim from the parsed PDF).\n\n[3] Thomas Carlyle, *History of Friedrich II of Prussia*, Volume 3 (Books covering Friedrich Wilhelm I — \"A just man... a truth acted out\"; \"the genus sham was never hatefuler\"; \"a man of genius... A silent genius\"; \"the best-drilled of fighting men... a full Treasury withal. This is the Brandenburg Spartan King\"). Project Gutenberg ebook #2104. https://www.gutenberg.org/cache/epub/2104/pg2104.txt — Tier 1 (primary text; quotations verified verbatim by direct text search of the parsed file).\n\n[4] Chris R. Vanden Bossche, *Carlyle and the Search for Authority* (Ohio State University Press, 1991), Chapter 5b, \"The Son as Father: Frederick's Art of War,\" hosted on The Victorian Web. https://victorianweb.org/authors/carlyle/vandenbossche/5b.html — Tier 2 (scholarly; quotations, including the \"Authors of Prussia\" passage cited to 4:366, verified verbatim from the fetched page).\n\n[5] Thomas Carlyle, *History of Friedrich II of Prussia*, Volumes 2 and 14 (Book II, \"Of Brandenburg and the Hohenzollerns\" — \"the very making of the Prussian Nation\"; \"silently gave away their life\"; and, in the later volume, \"the Hohenzollerns (who are the Authors of Prussia, without whom Prussia had never been)\" and \"very unusual VERACITY of intellect... faithful performances, in a man\"). Project Gutenberg ebooks #2102 and #2114. https://www.gutenberg.org/files/2102/2102-h/2102-h.htm ; https://www.gutenberg.org/cache/epub/2114/pg2114.txt — Tier 1 (primary text; quotations verified verbatim against the parsed HTML/text).\n\n[6] Linda C. Stewart, \"Thomas Carlyle and the making of Frederick the Great,\" Ph.D. thesis, University of Edinburgh, 2009/2010 (Abstract, Introduction; quoting A. P. Stanley's 1881 funeral eulogy). https://era.ed.ac.uk/bitstream/handle/1842/5526/Stewart2010.pdf — Tier 2 (scholarly; quotations verified verbatim from the parsed PDF).\n\n[7] Thomas Carlyle, *On Heroes, Hero-Worship, and the Heroic in History* (1841), Lecture I. Project Gutenberg ebook #1091. https://www.gutenberg.org/files/1091/1091-h/1091-h.htm — Tier 1 (primary text; \"Universal History... the History of the Great Men who have worked here\"; \"Worship of a Hero is transcendent admiration of a Great Man\"; \"Sincerity, a deep, great, genuine sincerity, is the first characteristic of all men in any way heroic\" — verified verbatim).\n\n[8] Thomas Carlyle, *Past and Present* (1843), Book III, Chapter XI (\"Labour\") and Book III, Chapter IX (\"Working Aristocracy\"). Project Gutenberg ebook #13534. https://www.gutenberg.org/cache/epub/13534/pg13534.txt — Tier 1 (primary text; \"there is a perennial nobleness, and even sacredness, in Work... in Idleness alone is there perpetual despair\"; \"Labour is Life...\"; \"Cash-payment is not the sole nexus of man with man\" — verified verbatim by direct text search).\n\n[9] John D. Rosenberg, *Carlyle and the Burden of History* (Harvard University Press, 1985), chapter \"The Long Night of Frederick the Great.\" https://www.degruyterbrill.com/document/doi/10.4159/harvard.9780674422988/html — Tier 2 (scholarly; cited for chapter-title and overall frame; not quoted verbatim — see Open Question 5)."}, {"order": 6, "file": "06_Characterization.md", "title": "Characterization — Friedrich, Friedrich Wilhelm I, Voltaire", "summary": "", "body": "# Characterization — Friedrich, Friedrich Wilhelm I, Voltaire\n\n## Bottom Line\n\nCarlyle's *History of Friedrich II of Prussia* (1858–1865) is, at the level of craft, less a chronicle of campaigns than a gallery of intensely physical portraits, and three faces dominate it: the aging King Friedrich, his father Friedrich Wilhelm I, and Voltaire. Friedrich is introduced not as conqueror but as \"a highly interesting lean little old man,\" dressed in \"a Spartan simplicity of vesture\" with \"no crown but an old military cocked-hat\" and \"no sceptre but one like Agamemnon's, a walking-stick cut from the woods,\" whose eyes are \"such a pair of eyes as no man or lion or lynx of that Century bore elsewhere\" [1]. Carlyle frames the entire labour around a candid ambivalence — \"To the last, a questionable hero\" who nevertheless \"in his way is a Reality\" and \"managed not to be a Liar and Charlatan as his Century was\" [1]. Friedrich Wilhelm I is rendered as the comic-tragic \"great Drill-sergeant,\" \"a dumb poet in several particulars,\" whose Tobacco-Parliament Carlyle defines as \"a Parliament reduced to its simplest expression,\" whose 2,400 giant grenadiers are \"sons of Anak,\" and whose rage culminates in the execution of Katte before the Crown-Prince's window — a scene Carlyle narrates with deliberate restraint, then likens to \"the doings of the gods, which are cruel\" [2][3]. Around these two stand the figures Carlyle plainly relishes: the suffering, sharp-tongued Wilhelmina, his chief eyewitness; the two \"Black-Artists,\" Seckendorf — \"double-distilled lying probably the greatest of his day\" — and the bribable Grumkow, who together \"fascinate\" the king's \"whole existence\" in the smoke of the Tabagie [2]. Voltaire is the magnet of Carlyle's anti-Enlightenment polemic: \"the most brilliant of mankind\" in speech yet faithless in honour, his Frankfurt detention told as farce, his whole century dismissed in the Proem as a \"swindler-century\" with \"nothing grand in it, except that grand universal Suicide, named French Revolution\" [1][4]. The portraits are the book's living tissue; the polemic against the eighteenth century is the framework that holds them up — and, as Carlyle frankly states his problem, the whole task is \"How show the man, who is a Reality worthy of being seen, and yet keep his Century, as a Hypocrisy worthy of being hidden and forgotten, in the due abeyance?\" [1].\n\n## The Three Portraits in Brief\n\nFriedrich is introduced as an aged, physically diminished man whose eyes carry the whole force of the characterization. Carlyle does not open on the battlefield. He opens on the terrace at Sans Souci with an old man, and the entire portrait is organized around the eyes. The first sustained physical description reads: \"snuffy nose rather flung into the air, under its old cocked-hat,—like an old snuffy lion on the watch; and such a pair of eyes as no man or lion or lynx of that Century bore elsewhere, according to all the testimony we have\" [1]. Carlyle then borrows Mirabeau as corroborating witness — \"'Those eyes,' says Mirabeau, 'which, at the bidding of his great soul, fascinated you with seduction or with terror'\" — before completing the image in his own voice: \"Most excellent potent brilliant eyes, swift-darting as the stars, steadfast as the sun; gray, we said, of the azure-gray color; large enough, not of glaring size; the habitual expression of them vigilance and penetrating sense, rapidity resting on depth. Which is an excellent combination; and gives us the notion of a lambent outer radiance springing from some great inner sea of light and fire in the man\" [1]. The \"lynx\" stands not for cunning but for the unmatched acuity of an aged observer; the lion and the lynx are kept on \"the watch,\" vigilant rather than predatory.\n\nThe portrait works from costume inward — a \"Spartan simplicity\" that is itself a moral argument. Before the eyes, Carlyle dwells on dress, and the catalogue of negations is doing ethical work. Friedrich \"is a King every inch of him, though without the trappings of a King. Presents himself in a Spartan simplicity of vesture: no crown but an old military cocked-hat,—generally old, or trampled and kneaded into absolute SOFTNESS, if new;—no sceptre but one like Agamemnon's, a walking-stick cut from the woods, which serves also as a riding-stick (with which he hits the horse 'between the ears,' say authors);—and for royal robes, a mere soldier's blue coat with red facings ... sure to have a good deal of Spanish snuff on the breast of it\" [1]. The detail is comic and reverent at once. The Homeric \"sceptre ... like Agamemnon's\" elevates the walking-stick; the snuff and the trampled hat deflate the elevation; and the famous prohibition — the boots \"may be brushed ... but are not permitted to be blackened or varnished; Day and Martin with their soot-pots forbidden to approach\" [1] — turns a frugal habit into emblem. Each refused ornament is one more thing Friedrich does not need, and the cumulative argument is that the substance of kingship survives the loss of its \"trappings.\"\n\nThe face is read as a record of labour and sorrow — characterization as physiognomy. Carlyle's portrait is explicitly physiognomic: the face is a text. \"The man is not of godlike physiognomy, any more than of imposing stature or costume: close-shut mouth with thin lips, prominent jaws and nose, receding brow, by no means of Olympian height\" [1]. He refuses idealization — \"Not what is called a beautiful man; nor yet, by all appearance, what is called a happy\" — and then makes the plainness the meaning: \"the face bears evidence of many sorrows ... of much hard labor done in this world; and seems to anticipate nothing but more still coming. Quiet stoicism, capable enough of what joy there were, but not expecting any worth mention; great unconscious and some conscious pride, well tempered with a cheery mockery of humor,—are written on that old face\" [1]. The voice receives the same treatment, ranging \"from that of ingenuous inquiry, graceful sociality, light-flowing banter (rather prickly for most part), up to definite word of command, up to desolating word of rebuke and reprobation,\" and corroborated by Dr. John Moore, who called it \"the clearest and most agreeable in conversation I ever heard\" [1]. Characterization here is the disciplined reading of surfaces for the inner history they betray.\n\nThe common-people's name \"Vater Fritz\" is used to humanize Friedrich and to pre-empt the charge of tyranny. At the very threshold of the work, before any judgement is rendered, Carlyle plants the affectionate folk-name: the old man \"whose name among strangers was King FRIEDRICH THE SECOND, or Frederick the Great of Prussia, and at home among the common people, who much loved and esteemed him, was VATER FRITZ,—Father Fred,—a name of familiarity which had not bred contempt in that instance\" [1]. The aside — that familiarity \"had not bred contempt\" — is doing characterizing work: it asserts, in advance of the evidence, that this is a ruler whose subjects' intimacy with him was a form of reverence, not the proverbial erosion of respect.\n\nThe portrait is, throughout, explicitly and repeatedly ambivalent — Friedrich is a \"questionable hero.\" Carlyle's characterization of him is unusual among his hero-portraits precisely for its hedging. He states it flatly: \"Friedrich is by no means one of the perfect demigods; and there are various things to be said against him with good ground. To the last, a questionable hero; with much in him which one could have wished not there, and much wanting which one could have wished\" [1]. The redeeming quality is not virtue but veracity: \"But there is one feature which strikes you at an early period of the inquiry, That in his way he is a Reality; that he always means what he speaks; grounds his actions, too, on what he recognizes for the truth; and, in short, has nothing whatever of the Hypocrite or Phantasm\" [1]. This converts the entire characterization into an instance of Carlyle's Reality-versus-Sham scheme.\n\nFriedrich is cast as \"the last of the Kings,\" the hinge between the old order and the Revolution, the portrait given world-historical scale by a recurring formula. \"This also is one of the peculiarities of Friedrich, that he is hitherto the last of the Kings; that he ushers in the French Revolution, and closes an Epoch of World-History. Finishing off forever the trade of King, think many; who have grown profoundly dark as to Kingship and him\" [1]. Friedrich's value, in Carlyle's design, is partly that he is the final specimen of a \"Real Kingship\" the modern age can no longer produce; the man and the age are characterized against each other.\n\nThe defining judgment is that Friedrich \"managed not to be a Liar and Charlatan as his Century was\" — the clearest single sentence linking the portrait to the polemic: \"How this man, officially a King withal, comported himself in the Eighteenth Century, and managed not to be a Liar and Charlatan as his Century was, deserves to be seen a little by men and kings, and may silently have didactic meanings in it\" [1]. Carlyle generalizes the test in the following sentences: \"He that was honest with his existence has always meaning for us, be he king or peasant. He that merely shammed and grimaced with it ... cannot long have any\" [1]. The characterization of Friedrich is inseparable from the indictment of his age — the man is interesting to Carlyle chiefly as an exception to a corrupt century.\n\nCarlyle even names his own compositional problem — to extricate the Reality (Friedrich) from the Hypocrisy (his Century) — and the candor is itself a piece of characterization-by-contrast. \"How show the man, who is a Reality worthy of being seen, and yet keep his Century, as a Hypocrisy worthy of being hidden and forgotten, in the due abeyance?\" he asks; \"How extricate the man from his Century?\" [1]. The figure must be lifted clear of a background Carlyle despises: \"The Eighteenth Century, it is well known, does not figure to me as a lovely one\" [1]. Every portrait in the book is thus an act of extrication — pulling a Reality up out of an age the author regards as a Cesspool.\n\nThe Proem's anti-Enlightenment polemic frames every portrait: the century is a \"swindler-century\" redeemed only by its \"universal Suicide.\" Carlyle's hostility to the eighteenth century is the rhetorical ground on which all three portraits stand. The keynote: \"To me the Eighteenth Century has nothing grand in it, except that grand universal Suicide, named French Revolution, by which it terminated its otherwise most worthless existence with at least one worthy act;—setting fire to its old home and self; and going up in flames and volcanic explosions, in a truly memorable and important manner\" [1]. Carlyle then personifies the century as a bankrupt swindler and lets it confess: \"Century spendthrift, fraudulent-bankrupt; gone at length utterly insolvent, without real MONEY of performance in its pocket, and the shops declining to take hypocrisies and speciosities any farther,\" until it admits, \"'I am a swindler-century, and have long been ... knowing hardly any trade but that in false bills'\" and resolves that \"'nothing even to eat'\" remains \"'but that I blow my brains out, and do at length one true action?'\" [1]. The Revolution is reframed as the century's single honest deed, suicide; this is the lens through which Voltaire in particular is read.\n\nFriedrich Wilhelm I is characterized as the \"great Drill-sergeant\" — a dumb poet of discipline. Carlyle's father-portrait is built on the paradox of a poet who writes in pipe-clay and grenadiers. Discipline is his art: \"Discipline shall be as exact as Euclid;—short of perfection we do not stop! Discipline and ever better discipline; enforcement of the rule in all points, improvement of the rule itself where possible, were the great Drill-sergeant's continual care. Daily had some loop fallen, which might have gone ravelling far enough; but daily was he there to pick it up again, and keep the web unrent and solidly progressive\" [2]. Carlyle explicitly calls the Army Friedrich Wilhelm's \"'poetic ideal,'\" the king \"a dumb poet in several particulars,—and requires the privileges of genius from those that READ his dumb poem,\" while admitting \"he rises into the fantastic here and there; and has crotchets of ultraperfection for his Army, which are not rational at all\" [2]. The weaving image — the dropped \"loop,\" the \"web unrent\" — domesticates martial mania into a craftsman's patience, so that the reader admires the discipline even while flinching at the man.\n\nThe Potsdam Giants are characterized as \"2,400 sons of Anak\" — a Giant Phantom and a class-book of Friedrich's schooling. Carlyle treats the giant-regiment as both fact and myth, and as the boy Friedrich's brutal education. \"The giant-regiment was not a Myth, however, but a big-boned expensive Fact, tramping very hard upon the earth at one time, though now gone all to the ghostly state\" [2]. He totals it: \"Three Battalions of them ... 800 to the Battalion,—2,400 sons of Anak in all. Sublime enough, hugely perfect to the royal eye, such a mass of shining giants, in their long-drawn regularities and mathematical manoeuvrings,—like some streak of Promethean lightning, realized here at last, in the vulgar dusk of things!\" [2]. He records the absurd expense and the man-hunting it required: \"James Kirkman, an Irish recruit of good inches, cost him 1,200 pounds before he could be got inveigled, shipped and brought safe to hand\" [2], and the Prussian recruiters \"glide about, under disguise if necessary; lynx-eyed, eager almost as the Jesuit hounds are ... hunting ... their bodies in a merciless carnivorous manner\" [2]. The same word, \"lynx-eyed,\" that crowns the aged Friedrich's vigilance is here turned grim — the eye that in the son is wisdom is in the father's recruiters a predator's.\n\nThe Tabaks-Collegium is characterized as a \"Parliament reduced to its simplest expression.\" Carlyle's set-piece on the Tobacco-Parliament is a small comic essay on government by silence — and a vehicle for his own nineteenth-century politics. \"A Parliament reduced to its simplest expression, and, instead of Parliamentary eloquence, provided with Dutch clay-pipes and tobacco: so we may define this celebrated Tabagie of Friedrich Wilhelm's\" [2]. The thrifty king, \"finding it would serve in that capacity withal,\" developed \"his evening Tabagie\" — \"a law of Nature to him, constant as the setting of the sun\" — into \"a sort of Smoking Parliament, small but powerful, where State-consultations, in a fitful informal way, took place\" [2]. Carlyle even works in a sly aside on tobacco's national effects, \"promoting composure among the palpably chaotic and discomposed; soothing all things into lazy peace,\" so that \"German affairs are come to be greatly overgrown with funguses in our Time\" [2]. He then hands the satire to his invented authority \"Smelfungus,\" who praises tobacco-smoke as \"the one element in which, by our European manners, men can sit silent together without embarrassment,\" holds that introducing it \"into Constitutional Parliaments ... might evidently be incalculable,\" and cries, \"who will deliver men from this hideous nightmare of Stump-Oratory, under which the grandest Nations are choking to a nameless death?\" [2]. The Crown-Prince is glimpsed there too, only affecting to smoke — his \"pipe is mere white clay\" [5].\n\nThe \"two Black-Artists,\" Seckendorf and Grumkow, are drawn as wizards who bewitch the king inside the Tabagie. Carlyle relishes the Austrian intriguer Imperial Ordnance-Master Graf von Seckendorf, \"a Black-Artist of supreme quality, despatched from Vienna on secret errand,\" who on \"a summer evening of the year 1726 ... evokes all the demons on our little Crown-Prince and those dear to him\" [2]. Installed in the Tabagie as \"a captivating talker; solid for religion, for the rights of Germany,\" Seckendorf is granted one of the book's great satirical character-strokes: he \"has privately, in case of need, a capacity of lying,—for he curiously distils you any lie, in his religious alembics, till it become tolerable to his conscience, or even palatable, as elixirs are;—capacity of double-distilled lying probably the greatest of his day\" [2]. His partner is the bribable Prussian minister Grumkow, won with an Imperial \"Pension of 1,600 ducats\" [2]. Together they form \"two Black-Artists, of the first quality, busy on the unconscious Friedrich Wilhelm,\" and Carlyle's verdict is a sustained metaphor of sorcery: Seckendorf \"will stick to Friedrich Wilhelm like his shadow; and fascinate his whole existence and him, as few wizards could have done\" [2]. The \"Black-Artist\" tag recurs across volumes — by the Katte crisis \"Fate and these two Black-Artists have driven Friedrich Wilhelm nearly\" to extremity [3] — so the minor figures become the supernatural machinery of the family tragedy.\n\nWilhelmina is the book's chief eyewitness — and is herself characterized as a victim of paternal violence whose memoir Carlyle both uses and corrects. Carlyle's principal source for the early volumes is the memoir of Friedrich's sister Wilhelmina, later Margravine of Bayreuth, whom he cites on nearly every page (\"Wilhelmina, i. 117,\" \"Wilhelmina, i. 307,\" and so on [2][3]). He characterizes her partly through the abuse she records: \"Poor Wilhelmina, beaten upon by Papa in this manner, takes to bed in miserable feverish pain, is ordered out by Mamma to evening party, all the same; is evidently falling very ill. 'Ill? I will cure you!' says Papa next day, and makes her swallow a great draught of wine. Which completes the thing: 'declared small-pox,' say all the Doctors now\" [2]. The grim comedy of \"Ill? I will cure you!\"—the wine prescribed as cure that brings on the disease—epitomizes the father's terrifying willfulness. Yet Carlyle handles the source with caution, repeatedly flagging her as a partial witness (\"Wilhelmina, deriving from similar sources, and equally uncertain,\" \"thinks Wilhelmina\" [2]), so that she is at once his indispensable informant and a character whose grievances must be weighed.\n\nThe father-son conflict is dramatized through illicit flute-music, the scarlet dressing-gown, and the king's own contemptuous letter. Before the catastrophe, Carlyle stages the antipathy in a comic-domestic key. The Crown-Prince's clandestine music with the flute-master Quantz, his friend Katte standing watch, ends in near-disaster when \"Lieutenant Katte ... rushes in, distraction in his aspect: Majesty just here! Quick, double quick!\" — Quantz and the flutes bundled \"into some wall-press, or closet for firewood\" [5]. The boy throws off his \"bright scarlet dressing-gown, done in gold,\" but \"cannot undo the French hairdressing; cannot change the graceful French bag into the strict Prussian queue in a moment. The French bag betrays him; kindles the paternal vigilance,—alas, the paternal wrath, into a tornado pitch,\" and the king \"crams\" the brocade \"into the fire,\" confiscating \"all the illicit French Books\" [5]. The contempt is given in the father's own voice, in the broken syntax Carlyle delightedly annotates: \"thou know'st very well that I can endure no effeminate fellow (EFEMINIRTEN KERL), who has no human inclination in him; who puts himself to shame, cannot ride nor shoot; and withal is dirty in his person; frizzles his hair like a fool, and does not cut it off\" [5]. Carlyle even records the prince's bitter joke that the grenadier uniform was his \"shroud (STERBEKITTEL, or death-clothes)\" [5] — the costume-motif of the Spartan dress turned, in youth, into a sentence of imprisonment.\n\nThat conflict is characterized through drill and Rhadamanthine penalty, culminating in Katte's execution. Carlyle frames the Crown-Prince's youth as a clash between \"Athenian-French elegancies\" and \"an adamantine Spartanism and Stoicism\" enforced by the father: \"penalty as of Rhadamanthus waited upon all failure there. That he liked it is by no means said; he much disliked it, and his disgusts were many. An airy young creature ... To clog the winged Psyche in ever-returning parade-routine and military pipe-clay,—it seems very cruel\" [2]. The conflict reaches its catastrophe in the 1730 flight-attempt and the execution of Hans Hermann von Katte at Cüstrin, which Carlyle stages as the emotional climax of the early volumes.\n\nCarlyle narrates Katte's execution with restraint, frames it through the biblical David-and-Jonathan, then refuses easy moral judgment, comparing it to \"the doings of the gods.\" The execution scene is among the most quoted in the *History*, and Carlyle deepens its pathos with a biblical key: through the chaplain Besserer's deposition, Katte \"did get sight of his beloved Jonathan,' Royal Highness the Crown-Prince, 'at a window in the Castle; from whom he, with the politest and most tender expression, spoken in French, took leave'\" [3] — Friedrich is David, Katte his Jonathan. The royal cruelty is sharpened by an order Carlyle records and then notes was quietly defied: Katte \"wore, by order, a brown dress exactly like the Prince's,\" and the Prince was brought down \"to 'see Katte die,' had been the royal order; but they smuggled that into abeyance\" [3]. Then the spare, fast climax: \"'PARDONNEZ-MOI, MON CHER KATTE!' cried [Friedrich] in a tone: Pardon me, dear Katte; oh, that this should be what I have done for you!—'Death is sweet for a Prince I love so well,' said Katte, 'LA MORT EST DOUCE POUR UN SI AIMABLE PRINCE;' and fared on,—round some angle of the Fortress ... not in sight of Friedrich; who sank into a faint, and had seen his last glimpse of Katte in this world\" [3]. The grim coda: \"The body lay all day upon the scaffold, by royal order; and was buried at night obscurely in the common churchyard\" [3]. Then — characteristically — Carlyle withholds verdict: \"'Never was such a transaction before or since, in Modern History,' cries the angry reader: 'cruel, like the grinding of human hearts under millstones, like—' Or indeed like the doings of the gods, which are cruel, though not that alone? ... Commentary, not likely to be very final at this epoch, the reader himself shall supply at discretion\" [3]. The restraint is itself a characterizing choice: Friedrich Wilhelm's brutality is left for the reader to weigh against the king's terrible sincerity. (The Project Gutenberg text reads \"Priedrich\" at the first cry, an obvious OCR slip for \"Friedrich\"; quoted here corrected to the intended name.)\n\nVoltaire is characterized as \"the most brilliant of mankind\" in speech yet incapable of silence or honour. Carlyle's Voltaire is dazzling and untrustworthy in the same breath. Of Voltaire's incessant letter-writing during the Sanssouci years, Carlyle has Smelfungus deliver the verdict: \"'In the gift of Speech he is the most brilliant of mankind,' said Smelfungus; 'but in the gift of Silence what a deficiency!' Friedrich will have to do that for Two, it would seem\" [4]. The judgment lands hardest because Carlyle has just quoted Voltaire's own wheedling letter — \"'As they write to me from Paris that I am in disgrace with you, I dare to beg very earnestly that you will deign to say if I have displeased in anything!'\" — and dryly glosses the volubility: he has \"absolutely no silence at all!\" [4]. The relationship is summarized with a balance of love and menace: \"For Friedrich himself Voltaire has, with touches of real love coming out now and then, a very sincere admiration mixed with fear; and delights in shining to him, and being well with him, as the greatest pleasure now left in life ... Had the man been wise—But he was not wise. He had, if no big gloomy devil in him among the bright angels that were there, a multitude of ravening tumultuary imps\" [4].\n\nThe rupture is dramatized through the \"Orange-Skin\" and \"Dirty Linen\" anecdotes Carlyle selects as emblematic, reducing the long souring of the friendship to two reported sayings. The first, the orange: Voltaire reports La Mettrie's claim that Friedrich said of him, \"'I shall want him still about a year:—you squeeze the orange, you throw away the skin (ON EN JETTE L'ECORCE)!'\" — to which Carlyle adds that the blurt \"goes through him like a shot of electricity through an elderly sick Household-Cat\" [4]. The second, the dirty linen: Maupertuis \"set the rumor going ... that I said to some one, on Verses from the King coming in, 'Will he never tire, then, of sending me his dirty linen to wash?'\" [4]. Carlyle treats both as froth — \"two small particles of Event amid such an ocean of noisy froth\" — but selects them precisely because they crystallize the mutual contempt beneath the courtly admiration [4].\n\nThe Maupertuis–König–Akakia quarrel is staged as a \"doggery\" of envy, and Voltaire's vindictiveness exposed in the Travenol farce. The intellectual war that detonated the Sanssouci idyll — Voltaire's *Diatribe du Docteur Akakia* lampooning the Academy president Maupertuis over König and \"the Infinitely Little\" — is narrated by Carlyle with relish for its pettiness. He pins Maupertuis with a single ridiculous image, \"Maupertuis, in red wig with yellow bottom,\" \"the Flattener of the Earth,\" who has \"surprised Nature\" with his apocalyptic \"Insights and Apocalyptic Utterances\" [4]. He frames the whole literary class as a pack: at Voltaire's election the \"Doggeries ... had risen to a never-imagined pitch; and had filled Paris, and, to Voltaire's excruciated sense, the Universe, with their howlings and their hyena-laughter, with their pasquils, satires\" [4]. And he exposes Voltaire's own cruelty through the Travenol affair, in which Voltaire \"rushed downstairs ... seized one poor dog, Travenol, unknown to him as Fiddler or otherwise; pinioned Dog Travenol, with pincers, by the ears ... and had a momentary joy!\" — only \"this was not the right dog\" [4]. The Enlightenment's republic of letters is thus reduced to mutual ear-pincering: brilliant, vindictive, and small.\n\nThe 1753 Frankfurt affair is narrated as farce, with Carlyle pointedly minimizing Friedrich's personal responsibility. His account of Voltaire's detention at Frankfurt is deliberately deflationary, casting it as a bungle by subalterns rather than royal vengeance. Voltaire arrives, \"did, with Freytag's hand laid gently on his sleeve, at once give up what of the articles he had about him ... and agreed to be under mild arrest ('PAROLE D'HONNEUR; in the LION-D'OR Hotel here!') till said OEUVRE should come up\" [4]. The detention drags only because Voltaire breaks parole: \"he now, without warning anybody, privately revoked said word of honor; and Collini and he, next morning, whisked shiftily into a hackney-coach, and were on the edge of being clear off ... street-mob gathering round the transaction; Voltaire very loud, and Freytag too\" [4]. Carlyle's summary defends the king: \"This is authentically the world-famous Frankfurt Affair;—done by Fredersdorf, as we say; Friedrich, absent in Silesia ... having no hand in it, except the original Order left with Fredersdorf. Voltaire has used his flamingest colors on this occasion ... Voltaire's flagrant Narrative had the round of the world to itself, for a hundred years; and did its share of execution against Friedrich\" [4]. (This is established for the text; the apportioning of blame is Carlyle's interpretive choice, and contested as history.)\n\nFinally, Carlyle's Voltaire-characterization extends a judgment first formed in his 1829 essay \"Voltaire.\" He had written a substantial essay on Voltaire for the *Foreign Review* in 1829, nearly three decades before the *History*. The continuity of judgment is notable: in that essay he is reported to have credited Voltaire with giving \"the death-stab to modern superstition\" while finding him \"essentially a mocker, 'the greatest of all Persifleurs,'\" his chief fault \"a terrible lack of earnestness\" [6]. The *History*'s portrait — brilliant in speech, deficient in silence, all bright angels and \"ravening tumultuary imps\" [4] — is the mature dramatization of the same early verdict: wit without earnestness, the perfect representative man of a worthless century. (The 1829 essay's existence and its priority to the *History* are established; the specific 1829 phrasings are quoted here as reported by a secondary reference work [6], not directly verified against the primary essay, and the continuity of judgment is a well-grounded inference.)\n\n## The Aging King: Reality in an Age of Sham\n\nCarlyle's most deliberate authorial decision in characterizing Friedrich is to refuse the heroic entrance. The reader meets not the victor of Rossbach and Leuthen but an old man on a terrace, \"a highly interesting lean little old man,\" and the portrait works inward from the surface — the cocked-hat, the snuff, the slight stoop — to the eyes, where Carlyle locates the soul. The opening paragraphs are a study in calibrated mockery and reverence held in the same hand. The negations of dress (\"no crown but an old military cocked-hat,\" \"no sceptre but one like Agamemnon's\") build a king out of refusals; the homely particulars (the \"Spanish snuff on the breast,\" the boots from which \"Day and Martin with their soot-pots\" are \"forbidden to approach\") keep the figure earthbound; and the single Homeric simile of the walking-stick \"like Agamemnon's\" smuggles epic dignity in under cover of comedy [1]. Only after the costume does Carlyle move to the face — \"close-shut mouth with thin lips, prominent jaws and nose, receding brow\" — and refuse beauty, the better to assert significance: the plainness \"bears evidence of many sorrows ... of much hard labor done in this world\" [1]. The eyes then receive the full lyric treatment, \"swift-darting as the stars, steadfast as the sun,\" and the comparison to \"an old snuffy lion on the watch\" and the claim that \"no man or lion or lynx of that Century bore elsewhere\" such eyes [1] fuse animal vitality with intellectual penetration. Carlyle is careful to ground the description in testimony: he cites Mirabeau's *Histoire Secrète de la Cour de Berlin* directly, quoting the French — \"la seduction ou la terreur\" — and footnoting it, and corroborates the voice with Dr. John Moore's *View of Society and Manners* [1], a small instance of the source-anchoring that runs through the whole book.\n\nWhat distinguishes this portrait from Carlyle's other hero-studies (Cromwell above all) is its sustained ambivalence. The phrase \"a questionable hero\" [1] is not a slip; it is the governing description, and Carlyle returns to the qualification throughout. Friedrich is saved, in Carlyle's accounting, not by goodness but by veracity — by being \"a Reality\" with \"nothing whatever of the Hypocrite or Phantasm\" [1]. This is the *Sartor*-and-*Latter-Day-Pamphlets* vocabulary applied to biography: a man is to be judged by whether he stands on the truth of things or sinks into \"the Cesspools of the Universe\" [1]. And Carlyle is unusually frank about the compositional cost of this scheme. He poses the difficulty as a question — \"How show the man, who is a Reality worthy of being seen, and yet keep his Century, as a Hypocrisy worthy of being hidden and forgotten, in the due abeyance? How extricate the man from his Century?\" [1] — which makes the entire six-volume labour an exercise in extrication, the lifting of a single lambent figure out of a background the author loathes. Friedrich's heroism, then, is almost entirely negative and contrastive — he is the king who \"managed not to be a Liar and Charlatan as his Century was\" [1]. The portrait of the man is impossible to detach from the indictment of the age, and the Proem's image of the eighteenth century as a \"swindler-century\" that can do \"one true action\" only by blowing its own brains out in Revolution [1] is the dark backdrop against which the single figure is lit. Modern readers of the *History* — Albert LaValley, John Clubbe, and the editors of the Strouse Carlyle — have stressed how thoroughly this opening fuses Carlyle's late political pessimism with his portrait-craft; the aged Friedrich is not merely described but recruited as exhibit in the case against the Enlightenment.\n\n## Friedrich Wilhelm I: The Dumb Poet of Discipline\n\nIf Friedrich is drawn with reverent ambivalence, his father is drawn with affectionate comedy shading into horror. Carlyle's Friedrich Wilhelm I is one of the great grotesques of Victorian prose — \"the great Drill-sergeant\" [2] whose imagination expresses itself not in verse but in the geometry of marching men. The conceit that he is \"a dumb poet,\" that his Army is his \"'poetic ideal,'\" and that he \"requires the privileges of genius from those that READ his dumb poem\" [2] is Carlyle's master-stroke: it lets him present the king's manias — the Euclidean drill, the breeding of giants — as the deformed products of a real creative force rather than mere cruelty, while never denying that the \"crotchets of ultraperfection ... are not rational at all\" [2]. The weaving image that follows, with its dropped \"loop\" that \"might have gone ravelling far enough\" and the daily labour to \"keep the web unrent and solidly progressive\" [2], does the same double work: it renders fanatical discipline as patient craftsmanship, so the reader is made to admire the very obsession that will nearly kill the king's son.\n\nThe two great set-pieces, the Potsdam Giants and the Tabaks-Collegium, show Carlyle's characterizing method at its most enjoyable. The giant-regiment is \"a big-boned expensive Fact\" that is also a \"Giant Phantom,\" \"2,400 sons of Anak\" gathered \"at enormous expense\" by recruiters who hunt tall men \"in a merciless carnivorous manner\" [2]; the biblical \"sons of Anak\" and the \"Promethean lightning\" give a single regiment of soldiers the texture of myth, while the absurd \"James Kirkman, an Irish recruit of good inches,\" who \"cost him 1,200 pounds\" [2], punctures the myth with a price-tag. The Tobacco-Parliament becomes a vehicle for Carlyle's own contempt for \"Stump-Oratory\": defined as \"a Parliament reduced to its simplest expression\" [2], it is praised — through the mouthpiece Smelfungus — as government by salutary silence, \"the one element in which ... men can sit silent together without embarrassment\" [2], a sly bit of nineteenth-century anti-parliamentary satire smuggled into eighteenth-century Potsdam. And it is inside this smoke that Carlyle plants his favourite minor villains. Seckendorf, \"a Black-Artist of supreme quality,\" is given the funniest single sentence in the father-volumes — a man who \"curiously distils you any lie, in his religious alembics, till it become tolerable to his conscience ... capacity of double-distilled lying probably the greatest of his day\" [2] — and the bribed Grumkow is the \"mainspring\" of the \"magic-apparatus\" [2]. The \"two Black-Artists\" who \"fascinate\" the king's \"whole existence ... as few wizards could have done\" [2] convert the Tabagie from comic interlude into the supernatural engine of the family's ruin; the smoke is literally the medium of enchantment.\n\nBut the comedy is the setting for a tragedy. The father-son conflict, built up through the \"Rhadamanthus\" penalties of drill imposed on \"the winged Psyche\" of the airy young prince [2], is first dramatized in a domestic-farce register — the clandestine flute-lessons with Quantz, Katte cramming the music-books \"into some wall-press, or closet for firewood,\" the boy betrayed not by the contraband itself but by his \"graceful French bag\" of hair that he \"cannot change ... into the strict Prussian queue in a moment,\" and the scarlet brocade dressing-gown crammed \"into the fire\" [5]. Carlyle then lets the father indict the son in his own broken German — \"I can endure no effeminate fellow (EFEMINIRTEN KERL) ... frizzles his hair like a fool, and does not cut it off\" [5] — and records the prince's mordant nickname for his uniform, his \"shroud (STERBEKITTEL)\" [5]. The grenadier coat that the aged king will wear as a badge of Spartan honour is, in the son's youth, a death-garment; the costume-motif binds the volumes together. Then the conflict breaks in the execution of Katte, and Carlyle abandons the grotesque register entirely. The prose goes spare and fast — the David-and-Jonathan framing through the chaplain's deposition (\"his beloved Jonathan\"), the brown dress \"exactly like the Prince's,\" Friedrich's cry, Katte's \"La mort est douce,\" the faint, the body left \"all day upon the scaffold, by royal order\" [3] — and then Carlyle does something unusual: he stages the reader's outrage (\"cruel, like the grinding of human hearts under millstones\") only to deflect it into something larger and colder — \"the doings of the gods, which are cruel, though not that alone?\" — and finally refuses to render a verdict at all, leaving \"Commentary ... the reader himself shall supply at discretion\" [3]. The restraint characterizes both men at once: the father's terrifying absolutism, and Carlyle's own conviction that such reality, however brutal, resists the easy condemnations of a sentimental age. Wilhelmina, on whom Carlyle leans for the whole episode, is herself characterized in passing as a fellow-victim — \"beaten upon by Papa,\" force-fed wine (\"Ill? I will cure you!\") into a small-pox [2] — so that the household tyranny is registered through more than one wounded child.\n\n## Voltaire and the Anti-Enlightenment Polemic\n\nVoltaire is the figure on whom Carlyle's hostility to the eighteenth century concentrates. The portrait is double-edged from the start: Voltaire is \"the most brilliant of mankind\" in \"the gift of Speech,\" and catastrophically deficient in \"the gift of Silence\" [4]. Carlyle grants him genuine power and even grants the friendship genuine feeling, \"touches of real love coming out now and then\" [4]. But the dominant note is of a brilliant nature undone by vanity and want of earnestness, \"a multitude of ravening tumultuary imps\" [4]. He sharpens the judgment by quoting Voltaire against himself — the obsequious \"deign to say if I have displeased in anything!\" letter, glossed as proof that the man has \"absolutely no silence at all\" [4]. This is precisely the judgment Carlyle had reached as early as his 1829 essay, where (as reported) he weighed Voltaire's \"death-stab to modern superstition\" against his being \"the greatest of all Persifleurs\" with \"a terrible lack of earnestness\" [6]. The *History* dramatizes the essay's thesis across the Sanssouci years.\n\nCarlyle's selection of incident is itself characterization, and he reaches for the animal and the comic to deflate. From the vast correspondence he lifts two sayings — the orange \"you squeeze the orange, you throw away the skin,\" which goes through Voltaire \"like a shot of electricity through an elderly sick Household-Cat,\" and the king's verses as \"dirty linen to wash\" [4] — because they capture the corrosive contempt curdling beneath the courtly glitter. He renders the literary world that destroyed the idyll as a \"doggery\" of \"howlings\" and \"hyena-laughter\" [4], reduces Maupertuis to \"red wig with yellow bottom\" and his theorizing to \"Apocalyptic Utterances\" [4], and exposes Voltaire's own cruelty in the Travenol farce, where the great philosophe \"pinioned Dog Travenol, with pincers, by the ears\" — and \"this was not the right dog\" [4]. The Enlightenment's republic of letters, in Carlyle's telling, is a kennel. And the Frankfurt affair of 1753, which in Voltaire's own telling was a monstrous abuse of power, Carlyle methodically rewrites as farce: a \"mild arrest\" on \"parole d'honneur\" at the Lion-d'Or, prolonged only because Voltaire broke his word and \"whisked shiftily into a hackney-coach,\" ending in a street-mob and shouting [4]. Crucially, Carlyle exonerates Friedrich — the affair was \"done by Fredersdorf,\" the king \"absent in Silesia ... having no hand in it\" — and treats Voltaire's \"flagrant Narrative\" as propaganda that \"did its share of execution against Friedrich\" for a century [4]. The defense of his hero and the diminishment of the Enlightenment's representative man are the same gesture: where Friedrich is \"a Reality,\" Voltaire is wit without bottom, the perfect ornament of a \"swindler-century\" [1] destined for its \"universal Suicide.\" This reading — that Carlyle weaponizes Voltaire to indict an entire age — is the consensus of the critical tradition from John Holloway's *The Victorian Sage* (which treats the *History* as sustained sage-argument rather than chronicle) through John D. Rosenberg's *Carlyle and the Burden of History* and Chris R. Vanden Bossche's *Carlyle and the Search for Authority*, all of which locate the book's organizing energy in this Reality-versus-Sham antithesis rather than in its military narrative.\n\n## Open Questions\n\n- **The \"Persifleur\" phrasing.** The vivid 1829-essay phrases (\"death-stab to modern superstition,\" \"greatest of all Persifleurs,\" \"terrible lack of earnestness\") are attested through a secondary reference work [6] but were not verified word-for-word against the primary *Foreign Review* / *Critical and Miscellaneous Essays* text within this research, because the most direct full-text host returned an access error. A confirming fetch of the essay itself (Internet Archive copies exist) would let these be quoted as Tier-1 rather than Tier-4.\n- **OCR / dating artifacts.** The Project Gutenberg Vol. VII text prints \"Priedrich\" in the Katte cry (an obvious slip for \"Friedrich\"). These are transmission errors, not Carlyle's; a collation against a print edition would confirm the canonical wording.\n- **The accuracy of Carlyle's Frankfurt apportionment.** Carlyle's insistence that Friedrich \"had no hand in it\" beyond the original order is an interpretive defense of his hero. Modern scholarship on the 1753 detention (and Varnhagen von Ense's monograph) would test how far Carlyle's exculpation holds.\n- **Wilhelmina as source vs. character.** Carlyle uses the Margravine's memoir constantly while flagging it as partial (\"thinks Wilhelmina,\" \"equally uncertain\"). A fuller study of where he silently corrects, amplifies, or dramatizes her testimony (the wine/small-pox episode; the Katte scene; the \"EFEMINIRTEN KERL\" letter) would clarify how far his \"characterization\" of the Prussian court is in fact a re-voicing of hers.\n- **Comparative method.** How Carlyle's ambivalent, eye-centered Friedrich portrait relates to his earlier wholehearted Cromwell and Mirabeau portraits — whether the \"questionable hero\" marks a late softening or hardening of the Great-Man doctrine — is a question for the corpus document on Carlyle's hero-theory.\n\n## Sources\n\n1. Carlyle, Thomas. *History of Friedrich II of Prussia, Called Frederick the Great*, Volume I (Proem and Book I), Project Gutenberg ebook #2101. URL: https://www.gutenberg.org/cache/epub/2101/pg2101.txt — Tier 1 (primary text). Verified verbatim: \"highly interesting lean little old man\"; \"a Spartan simplicity of vesture: no crown but an old military cocked-hat\"; \"no sceptre but one like Agamemnon's, a walking-stick cut from the woods\"; \"Day and Martin with their soot-pots forbidden
