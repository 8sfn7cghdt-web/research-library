tions are capitalized and treated as agents. The most explicit doctrinal statement comes at Mollwitz, where Carlyle reads the small Silesian battle as the striking of a cosmic clock and the announcement of a moral law: \"indeed a new hour had struck on the Time Horologe, that a New Epoch had risen. Yes, my friends... this man is capable of shaking it a little out of its stupid refuges of lies... and of intimating to it, afar off, that there is still a Veracity in Things, and a Mendacity in Sham-Things, and that the difference of the two is infinitely more considerable than was supposed.\" [6] Here \"Veracity,\" \"Mendacity,\" \"Sham-Things,\" \"Time Horologe,\" and \"New Epoch\" are all capitalized into the standing furniture of a moral universe.\n\nThe same Powers recur as agents. The address to England makes a nation stand trial before the Destinies: \"I call it the Eternal Destinies knocking at England's door again: 'Are you ready for the crisis, birth-point of long Ages to you, which is now come?'\" and \"The Eternal Destinies are very patient with some Nations.\" [8] The Sham idea is reified into \"that awful Being, the Born Sham-King, that arrives!\" [8] \"Chaos\" is repeatedly personified as a devourer — \"it has gone to annihilation and the belly of Chaos and the Croats\" — and re-enters at Leuthen as a near-Miltonic exclamation, \"Chaos come on us.\" [8] Reality, by contrast, is the rare and precious thing: a single good portrait is \"one tiny islet of Reality amid the shoreless sea of Phantasms.\" [10] Even the boy Frederick is praised in these capitalized terms — \"he too is a little Fact, big as can be to himself\" — because his mind \"always hangs on the practical truth of things,\" treating fiction as \"either an expository illustrative garment of Fact, or else... of no value to him.\" [10] The technique converts narrative into a theology of history in which capitalized Powers stand behind events.\n\nThe diction blends Germanisms, Latinisms, archaisms, biblical cadence, and a private cast of nonce-personae — Dryasdust, the Tolpatcheries, the Pandours. Thackeray's charge that the prose \"abounds with Germanisms and Latinisms, strange epithets\" applies with full force to *Friedrich*, where the German subject licenses German vocabulary as texture. [1][2] Carlyle imports and glosses German on the page constantly — the bracketed capitalized gloss is itself a tic of the style: \"(ERZGEBIRGE),\" \"(HAUBITZEN),\" \"(FELD-KRIEGS-COMMISSARIAT),\" \"(HERUNTER PURZELTE),\" and dozens more across a single volume. [6] He pauses Mollwitz to admire the battle as a \"most deliberate, regulated, ponderously impressive (GRAVITATISCH) Feat of Arms... done all by Regulation methods, with orthodox exactitude; in a slow, weighty, almost pedantic, but highly irrefragable manner. It is the triumph of Prussian discipline.\" [6] The gloss is not merely informative; \"(GRAVITATISCH)\" lets the German weight of the word press on the English sentence.\n\nHe coins mock-learned plurals for irregular troops — \"Tolpatcheries,\" \"the tagraggery of Croats\" — and reduces the enemy commander to an \"Artificial Sun-god\" undone by a Latinism. [6] The Latin tag is a recurrent device of editorial pathos, as when a source breaks off: \"Poor fellows: CETERA DESUNT; but that is enough.\" [8] The recurring persona \"Dryasdust\" (the pedantic antiquary) personifies the dead archive, and Carlyle addresses him directly as he would a living dunce — \"What multiple of the Equator was it, then, O Dryasdust? The Herr Professor, little studious of abridgment, does not say.\" [11] The cadence beneath the diction is frequently the King James Bible: short coordinate clauses joined by \"and,\" prophetic apostrophe, \"Yes, my friends,\" and the rhetoric of judgment. The \"Eternal Destinies knocking at England's door\" sentence scans as scripture; so does the warning \"War is an inexorable, dangerously incalculable thing.\" [8] The textual examples are direct; the King-James-cadence reading is inference, though a standard one in the criticism (Holloway, Stewart). [3][12]\n\nCarlyle builds suspense by holding the reader in the present moment while withholding the catastrophe — the Hochkirch night-attack is the great example. This distinctive sub-device of the present tense keeps the reader inside an unfolding present from which the disaster is visible to the narrator but not to the doomed characters. The Hochkirch surprise (October 1758) is narrated as a slowly tightening net, the imagery of bag and noose sustained across paragraphs: Daun's columns are \"silently enclosing Friedrich, as in the bag of a net... ready every man and gun by about four on Saturday morning. Are to wait for the stroke of five in Hochkirch steeple; and there and then to begin business... and to draw the strings on Friedrich, and bag and strangle his astonished people and him.\" [8] Frederick, deceived, misreads the Austrian woodcutting; the narrator, knowing better, addresses the village clock with terrible irony: \"that poor old clock of Hochkirch, unweariedly grunting forward to the stroke of five, will strike up something it is little expecting!\" [8] The future-tense menace planted in a present-tense scene is a refined version of the Leuthen \"But he cannot\": the narrator stands outside time and lets the reader feel the trap close.\n\nThe contemporary verdict on the style was double — Thackeray supplied both the indictment and the defense, and modern criticism has restated his \"method in it.\" The decisive early statement is Thackeray's 1837 *Times* review of *The French Revolution*, which both convicts and acquits the style. The indictment, verified verbatim: \"It is stiff, short, and rugged, it abounds with Germanisms and Latinisms, strange epithets, and choking double words.\" [2] The acquittal, in the same review, comes after he has quoted the fall of the Bastille: \"This is prose run mad—no doubt of it—according to our notions of the sober gait... but is there not method in it.\" [2] He then asks whether conventional prose could have rendered the event \"in briefer words, more emphatically, or more sensibly\" — conceding that the deformation might be the only adequate vehicle. [2] That \"method in it\" is the whole later defense in embryo: the deformation is expressive, not accidental.\n\nThe modern criticism has largely restated Thackeray. John Rosenberg's *Carlyle and the Burden of History* (1985), in its chapter \"The Long Night of Frederick the Great,\" reads the very awkwardness of the prose as functional — Carlyle's insistence on prosaic reality producing a \"visionary realism,\" the jarring surface deliberately meant to \"shock readers out of dreamy historical fiction into historical fact.\" [9] George Levine's well-known essay title — \"The Use and Abuse of Carlylese\" — encapsulates the balanced modern posture: the style is at once Carlyle's instrument and his temptation. [3] By the later nineteenth century, however, the verdict tilted toward exhaustion with the manner: Stewart records Merivale's judgment that \"His peculiar style and mannerism seem already things of the past to this generation. Imitators of Carlyle abounded not many years ago, and a serious infliction they became.\" [3] (Thackeray is verified at victorianweb; Rosenberg's chapter title and thesis via publisher and table-of-contents sources; Merivale and Levine via Stewart's apparatus.) [2][3][9]\n\nFinally, Carlyle himself experienced the style and the book as agony, which colors the prose with audible weariness and self-mockery. The strain shows in his letters and bleeds into the narration. To Emerson, Carlyle described the composition as a torment of unwritable reading: \"I am still reading, reading, most nightmare Books about Fritz; but as to writing,—*Ach Gott!* Never, never.\" [5] The same self-disgust surfaces inside the *History* as comic apostrophe to his own difficulty — the Dryasdust passages, the parenthetical apologies to the reader, the open confession that \"this is one of the grand difficulties for my readers and me.\" [6] The famous wry coinage for the whole undertaking — Frederick's collected sayings imagined as scripture, \"The Koran of Friedrich, or the Lamentation-Psalms of Friedrich! But it would need an Editor,—other than Dryasdust!\" — turns the labor of editing dead documents into a biblical joke. [8] The exhaustion is part of the texture: the prose performs its own difficulty. (The Emerson letter is verified in Gutenberg #13660; the textual examples are verified throughout.) [5][6][8]\n\n## The architecture of the sentence\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 424\" role=\"img\" aria-label=\"An anatomy of Carlyle's most-quoted sentence, 'Poor Imperial Majesty; a human creature doing Play-actorisms of too high a flight.' Three words are coloured and labelled in cards below: 'Poor' is mock-pity apostrophe; 'Imperial Majesty;' is parataxis with a Sham Power named; 'Play-actorisms' is a coined nonce-word. A six-tile kit lists the recurring devices with a grounded specimen of each: parataxis, the fragment, moralized ellipsis, fire-coinage, capitalized Powers, and the present tense.\">\n<text x=\"350\" y=\"30\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" letter-spacing=\"2\">ANATOMY OF A CARLYLESE SENTENCE<\/text>\n<text x=\"350\" y=\"48\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">the single most-quoted specimen &#8212; three devices fused in one period<\/text>\n<line x1=\"150\" y1=\"60\" x2=\"550\" y2=\"60\" class=\"ln\" stroke-width=\"1.5\"/>\n<text x=\"350\" y=\"98\" text-anchor=\"middle\" font-size=\"15.5\" class=\"t-serif\"><tspan style=\"fill:var(--t3)\">Poor<\/tspan> <tspan style=\"fill:var(--t2)\">Imperial Majesty;<\/tspan> a human creature doing <tspan style=\"fill:var(--t5)\">Play-actorisms<\/tspan> of too high a flight<\/text>\n<rect x=\"54\" y=\"128\" width=\"172\" height=\"74\" rx=\"2\" class=\"f-panel\" stroke-width=\"1.2\" style=\"stroke:var(--t3)\"/>\n<rect x=\"54\" y=\"128\" width=\"172\" height=\"4\" style=\"fill:var(--t3)\"/>\n<text x=\"140\" y=\"152\" text-anchor=\"middle\" font-size=\"12\" class=\"t-serif\" style=\"fill:var(--t3)\">&#8220;Poor&#8221;<\/text>\n<text x=\"140\" y=\"172\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">MOCK-PITY<\/text>\n<text x=\"140\" y=\"190\" text-anchor=\"middle\" font-size=\"9\" class=\"t-muted\" font-style=\"italic\">the recurrent apostrophe<\/text>\n<rect x=\"242\" y=\"128\" width=\"200\" height=\"74\" rx=\"2\" class=\"f-panel\" stroke-width=\"1.2\" style=\"stroke:var(--t2)\"/>\n<rect x=\"242\" y=\"128\" width=\"200\" height=\"4\" style=\"fill:var(--t2)\"/>\n<text x=\"342\" y=\"152\" text-anchor=\"middle\" font-size=\"12\" class=\"t-serif\" style=\"fill:var(--t2)\">&#8220;Imperial Majesty;&#8221;<\/text>\n<text x=\"342\" y=\"172\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">PARATAXIS &#183; a SHAM NAMED<\/text>\n<text x=\"342\" y=\"190\" text-anchor=\"middle\" font-size=\"9\" class=\"t-muted\" font-style=\"italic\">the semicolon assembles; a Power addressed<\/text>\n<rect x=\"458\" y=\"128\" width=\"188\" height=\"74\" rx=\"2\" class=\"f-panel\" stroke-width=\"1.2\" style=\"stroke:var(--t5)\"/>\n<rect x=\"458\" y=\"128\" width=\"188\" height=\"4\" style=\"fill:var(--t5)\"/>\n<text x=\"552\" y=\"152\" text-anchor=\"middle\" font-size=\"12\" class=\"t-serif\" style=\"fill:var(--t5)\">&#8220;Play-actorisms&#8221;<\/text>\n<text x=\"552\" y=\"172\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">COINAGE<\/text>\n<text x=\"552\" y=\"190\" text-anchor=\"middle\" font-size=\"9\" class=\"t-muted\" font-style=\"italic\">a nonce &#8220;choking double word&#8221; (Thackeray)<\/text>\n<line x1=\"60\" y1=\"226\" x2=\"640\" y2=\"226\" class=\"ln-soft\" stroke-width=\"1\"/>\n<text x=\"350\" y=\"246\" text-anchor=\"middle\" font-size=\"11.5\" class=\"t-serif\" letter-spacing=\"2\">THE KIT &#8212; SIX RECURRING DEVICES<\/text>\n<rect x=\"58\" y=\"260\" width=\"188\" height=\"56\" rx=\"2\" class=\"f-panel\" stroke-width=\"1\" style=\"stroke:var(--border)\"/>\n<text x=\"68\" y=\"280\" font-size=\"10.5\" font-weight=\"bold\" style=\"fill:var(--t1)\">Parataxis<\/text>\n<text x=\"68\" y=\"298\" font-size=\"8.6\" class=\"t-mono\">bare of hedges;<\/text>\n<text x=\"68\" y=\"309\" font-size=\"8.6\" class=\"t-mono\">ploughable all of it<\/text>\n<rect x=\"256\" y=\"260\" width=\"188\" height=\"56\" rx=\"2\" class=\"f-panel\" stroke-width=\"1\" style=\"stroke:var(--border)\"/>\n<text x=\"266\" y=\"280\" font-size=\"10.5\" font-weight=\"bold\" style=\"fill:var(--t1)\">The fragment<\/text>\n<text x=\"266\" y=\"301\" font-size=\"8.6\" class=\"t-mono\">&#8220;But he cannot.&#8221;<\/text>\n<rect x=\"454\" y=\"260\" width=\"188\" height=\"56\" rx=\"2\" class=\"f-panel\" stroke-width=\"1\" style=\"stroke:var(--border)\"/>\n<text x=\"464\" y=\"280\" font-size=\"10.5\" font-weight=\"bold\" style=\"fill:var(--t1)\">Moralized ellipsis<\/text>\n<text x=\"464\" y=\"298\" font-size=\"8.6\" class=\"t-mono\">CETERA DESUNT;<\/text>\n<text x=\"464\" y=\"309\" font-size=\"8.6\" class=\"t-mono\">but that is enough<\/text>\n<rect x=\"58\" y=\"324\" width=\"188\" height=\"56\" rx=\"2\" class=\"f-panel\" stroke-width=\"1\" style=\"stroke:var(--border)\"/>\n<text x=\"68\" y=\"344\" font-size=\"10.5\" font-weight=\"bold\" style=\"fill:var(--t3)\">Fire-coinage<\/text>\n<text x=\"68\" y=\"362\" font-size=\"8.6\" class=\"t-mono\">fire-deluge &#183; fire-storm<\/text>\n<text x=\"68\" y=\"373\" font-size=\"8.6\" class=\"t-mono\">&#183; Horse-deluge<\/text>\n<rect x=\"256\" y=\"324\" width=\"188\" height=\"56\" rx=\"2\" class=\"f-panel\" stroke-width=\"1\" style=\"stroke:var(--border)\"/>\n<text x=\"266\" y=\"344\" font-size=\"10.5\" font-weight=\"bold\" style=\"fill:var(--t2)\">Capitalized Powers<\/text>\n<text x=\"266\" y=\"365\" font-size=\"8.6\" class=\"t-mono\">Sham &#183; Reality &#183; Veracity<\/text>\n<rect x=\"454\" y=\"324\" width=\"188\" height=\"56\" rx=\"2\" class=\"f-panel\" stroke-width=\"1\" style=\"stroke:var(--border)\"/>\n<text x=\"464\" y=\"344\" font-size=\"10.5\" font-weight=\"bold\" style=\"fill:var(--t5)\">Present tense<\/text>\n<text x=\"464\" y=\"365\" font-size=\"8.6\" class=\"t-mono\">he is tumbling to Leuthen<\/text>\n<text x=\"350\" y=\"406\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\" font-style=\"italic\">One sentence carries three devices at once; the same kit, recombined, builds every page of six volumes.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 2.<\/strong> Carlylese is a finite, recombinant kit, not free-form eccentricity: a single eight-word clause fuses mock-pity, parataxis with a Sham named, and a coined &#8220;choking double word,&#8221; and the same six devices &#8212; here each shown with a verbatim specimen &#8212; assemble the whole <em>History<\/em>. The deformation is systematic, which is Thackeray&#8217;s point that there is &#8220;method in it.&#8221;<\/figcaption>\n<\/figure>\n\n\nRead at the level of the period, Carlylese in *Friedrich* abandons the Ciceronian or Johnsonian balanced sentence — subject, predicate, suspended subordination resolving into closure — for something nearer to a stream of telegraphed impressions. The governing principle is parataxis: clauses set side by side, weighted equally, divided by semicolons and dashes, so that the reader assembles the relation rather than receiving it ready-subordinated. The topographic descriptions before a battle are the clearest case. The Prag upland — \"Atop it spreads out, far and wide, into a waving upland level; bare of hedges; ploughable all of it, studded with littery hamlets and farmsteadings\" — has no main clause doing the organizing; there is only a sequence of semicolon-separated touches, each adding a stroke to a picture the reader paints. [8] The technique is why his battles feel observed rather than recounted.\n\nThe fragment and the suspended opening are the natural complements of parataxis. Carlyle habitually begins a paragraph with a participle or a noun-phrase and lets the grammatical subject arrive late or never. \"Done, that Sterbohol work\" throws the result forward and the agency back, dramatizing confusion as a feature of the event, not a failure of the sentence; the same inversion of result-before-cause governs \"Done all this surely was.\" The most extreme contractions are the two-word fragments at the hinge of a catastrophe — \"But he cannot,\" \"But they cannot\" — where the foreshortening of the sentence enacts the foreshortening of the doomed man's time. [8] At the level of judgment the inversion serves antithesis, as in the wits' epigram on the Kaiser, \"he is Kaiser and Nothing!\", the most compact possible vehicle for the Sham idea. [4]\n\nEllipsis, finally, is moralized. When Carlyle breaks off — \"Poor fellows: CETERA DESUNT; but that is enough\" — the Latin tag (\"the rest is missing\") is not only an editor's note on a damaged source but a statement of his whole theory of history: the record is fragmentary, the historian's art is to make the surviving fragments speak. [8] The broken sentence and the broken archive are made to rhyme. The point is the one Rosenberg presses: the writing is *meant* to feel like wreckage, because wreckage is what history hands the historian, and smoothness would be a lie about the material. [9]\n\n## Coinage and the lexicon of force\n\nIf syntax is the skeleton of Carlylese, the coined compound is its musculature. The hyphenated double word — Thackeray's \"choking double words\" — lets Carlyle pack a metaphor and its qualifier into a single semantic unit and fire it at speed. [1] The densest clusters gather around two fields. The first is fire and violence: \"fire-deluges,\" \"fire-torrents,\" \"fire-flood,\" \"fire-storm,\" \"fire-element,\" \"platoon-fires,\" \"Horse-deluge,\" \"thunder-growl,\" \"death-wrestle.\" The metaphor is consistent across battles — at Mollwitz the steadfast battalions are \"steadily spouting fire-torrents\" and the cavalry charge is \"the Horse-deluge thundering in upon you\"; at Leuthen the musketry is \"the Prussian fire-storm for accompaniment\"; at Prag it is the \"fire-element\" to be wielded \"as Jove his thunder, by rule.\" [6][8] The recurrence is not lazy repetition but a deliberate system: Prussian fire is always the disciplined element, the enemy always the formless deluge or blaze.\n\nThe second field is the moral-demonic: \"Mud-gods,\" \"grass-devil,\" \"Sham-King,\" \"Born Sham-King,\" \"Sham-Napoleon,\" \"Play-actorisms,\" \"tagraggery,\" \"hell-dogs,\" \"Artificial Sun-god.\" Each compound is an argument compressed. \"Mud-gods\" indicts the false objects of worship; \"Play-actorisms\" indicts performed rather than real kingship; \"Sham-Napoleon\" pre-judges a man as a counterfeit of greatness; \"Artificial Sun-god\" reduces the schemer Belleisle to stage machinery. [4][6][8] The lexicon is the Sham/Reality polemic — stated nakedly at Mollwitz as \"a Veracity in Things, and a Mendacity in Sham-Things\" — distributed across thousands of small lexical decisions. [6]\n\nAlongside coinage runs a deliberate archaism and a private mythology of recurring nonce-figures. \"Dryasdust,\" the personified pedant-antiquary, is invoked whenever Carlyle wants to dramatize the deadness of unimaginative scholarship against his own quickening art; he is even hailed in the vocative — \"O Dryasdust\" — and chided for refusing to abridge. [11] The irregular Austrian troops are reduced by mock-learned coinages — \"Tolpatcheries,\" \"the tagraggery of Croats,\" \"Pandour Trenck\" — that perform contempt through diction alone. [4][8] The effect is a prose that sounds like no one else, which is exactly the complaint and the achievement: a style so marked that, as Merivale noted, its imitators became \"a serious infliction.\" [3]\n\n## The narrator as presence: apostrophe, exclamation, and the Old-Testament voice\n\nThe reader of *Friedrich* is never alone with the facts. A loud, opinionated, frequently exhausted narrator stands between reader and event, addressing both the reader and the dead. The apostrophe to the reader manages the relationship moment to moment — apologizing (\"Pardon, O reader!\"), reassuring (\"Patience, reader.\"), conspiring (\"fear not, reader\"), pointing at the map (\"mark that, O reader (see Map)\"), and recruiting the reader's imagination as the indispensable instrument of historical resurrection (\"if the lively reader will exert his fancy on it\"). [4][5] The narrator also overrules the reader's snap judgments in real time — \"A Crown-Prince with excellent histrionic talents, thinks the reader. Well; ... but that is by no means the whole or even the main part of the phenomenon, O reader\" — staging the act of correction as a small drama between two minds. [5] The apostrophe to historical figures collapses the distance of centuries: the Kaiser is addressed as \"Poor Imperial Majesty\"; the warring princes are lectured directly — \"Yes, my Imperial friends; War is not a thing of streamering and ornamental trumpeting alone.\" [4][8]\n\nAbove this sits the prophetic register. Carlyle's exclamations and rhetorical questions are not mere emphasis; they are the cadence of the Hebrew prophets carried into nineteenth-century historiography. The address to England — \"the Eternal Destinies knocking at England's door again: 'Are you ready for the crisis, birth-point of long Ages to you, which is now come?'\" — is scripture in everything but provenance: the capitalized Powers, the direct second-person summons, the imminence of judgment. [8] The \"Yes, my friends\" that prefaces the Mollwitz prophecy is the cadence of the pulpit; the diagnosis that follows — \"Slumberous Europe, rotting amid its blind pedantries, its lazy hypocrisies\" being shaken \"out of its stupid refuges of lies\" — is jeremiad. [6] John Holloway's category of \"the Victorian sage\" describes exactly this fusion of historian and prophet, and *Friedrich* is its largest application. [12] The narratorial \"we,\" the editorial intrusions (\"this Editor,\" \"your poor Prussian Dryasdust\"), and the open confessions of difficulty keep the act of composition visible, so that the book is as much about the agony of writing history as about the history itself — a self-consciousness Carlyle lived out in his letters: \"most nightmare Books about Fritz... Ach Gott! Never, never.\" [5]\n\n## The critical debate over the style: Thackeray to the readability question\n\nThe argument about Carlylese is nearly as old as Carlylese itself, and it has run, almost without exception, on the two rails Thackeray laid down in 1837. The first rail is the indictment: the prose is \"stiff, short, and rugged,\" it \"abounds with Germanisms and Latinisms, strange epithets, and choking double words.\" [2] This is a precise inventory of the very devices catalogued above — the ruggedness is the parataxis and the fragment; the Germanisms and Latinisms are the glossed (ERZGEBIRGE) and the CETERA DESUNT; the strange epithets and choking double words are the fire-element and the Born Sham-King. Thackeray's grievance is the grievance every later detractor repeats, only less wittily.\n\nThe second rail is the defense, and it is decisive that the same critic supplied it in the same review: \"This is prose run mad—no doubt of it—according to our notions of the sober gait... but is there not method in it.\" [2] Thackeray reaches this concession only after quoting Carlyle's Bastille and finding that he cannot improve on it — that no \"sober\" prose could render the event \"more emphatically, or more sensibly.\" [2] The defense is therefore empirical, not theoretical: the deformed sentence does a thing the well-made sentence cannot. Every later apologist for Carlyle has, in effect, been elaborating \"is there not method in it.\" Rosenberg's formulation a century and a half later is the same claim raised to a thesis: the awkwardness is a designed instrument, a \"visionary realism\" whose jarring surface is meant to \"shock readers out of dreamy historical fiction into historical fact,\" so that the style's roughness is the proof of its honesty about the rough material of the past. [9] Stewart, working specifically on *Friedrich*, locates the method in the management of the reader — the tense-shifts, the apostrophes, the three-way author–subject–reader relationship — as a deliberate \"strategy of commanding their attention.\" [3]\n\nAgainst this runs the fatigue argument, which is essentially a quantitative complaint: what is brilliant in a paragraph becomes oppressive across six volumes and well over a million words. Merivale's verdict, recorded by Stewart, marks the moment the manner curdled into mannerism in the public mind — \"His peculiar style and mannerism seem already things of the past to this generation. Imitators of Carlyle abounded not many years ago, and a serious infliction they became.\" [3] The very phrase \"a serious infliction\" is the readability question in nineteenth-century dress, and it has only sharpened: *Friedrich* is today by far the least-read of Carlyle's major works, and the prose is part of the reason. Levine's titular formula, \"The Use and Abuse of Carlylese,\" concedes that the same instrument can be used and abused, sometimes on the same page. [3] The honest position holds both rails at once: the style is genuinely an \"infliction\" at length and genuinely possessed of \"method,\" and the reader's experience of *Friedrich* is the oscillation between the two.\n\n## The case against and the case for\n\nThe case against Carlylese is old and not without merit. At six volumes the relentless deformation that thrills in a paragraph can exhaust across a chapter; the perpetual exclamation flattens emphasis by overuse; the coinages occasionally obscure rather than compress; the digressive apostrophes, charming once, multiply into mannerism; the recurring nonce-personae and the repeated fire-and-deluge lexicon can feel like the writer running his own machinery. Merivale's verdict that the style had become \"a serious infliction\" in its imitators registers a real fatigue, and the modern charge of unreadability is partly a verdict on the prose, not only on the subject. [3] Levine's titular formula concedes the abuse. [3]\n\nThe case for is the one Thackeray made first and that close reading sustains: there is method in it. [2] The fragmentation is mimetic of the fragmentary record — \"CETERA DESUNT; but that is enough.\" [8] The present tense earns its immediacy at the decisive instant and nowhere else — \"at two he is tumbling in mid-career towards Leuthen,\" \"But he cannot.\" [8] The coinages do semantic work no existing word would do, and they form a consistent system (disciplined fire-element versus formless Horse-deluge) rather than random ornament. [6][8] The capitalized abstractions are not affectation but a coherent moral cosmology stated outright in the text — \"a Veracity in Things, and a Mendacity in Sham-Things.\" [6] The apostrophes build the collaborative relationship with the reader that the resurrection of the dead past actually requires. The \"anthracite vs. kindled straw\" sentence is the proof: a metaphor, a coinage, a classical allusion, and the book's entire theory of disciplined power, all delivered in one governed, burning period. [8] When Carlyle is in command of the style rather than indulged by it — as he is in the anthracite sentence, the Hochkirch net, the Mollwitz prophecy — Carlylese is one of the most expressive instruments in English prose. The honest verdict is that *Friedrich* contains both the command and the indulgence, often on the same page; Rosenberg's \"visionary realism\" and Merivale's \"serious infliction\" are both true, and the reader feels them alternating. [9][3]\n\n## Open Questions\n\n- The \"It is 6 o'clock. Damp dusk...\" present-tense battle opening is cited by Stewart from Works 17:66 (Leuthen) but was not located at that exact wording in vol. 2118 as fetched; what *is* verified there are the Leuthen present-tense passages quoted above in the discussion of tense-shifting (\"at two he is tumbling,\" \"Chaos come on us,\" \"But he cannot\"). The \"It is 6 o'clock\" wording should be checked against the Centenary/Works edition before being quoted as primary. [3]\n- The precise statistical density of coined compounds and bracketed German glosses per page across the six volumes is not established here; a full concordance of vols. 2101–2122 would let the \"high density\" claim be quantified rather than asserted. The bracketed-gloss tic alone runs to dozens of instances per volume (sampled in vol. 12).\n- Rosenberg's chapter \"The Long Night of Frederick the Great\" is cited here by verified title and well-attested thesis; direct verbatim quotation from that chapter could not be confirmed from a fetchable full text and is therefore paraphrased, not quoted. [9]\n- The exact page/edition for Thackeray's \"prose run mad... method in it\" wording varies between the *Times* original (1837) and later collected editions; the wording is verified at victorianweb but the canonical citation page differs by edition. [1][2]\n- The degree to which the King-James cadence is conscious imitation versus absorbed habit (Carlyle's Annandale Calvinist upbringing) is interpretive and unsettled in the criticism.\n\n## Sources\n\n1. Thackeray, William Makepeace, \"Carlyle's French Revolution\" (1837 review, *The Times*), reprinted in *The Works of William Makepeace Thackeray*. Summary and context at victorianweb.org, https://victorianweb.org/authors/wmt/carlyle.html — Tier 2 (scholarly aggregation of primary review).\n2. Thackeray on Carlyle's style (verbatim excerpts: \"stiff, short, and rugged... choking double words\"; \"This is prose run mad... is there not method in it\"; the Bastille \"briefer words, more emphatically, or more sensibly\" passage), https://victorianweb.org/authors/carlyle/repute/thackeray1.html — Tier 1/2 (primary review text, verified verbatim).\n3. Stewart, Linda C., *Thomas Carlyle and the making of Frederick the Great*, PhD thesis, University of Edinburgh, 2009/2010, https://era.ed.ac.uk/bitstream/handle/1842/5526/Stewart2010.pdf — Tier 2 (scholarly; source for narrative-style analysis, tense-shifting, the three-way reader relationship, and the Merivale and Levine references).\n4. Carlyle, Thomas, *History of Friedrich II of Prussia*, Volume XIV (Project Gutenberg ebook #2114), https://www.gutenberg.org/cache/epub/2114/pg2114.txt — Tier 1 PRIMARY (fetched and grepped; source of \"Play-actorisms,\" \"tagraggery,\" reader-apostrophes, \"Poor...\" instances, \"Kaiser and Nothing,\" \"Done, that Sterbohol work,\" \"March; 'March 26th and 27th'\").\n5. Carlyle, Thomas & Emerson, Ralph Waldo, *The Correspondence of Thomas Carlyle and Ralph Waldo Emerson* (Project Gutenberg ebook #13660), verified text — Tier 1 PRIMARY (\"most nightmare Books about Fritz... Ach Gott! Never, never\"); plus Carlyle, *History of Friedrich*, Volume VIII (Project Gutenberg ebook #2108), https://www.gutenberg.org/cache/epub/2108/pg2108.txt — Tier 1 PRIMARY (source of \"mark that, O reader (see Map),\" \"Patience, reader,\" \"O reader. This Crown-Prince,\" \"Poor man... human too\").\n6. Carlyle, Thomas, *History of Friedrich II of Prussia*, Volume XII (Project Gutenberg ebook #2112), https://www.gutenberg.org/cache/epub/2112/pg2112.txt — Tier 1 PRIMARY (source of \"a Veracity in Things, and a Mendacity in Sham-Things,\" \"Time Horologe... New Epoch,\" \"Yes, my friends,\" the Mollwitz \"GRAVITATISCH\" passage, \"steadily spouting fire-torrents,\" \"Steady, MEINE KINDER... whites of their eyes... Horse-deluge,\" \"world-wide battlings, throttlings and intriguings,\" the Belleisle \"two enormous wings... common cock\" image, act\").\n11. Carlyle, Thomas, *History of Friedrich II of Prussia*, Volume II (Project Gutenberg ebook #2102), https://www.gutenberg.org/cache/epub/2102/pg2102.txt — Tier 1 PRIMARY (source of the Dryasdust apostrophes, \"What multiple of the Equator was it, then, O Dryasdust?\").\n12. Holloway, John, *The Victorian Sage: Studies in Argument* (1953) — Tier 2 (framework for the prophetic/sage register; cited as standard scholarly framing, not quoted verbatim)."}, {"order": 3, "file": "03_Dryasdust_Narrative_Technique.md", "title": "The \"Dryasdust\" Device and Narrative Technique", "summary": "", "body": "# The \"Dryasdust\" Device and Narrative Technique\n\n## Bottom Line\n\nThroughout the *History of Friedrich II of Prussia* (1858–1865) Carlyle conducts his narrative against a recurring foil he calls \"Dryasdust\" — a name he inherited from Walter Scott's prefatory fictions — which personifies the pedantic, lifeless, archive-bound historiography Carlyle had spent his career repudiating, most programmatically in the \"Anti-Dryasdust\" chapter of his earlier *Oliver Cromwell's Letters and Speeches* (1845) [1][6][7]. In *Friedrich* the figure recurs as a rhetorical *device*: an apostrophized scapegoat onto whom Carlyle projects his real and continual frustration with fragmentary, indexless, and \"lazy\" Prussian sources, dramatizing the labour of historical reconstruction as an open struggle staged in front of the reader [2][3][8]. Linda Stewart's 2010 Edinburgh thesis, building on Ruth apRoberts, reads this performance as the engine of \"a remarkable three-way relationship between himself, Frederick, and the reader,\" in which Carlyle abandons conventional historiography for the persona of an oral *storyteller* who interrupts, addresses, withholds, and conspires with his audience [4][9]. The techniques that sustain this relationship — direct address, parenthetical aside, deliberate suspense, sudden present-tense immediacy, and embedded dialogue — are the substance of this document. The expanded analysis below verifies a substantially larger body of \"Dryasdust\" instances spread across the work (from Volume 1's near-thesis statement, \"the Prussian Dryasdust ... excels all other Dryasdusts yet known,\" to the late-volume \"Dryasdustic Ages\" and the editor's cry, \"what can an Editor do!\"), and traces the device's literary genealogy from Scott's fictional Dr. Jonas Dryasdust through the Editor of *Sartor Resartus* to the Shandean digressive narrator apRoberts identifies [4][9][10]. An important correction governs the whole: Dryasdust is a *device and personification recurring across the work*, not a member of any cast of named fictional characters; the analysis below treats it strictly as such.\n\n## The Device and Its Workings\n\nAcross *Friedrich*, \"Dryasdust\" functions as a single recurring rhetorical figure — a personified abstraction standing for dead, pedantic, archive-bound history — rather than as one of several named fictional dramatis personae. It is invoked, apostrophized, blamed, and occasionally pitied, but it is a device through which Carlyle stages his relation to his sources. The name is a generic personification, used interchangeably and pluralizably — \"the Prussian Dryasdust,\" \"all other Dryasdusts yet known,\" \"old German Dryasdust,\" \"the voluminous Dryasdusts of Prussia,\" and the adjectival \"Dryasdustic Ages\" — a type, never an individuated person [2][4]. Volume 1 furnishes what is effectively the work's working definition, where Carlyle glosses a German phrase with the figure in square brackets: \"it is frightful to see the *Gelehrte Dummkopf* [what we here may translate, DRYASDUST] doing the function of History, and the Shakspeare and the Goethe neglecting it\" [2]. The bracketed translation tells us plainly that \"Dryasdust\" is for Carlyle a *kind* — the learned blockhead, the *gelehrte Dummkopf* — and not a man. Carlyle had already devoted an entire introductory chapter to the figure under the title \"Anti-Dryasdust\" in *Oliver Cromwell's Letters and Speeches* (1845), where it names a whole mode of historiography rather than a person [1][6]. In *Friedrich* the figure appears at scattered points across volumes to perform the same function — to embody the obstruction between Carlyle and the living past — and is addressed in the second person as a fault to be forgiven rather than dramatized as a participant in events: \"Enough, he could do no other: I have striven to forgive him. Let the reader now forgive me; and think sometimes what probably my raw-material was!\" [4]. Stewart's organizing chapters treat it throughout as Carlyle's \"'Dryasdust' approach to historiography that he repeatedly criticised,\" i.e. a method-as-personification [4][9].\n\nThe corrective is worth stating because casual summaries sometimes imply an invented cast; the primary text supports only a recurring device.\n\nThe name and the antagonism are borrowed from Walter Scott. Carlyle took \"Dryasdust\" directly from Sir Walter Scott, who had used the fictitious \"Rev. Dr. Jonas Dryasdust\" as a tediously thorough antiquarian addressee in the prefatory matter of the Waverley novels, and repurposed Scott's joke into a serious historiographical antagonist. Scott created the imaginary pedant Dryasdust as a learned correspondent to whom prefaces could be addressed; the name thereafter became a byword for \"anyone who presents historical facts with no feeling for the personalities involved\" [1]. Carlyle's debt to Scott is doubled: he both borrowed the figure and explicitly admired Scott's opposite virtue. In his 1838 essay \"Sir Walter Scott,\" Carlyle praised the historical novels for having \"taught all men this truth … that the bygone ages of the world were actually filled by living men, not by protocols, state-papers, controversies and abstractions of men … but men, in buff or other coats and breeches, with colour in their cheeks, with passions in their stomach, and the idioms, features and vitalities of very men\" [4]. Dryasdust is precisely the producer of \"protocols, state-papers, controversies and abstractions\"; Scott's fiction is the antidote Carlyle prizes. There is a crucial difference of register between source and inheritor, however. Scott's Dryasdust is a *recipient* — the patient ear into which prefatory information is poured, a comic fiction internal to the novels' apparatus. Carlyle's Dryasdust is a *producer* and an *obstacle* — the maker of the very dust the storyteller must clear away. Scott domesticated the antiquary by making him an interlocutor; Carlyle re-weaponized the figure by making him the standing enemy of the living tale. The personification thus arrives in *Friedrich* already freighted with a quarter-century of Carlylean use, and inverted from its Scott original.\n\nThe Scott origin is documented, and the \"buff or other coats\" passage is verified verbatim from Carlyle's *Works* via Stewart's citation (Works 29: 77–78) [4].\n\nThe verbatim apostrophes dramatize archival frustration as a shared ordeal: Carlyle's direct, second-person addresses to \"Dryasdust\" convert the private misery of working with poor sources into a public, dramatized grievance the reader is invited to share, making the labour of history visible. A now-enlarged set of passages, all verified against Project Gutenberg, shows the technique across the whole work and at several pitches. The most explicit, near a thesis-statement, comes early: \"Truth is, the Prussian Dryasdust, otherwise an honest fellow, and not afraid of labor, excels all other Dryasdusts yet known; I have often sorrowfully felt as if there were not in Nature, for darkness, dreariness, immethodic platitude, anything comparable to him\" [2]. The triad \"darkness, dreariness, immethodic platitude\" is the bill of indictment in three words; \"otherwise an honest fellow, and not afraid of labor\" is the standing concession that keeps the figure pitiable rather than wicked. The indexless complaint then implicates the reader as a fellow sufferer who must squint at the archive: \"Your poor Prussian Dryasdust (without even an Index to help you) being at least authentic, if you look a long time intensely and on many sides, features do at last dawn out of those sad vortexes\" [2]. The cry of frustrated desire names exactly what the source withholds — the physiognomy of Frederick's soul: \"Approximately what the thing to human eyes might be like; what Friedrich's procedure, humor and physiognomy of soul was in it: this, especially the latter head, is what we search for,—had lazy Dryasdust given us almost anything on this latter head!\" [3]. The resigned, pitying register ends in absolution and self-defense — Carlyle forgives Dryasdust and asks the reader, in turn, to forgive Carlyle: \"the Prussian Dryasdust … has made of Friedrich's History a wide-spread, inorganic, trackless matter; dismal to your mind, and barren as a continent of Brandenburg sand! Enough, he could do no other: I have striven to forgive him. Let the reader now forgive me; and think sometimes what probably my raw-material was!\" [4].\n\nVolume 1 supplies an additional cluster of newly verified instances that show the device operating from the very opening books. The compiler who cannot order his materials: \"Books born mostly of Chaos—which want all things, even an INDEX—are a painful object\" [2] — the want of an index becomes, here as in the \"poor Prussian Dryasdust\" aside, the synecdoche for the whole defect. The compiler who buries the truth in detail: \"do not ask poor Dryasdust, who overwhelms himself with idle details, and by reason of the trees is unable to see the wood\" [2]. The compiler whose pretensions worsen confusion: \"(which Dryasdust does not the least know, and only makes you more uncertain the more he pretends to tell)\" [2] — the clause is itself parenthetical, an aside spoken sideways to the reader. And the compiler whose books are an unread-able nightmare: \"Their life, read in Dryasdust's newest chaotic Books (which are of endless length, among other ill qualities), is like a dim nightmare of unintelligible marching and fighting: one feels as if the mere amount of galloping they had would have carried the Order several times round the Globe\" [2]. The late volumes extend the figure to a whole epoch with the adjective: the Imperial Eagle \"shines on me as a human fact; luminously gilt, through the dark Dryasdustic Ages, gone all spectral under Dryasdust's sad handling\" [2] — where \"gone all spectral\" is the precise charge of the 1845 \"Anti-Dryasdust\" essay (records that have ceased to be living and become ghosts).\n\nTwo further verified instances confirm the device's tonal range. The historian confesses the limits of his own sources by blaming the figure's incuriosity: \"This is a mere guess of mine, Dryasdust having been incurious: but, to English readers it is incredible for what sums Friedrich got his work done, no work ever better\" [3]; and he laments the want of conclusive detail with a counterfactual, dropped into a bracketed source-note: \"substantially true, I doubt not; but little or nothing of it so definite and conclusively distinct as it ought, in all items, to have been by this time,—had poor Dryasdust known what he was doing\" [3]. Finally, a passage that exposes the whole irony of the relationship in one breath — Carlyle scolds the figure even while depending on it and even while inviting it to do better: \"to my regret,—which surely the Prussian Dryasdust might still amend a little?—in respect of so distinguished a person, and chosen Peer of Friedrich's\" [3]. The recurring epithets — \"poor,\" \"lazy,\" \"incurious,\" \"honest fellow ... not afraid of labor\" — are not random abuse but a consistent characterization: Dryasdust is industrious without insight, a hoarder of dust who cannot see the life in it; \"by reason of the trees is unable to see the wood\" [2] is the device's whole psychology in a proverb.\n\nThese rest on a now-substantially-enlarged set of separately verified primary instances spanning Gutenberg #2102 (Volume 1/Book 2), #2114, and #2118 [2][3][4].\n\nCarlyle rejects \"Dryasdust\" historiography in favour of the storyteller persona. The anti-Dryasdust stance is not merely negative; it positively licenses Carlyle to adopt the persona of an oral storyteller — to write *Friedrich* as a \"Tale\" rather than as a conventional, document-marshalling history. Stewart argues that Carlyle \"adopted the persona of a storyteller throughout *Frederick*, employing a variety of oral strategies in order to 'speak' to his readers,\" precisely \"in his endeavour to write Frederick's history in a manner that was far removed from the 'Dryasdust' approach to historiography that he repeatedly criticised\" [4]. Carlyle frames the work itself as a tale of \"wonder\" that \"infers that Carlyle is acting as a storyteller rather than behaving as a conventional historian\" [4]. The theoretical ground is laid as far back as the lecture \"The Hero as Man of Letters,\" where Carlyle locates the writer's power in \"the speaking of man to men\" (Works 5: 159) [4] — the formula Stewart adopts as a chapter title for Carlyle's project of \"Creating a unified readership\" [4]. The primary text confirms the storyteller's self-consciousness about his oral relation to the reader at the level of explicit metaphor: Carlyle calls his sources \"rough Note-books\" and, having read from them, closes them like a speaker pausing — \"So far my rough Note-books; which require again to be shut for the present, not to abuse the reader's patience, or lead him from his road\" [2]. The image is of a man with a notebook, reading aloud, deciding when to stop — the storyteller dramatizing his own performance. Carlyle situates the positive doctrine against Dryasdust in the same Volume 1: \"the highest Shakspeare producible is properly the fittest Historian producible\" [2]; the historian, that is, should be a poet of the real, not a *gelehrte Dummkopf*. Stewart situates the choice within the Victorians' anxiety about \"print culture's displacement of orality and contemporary attempts to 'write voice,'\" and catalogues the oral devices — \"circularity, repetition and suspense\" — by which Carlyle keeps a reading audience in the posture of a listening one [4].\n\nThis is Stewart's reading, now reinforced by the verified \"rough Note-books\" and \"fittest Historian\" passages from the primary text [2][4].\n\nThe device anchors apRoberts's \"remarkable three-way relationship.\" Ruth apRoberts characterizes the narrative architecture of *Friedrich* as \"a remarkable three-way relationship between himself, Frederick, and the reader, which is both open and perpetually shifting\"; the Dryasdust device and the storyteller's interruptions are the machinery that keeps Carlyle's own voice present as the third term of that triad. apRoberts's formulation, quoted by Stewart, is exact: \"In the *History of Frederick the Great*, Carlyle presents a remarkable three-way relationship between himself, Frederick, and the reader, which is both open and perpetually shifting\" (apRoberts, p. 24) [4][9]. Stewart builds her first chapter on it — \"Mastering the Narrative: Carlyle's 'remarkable three-way relationship'\" — and reads Frederick as situated \"firmly at the apex of this triadic structure\" [4]. Crucially, the third term, Carlyle himself, is sustained by exactly the interruptive habits the Dryasdust apostrophes exemplify: \"in order to maintain his position in the three-way relationship, Carlyle had to ensure that his own voice was always present in tandem with the telling of Frederick's history. He achieved this by frequently interrupting the main narrative either to interject his own informal and often humorous asides to the reader or to express his feelings of empathy with Frederick and his situation\" [4]. The Dryasdust passages are the clearest case of the first kind, but the primary text also shows the second kind — direct conscription of the reader into the historian's choices: \"Wherefore let the reader put up with an indifferent or bad one; he little knows how much worse it could easily have been!\" [2], and the disciplining of the reader's prejudices, \"Let me request all readers to blow that sorry chaff entirely out of their minds; and to believe nothing on the subject except what they get some evidence for\" [2]. apRoberts further notes the semi-autobiographical seepage that strengthens the triad: throughout the narrative \"little glimmers of light about himself break through\" (p. 24) [4]. apRoberts's essay carries the telling title \"The Historian as Shandean Humorist\" — locating Carlyle's digressive, self-interrupting manner in the tradition of Sterne's *Tristram Shandy* [9].\n\nThis scholarly framing rests on the apRoberts quotation verified through Stewart's reproduction and citation, and on the reader-conscripting passages newly verified in the primary text [2][4][9].\n\nTense-shifting, suspense, and dialogue are the working oral devices. The abstract \"storyteller persona\" is realized in concrete textual mechanics — abrupt shifts into the present tense for immediacy, deliberate withholding for suspense, parenthetical asides for intimacy, and embedded first-person dialogue — each verifiable in the text. Stewart documents that \"Carlyle regularly allows the narrative to move between tenses, often slipping into the present tense,\" citing the eerie quiet \"nothing alive, as you pass, but a few poor oxen languidly sauntering up and down\" (Works 17: 66), and \"using the present tense in battle scenes to heighten the sense of immediacy and involve the reader,\" as in the verified battle opening \"It is 6 o'clock. Damp dusk has thickened down into utter darkness, on these terms:—when, lo, cannonade and musketade from the south … seriously loud; red glow of conflagration visible withal\" [4]. For suspense, Stewart shows Carlyle naming a village, Kletschen, that he says deserves naming \"for a certain reason,\" then deferring the reason so that \"in order to discover this reason they must continue reading\" — and notes the self-aggrandizing twist of the device: \"the only person who can relieve the suspense is Carlyle himself\" [4]. The parenthesis is itself an oral device: Carlyle uses \"parentheses to enclose remarks that he is directing specifically towards the reader from himself,\" which \"creates a pause in the narrative and mimics the act of a speaker addressing an informal remark to a listener\" [4] — the same mechanism visible in the indexless Dryasdust aside, where the whole grievance is bracketed: \"(without even an Index to help you)\" [2], and in \"(which Dryasdust does not the least know, and only makes you more uncertain the more he pretends to tell)\" [2]. And for dialogue, Carlyle quotes Frederick's own voice into the running narrative — \"'Never have my troops,' says Friedrich, 'done such miracles of valour, cavalry as well as infantry, since I had the honour to command them'\" [4]. The primary text also shows the device of the *unseeable* scene, where present-tense immediacy is yoked to a confession of source-failure: of a great battle's inner sequence Carlyle writes that the movements were \"chaotic to all but the scientific eye,\" and that \"Of this great Action the Narratives old and modern are innumerable; false some of them, unintelligible well-nigh all\" [3] — so that the suspense of \"what really happened\" is generated precisely by the documented inadequacy of Dryasdust's record.\n\nThe devices are catalogued by Stewart and several of the illustrative quotations are independently verifiable in the primary text, now including the \"innumerable … unintelligible well-nigh all\" and \"scientific eye\" passages [3][4].\n\nFinally, the \"Editor\" persona links Friedrich's archival drama to *Sartor Resartus*. Carlyle's habit in *Friedrich* of calling himself \"this Editor\" and dramatizing the labour of ordering chaotic raw materials is continuous with — and an inheritance from — the Editor persona of *Sartor Resartus* (1833–34), where a beleaguered Editor must extract a coherent book and a life-history from the disordered papers of Diogenes Teufelsdröckh; the Dryasdust device is, in part, the *Friedrich*-era reincarnation of the *Sartor* Editor's struggle with chaos. In *Friedrich* Carlyle repeatedly drops the historian's mask and assumes an editor's, foregrounding the act of cutting and arranging: \"Brevity, this Editor knows, is extremely desirable, and that the scissors should be merciless on those sad Paper-Heaps, intolerable to the modern mind; but, unless the modern mind chance to prefer ease and darkness, what can an Editor do!\" [2]. The vocabulary — \"this Editor,\" \"scissors,\" \"Paper-Heaps,\" the comic helplessness of \"what can an Editor do!\" — is the precise idiom of *Sartor*, where the Editor confronts Teufelsdröckh's manuscript as \"an 'extensive Volume,' of boundless, almost formless contents, a very Sea of Thought,\" and declares, \"To bring what order we can out of this Chaos shall be part of our endeavor\" [10]. The structural parallel is exact: both works present a narrator whose ostensible subject (the Clothes-Philosophy; Frederick) reaches him only through hostile, disordered, fragmentary documents, and both make the *editorial ordeal itself* a major theme rather than concealing it. Stewart's fifth chapter — \"Carlyle as an editor: Processing the 'raw-material' of history\" — takes the Dryasdust \"raw-material\" passage as its epigraph and argues that Carlyle's habit of \"interweaving material from different sources into his narrative\" is itself the answer to Dryasdust [4]; this is the same labour the *Sartor* Editor performs on Teufelsdröckh's papers. The *Friedrich* Editor even apologizes, mid-archive, in the *Sartor* manner — \"Pardon, O reader!—\" [2] — after intruding a personal aside (\"by accident, this Editor knows Twenty of these fine fellows!\" [2]), exactly the self-interrupting, reader-buttonholing move that defines both books.\n\nThis is a textual and stylistic continuity: the *Friedrich* \"this Editor … what can an Editor do!\" and the *Sartor* \"very Sea of Thought … bring what order we can out of this Chaos\" are independently verified [2][10], while the genealogical reading — that one persona descends from the other — is offered as well-grounded interpretation, consistent with Stewart's editor-chapter framing [4].\n\n## The Inheritance: Scott's Joke Made Carlyle's Antagonist\n\nSir Walter Scott invented Dr. Jonas Dryasdust as a convenience — an imaginary learned correspondent to whom the prefaces of the Waverley novels could be addressed, a tediously thorough antiquary whose appetite for documentary detail justified the supply of background information [1]. The name was a self-deprecating in-joke about the dust of the archive. Carlyle, who admired Scott precisely for breaking with the dust, kept the name but inverted its function. Where Scott used Dryasdust playfully, as an internal fiction and a *recipient* of explanation, Carlyle made it the standing *producer* of the obstruction — the enemy of his entire historiographical creed. The distinction matters for reading *Friedrich*: Scott's Dryasdust never gets in the way of a story (he is the pretext for telling one); Carlyle's Dryasdust is the very thing the story must fight through. The borrowed name therefore carries, in Carlyle's hands, a polemical charge it never had in Scott's.\n\nThat creed is stated nowhere more sharply than in the \"Anti-Dryasdust\" chapter that opens *Oliver Cromwell's Letters and Speeches* (1845), thirteen years before the first volume of *Friedrich* [6][7]. There Carlyle's complaint is against records that have ceased to speak — documents that have, in the standard account of the chapter, become inarticulate and spectral, that screech and gibber instead of speaking — and against a compiling intellect that mistakes accumulation for understanding [6]. (These phrasings are reported from the Wikisource text of \"Anti-Dryasdust\" via a secondary fetch and should be treated as *contested in exact wording* until checked against the page image; the structural point — that Carlyle's entire objection is to dead, non-speaking records — is *established*, and is confirmed inside *Friedrich* itself by the \"gone all spectral under Dryasdust's sad handling\" of the \"Dryasdustic Ages\" [2].) The contrast that organizes Carlyle's practice is the one he drew in his 1838 Scott essay: history must be \"actually filled by living men … in buff or other coats and breeches, with colour in their cheeks,\" not by \"protocols, state-papers, controversies and abstractions of men\" [4]. Dryasdust is the manufacturer of the latter; Carlyle appoints himself the resurrector of the former.\n\nBy the time he reached *Friedrich*, then, the device arrived pre-loaded. Carlyle did not need to explain who Dryasdust was; the Victorian reader knew the name, knew Scott's joke, and knew Carlyle's quarrel. The figure could therefore be deployed in shorthand — a single apostrophe sufficient to summon the whole opposition between dead chronicle and living tale — and Carlyle could even afford to *define* it once, in passing, by translation: \"*Gelehrte Dummkopf* [what we here may translate, DRYASDUST]\" [2]. The bracket is a wink to a reader already in on the joke.\n\n## Dramatizing the Archive: Frustration as Performance\n\nWhat is distinctive in *Friedrich* is that Carlyle does not hide the difficulty of his sources; he performs it. The Prussian records were, by his account, voluminous, disorganized, and frequently silent on exactly the questions a biographer most wants answered. Rather than smoothing this over — the conventional historian's discretion — Carlyle stages his exasperation as a recurring set-piece, and the reader is positioned as a witness to, and sometimes a fellow victim of, the ordeal.\n\nThe near-thesis statement sets the tone for the whole work: \"the Prussian Dryasdust, otherwise an honest fellow, and not afraid of labor, excels all other Dryasdusts yet known; I have often sorrowfully felt as if there were not in Nature, for darkness, dreariness, immethodic platitude, anything comparable to him\" [2]. The sentence is a small masterpiece of controlled abuse. It opens with concession (\"otherwise an honest fellow, and not afraid of labor\"), so that the praise is real before the demolition; \"excels all other Dryasdusts yet known\" turns a superlative into an insult; and the closing triad, \"darkness, dreariness, immethodic platitude,\" moves from the visual (darkness) to the affective (dreariness) to the intellectual (immethodic platitude), naming the three faults — illegibility, tedium, formlessness — that the rest of the apparatus will repeatedly attack. The adverb \"sorrowfully\" is the key to the device's tone: Carlyle's exasperation is dressed as grief, not rage, which keeps Dryasdust pitiable and the historian magnanimous.\n\nThe indexless aside is the purest instance of reader-implication. \"Your poor Prussian Dryasdust (without even an Index to help you)\" makes the reader complicit in the very second person: it is *your* Dryasdust, *you* who must \"look a long time intensely and on many sides\" before \"features do at last dawn out of those sad vortexes\" [2]. The labour is shared; the reward — features dawning out of vortexes — is earned together. The want of an index recurs as a fixed motif of the complaint: \"Books born mostly of Chaos—which want all things, even an INDEX—are a painful object\" [2]. The \"lazy Dryasdust\" cry is more plaintive: Carlyle states precisely what he wants (\"the physiognomy of soul\"), names it as the thing \"we search for,\" and then breaks off into a counterfactual lament for the material he was never given: \"had lazy Dryasdust given us almost anything on this latter head!\" [3]. The grief is real, but it is also a rhetorical gift to the reader, who is shown both the historian's ambition and the obstacle to it.\n\nThe performance has a recurring proverbial summary: the compiler \"by reason of the trees is unable to see the wood\" [2]. This is the device's whole psychology — industry without vision — and it explains the moral coloring of the epithets. Dryasdust is \"poor,\" \"lazy,\" \"incurious,\" \"honest,\" \"not afraid of labor,\" and capable of doing \"no other\" [2][3][4]. He is not malicious; he is dull — \"industry without the seeing eye,\" to borrow the idiom of Carlyle's chapter epigraph, \"The seeing eye! It is this that discloses the inner harmony of things\" [4]. The drama is therefore not villain-versus-hero but insight-versus-stupidity, the seeing eye against the blind compiler. The blindness is sometimes active rather than merely passive: Dryasdust \"only makes you more uncertain the more he pretends to tell\" [2] — the pretension to knowledge is worse than the ignorance. And Carlyle's final move is generosity that doubles as self-justification: he \"strove to forgive\" Dryasdust and then turns the same plea outward — \"Let the reader now forgive me; and think sometimes what probably my raw-material was!\" [4]. The apology is also a boast: whatever the work's faults, they are the residue of a heroic struggle with intractable dust.\n\nCarlyle even lets the device tip into the macabre and the cosmic. The \"Dryasdustic Ages\" passage extends the personification from a man to an epoch: the medieval centuries themselves are \"dark Dryasdustic Ages,\" and the Imperial Eagle, a thing Carlyle wants to see as \"a human fact; luminously gilt,\" is \"gone all spectral under Dryasdust's sad handling\" [2]. Here the figure is no longer merely an obstructive scholar but a kind of necromantic blight: his \"handling\" turns living facts into spectres. This is the *Friedrich* text directly enacting the \"Anti-Dryasdust\" thesis — that bad historiography does not merely fail to revive the dead; it actively de-vitalizes what was alive.\n\nThis is, in Stewart's reading, the editorial labour made theatrical. Her fifth chapter — \"Carlyle as an editor: Processing the 'raw-material' of history\" — takes the Dryasdust \"raw-material\" passage as its epigraph and argues that Carlyle's habit of \"interweaving material from different sources into his narrative\" is itself the answer to Dryasdust: where the compiler leaves \"wide-spread, inorganic, trackless matter,\" Carlyle re-organizes it into a living tale [4].\n\n## The Editor Persona and the Inheritance from Sartor Resartus\n\nThe most concentrated dramatization of archival labour in *Friedrich* comes when Carlyle stops calling himself the historian and starts calling himself \"this Editor.\" The signature instance is a small comic aria of helplessness: \"Brevity, this Editor knows, is extremely desirable, and that the scissors should be merciless on those sad Paper-Heaps, intolerable to the modern mind; but, unless the modern mind chance to prefer ease and darkness, what can an Editor do!\" [2]. Three things are happening at once. First, the labour is made physical — \"scissors,\" \"Paper-Heaps\" — so the reader sees the editor at his desk, cutting. Second, the editor is caught in a real dilemma (cut for brevity, or keep the material the truth requires) and stages it as a question to the reader, \"what can an Editor do!\" Third, the failure is pre-attributed to the materials — \"sad Paper-Heaps, intolerable to the modern mind\" — so that any tedium in the resulting book is Dryasdust's fault, not the editor's.\n\nThis persona is not new in *Friedrich*; it is inherited from *Sartor Resartus* (1833–34), Carlyle's earliest great experiment, in which a fictional Editor must construct both a philosophy and a biography out of the chaotic, fragmentary papers of Diogenes Teufelsdröckh. The *Sartor* Editor confronts his source-text as \"an 'extensive Volume,' of boundless, almost formless contents, a very Sea of Thought,\" and announces his task in terms that could stand as the motto of the whole *Friedrich* project: \"To bring what order we can out of this Chaos shall be part of our endeavor\" [10]. The continuity is structural, not merely verbal. In both works the narrator's real subject reaches him only through hostile, disordered, fragmentary documents; in both, the *ordeal of editing* — sifting, cutting, arranging, despairing — is promoted from a hidden precondition of the book into one of its overt themes; and in both, the editor keeps breaking the fourth wall to apologize to, and conspire with, the reader. The *Friedrich* Editor's \"Pardon, O reader!—\" [2], dropped immediately after an intrusive personal aside (\"by accident, this Editor knows Twenty of these fine fellows!\" [2]), is the very gesture the *Sartor* Editor makes throughout: the self-interrupting, reader-buttonholing wink that converts a monologue into a dialogue.\n\nRead through this lens, Dryasdust is the *Friedrich*-era externalization of the chaos the *Sartor* Editor faced internally. In *Sartor* the disorder belongs to the genius Teufelsdröckh, whose papers are formless because his mind overflows; the Editor's labour is reverent, the chaos is fertile. In *Friedrich* the disorder belongs to the dullard Dryasdust, whose books are formless because his mind is blind; the Editor's labour is resentful, the chaos is barren (\"barren as a continent of Brandenburg sand\" [4]). The same persona — the beleaguered Editor making order out of chaos — is pointed in opposite directions: upward, in awe, at a chaos of too much life (*Sartor*); downward, in exasperation, at a chaos of too much death (*Friedrich*). The device thus marks the distance Carlyle had travelled from the visionary fiction of his youth to the grinding archival history of his old age, while keeping the same narrating mask.\n\n## The Three-Way Relationship and the Interrupting Voice\n\napRoberts's phrase — \"a remarkable three-way relationship between himself, Frederick, and the reader, which is both open and perpetually shifting\" [4][9] — names the deep structure that the Dryasdust device serves. The triad has three terms, and the device keeps all three in play at once: it asserts Frederick as the object of search (the soul whose physiognomy is missing), it foregrounds Carlyle as the searching, struggling narrator, and it conscripts the reader as the second-person addressee who must look \"on many sides\" with him.\n\nStewart's first chapter, named directly after apRoberts's phrase, argues that the relationship is not a static frame but something Carlyle must continuously *maintain*, and that he maintains it by interruption: \"in order to maintain his position in the three-way relationship, Carlyle had to ensure that his own voice was always present in tandem with the telling of Frederick's history\" [4]. The Dryasdust apostrophes are one species of this voice; the humorous aside, the empathetic identification with Frederick's labours, and the parenthetical wink are others. The primary text supplies the reader-directed half of the triad in unusually naked form. Carlyle bargains with the reader over the quality of the book itself: \"Wherefore let the reader put up with an indifferent or bad one; he little knows how much worse it could easily have been!\" [2] — a sentence that both apologizes and boasts, and that makes the reader a party to the editorial compromise. He disciplines the reader's inherited prejudices: \"Let me request all readers to blow that sorry chaff entirely out of their minds; and to believe nothing on the subject except what they get some evidence for\" [2]. And he manages the reader's stamina, closing a stretch of antiquarian detail with the storyteller's courtesy: \"So far my rough Note-books; which require again to be shut for the present, not to abuse the reader's patience, or lead him from his road\" [2]. Each of these keeps \"the reader\" continuously addressed as the live third term of the triad.\n\napRoberts's title, \"The Historian as Shandean Humorist,\" is exact about the lineage: this is Sterne's digressive, button-holing, self-aware narrator transplanted into the writing of national history [9]. The historian who keeps interrupting himself to complain about his sources, to close his note-books, to apologize (\"Pardon, O reader!—\" [2]) and to bargain over the book's quality is performing the Shandean trick of making the *making* of the book its own subject. Where Sterne's Tristram cannot get himself born for digressions, Carlyle's historian cannot get Frederick clearly seen for the dust — and in both cases the obstruction is the comedy.\n\nThere is a cost to the strategy, and Stewart is candid about it. The contemporary critic W. C. Brownell objected that Carlyle \"never gets away from himself,\" that \"his personality confuses his history … obtrusive, exasperating, domineering\" [4]. Stewart replies that \"Brownell is missing the point, which is, that this constant interference by Carlyle was a deliberate policy on his behalf, by means of which he carried on a continual dialogue with his readers. If Carlyle were to approach the text in the way suggested by Brownell, the result would be the very 'Dryasdust' writing of history which Carlyle abhorred\" [4]. The intrusion is the anti-Dryasdust. To suppress the voice would be to surrender to the dust.\n\nThere is also irony, which Carlyle's contemporaries did not miss and which the corpus should record. Reviewers complained that the figure was unjust to real historians. The *Quarterly Review* (April 1859) noted that \"the accumulated stores of many an old German Dryasdust have been rifled, and we cannot help remarking that the poor Dryasdusts have been very badly treated. They have been first laid under contribution, and then outrageously vilified by their whimsical persecutor\" [4]. Carlyle, that is, depended utterly on the labourers he mocked — and the text itself half-admits this when it scolds Dryasdust while inviting him to keep working: \"which surely the Prussian Dryasdust might still amend a little?\" [3]. The persecutor needs the persecuted. (One should add the *inference*, not made by Carlyle, that the device is partly self-protective: by personifying the dullness as external, Carlyle pre-empts the charge that the duller stretches of his own later volumes — the treaty-and-protocol passages — are themselves Dryasdust. The corpus elsewhere notes that Carlyle was widely thought to \"fall into his own dryasdust bin\" in the later volumes [5]. This irony is *contested* and best held as inference.)\n\n## The Oral Toolkit in Operation\n\nThe persona of the storyteller is only as real as the sentence-level devices that enact it. Five are now documented and partly verifiable.\n\n**Present-tense immediacy.** Carlyle repeatedly drops the past tense of chronicle for the present tense of eyewitness, especially in battle. Stewart quotes the desolate \"nothing alive, as you pass, but a few poor oxen languidly sauntering up and down\" (Works 17: 66) and the verified, cinematic opening \"It is 6 o'clock. Damp dusk has thickened down into utter darkness, on these terms:—when, lo, cannonade and musketade from the south … seriously loud; red glow of conflagration visible withal\" [4]. The \"as you pass\" again folds the reader bodily into the scene; the present tense abolishes the distance between 1759 and the reading present. The device is sometimes deliberately strained against the very impossibility of seeing: a complex deployment is \"chaotic to all but the scientific eye\" [3], a phrase that asks the reader to *try* to see the present-tense movement even as it concedes the movement is barely legible.\n\n**Suspense and withholding.** Carlyle tells the reader that the village of Kletschen deserves naming \"for a certain reason\" and then declines to give it, so that the reader must read on to learn why [4]. Stewart's gloss is precise about the device's double function: it generates suspense *and* \"forces himself into the picture,\" because \"the only person who can relieve the suspense is Carlyle himself\" [4]. A related, darker form of suspense is the *irrecoverable* fact: of a great battle Carlyle writes that \"the Narratives old and modern are innumerable; false some of them, unintelligible well-nigh all\" [3] — here the suspense is permanent, the reason can never be supplied, and the reader is left, with the historian, peering into a record that will not resolve.\n\n**The intimate parenthesis.** Carlyle uses parentheses \"to enclose remarks that he is directing specifically towards the reader from himself,\" which \"creates a pause in the narrative and mimics the act of a speaker addressing an informal remark to a listener\" [4]. The Dryasdust grievances live inside exactly such brackets: \"(without even an Index to help you)\" [2] and \"(which Dryasdust does not the least know, and only makes you more uncertain the more he pretends to tell)\" [2] are asides spoken sideways to the reader, the typographic equivalent of a speaker lowering his voice to share a complaint.\n\n**Embedded dialogue.** Carlyle pulls Frederick's own first-person voice into the running text — \"'Never have my troops,' says Friedrich, 'done such miracles of valour, cavalry as well as infantry, since I had the honour to command them'\" [4] — rather than relegating it to a footnote, so that the hero speaks aloud within the tale. Stewart notes that this contrasts with Carlyle's more usual practice of citing such letters in footnotes, marking the in-text quotation as a deliberate dramatizing choice [4].\n\n**The note-book and the editor's scissors.** A fifth device, newly foregrounded here, is the explicit display of the apparatus of composition. Carlyle reads aloud from \"my rough Note-books\" and then visibly \"shut[s]\" them \"for the present, not to abuse the reader's patience\" [2]; he wields \"scissors\" on \"sad Paper-Heaps\" and asks \"what can an Editor do!\" [2]. This is the storyteller making his own toolkit part of the show — a metafictional device, closer to *Sartor* than to conventional history, by which the labour of selection is performed rather than concealed.\n\nTogether these devices constitute the positive content of the anti-Dryasdust program. Dryasdust gives \"wide-spread, inorganic, trackless matter\" [4] and \"dim nightmare[s] of unintelligible marching and fighting\" [2]; Carlyle answers with tense-shift, suspense, aside, living speech, and the visible scissors — the matter re-animated, made to march, to speak, and to be cut to a human length.\n\n## Open Questions\n\n1. **Exact count and distribution of \"Dryasdust\" instances across all volumes.** This document now verifies a substantially larger set of instances directly (in Gutenberg #2102, #2114, and #2118) [2][3][4]; the Volume 1/Book 2 cluster shows the device active from the opening books, and the \"Dryasdustic Ages\" instance shows it in the later medieval-background material. A complete concordance across all volume numbers (#2101–#2118, plus #25808) would let one chart whether the device clusters in the source-heavy stretches (treaties, finance, medieval genealogy) where frustration peaks. The pattern is plausible and now better supported, but a full count remains unverified.\n\n2. **Precise wording of the \"Anti-Dryasdust\" definitional passages.** The Cromwell phrasings (\"inarticulate quartos … screech and gibber,\" \"inarticulate slumberous mumblement\") are reported via secondary fetch/summary and should be checked against the Wikisource page image before being quoted as verbatim Carlyle [6]. Note that the *Friedrich* phrase \"gone all spectral under Dryasdust's sad handling\" [2] independently confirms the \"spectral/non-speaking records\" thesis even if the Cromwell wording remains to be verified.\n\n3. **The Sartor-to-Friedrich Editor genealogy.** This document establishes a textual continuity between the *Sartor* Editor and the *Friedrich* \"this Editor … what can an Editor do!\" persona [2][10]. The exact *Sartor* \"Paper-Bags / Zodiac\" passage (Book Second) should be fetched and quoted verbatim to strengthen the parallel between Teufelsdröckh's disordered bags and Frederick's \"sad Paper-Heaps\"; the present fetch of #1051 was truncated before reaching it.\n\n4. **Did Carlyle ever name Scott as the source of the Dryasdust figure within *Friedrich* itself?** The borrowing is established as literary-historical fact [1], but whether Carlyle acknowledges Scott explicitly at any Dryasdust juncture in the text remains to be confirmed.\n\n5. **The self-implication question.** To what degree is the Dryasdust device a conscious pre-emption of the charge that Carlyle's own later volumes turn Dryasdust? This remains inference; the *Quarterly* (April 1859) complaint that the \"poor Dryasdusts have been very badly treated\" [4], read against the EBSCO claim that Carlyle \"falls into his own dryasdust bin\" [5], is the place to test it.\n\n6. **apRoberts's full argument.** This document relies on apRoberts as quoted by Stewart [4][9]. The primary essay (\"The Historian as Shandean Humorist,\" in *The Carlyles at Home and Abroad*, 2004, pp. 15–26) should be consulted directly to recover her Sternean reading in full, especially the Shandean genealogy of the interrupting voice and any explicit linkage she draws to the *Sartor* Editor.\n\n## Sources\n\n1. \"Dryasdust.\" Wikipedia (consulted for the Scott origin and the standard definition; the underlying facts — Scott's invention of Jonas Dryasdust and the term's meaning as a feelingless compiler — are traceable to Scott's prefatory matter and to Carlyle's \"Anti-Dryasdust\"). https://en.wikipedia.org/wiki/Dryasdust — Tier 5 (encyclopedic; used only for uncontested background; cite the underlying Scott/Carlyle texts where possible).\n2. Thomas Carlyle, *History of Friedrich II
