uler, a process accelerated by the public support which he gave to the Prussian cause during the Franco-Prussian war\" — notably his pro-Prussian letter in *The Times* of 18 November 1870 [4].\n\nIn 1874 Carlyle received \"Prussia's Pour le Mérite, an honour which Frederick II had founded\" [4] — the *Pour le Mérite für Wissenschaften und Künste*, the civil class of an order Frederick himself had instituted [9]. In the same season Carlyle declined Disraeli's offers of a state pension and the Knight Grand Cross of the Order of the Bath [9]. Bismarck later sent personal felicitations, congratulating Carlyle for having unveiled \"our great Prussian king to the Germans in his full form\" [4]. The symmetry is striking and worth foregrounding: the highest civil honor Frederick's own state could bestow was conferred on the foreign author who had made Frederick legible to that state — the historian decorated with the medal his subject founded. (The often-quoted \"like a living statue\" phrasing is a later journalistic rendering [5]; the form attested in Froude's *Life* and quoted by Bennett is \"in his full form\" [4].)\n\nNot all German judgment was admiring — Droysen and the source-critical objection register the dissent. The German reception was not uniform homage. The professional historians who held to rigorous *Quellenkritik* recoiled from Carlyle's method. Johann Gustav Droysen (1808–84), a historian of the liberal-constitutionalist, Prussian-unification school — and himself a major historian of Prussian policy — \"objected to Carlyle as a 'harlequin' and a 'chatterbox' who fell short of his own forensic standards of source criticism\" [4]. This is the German counterpart to the British \"Dryasdust\" quarrel discussed above: the scholars whose archives Carlyle had ransacked, and whose dullness he derided, returned the contempt. Bennett's larger argument deserves emphasis for the corpus's chronology: the intense German *cult* of Carlyle \"was really a posthumous process, only gathering pace after 1881\" — so the lifetime German reception, like the British, was official and popular but academically divided, and the legendary \"German worship of Carlyle\" belongs to the decades after his death [4]. The corpus should therefore resist any simple story of German adoption: Carlyle became the *popular* and *official* interpreter of Frederick, but the academic verdict in Germany, as in Britain, separated the artist from the historian.\n\nTaine's 1864 study admired Carlyle's idealism — but the Voltaire reservation is not in that text. Hippolyte Taine's *L'Idéalisme anglais: étude sur Carlyle* (Paris, 1864) is the major contemporary French engagement, written while *Friedrich* was still appearing [10]. Taine's study is broadly an appreciation of Carlyle's idealism and power: it characterizes his method as that of a visionary mind that, \"après avoir fouillé violemment et confusément dans les détails du groupe, s'élance d'un saut brusque dans l'idée mère\" (\"after having violently and confusedly rummaged in the details of the group, leaps with an abrupt bound into the mother-idea\"), and credits the German philosophical channel by which \"Carlyle, étant sorti des idées officielles anglaises, a pénétré dans la philosophie et dans la science de l'Allemagne\" [10]. But a direct read of the digitized *L'Idéalisme anglais* in this pass found that the book does **not** in fact discuss Frederick or Carlyle's treatment of Voltaire at any length — its subject is Carlyle's temperament, style, and role as conduit of German idealism, not the *History of Friedrich* specifically [10]. The corpus must therefore correct an earlier framing: the documented French reservation about Carlyle's unjust handling of Voltaire (whom Carlyle subordinated to his Prussian hero, and whom French readers regarded as a national possession) is *not* securely located in Taine's 1864 *étude*. It may belong to Taine's *Histoire de la littérature anglaise* (also 1864) or to later French criticism; until a verbatim French sentence on Voltaire is fetched, the claim should be carried only as: Taine's *L'Idéalisme anglais* exists, is dated 1864, and is broadly admiring of Carlyle's genius, while the *specific Voltaire objection* remains unverified and should not be attributed to that book. (Contested/partly unverified: the existence, date, and admiring stance are established [10]; the Voltaire passage is flagged for verification — see Open Questions.)\n\nTo the transatlantic chorus belongs James Russell Lowell's \"dolls stuffed with bran\" defense of Carlyle's method — the most-quoted American defense of Carlyle's vividness against the \"Dryasdust\" charge. James Russell Lowell, in his essay \"Carlyle,\" answered the historians' complaint with an image of living flesh: \"The figures of most historians seem like dolls stuffed with bran, whose whole substance runs out through any hole that criticism may tear in them; but Carlyle's are so real in comparison, that, if you prick them, they bleed\" [6]. The sentence is the perfect period rebuttal to the *Quarterly* and *Edinburgh* source-criticism objections — it concedes nothing on scholarship and stakes everything on imaginative reality, the exact ground on which the battle-painter reviews had already conceded victory. (This famous sentence is verified here only via its encyclopedia transmission [6]; the corpus should attribute it to Lowell's \"Carlyle\" essay, collected in *My Study Windows* (1871), while flagging the primary essay text as not yet directly fetched — see Open Questions.)\n\nThe settled contemporary verdict was that the book was monumental but flawed, \"more talked about than read.\" The aggregate judgment that crystallized in Carlyle's lifetime and immediately after was that *Friedrich* was a colossus admired more than it was finished by its readers. Modern scholarship transmits this as the standing characterization — the work is \"still a controversial masterwork, more talked about than read\" [11] — and James Anthony Froude's verdict that it was \"the grandest of his works\" sits beside the recognition of its length, its hero-worship, and its disputed accuracy as the two poles of the consensus [5][12]. The contemporary reviews already contain both poles in their own phrasing: Merivale's \"great work … at once to accurate history and to high literature\" against the *Saturday*'s \"dreary … marches across brooks at 2 P.M.\" [2]. The corpus's framing — admired more than read — is thus not a later condescension but the texture of the contemporary response itself: a four-thousand-page work begun in long-deferred expectation, abandoned mid-volume by many who bought it, defended for its battles and doubted for its hero. (This is the consensus characterization; see the caveat on \"sales\" below.)\n\nCarlyle's own verdict, in his own hand, was that the labor was a misery. A history of the book's reception should weigh the author's verdict against the world's, and here the corpus can now supply *primary* evidence stronger than the secondhand Varnhagen report. In a letter to Emerson, Carlyle described the writing of *Frederick* (in or about 1855, as the book \"is now actually to get along into the Printer's hand\") in terms of unrelieved suffering:\n\n> \"I have sat here in my garret, wriggling and wrestling on the worst terms with a Task that I cannot do, that generally seems to me not worth doing, and yet *must* be *done.* … I never had such a business in my life before. Frederick himself is a pretty little man to me, veracious, courageous, invincible in his small sphere; but he does not rise into the empyrean regions, or kindle my heart round him at all; and his history, upon which there are wagon-loads of dull bad books, is the most dislocated, unmanageably incoherent, altogether dusty, barren and beggarly production of the modern Muses as given hitherto.\" [1]\n\nHe calls the project \"this unwise enterprise,\" confesses that \"obstinacy is the one quality I still show,\" and elsewhere in the correspondence dismisses the \"unblest *Life of Frederick*\" with: \"a good Book being impossible upon it, there shall a bad one be done, and one's poor existence rid of it\" [1]. This is decisive for the corpus: the author who would be crowned Lord Rector and decorated by Bismarck regarded his hero as \"a pretty little man\" who never \"kindle[d] my heart,\" and his sources as \"wagon-loads of dull bad books.\" The gap between the public coronation and the private exhaustion is itself part of the contemporary reception. (These quotations are verified verbatim against the primary correspondence — a stronger source than the Varnhagen transmission that earlier carried this point [12].)\n\nHard sales figures, finally, are thin — commercial standing is inferred, not ledgered. The assignment asks for \"sales and commercial standing,\" and honesty requires marking the limits of the evidence. The German edition's commercial success is documentable in qualitative terms — the Neuberg/Althaus translation \"soon ran into popular editions\" under a Prussian state printer [4]. For the English edition, no surviving Chapman & Hall sales ledger was located in this research pass, and the widely repeated \"monumental but unread\" verdict is a statement about *cultural* circulation (the book was bought, displayed, reviewed, and abandoned mid-volume) rather than a precise unit count. Stewart's archival finding sharpens the inference in one direction — that for the first instalment the negative reviews \"far outweighed\" the positive [2] — which is consistent with a property that sold on Carlyle's name and prestige rather than on enthusiasm. The corpus should therefore present commercial standing as: a prestige property of Chapman & Hall, expensively produced over thirteen years, translated and re-issued in Germany, and a steady but never popular seller — and should *not* assert a specific copy figure absent a verified source. (This is inference, and honestly empty-handed on exact numbers.)\n\n## Emerson and the Atlantic Reception\n\nThe richest single document of contemporary praise is Emerson's, and it repays close reading because it both inflates and undercuts the legend of acclaim. Emerson received the first volumes in spring 1859 — \"Some three weeks ago came to me a note from Mr. Haven of Worcester, announcing the arrival there of 'King Friedrich,'\" he wrote, and read first \"our blue American reprint\" before the inscribed \"crimson Book itself\" arrived from Carlyle's own hand [1]. The detail is itself reception history: there was an unauthorized American reprint in circulation (\"our blue American reprint\") before the author's own gift crossed, a small index of the book's transatlantic traffic. His response is unstinting on the level of art: the gift was \"irresistible,\" leaving him \"all tenderness and all but tears\"; the book is \"sovereignly written\"; Carlyle is \"the true inventor of the stereoscope\" for having \"exhibited that art in style, long before we had heard of it in drawing\" [1].\n\nThe diary extract develops the stereoscope figure into the book's signature praise. Emerson's argument is that Carlyle does not give a flat \"stereotype page\"; \"rather we see the eyes of the writer looking into ours, mark his behavior, humming, chuckling, with under-tones and trumpet-tones and shrugs, and long-commanding glances, stereoscoping every figure that passes, and every hill, river, road, hummock, and pebble in the long perspective\" [1]. The pun on *stereotype* / *stereoscope* is exact and deliberate: where the stereotype is dead repetition, the stereoscope produces depth from doubled vision — Emerson's claim is that Carlyle's prose gives history three dimensions. It is in this same passage that Emerson reaches the two phrases the corpus must anchor: \"infinitely the wittiest book that ever was written,\" and \"a book that is a Judgment Day, for its moral verdict on the men and nations and manners of modern times\" [1]. The first is a claim about Carlyle's comic-prophetic intelligence; the second about the book's function as moral tribunal, arraigning the eighteenth century before the nineteenth. Both belong to the corpus's stylistic pillar as much as to its history pillar, because Emerson is praising precisely the qualities — wit, moral verdict, stereoscopic vision — that later readers found exhausting at six-volume length.\n\nAnd yet, in the same breath, Emerson testifies to the silence: the book \"makes no noise; I have hardly seen a notice of it in any newspaper or journal, and you would think there was no such book\" [1]. He consoles himself that \"the secret wits and hearts of men take note of it\" — a consolation that concedes the public did not [1]. This is why the corpus distinguishes documented Emerson praise from vaguer claims of universal acclaim: the very text that supplies the acclaim also reports its absence, and Stewart's count of the British reviews independently confirms that, at least for the first instalment, the loud public verdict ran the other way. Emerson's enthusiasm should be read, finally, as the verdict of a twenty-five-year correspondent who declared in the same 1859 letter that \"a correspondence even of twenty-five years should not be disused unless through some fatal event\" — a private, affectionate, and supremely partisan witness, not a measure of the marketplace [1]. That partisanship persisted: in 1862 he could call the third volume \"Mankind's Bill of Rights and Duties,\" and in 1861 \"a history which a beneficent Providence is not very likely to interrupt\" [1]. No British reviewer ever pitched the praise so high; the most extravagant tributes to *Friedrich* in Carlyle's lifetime are American, private, and addressed to the author himself.\n\n## The British Periodical Verdict\n\nThe British reception ran on two tracks that never quite merged: reverence for the man of letters and distrust of the historian. Stewart's reconstruction shows reviewers in 1858 feeling misled — they had waited through Carlyle's much-publicized German archive trips and were rewarded with two vast volumes on Hohenzollern ancestors and a \"crazy, brutal father\" [2]. The high regard in which Carlyle was held is captured by the conduct of General Sir Edward Bruce Hamley, the *Blackwood's* reviewer (and, as Stewart notes, by reputation \"the Military Staff of *Blackwood's*\"), who would not dash off a review of Volumes I–II without first re-reading Carlyle and the prior biographies of Frederick — Carlyle being a writer of so much notice that a hurried paper would not do him justice [2]. The very seriousness of the engagement is a reception fact: Carlyle was important enough that even his detractors prepared for him.\n\nAs the campaigns arrived in the middle volumes, the reviews warmed along the line traced above — the *Athenaeum*'s \"narrative … rushes grandly and swiftly on,\" the *Saturday*'s \"topographical accuracy of an engineer, and the skill of a landscape painter,\" the *Eclectic*'s \"panoramic pages\" [2]. But the source-criticism quarrel never resolved: the *Quarterly* and the *Edinburgh* indicted Carlyle's treatment of his \"Dryasdust\" German predecessors — \"first laid under contribution, and then outrageously vilified\" [2]. The corpus should hold these two strands together, because their non-resolution *is* the contemporary verdict in miniature: the book won its battles as literature and lost them as scholarship. By 1865 the strands had not merged so much as the louder critic had fallen silent (the *Edinburgh* simply ignored every volume after 1858), and the surviving reviewers — *Athenaeum*, *Examiner*, *Quarterly* (Merivale), *Eclectic*, and a converted Hamley — produced the elegiac valedictory chorus, against the lone holdout of the *Saturday*'s \"dreary … marches across brooks\" [2]. The phrase that best sums the British reception is Hamley's own: by the end, readers had reached \"familiarity with Carlylese, rendering us indifferent to verbal pranks, and more sensitive to excellences\" [2] — admiration achieved less by Carlyle's persuasion than by the public's exhaustion of resistance.\n\n## The German Reception and the Prussian Embrace\n\nIf Britain admired and doubted, Prussia adopted — but officially and popularly more than academically. The mechanism was the Neuberg–Althaus translation, produced under Carlyle's supervision and issued by a Prussian state printer with \"establishment approval\" [4]. Bennett notes that Neuberg, far from a neutral conduit, \"periodically included footnotes to echo Carlylean judgements of his subject that would instantly commend Frederick the Great to Prussocentric conceptions of German destiny\" [4]. The translation thus did ideological work the English original only implied: it nationalized Carlyle's Frederick for German consumption. Carlyle's pro-Prussian intervention in *The Times* of 18 November 1870 — contrasting a \"noble, patient, deep, pious, and solid\" Germany with \"vapouring, vainglorious, gesticulating, quarrelsome, restless, and over-sensitive France\" — sealed his standing as Prussia's \"authorised interpreter\" at the exact moment Prussian arms were realizing the unification *Friedrich* had narrated as destiny [4].\n\nThe honors followed: the *Pour le Mérite* in 1874, the civil class of an order Frederick himself had founded [4][9], and Bismarck's birthday felicitations crediting Carlyle with unveiling \"our great Prussian king to the Germans in his full form\" [4]. But the corpus must keep Droysen's dissent in the frame — \"harlequin\" and \"chatterbox\" [4] — and remember Bennett's chronological point: the truly intense German *cult* of Carlyle \"was really a posthumous process, only gathering pace after 1881\" [4]. In Carlyle's own lifetime the German reception was official and popular, but the scholarly verdict was as divided as the British. The neat later story — that the Germans worshipped Carlyle's Frederick where the English merely tolerated it — flattens a lifetime reality in which the popular, state, and academic verdicts pulled in different directions on both sides of the Channel.\n\n## Carlyle's Own Verdict, and the Honors He Refused\n\nA history of *Friedrich*'s reception should close where the author did. The completed work brought Carlyle the rectorship of his old university (1865, address 1866) and the highest Prussian civil honor (1874), and let him decline an English baronetcy and pension (1874) from a position of secure eminence [3][9]. Externally, this is the portrait of a crowned career: the foreign historian decorated with the medal his own subject had founded, elected over Disraeli by his countrymen, courted by the new German state. Internally, Carlyle judged the labor a misery — and the corpus can now say so in his own words rather than at second hand. He told Emerson he had \"sat here in my garret, wriggling and wrestling on the worst terms with a Task that I cannot do, that generally seems to me not worth doing\"; that \"I never had such a business in my life before\"; that Frederick himself was \"a pretty little man to me … but he does not rise into the empyrean regions, or kindle my heart round him at all\"; and that, a good book being impossible, \"there shall a bad one be done, and one's poor existence rid of it\" [1]. The secondhand reports preserved in the reference literature — Varnhagen's that Carlyle called it \"the poorest, most troublesome and arduous piece of work he has ever undertaken … only labour and sorrow,\" and the wearied \"less than nothing\" — now find their primary corroboration in the correspondence itself [12][1]. The gap between the public coronation and the private exhaustion is the deepest fact of the contemporary reception: the book that the world half-read and wholly honored was, to the man who spent thirteen years on it, a burden he was glad to be rid of.\n\n## Open Questions\n\n1. **Taine's exact Voltaire wording, and its true location.** A direct read of Taine's *L'Idéalisme anglais: étude sur Carlyle* (1864) found that the book does *not* discuss Frederick or Carlyle's treatment of Voltaire at any length [10]. The documented French reservation about Carlyle and Voltaire should be sought instead in Taine's *Histoire de la littérature anglaise* (1864, esp. the Carlyle chapters) or in later French criticism, and verified verbatim before being quoted or attributed. The earlier corpus attribution of the Voltaire objection to *L'Idéalisme anglais* should be treated as not established.\n2. **Lowell's \"dolls stuffed with bran\" primary text.** Verified here only via encyclopedia transmission [6]; should be confirmed against Lowell's essay \"Carlyle\" (collected in *My Study Windows*, 1871, and *Literary Essays*).\n3. **English-edition sales figures.** No Chapman & Hall ledger or contemporary sales statement was located. Whether a defensible unit figure exists (e.g., in Kaplan's or Heffer's biographies, or in the Chapman & Hall archive) remains open; absent that, \"commercial standing\" should stay qualitative. Stewart's finding that negative reviews \"far outweighed\" positive for Vols I–II [2] supports a \"sold on prestige, not enthusiasm\" inference.\n4. **The \"like a living statue\" Bismarck phrasing.** The form attested in Froude and Bennett is \"in his full form\" [4]; the \"living statue\" wording appears in later journalistic transmission (the *New York Times*, 1887) [5] and should be treated as paraphrase, not as Bismarck's verified words. The exact German original of Bismarck's compliment was not fetched.\n5. **Named British reviewers/essays beyond Hamley and Merivale.** Stewart attributes the *Blackwood's* essays to Hamley and the July 1865 *Quarterly* to Herman Merivale; the remaining periodical reviews (*Athenaeum*, *Eclectic*, *Edinburgh*, *Saturday*, *Chambers's*, *Examiner*) are quoted anonymously. Individual attribution would require the *Wellesley Index to Victorian Periodicals* or archival evidence.\n6. **Date precision of Carlyle's \"garret\" letter to Emerson.** Internal evidence (\"a history of Frederick … in Chelsea in the year 1855\") dates the deprecation to circa 1855, but the letter's place in Norton's numbering should be fixed precisely for citation.\n\n## Sources\n\n1. Carlyle, Thomas, and Ralph Waldo Emerson. *The Correspondence of Thomas Carlyle and Ralph Waldo Emerson, 1834–1872, Vol. II* (ed. Charles Eliot Norton). Project Gutenberg eBook #13660. https://www.gutenberg.org/cache/epub/13660/pg13660.txt — Tier 1 (PRIMARY). Verified verbatim against the fetched text: Emerson's letter and \"Extract From Diary\" of 1 May 1859 (Letter CLXIV) — \"infinitely the wittiest book that ever was written,\" the \"rise up in mass … crowning him with oakleaves\" sentence, the stereotype/stereoscope passage (\"we see the eyes of the writer looking into ours … stereoscoping every figure\"), \"a book that is a Judgment Day, for its moral verdict on the men and nations and manners of modern times,\" \"this book makes no noise,\" \"the secret wits and hearts of men,\" \"sovereignly written,\" \"the true inventor of the stereoscope\"; Emerson's letters of 16 April 1861 (Letter CLXVIII, \"a history which a beneficent Providence is not very likely to interrupt,\" \"the best head in England\") and 8 December 1862 (Letter CLXIX, \"'T is sovereignly written, above all literature … Mankind's Bill of Rights and Duties, the royal proclamation of Intellect ascending the throne\"); and Carlyle's own letters deprecating the labor (\"wriggling and wrestling on the worst terms with a Task that I cannot do,\" \"I never had such a business in my life before,\" \"Frederick himself is a pretty little man to me,\" \"wagon-loads of dull bad books,\" \"this unblest *Life of Frederick* … a good Book being impossible upon it, there shall a bad one be done, and one's poor existence rid of it\").\n2. Stewart, Aileen. *Thomas Carlyle and the Making of Frederick the Great* (PhD thesis, University of Edinburgh, 2010). https://era.ed.ac.uk/bitstream/handle/1842/5526/Stewart2010.pdf — Tier 2 (SCHOLARLY). Periodical-review quotations verified against the extracted thesis text, including: the \"mixed reception\" / \"far outweighed\" findings on Vols I–II; Hamley's *Blackwood's* hero-worship critique (\"pre-destined … for a hero, and none of his elect can sin\"; \"His vast literary energy … positively morbid\") and his 1865 conversion (\"familiarity with Carlylese,\" \"fewer crotchets and fewer freaks of style,\" \"a successful fighter of battles\"); the *Edinburgh* (\"malice prepense … honest labourers\"; \"outrages all notions of decency, manliness, and humanity\") and *Quarterly* (\"Dryasdust … first laid under contribution, and then outrageously vilified\"; Merivale's \"crowning effort of a life of unremitted literary industry\"); *Athenaeum* (\"rushes grandly and swiftly on\"; \"the battle pictures are unrolled, dark as the cloud\"; \"surpassed himself\"); *Saturday* (battle \"topographical accuracy of an engineer\"; \"the further on … the more interesting\"; \"dreary … marches across brooks at 2 P.M.\"); *Eclectic* (\"panoramic pages\"; \"four thousand pages\"); *Chambers's* (\"so long and eagerly expected\"; \"very contagious\"); *Examiner* (\"special triumph\"; \"one of the chief publications of our time\").\n3. \"Thomas Carlyle.\" Wikipedia, citing the November 1865 Edinburgh rectorial election (succeeded Gladstone, defeated Disraeli 657–310; travelled with Tyndall, Huxley, Erskine). https://en.wikipedia.org/wiki/Thomas_Carlyle — Tier 5 (reference aggregator; the underlying fact is well documented and cross-checked against the cited secondary literature and the Victorian Web chronology [7]).\n4. Bennett, Joshua. \"Thomas Carlyle's Place in German Intellectual History, 1830–1939: Kulturprotestantismus and the Creation of a Prophet.\" University of Oxford research repository (ORA). https://ora.ox.ac.uk/objects/uuid:7b0d1950-d4e9-4bd9-8fd2-900919362b26 — Tier 2 (SCHOLARLY). Droysen (\"harlequin\"/\"chatterbox\"), Neuberg/Althaus translation (Decker, Prussian state printer; \"soon ran into popular editions\"; Prussocentric footnotes), *The Times* letter (18 Nov 1870, \"noble, patient, deep, pious, and solid\" vs. \"vapouring, vainglorious\"), Pour le Mérite (1874), Bismarck (\"in his full form,\" citing Froude 2:402–3), and the \"posthumous … after 1881\" point — all verified against the extracted PDF text.\n5. *The Nuttall Encyclopædia* (1907, ed. James Wood) and *The New York Times*, \"Bismarck and Carlyle\" (25 July 1887) — Tier 5. Source of the truncated \"moral verdict on men and nations\" and the \"living statue\" paraphrase of Bismarck; used here to flag misquotation, not as primary authority. https://en.wikipedia.org/wiki/History_of_Friedrich_II._of_Prussia,_Called_Frederick_the_Great (transmission); https://www.nytimes.com/1887/07/25/archives/bismarck-and-carlyle.html (not fetched directly).\n6. James Russell Lowell, \"Carlyle\" (in *My Study Windows*, 1871), transmitting the \"dolls stuffed with bran … if you prick them, they bleed\" simile, as carried in *Encyclopedia Americana*, vol. XII (1920). https://en.wikisource.org/wiki/The_Encyclopedia_Americana_(1920)/Frederick_the_Great — Tier 5 (transmission of a Tier 3 essay; primary essay text not yet directly fetched — see Open Question 2).\n7. \"Thomas Carlyle: A Chronology.\" The Victorian Web. https://victorianweb.org/authors/carlyle/carlyletl.html — Tier 4. Inaugural Address as Lord Rector, 2 April 1866; death of Jane Welsh Carlyle, 21 April 1866.\n8. Carlyle, Thomas. *Inaugural Address at Edinburgh, 2nd April 1866, on Being Installed as Rector of the University There.* (Internet Archive digitization.) https://archive.org/details/cu31924102199852 — Tier 1 (PRIMARY) for the address date and fact.\n9. \"Thomas Carlyle.\" Wikipedia, citing acceptance of the *Pour le Mérite für Wissenschaften und Künste* (1874) and refusal of Disraeli's state pension and Knight Grand Cross of the Bath (1874). https://en.wikipedia.org/wiki/Thomas_Carlyle — Tier 5 (aggregator); fact corroborated by Source 4.\n10. Taine, Hippolyte. *L'Idéalisme anglais: étude sur Carlyle.* Paris, 1864. Digitization: Internet Archive https://archive.org/details/lidalismeanglai00taingoog (djvu full text fetched and read). — Tier 1 (PRIMARY). Verified: the book's date, its admiring stance, and its focus on Carlyle's idealism/style/German channel (e.g., \"s'élance d'un saut brusque dans l'idée mère\"; \"pénétré dans la philosophie et dans la science de l'Allemagne\"). Verified NEGATIVE result: the text does *not* substantively discuss Frederick or Voltaire (see the discussion of Taine above and Open Question 1).\n11. \"History of Friedrich II of Prussia, Called Frederick the Great\" / EBSCO Research Starters and allied reference summaries, transmitting the \"controversial masterwork, more talked about than read\" characterization. https://www.ebsco.com/research-starters/history/history-frederick-ii-prussia-thomas-carlyle — Tier 4–5. Used for the consensus framing, not for any quoted primary passage.\n12. James Anthony Froude, *Thomas Carlyle: A History of His Life in London* (vol. II), and Varnhagen von Ense's report of Carlyle's deprecation (\"the poorest, most troublesome and arduous piece of work … only labour and sorrow\"; \"less than nothing\"), as transmitted in standard reference and biographical summaries. https://en.wikipedia.org/wiki/History_of_Friedrich_II._of_Prussia,_Called_Frederick_the_Great — Tier 4–5 transmission of Tier 1–2 sources. Note: the substance of Carlyle's self-deprecation is now independently confirmed verbatim against the primary correspondence [1]; Froude's \"grandest of his works\" should still be re-verified against the *Life* directly."}, {"order": 9, "file": "09_Contested_Afterlife.md", "title": "The Contested 20th-Century Afterlife", "summary": "", "body": "# The Contested 20th-Century Afterlife\n\n## Bottom Line\n\nCarlyle's six-volume *Friedrich* (1858–1865) had, within Carlyle's own lifetime, already been claimed by German nationalism — Bismarck thanked him for setting \"our great Prussian King in his full figure, like a living statue\" [1] — and across the next century the book was repeatedly enlisted into a militarist \"Frederick cult\" that Carlyle himself never authored and that misread its hero as a proto-German rather than a Prussian [2]. The single most repeated episode in the book's afterlife is the claim that Goebbels read passages of it aloud to a despairing Hitler in the Führerbunker in early 1945; the *core* of that story is genuinely documented — through the diary of Finance Minister Lutz Schwerin von Krosigk, relayed by Hugh Trevor-Roper — and it is true that Goebbels invoked the \"Miracle of the House of Brandenburg\" (the 1762 death of the Russian Czarina that saved Frederick) when Roosevelt died on 12 April 1945, telephoning that \"The Czarina is dead\" [3][4]. But three cautions must be held firmly. First, the lineage from Carlyle to fascism is *not* a clean one, because Nietzsche — the philosopher usually slotted between them — held Carlyle in documented contempt, calling him \"an English atheist who makes it a point of honour not to be one\" and his biography \"that unconscious and involuntary farce, that heroico-moral interpretation of dyspeptic moods\" [5][6]. Second, and newly established in this revision: the celebrated quotation Goebbels read in the bunker — \"Brave king! wait yet a little while, and the days of your suffering will be over. Already the sun of your good fortune stands behind the clouds, and soon will rise upon you\" — does **not** appear in Carlyle's text and is misdated in the diary; Carlyle's actual deliverance passage runs differently (\"We promised Friedrich a wonderful star-of-day; and this is it... think what a daybreak when the night was at the blackest!\") and dates the news to 19 January 1762, not the diary's \"12 February\" [3][4][13]. Third, the strong popular claim that the bunker reading *lastingly damaged the book's reputation* outruns the evidence and should be treated as contested rather than established, since Carlyle's reputational decline was already long underway and scholars such as McCollum frame the fascist association as a \"presentist\" historiographical problem, not a demonstrated cause [7][8]. The trajectory now bends the other way: a quiet but real revival of Carlyle studies — new scholarly editions, the *Carlyle Studies Annual*, the Duke *Carlyle Letters Online*, the Heffer and Kaplan biographies — has been re-examining the book on textual rather than political grounds [9][10].\n\n## The Afterlife, Claim by Claim\n\nThe German appropriation began in Carlyle's lifetime, with Bismarck's blessing. The reading of *Friedrich* as a German-nationalist monument did not wait for the twentieth century. Otto von Bismarck wrote to Carlyle that he had \"placed before the Germans our great Prussian King in his full figure, like a living statue\" [1]. The line is cited in standard reference accounts of the book's reception to a contemporary newspaper report (\"Bismarck and Carlyle,\" *The New York Times*, 25 July 1887) [1]. The book's prestige in Germany was matched by its practical use as a military text: reference accounts note that \"military students of the time learned Frederick's battles from Carlyle's accounts,\" and admirers as varied as James Anthony Froude (who called it \"the grandest of his works\"), Emerson (\"a book that is a Judgment Day\"), and Theodore Roosevelt (who re-read its battle scenes) testify to its reach [1]. That the German-patriotic reading was contemporary is established; that this early adoption set the channel down which later, darker appropriations would flow is inference.\n\nA point worth pressing here is the precise metaphor Bismarck chose: a *statue*. It is exactly the wrong word for the book Carlyle actually wrote, and the gap between the compliment and the prose is the first symptom of the misreading that would govern the whole reception. A statue is fixed, monumental, single-figured, and silent; Carlyle's *Friedrich* is none of these. From the opening pages Carlyle frames his hero not as a marmoreal demigod but as a man buried under \"strange mud-incrustations,\" recoverable only with enormous labor: \"now on coming to light again, he is found defaced under strange mud-incrustations, and the eyes of mankind look at him from a singularly changed, what we must call oblique and perverse point of vision\" [13]. The \"living statue\" Bismarck thanked Carlyle for is the appropriators' fantasy of the book, not the book — and the entire afterlife traced below is, in one sense, the history of that fantasy displacing the text.\n\nThe \"Frederick cult\" misread Frederick — and Carlyle — as German rather than Prussian. The twentieth-century militarist cult that grew around Frederick II rested on a category error. Standard biographical reference works state plainly that \"Frederick was always a Prussian nationalist, never a German one,\" and that \"the efforts of some writers of the 19th and 20th centuries to present him as a forerunner of German national unity are quite misleading\" [2]. The same sources note that \"in Germany his more nationally minded admirers produced a cult of Frederick the Great, the precursor of the all-German hero,\" while \"in other countries he was blamed as the inventor of an implacable German militarism let loose upon the world\" [2]. Carlyle's book, with its hero-worship and its scorn for parliamentary \"talking-apparatus,\" was readily conscripted into the first reading. This is the structural point for the present document: the appropriation worked by *flattening* the book, not by faithfully transmitting it.\n\nThe flattening can be located in Carlyle's own framing. He opens by calling Friedrich \"hitherto the last of the Kings; that he ushers in the French Revolution, and closes an Epoch of World-History,\" and adds, with characteristic double vision, that the difficulty of writing the book is acute \"if you happen to believe both in the French Revolution and in him; that is to say, both that Real Kingship is eternally indispensable, and also that the destruction of Sham Kingship\" is necessary [13]. This is not nationalist celebration; it is a dialectical, half-elegiac meditation on the *end* of kingship as such — Frederick as the closing rather than the founding term of an epoch. The cult required the opposite reading: Frederick as the *opening* term, the seed of a German future. To get there, the appropriators had to suppress Carlyle's own elegiac framing — the sense that his hero was the last of a line, not the first — and substitute a forward-pointing teleology Carlyle never wrote.\n\nNietzsche — the usual missing link — actually despised Carlyle. Any clean Carlyle-to-fascism genealogy has to pass through Nietzsche, and Nietzsche refuses the role. In *Twilight of the Idols* (1888), in the section variously translated \"Skirmishes in a War with the Age\" / \"Expeditions [or Roving Expeditions] of an Untimely Man,\" Nietzsche files Carlyle among his \"impossible people\" with a one-line jab in the numbered list of aphorism 1: \"Carlyle, or Pessimism after undigested meals\" [5]. The names around him in that list set the register of contempt: \"John Stuart Mill, or offensive lucidity... Zola, or the love of stinking\" [5]. Nietzsche then devotes the whole of aphorism 12 to Carlyle, and it is worth quoting at length because it is the central evidence against the lineage. In the Ludovici translation, as verified against the Gutenberg text, Nietzsche writes:\n\n> \"I have been reading the life of Thomas Carlyle, that unconscious and involuntary farce, that heroico-moral interpretation of dyspeptic moods.—Carlyle, a man of strong words and attitudes, a rhetorician by necessity, who seems ever to be tormented by the desire of finding some kind of strong faith, and by his inability to do so (—in this respect a typical Romanticist!). To yearn for a strong faith is not the proof of a strong faith, but rather the reverse. If a man have a strong faith he can indulge in the luxury of scepticism... Carlyle stupefies something in himself by means of the *fortissimo* of his reverence for men of a strong faith, and his rage over those who are less foolish: he is in sore need of noise. An attitude of constant and passionate dishonesty towards himself—this is his *proprium*; by virtue of this he is and remains interesting.\" [5]\n\nThe aphorism closes with the line that has done the most work in the secondary literature: \"At bottom, Carlyle is an English atheist who makes it a point of honour not to be one\" [5]. Nietzsche extends the demolition into the next aphorism, on Emerson, whom he prefers explicitly to Carlyle: Emerson \"is much more enlightened, much broader, more versatile, and more subtle than Carlyle; but above all, he is happier... Compared with Carlyle he is a man of taste\" [5]. And in the long aphorism on \"great men\" Nietzsche names Carlyle once more as a type of the danger of hero-worship — those who treat the great man \"religiously after the manner of Carlyle\" [5]. (All of this is Gutenberg-verified primary text.) The implication is significant: the philosopher whom both Nazi appropriators and post-war critics treat as the bridge from Carlyle to twentieth-century power-worship explicitly disowned Carlyle as a noisy, self-deceiving, faith-hungry English moralist — the very type Nietzsche was trying to demolish. The bridge, examined, throws Carlyle off it.\n\nThe Führerbunker reading is real at its core — and documented through one chain of testimony. The most famous episode in the book's afterlife is genuinely attested, though it is important to see exactly *how*. The chain runs: Joseph Goebbels → the diary of Finance Minister Lutz Graf Schwerin von Krosigk → Hugh Trevor-Roper's *The Last Days of Hitler* (1947), the work that first revealed the scene to the English-reading public [4][3]. According to Trevor-Roper's account, \"The second part of the diary begins on 15 April 1945, but goes back a few days to describe an important incident. Goebbels told Schwerin von Krosigk how he had recently been reading aloud to the Fuehrer, to solace him in his universal discomfiture. He was reading from his favourite book, Carlyle's History of Frederick the Great\" [4]. The chapter read concerned Frederick's nadir in the Seven Years' War — \"how the great king himself no longer saw any way out of his difficulties, no longer had any plan; how all his generals and ministers were convinced that his downfall was at hand... and in his last letter to his minister, Count Finckenstein, he gave himself one last respite: if there was no change by 15 February, he would give it up and take poison\" [4]. At the tale's turn — the death of the Czarina and the consequent \"Miracle of the House of Brandenburg\" — Goebbels reported that \"tears stood in the Fuehrer's eyes\" [4].\n\nAlan Bullock's *Hitler: A Study in Tyranny* (1962), pp. 780–781, is the citation standard reference accounts give for the claim that Goebbels read to Hitler *twice* in early 1945, the second time \"a few days before the death of Franklin D. Roosevelt on 12 April\" [1]. That the episode occurred in some form is established; the cinematic embellishments (exact wording, repeated nightly readings) that later retellings add are contested inference — they rest on a single propagandist's self-dramatizing account relayed through one diary. Trevor-Roper himself flags the unreliability of the source in the same breath: \"Schwerin von Krosigk is so fond of rhetoric and apostrophe, so free with abstract nouns, and so prone to hear the wings of the Angel of History rustling about him, that his account may seem overdrawn\" — though he then offers \"indirect confirmation from another quite independent source: from one of the secretaries in the Propaganda Ministry,\" who recalled \"Friday, 13 April\" and Goebbels returning late from Küstrin as the Chancellery and the Adlon burned [4]. So the *outline* of the scene has two-source support; the *Carlyle content* of it has only one.\n\nThe bunker quotation is misattributed and misdated — Carlyle did not write \"Brave king! wait yet a little while.\" This is the new finding of the present revision, and it sharpens the fact-vs-legend boundary decisively. The single most-quoted line of the whole bunker legend is the consoling apostrophe Goebbels supposedly read: as Trevor-Roper transmits the diary, \"'Brave king!' says Carlyle, 'wait yet a little while, and the days of your suffering will be over. Already the sun of your good fortune stands behind the clouds, and soon will rise upon you.' On 12 February the Czarina died; the Miracle of the House of Brandenburg had come to pass\" [4]. The diary explicitly attributes those words to Carlyle (\"says Carlyle\"). They are not Carlyle's. The relevant chapter is Book XX, \"Bright News from Petersburg... which become a Star-of-Day for Friedrich,\" in Volume 20 of the History (Gutenberg ebook #2120), and Carlyle's actual deliverance passage reads:\n\n> \"Among the thousand ill strokes of Fortune, does there at length come one pre-eminently good? The unspeakable Sovereign Woman, is she verily dead, then, and become peaceable to me forevermore?... We promised Friedrich a wonderful star-of-day; and this is it,—though it is long before he dare quite regard it as such... Russia may be counted as the bigger half of all he had to strive with... and if this were at once taken away, think what a daybreak when the night was at the blackest! Pious people say, The darkest hour is often nearest the dawn. And a dawn this proved to be for Friedrich.\" [13]\n\nCarlyle reports the news as arriving \"on JANUARY 19th\" — \"he has heard plainly... that the implacable Imperial Woman, INFAME CATIN DU NORD, is verily dead. Dead; and does not hate me any more. Deliverance, Peace and Victory lie in the word!\" [13]. Two discrepancies follow directly. First, the words \"Brave king! wait yet a little while\" appear nowhere in Carlyle's chapter; the imagery (sun behind clouds, suffering ending) loosely echoes Carlyle's daybreak/dawn metaphor but the sentence is the diary's own confection, very possibly a paraphrase from a German translation or simply Schwerin von Krosigk's (or Goebbels's) embroidery. Second, the diary's \"On 12 February the Czarina died\" is wrong: Empress Elizabeth died on 5 January 1762 (Old Style 25 December 1761), with the certain news reaching Frederick on 19 January per Carlyle; \"15 February\" was the *poison deadline* Frederick set in the letter to Finckenstein, which the diary appears to have conflated with the date of the Czarina's death [13][4]. The Gutenberg-verified conclusion is firm: the celebrated bunker quotation is a misattribution and the chronology in the diary is garbled. This is precisely the kind of place where the popular retelling outruns the primary record, and it should be reported as such.\n\n\"The Czarina is dead\" — the Miracle of the House of Brandenburg, transposed onto Roosevelt — supplied the bunker reading's emotional logic, the historical analogy at the heart of Carlyle's narrative. In the Seven Years' War, Frederick — facing Russia, Austria, and France — was saved when the Empress Elizabeth of Russia died in early January 1762 and her Prussophile successor Peter III withdrew; Frederick called this his \"Miracle of the House of Brandenburg\" [11]. Carlyle dramatizes the moment of the news reaching Frederick's released prisoner Colonel Hordt in Petersburg with documentary vividness: \"WEDNESDAY, 6th JANUARY, 1762, Hordt's vacant Hades of an existence in the Citadel of Petersburg was broken by a loud sound: three minute-guns went off from different sides, close by; and then whole salvos, peal after peal: 'Czarina gone overnight, Peter III. Czar in her stead!' said the Officer, rushing in to tell Hordt; to whom it was as news of resurrection from the dead\" [13].\n\nIn the bunker, as relayed by Schwerin von Krosigk, Goebbels seized this analogy when the war turned against Germany. Trevor-Roper records the sequel verbatim: at General Busse's headquarters Goebbels \"had developed his thesis that, for reasons of Historical Necessity and Justice, a change of fortune was inevitable, like the Miracle of the House of Brandenburg in the Seven Years War. One of the staff officers had somewhat sceptically and ironically asked, What Czarina will die this time? That, Goebbels had replied, he could not say; but Fate still held many possibilities in her hand\" [4]. When Roosevelt died on 12 April 1945, Goebbels acted on the omen: \"Immediately, he had telephoned to Busse, and said, 'The Czarina is dead'\" [4]. Schwerin von Krosigk's own diary records hearing the news the same way — \"He only uttered one short sentence: 'Roosevelt is dead.' We felt the wings of the Angel of History rustle through the room. Could this be the long-desired change of fortune?\" [4]. The exchange rests on single-chain testimony, with the secretary's independent corroboration of the Küstrin trip and the timing. The structure is exact: a despairing regime, a great enemy's sudden death, the analogy to 1762 — except that history declined to repeat itself.\n\nThe strong claim that the bunker reading \"lastingly damaged the book's reputation\" outruns the evidence. This is the claim the corpus flagged as refuted in a prior verification pass, and the record bears out the caution. Wikipedia's article on the book asserts that the episode \"severely damaged the book's reputation in the post-war period, a state of affairs that continues today,\" quoting Jonathon McCollum that \"Carlyle's *Frederick* has never really been extricated from Hitler's bunker\" [1]. But McCollum's own master's thesis (*Thomas Carlyle, Fascism, and Frederick: From Victorian Prophet to Fascist Ideologue*, Brigham Young University, 2007) is far more cautious than the Wikipedia gloss: he treats the bunker story as \"the apogee of his defamation\" and frames the entire fascist association as a *presentist historiographical distortion* — scholars and propagandists reading a dead Victorian \"through modern lenses\" — rather than as a demonstrated cause of decline [7][8]. Ivan Kreilkamp's 2025 *Public Books* essay likewise declines to claim permanent reputational destruction. Its key sentences, verified, are that \"neither Hitler, nor Carlyle's reputation as a wise sage, were to survive much longer,\" and — locating the real problem not in one anecdote but in the prose itself — that \"Carlyle's writing, his style itself, was so amenable to Fascists, such that we even might reasonably say that it itself is proto-Fascistic\" [12].\n\nThe honest reading: Carlyle's reputation had been falling since the late nineteenth century (Nietzsche's 1888 contempt is itself evidence of that), the *Friedrich* was already \"more talked about than read\" [2], and the bunker story is best understood as a vivid *symbol* of an association rather than a measurable *cause* of decline. The chronology refutes the strong causal claim on its own terms: a reputation cannot be \"severely damaged\" in 1945 by an event if it was already in documented decline by 1888. This is a contested point, and the popular claim is flagged here as outrunning the evidence.\n\nThe reputational shadow is real but diffuse — guilt by appropriation, not by authorship. What the record *does* support is a reputational *shadow*: the book became, in McCollum's phrase, hard to \"extricate from Hitler's bunker,\" and standard reference accounts now reflexively pair *Friedrich* with Goebbels [1][7]. The shadow operates by appropriation rather than authorship — Carlyle died in 1881, decades before fascism existed, and the regimes that claimed him, as McCollum stresses, did so \"according to their own distinct tenets and variegated ideologies,\" variously and opportunistically [7]. The intellectual scaffolding of the association predates the bunker: Bertrand Russell's 1935 essay \"The Ancestry of Fascism\" \"placed Carlyle in a lineage with Johann Fichte and Nietzsche as among the most significant intellectual foundations of 20th-century ultranationalism and Fascism\" [12] — an irony, given that the same Nietzsche had filed Carlyle under farce. Russell hardened the lineage in mid-century Anglophone thought; the bunker anecdote, surfacing in Trevor-Roper twelve years later, gave the lineage a face and a death-scene. The well-supported inference is that the shadow is a fact of reception, not a verdict on the text.\n\nThe trajectory now bends toward revival and re-reading. The \"future\" pillar of this corpus is, on the evidence, a recovery. The Strouse/Duke *Carlyle Letters Online* and the *Carlyle Studies Annual* (running past No. 34, 2021–2022) sustain a continuous scholarly community [9]. Major biographies — Fred Kaplan's *Thomas Carlyle: A Biography* (Cornell, 1983) and Simon Heffer's *Moral Desperado: A Life of Thomas Carlyle* (1996) — re-opened the man on his own terms, with Heffer arguing pointedly that \"Carlyle was not a conservative\" and \"despised\" his era's system rather than seeking to conserve it [10]. A scholarly Oxford edition of *The French Revolution* (2019) and essay collections such as *Thomas Carlyle Resartus* (2010) and *Thomas Carlyle and the Idea of Influence* (2018) mark a deliberate textual reappraisal [9][10]. That an organized revival exists is established; how far it can detach the *Friedrich* specifically from its political shadow remains contested.\n\n## The German Channel: From Bismarck's Statue to the Frederick Cult\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 412\" role=\"img\" aria-label=\"A flow diagram of the book's contested twentieth-century afterlife, tracing which links in the Carlyle-to-fascism story hold and which break. Top row: Bismarck's blessing (verified, appropriation begins in Carlyle's lifetime) connects to the 'Frederick cult' (a misreading of Frederick and Carlyle as German rather than Prussian), which connects to Nietzsche, marked as a broken link that refuses, since Nietzsche despised Carlyle. A labelled channel drops from the Frederick cult to the bottom row, the one documented chain via Schwerin von Krosigk's diary to Trevor-Roper. Bottom row: the bunker reading of April 1945 (real core, the 'Miracle of the House of Brandenburg' transposed onto Roosevelt's death) connects to the famous quotation 'Brave king, wait yet a little while', marked spurious because it is not in Carlyle's text and is misdated, then to the claim of lasting reputational damage, marked contested, then to a revival now trending.\">\n<text x=\"350\" y=\"26\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" letter-spacing=\"2\">THE CONTESTED LINEAGE<\/text>\n<text x=\"350\" y=\"44\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">the Carlyle-to-fascism story is not a clean chain &#8212; two load-bearing links break under scrutiny<\/text>\n<rect x=\"40\" y=\"72\" width=\"178\" height=\"62\" rx=\"2\" class=\"f-panel\" stroke-width=\"1.4\" style=\"stroke:var(--t2)\"/>\n<rect x=\"40\" y=\"72\" width=\"178\" height=\"15\" rx=\"2\" style=\"fill:var(--t2)\"/>\n<text x=\"129\" y=\"83\" text-anchor=\"middle\" font-size=\"8\" style=\"fill:var(--bg)\" letter-spacing=\"1\">VERIFIED<\/text>\n<text x=\"129\" y=\"104\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">Bismarck&#8217;s blessing<\/text>\n<text x=\"129\" y=\"119\" text-anchor=\"middle\" font-size=\"8.2\" class=\"t-muted\">1870s &#183; appropriation begins<\/text>\n<text x=\"129\" y=\"129\" text-anchor=\"middle\" font-size=\"8.2\" class=\"t-muted\">in Carlyle&#8217;s own lifetime<\/text>\n<rect x=\"262\" y=\"72\" width=\"178\" height=\"62\" rx=\"2\" class=\"f-panel\" stroke-width=\"1.4\" style=\"stroke:var(--t4)\"/>\n<rect x=\"262\" y=\"72\" width=\"178\" height=\"15\" rx=\"2\" style=\"fill:var(--t4)\"/>\n<text x=\"351\" y=\"83\" text-anchor=\"middle\" font-size=\"8\" style=\"fill:var(--bg)\" letter-spacing=\"1\">MISREAD<\/text>\n<text x=\"351\" y=\"104\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">The &#8216;Frederick cult&#8217;<\/text>\n<text x=\"351\" y=\"119\" text-anchor=\"middle\" font-size=\"8.2\" class=\"t-muted\">reads Frederick &amp; Carlyle as<\/text>\n<text x=\"351\" y=\"129\" text-anchor=\"middle\" font-size=\"8.2\" class=\"t-muted\">German &#8212; not Prussian<\/text>\n<rect x=\"484\" y=\"72\" width=\"176\" height=\"62\" rx=\"2\" class=\"f-panel\" stroke-width=\"1.4\" style=\"stroke:var(--t3)\" stroke-dasharray=\"5 3\"/>\n<rect x=\"484\" y=\"72\" width=\"176\" height=\"15\" rx=\"2\" style=\"fill:var(--t3)\"/>\n<text x=\"572\" y=\"83\" text-anchor=\"middle\" font-size=\"8\" style=\"fill:var(--bg)\" letter-spacing=\"1\">THE LINK THAT REFUSES<\/text>\n<text x=\"572\" y=\"103\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">Nietzsche<\/text>\n<text x=\"572\" y=\"118\" text-anchor=\"middle\" font-size=\"8.2\" class=\"t-muted\" font-style=\"italic\">&#8220;an English atheist who makes<\/text>\n<text x=\"572\" y=\"128\" text-anchor=\"middle\" font-size=\"8.2\" class=\"t-muted\" font-style=\"italic\">it a point of honour not to be one&#8221;<\/text>\n<line x1=\"218\" y1=\"103\" x2=\"258\" y2=\"103\" style=\"stroke:var(--accent)\" stroke-width=\"2\"/>\n<polygon points=\"252,98 262,103 252,108\" style=\"fill:var(--accent)\"/>\n<line x1=\"440\" y1=\"103\" x2=\"482\" y2=\"103\" class=\"s-t3\" stroke-width=\"2\" stroke-dasharray=\"4 3\"/>\n<line x1=\"455\" y1=\"94\" x2=\"467\" y2=\"112\" class=\"s-t3\" stroke-width=\"2.4\"/>\n<line x1=\"467\" y1=\"94\" x2=\"455\" y2=\"112\" class=\"s-t3\" stroke-width=\"2.4\"/>\n<path d=\"M351,134 C 351,170 200,168 160,196\" fill=\"none\" style=\"stroke:var(--accent)\" stroke-width=\"2\"/>\n<polygon points=\"166,189 156,198 170,201\" style=\"fill:var(--accent)\"/>\n<text x=\"300\" y=\"166\" text-anchor=\"middle\" font-size=\"8.2\" class=\"t-acc\" font-style=\"italic\">the one documented chain &#8212;<\/text>\n<text x=\"300\" y=\"177\" text-anchor=\"middle\" font-size=\"8.2\" class=\"t-muted\">Schwerin von Krosigk&#8217;s diary &#8594; Trevor-Roper<\/text>\n<rect x=\"40\" y=\"200\" width=\"170\" height=\"74\" rx=\"2\" class=\"f-panel\" stroke-width=\"1.4\" style=\"stroke:var(--t2)\"/>\n<rect x=\"40\" y=\"200\" width=\"170\" height=\"15\" rx=\"2\" style=\"fill:var(--t2)\"/>\n<text x=\"125\" y=\"211\" text-anchor=\"middle\" font-size=\"8\" style=\"fill:var(--bg)\" letter-spacing=\"1\">REAL CORE<\/text>\n<text x=\"125\" y=\"232\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"bold\">The bunker reading<\/text>\n<text x=\"125\" y=\"247\" text-anchor=\"middle\" font-size=\"8.2\" class=\"t-muted\">April 1945, at Roosevelt&#8217;s death:<\/text>\n<text x=\"125\" y=\"258\" text-anchor=\"middle\" font-size=\"8.2\" class=\"t-muted\" font-style=\"italic\">the &#8220;Miracle of the House<\/text>\n<text x=\"125\" y=\"268\" text-anchor=\"middle\" font-size=\"8.2\" class=\"t-muted\" font-style=\"italic\">of Brandenburg&#8221;<\/text>\n<rect x=\"234\" y=\"200\" width=\"170\" height=\"74\" rx=\"2\" class=\"f-panel\" stroke-width=\"1.4\" style=\"stroke:var(--t3)\" stroke-dasharray=\"5 3\"/>\n<rect x=\"234\" y=\"200\" width=\"170\" height=\"15\" rx=\"2\" style=\"fill:var(--t3)\"/>\n<text x=\"319\" y=\"211\" text-anchor=\"middle\" font-size=\"8\" style=\"fill:var(--bg)\" letter-spacing=\"1\">SPURIOUS<\/text>\n<text x=\"319\" y=\"231\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\" font-style=\"italic\">&#8220;Brave king! wait<\/text>\n<text x=\"319\" y=\"243\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\" font-style=\"italic\">yet a little while&#8221;<\/text>\n<text x=\"319\" y=\"259\" text-anchor=\"middle\" font-size=\"8.2\" class=\"t-muted\">the famous quotation &#8212; not in<\/text>\n<text x=\"319\" y=\"269\" text-anchor=\"middle\" font-size=\"8.2\" class=\"t-muted\">Carlyle&#8217;s text, and misdated<\/text>\n<rect x=\"428\" y=\"200\" width=\"146\" height=\"74\" rx=\"2\" class=\"f-panel\" stroke-width=\"1.4\" style=\"stroke:var(--t4)\"/>\n<rect x=\"428\" y=\"200\" width=\"146\" height=\"15\" rx=\"2\" style=\"fill:var(--t4)\"/>\n<text x=\"501\" y=\"211\" text-anchor=\"middle\" font-size=\"8\" style=\"fill:var(--bg)\" letter-spacing=\"1\">CONTESTED<\/text>\n<text x=\"501\" y=\"234\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\">&#8216;Lasting damage&#8217;<\/text>\n<text x=\"501\" y=\"252\" text-anchor=\"middle\" font-size=\"8.2\" class=\"t-muted\">to the book&#8217;s reputation &#8212;<\/text>\n<text x=\"501\" y=\"263\" text-anchor=\"middle\" font-size=\"8.2\" class=\"t-muted\">the claim outruns the evidence<\/text>\n<rect x=\"592\" y=\"200\" width=\"68\" height=\"74\" rx=\"2\" class=\"f-panel\" stroke-width=\"1.4\" style=\"stroke:var(--t5)\"/>\n<rect x=\"592\" y=\"200\" width=\"68\" height=\"15\" rx=\"2\" style=\"fill:var(--t5)\"/>\n<text x=\"626\" y=\"211\" text-anchor=\"middle\" font-size=\"7.6\" style=\"fill:var(--bg)\" letter-spacing=\"1\">TRENDING<\/text>\n<text x=\"626\" y=\"236\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\">Revival<\/text>\n<text x=\"626\" y=\"252\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\">re-reading on<\/text>\n<text x=\"626\" y=\"262\" text-anchor=\"middle\" font-size=\"8\" class=\"t-muted\">textual grounds<\/text>\n<line x1=\"210\" y1=\"237\" x2=\"232\" y2=\"237\" style=\"stroke:var(--accent)\" stroke-width=\"2\"/>\n<polygon points=\"226,232 236,237 226,242\" style=\"fill:var(--accent)\"/>\n<line x1=\"404\" y1=\"237\" x2=\"426\" y2=\"237\" style=\"stroke:var(--accent)\" stroke-width=\"2\"/>\n<polygon points=\"420,232 430,237 420,242\" style=\"fill:var(--accent)\"/>\n<line x1=\"574\" y1=\"237\" x2=\"590\" y2=\"237\" style=\"stroke:var(--t5)\" stroke-width=\"2\"/>\n<polygon points=\"585,232 593,237 585,242\" style=\"fill:var(--t5)\"/>\n<line x1=\"40\" y1=\"300\" x2=\"660\" y2=\"300\" class=\"ln-soft\" stroke-width=\"1\"/>\n<rect x=\"40\" y=\"312\" width=\"11\" height=\"11\" rx=\"1\" style=\"fill:var(--t2)\"/>\n<text x=\"56\" y=\"321\" font-size=\"8.6\" class=\"t-muted\">verified<\/text>\n<rect x=\"120\" y=\"312\" width=\"11\" height=\"11\" rx=\"1\" style=\"fill:var(--t4)\"/>\n<text x=\"136\" y=\"321\" font-size=\"8.6\" class=\"t-muted\">misread / contested<\/text>\n<rect x=\"270\" y=\"312\" width=\"11\" height=\"11\" rx=\"1\" style=\"fill:var(--t3)\"/>\n<text x=\"286\" y=\"321\" font-size=\"8.6\" class=\"t-muted\">broken / spurious<\/text>\n<rect x=\"410\" y=\"312\" width=\"11\" height=\"11\" rx=\"1\" style=\"fill:var(--t5)\"/>\n<text x=\"426\" y=\"321\" font-size=\"8.6\" class=\"t-muted\">recovering<\/text>\n<text x=\"350\" y=\"352\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\" font-style=\"italic\">The shadow is real but diffuse &#8212; guilt by appropriation, not by authorship; the worst-cited link (Nietzsche) and the worst-cited quote are both false.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 6.<\/strong> The standard &#8220;Carlyle bred fascism&#8221; lineage collapses at its two most-cited joints: Nietzsche, the supposed link, openly despised Carlyle, and the celebrated bunker quotation is not in Carlyle&#8217;s text. What survives verification is narrower and stranger &#8212; a real 1945 bunker reading transmitted through a single diary &#8212; so the reputational shadow is guilt by appropriation, not authorship, and the trajectory now bends back toward textual revival.<\/figcaption>\n<\/figure>\n\n\nThe deepest irony of *Friedrich*'s afterlife is that its German triumph was sealed before any Nazi was born. Bismarck's compliment — that Carlyle had set the Prussian king before the Germans \"like a living statue\" [1] — is exactly the metaphor that should worry a careful reader, because a *statue* is precisely what Carlyle did not write. The six volumes are a turbulent, ironic, digressive, often exhausted performance; the \"living statue\" is what the appropriators wanted, the monument abstracted from the prose. We can watch Carlyle himself resist the monumental in the very first pages: his hero arrives \"defaced under strange mud-incrustations,\" seen \"from a singularly changed... oblique and perverse point of vision,\" and the historian's labor is to wrestle him out of \"the Prussian Dryasdust,\" who \"has made of Friedrich's History a wide-spread, inorganic, trackless matter; dismal to your mind, and barren as a continent of Brandenburg sand\" [13]. The book is, by its own self-description, an *excavation*, not a statue — a wresting of a contested, defaced figure out of chaos. The cult took the excavated object and re-fixed it; it wanted the statue, and threw away the excavation.\n\nThe \"Frederick cult\" then recast Frederick as the \"precursor of the all-German hero\" [2], a reading that standard scholarship calls \"quite misleading\" because Frederick \"was always a Prussian nationalist, never a German one\" [2]. The book's usefulness as a *military* text — students learning Frederick's battles from Carlyle [1] — mattered here. It meant the book entered the German officer-class imagination as a manual of national heroism rather than as the literary-philosophical experiment it was. The battle narratives are indeed the most extractable portions of the History — the marches that \"exceeded all calculation and example, and are still the admiration of military men,\" done \"with such dexterity, rapidity and inexhaustible contrivance\" that Frederick's \"one army equivalent in effect to their three\" [13] — and an officer-reader could lift these and discard Carlyle's irony, his elegy, his exhaustion with the whole bloody business. By the time the National Socialists arrived, the channel was cut: Frederick as German messiah, Carlyle as his English prophet. The portrait of Frederick that hung in Hitler's study, and the Carlyle volume read in the bunker, are the end of a line that runs back through Bismarck — not a sudden Nazi invention. The appropriation, in short, succeeded by *editing*: keep the marches and the hero, cut the historian's voice.\n\n## Nietzsche: The Link That Refuses\n\nThe popular intellectual genealogy — Carlyle's hero-worship → Nietzsche's superman → fascism's Führer-principle — is seductive and largely false at its middle joint. Nietzsche read Carlyle and recoiled. His *Twilight of the Idols* portrait is not ambivalent; it is contemptuous, and it is contemptuous in precisely the dimensions later attributed to the Carlyle-fascism link. The very thing the fascist reading prized — Carlyle's *fortissimo*, his \"reverence for men of a strong faith,\" his \"rage over those who are less foolish\" — is exactly what Nietzsche diagnoses as pathology: \"he is in sore need of noise,\" a man of \"constant and passionate dishonesty towards himself\" [5]. Where the cult heard a prophet of strength, Nietzsche heard a weak man performing strength to drown out his own unbelief: \"To yearn for a strong faith is not the proof of a strong faith, but rather the reverse\" [5]. And the famous verdict — \"an English atheist who makes it a point of honour not to be one\" [5] — is a charge of bad faith, of inauthenticity, the opposite of the iron sincerity the cult wanted. Nietzsche even reaches past the work to mock the *Life*: \"that unconscious and involuntary farce, that heroico-moral interpretation of dyspeptic moods\" [5].\n\nThis matters for the document's central argument in two directions. First, it complicates the lineage: the philosopher most often used to bridge Carlyle and the twentieth century explicitly threw Carlyle off the bridge, and did so on grounds that invert the cult's reading point for point. Whatever Carlyle and the Nazis share, it did not pass *cleanly* through Nietzsche, who saw Carlyle as the very type of the moralizing, faith-hungry English sage he was trying to demolish — and who preferred Emerson, \"a man of taste\" by comparison [5]. Second, it dates the decline. Nietzsche's 1888 contempt is hard evidence that Carlyle's stock was *already* falling among advanced European intellectuals more than half a century before the bunker. Any account that makes 1945 the hinge of Carlyle's reputation has to reckon with the fact that the most consequential reader of the late nineteenth century had already filed him under farce. The irony compounds when Russell, in 1935, then lists Carlyle, Fichte, and *Nietzsche* together as fascism's ancestry [12]: the lineage as Russell drew it puts the despiser and the despised on the same shelf, smoothing over the documented hostility between them. The genealogy survives in the textbooks not because the joints hold but because the shape is satisfying.\n\n## The Bunker: What the Record Actually Supports\n\nIt is worth separating the documented core from the legend, because the legend is where the corpus's verification pass found the strongest claims refuted — and where this revision adds a second, sharper correction.\n\n**What is documented (single-chain, with one independent corroboration of the frame):** Goebbels read Carlyle's *Friedrich* aloud to Hitler in the bunker in early 1945; the passage concerned Frederick's lowest point in the Seven Years' War, including the poison-deadline letter to Count Finckenstein; Goebbels reported tears in Hitler's eyes; the controlling analogy was the \"Miracle of the House of Brandenburg,\" the death of the Czarina; and when Roosevelt died on 12 April 1945 Goebbels seized on the parallel and telephoned Busse, \"The Czarina is dead\" [3][4]. The testimony descends from Schwerin von Krosigk's diary through Trevor-Roper [3][4], with a Propaganda Ministry secretary independently confirming the 13 April Küstrin trip and the timing of the Roosevelt news [4], and Bullock as the standard secondary citation for the two readings [1].\n\n**What is misattributed or misdated (new finding):** the consoling line read in the bunker — \"Brave king! wait yet a little while, and the days of your suffering will be over. Already the sun of your good fortune stands behind the clouds, and soon will rise upon you\" — is attributed in the diary to Carlyle (\"'says Carlyle'\") but does **not** occur in Carlyle's text [4][13]. Carlyle's actual deliverance prose runs through a different image — the \"wonderful star-of-day,\" the \"daybreak when the night was at the blackest,\" \"the darkest hour is often nearest the dawn\" [13] — from which the bunker line is at best a loose paraphrase and at worst an invention. The diary's chronology is also garbled: it gives \"On 12 February the Czarina died,\" conflating the death (5 January 1762; news to Frederick 19 January per Carlyle) with Frederick's \"15 February\" poison deadline [13][4]. The most-quoted sentence of the entire legend, in other words, is not in the book it is said to come from.\n\n**What is embellishment or unverified:** the image of *nightly* readings, of Goebbels as Hitler's standing bedside lector, accretes in popular retellings beyond what the sources establish; the sources document recent reading(s), reported once, by a self-dramatizing diarist.\n\n**What is over-claimed:** that the bunker scene \"severely damaged the book's reputation... a state of affairs that continues today\" [1]. McCollum, the very scholar quoted for the durability of the association, builds his thesis on the argument that the fascist label is a *presentist distortion* — what regimes did *to* Carlyle, not what Carlyle did [7][8]. Kreilkamp locates the real problem in Carlyle's *style*, not in one anecdote [12]. The defensible statement is the weak one: the bunker became the enduring *symbol* of Carlyle's fascist shadow. The indefensible one is the strong causal claim. This document reports the symbol, flags the cause as contested, and now adds that even the symbol's most-quoted line is textually spurious.\n\n## The Shadow and the Recovery\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 348\" role=\"img\" aria-label=\"A fan-forecast of the book's future scholarly standing, opening from a point marked 'now, 2026' on the left into three diverging probability bands. The widest, uppermost band is continued scholarly revival at probability about 0.60, driven by the Duke Carlyle Letters Online, the Carlyle Studies Annual, and renewed interest in Victorian prose style. The middle band is a persistent reputational shadow at about 0.30, driven by bunker retellings, the toxicity of the great-man theory, and presentism. The lowest and thinnest band is near-total neglect at about 0.10, driven by the six-volume length and the difficulty of Carlylese. A stacked bar at the origin shows the 60-30-10 split.\">\n<text x=\"350\" y=\"26\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" letter-spacing=\"2\">THREE FUTURES FOR THE BOOK<\/text>\n<text x=\"350\" y=\"44\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">the evolving scholarly reputation &#8212; as a band of probabilities, not a single forecast<\/text>\n<line x1=\"96\" y1=\"70\" x2=\"96\" y2=\"300\" class=\"ln-soft\" stroke-width=\"1\"/>\n<text x=\"90\" y=\"66\" text-anchor=\"end\" font-size=\"8.3\" class=\"t-muted\">standing &#8593;<\/text>\n<text x=\"96\" y=\"316\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">now &#183; 2026<\/text>\n<text x=\"600\" y=\"316\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">&#8594; horizon<\/text>\n<rect x=\"86\" y=\"120\" width=\"14\" height=\"60\" rx=\"1\" style=\"fill:var(--t5)\" opacity=\"0.85\"/>\n<rect x=\"86\" y=\"180\" width=\"14\" height=\"30\" rx=\"1\" style=\"fill:var(--t4)\" opacity=\"0.85\"/>\n<rect x=\"86\" y=\"210\" width=\"14\" height=\"10\" rx=\"1\" style=\"fill:var(--t3)\" opacity=\"0.85\"/>\n<path d=\"M104,150 C 280,140 420,96 600,74 L600,132 C 420,150 280,168 104,168 Z\" style=\"fill:var(--t5)\" opacity=\"0.30\"/>\n<path d=\"M104,159 C 280,150 420,112 600,100\" fill=\"none\" class=\"s-t5\" stroke-width=\"1.4\" stroke-dasharray=\"6 4\"/>\n<text x=\"596\" y=\"90\" text-anchor=\"end\" font-size=\"10.5\" font-weight=\"bold\" style=\"fill:var(--t5)\">REVIVAL &#183; p &#8776; 0.60<\/text>\n<text x=\"596\" y=\"120\" text-anchor=\"end\" font-size=\"8.2\" class=\"t-muted\">Duke Carlyle Letters Online &#183; Carlyle Studies<\/text>\n<text x=\"596\" y=\"130\" text-anchor=\"end\" font-size=\"8.2\" class=\"t-muted\">Annual &#183; renewed interest in Victorian prose<\/text>\n<path d=\"M104,176 C 300,178 440,176 600,168 L600,212 C 440,214 300,214 104,190 Z\" style=\"fill:var(--t4)\" opacity=\"0.26\"/>\n<path d=\"M104,183 C 300,186 440,186 600,190\" fill=\"none\" class=\"s-t4\" stroke-width=\"1.4\" stroke-dasharray=\"6 4\"/>\n<text x=\"596\" y=\"184\" text-anchor=\"end\" font-size=\"10.5\" font-weight=\"bold\" style=\"fill:var(--t4)\">PERSISTENT SHADOW &#183; p &#8776; 0.30<\/text>\n<text x=\"596\" y=\"232\" text-anchor=\"end\" font-size=\"8.2\" class=\"t-muted\">bunker retellings &#183; great-man toxicity &#183; presentism<\/text>\n<path d=\"M104,198 C 280,212 430,250 600,266 L600,292 C 430,278 280,236 104,206 Z\" style=\"fill:var(--t3)\" opacity=\"0.24\"/>\n<path d=\"M104,202 C 280,222 430,256 600,279\" fill=\"none\" class=\"s-t3\" stroke-width=\"1.4\" stroke-dasharray=\"6 4\"/>\n<text x=\"596\" y=\"262\" text-anchor=\"end\" font-size=\"10\" font-weight=\"bold\" style=\"fill:var(--t3)\">NEAR-TOTAL NEGLECT &#183; p &#8776; 0.10<\/text>\n<text x=\"596\" y=\"293\" text-anchor=\"end\" font-size=\"8.2\" class=\"t-muted\">six volumes &#183; the difficulty of Carlylese<\/text>\n<circle cx=\"104\" cy=\"178\" r=\"4\" style=\"fill:var(--accent)\"/>\n<text x=\"350\" y=\"338\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\" font-style=\"italic\">The likeliest future is a quiet textual revival &#8212; not the fascist shadow that dominates popular memory.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 7.<\/strong> The book&#8217;s most probable future is the one its popular reputation least expects: a quiet, textual revival (p &#8776; 0.60) on the strength of the Carlyle Letters project and renewed attention to Victorian prose, with the fascism-shadow scenario (p &#8776; 0.30) and outright neglect (p &#8776; 0.10) the less likely branches. The fan, not a single line, is the honest forecast &#8212; the bands overlap because the drivers do.<\/figcaption>\n<\/figure>\n\n\nThe reputational shadow is genuine but should be named precisely: it is guilt by *appropriation*. Carlyle died in 1881. The regimes that claimed him did so opportunistically and inconsistently [7]. The shadow's mechanism is association — Russell's 1935 lineage [12], the bunker's iconography [1] — not a finding that the text produces fascists. That distinction is the whole burden of the modern scholarly defense, and it gains force from the textual discoveries above: a reading-scene whose central quotation is not even Carlyle's is an unusually thin foundation for a verdict on a six-volume work.\n\nAnd the trajectory is now recovery. The institutional apparatus of Carlyle studies — the *Carlyle Letters Online* (Duke), the *Carlyle Studies Annual*, the Oxford editions — has outlasted the mid-century revulsion [9][10]. The *Carlyle Letters* project in particular matters for a stylistic corpus: it makes the day-by-day record of the \"thirteen-years' war\" with *Friedrich* available, the letters of exhaustion and complaint that document how unlike a triumphant nationalist monument the book's making actually was. Biographers from Kaplan to Heffer have insisted on reading Carlyle as Carlyle rather than as a Nazi precursor, with Heffer explicitly denying that Carlyle was even a conservative [10]. Whether this revival can detach the *Friedrich* specifically — the most \"Prussian,\" most militarily-read, most bunker-tainted of the works — from its shadow remains the open question of the book's future. The corpus's stylistic emphasis is itself part of that answer: read as prose, as performance, as Carlyle's running quarrel with \"the Prussian Dryasdust\" and with his own subject, the *Friedrich* is something other than the living statue Bismarck thanked him for. It is an excavation that the appropriators re-buried — and that scholarship is, slowly, digging out again.\n\n## Open Questions\n\n1. **The Carlyle Czarina passage, verbatim — now resolved, with a finding.** The prior pass could not load the relevant chapter; this revision fetched it. Carlyle's deliverance passage (Book XX, \"Bright News from Petersburg... a Star-of-Day for Friedrich,\" Gutenberg ebook #2120) reads \"We promised Friedrich a wonderful star-of-day; and this is it... think what a daybreak when the night was at the blackest! Pious people say, The darkest hour is often nearest the dawn. And a dawn this proved to be for Friedrich\" [13]. The diary's \"Brave king! wait yet a little while...\" is therefore **not** Carlyle's wording, and the diary's \"12 February\" date is wrong (Czarina died 5 January 1762; news to Frederick 19 January; 15 February was the poison deadline). The remaining sub-question is whether *any* edition or translation of Carlyle ever printed the \"Brave king!\" sentence — i.e., whether Schwerin von Krosigk paraphrased Carlyle from a German rendering or invented the line outright. A check of the standard German translations of *Friedrich* would settle it.\n\n2. **How many readings, and on what authority beyond Bullock?** Bullock asserts two readings [1]; the deeper sourcing chain reduces ultimately to Goebbels via Schwerin von Krosigk via Trevor-Roper, plus the unnamed Propaganda Ministry secretary who corroborates only the frame (the Küstrin trip, the timing), not the Carlyle content [4]. A primary check against Goebbels's own published diaries (Fröhlich edition) would clarify how much rests on a single propagandist's self-presentation.\n\n3. **Did the bunker story measurably move the book's reputation, or only symbolize it?** No source in this pass demonstrates a *causal* drop attributable to 1945 as opposed to the long pre-1914 decline (of which Nietzsche's 1888 contempt is direct evidence). A reception-history charting citations, reprints, and review-tone across 1900–1960 would test the strong claim directly.\n\n4. **How far does the revival reach the *Friedrich* specifically?** The Carlyle revival is real for *Sartor*, the *French Revolution*, and the political theory; the six-volume *Friedrich* remains \"more talked about than read\" [2]. Whether modern scholarship is actually re-reading *this* book, or only rehabilitating Carlyle around it, is unresolved.\n\n5. **Catherine Heyrendt's account.** Heyrendt's work on the Nazi appropriation of Carlyle (in *Thomas Carlyle Resartus*, 2010) was identified but not fetched in full; alongside McCollum's chapter in the same volume it likely offers the most direct scholarly adjudication of the appropriation mechanism and should anchor a future revision.\n\n## Sources\n\n1. \"History of Friedrich II of Prussia, Called Frederick the Great,\" *Wikipedia* (reception and influence section; cites *The New York Times* \"Bismarck and Carlyle,\" 25 July 1887, for the Bismarck quote; Alan Bullock, *Hitler: A Study in Tyranny*, 1962, pp. 780–781, for the bunker readings; and Jonathon McCollum for the \"never really been extricated\" line). https://en.wikipedia.org/wiki/History_of_Friedrich_II._of_Prussia,_Called_Frederick_the_Great — Tier 4 (encyclopedic; used for the citations it carries, not as ultimate authority).\n\n2. \"Frederick II (Prussia),\" *Encyclopedia.com* / Britannica reference material on Frederick the Great and Carlyle's *History* (the Frederick cult; \"Prussian nationalist, never a Germa
