<script id="corpus-data" type="application/json">{"slug": "carlyle-friedrich-research", "title": "Carlyle's Everest", "subtitle": "Carlyle's History of Friedrich the Great (1858–1865)", "author": "", "generated": "2026-06-04", "documents": [{"order": 0, "file": "00_Briefing.md", "title": "Carlyle's *Friedrich the Great* — Master Briefing", "summary": "", "body": "# Carlyle's *Friedrich the Great* — Master Briefing\n\n## Bottom Line\n\nCarlyle's *History of Friedrich II of Prussia, Called Frederick the Great* (six volumes, 1858–1865) is the last and largest of his works, a roughly thirteen-year ordeal he called, in his *Reminiscences*, \"infinitely worse\" than *Cromwell* and \"a desperate dead-lift pull.\" It is best read not as military history but as the terminal experiment of \"Carlylese\" — a deliberately deformed prose of broken syntax, coined compound words, reader-apostrophe, capitalized abstractions (Sham, Reality, Veracity, Fact), present-tense battle narration, and Old-Testament cadence, in which the style *is* the argument. The book's animating problem is one Carlyle states in his own text: \"How show the man, who is a Reality worthy of being seen, and yet keep his Century, as a Hypocrisy worthy of being hidden and forgotten, in the due abeyance?\" That tension — a genuine hero quarried out of a \"swindler-century\" he despised — runs through every level of the work, from its sentence rhythms to its theology of history. The great-man theory reaches here its hardened terminus: the hero is no longer the literary prophet of *On Heroes* but, in Hochstrasser's phrase, \"the political despot who compels rather than persuades.\" Contemporaries admired it as monumental and distrusted it as partisan — \"more talked about than read\" — with Emerson the conspicuous exception, calling it \"a book that is a Judgment Day\" and \"infinitely the wittiest book that ever was written.\" Its twentieth-century afterlife is shadowed by appropriation rather than authorship: claimed by a Prussian-militarist \"Frederick cult,\" read by Goebbels to Hitler in the bunker — though, as this corpus newly establishes, the famous bunker quotation is misattributed and misdated, and the claim that the episode *lastingly damaged the book's reputation* outruns the evidence.\n\n## How to read this corpus\n\nThis briefing is the five-minute version. The nine numbered documents are the depth, and they prioritize close reading of the actual text — nearly every quoted passage was verified verbatim against a fetched primary source (the twenty-odd Project Gutenberg volumes of the *History*, the Carlyle–Emerson correspondence, Carlyle's *Reminiscences*, and the *Letters and Memorials of Jane Welsh Carlyle*). See `README.md` for reading paths and `Sources.md` for the annotated bibliography.\n\n- **01 — Composition History.** The thirteen-year struggle.\n- **02 — \"Carlylese\" (the style).** The centerpiece close reading.\n- **03 — The Dryasdust device.** Narrative technique and the storyteller persona.\n- **04 — The battle set-pieces.** The prose of Mollwitz, Prague, Rossbach, Leuthen, Zorndorf, Kunersdorf, Torgau.\n- **05 — Themes and ideology.** Hero-worship, work, divine order, the father-son dialectic.\n- **06 — Characterization.** Friedrich, Friedrich Wilhelm I, Voltaire.\n- **07 — Career and historiography.** The arc from *The French Revolution* to *Friedrich*.\n- **08 — Contemporary reception.** Emerson, the reviews, the honors.\n- **09 — The contested afterlife.** Militarism, Nietzsche, and the bunker legend.\n\n## 1. The making (history)\n\nThe book grew from the hero-search that had carried Carlyle through *Oliver Cromwell* (1845) and from the wreckage of the savaged *Latter-Day Pamphlets* (1850): having \"painfully harangued\" his readers into hostility, he turned to Friedrich as a quieter, narrative vehicle for the same conviction that \"the few Wise\" must \"take command of the innumerable Foolish.\" The documentary record of his ambivalence is unusually candid. In 1852 alone he moved from \"it remains quite unlikely that I shall ever write a word about Friedrich\" to \"I decidedly grow in love for my Hero,\" culminating in the December journal cry, \"Eheu! Shall I try Friedrich, or not try him?\" The deeper problem, in Froude's transmission, was that the archive yielded \"other such shoreless and bottomless chaos, with traces of a hero imprisoned there, [as] I never did behold\" — over thirteen years, *fewer and fewer* traces of a hero appeared. He made two trips to Germany (1852, 1858) to walk the battlefields; Joseph Neuberg served as \"volunteer amanuensis\"; and the cost was severe — sleeplessness so acute that by 1860 he feared the book \"would finish me instead,\" and a marriage \"sorely tried\" that ended in Jane Welsh Carlyle's death in 1866, fifteen months after he finished. His own verdict: \"the poorest, most troublesome and arduous piece of work he has ever undertaken.\" (See **01**.)\n\n## 2. The style and the telling (the text itself)\n\n\"Carlylese\" is the load-bearing fact of the book, and the corpus treats it as argument, not ornament. Its fragmentation enacts Carlyle's claim that the past survives only as wreckage to be quickened by sympathy; its sarcasm enacts the Sham-versus-Reality morality he names outright — \"a Veracity in Things, and a Mendacity in Sham-Things.\" The single most-quoted specimen fuses three devices in one sentence: \"Poor Imperial Majesty; a human creature doing Play-actorisms of too high a flight\" — mock-pity, coinage, and polemic at once. Thackeray gave both the canonical indictment (\"stiff, short, and rugged… choking double words\") and the canonical defense (\"This is prose run mad… but is there not method in it\") in 1837; Rosenberg's modern restatement is that the deliberate \"awkwardness\" is designed to \"shock readers out of dreamy historical fiction into historical fact.\" (See **02**.)\n\nAgainst this style Carlyle runs his narrative foil \"Dryasdust\" — inherited from Walter Scott — the personified pedantic, indexless, \"lazy\" archive onto whom he projects his frustration (\"Your poor Prussian Dryasdust (without even an Index to help you)\"). Refusing conventional historiography, he adopts the persona of an oral *storyteller* who interrupts, withholds, and conspires with the reader, producing what apRoberts and Stewart call \"a remarkable three-way relationship between himself, Frederick, and the reader.\" (See **03**.)\n\nThe battle set-pieces are the most concentrated stylistic laboratory in the book, run on a small repeating kit: the asyndetic sensory catalogue (\"Such a chaotic whirlwind of blood, dust, mud, artillery-thunder, sulphurous rage, and human death and victory\"); the *occupatio* that performs the sublime by refusing it (\"who shall pretend to describe it\"); tense-wrenching from past into present; an aural imagination that hears battle as thunder, as Doomsday, and finally as the Leuthen Te-Deum sung by \"five-and-twenty thousand other voices\"; and the mechanical simile that makes Prussian discipline itself the hero — troops moving \"straight, rigid, regular as iron clock-work… with the lightning sleeping in it.\" A point of careful attribution: the famous \"whirlwind\" passage belongs to Prague (1757), not Leuthen. (See **04**.)\n\n## 3. What it argues (themes and figures)\n\nThe themes are continuous with *On Heroes* (1841) and *Past and Present* (1843): universal history as \"the History of the Great Men who have worked here\"; the gospel that \"Labour is Life\"; the morally governed cosmos where \"Lying is not permitted in this Universe\"; and Prussia as a Genesis-like world made by drill and war, the Hohenzollerns named as \"the Authors of Prussia.\" Frederick earns hero status not by virtue but by veracity — he \"managed not to be a Liar and Charlatan as his Century was.\" Read with Vanden Bossche, the whole narrative is also a covert family romance in which Frederick, Friedrich Wilhelm I, and Voltaire re-stage Carlyle, his father James, and Goethe. The ideology is coherent, sincerely held, and — in its worship of compulsion over consent — genuinely disturbing. (See **05**.)\n\nAt the level of craft the book is a gallery of physical portraits: the aged Friedrich, \"a highly interesting lean little old man\" with \"such a pair of eyes as no man or lion or lynx of that Century bore elsewhere\"; Friedrich Wilhelm I, the comic-tragic \"great Drill-sergeant\" of the Tobacco-Parliament and the Potsdam Giants (\"2,400 sons of Anak\"), whose rage culminates in the execution of Katte before his son's window; and Voltaire, \"the most brilliant of mankind\" in speech yet faithless in honour, the magnet of Carlyle's anti-Enlightenment polemic against a \"swindler-century\" with \"nothing grand in it, except that grand universal Suicide, named French Revolution.\" (See **06**.)\n\n## 4. Where it stands (career, reception, afterlife)\n\n*Friedrich* is the terminus of a thirty-year arc from revolutionary sympathy (*The French Revolution*, 1837) through hero-worship (1841) and heroic governance (1843) to a strained, archive-bound authoritarian historiography — the culmination *and* the exhaustion of the project. The discipline was meanwhile moving the other way, toward Ranke's source-critical \"scientific\" history; Lord Acton called Carlyle \"the most detestable of historians\" and the great-man creed an \"atrocity.\" Yet the narrative-as-art tradition survived in G. M. Trevelyan. (See **07**.)\n\nIn his lifetime the work was admired for scale and style and distrusted for judgment. Emerson's praise is documented and verbatim; British periodical reviewers were initially hostile (the negative reviews of Vols. I–II \"far outweighed\" the positive, contradicting any story of universal acclaim) and finally elegiac, praising Carlyle above all as a battle-painter. The book helped win him the Edinburgh Rectorship (1865) and the Prussian *Pour le Mérite* (1874). (See **08**.)\n\nThe afterlife is the corpus's most carefully fact-checked section. The German nationalist appropriation began in Carlyle's lifetime with Bismarck's blessing and hardened into a militarist \"Frederick cult\" that misread the hero as German rather than Prussian. The usual Carlyle-to-fascism lineage is *not* clean: Nietzsche held Carlyle in documented contempt (\"an English atheist who makes it a point of honour not to be one\"). The bunker episode is real at its core — transmitted via Schwerin von Krosigk's diary through Trevor-Roper, with Goebbels invoking the \"Miracle of the House of Brandenburg\" when Roosevelt died in April 1945 — but **the celebrated quotation Goebbels supposedly read is not in Carlyle's text and is misdated**, and the strong claim that the episode lastingly damaged the book's reputation is contested, not established. The trajectory now bends toward a quiet scholarly revival. (See **09**.)\n\n## Open Questions\n\n- The exact extent of Friedrich's contribution to Carlyle's documented neologisms (a popular OED statistic was refuted in an earlier verification pass).\n- Hard sales/print-run figures for the *History* in Carlyle's lifetime are thin; commercial standing is inferred.\n- The precise textual source, if any, behind the misdated \"Brave king! wait yet a little while\" bunker quotation.\n- Whether the causal link between the composition years and Jane Welsh Carlyle's decline can be established beyond Carlyle's own remorseful inference.\n\n## Sources\n\nSee `Sources.md` for the full annotated, tier-tagged bibliography. The primary-text spine is the Project Gutenberg edition of the *History* (ebooks #2101–#2120), supplemented by the Carlyle–Emerson correspondence (#13660), Carlyle's *Reminiscences*, and Froude's *Letters and Memorials of Jane Welsh Carlyle* (1883). Principal secondary authorities: Stewart (Edinburgh PhD, 2010); Rosenberg, *Carlyle and the Burden of History* (Harvard UP, 1985); Vanden Bossche, *Carlyle and the Search for Authority* (Ohio State UP, 1991); apRoberts (2004); Holloway, *The Victorian Sage* (1953)."}, {"order": 1, "file": "01_Composition_History.md", "title": "Composition History", "summary": "", "body": "# Composition History\n\n## Bottom Line\n\nCarlyle's *History of Friedrich II of Prussia, Called Frederick the Great* was published in six volumes between 1858 and 1865 and was, by his own and universal reckoning, his last major work and his longest labour — a \"desperate dead-lift pull\" of \"thirteen years or more\" that he, in the *Reminiscences*, set explicitly above *Cromwell* as the worse ordeal: \"'Cromwell' was by much the worst book-time, till this of 'Friedrich,' which indeed was infinitely worse; in the dregs of our strength too;—and lasted for about thirteen years\" [8]. The book grew out of the hero-search that had carried him through *Oliver Cromwell* (1845) and out of the wreckage of the savagely reviewed *Latter-Day Pamphlets* (1850): having \"painfully harangued\" his readers into hostility, Carlyle turned to Friedrich as a quieter, narrative, didactic vehicle for the same conviction that \"the few Wise\" must \"take command of the innumerable Foolish\" [2]. The documentary record is unusually candid about his ambivalence — letters and journals from 1852 alone run from \"it remains quite unlikely that I shall ever write a word about Friedrich\" to \"I decidedly grow in love for my Hero,\" and culminate in the December 1852 journal cry, \"Eheu! Shall I try Friedrich, or not try him?\" [2]. Twice — in 1852 and 1858, \"a second, five years afterwards\" — he travelled to Germany to walk Friedrich's battlefields and search for books and portraits [2][8]. Throughout, the self-effacing Joseph Neuberg served, in Carlyle's own phrase, as \"volunteer amanuensis\" [8]. The cost was heavy and is recorded in Carlyle's own hand: sleeplessness so severe that in 1860 he \"first began to have an apprehension that I should never get my sad book on Friedrich finished, that it would finish me instead\" [9]; \"the immense masses of incondite or semi-condite rubbish which had accumulated on 'Frederick'\" [9]; the verdict that the labour was \"the poorest, most troublesome and arduous piece of work he has ever undertaken\" [1][5]; and a marriage tried as never before — \"that 'Friedrich' affair, with its many bad adjuncts, was much the worst we ever had, and sorely tried us both\" [8]. The relief came in a single sentence: \"'Frederick' ended in January 1865, and we went to Devonshire together\" [8] — followed, fifteen months later, by Jane Welsh Carlyle's sudden death in April 1866 [2][8].\n\n## The Shape of the Labour\n\n*Frederick* was the final large project of Carlyle's career, occupying him from the early 1850s until 1865, its serial publication running across seven years. David Sorensen's editorial framing and the Stewart thesis both open by stating that the *History of Friedrich II. of Prussia, called Frederick the Great* \"was published in six volumes between 1858 and 1865 and was his last major work\" [2]. The precise volume schedule, drawn from the publication record in Stewart's footnotes, ran as follows: Volumes I and II together in September 1858, Volume III in May 1862, Volume IV in February 1864, and Volumes V and VI together in March 1865 [2]. Vanden Bossche, cited in the standard reference apparatus, adds that Carlyle \"was seventy years old and his writing hand had become palsied\" by the time he completed it [2]. The \"thirteen years\" measure is not a later scholarly rounding but Carlyle's own figure, repeated twice within a single passage of the *Reminiscences*: the *Friedrich* book \"lasted for about thirteen years,\" and again, \"It lasted thirteen years or more\" [8]. He himself dates the live work from the first German errand — \"It was in 1852 (September-October, for about a month) that I had first seen Germany, gone on my first errand as to 'Friedrich'\" [8] — to the completion he records flatly: \"'Frederick' ended in January 1865\" [8]. The dating is in that sense a framing choice: counting from the 1845 reading of Preuss, or from the 1830 first proposal, would lengthen the gestation considerably, so the \"thirteen years\" is best understood, as Carlyle himself understood it, as the period of active, full-time labour from 1852 to 1865.\n\nThe project originates in the post-*Cromwell* hero-search and crystallizes only after the public disaster of the *Latter-Day Pamphlets*. Stewart reconstructs the long pre-history: \"It was 1830 when the possibility of writing a history of Frederick was first mooted but not until 1851\" did Carlyle begin in earnest [2]. The decisive intervening event was the *Latter-Day Pamphlets*, published in 1850 as \"Carlyle's response to the current political situation in Britain,\" in which — in Carlyle's own words quoted by Stewart — he \"assert[ed] with great confidence, supported by the whole Universe\" that \"the few Wise will have, by one method or another, to take command of the innumerable Foolish\" [2]. Their \"aggressive tone\" antagonised reviewers; the *Eclectic Review* of October 1850 called his style \"peculiarly vicious\" and accused him of \"exaggeration; amounting, not unfrequently, to positive falsehood,\" while Jules Seigel describes the *Pamphlets* prose as \"painfully haranguing, relentlessly arguing his readers into accepting his prophetic message\" [2]. Stewart's reading is explicit: \"Carlyle came to realise that a different approach from that used in the Latter-Day Pamphlets was required in order to convey his philosophy and restore his reputation\" — and that *Frederick* was that different approach, the same message \"cloak[ed] … within an epic tale\" so as to \"approach his readers in a manner far removed from the aggressive tone of his Latter-Day Pamphlets\" [2]. Carlyle's own *Reminiscences* corroborate the sequence and add the human margin: of the *Pamphlets* uproar he writes that Neuberg \"helped me zealously, as volunteer amanuensis etc., through all this business, but I know not that even he approved it all,\" and that in \"the whole world I had one complete approver\" — Jane — \"and it was worth all\" [8]. The line of descent runs, in the *Reminiscences*' own order, \"On the back of 'Latter-Day Pamphlets' followed 'Life of Sterling'\" and then the long submergence in *Friedrich* [8].\n\nIn the same year he began serious work, Carlyle's letters and journal swung repeatedly between commitment and the wish to abandon the project, and the ambivalence is documented verbatim. Stewart assembles the sequence from *The Collected Letters of Thomas and Jane Welsh Carlyle*. Writing to Neuberg on 1 March 1852, Carlyle \"opined, 'it remains quite unlikely that I shall ever write a word about Friedrich'\"; to his brother John on 13 March he added, \"I am often tempted to renounce it all, some good day\" (CL 27: 57, 70) [2]. Yet less than three months later he told Varnhagen von Ense, \"I decidedly grow in love for my Hero, as I go on; and can by no means decide to throw him up at this stage of the inquiry. That I should ever write anything on F——k seems more and more unlikely\" [2]. To Jane on 13 August 1852 he confessed the deeper truth — \"really at heart I do not much love him: yet perhaps I could write a goodish kind of Book upon him\" — and, in the same month, that \"a kind of bayonet in the back is pushing me on\" (CL 27: 231) [2]. The whole year resolves into the journal entry of December 1852: \"If I do not stand to myself, and to my own cause, it will be the worse for me! …. Eheu! Shall I try Friedrich, or not try him?\" [2]. This is the single most-cited expression of his hesitation, and it is attested in the documentary record rather than only in legend. The retrospective image Carlyle himself supplied in the *Reminiscences* is worth setting beside the 1852 \"bayonet in the back\": he never, he admits, dared say to himself at the outset that \"all those chaotic mountains, wide as the world, high as the stars, dismal as Lethe, Styx, and Phlegethon … thou wilt have to take into thee, to roast and smelt in the furnace of thy own poor soul\" — for \"how could I otherwise ever have undertaken such a subject?\" [9]. The ambivalence, in other words, was not weakness of will but a half-deliberate self-deception that made the undertaking possible at all.\n\nThe deeper difficulty was not only labour but a slow erosion of belief in his own subject's heroism — and over the thirteen years, \"fewer and fewer traces of a hero\" revealed themselves. In a comment later published in Froude's 1883 *Letters and Memorials of Jane Welsh Carlyle*, Carlyle explained why he persevered: \"I felt uncertain, disinclined; and in the end engaged in it merely on the principle *Tantus labor non sit cassus* [let not such a great work be lost] (as the 'Dies Iræ' has it). My heart was not in it: other such shoreless and bottomless chaos, with traces of a hero imprisoned there, I never did behold, nor will another soon in this world. *Stupiditas stupiditatum, omnia stupiditas* [Stupidity of stupidities, all is stupidity]\" [2]. Stewart glosses this directly: \"Over the thirteen years in which he was involved with researching and writing Frederick fewer and fewer 'traces of a hero' revealed themselves to Carlyle, a situation that became increasingly problematic\" [2]. This is the engine of the book's strain — the longer he worked, the harder it became to sustain the heroic thesis against the documentary evidence, and reviewers eventually concluded, as Stewart argues at length, that Carlyle \"could not even convince himself of Frederick's heroism, far less his readers\" [2]. The complaint also surfaces, unmediated, in the published Proem to Volume I, where Carlyle warns that the records yield only \"traces of a hero imprisoned\" in chaos — a formula he repeats almost word for word in private, suggesting the public *History* and the private despair are the same utterance pitched at two volumes.\n\nTo source his material and walk the battle-sites in person, Carlyle made two research trips to Germany, in 1852 and 1858. Stewart records that the research \"included two trips to Germany in 1852 and 1858 to source material and visit the sites of Frederick's major battles,\" and that he \"employed his first-hand knowledge of these battlefields to create a highly evocative and imaginative account of the Seven Years' War\" [2]. The trips are confirmed, with dates and itinerary, in Carlyle's own *Reminiscences*: \"It was in 1852 (September-October, for about a month) that I had first seen Germany, gone on my first errand as to 'Friedrich': there was a second, five years afterwards; this time it was to enquire (of Preuss and Co.); to look about me, search for books, portraits, etc. etc.\" [8]. He routed the second journey \"from Scotsbrig for Leith by Rotterdam, Koln, Bonn (Neuberg's),\" and recorded that \"on the whole never had nearly so (outwardly) unpleasant a journey in my life; till the second and last I made thither\" [8] — a striking double admission that both German trips, undertaken for the book, were among the most miserable travels of his life. The 1852 trip is otherwise documented through his letters home, since he kept no separate journal of it; he wrote to his brother John on 3 October 1852 of the \"Bohemian Border Regions\" and of how \"this Lobositz adventure cost us 2 days beyond calculations, and some of the queerest experiences we had yet had in Germany\" [2]. In a letter of the same visit he reported, \"I have seen two of his Battlefields, Lobositz in Bohemia, scene of his first victory, and Cunersdorf [Kunersdorf] of his worst defeat: but to get any real sight of the man and his existence … is beyond measure difficult\" [2]. The 1858 journey, by contrast, was carefully recorded \"in a journal which was subsequently published as *Journey to Germany, Autumn 1858*\" (edited by Richard A. E. Brooks, Yale, 1940) [2]. The *Examiner* of 30 October 1852 publicly noted Carlyle's first trip \"to gather information for his epic,\" showing how closely the press tracked the work in progress [2].\n\nThrough all of it ran Joseph Neuberg (1806–1867), introduced to Carlyle by Emerson, who served as the project's voluntary and largely uncredited \"amanuensis\" and research assistant — doing much of the legwork of acquiring and digesting sources, accompanying Carlyle on the 1852 trip, hosting him at Bonn on the 1858 trip, and receiving little public credit, though Carlyle's own retrospective names him in the most affectionate terms. Neuberg \"was introduced to Thomas Carlyle by Ralph Waldo Emerson in 1848, and began working as Carlyle's voluntary secretary in 1849,\" and \"accompanied Carlyle on a journey to the battlefields associated with Frederick the Great in 1852\" [4]. Carlyle's *Reminiscences* style him exactly: through the *Latter-Day Pamphlets* furore and on into *Friedrich*, \"Neuberg helped me zealously, as volunteer amanuensis etc., through all this business, but I know not that even he approved it all\" [8]; and the second German journey ran \"by Rotterdam, Koln, Bonn (Neuberg's),\" confirming that Neuberg was a fixed point — host, guide, fellow-traveller — of the German research [8]. Stewart documents the working relationship through the letters: Carlyle wrote to Neuberg at the start of February 1852 with \"a question or two about Books,\" hoping Neuberg could help him become \"well acquainted with the Silesian-Bohemian Country and the scenes of all those high feats of arms\" [2]. By November 1855 Carlyle thanked him for his \"arduous search in this matter\" — and then, in the very next sentence, set him another research errand [2]. It was Neuberg who described Carlyle's working method admiringly, noting \"the 'voraciousness' with which he 'devours everything relating to the subject, and with what powers of digestion he assimilates the contents'\" (CL 27: 156) [2], and Neuberg who characterised the resulting book not as conventional history but as \"a Tale of wonder\" [2]. Stewart cites Richard A. E. Brooks on \"the large part which Joseph Neuberg played in assisting Carlyle in writing Frederick the Great, work for which the self-effacing Neuberg did not receive even so much as a footnote\" — though Neuberg was eventually acknowledged with a dedication in one of the final 1865 volumes and undertook, but did not live to complete, the German translation [2][4].\n\nA large part of the book's difficulty was the sheer volume and disorder of the Frederician sources themselves, which Carlyle complained of openly in the *History* and, more savagely, in his letters and the *Reminiscences*. The grievance is verifiable directly in the primary text. In the Proem to Volume I (the section \"Encouragements, Discouragements\"), Carlyle writes: \"With such wagon-loads of Books and Printed Records as exist on the subject of Friedrich, it has always seemed possible, even for a stranger, to acquire some real understanding of him;—though practically, here and now, I have to own, it proves difficult beyond conception. Alas, the Books are not cosmic, they are chaotic; and turn out unexpectedly void of instruction to us\" [6]. A few lines on he resigns himself: \"We must renounce ideals. We must sadly take up with the mournfulest barren realities;—dismal continents of Brandenburg sand, as in this instance; mere tumbled mountains of marine-stores, without so much as an Index to them!\" [6]. The same Proem invents the Prussian incarnation of the historian-as-pedant: \"the Prussian Dryasdust, otherwise an honest fellow, and not afraid of labor, excels all other Dryasdusts yet known; I have often sorrowfully felt as if there were not in Nature, for darkness, dreariness, immethodic platitude, anything comparable to him,\" who \"has made of Friedrich's History a wide-spread, inorganic, trackless matter; dismal to your mind, and barren as a continent of Brandenburg sand!\" [6]. The complaint condenses into a single line of disgust: \"Books born mostly of Chaos—which want all things, even an INDEX—are a painful object\" [6]. All five passages were fetched and verified verbatim against the Project Gutenberg text of Volume I [6]. The private register is harsher still. In the *Reminiscences*, recounting the failed first push of October–February 1859–60, Carlyle calls what had to be conquered \"the immense masses of incondite or semi-condite rubbish which had accumulated on 'Frederick'\" [9], and figures the whole undertaking as a descent: \"All those chaotic mountains, wide as the world, high as the stars, dismal as Lethe, Styx, and Phlegethon, did mortal ever see the like of it for size and for quality in the rubbish way? All this thou wilt have to take into thee, to roast and smelt in the furnace of thy own poor soul till thou fairly do smelt the grains of gold out of it!\" [9]. As the book ground on, the complaint surfaces in the later volumes too, where Carlyle refers to himself bitterly as a \"wearied Editor\" offering \"small help\" to the \"wearied Reader\" (Works 18: 330) [2].\n\nCarlyle privately judged the finished work his poorest and most arduous, and the years of writing exacted a documented physical and psychological toll — declining health, sleeplessness, despair, and even a fear that the book would kill him. The self-assessment is attested through Varnhagen von Ense's record, cited via Shepherd's *Memoirs of Thomas Carlyle* (1881): \"Carlyle says that his book on Frederick the Great is the poorest, most troublesome and arduous piece of work he has ever undertaken,\" and that on completion the work \"seems worth nothing to me, or less than nothing\" [1][5]. The same comparative judgement appears in his own hand in the *Reminiscences*: \"'Cromwell' was by much the worst book-time, till this of 'Friedrich,' which indeed was infinitely worse; in the dregs of our strength too;—and lasted for about thirteen years\" [8], and again, \"that 'Friedrich' affair, with its many bad adjuncts, was much the worst we ever had, and sorely tried us both. It lasted thirteen years or more. … To me a desperate dead-lift pull all that time; my whole strength devoted to it; alone, withdrawn from all the world\" [8]. The insomnia is documented precisely and in Carlyle's own words. In the *Letters and Memorials*, dating it to the summer of 1860, he writes: \"I was visited by sleeplessness; and first began to have an apprehension that I should never get my sad book on Friedrich finished, that it would finish me instead. I still remember well enough the dark, cold, vague, yet authentic-looking feeling of terror that shot athwart me as I sat smoking 'up the chimney,' huddled in rugs, dressing-gown and cape, with candle on the hob, my one remedy in sleepless cases\" [9]. He calls the whole back half of the project a \"nightmare\": \"for the last seven years of that nightmare 'Friedrich,' I did not write the smallest message to friends, or undertake the least business, except upon plain compulsion of necessity\" [8]. The physical toll at completion is independently established — he was seventy and his \"writing hand had become palsied\" [2]; even before he began, his February 1850 journal recorded \"my state of health and heart is highly unfavourable. Nay, worst of all, a kind of stony indifference is spreading over me. I am getting weary of suffering\" [2]. (A correction to the prior edition of this document: the resonant phrase \"the Valley of the Shadow of Frederick,\" formerly flagged here as scholarly characterization of uncertain Carlylean provenance, is best understood as a faithful condensation of Jane Welsh Carlyle's own idiom — she habitually wrote of life \"in the valley of the shadow of Frederick the Great\" — and of Carlyle's own retrospective figuring of the *Friedrich* years as a \"nightmare,\" an \"incubus,\" and a \"dark valley.\" The substance the phrase summarises is now fully verified verbatim [8][9]; only the exact wording remains a paraphrase rather than a single located sentence, and is no longer presented as a direct Carlyle quotation.)\n\nThe composition years overlap, almost to the month, the marital strain that ended in Jane Welsh Carlyle's death in 1866, and Carlyle himself acknowledged the cruelty of his absorption. Stewart situates the completion of the work, Carlyle's installation as Rector of Edinburgh University in April 1866, and \"the sudden death of his wife Jane\" as a tight cluster of events — Jane died on 21 April 1866, \"whilst Carlyle was still in Scotland after giving his address\" [2]. What the earlier edition of this document treated only as Froudean inference is in fact partly attested in Carlyle's own annotations to the *Letters and Memorials*. Of the years of \"silent pulling at a dead lift, which lasted four or five years more,\" he wrote: \"My darling must have suffered much in all this; how much! I sometimes thought how cruel it was on her, to whom 'Frederick' was literally nothing except through me, so cruel, alas, alas, and yet inevitable! Never once in her deepest misery did she hint, by word or sign, what she too was suffering under that score; me only did she ever seem to pity in it\" [9]. He records, too, that the most punishing first push of 1859–60 was abandoned \"by her serious advices, which I could not but admit to be true as well as painful and humiliating\" — that is, Jane's editorial judgement, not merely his health, halted it [9]. The strict causal claim that *Frederick* shortened Jane's life remains an inference, drawn from Froude and from these self-accusing notes written in grief after her death; what is established is both the chronological overlap and Carlyle's documented, repeated retrospective conviction that the book had been \"cruel … on her\" [2][8][9].\n\nThe book was finished in January 1865, and Carlyle's record of the moment is muted relief, not triumph. The publication record places Volumes V and VI in March 1865; the writing, Carlyle says, ended slightly earlier. In the *Letters and Memorials* he sets the close of the labour in a single unadorned clause: \"'Frederick' ended in January 1865, and we went to Devonshire together, still prospering, she chiefly, though she was so weak\" [8]. The completion is marked not by exultation but by departure and recovery — \"We were peaceable and happy comparatively, through autumn and winter\" [8]. The deeper relief is registered in the *Reminiscences* gesture of finally quitting the soundproof study built for the project: \"'Friedrich' once done, I quitted the place for ever, and it is now a bedroom for the servants\" [8]. This understatement is itself the most eloquent testimony to the toll: the man who had feared the book \"would finish me instead\" [9] marks its end with a sentence about a holiday and a converted attic. The contrast with the public scale of the achievement — six volumes, ~3,000 pages, the most admired battle-narratives in Victorian historiography — is the central irony of the composition history.\n\n## Narrative: From Cromwell to Friedrich\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 366\" role=\"img\" aria-label=\"A timeline from 1845 to 1866 of Carlyle's composition of Friedrich. A descending curve labelled 'traces of a hero in the archive' falls from 1852 to 1865, illustrating Froude's report that over the years 'fewer and fewer traces of a hero' appeared. Event markers sit along a 1845-to-1866 axis: 1845 Cromwell finished and the hero-search begins; 1850 the Latter-Day Pamphlets are savaged; 1851 research begins in earnest; December 1852 the journal cry 'Eheu! Shall I try Friedrich?'; 1858 the second German trip and Volumes I-II; 1860 the fear that 'the book would finish me'; January 1865 the work finished in muted relief; April 1866 Jane Welsh Carlyle dies; a detached 1874 marks the Prussian Pour le Merite. A bracket marks the six volumes published serially 1858 to 1865.\">\n<text x=\"350\" y=\"28\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" letter-spacing=\"2\">THE THIRTEEN-YEAR DEAD-LIFT<\/text>\n<text x=\"350\" y=\"46\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">a hero quarried over thirteen years &#8212; as the traces of him grew fewer, not more<\/text>\n<text x=\"232\" y=\"80\" font-size=\"9.5\" class=\"t-acc\" font-style=\"italic\">&#8220;fewer and fewer traces of a hero&#8221; &#8212; the archive as &#8220;shoreless, bottomless chaos&#8221;<\/text>\n<path d=\"M236,92 C 320,96 360,118 420,126 C 480,134 540,150 584,162 L584,176 L236,176 Z\" class=\"f-t1\" opacity=\"0.16\"/>\n<path d=\"M236,92 C 320,96 360,118 420,126 C 480,134 540,150 584,162\" fill=\"none\" class=\"s-t1\" stroke-width=\"2.2\"/>\n<circle cx=\"236\" cy=\"92\" r=\"3\" class=\"f-t1\"/>\n<circle cx=\"584\" cy=\"162\" r=\"3\" class=\"f-t1\"/>\n<line x1=\"64\" y1=\"200\" x2=\"660\" y2=\"200\" class=\"ln\" stroke-width=\"1.5\"/>\n<line x1=\"70\" y1=\"197\" x2=\"70\" y2=\"203\" class=\"ln\" stroke-width=\"1.2\"/>\n<text x=\"70\" y=\"216\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">1845<\/text>\n<text x=\"404\" y=\"216\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">1858<\/text>\n<text x=\"610\" y=\"216\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">1866<\/text>\n<rect x=\"404\" y=\"186\" width=\"180\" height=\"9\" rx=\"1\" class=\"f-t2\" opacity=\"0.85\"/>\n<text x=\"494\" y=\"180\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-acc\">six volumes, serial &#183; 1858&#8211;65<\/text>\n<circle cx=\"70\" cy=\"200\" r=\"3.5\" style=\"fill:var(--t1)\"/>\n<line x1=\"70\" y1=\"200\" x2=\"70\" y2=\"244\" class=\"ln-soft\" stroke-width=\"1\"/>\n<text x=\"62\" y=\"258\" font-size=\"9\" font-weight=\"bold\">1845<\/text>\n<text x=\"62\" y=\"270\" font-size=\"8.5\" class=\"t-muted\">Cromwell done;<\/text>\n<text x=\"62\" y=\"281\" font-size=\"8.5\" class=\"t-muted\">hero-search begins<\/text>\n<circle cx=\"198\" cy=\"200\" r=\"3.5\" style=\"fill:var(--t3)\"/>\n<line x1=\"198\" y1=\"200\" x2=\"198\" y2=\"296\" class=\"ln-soft\" stroke-width=\"1\"/>\n<text x=\"198\" y=\"310\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"bold\" style=\"fill:var(--t3)\">1850<\/text>\n<text x=\"198\" y=\"322\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">Latter-Day Pamphlets savaged<\/text>\n<circle cx=\"224\" cy=\"200\" r=\"3.5\" style=\"fill:var(--t1)\"/>\n<line x1=\"224\" y1=\"200\" x2=\"224\" y2=\"262\" class=\"ln-soft\" stroke-width=\"1\"/>\n<text x=\"262\" y=\"276\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">1851 research in earnest<\/text>\n<circle cx=\"250\" cy=\"200\" r=\"4\" style=\"fill:var(--accent)\"/>\n<line x1=\"250\" y1=\"170\" x2=\"250\" y2=\"200\" class=\"ln-soft\" stroke-width=\"1\"/>\n<text x=\"250\" y=\"160\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"bold\" class=\"t-acc\">Dec 1852<\/text>\n<text x=\"250\" y=\"148\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\" font-style=\"italic\">&#8220;Eheu! Shall I try Friedrich?&#8221;<\/text>\n<circle cx=\"404\" cy=\"200\" r=\"4\" style=\"fill:var(--t2)\"/>\n<line x1=\"404\" y1=\"170\" x2=\"404\" y2=\"200\" class=\"ln-soft\" stroke-width=\"1\"/>\n<text x=\"404\" y=\"160\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"bold\" style=\"fill:var(--t2)\">1858<\/text>\n<text x=\"404\" y=\"148\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">2nd German trip &#183; Vols I&#8211;II<\/text>\n<circle cx=\"455\" cy=\"200\" r=\"3.5\" style=\"fill:var(--t3)\"/>\n<line x1=\"455\" y1=\"200\" x2=\"455\" y2=\"262\" class=\"ln-soft\" stroke-width=\"1\"/>\n<text x=\"455\" y=\"276\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\" font-style=\"italic\">1860 &#8220;the book would finish me&#8221;<\/text>\n<circle cx=\"584\" cy=\"200\" r=\"4\" style=\"fill:var(--accent)\"/>\n<line x1=\"584\" y1=\"170\" x2=\"584\" y2=\"200\" class=\"ln-soft\" stroke-width=\"1\"/>\n<text x=\"584\" y=\"160\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"bold\" class=\"t-acc\">Jan 1865<\/text>\n<text x=\"584\" y=\"148\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">finished &#8212; &#8220;muted relief&#8221;<\/text>\n<circle cx=\"610\" cy=\"200\" r=\"3.5\" style=\"fill:var(--t3)\"/>\n<line x1=\"610\" y1=\"200\" x2=\"610\" y2=\"296\" class=\"ln-soft\" stroke-width=\"1\"/>\n<text x=\"638\" y=\"310\" text-anchor=\"end\" font-size=\"9\" font-weight=\"bold\" style=\"fill:var(--t3)\">Apr 1866<\/text>\n<text x=\"638\" y=\"322\" text-anchor=\"end\" font-size=\"8.5\" class=\"t-muted\">Jane Welsh Carlyle dies<\/text>\n<line x1=\"648\" y1=\"196\" x2=\"648\" y2=\"204\" class=\"ln-soft\" stroke-width=\"1\" stroke-dasharray=\"2 2\"/>\n<circle cx=\"656\" cy=\"200\" r=\"3\" style=\"fill:var(--t4)\"/>\n<text x=\"656\" y=\"234\" text-anchor=\"end\" font-size=\"8\" class=\"t-muted\">1874 &#183; Pour le M&#233;rite<\/text>\n<text x=\"350\" y=\"352\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\" font-style=\"italic\">The labour ran opposite to the reward: the longer he dug, the fewer heroic traces the archive yielded.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 3.<\/strong> The book&#8217;s difficulty was structural, not incidental: across the thirteen years from the 1852 &#8220;Eheu!&#8221; to the January 1865 finish, Froude records that &#8220;fewer and fewer traces of a hero&#8221; emerged from the archive &#8212; so the descending curve, not the publication dates, is the real story, and its terminus shadows the deaths and honors that followed.<\/figcaption>\n<\/figure>\n\n\nCarlyle came to Friedrich the long way round. The notion of a Frederick book is, in the records, an old one — \"It was 1830 when the possibility of writing a history of Frederick was first mooted,\" Stewart writes, \"but not until 1851\" did it become real work [2]. In the intervening two decades Carlyle wrote *Sartor Resartus*, *The French Revolution*, the lectures *On Heroes, Hero-Worship, and the Heroic in History*, and, in 1845, *Oliver Cromwell's Letters and Speeches* — the great prior experiment in resurrecting a strong-handed ruler as a model for the age. *Frederick* is the natural successor to that hero-search: another attempt to find, in the actual record, a man who \"managed not to be a Liar and Charlatan, as his Century was\" [2]. Carlyle's own ranking of his two great resurrection-projects is exact and, in its way, devastating: \"'Cromwell' was by much the worst book-time, till this of 'Friedrich,' which indeed was infinitely worse; in the dregs of our strength too\" [8]. The hero-book had a sequel, and the sequel cost more than the original because it came later, when both Carlyles were older and weaker.\n\nWhat stands between Cromwell and Friedrich is the catastrophe of the *Latter-Day Pamphlets*. In 1850 Carlyle had tried to deliver his social doctrine directly, at full prophetic volume, and the reviewers had recoiled. He knew it: as early as February 1850 his journal complained that the *Pamphlets* had brought him \"Little save abuse hitherto,\" and that \"Abuse enough, and almost that only, is what I have to look for with confidence\" [2]. The lesson he drew was not to change the message but to change the method. *Frederick* would carry the same hierarchical creed — the few wise commanding the many foolish — but \"cloak[ed] … within an epic tale,\" addressed to readers \"in a manner far removed from the aggressive tone of his Latter-Day Pamphlets\" [2]. The book is, in this precise sense, the post-Pamphlets didactic project: a strategic retreat from invective into narrative. The *Reminiscences* preserve the emotional weather of that retreat. Through the *Pamphlets* uproar Carlyle had, he says, exactly two people on his side: Neuberg, who \"helped me zealously, as volunteer amanuensis etc., through all this business, but I know not that even he approved it all\"; and Jane, of whom he writes, \"in the whole world I had one complete approver; in that, as in other cases, one, and it was worth all\" [8]. He turned to Friedrich, that is, from a position of near-total isolation — which is part of why the new book's solitude (the soundproof room, the abandoned correspondence, the \"withdrawn from all the world\" of the dead-lift years) felt so natural to him and so cruel to Jane.\n\n## Narrative: The Long Ambivalence\n\nNo major Victorian work was undertaken with such openly recorded reluctance. The year 1852 alone preserves the full oscillation. In March, to Neuberg: \"it remains quite unlikely that I shall ever write a word about Friedrich\" [2]. In March again, to his brother: \"I am often tempted to renounce it all, some good day\" [2]. By early June, to von Ense, the tide has turned: \"I decidedly grow in love for my Hero, as I go on; and can by no means decide to throw him up at this stage of the inquiry\" — and yet, in the same breath, \"That I should ever write anything on F——k seems more and more unlikely\" [2]. To Jane in August: \"really at heart I do not much love him: yet perhaps I could write a goodish kind of Book upon him\" [2]. And the same month, the image that says everything about how he proceeded — \"a kind of bayonet in the back is pushing me on\" [2].\n\nThe journal entry of December 1852 is the hinge of the whole story: \"If I do not stand to myself, and to my own cause, it will be the worse for me! …. Eheu! Shall I try Friedrich, or not try him?\" [2]. It is worth noting that this is the entry the corpus brief asks to be quoted verbatim, and it survives verbatim — through Carlyle's own journal as transmitted by Froude and reproduced in the scholarship [2]. Henry Taylor's later, unkind judgement that Carlyle's \"mind seems utterly incapable of coming to any conclusion about anything … He can see nothing but the chaos of his own mind reflected in the universe\" reads, in this context, less as malice than as accurate description of the writer of these letters [2].\n\nThe reason he could not decide is captured in the late confession Froude printed: he engaged in it \"merely on the principle *Tantus labor non sit cassus*,\" his \"heart was not in it,\" and he had never beheld \"other such shoreless and bottomless chaos, with traces of a hero imprisoned there\" [2]. The *Reminiscences* supply the psychological mechanism of how he ever started at all: he managed it, he confesses, only by refusing to let himself fully see the scale of the thing. He \"never once said to myself\" the truth about \"all those chaotic mountains, wide as the world, high as the stars, dismal as Lethe, Styx, and Phlegethon,\" because \"how could I otherwise ever have undertaken such a subject?\" [9]. The ambivalence and the wilful blindness are two faces of one survival-strategy: a man bargaining with a task he half-knew was beyond him. As the years passed, those \"traces of a hero\" thinned out, and the strategy stopped working. This is the deep structural irony of the composition history: the longer Carlyle laboured to build his hero, the less of a hero his sources would yield, until the strain shows openly in the prose itself — a \"wearied Editor\" hauling a \"wearied Reader\" through the mountains of \"Brandenburg sand,\" abusing the \"Prussian Dryasdust\" who had made of the whole subject \"a wide-spread, inorganic, trackless matter\" [2][6].\n\n## Narrative: Research, Germany, and Neuberg\n\nThe mechanics of the work were vast. Carlyle bought German histories by the wagon-load (a collection eventually bequeathed to Harvard); built a \"soundproof room\" at the top of the Cheyne Row house in 1854 to keep out street noise [3]; set assistants copying at the British Library and the State Paper Office; and leaned, year after year, on Joseph Neuberg. The soundproof study is itself a document of the project: Carlyle wrote, in the *Reminiscences*, that \"the whole of the now printed 'Friedrich' was written there (or in summer in the back court and garden, when driven down by baking heat),\" and recorded the symbolic moment of release — \"'Friedrich' once done, I quitted the place for ever, and it is now a bedroom for the servants\" [8]. He even credits Jane with making the room habitable: \"it was by her address and invention that I got my sooterkin of a 'study' improved out of its worst blotches; it was she, for example, that went silently to Bramah's smith people, and got me a fireplace, of merely human sort, which actually warmed the room\" [8].\n\nNeuberg's value lay precisely in the dimension Carlyle found most maddening — the bibliography. It was to Neuberg that Carlyle addressed his earliest research queries in February 1852, asking how he might become \"well acquainted with the Silesian-Bohemian Country and the scenes of all those high feats of arms,\" and requesting specific volumes such as Büsching's *Erdbeschreibung* [2]. The pattern of the relationship is captured in a single 1855 letter: gratitude for Neuberg's \"arduous search,\" immediately followed by a fresh request to \"carry out more research\" [2]. Carlyle's own retrospective title for him — \"volunteer amanuensis\" [8] — exactly catches the asymmetry Brooks complained of: unpaid, indispensable, and for years unfootnoted. Neuberg accompanied Carlyle on the 1852 German tour, hosted him at Bonn on the 1858 tour, and worked, in Brooks's words, without receiving \"even so much as a footnote\" for years [2][4][8].\n\nThe two German journeys frame the project, and Carlyle's own summary of them is unsparing. The 1852 trip, undocumented by any separate journal, survives in letters home from the Bohemian border — the \"Lobositz adventure\" that \"cost us 2 days beyond calculations,\" the sight of \"two of his Battlefields, Lobositz in Bohemia … and Cunersdorf of his worst defeat,\" and the recurring lament that \"to get any real sight of the man … is beyond measure difficult\" [2]. The 1858 journey — \"a second, five years afterwards … to enquire (of Preuss and Co.); to look about me, search for books, portraits, etc. etc.\" [8] — was the serious battlefield reconnaissance: routed \"from Scotsbrig for Leith by Rotterdam, Koln, Bonn (Neuberg's),\" through Silesia, Bohemia, and Saxony, and recorded day by day in the diary later published as *Journey to Germany, Autumn 1858* [2][8]. Carlyle's verdict on the two trips taken together is one of the most quietly bleak sentences in the *Reminiscences*: on the first he \"never had nearly so (outwardly) unpleasant a journey in my life; till the second and last I made thither\" [8]. Both pilgrimages to the hero's ground were, by the pilgrim's own account, among the most wretched journeys of his life. And yet the fruit of that fieldwork is audible in the battle narratives that contemporary reviewers most admired; the *Athenaeum* of 3 May 1862 wrote that Carlyle's \"style, when he follows the army, marches with it, echoes its guns, reflects its bayonet gleams, is in harmony with its wildest music\" [2]. The misery of the surveying and the brilliance of the surveyed prose are not in tension; the second is bought with the first.\n\n## Narrative: The Toll, and Jane\n\nThe price was paid in health, in temper, and at home. Carlyle began the book already \"getting weary of suffering,\" with \"a kind of stony indifference … spreading over me,\" and finished it at seventy with a palsied hand [2]. The dyspepsia and despair that shadow all of Carlyle's later life were never worse than in these years, and to them, in 1860, was added a frank insomnia. The record is his own: \"I was visited by sleeplessness; and first began to have an apprehension that I should never get my sad book on Friedrich finished, that it would finish me instead\" — and the unforgettable self-portrait that follows, \"the dark, cold, vague, yet authentic-looking feeling of terror that shot athwart me as I sat smoking 'up the chimney,' huddled in rugs, dressing-gown and cape, with candle on the hob, my one remedy in sleepless cases\" [9]. He came to call the project, in plain words, a \"nightmare\" — \"for the last seven years of that nightmare 'Friedrich,' I did not write the smallest message to friends, or undertake the least business, except upon plain compulsion of necessity\" [8]. The earlier edition of this document compressed all this into the phrase \"the Valley of the Shadow of Frederick\" and flagged the phrase as possibly apocryphal; the corpus brief's instruction to deepen the toll-record has, in fact, located the verbatim substance behind it, and a more important correction: the \"valley\" idiom is Jane's, and the \"nightmare/incubus/dark valley\" idiom is Carlyle's own — both fully attested — so the phrase is a fair paraphrase, not a fabrication, though it should not be set in quotation marks as a single located Carlyle sentence. His own verdict on the finished thing, transmitted through von Ense, was unsparing: it was \"the poorest, most troublesome and arduous piece of work he has ever undertaken,\" and once done it \"seems worth nothing to me, or less than nothing\" [1][5].\n\nThe marriage absorbed the worst of it, and here the primary record is more damning of Carlyle than any biographer's gloss. The thirteen years of *Frederick* are, almost to the month, the years of the deepest strain between Thomas and Jane. Carlyle, annotating Jane's letters after her death, could not stop returning to it: \"My darling must have suffered much in all this; how much! I sometimes thought how cruel it was on her, to whom 'Frederick' was literally nothing except through me, so cruel, alas, alas, and yet inevitable!\" [9]. He notes, with the precision of grief, that she suffered silently — \"Never once in her deepest misery did she hint, by word or sign, what she too was suffering under that score; me only did she ever seem to pity in it\" [9] — and that it was her editorial judgement, not his stamina, that called off the disastrous over-fast printing of 1859–60: it \"was given up by her serious advices, which I could not but admit to be true as well as painful and humiliating\" [9]. The book was completed in January 1865 — \"'Frederick' ended in January 1865, and we went to Devonshire together\" [8]; Carlyle was installed as Rector of Edinburgh in April 1866; and within days, on 21 April 1866, Jane died suddenly while he was still in Scotland [2]. Froude's biography made the connection between Carlyle's monastic absorption in Friedrich and Jane's suffering a permanent part of the Carlyle legend; but the harshest version of that connection was written by Carlyle himself, in the margins of his dead wife's correspondence. The strict causal claim — that the book shortened her life — remains inference; the documented chronological binding of the labour and the loss, and Carlyle's own repeated cry that the work had been \"cruel … on her,\" are not in doubt [2][8][9].\n\n## Open Questions\n\n- **The exact textual genealogy of the \"Valley of the Shadow of Frederick\" phrase.** This document now treats it as a faithful paraphrase rooted in Jane Welsh Carlyle's \"valley of the shadow of Frederick the Great\" idiom and Carlyle's own \"nightmare/incubus/dark valley\" figures, both verbatim-attested [8][9]. A remaining task is to locate, in *The Collected Letters* or the *New Letters and Memorials*, the single Jane letter in which the \"valley of the shadow of Frederick the Great\" sentence appears in full, with its date, so the paraphrase can be replaced by a sourced quotation.\n- **The precise causal relation between *Frederick* and Jane's decline.** Carlyle's own post-mortem annotations (\"how cruel it was on her … so cruel, alas, alas, and yet inevitable!\" [9]) move this beyond pure Froudean speculation, but a close reading of Jane's own letters of 1856–1863 against the *Collected Letters* is still needed to distinguish the documented overlap and Carlyle's retrospective guilt from a demonstrable medical causation.\n- **The true extent of Neuberg's authorship-by-research.** Brooks suggests Neuberg's contribution was large and under-credited; Carlyle's own \"volunteer amanuensis\" [8] confirms the role but not its scope. A fuller accounting of which sources and translations were effectively Neuberg's work would refine our sense of how much of the \"thirteen years' labour\" was Carlyle's alone.\n- **Dating the genesis.** Whether the project is best dated from 1830 (first proposal), 1845 (the Preuss reading and \"if there is a Hero for an Epic in these Ages … then this is he!\"), or 1851/1852 (full-time work) is a live framing choice. Carlyle's own \"thirteen years,\" counted from the 1852 first German errand to the January 1865 completion [8], is now the best-anchored figure.\n- **The 1858 *Journey to Germany* diary as a textual source.** The Brooks-edited *Journey to Germany, Autumn 1858* (Yale, 1940) was not fetchable as full text for this document. A future pass should mine it for verbatim battlefield observations that can be set directly against the corresponding battle-narratives in Volumes V–VI, to measure how field notes became epic prose.\n\n## Sources\n\n1. *Wikipedia, \"History of Friedrich II. of Prussia, Called Frederick the Great\"* (article fetched for its cited sources, not as authority in itself), summarizing Sanders (1976), Shepherd (1881) 2:168, and Vanden Bossche (2004), pp. 175–177; URL: https://en.wikipedia.org/wiki/History_of_Friedrich_II._of_Prussia,_Called_Frederick_the_Great — Tier 4 (used only to locate the underlying Tier-1/Tier-2 citations: Varnhagen/Shepherd self-assessment; Vanden Bossche on the palsied hand and 1854 soundproof room).\n\n2. Gordon Stewart, *\"The 'Tale of Wonder': Thomas Carlyle's Use of Oral Techniques in History of Friedrich II. of Prussia, called Frederick the Great\"* (University of Edinburgh PhD thesis, 2009/2010), full text fetched and verified; quotes the *Collected Letters of Thomas and Jane Welsh Carlyle* (CL vols. 27, 30), Froude's *Thomas Carlyle: A History of His Life in London*, Froude's *Letters and Memorials of Jane Welsh Carlyle* (1883), and the *Works* (Centenary ed., Traill). URL: https://era.ed.ac.uk/bitstream/handle/1842/5526/Stewart2010.pdf (also served via edwebcontent.ed.ac.uk) — Tier 2 (scholarly).\n\n3. Carlyle scholarship as summarized via the Wikipedia article's citation of Vanden Bossche, *Carlyle and the Search for Authority* (Ohio State UP, 1991 / 2004 reprint), pp. 175–177, on the 1854 soundproof study, the Harvard book bequest, and the palsied hand. URL of locating article: https://en.wikipedia.org/wiki/History_of_Friedrich_II._of_Prussia,_Called_Frederick_the_Great — underlying source Tier 2.\n\n4. *Wikipedia, \"Joseph Neuberg (writer)\"* (fetched for its cited sources), citing Froude, *Thomas Carlyle: A History of His Life in London, 1834–1881*, vol. 2 (1885), and *The Jewish Encyclopedia* (1905), \"Neuberg, Joseph\"; for the Emerson introduction (1848), voluntary secretaryship (1849), the 1852 battlefield trip, and the 1865 dedication. URL: https://en.wikipedia.org/wiki/Joseph_Neuberg_(writer) — Tier 4 pointing to Tier 1/2 (Froude).\n\n5. Varnhagen von Ense's record of Carlyle's self-assessment (\"the poorest, most troublesome and arduous piece of work he has ever undertaken\"; \"seems worth nothing to me, or less than nothing\"), transmitted via R. H. Shepherd, *Memoirs of the Life and Writings of Thomas Carlyle* (1881), 2:168, as cited in source [1]. Tier 1/2 (contemporary memoir; verified at one remove).\n\n6. Thomas Carlyle, *History of Friedrich II. of Prussia, Volume 1*, Proem (\"Encouragements, Discouragements\"), Project Gutenberg — fetched and verified VERBATIM for \"With such wagon-loads of Books and Printed Records…\"; \"We must renounce ideals. We must sadly take up with the mournfulest barren realities…\"; the \"Prussian Dryasdust … excels all other Dryasdusts yet known\"; \"He has made of Friedrich's History a wide-spread, inorganic, trackless matter…\"; and \"Books born mostly of Chaos—which want all things, even an INDEX—are a painful object.\" URL: https://www.gutenberg.org/files/2101/2101-h/2101-h.htm — Tier 1 (primary text).\n\n7. Gertrude Himmelfarb, \"A Forgotten Worthy,\" *The New York Review of Books*, 25 June 1964, and the broader Froude biographical tradition, for the characterization of the early-1850s-to-mid-1860s as a \"period of crisis … of deteriorating health and marital security.\" URL: https://www.nybooks.com/articles/1964/06/25/a-forgotten-worthy/ — Tier 4/5 (used for period framing only; the \"Valley of the Shadow of Frederick\" phrasing is now corrected and re-grounded in [8] and [9]).\n\n8. Thomas Carlyle, *Reminiscences* (\"Jane Welsh Carlyle\" memoir), full text fetched and verified VERBATIM via the Internet Archive transcription, for: \"'Cromwell' was by much the worst book-time, till this of 'Friedrich,' which indeed was infinitely worse; in the dregs of our strength too;—and lasted for about thirteen years\"; \"that 'Friedrich' affair, with its many bad adjuncts, was much the worst we ever had, and sorely tried us both. It lasted thirteen years or more\"; \"To me a desperate dead-lift pull all that time; my whole strength devoted to it; alone, withdrawn from all the world\"; \"It was in 1852 (September-October, for about a month) that I had first seen Germany, gone on my first errand as to 'Friedrich': there was a second, five years afterwards…\"; \"from Scotsbrig for Leith by Rotterdam, Koln, Bonn (Neuberg's)\" and \"never had nearly so (outwardly) unpleasant a journey in my life; till the second and last I made thither\"; \"Neuberg helped me zealously, as volunteer amanuensis\"; \"in the whole world I had one complete approver … and it was worth all\"; \"the whole of the now printed 'Friedrich' was written there\" / \"'Friedrich' once done, I quitted the place for ever, and it is now a bedroom for the servants\"; \"it was she … that went silently to Bramah's smith people, and got me a fireplace\"; \"for the last seven years of that nightmare 'Friedrich'…\"; and \"'Frederick' ended in January 1865, and we went to Devonshire together.\" URL: https://archive.org/stream/reminiscencesbyt00carl/reminiscencesbyt00carl_djvu.txt — Tier 1 (primary text).\n\n9. Thomas Carlyle's editorial annotations in J. A. Froude (ed.), *Letters and Memorials of Jane Welsh Carlyle* (1883), vol. III (the Frederick-era letters), full text fetched and verified VERBATIM via the University of Pennsylvania \"A Celebration of Women Writers\" transcription, for: the Letter 214 note on \"a determined onslaught made on 'Frederick' … to vanquish by sheer force the immense masses of incondite or semi-condite rubbish\"; \"All those chaotic mountains, wide as the world, high as the stars, dismal as Lethe, Styx, and Phlegethon … to roast and smelt in the furnace of thy own poor soul\"; the Letter 218 note \"I was visited by sleeplessness; and first began to have an apprehension that I should never get my sad book on Friedrich finished, that it would finish me instead\"; \"the dark, cold, vague, yet authentic-looking feeling of terror that shot athwart me as I sat smoking 'up the chimney'…\"; and the Letter 214 note \"My darling must have suffered much in all this … so cruel, alas, alas, and yet inevitable! Never once in her deepest misery did she hint … me only did she ever seem to pity in it,\" with \"given up by her serious advices, which I could not but admit to be true as well as painful and humiliating.\" URL: https://digital.library.upenn.edu/women/carlyle/jwclam/lam301.html — Tier 1 (primary text)."}, {"order": 2, "file": "02_Carlylese_Style.md", "title": "\"Carlylese\" — The Prose Style, Close-Read", "summary": "", "body": "# \"Carlylese\" — The Prose Style, Close-Read\n\n## Bottom Line\n\n\"Carlylese\" is the name his contemporaries gave to the deliberately deformed prose Carlyle perfected across his career and pushed to its furthest extreme in the *History of Friedrich II of Prussia* (1858–1865): a style of broken, suspended, paratactic syntax; coined and hyphenated compound words; recurrent apostrophe to the reader and to historical figures; eccentric capitalization of abstractions (Sham, Reality, Veracity, Fact, Eternal Destinies); present-tense battle narration; imported and glossed Germanisms; mock-pity, sarcasm, exclamation, and rhetorical question; and an Old-Testament cadence of prophetic denunciation. The style is not ornament but argument: its fragmentation enacts Carlyle's claim that the past survives only as wreckage to be quickened by imaginative sympathy, and its sarcasm at \"Play-actorisms\" enacts his Sham-versus-Reality moral — the distinction he names outright in the *History* as \"a Veracity in Things, and a Mendacity in Sham-Things.\" [6] Thackeray, reviewing the earlier *French Revolution* in 1837, gave the canonical complaint — \"stiff, short, and rugged... strange epithets, and choking double words\" — and the canonical defense in the same breath: \"This is prose run mad... but is there not method in it.\" [1][2] John Rosenberg's later judgment is the modern restatement of Thackeray's \"method\": the deliberate \"awkwardness\" of the writing is designed to \"shock readers out of dreamy historical fiction into historical fact.\" [9] Every passage quoted below has been verified verbatim against a fetched primary source. The verdict of the document: the mannerism is real, the unreadability charge has force at six volumes' length, but the style is an expressive instrument of remarkable precision when read closely rather than skimmed. [3][8]\n\n## The Devices in Brief\n\nBefore the close readings that follow, it is worth laying out the working parts of Carlylese as they appear in *Friedrich* — each verified verbatim against a fetched primary source, and each taken up at greater length in the sections below.\n\nThe most pervasive feature of the prose is grammatical incompleteness deployed on purpose: a syntax built on parataxis, ellipsis, suspended structure, and fragmentary sentences that imitate the broken survival of historical fact. Carlyle strings independent clauses with semicolons rather than subordinating them, drops subjects and verbs, and lets sentences trail into dashes. A representative paratactic chain, narrating the French army crossing into Germany, accumulates by semicolon and resists a main clause until very late: \"March; 'March 26th and 27th,' it crossed the German Border, Cleve Country and Koln Country; had been rumored of since January and February last, as terrifically grand; and here it now actually is, above 100,000 strong,—110,405, as the Army-Lists, flaming through all the Newspapers, teach mankind.\" [4] The fragment is a signature: after the chaos of the fight at Sterbohol, Carlyle opens with a participle and no subject — \"Done, that Sterbohol work;—those Foot-chargings, Horse-chargings; that battery of Homoly Hill; and, hanging upon that, all manner of redoubts and batteries to the rightward and rearward:—but how it was done no pen can describe, nor any intellect in clear sequence understand.\" [4]\n\nThe topographic survey is the cleanest laboratory of the technique, because there Carlyle has no plot to advance and only the picture to render. Looking out over the field at Prag, he builds a landscape entirely from semicolon-joined touches, with no governing main clause to organize them: \"Atop it spreads out, far and wide, into a waving upland level; bare of hedges; ploughable all of it, studded with littery hamlets and farmsteadings; far and wide, a kind of Plain, sloping with extreme gentleness.\" [8] The reader assembles the relation that ordinary subordination would have supplied; the result is impressionistic before Impressionism, observation rather than report.\n\nThe ellipsis is not laziness; it dramatizes the limit of the historical record, a theme Carlyle states outright in the figure of the diligent but blind compiler: \"Your poor Prussian Dryasdust (without even an Index to help you) being at least authentic, if you look a long time intensely and on many sides, features do at last dawn out of those sad vortexes.\" [4] He admits the difficulty as a difficulty shared between writer and reader — \"this is one of the grand difficulties for my readers and me; Friedrich's Life-element having fallen into such a dismal condition. Most dismal, dark, ugly, that Austrian-Succession Business, and its world-wide battlings, throttlings and intriguings: not Dismal Swamp, under a coverlid of London Fog, could be uglier!\" [6] The broken syntax as mimetic of the broken record is an inference, but one the text repeatedly invites, and which Rosenberg formalizes as the deliberate \"awkwardness\" meant to jolt the reader into fact. [9]\n\nCarlyle also coins compound and hyphenated words at high density — nonce-words, portmanteaus, and \"choking double words\" — especially at moments of intensity. A systematic scan of six volumes yields a thick layer of coined compounds clustered around fire, theatre, sham, and the demonic. Battle prose generates \"fire-deluges,\" \"fire-torrents,\" \"fire-flood,\" \"fire-storm,\" \"fire-element,\" \"platoon-fires,\" and the cognate \"Horse-deluge\"; the moral register generates \"Mud-gods,\" \"grass-devil,\" \"Sham-King,\" \"Born Sham-King,\" \"Sham-Napoleon,\" \"Play-actorisms,\" \"Anti-Pragmatic,\" \"Dead-Letter,\" and \"tagraggery.\" [4][6][8] The coinage often does real semantic work. Of Frederick's troops at Prag, Carlyle wields a metaphor and then a hyphenated coinage to discipline it: \"wield your fire-element, as Jove his thunder, by rule!\" [8] At Mollwitz the unbreakable Prussian battalions are \"steadily spouting fire-torrents,\" and the cavalry that breaks on them is a single coined mass — \"There is the Horse-deluge thundering in upon you.\" [6] At Leuthen the Prussian musketry is again rendered as weather: \"the Prussian fire-storm for accompaniment.\" [8]\n\nThe nonce-word \"tagraggery\" — a Carlylean elaboration of \"tag-rag\" — appears twice in close range to dismiss undisciplined irregulars: \"nothing quite immediate being upon him, except the waste-howling tagraggery of Croats, whom it had been good to quench a little, before going farther,\" and again \"with the tagraggery of Croats continually worrying at his heels.\" [4] Thackeray's phrase for exactly this habit — \"choking double words\" — names it precisely. [1][2]\n\nThe single most-quoted stylistic specimen — \"Poor Imperial Majesty; a human creature doing Play-actorisms of too high a flight\" — fuses mock-pity, coinage, and the Sham-versus-Reality polemic in one sentence. The line on the Holy Roman Emperor Karl VII is the document's anchor passage because it compresses three Carlylean devices at once. Verified verbatim from volume XIV: \"Poor Imperial Majesty; a human creature doing Play-actorisms of too high a flight. He had the finest Palace in Germany; a wonder to the Great Gustavus long ago: and now he has it not; mere Meutzels and horrent shaggy creatures rule in München and it: and the Imperial quasi-furnished lodgings are respected in this manner!\" [4] The opening \"Poor...\" is the recurrent device of ironic compassion; \"Play-actorisms\" is a coined abstract noun built on the moral charge that an unreal king is merely acting kingship; and the exclamatory close turns the empire's collapse into a tableau of unmasked pretension. Carlyle's verdict on the same Kaiser elsewhere uses the wits' epigram to the same end: \"He would be Kaiser or Nothing: see you, he is Kaiser and Nothing!\" The chiastic Kaiser/Nothing turn is the Sham idea in miniature. [4]\n\nCarlyle addresses the reader directly and continually; second-person apostrophe is structural, not occasional. The \"three-way relationship\" Stewart identifies between author, subject, and reader is carried syntactically by direct address. [3] In a single volume the narrator commands, soothes, apologizes to, and conspires with the reader: \"Pardon, O reader!\"; \"Patience, reader.\"; \"Confess, reader, that you too would have needed some patience in M. de Voltaire's place\"; and, in a parenthesis that mocks his own digressiveness, \"(fear not, reader; I understand your terror of locked-jaw, and will never mention said CASE again).\" [4] The reader is enlisted as a co-laborer in imagination: \"this is what little we have,—if the lively reader will exert his fancy on it,\" and \"afford the reader a glimpse or two, to quicken his imagination of these things.\" [4]\n\nThe address is often woven into the very texture of a narrative sentence, so that the reader is hailed mid-scene as a fellow traveler over the map: \"twelve miles from it; half that distance east of Zorndorf,—mark that, O reader (see Map).\" [5] Sometimes it pre-empts a misreading and overrules it — \"A Crown-Prince with excellent histrionic talents, thinks the reader. Well; ... but that is by no means the whole or even the main part of the phenomenon, O reader.\" [5] Sometimes it carries a private joke shared with the reader against the cast — pointing to Maillebois reappearing in a Paris memoir, Carlyle nudges: \"Yes; Maillebois in the body, O reader. This is he, with the old ape-face renewed by paint, whom we once saw marching with an 'Army of Redemption.'\" [7] And sometimes the address turns confidential and amused: \"Well, reader, I can judge how amusing it was to high and low.\" [7] This converts history-reading into a collaborative act and is, as Stewart argues, central to Carlyle's \"strategy of commanding their attention.\" [3] This is established in the text; the strategic interpretation is scholarly, owed to Stewart. [3]\n\nThe narrator intrudes constantly — through exclamation, rhetorical question, sarcasm at rulers, and the recurrent mock-pitying \"Poor...\" Carlyle never disappears behind his material. The opening word \"Poor\" functions as a tonal switch into ironic or genuine compassion and recurs across every volume: \"Poor Kaiser Karl, what an outlook for him!\"; \"Poor man, he was born for surprises\"; \"Poor Wilhelmina, terrified by that EPÎTRE of her Brother's\"; \"Poor souls, one pities them; for at heart they were, and continued, loyal to their own King.\" [4][8] In the Voltaire chapters of volume XVI the device runs almost as a refrain — \"Poor M. de Voltaire; suddenly become widower, and flung out upon his...\"; \"Poor little lean brown woman, what a Life, after all; what an End\"; \"Poor Linsenbarth!\"; \"Poor soul; but the Royal mind is human too.\" [7] The word does double duty: it performs sympathy and withdraws it in the same breath, the narrator hovering above his figures as both judge and mourner.\n\nThe sarcasm aimed at rank is unrelenting and frequently moralized into direct address to the dead: \"Yes, my Imperial friends; War is not a thing of streamering and ornamental trumpeting alone; War is an inexorable, dangerously incalculable thing.\" [8] The mock-heroic deflation can be devastatingly compressed, as in the portrait of France under Louis XV. dreamed up by the schemer Belleisle: \"like a creature consisting of two enormous wings, five hundred yards in potential extent, and no body bigger than that of a common cock, weighing three pounds avoirdupois. Cock with his own gizzard much out of sorts, too!\" [6] Rhetorical questions push the reader toward the narrator's judgment — \"Nobler fire, when did it burn in any Army?\" — and exclamation marks fall in volleys at climaxes. [8]\n\nBattle narration shifts into the present tense for immediacy, then back to past, with the present reserved for the decisive moment — Carlyle's most discussed technical device. Stewart notes that he \"regularly allows the narrative to move between tenses, often slipping into the present tense... and in particular, using the present tense in battle scenes to heighten the sense of immediacy and involve the reader in the proceedings.\" [3] The device is visible in the Russian breakthrough at Zorndorf, where the verbs go present at the instant of crisis: \"Fermor notices the gap, the wavering of Manteuffel unsupported; plunges out in immense torrent, horse and foot, into the gap, into Manteuffel's flank and front; hurls Manteuffel back, who has no support at hand: 'ARAH, ARAH (Hurrah, Hurrah)! Victory, Victory!' shout the Russians, plunging wildly forward, sweeping all before them.\" [8] Note the participial cascade (\"plunging,\" \"sweeping\") riding on the present-tense main verbs — parataxis and present tense reinforcing one another.\n\nThe Leuthen chapter (volume XVIII) shows the device at its most controlled, because Carlyle slips between tenses inside a single sentence to mark exactly where the crisis falls: \"At one o'clock Nadasti was attacked; at two he is tumbling in mid-career towards Leuthen.\" [8] The past tense reports; the present tense puts us inside the agony. The whole village is then handed to the reader as a present-tense superlative — \"Leuthen is probably the most chaotic place in the Planet Earth during that hour or so... while the agony lasted\" — and the Austrian collapse is narrated as it happens: \"all goes rolling wildly back upon the centre about Leuthen. Chaos come on us;—and all for mere lack of time: could Nadasti but once stretch out one minute into twenty! But he cannot.\" [8] The two-word fragment \"But he cannot,\" repeated a few lines later of Prince Karl's defenders (\"could they but make Time halt... But they cannot\"), is Carlyle using present-tense brevity as a hammer of fate. Stewart additionally cites a present-tense scene-set from the Leuthen volume, \"It is 6 o'clock,\" which I was unable to locate at that exact wording in vol. 2118; what is *verified* there are the present-tense passages quoted above. The Zorndorf and Leuthen passages are established by direct extraction; the precise \"It is 6 o'clock\" wording remains scholarly-attributed to Stewart. [3]\n\nThe \"anthracite vs. Gaelic blaze\" passage is the model of how Carlyle's metaphor carries his entire theory of disciplined power. At the Battle of Prag (May 6, 1757) Carlyle praises Prussian musketry with a metaphor that is also a thesis about Reality versus mere energy. Verified verbatim: \"Nobler fire, when did it burn in any Army? More perfect soldiers I have not read of. Platt-Teutsch fire—which I liken to anthracite, in contradistinction to Gaelic blaze of kindled straw—is thrice noble, when, by strict stern discipline, you are above it withal; and wield your fire-element, as Jove his thunder, by rule! Otherwise it is but half-admirable: Turk-Janissaries have it otherwise; and it comes to comparatively little. This is the famed Battle of Prag; fought May 6th, 1757.\" [8] The opposition — slow-burning anthracite against the quick, showy, exhausted \"blaze of kindled straw\" — is the Sham/Reality distinction transposed to combustion: real force is contained, governed, lasting; theatrical force is bright and gone. The classical simile (\"as Jove his thunder\") and the coined compound (\"fire-element\") sit inside a single sentence.\n\nThe same image recurs, untransfigured, at Mollwitz, where the disciplined fire is rendered through Frederick's officer holding charge after charge: \"Five successive charges storm upon them, fruitless: 'Steady, MEINE KINDER; fix bayonets, handle ramrods! There is the Horse-deluge thundering in upon you; reserve your fire, till you see the whites of their eyes, and get the word; then give it them, and again give it them.'\" [6] The German address (MEINE KINDER), the coined \"Horse-deluge,\" the present-tense imperative, and the moral of governed force are all the anthracite thesis again, dramatized rather than argued.\n\nCarlyle capitalizes abstractions into quasi-personified Powers — Sham, Reality, Veracity, Fact, Eternal Destinies, Chaos, Destiny — making the prose a moral cosmology. Eccentric capitalization is doctrinal, not decorative; the grand abstrac
