or other coats and breeches\" passage (Works 29: 77–78); the present-tense battle quotations (Works 17: 66 and the \"It is 6 o'clock\" passage); the Kletschen suspense example; the parenthesis-as-oral-device analysis; the Brownell objection and Stewart's rebuttal; the *Quarterly Review* (April 1859) complaint about ill-treated Dryasdusts; \"the speaking of man to men\" (Works 5: 159); the embedded-dialogue \"Never have my troops … says Friedrich\" example; and the storyteller-persona and editor-chapter framing. https://era.ed.ac.uk/bitstream/handle/1842/5526/Stewart2010.pdf (also at https://era.ed.ac.uk/server/api/core/bitstreams/9c872c61-e9a9-4201-971b-c7c67beb9b0d/content) — Tier 2 SCHOLARLY.\n5. EBSCO Research Starters, \"History of Frederick II of Prussia by Thomas Carlyle\" (background on Carlyle's break with the \"Dryasdust\" Gibbon–Macaulay tradition and the claim that Carlyle \"falls into his own dryasdust bin\" in the later volumes). https://www.ebsco.com/research-starters/history/history-frederick-ii-prussia-thomas-carlyle — Tier 4 (reference summary).\n6. Thomas Carlyle, \"Anti-Dryasdust,\" introductory chapter to *Oliver Cromwell's Letters and Speeches* (1845), in *The Works of Thomas Carlyle*, Vol. 6. Wikisource. Used for the programmatic statement of Carlyle's quarrel with dead, non-speaking records; exact phrasings flagged as contested pending verification against the page image. https://en.wikisource.org/wiki/The_Works_of_Thomas_Carlyle/Volume_6/Anti-Dryasdust — Tier 1 PRIMARY (text), accessed via secondary transcription.\n7. Beverley Southgate, \"Why Dryasdust? Historians in Fiction\" (on the Scott origin and the afterlife of the Dryasdust figure in historiographical polemic). http://culturahistorica.org/wp-content/uploads/2020/02/southgate-dryasdust.pdf — Tier 4 (scholarly essay).\n8. Thomas Carlyle, *History of Friedrich II of Prussia*, Volume 1 (Project Gutenberg ebook #2101). Consulted for context on the work's address to the reader. https://www.gutenberg.org/files/2101/2101-h/2101-h.htm — Tier 1 PRIMARY.\n9. Ruth apRoberts, \"The Historian as Shandean Humorist: Carlyle and Frederick the Great,\" in *The Carlyles at Home and Abroad*, eds. David R. Sorensen and Rodger L. Tarr (Aldershot: Ashgate, 2004), pp. 15–26; the \"remarkable three-way relationship … both open and perpetually shifting\" formulation and the \"little glimmers of light about himself\" observation are at p. 24. Cited here as reproduced and referenced in Stewart 2010 [4]; recommended for direct consultation. — Tier 2 SCHOLARLY.\n10. Thomas Carlyle, *Sartor Resartus* (Project Gutenberg ebook #1051), 1833–34. Verified verbatim for the Editor persona and the \"ordering of chaos\" theme: \"an 'extensive Volume,' of boundless, almost formless contents, a very Sea of Thought\"; \"To bring what order we can out of this Chaos shall be part of our endeavor.\" Used to establish the genealogy of the *Friedrich* \"this Editor\" persona. https://www.gutenberg.org/cache/epub/1051/pg1051.txt — Tier 1 PRIMARY."}, {"order": 4, "file": "04_Battle_Set_Pieces.md", "title": "The Battle Set-Pieces as Prose", "summary": "", "body": "# The Battle Set-Pieces as Prose\n\n## Bottom Line\n\nCarlyle's battle narratives are the most concentrated stylistic laboratory in the entire *Friedrich*, and they run on a small, repeating kit of devices: the asyndetic sensory catalogue that piles unjoined nouns into a single roar; the *occupatio* or refusal-to-describe that performs the sublime by declining it (\"who shall pretend to describe it\"); the wrenching of tense from settled past into vivid present and back inside one sentence; an obsessive aural imagination that hears battle as \"Jove's thunder,\" \"the Trump of Doom,\" and finally as a Te-Deum sung by \"five-and-twenty thousand\" voices; and the apostrophic imperative (\"Figure the actual stepping...\") that orders the reader bodily onto the field [1][2][3][4]. Two further structural commitments govern the set-pieces: Carlyle's Prussians move like \"iron clock-work,\" a recurring mechanical simile that makes discipline itself the hero [2][5][6], and heroism is preserved even in catastrophe — the Kunersdorf disaster is rendered as a \"death-agony\" of doomed valor, not as a moral verdict against the King [7]. The single most-quoted \"battle whirlwind\" passage belongs not to Leuthen but to the Battle of Prague (Sterbohol, 6 May 1757); careful attribution matters, because Carlyle distributes his signature effects unevenly across the eight campaigns [2]. Throughout, the prose is calibrated so that arithmetic precision (165 Prussian dead at Rossbach against ~8,000 of the enemy) sits flush against cosmic hyperbole (a battle \"surpassable only by Doomsday\") — the collision of ledger and apocalypse is the characteristic Carlylean battle-key [3][4]. Two further devices, easily overlooked, complete the machine: the *dying-hero's-cry* (Schwerin's \"HERAN, MEINE KINDER\" at Prague; Friedrich's despairing \"N'Y A-T-IL DONC PAS UN BOUGRE DE BOULET\" at Kunersdorf) that compresses a man's whole life into one verbatim shout [7][20]; and the *theatrical interjection* — stage-directions (\"EXEUNT OMNES\"), curtain-language (\"the curtains rapidly descending\"), and the running mock-epic naming of Friedrich as the \"PETIT MARQUIS DE BRANDEBOURG\" — that frames the carnage as a performance even as it insists on its reality [3].\n\n## The Repeating Kit of Devices\n\nThe asyndetic sensory catalogue is Carlyle's primary instrument of the battle-sublime, and its locus classicus is the Prague \"whirlwind,\" not Leuthen. Carlyle's most famous battle sentence is an asyndetic catalogue — a list of nouns shorn of connectives so that the items collide rather than sequence. It occurs in the narrative of the Battle of Prague (the fighting around Sterbohol, 6 May 1757), at the moment the Austrian right wing collapses:\n\n> \"The whole of this Austrian Right Wing, horse and foot, batteries and redoubts, which was put EN POTENCE, or square-wise, to the main battle, is become a ruin; gone to confusion; hovers in distracted clouds, seeking roads to run away by, which it ultimately found. Done all this surely was; and poor Browne, mortally wounded, is being carried off the ground; but in what sequence done, under what exact vicissitudes of aspect, special steps of cause and effect, no man can say; and only imagination, guided by these few data, can paint to itself. Such a chaotic whirlwind of blood, dust, mud, artillery-thunder, sulphurous rage, and human death and victory,—who shall pretend to describe it, or draw, except in the gross, the scientific plan of it?\" [2]\n\nThe catalogue — \"blood, dust, mud, artillery-thunder, sulphurous rage, and human death and victory\" — runs six terms across two registers, the physical (blood, dust, mud) modulating into the abstract-moral (rage, death, victory), with only the final \"and\" admitted. The effect is precisely the *whirlwind* the noun-string names: items do not progress, they swirl. The corpus brief's attribution of this passage to \"the Leuthen aftermath\" is an error worth flagging: in the Gutenberg text of Volume 18 the passage falls in the Prague chapter, several hundred pages before Leuthen [2]. The signature device and the Te-Deum scene are two different battles.\n\nThe Prague chapter offers a second, less-cited asyndetic catalogue that confirms the technique is a deliberate habit rather than a single inspired stroke. Of the cavalry mêlée south of the village Carlyle writes of a \"huge whirlpool of tumultuous death-wrestle, every species of spasmodic effort, on the one side and the other;—King himself present there, as I dimly discover\" [2]. The governing noun has shifted from *whirlwind* to *whirlpool*, but the grammar is identical: a noun of rotary chaos (\"whirlpool\"), an appositive that abstracts (\"every species of spasmodic effort\"), and the dash that lets the catalogue spin without a finite verb to settle it. Where ordinary syntax subordinates and sequences, Carlyle's asyndeton refuses both — the missing conjunctions are the formal correlative of a battle in which cause and effect have themselves dissolved. The catalogue is thus not decoration but epistemology: the sentence cannot be parsed into order because the event could not be.\n\nThe refusal-to-describe (occupatio) is a deliberate rhetorical machine, and Carlyle explicitly opposes \"imagination\" to \"the scientific plan.\" The whirlwind sentence does not merely describe; it stages a *refusal* to describe, and that refusal is the point. The figure is *occupatio* (or *praeteritio*): the orator declines to treat a subject, and in declining, treats it. Carlyle's \"who shall pretend to describe it\" is an open rejection of the engineering of battle — \"the scientific plan of it\" — in favor of the imaginative paint [2]. He has set this up two sentences earlier: \"in what sequence done... no man can say; and only imagination, guided by these few data, can paint to itself\" [2]. The antithesis is programmatic: *scientific plan* versus *imagination paints*. Carlyle concedes that the staff-officer's diagram is available and even accurate — at Mollwitz he writes that the battles can be reconstructed \"with perfect authenticity and scientific exactitude; so that in regard to military points the due clearness is, on study, completely attainable\" — but that exactness is exactly what he refuses to substitute for the felt chaos [8]. The occupatio recurs as a structural tic: at Torgau the cannonade is delivered \"at a rate of deafening uproar and of sheer deadliness, which no observer can find words for\" [4] — the words-fail topos again, immediately before Carlyle supplies the words, here in Archenholtz's \"Trump of Doom.\"\n\nThe same refusal organizes the spatial bewilderment Carlyle cultivates at Torgau, where he repeatedly confesses he cannot place his own combatants on the field: \"Near by, too, farther rightwards, if in the bewildering indistinctness I might guess where (but the where is not so important to us), Baireuth Dragoons... plunged into the Austrian Battalions at an unsurpassable rate\" [4]. The parenthesis \"(but the where is not so important to us)\" is occupatio in miniature — a concession that the topographical fact is unrecoverable, immediately converted into a positive aesthetic principle (the *where* does not matter; the *plunge* does). Carlyle thereby builds the reader's trust in his honesty (he will not pretend to a precision he lacks) while licensing the impressionistic mode he prefers. The device is double-edged: it disowns the staff-map and, in the same breath, claims the higher fidelity of the eyewitness who cannot see everything and says so.\n\nCarlyle shifts tense from past to present within single sentences to collapse the distance between reader and field. The battle prose is built on violent tense-shifting. Settled narrative past (\"Done all this surely was\") gives way without warning to the historic present (\"poor Browne... is being carried off the ground\") [2]. The Rossbach narrative sustains the present tense across a long climactic paragraph: \"Friedrich's artillery goes at a murderous rate,\" and the Prussian line, at \"forty paces' distance delivers its first shock of lightning, bursts into platoon fire; and so continues, steady at the rate of five shots a minute\" [3]. At Mollwitz the dawn is delivered in a present-tense reverie that pulls the narrator inside the army: the snow lies \"near two feet... Air hard and crisp,\" and \"'By daybreak' we are all astir, rendezvousing, ranking,—into Four Columns\" — the first-person plural \"we\" makes Carlyle and his reader members of the marching column [9]. The technique is what the scholarship calls Carlyle's movement \"from medieval Latin chronicle to a kind of dramatic monologue in prose\": the historian abandons the retrospective stance for an eye-witness present [10][11]. The tense-shift is not careless; it is the grammatical form of his theory that history must be *seen*, not summarized.\n\nA subtler version of the device is the *number-shift* that rides alongside the tense-shift, in which a plural subject is followed by a singular verb so that a whole regiment momentarily becomes a single acting body. At Hohenfriedberg the Bayreuth Dragoons (plural) \"slashes them to rags\" (singular) [12]; the grammatical \"error\" fuses the squadron into one striking arm. The most sustained example is the Kunersdorf collapse, where Carlyle holds the present tense across the entire ruin and then lets one verb betray the eyewitness's helplessness: the Prussian ranks, at the sight of Loudon's advance, \"rustle everywhere; and melt into one wild deluge, ebbing from the place as fast as it can\" [7]. \"Rustle,\" \"melt,\" \"ebbing\" — three present-tense verbs of involuntary motion, the army losing agency word by word, the singular \"it can\" at the end gathering the plural host into one drowning thing. The grammar performs the dissolution it reports.\n\nThe aural imagination dominates — battle is heard as thunder, as Doomsday, and finally as hymn. Carlyle hears battles more than he sees them, and his most ambitious effects are acoustic. The progression runs from simile (thunder) through hyperbole (Doomsday) to the redemptive musical climax (the Leuthen Te-Deum). At Hohenfriedberg the guns are \"going like Jove's thunder, and the continuous tearing storm of small guns, very loud indeed,\" and the local schoolmaster thinks he \"will hear only once again, when the Last Trumpet sounds!\" [12]. At Torgau the same eschatological key returns, intensified, in the testimony of the fifteen-year-old Archenholtz, that the cannonade was \"a thing surpassable only by Doomsday: clangorous rage of noise risen to the infinite; the boughs of the trees raining down on you, with horrid crash; the Forest, with its echoes, bellowing far and near, and reverberating in universal death-peal; comparable to the Trump of Doom\" [4]. Friedrich himself supplies the human counterpoint, quoted verbatim in his soldier's French and German: \"What an infernal fire (HOLLISCHES FEUER)! Did you ever hear such a cannonade before? I never\" [4]. The aural arc is completed not in noise but in music, in the Leuthen Te-Deum below.\n\nThe acoustic imagination is granular as well as cosmic. At Torgau Carlyle builds an entire turning-point on a *misheard* sound: from Zieten's quarter \"there has been continual storm of cannonade and musketry audible,\" so that \"'Ziethen engaged!' thinks everybody; and quickens step here, under this marching music from the distance. Which is but a wrong reading or mistake, nothing more\" [4]. The phrase \"marching music from the distance\" treats artillery as a tempo-marker for infantry, and the whole disaster of the first attacks turns on the army's mis-reading of an acoustic signal. Carlyle's battles are full of such auditory hermeneutics — sound is data to be interpreted, and the interpretation is fallible. The same instinct gives Mollwitz its definitive sensory detail: the Prussian musketry \"went on no otherwise than a continued peal of thunder\" [9], a simile in which the *continuity* (not the volume) is the terror, the unbroken roll that tells the listening enemy the volleys will never stop.\n\nThe Leuthen Te-Deum is the corpus's supreme aural set-piece, converting the noise of battle into liturgy. The single most celebrated passage in the *Friedrich* is the Leuthen aftermath, in which the victorious Prussian army, marching through darkness, begins to sing. Carlyle stages it as the resolution of the whole acoustic system of the battle-chapters — silence, then one voice, then a chorale:\n\n> \"The Prussian host at Saara, hearing these noises, took to its arms again; and marched after the King. Thick darkness; silence; tramp, tramp:—a Prussian grenadier broke out, with solemn tenor voice again, into Church-Music; a known Church-Hymn, of the homely TE-DEUM kind; in which five-and-twenty thousand other voices, and all the regimental bands, soon join:— 'Nun dunket alle Gott / Mit Herzen, Mund und Handen, / Der grosse Dinge thut / An uns und allen Enden.' ... 'Now thank God, one and all, / With heart, with voice, with hands-a, / Who wonders great hath done / To us and to all lands-a.' And thus they advance; melodious, far-sounding, through the hollow Night, once more in a highly remarkable manner.\" [1]\n\nThe grammar enacts the swell: three asyndetic fragments (\"Thick darkness; silence; tramp, tramp\") set the ground; \"a Prussian grenadier broke out\" introduces the single voice; \"five-and-twenty thousand other voices, and all the regimental bands, soon join\" opens the full choir. The arithmetic precision so characteristic of Carlyle's battle-prose is here recruited to the sublime: the exact \"five-and-twenty thousand\" is not a casualty-count but a choir-count, the ledger turned to praise. Carlyle then reaches for his highest praise, comparing these men to Cromwell's saints: \"A pious people, of right Teutsch stuff, tender though stout; and, except perhaps Oliver Cromwell's handful of Ironsides, probably the most perfect soldiers ever seen hitherto\" [1]. The hymn is the actual chorale *Nun danket alle Gott* (\"Now thank we all our God\"); Carlyle's slightly clumsy verse-rendering (\"with hands-a... all lands-a\") deliberately preserves the *homely* quality he has named — the rhyme is plain on purpose [1]. The closing cadence — \"melodious, far-sounding, through the hollow Night, once more in a highly remarkable manner\" — slows the sentence with three appositive phrases and ends on the deliberately flat \"in a highly remarkable manner,\" a Carlylean understatement that, after the chorale, reads as awe too large for adjectives. He undersells precisely where the material is overwhelming, trusting the scene to carry the emotion the diction withholds.\n\nThe apostrophic imperative (\"Figure...\") commands the reader's body onto the field. Carlyle's most aggressive reader-management device is the second-person imperative built on the verb *Figure* — an order to construct the scene in the imagination, often the sensation of the ground underfoot. The clearest instance is in the Prague narrative, where the Prussians attack across drained fishponds:\n\n> \"Figure the actual stepping upon these 'fine pasture-grounds:'—mud-tanks, verdant with mere 'bearding oat-crop' sown there as carp-provender! Figure the sinking of whole regiments to the knee; to the middle, some of them; the steady march become a wild sprawl through viscous mud, mere case-shot singing round you, tearing you away at its ease! Even on those terrible terms, the Prussians, by dams, by footpaths, sometimes one man abreast, spraw[l on].\" [13]\n\nThe anaphora (\"Figure... Figure...\") and the slide into the second person (\"singing round *you*, tearing *you* away\") drag the reader from spectator to participant [13]. Note the tonal cruelty of \"at its ease\": the case-shot is personified into a lazy executioner, killing without effort, and the casualness of the killing is more horrible than any quantity of it would be. The detail \"sometimes one man abreast\" is the precise, humble fact that anchors the rhetoric — a whole army threading single-file across dams under fire, the grandeur of the whirlwind catalogue reduced to the body of one man at a time. The same imperative mood governs the dramatic asides — \"Fancy the panting death-labors, and spasmodic toilings and bafflings, of those poor Prussians and their King!\" at Kunersdorf [7]. The device is the rhetorical engine behind Carlyle's whole theory of history-as-vision: the reader is not informed of the past but conscripted into it.\n\nPrussian discipline is rendered as \"iron clock-work\" — a recurring mechanical simile that makes order itself sublime. A counter-current runs against the chaos: where the battle as a whole is whirlwind, the Prussian line is machine. The governing simile is clockwork, and it recurs verbatim across decades of the narrative. At Rossbach the line \"shoots out in mysterious Prussian rhythm, in echelons, in potences, obliquely down the Janus-Hill side; straight, rigid, regular as iron clock-work; and strides towards us, silent, with the lightning sleeping in it\" — and again, \"Steady, rigid as iron clock-work, the Prussian line strides forward\" [3]. The same machine appears at Mollwitz fourteen years earlier in the narrative, where an enemy officer testifies that the Prussians \"marched with the greatest steadiness, arrow-straight, and their front like a line (SCHNURGLEICH), as if they had been upon parade. The glitter of their clear arms shone strangely in the setting sun, and the fire from them went on no otherwise than a continued peal of thunder\" [9]. Carlyle's wit at Rossbach extends the mechanical conceit into the optical: Friedrich \"pulls himself out like the pieces of a prospect-glass, piece after piece, hopelessly fast and seemingly no end to them\" [3]. The clockwork simile is doing ideological work: in a book obsessed with order against anarchy, the disciplined line *is* the hero, and its mechanical regularity is treated as a form of the beautiful.\n\nThe mechanical family of metaphors fuses, at Torgau, with the oceanic family to produce Carlyle's single densest battle-image. The grenadiers, charging Daun's batteries, \"rush into the throat of this Fire-volcano... but it is into the throat of his iron engines and his tearing billows of cannon-shot that most of them go\" [4]. Three metaphor-systems collide in one sentence — the volcanic (\"Fire-volcano,\" \"throat\"), the mechanical (\"iron engines\"), and the marine (\"tearing billows\") — and the collision is the point: the disciplined machine of the Prussian line is being fed into a counter-machine of fire, an industrial furnace with a \"throat.\" The clockwork ideal that Carlyle admires at Rossbach is, at Torgau, devoured by a larger mechanism. The simile that made order sublime is turned, two battles later, into the image of order's destruction; the same metaphor-kit serves both triumph and slaughter, which is exactly Carlyle's point about discipline — it is beautiful, and it is what gets men killed in rank.\n\nHeroism is preserved even in total defeat — the Kunersdorf \"death-agony.\" The clearest proof that Carlyle's battle-aesthetic is not merely triumphalist is Kunersdorf (12 August 1759), Friedrich's worst defeat, which Carlyle narrates as tragedy rather than indictment. The collapse is rendered as a \"death-agony,\" and the King's valor is foregrounded precisely at the moment of ruin: \"Friedrich's exertions are passionate, almost desperate... 'Thrice he personally led on the main attack.' He has had two horses shot down under him; mounting a third, this too gets a bullet in an artery of the neck... In his waistcoat-pocket some small gold case (ETUI) has got smitten flat by a bullet, which would otherwise have ended matters\" [7]. Carlyle keeps the King's own words in the same heroic register: pressed to leave the danger, \"he answers curtly, 'We must all of us try every method here, to win the Battle: I, like every other, must stand to'\" [7]. As the line breaks, Carlyle gives the famous despairing cry: \"It is towards six o'clock; the sweltering Sun is now fallen low and veiled; gray evening sinking over those wastes. 'N'Y A-T-IL DONC PAS UN BOUGRE DE BOULET QUI PUISSE M'ATTEINDRE (Is there no one b—— of a ball that can reach me, then)?' exclaimed Friedrich in despair. Such a day he had never thought to see. The pillar of the State, the Prussian Army itself, gone to chaos in this manner\" [7]. The grief is then made structural rather than personal — \"The pillar of the State, the Prussian Army itself\" — so that the King's despair is the State's despair, the cry of a man who is also an institution. There follows the appeal: \"Children, don't forsake me, in this pinch (KINDER, VERLASSET HEUTE MICH, EUREN KONIG, EUREN VATER, NICHT)!\" [7]. The doomed counter-attacks are described with full heroic dignity: \"Ardent Prussian parties trying to storm up; few ever getting to the top, none ever standing there alive one minute. This was the death-agony of the Battle\" [7]. Defeat does not cancel grandeur; it concentrates it. The same logic governs Torgau, where the grenadiers, \"being now reduced to the tenth man, had to fall back,\" after having \"rush[ed] into the throat of this Fire-volcano... such a problem as human bravery seldom had\" [4].\n\nThe Kunersdorf set-piece is the most instructive case of Carlyle's claim that worth is independent of outcome, because here the device-kit is identical to the victory-narratives but the result is annihilation. The present tense, the verbatim cry (the asyndetic catalogue replaced by the dying-hero's-cry), the precise gold ETUI and the \"two horses shot down,\" the rising-and-falling sun used as a clock of doom — all the instruments that score Leuthen's triumph score Kunersdorf's ruin. The only difference is the sign. This symmetry is the strongest internal evidence that Carlyle's battle-aesthetic is genuinely tragic and not merely propagandist: he does not reserve his grandest manner for the wins. The \"death-agony\" is given the same liturgical weight as the Te-Deum; the difference is that one host sings and the other \"melts into one wild deluge, ebbing from the place as fast as it can\" [7].\n\nPrecision arithmetic is set deliberately against cosmic hyperbole. Carlyle's battle prose oscillates between the ledger and the apocalypse, and the oscillation is calculated. The Rossbach paragraph that ends in mock-epic (\"EXEUNT OMNES,\" \"the PETIT MARQUIS DE BRANDEBOURG\") also delivers an exact casualty count: \"They left, of killed and wounded, near 3,000; of prisoners, 5,000... in sum, about 8,000... The Prussian loss was, 165 killed, 376 wounded;—between a sixteenth and a fifteenth part of theirs\" [3]. The same battle is timed to the minute: \"Lasted twenty-five minutes, this second act of it, or till half-past four\" [3]. At Torgau Daun, \"on sight of their intention, has opened 400 pieces of Artillery on them, and these go raging and thundering into the hem of the Wood\" [4]; the grenadiers fight on until \"reduced to the tenth man,\" a fraction stated with the cool exactitude of a casualty-return [4]. This is not pedantry. The specificity authenticates the hyperbole: because Carlyle has earned the reader's trust with verifiable numbers, the leap to \"comparable to the Trump of Doom\" [4] reads as report rather than rhapsody. The collision of the two registers — fifteen-sixteenths and Doomsday in adjacent sentences — is the load-bearing tension of the set-pieces.\n\nThe arithmetic also performs *judgment*, not merely authentication. At Rossbach the ratio \"between a sixteenth and a fifteenth part of theirs,\" set beside the note that \"the Prussians had been little more than one to three; 22,000 of all arms,—not above half of whom ever came int[o action]\" [3], is a moral proof disguised as a sum: the outnumbered army that loses one man for every fifteen it kills has demonstrated, arithmetically, the superiority of discipline over numbers that the whole book is written to assert. Carlyle then converts the number into a historical verdict by comparison — \"Seldom, almost never, not even at Crecy or Poictiers, was any Army better beaten\" [3] — splicing the ledger directly to the chivalric canon. The fifteen-sixteenths and the field of Crécy occupy the same breath; the exact fraction earns the epic comparison, and the epic comparison gives the fraction meaning. This is the engine of Carlyle's authority: numbers he can be checked on, ranged beside claims no one can check, the credibility of the first underwriting the audacity of the second.\n\nThe dying-hero's-cry compresses a life into one verbatim shout — and Carlyle preserves the original tongue. A device distinct from the apostrophic imperative and worth isolating is the *verbatim death-cry*: at the climax of valor or of ruin, Carlyle drops his own narrating voice entirely and gives the hero's exact words, almost always in the original German or French with a parenthetical gloss, so that the foreign syllables carry an authenticity the translation cannot. The supreme instance is the death of the seventy-three-year-old Field-Marshal Schwerin at Prague, who seizes the regimental colors to rally his wavering men:\n\n> \"Seizes the colors, fiery old man: 'HERAN, MEINE KINDER (This way, my sons)!' and rides ahead, along the straight dam again; his 'sons' all turning, and with hot repentance following. 'On, my children, HERAN!' Five bits of grape-shot, deadly each of them, at once hit the old man; dead he sinks there on his flag; and will never fight more. 'HERAN!' storm the others with hot tears; Adjutant von Platen takes the flag; Platen, too, is instantly shot; but another takes it. 'HERAN, On!' in wild storm of rage and grief.\" [20]\n\nThe German word *HERAN* (\"on,\" \"this way\") is repeated four times across the passage — first by Schwerin, then by the grieving men who take up his cry as the colors pass from dead hand to dead hand — so that a single foreign imperative becomes the acoustic spine of the whole episode, a word that outlives the man who spoke it. Carlyle's narration is reduced almost to stage-direction (\"dead he sinks there on his flag; and will never fight more\"); the *event* is the word. The mirror-image at the other pole of fortune is Friedrich's cry at Kunersdorf, \"N'Y A-T-IL DONC PAS UN BOUGRE DE BOULET QUI PUISSE M'ATTEINDRE\" [7] — the King in his soldier's barrack-French begging for a bullet, the obscenity (\"BOUGRE\") softened only in the gloss (\"b——\"), so that the coarseness of the original tongue testifies to the realness of the despair. In both cases the device works by *self-effacement*: Carlyle, the loudest narrator in English prose, falls silent and lets a dead man's untranslated shout stand as the truest possible record. The cry is the most economical of all his devices — a whole life, and the meaning of a whole battle, in three or four syllables of a foreign language.\n\nThe theatrical interjection frames the carnage as performance — stage-directions, curtains, and the mock-epic name. Running against the documentary register is a persistent *theatrical* one, in which Carlyle annotates the battle as if it were a staged drama. The clearest case is Rossbach, narrated almost entirely in the idiom of the playhouse. The rout is \"the only stage-direction, EXEUNT OMNES. Which for a 50 or 60,000, ridden over by Seidlitz Horse, was not quite an easy matter!\" [3] — the Latin stage-direction (literally \"all go out\") deployed against the literal impossibility of fifty thousand men exiting a field under cavalry. Night itself becomes scenery: \"after which, the curtains rapidly descending (Night's curtain, were there no other) cover the remainder\" [3]. The \"second act\" of the battle \"lasted twenty-five minutes\" [3]; Friedrich, masked behind the Janus Hill, is the great actor-manager who \"pulls himself out like the pieces of a prospect-glass\" [3]. And over the whole campaign hangs the running mock-epic sobriquet by which the French staff had belittled the King — \"the PETIT MARQUIS DE BRANDEBOURG\" — which Carlyle repeats with savage relish at the moment of their defeat: \"Yes, Messieurs, this is the PETIT MARQUIS DE BRANDEBOURG\" [3]. The theatrical frame is not flippancy; it is a tonal weapon reserved, significantly, for the comic battle. Where Kunersdorf and Torgau get liturgy and apocalypse, Rossbach — a rout so cheap it cost 165 dead — gets the playhouse, because the disproportion between French pretension and French performance is itself a kind of farce. Carlyle matches genre to outcome: tragedy for the disasters, drama for the triumphs, and broad stage-comedy for the rout of an enemy who had it coming.\n\n## The Devices in Sequence: A Walk Through the Eight Battles\n\n### Mollwitz (1741): the review-ground and the won-then-lost battle\n\nCarlyle's first battle is rendered through the lens of Friedrich's *inexperience*, and the prose registers it as stiffness. The opening is one of his great winter scenes: \"all is calm, sleeked out into spotless white; Pogarell and the world are wrapt as in a winding-sheet, near two feet of snow on the ground. Air hard and crisp; a hot sun possible about noon season\" [9]. The \"winding-sheet\" — a shroud — quietly forecasts the dead, and the meteorological precision (\"a hot sun possible about noon season\") is the documentary register grounding the funereal image. Carlyle is candid that the young King has not yet learned his craft: \"nor had Friedrich himself, in this his first Battle, learned that feline or leonine promptitude of spring which he subsequently manifested. Far from it! Indeed this punctilious deliberation, and slow exactitude as on the review-ground, is wonderful and noteworthy at the first start of Friedrich;—the faithful apprentice-hand still rigorous to the rules of the old shop\" [8]. The apprentice-metaphor is doing characterological work: the King who will later be a \"feline or leonine\" improviser begins as a stiff journeyman, and the battle's stiffness is read as autobiography. The narrative's drama turns on the famous fact that Friedrich left the field believing the battle lost — \"Schwerin entreated, and as it were commanded, the King to go; the Battle being, to all appearance, irretrievable. Go he did, with small escort, and on a long ride,—to Oppeln\" [14] — after which Schwerin, with the disciplined infantry, won it. The set-piece climaxes in the enemy officer's aesthetic testimony to the Prussian advance — the clockwork-simile passage quoted above — which Carlyle frames with a characteristic interjection that fuses the two registers of the whole book: \"Grand picture indeed; but not to be enjoyed as a Work of Art, for it is coming upon us!\" [9]. The sentence is a miniature of his entire method — the battle *is* a work of art, and is also a thing that kills you, and the horror lives in the \"but.\"\n\n### Hohenfriedberg (1745): dawn, the Last Trumpet, and the Bayreuth Dragoons\n\nHohenfriedberg gives Carlyle a dawn-attack, and he scores it acoustically. The fighting begins \"by sunrise\" with \"a furious storm of battle... Hot and fierce on both sides; charges of horse, shock after shock, bayonet-charges of foot; the great guns going like Jove's thunder, and the continuous tearing storm of small guns, very loud indeed\" [12]. The asyndetic catalogue is already present in embryo — \"charges of horse, shock after shock, bayonet-charges of foot\" — but the early battles keep it shorter and more orderly than the Seven-Years'-War set-pieces will. The local schoolmaster's terror supplies the apocalyptic gloss: the noise is one he will \"hear only once again, when the Last Trumpet sounds!\"; it \"resemble[s] the dissolution of Nature: 'For all fell dark too;' a general element of sulphurous powder-smoke, streaked with dull blazes; and death and destruction very nigh\" [12]. Carlyle's use of the humble witness is deliberate: the schoolmaster, not a general, is the one allowed to reach for Doomsday, so that the eschatological hyperbole arrives as the report of a frightened civilian rather than the historian's own flourish. The set-piece's climax is the charge of the Bayreuth Dragoons, the most celebrated cavalry feat in the book. Carlyle frames it with one of Friedrich's own maxims on breaking Austrian infantry — \"I have observed, if you step sharply up to an Austrian battalion [within fifty paces or so], and pour in your fire well, in about a quarter of an hour you see the ranks beginning to shake, and jumble towards indistinctness\" [15] — and then unleashes Gessler's dragoons: they dash \"into the belly of these jumbly Austrians; and slashes them to rags, 'twenty battalions of them,' in an altogether unexampled manner... Sixty-seven standards by the tale\" [15], for which the regiment \"wears, ever after, '67' upon its cartridge-box\" [15]. The verb \"slashes\" (present, singular, after the plural \"dragoons\") shows the tense- and number-shifting in action, and the regiment's \"67\" stamped on its cartridge-boxes is the documentary fact — that flush of precise arithmetic against the cosmic — that fixes the legend in brass.\n\n### Prague & Kolin (1757): the whirlwind, the muddy \"Figure,\" and the death of Schwerin\n\nThe Prague chapter is the densest concentration of Carlyle's devices: the asyndetic whirlwind catalogue, the second \"whirlpool\" catalogue, the occupatio with its \"scientific plan\" antithesis, the muddy \"Figure the actual stepping\" apostrophe, and the supreme dying-hero's-cry of Schwerin all occur here. It is the proof-text for the whole stylistic kit, and the fact that the corpus tradition mislocates the whirlwind at Leuthen underscores how the set-pieces have become detached from their occasions in memory. The Prague terrain itself — the drained carp-ponds the Prussians must wade — is the perfect material for Carlyle's anti-heroic precision: the \"fine pasture-grounds\" turn out to be \"mud-tanks, verdant with mere 'bearding oat-crop' sown there as carp-provender,\" and the \"steady march\" becomes \"a wild sprawl through viscous mud\" [13]. The bathos is exact and cruel: the most disciplined army in Europe is reduced to men sinking \"to the knee; to the middle, some of them,\" picked off at leisure by case-shot that sings \"at its ease\" [13]. Then, at the crisis, the seventy-three-year-old Schwerin — \"fiery as ever, at the age of 73... in many battles, from Blenheim onwards; and now has got to his hottest and his last\" [20] — seizes the colors and dies on his flag, the oldest device in epic — the standard-bearer's death — given Carlyle's verbatim-cry treatment.\n\nKolin (18 June 1757), Friedrich's first defeat, is narrated through the failure of the \"oblique order of attack, Friedrich's favorite mode\" [16] — the same oblique order that will triumph at Leuthen, shown here breaking down, so that the two battles function as a matched pair, defeat and vindication. Carlyle's Kolin is studiedly *un*-sublime: he spends his energy correcting the topography (\"there is nothing that you could think of calling a Hill, though many Books (and even Friedrich's Book) rashly say otherwise\") and disputing where the King stood, insisting against the legend that \"Friedrich did not stand anywhere: 'oftenest in the thick of the fire,' say those who saw\" [16]. The deflationary, fact-checking manner is itself meaningful: a defeat caused by error gets the cold prose of forensic reconstruction, withholding the apocalyptic register until Kunersdorf, when the defeat will be catastrophe rather than mistake. Kolin and Kunersdorf thus form a second matched pair — the avoidable loss narrated dry, the unavoidable loss narrated as tragedy.\n\n### Rossbach (5 November 1757): the prospect-glass, the Chimera, and EXEUNT OMNES\n\nRossbach is Carlyle's comic masterpiece — a rout so swift and so cheap that the prose turns to mock-epic and stage-direction. The clockwork line \"strides towards us, silent, with the lightning sleeping in it\" [3]; Friedrich, having feigned retreat, is suddenly \"mounted there on the Janus Hill, as on his saddle-horse, with face quite the other way;—and for holster-pistol, has plucked out twenty-two cannon. Clad verily in fire; Chimera-like, RIDING the Janus Hill, in that manner; left leg (or wing) of him spurning us into the abysses, right one ready to help at discretion!\" [3]. The Chimera-image — a monstrous composite beast, the King fused with the hill he rides — is Carlyle's wildest single conceit, and it is reserved for comedy, the enemy's terror rendered as a fairy-tale ogre. Seydlitz's (Carlyle spells it \"Seidlitz\") cavalry delivers the blow: \"Seidlitz, seeing all things rock to the due extent, bursts out of Tageswerben Hollow, terribly compact and furious, upon the rear of them. Which sets all things into inextricable tumble; and the Battle is become a rout and a riding into ruin, no Battle ever more\" [3]. The climactic infantry volley is timed and tabulated — \"at forty paces' distance delivers its first shock of lightning, bursts into platoon fire; and so continues, steady at the rate of five shots a minute\" [3] — the present tense and the precise arithmetic working together. Then Carlyle drops fully into theatre, the casualty count (165 dead), and the chivalric comparison (\"Seldom, almost never, not even at Crecy or Poictiers, was any Army better beaten\"), sealing the chapter on the savage refrain \"Yes, Messieurs, this is the PETIT MARQUIS DE BRANDEBOURG\" [3].\n\n### Leuthen (5 December 1757): the citadel of death and the chorale\n\nLeuthen is the vindication of the oblique order that failed at Kolin, and Carlyle narrates its crisis at the village church. \"Stiff fighting at Leuthen; especially furious till Leuthen Churchyard, a place with high stone walls, was got. Leuthen Village, we observe, was crammed with Austrians spitting fire from every coign of vantage; Church and Churchyard especially are a citadel of death. Cannon playing from the Windmill Heights, too;—moments are inestimable\" [17]. The oxymoron \"citadel of death\" — a fortress that exists to produce corpses — is the chapter's organizing image, and the clipped \"moments are inestimable\" injects the urgency of a dispatch. The hinge is Major Möllendorf's profane gallantry: \"Major Mollendorf, namable from that day forward, growling, 'No time this for study,' dashes out himself, 'EIN ANDRER MANN (Follow me, whoever is a man)!'—smashes in the Church-Gate of the place, nine muskets blazing on him through it\" [17]. The detail \"nine muskets blazing on him through it\" is the precise count that makes the heroism real; the verbatim German cry does the rest. The whole acoustic structure of the book — thunder, Doomsday, infernal fire — then resolves into the Leuthen Te-Deum, the single most important passage in this document. Carlyle's verdict is flat and total: \"Leuthen was the most complete of all Friedrich's victories; two hours more of daylight, as Friedrich himself says, and it would have been the most decisive of this century\" [1]. The Möllendorf who smashes the Leuthen church-gate will return, three years and one volume later, as the officer who finds the saving \"Butter-Street\" pass in the dark at Torgau — a deliberate cross-battle echo that rewards the reader of the whole work.\n\n### Zorndorf (1758): the bloodiest battle and the brandy-bath\n\nZorndorf (25 August 1758) against the Russians is Carlyle's study in *rage*. He names it without hedging: \"Minotaur walking off on his own feet, after all. It was the bloodiest battle of the Seven-Years War; one of the most furious ever fought; such rage possessing the individual elements; rage unusual in modern wars\" [18]. The Russian army is figured throughout as a single mythic beast — the \"Russian Minotaur scrutinizing him in that manner with dull bloodshot eyes, uncertain what he will do\" [18] — a sustained personification that converts a national army into one stupid, monstrous, bleeding animal, the better to register Carlyle's horror at its almost insensate endurance. The set-piece's grotesque centerpiece is the Russian collapse into drunkenness: the men, more remote from Seidlitz's sabres, \"break open the sutlers' brandy-casks, and in few minutes get roaring drunk. Their officers, desperate, split the brandy-casks; soldiers flap down to drink it from the puddles; furiously remonstrate with their officers, and 'kill a good many of them' (VIELE, says Tielcke), especially the foreign sort. 'A frightful blood-bath,' by all the Accounts: blood-bath, brandy-bath, and chief Nucleus of Chaos then extant aboveground\" [19]. The alliterative pairing \"blood-bath, brandy-bath\" is Carlyle's compression of the battle's whole moral atmosphere — the rhyme yoking slaughter to drunkenness so tightly that the two become one substance — and the bathetic image of soldiers lapping brandy \"from the puddles,\" then murdering the officers who deny them, is the anti-Te-Deum: where Leuthen's army sings as one body, Zorndorf's army drowns as one body. The parenthetical source-citation (\"VIELE, says Tielcke\") is the documentary anchor keeping the grotesque verifiable.\n\n### Kunersdorf (12 August 1759): the death-agony and the King who begs for a bullet\n\nKunersdorf is the tragic peak of the whole work, the supreme case of heroism preserved in total defeat. Friedrich's apparent early victory turns to total ruin when Loudon's reserve falls on the exhausted Prussian flank: \"At sight of which a universal feeling shivers through the Prussian heart, 'Hope ended, then!'—and their solid ranks rustle everywhere; and melt into one wild deluge, ebbing from the place as fast as it can\" [7]. The verbs of dissolution in the present tense and the failing light (the \"sweltering Sun... now fallen low and veiled; gray evening sinking over those wastes\") combine to make the collapse cosmic without a single explicit hyperbole — the apocalypse is in the syntax and the weather, not in the adjectives. Against this Carlyle sets the King's body and the King's words: the three horses, the bullet-flattened gold ETUI, \"We must all of us try every method here, to win the Battle: I, like every other, must stand to,\" the despairing oath for a fatal ball, the appeal \"Children, don't forsake me\" [7]. The chapter is the clearest demonstration that the device-kit is sign-neutral: every instrument of the Leuthen triumph reappears, inverted, to score the worst day of Friedrich's life, and Carlyle gives it equal grandeur. He even universalizes the grief — \"The pillar of the State, the Prussian Army itself, gone to chaos in this manner\" [7] — so the King's private despair becomes the near-death of a nation, the political stakes carried inside the personal cry.\n\n### Torgau (3 November 1760): the Fire-volcano and the night-victory\n\nTorgau is the late masterpiece — a battle won in darkness after Friedrich's own daylight attack had apparently failed. The cannonade is the most extreme acoustic effect in the book: Daun \"has opened 400 pieces of Artillery on them, and these go raging and thundering into the hem of the Wood... at a rate of deafening uproar and of sheer deadliness, which no observer can find words for,\" \"surpassable only by Doomsday... comparable to the Trump of Doom\" [4]. The grenadiers' charge is pure heroism-in-attrition: \"With amazing intrepidity, they... rush into the throat of this Fire-volcano... but it is into the throat of his iron engines and his tearing billows of cannon-shot that most of them go. Shorn down by the company, by the regiment... At last the 6,000 Grenadiers, being now reduced to the tenth man, had to fall back\" [4]. The fused machine/storm metaphor — the clockwork ideal devoured by a counter-machine of fire — makes this the metaphorical climax of all Carlyle's battle-writing.\n\nBut Torgau's distinctive achievement is its *structure*: the battle is lost in the light and won in the dark, and Carlyle exploits the reversal for one of his finest sustained night-scenes. After Friedrich, \"in a mood of mind which may be figured as gloomy enough,\" has ridden off the field believing himself beaten, and Daun has sent \"a courier to Vienna... with glorious trumpeting postilions, and universal Hep-hep-hurrah; kindling that ardently loyal City into infinite triumph and illumination,—for the space of certain hours following\" [4] — the dramatic irony is laid in deliberately, the enemy's premature celebration set against the dark field where the battle is not in fact over. Then, in \"utter darkness,\" a glow appears — \"red glow of conflagration visible withal,—some unfortunate Village going up\" — and Zieten, who \"had stood all day making idle noises,\" at last, prodded by \"the Leuthen Mollendorf,\" storms the Siptitz heights [4]. The recurrence of Möllendorf, named here precisely as \"the Leuthen Mollendorf,\" is the cross-battle keystone: the man who smashed the Leuthen church-gate now finds the \"Butter-Street\" pass in the dark and turns a lost battle into the bloodiest victory of the war [4]. Torgau thus closes the arc of the set-pieces by recombining their devices in inverted order — the apocalypse comes first and the deliverance comes last, in silence and darkness, exactly where Leuthen had placed its chorale.\n\n## How the Devices Cohere\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 408\" role=\"img\" aria-label=\"A matrix of eight battle set-pieces against seven recurring prose devices. Rows top to bottom: Mollwitz 1741 and Hohenfriedberg 1745 (Silesian Wars, restrained); Prague 1757 (device-densest); Rossbach 1757 (comic); Leuthen 1757 (aural, hymn); Zorndorf 1758 (grotesque); Kunersdorf 1759 (tragic); Torgau 1760 (apocalyptic). Columns: asyndetic catalogue, occupatio, tense-shift, aural climb, iron clock-work, dying-cry, mock-epic. Dots mark a device present; spark-stars mark each battle's signature peak. The tense-shift column is filled in nearly every row; the aural column carries two peaks (the Leuthen hymn and the Torgau Doomsday); the catalogue peaks at Prague and Zorndorf.\">\n<text x=\"350\" y=\"26\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" letter-spacing=\"2\">THE BATTLE-KIT<\/text>\n<text x=\"350\" y=\"44\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">eight set-pieces &#215; one recurring repertory &#8212; the same instruments scoring triumph and disaster<\/text>\n<text x=\"185\" y=\"74\" text-anchor=\"middle\" font-size=\"8.4\" style=\"fill:var(--t1)\">Asyndetic<\/text>\n<text x=\"185\" y=\"84\" text-anchor=\"middle\" font-size=\"8.4\" style=\"fill:var(--t1)\">catalogue<\/text>\n<text x=\"243\" y=\"74\" text-anchor=\"middle\" font-size=\"8.4\" class=\"t-muted\">Occupatio<\/text>\n<text x=\"243\" y=\"84\" text-anchor=\"middle\" font-size=\"8.4\" class=\"t-muted\">(refusal)<\/text>\n<text x=\"301\" y=\"74\" text-anchor=\"middle\" font-size=\"8.4\" style=\"fill:var(--t2)\">Tense-<\/text>\n<text x=\"301\" y=\"84\" text-anchor=\"middle\" font-size=\"8.4\" style=\"fill:var(--t2)\">shift<\/text>\n<text x=\"359\" y=\"74\" text-anchor=\"middle\" font-size=\"8.4\" style=\"fill:var(--t5)\">Aural<\/text>\n<text x=\"359\" y=\"84\" text-anchor=\"middle\" font-size=\"8.4\" style=\"fill:var(--t5)\">climb<\/text>\n<text x=\"417\" y=\"74\" text-anchor=\"middle\" font-size=\"8.4\" class=\"t-acc\">Iron<\/text>\n<text x=\"417\" y=\"84\" text-anchor=\"middle\" font-size=\"8.4\" class=\"t-acc\">clock-work<\/text>\n<text x=\"475\" y=\"74\" text-anchor=\"middle\" font-size=\"8.4\" style=\"fill:var(--t3)\">Dying-<\/text>\n<text x=\"475\" y=\"84\" text-anchor=\"middle\" font-size=\"8.4\" style=\"fill:var(--t3)\">cry<\/text>\n<text x=\"533\" y=\"74\" text-anchor=\"middle\" font-size=\"8.4\" style=\"fill:var(--t4)\">Mock-<\/text>\n<text x=\"533\" y=\"84\" text-anchor=\"middle\" font-size=\"8.4\" style=\"fill:var(--t4)\">epic<\/text>\n<text x=\"633\" y=\"80\" text-anchor=\"middle\" font-size=\"8.4\" class=\"t-muted\" letter-spacing=\"1\">PEAK<\/text>\n<line x1=\"8\" y1=\"92\" x2=\"690\" y2=\"92\" class=\"ln\" stroke-width=\"1.3\"/>\n<rect x=\"8\" y=\"100\" width=\"682\" height=\"30\" class=\"f-panel\" opacity=\"0.45\"/>\n<rect x=\"8\" y=\"160\" width=\"682\" height=\"30\" class=\"f-panel\" opacity=\"0.45\"/>\n<rect x=\"8\" y=\"220\" width=\"682\" height=\"30\" class=\"f-panel\" opacity=\"0.45\"/>\n<rect x=\"8\" y=\"280\" width=\"682\" height=\"30\" class=\"f-panel\" opacity=\"0.45\"/>\n<rect x=\"3\" y=\"100\" width=\"3\" height=\"60\" style=\"fill:var(--t1)\" opacity=\"0.6\"/>\n<rect x=\"3\" y=\"160\" width=\"3\" height=\"180\" style=\"fill:var(--t3)\" opacity=\"0.6\"/>\n<text x=\"12\" y=\"112\" font-size=\"10\" font-weight=\"bold\">Mollwitz<\/text>\n<text x=\"12\" y=\"124\" font-size=\"8\" class=\"t-muted\">1741 &#183; Silesian<\/text>\n<text x=\"12\" y=\"142\" font-size=\"10\" font-weight=\"bold\">Hohenfriedberg<\/text>\n<text x=\"12\" y=\"154\" font-size=\"8\" class=\"t-muted\">1745 &#183; Silesian<\/text>\n<text x=\"12\" y=\"172\" font-size=\"10\" font-weight=\"bold\">Prague &amp; Kolin<\/text>\n<text x=\"12\" y=\"184\" font-size=\"8\" class=\"t-muted\">1757<\/text>\n<text x=\"12\" y=\"202\" font-size=\"10\" font-weight=\"bold\">Rossbach<\/text>\n<text x=\"12\" y=\"214\" font-size=\"8\" class=\"t-muted\">1757<\/text>\n<text x=\"12\" y=\"232\" font-size=\"10\" font-weight=\"bold\">Leuthen<\/text>\n<text x=\"12\" y=\"244\" font-size=\"8\" class=\"t-muted\">1757<\/text>\n<text x=\"12\" y=\"262\" font-size=\"10\" font-weight=\"bold\">Zorndorf<\/text>\n<text x=\"12\" y=\"274\" font-size=\"8\" class=\"t-muted\">1758<\/text>\n<text x=\"12\" y=\"292\" font-size=\"10\" font-weight=\"bold\">Kunersdorf<\/text>\n<text x=\"12\" y=\"304\" font-size=\"8\" class=\"t-muted\">1759<\/text>\n<text x=\"12\" y=\"322\" font-size=\"10\" font-weight=\"bold\">Torgau<\/text>\n<text x=\"12\" y=\"334\" font-size=\"8\" class=\"t-muted\">1760<\/text>\n<circle cx=\"185\" cy=\"115\" r=\"4.5\" style=\"fill:var(--t1)\"/>\n<circle cx=\"301\" cy=\"115\" r=\"4.5\" style=\"fill:var(--t2)\"/>\n<circle cx=\"533\" cy=\"115\" r=\"4.5\" style=\"fill:var(--t4)\"/>\n<text x=\"633\" y=\"118\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\" font-style=\"italic\">restrained<\/text>\n<circle cx=\"185\" cy=\"145\" r=\"4.5\" style=\"fill:var(--t1)\"/>\n<circle cx=\"301\" cy=\"145\" r=\"4.5\" style=\"fill:var(--t2)\"/>\n<circle cx=\"359\" cy=\"145\" r=\"4.5\" style=\"fill:var(--t5)\"/>\n<text x=\"633\" y=\"148\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\" font-style=\"italic\">restrained<\/text>\n<polygon points=\"185,168 188,172 192,175 188,178 185,182 182,178 178,175 182,172\" style=\"fill:var(--t1);stroke:var(--accent)\" stroke-width=\"1.3\"/>\n<circle cx=\"243\" cy=\"175\" r=\"4.5\" style=\"fill:var(--muted)\"/>\n<circle cx=\"301\" cy=\"175\" r=\"4.5\" style=\"fill:var(--t2)\"/>\n<circle cx=\"475\" cy=\"175\" r=\"4.5\" style=\"fill:var(--t3)\"/>\n<text x=\"633\" y=\"178\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-acc\" font-style=\"italic\">device-densest<\/text>\n<circle cx=\"301\" cy=\"205\" r=\"4.5\" style=\"fill:var(--t2)\"/>\n<circle cx=\"417\" cy=\"205\" r=\"4.5\" style=\"fill:var(--accent)\"/>\n<polygon points=\"533,198 536,202 540,205 536,208 533,212 530,208 526,205 530,202\" style=\"fill:var(--t4);stroke:var(--accent)\" stroke-width=\"1.3\"/>\n<text x=\"633\" y=\"208\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-acc\" font-style=\"italic\">comic<\/text>\n<circle cx=\"301\" cy=\"235\" r=\"4.5\" style=\"fill:var(--t2)\"/>\n<circle cx=\"417\" cy=\"235\" r=\"4.5\" style=\"fill:var(--accent)\"/>\n<circle cx=\"475\" cy=\"235\" r=\"4.5\" style=\"fill:var(--t3)\"/>\n<polygon points=\"359,228 362,232 366,235 362,238 359,242 356,238 352,235 356,232\" style=\"fill:var(--t5);stroke:var(--accent)\" stroke-width=\"1.3\"/>\n<text x=\"633\" y=\"238\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-acc\" font-style=\"italic\">aural &#183; hymn<\/text>\n<polygon points=\"185,258 188,262 192,265 188,268 185,272 182,268 178,265 182,262\" style=\"fill:var(--t1);stroke:var(--accent)\" stroke-width=\"1.3\"/>\n<circle cx=\"359\" cy=\"265\" r=\"4.5\" style=\"fill:var(--t5)\"/>\n<text x=\"633\" y=\"268\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-acc\" font-style=\"italic\">grotesque<\/text>\n<circle cx=\"301\" cy=\"295\" r=\"4.5\" style=\"fill:var(--t2)\"/>\n<circle cx=\"359\" cy=\"295\" r=\"4.5\" style=\"fill:var(--t5)\"/>\n<polygon points=\"475,288 478,292 482,295 478,298 475,302 472,298 468,295 472,292\" style=\"fill:var(--t3);stroke:var(--accent)\" stroke-width=\"1.3\"/>\n<text x=\"633\" y=\"298\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-acc\" font-style=\"italic\">tragic<\/text>\n<circle cx=\"243\" cy=\"325\" r=\"4.5\" style=\"fill:var(--muted)\"/>\n<circle cx=\"301\" cy=\"325\" r=\"4.5\" style=\"fill:var(--t2)\"/>\n<circle cx=\"417\" cy=\"325\" r=\"4.5\" style=\"fill:var(--accent)\"/>\n<polygon points=\"359,318 362,322 366,325 362,328 359,332 356,328 352,325 356,322\" style=\"fill:var(--t5);stroke:var(--accent)\" stroke-width=\"1.3\"/>\n<text x=\"633\" y=\"328\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-acc\" font-style=\"italic\">apocalyptic<\/text>\n<line x1=\"8\" y1=\"340\" x2=\"690\" y2=\"340\" class=\"ln\" stroke-width=\"1.3\"/>\n<circle cx=\"120\" cy=\"360\" r=\"4.5\" style=\"fill:var(--t2)\"/>\n<text x=\"132\" y=\"363\" font-size=\"9\" class=\"t-muted\">device present<\/text>\n<polygon points=\"246,353 249,357 253,360 249,363 246,367 243,363 239,360 243,357\" style=\"fill:var(--t1);stroke:var(--accent)\" stroke-width=\"1.3\"/>\n<text x=\"258\" y=\"363\" font-size=\"9\" class=\"t-muted\">the battle&#8217;s signature peak<\/text>\n<text x=\"350\" y=\"392\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\" font-style=\"italic\">Tense-shift is the workhorse (nearly every row); the aural register peaks twice &#8212; Leuthen&#8217;s hymn, Torgau&#8217;s Doomsday.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 4.<\/strong> The set-pieces are a graded repertory, not a stock of tricks: a single seven-device kit recurs across eight battles, and its <em>sign-neutrality<\/em> is the argument &#8212; the identical instruments score the Leuthen triumph and the Kunersdorf catastrophe with equal grandeur. The tense-shift is the universal workhorse; the aural imagination is the dominant register, climbing to two opposite peaks (hymn and Doomsday); and the asyndetic catalogue concentrates at Prague and Zorndorf.<\/figcaption>\n<\/figure>\n\n\nThe set-pieces are not a grab-bag of effects but a single system with a consistent logic. The asyndetic catalogue and the occupatio handle the *unrepresentable* — the chaos that \"no man can say\" [2]. The tense-shift, the number-shift, and the \"Figure\" imperative handle *presence* — collapsing the reader into the field [3][13]. The aural imagination, climbing from thunder to Doomsday to chorale, handles *meaning* — converting noise into either apocalypse or thanksgiving [4][1]. The clockwork simile handles *order* — Carlyle's deepest value, the disciplined line standing against anarchy [3][9]. The dying-hero's-cry handles *individuation* — the single untranslated shout that rescues one man from the statistical mass [20][7]. The theatrical interjection handles *tone* — the playhouse frame that lets the comic battle be comic [3]. And the heroism-in-defeat principle handles *judgment* — refusing to let outcome dictate worth [7]. The arithmetic-versus-hyperbole oscillation is the membrane that holds the whole thing together, lending documentary credit to the cosmic claims. The result is a prose that is simultaneously a war-correspondent's dispatch and an Old-Testament canticle — the two modes Carlyle never stopped trying to weld.\n\nThe strongest proof that this is a system rather than a stock of tricks is its *sign-neutrality*: the identical kit scores the triumph at Leuthen and the catastrophe at Kunersdorf with equal grandeur, the only difference being that one host sings and the other \"melts into one wild deluge\" [1][7]. A propagandist would reserve his sublime manner for victory; Carlyle spends it freely on defeat, because his subject is not Prussian success but human valor under the pressure of fact. The same neutrality lets him match *genre* to *outcome* across the whole sequence — tragedy for Kunersdorf, apocalypse for Torgau, liturgy for Leuthen, mock-epic stage-comedy for Rossbach, dry forensic correction for the avoidable defeat at Kolin — so that the eight battles are not eight applications of one manner but a graded repertory.\n\nIt is worth noting the *unevenness* of the distribution. Prague carries the heaviest concentration of signature devices (whirlwind, whirlpool, the muddy \"Figure,\" Schwerin's death); Rossbach is the comic-ironic peak; Leuthen the aural-redemptive peak; Kunersdorf the tragic peak; Torgau the apocalyptic peak and the great night-piece; Zorndorf the grotesque peak. Mollwitz and Hohenfriedberg, the early Silesian battles, are comparatively restrained — Carlyle is still establishing the King and the army, keeps his catalogues short and orderly, and reserves his fullest pyrotechnics for the Seven Years' War, when the stakes (and his identification with the embattled, outnumbered Friedrich) are highest. The set-pieces thus form an arc, not a series: the prose intensifies as the King's danger intensifies, and the recurring figures (Möllendorf at Leuthen and Torgau; the Bayreuth Dragoons at Hohenfriedberg/Striegau and again at Torgau; the oblique order failing at Kolin and triumphing at Leuthen) knit the separate battles into one continuous, cross-referenced drama.\n\n## Open Questions\n\n- **Provenance of the quoted testimony.** Carlyle frequently quotes eyewitnesses (the Württemberg dragoon at Rossbach, Archenholtz at Torgau, the Mollwitz schoolmaster, the Hohenfriedberg schoolmaster, the Austrian officer at Mollwitz, Tielcke at Zorndorf) with footnote citations to Müller, Tempelhof, Retzow, Tielcke, Archenholtz, etc. A separate document should verify how faithfully Carlyle renders these sources versus how much he heightens them — the \"blood-bath, brandy-bath\" and \"Trump of Doom\" phrasings in particular may be Carlyle's own amplifications of plainer originals, and the \"boughs of the trees raining down on you\" detail attributed to the fifteen-year-old Archenholtz invites collation with Archenholtz's published memoir. (Contested/unresolved here.)\n- **The corpus's Leuthen/Prague conflation.** The brief assigned the \"chaotic whirlwind\" passage to Leuthen; the text places it at Prague. Whether this is a long-standing tradition (the passage circulating detached from its battle) or a one-off slip is worth tracing through the anthology and quotation-book history. (Inference: likely a familiar detachment, given the passage's fame.)\n- **Sources of the clockwork simile.** The \"iron clock-work\" image may derive from eighteenth-century military writing on the Prussian system, or be Carlyle's own. Its relation to his broader machine-imagery (cf. \"Signs of the Times\") deserves a cross-document link, as does its dark inversion in the Torgau \"iron engines... tearing billows\" — the same metaphor turned from triumph to slaughter.\n- **The cross-battle recurrences as deliberate architecture.** Möllendorf appears at both Leuthen and Torgau; the Bayreuth Dragoons at both Hohenfriedberg and Torgau; the oblique order fails at Kolin and triumphs at Leuthen. Whether Carlyle planned these echoes as structural ligatures, or merely followed his sources where they led, is worth establishing; if deliberate, the battle set-pieces are far more architecturally integrated than their reputation as detachable purple passages suggests. (Inference: at least partly deliberate, given Carlyle's explicit naming of \"the Leuthen Mollendorf.\")\n- **Comparison with the *French Revolution* battle/crowd scenes.** The asyndetic catalogue, the present-tense, and the theatrical stage-direction are arguably inherited from the 1837 *French Revolution*; a comparative reading would establish how much of the *Friedrich* battle-method is recycled and how much is new. (Inference: substantial continuity, per Rosenberg's account of Carlyle's narrative development [10].)\n\n## Sources\n\n1. Thomas Carlyle, *History of Friedrich II of Prussia, Volume 18* (Battle of Leuthen; the Te-Deum aftermath, \"Thick darkness; silence; tramp, tramp:—a Prussian grenadier broke out... five-and-twenty thousand other voices, and all the regimental bands, soon join\"; *Nun Prussia, Volume 15* (Battle of Hohenfriedberg; Friedrich's maxim \"I have observed, if you step sharply up to an Austrian battalion [within fifty paces or so], and pour in your fire well, in about a quarter of an hour you see the ranks beginning to shake\"; Gessler/Bayreuth Dragoons \"into the belly of these jumbly Austrians; and slashes them to rags, 'twenty battalions of them'... Sixty-seven standards by the tale... wears, ever after, '67' upon its cartridge-box\"). Project Gutenberg eBook #2115. https://www.gutenberg.org/files/2115/2115-h/2115-h.htm — Tier 1 (primary text).\n16. Thomas Carlyle, *History of Friedrich II of Prussia, Volume 18* (Battle of Kolin; \"the 'oblique order of attack,' Friedrich's favorite mode\"; \"there is nothing that you could think of calling a Hill, though many Books (and even Friedrich's Book) rashly say otherwise\"; \"Friedrich did not stand anywhere: 'oftenest in the thick of the fire,' say those who saw\"). Project Gutenberg eBook #2118. https://www.gutenberg.org/files/2118/2118-h/2118-h.htm — Tier 1 (primary text).\n17. Thomas Carlyle, *History of Friedrich II of Prussia, Volume 18* (Battle of Leuthen; \"Church and Churchyard especially are a citadel of death... moments are inestimable\"; Major Möllendorf, \"No time this for study,\" \"EIN ANDRER MANN (Follow me, whoever is a man)!\"; \"nine muskets blazing on him through it\"). Project Gutenberg eBook #2118. https://www.gutenberg.org/files/2118/2118-h/2118-h.htm — Tier 1 (primary text).\n18. Thomas Carlyle, *History of Friedrich II of Prussia, Volume 18* (Battle of Zorndorf; \"Russian Minotaur scrutinizing him in that manner with dull bloodshot eyes\"; \"Minotaur walking off on his own feet, after all. It was the bloodiest battle of the Seven-Years War; one of the most furious ever fought; such rage possessing the individual elements; rage unusual in modern wars\"). Project Gutenberg eBook #2118. https://www.gutenberg.org/files/2118/2118-h/2118-h.htm — Tier 1 (primary text).\n19. Thomas Carlyle, *History of Friedrich II of Prussia, Volume 18* (Battle of Zorndorf; the brandy-casks, \"soldiers flap down to drink it from the puddles; furiously remonstrate with their officers, and 'kill a good many of them' (VIELE, says Tielcke)... 'A frightful blood-bath,' by all the Accounts: blood-bath, brandy-bath, and chief Nucleus of Chaos then extant aboveground\"). Project Gutenberg eBook #2118. https://www.gutenberg.org/files/2118/2118-h/2118-h.htm — Tier 1 (primary text).\n20. Thomas Carlyle, *History of Friedrich II of Prussia, Volume 18* (Battle of Prague; death of Schwerin, \"fiery as ever, at the age of 73... in many battles, from Blenheim onwards; and now has got to his hottest and his last\"; \"Seizes the colors, fiery old man: 'HERAN, MEINE KINDER (This way, my sons)!'... Five bits of grape-shot, deadly each of them, at once hit the old man; dead he sinks there on his flag; and will never fight more. 'HERAN!' storm the others with hot tears; Adjutant von Platen takes the flag; Platen, too, is instantly shot; but another takes it\"). Project Gutenberg eBook #2118. https://www.gutenberg.org/files/2118/2118-h/2118-h.htm — Tier 1 (primary text)."}, {"order": 5, "file": "05_Themes_Ideology.md", "title": "Themes and Ideology", "summary": "", "body": "# Themes and Ideology\n\n## Bottom Line\n\nCarlyle's *History of Friedrich II of Prussia* (1858-1865) is the late, hardened terminus of a single lifelong argument: that the universe is morally governed, that \"Lying is not permitted in this Universe\" [1], and that the only remedy for an age of shams is the rule of the genuine man. By the time Carlyle reached Friedrich, the hero he needed was no longer the literary prophet of his earlier essays but, in Timothy Hochstrasser's words, \"the political despot who compels rather than persuades\" [2] — Frederick posited against democracy, industrialisation, and liberal \"cant\" [2]. The book's deepest themes are continuous with *On Heroes, Hero-Worship, and the Heroic in History* (1841) and with *Past and Present* (1843): the conviction that \"Universal History... is at bottom the History of the Great Men who have worked here\" [7]; the gospel that \"there is a perennial nobleness, and even sacredness, in Work\" [8] and that \"Labour is Life\" [8]; contempt for the \"Bankrupt Century\" and its Dryasdust historians; the \"Eternal Veracities\" of a justice-bearing history; and the construction of Prussia as a Genesis-like world made by drill and war, with the Hohenzollerns named in Carlyle's own text as \"the Authors of Prussia, without whom Prussia had never been\" [5]. Read with Chris Vanden Bossche, the whole vast narrative is also a covert family romance, in which Frederick, Friedrich Wilhelm I, and Voltaire re-stage Carlyle, his father James, and Goethe [4]. The ideology is coherent, sincerely held, and — in its worship of compulsion over consent — genuinely disturbing.\n\n## The Governing Ideas\n\nThe hero-figure, first of all, has migrated across Carlyle's career from the literary prophet to the compelling despot, and Friedrich is its endpoint. Hochstrasser traces the arc precisely: in the 1820s \"Goethe then is interpreted as the embodiment of how this is to be done, and becomes Carlyle's own model\"; \"Here in Goethe is the origin of the 'hero' figure or prophet, originally restricted to literary or philosophical figures and only later turned to political ends (and losing its plasticity of embodiment along the way)\" [2]. The terminus is explicit: \"in later years the despotic monarch is alone considered sufficient to oppose democracy, industrialisation and liberal cant. In the unlikely but necessary figure of 'Frederick' the hero becomes a figure capable of resisting the contemporary forces that Carlyle laments. His concept of the hero-figure turns from the literary (Goethe) to the political despot who compels rather than persuades: for only such a person can command and re-direct the 'signs of the times'\" [2]. The doctrine the *Frederick* applies is the one Carlyle had stated twenty years earlier as a flat axiom: \"Universal History, the history of what man has accomplished in this world, is at bottom the History of the Great Men who have worked here\" [7]. What changed was not the axiom but the kind of \"Great Man\" — from the poet-prophet who works by example to the king who works by command. (This is Hochstrasser's reading; the migration itself is visible in the text.)\n\nFrederick earns hero status not as a paragon but as \"a Reality\" in an age of phantasms — defined not by virtue but by veracity. In the Proem, Carlyle concedes Friedrich \"is by no means one of the perfect demigods\" and that \"there are various things to be said against him with good ground,\" yet rests the case on one feature: \"That in his way he is a Reality; that he always means what he speaks; grounds his actions, too, on what he recognizes for the truth; and, in short, has nothing whatever of the Hypocrite or Phantasm. Which some readers will admit to be an extremely rare phenomenon\" [1]. He adds that \"this man was far indeed from trying to deal swindler-like with the facts around him; that he honestly recognized said facts wherever they disclosed themselves, and was very anxious also to ascertain their existence where still hidden\" [1]. The valuation is identical to the one Carlyle had made the cornerstone of the hero in 1841: \"Sincerity, a deep, great, genuine sincerity, is the first characteristic of all men in any way heroic\" [7]. Heroism is congruence between word, act, and fact — the antithesis of the \"Phantasm.\" (Primary text; the *On Heroes* parallel is verified.)\n\nThe Eighteenth Century is the Sham against which the hero is measured, so that Frederick's greatness is relative to the corruption of his age. Carlyle calls it \"A Century so opulent in accumulated falsities,—sad opulence descending on it by inheritance, always at compound interest\" [1], a \"Century spendthrift, fraudulent-bankrupt; gone at length utterly insolvent, without real MONEY of performance in its pocket.\" The verdict is total: \"To me the Eighteenth Century has nothing grand in it, except that grand universal Suicide, named French Revolution, by which it terminated its otherwise most worthless existence with at least one worthy act\" [1]. Against this backdrop the Revolution is paradoxically welcome, because it destroys \"Sham Kingship\": Carlyle says he believes \"both that Real Kingship is eternally indispensable, and also that the destruction of Sham Kingship (a frightful process) is occasionally so\" [1]. The corruption is figured not as wickedness but as forgery — money \"without real MONEY of performance\" — which makes the hero a kind of bullion against paper. (Primary text.)\n\nThe cosmos, in turn, is morally governed — \"Lying is not permitted in this Universe.\" The metaphysical floor of the whole book is a justice immanent in history, the \"Eternal Veracities.\" Carlyle states it as a quoted revelation: \"Lying is not permitted in this Universe. The wages of lying, you behold, are death. Lying means damnation in this Universe; and Beelzebub, never so elaborately decked in crowns and mitres, is NOT God!\" He glosses it: \"This was a revelation truly to be named of the Eternal, in our poor Eighteenth Century\" [1]. The companion image is permanence: \"Only what of the Past was TRUE will come back to us. That is the one ASBESTOS which survives all fire\" [1] — truth as the incombustible residue history cannot consume. Frederick's distinction is that he intuited this law: he \"knew well, to a quite uncommon degree... how entirely inexorable is the nature of facts\" [1]. The order of facts is the order of God. (Primary text.)\n\nFrom this follows the gospel of action over letters, in which the *Art of War* is the only writing Carlyle credits. Frederick was a prolific author — poems, histories, philosophy, the *Anti-Machiavel* — nearly all of which Carlyle dismisses. Vanden Bossche notes the exception pointedly: \"the only work of all Frederick's writings that Carlyle regards as having any merit is his *Art of War*\"; \"he emerges as a hero precisely because he is the one man of action in a 'Writing Era'\" [4]. The text confirms the valuation in its own idiom: there was \"an Art of War, grounded on veracity and human courage and insight, not upon Drawcansir rodomontade, grandiose Dick-Turpinism, revolutionary madness, and unlimited expenditure of men and gunpowder\" [1]. Carlyle sharpens the contrast against Napoleon: \"Napoleon did indeed, by immense expenditure of men, and gunpowder, overrun Europe for a time,\" but he never \"defended a little Prussia against all Europe, year after year for seven years\" [1], and \"the battle of Leuthen... may very well hold up its head beside any victory gained by Napoleon\" [1]. Doing, not writing, is the proof of the man; the *Art of War* qualifies because it is the codification of action, not a substitute for it. (Vanden Bossche's reading, plus primary text.)\n\nBound up with this is Carlyle's praise of silence, the \"Tobacco-Parliament,\" and his contempt for Dilettantism and speech: the hero is taciturn, and talk is suspect. Vanden Bossche observes that Friedrich Wilhelm, \"Disdaining talk... holds 'Tabagies'—'Tobacco-Parliaments,' not speech-making parliaments\" [4] — the anti-parliament of doers. Carlyle's own portrait of the father makes silence a form of genius: \"Strange as it sounds in the Republic of Letters, we are tempted to call Friedrich Wilhelm a man of genius;—genius fated and promoted to work in National Husbandry, not in writing Verses or three-volume Novels. A silent genius\" [3]. Carlyle's contempt for the merely literary and antiquarian-pedantic surfaces in the recurring figure of \"Dryasdust\": \"the Prussian Dryasdust, otherwise an honest fellow, and not afraid of labor, excels all other Dryasdusts yet known\" [1], producing \"Books born mostly of Chaos\" that \"are a painful object\" [1]. He ventriloquises the complaint through his persona Sauerteig: it is \"frightful to see the *Gelehrte Dummkopf* [DRYASDUST] doing the function of History, and the Shakspeare and the Goethe neglecting it\" [1]. (The \"silence vs. speech\" contrast is the structuring one Vanden Bossche draws, and the primary text supplies the \"silent genius\" valuation directly.)\n\nBeneath the politics runs a father-son dialectic — Frederick / Friedrich Wilhelm / Voltaire mapping onto Carlyle / James Carlyle / Goethe — which Vanden Bossche reads as a displaced autobiography of authority. The triad is explicit: \"So the triad of son, father, and godfather — Carlyle, James Carlyle, and Goethe — this time becomes Frederick, Friedrich Wilhelm, and Voltaire\" [4]. The plot is the son's painful passage from the seductive \"intellectual father\" (Voltaire / Goethe, French frivolity, letters) to identification with the harsh biological father (Friedrich Wilhelm / James Carlyle, German solidity, work): \"Like all sons, Carlyle and Frederick seek to become paternal authorities themselves,\" and before long Frederick \"is performing his duties like 'Papa's second self'\" [4]. The resolution is conservative: \"Frederick cannot obtain authority through rebellion but only through submitting to the law as laid down by his father,\" and \"Frederick, now truly become his father's 'second self,' banishes Voltaire's French frivolity from his court\" [4]. The narrative runs \"in terms of a dialectic between German culture, identified with Friedrich Wilhelm, and French culture, identified with Voltaire and the philosophes: between masculinity... and femininity... between Lutheran orthodoxy and freethinking heterodoxy, the Spartan and the Athenian\" [4]. (This is Vanden Bossche's interpretation, labelled as such.)\n\nThe largest theme is nation-building as Genesis-like world-making — the Hohenzollerns as \"the Authors of Prussia.\" Prussia is not found but made, and its makers are the dynasty. In the birth chapter Carlyle calls them \"the Hohenzollern lineage, which has flourished here with such beneficent effect for three centuries now, and been in truth the very making of the Prussian Nation\" [5]. He names them, elsewhere in the same History, in the exact phrase the corpus had earlier treated only as paraphrase: there is \"no part of the Prussian Dominion more loyal to the Hohenzollerns (who are the Authors of Prussia, without whom Prussia had never been)\" [5] — *Authors* in the strong sense, makers of a thing that would not otherwise exist. Vanden Bossche reads the same phrase as the moral hinge of the family romance: \"It is not by imitating Voltaire, the author of farces, that Frederick becomes 'Vater Fritz,' but by imitating Friedrich Wilhelm, one of 'the Authors of Prussia'\" [4], and he generalises the method: \"Battle, both literal and figurative, is Carlyle's principal metaphor for the work of creating the Prussian nation\" [4]. The making is depicted as a slow, near-divine reclamation out of chaos: of the early struggles Carlyle writes, \"So many years men fought and planned and struggled there, all forgotten now except by the gods; and silently gave away their life, before those countries could become fencible and habitable\" [5]. (The \"Authors of Prussia\" phrase is now verified verbatim in the primary text — see Open Questions, resolved.)\n\nThe book was written, finally, as a prophet's \"message of good\" against democracy. Stewart's Edinburgh thesis frames the work's purpose ideologically. *Frederick* \"was his last major work. Carlyle had a specific purpose in mind when he began writing Frederick. He believed that contemporary events had left Europe in disarray and the British nation fragmented. In his view, the nation needed to function as a family unit, with the older, more experienced members of the group instructing and educating the young\" [6]. The earlier *Latter-Day Pamphlets* had pressed the same lesson —
