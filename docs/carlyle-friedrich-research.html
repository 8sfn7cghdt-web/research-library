tion,\" \"the greatest of all Persifleurs,\" and \"a terrible lack of earnestness\" — quoted as reported, not independently verified against the primary essay. Bibliographic confirmation of the essay (Foreign Review, 4, 1829, 97–141) cross-checked via the Routledge/Taylor & Francis Carlyle reception volume listing.\n7. Holloway, John. *The Victorian Sage: Studies in Argument* (London: Macmillan, 1953), chapter on Carlyle. — Tier 2 (secondary scholarship). Cited for the reading of the *History* as sustained \"sage\" argument organized around moral antithesis rather than as military chronicle.\n8. Rosenberg, John D. *Carlyle and the Burden of History* (Oxford: Clarendon Press, 1985); and Vanden Bossche, Chris R., *Carlyle and the Search for Authority* (Columbus: Ohio State University Press, 1991). — Tier 2 (secondary scholarship). Cited for the critical consensus that the *History*'s organizing energy is the Reality-versus-Sham antithesis embodied in the contrast between Friedrich and Voltaire/the Enlightenment."}, {"order": 7, "file": "07_Career_Historiography.md", "title": "Place in Carlyle's Career and in Victorian Historiography", "summary": "", "body": "# Place in Carlyle's Career and in Victorian Historiography\n\n## Bottom Line\n\n*Friedrich* is the terminus of a thirty-year arc that runs from revolutionary sympathy through hero-worship to a strained, archive-bound authoritarian historiography. Carlyle began as the man who made the French Revolution \"a song\" of popular convulsion (1837), theorized the hero as the engine of history (1841), diagnosed the cash-nexus and called for heroic governance (1843), and resurrected Cromwell from the dust-heaps of Puritan record (1845); *Friedrich* is the place where that program is both completed and worn out, the hero now an absolute monarch and the historian now buried thirteen years deep in \"Prussian Dryasdust.\" His theory was fixed long before the histories: in \"On History\" (1830) \"History is the essence of innumerable Biographies\" [2]; in \"Biography\" (1832) he quotes himself — \"'History,' it has been said, 'is the essence of innumerable Biographies'\" — and adds that this is what history \"should be: whether it is, might admit of question\" [26]; in *On Heroes* (1841) the slogan hardens into \"Universal History... is at bottom the History of the Great Men who have worked here\" [1]. *Friedrich* enacts that doctrine at maximal labor and diminishing belief, and it even reanimates Carlyle's old fictional aesthetician \"Sauerteig\" — last heard from in \"Biography\" — to pronounce, from inside the Prussian archive, that \"All History is an imprisoned Epic, nay an imprisoned Psalm and Prophecy,\" which the historian has failed to \"DISimprison\" [27]. Across the same span the discipline moved the other way: toward the impersonal, source-critical, \"scientific\" history of Ranke and the sociological determinism of Herbert Spencer — \"Before he can remake his society, his society must make him\" [3] — and toward the moral-juridical history of Lord Acton, who in 1880 called Carlyle \"the most detestable of historians\" and \"the doctrine of heroes, the doctrine that will is above law,\" an \"atrocity\" [28]. *Friedrich* therefore stands as the grandest and last monument of a kind of history the next generation of professionals was already abandoning, even as Carlyle's prophetic-narrative voice fed the Victorian sage line of Ruskin, Arnold, Emerson, and his disciple-biographer Froude — and survived, against the scientists, in G. M. Trevelyan's twentieth-century defense of \"the art of narrative\" as \"the bed rock\" of history [29].\n\n## The Argument in Brief\n\n*Friedrich* is the last and largest term in a four-work sequence that moves from revolution to hero-worship to heroic governance to documentary resurrection. Carlyle's major prose between 1837 and 1845 forms a recognizable progression, and *Friedrich* (1858-65) is its capstone. *The French Revolution: A History* (1837) is a history of a popular cataclysm with, as yet, no presiding hero to redeem it; *On Heroes, Hero-Worship, and the Heroic in History* (1841) supplies the theory of the redemptive individual; *Past and Present* (1843) applies that theory to the present industrial crisis and demands heroic leadership; *Oliver Cromwell's Letters and Speeches* (1845) is the first full-dress attempt to recover an actual historical hero from the records; and *Friedrich* is the second, vaster, and final such attempt [4]. Stewart's 2010 Edinburgh study frames *Friedrich* squarely as Carlyle's \"last major work,\" undertaken because Carlyle \"believed that contemporary events had left Europe in disarray and the British nation fragmented\" and needed instruction from \"older, more experienced members\" — a continuation of the corrective purpose of the *Latter-Day Pamphlets* (1850) by gentler means after that book \"failed, largely due to their aggressive tone\" [4]. This is the established scaffolding: *Friedrich* is not a fresh departure but the exhaustion of a long-running project. (The scaffolding is Stewart's and established; the \"exhaustion\" reading is inference, developed below.)\n\nAcross that span the arc moves from sympathy with revolutionary energy to the celebration of authority and command. In 1837 Carlyle treated the Revolution as a vast, terrible, and partly just judgment — what he calls in *Friedrich*'s own retrospect \"that grand universal Suicide, named French Revolution\" [5]. John Stuart Mill's review captured the early book's character — it was received, in the formulation Carlyle's contemporaries echoed, less as a history than as \"an epic poem\" [6]. By 1841 the emphasis has shifted decisively to the individual who masters chaos: \"Universal History, the history of what man has accomplished in this world, is at bottom the History of the Great Men who have worked here,\" and \"Society is founded on Hero-worship\" [1]. By 1843 the hero has become a governing necessity: against \"Midas-eared Mammonism\" and the doctrine of \"Cash-payment for the sole nexus,\" Carlyle demands real captains and a real aristocracy [7]. And by 1858 the chosen exemplar is no tribune of the people but an absolute king — Friedrich, \"the last of the old Gods,\" \"the last of the Kings,\" who \"ushers in the French Revolution, and closes an Epoch of World-History\" [5][8]. The trajectory from the crowd of 1837 to the crowned individual of 1858 is the spine of his career — established, though the political reading is contested.\n\nCarlyle's theory of history — biography of great men, distrust of abstraction, war on Dryasdust — is stated early and enacted in *Friedrich*. The theory predates all the histories. In \"On History\" (*Fraser's Magazine*, 1830) Carlyle wrote: \"Social Life is the aggregate of all the individual men's Lives who constitute society; History is the essence of innumerable Biographies\" [2]. The essay opens by making history coeval with thought itself — \"History, as it lies at the root of all science, is also the first distinct product of man's spiritual nature; his earliest expression of what can be called Thought\" — and democratizes the historian's office: \"A talent for History may be said to be born with us, as our chief inheritance. In a certain sense all men are historians\" [30]. He distrusted history written as a chain of philosophical causes — \"Narrative is linear, Action is solid\" [9] — and doubted the very possibility of the abstracting historian: \"if History is Philosophy teaching by Experience, the writer fitted to compose History is hitherto an unknown man\" [10]. *On Heroes* hardened the doctrine into the slogan later generations would quote against him: \"The History of the World... was the Biography of Great Men\" [1]. *Friedrich* is the doctrine carried out at maximum scale and maximum cost: a six-volume biography offered as the essence of an age, written in deliberate opposition to \"the 'Dryasdust' approach to historiography that he repeatedly criticised\" [4].\n\n*Friedrich* is, more contentiously, the culmination AND the exhaustion of the hero-worship project. This is the central interpretive claim, and the strongest version of it belongs to Vanden Bossche. He reads *Friedrich* as the point where the heroic vision turns mournful and self-limiting: Carlyle \"proclaims from the start\" that he has \"renounce[d] ideals\" and will \"take-up with the mournfullest barren realities,\" so that hero-worship is transformed \"from idealistic vision into grim historical realism\" [11]. The text bears him out almost word for word. In Book I Carlyle writes: \"We must renounce ideals. We must sadly take up with the mournfulest barren realities;—dismal continents of Brandenburg sand, as in this instance; mere tumbled mountains of marine-stores, without so much as an Index to them!\" [27]. The book becomes, in Vanden Bossche's phrase, \"a non-epic history of the creation of an epic nation,\" which suggests \"the heroic project itself has become impossible in modern conditions\" [11]. Friedrich earns heroism paradoxically — \"because he is the one man of action in a 'Writing Era'\" — and only by submission to paternal law: he \"cannot obtain authority through rebellion but only through submitting to the law as laid down by his father,\" becoming \"Papa's second self\" [11]. The reading that *Friedrich* both completes and uses up the hero-worship program is therefore well-grounded in scholarship and corroborated by the primary text, but the causal claim about *why* it happened remains interpretation, not fact — contested inference, with Vanden Bossche its best authority and the \"renounce ideals\" sentence its primary anchor.\n\nThe thirteen-year labor is itself the evidence of strain: the war on Dryasdust became captivity to Dryasdust. Carlyle planned four volumes and ended with six (eleven \"books\"), working from 1851/1854 to 1865, building a soundproof room at Cheyne Row and making two research trips to Germany [4][12]. Stewart records that he was \"still some six months away from finishing it\" as late as autumn 1864, and reported the work going \"very slow[ly]\" [12]. The labor produced not exhilaration but the famous complaints about the records. In *Friedrich* itself Carlyle wrote that he had to \"own, it proves difficult beyond conception,\" and arraigned \"The Prussian Dryasdust, otherwise an honest fellow,\" who \"excels all other Dryasdusts yet known\" and has made of the history \"a wide-spread, inorganic, trackless matter; dismal to your mind, and barren as a continent of Brandenburg sand!\" [13]. The irony is exact: the *Cromwell* of 1845 had already declared war on Dryasdust — \"O Dryasdust, my voluminous friend... you should have sifted those old stacks of pamphlet-matter for us\" — promising to rescue \"a divine Heroism\" from those who \"smother it well in human Dulness\" [14]. By *Friedrich* the rescuer is himself half-buried: he can only conjure his old aesthetician Sauerteig to declare that \"All History is an imprisoned Epic, nay an imprisoned Psalm and Prophecy\" — and then confess, \"I wish, from my soul, he had DISimprisoned it in this instance!\" [27]. (That the labor was extraordinary is established; the \"captivity\" framing is inference.)\n\nContemporary reception was respectful and elegiac — the grandest of his works, and the end of his career. The completed *Friedrich* \"never received the acclaim of his earlier productions but was regarded by many as a marker which signalled the end of Carlyle's long and illustrious literary career\" [4]. Stewart finds \"an elegiac tone to several of these final reviews,\" reviewers sensing that the last volumes \"had signalled the end of Carlyle's long and illustrious literary career\" [15]. The subject itself was a liability: Friedrich \"was not admired by all,\" and Macaulay had \"recently revealed\" Friedrich Wilhelm to be \"a monstrous individual,\" so \"Carlyle's choice of Frederick as a model for British readers to follow was always going to be problematic\" [4][16]. Even so, the work restored his standing: Vanden Bossche calls it \"a prodigy of scholarship and a heroic act of writing\" that \"helped restore Carlyle's reputation as an historian and a man of letters,\" and notes it \"created still less controversy than the Life of John Sterling\" [17]. Froude — Carlyle's disciple and biographer — pronounced it \"the grandest of his works\" [18].\n\nThe discipline, meanwhile, moved the other way: Carlyle was rejected by scientific, Rankean history and by sociological determinism. While he labored, professional historiography was turning toward the impersonal and the source-critical. Rankean \"scientific history\" was uncongenial to Carlyle's partisan, visionary mode — Ranke's school \"rejected the kind of history practiced by Carlyle\" for, among other things, \"using history to fight his own battles\" [19]. The most direct repudiation came from Herbert Spencer in *The Study of Sociology*, who answered the great-man thesis head-on: \"You must admit that the genesis of a great man depends on the long series of complex influences which has produced the race in which he appears, and the social state into which that race has slowly grown.... Before he can remake his society, his society must make him\" [3]. Spencer held the men Carlyle called great to be \"merely products of their social environment\" and the great-man view \"unscientific\" [19]. Tolstoy's *War and Peace* made the literary version of the same case, treating great individuals as \"history's slaves\" whose significance is \"imaginary\" [20]. The verdict of the new social and scientific history was that Carlyle's method asked the wrong question. (That these rebuttals exist and target Carlyle is established; the strength of each is matter for other documents.)\n\nLord Acton supplies the sharpest contemporary rejection — and aims it directly at *Friedrich* and at the great-man creed. Acton is the decisive witness for the moral-juridical case against Carlyle, and his hostility crystallized around *Friedrich*. Of the early volumes he wrote: \"Carlyle's two volumes are crowded with grotesque eloquence, but they make him smaller in my eyes (nothing could make him worse)\" [31]. The general verdict is more sweeping and more famous: \"Excepting Froude, I think him the most detestable of historians. The doctrine of heroes, the doctrine that will is above law, comes next in atrocity to the doctrine that the flag covers the goods, that the cause justifies its agents, which is what Froude lives for\" [28]. Acton, whose own creed was that \"power tends to corrupt\" and that the historian must hold men to a fixed moral law, located in *Friedrich* exactly the heresy he most opposed: the elevation of the strong individual above judgment. He also fingered the German source of Carlyle's reputation — \"The Germans love him because he is an echo of the voices of their own classic age\" [28] — a thrust that doubles as a comment on what the German archive had made of him. This is established as Acton's own verbatim opinion; its justice is a separate question. (The quotations are verified primary text from Acton's letters.)\n\nCarlyle's narrative method nonetheless survived the scientists: Trevelyan rebuilt history as a literary art on Carlylean foundations. The rejection was not total. The literary-narrative conception of history that *Friedrich* embodied was defended into the twentieth century, most influentially by G. M. Trevelyan — grand-nephew of Macaulay and a working historian — whose \"Clio, a Muse\" (1913) is a manifesto against the \"scientific\" school that had dismissed Carlyle. Trevelyan held that \"the value of history is not scientific. Its true value is educational,\" and that \"the analogy of physical science has misled many historians during the last thirty years right away from the truth about their profession\" [29]. His positive doctrine restores precisely Carlyle's emphasis: \"the art of history remains always the art of narrative. That is the bed rock\" [29]. And he names Carlyle as the supreme practitioner of the resurrectionist art the document above describes: \"the art of making our ancestors live again in modern narrative. Carlyle, at his rare best, could do it\" — citing the chapter \"The Steeples at Midnight\" in *The French Revolution* as a passage \"true in effect\" even where it may not be \"entirely accurate in detail\" [29]. Carlyle's posthumous fate is thus split clean: rejected as a theorist of causation and command, retained as the model of history written as living narrative. (The Trevelyan quotations are verified verbatim.)\n\n## The Career Arc: From the Revolution to the King\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 372\" role=\"img\" aria-label=\"A rising arc of Carlyle's four major works plotted against his deepening investment in authority. The French Revolution (1837) sits lowest, themed 'revolution, sympathy with the crowd'; On Heroes (1841) rises to 'hero-worship, the prophet-hero'; Past and Present (1843) rises further to 'heroic governance'; Friedrich (1858-65) reaches the apex, themed 'the despot who compels', but is drawn cracked to mark it as culmination and exhaustion at once. A diverging dashed line falls away to the lower right, labelled the scientific Rankean history that rejected Carlyle, with Acton's verdict 'the most detestable of historians'. A second dashed branch continues up from Friedrich, labelled the survival of narrative history in Trevelyan.\">\n<text x=\"350\" y=\"28\" text-anchor=\"middle\" font-size=\"14\" class=\"t-serif\" letter-spacing=\"2\">REVOLUTION TO EXHAUSTION<\/text>\n<text x=\"350\" y=\"46\" text-anchor=\"middle\" font-size=\"10.5\" class=\"t-muted\" font-style=\"italic\">four works, thirty years &#8212; the hero migrates from prophet to despot, and the method reaches its limit<\/text>\n<text x=\"34\" y=\"120\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\" transform=\"rotate(-90 34 175)\">investment in AUTHORITY &#8594;<\/text>\n<line x1=\"60\" y1=\"252\" x2=\"60\" y2=\"92\" class=\"ln-soft\" stroke-width=\"1\"/>\n<line x1=\"60\" y1=\"252\" x2=\"650\" y2=\"252\" class=\"ln\" stroke-width=\"1.3\"/>\n<path d=\"M92,228 Q150,196 191,156 C 300,120 410,108 470,108\" fill=\"none\" style=\"stroke:var(--accent)\" stroke-width=\"2.6\"/>\n<circle cx=\"92\" cy=\"228\" r=\"6\" style=\"fill:var(--t1)\"/>\n<text x=\"92\" y=\"270\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">The French Revolution<\/text>\n<text x=\"92\" y=\"282\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">1837<\/text>\n<text x=\"92\" y=\"208\" text-anchor=\"middle\" font-size=\"8.3\" class=\"t-muted\" font-style=\"italic\">revolution &#183; the<\/text>\n<text x=\"92\" y=\"218\" text-anchor=\"middle\" font-size=\"8.3\" class=\"t-muted\" font-style=\"italic\">crowd&#8217;s energy<\/text>\n<circle cx=\"191\" cy=\"156\" r=\"6\" style=\"fill:var(--t2)\"/>\n<text x=\"191\" y=\"296\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">On Heroes<\/text>\n<text x=\"191\" y=\"308\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">1841 &#183; hero-worship<\/text>\n<line x1=\"191\" y1=\"162\" x2=\"191\" y2=\"288\" class=\"ln-soft\" stroke-width=\"0.8\"/>\n<text x=\"191\" y=\"138\" text-anchor=\"middle\" font-size=\"8.3\" class=\"t-muted\" font-style=\"italic\">the prophet-hero<\/text>\n<circle cx=\"280\" cy=\"128\" r=\"6\" style=\"fill:var(--t2)\"/>\n<text x=\"280\" y=\"270\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\">Past and Present<\/text>\n<text x=\"280\" y=\"282\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">1843 &#183; heroic governance<\/text>\n<line x1=\"280\" y1=\"134\" x2=\"280\" y2=\"262\" class=\"ln-soft\" stroke-width=\"0.8\"/>\n<polygon points=\"470,108 478,100 472,114 484,108 474,120 488,118 470,134 458,120 466,118 456,112 468,114 462,100\" style=\"fill:var(--t4);stroke:var(--accent)\" stroke-width=\"1.2\"/>\n<text x=\"470\" y=\"92\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"bold\" class=\"t-acc\">Friedrich<\/text>\n<text x=\"470\" y=\"156\" text-anchor=\"middle\" font-size=\"8.5\" class=\"t-muted\">1858&#8211;65<\/text>\n<text x=\"470\" y=\"290\" text-anchor=\"middle\" font-size=\"8.7\" class=\"t-serif\" style=\"fill:var(--t3)\">culmination AND exhaustion<\/text>\n<text x=\"470\" y=\"304\" text-anchor=\"middle\" font-size=\"8.3\" class=\"t-muted\" font-style=\"italic\">&#8220;the despot who compels rather than persuades&#8221;<\/text>\n<line x1=\"470\" y1=\"160\" x2=\"470\" y2=\"280\" class=\"ln-soft\" stroke-width=\"0.8\"/>\n<path d=\"M300,150 C 420,180 520,210 600,238\" fill=\"none\" class=\"s-t1\" stroke-width=\"1.6\" stroke-dasharray=\"5 4\"/>\n<polygon points=\"596,231 606,240 593,242\" class=\"f-t1\"/>\n<text x=\"612\" y=\"226\" text-anchor=\"end\" font-size=\"8.3\" class=\"t-muted\">the discipline diverges &#8594;<\/text>\n<text x=\"612\" y=\"238\" text-anchor=\"end\" font-size=\"8.3\" class=\"t-muted\">Ranke&#8217;s source-critical science;<\/text>\n<text x=\"612\" y=\"250\" text-anchor=\"end\" font-size=\"8.3\" class=\"t-muted\" font-style=\"italic\">Acton: &#8220;the most detestable of historians&#8221;<\/text>\n<path d=\"M484,104 C 540,96 580,92 626,86\" fill=\"none\" class=\"s-t5\" stroke-width=\"1.6\" stroke-dasharray=\"5 4\"/>\n<polygon points=\"622,90 632,85 623,82\" class=\"f-t5\"/>\n<text x=\"632\" y=\"78\" text-anchor=\"end\" font-size=\"8.3\" style=\"fill:var(--t5)\">narrative history survives<\/text>\n<text x=\"632\" y=\"68\" text-anchor=\"end\" font-size=\"8.3\" class=\"t-muted\">&#8594; rebuilt by Trevelyan<\/text>\n<line x1=\"60\" y1=\"330\" x2=\"650\" y2=\"330\" class=\"ln-soft\" stroke-width=\"1\"/>\n<text x=\"350\" y=\"354\" text-anchor=\"middle\" font-size=\"10\" class=\"t-muted\" font-style=\"italic\">The same arc that perfects hero-worship exhausts it &#8212; and the &#8220;war on Dryasdust&#8221; ends in captivity to Dryasdust.<\/text>\n<\/svg>\n<figcaption><strong>Fig. 5.<\/strong> <em>Friedrich<\/em> is both the summit and the breaking-point of a single thirty-year project: the arc climbs from revolutionary sympathy (1837) through hero-worship (1841) to heroic governance (1843), and in <em>Friedrich<\/em> reaches its apex as authoritarian narrative even as it cracks under thirteen years of archive &#8212; while the discipline itself diverged toward Ranke&#8217;s science (Acton&#8217;s &#8220;most detestable of historians&#8221;), the narrative art surviving only in heirs like Trevelyan.<\/figcaption>\n<\/figure>\n\n\nThe shape of Carlyle's career is most legible if one reads *Friedrich* backward from its own retrospective sentences. When Carlyle, in the first volume, looks across the eighteenth century, he sees a \"Century spendthrift, fraudulent-bankrupt; gone at length utterly insolvent, without real MONEY of performance in its pocket\" — a \"swindler-century\" whose one grand event was \"that grand universal Suicide, named French Revolution\" [5]. This is the same Revolution he had narrated in 1837 as judgment and song; but where the earlier book had let the convulsion stand more or less alone — Emerson thought it revealed \"an imagination such as never rejoiced before the face of God, since Shakespeare,\" and Mill called it less a history than an epic poem [6][21] — the later Carlyle reads the whole age as an indictment that only a genuine man could redeem. Friedrich is that man: \"in his way he is a Reality... has nothing whatever of the Hypocrite or Phantasm\" [22], \"the last of the old Gods\" [8], and \"hitherto the last of the Kings\" [5].\n\nBetween these two books lies the theoretical turn of *On Heroes* (1841). The doctrine is announced in the first lecture with the confidence of revelation: \"Universal History, the history of what man has accomplished in this world, is at bottom the History of the Great Men who have worked here.\" \"Society is founded on Hero-worship.\" \"No sadder proof can be given by a man of his own littleness than disbelief in great men.\" \"The History of the World... was the Biography of Great Men\" [1]. The final lecture supplies the political conclusion of the whole course. \"The Hero as King\" defines the king by etymology — \"King, *Konning*, which means *Can*-ning, Able-man\" [32] — and erects from that pun the most absolute statement of Carlyle's political program: \"Find in any country the Ablest Man that exists there; raise *him* to the supreme place, and loyally reverence him: you have a perfect government for that country; no ballot-box, parliamentary eloquence, voting, constitution-building, or other machinery whatsoever can improve it a whit\" [33]. The \"Divine right of Kings\" he discards as \"Polemic stuff of a dead century,\" only to restore it for the genuine article: \"Find me the true *Konning*, King, or Able-man, and he *has* a divine right over me\" [34]. *Friedrich* is the test case of this doctrine carried out on a real and inconvenient eighteenth-century monarch — the Able-man not imagined but documented, and documented warts and all.\n\n*Past and Present* (1843) brings the doctrine down to earth and to England, setting the heroic ideal against the \"Gospel of Mammonism\" — against \"Midas-eared Mammonism, double-barreled Dilettantism\" and the reduction of human bond to \"Cash-payment for the sole nexus,\" which \"were not, are not, and will never be, a practicable Law of Union for a Society of Men\" [7]. The hero, in 1843, becomes a political demand: real captains of industry, a real aristocracy of talent and duty. The continuity with *On Heroes* is exact — the cash-nexus is named in the Lecture VI vocabulary of forged bank-notes (\"they are all as bank-notes, these social dignitaries, all representing gold;—and several of them, alas, always are *forged* notes\") [35] — and the continuity with *Friedrich* is structural: the king who \"ushers in the French Revolution\" is the last Able-man before the forged notes brought down the wall.\n\n*Oliver Cromwell's Letters and Speeches* (1845) is the hinge between theory and the practice of *Friedrich*. Here, for the first time, Carlyle undertakes to disinter an actual hero from the wreck of the record. The \"Anti-Dryasdust\" introduction is the manifesto of the method: the \"Age of Cromwell and his Puritans\" lies \"all vanquished, overwhelmed under such waste lumber-mountains, the wreck and dead ashes of some six unbelieving generations\" [14]; the records have become \"a wide-spread inarticulate slumberous mumblement, issuing as if from the lake of Eternal Sleep\" [14]; and Dryasdust, \"my voluminous friend,\" has performed the crime of historiography — \"Given a divine Heroism, to smother it well in human Dulness, to touch it with the mace of Death, so that no human soul shall henceforth recognise it for a Heroism\" [14]. The historian's task, on this view, is resurrection: to separate what is still alive for us from what \"moulders safe underground.\" *Friedrich* is the second performance of that resurrection, on a subject vastly more documented and far less congenial — and it is the performance in which the resurrectionist openly doubts the resurrection.\n\n## Theory and Practice of History\n\nCarlyle's theory of history is consistent from 1830 to 1865 and is everywhere a polemic against abstraction. \"On History\" (1830) gives the foundational propositions. It opens by rooting history in the human constitution — Clio \"figured by the ancients as the eldest daughter of Memory, and chief of the Muses\" — and makes the writing of history universal and instinctive: \"A talent for History may be said to be born with us, as our chief inheritance. In a certain sense all men are historians\" [30]. From this Carlyle derives the dissolution of \"society\" into persons: \"Social Life is the aggregate of all the individual men's Lives who constitute society; History is the essence of innumerable Biographies\" [2]. The second great proposition is the inadequacy of narrative to lived action. Action, Carlyle insists, is not a chain but a simultaneity: \"actual events are nowise so simply related to each other as parent and offspring are; every single event is the offspring not of one, but of all other events, prior or contemporaneous\"; it is \"an ever-living, ever-working Chaos of Being\" [36]. The writing of it can only proceed \"by threading it with single lines of a few ells in length,\" because \"all Action is, by its nature, to be figured as extended in breadth and in depth, as well as in length... so all Narrative is, by its nature, of only one dimension... Narrative is linear, Action is solid\" [9]. The famous conclusion follows: \"Truly, if History is Philosophy teaching by Experience, the writer fitted to compose History is hitherto an unknown man. The Experience itself would require All-knowledge to record it\" [10].\n\nFrom the first proposition descends the great-man method; from the second descends Carlyle's distrust of the historian who pretends to extract clean causal chains from the thick simultaneity of events. The same essay draws the line between the two kinds of historian on which his whole practice rests: \"the Artist in History may be distinguished from the Artisan in History; for here, as in all other provinces, there are Artists and Artisans; men who labour mechanically in a department, without eye for the Whole, not feeling that there is a Whole; and men who inform and ennoble the humblest department with an Idea of the Whole\" [37]. The Artisan is the cause-and-effect speculator \"with whom no wonder would remain wonderful,\" who \"reads the inscrutable Book of Nature as if it were a Merchant's Ledger\" [38] — the type Carlyle would later christen Dryasdust. The Artist is the historian with \"eye for the Whole.\" This 1830 distinction is the theoretical seed of the Dryasdust war of 1845 and 1858: Dryasdust is simply the Artisan grown industrial and German.\n\n\"On History\" also fixes Carlyle's lasting suspicion of the political historian who mistakes courts and camps for the substance of the past. He arraigns the historian who \"dwelt with disproportionate fondness in Senate-houses, in Battle-fields, nay, even in Kings' Antechambers; forgetting, that far away from such scenes, the mighty tide of Thought and Action was still rolling on its wondrous course\" [39], and announces (with the same maxim he would dramatize for thirty years) that \"Battles and war-tumults, which for the time din every ear... pass away like tavern-brawls\"; that \"Laws themselves, political Constitutions, are not our Life, but only the house wherein our Life is led\"; that the truly decisive man might be not the conqueror of the Alps but \"the nameless boor who first hammered out for himself an iron spade,\" for \"when the oak-tree is felled, the whole forest echoes with it; but a hundred acorns are planted silently by some unnoticed breeze\" [40]. Here is the paradox at the root of his career: the theorist who made the silent acorn weightier than the felled oak would spend his last thirteen years on the most clamorous oak of the eighteenth century. The same essay even ranks \"Church History\" above the political — \"Rightly conducted, this department were undoubtedly the more important of the two\" — because \"for man's true advantage, not the outward condition of his life, but the inward and spiritual, is of prime influence\" [41]; the History of the Church must be \"a History of the Invisible as well as of the Visible Church\" [42]. The visionary, not the documentary, is always the higher object.\n\nThe essay \"Biography\" (1832) completes the theory and is the single best gloss on why Carlyle wrote histories as lives. It grounds the whole enterprise in human sociality: \"Man's sociality of nature evinces itself... by this one fact... the unspeakable delight he takes in Biography,\" for \"'Man is perennially interesting to man; nay, if we look strictly to it, there is nothing else interesting'\" [43]. It restates the great-man thesis as a thesis about literary form — \"Of History, for example, the most honoured, if not honourable species of composition, is not the whole purport Biographic? 'History,' it has been said, 'is the essence of innumerable Biographies.' Such, at least, it should be: whether it is, might admit of question\" [26] — the self-quotation that openly concedes the gap between the ideal and the actual record. And it lampoons the abstracting historian in an image Carlyle never improved on: \"those modern Narrations, of the Philosophic kind, where 'Philosophy, teaching by Experience,' has to sit like owl on housetop, seeing nothing, understanding nothing, uttering only, with such solemnity, her perpetual most wearisome hoo-hoo\" [44]. Against this owl Carlyle sets his cult of \"Reality\": through the fictional Professor Sauerteig of the *Aesthetische Springwurzeln*, he argues that \"The significance, even for poetic purposes, that lies in Reality... is perhaps only now beginning to be discerned,\" and that \"Fiction, while the feigner of it knows that he is feigning, partakes, more than we suspect, of the nature of lying\" [45]. The example he reaches for is the one that would govern *Friedrich*: \"in some Boswell's Life of Johnson, how indelible and magically bright does many a little Reality dwell in our remembrance!\" — for \"some slight, perhaps mean and even ugly incident, if real and well presented, will fix itself in a susceptive memory, and lie ennobled there\" [46]. The whole aesthetic of *Friedrich* — the lean little old man on the terraces of Sans Souci, the worn coat, the snuff — is the Boswellian \"little Reality\" doctrine of 1832 carried to a king.\n\nThe practice answers the theory. Rather than the measured, balanced exposition of Macaulay or the impersonal source-criticism of Ranke, Carlyle writes history as vision and as speech — the present-tense panorama, the direct address, the dramatized scene. Stewart's study is built around exactly these techniques: the \"remarkable three-way relationship\" Carlyle constructs among \"himself, Frederick and the reader,\" his \"act of storytelling,\" and his \"use of oral techniques... in order to 'speak' to his readers\" [4]. The opening of *Friedrich* is the method in miniature — not a thesis but a sighting: \"About fourscore years ago, there used to be seen sauntering on the terraces of Sans Souci, for a short time in the afternoon... a highly interesting lean little old man, of alert though slightly stooping figure; whose name among strangers was King FRIEDRICH THE SECOND\" [23]. The aim is stated as fidelity to the living likeness, and Carlyle frames it, characteristically, as the wish his old Schiller never fulfilled and as the verdict of Sauerteig: \"It is not the untrue imaginary Picture of a man and his life that I want from my Schiller, but the actual natural Likeness, true as the face itself, nay TRUER, in a sense. Which the Artist, if there is one, might help to give, and the Botcher (Pfuscher) never can!\" [24]. The Artist/Artisan distinction of 1830 has become the Artist/Botcher distinction of 1858; the doctrine is identical. This is the visionary-dramatic ideal that the emerging \"scientific\" school would regard as exactly the wrong instrument for the truth — and that Trevelyan, fifty years later, would defend as the truest instrument there is.\n\n## Standing in Victorian Historiography and the Sage Tradition\n\nCarlyle occupies a double and ultimately divided position. As a *historian* he was, by the time of *Friedrich*, increasingly a survival. Rosemary Jann's distinction, which Stewart adopts, marks the period as one in which \"historical writing remained the domain of the man of letters\" but was beginning to professionalize away from him [25]; Carlyle is the supreme late instance of the literary historian just as the source-critical, institutional historian was arriving. The next generation's verdict is captured in three flat rebuttals. Spencer's is sociological: \"Before he can remake his society, his society must make him\" [3]. The Rankean refusal targets history written to \"fight his own battles\" [19]. And Acton's is moral and absolute: \"the most detestable of historians,\" the great-man creed \"next in atrocity\" to the doctrine \"that the cause justifies its agents\" [28]. The great-man theory survived as a named position precisely because it was something to be refuted; it became the standing antithesis against which scientific, sociological, and Tolstoyan history defined themselves. Acton's added barb — that the Germans loved Carlyle \"because he is an echo of the voices of their own classic age\" [28] — is the unkindest because it concedes the German archive's victory: the man who set out to make the Prussian Dryasdust speak ended, in his enemy's telling, as the archive's echo.\n\nJohn D. Rosenberg's *Carlyle and the Burden of History* (1985) gives the modern scholarly name to the strain this document traces; its chapter on the last work is titled \"The Long Night of Frederick the Great,\" and the book as a whole reads Carlyle's career as a deepening sense that the past is a \"burden\" the historian carries rather than a quarry he commands [47]. That framing — history as burden, not as ledger — is the secondary counterpart to Carlyle's own confession that he must \"renounce ideals\" and \"take up with the mournfulest barren realities\" [27], and it marks the distance between the exhilarated resurrectionist of *Cromwell* and the captive of the Brandenburg sand.\n\nAs a *sage*, however, his standing was secure and generative. *Friedrich* restored the reputation that the *Latter-Day Pamphlets* had damaged [4][17], and it drew an elegiac, valedictory reception from reviewers who treated it as the close of a great career [15]. Emerson — his oldest correspondent, whose letters across forty years form one of the period's central friendships — had hailed the French Revolution book in Shakespearean terms [21], and the line of admirers ran through Ruskin and Matthew Arnold (for whom Carlyle was a formative if resisted voice) to James Anthony Froude, who became both his designated biographer and the keeper of the legend, judging *Friedrich* \"the grandest of his works\" [18]. And the narrative-art half of Carlyle's legacy outlived the methodological half: Trevelyan's \"Clio, a Muse\" rebuilt the literary conception of history on Carlylean ground, insisting that \"the art of history remains always the art of narrative\" and naming Carlyle \"at his rare best\" as the man who could make \"our ancestors live again in modern narrative\" [29]. The split is the essential fact of his posterity: rejected as a method and a moral creed, retained as a voice and an art. *Friedrich* is where the two fates meet — a thirteen-year feat of documentary scholarship written to prove that history is the biography of great men, finished just as the discipline decided it was not, and read ever since for the prose rather than the proof.\n\n## Open Questions\n\n- **Did hero-worship \"exhaust\" itself in *Friedrich*, or merely change register?** Vanden Bossche's \"renounced ideals / mournfullest barren realities\" reading [11] — now anchored to the verbatim \"We must renounce ideals... mournfulest barren realities\" [27] — is powerful but interpretive; an equally available reading is that Carlyle's hero simply migrated from prophet to administrator without any loss of conviction. The text supports both.\n- **Was Friedrich a poor choice or the only possible choice?** Stewart and the reviewers stress that the subject was a liability after Macaulay's portrait of Friedrich Wilhelm [4][16]. But Friedrich as \"the last of the Kings\" [5] may have been chosen *because* he is the last credible absolute hero before the Revolution — making the difficulty structural rather than accidental.\n- **How direct was the methodological collision with Ranke?** The opposition between Carlyle's visionary method and \"scientific history\" is real but is asserted here largely through secondary framing [19]; a primary-source reckoning of what Carlyle actually knew of and said about German source-criticism (which he encountered firsthand on his research trips) belongs to a dedicated document. Acton's jibe that Carlyle was \"an echo of the voices of their own classic age\" [28] suggests the German question deserves its own treatment.\n- **How much of Acton's hostility is about Frederick and how much about Froude?** Acton's worst sentence pairs Carlyle's hero-doctrine with \"the doctrine... that the cause justifies its agents, which is what Froude lives for\" [28]; the two men are condemned together, which complicates using Acton as a clean witness against *Friedrich* alone.\n- **Emerson's \"wittiest book / Judgment Day\" verdict.** This famous praise is widely attributed to Emerson on *Friedrich* but I could not locate it verbatim in the fetched Gutenberg correspondence (vol. II, #13660); it is reported here only as attributed, not verified, and should be confirmed against the full letters before being quoted as primary.\n- **Rosenberg's \"Long Night\" chapter, verbatim.** The chapter title and the \"burden of history\" framing [47] are established from the book's structure and reception; specific verbatim sentences from the Frederick chapter were not obtainable from an open full-text source and should be quoted from the print edition before being treated as primary support.\n\n## Sources\n\n1. Carlyle, Thomas. *On Heroes, Hero-Worship, and the Heroic in History* (1841), Lecture I. Project Gutenberg #1091. https://www.gutenberg.org/cache/epub/1091/pg1091.txt — Tier 1 (primary, verbatim verified).\n2. Carlyle, Thomas. \"On History,\" *Fraser's Magazine*, vol. 2, no. 10 (Nov. 1830). Text verified via Internet Archive transcription of *Critical and Miscellaneous Essays*, vol. 2 (key clause \"History is the essence of innumerable Biographies\"). https://archive.org/stream/CriticalAndMiscellaneousEssaysV2/CriticalAndMiscellaneousEssays_Carlyle_v270919952_djvu.txt — Tier 1 (primary, verbatim verified).\n3. Spencer, Herbert. *The Study of Sociology* (1873; cited ed. 1896), as quoted with attribution in \"Great man theory,\" Wikipedia (source cited, not the article). https://en.wikipedia.org/wiki/Great_man_theory — Tier 1 quotation via Tier 5 aggregator; verbatim verified across two independent fetches.\n4. Stewart, Linda C. *Thomas Carlyle and the making of Frederick the Great*, PhD thesis, University of Edinburgh, 2009 (deposited 2010), Abstract and Introduction. https://era.ed.ac.uk/bitstream/handle/1842/5526/Stewart2010.pdf — Tier 2 (scholarly; verbatim from extracted PDF text).\n5. Carlyle, Thomas. *History of Friedrich II of Prussia*, vol. I, Book I (eighteenth century / \"last of the Kings\" / \"grand universal Suicide\" passages). Project Gutenberg #2101. https://www.gutenberg.org/files/2101/2101-h/2101-h.htm — Tier 1 (primary, verbatim verified via fetch).\n6. Mill, John Stuart, review of *The French Revolution* (1837), reception as summarized with cited reviewers in \"The French Revolution: A History,\" Wikipedia (sources cited: Mill; J. Burrow, *A History of Histories*, 2009; J. Rosenberg, 2002 Modern Library ed.). https://en.wikipedia.org/wiki/The_French_Revolution:_A_History — Tier 4 (reception via aggregator citing named scholarship).\n7. Carlyle, Thomas. *Past and Present* (1843), Book III (Mammonism / cash-nexus). Quoted text verified for \"Cash-payment for the sole nexus\" and \"Midas-eared Mammonism\" via Gutenberg #13534. https://www.gutenberg.org/cache/epub/13534/pg13534.html — Tier 1 (primary; these two clauses verbatim verified).\n8. Carlyle, Thomas. *History of Friedrich II of Prussia*, vol. I (\"last of the old Gods\"). Project Gutenberg #2101. https://www.gutenberg.org/files/2101/2101-h/2101-h.htm — Tier 1 (primary, verbatim verified).\n9. Carlyle, Thomas. \"On History\" (1830), \"Narrative is linear, Action is solid.\" Verified verbatim via Internet Archive transcription, *Critical and Miscellaneous Essays*, vol. 2. https://archive.org/stream/CriticalAndMiscellaneousEssaysV2/CriticalAndMiscellaneousEssays_Carlyle_v270919952_djvu.txt — Tier 1 (primary, verbatim verified).\n10. Carlyle, Thomas. \"On History\" (1830), \"if History is Philosophy teaching by Experience, the writer fitted to compose History is hitherto an unknown man.\" Verified verbatim via Internet Archive transcription, *Critical and Miscellaneous Essays*, vol. 2. https://archive.org/stream/CriticalAndMiscellaneousEssaysV2/CriticalAndMiscellaneousEssays_Carlyle_v270919952_djvu.txt — Tier 1 (primary, verbatim verified).\n11. Vanden Bossche, Chris R. *Carlyle and the Search for Authority* (Ohio State UP, 1991), ch. 5, \"The Son as Father: Frederick's Art of War,\" via Victorian Web. https://victorianweb.org/authors/carlyle/vandenbossche/5b.html — Tier 2 (scholarly; phrases verbatim verified via fetch). The \"renounce ideals\" phrasing corroborated by the primary text at [27].\n12. Vanden Bossche, Chris R., *Carlyle and the Search for Authority*, ch. 5 note on writing *Frederick* (timeline 1855-1864), via Victorian Web. https://victorianweb.org/authors/carlyle/vandenbossche/5n23.html — Tier 2; corroborated by Vanden Bossche, \"Frederick the Great: Composition and Publication,\" in *The Carlyle Encyclopedia*, ed. M. Cumming (2004), pp. 175-77 (soundproof room; thirteen years).\n13. Carlyle, Thomas. *History of Friedrich II of Prussia*, vol. I (difficulty; \"Prussian Dryasdust... continent of Brandenburg sand\"). Project Gutenberg #2101. https://www.gutenberg.org/files/2101/2101-h/2101-h.htm — Tier 1 (primary, verbatim verified).\n14. Carlyle, Thomas. *Oliver Cromwell's Letters and Speeches* (1845), \"Anti-Dryasdust\" introduction. Wikisource, *Works*, v ISimprisoned it in this instance\"). Project Gutenberg #2101. https://www.gutenberg.org/files/2101/2101-h/2101-h.htm — Tier 1 (primary, verbatim verified).\n28. Acton, John Emerich Edward Dalberg, Lord. *Letters of Lord Acton to Mary Gladstone* (letter of 1880), \"Excepting Froude, I think him the most detestable of historians. The doctrine of heroes, the doctrine that will is above law, comes next in atrocity...\"; \"The Germans love him because he is an echo of the voices of their own classic age.\" Project Gutenberg #38214. https://www.gutenberg.org/files/38214/38214-h/38214-h.htm — Tier 1 (primary, verbatim verified).\n29. Trevelyan, George Macaulay. \"Clio, a Muse\" (1903; in *Clio, a Muse, and Other Essays*, 1913): \"the value of history is not scientific. Its true value is educational\"; \"the analogy of physical science has misled many historians during the last thirty years right away from the truth about their profession\"; \"the art of history remains always the art of narrative. That is the bed rock\"; \"the art of making our ancestors live again in modern narrative. Carlyle, at his rare best, could do it.\" Internet Archive djvu transcription. https://archive.org/stream/in.ernet.dli.2015.74720/2015.74720.Clio-A-Muse-And-Other-Essays-Literary-And-Pedestrian_djvu.txt — Tier 1 (primary, verbatim verified).\n30. Carlyle, Thomas. \"On History\" (1830), opening (\"Clio was figured by the ancients as the eldest daughter of Memory, and chief of the Muses\"; \"History, as it lies at the root of all science, is also the first distinct product of man's spiritual nature\"; \"A talent for History may be said to be born with us... In a certain sense all men are historians\"). Internet Archive transcription, *Critical and Miscellaneous Essays*, vol. 2. https://archive.org/stream/CriticalAndMiscellaneousEssaysV2/CriticalAndMiscellaneousEssays_Carlyle_v270919952_djvu.txt — Tier 1 (primary, verbatim verified).\n31. Acton, Lord. *Letters of Lord Acton to Mary Gladstone* (\"Carlyle's two volumes are crowded with grotesque eloquence, but they make him smaller in my eyes\"). Project Gutenberg #38214. https://www.gutenberg.org/files/38214/38214-h/38214-h.htm — Tier 1 (primary, verbatim verified).\n32. Carlyle, Thomas. *On Heroes*, Lecture VI, \"The Hero as King\" (\"King, *Konning*, which means *Can*-ning, Able-man\"; cf. Lecture I \"King is *Kon-ning*, *Kan-ning*, Man that *knows* or *cans*\"). Project Gutenberg #1091. https://www.gutenberg.org/cache/epub/1091/pg1091.txt — Tier 1 (primary, verbatim verified).\n33. Carlyle, Thomas. *On Heroes*, Lecture VI (\"Find in any country the Ablest Man that exists there; raise *him* to the supreme place, and loyally reverence him: you have a perfect government for that country\"). Project Gutenberg #1091. https://www.gutenberg.org/cache/epub/1091/pg1091.txt — Tier 1 (primary, verbatim verified).\n34. Carlyle, Thomas. *On Heroes*, Lecture VI (\"Find me the true *Konning*, King, or Able-man, and he *has* a divine right over me\"; \"the Polemic stuff of a dead century\"). Project Gutenberg #1091. https://www.gutenberg.org/cache/epub/1091/pg1091.txt — Tier 1 (primary, verbatim verified).\n35. Carlyle, Thomas. *On Heroes*, Lecture I (social dignitaries \"all as bank-notes... all representing gold;—and several of them, alas, always are *forged* notes\"). Project Gutenberg #1091. https://www.gutenberg.org/cache/epub/1091/pg1091.txt — Tier 1 (primary, verbatim verified).\n36. Carlyle, Thomas. \"On History\" (1830) (\"every single event is the offspring not of one, but of all other events... an ever-living, ever-working Chaos of Being\"). Internet Archive transcription, *Critical and Miscellaneous Essays*, vol. 2. https://archive.org/stream/CriticalAndMiscellaneousEssaysV2/CriticalAndMiscellaneousEssays_Carlyle_v270919952_djvu.txt — Tier 1 (primary, verbatim verified).\n37. Carlyle, Thomas. \"On History\" (1830) (\"the Artist in History may be distinguished from the Artisan in History... men who labour mechanically... and men who inform and ennoble the humblest department with an Idea of the Whole\"). Internet Archive transcription, vol. 2. https://archive.org/stream/CriticalAndMiscellaneousEssaysV2/CriticalAndMiscellaneousEssays_Carlyle_v270919952_djvu.txt — Tier 1 (primary, verbatim verified).\n38. Carlyle, Thomas. \"On History\" (1830) (cause-and-effect speculators \"with whom no wonder would remain wonderful\"; \"He who reads the inscrutable Book of Nature as if it were a Merchant's Ledger\"). Internet Archive transcription, vol. 2. https://archive.org/stream/CriticalAndMiscellaneousEssaysV2/CriticalAndMiscellaneousEssays_Carlyle_v270919952_djvu.txt — Tier 1 (primary, verbatim verified).\n39. Carlyle, Thomas. \"On History\" (1830) (historian who \"dwelt with disproportionate fondness in Senate-houses, in Battle-fields, nay, even in Kings' Antechambers\"). Internet Archive transcription, vol. 2. https://archive.org/stream/CriticalAndMiscellaneousEssaysV2/CriticalAndMiscellaneousEssays_Carlyle_v270919952_djvu.txt — Tier 1 (primary, verbatim verified).\n40. Carlyle, Thomas. \"On History\" (1830) (\"Battles and war-tumults... pass away like tavern-brawls\"; \"Laws themselves, political Constitutions, are not our Life, but only the house wherein our Life is led\"; \"when the oak-tree is felled, the whole forest echoes with it; but a hundred acorns are planted silently by some unnoticed breeze\"). Internet Archive transcription, vol. 2. https://archive.org/stream/CriticalAndMiscellaneousEssaysV2/CriticalAndMiscellaneousEssays_Carlyle_v270919952_djvu.txt — Tier 1 (primary, verbatim verified).\n41. Carlyle, Thomas. \"On History\" (1830) (Church History \"undoubtedly the more important of the two\"; \"not the outward condition of his life, but the inward and spiritual, is of prime influence\"). Internet Archive transcription, vol. 2. https://archive.org/stream/CriticalAndMiscellaneousEssaysV2/CriticalAndMiscellaneousEssays_Carlyle_v270919952_djvu.txt — Tier 1 (primary, verbatim verified).\n42. Carlyle, Thomas. \"On History\" (1830) (\"The History of the Church is a History of the Invisible as well as of the Visible Church\"). Internet Archive transcription, vol. 2. https://archive.org/stream/CriticalAndMiscellaneousEssaysV2/CriticalAndMiscellaneousEssays_Carlyle_v270919952_djvu.txt — Tier 1 (primary, verbatim verified).\n43. Carlyle, Thomas. \"Biography\" (1832), opening (\"Man's sociality of nature evinces itself... the unspeakable delight he takes in Biography\"; \"'Man is perennially interesting to man; nay, if we look strictly to it, there is nothing else interesting'\"). Internet Archive transcription, *Critical and Miscellaneous Essays*, vol. 3. https://archive.org/stream/CriticalAndMiscellaneousEssaysV3/CriticalAndMiscellaneousEssays_Carlyle_v370919952_djvu.txt — Tier 1 (primary, verbatim verified).\n44. Carlyle, Thomas. \"Biography\" (1832) (\"'Philosophy, teaching by Experience,' has to sit like owl on housetop, seeing nothing, understanding nothing, uttering only, with such solemnity, her perpetual most wearisome hoo-hoo\"). Internet Archive transcription, vol. 3. https://archive.org/stream/CriticalAndMiscellaneousEssaysV3/CriticalAndMiscellaneousEssays_Carlyle_v370919952_djvu.txt — Tier 1 (primary, verbatim verified).\n45. Carlyle, Thomas. \"Biography\" (1832), Sauerteig passage (\"The significance, even for poetic purposes, that lies in Reality... is perhaps only now beginning to be discerned\"; \"Fiction, while the feigner of it knows that he is feigning, partakes, more than we suspect, of the nature of lying\"). Internet Archive transcription, vol. 3. https://archive.org/stream/CriticalAndMiscellaneousEssaysV3/CriticalAndMiscellaneousEssays_Carlyle_v370919952_djvu.txt — Tier 1 (primary, verbatim verified).\n46. Carlyle, Thomas. \"Biography\" (1832) (\"in some Boswell's Life of Johnson, how indelible and magically bright does many a little Reality dwell in our remembrance!\"; \"some slight, perhaps mean and even ugly incident, if real and well presented, will fix itself in a susceptive memory, and lie ennobled there\"). Internet Archive transcription, vol. 3. https://archive.org/stream/CriticalAndMiscellaneousEssaysV3/CriticalAndMiscellaneousEssays_Carlyle_v370919952_djvu.txt — Tier 1 (primary, verbatim verified).\n47. Rosenberg, John D. *Carlyle and the Burden of History* (Harvard UP / Oxford, 1985), ch. \"The Long Night of Frederick the Great.\" https://www.journals.uchicago.edu/doi/10.1086/391605 (Modern Philology review) ; https://www.degruyterbrill.com/document/doi/10.4159/harvard.9780674422988/html — Tier 2 (scholarly; chapter title and \"burden of history\" framing established from the book's structure and reviews; specific verbatim sentences NOT obtained from open full text — see Open Questions)."}, {"order": 8, "file": "08_Contemporary_Reception.md", "title": "Contemporary Reception", "summary": "", "body": "# Contemporary Reception\n\n## Bottom Line\n\nCarlyle's *History of Friedrich II of Prussia, Called Frederick the Great* (six volumes, 1858–1865) was received in his lifetime as a labor of monumental scale and dazzling style whose historical judgment was nonetheless distrusted — a book, in the phrase that hardened into cliché, more talked about than read. The single most extravagant and most quotable praise came from across the Atlantic: Ralph Waldo Emerson, in a journal extract he sent to Carlyle in 1859, called it \"infinitely the wittiest book that ever was written\" and \"a book that is a Judgment Day, for its moral verdict on the men and nations and manners of modern times\" — and both phrases are verifiable, verbatim, in the published Carlyle–Emerson correspondence [1]. Emerson sustained the praise across the whole serial run, telling Carlyle of the third volume in December 1862 that it was \"sovereignly written, above all literature … Mankind's Bill of Rights and Duties, the royal proclamation of Intellect ascending the throne\" [1]. British reviewers in *Blackwood's*, the *Edinburgh*, the *Quarterly*, the *Saturday Review*, the *Athenaeum*, the *Eclectic*, *Chambers's*, and the *Examiner* greeted the first volumes (1858) with irritation — and in *Blackwood's* and the *Eclectic* with open hostility — and the final volumes (1865) with an elegiac, valedictory respect, praising Carlyle above all as a battle-painter while continuing to query his hero-worship and his abuse of his German \"Dryasdust\" sources [2]. The completed work helped carry Carlyle to public eminence: election as Lord Rector of Edinburgh University in November 1865 over Disraeli, by 657 votes to 310, and the celebrated Inaugural Address of 2 April 1866; and, in 1874, the Prussian Order *Pour le Mérite*, with Bismarck himself later thanking him for having shown the Germans \"our great Prussian king … in his full form\" [3][4]. Yet the praise must be distinguished from the legend: Emerson's enthusiasm is documented and exact, whereas claims of \"universal acclaim\" are not — Stewart's archival reconstruction shows that for Volumes I–II the negative reviews \"far outweighed\" the positive, contradicting the modern story of near-unanimous approval [2]. The dominant contemporary note was admiration shadowed by reservation, a verdict Carlyle himself anticipated by telling Emerson, in his own hand, that he had \"never had such a business\" in his life, \"wriggling and wrestling on the worst terms with a Task that I cannot do, that generally seems to me not worth doing\" [1].\n\n## The Record of Reception\n\nEmerson's \"Judgment Day\" and \"wittiest book\" praise is documented and verbatim, not legendary. The two phrases most often attached to *Friedrich* are genuinely Emerson's and survive in the primary correspondence in their exact form. They occur not in an ordinary letter but in an \"Extract From Diary\" that Emerson enclosed with his letter to Carlyle of 1 May 1859 (Concord), a passage he says he afterward \"read … in one of my lectures at the Music Hall in Boston\" [1]. The diary extract opens:\n\n> \"Here has come into the country, three or four months ago, a *History of Frederick,* infinitely the wittiest book that ever was written,—a book that one would think the English people would rise up in mass and thank the author for, by cordial acclamation, and signify, by crowning him with oakleaves, their joy that such a head existed among them …\" [1]\n\nand closes, after a long catalogue of the book's virtues:\n\n> \"With its wonderful new system of mnemonics, whereby great and insignificant men are ineffaceably ticketed and marked and modeled in memory by what they were, had, and did; and withal a book that is a Judgment Day, for its moral verdict on the men and nations and manners of modern times.\" [1]\n\nTwo textual notes matter for the corpus. First, the canonical wording is \"infinitely the wittiest book that *ever was* written\" (not \"that *was ever* written,\" the form in which it is sometimes misquoted) [1]. Second, the full clause reads \"for its moral verdict on *the men and nations and manners* of modern times\" — popular and encyclopedia transmissions often truncate it to \"on men and nations\" (so the *Nuttall Encyclopædia* and *Encyclopedia Americana* versions that circulate online) [5][6]. The corpus should quote the longer, primary form. A further detail worth recording: the diary extract is itself a piece of secondary transmission within the primary source. Norton's edition footnotes that \"In the first edition, this extract was printed from the original Diary; it is now printed according to the copy sent abroad\" — that is, the version Emerson actually mailed to Chelsea, which is the canonical one for reception purposes [1].\n\nYet Emerson's praise is private and personal, and he himself noted the book made \"no noise.\" The same diary extract is, paradoxically, the best contemporary evidence that *Friedrich* did **not** meet with the universal acclamation Emerson imagined it deserved. Immediately after the \"Judgment Day\" sentence, Emerson observes:\n\n> \"And this book makes no noise; I have hardly seen a notice of it in any newspaper or journal, and you would think there was no such book. I am not aware that Mr. Buchanan has sent a special messenger to Great Cheyne Row, Chelsea, or that Mr. Dallas has been instructed to assure Mr. Carlyle of his distinguished consideration. But the secret wits and hearts of men take note of it, not the less surely.\" [1]\n\nThe closing simile — that the public's silent awareness of the book is \"like\" their unspoken sense of \"the air, or of fire, or of the blessing of love\" [1] — is itself a confession that the world had said nothing aloud. This is decisive for the corpus's framing: the loudest single voice of praise is simultaneously testimony to the book's quiet reception. Emerson's enthusiasm should be presented as the documented high-water mark of admiration — and as a private, affectionate, twenty-five-year-correspondent's verdict — not as proof of a public groundswell. In the covering letter Emerson adds his own register of awe: he was \"heartily glad to get the crimson Book itself,\" found the gift \"irresistible\" so that he was \"all tenderness and all but tears,\" and pronounced it \"sovereignly written,\" crediting Carlyle as \"the true inventor of the stereoscope, as having exhibited that art in style, long before we had heard of it in drawing\" [1]. (The quotations are established; the inference that Emerson's voice has been over-generalized into \"universal acclaim\" is the corpus's interpretive point, independently confirmed by Stewart's archival finding below.)\n\nEmerson's enthusiasm was, moreover, sustained across the serial run, not a single outburst. His praise should not be presented as one isolated 1859 flourish; the correspondence shows it deepening as each instalment crossed the Atlantic. In April 1861, brushing aside Carlyle's \"boding account\" of his own task, Emerson wrote: \"We have settled it in America, as I doubt not it is settled in England, that *Frederick* is a history which a beneficent Providence is not very likely to interrupt. And may every kind and tender influence near you and over you keep the best head in England from all harm\" [1]. The phrase \"the best head in England\" is itself a fixed Emersonian estimate of Carlyle, reapplied here to the *Frederick* labor.\n\nThe fullest later tribute comes in Emerson's letter of 8 December 1862, on receiving \"the third volume of *Friedrich,* with your autograph inscription.\" There Emerson's praise reaches its theological pitch:\n\n> \"First, I read it honestly through for the history; then I pause and speculate on the Muse that inspires, and the friend that reports it. 'T is sovereignly written, above all literature, dictating to all mortals what they shall accept as fated and final for their salvation. It is Mankind's Bill of Rights and Duties, the royal proclamation of Intellect ascending the throne, announcing its good pleasure, that, hereafter, *as heretofore,* and now once for all, the World shall be governed by Common Sense and law of Morals, or shall go to ruin.\" [1]\n\nThis passage matters for two reasons. First, it confirms that \"sovereignly written\" was not a one-off coinage of 1859 but Emerson's settled formula for the book — he uses it of the third volume three years later [1]. Second, it shows Emerson reading the *History* exactly as the corpus's history pillar argues Carlyle intended it: not as biography but as a moral-political tribunal (\"Mankind's Bill of Rights and Duties\"), the eighteenth century arraigned for the instruction of the nineteenth.\n\nBritish periodical reviewers greeted Volumes I–II (1858) with disappointment — and the negative reviews outweighed the positive. The most careful scholarly reconstruction of the British periodical response is Aileen Stewart's 2010 Edinburgh PhD, which works directly from the *Athenaeum*, *Blackwood's*, *Chambers's*, the *Eclectic*, the *Edinburgh Review*, the *Examiner*, the *Quarterly Review*, and the *Saturday Review*. Stewart summarizes the arc:\n\n> \"Volumes I and II of Frederick met with a mixed reception when they were published in 1858. Many reviewers reacted angrily when they found themselves unable to reconcile Carlyle's depiction of Frederick and his father, Friedrich Wilhelm, with their preconceptions of either of these characters.\" [2]\n\nCrucially, Stewart corrects the received scholarly picture. Where earlier accounts (she names Vanden Bossche) hold that *Frederick* \"restored Carlyle's reputation\" and won \"nearly unanimous approval,\" her own count of the reviews finds the reverse for the opening instalment: \"negative criticism of Volumes I and II, such as those in Blackwood's and the Eclectic, far outweighed positive reviews at this time\" [2]. The grievance was partly one of proportion and bait-and-switch: readers had waited years for \"Frederick\" and got two enormous volumes largely about his Hohenzollern ancestors and his brutal father. *Chambers's* opened its January 1859 review on exactly that note of long-deferred expectation — \"These two bulky volumes of Mr Carlyle's, so long and eagerly expected\" — before conceding that \"no biography can be called complete that does not paint in detail those parental influences that mould the child, the 'father of the man'\" [2]. The corpus should therefore retire the \"near-unanimous approval\" cliché: the documented contemporary fact, for the first two volumes, is sharp division tilted toward hostility. (This rests on Stewart's primary-source reconstruction.)\n\nThe deepest 1858–59 objection was to Carlyle's hero-worship of Frederick *and* his father. The reviewers' anger in 1858 fastened on the heroic theory itself, which Carlyle was now extending to a figure most British readers regarded as a monster. General Sir Edward Bruce Hamley, writing the anonymous *Blackwood's* essay (\"Carlyle. Mirage Philosophy\") and a companion piece, fixed on the logical trap into which Carlyle's method had walked him: having predestined the father for heroism, he could not allow him to sin. As Hamley put it,\n\n> \"the fact is that Frederick William was pre-destined by Mr. Carlyle for a hero, and none of his elect can sin …. So, when he beats and starves his son, we are simply told 'the poor youth has a bad time, and the poor father too!' Hence arises a new dilemma for our author with his heroic theory to get fitted. There are now two heroes to be maintained in heroism, the filial and the paternal, but their relationship is decidedly unheroic.\" [2]\n\nThe same *Blackwood's* hand diagnosed Carlyle's whole career as the swelling of a once-honest faculty into a disease: \"His vast literary energy is now devoted … principally to hero-worship, to the worship of genius. His passion for this has grown by indulgence, until it has assumed a character positively morbid. His heroes at first really were heroes … But as his tendency in this direction was always to excess … he has brought himself to attempt to pass off fools and knaves for true, and grand, and saintly worthies\" [2]. The *Edinburgh* sharpened the moral charge over Friedrich Wilhelm's cruelties: \"the smallest journalist of that time felt more compassion for the victims of Frederic William than is shown by Mr. Carlyle. The intolerable and daily tortures of a whole family are treated with mockery and scorn … in fine, [he] outrages all notions of decency, manliness, and humanity\" [2]. The *Quarterly* made the same complaint about Carlyle's partiality, observing that in the assault on the Princess Wilhelmina \"the only person for whom Mr. Carlyle bespeaks any pity … is the King himself\" [2].\n\nA minority of 1858 reviewers, however, were carried away by Carlyle's portrait of the father. The division was real on both sides: a handful of reviewers were converted by sheer Carlylean force. *Chambers's* found Friedrich Wilhelm \"a remarkable character hitherto scantily appreciated … portrayed by him with an enthusiasm that will carry most of his readers away, if not to his own ultimate conclusions, at least far beyond the limits of their previously formed estimate; such enthusiasm as our author's, whether it make for or against a man, being very contagious, as we all know by this time\" [2]. The *Examiner* went further, declaring \"we regard the portrait of King Friedrich Wilhelm as Mr Carlyle's special triumph in this first half of his history,\" on the principle that \"the great power exerted over Frederick during the years of his training was begotten by his father's character\" [2]. The contrast with the *Blackwood's*/*Edinburgh*/*Eclectic* hostility is precisely the \"mixed reception\" Stewart describes — and it is worth recording that even the friendly reviewers framed their praise as a testament to Carlyle's *power of persuasion* rather than to the truth of his portrait, the very \"contagion\" Hamley distrusted.\n\nAs the campaigns arrived (Vols III–IV, 1862–64), reviewers warmed — to Carlyle the battle-painter. The split that defines the book's contemporary standing is between admiration for the narrative-and-military art and suspicion of the scholarship. With Volume III (1862) the subject reached Frederick's accession and the Silesian wars, and the periodical tone turned. The *Athenaeum* of 3 May 1862 opened: \"After a few preliminary passages, the narrative, in this third volume, rushes grandly and swiftly on, most rapid and most brilliant when the leading figure is that of Frederick himself, cavalcading over the historic plateaux of Silesia. Frederick, at length, is King\" [2]. The *Eclectic* admired the \"rushing narrative\" of Volume III, \"extraordinarily brilliant and powerful\" [2]. On the battle pieces the *Athenaeum* was rhapsodic: \"the battle pictures are unrolled, dark as the cloud and radiant as the blood that at once painted and obscured the field. In modern literature there are few military descriptions so perfect in their way as those of Mr. Carlyle\" [2].\n\nThe *Saturday Review*, reviewing Volume III on 18 October 1862, located the source of the effect in Carlyle's labor, not merely his flourish: \"The accounts of three battles which fall within the limits of the present volume are almost unequalled in simplicity and perspicuity …. The topographical accuracy of an engineer, and the skill of a landscape painter, are combined in the careful delineation of the field of battle\" [2]. By Volume IV the *Eclectic* spoke of \"a succession of panoramic pages [that] move before the reader, the great fights in which the wisdom, strength, and agility of Frederick were displayed\" [2], and the *Saturday* of 2 April 1864 conceded the upward curve: \"The further on in Frederick's history we get the more interesting it becomes, for the ten years of peace were signalized by the great quarrel with Voltaire, and the Seven Years War was of real European importance … the fourth is equal in merit to its predecessors\" [2]. Stewart's verdict on the shape of this recovery is exact: critics were resurrecting \"his authority as a historian … in his role as a *military* historian,\" while \"questions were still being asked about his credentials as a more general historian\" [2].\n\nThroughout, reviewers distrusted Carlyle's contempt for his German \"Dryasdust\" sources. The military praise never dissolved the source-criticism quarrel. The same critics who admired the battles queried Carlyle's contempt for the German scholars he had mined. The *Edinburgh* in October 1859 remarked, ironically: \"The Prussian writers have evidently gone to work with malice prepense to write dull books for the torture of Mr. Carlyle. No abuse is sufficiently virulent for these honest labourers, who got together all the materials of which Mr. Carlyle has often made an insufficient use\" [2]. The *Quarterly* of April 1859 made the same charge in the sentence that names the whole grievance: \"the accumulated stores of many an old German Dryasdust have been rifled, and we cannot help remarking that the poor Dryasdusts have been very badly treated. They have been first laid under contribution, and then outrageously vilified by their whimsical persecutor\" [2]. The complaint is structural, not pedantic: the reviewers sensed, in Stewart's words, that \"Carlyle was perceived to be flouting the rules of historical writing by showing disrespect and contempt towards those who had studiously\" assembled the record [2]. This is the British twin of the German *Quellenkritik* objection that Droysen would later voice — the scholars whose archives Carlyle ransacked, and whose dullness he derided, returned the contempt.\n\nThe final volumes (1865) drew elegiac, valedictory respect — even from hostile reviewers. When Volumes V and VI appeared together in March 1865, reviewers could at last weigh the whole, and the tone turned valedictory. Stewart finds:\n\n> \"By the time that the final two volumes of Frederick were published in 1865 and reviewers were finally able to recognise the scale of the project, the majority of them, although still harbouring reservations over his hero-worship of Frederick and Friedrich Wilhelm, were fulsome in their praise of Carlyle's epic. There was an elegiac tone to several of these final reviews, indicating that these reviewers believed that the publication of the final volumes of Frederick had signalled the end of Carlyle's long and illustrious literary career.\" [2]\n\nThe dated extracts bear this out. The *Athenaeum* of 25 March 1865 opened, \"Mr. Carlyle's long and laborious work has come to a close,\" and judged that in the Seven Years' War coverage Carlyle \"had surpassed himself. His research, his judgment, his peculiar powers, his comprehensiveness, his grandeur and his 'burlesque' of history were never more conspicuous than in this portion of his work\" [2]. The *Examiner* of 25 March 1865 called *Frederick* \"not only the chief publication of the week, but also one of the chief publications of our time … a great and sincere work, containing the results of an undaunted spirit of labour\" [2]. Even the *Quarterly*, which had been hostile in 1859, returned: Herman Merivale's July 1865 review called the book \"the crowning effort of a life of unremitted literary industry\" and predicted it would \"remain in truth a great work, and a substantial contribution at once to accurate history and to high literature\" [2]. The *Eclectic* of October 1865 measured the labor in pages — \"four thousand pages of the most exemplary, diligent, and painfully painstaking writing\" [2]. One structural fact Stewart underlines qualifies the picture: the *Edinburgh* \"maintained the stance it had taken in 1859 and ignored all volumes published after 1858\" — so the apparent late consensus is partly an artifact of the harshest critic having dropped out [2].\n\nHamley's conversion in *Blackwood's* (July 1865) is the most revealing single review. The fullest case study in the warming of British opinion is Hamley, who reviewed Volumes I–II hostilely in 1859 and the completed work for *Blackwood's* in July 1865. The sarcasm survived — he opened by suggesting that a man so fond of \"dwelling incessantly in an atmosphere of unreality … might have been expected … to lose his hold on humanity\" — but the verdict reversed [2]. \"Far, however, from becoming more and more hazy and unintelligible as he grows older,\" Hamley wrote, \"he exhibits in these later volumes fewer crotchets and fewer freaks of style, but not less of that descriptive and allusive power and wealth of imagery which have always formed his chief attractions\" [2]. Hamley's own diagnosis of why the later volumes worked is doubly illuminating, because it credits both the reader's acclimatization to the style and the improvement of the subject:\n\n> \"partly due to our familiarity with Carlylese, rendering us indifferent to verbal pranks, and more sensitive to excellences. But it is owing in much greater degree to the improvement in his subject. He is no longer encumbered with Frederick-William, the eccentric hero of the earlier volumes, the crazy, brutal father of the soldier-king.\" [2]\n\nHamley's phrase \"our familiarity with Carlylese\" is itself a small reception-history datum: by 1865 the style that had repelled reviewers in 1858 had become a known quantity, its \"verbal pranks\" discounted. And his summary of Frederick's appeal — a man \"whose great merit was, that he was a successful fighter of battles\" — exposes, as Stewart notes, \"the true nature of Frederick's appeal to a British readership\" [2]. The corpus should hold Hamley's two reviews together as the clearest documented arc from hostility to qualified homage. (As a professional military writer, Hamley \"would have been pre-disposed\" to value the campaign narrative above all else [2].)\n\nNot everyone warmed — the *Saturday Review* found the Seven Years' War \"dreary.\" Against the elegiac consensus the corpus should set the dissent, lest \"fulsome praise in 1865\" become its own cliché. The *Saturday Review* of 22 April 1865 was unmoved by the war it was supposed to admire: \"In spite of all the pains Mr. Carlyle has taken to make it lively, the history of the struggle remains as dreary as ever. It is nothing but a long mournful series of marches across brooks at 2 P.M. and into bogs at 5 P.M. … Sometimes Frederick wins, and sometimes he loses; but we know beforehand that all the parties to it ended as they began, and therefore the ups and downs do not affect us much\" [2]. The complaint anticipates the modern reader's fatigue exactly — the sheer mass of minutely dated, topographically exact campaign narrative defeating the very interest it was meant to create. This is the precise stylistic friction the corpus's reading pillar identifies, registered by a contemporary at the moment of publication.\n\nThe work helped win Carlyle the Lord Rectorship of Edinburgh University (1865–66). In November 1865 — the very year the final volumes appeared — Carlyle was elected Lord Rector of the University of Edinburgh, succeeding Gladstone and defeating Benjamin Disraeli by a vote of 657 to 310 [3]. He delivered his celebrated Inaugural Address (\"On the Choice of Books\") at Edinburgh on 2 April 1866, travelling north in the company of John Tyndall, T. H. Huxley, and Thomas Erskine [3][7][8]. The rectorship is conventionally read as the public coronation of a career then crowned by *Friedrich*; the chronology is suggestive (election in the month of the work's completion year) but the corpus should mark the causal link as inference rather than as a documented quid pro quo — the honorary post was a student-and-graduate election rewarding the cumulative eminence of the \"Sage of Chelsea,\" of which *Friedrich* was the latest and largest monument. The address itself, delivered extempore and to enormous public attention, was the high social moment of Carlyle's life; it was overshadowed within weeks by the sudden death of Jane Welsh Carlyle on 21 April 1866, while he was still in Scotland celebrating the honor [7]. (The election, vote, and dates are established; the specific causal weight of *Friedrich* is inference.)\n\nGerman honors followed — the Pour le Mérite (1874) and Bismarck's praise. The work's most consequential reception was in Prussia, where it was translated into German almost in step with its English publication. Joseph Neuberg, Carlyle's friend and voluntary secretary, translated *Frederick the Great* under Carlyle's own supervision, completing the fourth and part of the fifth volume before his death in 1867 and leaving the rest to Friedrich Althaus; the edition, published by Decker, \"an official printer of the Prussian state,\" carried \"establishment approval, and soon ran into popular editions\" [4]. Carlyle, Joshua Bennett writes, \"swiftly ascended … to the status of Prussia's authorised interpreter of its greatest r
