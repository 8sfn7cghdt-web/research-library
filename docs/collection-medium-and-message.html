nv\" font-size=\"8\" font-weight=\"bold\">100.64.0.11<\/text>\n<text x=\"401\" y=\"148\" text-anchor=\"middle\" class=\"t-inv\" font-size=\"7\">home A<\/text>\n<rect x=\"364\" y=\"158\" width=\"74\" height=\"26\" class=\"f-t4\" opacity=\".7\"/>\n<text x=\"401\" y=\"171\" text-anchor=\"middle\" class=\"t-inv\" font-size=\"8\" font-weight=\"bold\">100.64.3.40<\/text>\n<text x=\"401\" y=\"180\" text-anchor=\"middle\" class=\"t-inv\" font-size=\"7\">home B<\/text>\n<rect x=\"364\" y=\"190\" width=\"74\" height=\"26\" class=\"f-t4\" opacity=\".7\"/>\n<text x=\"401\" y=\"203\" text-anchor=\"middle\" class=\"t-inv\" font-size=\"8\" font-weight=\"bold\">100.64.9.2<\/text>\n<text x=\"401\" y=\"212\" text-anchor=\"middle\" class=\"t-inv\" font-size=\"7\">home C<\/text>\n<rect x=\"364\" y=\"222\" width=\"74\" height=\"26\" class=\"f-t4\" opacity=\".7\"/>\n<text x=\"401\" y=\"235\" text-anchor=\"middle\" class=\"t-inv\" font-size=\"8\" font-weight=\"bold\">100.64.&#8230;<\/text>\n<text x=\"401\" y=\"244\" text-anchor=\"middle\" class=\"t-inv\" font-size=\"7\">&#8230; dozens more<\/text>\n<\/g>\n<text x=\"401\" y=\"266\" text-anchor=\"middle\" class=\"t-mono t-muted\" font-size=\"8\">private &#183; non-routable &#183; per RFC 6598<\/text>\n<g class=\"ln\" stroke-width=\"1.5\">\n<line x1=\"438\" y1=\"139\" x2=\"498\" y2=\"180\"/><line x1=\"438\" y1=\"171\" x2=\"498\" y2=\"184\"/><line x1=\"438\" y1=\"203\" x2=\"498\" y2=\"188\"/><line x1=\"438\" y1=\"235\" x2=\"498\" y2=\"192\"/>\n<\/g>\n<rect x=\"500\" y=\"156\" width=\"78\" height=\"60\" class=\"f-t3\" opacity=\".82\"/>\n<text x=\"539\" y=\"180\" text-anchor=\"middle\" class=\"t-mono t-inv\" font-size=\"10\" font-weight=\"bold\">CGNAT<\/text>\n<text x=\"539\" y=\"193\" text-anchor=\"middle\" class=\"t-mono t-inv\" font-size=\"7.5\">carrier-grade<\/text>\n<text x=\"539\" y=\"204\" text-anchor=\"middle\" class=\"t-mono t-inv\" font-size=\"7.5\">NAT box<\/text>\n<line x1=\"578\" y1=\"186\" x2=\"618\" y2=\"186\" class=\"s-t3\" stroke-width=\"2.5\"/>\n<polygon points=\"618,186 609,181 609,191\" class=\"f-t3\"/>\n<rect x=\"600\" y=\"150\" width=\"78\" height=\"32\" fill=\"none\" class=\"s-t3\" stroke-width=\"1.5\"/>\n<text x=\"639\" y=\"164\" text-anchor=\"middle\" class=\"t-mono\" font-size=\"9.5\" font-weight=\"bold\" style=\"fill:var(--t3)\">198.51.100.6<\/text>\n<text x=\"639\" y=\"175\" text-anchor=\"middle\" class=\"t-mono t-muted\" font-size=\"7.5\">one shared public /32<\/text>\n<text x=\"364\" y=\"286\" class=\"t-mono t-muted\" font-size=\"9\">// device.ip now resolves to a CGNAT<\/text>\n<text x=\"364\" y=\"298\" class=\"t-mono t-muted\" font-size=\"9\">// pool, not a home. the key shatters.<\/text>\n<rect x=\"364\" y=\"312\" width=\"292\" height=\"1.5\" class=\"f-t3\" opacity=\".5\"/>\n<text x=\"364\" y=\"334\" class=\"t-mono\" font-size=\"9.5\" font-weight=\"bold\" style=\"fill:var(--text)\">PREVALENCE TODAY (Richter et al., IMC 2016)<\/text>\n<rect x=\"364\" y=\"344\" width=\"8\" height=\"8\" class=\"f-t3\"/><text x=\"380\" y=\"352\" class=\"t-mono\" font-size=\"9\" style=\"fill:var(--text)\">&gt;92% of cellular ASes<\/text>\n<rect x=\"364\" y=\"360\" width=\"8\" height=\"8\" class=\"f-t5\"/><text x=\"380\" y=\"368\" class=\"t-mono\" font-size=\"9\" style=\"fill:var(--text)\">17&#8211;20% of fixed eyeball ASes<\/text>\n<line x1=\"44\" y1=\"386\" x2=\"656\" y2=\"386\" class=\"ln\" stroke-width=\"1\" stroke-dasharray=\"2 3\"/>\n<text x=\"44\" y=\"406\" class=\"t-mono\" font-size=\"11\" font-weight=\"bold\" style=\"fill:var(--text)\">US FWA / SATELLITE CGNAT &#8212; THE EROSION EDGE<\/text>\n<text x=\"44\" y=\"420\" class=\"t-mono t-muted\" font-size=\"9\">share of US fixed households behind carrier-grade NAT<\/text>\n<line x1=\"60\" y1=\"478\" x2=\"640\" y2=\"478\" class=\"ln\" stroke-width=\"1\"/>\n<g class=\"ln-soft\" stroke-width=\".5\">\n<line x1=\"60\" y1=\"438\" x2=\"640\" y2=\"438\"/><line x1=\"60\" y1=\"458\" x2=\"640\" y2=\"458\"/>\n<\/g>\n<polyline points=\"120,476 360,442 600,438\" fill=\"none\" class=\"s-t5\" stroke-width=\"2.5\"/>\n<polyline points=\"600,438 624,433\" fill=\"none\" class=\"s-t3\" stroke-width=\"2.5\" stroke-dasharray=\"5 3\"/>\n<circle cx=\"120\" cy=\"476\" r=\"3.5\" class=\"f-t5\"/>\n<circle cx=\"360\" cy=\"442\" r=\"3.5\" class=\"f-t5\"/>\n<circle cx=\"600\" cy=\"438\" r=\"4\" style=\"fill:var(--accent)\"/>\n<circle cx=\"624\" cy=\"433\" r=\"3.5\" class=\"f-t3\"/>\n<text x=\"120\" y=\"494\" text-anchor=\"middle\" class=\"t-mono\" font-size=\"9\" style=\"fill:var(--text)\">0%<\/text>\n<text x=\"120\" y=\"506\" text-anchor=\"middle\" class=\"t-mono t-muted\" font-size=\"8\">2021<\/text>\n<text x=\"360\" y=\"432\" text-anchor=\"middle\" class=\"t-mono\" font-size=\"9\" style=\"fill:var(--text)\">~14&#8211;15%<\/text>\n<text x=\"360\" y=\"498\" text-anchor=\"middle\" class=\"t-mono t-muted\" font-size=\"8\">Q1 2026 &#183; ~20M conns<\/text>\n<text x=\"600\" y=\"430\" text-anchor=\"middle\" class=\"t-mono\" font-size=\"9\" style=\"fill:var(--accent)\">18&#8211;25%<\/text>\n<text x=\"620\" y=\"500\" text-anchor=\"end\" class=\"t-mono t-muted\" font-size=\"8\">2030 &#183; carrier targets<\/text>\n<text x=\"44\" y=\"514\" class=\"t-mono t-muted\" font-size=\"9.5\">// every point of erosion turns one IP from a household into a crowd &#8212; the corpus&#8217;s key, quietly dissolving<\/text>\n<\/svg>\n<figcaption><strong>Fig. 2.<\/strong> The smear is not a glitch but the architecture catching up with scarcity. Where US cable still grants one routable <span style=\"font-family:var(--mono)\">/32<\/span> per home, carrier-grade NAT &#8212; already on <span style=\"font-family:var(--mono)\">&gt;92%<\/span> of cellular and creeping from <span style=\"font-family:var(--mono)\">0%<\/span> toward a fifth of US fixed households &#8212; fans dozens of <span style=\"font-family:var(--mono)\">100.64.x<\/span> homes behind a single public address, so the IP that ad tech reads as &#8220;a household&#8221; increasingly names a crowd.<\/figcaption>\n<\/figure>\n\n\nThe years 2011–2012 are the hinge of the modern period, and the simultaneity is the story. In the same eighteen months:\n\n1. **The pool emptied** (IANA, February 2011; APNIC, April 2011).\n2. **The market opened** (Nortel–Microsoft, March–April 2011).\n3. **CGNAT was standardized.** RFC 6598 (April 2012, BCP 153 — Jason Weil, Victor Kuarsingh, Chris Donley, Christopher Liljenstolpe, Marla Azinger) reserved **100.64.0.0/10** as \"Shared Address Space\" for the explicit purpose of numbering the inside of carrier-grade NATs — translation boxes inside the ISP, behind which *many subscriber households* share each public IPv4 address [37]. Deployment requirements followed in RFC 6888 (2013) [38]. Where home NAT had mapped one household to one public address, CGNAT maps N households to one address (and, with port-block allocation, one household to different addresses over time). The \"household IP\" abstraction that home NAT accidentally created in 1994, carrier NAT began dissolving in 2012.\n4. **IPv6 finally went into production** — from almost nothing. World IPv6 Day (8 June 2011, a 24-hour test) led to World IPv6 Launch (6 June 2012), when Google, Facebook, Yahoo!, Bing, Comcast, AT&T, Free, KDDI and others enabled IPv6 permanently [39]. Global IPv6 user share at launch was on the order of 1% (Google measurement) [40] — it would take until the mid-2020s to approach half.\n\nThe address layer's modern condition was thus fixed by mid-2012: a frozen IPv4 pool traded as an asset; CGNAT spreading wherever addresses were scarce or capital was tight (i.e., fastest in exactly the late-exhausting, low-legacy-holding regions — Asia, then everywhere mobile); and a slow-rolling IPv6 deployment producing a decades-long dual-stack mosaic in which the meaning of a single observed IP address — one device? one home? one apartment block? one cell tower? — depends entirely on where and when it is observed. That heterogeneity is the raw material of every CTV identity, measurement, and fraud question in this corpus.\n\nTwo nuances for the regional workstream's intake:\n\nFirst, mobile networks went CGNAT (or its mobile-core equivalent, NAT44 at the GGSN/PGW) essentially everywhere and early — mobile IP addresses were never household-meaningful, which is why CTV identity practice treats mobile and residential IPs as different species. The historical CGNAT story that matters for *CTV* is specifically **fixed-line residential** CGNAT, which tracks regional address poverty: rare in legacy-rich North America, common among late-entrant and address-poor ISPs in Europe, Asia, and Latin America.\n\nSecond, standards dates are not deployment dates. ISPs were deploying carrier NAT with squatted or private space before RFC 6598 gave them dedicated space, and many legacy-rich incumbents have never deployed it at all. The RFC marks the moment the practice became *architecture* rather than expedient — the right milestone for a history, but the wrong proxy for prevalence, which only measurement (workstream 6) can supply.\n\n---\n\n## 8. The Parallel Origin Story: The IP Address Becomes an Advertising Identifier (1996–2010)\n\nWhile the IETF fought exhaustion, a separate industry — with essentially no overlap in personnel, venues, or literature — was teaching itself to read IP addresses as *information about people*.\n\n### 8.1 Geo-IP: location from a routing artifact (1999–2005)\n\nThe founding insight of the geo-IP industry was that although RFC 791 addresses encode no geography, their *allocation and routing* leak it: registry records (WHOIS), DNS naming conventions, traceroute topology, and latency triangulation collectively place most addresses in a city or region with usable accuracy.\n\n**Digital Envoy** was founded in 1999 in Atlanta by Sanjay Parekh, Rob Friedman, and Dennis Maicon, patenting \"geotargeting\" — the company's own history names ad networks, publishers, websites, and retailers as the founding customer base, i.e., advertising relevance was a design goal, not a later application [26]. In 2005 it split into **Digital Element** (the geolocation/IP-intelligence division, whose NetAcuity product remains an ad-tech staple in 2026 — a direct 27-year continuity from this origin story to the corpus's current-state workstream) and Digital Resolve (fraud) [26]. Landmark Communications acquired the company in 2007 [26].\n\n**Quova**, founded circa 1999–2000 in Mountain View, built the other flagship geolocation dataset, serving online retail, banking fraud, content rights, and advertising. Neustar — the neutral numbering-administration company then diversifying into data services — acquired Quova on **27 October 2010** (SEC 8-K record) and rebranded it Neustar IP Intelligence on 1 January 2012 [27][41]. The acquisition timing is historically resonant: the IP address's custodianship economy (Neustar ran US number portability) and its data economy converged *months before* the IPv4 pool emptied.\n\n**MaxMind** (early 2000s, Boston) followed with GeoIP databases whose free tier made IP geolocation a commodity capability for every web developer — the long tail that normalized the practice [50]. *(Founding details from the company's own account; flagged as company self-description.)*\n\n### 8.2 Yahoo! France: the law blesses the inference (2000)\n\nThe geo-IP industry's legitimating event was a lawsuit. In *LICRA et UEJF v. Yahoo! Inc.* (Tribunal de grande instance de Paris, 2000), French groups sued Yahoo! over Nazi-memorabilia auctions visible in France. Yahoo! argued the borderless internet made geographic filtering impossible. Judge Jean-Jacques Gomez appointed an expert panel — including Vint Cerf himself, alongside Ben Laurie and François Wallon — which concluded that IP-based geolocation could identify the large majority (the panel's figure: on the order of 70%, rising toward 90% with declared data) of French users, and the court ordered filtering accordingly. Goldsmith and Wu's *Who Controls the Internet?* (Oxford UP, 2006) — the standard scholarly account — treats this as the moment territorial law re-entered the internet *through the IP address*, and documents how the litigation showcased and validated the nascent geolocation vendors [42].\n\nThe double irony is worth recording: Cerf, who sized the address space as an experiment in 1977 and would later sit on Google's payroll as IPv6 evangelist, served on the panel that certified the IP address as a workable proxy for *where a person is* — the foundational assumption of all later IP-based ad targeting.\n\n### 8.3 The 1994 symmetry: NAT and the cookie\n\nBefore tracing the ad-server thread, note a coincidence so structurally important it deserves its own marker. **1994 produced both of the accidental identity layers of the commercial internet, within weeks of each other.** In May 1994, RFC 1631 standardized NAT — collapsing the household into one public address [5]. In mid-1994, Lou Montulli, a 23-year-old engineer at Netscape, invented the HTTP cookie to give the stateless web a memory for a shopping-cart feature; it shipped in Netscape Navigator that October, and within two years had been repurposed by the nascent ad-network industry (DoubleClick, founded 1996) into the cross-site tracking identifier — a privacy controversy documented as early as John Schwartz's 2001 New York Times retrospective \"Giving Web a Memory Cost Its Users Privacy\" [54].\n\nNeither artifact was designed as an advertising identifier. Both were engineering conveniences whose identity-bearing properties were discovered afterward by a third party (the ad industry) that bore none of the design constraints. The two then partitioned the territory for twenty years: **the cookie owned browser identity; the IP address owned geography** — until a medium arrived (CTV, §9) where the cookie could not exist, and the IP address inherited both jobs. The desktop web's reliance on cookies is, in this telling, the reason IP-based identity remained underdeveloped until 2015: not because IP identity was impossible, but because a better-behaved identifier was available wherever a browser ran. Remove the browser, and the fallback was always going to be the address.\n\n### 8.4 From geography to identity: ad servers and device graphs (1996–2015)\n\nEarly ad servers (DoubleClick's DART, founded-era 1996 onward; Real Media; Engage) incorporated IP-based geo-targeting as a standard capability by the early 2000s — country and metro targeting for campaign delivery, IP-list exclusion for fraud and competitive separation. In the desktop web era this remained a *coarse filter*: the cookie was the identity layer; the IP address was geography and hygiene. *(Characterization from the period's trade record and Goldsmith & Wu's account of advertising demand for geolocation [42]; specific ad-server feature dates are not individually sourced here — flagged as a gap-fill candidate.)*\n\nThe promotion of the IP address from filter to *identity key* came with the multi-device household of the 2010s. Cross-device graph companies — Tapad (founded 2010), Drawbridge (2010), later LiveRamp, Experian and others — clustered the devices observed behind one residential IP address, with timing and behavioral signals, into probabilistic \"households.\" The household-IP abstraction that RFC 1631's NAT had accidentally created (§4.2) was now an explicit commercial product: the device graph. By mid-decade these graphs were acquisition targets for telcos and data brokers (Telenor's purchase of Tapad in 2016; Experian's later acquisition), signaling that IP-anchored household identity had become durable infrastructure [51]. *(Corporate-event details from the widely reported public record through the training cutoff; precise figures deferred to the modern-arc workstream for verification — flagged.)*\n\nOpenRTB — the IAB's programmatic bid-request standard (v1.0 2010, v2.x from 2011 onward) — hard-wired the plumbing: the `Device` object carries `ip` (IPv4) and `ipv6` fields in every bid request, making the IP address the one identity-bearing signal that *every* programmatic transaction, on every platform, necessarily transmits [43].\n\n---\n\n## 9. CTV: The Medium That Made the IP Address the Default Household Identifier (2008–2019)\n\n### 9.1 Born app-based, born cookieless\n\nConnected TV as a consumer category dates to roughly 2008: Roku shipped its first player (the Netflix box, spun out of Netflix itself) in May 2008; Hulu launched the same year; smart-TV platforms from Samsung, LG and Vizio, plus Amazon Fire TV (2014), Apple TV, and gaming consoles, filled out the decade. The decisive architectural fact: CTV apps are *native applications*, not browsers. There is no third-party cookie, no shared cookie jar across apps, and (on most platforms in the formative years) no reliably present, consistently implemented advertising device ID [33][44].\n\nWhen TV ad dollars began moving programmatic (roughly 2015–2019, as SSPs like SpotX and FreeWheel and DSPs like The Trade Desk built CTV pipes), every bid request still carried exactly one universal signal: `device.ip`. And because that IP was, in the US and most mature broadband markets of the period, a *residential, NAT-fronted, household-stable* IPv4 address, it was not merely a geographic hint — it was a household key that linked the TV to the phones and laptops behind the same gateway, enabling targeting, frequency capping across apps, and exposure-to-outcome attribution (did the household that saw the ad visit the site / buy the product on another device?).\n\nA second architectural fact compounded the first: **server-side ad insertion (SSAI)**. To deliver broadcast-smooth ad breaks on underpowered TV hardware and to defeat client-side ad blocking, much of CTV stitched ads into the video stream at the server. The ad request therefore often originates from the stitching server — a datacenter — rather than from the living-room device, with the viewer's real residential IP forwarded (or not, or wrongly) in an OpenRTB extension field. SSAI thus simultaneously (a) weakened device-ID passthrough, further entrenching IP dependence; (b) made the IP signal itself second-hand and trust-dependent; and (c) opened the fraud surface the security workstream inherits. The medium's identity layer was, from birth, a forwarded claim about an address rather than an observed address — a distinction with two decades of consequences.\n\nThe claim, stated carefully (Claim 1.16): the IP address became CTV's default household identifier **by default, not by decision**. No standards body chose it; it was simply the only signal that was (a) present in 100% of requests, (b) household-granular, (c) cross-app and cross-device consistent, and (d) free. Every property except (a) was an accident of 1994 NAT architecture and pre-CGNAT US broadband.\n\n### 9.2 The designed alternative existed — and lost\n\nThe counterfactual identifier was the platform device ID. Roku had RIDA, Amazon had its Fire advertising ID, Apple tvOS its IDFA variant — but each was platform-siloed, inconsistently passed through server-side ad insertion (SSAI), and absent on many smart-TV apps entirely. IAB Tech Lab attempted standardization: \"Guidelines for Identifier for Advertising (IFA) on OTT Platforms,\" drafted April 2018 and finalized December 2018, requiring a resettable IFA disconnected from hardware identifiers, an IFA-type declaration, and a Limit Ad Tracking flag in every ad request [44][45].\n\nThe guidelines did not displace the IP address. Implementation remained fragmentary across the platform oligopoly (each OEM having commercial reasons to keep its ID proprietary to its own ad business), SSAI architectures routinely originated requests from datacenter IPs with inconsistently forwarded device signals, and the buy side had already built its household graphs on IP. IAB Tech Lab formally deprecated the 2018 OTT IFA guidelines in 2023 [44]. The trade press of 2019–2022 is unambiguous that the IP address remained \"the most common identifier for CTV advertising\" and the core of programmatic CTV targeting — and treated Comscore's January 2019 launch of a deliberately IP-free CTV targeting product as newsworthy precisely because it was exceptional [33].\n\nNote for the fraud workstream (handoff, not developed here): the same SSAI architecture that weakened device IDs also created CTV's signature fraud surface — server-originated requests where a datacenter IP *legitimately* appears where a residential IP is expected, making naive datacenter-IP filtering unworkable and spoofed-IP schemes (later exemplified by ICEBUCKET, 2020) viable.\n\n### 9.3 The collision, set\n\nBy 2019, then, the two histories had fused into a single dependency with a built-in expiry problem:\n\n- Advertising had made a **routing locator** into its household identity layer for the fastest-growing ad medium;\n- The locator's stewards had spent 25 years engineering against exactly that use (privacy extensions, §5.3) and had standardized the technology (CGNAT, §7) that dissolves household-IP granularity wherever IPv4 scarcity bites;\n- The IPv6 future replaces the single household address with delegated prefixes plus deliberately randomized, rotating device addresses;\n- And the legal system that had blessed IP geolocation in 2000 (Yahoo! France) was, by 2016, moving the other way — the CJEU's *Breyer* judgment holding dynamic IP addresses to be personal data under EU law (treated in this corpus's regulatory workstream, not here).\n\nEverything in the corpus's present-day question — accuracy wars, household-graph economics, Apple/Google IP obfuscation, regional divergence, the 2030 trajectory — is downstream of decisions recorded in this document, none of which was made with television advertising in mind.\n\n---\n\n## 10. Master Timeline: The Two Histories, Interleaved\n\n<figure class=\"corpus-fig\" role=\"group\">\n<svg viewBox=\"0 0 700 540\" role= nd the market that bet on it never met<\/text>\n<\/svg>\n<figcaption><strong>Fig. 3.<\/strong> Two histories on a collision course. The geometry shows the trap: the advertising rail commits to the household-IP key (OpenRTB <span style=\"font-family:var(--mono)\">device.ip<\/span>, the CTV build-out) in the very band&#8201;&#8212;&#8201;2011&#8211;2022&#8201;&#8212;&#8201;where the protocol rail is already dissolving that key with CGNAT, so the abstraction is adopted and undermined at the same moment, by communities that never read each other.<\/figcaption>\n<\/figure>\n\n\nThe protocol history (unmarked entries) and the advertising-identity history (marked ►) almost never touch until 2015. That mutual blindness is itself the finding.\n\n| Year | Event | Significance |\n|---|---|---|\n| 1977 | Cerf fixes 32-bit address length | \"I thought it was an experiment\" [12][13] |\n| 1981 | RFC 791: IPv4, classful A/B/C | Profligacy by construction [1] |\n| 1984 | Saltzer/Reed/Clark end-to-end paper | The principle NAT will break [15] |\n| Aug 1990 | Solensky's IETF 18 exhaustion projection | Class B gone by ~March 1994 at current rates [10] |\n| 1990–93 | RFC 1174; RFC 1366/1466; RIPE NCC (1992), APNIC (1993) | Allocation institutionalized; legacy era ends [52] |\n| Jun 1992 | RFC 1338 (supernetting); IAB's CLNP \"IPv7\" plan; Kobe revolt | Triage begins; governance crisis [3][21][25] |\n| Jan 1993 | Tsuchiya & Eng address-reuse paper | NAT conceived [6] |\n| Sep 1993 | RFC 1519: CIDR | Classes abolished; consumption curve flattens [4] |\n| Mar–May 1994 | RFC 1597 private addresses; **RFC 1631 NAT (\"short-term solution\")** | The household IP is accidentally invented [5][7] |\n| Oct 1994 | ► Netscape ships the cookie (Montulli) | Browser identity claimed by the cookie; IP left with geography [54] |\n| Jan 1995 | RFC 1752: IPng decision — SIPP at 128 bits | IPv6 chosen; ALE forecast: depletion 2005–2011 [8] |\n| Dec 1995 | RFC 1883: IPv6 specified | The permanent fix nobody ecomes full Internet Standard | 22 years from RFC 1883 [24] |\n| 2017 | ► MIT reportedly sells ~8M legacy addresses to Amazon | The classful era's profligacy is monetized [53] |\n| Apr–Dec 2018 | ► IAB Tech Lab OTT IFA guidelines | The device-ID alternative is attempted [44][45] |\n| Jan 2019 | ► Comscore ships IP-free CTV targeting — as news | The exception that proves IP's default status [33] |\n| 25 Nov 2019 | RIPE NCC's final /22 allocated | The last regular IPv4 allocation in Europe [31] |\n| Feb 2021 | RFC 8981 (privacy extensions, third generation) | 20 years of anti-tracking address engineering [46] |\n| 2023 | ► IAB deprecates the 2018 OTT IFA guidelines | IP remains CTV's de facto household key [44] |\n\n---\n\n## 11. Contingency Ledger: Where It Could Have Gone Differently\n\nA summary of the genuine forks, for the corpus's analytical use:\n\n1. **1977 — address length.** 128-bit and variable-length options were on the table; Cerf chose 32 bits for an experiment that \"never ended\" [12][13]. With 128 bits from the start: no exhaustion, no NAT, no household-IP abstraction — and plausibly per-device addressability with *different* (perhaps worse) privacy properties.\n2. **1992 — Kobe / TUBA.** Had the IAB's CLNP plan survived, or TUBA won the bake-off, the successor would have had variable-length addresses and OSI-world incumbency; the transition might have started from a different installed base [8][25].\n3. **1994 — NAT framed as temporary.** RFC 1631's authors expected re-addressing, not permanence [5]. An IETF that had refused to standardize translation (as purists urged) might have forced earlier IPv6 adoption — or simply lost relevance as vendors shipped NAT anyway (the likelier outcome, per the economic incentives Richter et al. document [9]).\n4. **1995 — IPv6 without backward compatibility.** A translation-native or incrementally deployable successor design could have changed transition economics; dual-stack's \"no benefit until everyone moves\" structure is widely identified as the core deployment failure [9][10].\n5. **1997 — 8+8/GSE.** Identifier/locator separation at the protocol level would have given \"what does an address identify?\" a designed answer instead of a litigated one [49].\n6. **2018 — OTT IFA.** A counterfactual in which the CTV platform oligopoly converged on the IAB's universal IFA would have made CTV identity device-ID-based, leaving the IP address a geographic filter as on the desktop web. Platform self-interest and SSAI architecture foreclosed it [44][45][33].\n\nThe through-line: at every fork, the path of least short-term cost won, and each short-term fix manufactured the next era's structural problem. There is no reason in this history to expect the 2025–2030 forks (IPv6 majority, IP obfuscation, regulatory classification) to resolve differently — a base rate the forecast workstream should weigh.\n\n---\n\n## 12. Handoffs to Other Workstreams\n\nWhere this document stops and the rest of the corpus picks up:\n\n- **→ 02 (Modern Arc):** This document ends the advertising thread at ~2019, with IP entrenched as CTV's household key and the IAB's IFA alternative failing. The modern arc takes up UID2/RampID, the cookie-deprecation saga's spillover into CTV, the FreeWheel/Truthset accuracy war, and the post-2019 fraud history (ICEBUCKET et al.).\n- **→ 03 (Current Structure):** Digital Element's NetAcuity continuity from 1999 to the present, and the 2026 vendor map descended from the Quova/Neustar lineage.\n- **→ 04 (Primary Sources):** Direct readings of RFC 8981, RFC 6598, the OpenRTB spec's IP-handling and truncation guidance, and the *Breyer* judgment — this document cites them historically; workstream 4 reads them closely.\n- **→ 05 (Live Debates):** The \"is the household IP dying?\" debate is the present-tense form of the §9.3 collision; both camps' steelmen belong there.\n- **→ 06 (Regional):** The staggered RIR run-out (§6.2) and legacy-space asymmetry (§2a) are the historical initial conditions for the IPv6 × CGNAT × CTV-maturity matrix.\n- **→ 07 (Drivers):** The triage-relieves-transition-pressure dynamic (§3, §10–11) is a candidate *recurring mechanism* for the drivers analysis; the transfer market born in §6.3 is now a price signal that workstream should treat as data.\n- **Regulatory thread deliberately excluded here:** GDPR, *Breyer* (CJEU 2016), CCPA's household clause, Apple Private Relay, and Google IP Protection postdate this document's scope and are covered in workstreams 2, 4, and 5.\n\n---\n\n## Open Questions\n\n1. **The IEN-era record.** What exactly did the 1977–78 variable-length addressing proposals look like (IEN series, TCP v2.5/v3 drafts), and who argued for 128 bits at the time? The primary record was not consulted directly here.\n2. **ALE's internals.** The ALE working group's models and meeting minutes (1993–96) would let the corpus characterize forecast methodology precisely rather than via RFC 1752's summary.\n3. **Quova's founding.** The exact founding date (1999 vs 2000) and founding team of Quova were not pinned to a primary source; the acquisition (27 Oct 2010, Neustar 8-K) is solid.\n4. **Early ad-server geo-targeting.** When precisely did DART/Real Media ship IP-based geo-targeting, and on whose data? The late-1990s ad-server trade record deserves a focused pass.\n5. **Yahoo! France panel figure.** The expert panel's exact percentage (70% native, ~90% with declared data is the commonly cited figure via Goldsmith & Wu) should be checked against the panel report or the judgment text itself.\n6. **OpenRTB's IP field history.** Which OpenRTB version first carried `device.ipv6`, and what truncation/anonymization guidance appeared when? A direct spec-archaeology read (workstream 4) should confirm.\n7. **CGNAT deployment dating by region.** RFC 6598 standardized shared address space in 2012, but *operational* CGNAT predates and postdates it variously by ISP and region — the regional workstream needs deployment data, not standards dates.\n8. **Tapad/Drawbridge/device-graph corporate history.** Founding dates, acquisition prices, and the technical role of IP clustering in early device graphs are stated here from the general public record and need primary verification (workstream 2).\n9. **Solensky's primary materials.** The actual IETF 18 proceedings slides/minutes (August 1990) would upgrade Claim 1.2 from institutional-history sourcing to primary sourcing.\n10. **The MIT–Amazon transaction.** MIT's announcement of the 18.0.0.0/8 partial sale and any disclosed terms should be pulled directly; the ~8M-address figure circulates widely but was not primary-verified here.\n11. **Non-Anglophone perspectives on the early period.** This document's source base is Anglophone, which mirrors the historical reality (the IETF and ad-tech were US-centric) but underweights, e.g., the French legal literature on *LICRA v. Yahoo!*, Japanese accounts of early IPv6 deployment (Japan was the earliest national mover, KAME/WIDE projects), and Chinese accounts of CNGI (China's 2003 next-generation internet program). The regional workstream should not inherit this bias.\n12. **Quantitative CTV-identity adoption in the formative years.** No reliable public figure was found for what share of 2016–2019 CTV impressions were targeted/capped on IP versus IFA; if one exists (e.g., in DSP disclosures or measurement-vendor archives), it would convert Claim 1.16's qualitative consensus into a quantified one.\n13. **CNGI and early national IPv6 programs.** China's CNGI (2003) and Japan's WIDE/KAME-era leadership are mentioned only as a sourcing gap here; whether early national IPv6 strategy shaped today's regional CGNAT/CTV-identity profiles is a live question for workstream 6.\n14. **The ALE-to-RIR policy transmission.** How directly did ALE's 1994 depletion window drive the RIRs' conservation policies of the late 1990s? The policy-archive trail (RIPE/APNIC policy proposals) was not traced here.\n\n---\n\n## Sour orporate events (Tapad founding 2010, Telenor acquisition 2016; Drawbridge founding 2010): widely reported public record through training cutoff; cited generally pending primary verification in workstream 2. [Flagged — do not treat figures as verified.]\n52. Cerf, V., \"IAB Recommended Policy on Distributing Internet Identifier Assignment,\" RFC 1174, August 1990; Gerich, E., \"Guidelines for Management of IP Address Space,\" RFC 1366, October 1992, and RFC 1466, May 1993. https://datatracker.ietf.org/doc/html/rfc1466 (accessed 2026-06-09). [Tier 1.]\n53. MIT sale of approximately half of 18.0.0.0/8 to Amazon, 2017: per MIT's own network-renumbering announcement and contemporaneous trade coverage; widely reported public record through training cutoff. [Flagged — transaction size and counterparty pending primary verification in the economics workstream.]\n54. Schwartz, J., \"Giving Web a Memory Cost Its Users Privacy,\" The New York Times, 4 September 2001. https://www.nytimes.com/2001/09/04/business/giving-web-a-memory-cost-its-users-privacy.html (accessed 2026-06-09). [Tier 4; canonical account of Montulli's 1994 cookie and its repurposing by ad networks.]\n\n**Additional context consulted:** Digiday, \"Connected TV faces its own identity crisis with the IP address's future in doubt.\" https://digiday.com/future-of-tv/connected-tv-faces-its-own-identity-crisis-with-the-ip-addresss-future-in-doubt/ (accessed 2026-06-09). [Tier 5 trade press — used for the IP-as-dominant-CTV-identifier characterization and the Comscore 2019 counterexample.]\n\n**Sourcing notes:** (a) RFC citations are to the canonical IETF Datatracker texts; RFCs are Tier 1 primary sources for what the standards community decided and stated. (b) Company self-descriptions (Digital Envoy, MaxMind) are cited as Tier 1 *for the company's own account* per the press-release rule, with the caveat noted inline. (c) Items [49], [51], and [53] are explicitly flagged as not primary-verified; they are gap-fill seeds, not settled claims. (d) The Anglophone skew of this source base is acknowledged in Open Question 11."}, {"order": 3, "file": "collection-medium-and-message-3.md", "title": "Live Debates and Dynamics: IP-Based Identity in CTV Programmatic Advertising", "summary": "The Address Knows You", "body": "*From [The Address Knows You](ipv4-ipv6-ctv-research.html#ch-5) — chapter 6*\n\n# Live Debates and Dynamics: IP-Based Identity in CTV (mid-2026)\n\n## Bottom Line\n\nAs of mid-2026 the CTV industry is in open argument about whether the IP address — still the default household match key for targeting, frequency capping, and measurement — is a salvageable identifier or a structurally failing one. The argument was detonated in November 2025 by a CIMM/Go Addressable-commissioned Truthset study finding IP-to-postal linkages accurate only ~13% of the time on average, which the FreeWheel/measurement-reform camp wields as proof of systemic waste and which the IP-graph camp counters measures naive static matching rather than production-grade graphs with recency windows and multi-signal corroboration. Layered on top are four further fights: whether IPv6 rotation, CGNAT, and platform proxying are killing IP identity or merely consolidating it around the (more stable) residential household prefix; whether GDPR/Breyer-line jurisprudence makes raw-IP processing legally radioactive in Europe while US state laws leave it merely regulated; whether Apple Private Relay and Google IP Protection are genuine privacy engineering or moat-building that privileges logged-in walled gardens (the IAB Tech Lab's explicit charge); and whether deterministic authenticated identity or probabilistic household resolution wins the economics. Almost every loud voice in these debates has a commercial position that aligns suspiciously well with its framing — this document maps each side at full strength and names the interests.\n\n---\n\n## How to read this document\n\nEach debate section gives: the camps, the steelmanned position of each side in language its advocates use, named advocates, the strongest evidence each cites, what would settle it (if anything), who benefits from each framing, and whether the core disagreement is **factual** (resolvable by evidence) or **interpretive/values-based** (not). A closing section covers the dynamics actively moving the space. All claims are cited; vendor and advocacy sources (Tier 6) are cited only as evidence of a position, never as proof the position is correct.\n\n---\n\n## Debate 1 — The Accuracy War: Is IP-based household targeting broken?\n\n### The detonator\n\nIn November 2025, the Coalition for Innovative Media Measurement (CIMM) and Go Addressable released a study conducted by Truthset that benchmarked roughly one billion IP-linkage records from six major (anonymized) identity-data providers against verified IP-to-household assignments supplied by two large ISPs and one large MVPD, over a 90-day window (December 2024–February 2025), using Bayesian statistical techniques [1][2]. Headline findings, per CIMM's release and AdExchanger's coverage by Allison Schiff (Nov. 5, 2025) [1][2]:\n\n- IP-to-**postal** linkages were accurate, on average, **13%** of the time.\n- IP-to-**email** linkages were accurate, on average, **16%** of the time.\n- Different providers **agreed with each other** on a given IP-to-postal linkage only ~7% of the time (reported variously as 6.4% postal / 2.8% email agreement) [2][3].\n- Over **90% of vendor linkages were unique to one provider** [2].\n- The **most accurate provider was ~4.5x better** than the least accurate [2].\n- Providers **underrepresent IPv6** addresses and frequently retain stale linkages and assign implausibly many IPs per household [2].\n\nTruthset separately estimated that **$7.36 billion of ~$38 billion** in US CTV ad spend is wasted on mistargeted IP-based campaigns — \"for every dollar spent on campaigns using IP-based targeting, just three cents worth reaches the intended audience\" in the most aggressive framing [3][4]. At a CES 2026 OpenAP event, CIMM managing director Jon Watts put it bluntly: \"Your ad dollars are not reaching who you think you are paying for\" [5].\n\n### Camp A (steelmanned): \"IP-based targeting is unreliable and the industry has been selling scale over truth\"\n\n**Advocates:** Jon Watts (CIMM); Scott McKinley and Kathryn Barnitt (Truthset); FreeWheel (Barrie Brandt, Director of Product Marketing); Go Addressable (the MVPD addressable-TV consortium); David Levy (OpenAP, sympathetically); Digiday's Future of TV coverage (Tim Peterson) has long carried the \"wean off the IP\" argument [2][5][6][7].\n\n**The position in their language:** The IP address was never designed to be an identity key. It is a routing artifact that the ecosystem promoted to household identifier because it was free and ubiquitous in the bid stream. Independent benchmarking against ground truth — actual ISP/MVPD subscriber files — shows the linkage layer built on top of it is mostly wrong: 13% postal accuracy means roughly **87% of \"household-targeted\" impressions miss the intended household** [4][8]. Worse, the providers don't even agree with each other (≤7% overlap), which means buyers purchasing the \"same\" audience from two vendors are buying almost entirely different households [1][2]. The market has not corrected because incentives run the wrong way: \"advertisers and agencies ask for maximum match rates, because that's how they deliver scale\" — match-rate maximization is rewarded; accuracy is unaudited (Truthset CEO Scott McKinley, who stresses the real headline is that \"matching is a flexible, uncertain and black-box process\") [2]. FreeWheel's prescription: treat IP as a contextual/fallback signal, not a primary identifier; use deterministic, verified household identity — \"verified household addresses from trusted data providers, and first-party IDs from streaming subscriptions\" plus direct ISP connections — and note that FreeWheel itself uses IP for only **17% of its targeting decisions** [6].\n\n**Strongest evidence:** the study's scale (≈1B records, ~250M IPs, 164M postals, 1B emails), the use of ISP/MVPD ground truth rather than vendor self-grading, and the cross-vendor disagreement finding, which is hard to explain away — if the graphs were each accurate by different methods, they would converge, not diverge [1][2].\n\n### Camp B (steelmanned): \"The study measures naive static matching; production IP graphs are a different animal\"\n\n**Advocates:** identity-graph vendors and buy-side practitioners — Intent IQ (which publicly claims 90%+ deterministic household accuracy via device graphs that survive IP rotation) [9]; TrueData (home-IP + CTV-ID omnichannel graph) [10]; fullthrottle.ai (Amol Waishampayan, co-founder, who frames the issue as solvable engineering: \"Volatility in TV connections is the new problem\") [5]; the AdExchanger content-studio \"fix accuracy\" school arguing for refresh-and-corroborate practices rather than abandonment [8]; and — read carefully — **FreeWheel itself**, whose blog concedes that \"when the source of IP address data comes from deterministic sources like Internet service providers, IP-based targeting is as good as any identifier used for targeting\" [6].\n\n**The position in their language:** Averages across six unnamed vendors are not a verdict on the methodology; they are a verdict on the *worst vendors*. The study's own data shows a **4.5x spread** between best and worst provider — proof that the practice, not the signal, is the variable [2]. A static IP-to-postal file decays in weeks; nobody serious runs one. Production systems use **recency windows** (refreshing household-to-IP associations continuously), **multi-signal corroboration** (requiring multiple independent signals — device IDs, ACR fingerprints, login events, MAIDs on home Wi-Fi — to agree before asserting a match), and **negative pruning** (dropping IPs that behave like ad servers, datacenters, or CGNAT egress points rather than homes) [8][9][10]. The CTV environment is actually the *most* favorable IP environment that exists: a television on residential fixed broadband, not a phone hopping between cell towers behind carrier-grade NAT. And the accusers should be read with their interests visible: the study was commissioned by **CIMM and Go Addressable — a consortium founded by MVPDs** whose set-top-box subscriber files are the deterministic alternative being recommended — and amplified by **FreeWheel, a Comcast company** whose parent owns exactly the ISP-verified household data the blog post recommends buying [1][6]. \"IP is broken, buy our subscriber-verified households instead\" is a sales motion as much as a finding.\n\n**Strongest evidence:** the intra-study variance (4.5x); the absence from the public study of any test of *production* multi-signal pipelines (it benchmarked vendor linkage files, not live decisioning); vendor-reported performance lifts in campaigns using maintained graphs (Tier 6 — self-reported, unaudited) [9][10].\n\n### What would settle it\n\nA genuinely settling test exists and is technically feasible: an **independent, named-vendor benchmark of live decisioning systems** (not static linkage files) against ISP ground truth, with recency and corroboration logic running, published with per-vendor results. CIMM's April 2026 follow-on work (\"Identity Infrastructure 2.0\") moves toward infrastructure recommendations [11 — not directly consulted; see gap-fill], but as of June 2026 no named-vendor production benchmark has been published. Until then: the *fact* question (what is the accuracy of vendor X's live system?) is open and resolvable; the *framing* question (is 13%-average a scandal or a straw man?) is interpretive.\n\n**Fact vs. values:** The accuracy numbers themselves are factual and were measured. Whether they indict the methodology or merely bad practitioners is an interpretive dispute. Who-benefits is structural: Truthset sells data validation (it benefits from \"data is dirty\"); FreeWheel/Comcast and the Go Addressable MVPDs sell deterministic alternatives; graph vendors sell graphs. Every party's framing matches its P&L [1][2][6].\n\n---\n\n## Debate 2 — Is IP identity dying or consolidating?\n\n### Camp A (steelmanned): the signal-loss narrative — \"IP identity is being strangled on four fronts\"\n\n**Advocates:** privacy-forward consultants and much trade commentary (Digiday's Tim Peterson: the industry \"still needs to wean itself off the IP address\") [7]; IPinfo's CTV analysis (Fernanda Donnini) documenting the IPv6 breakage mechanically [12]; agency practitioners quoted by Digiday (e.g., a healthcare client abandoning IP tracking on privacy-risk grounds) [7].\n\n**The position in their language:** Four independent forces are converging on the same identifier. (1) **IPv6 rotation:** devices rotate interface identifiers every 24–72 hours under privacy extensions (RFC 8981), and — more damagingly — large ISPs now rotate entire household **/56 or /48 prefixes daily**, so one home appears as dozens of \"users\" per week; frequency capping fails, reach inflates, attribution breaks [12]. IPv6 is no longer fringe: ~52.5% of US traffic, 86.7% France, 78.7% India, 75.1% Germany [12]. (2) **CGNAT:** where IPv4 persists, carrier-grade NAT makes one public IP stand for hundreds of households — the opposite failure, false merging [13]. (3) **Platform proxying:** Apple Private Relay strips IP in Safari/iCloud contexts; Google shipped IP Protection in Chrome Incognito (Q3 2025, two-hop proxy, masked domain list, geolocation coarsened to country/region level) [14][15]. (4) **Regulation:** Breyer made dynamic IPs personal data in the EU; CCPA names IP in its personal-information definition and uniquely covers *households*; Oregon's law explicitly reaches devices \"linkable to one or more consumers in a household\" [16][17][18]. Each force alone is survivable; together they make IP a melting asset. The Truthset finding that vendors *underrepresent IPv6* shows the graphs are already failing to keep up [2].\n\n### Camp B (steelmanned): the consolidation narrative — \"CTV IP is the survivor, not the casualty\"\n\n**Advocates:** IP-graph and household-resolution vendors (TrueData, Intent IQ, fullthrottle.ai, Viant's household-ID approach) [5][9][10]; pragmatist ad-tech engineering commentary; implicitly, every DSP still transacting on bid-stream IP — which Digiday's own reporting concedes remains \"pretty widely available... a lot of bids in the bidstream\" [7].\n\n**The position in their language:** Distinguish the *web/mobile* IP from the *CTV* IP. The signals being killed are browser-context IPs — exactly where Private Relay and IP Protection operate. Neither touches the native CTV app environment: Private Relay covers Safari and insecure web traffic for iCloud+ subscribers; IP Protection is **Incognito-only, third-party-context-only, masked-domain-list-only** [14][15]. The television sits on residential fixed broadband, the most stable consumer network that exists. Under IPv6, the interface bits rotate but the **household prefix survives** — and where ISPs do rotate prefixes, the rotation is ISP-policy, observable, and modellable; prefix-aware methods (clustering on /56–/64, network-type classification, rotation-adjusted reach) are exactly what serious vendors now ship [12]. CGNAT is detectable and excludable [13]. Even the deterministic alternatives quietly **bootstrap off IP**: household graphs that carry UID2/RampID cluster those IDs into households using home-IP co-observation (TrueData markets precisely this home-IP + CTV-ID spine) [10], and Experian's own CTV material describes IP as the historical household key that UID2 supplements rather than replaces [19]. IP identity is not dying; it is consolidating from \"any IP anywhere\" to \"the residential household prefix, properly engineered\" — fewer, better IPs, owned by whoever has the engineering and the ISP relationships.\n\n### What would settle it\n\nMostly factual and partially resolvable: (a) measured prefix-rotation prevalence by ISP and country over time (IPinfo-class telemetry, RIPE/APNIC data); (b) whether frequency-capping error rates in production rise or fall 2026–2028; (c) whether Apple/Google extend proxying into CTV/app contexts (a discrete observable event). The unresolvable residue is definitional: whether \"household-prefix identity\" still counts as \"IP identity\" or is a new thing.\n\n**Fact vs. values:** rotation rates, CGNAT prevalence, proxy scope are facts. \"Dying vs. consolidating\" is a framing choice over the same facts — each camp's vocabulary serves its product roadmap.\n\n---\n\n## Debate 3 — The regulatory debate: is raw-IP processing legally radioactive?\n\n### The shared legal floor\n\n*Breyer v. Germany* (CJEU C-582/14, Oct. 19, 2016) held that a **dynamic IP address constitutes personal data** in the hands of a website operator where the operator has legal means (via the ISP) to identify the user — the \"relative\" identifiability test — while simultaneously holding that Germany could not narrow the legitimate-interest basis below the Directive's standard [16][20]. Both camps accept Breyer; they disagree about what follows.\n\n### Camp A (steelmanned): the maximalist reading — \"consent or don't touch it\"\n\n**Advocates:** EU data-protection regulators and privacy advocates; Patrick Breyer himself (former MEP, Pirate Party); the German Datenschutzkonferenz (DSK) in its Orientierungshilfe Telemedien; France's CNIL in its targeted-advertising guidance; US plaintiff-side privacy bar extending the logic under CCPA/state laws.\n\n**The position in their language:** Breyer plus GDPR means IP addresses are personal data essentially always in ad-tech contexts, because the ecosystem's whole point is linkage. For **targeted advertising and profiling, consent is the rule** — the CNIL states flatly that IP addresses can be collected or processed for targeted advertising only with valid consent, and even its consent-*exempt* audience-measurement carve-out requires truncating the IP (recording only the first three octets) [21][22]. The German DSK's framework runs the ePrivacy-derived §25 TTDSG/TDDDG consent requirement in parallel with GDPR: the *receipt* of a public IP at connection time needs no consent (it is technically necessary), but any *subsequent processing* for advertising identity is a GDPR question where legitimate interest will rarely survive balancing for cross-context profiling [23][24]. France's segmented-TV regime (the 2020 décret enabling *publicité segmentée* via ISP set-top boxes) was explicitly placed under CNIL supervision with GDPR + ePrivacy applying to the household data involved [25]. In the US, CCPA names IP addresses in the personal-information definition and — uniquely — defines PI to include **household-level** data; Oregon's OCPA explicitly covers devices \"linked... to one or more consumers in a household\"; twenty states now have comprehensive laws [17][18]. Building household identity from IP without a consent or opt-out architecture is, on this reading, a litigation and enforcement time bomb — and the prudent counsel position is the one a Gunderson Dettmer attorney gave Digiday: \"It hasn't been tested from a legal perspective... But I would err on the side of caution\" [7].\n\n### Camp B (steelmanned): the pragmatist reading — \"regulated, not radioactive\"\n\n**Advocates:** ad-tech counsel and DPOs in the IAB Europe orbit; publishers and broadcasters operating segmented TV in France and Germany today; US ad-tech compliance practice generally.\n\n**The position in their language:** The maximalist reading proves too much — if it were right, the entire European segmented-TV market (which operates today, lawfully, with CNIL supervision) could not exist [25]. The actual law is more textured. Breyer itself *broadened* legitimate interest against German attempts to narrow it [20]. GDPR Recital 49 expressly blesses network-security and fraud-prevention processing of exactly this data under legitimate interest — which is why IP-based invalid-traffic detection runs EU-wide without consent banners. The CNIL's truncation guidance is not a prohibition but a **roadmap**: truncate, pseudonymize, shorten retention, and audience measurement is consent-exempt [22]. The DSK explicitly says connection-necessary IP receipt is outside §25 consent [23]. The live doctrinal frontier — the *SRB v. EDPS* line on whether pseudonymized data is personal data *in the recipient's hands* (the relative approach) — has been moving in a direction ad tech reads as favorable to transmitting pseudonymized/truncated identifiers to parties who cannot re-identify them [26]. And in the US, the regime is **opt-out, not opt-in**: state laws regulate \"sale/share\" of IP-inclusive data and require honoring GPC-style signals, but nothing makes raw-IP processing per se unlawful — the compliance task is plumbing, not abstinence [17][18]. The pragmatist synthesis: consent where you profile, legitimate interest where you protect, truncation where you measure, and the business continues.\n\n**EU-vs-US divergence, named:** Europe is consent-default with the IP itself as personal data from Breyer down; the US is opt-out-default with IP as one enumerated PI element among many and household identity *explicitly contemplated* by CCPA's definition. The same IP-graph product is consent-gated infrastructure in Munich and a disclosure-and-opt-out problem in Sacramento. The non-Anglophone anchors here are primary: the DSK's Orientierungshilfe Telemedien (German) [23] and the CNIL's published guidance on *publicité ciblée* and IP truncation (French) [21][22].\n\n### What would settle it\n\nA CJEU or major-DPA decision squarely on IP-based household ad targeting (not yet decided as of June 2026); a US state AG enforcement action specifically on CTV IP graphs; or final resolution of the relative-vs-absolute identifiability line. Until then both readings are professionally defensible, which is itself the finding: **legal risk pricing, not legal certainty, is what divides the camps** — a values/risk-appetite disagreement layered on genuinely unsettled doctrine.\n\n---\n\n## Debate 4 — Platform proxying: privacy or power?\n\n### Camp A (steelmanned): genuine privacy engineering\n\n**Advocates:** Apple and Google privacy engineering (primary documents: Apple's Private Relay architecture; the Chrome IP Protection public spec on GitHub) [14][15]; academic privacy researchers on IP tracking; privacy advocates generally.\n\n**The position in their language:** The IP address is the one tracking vector a user **cannot refuse**. Cookies can be blocked, IDs reset, logins declined — but every packet carries a source address, and the CIMM study itself proves an entire shadow industry builds persistent household identity from it without any user-facing consent moment [1]. Private Relay's two-hop architecture (Apple sees the user but not the destination; the second-hop CDN sees the destination but not the user) is engineered precisely so that *no party, including Apple,* holds both ends [14]. Chrome's IP Protection is deliberately calibrated, not blunt: Incognito-only, third-party contexts only, a public **Masked Domain List** of known trackers, two hops with the second operated by an external CDN, and **coarse geolocation deliberately preserved** so country/region ad serving still works [15]. These are scoped, published, reviewable designs. The fact that obfuscation also inconveniences ad-tech intermediaries is not evidence of bad faith; it is what protecting users from non-consensual tracking *looks like*.\n\n### Camp B (steelmanned): moat-building dressed as privacy\n\n**Advocates:** IAB Tech Lab — Alex Cone's position paper \"Private Relay by Apple, Data Protection Middleware, and Proprietary Approaches vs. Standards\" is the canonical text: \"one company making decisions for the internet is not even close to ideal\"; privacy solutions \"should be developed out in the open\" [27]. Anthony Katsur (IAB Tech Lab CEO) extended the same critique to Privacy Sandbox (\"multiple hurdles... limitations in achieving key advertising objectives\"), to which Google retorted the assessment was \"full of inaccuracies\" [28][29]. Open-internet ad-tech (The Trade Desk orbit) and publisher advocates echo it.\n\n**The position in their language:** Follow the asymmetry. Apple and Google obfuscate the IP **for third parties** while their own logged-in, first-party ecosystems — App Store ads, Search, YouTube, the signed-in Chrome/Android stack — retain perfect identity. Private Relay degrades the open web's signal while Apple's ad business grows; IP Protection launched only after Google **abandoned third-party-cookie deprecation (April 2025)** and gutted Privacy Sandbox, revealing how contingent the \"privacy\" roadmap is on Google's commercial and antitrust position [15][30]. The proper venue for changing internet-wide identifiers is a standards body — IETF, W3C — where PARAKEET-style proposals offered \"similar data protection and privacy traits\" with open governance, which is why Tech Lab endorsed Microsoft's open proposal over Apple's closed one [27]. The proxying also creates *new* problems the platforms externalize: Pixalate documented the \"iP64\" exploit in which fraudsters hid behind iCloud Private Relay's IP space — ~90% of *purported* Private Relay traffic in its August 2022 study was invalid, an estimated **$65M+** fraud cost — because Apple's egress ranges became an unauditable trust zone (Tier 6 vendor research; directionally corroborated by AppleInsider/Gizmodo coverage) [31][32]. Privacy for the user, opacity for the ecosystem, immunity for the platform: that is a moat with a privacy press release.\n\n**CTV-specific nuance both camps accept:** neither Private Relay nor IP Protection currently operates inside native CTV apps; the direct CTV effect is second-order — the web/mobile IP-to-email bridges that *feed* CTV household graphs decay as browser-context IP disappears [12][14][15].\n\n### What would settle it\n\nNothing fully — this is the most values-laden debate of the six (what *should* a platform owe the open ecosystem?). Partially resolving observables: whether Apple/Google extend obfuscation to app/CTV traffic; whether either submits its proxy architecture to a standards process; antitrust outcomes (the UK CMA's Privacy Sandbox commitments framework being the template).\n\n---\n\n## Debate 5 — Deterministic vs. probabilistic: who can afford which truth?\n\n### Camp A (steelmanned): authenticated/deterministic identity is the only durable foundation\n\n**Advocates:** The Trade Desk (UID2); Disney, NBCUniversal, Paramount, Roku, AMC Networks, Dish Media, and FreeWheel as UID2/EUID integrators [33]; Experian's CTV practice (\"authenticated audiences... UID2 has emerged as a new incumbent in the CTV ecosystem\" precisely because IP durability is degrading) [19][33]; LiveRamp (RampID) in the same structural position.\n\n**The position in their language:** CTV is the *one* channel where deterministic identity is natural: streaming requires accounts. A hashed-email UID2 from a Disney+ or Paramount+ login is consented (or at least contractual), person-level, cross-device, and immune to every force in Debate 2 — rotation, CGNAT, proxying do not touch it. The Truthset numbers are the probabilistic camp's own indictment: 13% postal accuracy *is* what probabilistic household resolution delivers at industrial scale [1][2]. Premium streamers have aligned accordingly; UID2 integration spans the major US programmers and platforms [33]. Build on logins, extend via clean rooms, and treat everything else as remnant.\n\n### Camp B (steelmanned): probabilistic household resolution is where the actual market lives\n\n**Advocates:** Viant (household ID), fullthrottle.ai, Intent IQ, TrueData [5][9][10]; FAST/AVOD publishers without login density; mid-market agencies.\n\n**The position in their language:** Deterministic coverage has a **ceiling: login density times match rate times consent rate** — high inside Disney and Netflix, thin across the FAST long tail where, by 2025, roughly half of CTV users watch free ad-supported streaming with shallow or shared logins [33]. Authentication is also *household-blind*: a login identifies a person-account, but TV is a shared-screen, household-level medium — the living-room TV is watched by the family, not by the hashed email that registered it. And deterministic is expensive in every direction: data licensing, clean-room compute, match fees — costs only the largest buyers and sellers clear, which is exactly why the loudest deterministic advocates are the companies selling the rails (TTD, LiveRamp, Experian) and the walled streamers whose login bases become pricing power. The probabilistic position is not \"ignore logins\"; it is that **logins themselves get household-ized through IP co-observation** (Debate 2's consolidation point), so the realistic architecture is hybrid: deterministic spine where it exists, probabilistic household resolution everywhere else, priced for the 80% of the market that is not Disney. WPP Media COO JiYoung Kim's CES 2026 line captures the standardization politics: every walled garden says \"we can solve this problem — if you do it my way\" [5]; OpenAP's David Levy concedes a universal CTV identifier is unlikely, proposing instead a translation layer (Open Identifier) across the proprietary ones [5].\n\n### What would settle it\n\nEconomics, observably: relative CPM premia and measured outcome lift for authenticated vs. probabilistic line items at scale; UID2 token density in CTV bid streams over time; whether FAST login rates rise. The coverage-ceiling claim is factual and trackable. The \"TV is a household medium, person-level identity is a category error\" claim is partly conceptual — a genuine interpretive disagreement about what CTV identity *should* resolve to.\n\n---\n\n## Debate 6 — The measurement-currency fight, as it touches IP\n\n### The configuration\n\nThe 2025–26 US broadcast season is the first in which **Nielsen's \"Big Data + Panel\"** product (its ~42,000-home panel calibrating return-path and ACR data from ~45 million households / 75 million devices) runs as currency alongside **VideoAmp, iSpot, and Comscore**, all three of which passed the US Joint Industry Committee (JIC) certification audit (699+ tests) for the season [34][35][36]. VideoAmp cleared ~$3B in 2024 upfront deals (an 880% YoY jump) and targets $1.5B+ in guaranteed media; WBD, NBCU, Paramount and major holdcos transact on it [36][37].\n\n### Where IP sits inside each methodology — and the fight\n\n- **The big-data challengers (VideoAmp, iSpot, Comscore)** assemble commingled ACR + set-top-box footprints and resolve them to households and audiences via identity-graph crosswalks — the join keys for unifying a smart TV's ACR feed, an STB, and digital exposure are substantially **IP-and-device-graph based** (VideoAmp's \"commingled identity graph\" deduplicates devices to households for reach/frequency) [38][39]. Their pitch: census-scale coverage panels cannot match, deduplicated cross-screen measurement, modern pipes.\n- **Nielsen's counter (steelmanned):** big data without a probability panel inherits *every bias of the matching layer* — and the Truthset study is now Exhibit A that the matching layer is unreliable at industrial scale [1][2]. Panels provide person-level ground truth; Nielsen's framing is that big data is an *input* to be calibrated by panel truth, not a currency by itself [34][35]. Notably, even Nielsen's rivals concede the calibration point: VideoAmp and iSpot license person-level panel data from TVision to calibrate their household-level big data [40].\n- **The challengers' counter-counter (steelmanned):** Nielsen's panel has its own crisis (size, fatigue, the 2021 MRC accreditation suspension history), and a 42,000-home panel cannot measure long-tail streaming at all; calibrated big data with transparent JIC audits is more accountable than a black-box panel monopoly. The JIC certification — an unprecedented buyer/seller joint audit — exists precisely because the market no longer accepts \"trust the panel\" [35][36].\n\n**The IP through-line:** every household-level big-data currency depends on IP-mediated crosswalks somewhere in its assembly; therefore the Debate 1 accuracy war is not a targeting story only — **it is a direct attack surface on the credibility of every non-panel currency**, and Nielsen is the structural beneficiary of the Truthset framing, just as the MVPD consortium behind Go Addressable benefits from it on the targeting side [1][2][38]. (No public evidence shows Nielsen commissioned or steered the study; the benefit is structural, not conspiratorial.)\n\n### What would settle it\n\nCross-currency reconciliation studies with disclosed identity-resolution error budgets; MRC audits of the *identity layer* (not just the viewing data) of each currency; stability of guarantees written on challenger currencies through a full season of make-goods. All factual, all in motion.\n\n---\n\n## The dynamics moving the space (2025–2026)\n\n### 1. Clean rooms move from pilot to default plumbing\n\nClean-room adoption is now mainstream — credible industry estimates put usage around two-thirds of US data/ad professionals, with CTV fragmentation the stated driver: cross-publisher CTV measurement requires programmers to expose viewing data without releasing it, which is the clean room's exact use case [41]. Disney's clean-room build-out with VideoAmp integration for measurement is the template transaction [42]. **Effect on the IP debates:** clean rooms shift identity resolution from open bid-stream IP matching toward governed first-party joins — strengthening the deterministic camp's hand (Debate 5) while *quietly preserving* IP/household keys inside the room as join fallbacks.\n\n### 2. ACR data: licensing walls plus legal fire\n\nThe ACR layer is bifurcating: Samsung Ads (~33M opted-in US TVs) and LG keep ACR data captive to their own ad businesses; Vizio (now Walmart-owned) remains the only manufacturer licensing ACR broadly via Inscape; platform/data revenue now exceeds hardware revenue at Vizio ($598M platform revenue in 2023) and LG's ad business reached ~$700M in 2024 [43]. Simultaneously the legal ground shook: a 2024 ACM IMC peer-reviewed study measured ACR tracking on Samsung and LG sets directly; the **Texas Attorney General sued five major TV manufacturers (December 2025)** over ACR surveillance without consent, and **Samsung settled in February 2026** (settlement report single-sourced to a privacy-advocacy tracker; flag for verification) [44][45]. **Effect:** ACR — the main *non-IP* household signal — is getting more expensive, more consent-gated, and more concentrated, which paradoxically props up IP's role as the free fallback.\n\n### 3. AI/contextual resurgence\n\nScene-level, AI-driven contextual targeting in CTV (\"Contextual 2.0\") is having a genuine commercial moment, marketed explicitly as the identity-free escape hatch — with industry research claiming large attention premia for contextually matched CTV ads [46][47]. **Effect:** gives buyers a credible BATNA in every identity negotiation, capping what either IP graphs or authenticated IDs can charge.\n\n### 4. SSAI transparency and the fraud arms race\n\nDoubleVerify's fraud lab reports CTV fraud schemes up **140% in Q1 2026 vs. Q1 2025** and 10x more fraudulent CTV apps in 2025 vs. 2024; landmark SSAI schemes (SneakyTerra: ~2M devices/day spoofed, ~$5M/month exposure) hijack real device sessions behind SSAI's server-side opacity [48][49]. Regional fraud signatures differ sharply — datacenter-IP traffic dominates violations in APAC (98%) and LATAM (91%) vs. bot fraud (82%) in North America [49] (Tier 6 vendor telemetry; directionally consistent across DV reports). The standards answer, **ads.cert 2.0** (IAB Tech Lab, Sept. 2021 — cryptographically authenticated server-to-server connections, aimed squarely at SSAI billing/request authentication), remains the canonical fix with chronically lagging adoption; Tech Lab's own executives (Shailley Singh) have spent 2021–2026 urging SSAI providers to implement Authenticated Connections [50][51]. **Effect on the IP debates:** fraud is the one domain where *everyone* agrees IP must keep flowing (datacenter-IP detection is the first-line filter), which is the quiet structural floor under IP's survival — and the pragmatist camp's best GDPR argument (Recital 49) in Debate 3.\n\n### 5. The platform-gravity undertow\n\nThe through-line Mike Shields drew from CES 2026: if open-CTV identity stays fragmented — IP contested, IDs proprietary, currencies plural — budgets default to Amazon, Google, and Meta's integrated stacks, where identity is somebody else's solved problem [5]. Every camp in every debate above invokes this threat against its opponents; it is the shared doomsday clock of the open CTV ecosystem.\n\n---\n\n## Open Questions\n\n1. **Per-vendor production accuracy:** What is the measured accuracy of named identity vendors' *live* (recency-windowed, multi-signal) IP-household resolution against ISP ground truth — the test that would actually settle Debate 1? No such public benchmark exists as of June 2026.\n2. **CIMM Identity Infrastructure 2.0 (April 2026):** What does the full report propose, and does it walk back or extend the 13% framing? (Referenced but not directly consulted — the PDF exceeded fetch limits.)\n3. **Prefix-rotation prevalence:** What share of US/EU/APAC broadband subscribers sit behind daily IPv6 prefix rotation, by ISP? Only vendor-reported characterizations (\"now common among large providers\") are public.\n4. **Will platform proxying reach CTV-native traffic?** Any Apple/Google move to proxy app-layer or smart-TV traffic would collapse the consolidation narrative's core premise.\n5. **First enforcement on CTV IP graphs:** Which comes first — an EU DPA decision squarely on IP-based household ad targeting, or a US state AG action — and on what theory?\n6. **The SRB/EDPS relative-identifiability line:** Where did the CJEU finally land on pseudonymized data in recipients' hands, and how directly does it read onto truncated/hashed IPs in ad tech? (Referenced via legal commentary; final judgment not directly consulted.)\n7. **UID2 bid-stream density in CTV:** What fraction of US CTV impressions carry a UID2/EUID token vs. relying on IP — the single best quantitative tracker of Debate 5's trajectory?\n8. **JIC/MRC auditing of the identity layer:** Will currency audits ever publish identity-resolution error budgets, not just viewing-data validation?\n9. **Did any of the six benchmarked vendors publicly rebut Truthset with data?** As of this research, the graph camp's rebuttals are methodological arguments and vendor marketing claims, not counter-benchmarks.\n10. **Non-US debate texture:** How are these same fights playing in Germany's addressable-TV (HbbTV) ecosystem and France's segmented-TV market in their own trade press? (This document's non-Anglophone sourcing is regulatory, not trade-debate, coverage — a known gap.)\n\n---\n\n## Sources\n\nAccessed 2026-06-09 unless noted. Tier per the corpus source hierarchy; lean noted for Tier 4-6.\n\n1. CIMM / Go Addressable / Truthset, \"CIMM and Go Addressable Release Landmark Report on IP-to-Household Accuracy,\" Nov. 2025. https://cimm-us.org/cimm-and-go-addressable-release-landmark-report-on-ip-to-household-accuracy-highlighting-gaps-in-ctv-and-audience-based-advertising/ — Tier 5 (industry coalition research with disclosed methodology; MVPD-aligned funders).\n2. Schiff, Allison, \"IP Address Match Rates Are a Joke – And It's No Laughing Matter,\" AdExchanger, Nov. 5, 2025. https://www.adexchanger.com/tv/
