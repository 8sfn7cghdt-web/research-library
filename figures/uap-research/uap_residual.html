<figcaption><strong>Fig. 2.</strong> Across three regimes the bars never reach a full close: Blue Book filed 701 of 12,618 cases as &#8220;unidentified&#8221; (&#8776;5.6%); the Condon Report declared further study &#8220;unjustified&#8221; while roughly a third of its examined cases stayed unexplained &#8212; the gap between executive summary and case data; and AARO took in &#8776;757 new cases against &#8776;1,600 cumulative yet formally resolved only 49, an intake-to-resolution ratio near 5:1. The asymmetry does the rest &#8212; a believer needs one unresolvable case, a skeptic every case &#8212; so it is the durable residual, not any single clip, that keeps the question open.</figcaption>
