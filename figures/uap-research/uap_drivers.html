<figcaption><strong>Fig. 5.</strong> The trajectory is driven less by new evidence than by a stack of structural forcing functions: sensor proliferation (intake &#8776;5&#215; AARO throughput), cohort replacement (+1.0&#8211;1.5 pp/yr; under-30 ET-belief 76% vs 57% over-50), media economics, and civilian money (the Galileo Project&#8217;s $575k Mellon grant, the Sol Foundation) all push toward disclosure &#8212; with politics ambivalent after UAPDA was gutted in conference yet revived by May 2026&#8217;s PURSUE 300-day countdown. Against five accelerants stands one brake &#8212; SAP career-risk culture and attention competition with Ukraine, Gaza and China &#8212; and the whole stack rests on a deep substrate of post-2008, post-Iraq, post-COVID institutional distrust.</figcaption>
