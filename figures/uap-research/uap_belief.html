<figcaption><strong>Fig. 6.</strong> Belief is no longer fringe but a near-50% median that rises about a point a year purely by cohort replacement &#8212; and it splits sharply by age: 49% of Gen Z versus 34% of boomers see a government cover-up, and 76% of under-30s versus 57% of over-50s think intelligent life exists. The generational gradient, not the sky, is the signal: across Pew&#8217;s 51%, Gallup&#8217;s 41% (up 8 points since 2019), and 2024&#8211;25&#8217;s ~44&#8211;47%, the cover-up figure reads less as evidence about UAP than as a barometer of institutional trust &#8212; Dean&#8217;s rational distrust shading into Pasulka&#8217;s belief-as-religion.</figcaption>
