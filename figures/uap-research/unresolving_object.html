<figcaption><strong>Fig. 3.</strong> The whole UAP question, framed as a scope: analysis pushes most contacts <em>outward</em> to the mundane ring (balloons, drones, optical artifacts) and some to the foreign / classified ring &#8212; but a small residual core never resolves, and the redaction bar sits over exactly that core. The asymmetry is the engine of the debate: a believer needs one genuinely unresolvable case, while a skeptic must explain every one. Blue Book closed having filed 701 of 12,618 cases as simply &#8220;unidentified.&#8221;</figcaption>
