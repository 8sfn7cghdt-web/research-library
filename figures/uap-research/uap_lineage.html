<figcaption><strong>Fig. 1.</strong> Read left to right, the shaded band moves CURIOSITY &#8594; DEBUNK &#8594; CLOSURE &#8594; RE-OPENING on its own logic: Project Sign&#8217;s &#8220;Estimate of the Situation&#8221; leaned interplanetary until Gen. Vandenberg rejected it, the 1953 Robertson Panel ordered a public debunking stance, and Blue Book closed in 1969 with 701 of 12,618 cases still &#8220;unidentified&#8221; &#8212; a residue the closure simply filed away rather than resolved. The 38-year gap to the 2017 NYT/AATIP hinge, then AARO and the May 2026 PURSUE release of 160+ files, shows the institutional posture, not the underlying evidence, deciding when the question was allowed to be open.</figcaption>
