<figcaption><strong>Fig. 4.</strong> Post-2023, the UAP question stops being binary and becomes a sort: AARO funnels almost every report into the MUNDANE PROSAIC bin (balloons &#8212; the largest single category after the Feb 2023 PRC-balloon recategorization &#8212; plus ~2.8 million drones in U.S. airspace by 2024, optical artifacts, and misidentified aircraft) or the FOREIGN-ADVERSARIAL / classified-platform bin, leaving only a small GENUINELY ANOMALOUS RESIDUAL. Because the top two bins absorb the overwhelming majority, even the canonical cases drain upward &#8212; Mick West&#8217;s Go Fast geometry (declassified Apr 2020, alongside Tic Tac 2004 and Gimbal 2015) puts the object near 13,000 ft at 28&#8211;100 knots, consistent with a balloon. The geometry&#8217;s narrowing trapezoids reveal the thesis: the entire debate now lives inside that small third bin.</figcaption>
