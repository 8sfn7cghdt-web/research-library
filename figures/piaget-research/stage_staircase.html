<figure class="corpus-fig" role="group">
<svg viewBox="0 0 700 430" role="img" aria-label="A four-step ascending staircase of the developmental stages, bottom to top. Each step shows the stage, its signature task, and its signature finding. Step one, sensori-motor (0 to 2): the hidden-object search; the A-not-B error, where the object is still bound to the infant's own action. Step two, pre-operational (2 to 7): the three-mountains task and the conservation pour; egocentrism and the failure of conservation. Step three, concrete operational (7 to 11): conservation, class-inclusion and seriation, now passed with justification but tied to concrete content. Step four, formal operational (11 plus): the pendulum control-of-variables task; hypothetico-deductive reasoning, which is not universal in adults. A side note states that the sequence is robust but the ages are soft, the synchrony is false, and formal operations are not universal.">
<text x="350" y="30" text-anchor="middle" font-size="14" class="t-serif" letter-spacing="2">THE FOUR STAGES</text>
<text x="350" y="48" text-anchor="middle" font-size="10.5" class="t-muted" font-style="italic">the signature task &#8212; and the signature error &#8212; at each step</text>
<rect x="40" y="300" width="470" height="58" rx="3" class="f-panel" stroke-width="1.2" style="stroke:var(--border)"/>
<rect x="40" y="300" width="120" height="58" rx="3" class="f-t2"/>
<text x="100" y="324" text-anchor="middle" font-size="12" font-weight="bold" class="t-inv">Sensori-motor</text>
<text x="100" y="342" text-anchor="middle" font-size="9.5" class="t-inv" opacity=".85">0&#8211;2</text>
<text x="172" y="322" font-size="10.5">task: search for a hidden object</text>
<text x="172" y="340" font-size="10.5" class="t-muted">finding: the A-not-B error &#8212; object bound to one&#8217;s own action</text>
<rect x="56" y="232" width="470" height="58" rx="3" class="f-panel" stroke-width="1.2" style="stroke:var(--border)"/>
<rect x="56" y="232" width="120" height="58" rx="3" class="f-t5"/>
<text x="116" y="256" text-anchor="middle" font-size="12" font-weight="bold" class="t-inv">Pre-operational</text>
<text x="116" y="274" text-anchor="middle" font-size="9.5" class="t-inv" opacity=".85">2&#8211;7</text>
<text x="188" y="254" font-size="10.5">task: three-mountains &#183; the conservation pour</text>
<text x="188" y="272" font-size="10.5" class="t-muted">finding: egocentrism; conservation fails (no reversibility)</text>
<rect x="72" y="164" width="470" height="58" rx="3" class="f-panel" stroke-width="1.2" style="stroke:var(--border)"/>
<rect x="72" y="164" width="120" height="58" rx="3" class="f-t3"/>
<text x="132" y="188" text-anchor="middle" font-size="11.5" font-weight="bold" class="t-inv">Concrete op.</text>
<text x="132" y="206" text-anchor="middle" font-size="9.5" class="t-inv" opacity=".85">7&#8211;11</text>
<text x="204" y="186" font-size="10.5">task: conservation &#183; class-inclusion &#183; seriation</text>
<text x="204" y="204" font-size="10.5" class="t-muted">finding: passes, with justification &#8212; but tied to the concrete</text>
<rect x="88" y="96" width="470" height="58" rx="3" class="f-panel" stroke-width="1.2" style="stroke:var(--border)"/>
<rect x="88" y="96" width="120" height="58" rx="3" class="f-t1"/>
<text x="148" y="120" text-anchor="middle" font-size="11.5" font-weight="bold" class="t-inv">Formal op.</text>
<text x="148" y="138" text-anchor="middle" font-size="9.5" class="t-inv" opacity=".85">11+</text>
<text x="220" y="118" font-size="10.5">task: the pendulum &#8212; control of variables</text>
<text x="220" y="136" font-size="10.5" class="t-muted">finding: hypothetico-deductive &#8212; but <tspan class="t-acc">not universal</tspan></text>
<path d="M30,358 L30,108" fill="none" class="s-t1" stroke-width="2"/>
<polygon points="24,118 30,102 36,118" class="f-t1"/>
<text x="20" y="240" text-anchor="middle" font-size="9.5" class="t-acc" font-weight="bold" transform="rotate(-90 20 240)">SEQUENCE &#8212; invariant order, robust</text>
<line x1="40" y1="384" x2="660" y2="384" class="ln-soft" stroke-width="1"/>
<text x="350" y="406" text-anchor="middle" font-size="10" class="t-muted" font-style="italic">the order survives every test; the <tspan class="t-acc">ages are soft</tspan>, the within-stage <tspan class="t-acc">synchrony is false</tspan>, and the top step is reached by fewer than half of adults</text>
</svg>
<figcaption><strong>Fig. 2.</strong> What endured and what did not: the <em>order</em> of the four stages is the robust, cross-culturally durable core, but the ages are averages (not milestones), the abilities of a stage do <em>not</em> arrive together, and formal operations are reached &#8212; by Piaget&#8217;s own 1972 concession &#8212; only &#8220;under favorable circumstances,&#8221; by well under half of adults (Claims 4.3, 6.6).</figcaption>
</figure>
