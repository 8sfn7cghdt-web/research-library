<figcaption><strong>Fig. 4.</strong> How the theology became the psychology: in his 1928 lecture to the Swiss Christian students, Piaget sorts the two God-concepts by the <em>same</em> constraint&#8211;cooperation axis that runs from heteronomy to autonomy in his moral development theory &#8212; identifying the immanent God not with the self but with &#8220;the norms of thought itself,&#8221; the bridge from his Protestant youth to genetic epistemology (Claims 2.7&#8211;2.8).</figcaption>
