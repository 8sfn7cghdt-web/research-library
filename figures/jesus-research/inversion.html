<figcaption><strong>Fig. 9.</strong> The funicular inversion. Gaudí found his perfect arches by hanging chains and reading the model upside-down; the Beatitudes perform the same operation on the social order. "Many who are first will be last, and the last first" is not sentiment — it is structural engineering.</figcaption>
