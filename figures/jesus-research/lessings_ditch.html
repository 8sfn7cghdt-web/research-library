<figcaption><strong>Fig. 15.</strong> The ditch every modern Christology must cross. After Lessing and Kant, no pile of historical reports adds up to a metaphysical certainty — every thinker in this chapter is an attempt at the crossing, a bridge, or a refusal to jump.</figcaption>
