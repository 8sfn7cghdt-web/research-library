<figure class="corpus-fig" role="group">
<svg viewBox="0 0 700 360" role="img" aria-label="Two arcs forming a V: the descent of the Logos into flesh on the left, and humanity's ascent through purification, illumination, and union on the right, meeting in Christ at the center">
<text x="350" y="34" text-anchor="middle" font-size="11.5" font-style="italic">&#8220;He became human that we might become divine.&#8221;</text>
<text x="350" y="50" text-anchor="middle" font-size="9" class="t-muted">&#8212; Athanasius, On the Incarnation 54</text>
<circle cx="90" cy="78" r="8" class="f-t3"/>
<text x="90" y="104" text-anchor="middle" font-size="10.5" font-weight="bold">The Logos</text>
<text x="90" y="118" text-anchor="middle" font-size="9" class="t-muted">in the beginning, with God</text>
<path d="M98,86 C 180,120 300,190 342,266" fill="none" class="s-t3" stroke-width="6" stroke-linecap="round" opacity=".85"/>
<polygon points="336,258 348,274 326,268" class="f-t3"/>
<text x="150" y="170" text-anchor="middle" font-size="11" font-weight="bold" class="t-acc">the descent</text>
<text x="150" y="186" text-anchor="middle" font-size="9.5" class="t-muted">the Word becomes flesh &#183; Jn 1:14</text>
<circle cx="610" cy="78" r="8" class="f-t2"/>
<text x="610" y="104" text-anchor="middle" font-size="10.5" font-weight="bold">deified humanity</text>
<text x="610" y="118" text-anchor="middle" font-size="9" class="t-muted">the image grown into likeness</text>
<path d="M358,266 C 420,170 520,110 602,86" fill="none" class="s-t2" stroke-width="6" stroke-linecap="round" opacity=".85"/>
<polygon points="592,78 612,82 596,94" class="f-t2"/>
<circle cx="424" cy="190" r="5.5" class="f-t2"/>
<text x="446" y="196" font-size="9.5"><tspan font-weight="bold">katharsis</tspan> &#183; purification</text>
<circle cx="498" cy="140" r="5.5" class="f-t2"/>
<text x="520" y="146" font-size="9.5"><tspan font-weight="bold">the&#333;ria</tspan> &#183; illumination</text>
<circle cx="562" cy="104" r="5.5" class="f-t2"/>
<text x="548" y="88" text-anchor="end" font-size="9.5"><tspan font-weight="bold">the&#333;sis</tspan> &#183; union</text>
<text x="470" y="248" font-size="9.5" class="t-muted" font-style="italic">by grace, not by nature &#8212;</text>
<text x="470" y="262" font-size="9.5" class="t-muted" font-style="italic">participation, never identity</text>
<circle cx="350" cy="282" r="32" class="f-t1"/>
<text x="350" y="288" text-anchor="middle" font-size="12.5" font-weight="bold" class="t-inv">Christ</text>
<text x="350" y="336" text-anchor="middle" font-size="9.5" class="t-muted">the meeting point &#8212; the exchange formula of the Greek fathers</text>
</svg>
<figcaption><strong>Fig. 13.</strong> The great exchange. Theosis is a single geometry: the Logos descends into flesh so that flesh can ascend — purification, illumination, union — into participation in the divine life.</figcaption>
</figure>
