<text x="350" y="318" text-anchor="middle" font-size="10" class="t-muted" font-style="italic">Each edition is not a better copy but a rival theory of the author — and for 115 years the physical archive itself was torn in two.</text>

<figcaption><strong>Fig. 2.</strong> Everything the world calls "Emily Dickinson" is a posthumous construction. A family feud (Austin's affair with Mabel Loomis Todd, the 1898 lawsuit) physically tore the manuscripts between Harvard and Amherst; the great scholarly editions — Johnson 1955, Franklin 1981 and 1998 — advanced on a corpus still split, until the 2013 digital archive rejoined the two halves for the first time since 1886.</figcaption>
