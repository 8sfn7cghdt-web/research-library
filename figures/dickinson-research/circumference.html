<svg viewBox="0 0 700 400" role="img" aria-label="A circle labeled Circumference, the knowable mind at its center. Six themes sit on the rim as limits where the finite meets the infinite: Immortality (the Flood subject) at top, God the absconded deity, Death the threshold, Pain the bearable self at bottom, Love and Renunciation, and Nature the limit of observation. Beyond the rim lies the infinite, eternity, and the unsayable.">

<figcaption><strong>Fig. 4.</strong> Dickinson's themes are not a list but one problem with many faces. "Circumference" is her own name for the boundary-line where the finite mind presses on the infinite — and death, God, nature, pain, immortality, and renunciation are each that same rim seen from a different side. She is a poet of the limit: every subject is an experiment in what a mind can know and survive at the edge of the unknown.</figcaption>
