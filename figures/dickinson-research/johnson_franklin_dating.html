<figcaption><strong>Fig. 1.</strong> The famous "1862 miracle year" is partly an artifact of how Johnson dated the poems. His 1955 edition piled about 366 poems onto 1862; Franklin's 1998 redating — using stationery, embossments, and the alignment of fascicle pinholes, not handwriting alone — assigns about 227 to 1862 and spreads the surge across 1863 (~295) and 1865. The early-1860s peak is real and enormous under either editor; the singling-out of one year is editorial.</figcaption>
