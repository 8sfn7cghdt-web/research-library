<figcaption><strong>Fig. 7.</strong> The transition never finishes because finishing it would require pain the loop keeps removing &#8212; cheap IPv4 relieves the CGNAT pressure that is IPv6&#8217;s only deployment forcing-function, so the dual-stack mess regenerates the very IPv4 demand that started the cycle. This is a system engineered, accidentally, to preserve its own half-built state.</figcaption>
