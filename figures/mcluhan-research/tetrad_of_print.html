<figure class="corpus-fig" role="group">
<svg viewBox="0 0 700 566" role="img" aria-label="The four Laws of Media — the tetrad — applied to print. A central node, movable type around 1450, is surrounded by four quadrant cards. Top-left, ENHANCES: the eye and visual sequence, the portable private book, uniform repeatable mass-produced text, the individual point of view. Top-right, REVERSES INTO: pushed to its limit, mass standardization flips into the assembly line and a homogenized corporate world — the electric, retribalized global village. Bottom-left, RETRIEVES: classical antiquity and the recovered authorial self, the vernacular nation. Bottom-right, OBSOLESCES: the oral and scribal manuscript, collective memory, the tribal. The upper pair is the visible figure; the lower pair is the hidden ground.">
<text x="350" y="30" text-anchor="middle" font-size="15" class="t-serif" font-weight="bold" letter-spacing="1.5" style="fill:var(--text)">THE TETRAD · FOUR LAWS OF MEDIA</text>
<text x="350" y="48" text-anchor="middle" font-size="10.5" class="t-muted" font-style="italic">every artifact does four things at once — read here on PRINT</text>

<text x="656" y="68" text-anchor="end" font-size="9.5" class="t-mono t-muted" letter-spacing="1">◂ the visible pair</text>

<text x="52" y="94" font-size="13" class="t-serif t-inv" font-weight="bold" letter-spacing="1">ENHANCES</text>
<text x="270" y="94" text-anchor="end" font-size="10" class="t-inv" font-style="italic">amplifies</text>
<text x="52" y="124" font-size="11.5">the eye · visual, linear sequence</text>
<text x="52" y="144" font-size="11.5">the portable, private, silent book</text>
<text x="52" y="164" font-size="11.5">uniform, repeatable, mass text</text>
<text x="52" y="184" font-size="11.5">the individual point of view</text>
<text x="52" y="210" font-size="11.5" class="t-acc" font-weight="bold">→ "typographic man"</text>
<text x="52" y="232" font-size="9.5" class="t-mono t-muted">Gutenberg Galaxy (1962)</text>
<rect x="372" y="76" width="288" height="180" class="f-panel" stroke-width="1.5" style="stroke:var(--border)"/>

<text x="384" y="94" font-size="13" class="t-serif t-inv" font-weight="bold" letter-spacing="1">REVERSES INTO</text>

<text x="384" y="232" font-size="9.5" class="t-mono t-muted">War and Peace in the GV (1968)</text>

<line x1="40" y1="524" x2="660" y2="524" class="ln-soft" stroke-width="1"/>
<text x="350" y="548" text-anchor="middle" font-size="10.5" class="t-muted" font-style="italic">The two visible terms (enhance, reverse) are the figure; the two hidden terms (retrieve, obsolesce) are the ground the medium quietly rewrites.</text>
</svg>
<figcaption><strong>Fig. 1.</strong> McLuhan's tetrad claims every medium simultaneously <em>enhances, obsolesces, retrieves,</em> and <em>reverses</em> — and that the action that matters is the one you don't notice. Print enhances the private visual eye, obsolesces oral memory, retrieves the authored classical self, and, pushed to its limit, reverses into the mass uniformity that becomes the electric global village. The diagram is the whole theory in one frame; its weakness (Claim 3.10) is that it always finds all four.</figcaption>
</figure>
