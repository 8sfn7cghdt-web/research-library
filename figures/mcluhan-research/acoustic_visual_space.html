<figure class="corpus-fig" role="group">
<svg viewBox="0 0 700 452" role="img" aria-label="A contrast between visual space and acoustic space, the deep grammar of McLuhan's theory. Visual space, the space of the eye and of literacy, is linear, sequential, continuous, uniform, Euclidean, with a fixed detached point of view — one thing after another, a centre and a margin. Acoustic space, the space of the ear and of orality, is simultaneous, discontinuous, resonant, involving, non-Euclidean, all-at-once, with centre everywhere and margin nowhere. Between them a pivot shows the two reversals: the phonetic alphabet and print drive the world into visual space; electric media reverse it back into acoustic space.">
<text x="350" y="28" text-anchor="middle" font-size="15" class="t-serif" font-weight="bold" letter-spacing="1.5" style="fill:var(--text)">VISUAL SPACE  ⇄  ACOUSTIC SPACE</text>
<text x="350" y="46" text-anchor="middle" font-size="10.5" class="t-muted" font-style="italic">the deep grammar beneath every other concept</text>
<rect x="36" y="70" width="296" height="300" class="f-panel" stroke-width="1.5" style="stroke:var(--border)"/>
<rect x="36" y="70" width="296" height="30" class="f-t3"/>
<text x="50" y="90" font-size="13.5" class="t-serif t-inv" font-weight="bold" letter-spacing="1">THE EYE · VISUAL SPACE</text>
<text x="50" y="124" font-size="12">linear, sequential — one thing,</text>
<text x="50" y="142" font-size="12">then the next</text>
<text x="50" y="166" font-size="12">continuous &amp; uniform</text>
<text x="50" y="190" font-size="12">Euclidean — fixed, measurable</text>
<text x="50" y="214" font-size="12">a single detached point of view</text>
<text x="50" y="238" font-size="12">a centre and a margin</text>
<text x="50" y="262" font-size="12">detached, neutral, "rational"</text>
<line x1="50" y1="280" x2="318" y2="280" class="ln-soft" stroke-width="1"/>
<text x="50" y="302" font-size="11" class="t-mono" style="fill:var(--t3)">CULTURE OF: the phonetic</text>
<text x="50" y="318" font-size="11" class="t-mono" style="fill:var(--t3)">alphabet · print · the page</text>
<text x="50" y="344" font-size="12" class="t-acc" font-weight="bold">→ "typographic man"</text>
<rect x="368" y="70" width="296" height="300" class="f-panel" stroke-width="1.5" style="stroke:var(--border)"/>
<rect x="368" y="70" width="296" height="30" class="f-t4"/>
<text x="382" y="90" font-size="13.5" class="t-serif t-inv" font-weight="bold" letter-spacing="1">THE EAR · ACOUSTIC SPACE</text>
<text x="382" y="124" font-size="12">simultaneous — everything at once</text>
<text x="382" y="148" font-size="12">discontinuous &amp; resonant</text>
<text x="382" y="172" font-size="12">non-Euclidean, fluid, tactile</text>
<text x="382" y="196" font-size="12">no fixed vantage — you are inside it</text>
<text x="382" y="220" font-size="12" font-style="italic">"centre everywhere, margin nowhere"</text>
<text x="382" y="244" font-size="12">involving, participatory, total</text>
<line x1="382" y1="280" x2="650" y2="280" class="ln-soft" stroke-width="1"/>
<text x="382" y="302" font-size="11" class="t-mono" style="fill:var(--t4)">CULTURE OF: orality · the</text>
<text x="382" y="318" font-size="11" class="t-mono" style="fill:var(--t4)">tribe · electric &amp; digital media</text>
<text x="382" y="344" font-size="12" class="t-acc" font-weight="bold">→ the re-tribalized village</text>
<circle cx="350" cy="220" r="26" class="f-bg"/>
<circle cx="350" cy="220" r="26" fill="none" class="s-t2" stroke-width="2.5"/>
<text x="350" y="216" text-anchor="middle" font-size="15" class="t-acc" font-weight="bold">⇄</text>
<text x="350" y="232" text-anchor="middle" font-size="8" class="t-mono t-muted">reversal</text>
<text x="350" y="398" text-anchor="middle" font-size="10.5" class="t-mono t-muted">the alphabet drives the world LEFT into the eye · electricity reverses it RIGHT into the ear</text>
<line x1="36" y1="414" x2="664" y2="414" class="ln-soft" stroke-width="1"/>
<text x="350" y="438" text-anchor="middle" font-size="10.5" class="t-muted" font-style="italic">McLuhan's wager: literacy made the West think in the eye's linear space; electric media are returning us to the ear's simultaneous one — whether that is a sensory fact or a structural metaphor, he never settled.</text>
</svg>
<figcaption><strong>Fig. 3.</strong> Beneath the medium-is-the-message, hot/cool, and the global village sits a single opposition: the eye's <em>visual space</em> — linear, uniform, detached, the space of the alphabet and print — versus the ear's <em>acoustic space</em> — simultaneous, "centre everywhere, margin nowhere," the space of orality and electricity. The theory's master-claim is the pivot at the middle: print drove us into the eye; electric media are reversing us back into the ear (Claim 3.9).</figcaption>
</figure>
