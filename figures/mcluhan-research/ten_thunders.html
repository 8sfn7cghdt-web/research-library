<text x="350" y="636" text-anchor="middle" font-size="10.5" class="t-muted" font-style="italic">Not exact philology — McLuhan's reading. But it shows the method whole: he took a poem's most opaque feature and built a media theory from it (Claims 4.3–4.4).</text>

<figcaption><strong>Fig. 4.</strong> McLuhan's "applied Joyce" at its most literal: he read the ten hundred-letter thunderwords of <em>Finnegans Wake</em> as a coded history of technology and aligned them, in <em>War and Peace in the Global Village</em> (1968), with ten epochs from speech to television — print (5) and TV (10) the two great hinges. Joyce scholars do not grant the decoding as Joyce's intent; it is McLuhan's reading (Claim 4.4), and the clearest proof that for him literature <em>was</em> the theory.</figcaption>
