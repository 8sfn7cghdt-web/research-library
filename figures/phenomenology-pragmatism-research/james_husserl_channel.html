<figcaption><strong>Fig. 3.</strong> The founding contact between the traditions is real but asymmetric and documentary: Husserl&#8217;s own marked copy of James&#8217;s <em>Principles</em> &#8212; not a theory of influence but an annotated object &#8212; carries James&#8217;s &#8220;fringe&#8221; into the <em>Logical Investigations</em> as the <em>Horizont</em>. The reverse channel is empty; Bergson is the probable hidden mediator the corpus flags as its largest convergence-chapter gap.</figcaption>
</figure>
