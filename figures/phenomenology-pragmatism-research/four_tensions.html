<figcaption><strong>Fig. 6.</strong> Where the two traditions genuinely cannot merge. The gap at each beam&#8217;s centre measures irreducibility: truth and method have been partly bridged, religion is complementary rather than contested (&#8220;different gifts&#8221;), but the transcendental constituting ego is the widest gap of all &#8212; the one commitment a thoroughgoing pragmatist naturalism still cannot grant.</figcaption>
