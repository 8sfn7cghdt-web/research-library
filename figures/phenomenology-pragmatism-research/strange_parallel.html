<figcaption><strong>Fig. 2.</strong> The traditions are exact contemporaries, not a sequence: pragmatism opens in Cambridge (1872) as phenomenology gathers in Vienna and Freiburg. The single documented early contact is asymmetric &#8212; Husserl annotated James&#8217;s <em>Principles</em> around 1891&#8211;94; James never read Husserl &#8212; and the lanes do not truly rejoin until the 1991&#8211;2013 convergence.</figcaption>
