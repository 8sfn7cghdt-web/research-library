<text x="350" y="396" text-anchor="middle" font-size="10" class="t-muted" font-style="italic">Experience and consequence are not two endpoints but one loop &#8212; the burn rewrites what the light <tspan font-style="italic">is</tspan>.</text>

<figcaption><strong>Fig. 5.</strong> The emblem of the whole corpus. Dewey&#8217;s 1896 paper refuses the straight stimulus-to-response line and redraws it as a self-closing circuit: the child&#8217;s burn does not merely <em>follow</em> the seeing, it transforms the seeing into a seeing-of-a-thing-to-be-avoided. Meaning lives in the consequence that feeds back &#8212; pragmatism&#8217;s answer to phenomenology&#8217;s described act.</figcaption>
