<text x="350" y="46" text-anchor="middle" font-size="10.5" class="t-muted" font-style="italic">two largely symmetrical civil religions &#8212; and the layman who out-thought them both</text>

<text x="350" y="438" text-anchor="middle" font-size="10.5" class="t-muted" font-style="italic">&#8220;The prayers of both could not be answered.&#8221; Each section claimed the one God; Lincoln alone left Him hidden.</text>
<text x="350" y="455" text-anchor="middle" font-size="8.5" class="t-muted">Claims 2.2 &amp; 2.4 &#183; Noll, Moorhead, Stout</text>

<figcaption><strong>Fig. 3.</strong> Two near-identical temples to the same God. North and South each built a civil religion of fast days, covenant, and providence on the same scriptural foundation &#8212; the symmetry is the point. Above both, as the keystone neither section could supply, stands Lincoln&#8217;s refusal of certainty: a layman&#8217;s theology of a God whose purposes exceed either army&#8217;s prayers.</figcaption>
