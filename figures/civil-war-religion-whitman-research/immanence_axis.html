<figcaption><strong>Fig. 6.</strong> The whole corpus resolves onto one axis. Confederate covenant, Northern millennialism, the Black church&#8217;s Exodus, and Lincoln&#8217;s hidden God all sacralize the nation by locating the holy <em>above</em> it. Whitman performs the same sacralization but routes it through the body, comradeship, and a naturalized death &#8212; the post-Protestant, immanent wing of American civil religion, separated from the rest by a single decisive leap.</figcaption>
