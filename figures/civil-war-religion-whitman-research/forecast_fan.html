<figcaption><strong>Fig. 7.</strong> The forecast is about scholarship, and it is drawn as a fan because it is uncertain. The most probable future does not overturn Noll, Faust, Stout, and Wilson but <em>provincializes</em> them &#8212; their account of white-Protestant meaning-making reset inside a larger story centered on the enslaved&#8217;s religion and the Atlantic world. The wedges&#8217; widths are likelihoods; their ranges are drawn, not hidden.</figcaption>
