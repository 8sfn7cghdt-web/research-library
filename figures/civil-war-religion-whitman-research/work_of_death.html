<figure class="corpus-fig" role="group">
<svg viewBox="0 0 700 456" role="img" aria-label="A black-bordered mourning notice. At the top, the Civil War dead are shown as a range, not a single figure: an oxblood band runs from 620,000 (Faust's long-standard count) to about 750,000 (Hacker's 2012 revision), roughly one in fifty Americans in a nation of 31 million. Below, under the heading THE GOOD DEATH THE WAR BROKE, four conditions of the antebellum art of dying are struck through and replaced: died at home becomes died among strangers; attended by family becomes unwitnessed; composed last words becomes anonymous; proper burial becomes buried where they fell, unmarked.">
<rect x="56" y="62" width="588" height="376" fill="none" class="s-t2" stroke-width="9"/>
<rect x="66" y="72" width="568" height="356" fill="none" class="s-t2" stroke-width="1"/>
<text x="350" y="104" text-anchor="middle" font-size="15" class="t-serif" letter-spacing="3" font-family="var(--display)">THE WORK OF DEATH</text>
<text x="350" y="122" text-anchor="middle" font-size="10" class="t-muted" font-style="italic">a scale of dying that broke the rules for how a Christian was supposed to die</text>
<text x="350" y="150" text-anchor="middle" font-size="9.5" class="t-muted" letter-spacing="1.5" font-family="var(--display)">THE UNION &amp; CONFEDERATE DEAD &#8212; A FIGURE STILL ARGUED</text>
<line x1="120" y1="182" x2="560" y2="182" class="ln" stroke-width="1"/>
<rect x="175" y="174" width="357" height="16" class="f-t1" opacity=".5"/>
<rect x="175" y="174" width="357" height="16" fill="none" class="s-t1" stroke-width="1"/>
<line x1="175" y1="166" x2="175" y2="198" class="s-t2" stroke-width="1.4"/>
<line x1="532" y1="166" x2="532" y2="198" class="s-t1" stroke-width="1.4"/>
<text x="175" y="216" text-anchor="middle" font-size="16" font-weight="bold" font-family="var(--display)">620,000</text>
<text x="175" y="230" text-anchor="middle" font-size="8.5" class="t-muted">Faust &#183; the standard count</text>
<text x="532" y="216" text-anchor="middle" font-size="16" font-weight="bold" font-family="var(--display)" class="t-acc">~750,000</text>
<text x="532" y="230" text-anchor="middle" font-size="8.5" class="t-muted">Hacker 2012 &#183; revised upward</text>
<text x="350" y="252" text-anchor="middle" font-size="10" class="t-muted" font-style="italic">at least one American in fifty &#8212; in a nation of 31 million</text>
<text x="350" y="284" text-anchor="middle" font-size="11" class="t-muted" letter-spacing="2" font-family="var(--display)">THE &#8216;GOOD DEATH&#8217; THE WAR BROKE</text>
<g font-family="var(--body)" font-size="10.5">
<text x="316" y="312" text-anchor="end" class="t-muted">died at home, in bed</text>
<line x1="232" y1="308" x2="316" y2="308" class="s-t1" stroke-width="1.2"/>
<path d="M326,308 l10,-4 l0,8 Z" class="f-t2"/>
<text x="344" y="312" font-weight="bold">died among strangers, far from kin</text>
<text x="316" y="336" text-anchor="end" class="t-muted">attended by family</text>
<line x1="246" y1="332" x2="316" y2="332" class="s-t1" stroke-width="1.2"/>
<path d="M326,332 l10,-4 l0,8 Z" class="f-t2"/>
<text x="344" y="336" font-weight="bold">unwitnessed, often unidentified</text>
<text x="316" y="360" text-anchor="end" class="t-muted">composed last words</text>
<line x1="240" y1="356" x2="316" y2="356" class="s-t1" stroke-width="1.2"/>
<path d="M326,356 l10,-4 l0,8 Z" class="f-t2"/>
<text x="344" y="360" font-weight="bold">anonymous &#8212; disease as often as shot</text>
<text x="316" y="384" text-anchor="end" class="t-muted">proper burial</text>
<line x1="266" y1="380" x2="316" y2="380" class="s-t1" stroke-width="1.2"/>
<path d="M326,380 l10,-4 l0,8 Z" class="f-t2"/>
<text x="344" y="384" font-weight="bold">buried where they fell, unmarked</text>

<text x="350" y="414" text-anchor="middle" font-size="9" class="t-muted" font-style="italic">It remade mourning, drove the rise of spiritualism, and built the first national cemeteries.</text>
<text x="350" y="450" text-anchor="middle" font-size="8.5" class="t-muted">Faust, <tspan font-style="italic">This Republic of Suffering</tspan> (2008) &#183; Claim 2.6, Open Question 3</text>
</svg>
<figcaption><strong>Fig. 4.</strong> The number itself is still contested &#8212; so it is drawn as a band, not a point. What is not contested is what the scale did: industrialized, anonymous death annihilated every condition of the antebellum &#8220;Good Death,&#8221; forcing a religious culture to reconstruct consolation from scratch &#8212; and forcing the state, for the first time, to take charge of its dead.</figcaption>
</figure>
