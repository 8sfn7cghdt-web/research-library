<figure class="corpus-fig" role="group">
<svg viewBox="0 0 700 506" role="img" aria-label="A two-column folio Bible page bordered like a mourning notice. The left column, headed READ FOR THE LETTER, lists the proslavery plain-sense proof-texts — Genesis 9:25 the curse of Ham, Leviticus 25:44-46 bondmen for ever, Ephesians 6:5 servants obey your masters, and Philemon, Paul returning the runaway Onesimus — each pulling left. The right column, headed READ FOR THE SPIRIT, lists the antislavery texts — Galatians 3:28 neither bond nor free, Exodus let my people go, Matthew 7:12 the golden rule, and the whole Bible's trajectory toward freedom — each pulling right. Down the central gutter runs the label NO MAGISTERIUM, NO COURT OF APPEAL, with an empty seat of judgment marked by an X. The same Book is torn two ways.">
<text x="350" y="34" text-anchor="middle" font-size="15" class="t-serif" letter-spacing="3" font-family="var(--display)">THE CONTESTED PAGE</text>
<text x="350" y="53" text-anchor="middle" font-size="10.5" class="t-muted" font-style="italic">one common-sense Bible, two plain senses, no authority on earth to decide between them</text>
<rect x="44" y="72" width="612" height="380" fill="none" class="s-t2" stroke-width="5.5"/>
<rect x="52" y="80" width="596" height="364" fill="none" class="s-t2" stroke-width="1"/>
<line x1="350" y1="80" x2="350" y2="444" class="ln" stroke-width="1.4" stroke-dasharray="2 4"/>
<text x="200" y="108" text-anchor="middle" font-size="12.5" font-weight="bold" font-family="var(--display)" style="fill:var(--t1)" letter-spacing="1.5">READ FOR THE LETTER</text>
<text x="200" y="124" text-anchor="middle" font-size="9.5" class="t-muted" font-style="italic">the proslavery plain sense &#183; the easier argument</text>
<line x1="70" y1="134" x2="330" y2="134" class="ln-soft" stroke-width=".75"/>
<g font-family="var(--body)">
<path d="M66,160 l9,-5 l0,10 Z" style="fill:var(--t1)"/>
<text x="86" y="158" font-size="11" font-weight="bold">Genesis 9:25</text>
<text x="86" y="172" font-size="9.5" class="t-muted">&#8220;a servant of servants&#8221; &#8212; the curse of Ham</text>
<path d="M66,196 l9,-5 l0,10 Z" style="fill:var(--t1)"/>
<text x="86" y="194" font-size="11" font-weight="bold">Leviticus 25:44&#8211;46</text>
<text x="86" y="208" font-size="9.5" class="t-muted">&#8220;they shall be your bondmen for ever&#8221;</text>
<path d="M66,232 l9,-5 l0,10 Z" style="fill:var(--t1)"/>
<text x="86" y="230" font-size="11" font-weight="bold">Ephesians 6:5</text>
<text x="86" y="244" font-size="9.5" class="t-muted">&#8220;servants, obey&#8230; your masters&#8221;</text>
<path d="M66,268 l9,-5 l0,10 Z" style="fill:var(--t1)"/>
<text x="86" y="266" font-size="11" font-weight="bold">Philemon</text>
<text x="86" y="280" font-size="9.5" class="t-muted">Paul returns the runaway Onesimus</text>
</g>
<text x="328" y="116" text-anchor="end" font-size="12.5" font-weight="bold" font-family="var(--display)" style="fill:var(--t3)" letter-spacing="1.5">READ FOR THE SPIRIT</text>
<text x="500" y="124" text-anchor="middle" font-size="9.5" class="t-muted" font-style="italic">the antislavery reading &#183; against the letter</text>
<line x1="370" y1="134" x2="630" y2="134" class="ln-soft" stroke-width=".75"/>
<g font-family="var(--body)">
<path d="M634,160 l-9,-5 l0,10 Z" style="fill:var(--t3)"/>
<text x="614" y="158" font-size="11" font-weight="bold" text-anchor="end">Galatians 3:28</text>
<text x="614" y="172" font-size="9.5" class="t-muted" text-anchor="end">&#8220;neither bond nor free&#8230; all one&#8221;</text>
<path d="M634,196 l-9,-5 l0,10 Z" style="fill:var(--t3)"/>
<text x="614" y="194" font-size="11" font-weight="bold" text-anchor="end">Exodus 8:1</text>
<text x="614" y="208" font-size="9.5" class="t-muted" text-anchor="end">&#8220;let my people go&#8221; &#8212; deliverance</text>
<path d="M634,232 l-9,-5 l0,10 Z" style="fill:var(--t3)"/>
<text x="614" y="230" font-size="11" font-weight="bold" text-anchor="end">Matthew 7:12</text>
<text x="614" y="244" font-size="9.5" class="t-muted" text-anchor="end">the golden rule &#8212; do unto others</text>

<text x="614" y="266" font-size="11" font-weight="bold" text-anchor="end">the whole trajectory</text>
<text x="614" y="280" font-size="9.5" class="t-muted" text-anchor="end">the Bible&#8217;s overall spirit &amp; arc toward freedom</text>
</g>
<line x1="70" y1="300" x2="330" y2="300" class="ln-soft" stroke-width=".75"/>
<line x1="370" y1="300" x2="630" y2="300" class="ln-soft" stroke-width=".75"/>
<text x="200" y="322" text-anchor="middle" font-size="9.5" class="t-muted" font-style="italic">a literalist asking &#8220;where is slavery condemned?&#8221; got no answer</text>
<text x="500" y="322" text-anchor="middle" font-size="9.5" class="t-muted" font-style="italic">to argue from spirit looked like abandoning the Book itself</text>
<circle cx="350" cy="356" r="14" fill="none" class="s-t2" stroke-width="1.2"/>
<text x="350" y="361" text-anchor="middle" font-size="15" class="t-muted">&#10005;</text>
<text x="350" y="392" text-anchor="middle" font-size="9.5" font-weight="bold" class="t-acc" letter-spacing="1">THE EMPTY SEAT OF JUDGMENT</text>
<text x="350" y="408" text-anchor="middle" font-size="8.5" class="t-muted">no magisterium &#183; no agreed referee</text>
<text x="350" y="430" text-anchor="middle" font-size="10" class="t-muted" font-style="italic">&#8220;Both read the same Bible&#8230;&#8221;</text>
<text x="350" y="478" text-anchor="middle" font-size="10.5" class="t-muted" font-style="italic">The settlement that made the Bible everyone&#8217;s arbiter left no court to settle what it meant &#8212; only the sword.</text>
<text x="350" y="496" text-anchor="middle" font-size="8.5" class="t-muted">Noll, <tspan font-style="italic">The Civil War as a Theological Crisis</tspan> (2006) &#183; Claims 1.2&#8211;1.3</text>
</svg>
<figcaption><strong>Fig. 1.</strong> The war began as a reading problem. A Protestant &#8220;Bible civilization&#8221; made the plain text the arbiter of every public question &#8212; then discovered the plain text said opposite things about slavery and supplied no authority to choose. The proslavery column held the <em>easier</em> literal hand; the antislavery column had to argue spirit against letter. The gutter between them is empty, and the emptiness is the whole tragedy.</figcaption>
</figure>
