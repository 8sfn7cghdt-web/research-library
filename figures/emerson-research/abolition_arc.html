<figcaption><strong>Fig. 4.</strong> A reluctant reformer radicalized. The man who in 1837 noted his wife&#8217;s grief over slavery at a cool remove read an emancipation ode to thousands in 1863 &#8212; the curve is real and steep, and the figure of a serenely apolitical Emerson does not survive the dated record.</figcaption>
