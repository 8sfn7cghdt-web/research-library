<figure class="corpus-fig" role="group">
<svg viewBox="0 0 700 372" role="img" aria-label="A line tracing the confidence of Emerson's intuition across five founding texts from 1836 to 1844. It rises from Nature in 1836 through The American Scholar (1837), the Divinity School Address (1838), to a high noon at the Essays of 1841, then drops sharply at Experience in 1844. The 1836 peak is annotated the transparent eyeball; the 1844 fall is annotated the bead-string of many-colored lenses.">
<text x="350" y="30" text-anchor="middle" font-size="14" class="t-serif" letter-spacing="3">THE INTUITION MEETS THE WORLD</text>
<text x="350" y="47" text-anchor="middle" font-size="10.5" class="t-muted" font-style="italic">the founding texts are a sequence, not a system &#8212; 1836 to 1844</text>
<line x1="64" y1="120" x2="636" y2="120" class="ln-soft" stroke-width="0.8" stroke-dasharray="3 4"/>
<text x="640" y="116" font-size="8.5" class="t-muted">high noon</text>
<text x="640" y="126" font-size="8.5" class="t-muted">of the doctrine</text>
<polyline points="100,158 215,140 330,128 470,120 610,214" fill="none" style="stroke:var(--accent)" stroke-width="2.6" stroke-linejoin="round"/>
<text x="104" y="142" font-size="8.5" class="t-acc" font-style="italic">the transparent eye-ball &#183; &#8216;I see all&#8217;</text>
<text x="556" y="200" font-size="8.5" class="t-acc" font-style="italic">the bead-string &#183;</text>
<text x="556" y="210" font-size="8.5" class="t-acc" font-style="italic">many-colored lenses</text>
<circle cx="100" cy="158" r="7" class="f-t3"/>
<circle cx="215" cy="140" r="7" class="f-t2"/>
<circle cx="330" cy="128" r="7" style="fill:var(--t5)"/>
<circle cx="470" cy="120" r="7.5" style="fill:var(--accent)"/>
<circle cx="610" cy="214" r="7.5" class="f-t1"/>
<line x1="100" y1="165" x2="100" y2="250" class="ln-soft" stroke-width="0.8"/>
<line x1="215" y1="147" x2="215" y2="250" class="ln-soft" stroke-width="0.8"/>
<line x1="330" y1="135" x2="330" y2="250" class="ln-soft" stroke-width="0.8"/>
<line x1="470" y1="128" x2="470" y2="250" class="ln-soft" stroke-width="0.8"/>
<line x1="610" y1="222" x2="610" y2="262" class="ln-soft" stroke-width="0.8"/>
<text x="100" y="266" text-anchor="middle" font-size="10.5" font-weight="bold">1836</text>
<text x="100" y="280" text-anchor="middle" font-size="9" class="t-muted">NATURE</text>
<text x="100" y="292" text-anchor="middle" font-size="8" class="t-muted">an original relation</text>
<text x="215" y="266" text-anchor="middle" font-size="10.5" font-weight="bold">1837</text>
<text x="215" y="280" text-anchor="middle" font-size="9" class="t-muted">AMERICAN SCHOLAR</text>
<text x="215" y="292" text-anchor="middle" font-size="8" class="t-muted">Man Thinking</text>
<text x="330" y="266" text-anchor="middle" font-size="10.5" font-weight="bold">1838</text>
<text x="330" y="280" text-anchor="middle" font-size="9" class="t-muted">DIVINITY SCHOOL</text>
<text x="330" y="292" text-anchor="middle" font-size="8" class="t-muted">&#8216;God is, not was&#8217;</text>
<text x="470" y="266" text-anchor="middle" font-size="10.5" font-weight="bold">1841</text>
<text x="470" y="280" text-anchor="middle" font-size="9" class="t-muted">ESSAYS I</text>
<text x="470" y="292" text-anchor="middle" font-size="8" class="t-muted">Self-Reliance &#183; Over-Soul</text>
<text x="610" y="278" text-anchor="middle" font-size="10.5" font-weight="bold">1844</text>
<text x="610" y="292" text-anchor="middle" font-size="9" class="t-muted">EXPERIENCE</text>
<text x="610" y="304" text-anchor="middle" font-size="8" class="t-muted">&#8216;I cannot get it nearer&#8217;</text>
<text x="350" y="344" text-anchor="middle" font-size="9.5" class="t-muted" font-style="italic">After his son Waldo&#8217;s death the doctrine survives, but chastened: the self that once saw all</text>
<text x="350" y="356" text-anchor="middle" font-size="9.5" class="t-muted" font-style="italic">now cannot get out far enough to be wounded. Anyone who calls it naive optimism has not read &#8216;Experience.&#8217;</text>
</svg>
<figcaption><strong>Fig. 2.</strong> Power and price. Read in order, the founding texts record a mind discovering both the exhilaration of believing the soul has direct access to God (1836&#8211;41) and its cost (1844) &#8212; the same premise yielding ecstasy and then isolation. Emerson printed the second without retracting the first.</figcaption>
</figure>
