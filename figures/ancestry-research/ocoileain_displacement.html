<figcaption><strong>Fig. 2.</strong> The surname carries its own map: a thirteenth-century eviction northward in Limerick is why the Irish DNA reads Munster-weighted and southwest-leaning &#8212; the Ó Coileáin were pushed by Geraldine steel into the very West Cork parishes that the Famine would later gut and that would, six centuries on, give the line its most famous son.</figcaption>
