<figcaption><strong>Fig. 5.</strong> The two lines ran on different clocks &#8212; a steady seventy-year Irish drip paid for from the far shore, and a four-decade Eastern flood slammed shut in 1924 &#8212; yet both poured through the same New York gate, where the same imperial labels that scrambled the Eastern trail proved that the harbor recorded an empire, never an ethnicity.</figcaption>
