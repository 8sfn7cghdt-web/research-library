<svg viewBox="0 0 700 520" role="img" aria-label="A geological cross-section of stacked horizontal strata representing the literary sources from which Carlyle&#8217;s The French Revolution is built. From the thin topmost layer downward the bands widen and deepen: Classical Antiquity (Nemesis, Titans, Tacitus, epic machinery) is the thin uppermost crust; Goethe and German Romanticism (Symbol, the Clothes-philosophy, the Earth-Spirit) lies beneath; then Dante&#8217;s Inferno (the descent, the damned); then Shakespeare (the Revolution as tragedy and history-play); then Milton&#8217;s Paradise Lost (Hell, Chaos, fallen grandeur); and at the base, by far the thickest, the bedrock stratum of the King James Bible (the prophetic cadence, apocalypse, the whole sermonic register). A small ember accent marks the bedrock. A synthesis question runs along the foundation: does the borrowed grandeur illuminate or distort?">
<text x="350" y="30" text-anchor="middle" font-size="15" class="t-serif" letter-spacing="3">BUILT OUT OF OLDER TEXTS</text>
<text x="350" y="48" text-anchor="middle" font-size="10.5" class="t-muted" font-style="italic">the allusive strata of The French Revolution</text>

<text x="350" y="494" text-anchor="middle" font-size="9.5" class="t-acc" font-style="italic">synthesis question (ch.4 &#167;8): does the borrowed grandeur illuminate &#8212; or distort?</text>
<text x="350" y="510" text-anchor="middle" font-size="9.5" class="t-muted" font-style="italic">Not &#8220;influenced by&#8221; &#8212; built <tspan class="t-acc">out of</tspan> these texts, the King James Bible the bedrock the whole edifice stands on.</text>

<figcaption><strong>Fig. 2.</strong> The French Revolution is not merely &#8220;influenced by&#8221; the canon &#8212; it is quarried from it in strata, each older text supplying a load-bearing course: Milton&#8217;s fallen grandeur, Shakespeare&#8217;s tragic plot, Dante&#8217;s descent, Goethe&#8217;s Symbol, the classical machinery of Nemesis and Titans. Beneath them all the King James Bible runs thickest and deepest &#8212; the prophetic cadence and apocalyptic register are the bedrock the whole edifice stands on, which is why the book&#8217;s ch.4 &#167;8 synthesis question (does the borrowed grandeur illuminate or distort?) is really a question about that foundation.</figcaption>
</figure>
