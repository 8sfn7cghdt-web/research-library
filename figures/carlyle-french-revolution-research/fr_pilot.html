<figure class="corpus-fig" role="group">
<svg viewBox="0 0 700 392" role="img" aria-label="A two-track timeline running left to right from 1791 to October 1795. An upper heroic thread carries three named nodes &#8212; Mirabeau (dies April 1791), Danton (mid, doomed), and Napoleon (13 Vend&#233;miaire, 5 October 1795) &#8212; each a great man thrown up and then lost, marked by a small ember flame at the moment of loss. Beneath the heroic thread, a continuous wave band labelled SANSCULOTTISM runs the whole width as the impersonal tide. A central note marks that Carlyle never resolves whether the men or the tide drive history.">
<text x="350" y="30" text-anchor="middle" font-size="15" class="t-serif" letter-spacing="3">THE SEARCH FOR A PILOT</text>
<text x="350" y="48" text-anchor="middle" font-size="10.5" class="t-muted" font-style="italic">great men thrown up and lost, over the impersonal tide</text>
<line x1="40" y1="92" x2="660" y2="92" class="ln" stroke-width="1.4"/>

<text x="660" y="80" text-anchor="end" font-size="8.5" class="t-mono t-muted">OCT 1795</text>
<text x="50" y="115" text-anchor="start" font-size="8.5" class="t-muted" font-style="italic" letter-spacing="1">THE HEROIC THREAD &#8212; the would-be pilots</text>

<text x="120" y="166" text-anchor="middle" font-size="12" font-weight="bold" class="t-serif">MIRABEAU</text>
<text x="120" y="180" text-anchor="middle" font-size="8" class="t-muted">&#8220;the one possible pilot&#8221;</text>
<text x="120" y="191" text-anchor="middle" font-size="8" class="t-muted">held France toppling,</text>
<text x="120" y="202" text-anchor="middle" font-size="8" class="t-muted">&#8220;still unfallen&#8221;</text>
<text x="120" y="216" text-anchor="middle" font-size="8.5" class="t-acc">dies April 1791</text>

<text x="350" y="191" text-anchor="middle" font-size="8" class="t-muted">force &#8212; a Titan,</text>

<text x="350" y="311" text-anchor="middle" font-size="8" class="t-inv" opacity=".88">the plebeian impersonal tide &#8212; the true protagonist? (Allison 2022)</text>
<line x1="350" y1="216" x2="350" y2="272" class="ln-soft" stroke-width="1" stroke-dasharray="3 3"/>
<text x="350" y="338" text-anchor="middle" font-size="9" class="t-acc" font-style="italic">determinism vs. heroism &#8212; left unresolved</text>
<text x="350" y="368" text-anchor="middle" font-size="10" class="t-muted" font-style="italic">Three pilots rise and are lost; the tide beneath them never stops &#8212; and Carlyle never says which is steering.</text>
</svg>
<figcaption><strong>Fig. 5.</strong> The book reads the Revolution as a failed search for a pilot: Mirabeau, &#8220;the one possible pilot,&#8221; holds France &#8220;still unfallen&#8221; with his single hand until April 1791; Danton, the Titan &#8220;Mirabeau of the Sansculottes,&#8221; is doomed in turn; and Napoleon&#8217;s &#8220;whiff of grapeshot&#8221; on 13 Vend&#233;miaire (5 Oct 1795) blows the thing into space. Yet beneath all three runs the unbroken wave of Sansculottism &#8212; the impersonal plebeian force many read as the real protagonist (Allison 2022) &#8212; and Carlyle never resolves whether the great men or the tide drive history.</figcaption>
</figure>
