<figcaption><strong>Fig. 6.</strong> The forecast is not one trajectory but a settled dual identity: in better than half of futures (the 55&#8211;65% base case) the book survives in print &#8212; anchored by the 2019 Oxford critical edition and a small durable teaching niche &#8212; precisely as it is abandoned as a historical authority, cited for texture and set-piece but never for cause. The near-mirrored 15&#8211;22% bands for scholarly revival and cancellation drag, with only a 3&#8211;6% tail of popular rediscovery, show why the headwinds and tailwinds do not cancel but bifurcate: the work endures as a literary classic exactly to the degree it is dropped as fact.</figcaption>
