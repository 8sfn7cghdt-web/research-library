<figure class="corpus-fig" role="group">
<svg viewBox="0 0 700 520" role="img" aria-label="A two-column opposition arranged as a balance. The left column, headed SHAM, is the visible vesture or Paper: a hollow crown for a monarchy that no longer commands belief, nobility performing privilege without function, a Church gone formal, the philosophes&#8217; Logic, the assignat currency, the Drury-Lane Sham-King, and the heavy ornamented berline at Varennes that cannot move. The right column, headed REALITY, is living Fact and Force: Sansculottism, the suppressed Reality bursting from the infinite Deep, fact, force, belief, the Eternal. A central vertical axis is labelled Paper, right-arrow left-arrow, Fact. A small return-arrow at the foot carries the irony: the Revolution destroys the old Shams and at once manufactures new ones, so the narrative keeps deflating into the mock-heroic.">
<text x="350" y="30" text-anchor="middle" font-size="15" class="t-serif" letter-spacing="3">SHAM AND REALITY</text>

<text x="350" y="471" text-anchor="middle" font-size="8.8" class="t-muted">Revolution burns the old Shams, then at once manufactures new ones &#8212; new constitutions, new &#8220;Paper&#8221; &#8212; and the tale deflates into &#8220;mock-heroic.&#8221;</text>
<text x="350" y="500" text-anchor="middle" font-size="10" class="t-muted" font-style="italic">Every event is tried by one question &#8212; <tspan class="t-acc">living Reality or outlived Sham?</tspan> &#8212; and revolution is the gap between form and fact gone total.</text>
</svg>
<figcaption><strong>Fig. 4.</strong> The whole folio runs on a single sorting axis: on the left the visible vesture &#8212; a crown without belief, privilege without function, a Church gone formal, the philosophes&#8217; &#8220;Paper&#8221; and the assignat, the Drury-Lane &#8220;Sham-King,&#8221; and the encrusted berline at Varennes that cannot move; on the right the living Fact &#8212; Sansculottism bursting from &#8220;the infinite Deep,&#8221; force, belief, &#8220;the Eternal.&#8221; Carlyle judges every event by one question &#8212; Reality or Sham? &#8212; and revolution is what happens when the gap between form and fact becomes total. The return-arrow is the cruelty of the book: the Revolution unmasks the old &#8220;Paper&#8221; only to print new constitutions of its own, so each triumph deflates back into the mock-heroic.</figcaption>
</figure>
