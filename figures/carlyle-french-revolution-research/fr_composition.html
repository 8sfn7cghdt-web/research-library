<text x="350" y="426" text-anchor="middle" font-size="10" class="t-muted" font-style="italic">One volume, two writings &#8212; the fire at the centre is not an interruption but the book&#8217;s origin.</text>

<figcaption><strong>Fig. 1.</strong> The defining fact of The French Revolution is that its first volume, &#8220;The Bastille,&#8221; was written twice: drafted at Cheyne Row from September 1834, lent in fair copy to J.S. Mill with no backup kept, and on 6 March 1835 burned for kindling by a servant at Harriet Taylor&#8217;s house &#8212; only &#8220;four tattered leaves&#8221; surviving. Refusing all but ~&#163;100 of Mill&#8217;s &#163;200, Carlyle bought paper and rewrote it by September 1835 &#8220;flamingly from the heart of a living man,&#8221; carrying on through Vol II (April 1836) and Vol III (12 January 1837); the timeline&#8217;s twinned opening shows that the loss to literal flame is what set the book&#8217;s incandescent register.</figcaption>
</figure>
