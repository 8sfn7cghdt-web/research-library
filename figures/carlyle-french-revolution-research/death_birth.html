<text x="350" y="458" text-anchor="middle" font-size="10" class="t-muted" font-style="italic">One fire, two valences &#8212; judgment <tspan class="t-acc">and</tspan> birth at once &#8212; which is why radicals, Engels, and later authoritarians could each claim it.</text>

<figcaption><strong>Fig. 3.</strong> Carlyle&#8217;s Revolution is not a chronicle but a conflagration: when a regime hollowed to <em>Sham</em> can no longer hold, the suppressed Reality bursts up from &#8220;the infinite Deep&#8221; and burns the old world to clear the new. The fire faces two ways at once &#8212; a backward judgment on imposture and a forward &#8220;Palingenesia&#8221; &#8212; and that doubled valence (&#8220;rays as of heaven on one side; girt&#8230;as with hellfire&#8221;) is exactly what makes the book ethically combustible.</figcaption>
