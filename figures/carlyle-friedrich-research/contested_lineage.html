<text x="350" y="352" text-anchor="middle" font-size="10" class="t-muted" font-style="italic">The shadow is real but diffuse &#8212; guilt by appropriation, not by authorship; the worst-cited link (Nietzsche) and the worst-cited quote are both false.</text>

<figcaption><strong>Fig. 6.</strong> The standard &#8220;Carlyle bred fascism&#8221; lineage collapses at its two most-cited joints: Nietzsche, the supposed link, openly despised Carlyle, and the celebrated bunker quotation is not in Carlyle&#8217;s text. What survives verification is narrower and stranger &#8212; a real 1945 bunker reading transmitted through a single diary &#8212; so the reputational shadow is guilt by appropriation, not authorship, and the trajectory now bends back toward textual revival.</figcaption>
