<figure class="corpus-fig" role="group">
<svg viewBox="0 0 700 424" role="img" aria-label="An anatomy of Carlyle's most-quoted sentence, 'Poor Imperial Majesty; a human creature doing Play-actorisms of too high a flight.' Three words are coloured and labelled in cards below: 'Poor' is mock-pity apostrophe; 'Imperial Majesty;' is parataxis with a Sham Power named; 'Play-actorisms' is a coined nonce-word. A six-tile kit lists the recurring devices with a grounded specimen of each: parataxis, the fragment, moralized ellipsis, fire-coinage, capitalized Powers, and the present tense.">
<text x="350" y="30" text-anchor="middle" font-size="14" class="t-serif" letter-spacing="2">ANATOMY OF A CARLYLESE SENTENCE</text>
<text x="350" y="48" text-anchor="middle" font-size="10.5" class="t-muted" font-style="italic">the single most-quoted specimen &#8212; three devices fused in one period</text>
<line x1="150" y1="60" x2="550" y2="60" class="ln" stroke-width="1.5"/>
<text x="350" y="98" text-anchor="middle" font-size="15.5" class="t-serif"><tspan style="fill:var(--t3)">Poor</tspan> <tspan style="fill:var(--t2)">Imperial Majesty;</tspan> a human creature doing <tspan style="fill:var(--t5)">Play-actorisms</tspan> of too high a flight</text>
<rect x="54" y="128" width="172" height="74" rx="2" class="f-panel" stroke-width="1.2" style="stroke:var(--t3)"/>
<rect x="54" y="128" width="172" height="4" style="fill:var(--t3)"/>
<text x="140" y="152" text-anchor="middle" font-size="12" class="t-serif" style="fill:var(--t3)">&#8220;Poor&#8221;</text>
<text x="140" y="172" text-anchor="middle" font-size="10.5" font-weight="bold">MOCK-PITY</text>
<text x="140" y="190" text-anchor="middle" font-size="9" class="t-muted" font-style="italic">the recurrent apostrophe</text>
<rect x="242" y="128" width="200" height="74" rx="2" class="f-panel" stroke-width="1.2" style="stroke:var(--t2)"/>
<rect x="242" y="128" width="200" height="4" style="fill:var(--t2)"/>
<text x="342" y="152" text-anchor="middle" font-size="12" class="t-serif" style="fill:var(--t2)">&#8220;Imperial Majesty;&#8221;</text>
<text x="342" y="172" text-anchor="middle" font-size="10.5" font-weight="bold">PARATAXIS &#183; a SHAM NAMED</text>
<text x="342" y="190" text-anchor="middle" font-size="9" class="t-muted" font-style="italic">the semicolon assembles; a Power addressed</text>
<rect x="458" y="128" width="188" height="74" rx="2" class="f-panel" stroke-width="1.2" style="stroke:var(--t5)"/>
<rect x="458" y="128" width="188" height="4" style="fill:var(--t5)"/>
<text x="552" y="152" text-anchor="middle" font-size="12" class="t-serif" style="fill:var(--t5)">&#8220;Play-actorisms&#8221;</text>
<text x="552" y="172" text-anchor="middle" font-size="10.5" font-weight="bold">COINAGE</text>
<text x="552" y="190" text-anchor="middle" font-size="9" class="t-muted" font-style="italic">a nonce &#8220;choking double word&#8221; (Thackeray)</text>
<line x1="60" y1="226" x2="640" y2="226" class="ln-soft" stroke-width="1"/>
<text x="350" y="246" text-anchor="middle" font-size="11.5" class="t-serif" letter-spacing="2">THE KIT &#8212; SIX RECURRING DEVICES</text>
<rect x="58" y="260" width="188" height="56" rx="2" class="f-panel" stroke-width="1" style="stroke:var(--border)"/>
<text x="68" y="280" font-size="10.5" font-weight="bold" style="fill:var(--t1)">Parataxis</text>
<text x="68" y="298" font-size="8.6" class="t-mono">bare of hedges;</text>
<text x="68" y="309" font-size="8.6" class="t-mono">ploughable all of it</text>
<rect x="256" y="260" width="188" height="56" rx="2" class="f-panel" stroke-width="1" style="stroke:var(--border)"/>
<text x="266" y="280" font-size="10.5" font-weight="bold" style="fill:var(--t1)">The fragment</text>
<text x="266" y="301" font-size="8.6" class="t-mono">&#8220;But he cannot.&#8221;</text>
<rect x="454" y="260" width="188" height="56" rx="2" class="f-panel" stroke-width="1" style="stroke:var(--border)"/>
<text x="464" y="280" font-size="10.5" font-weight="bold" style="fill:var(--t1)">Moralized ellipsis</text>
<text x="464" y="298" font-size="8.6" class="t-mono">CETERA DESUNT;</text>
<text x="464" y="309" font-size="8.6" class="t-mono">but that is enough</text>
<rect x="58" y="324" width="188" height="56" rx="2" class="f-panel" stroke-width="1" style="stroke:var(--border)"/>
<text x="68" y="344" font-size="10.5" font-weight="bold" style="fill:var(--t3)">Fire-coinage</text>
<text x="68" y="362" font-size="8.6" class="t-mono">fire-deluge &#183; fire-storm</text>
<text x="68" y="373" font-size="8.6" class="t-mono">&#183; Horse-deluge</text>
<rect x="256" y="324" width="188" height="56" rx="2" class="f-panel" stroke-width="1" style="stroke:var(--border)"/>
<text x="266" y="344" font-size="10.5" font-weight="bold" style="fill:var(--t2)">Capitalized Powers</text>
<text x="266" y="365" font-size="8.6" class="t-mono">Sham &#183; Reality &#183; Veracity</text>
<rect x="454" y="324" width="188" height="56" rx="2" class="f-panel" stroke-width="1" style="stroke:var(--border)"/>
<text x="464" y="344" font-size="10.5" font-weight="bold" style="fill:var(--t5)">Present tense</text>
<text x="464" y="365" font-size="8.6" class="t-mono">he is tumbling to Leuthen</text>
<text x="350" y="406" text-anchor="middle" font-size="10" class="t-muted" font-style="italic">One sentence carries three devices at once; the same kit, recombined, builds every page of six volumes.</text>
</svg>
<figcaption><strong>Fig. 2.</strong> Carlylese is a finite, recombinant kit, not free-form eccentricity: a single eight-word clause fuses mock-pity, parataxis with a Sham named, and a coined &#8220;choking double word,&#8221; and the same six devices &#8212; here each shown with a verbatim specimen &#8212; assemble the whole <em>History</em>. The deformation is systematic, which is Thackeray&#8217;s point that there is &#8220;method in it.&#8221;</figcaption>
</figure>
