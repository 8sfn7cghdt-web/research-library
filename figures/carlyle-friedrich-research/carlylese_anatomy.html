<figure class="corpus-fig" role="group">
<svg viewBox="0 0 700 430" role="img" aria-label="An anatomy of Carlyle's most-quoted sentence, 'Poor Imperial Majesty; a human creature doing Play-actorisms of too high a flight.' Three words are marked and labelled: 'Poor' is mock-pity apostrophe; 'Imperial Majesty;' is parataxis with a Sham Power named; 'Play-actorisms' is a coined nonce-word. Below, a six-tile kit lists the recurring devices with a grounded specimen of each: parataxis, the fragment, moralized ellipsis, fire-coinage, capitalized Powers, and the present tense.">
<text x="350" y="30" text-anchor="middle" font-size="14" class="t-serif" letter-spacing="2">ANATOMY OF A CARLYLESE SENTENCE</text>
<text x="350" y="48" text-anchor="middle" font-size="10.5" class="t-muted" font-style="italic">the single most-quoted specimen &#8212; three devices fused in one period</text>
<line x1="150" y1="60" x2="550" y2="60" class="ln" stroke-width="1.5"/>
<text x="80" y="100" font-size="14.5" class="t-serif" style="fill:var(--t3)">Poor</text>
<text x="114" y="100" font-size="14.5" class="t-serif" style="fill:var(--t2)">Imperial</text>
<text x="176" y="100" font-size="14.5" class="t-serif" style="fill:var(--t2)">Majesty;</text>
<text x="238" y="100" font-size="14.5" class="t-serif">a</text>
<text x="251" y="100" font-size="14.5" class="t-serif">human</text>
<text x="292" y="100" font-size="14.5" class="t-serif">creature</text>
<text x="354" y="100" font-size="14.5" class="t-serif">doing</text>
<text x="395" y="100" font-size="14.5" class="t-serif" style="fill:var(--t5)">Play-actorisms</text>
<text x="499" y="100" font-size="14.5" class="t-serif">of</text>
<text x="519" y="100" font-size="14.5" class="t-serif">too</text>
<text x="546" y="100" font-size="14.5" class="t-serif">high</text>
<text x="580" y="100" font-size="14.5" class="t-serif">a</text>
<text x="593" y="100" font-size="14.5" class="t-serif">flight</text>
<line x1="80" y1="106" x2="108" y2="106" class="s-t3" stroke-width="2"/>
<line x1="114" y1="106" x2="232" y2="106" class="s-t2" stroke-width="2"/>
<line x1="395" y1="106" x2="493" y2="106" class="s-t5" stroke-width="2"/>
<path d="M94,106 L140,150" class="ln-soft" stroke-width="1"/>
<path d="M173,106 L342,150" class="ln-soft" stroke-width="1"/>
<path d="M444,106 L552,150" class="ln-soft" stroke-width="1"/>
<rect x="54" y="150" width="172" height="60" rx="2" class="f-panel" stroke-width="1.1" style="stroke:var(--t3)"/>
<text x="140" y="170" text-anchor="middle" font-size="10.5" font-weight="bold" style="fill:var(--t3)">MOCK-PITY</text>
<text x="140" y="186" text-anchor="middle" font-size="9">the recurrent</text>
<text x="140" y="200" text-anchor="middle" font-size="9" font-style="italic">&#8220;Poor&#8230;&#8221; apostrophe</text>
<rect x="242" y="150" width="200" height="60" rx="2" class="f-panel" stroke-width="1.1" style="stroke:var(--t2)"/>
<text x="342" y="170" text-anchor="middle" font-size="10.5" font-weight="bold" style="fill:var(--t2)">PARATAXIS &#183; a SHAM NAMED</text>
<text x="342" y="186" text-anchor="middle" font-size="9">the semicolon assembles;</text>
<text x="342" y="200" text-anchor="middle" font-size="9" font-style="italic">a Power addressed to its face</text>
<rect x="458" y="150" width="188" height="60" rx="2" class="f-panel" stroke-width="1.1" style="stroke:var(--t5)"/>
<text x="552" y="170" text-anchor="middle" font-size="10.5" font-weight="bold" style="fill:var(--t5)">COINAGE</text>
<text x="552" y="186" text-anchor="middle" font-size="9">a nonce &#8220;choking</text>
<text x="552" y="200" text-anchor="middle" font-size="9" font-style="italic">double word&#8221; (Thackeray)</text>
<line x1="60" y1="232" x2="640" y2="232" class="ln-soft" stroke-width="1"/>
<text x="350" y="250" text-anchor="middle" font-size="11.5" class="t-serif" letter-spacing="2">THE KIT &#8212; SIX RECURRING DEVICES</text>
<rect x="58" y="264" width="188" height="56" rx="2" class="f-panel" stroke-width="1" style="stroke:var(--border)"/>
<text x="68" y="284" font-size="10.5" font-weight="bold" style="fill:var(--t1)">Parataxis</text>
<text x="68" y="302" font-size="8.6" class="t-mono">bare of hedges;</text>
<text x="68" y="313" font-size="8.6" class="t-mono">ploughable all of it</text>
<rect x="256" y="264" width="188" height="56" rx="2" class="f-panel" stroke-width="1" style="stroke:var(--border)"/>
<text x="266" y="284" font-size="10.5" font-weight="bold" style="fill:var(--t1)">The fragment</text>
<text x="266" y="305" font-size="8.6" class="t-mono">&#8220;But he cannot.&#8221;</text>
<rect x="454" y="264" width="188" height="56" rx="2" class="f-panel" stroke-width="1" style="stroke:var(--border)"/>
<text x="464" y="284" font-size="10.5" font-weight="bold" style="fill:var(--t1)">Moralized ellipsis</text>
<text x="464" y="302" font-size="8.6" class="t-mono">CETERA DESUNT;</text>
<text x="464" y="313" font-size="8.6" class="t-mono">but that is enough</text>
<rect x="58" y="328" width="188" height="56" rx="2" class="f-panel" stroke-width="1" style="stroke:var(--border)"/>
<text x="68" y="348" font-size="10.5" font-weight="bold" style="fill:var(--t3)">Fire-coinage</text>
<text x="68" y="366" font-size="8.6" class="t-mono">fire-deluge &#183; fire-storm</text>
<text x="68" y="377" font-size="8.6" class="t-mono">&#183; Horse-deluge</text>
<rect x="256" y="328" width="188" height="56" rx="2" class="f-panel" stroke-width="1" style="stroke:var(--border)"/>
<text x="266" y="348" font-size="10.5" font-weight="bold" style="fill:var(--t2)">Capitalized Powers</text>
<text x="266" y="369" font-size="8.6" class="t-mono">Sham &#183; Reality &#183; Veracity</text>
<rect x="454" y="328" width="188" height="56" rx="2" class="f-panel" stroke-width="1" style="stroke:var(--border)"/>
<text x="464" y="348" font-size="10.5" font-weight="bold" style="fill:var(--t5)">Present tense</text>
<text x="464" y="369" font-size="8.6" class="t-mono">he is tumbling to Leuthen</text>
<text x="350" y="410" text-anchor="middle" font-size="10" class="t-muted" font-style="italic">One sentence carries three devices at once; the same kit, recombined, builds every page of six volumes.</text>
</svg>
<figcaption><strong>Fig. 2.</strong> Carlylese is a finite, recombinant kit, not free-form eccentricity: a single eight-word clause fuses mock-pity, parataxis with a Sham named, and a coined &#8220;choking double word,&#8221; and the same six devices &#8212; here each shown with a verbatim specimen &#8212; assemble the whole <em>History</em>. The deformation is systematic, which is Thackeray&#8217;s point that there is &#8220;method in it.&#8221;</figcaption>
</figure>
