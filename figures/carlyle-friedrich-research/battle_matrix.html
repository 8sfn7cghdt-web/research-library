<figcaption><strong>Fig. 4.</strong> The set-pieces are a graded repertory, not a stock of tricks: a single seven-device kit recurs across eight battles, and its <em>sign-neutrality</em> is the argument &#8212; the identical instruments score the Leuthen triumph and the Kunersdorf catastrophe with equal grandeur. The tense-shift is the universal workhorse; the aural imagination is the dominant register, climbing to two opposite peaks (hymn and Doomsday); and the asyndetic catalogue concentrates at Prague and Zorndorf.</figcaption>
