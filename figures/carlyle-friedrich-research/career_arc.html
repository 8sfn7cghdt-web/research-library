<svg viewBox="0 0 700 372" role="img" aria-label="A rising arc of Carlyle's four major works plotted against his deepening investment in authority. The French Revolution (1837) sits lowest, themed 'revolution, sympathy with the crowd'; On Heroes (1841) rises to 'hero-worship, the prophet-hero'; Past and Present (1843) rises further to 'heroic governance'; Friedrich (1858-65) reaches the apex, themed 'the despot who compels', but is drawn cracked to mark it as culmination and exhaustion at once. A diverging dashed line falls away to the lower right, labelled the scientific Rankean history that rejected Carlyle, with Acton's verdict 'the most detestable of historians'. A second dashed branch continues up from Friedrich, labelled the survival of narrative history in Trevelyan.">
<text x="350" y="28" text-anchor="middle" font-size="14" class="t-serif" letter-spacing="2">REVOLUTION TO EXHAUSTION</text>
<text x="350" y="46" text-anchor="middle" font-size="10.5" class="t-muted" font-style="italic">four works, thirty years &#8212; the hero migrates from prophet to despot, and the method reaches its limit</text>
<text x="34" y="120" text-anchor="middle" font-size="8.5" class="t-muted" transform="rotate(-90 34 175)">investment in AUTHORITY &#8594;</text>

<text x="350" y="354" text-anchor="middle" font-size="10" class="t-muted" font-style="italic">The same arc that perfects hero-worship exhausts it &#8212; and the &#8220;war on Dryasdust&#8221; ends in captivity to Dryasdust.</text>
</svg>
<figcaption><strong>Fig. 5.</strong> <em>Friedrich</em> is both the summit and the breaking-point of a single thirty-year project: the arc climbs from revolutionary sympathy (1837) through hero-worship (1841) to heroic governance (1843), and in <em>Friedrich</em> reaches its apex as authoritarian narrative even as it cracks under thirteen years of archive &#8212; while the discipline itself diverged toward Ranke&#8217;s science (Acton&#8217;s &#8220;most detestable of historians&#8221;), the narrative art surviving only in heirs like Trevelyan.</figcaption>
</figure>
