<figcaption><strong>Fig. 2.</strong> The corpus&#8217;s load-bearing claim, built in stone: take a Westminster doctrine, strike out the confession, and re-lay the same block as a secular form &#8212; predestination becomes providential history, calling becomes the Gospel of Work, total depravity becomes the war on Sham. The mortar that still holds the wall up is the <em>grammar</em>: the cadence, the providential reading, the posture of judgment. It is what makes Carlyle one thinker rather than a set of moods.</figcaption>
