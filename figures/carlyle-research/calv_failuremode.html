<figcaption><strong>Fig. 4.</strong> There are not two Carlyles. The same engine &#8212; providence, the Hero as locus of the divine, order under divine hierarchy, total-depravity unmasking &#8212; produces the humane <em>Past and Present</em> (1843) under the &#8220;Condition of England&#8221; load and the vicious <em>Occasional Discourse on the Negro Question</em> (1849) and <em>Latter-Day Pamphlets</em> (1850) under the 1849&#8211;50 load. The drivers that yield the Gospel of Work and the war on the cash-nexus are the very ones that slide order into an apology for hierarchy and valorize the Hero as power-in-itself; the failure is internal to the substrate, and to insulate the early Carlyle from the late is to misread the system.</figcaption>
</figure>
