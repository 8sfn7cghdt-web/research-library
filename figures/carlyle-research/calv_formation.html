<figure class="corpus-fig" role="group">
<svg viewBox="0 0 700 440" role="img" aria-label="A single horizontal timeline from 1795 to about 1825 charting Thomas Carlyle&#8217;s formation. It opens at 1795 with his birth in Ecclefechan, Annandale, into a Burgher Seceder Presbyterian household, marked by the Westminster Shorter Catechism learned by heart, metrical psalms, the King James Bible, and the Communion season. Markers follow: Annan Academy, the University of Edinburgh in 1809 entered at fourteen for the ministry, and the abandonment of the divinity track around 1817. At June 1821 a vertical turning-point rule marks the Leith Walk crisis, the Everlasting No. From that point the line forks: an upper confession line ends abruptly just past the crisis, while a lower substrate line of providence, calling and judgment continues unbroken to the right edge, re-articulated in the 1820s through Goethe, Fichte and Novalis.">

<text x="350" y="430" text-anchor="middle" font-size="10" class="t-muted" font-style="italic">He lost the confession in his early twenties; he never lost the substrate.</text>

<figcaption><strong>Fig. 1.</strong> The geometry of a conversion that was never a clean break: from the 1821 Leith Walk crisis the line forks, and only the upper strand &#8212; the Burgher Seceder <em>confession</em> &#8212; is struck out, while the lower strand carries on unbroken to the right edge. What the catechism, the metrical psalms and the King James cadence drilled into the Ecclefechan household was not a creed he could lose but a <em>grammar</em> &#8212; providence, calling, judgment &#8212; that the 1820s reading of Goethe, Fichte and Novalis merely made sayable, and that runs straight into the mature work.</figcaption>
</figure>
