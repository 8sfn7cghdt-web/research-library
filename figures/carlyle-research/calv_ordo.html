<figcaption><strong>Fig. 5.</strong> The most famous passage in <em>Sartor Resartus</em> is not German philosophy but a Scottish conversion narrative: the descent into the Everlasting No (II.7), the level Centre of Indifference (II.8), and the rise into the Everlasting Yea (II.9) trace the Reformed <em>ordo salutis</em> &#8212; conviction of sin, despair under the law, then grace and sanctification &#8212; the same arc the Communion-season revivals at Cambuslang preached. Teufelsdr&#246;ckh and Goethe&#8217;s vocabulary are only the dress; the imperative &#8220;Produce! Produce!&#8221; is sanctification, and &#8220;a Higher than Love of Happiness&#8221; is the kirk under a German cloak.</figcaption>
