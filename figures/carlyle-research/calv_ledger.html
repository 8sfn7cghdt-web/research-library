<figcaption><strong>Fig. 3.</strong> Read as a kirk register, the substrate resolves into bookkeeping: each Westminster doctrine has a single secular heir and a single page where it is paid out &#8212; predestination settles as the providential history of <em>The French Revolution</em>, calling as the &#8220;Produce! Produce!&#8221; of <em>Past and Present</em> (1843), the hidden God as the Natural Supernaturalism of <em>Sartor</em> III.8. The nine clean one-to-one entries are the claim&#8217;s proof: this is transposition, not mood.</figcaption>
