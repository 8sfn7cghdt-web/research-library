<svg viewBox="0 0 700 632" role="img" aria-label="An illuminated mandala. A bounding gold circle is labelled THE SELF, the archetype of wholeness and the imago Dei. Inside it a lapis diamond-square, the quaternity, squares the circle, its four vertices opening as four gates at the cardinal points. The top gate, in the conscious upper half, is the PERSONA, the mask the ego turns to the world. The bottom gate, in the unconscious lower half, is the SHADOW, the rejected dark side. The left gate is the ANIMA or ANIMUS, the contrasexual soul-image. The right gate is drawn open and dashed as THE MISSING FOURTH, the dark and feminine the Western symbol left out, pointing forward to chapters four and five. A small ego node sits on the vertical axis just above the centre, joined to it by the ego-Self axis. At the dead centre a lapis medallion bears a gold star: the point where, Jung says, a symbol of the self and a God-image cannot be told apart.">
<text x="350" y="40" text-anchor="middle" font-size="15" class="t-serif" letter-spacing="3">THE SQUARING OF THE CIRCLE</text>
<text x="350" y="59" text-anchor="middle" font-size="10.5" class="t-muted" font-style="italic">the self as mandala &#8212; a centred, fourfold totality whose midpoint is the God-image</text>

<text x="350" y="626" text-anchor="middle" font-size="9.5" class="t-muted" font-style="italic">to make the circle whole is to square it &#8212; to take back the fourth gate the bright symbol left standing open.</text>

<figcaption><strong>Fig. 1.</strong> Individuation is the squaring of the circle: the ego, off-centre and small, is drawn into orbit around a midpoint where &#8220;one can never distinguish empirically between a symbol of the self and a God-image&#8221; (CW 11, &#182;231). Three of the four gates &#8212; persona, shadow, anima/animus &#8212; can be entered; the fourth, the dark and the feminine, is the one the Western God-image left open, and the whole corpus is the attempt to close it.</figcaption>
</figure>
