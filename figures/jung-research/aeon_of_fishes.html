<svg viewBox="0 0 700 392" role="img" aria-label="A two-thousand-year timeline of the astrological age of Pisces, the Fishes, running left to right from about year zero to about year 2150. The constellation Pisces holds two fish, drawn here as the two halves of the Christian aeon. The first fish, vertical and bright, spans the first millennium and is labelled CHRIST, the spiritual, upward, otherworldly impulse. At the midpoint, around the year 1000, an enantiodromia, a running-into-the-opposite, turns the age over. The second fish, horizontal and dark, spans the second millennium and is labelled the ANTICHRIST, the worldly, material, downward counter-movement: the rise of science, the dethroning of spirit by matter. At the far right, about the year 2000, the equinox slides out of Pisces toward Aquarius, the close of the aeon, marked the death of God and the dangerous open interval between two organizing symbols.">

<text x="350" y="53" text-anchor="middle" font-size="10.5" class="t-muted" font-style="italic">two fishes, swimming apart &#8212; an age that turns into its opposite</text>

<figcaption><strong>Fig. 4.</strong> Jung reads two millennia off the oldest clock the West owns. The constellation holds not one fish but two, drawn swimming apart &#8212; so the bright spiritual first millennium was bound, by its own one-sidedness, to topple (<em>enantiodromia</em>) into the material second. The modern eclipse of the soul is not a betrayal of the Christian aeon from outside; it is the second fish the first one called into being.</figcaption>
</figure>
