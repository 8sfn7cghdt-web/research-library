<figure class="corpus-fig" role="group">
<svg viewBox="0 0 700 452" role="img" aria-label="A balance scale that tips the wrong way. The left pan holds YAHWEH and is heavy with power: omnipotence and omniscience, the whole of nature at his command. The right pan holds JOB, a single mortal, powerless, who nevertheless outweighs God on the one quality that here decides the balance: moral consciousness, self-reflection, the knowledge of good and evil. The beam tilts down toward Job, illustrating Jung&#8217;s claim that Job proved more moral and conscious than God. Below, a downward arrow shows the only resolution: God must INCARNATE, become a mortal man in Christ, to acquire the consciousness his own creature has surpassed him in &#8212; the Incarnation read as God&#8217;s act of self-repentance.">
<text x="350" y="36" text-anchor="middle" font-size="14.5" class="t-serif" letter-spacing="2.5">THE SCALE THAT TIPS THE WRONG WAY</text>
<text x="350" y="55" text-anchor="middle" font-size="10.5" class="t-muted" font-style="italic">&#8220;Job proved to be more moral and conscious than God&#8221;</text>
<line x1="350" y1="86" x2="350" y2="250" class="ln" stroke-width="2.5" style="stroke:var(--muted)"/>
<polygon points="350,78 340,98 360,98" class="f-panel" stroke-width="1.2" style="stroke:var(--muted)"/>
<circle cx="350" cy="250" r="6" class="f-panel" stroke-width="1.4" style="stroke:var(--muted)"/>
<line x1="170" y1="128" x2="530" y2="104" class="ln" stroke-width="3" style="stroke:var(--text)"/>
<line x1="170" y1="128" x2="170" y2="178" class="ln-soft" stroke-width="1"/>
<line x1="530" y1="104" x2="530" y2="154" class="ln-soft" stroke-width="1"/>
<path d="M120,178 A 50,28 0 0,0 220,178 Z" class="f-t3" opacity=".2" stroke-width="1.8" style="stroke:var(--t3)"/>
<text x="170" y="172" text-anchor="middle" font-size="12" font-weight="bold" class="t-serif" style="fill:var(--t3)">YAHWEH</text>
<text x="170" y="205" text-anchor="middle" font-size="8.5" class="t-muted">omnipotence &#183; omniscience</text>
<text x="170" y="217" text-anchor="middle" font-size="8.5" class="t-muted">all power, all nature</text>
<text x="170" y="234" text-anchor="middle" font-size="8" class="t-acc" style="fill:var(--t3)" font-style="italic">but morally unconscious</text>
<text x="170" y="245" text-anchor="middle" font-size="8" class="t-acc" style="fill:var(--t3)" font-style="italic">&#8212; he does not reflect</text>
<path d="M480,154 A 50,28 0 0,0 580,154 Z" class="f-t2" opacity=".22" stroke-width="1.8" style="stroke:var(--accent)"/>
<text x="530" y="148" text-anchor="middle" font-size="12" font-weight="bold" class="t-serif" style="fill:var(--accent)">JOB</text>
<text x="530" y="181" text-anchor="middle" font-size="8.5" class="t-muted">one mortal &#183; powerless</text>
<text x="530" y="198" text-anchor="middle" font-size="8.5" font-weight="bold" style="fill:var(--accent)">moral consciousness</text>
<text x="530" y="210" text-anchor="middle" font-size="8" class="t-acc" style="fill:var(--accent)" font-style="italic">he reflects, and judges</text>
<text x="610" y="108" text-anchor="middle" font-size="8" class="t-muted" font-style="italic">the light</text>
<text x="610" y="119" text-anchor="middle" font-size="8" class="t-muted" font-style="italic">pan rises</text>
<text x="610" y="158" text-anchor="middle" font-size="8" class="t-acc" style="fill:var(--accent)" font-style="italic">&#8595; yet outweighs</text>
<line x1="160" y1="288" x2="540" y2="288" class="ln-soft" stroke-width=".75"/>
<text x="350" y="312" text-anchor="middle" font-size="9.5" class="t-acc" style="fill:var(--muted)" letter-spacing="1.5">THE ONLY WAY TO BALANCE THE SCALE</text>
<path d="M350,326 L350,360" fill="none" stroke-width="2.5" style="stroke:var(--accent)"/>
<polygon points="350,372 342,356 358,356" style="fill:var(--accent)"/>
<rect x="214" y="380" width="272" height="48" rx="4" class="f-t2" opacity=".12" stroke-width="1.6" style="stroke:var(--accent)"/>
<text x="350" y="400" text-anchor="middle" font-size="12" font-weight="bold" class="t-serif" style="fill:var(--accent)" letter-spacing="1">GOD MUST INCARNATE</text>
<text x="350" y="416" text-anchor="middle" font-size="8.5" class="t-muted">become mortal man &#8212; to gain the consciousness his creature surpassed him in</text>
<text x="350" y="444" text-anchor="middle" font-size="8.5" class="t-muted" font-style="italic">&#8220;God &#8230; drinks to the dregs what he made his faithful servant Job suffer.&#8221;</text>
</svg>
<figcaption><strong>Fig. 6.</strong> The whole scandal of <em>Answer to Job</em> in one tilted beam: omnipotence and omniscience pile up on God&#8217;s pan, yet a single reflective mortal outweighs him on the one quality the balance is weighing &#8212; moral consciousness. The Incarnation is then no longer a rescue of man but a self-correction of God: he must become what Job already was.</figcaption>
</figure>
