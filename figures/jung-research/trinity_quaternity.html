<svg viewBox="0 0 700 412" role="img" aria-label="Two figures side by side joined by an arrow. On the left, an upward gold triangle, the Trinity: its three vertices are FATHER at the top, SON at lower left, and HOLY SPIRIT at lower right. The triangle is all light, all good, all spirit, a closed three. A broad arrow labelled the missing fourth points right. On the right the same form has become a four-cornered quaternity, a square: the three bright vertices remain, and a fourth vertex has been added at the bottom in dark cinnabar, the integrated fourth. Three captions list what Jung variously names that fourth: the Devil and the reality of evil, against the doctrine that evil is mere absence of good; matter and the body; and the feminine, sealed for him by the 1950 dogma of the Assumption of Mary. The square, unlike the triangle, can hold its own opposites and is therefore a symbol of wholeness.">
<text x="350" y="36" text-anchor="middle" font-size="14.5" class="t-serif" letter-spacing="2.5">THREE, MADE WHOLE BY FOUR</text>

</svg>
<figcaption><strong>Fig. 5.</strong> Jung&#8217;s most distinctive geometric move: a Trinity is a closed three of pure light, and a triangle cannot contain its own opposite. Add a fourth vertex &#8212; evil, matter, the feminine &#8212; and the three becomes a square, the oldest symbol of wholeness. The 1950 dogma of the Assumption of Mary he read as the psyche itself voting the missing fourth back in.</figcaption>
</figure>
