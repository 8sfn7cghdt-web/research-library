<svg viewBox="0 0 700 472" role="img" aria-label="Jung&#8217;s own published synchronicity diagram, drawn as a cross or quaternio. The vertical axis runs from INDESTRUCTIBLE ENERGY at the top to the SPACE-TIME CONTINUUM at the bottom. The horizontal axis runs from CAUSALITY on the left, defined as constant connection through effect, to SYNCHRONICITY on the right, defined as inconstant connection through contingence, equivalence, or meaning. Synchronicity is thus offered as a fourth term, a co-equal ordering principle of nature standing beside causality. A small inset shows the scarab anecdote: a dreamed golden beetle and a real rose-chafer arriving together, an acausal but meaningful coincidence. Below the cross, two columns, PSYCHE and MATTER, descend and converge into a single root labelled the UNUS MUNDUS, the one world from which both derive, a term Jung took from the alchemist Gerhard Dorn.">
<text x="350" y="34" text-anchor="middle" font-size="14.5" class="t-serif" letter-spacing="2.5">AN ACAUSAL CONNECTING PRINCIPLE</text>
<text x="350" y="53" text-anchor="middle" font-size="10.5" class="t-muted" font-style="italic">Jung&#8217;s quaternio: synchronicity as a fourth co-equal with cause (CW 8)</text>

<figcaption><strong>Fig. 7.</strong> Jung&#8217;s own cross promotes meaning to a fourth principle of nature, co-equal with cause: events can be bound not by one pushing the other but by a shared significance. The diagram only stands, though, on the foundation drawn beneath it &#8212; the <em>unus mundus</em>, the single reality below the mind&#8211;matter split, which is the one thing that would let an inner image and an outer beetle genuinely rhyme.</figcaption>
</figure>
